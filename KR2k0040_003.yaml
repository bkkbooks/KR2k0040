body:
  text: 欽定四庫全書欽定盛京通志凡例一盛京為王迹肇基首隆謨誥謹稽五朝實録聖訓詔諭碑記詩文冠列卷端我皇上覲揚光烈四詣陪京闓澤覃敷大文彌耀謹志聖製綸音天章弁諸志首以昭作述之隆一考卜興京遷都遼瀋為我朝豐鎬遺規至若壇廟宫殿山陵創制典禮嚴重謹稽實錄及㑹典諸書詳志京城壇廟宫殿山陵各一卷以彰規制一志星野當辨其傅㑹建置疆域當糾其譌謬山川城池當考其方隅今遵㫖訂正悉載國語舊名並恭錄開國戰蹟其疆里逺近謹遵欽定輿圖詳核臚識一舊志闗津於吉林黒龍江邉門多所闕略户口田賦於旗田官莊園塲賦則亦多疎漏兹悉詳訂増所未備一志職官次官署以専職守志學校次選舉以簡才良至畱都重地武備尤要分營列戍規模宏逺謹増志兵防一志名宦以彰治行志人物以勵材能舊志於遼金宗室俱不載又但志遼瀋不及吉林黒龍江未為該備今悉増入並遵欽定遼金史於舊譌姓名詳譯改正至開國功臣事蹟謹遵國史傳按其於盛京有治行戰蹟者一一臚載其事在入闗以後者詳見國史及八旗通志兹不備錄一忠孝節義所以㢘頑立懦風示百世至文學隠逸流寓方伎仙釋列女皆足以資采訪驗風教悉志如例一祠祀有闗祭法翠華四莅遼渾諸河特建專祠古刹精藍亦多蒐輯謹志祠祀又古蹟舊志繁簡失當兹詳考史傳分𨽻郡縣名勝各以類次間加辨正以期核實一奉天風俗淳樸有上古遺風物産豐饒為九州上腴兹博稽前史謹遵欽定滿洲源流考詳晰編纂志風俗物産並旁採異聞為雜志一卷以資考鏡一列朝藝文舊志體例未協兼多遺闕今蒐羅史集按照時代分體編輯至國朝藝文凡臣下賦頌及賡紀詩篇俱各依類編次以彰昭代人文之盛
