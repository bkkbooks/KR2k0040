業八年代髙麗分道並進皆㑹於鴨渌水西宋史大中祥符二年契丹主隆緒代髙麗渡鴨渌江髙麗敗保銅州元史至正二十年廢髙麗王巴延特穆爾立其昆弟在京師者曰塔思特穆爾以兵送之國髙麗國人不服至鴨渌江髙麗伏兵四起兵敗方輿紀要鴨渌水源出長白山下流入海與髙麗分界按鴨渌水即今之鴨渌江詳見吉林山川注內巴延特穆爾國語解䝉古語解已見疆域形勝名宦等卷䝉古語塔思性烈也薩水新唐書男建以兵五萬襲扶餘李績破之薩賀水上明一統志薩水在鴨渌江東平壤城西水按薩水即薩賀應在邉界唐龍水明一統志唐龍水在遼西郡至徒河入海按唐龍水今未知所在貴端水方輿紀要在金州城西南唐永徽五年程名振等討髙麗度遼水趨新城髙麗以其兵少開門度貴端水逆戰名振等大破之焚其外郭而還按貴端水今堙和囉噶水元史地理志和囉噶萬户府有和囉噶江流并混同江明一統志和囉噶江源出建州東南山下東北滙為鏡泊又北入混同江按和囉噶即今寧古塔烏蘇哩江鏡泊即今之興凱湖舊志漫以今畢爾騰湖為鏡泊遂以今瑚爾哈河為和囉噶江已於吉林山川卷內詳辨其誤和囉噶原作呼里改今譯改大蟲江明一統志大蟲江在都司城東南四百里源出龍鳯山南流入鴨渌江方輿紀要亦謂在鳳凰城境內鳳按今鳳凰城西北有龍鳳臺山即明時之龍山並無大蟲江之名疑即今佟家江也南北通江方輿紀要南北通江在海州衛西一百八十里源出衛東滑石山自東而西橫度遼水折而南流又折而東復入於遼河其間有閬州方十餘里可以耕稼按今海城縣東南有滑石嶺即滑石山並無南北通江之名疑堙阿雅噶河明一統志阿雅噶河源出長白山東流入海按今吉林寧古塔境內止有圖們一江源出長白山水流入海以水道考之當即此河或一水而二名耳圖們金火又作統門詳見寧古塔山川注阿雅噶原作阿也苦今譯改難河魏書勿吉傳太和初使臣乙力支稱初發其國乘船溯難河西上至大沵河南出陸行渡洛孤水從契丹西界達和龍即按難河亦曰那即嫩江也太即太魯洛孤洛壞皆音轉而訛實即托羅及老哈二河也托羅入嫩紅故自難河乘船可溯托羅與老河相隔故南由陸行嫩江又名呼喇溫江詳見黑龍江山川注呼喇溫原作忽喇溫今譯改古泥河新唐書渤海大氐本粟末靺鞨附髙麗國髙麗滅保東牟直營州東二千里以泥河為境萬嵗通天中契丹反東渡遼水保大白山之東北阻奧婁河自固按元一統志引契丹地理志云浿水即古泥河也自東逆流數百里至遼陽瀦蓄不流有蓒芋草生於泊中故名蓒芋泊明一統志從之又以朝鮮大通江為泪水考泥河在海城縣西南六十五里蓋平縣北五十里源出聖水山流至述真山散漫為遼時之蓒芋泊今為蓒芋濼水多蓒芋之草與朝鮮境內之浿江不同又按太白即長白奧婁當為阿嚕河源出吉林安巴和託峯一西南流入哈達河一流至開原東南入清河呼爾罕河新唐書天寶末渤海大氐欽茂從上京直舊國三百里呼爾罕河之東按呼爾罕河即今寧古塔瑚爾哈河源出塞齊窩集滙於寧古塔城西南一百里之畢爾騰湖廣五六里袤七十里許中有三山即呼爾罕海也又自發庫東繞寧古塔城旁古大城之南東北流與混同江合古大城疑即上京舊址唐賈耽云渤海王城臨呼爾罕海者是也呼爾罕原作忽汗今譯改室建河新唐書室建河東合那河忽汗河又東即貫黑水靺鞨跨水有南北部按室建今黑龍江那河即嫩河忽汗即瑚爾哈河並流入混同江混同合黑龍江入海混同黑龍合之處僅在靺鞨東界新唐書兼那河忽汗河言之似誤以混同為黑龍江也其實一出長白一出喀爾喀界逺不相涉前史不知黑水源委以誤傳誤如唐書之以混同入嫩江北盟㑹編稱混同南流入鴨緑通鑑注又以混同為鴨緑皆誤也特正其紕謬於此它漏河新唐書粟末部依粟末水以居水源於徒太山西北注它漏河按它漏即托羅河入嫩江嫩江入松花江此云粟末西北注它漏誤汛河即范河遼史地理志東京遼陽府北至挹婁范河二百七十里金史地理志新興挹婁二縣有范河方輿紀要源出衛東三十里松山之東㑹諸山之水西南流經黃山塔北流入遼河路河遼史地理志遼州有羊腸河方輿紀要路河在廣寧衛東四十里其上流為羊腸河源出白雲山經鎮武堡髙橋鋪入鐮刀湖又東合沙河流入三岔河中間有沙嶺地形髙阜多沙河易淤自盤山驛以來每霖雨河水泛溢人馬常虞艱阻明正統中於沿河築隄長二百步河水通行自海運廢河道遂阻路河蓋以沿路濬河而得名也按今在廣寧城東統名曰羊腸河錐子河遼史地理志遼州有錐子河明一統志源出廣寧衛東北一百里白雲山南流入遼河土按錐子河即今廣寧城東北珠子河今考白厰東惟羊腸河從東入境南流錐子河故道久堙土人云山水盛時此河故道尚可指也旱則涸矣淶流河遼史地理志上京臨潢府淶流河自西北南流繞京三面東入於曲江其北東流為安春河又有御河沙河黑河潢河鴨子河答嚕河狼河蒼斗河輞子河臚朐河隂涼河瀦河鴛鴦湖興國惠民湖廣濟湖鹽濼百狗濼大神淀金史地理志隆州古夫餘之地有混同淶流河淶按明一統志言金水河西北流與淶流水合流源出三衛馬盂山東流至黃龍府境東又東南流入女真境㑹金水河東北入混同江方輿紀要亦云今考大寧故城外有馬盂山去寧古塔甚逺則二水焉得合流且别金水河與呼爾罕河而二之亦誤鴨子河即今混同江安春河即今之愛新水今之瑚爾哈河淶流河疑即今吉林城東之拉林河塔魯河疑即今吉林城東之噶魯河其餘諸水則今昔異名莫可訂正矣安春原竹按出塔魯原作他魯今譯改清河即今懿路河亦名小清河金史地理志挹婁有清河國名扣必剌即此全遼志小清河在鐵嶺衛南六十里源出廢貴德州南山西流經懿路城南流入遼河枸桞河金史城理志桞河縣有枸河栁河一按盛京輿圖有桞河而無枸河第遼河名巨流河一名句麗河一名枸桞河謂是枸河桞河合流之處考桞河源出遼陽州城東北八十里西北流經承德縣城東南之蠟子山紅寶石山陽入十里河又考十里河舊名稠桞河源出遼陽州城北六十里亦西北流至楊家灣合沙河入渾河渾河入遼河則枸河或即十里河也第十里河與桞河合流之地去巨流河尚逺而遼河之大豈轉因二小水得名是蓋因句麗巨流枸桞音頗相同以故轉疑有此說耳又按土默特右翼西北亦有桞河東南流經喀喇城入大凌河又義州境內之桞河川亦發源於土默特右翼南亦東南流入大凌河土默特右翼為古桞城地雖與靺鞨接界在遼為興中府屬中京殊不相涉考遼金韓州信州故城皆在今科爾沁左翼東南科爾沁地在隋唐屬靺鞨無栁河有遼河則所謂枸河桞河者當即枸桞之誤達魯古河金史地理志長春縣有達魯古河鴨子河有别里不泉按此河今在吉林境內即它漏河之轉音詳見粟末水注别里不泉無考烏梁河明一統志烏梁河源出沙漠南流合洮兒河腦溫江入混同江東流入海龍安伊敦河明一統志龍安伊敦河在三萬衛西北金山外伊敦原作一秃今譯改喀嗽河明一統志喀嗽河在開原城東四百里源出長白山北松山東流合輝發江入松花江伊密河明一統志伊密河在開原城北四百里源出艾河北山北流合伊敦河入松花江勒按今吉林城西有伊勒們河即是金史作額敏河詳見吉林山川注伊密原作一迷今譯改溫都河明一統志溫都河在開原城東五百里北流入松花江溫都原作秃今譯改綽羅河明一統志綽羅河在開原城東北五百七十里源出建州衛東南山東北流合達嚕瑪河入松花江綽羅原作掃兀達嚕瑪原作秃魯麻今並譯改艾葱河明一統志艾葱河在開原城東北六千餘里源出潭州東山東流入海今應在邉外䝉格河明一統志䝉格河在開原城東北六千餘里源出潭州東山東流入海今應在邉外䝉格原作莾哥今譯改三岔河方輿紀要艾河在三萬衛東北二百五十里源出塞外流經衛東北境黑嘴山與土河㑹土河在衛北二百五十里亦自塞外流入至黑嘴山合於艾河二河合流謂之遼海即遼河之上源又有塗河在衛西北二百五十里自塞外流入境南合遼河經衛西八十里又南經鐵嶺衛西八里瀋陽衛西一百十里都司城西一百六十里又南經海州衛西南五十五里又南流注於海謂之三岔河當東西往來之衝張按魏公孫淵拒司馬懿使將屯遼隊自固懿軍其南潛渡其北即此唐太宗征髙麗至此泥淖二百餘里布土作橋乃濟今此地百餘里內泥淖猶不可行康熙五十八年雍正八年相繼修築漸成坦途錦川明一統志錦川在錦州西亦曰錦水州以此得名小凌河源出大寧自廣寧左屯衛西入境合女兒河及哈喇河南流入海復按錦川即小凌河此河從西北繞城西而南折而北經城之東又轉南流回旋如錦故名明一統志分為二誤欽定盛京通志卷二十八
