body:
  text: 山川四黑龍江各屬齊齊哈爾墨爾根黑龍江呼倫布雨爾呼蘭布特哈欽定四庫全書欽定盛京通志卷二十八山川四黑龍江各屬齊齊哈爾哈勒噶圖山䝉古語哈勒噶圖有門之謂也城東三百五十里超哈爾山䝉古語超哈爾粃子也城西一百九十里又城西一百七十里曰華洪碩爾棟諾錫山城西二百里又西曰烏努固勒津山䝉古語烏努固勒津騎也玉克圖山城西二百四十里雅克山䝉古語雅克結實也城西三百五十里額貴山城西四百里弼郎武山城西四百里逹竒圖山䝉古語逹竒馬毛也圖有也城西四百五十里濟伯根圖山䝉古語濟伯根圖有細鱗白魚也城西五百里索嶽勒濟山城西六百四十里特克伸山國語特克仲齊也城西六百五十里哈蘇台山國語哈蘇台左手射也城西六百六十里克斯圖山䝉古語克斯圖山間齊磡處也城西六百八十里穆固圖爾山穆固圖爾䝉古語解見疆域形勝卷城西七百里圖古勒山䝉古語圖古勒牛犢也城北四百里阿拉克諾海山䝉古語阿拉克諾海花犬也城西南四百十里揆圖爾山城西南四百八十里貴埓庫山城西南六百里阿哩呼山城西南六百二十里奎山䝉古語奎鄉黨之黨也城西北一百五十里額赫嚕爾山城西北三百二十里額古埓山䝉古語額古埓雲也城西北三百五十里多雍果峯多雍果國語解見吉林山川卷城西二百八十里札喀喇喀峯國語札喀喇喀裂開也城東南九百里察布齊拉庫峯䝉古語察布齊拉庫馬雙蹄拍又用力亂砍也城西南四百五十里科元峯城西北一百八十里特爾庫哷峯蒙古語特爾庫哷猶言彼兵隊也城西北三百七十里雅克嶺雅克䝉古語解見本卷前城西四百七十里穆實希嶺國語穆實希長柄木瓢也城西六百四十里賽堪嶺國語賽堪美好也城西南二百八十里烏哈納嶺䝉古語烏哈納思慮也城西南六百八十里東為烏哈納山西接烏珠穆沁部地嫩江城西五里古名難水亦曰那河明時曰腦溫江又名呼喇溫江源出伊拉古爾山南流㑹諸小水繞墨爾根城西又南經齊齊哈爾城西凡西來之詬敏綽爾雅爾諸河皆㑹入於此又轉東南經都爾伯特果爾羅斯二旗地受西來之托囉河折而東與混同江㑹焉按唐書云那河或曰他漏河東北流入黑水蓋以那河他漏為一水然北史勿吉傳云太和初貢馬乘船溯難河西上至太瀰河則又分為兩水今以地理考之那河即難河今之嫩江也太瀰河即他漏河今之托囉河也古今名雖屢易其音自通况其水道曲折與今輿圖悉合唐時疑為一水乃傳聞之誤已詳辨於古山川考云塔呼喇河國語塔呼喇蛤蜊也城東六十里源出平野入嫩江呼雨哩河城東七十里源出東北興安嶺南至蒙古都爾伯特果爾羅斯兩旗界入混同江呼裕爾河城東四百里通肯河通肯國語解見疆域形勝卷城東四百五十里源出興安嶺東流南入呼倫河呼倫河呼倫國語解已見吉林山川卷城東六百里源出興安嶺南流五百餘里入混同江又東有納敏河額葉赫河呼拉庫河皆南入呼倫河國語額葉赫已流之謂也巴蘭河巴蘭國語解見吉林山川卷城東七百五十里源出興安嶺東南入混同江雅魯河國語雅魯邊地也城東一千一百里源出興安嶺東流入屯河屯河屯國語解見吉林山川卷城東一千一百里源出屯泊東南流㑹十餘水入混同江札克達穆圖河城東一千二百里源出興安嶺南入屯河札琳河國語札琳麝香也城東一千二百五十里源出興安嶺東入屯河洪古河城東一千三百五十里源出興安嶺東入屯河鄂摩羅河國語鄂摩羅孫也城東一千四百里源出興安嶺南入屯河哈魯河國語哈魯細粉也城東一千四百五十里源出興安嶺東入屯河喀穆齊河國語喀穆齊相兼也城東一千六百里源出興安嶺南入屯河和河城東一千七百里源出興安嶺南入屯河穆遜河䝉古語穆遜氷也城東一千七百二十里源出興安嶺南入屯河亦曰伊遜河圖魯河國語圗魯馬胸也䝉古語圖魯白肚鱒魚也屯河城東一千七百五十里源出興安嶺南流入阿實克坦河䝉古語阿實克坦有利益也城東一千九百里源出興安嶺南流入屯河德倫河國語德倫馬鬃也城東二千五十里源出興安嶺東南入松花江烏屯河城東二千一百里源出興安嶺東南入松花江都魯河䝉古語都魯棟梁也城東二千二百里源出興安嶺東南入松花江額爾伯克依河額爾伯克依䝉古語解見疆域形勝卷城東二千二百七十里即黑龍江支流南流分入松花江庫爾竒哷河䝉古語庫爾竒哷瀑布也城西八十里從雅爾河分流東南入嫩江雅爾河城西一百二十里源出興安嶺東南流六百餘里入嫩江哈達罕河國語哈達罕樁子也城西一百三十里源出雅克山東入雅爾河護裕爾庫河城西二百里東流㑹雅克河又西有瑪爾圖哈布齊勒河灣接弼齊克屯伯勒齊爾在城西二百九十里䝉古語瑪爾圖有牲畜也哈布齊隘口也濟秦河濟秦國語解見吉林山川卷城西二百里源出興安嶺東入雅爾河哈岱堪河城西三百四十里源出雅克山綽爾河綽爾䝉古語解見疆域形勝卷城西三百八十里源出興安嶺流至札賴特旗地流六百里入嫩江又城西南二百四十里有綽爾噶爾源出綽爾河入嫩江䝉古語噶爾使出之謂烏魯克楚爾河城西四百里德伯特河城西四百三十里托馨河托馨國語解見疆域形勝卷城西五百里源出興安嶺東入綽爾河雅爾呼圖河城西五百里哈瑪爾河哈瑪爾䝉古語解見疆域形勝卷城西五百四十里流㑹托馨河諾木台河䝉古語詬木台有經也城西五百四十里海拉蘇台河䝉古語海拉蘇台有榆樹也城西五百五十里以上兩河㑹流處曰海拉蘇台塔們台伯勒齊爾在城西五百三十里䝉古語伯勒齊爾牧場也濟伯根圖河濟伯根圖䝉古語解見本卷前城西六百里源出穆實希嶺蘇海圖河䝉古語蘇海圖有三川柳也城西六百里源出索嶽勒濟山噶海河噶海䝉古語解見吉林山川卷城西六百里多和灤河城西六百十里庫齊台河䝉古語庫齊台有力也城西六百二十里額默格什特河䝉古語額默格老婦之稱什特榛子也城西六百三十里扎瑪克圖河蒙古語扎瑪克圖有榆莢之謂城西六百三十五里誥圖河䝉古語誥圖有溝渠也城西六百四十里努斯圖河䝉古語努斯圖鼻出涕也城西六百四十五里滔爾河䝉古語滔爾網也城西六百五十里流入嫩江穆實希河穆實希國語解見本卷前城西六百七十里喀爾喀河喀爾喀國語解見疆域形勝卷城西八百里源出穆固圖爾山西北流五百餘里㑹數水入布雨爾湖又自布雨爾湖之北流出曰烏爾繖河北流㑹於庫楞湖漠河城西一千九百二十里源出西北興安嶺西流入額爾古訥河托囉河國語托囉挑也城南四百里源出喀爾喀境內東南流千餘里㑹十餘小水入嫩江即古他漏河也舊志廢肇州西有洮兒河流入開原西北境合腦溫江入松花江亦即此阿里瑪河䝉古語阿里瑪梨也城北五十里源出西北興安嶺東南入嫩江諾敏河詬敏國語解見疆域形勝卷城北二百七十里源出興安嶺東南流五百餘里入嫩江訥默爾河訥默爾國語解䝉古語解俱見疆域形勝卷城北二百七十餘里源出東南興安嶺入嫩江特尼河國語特尼剛才也城北三百二千里源出西北興安嶺東南入諾敏河畢楞河畢楞國語解見吉林山川卷城北四百六十里源出興安嶺東南入諾敏河薩琳河國語薩琳筵席也城東南七百二十里源出東興安嶺南流入混同江溫托琿河國語溫托琿空虛也城西南一百三十里色勒河色勒國語解見吉林山川卷城西南四百里又有一在城西六百四十里特們河國語特們駝也城西南四百里又有一在城西六百四十里貴埒爾河城西南四百四十里阿勒達爾河䝉古語阿勒達爾名譽也城西南六百里烏拉貴河城西南六百十里烏哈納河烏哈納䝉古語解見本卷前城西南六百六千里扣肯河䝉古語扣肯子也城西南六百七十里音濟必濟河䝉古語音濟必濟媵婦也城西北四十里流入嫩江開拉哩河國語開拉哩益母草也城西北六百九十里源出西北興安嶺西流會額爾古訥河金河城西北九百里源出西北興安嶺西流入額爾古訥河特勒古爾河䝉古語特勒古爾織機之轂棍也城西北一千八十里源出西北興安嶺西流入額爾古訥河赫爾根河國語赫爾根字也城西北一千五百七十里源出西北興安嶺西流入額爾古訥河尼納河國語尼納青苔也城西北一千六百九十里源出西北興安嶺西流入額爾古訥河伊瑪河䝉古語伊瑪山羊也城西北一千八百五十里源出西北興安嶺西流入額爾古訥河額爾古訥河額爾古訥䝉古語解見建置沿革卷城西北二十里源出庫楞河北流八百餘里㑹東來之數水入黑龍江河之北岸即俄羅斯界布雨爾湖城西一千二十里舊名捕魚兒海喀爾喀河西北流至此滙為大湖又北流為烏爾繖河庫楞湖䝉古語庫楞墻圈也城西北一千二百七十里古名俱輪泊明時謂濶濼海子自西北境外墾特山南發源東流為臚朐河今曰克勒倫河流經千餘里至此及城西布雨爾湖流出之烏爾繖河二水交㑹滙為一大湖周圍數百里又從湖東北流出為額爾古訥河㑹黑龍江唐時室韋西有烏素固部與回紇接當俱輪泊之西即此也溫托琿池溫托琿國語解見本卷前城南三百里阿木坦圖池䝉古語阿木坦圖有味也城南三百三十里塔勒哈池國語塔勒哈戒也城南三百六十里鳥裕爾池城東南八十里察罕池察罕䝉古語解見吉林山川卷城東南一百九十里塔爾琿池國語塔爾琿肥也城西南三百九十里納喇薩喇淀䝉古語納喇日也薩喇月也城西南三百六十里額能泊國語額能後嗣也城西四百二十里德勒璸泊國語德勒璸帽沿也城北四百里花札哈塔爾哈泊國語花札哈破也塔爾哈祭祀時小兒肩上所釘方紬片也城東南八百里南流入混同江屯泊屯國語解見吉林山川卷城東南一千一百里即屯河之源錫訥肯庫濟泊䝉古語錫訥肯新也庫濟香也城西北六百四十里哈喇呼濟爾泊䝉古語哈喇呼濟爾黑色鹻也城西北七百二十里烏蘭布拉克䝉古語烏蘭布拉克紅泉也城西北一千二百里源出平甸東流入烏爾繖河華克善泉國語華克善木樁也城東一百六十里即華克沙罕國語周欄竪柱也達什瑪勒呼都克䝉古語達什扇骨也瑪勒牲蓄也呼都克井也城西南四百五十里打草灘城南一百十里北曰科勒坡托墨爾根圖墨勒墾山城南一百里望安山城北二百五十里固寧阿山國語固寧阿有志者也城東南六十里旺安山城東南七十里烏圖哩山國語烏圖哩尾纛也城東南一百七十里和倫圖吉山和倫國語解見吉林山川卷圖吉解見前城東南二百里碩多隆科山國語碩多間行也隆科銅鍋也城東北九十五里額爾克山額爾克䝉古語解見疆域形勝卷城東北二百九十五里伊拉古爾山城東北一千三百十五里嫩江發源于此札克達齊山城西北二百三十五里伊錫呼哩山國語伊錫落葉松呼哩松子也城西北八百六十里格勒布爾山城西北九百里伊克庫克圖山伊克庫克圖䝉古語解見疆域形勝卷城西北一千二百七十里喀布齊祿峯城西北三十里莽吉延峯國語莽吉延崇神也城西北二百里烏雲額赫峯馬雲國語解見前注額赫解見吉林山川卷城西北五百里內興安嶺城東北二百二十里又外興安嶺詳黑龍江山川注嫩江城西一百餘步詳齊齊哈爾城注墨爾根河墨爾根國語解見建置沿革卷城東一里源出城東南平野西北流入嫩江塔噶爾河䝉古語塔噶爾石也城東