body:
  text: 官署奉天將軍所屬各城公署吉林將軍所屬各城公署黑龍江將軍所屬各城公署欽定四庫全書欽定盛京通志卷四十六官署二奉天將軍所屬各城興京城守公署在城內教場在城外遼陽州城守公署在城內倉在城內大街南康熙三十二年建二十間雍正六年七年城守觀音保捐建二十四間教場在城外蓋平城守公署在城內街東倉在城內二十間康熙三十二年建乾隆四十二年增建十間教場在東門外牛莊城守公署在城內倉在城內二十間雍正十一年建乾隆三十年增建三十間教場在城外開原城守公署在城東隅倉在城內二十五間康熙二十一年建二十間乾隆三十年增建五間教場在城外熊嶽副都統公署在城內大街東城守公署在城內倉十間雍正十一年建乾隆三十年增建十間教場在城外復州城守公署在城內東街倉在城內西北隅十六間雍正十二年建十間乾隆四十二年增修六間教場在南門外寧海即金州城守公署在城南東街倉在城內西北隅十五間康熙四十四年旗人捐建五間乾隆三十年增建十間教場在城外東北二里岫巖城城守公署在城內東街倉在舊城內正東二十一間康熙四十四年旗人捐建七間五十三年增建七間雍正元年又增建七間教場在城外鳯凰城城守公署在城內倉在城內東北隅二十四間康熙四十年建十間乾隆三十年增建十四間教場在城外錦州副都統公署在北門路東倉在城東北隅康熙三十二年建城守公署在城東南大街路北倉在城內東北隅六十五間康熙三十一年建二十間雍正二年增建四十五間教場東門外路南義州城守公署在城內倉在城內東北隅二十五間乾隆六年建教場在城外寧逺州佐領公署在城內倉二十間在城西北隅雍正五年建中前所佐領公署在城內中後所佐領公署在城內廣寧協領公署南門西街路北倉在城內西北三十間乾隆六年建教場小南門外路東吉林將軍所屬各城吉林將軍公署大堂五間後堂七間户兵刑工四司房共十八間看守銀庫印庫房三間巡更房四間各營辦事房共五間檔房三間前鋒房三間燒荒營虎鎗營房五間八旗聽事房十間土地祠一間儀門一座大門三間康熙十五年建住房六十四間乾隆三十年重修乾隆十九御書天年奉頒額匾恭懸大堂江鎖鑰皇上東巡有林將軍署詩恭載御製駐蹕吉天章門倉康熙二十八年于城西沿江建二十間三十九年增建二十間四十三年官兵于城北隅捐修六十間雍正六年修義倉二十四間八年又修義倉二十四間現今存太平倉六十間永寧倉六十四間共一百二十四間又義倉一百零三間庫銀庫印庫各二間康熙十五年建軍器庫二間棉甲庫三間鳥鎗庫一間雍正十年建演武廳五間在北門外康熙四十九年官兵捐建監獄十五間在署內御史公署十五間雍正六年設副都統公署共四十二間鼓樓三間祭器樓二間貯物房八間庫火藥庫三間顔料庫三十間龍船房十九間鷹房六間黑牛房六間八旗弓匠房十六間鐡匠房十七間理事同知公署共一十八間原係永吉州知州公署乾隆十二年裁永吉州改為同知公署巡檢公署共八間原係吏目公署乾隆十二年裁吏目改為巡檢公署監獄六間稅房三間官參局二十七間原係理事通判公署乾隆二十七年裁通判改為官參局火藥局六間乾隆四十四年建官房二百八間乾隆三十年八旗官兵捐建八旗堆房共二十三間寧古塔副都統公署大堂五間二堂五間左右司房各四間前鋒營及虎鎗營房共六間儀門三間大門三間內宅住房三十七間倉康熙三十五年建三十五間四十八年增建三十九間雍正五年增建義倉十間現實存官倉四十間義倉三十二間庫印庫一間銀庫三間貂皮庫三間雍正四年建演武廳五間監獄五間鼓樓三間貯物房八間官參局二十二間乾隆二十八年建八旗弓匠鐡匠房六間火藥庫一間稅房一間鷹房三間白都訥副都統公署大堂五間二堂五間左右司房各三間住房二十五間儀門一座大門五間前鋒燒荒營虎鎗營房共六間八旗辦事房六間土地祠一間康熙三十二年建倉城東南隅康熙三十二年建十間五十六年建十間雍正六年建十間義倉十六間雍正五年官兵捐建六間十年官兵捐建十間現實存廣積倉三十間義倉二十六間庫在公署內銀庫印庫各二間康熙三十二年官兵捐建監獄三間在署右演武廳三間鼓樓二間貯物房四間稅房二間八旗弓匠鐡匠房共六間火藥庫二間辦理蒙古事務委署主事公署共十六間原係巡檢公署乾隆二十六年裁巡檢改為主事公署三姓副都統公署大堂五間二堂五間左右司房各三間八旗辦事房八間前鋒營及虎鎗營房共八間檔子房三間內宅住房二十二間儀門一座大門五間雍正十年建倉城東南隅康熙三十二年官兵捐建三十間雍正六年建義倉四間十二年捐建十六間現今存永豐倉六十間義倉二十間庫銀庫二間印庫一間雍正六年官兵捐建乾隆四十一年重修增建一間以偹存貯棉甲監獄三間演武廳三間鼓樓二間貯物房三間稅房三間鷹房五間阿勒楚喀副都統公署大堂五間儀門一座左右司房各三間前鋒房三間八旗辦事房四間內宅住房三十六間大門三間雍正六年建倉原建一百二十間乾隆三十二年奉裁六十間雍正六年旗兵捐建義倉五間乾隆十二年增建五間三十二年增建十間三十九年奉裁七間現實存官倉六十間義倉十三間庫銀庫印庫各二間監獄十間演武廳三間鼓樓一間貯物房三間稅房三間琿春協領公署大堂五間大門一間辦事房三間檔子房三間康熙五十三年建義倉五間雍正六年官兵捐建乾隆三十二年增建十間庫一間演武廳三間打牲烏拉御史公署二所在城東門內總管公署大堂五間二堂五間檔子房三間八旗辦事房十間倉新城南門外共八十三間康熙四十六年建現今存五十間銀庫一間貯魚房三間貯蜂蜜房三間拉林協領公署大堂五間二堂五間左右司房各三間辦事房八間原係副都統公署乾隆三十四年裁副都統改為協領公署原有內宅住房三十六間今裁倉原建一百二十間乾隆三十年奉裁六十間又旗兵原建義倉三間乾隆三十二年增建三間三十七年增建七間演武廳三間棉甲庫二間鼓樓五間貯物房三間稅房二間黑龍江將軍所屬各城齊齊哈爾將軍公署在城內康熙三十八年設大堂五間後堂五間堂司房三間戶刑兵工四司房各三間看守銀庫房各三間檔子房三間倉司房二間內宅住房二十四間廂房五間儀門三間大門七間倉貯米倉二十間在署內大堂東貯榖倉一百九十六間在城外西南半里乾隆年間疊次增減現實存備倉二百九十五間公倉七十五間庫銀庫三間印庫二間在大堂東貯船上應用器物庫房共二十五間在城西南九里監獄六間演武廳三間在城外軍器樓六間在大堂西鳥鎗樓二間炮局十五間在東門內貯無敵大將軍炮房三間貯神威將軍炮房六間貯子母炮房六間火藥局三間鉛子􅐨麻房五間鐡匠房五間在東門內弓匠房五間在東門內貯貢物房三間貯麵房三間羈候所在西門內稅課司一間在南門外御史公署在城內東南共九間雍正元年設乾隆十二年裁副都統公署共十六間墨爾根副都統公署在城內康熙二十九年設為將軍公署四十九年改為墨爾根副都統公署大堂五間堂司房一間户刑兵工四司房各三間倉司二間檔子房二間內宅住房十六間儀門一間大門三間倉康熙三十五年初建貯米倉十五間左署內貯穀倉一百八十六間在南門外半里乾隆年間疊次增減現今存備用倉二百三十四間公倉一百五間庫銀庫二間印庫二間在署內貯船上應用器物庫六間在北門外演武廳三間左城南半里稅課司一間在南門外軍器樓在署內炮局五間城內東北火藥局三間在城東二里黑龍江副都統公署在城內原係將軍公署康熙三十九年將軍移駐墨爾根改為副都統公署大堂五間堂司房二間户刑兵工四司房各二間檔子房一間倉房二間內宅住房十六間儀門五間大門三間倉貯米倉十五間在署內貯谷倉二百十三間在城南二里現今存偹倉四百二十三間公倉八十間庫銀庫印庫各一間演武廳三間在城西北軍器炮房十間在署內鳥鎗房二間火藥局三間雍正十一年重建鉛子􅐨麻房三間稅課司一間在北門外呼倫布雨爾總管公署大堂五間左右司房各四間大門三間軍器房二十六間鳥鎗房二間火藥房三間鉛子􅐨麻房三間呼蘭城守尉公署大堂五間二堂五間左右司房各三間看守銀庫房二間儀門一間大門三間倉乾隆六年以後陸續建蓋共三百九十間銀庫二間軍器房二間布特哈總管公署共七間軍器樓三間火藥房一間博爾多副總管公署共七間欽定盛京通志卷四十六
