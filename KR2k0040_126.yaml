body:
  text: 國朝藝文八詩三五言律欽定四庫全書欽定盛京通志卷一百二十二國朝藝文八詩三五言律扈從渡渾河康熙戊寅髙士竒浩淼看無盡滄波滚滚來浮橋齊渡馬大地不生埃勢接黄圖壯流從碧漢㢠尋源雖有志終忝漢臣才恭謁福陵康熙甲申吕履恒太祖龍升處巍巍近斗杓南天千岫拱中夜百靈朝廊廡丹如昨松杉翠不凋仰瞻佳氣象常在五雲標恭謁昭陵吕履恒文皇克繼述海甸悉從風黌序初興教戈鋋已奏功白山鳴瑞鳳遼水卜飛熊王業方新日羣瞻氣象中大凌河應制康熙己丑夸岱大凌河上水猶自起悲聲曽以三千衆求摧百萬兵明洪承疇統十三萬兵號百萬破於此指揮欽聖略駕馭盡羣英吾祖擒明將竒勲一箭成牛莊迎駕恭紀康熙壬戌鄭繡敬迓鑾輿至朝衣出郭東馬蹄如捲浪人耳但聞風水草連天碧旌旗匝地紅至尊方校獵鵠立夕陽中野曠千官静塵髙萬騎來䕫龍依日月兕虎疾風雷栁散堤城合燈攅帳殿開歡聲騰父老共覩帝車囘聖駕東巡盛京恭謁祖陵大禮慶成詩有序乾隆癸亥錢陳羣欽惟皇上徳配苞符功隆位育建其有極歛五福以錫庶民奉三無私懐百神而柔喬嶽邇安逺至既道濟而知周禮備樂明復本仁而率義謂我朝發祥遼海正位興京如太陽之出暘谷厯上舂而照八荒如洪河之導崑岡經九折乃行中國源逺流長譜系在履武生商以上義章志敬羔牆在郊堯宗嚳之先萬代所瞻三陵相望一十二州清淑全萃幽营二十八宿精靈適當析木嶽祗瀆鬼趨原廟以朝宗虎踞龍盤夾橋山而拱䕶妥陟降之神與天同體衍肇基之慶應地無疆洪惟我聖祖仁皇帝三親玉趾瞻松栢之丸丸亦越我世宗憲皇帝一奉綸音拜几筵之肅肅皇帝欽明繼軌健順同符敬侍慈闈聿䋲祖武時維月吉當萬寳之告成諏彼良辰駕六飛而順動金支秋麗雲霞捧華葢以飄颺寳扇晴開日月照鸞旗而㶷爛幔城所指黍谷回春黄屋俯臨蒼生望嵗扈千官而逾大漠從七萃而詣陪畿吉日既蠲明禋肇舉鱗筍毛簴奏厥和聲雞勺虎彛陳其徳産惟孝子為能享親鄗黍江茒各以其職來助斯聖人祭則受福東鶼西鰈可致之祥畢臻遂開明堂肆覲東后天揖土揖時揖大集禹甸衣冠鬱齊醴齊盎齊侑以周庭笙瑟挹湛恩而不竭視大賚而彌光愷澤可逮於下流至仁不遺於一物法祖受釐介十千年景命與民同樂遍億萬里提封由發軔以届廻鑾節氣秋冬成易扺龍庭而還鳳闕經過皆錦繡河山四海永清一人有慶明於禘嘗之義庶事康哉欣逢仁壽之君大孝備矣夫時雨將降柱礎猶知大樂既調跂踶解舞矧臣職列卿班躬覩盛典聚百順而致四靈逺駕元和聖徳撫三唐而規兩漢愧非吉甫歌詩雖繪天畫日葢非吉甫所能而藿向葵傾亦其精誠所結謹拜手稽首而獻詩曰時邁隆禋祀巡方首在東豈惟遵舜典亦自守家風諏日剛柔協抒忱肸蠁通百年興禮樂大孝備皇躬其一王氣千重結神皋實所鍾揷天髙一柱㧞地起三峯長白當蹲虎巫閭拱卧龍圖經金鏡在萬𣲖仰山宗其二水勢天然勝縈廻抱此邦南趨朝少海東迤走三江析木星辰㑹箕封教化龎百泉流􅍺逺嗚玉自淙淙其二七校臨秋發黄雲四野垂雨師先灑道風伯肅清馳大漠如弦直周廬戴月移聖情多悦豫傳與百僚知其四一人隆孝治色養奉慈闈野老將芹潔番君獻雉肥細旃承子舍衮服尚萊衣十二天閑馬和鸞過翠微其五聖勤天所縱左纛集車書批答綸音㨗諏諮清問虛尋詩秋栁外校射晚涼餘右史鄒枚侣濡毫富石渠其六環衛諸藩集琱弓帳殿開傾葵廻日照獻壽効嵩呼燈映千潭月歌繙一串珠邊民懐祖徳今日慶同符其七啟運基王業興京輦路西千秋避風雨萬族感鳬鷖松柏長如幄雲霞自作梯曽孫親薦幣穆穆契天倪其八禮行於望祀清蹕肅清齋北鎮牲先視東維璧可埋裒時諸政舉受職百神皆呵䕶山靈效皇心亦孔諧其九祖功艱締造天眷重扶培草昧真龍出風塵寳劍開五雲生饗殿萬壑赴泉臺祭畢猶凝睇雄圖亦信哉其十層巒平敞下隆業鬱輪囷彤史尊丕顯蒼生感至仁謨謀三代逺著作百年新佇想皇誠展師師助慶禋其十一典禮隆殷荐光華糺素雯綏成歌下武克配頌思文閟寢香醪徹寒楸曉炬分盛朝追逺事直欲陋云云其十二先皇潛邸日奉命謁陵園昔感無聲孝今歆有道孫職方修備物率土荷隆恩自此移風俗誰能外水源其十三更敉功宗事惇崇逮下寛䇿勲盟帶礪開國際艱難褒鄂森毛髪伊萊儼佩冠一從邀錫類感激動千官其十四星旂臨肅慎父老拜龍顔暖氣廻青女恩光上翠鬟盛傳天子幸樂似主人還譜出迎鑾曲輿情極仰攀其十五作賦抒宸藻鴻濛赴筆先所慿長在徳所寳亦惟賢殷室書傳亳周家史載瀍瑶編真邁古慚愧鄭毛箋其十六升中尊法座清漏曉趨朝侍從仍隨豹嫖姚盡珥貂官儀依舊蕞世徳奏新箾仰見罘罳外祥光靄慶霄其十七在鎬君臣樂歡聲或載呶蓼蕭天上露燔炙大官庖忠告聮賔禮昇平重㤗交陪京朝㑹地磐石鞏桑苞其十八濵海東藩國由來凛食毛同仁明詔下邀福使臣叨日近無私照天髙有覆幬鴨頭江水緑遍灑作恩膏其十九庶事親裁决黄封日捆䭾早傳行帳裏猶問夜如何俗阜雞豚接年豐秉穗多幾餘逰泮奐歌詠矢卷阿其二十恩從崇政下糺縵有光華塞草知生意春風長道芽雞竿迎赤縣鳳詔拜黄麻遼水沙河路懽騰十萬家其二十一慶賜循周令今開内府藏水衡司後乗文綺拜承筐豐沛多新賚南陽是故鄉願留十日駐牛酒㑹千塲其二十二翠輦經過處蠲租并薄征非邀路旁譽為勸野人耕白屋鳩先喚黄昏犬不驚康衢歌帝力能感未能名其二十三下令修軍禮熊羆走駭霆八宫師后陣兩翼法羲經武庫光凝紫兵韜氣結青承平有如此萬里靖王庭其二十四春色來天上恩波遍大凌虎賁齎白鏹台背被紅綾振谷歡聲動投醪勇氣騰賞兵還餉老徳意况頻仍其二十五矍相曽觀徳騶虞上射侯應弦當月滿屬羽正髙秋七札心皆貫三聮勢可收多能真聖武俛首伏諸酋其二十六背構思前業當年燕翼深茅茨承祖制黄屋豈堯心君徳修思永民時授必欽家傳十六字紹述匪斯今其二十七瑞符長在握玉檢不湏探布濩春膏浹從容要道叅健行惟用九郅運自登三茀禄膺天眷昭融樂既湛其二十八皇仁同怙冐舉念及窮檐雪色寒初近舂聲夜更添葭應飛玉琯星已燭鈎鈐天文書王者孝則鈎鈐明望幸依升日都人盡仰瞻其二十九鐵驪囘輦路平掌少嶄嵌日影金根耀嵐光綵仗銜慶成旋玉闕紀盛溢琅函萬國歡心合敷天感至誠其三十恭和御製展謁永陵元韻癸亥張鵬冲造國豳岐似艱難翼后昆雲礽瓜始瓞川祭水先源永奠興京宅髙居列宿垣神孫揚祖烈輝映鳳皇原恭和御製展謁福陵元韻癸亥張鵬翀奮跡掃羣雄環封拓海東英靈符沛上大業定闗中珠阜凝休逺閶風展祀崇神堯興一旅於爍啟天𠂻恭和御製展謁昭陵元韻癸亥張鵬翀斷蛇初起漢逐鹿不闗秦指顧摧三蘖成功易五旬葛燈風尚樸石馬汗如新嗣徳光先烈如聞帝命申恭和御製堪逹漢元韻甲戌劉綸垂胡姿自軼竪鬛態何頎利用思鈎控稱名利佽飛堪逹漢獸名角中韘材蒐田推物性山澤任天機末學慚麞誤奎文為訂非恭和御製射羆元韻甲戌劉綸深叢果孤見作氣徧中黄洞腋驚先中専車載後行周彲占並叶晋犬跡徒蹌示武規麟楦留皮古語常恭和御製射熊元韻甲戌劉綸非羆材更趫入彀應牙璋已識宜男瑞兼符獲左祥分鮮知欲掌擇肉肯遺肪失勢摧縁木聲騰虎士行恭和御製重陽日上恭侍皇太后宴元韻甲戌劉綸萱闈稱萬壽菊醆紀三行撫序宜髙位觀風况上京花香披帳暖山色擁闗晴壺嶠知真境東來即大瀛恭和御製恭賦太宗文皇帝所製鹿角椅元韻甲戌劉綸程材由得鹿示樸勝交龍重合文茵藉威宜虎帳供螭盤殊曲录麈掛稱丰茸箴座鐫題就瞻依復訓恭恭和御製射羆元韻甲戌汪由敦渭璜占有兆韓奕詠維黄猛試威弧力呼騰獵士行深林孤乍見逺塞走徒蹌重合専車載圍觀詫異常恭和御製射熊元韻甲戌汪由敦涖衆前敷席宜男載弄璋身當雄漢殿占夢兆周祥中比侯穿札批來玉截肪留皮傳武庫熊羆皮皆紀其嵗月留貯内庫聖射震顔行恭和御製恭賦太宗文皇帝所製鹿角椅元韻甲戌金徳瑛山間藏瑞鹿年久説班龍曽作僊人馭還為御坐供分岐同陛衛鋪褥藉䝉茸創守躬兼日安舒亦恪恭聖駕東巡恭謁祖陵禮成恭紀甲戌于敏中光啟帝圖雄扶桑萬國東省邦天作配撫序日方中締搆思王業勤勞紹祖功十年誠再展肸蠁契昭融其一玉琯調端午金根奉九重清塵槐雨淨迎輦麥雲濃既以承愉悦因之慰敬恭山莊頻駐蹕佳氣䕶錘峯其二此地宜銷夏兹來更受降欵闗歸聖化舞羽格蠻邦蛾伏三呼合鯨鏗萬石撞龍光聫鼎句天筆力全扛其三風静延薫館波明夾鏡池林巒聊寓意宵旰每經時述職來羣牧更畨體庶司幾餘瞻聖蹟舊景入新詩其四東顧程方始秋行暑漸微乘時勤法駕延爽御征衣頴栗山田稔騰驤塞草肥還將歡慶意朝夕報慈闈其五榆塞沿岡逈龍沙按轡徐建藩安部落拱極奉車書馬酪葵忱逹旃裘膜拜舒星羅四十八次第迓鑾輿其六蕃俗土風殊時巡一再諏灰痕傳古簡竿力縶生駒晴雨紛查逹提携滿庫奴大鈞能肖物厯厯與形摹其七吉林鍾王氣天造此端倪陶復生民始來蘇我后徯流風存太古為徳徧羣黎仰止髙山在彌殷聖敬躋其八極天長白峻山氣鬱蔥佳龍虎形同壯風雲勢可排八岐駢瑞樹五葉茁靈荄磐石皇基鞏精誠洽望柴其九雲漢溯源來江流萬頃開朝宗瀍澗合沐浴日星廻珍味繁鱗族珠光育蚌胎混同涵一氣靈脉是滋培其十地以川原厚風仍沮漆淳威呼利刳木法喇仿椎輪酒孰施函羙羹和賽斐珍霞綳光耀處天藻豁山新其十一江郭淨塵氛秋髙簡六軍氣雄貔虎旅陣肅鸛鵞羣神武能揚烈騰驍信習勤乾行隨解澤鏐綺沛如雲其十二何處奉堯尊如山壽可論萬年純嘏祝三日大酺恩有喜開行殿承歡拜寢門邠岐遥在望雲物靄絪緼其十三古牒留輝發經過一駐鑾廓圖張撻伐創業識艱難王者師全勝誰歟䑕兩端貽謀昭奕禩纘武不遑安其十四罘野復阹山霜晴獵騎嫻熊羆穿壹發盧鵲縱重鐶厲勇馳驅㨗量禽阬谷殷割鮮調饍後歡洽大庖頒其十五和㑹龍興地丕基兆萬年大風欣再詠皇澗遡初遷翽鳳椅桐盛振麟瓜瓞綿巘原皆帝作陟降倍乾乾其十六鐡背峰前路當年大業昭揮戈提一旅㧞幟定崇朝魚鳥圖堪指沙蟲跡已銷橋山弓劍在計日奠芳椒其十七寢園稽古制啟運肇天苞亶父周追王髙辛夏配郊由來鬱松栢復此薦陶瓠四祖歆慿式蕭薌合漠交其十八天柱戴瀛鰲山陵拱衛髙松雲靈爽赫草昧肇基勞帝眷歸圖䜟神功靖鉞旄永清垂大統霜露感焄蒿其十九文祖光同覲昭陵肅再過英風騰石馬王迹凜霜戈惟聖東方仰其昌百世多禮成還在鎬手澤重摩挲其二十慶善重巡幸都人望翠華三韓好風日萬井樂桑麻忠愛情逾切敦龎俗可嘉近瞻堂構永繼述念承家其二十一建中朝萬國崇政啟明堂復過枌榆里都依日月光雍容文徳盛赫濯武功揚海外占風至陪臣附享王其二十二朝㑹循嘉禮開筵燕舊京南陽留帳飲沛上發歌聲魚藻同居樂瓠尊儉徳程孝思孰錫類彌切故鄉情其二十三念此皤皤叟當時鬢尚青星霜纔十度車駕又重經大帛榮耆齒天糈養耄齡引年膏澤沃擊壤倍康寧其二十四百職幸趋承酬庸念夙興鵷班看喜溢螭陛更歡騰澤浦醍醐飫恩深雨露凝微勞邀厚遇誰不凛氷兢其二十五十行恩詔下東國感恩稠白粲除新舊金雞及放流有田皆樂土比户搃懽謳望幸情仍慰依然昔豫逰其二十六宗臣勲舊著賢佐撫懷深百戰勤勞力同時夾輔心河山盟自昔爼豆列於今周召風雲際千秋荷徳音其二十七先皇遺澤逺舊里沛恩覃古處今猶在淳風夙所諳太平安樂利元氣貴包涵珍重天家訓殷勤勝指南其二十八發祥邰室永錫福洛疇兼嘉宴歡頻待安輿吉再占山楓鳴鳳葢海旭麗龍幨旋蹕重闗近東來嘉氣添其二十九禋祀抒仁孝馨香格至諴作求四海賀有慶兆民咸良月春生殿豳風繪滿函載逢明備舉歌詠勉成緘其三十恭和御製恭謁永陵原韻戊戌和珅天作發祥地生民溯厥初謁陵聖孝展追逺至誠餘神樹龍枝挺靈山寳胍舒丕基千萬􅑤肇此日升如恭和御製恭謁福陵元韻戊戌和珅皇圖基萬載祖徳及無邊受福陵名福承天號奉天聿來胥宇地荒是大東年展謁三巡志詒謀荷一肩恭和御製恭謁昭陵元韻和珅宅兆神宗卜三來有孝孫瀋遼環水秀西北望陵尊靈引千山胍明開百丈原至今傳石馬功烈萬年存恭和御製恭謁永陵原韻戊戌梁國治曰若書稽古乾元易畫初開基四聖逺鍾慶累朝餘川嶽交融結雲霞念卷舒思文推立極申頌昊天如恭和御製恭謁福陵元韻戊戌梁國治九五飛龍御規方首拓邊經綸開古帝陟降仰中天牧野臨戎日周京定鼎年永言懐締構上下一心肩恭和御製恭謁昭陵元韻戊戌梁國治功髙兼徳盛䋲武念詒孫於鑠光前烈維新定一尊闗河恢禹蹟堂構遡周原王氣千山接天聲萬古存恭和御製仍駐蹕沙河所元韻戊戌謝墉細雨留清蹕凉風敞燕居欽天從畢月察地利旗輿佳境蒼葮宛陳編落葉除文思隨茂對豈必緑蕉書恭讀甲戌必御制紀事詩有題詩何芭蕉緑楓葉通紅亦可書之句恭和御製錦州道上恭依皇祖詩韻戊戌謝墉松山杏山路武烈薄青㝠在昔降因壘於今拱樹屏戰塲嘉種被潦水野航停敬溯蕃昌績斯臧肇在坰恭和御製恭謁永陵元韻戊戌謝墉雲礽推以上髙亞溯其初鳦降祥長發瓜綿慶有餘省山王氣毓卜兆帝圖舒佑啟同追逺見聞僾愾如恭和御製恭謁福陵元韻戊戌謝墉赫怒告三后勃興威九邊祖功陵錫福山勢柱擎天寳鼎昇雲馭珠丘啟鳳年敬瞻長發地家慶一心肩恭和御製恭謁昭陵元韻戊戌謝墉無疆開寳祚有秩奉神孫建國大勲集配天鴻號尊輿情戴商邑聖武拓周原至徳崇姬籙顯承永念存恭和御製仍駐沙河所元韻戊戌錢汝誠屏翳清衢路勾陳肅帝居下情通扈從俯體駐鑾輿顥宇俄晶朗纎雲盡掃除紫機餘課靜摛藻更臨書觀書上每於行幄機餘染翰無片晷閒恭和御製錦州道上恭依皇祖詩韻戊戌錢汝誠雄城臨錦水城西有錦水州即以此得名列嶂接青冥中左空勞築明宣宗時於大凌河側增置中左千户所與錦州為犄角松山已失屏吏太宗既破明兵於松山錦州將久困祖大壽戰守乏䇿始乞降計窮降將下壘斷戌烟停欲問當年事蒼茫野外坰欽定盛京通志卷一百二十二
