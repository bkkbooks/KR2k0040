front:
  text: 欽定四庫全書欽定盛京通志巻二十二
  hash: sha256:faf4d6f8d0f3823cb8e10c2ff22fbeed89ba06e79256a35386938330be11fe8c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0040_WYG_026-1a, image: WYG0501/WYG0501-0362a.png}
body:
  text: 星土尾箕分野圖躔次分野宿度長短星宿宫位釋義其尾形數分星外占欽定四庫全書欽定盛京通志巻二十二星土臣等謹案分野之説自古有之推星定度經緯昭然至若五辰聚東井興漢氏之炎靈三星見攝提王軒轅之土徳瑞符凝命於此徵焉我國家受籙膺圖璣衡在握天命既集象緯告祥箕尾之躔寅賓日出福徳所鍾也臣等謹詳稽疆域博採羣書凡夫躔次分野星宿宫位以及箕尾形數分星考驗並録於篇列為星土第八欽定四庫全書欽定盛京通志巻二十二星土禮記月令孟冬之月日在尾註孟冬者日月㑹於析木之津而斗建亥之辰也周禮總義析木燕之分星幽州之星土也春秋元命苞箕星散為幽州分為燕國帝王世紀黄帝始推分星次以定律度自尾十度至斗七度百三十五分而終曰析木之次於辰在寅謂之攝提格於律為應鐘斗建在亥今燕分野漢書地理志燕地尾箕之分野也自尾四度至斗六度謂之析木之次燕之分也漢書律厯志析木初尾十度立冬中箕七度小雪終於斗十一度晉書天文志班固取三統厯配十二野其言最詳自尾十度至南斗十一度為析木於辰在寅燕之分野屬幽州又陳卓范蠡鬼谷先生張良諸葛亮譙周京房張衡並云尾箕燕幽州入箕中十度遼東西入尾十度渤海入箕一度樂浪入箕三度元莵入箕六度廣陽入箕九度唐書天文志尾九星十八度舊去極一百二十度一云一百四十一度今一百二十四度箕四星十度舊去極一百一十八度今一百二十度又河北道古幽冀二州之域為娵訾大梁析木津分析木為雲漢末派山河極焉故其分野自北河窮北紀之曲東北負海為析木尾箕析木津也初尾七度中箕五度終南斗八度自渤海九河之北得廣陽遼西東樂浪元莵古北燕孤竹無終九夷諸國尾得雲漢之末流龜魚麗焉當九河之下流濵於渤碣皆北紀之所窮也箕與南斗相近為遼水之陽盡朝鮮三韓之地五代史尾十八度箕十一度宋史天文志東方尾宿九星按漢永元銅儀尾宿十八度唐開元㳺儀同舊去極百二十度一云百四十度今百二十四度景祐測驗亦十八度距西行從西第二星去極百二十八度在赤道外二十二度乾象新書二十七度箕宿四星按漢永元銅儀箕宿十度唐開元㳺儀十一度舊去極百八十度今百二十度景祐測驗箕四星十度距西北第一星去極百二十三度宋史律厯志赤道宿度尾十八箕十一黄道宿度尾十七箕十元史厯志赤道宿度尾十九少箕十半黄道宿度尾十八少箕九半又黄道十二次宿度尾三度九十七分七十二杪外入燕分析木之次辰在寅淮南子星分度尾十八箕一十四分一玊海陳卓謂尾箕燕幽也自尾十至南斗十一費直謂起尾九蔡邕謂起尾四古今律厯考尾漢太初厯所測十八度宋皇祐所測十九度元授時厯所測十九度箕太初厯所測十一度皇祐所測十度元豐所測十一度授時所測十度四十分厯象考成尾宿一黄道經度十一宫一十度五十四分黄道緯度南一十五度等四箕宿一黄道經度十一宫二十六度五十分黄道緯度南六度五十六分等三又尾宿一赤道經度十一宫六度四十二分赤道緯度南三十六度五十七分箕宿一赤道經度十一宫二十六度二十一分赤道緯度南三十度二十三分明清類天文分野書以斗牛為星分之首次苐配之尾三度至斗二度屬燕分幽州北平府尾箕分析木之次涿通二州皆尾分霸州尾箕分薊州尾分保定府尾箕分昜安二州皆尾分河間府景州皆尾箕分永平府尾分灤州箕尾分遼東都指揮司尾箕分廣寜大寜尾分興中尾分建州義州錦州皆尾分朝鮮箕分陳藻樂軒集星度分野十二次東西南北相反者四疑似者七所可據者其維析木乎其宿尾箕亦艮之維燕可以言東北也以上紀躔次分野所屬及宿度短長爾雅析木謂之津箕斗之間漢津也䟽云析木之津箕斗之次名也析别水木以箕斗之間是天漢之津也天漢即天河也天河在箕斗二星之間箕在東方木位斗在北方水位分析水木以箕星為隔隔河須津梁以渡故謂此次為析木之津也不言析水而言析木者此次自南而盡北故依此次而言析木也箕龍尾斗南斗天漢之津梁四方皆有七宿各成一形東方成龍形西方成虎形皆南首而北尾南方成鳥形北方成龜形皆西首而東尾箕在蒼龍之末故云龍尾斗至南方即見故云南斗左傳昭八年今在析木之津國語日在析木之津是也詩正義按二十八宿連四方為名者惟箕斗井壁四星而已壁者室之外院箕在南則壁在室東故稱東壁鄭稱參傍有玉井則井星在參東故稱東井推此則箕斗並在南方之時箕在南而斗在北故云南箕北斗也史記天官書東宫尾為九子箕為赦客宋均曰子必九者取尾有九星也正義曰箕主八風索隠曰箕以播陽調弄為象遼史國語觧野旅寅野謂星野旅謂躔次寅者辰舎東方之位燕分析津之所也通志天漢歌天河亦一名天漢起自東方箕尾間註天漢起東方經箕尾之間謂之天河亦謂之漢津乃分為二道其北經龜貫箕下厯代地理指掌圖尾箕星曰析木宫曰人馬時曰寅州曰幽以上紀星宿宫位所在及釋名義史記索隠宋均云尾屬後宫塲故得兼子子必九者取尾有九星也元命苞云尾九星箕四星為後宫之塲也星經蒼龍七宿有尾有箕氐胸房腹箕所糞也中西星經同異考西歌曰接心是尾九㸃曲卓如衣角飄風前箕星有四明相等大口如箕正向西文殊所説善惡宿曜經苐五尾四足箕四足斗一足在寅歳星位焉其神如弓故曰人馬宫丹元子歩天歌尾九星如鈎蒼龍尾下頭五㸃號龜星尾上天江四横是尾東一個名傅説傅説東畔一魚子尾西一室是神宫所以列在后妃中箕四星形狀如簸箕箕下三星名木杵箕前一㸃是糠粃註云龜五星在尾南天江四星在尾之北傅説一星在尾後江東魚一星在尾後江中箕一曰天雞杵臼三星在箕南糠一星在箕口前杵臼西北法苑珠林尾七星形如蝎尾箕四星形如牛角以上紀箕尾形數周禮保章氏以星土辨九州之地所封封域皆有分星以觀妖祥注云析木燕也此分野之妖祥主用客星彗孛之氣為象䟽引春秋緯文耀鉤云太行以東至碣石王屋砥柱冀州屬樞星三河雷澤東至海岱以北兗州青州屬機星九州屬北斗星有七州有九兗青徐揚并屬二州故七星主九州也周之九州差之義亦可知云史記天官書天則有列宿地則有州域二十八舎主十二州燕齊之疆候在辰星占於虛又玊衡第八星主幽州常以五寅日候之晉書天文志九州十二域或係之北斗或係之二十八宿或係之五星析木燕此係之二十八宿者也辰星主燕趙代此係之五星者也隋書天文志二十八宿之外凡齊楚晉燕趙列國皆有星燕冀一星在楚南星有變各以其國石氏星經北斗七星一主秦二主楚三主梁四主吳五主燕六主趙七主齊劉熈釋名古有營州於天文屬營室取其名也按凡言天者其占必以所屬之分星為主自春秋以來列史所記詳矣遼與燕同分必候尾箕二宿然觀司馬氏及甘石諸家所云則又不獨當占驗箕尾也又考蔡邕月令章句自尾四度至斗六度謂之析木之次則并當占其南斗或曰遼故堯時青州之域故兼於虚危存之以備説云以上推分星之外諸占欽定盛京通志巻二十二
