body:
  text: 國朝人物九鑲黃旗滿洲欽定四庫全書欽定盛京通志卷七十三國朝人物九鑲紅旗滿洲博爾晉世居完顔以地為氏太祖時來歸任佐領𨽻鑲紅旗滿洲尋以侍衛從征富勒嘉齊挾族弟錫喇布與哈達錫特庫戰錫喇布中兩矢博爾晉拔其矢還射錫特庫殪之天命六年命董築薩爾滸城工竣從大軍攻瀋陽擊敗明總兵賀世賢陳䇿軍既下其城進攻遼陽明總兵李懷信侯世祿蔡國柱姜弼童仲揆等率衆五萬陳于城東南五里與我左翼兵戰方酣城中兵復自西門出援博爾晉方偵敵城西遂合兩紅旗兵奮擊明兵退入城爭門相蹂踐死者枕籍及左翼兵大捷乘勝薄城下緣雲梯登城博爾晉麾衆畢登又下之分兵攻沙嶺擊敗廣寧援軍八年以參領征扎嚕特貝勒昂安進兵額爾格埒搗其巢昂安挽牛車挈妻子遁追及之昂安殊死戰格殺之車下俘獲甚衆凱旋十年擢副都統東征瑚爾哈部降五百户以歸太祖勞之渾河尋與理事十大臣之列太宗即位擢都統天聰元年大軍圍錦州距城西二里而營明寧逺兵來援㑹博爾晉自瀋陽率兵至擊敗之追殱之寧逺城下纍功授一等男爵尋卒康熙三年追諡忠直長子夲托輝官佐領兼都察院理事官苐四子特津以戰績知名天聰中授騎都尉崇德五年從鄭親王濟爾哈朗屯田義州多羅特部䝉古素班岱來歸以兵迎其孥于杏山西五里臺明總兵祖大壽吳三桂劉周智踞杏山邀戰擊敗之六年從圍松山攻寧逺並有功順治元年從入關以步卒敗李自成于望都明年任兵部理事官三年從肅親王豪格西征張獻忠敗賊將胡敬德于三水髙汝礪于禮縣進𠞰獻忠于西充平之又敗其黨楊正于馬湖六年大同總兵姜瓖以衛城叛由絳州侵及夀陽特津率兵往𠞰斬級千餘連敗之阻馬得勝二路移師次汾州賊七千夜犯兩紅旗營特津擊走之遂𠞰賊于平遙遼州榆社次第就平七年擢兵部侍郎兼副都統十二年再擢都統列議政大臣十五年從信郡王多尼平貴州雲南前後敘功洊晉爵至二等男康熙十一年卒豫祭葬諡襄壯哈哈納姓那木都魯𨽻鑲紅旗滿洲太祖時以佐領從征烏拉身中數創猶力戰尋將所部兵戍賽明吉未至聞其渠率衆叛兼程疾進斬三百餘級收男婦五百餘人而還天命四年經略楊鎬合四路兵來犯戰於界藩尚間崖及阿布達哩岡大破之遂取開原鐵嶺二城哈哈納俱在事有功從征遼陽斷其援兵分攻沙嶺城敗廣寧兵之赴救者太宗即位列十六大臣任副都統天聰八年略錦州進征寧逺所乘馬仆於陳徒步戰益力不少卻修繕海州城明人來撓我版築擊走之尋援耀州釋其圍追敗明兵于渾河崇德元年從入長城攻克昌平涿州二城未幾以創發致仕布顔岱姓博爾濟吉特初為烏魯特貝子天命中率所部自錫拉塔喇來歸尚主為額駙豫二等輕車都尉世職𨽻滿洲鑲紅旗十一年從攻寧逺未下分兵取覺華島殱其衆焚所積芻糧而還天聰元年從征朝鮮三年從入龍井關克大安口取遵化薄燕京四戰皆捷循海子而南趨良鄉下其城還軍至盧溝橋明副將申甫結車營以拒布顔岱麾七騎直前蹂其營大軍繞營後縱擊之御車者惶懼不能轉殱戮殆盡明年春移駐遵化屢卻敵五年授禮部承政兼副都統從圍大凌河城明兵出城戰身被創戰益厲陳斬其驍將一人六年從略宣府大同西抵察哈爾招降其部衆時察哈爾汗林丹竄走土默特其部衆多潰散八年偕侍衛星訥等復往招之取道哈瑪爾嶺進次錫喇穆倫降其户百餘其宰桑方率衆來歸遇諸道遂攜以還是年敘功晉爵三等男九年擢都統崇德元年從武英郡王阿濟格征明克昌平安州等城既凱旋坐旋軍不整並縱其軍校出掠罷都統降世職為一等輕車都尉順治元年復為前鋒參領從入關敗流賊李自成再敗之望都從豫親王多鐸擊賊潼關並有功明年加一雲騎尉四月從征江南戰于黃河濱所乘馬蹶身中數創猶䇿馬直前發矢殪敵尋以創發卒於軍年六十有一庫爾禪姓鈕祜祿𨽻鑲紅旗滿洲父索塔蘭尚公主為額駙生子四庫爾禪其次子也自幼育於宫禁性頴悟好學比長給事文館兼任為佐領天命四年如喀爾喀五部蒞盟九年使科爾沁部還報稱㫖授騎都尉世職天聰元年征朝鮮其王李悰遁走海島太宗不欲究武遣庫爾禪往諭降之朝鮮讋服立要誓乞輸嵗幣如約三年命同在廷諸臣編緝國史尋從征明薄燕京明年還軍取灤州有功五年朝鮮入貢愆期遣庫爾禪賚諭責悰悰惶恐報謝庫爾禪通習漢文與達海齊名並賜號巴克什屢出奉使能得其要領六年遣諭明邊臣釋兵以休養百姓還報逾期又嘗以百口保降將劉興祚至是興祚叛去庫爾禪下吏論死順治元年世祖追念前勞擢其子瑪拉為户部郎中庫拜庫爾禪之弟也天命三年從取撫順明總兵張承廕以兵來援擊走之六年從取瀋陽遼陽以功授騎都尉世職天聰五年從征瓦爾喀部裹創力戰攻克其一屯尋授吏部參政八年從征黑龍江諸部俘獲無算諭降瑚爾哈部人遷之來歸前後敘功晉世職至二等輕車都尉崇德三年改吏部理事官五年卒巴奇蘭姓納喇𨽻鑲紅旗滿洲少從征伐積功授三等輕車都尉世職天命十一年從攻寧逺未下分兵攻覺華島破之尋與十六大臣之列天聰三年從征明薄燕京戰永定門外大捷七年以步軍統領從攻旅順口與薩穆什喀駕輕舸先進明將黃龍陳兵拒於岸巴奇蘭冒矢石登岸面中創及於肩脅戰益厲龍斂兵退守城我軍進圍之巴奇蘭號於軍曰孰能超躍先登者於是葉赫珠瑪喇永順躍而登巴奇蘭率兵繼之明兵殊死拒城上我兵有欲下者巴奇蘭復號于軍曰殺敵人矣又曰敵走矣我兵益奮而前克其城八年以副都統將兵征瑚爾哈諸部盡收其地俘獲人畜無算凱旋悉以俘獲賜之已而旅順口被創潰遂卒贈爵一等男豫世襲葉臣姓完顔𨽻鑲紅旗滿洲初從太祖敗䝉古兵于鐵嶺遂以驍勇知名天命六年從克遼陽授三等輕車都尉世職太宗即位設理事十六大臣葉臣與焉天聰元年從征朝鮮以八十人先驅過明邊境獲其哨卒殱之既抵朝鮮薄義州城先登進二等輕車都尉尋䝉古降人遁叛葉臣追斬其酋悉縳其從行者以還功最晉爵三等男四年從攻永平城守者方燃炮以拒火未及發葉臣已躍登城遂破之晉三等子五年任都統從攻大凌河明將祖大夀勒兵出戰連敗之城下七年從取旅順八年入明邊徇得勝堡略大同以西至于黃河擊破朔州騎兵崇德元年從征明越燕京而南别將兵克安州寶坻縣是年再征朝鮮入其國都俘獲多二年偕都統阿山攻皮島斬其守將沈世奎敘功晉一等子四年復入明邊道出太平寨克青山關七年駐防錦州順治元年督兵征山西𠞰平僞伯陳永福招降諸將吏撫輯居民山西悉定還軍平定州土賊是役也凡下府九州二十七縣一百四十一二年偕勒克德渾討武昌餘寇平之五年卒永順姓棟鄂𨽻鑲紅旗滿洲先世居瓦爾喀太祖時偕其從兄阿蘭珠來歸阿蘭珠為十大臣之冠從征烏拉殁于陳别見忠節傳永順素英鋭每攻戰輒為軍鋒天聰三年從克遵化明年還軍取永平明兵敗入昌黎以敖漢巴林諸部兵攻其城久不下乃命永順往助之有功授二等輕車都尉豫世襲尋以事革七年從貝勒嶽託以舟師攻旅順口明將黃龍悉力以拒初陳兵拒于崖繼又斂兵拒於城城守具甚備我軍奮勇攻之乃拔及論功先登崖者巴奇蘭薩穆什喀第一先登城者永順葉赫珠瑪喇第一身皆被數創永順自是益名驍將復世職如故八年從征薩哈連烏拉獲丁壯五百以還崇德二年從克皮島四年從征索倫師旋薩哈連烏拉復結烏魯蘇酋博穆博果爾合兵六千邀於路永順與索海設伏擊敗之加一等輕車都尉六年從圍錦州别將兵扼要隘遏其奔潰所斬獲甚衆順治初洊晉爵二等男纍官至都統卒弟喀爾瑚從圍松山城以力戰死亦見忠節傳從子和托事太宗為副都統屢從征伐有功順治元年從定燕京尋率寧逺兵討山東流賊時流賊趙應元者詐降入青州據其城叛和託設計擒斬應元復青州二年敘功授騎都尉世職明年加三等輕車都尉擢吏部侍郎兼副都統如故卒於官康喀勒姓納喇輝發貝勒旺吉努之孫也太祖時來歸𨽻滿洲鑲紅旗授佐領天聰六年從征察哈爾其汗林丹驚竄部人皆流散八年分遣諸臣招降之康喀勒與岱青塔布囊等以兵詣錫爾哈錫伯圖所降甚衆豫騎都尉世職崇德三年兼授刑部理事官五年擢副都統六年從圍錦州松山二城七年二城皆下復從克塔山城順治元年從入關擊流賊李自成以功加雲騎尉尋從豫親王多鐸征江南偕都統準塔先驅抵徐州水陸並進師次清河明總兵劉澤清遣部將馬化豹張思義等以戰艦千餘拒戰淮黃口康喀勒發炮毀其艦河流頓為之赤遂分兵襲澤清澤清遁乘勝下淮安進擊明總漕田仰兵于湖口橋敗步卒三千再敗之三里橋三敗之如臯攻克通州招降其旁近城邑二年授鎮守江寧副都統時江北諸城未靖江寧奸民將作亂謀以城應賊康喀勒偕駐防總管巴山偵知之先期誅倡亂者三十人乃定已而僞潞安王朱誼石引衆二萬餘分三道來犯並擊走之三年敘功晉三等輕車都尉豫世襲四年卒洪尼雅喀姓烏扎庫𨽻鑲紅旗滿洲世居噶哈里幼為烏拉所虜既有家乘間棄妻子脫走故居遂奉父母挈諸弟來歸太祖察其義勇任以佐領天聰初積功為三等輕車都尉豫世襲從功錦州城奮身躋頽堞堞毁而墮傷其足城上矢石雨下其弟薩穆唐阿力衛之出而其弟竟以創重死八年大録開創勳臣晉洪尼雅喀世職為二等輕車都尉尋卒護軍統領薩蘇喀者亦洪尼雅喀弟也太宗時屢從征伐功多順治元年追擊流賊李自成别見忠節傳布善姓伊爾根覺羅𨽻鑲紅旗滿洲事太宗為護軍參領尋擢統領列議政大臣崇德五年從圍錦州擊敗杏山騎兵六年七月明總督洪承疇以兵十三萬來援營松山西北岡與大軍相持兩閲月餉運不繼大宗度敵必遁分遣諸將斷其歸路是夜明兵果遁諸將迭擊之布善窮追至海濱殱敵無算八年從鄭親王濟爾哈朗攻克前屯衛復與阿濟格尼堪攻中前所拔其城順治元年從入關擊敗李自成敘功豫騎都尉世職二年從豫親王多鐸征江南卒於軍賜祭葬如例富喀禪姓那木都魯𨽻鑲紅旗滿洲天聰三年以護軍校從征明敗敵大安口五年從攻大凌河城明監軍參政張春總兵吳襄宋偉來援戰于長山身被數創馬中流矢死裹創步戰戰益力搴其大纛以還八年從攻大同克其城東寨是年任佐領崇德元年從征朝鮮有斬獲三年授工部理事官兼參領從攻寧逺中後所破敵西山岡順治元年從入關擊走流賊李自成三年擢西安總管時流賊劉文炳郭君鎮等寇掠延安慶陽四年富喀禪督兵往𠞰遇賊邠州擊敗之追蹙之三水斬君鎮别遣遊擊胡來覲等擒文炳于藍莊溝殱其黨殆盡五年回人米喇印丁國棟等嘯聚河州作亂富喀禪偕總督孟喬芳撫降之既而國棟米喇印復踞甘州叛結纒頭賊土倫泰等陷肅州富喀禪遣副將馬寧張勇𠞰平國棟身率兵圍米喇印斷其樵採賊既疲以雲梯攻城城破米喇印突圍欲遁躡斬之于陳甘肅悉平六年總兵姜瓖據大同叛連陷山西郡邑富喀禪遣協領根特參領都敏赴援敗賊猗氏擒其黨衛登方七年復遣兵𠞰賊合水斬其渠劉宏才先後報捷得㫖嘉奬屢晉爵至一等男聖祖即位改西安將軍初李自成竄死賊將劉二虎郝搖旗袁宗第皆降于明大學士何騰蛟騰蛟就擒二虎等復聚匿歸州興山間康熙二年富喀禪與總督李國英副都統都敏等進兵巫山擊二虎等于陳家坡二虎敗走天池寨窮蹙自經死搖旗宗第走黃草坪追擒之並獲僞東安王朱宗蒗僞官洪育鰲等斬于軍敘功晉三等子七年以疾致仕八年卒年六十有三賜祭葬如例瑪喇希姓完顔𨽻鑲紅旗滿洲錫喇布次子也錫喇布事太祖為理事十大臣嵗癸巳戰于富勒嘉齊中兩矢殁事見忠節傳太祖追恤錫喇布蔭其長子噶嚕為三等輕車都尉噶嚕從征沙嶺以功晉世職為二等輕車都尉尋卒無嗣天聰九年太宗録功臣子以瑪喇希為佐領並襲其兄職崇德中從征卦勒察有功任刑部理事官擢副都統再擢都統從貝勒阿巴泰征明奪黃崖口入長城所至克捷順治元年從破流賊李自成追敗之望都偕都統阿山征山西陜西濟蒲津擊賊多所斬獲移師㑹豫親王多鐸南征明年自歸德渡河奪泗北淮河橋明兵焚橋遁大軍遂夜涉抵武岡寨攻拔之引兵而東擊敗明總兵黃蜚等于常州下宜興進攻崑山破其水軍薄城下乘頽堞先登遂克之又克常熟四年從肅親王豪格西征敗叛將賀珍于漢中珍走西鄉躡及于楚湖復大敗之前後纍晉爵至三等子九年偕護軍統領阿爾津平定廣東移鎮漢中尋以所部兵征湖廣並有功十一年卒賜祭葬諡忠僖瑪沁姓完顔𨽻鑲紅旗滿洲都統博爾晉之孫也初為護軍校洊擢護軍參領崇德三年從貝勒嶽託入牆子嶺敗明總督吳阿衡軍六年從圍錦州戰松山皆有功順治元年從定燕京敗流賊李自成于望都授騎都尉世職五年擢副都統七年遇恩詔加一雲騎尉是年從鄭親王濟爾哈朗征湖廣軍次衡州疾卒賜祭葬瓦爾喀姓完顔𨽻鑲紅旗滿洲天聰時任前鋒校每臨陳輒奮爭先中創不少卻屢得恩賚崇德三年從貝勒嶽託入牆子嶺越燕京趨山東攻海豐縣先登七年從貝勒阿巴泰入黃崖口轉戰至山東攻范縣以長鎗鑿垣為磴緣以登城克之順治三年從肅親王豪格𠞰流賊張獻忠于四川屢擊敗賊斬級二十餘生擒哨騎十人有護軍阿納海者陷于陳攢刃將及瓦爾喀馳騎罙前格殺二人援以出五年從副都統烏拉禪駐防大名𠞰土賊于祁州於臨洺關並多斬獲洊晉三等輕車都尉世職九年授工部理事官十三年董修乾清宫成十五年奉先殿成再晉一等輕車都尉十六年署前鋒參領從都統卓洛駐防雲南元江土司那嵩據城叛攻克之康熙元年還京授參領五年遷西安副都統七年擢西安將軍十二年冬吳三桂反四川巡撫羅森提督鄭蛟鱗總兵談洪吳之茂等並叛附三桂十三年瓦爾喀率所部馳赴漢中分三路疾進擊談洪兵于野狐嶺並發其伏殱之乘勝趨陽平關復之連復七盤朝天二關先後擒斬賊萬餘獲旗幟器械無算進攻保寧鑿濠塹而圍之相持久未下尋卒于軍十六年議政大臣等追論瓦爾喀圍保寧時不乘賊未備疾攻乃奪原官削其世職徹爾布都統葉臣長子也初任參領崇德六年從攻錦州設伏髙橋敗明兵之遁自杏山者尋擢護軍統領順治元年從入關擊敗流賊李自成追擊之安肅望都皆捷是年冬大軍分兩道𠞰自成于陜西一軍自河南入潼關以豫親王多鐸領之一軍自土默特鄂爾多斯入榆林以英親王阿濟格領之徹爾布從英親王出邊鑿黃河氷濟師明年進圍延安大破賊賊遁走湖廣躡至安陸賊將渡江而南橫擊之獲其船八十復敗其騎兵於九宫山凱旋進列議政大臣三年西征張獻忠與貝勒尼堪等分徇遵義夔州斬獲甚多六年討大同叛鎮姜瓖圍其城賊黨自阻馬得勝二路來援倚北山而軍以逼我師瓖率衆出城應之列營拒戰勢張甚護軍統領鰲拜縱兵奮擊破其一營徹爾布麾所部繼進殱之城下十二年偕大將軍伊勒德征海賊于浙江先是明魯王朱以海與僞侯阮進等據舟山大軍𠞰之進就擒僞伯阮思等奉以海遁尋依鄭成功於兩島及是以海既前死成功稱明桂王僞號剽掠海上遣思及僞總制陳六御等犯舟山陷之而僞總兵王長樹毛光祚沈爾序等復竊發大嵐山以為之援浙東大擾十三年師至浙先檄兵擊大嵐賊陳斬長樹光祚爾序於南斗門遂以舟師自寧波趨定海賊以戈船二百迎戰擊敗之追至衡水洋斬思及六御擒僞總兵林德等百餘人遂定舟山十四年班師先後遇恩詔並論戰功晉爵至一等伯兼一雲騎尉十五年與將軍明安達哩駐防貴州明年移駐荆州聞成功寇江寧自荆州赴援敗僞都督楊文英於楊子江港口十七年還京十八年遷都統康熙三年以疾罷七年卒豫祭葬如例弟徹楞以戰功授三等輕車都尉察哈泰姓薩克達𨽻鑲紅旗滿洲天聰時以護軍纍從征伐積功授驍騎校視佐領事崇德元年從征朝鮮先驅敗敵于納穆山三年從貝勒兵託征明越燕京趨山東攻克濟南府城六年從圍錦州敗明總督洪承疇援兵于松山八年從取前屯衛中後所二城順治元年從豫親王多鐸進兵河南𠞰李自成于陜西大破之潼關遂定西安二年從貝勒博洛征福建五年從大將軍談泰討叛鎮金聲桓于江西聲桓遣其黨拒戰擊敗之焚其戰艦進圍南昌屢戰皆捷下其城六年從護軍統領敦拜𠞰獻縣任邱諸土賊盡殱之擢户部理事官尋改太僕寺理事官纍加世職至三等輕車都尉十四年授參領兼太僕寺卿十六年擢副都統十七年偕寧古塔總管巴海征俄羅斯敗其衆于江隈招降費雅喀百二十餘户而還十八年追論俄羅斯之役舟師有失利者匿不以聞遂革世職罷副都統專任佐領事尋從靖東將軍濟什哈征山東土賊于七破其黨吕思曲俞三等數千人進圍岠嵎山搗平賊巢康熙三年復授副都統十二年遷護軍統領加太子少保十三年授鎮東將軍駐防兖州十四年以所部兵赴荆州協𠞰逆藩吳三桂十五年卒于軍賜祭葬如例羅璧勞薩弟也勞薩見忠節傳羅璧初任佐領於新城遇明將毛文龍採參船斬馘甚衆並毁其船崇德五年從征明圍錦州擊松山兵敗之六年復圍錦州松山明兵來劫我巨炮擊卻之時有明兵出城樵採羅璧領纛直前復敗之旋設伏木城破其馬軍明經略洪承疇以三營兵來戰領纛敗其衆身受八傷戰彌厲七年敘功授佐領世職順治元年隨征流賊追至慶都敗之二年追敗流賊于延安招撫鳯翔等處連破賊營嗣三遇恩詔加一等輕車都尉世職十二年兄子呈尼陳殁以羅璧襲一等伯兼一雲騎尉又併已所得世職為二等公呈尼亦見忠節傳布爾蓀都統葉臣族孫也崇德七年從圍錦州破明經略洪承疇軍追至筆架山塔山嶺連戰皆捷俘馘無算尋復屢敗明兵于杏山塔山連山寧逺沙河等處順治元年入關敗賊將唐通兵追至安肅慶都連敗之敘功授佐領世職從弟泰什哈崇德元年從征明攻保定先登積功於順治初加三等輕車都尉世職歷官副都統珊延庫拜子也崇德八年從征明攻前屯衛有功順治元年擊敗流賊于山海關追破之加二等男世職官副都統族弟哈爾薩於崇德三年從征明至山東攻克海豐六年從圍錦州誘敗明松山兵復松山北山明兵來犯我汛地擊卻之八年從征薩哈連烏拉圍其城斷其汲道招降之順治初加佐領世職岱祿哈哈納子也初任佐領崇德八年從征明連敗明兵于薊州玉田等處及攻河間先登至山東攻滕縣曹縣皆先登賚銀幣名馬順治初從征福建浙江康熙時從征西安平涼秦州保寧皆身先進戰有功珠希齊瓦爾喀族子也天聰八年授三等參領世職從征察哈爾朝鮮及山東濟南山西大同等處皆有功崇德八年隨征明攻永平被創落齒順治三年隨追騰吉思擊土謝圖汗等俱敗之俘獲無算嗣三遇恩詔加一等輕車都尉又一雲騎尉世職訥濟蘭𨽻鑲紅旗滿洲世居長白山國初自烏拉來歸攻理發伊罕山等處有功授備禦天命四年從攻葉赫進戰有功加遊擊世職喜福𨽻鑲紅旗滿洲隨其父葉古德來歸初任兵部理事官隨征薩哈連烏拉有招撫及俘獲功順治三年從征山西敗賊于寧武左衛至四川賊渠賀珍方圍漢中擊走之五年考績並遇恩詔加三等輕車都尉世職及卒晉贈二等子科爾昆襲喀爾岱𨽻鑲紅旗滿洲國初來歸令管佐領事天聰八年從征瓦爾喀有招撫功及卒子穆爾泰襲職順治二年隨征陜西山西潞安肅州屢立軍功查哈泰穆爾泰弟也初隨征棟奎及攻明永平大同大凌河等處皆有功天聰元年從征朝鮮圍納穆山奮勇先驅崇德六年攻塔山克之八年攻前屯衛中後所復有功追破流賊于潼關二年從征福建有功加佐領世職五年征江西叛鎮金聲桓五戰皆捷六年𠞰河間土寇屢敗之保定任邱雄縣加世職三等輕車都尉任太僕寺卿兼副都統緣事罷為佐領十八年征山東土賊于七敗之凱旋仍擢副都統康熙十三年擢護軍統領加太子少保統軍討逆藩吳三桂耿精忠恩賚有加改鎮東將軍鎮兖州明年征湖廣十五年卒於軍賜祭葬如例和托姓納喇𨽻鑲紅旗滿洲崇德二年隨征明擊豐潤縣兵敗之攻深州博平皆先登四年隨征薩哈連烏拉伏兵擊敗之加世職佐領任兵部理事官五年七年隨圍錦州皆屢著有戰功八年擊敗明寧逺兵順治元年入關破流賊追至慶都大敗之纍加世職一等參領兼一雲騎尉子和布索襲勞翰𨽻鑲紅旗滿洲少事太祖每行軍隨侍不離左右會有敵兵猝犯大營勞翰奪其刃傷四指遂成殘廢然居恆常宿衛終其身效力勤勞順治十一年追贈騎都尉以其孫額素承襲愛圖𨽻鑲紅旗滿洲世居尼瑪察以地為姓性驍勇果敢曾率二十人襲取十三站寨授備禦世職賜號巴圖魯天聰元年從攻朝鮮義州首先衝入遂克其城敘功加世職為三等參領子艾達漢崇德元年從征朝鮮臂傷不能從軍順治初授一等輕車都尉兼一雲騎尉剛吉納姓錫克特哩𨽻鑲紅旗滿洲天聰五年從征明大凌河連擊監軍道張春軍時我兵未進剛吉納獨執纛當先殺入敗之八年敘功授佐領世職噶爾糾姓錫克特哩𨽻鑲紅旗滿洲天聰八年授佐領世職崇德二年追逃人葉雷至溫都悉斬俘以歸凡在行間六踰月太宗命都統以下出迎五里宴賚之順治七年恩詔加二等輕車都尉布色赫𨽻鑲紅旗滿洲崇德三年從征明攻深州以第二人登城克之四年論功賜號巴圖魯授佐領世職順治元年隨入關擊敗流寇又隨定山西至太原土寇千餘來犯擊敗之又擒其僞帥嗣纍遇恩詔加一等輕車都尉布善𨽻鑲紅旗滿洲崇德六年隨征明圍錦州領纛擊敗明杏山兵又敗明經略洪承疇軍八年隨取前屯衛圍中前所克其城順治元年從入關擊流寇有功二年授佐領世職嗣加二等輕車都尉瑚護納𨽻鑲紅旗滿洲崇德五年隨圍錦州擊敗松山兵六年重圍錦州明經略洪承疇以兵來犯我汛地擊敗其衆順治三年從追騰吉思擊土謝圖汗碩雷汗兵進戰有功所至擒逐哨騎斬馘甚衆五年敘功纍遇恩詔加三等輕車都尉蘇完拜姓伊爾根覺羅𨽻鑲紅旗滿洲崇德六年隨征明圍錦州擊松山兵三敗其衆順治元年隨入關擊流賊有功從定河南連敗流賊於潼關又敗之西安二年隨定浙江至平湖屢敗敵軍七年恩詔加騎都尉同旗有布達禮崇德七年攻塔山城先登論功順治初加三等輕車都尉塔爾吉善姓錫克特哩𨽻鑲紅旗滿洲崇德八年隨征明攻順德以第二人登凱旋敘功賜號巴圖魯順治初三遇恩詔加一等輕車都尉勒德姓納喇𨽻鑲紅旗滿洲崇德八年隨征明至山東攻臨清州以第三人登順治初三遇恩詔加三等輕車都尉緣事降騎都尉覺羅肇班𨽻鑲紅旗滿洲景祖長兄之二世孫也崇德八年隨征明山東擊敗明總兵白騰蛟等軍進攻朝城先登克其城順治二年隨征流賊至潼關再敗賊衆賊兵夜犯我營復擊敗之論功嗣纍遇恩詔加三等輕車都尉世職科齊姓翁鄂𨽻鑲紅旗滿洲崇德八年隨征明至山東攻費縣以第二人登城克之順治初三遇恩詔加三等輕車都尉世職七哈拉𨽻鑲紅旗滿洲世居倪沙以地為姓崇德八年隨征明至山東攻魚臺先登克之論功加優敘順治初三遇恩詔加三等輕車都尉緣事降雲騎尉克什格𨽻鑲紅旗滿洲世居棟鄂以地為姓崇德八年從征明攻東安衛先登克之凱旋録其功順治初纍遇恩詔加騎都尉烏爾東阿姓富察𨽻鑲紅旗滿洲崇德八年隨征明至山東攻日照先登克其城敘功並遇恩詔加三等輕車都尉十四年卒松果圖𨽻鑲紅旗滿洲崇德八年從征明山東攻臨清先登賜號巴圖魯授佐領世職順治元年從征山西下太原尋至陜西三敗賊衆於延安前往招撫鳯翔遇賊潼關敗還之衆迎擊敗之二年至江南招撫池州并獲沿河戰艦論功嗣遇恩詔加一等輕車都尉同旗有丹達立亦以崇德八年從征明山東攻朝城以第二人登論功加優敘順治初加三等輕車都尉欽定盛京通志卷七十三
