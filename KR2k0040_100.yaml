body:
  text: 列女四本朝吉林將軍所屬八旗節婦黑龍江將軍所屬八旗節婦欽定四庫全書欽定盛京通志卷九十六列女四本朝吉林將軍所屬八旗襄塔妻瓜爾佳氏吉林鑲黃旗人襄塔為吉林筆帖式早亡氏青年矢志守節垂數十年又吉林正白旗驍騎校伊布格訥妻巴雅喇氏鼐景阿妻阿穆拉氏鑲白旗驍騎校綽洛妻錫克濟拉氏鑲紅旗驍騎校曠紫妻瓜爾佳氏鑲紅旗佐領莫爾泰妻納喇氏正藍旗佐領格爾都妻瓜爾佳氏正白旗協領哈爾薩妻瓜爾佳氏正紅旗防禦瑚鈕妻佛鄂摩氏鑲白旗筆帖式官保妻索綽勒氏彥保妻烏蘇氏又鑲黃旗兵古木納妻彥古氏阿那布妻瓜爾佳氏額爾秋妻覺羅氏瓦拉布妻布爾哈拉氏那什妻扎庫塔氏錫佛訥妻朱氏金文亮妻王氏龎德妻烏蘇氏种伯索和妻富察氏正黃旗兵武克都納妻顔扎氏卓拜妻納喇氏莽第妻默爾哲勒氏瑚什塔妻瓜爾佳氏喀鈕妻尼瑪察氏阿克三妻翁吉拉氏阿蘭妻扎拉氏鈕漢妻烏蘇氏正白旗兵益克訥妻古瑚拉氏武尚阿妻托果羅氏阿啓妻覺羅氏牟爾琿妻鄂蘇絡氏鑲白旗兵雅克薩妻默爾德勒氏薩哈連妻瓜爾佳氏烏庫拉妻瓜爾佳氏那爾玖妻索綽勒氏雅色那妻瓜爾佳氏正紅旗兵阿爾瑚妻尼瑪竒氏雅國妻覺羅氏什圖妻瓜爾佳氏溫拜妻瓜爾佳氏桂勒和妻特羅勒氏白什妻扎庫塔氏關妻瓜爾佳氏松阿拉妻瓜爾佳氏白爾德妻瓜爾佳氏敦達禮妻富察氏鑲紅旗兵巴布岱妻瓜爾佳氏薩泰妻䝉古氏雅爾那妻瓜爾佳氏正藍旗兵多和起妻覺羅氏那松阿妻䝉古氏瑚什圖妻扎絡特氏爵和托妻竒默德氏都瓦喀妻托料氏阿爾賽妻扎拉爾氏鑲藍旗兵愛束阿妻舒穆嚕氏阿米那妻富察氏富他那妻瓜爾佳氏米哈達妻富察氏錫特庫妻烏扎拉氏喀拜妻覺羅氏漢軍高品極妻管氏又寧古塔驍騎校愛東阿妻和雅氏鑲黃旗兵尼雅訥妻尼哈拉氏達末那妻瓜爾佳氏碩色妻烏扎拉氏正黃旗兵托囉妻瓜爾佳氏溫都妻富察氏正白旗兵馬泰妻瓜爾佳氏依拉竒妻烏蘇氏正紅旗兵雅圖妻瑪他拉氏和布訥妻瓜爾佳氏鑲白旗兵長生妻寧古塔氏阿敦妻扎庫塔氏鑲紅旗兵佛嶽洛妻張氏正藍旗兵長格妻庫雅拉氏鑲藍旗兵納和妻富察氏百祿妻和雅氏喀爾布妻和雅氏又白都訥正黃旗兵托和特妻烏扎拉氏奚佛訥妻覺羅氏哲克特妻竒塔喇氏鑲白旗兵斗特妻錫特額勒氏正紅旗兵扎克素妻塔巴氏烏思哈妻扎思瑚里氏鑲紅旗兵伊思哈妻扎拉勒氏正藍旗兵索柏妻扎拉爾氏並以苦節於康熙雍正年旌表以間先後俱未詳載年分上舊志領催海青妻瓜爾佳氏吉林鑲黃旗人夫亡氏呼天自誓斷髮明心青年勵節白首完真同旗咸欽其德又吉林同旗兵尼雅勒德妻蒙鄂索氏伊發那妻托和囉氏額爾德訥妻瓜爾佳氏間散阿賽妻富察氏和上妻李氏那朗阿妻楊氏壯丁那木起妻周氏苟子妻李氏正黃旗兵瑪爾圖妻他塔喇氏正白旌筆帖式圖山妻寧古塔氏間散扎爾泰妻察哈爾氏達拉妻李氏溫進魁妻劉氏領催聶國柱妻楊氏兵簫託和妻葉赫氏瑪哈那妻扎庫塔氏拉哈妻富察氏薩哈連妻穆爾察氏扎哈爾圖妻瓜爾佳氏壯丁杜塞妻孫氏對哈那妻佟氏徐士元妻林氏郭登魁妻王氏施進忠妻王氏莊金妻李氏劉西安妻金氏王懷仁妻裴氏鄭為國妻賢氏吕文甲妻尚氏金三保妻楊氏李雅德妻趙氏韓國泰妻李氏錢為正妻王氏張連魁妻陳氏水師營水手魯朝宗妻馮氏臺丁魯英遷妻塔氏李文士妻王氏劉貴升妻張氏王宗顔妻陳氏李文賔妻王氏鑲白旗兵催巴達拉妻瓜爾佳氏兵色爾特妻富察氏畨都妻扎拉爾氏瑚爾吉那妻尼瑪察氏五十六妻舒穆嚕氏西三太妻尼瑪齊氏壯丁揚宗義妻李氏正紅旗防禦岱圖妻瓜爾佳氏驍騎校達虎妻布拉雅圖氏兵扎蘭太妻他塔喇氏水師營水手韓周仁妻王氏鑲紅旗兵瑪爾賽妻瓜爾佳氏正藍旗護軍特尼勒妻閏氏領催庫古訥妻託果羅氏兵錫特庫妻楊氏圖墨訥妻尼瑪察氏錫和勒妻塔楚拉氏布拉達妻索綽絡氏阿爾賽妻博爾晉氏壯丁佛羅妻伊爾根覺羅氏格出妻瓜爾佳氏水師營水手蕭海壽妻劉氏站丁孫雲龍妻謝氏鑲藍旗前鋒五顔泰妻富察氏白都訥正白旗䝉古間散查琿妻喀爾喀勒勒氏正紅旗兵烏色訥妻富蔡氏撥底妻果洛特氏鑲藍旗兵勒庫妻瑚錫哈理氏間散吉囊額妻錫特烏哩氏康旌表塔那妻烏扎拉氏俱於乾隆十年驍騎校齊齊克妻扎庫塔氏吉林正白旗人夫亡氏儉約自持勤於操作守節數十年心甘茶蓼戚黨稱其賢又吉林鑲黃旗間散薩爾泰妻伍氏陳索妻胡氏韓延祚妻紀氏常祿妻張氏兵長德妻郭氏正白旗兵韓爾特妻瓜爾佳氏正紅旗兵布拉達妻尼瑪齊氏正藍旗佐領山濟思哈妻顔扎氏兵珠爾賽妻瓜爾佳氏鑲藍旗兵吉爾達妻伊蘭庫勒氏錫特庫妻瓜爾佳氏間散布蘭太妻他塔喇氏無品級筆帖式舒書妻烏舍哩氏水師營水手楊惠恩妻張氏石茂勳妻張氏皂保妻楊氏站丁蔡自新妻王氏李華妻薛氏王益良妻包氏孫戴先妻宋氏王輪妻雷氏邉門臺丁楊自富妻董氏范宏道妻李氏官莊壯丁劉文進妻沈氏張善妻李氏馬進宗妻馬氏潘振宏妻胡氏劉士貴妻尚氏張國選妻耿氏三舍妻王氏張望天妻田氏李文方妻孫氏阿福妻耿氏白都訥正黃旗兵喀格妻烏扎拉氏正紅旗兵閏達爾甘妻富察氏正藍旗領催綽里旌表妻博爾濟克氏俱於乾隆十一年又吉林站丁李睥遠妻韓氏寧古塔鑲黃旗兵烏木拜妻瓜爾佳氏鑲紅旗兵那蘭太妻瓜爾佳氏鑲藍旗兵舒澤太妻尼瑪察氏索莫那妻默爾哲勒氏白都訥正黃旗閒散遜塔妻扎思瑚哩氏達海妻鄂羅特氏正白旗兵昻阿妻喀爾喀勒勒氏鑲紅旗兵巴爾瑚妻舒穆嚕氏正旌表藍旗兵達米圖妻烏扎拉氏