body:
  text: 欽定四庫全書欽定盛京通志卷二十一山陵三陵規制嵗祭典禮大小祭儀注三陵小祭大饗祭告諸禮謁陵典禮儀注守陵官制欽定四庫全書欽定盛京通志卷二十一山陵臣等謹案帝王之禮奉園陵崇原廟所以尊祖敬宗廣孝思也本朝啓運天柱隆業三陵神臯吉壤奠我丕基我皇上孝思維則纘緒迪光四謁丹邱志䖍儀肅戊戌秋八月謁陵禮成後敬視寢原增拓禁步體制益嚴誠惟聖人之德無加於孝是以肇禋有成情無弗至禮無弗備也臣恭述三陵規制嵗祭之文謁陵之禮以逮定官司置衛士諸制博稽㑹典謹志山陵第七欽定四庫全書欽定盛京通志卷二十一山陵三陵規制永陵啓運山在興京城西北十里肇祖原皇帝原皇后興祖直皇帝直皇后之陵共一山稱興京陵景祖翼皇帝翼皇后顯祖宣皇帝宣皇后之陵共一山稱東京陵在奉天府城東二百五十里順治五年十一月南郊始追上列祖尊號八年封興京陵山為啓運山東京陵山為積慶山均從祀方澤十三年於陵山周圍立界址界內禁止樵採十五年奉移東京陵改祔興京罷積慶山祀典十六年尊稱為永陵十八年立遷祔永陵廟碑啓運山周圍共十里寶城髙一丈三尺七寸南北長二十九丈東西寬二十二丈七尺周圍長八十六大一尺六寸建啓運殿殿制三楹門四忩八康熙十六年重修改用黃瓦殿內大暖閣四座上設黃緞罩內設寶牀帷幔衾枕楎椸以奉神御小暖閣四座錦罩恭奉四祖神位神牌八尊上設黃緞罩閣前設龍鳯寶座八五供案四朝燈八龍毬三乾隆四十四年於龍毬上增蓋黃布雨旱單各三啓運殿坐臺髙二尺九寸四周長三十一丈九尺礓䃰三路中盤龍為飾左右配殿各三楹門各四西配殿前焚帛磚樓一座啓運門三楹門六東為果房西為膳房房各三楹功德碑亭四座門二亭前門為祝版房齊班房共五楹西為茶膳房滌器房共五楹正門三楹前有朱欄門六繚墻三面均髙七尺八寸東西長二十一丈六尺南北長二十二丈三尺周圍共長六十六丈二尺東西紅門二座果樓三楹省牲亭五楹前有門一座繚墻南面髙六尺五寸東西北均髙五尺四周共長三十三丈門外原設柵木一千四百四十八架乾隆四十三年命展添柵木三百四十四架共柵木一千七百九十二架東邊為祭物井西邊為氷窖其西山嘴有石堤木橋一明堂前下馬木牌二座原設紅樁三十二今增設紅樁三十六白樁六十四青樁三十六俱於乾隆四十三年奉㫖重添東西界牌四前後左右堆房四周圍界址統計二千二百八十八丈陵前寶頂上有瑞榆一株輪囷盤鬱圎覆城隅乾隆四十三年有御書神樹賦勒石西配殿謹案恭載御製神樹賦天章門永陵形勢萬峰環拱衆水朝宗龍盤虎踞誠萬世帝業之基福陵太祖承天廣運聖德神功立極仁孝睿武𢎞文定業髙皇帝福陵在奉天府城東北二十里順治八年封山曰天柱從祀方澤康熙二年改建兩陵地宫修理完竣以奉安祇告讀文致祭一如大享禮焚帛獻酒奉安禮成祭酒三爵天柱山周二十五里孝慈髙皇后祔焉寶城髙一丈七尺一寸周五十九丈五尺寶頂一座髙二丈頂長十二丈四周長三十三丈月牙城髙一丈六尺五寸四周長二十三丈四尺七寸正中琉璃照壁一座方城髙一丈五尺七寸四周長一百一十三丈八尺四寸垜口髙五尺上有角樓四座每座二層上層格扇各四下層門二彩油為飾方城上北面明樓一座門二內碑一座書太祖髙皇帝之陵明樓之下為洞門二門外石五供一案供座髙四尺長一丈八尺六寸寬五尺上設香爐蠟臺花瓶俱雕石為之前為石柱門二隆恩殿三楹門四忩八殿內大暖閣一座上設黃緞罩內設寶牀帷幔衾枕楎椸以奉神御小暖閣一座錦罩恭奉神牌二尊上設黃緞罩閣前龍鳯寶坐二座福金椅東西各一配椅二五供案一陳設桌四朝燈六上俱設黃緞罩龍毯六乾隆四十四年於龍毯上增蓋黃布雨旱單各七隆恩殿坐臺髙五尺四周長三十六丈七尺七寸八分礓䃰三路中盤龍為飾四傍雕石花闌干左右配殿各五楹門十二西配殿前焚帛石樓一座隆恩門三楹樓三層門二康熙五十四年重修東為茶膳房西為果房滌器房房各三楹其南為省牲亭齊班房各三楹前為碑樓碑座二層門二恭立神功聖德碑一通碑亭之前有橋二座礓䃰一百八層東西華表柱四橋邊左右列石獅虎駝馬各二前正門三楹彩油為飾門六兩旁雕石獅二華表柱二石牌樓二乾隆二年設東西柵木八十八架柵之外舊設有堆房各一門之前有虎皮溝一道下馬木碑各一東西石泊岸紅樁各五根繚墻南面髙九尺八寸東西北均髙七尺八寸四周共長五百八十丈左右紅門二座雍正九年定制禁紅門前大路及山根左畔車馬行走門之外下馬石牌各一門之前有滌祭品井一氷窖房六乾隆四十三年皇上謁福陵後命大臣敬謹閲視於附近地方查出墳冢數處俱令遷葬官給葬費並於正門外添安柵木一千五十四架移展紅樁二百六十一外酌增白樁二百六十一青樁四十青樁之外方許樵採耕牧及行走葬厝青樁以內概行禁止規制益昭嚴肅陵之東西界牌四座四周界址共二千九百六十丈夀康太妃園寢在福陵右享殿三楹門四礓䃰三路內設寶牀紅氈坐褥以奉神御配案二花毯三前正門三楹門二繚墻共四十七丈東西茶膳果房各三楹四周堆房各二福陵形勢渾河環其前輝山興隆嶺峙其後逺則發源長白俯臨滄海王氣所鍾聚也昭陵太宗應天興國𢎞德彰武寬溫仁聖睿孝隆道顯功文皇帝昭陵在奉天府城西北十里順治八年封山曰隆業從祀方澤山髙六丈一尺長一百一十五丈孝端文皇后祔焉寶城髙二丈三尺八寸周六十一丈寶頂一座髙二丈四周長三十三丈月牙城髙二丈二尺七寸四周長二十七丈七尺正中琉璃照壁一座方城髙二丈三尺三寸四周長七十九丈垜口髙五尺上有角樓四座規制與福陵同方城上北面明樓一座門二內碑一座書太宗文皇帝之陵明樓之下為洞門二門外石五供一案供座陳設與福陵同前為石柱門二隆恩殿康熙三十一年重建大殿殿制三楹門四忩八殿內大暖閣一座上設黃緞罩內設寶牀帷幔衾枕楎椸以奉神御小暖閣一座錦罩恭奉神牌二尊上設黃緞罩閣前龍鳯寶坐二座福金椅東西各一配椅二五供案一陳設桌四朝燈六俱設黃緞罩盛弓匱一龍毯七乾隆四十四年於龍毯上增蓋黃布雨旱單各七隆恩殿坐臺髙六尺四周長三十六丈四尺二寸礓䃰三路中盤龍為飾四旁雕石花闌干左右配殿各三楹門十二西配殿前焚帛石樓一座隆恩門三楹規制同福陵東西茶膳滌器等房規制亦同前有碑樓恭立神功聖德碑一道亭前後華表柱四左右列石麒麟獅虎駝馬各二前正門三楹彩油為飾門六西為省牲亭六楹饌造房三楹更衣亭四楹門之前齊班房二楹石牌樓一石橋一橋之西為滌祭品井一橋之南下馬石牌各二華表柱二石獅二東西橋道二繚墻南面髙九尺八寸東西北均髙七尺八寸四周共長四百九十五丈九尺墻內松林蓊翳計一千六百二十五株左右紅門二界牌四周圍界址共二千五百六十丈陵前立仗石馬曰大白小白乃我太宗當日所乘以略陳破敵者乾隆四十三年於前門外增添柵木四百四十二架移展紅樁一百二十八白樁九十青樁四十四十六年重修福陵隆恩樓並昭陵明樓等工懿靖太貴妃園寢在昭陵右享殿三楹門四礓䃰三路內設寶牀紅氈坐褥以奉神御配案二前正門三楹門二繚墻共四十九丈東西茶膳果房各三楹四周堆房各二昭陵形勢自城之東北疊巘層巒至此而寬平宏敞有包絡萬象跨馭八荒之勢遼水右回渾河左繞佳氣鬱葱萬年帝業丕基鞏焉嵗祭典禮崇德年間定嵗暮清明祭享興京陵用牛一守陵官行禮東京陵用牛二遣宗室覺羅大臣行禮福陵用牛一羊二遣大臣一員行禮忌辰孟秋望日萬夀聖節㸃香燭獻酒果均遣大臣一員奠帛讀祝行禮每月朔望致祭用牛一㸃香燭獻酒果不讀祝奠帛遣守陵官行禮順治八年始設守陵官員及人户等祭祀按班執事并定祭儀冬至用牛一羊一豕一獻酒果㸃香燭奠帛讀祝行禮清明嵗暮孟秋望日孟冬朔日均獻酒果讀祝奠帛遣守陵官行禮十二年定制凡遇忌辰遣官三人於本陵致祭或遣在京宗室覺羅輕車都尉等行禮或派盛京一等子副都統侍郎等行禮十七年始定制福陵派宗室鎮國將軍一人覺羅三等輕車都尉一人前往居住昭陵派輔國公一人覺羅三等輕車都尉一人前往居住並令輪班致祭永陵是時遣輔國公國則護國將軍宗室聶克碩覺羅三等輕車都尉趙班昻古特駐盛京康熙三年陵寢祭享易豕為羊並酌定祭品又定每嵗清明於各陵上土十有三擔承祭官總管掌關防官率官兵共十有三人升寶頂上土八年遣多羅貝勒以下奉國將軍覺羅男以上前往致祭又議定四時祭祀命奉天將軍副都統各部侍郎致祭太常寺先期開列職名請派惟忌辰及孟冬朔日各總管承祭每月朔望俱掌關防官行禮九年十一年增設守陵官員祭時按班執事十五年定制陵寢供獻酌定用五十盤今六十五盤雍正十三年於清明冬至大祭由京遣祭改派公爵輪班承祭七月望日諸祭俱係將軍副都統侍郎承祭朔望忌辰係總管掌關防承祭行三跪九叩禮乾隆元年奉㫖命宗室輔國將軍護國將軍奉恩將軍等六人移駐瀋陽給以田廬嵗時承祭三陵二年奏准以每月朔望向係掌關防官承祭獻茶上香行禮退不贊亦無𨗳引官今各陵既令貝勒公大臣輪班行禮恐儀節不齊應增贊禮郎二人導引仍不贊又奏准清明山陵增土十三擔向沿前明舊制並無取義似覺太煩今擬各陵增土一擔但令承祭官祇跪上土於寶頂庶踐履不致多人益昭誠敬五年奏准恭進各陵祝版由奉祀禮部敬謹送往照在京進祝版例增設前引官十人六年奏准三陵四時大享忌辰祭享均由盛京禮部於移駐宗室將軍六人內按名擬定正陪咨送太常寺具題欽派承祭行禮永陵每月朔望令掌關防官上香行禮福陵昭陵每月朔望由禮部輪委宗室將軍二人行禮七年議准三陵一例增設爵墊以備禮儀殿內應用白蠟祝案應設羊角鐙一以昭畫一至所陳設罏瓶五供及香合朝鐙應一式製造祭祀所用帷幕槩用黃緞以肅觀瞻八年令太常寺堂官㑹同陵寢總理事務大臣稽察贊禮讀祝等官十九年議定福陵昭陵恭請祝版亦用前引官十人其四時大祭永陵啓運殿稍狹請將祝案設於簷下大小祭儀注三陵大祭禮殿內供設祭肉餑餑案牛羊五供獻帛案西廊下設祝版案丹墀設反坫案陳品物畢藝事各官於反坫處序立届期讀祝官詣東配殿祝版案前行一跪三叩禮恭捧祝版興出陵寢各官前引隨班行禮大臣官員後隨讀祝官捧祝版進中門行中甬路至殿外西廊下供案前跪將所捧祝版供於案上行三叩禮畢前引各官讀祝官俱退復階下立大臣官員等由兩旁門入立丹墀下分左右翼序班陵寢各員由殿兩旁門入詣暖閣前啓門捲幔仍由兩旁門出退復原處立禮部官員同陵寢各官由殿兩旁門入進謁暖閣前行一跪三叩禮畢恭捧神牌出至座前跪供行三叩禮畢仍從兩旁門出退復原處立設茶案時鳴贊官引承祭宗室等由西旁門入從甬路西邊行至丹墀上西旁立將茶案由中門進行中甬路至殿外檻前尚茶拜唐阿等跪斟茶恭捧由殿中門入供獻後從殿兩旁門出退復原處立少待從殿兩旁門進舉供獻之茶仍由殿中門出將茶案撤至丹墀下西邊鳴贊官引承祭宗室等至行禮處立贊禮官贊執事訖鳴贊官贊前進