之例停止拜褥亦照例鋪設殿外其降神之初應請皇上躬親上香以展誠孝以達馨聞再按舊例祭昭陵因帛案前隙地狹窄原有跪獻帛畢擇隙地行三拜之例似與典禮未協恭按各陵隆恩殿大祀禮儀原與太廟禮同㑹典開載躬饗太廟均係獻帛官跪獻帛三叩獻爵官立獻畢各退是太廟帛爵並未載有親獻禮儀此次躬謁祖陵請遵照太廟親祭典禮並請載入儀注於祭祀前期進呈是年八月車駕躬謁盛京祖陵先期一日親詣奉先殿祇告啓駕日陳騎駕鹵簿駕至興京盛京文武官咸朝服至前塗跪迎朝鮮國王遣使臣表請起居躬謁永陵命照各陵之例一體供茶皇帝素服至正紅門左垣側降輿禮部堂官二人恭導皇帝由啓運門陵寢左門入至寶城明樓前祭臺北正中行三跪九叩禮不贊興詣東旁立復行三祭酒禮每爵一叩四祖前凡十二爵興仍詣東旁立舉哀王大臣以下各官咸按翼於陵寢門外兩旁排立皇上行禮時隨行三跪九叩禮祭酒時隨行禮舉哀皆東西面跪禮部堂官導引皇上出乘輿還行宫次日行大饗禮如儀禮成賞守陵官兵丁等有差是日永陵內附葬之武功郡王恪恭貝勒墓各遣官致祭附近之覺羅等祖塋皆遣官往奠駕至盛京恭謁福陵儀與謁永陵禮同次日行大饗禮成即往謁昭陵儀與謁福陵同並奉㫖朕係初次謁陵行禮著開方城門欽此是日駐蹕行宫次日行大饗禮如儀其福陵昭陵之夀康太妃宸妃懿靖太貴妃康惠淑妃並公主園寢各遣官致祭是年奉皇太后謁陵正紅門外降輿幃幕遮過復乘輿由西邊門進至隆恩門外階下降輿掌關防等之妻女官二人導引進隆恩門至寶城明樓前祭臺北正中行六肅三叩禮興行三祭酒禮每爵一叩興西嚮舉哀女官恭導還降輿處躬謁祖陵禮成擇日親臨功臣之墓奉㫖朕親奠克勤郡王等園寢據禮部援引皇祖聖祖親奠功臣墳墓之例隨駕之皇子王等皆隨行禮此次隨駕之皇子王貝勒等應隨行禮具奏朕已降㫖依議竊思從前隨駕之皇子王等皆係皇祖子孫是以均隨行禮此次隨行之王貝勒內有朕之叔輩或朕之兄弟輩非從前隨駕之皇子王等可比每祭酒時亦隨行禮似屬未便朕親臨祭酒功臣即為寵榮之至克勤王園寢王貝勒等仍隨往功臣揚古利等墳墓不必隨往此後朕之子孫若隨來朕降㫖遵行再䝉古王額駙王大臣墳墓皆不必隨往著令禮部記載欽此是日親臨克勤郡王功臣揚古利費英東額亦都之墓各祭酒三爵又親王貝勒以及大臣等墓以次遣官往奠翼日禮部奏請遣官望祭長白山北鎮醫巫閭山及遼太祖陵禮成回鑾皇太后還宫衆皆退次日皇帝親詣奉先殿祇告如前儀十九年駕詣盛京恭謁祖陵先至吉林親望祭長白山畢詣興京謁永陵次日行大饗禮賞守陵官員兵丁遣官致祭附葬之武功郡王恪恭貝勒墓暨附近之覺羅等祖塋駕至盛京先謁福陵次謁昭陵皆於次日行大饗禮賞守陵官員兵丁遣官致祭福陵昭陵之夀康太妃宸妃懿靖太貴妃康惠淑妃並公主園寢禮儀皆與八年同皇太后恭謁三陵行禮並如八年儀又遣官致祭克勤郡王功臣揚古利費英東額亦都墓親祭北鎮醫巫閭山遣官祭遼太祖陵禮成回鑾四十三年駕詣盛京恭謁祖陵先期降㫖以居孝聖憲皇后喪尚在二十七月之內途次不行圍至盛京不升殿不筵宴朝鮮國毋庸遣使朝賀扎薩克䝉古王公等亦毋庸朝覲欽此七月啓鑾由內地出山海關而行先親祭北海神北鎮醫巫閭山駕至興京謁永陵儀如八年十九年禮成賞守陵官員兵丁遣官致祭附葬之武功郡王恪恭貝勒墓暨附近之覺羅等祖塋駕至盛京先謁福陵次謁昭陵儀如八年十九年禮成閲視陵原加添樁木移徙附近墳塋數處給以葬費賞守陵官員兵丁致祭夀康太妃懿靖太貴妃諸園寢禮儀皆與八年十九年同遣官致祭克勤郡王功臣揚古利費英東額亦都墓賢王祠遼太祖墓並遣官致祭長白山遼河渾河松花江諸神朝鮮遣使請安仍照上兩届例加賞賚焉禮成還京四十八年駕詣盛京恭謁祖陵八月由避暑山莊啓鑾經䝉古科爾沁土默特諸部循栁條邊以東入九關臺駕至興京謁永陵儀如八年十九年四十三年禮成賞守陵官員兵丁遣官致祭附葬之武功郡王恪恭貝勒墓暨附近之覺羅等祖塋駕至盛京先謁福陵次謁昭陵儀如八年十九年四十三年禮成賞守陵官員兵丁致祭夀康太妃懿靖太貴妃諸園寢禮儀皆與八年十九年四十三年同並致祭克勤郡王功臣揚古利費英東額亦都墓如舊例遣官致祭遼太祖墓長白山遼河渾河太子河諸神車駕入盛京遍禮於天壇地壇太廟堂子届期皇子等恭送册寶尊藏廟中如典禮御崇政殿肆覲朝鮮王遣使奉表申祝賜詩褒錫加燕賚焉旋蹕次廣寧親祭北鎮廟禮成還京告成事於奉先殿升太和殿受賀四次加老各諭恩俱盛京官民紳士耆㫖恭載綸音門乾隆二十年平定凖噶爾命皇子告祭十月初四日致祭二十四年平定回部命顯親王告祭十二月初八日致祭四十一年平定兩金川命宗室清岱告祭四月二十一日致祭凡皇子謁陵之禮於下馬石牌處下馬贊禮郎導引由左階升至正門外階上虛中位於左旁行禮畢立門東西嚮舉哀如入門至右門止奉祀官接引至陵寢門外右旁行禮西立東嚮舉哀祭日由左門進於殿階上正中行禮凡出使官員謁陵之禮親王以下三品以上官奉使盛京者於三陵門外行三跪九叩禮遇祭饗日二品以上官入門內隨守陵官分班陪祀初任奉天文武官三品以上謁陵如之守陵官制永陵額設各官順治八年始設騎都尉一員雲騎尉一員十五年添設騎都尉二員雲都尉四員總管等員俱於康熙年間增設總管一員康熙九年設副總管二員康熙九年設八旗防禦十六員舊設八員康熙九年增八員筆帖式四員康熙