body:
  text: 關郵奉天府關隘錦州府關隘吉林邊隘黑龍江邊隘各路城站各路鋪遞欽定盛京通志關郵臣等謹案易曰重門擊柝周禮有司關而行人掌傳遽野廬氏掌達國路所以稽出入便往來通商惠工胥於是在盛京右據山海左挾朝鮮北屏白山南帶遼水極邉巖徼防禦綦重至於星軺絡繹喀倫臺站釐然詳備各有條理臣等載考輿圖敬於奉天各屬舊設門關與驛政各事宜詳加編考謹志關郵第十三欽定四庫全書欽定盛京通志卷三十三關郵奉天府關隘興京頭道關城西四十里即雅爾哈關川雅爾哈國語解見奉天府山卷二道關城西四十一里即代岷關卷代岷國語解見奉天府山川三道關城西六十三里即扎喀關卷扎喀國語解見奉天府山川我太祖髙皇帝天命四年征葉赫部命大貝勒等率兵五千守扎喀關以防禦明兵即此以上三關皆因山為關明一統志稱撫順所東二十里有撫順關蓋即此三關之總名其設自何代無考乾隆皇上東十九年有巡過此御製三關詩四十三年有事詩四十八年有御製過三關因成長句紀御製過三關得句詩俱恭載天章門古關城南一百里又有一關在城南二百里相傳國初設關於此今俱廢其名無考鹻厰邊門城南一百四十里旺清邊門城東南三十里於以上邊門俱設有防禦等官駐防統盛京兵部詳見兵防卷承德縣附部無關隘遼陽州西關正南門外今廢未詳何代所置剌榆關方輿紀要關在都司城南一百七十里按之當在今州境內久廢無考鎮相關城北三里久廢無考海城縣梁房口關城西南七十里明一統志關在蓋州衛西北九十里當時海運之舟由旅順口達者於此入途河今𨽻海城縣界關廢三岔關舊志謂在海城縣境內明時以三岔河北與三衡駐牧故即於三岔界內設關以限之今關已廢基址未詳所在蓋平縣石門關城東七十里明時設官軍戍守今裁連雲島關城西十五里明時設此關以控海濱之險亦有官軍戍守今裁青雲嶺關城北十二里山勢綿亘鑿山通路迤南為形勝險隘之處縣境出入必由之路明時所設關上猶刻神宗年號開原縣來賓關城西四十里即度雲堡上有石坊題曰來賓明昕亦設官軍戍守今裁新安關城西六十里方輿紀要關在䖍雲堡北明時亦設官軍戍守今關廢基址無考英峩邊門英峩國語解見疆域形勝卷城東二百十里有城邉門外為圍埸界舊設有防盛京禦等官駐防統於乾隆八年兵部詳見兵防卷皇上東巡過此有十九年有卻製入黃峩門詩御製過英峩門詩恭載天章門威逺堡邊門城東北三十里為吉林等處往來孔道舊設有防禦等官駐防統於盛京兵部詳見兵防卷發庫邊門國語發庫魚池也城西北一百里邊門外為䝉古科爾沁界本朝康熙元年設有防禦等官駐防並統於奉天將軍詳見兵防卷鐵嶺縣山頭關城北二十里按明時設山頭關在三萬衛南六十里當在今縣界內久廢無考本朝順治十五年於城北山頭鋪設關康熙十年移置關原今裁復州欒古關城南六十五里以近欒古山而得名明時設有官軍戍守今裁寧海縣哈斯罕關國語哈斯罕木柵也方輿勝覽關在金州衛南十八里金時設關於此元至正中屯田其地今廢址無考旅順口關城南一百二十里明時所設有城一統志云海運舟達金州衛者至此登岸設有中左千户所今裁事蹟謹稽實録天聰七年夏六月己邜太宗命貝勒嶽託德格類大臣楞額哩葉臣伊勒登昂阿喇率左右翼兵總兵官石廷柱率舊漢兵都元師孔有德總兵官耿仲明率新附兵合步騎萬餘征明旅順口先是有德仲明由登州泛海來降明總兵黃龍於旅順口以水師阻截復合朝鮮兵躡追至鎮江我貝勒濟爾哈朗阿濟格杜度時方督修岫巖蘭磐通逺堡三城奉命迎有德等已率兵駐鎮江岸明兵及朝鮮兵不敢近而退有德等乃登岸來歸至是遂以為嚮𨗳破其城黃龍戰敗自剄死俘獲人口五千餘金二十二兩銀二萬餘兩人參八箱裘服等物無算嶽託班師留葉臣伊勒登率每旗官二員兵二千五百名逰擊佟圖賴率備禦二員舊漢兵百名駐守之蕭家島關城東北一百五十里明時於此設官軍戍守今裁岫巖城相近處無關隘鳯凰城連山關城西北一百七十里以近連山故名明時設關為朝鮮入貢往來之道置官軍戍守今關廢設站於此鴉鶻關方輿紀要關在都司城東南三百三十里按之當在今城西北境久廢無考大片嶺關明一統志關在海州衛東一百十里按之當在今城西北境久廢無考靉河邊門亦名愛哈門城北一百二十里國語愛哈琉璃也鳯凰城邊門城西南十里瀕海為朝鮮入貢之道以上二邊門俱設有防禦等官駐盛京防統於見兵防卷兵部詳按盛京邊墻起自鳯凰城北至開原折而西至山海關按邊周圍一千九百餘里共十七邊門名為老皇上東邊乾隆四十三年四十八年巡過此有御製老邊詩恭載天章門錦州府關隘錦州附郭老虎關城西北八十里未詳何代所設今廢址猶存俗名為老虎關長嶺山邊門城西南九十里舊設邉於此本朝康熙三十六年展邉關因廢松嶺子邊門城西北九十里本朝康熙十四年設有防禦等官駐防統於奉天將軍詳見兵防卷寧逺州黑山口邊門城西一百十里舊設邉門於此今廢髙臺邊門城西一百六十里舊設邊門於此今廢新臺邊門城西北七十里舊設於芹菜溝在城西北四十里本朝康熙十四年展邉二道河三十六年移置於此有守尉官兵駐防統於奉天將軍梨樹溝邊門城西北一百里舊有碾盤溝門在城西北七十里本朝康熙三十六年展邉移置於此乾隆五年添設官兵駐防統於奉天將軍平川營邊門城西北一百十里舊設邊門於此今廢白石嘴邊門城西北一百二十里舊接髙臺邉門本朝順治八年初設水口康熙十四年展邉髙臺堡二十五年展邉移至城西北一百里名寬邦門三十六年又移設於此改今名設有守尉官兵駐防明水堂邊門城西北一百六十里本朝康熙十八年設派兵駐防係白石嘴邉門守尉兼轄仍統於奉天將軍廣寧縣分水嶺關城北八里方輿紀要關上有鎮北樓今廢魏家嶺關城西北七十里今廢彰武臺邊門城北一百七十里本朝康熙二十六年設有守尉官兵駐防統於奉天將軍義州白土厰邊門城北一百四十五里本朝康熙十五年設乾隆五年添設官兵駐防清河邊門城東北五十六里本朝康熙十五年設有官兵駐防九官臺邊門城西北三十里本朝康熙十五年設有官兵駐防雍正十一年後置設同知駐此以上三門俱統於奉天將軍吉林邊隘吉林法特哈邊門法特哈國語解見吉林山川卷城北一百五十里即巴延鄂佛羅邉門為白都納黑龍江往來孔道東北以額塞哩河為界邉外皆䝉古科爾沁等諸部地舊設有官兵駐防俱巴延鄂佛囉國語解見疆域形勝卷伊屯邊門城西北一百九十里舊設有官兵駐防雍正六年復增設佐領乾隆十九年皇上東巡過此有詩恭載御製入伊屯邉門天章門克爾素邊門克爾素國語解見疆域形勝卷城西北四百六十七里舊設有官兵駐防布爾德庫蘇巴爾罕邊門蘇巴爾罕國語解見吉林山川卷城西北五百六十八里即半拉山邉門舊設有官兵駐防林以上四邊門皆統於吉林將軍所轄東自吉北界西抵開原縣威逺堡邉門長六百九十餘里遮羅奉天北境插桞結繩以定內外謂之栁皇上東條邉亦名新邊乾隆十九年巡過此有御製栁條邉詩恭載天章門寧古塔白都訥三姓阿勒楚喀琿春打牲烏拉以上諸處俱無關隘黑龍江並無關隘境內俱設喀倫所以防禦俄羅斯即古之邉徼也齊齊哈爾特穆德赫喀倫溫托渾喀倫溫托琿國語解見黑龍江山川卷多鼐喀倫塔勒哈喀倫塔勒哈國語解見黑龍江山川卷古魯喀倫國語古魯純也又朴素也烏蘭諾爾喀倫二處烏蘭䝉古語解見黑龍江山川卷諾爾池也托馨喀倫托馨國語解見疆域形勝卷四家子喀倫阿拉克泰喀倫䝉古語阿拉克泰花花搭搭也拜塔拉喀倫國語拜塔拉用之也以上喀倫十一處俱設有兵丁駐防稽察統於黑龍江將軍拉哈鄂佛羅喀倫拉哈鄂佛羅國語解俱見彊域形勝卷溫德亨喀倫溫德亨國語解見吉林山川卷蘇克台蘇蘇喀倫䝉古語蘇克斧也台有也蘇蘇國語解見黑龍江山川卷以上和倫部喀倫三處俱設有官兵駐防稽察統於黑龍江將軍和倫國語解見吉林山川卷分界石碑城西北二千五百里吉爾巴濟河口東岸命大木朝康熙二十八年十二月丙子久逺勒滿漢字及臣與俄羅斯議定邉界立石以垂大清俄羅斯拉梯諾䝉古字於上其文曰碑一將由國遣大臣與俄羅斯國議定邉界之北流入黑龍江之綽爾諾即烏倫穆河相近吉爾巴齊河為界循此河上流不毛之地有石界興安以至於海凡山路一帶之溪河盡屬俄羅斯一將流入黑龍江之額爾古訥河為界河之南岸屬於中國河之北岸屬於俄羅斯其南岸之默勒肯河口所有俄羅斯房舍遷徙北岸一將雅克薩地方俄羅斯所修之城盡行除毁雅克薩所居俄羅斯人民及諸物用盡行撤往察罕汗之地一凡獵户人等斷不許越界如有一二小人擅自越界抽獵偷盜者即行擒拿送各地方該管官照所犯輕重懲處或十人或十五人相聚持械捕獵殺人搶掠者必奏聞即行正法不以小故阻壞大事仍與中國和好毋起爭端一從前一切舊事不議外中國所有俄羅斯之人及俄羅斯所有中國之人仍留不必遣還一今既永相和好以後一切行旅有准令往來文票者許其貿易不禁一和好㑹盟之後有逃亡者不許收留即行遣還吉爾巴齊國語解俱已見疆域形勝山川等卷墨爾根諾敏河巴延和羅喀倫諾敏巴延國語解見疆域形勝卷和羅解見奉天府山川卷甘河啇和哈逹喀倫甘國語解見黑龍江山川卷啇和䝉古語抓髻也哈逹解見京城卷伊拉喀喀倫國語伊拉喀花開也喀穆尼喀倫喀穆尼國語解見疆域形勝卷博爾多喀倫博爾多國語解見建置沿革卷拉哈哈倫拉哈國語解見疆域形勝卷寧年喀倫塔拉爾哈倫䝉古語塔拉爾枉為也以上喀倫八處俱設有兵丁駐防統於墨爾根副都統塞楞額山喀倫䝉古語塞楞額承上接下也喀穆尼峯喀倫喀穆尼國語解見疆域形勝卷以上和倫喀倫二處俱設有官兵駐防統於於墨爾根副都統仍歸黑龍江將軍統轄黑龍江巴拉畢喇昂阿喀倫畢拉國語解見吉林山川卷昂阿解見奉天府山川卷伊瑪畢拉昂阿喀倫伊䝉䝉古語解見黑龍江山川卷畢拉昂阿已見前注精竒哩江喀倫烏魯蘇穆丹喀倫烏魯蘇國語解見黑龍江山川卷穆丹國語解見吉林山川卷科洛爾喀倫國語科洛爾襪寬曠也喀塔竒喀倫庫墨勒喀倫額葉爾喀倫䝉古語額葉爾魚油也以上喀倫八處俱設有兵丁駐防係黑龍江副都統所轄仍歸將軍統轄紐勒們河喀倫紐勒們國語解見黑龍江山川卷遜河口喀倫遜國語解見黑龍江山州卷訥默爾河源喀倫訥默爾國語解見疆域形勝卷以上和倫喀倫三處俱設有官兵駐防係黑龍江副都統所轄仍歸將軍統轄呼倫布雨爾庫爾德勒河喀倫䝉古語庫爾熱閘也德勒袍也特爾墨勒津河喀倫特尼河喀倫特尼國語解見黑龍江山川卷崇古林口喀倫默勒肯河口喀倫默勒肯國語解見黑龍江山川卷阿爾噶圖河口喀倫䝉古語阿爾噶法術也圖有也錫蘭鄂索河口喀倫國語錫蘭鄂索今接續也薩爾竒特山喀倫開拉哩河翁昆喀倫開拉哩國語解見黑龍江山川卷開拉哩河溫都爾額埒蘇喀倫䝉古語溫都爾髙也額埒蘇沙子也烏蘭昂阿喀倫國語烏蘭昂阿溝嘴也布拉克圖喀倫布拉克䝉古語解見黑龍江山川卷摩該圖舍哩哈倫摩該圖䝉古語解見黑龍江