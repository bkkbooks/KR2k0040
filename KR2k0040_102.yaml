  text: 祠祀二錦州府各屬錦縣寧逺州廣寧縣義州欽定四庫全書欽定盛京通志卷九十八祠祀二錦州府各屬錦縣社稷壇在城南門外府縣各一雍正十一年建風雲雷雨山川壇在城南門外府縣各一雍正十一年建先農壇在城東門外正殿三楹東廡二楹大門一楹雍正六年建城隍廟在城内鼓樓西北隅正殿三楹左右配廡各三楹耳房六楹大門三楹明洪武時建嘉靖時重修今移于南門外府縣同八蜡廟在南門外殿廡未建土地祠在府治大門内之左正宇一楹又土神祠在縣治大門内之左正宇一楹忠義孝弟祠在縣學中祠宇三楹雍正七年建節孝祠在城内西北隅祠宇三楹雍正七年建闗帝廟有十六一在東門街右正殿三楹配廡六楹耳房六楹大門三楹一在西門街右正殿六楹配廡六楹耳房十楹大門三楹一在城内中街今廢一在城東南七十里網户屯正殿三楹大門一楹一在城南十八里松山正殿三楹東廡三楹大門一楹一在城西南六十里塔山正殿三楹大門一楹一在城西南五十里髙橋東西有二廟正殿各三楹大門各一楹一在城西南七十里長寧堡正殿三楹東廡二楹大門一楹一在城西南七十里笊籬山正殿三楹大門一楹一在城西南八十里連山正殿三楹配廡二楹大門一楹一在城西南九十里老和尚䑓正殿三楹大門一楹一在城西三十里鷹手堡正殿三楹配廡四粗大門一楹一在城南二十里錦昌堡正殿三楹大門一楹一在城北二十里流水堡正殿三楹大門一楹一在城北三十里大盛堡正啜三楹大門一楹桞城郡王廟遼壽隆五年為姚景行建今祠址已廢周将軍祠在城西祀明寧武總兵周忠武遇吉正字三楹耳房四楹大門一楹乾隆十二年知府金文淳建建王将軍祠在城南門卧後街祠宇三楹明季大凌河死難督學御史呉道昌為植碑額日精忠報國碑石半落遂失其名今市人設㕓其地未及改建大廣濟寺在城内北街西隅正殿五楹後殿五楹配廡十八楹大門三楹相傳肇建扵唐時寺内有白塔髙十三層造於遼道宗清寕間蔵皇后所降之舍利也金中靖大夫髙漣有塔記明嘉靖十一年重修宣大巡撫文貴有碑記錦州塔在城内大佛寺前建于唐塔座八面每面均六丈共四十餘丈塔座髙十六層約髙一百餘丈觀音閣在城内大廣濟寺前閣制三楹配廡四楹耳房六楹大門一楹天后祠在城内白塔後正殿五楹配廡十九楹大門三楹財神廟有六一在城内東街北隅正殿三楹配廡三楹耳房六楹大門一楹一在城東六十里張郎堡正殿三楹東廡三楹耳房三楹大門一楹一在城東南三十里下五旗正殿一楹一在城西南五十里髙橋正殿一楹一在城西五十里石灰窑子一在城西七十里周家屯今俱廢三皇廟在城内西街北隅正殿三楹東廡三楹耳房三楹大門一楹康熈八年建知縣郭茂泰有碑記馬神廟有二一在城内西街北隅正殿三楹配廡二楹耳房六楹大門一楹一在西門外今廢興隆菴有三一在城内南街東隅正宇三楹耳房四楹大門一楹一在南門外正宇三楹耳房四楹今廢一在城北四十里大葉家堡正宇三楹大門一楹毘陵菴在城内北街東隅正殿三楹配廡二楹耳房三楹大門一楹地藏菴有二一在城東門南隅正殿三楹配廡二楹大門一楹一在城西四十里卧佛寺東正殿三楹彌陀菴有二一在城東門南隅正宇三楹一在城南門正宇三楹觀音堂有二一在城東門堂址三楹大門一楹在城南門今廢地蔵寺有五一在城東門正殿五楹配廡四楹耳房六楹大門三楹一在城東二十里雙陽店正殿三楹大門一楹一在城東七十里右屯衛正殿三楹配廡六楹耳房十楹大門三楹一在城西九十里石灰窑子正殿三楹配廡三楹一在城北四十里臧家堡正殿三楹西廡三楹大門一楹真武廟有三一在城東門正殿三楹東廡三楹左右廡六楹大門一楹一在城南十八里松山正殿三楹一在城西八十里沙河營正殿三楹大門一楹玉皇廟在城東門正殿三楹配廡六楹耳房三楹大門一楹蝗神廟在城東門正殿一楹東嶽廟在城東門正殿三楹東廡五楹大門三楹娘娘廟有三一在城東門正殿三楹配廡三楹大門一楹一在城南五十里天橋厰正殿三楹配廡六楹大門一楹一在城東北四十里魚子障正殿三楹大門一楹藥王神宫在城西北正殿三楹配廡四楹耳房六楹大門一楹火神廟在城南門正殿三楹配廡三楹西耳房三楹大門一楹龍王廟有四一在城南門今廢一在城北門正殿三楹西廡三楹大門一楹一在城西三十里鷹手堡正殿三楹一在城南三十五里螞蟻屯正殿三楹大門一楹白衣菴在城南門正殿三楹左右廡六楹耳房六楹大門一楹普濟菴在城北門正宇三楹念佛堂在城北門正殿五楹左右廡六楹耳房六楹大門一楹三官廟有二一在城北門正殿三楹配廡六楹大門三楹一在城西南三十里杏山正殿三楹配廡四楹耳房三楹大門一楹䨇井寺在城東三十里白雲山正殿三楹大門一楹朝陽寺有三一在城東三十五里興隆屯正殿一楹一在東南十五里望海山今廢一在西北十八里順漢山正殿三楹西廡三楹平安寺在城東四十五里馬蜂旂屯正殿三楹東廡三楹大門一楹望海潮雲寺在城東五十里平山今廢花園寺在城東九十里梨児峪正殿三楹西廡二楹大門一楹杏花寺有二一在城東一百里鐡塲正殿三楹大門一楹一在城北三十五里大茂堡西正殿三楹興隆寺有二一在城東一百里方家堡正殿三楹大門一楹一在城西南五十里新人屯今廢卧佛寺在城西四十里正殿三楹配廡六楹大門三楹普陀寺在城西四十里北山上正殿三楹山有洞洞中有泉石佛百餘正統中鎮守太監王彦等木鏤千手千眼大士像土範羅漢及諸菩薩楼閣參差河流縈繞因擬落伽之勝名曰普陀