body:
  text: 山川二錦州府錦縣寧逺州廣寧縣義州欽定四庫全書欽定盛京通志卷二十六山川二錦州府錦縣紫荆山城東二十里髙三里許周圍四十里尊嚴高大為郡之主山以崖紫荆故名東南有雙楊店村饅頭山城東二十五里馬鞍山城東二十五里白雲山城東二十五里山上有聚仙寺左井右泉土人以雲氣候陰晴頗驗相近一山曰朖馬山磨盤山城東三十里蔡家山城東三十五里遊家山城東三十五里九華山城東四十里東二里一小山亦名九華珠子山城東四十里龍灣山城東四十五里團山城東六十八里十三山城東七十五里高一里餘周圍二十餘里峯有十三故名遼史燕王淳討武朝彥至乾州十三山金蔡圭詩關山盡處十三山即此山也山上有潭其下有金牛洞峯巒羅列大小相錯出山海關即望見之疑嵐積翠於大荒中若遠若近宛若圖畫海山一竒觀也聖祖仁皇帝東巡過此有十三山詩恭載聖製門乾隆八年皇上東巡過此有三山詩恭載御製閣陽驛望十天章門洪寺山城東八十里紅草山城西二十里磨盤山城西二十里一名圓斗山黃花山城西三十里鷹窩山城西三十五里湯河發源於此假山城西四十里長嶺溝山城西四十里卧佛山城西四十里山有卧佛寺有石卧佛像長一丈四尺故名女兒河水北流遼之俗又呼龜山霍家臺山城西五十五里氊帽山城西五十五里峯鋭而有簷故名紗帽山城西六十里鐺子山城西六十里俗呼支鍋子山形如支鍋小虹螺山城西六十里周圍三十里許上有如來殿觀音寺高橋河七里河發源於此東有小山相接大虹螺山城西六十五里周圍五十餘里高五里許與小虹螺山對峙東西綿旦百餘里連山河發源於此女兒河還遼其中金時置虹螺寨廢城舊址猶存明時因山築城已廢山之西為剛家屯摩旗屯小簷帽山城西六十五里大簷帽山城西六十五里喂牛厰山城西六十五里椵木排山城西六十五里筆架山城西六十五里天橋山城西六十五里金沙鍋山城西七十里乳頭山城西七十里與西北兩小山對峙俗呼妳頭山是也尖山城西七十里團山城西九十五里古塔山城西九十五里古安昌縣水和村其上有塔故名涼水䃳子山城西九十五里下有池架山城西九十五里偏道山城西九十五里藍家溝山城西九十五里偏洞山城西九十五里上有洞涼水泉山城西九十七里傍有泉窟窿山城西一百里其地有屯東為梁家屯南王寶山城南九里寨兒山城南九里吕翁山城南十里周圍四十七里高二里許山上有洞戰迹本朝崇德七年大破明兵十三萬於此山之下恭詳松山塔山注下聖祖東巡過此有其事恭載御製吕翁山詩紀聖製門乾隆八年皇上東巡有御製吕翁山詩四十三年有年有御製經吕翁山作詩四十八御製經吕翁山疊戊戌舊作韻詩俱恭載天章門松山城南十八里舊松山所城在其西聖祖東巡過此有御製松山詩恭載聖製門乾隆八年皇上東巡有御製松山詩恭載天章門事迹謹稽實録崇德四年春太宗統師征明松山以炮攻城盡毁其堞明副將金國鳯乘夜以繩繫木填之以土比明已築固我兵乃分三路穴地攻之城中復有備不能克遂班師五年春命王貝勒等更畨率兵圍綿州六年秋八月睿親王多爾衮等奏言明國合各省兵來拒我師實為衆多太宗諭曰敵人若來侵犯王等可相機擊之不來切勿輕動各當固守汛地時太宗即欲親征因患鼻衄緩三日起行戊午渡遼河太宗鼻衄不止承以碗行三日方止豫親王多鐸等請駕徐行太宗曰行軍制勝利在神速朕如有翼可飛即當飛去何可徐行也諸王貝勒大臣共議攻圍策太宗曰朕但恐敵人聞朕親至將潛遁耳倘蒙天眷佑敵兵不逃朕必令爾等破此敵如縱犬逐獸易於拾取不致勞苦也朕所定攻戰機宜爾等慎勿違誤勉力為之壬戍駐蹕戚家堡遣大學士剛林往睿親王營傳諭曰朕當即至矣可移兵先在高橋立營俟朕至合圍松山杏山睿親王即令剛林回奏聖駕親征臣等勇氣增倍惟務進攻但明兵甚衆臣等圍錦州屢經攻戰微有損傷如冉速戰恐力不及頃奉命駐營髙橋倘敵約錦州松山兵來攻萬一有失奈何即欲至髙橋當俟勝負少分之後于是駕先至松山令諸軍橫截烏馨河南山至海濵大路太宗親駐營杏山之間諭衆曰如敵來犯近乃擊之若未近而先往迎戰致貽纍於衆罪與敗走同是時敵人於松山城北乳峯山岡結寨其步兵於乳峯山松山城之間掘壕立七營其騎兵列於松山東西北三面合步騎兵號十三萬其領兵總督洪承疇巡撫邱民仰兵道張斗姚恭王之楨兵部郎中張若麒大同總兵王朴宣府總兵李輔明密雲總兵唐通薊州總兵白廣恩玉田總兵曹變蛟山海總兵馬科前屯衛總兵王廷臣寧逺總兵吳三桂及副參遊守以下二百餘員癸亥明總兵八貟率兵犯我前鋒汛地我前鋒軍擊敗之又合鑲藍旗護軍追擊至塔山獲筆架山積粟十二堆甲子敵犯我鑲紅旗汛地為我軍擊却旋復來戰太宗張黃蓋指揮將士布陳敵望見悉退太宗諭諸將曰今夜敵必遁我左翼四旗護軍可至右翼汛地排列右翼四旗護軍及騎兵蒙古兵前鋒兵俱比翼排列真抵海邊各固守汛地敵兵之遁者有百人則以百人追之有千人則以千人追之如敵兵衆多則躡後追擊直抵塔山是夜初更明兵沿海潛遁我諸將各遵上命由沿地邀截奮擊窮追殺死及赴海死者不可勝計乙丑命睿親王多爾衮英親王阿濟格率兵圍塔山以紅衣炮攻克四臺斬守備二員都司一員生擒臺內頭將王希賢參將崔定國都司楊重鎮太宗移營松山令環城掘濠困之又令諸將分駐要路堵截來往敵人是夜明總兵曹變蛟率乳峯山馬步兵犯我鑲黃旗汛地者一正黃旗汛地者四且突衝御營並為我軍擊却曹變蛟中創奔還松山明總兵吳三桂王朴乘間奔入杏山己巳吳三桂王朴等復自杏山將奔寧逺我前鋒兵見之由杏山西追擊至高橋豫親王等發伏掩殺敵各路潰竄自海邊至桑阿爾齋堡並為我分駐兵殱殪惟吳三桂王朴得脫走寧逺壬申命大臣率兵設伏高橋甫出營見我前鋒兵追逐杏山遁出步兵千人遂協同擊斬既至高橋復遇杏山遁出之騎兵八十步兵六百悉殱之是時松山城中被我軍圍困不得出者總督洪承疇巡撫邱民仰及總兵王廷臣曹變蛟祖大樂等及士卒萬餘欲戰則力不支欲守則糧已絶欲遁又未敢成隊而出其乘間先遁為我軍斬殺者五萬三千七百八十三人獲馬駝七千五百餘甲胄九千三百四十六副自杏山迤南至塔山一路死者相枕藉海中浮尸飄蕩多如雁騖九月辛巳太宗自松山城西南移營城西北越五日駕還留豫親王等圍松山英親王等圍高橋冬十月命鎮國將軍阿拜率兵駐乳峯山十一月命肅親王豪格輔國公滿達海率兵往同豫親王等圍松山十二月壬寅朔明兵六千出松山城夜犯正紅旗護軍營驍騎營及正黃旗蒙古營我軍各守汛地沿壕射敗敵兵殱四百二十四人餘衆遁退入城門閉不得入來降者二千餘人從杏山宵遁為我伏兵襲殺者五百七十四人七年春二月丁巳松山城中明副將夏成德遣人赴肅親王軍通欵約為內應以其子夏舒為質是夜王令左右翼前鋒携雲梯二八旗兵携雲梯八至城南靣即于夏成德守禦處樹梯登城我軍畢登敵始覺我軍巡邏搜勦令隨夏成德降者别聚一處生擒總督洪承疇等斬兵道一副將十遊擊以下官百餘員兵三千有竒太宗命諸王斬邱民仰王廷臣曹變蛟而以洪承疇祖大樂諸人歸盛京贍養之留兵毁松山城而還牛心山城南二十里石灰窑山城南三十五里馬鞍山城南三十里望海臺山城南三十五里空心臺北山城南三十五里空心臺南山城南三十七里三角山城南三十七里翠幕山城北十里俗呼眼馬山二郎洞山城北十五里上有五洞洞東北一潭深丈許其東一泉上有玉皇閣彌陀閣望海觀音閣惟觀音閣最高東見十三山西見壺右蘆島南見大小筆架山下則錦水凌川旋其左牛山城北十五里有金牛洞左蟠龍山城北十五里在觀音洞東右蟠龍山城北十五里在觀音洞西雞冠山城北十五里在觀音洞前小洞山城北五十里饅頭山城北二十里俗呼大帽山小洞寺山城北二十里洞內有石佛蔡家敵樓山城北二十里溫家敵樓山城北二十里青石臺山城北二十六里巖靜寺山城北二十六里山上有洞中有石佛牛心山城北二十六里西有巖靜寺寺前後有桃杏花時爛漫遊者甚衆裂縫山城北三十里亂石山城北三十里二道河發源於此了八石山城北三十里高三十餘丈周二里餘數峯插雲峯後有澗深不可測山東面有石佛二尊山上有石柱九相傳遼蕭太后梳粧樓故址梯子山城北三十里大茂山城北三十里山北有大茂堡龍嘴山城北三十里頭道河發源於此驢耳山城北三十五里上有驢耳寺龍頭山城北三十五里有二洞若眼下有龍湫刀尖山城北三十五里杏花寺山城北三十五里翠巖山城北三十六里雙井寺山城北四十五里上有洞為大士龕東西二井故名石門山城東南十五里乳峯山城東南十五里中峯如蓋東西十二麓拱城飲北向懸崖有竇源可丈許泉溜如乳甘冽可望海山城東南十五里山十有朝陽寺今只存一碑小凌河繞山下高山城東南二十五里東王寶山城東南二十五里卧龍山城東南二十七里坡陀盤屈狀類牛眠俗又呼卧龍山長山城東南三十里自此綿亘而南四五里峯巒斷續四山錯列皆為長山上有長山寺鷹帽山城東南三十五里牤牛山城東南三十五里山麓插海小凌河經其陰毛山城東南三十五里朝陽山城東南三十五里下有朝陽寺俗呼王麻子溝平山城東南五十里一名團山上有土城城南有望海朝雲寺明一統志以此為木葉山誤西王寶山城西南二十里觀馬山城西南三十里舊杏山城在其西一名關門山杏山城西南四十里舊有杏山驛本朝崇德七年取明杏山城毁平之詳見松山塔山注聖祖仁皇帝東巡有御製杏山詩恭載聖製門乾隆八年有詩四十三年有御製雪後過杏山皇御製杏山晚眺恭依租原韻詩俱恭載天章門磨盤山城西四十里白馬溝山城西南四十七里煙臺山城西南五十五里海雲山城西南五十五里上有海雲寺紅土山城西南五十七里又名平土山打魚山城西南五十七里尖臺山城西南五十七里白臺山城西南五十七里三頂山城西南五十八里小筆架山城西南六十里峙海中狀如筆架潮至時四面皆水潮退有石如橋濶三丈長三里許可通車馬大筆架山城西南六十里與小筆架山俱峙海中狀如筆架潮退見天橋濶八丈長四里許為昔人避兵處上有朝陽寺多颶風屋瓦輒飄去今存空堵塔山城西南六十里明置塔山千户所於此事迹謹稽實録崇德七年春三月明總兵祖大夀以錦州降太宗命鄭親王濟爾哈朗睿親王多爾衮肅親王豪格等移師圍塔山杏山夏四月戊申列紅衣炮於塔山城西攻毀城垣二十餘丈我兵悉登城盡殱城內官屬及官兵七千收軍駐高橋大路齎敕招杏山城中將士降不從庚甲移炮於杏山城北面先攻取其近城之臺明日以炮攻毁城垣二十五丈我兵將欲登城城中衆官開門出降太宗命以降順官屬兵丁携歸贍養編戶士民安插蓋州俘獲人口財物賞給攻城及陳亡被傷將士兵器及米糧牲畜運貯錦州其塔山杏山城垣悉毁平之笟籬山城西南七十里龍瓜山城西南七十里山上有瓦窯寺又名瓦窯子山相近一峯亦名馬鞍山北接十王莊沙鍋屯龜頭山城西南七十五里峙海中三城山城西南九十里刺兒山城西南九十里南臺山城西南九十里駱駝山城西南九十里北臺山