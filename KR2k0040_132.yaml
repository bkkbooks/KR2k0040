body:
  text: 國朝藝文十四記二繹典附表贊跋欽定四庫全書欽定盛京通志卷一百二十八國朝藝文十四記二聖駕四謁祖陵禮成恭記阿桂皇帝膺天成命四十有八年繹思祖宗興業造功以奄有九有之師啓無疆大寶祚景嗣舊都神臯隩宅山陵邃鞏陟降攸憑粵自乾隆癸亥甲戌以洎戊戌式循彛章三修謁祭之禮隆儀毖宣孝德光被乃者特詔有司選和闐貢玉新作册寶格於太室而以舊所奉者尊藏盛京太廟洪昭列聖之丕庥顯光闡示無極將遣皇子諸王等翊奉以行皇帝曰朕巡省舊京肅拜園寢於兹五年維艱難締搆之緒夙夜常在朕心益宜以時敬申報饗其以孟秋啓軫熱河有事於三陵夙戒所司一如舊典乃五月甲寅車駕發自御園駐蹕避暑山莊越六月丙子詔以伏暑閔勞蒸徒令太史改卜吉日恩意滂浹歡音雷動越八月壬申恭遇萬夀聖節上御淡泊敬誠殿諸藩從官入賀如儀越三日乙亥自惠迪吉門啓蹕東巡蒙古科爾沁土默特諸部落以除道成梁奔走恐後所在廛肆櫛次生殖蕃阜一比內郡縣塞田畝千鍾刈穫彌望咸感荷聖朝涵濡休養之厚澤跽仰羽蓋歡歌載塗爰循栁條邊以東入九關臺門將軍侍郎府尹以下緣道迎謁各修乃守越九月戊戌車駕至興京謁永陵越五日癸卯謁福陵若翼日甲辰謁昭陵功臣陪塋以次賜酹祀事儼恪蕭薌肸升神明居歆多福單厚乙巳車駕入盛京遍禮於天壇地壇堂子太廟蒞舊宫瞻視棟宇皇情愾穆越三日戊申肆覲於崇政殿朝鮮國王遣陪臣奉表起居鞠􅎽在列賜詩褒錫慶賚有加遂大晏羣臣頒幣以差中外愷樂若翼日己酉於宫中行事神禮庚戍發自盛京先是有詔推恩給復奉天所屬祖稅一年行所過者半之除莊頭輪倉粟萬餘石旗地嵗納米豆草束十之五囚輕繫以上至徒流減免如例民男婦七十以上優以粟帛廣博士弟子員額凡扈從王公諸臣暨大吏羣吏之有執事於行在者差别敘録具凖乙未己亥乙巳丙午節次指授行慶所逮羣倫靡不霑溉越五月乙卯次廣寧禮於北鎮廟它若遼河渾河太子河秩在祀典者咸先後遣官將事懷柔百神山川受職越十月甲子次山海關禮於北海神廟登澄海樓以望海馮夷奔越恬波效瑞越八日壬申謁東陵如初禮乙亥車駕至自盛京若翼日丙子親享於奉先殿告成事焉權自發軔熱河六旬有二日而大禮輳備懿鑠於融敻古無尚臣仰惟國家光宅大東以建我丕丕基神威燮伐震耀典册皇帝虔共昭事既日發金匱周覽本末灼知於受命之原而猶不憚屢駕之勤巡行川野咨度聖迹於赫圖阿拉見創造之勞於遼瀋見經營之迹於寧逺錦州松山杏山大凌河薩爾滸尚間巖諸地見皇天助順集勳制勝之由然流連勤懇久而彌摯細及一名一物亦必反覆核證以毋忘先民淳厚之俗用是摛為大文甄謨鑄雅御製薩爾滸書事紀功勒實照爥宇宙既宣付刻石其處以詔無窮而前後詩章規重矩疊無非懷創業之不易而益憬惕於守成之難長言諄復盎溢楮墨爰命諸王子敬繕一通櫝而藏諸祕閣所垂訓於億萬祀子孫者睿慮深長實為至詳且切若夫植根樹本崇飭典物則有如盛京諸壇廟舊領祠官隆壝周壖嚴翼無改復命將作繕葺規模鼎新奉天所屬諸城嵗久陊刓當葺治者十有八特詔大臣相視大發帑金撤而甓之植良土剛金湯永奠四庫全書排葺告蕆復於盛京建文溯閣分部藏弆琅函玉笈奎壁增輝惟聖天子眷顧邠岐於事神諴民緯武經文諸大政一切修明百務具舉而淵沖默運所以周暨於萬方臣庶者亦無不襲和紹德推本孝熙宵旰勤咨彌昭行健臣侍直樞禁日聆睿訓仰見我皇上體祖宗之心為心法祖宗之治為治寅承對越日昃不遑故能精意孚通受釐集福至仁達孝一以貫之固非徒豐鎬歌詩枌榆樂土飭靡文而侈掌故者所克比擬萬一臣學質檮昧愧無以率先館閣諸僚導揚盛美而職領起居注法當纂次事實以付史館不揣固陋謹件繫月日撰記一篇竊附於記言記動之義曷勝悚戢歡忭之至臣阿桂拜手稽首謹記聖駕四詣盛京恭謁祖陵禮成恭記有序繹典篇吳省蘭臣惟犆礿殷祫揆同疇曩山原朝拜書缺有間焉顧周官大宗伯之屬或司祭墓尚書大傳周本紀皆紀武王上祭於畢馬融以謂畢文王墓則其禮實推輪姫室後漢光武謁長陵者三有事十一陵者四孝明率履勿越致甘露降樹之異和安以下舉亦僅矣自晉迄明時或修述第史氏艷傳以飭儀度致感慕為極若循是繹􅑴締構勤劬政本翊萬祀者未之前聞臣嘗竊怪太宗有唐令辟備衣饌欲親陵寢乃召齊士員謂從官曰朕若行使勞扈從遂自抑止命江夏王道宗代行嗣終唐世惟永徽一謁昭陵開元一謁橋定諸陵而已意魏徴獻陵之對所繇感發惜不能格非納善坐視其主數典忘祖而不自知也惟聖清肇域大東幠燾宙合興京盛京奉為舊邦其山曰啓運曰天柱曰隆業儲靈甄貺若神鼎之嵉跱三陵康焉皇帝祇亮荃宰懋席蘿圖繩祖武而追來孝自癸亥至戊戌三謁橋山愛慤致誠錫羡闓澤巡厯逾習僾愾滋勤舟瑶陟降之原斾鉞指撝之野考地徵事宵旰俙然錯事布宜是行是訓惟曰欲至於萬年越嵗癸卯符虞巡之五載爰蠲吉日昭事祖陵上典於是乎四舉臣謹案五帝之書為典尚書堯典傳言堯可以百代常行之道爾雅典常也經也周禮六典疏常經即是法式臣以應奉文字為職愧不能效揚榷於萬一嘗伏讀聖製敬自尋闡仰見册寶有貤藏之誥壇廟有慗葺之諭􅛬瀆有新宇之制城洫有藏工之命祕閣有庋書之記藩服有柔綏之詔胄筵有聰聽之訓星潢有敦敘之旨他若班朝錫燕優老譽俊練士校射蠲賦肆眚惠農商恤行伍紫綸所及萬彚春回然後展謁東陵回鑾告奉先殿而慶大禮之成亦創亦因法可世守堯羹舜墻有典斯在竊不揆顓昧撰繹典一篇謹拜手稽首以獻其辭曰於顯哉瞻仰大園淯陽無計量相因為氤相昷為氲垂有常象資始大生號物有萬熙於默成疇勿報本返始而歸貺乎太清粵若睿智率親率祖矩剫仁義雖逺必追綿綿生之初謂篤不忘廟以貌之焄蒿肸蠁猶未足以稱誠愊而釗精氣於所藏蓋以教敬致嚴勔無疆也戔戔鯫儒剽傳章句掔文泥古勿克緣情章禮宣範於後枘鑿無所取材若訟是聚㪺水窒源而誼乃昌於建元典午崇陽之堬拓跋盛樂之埰仙李三原之堋天水永昌之殊或數或疏有舉莫敢廢耶律完顔循典無黷元馭區夏朝起輦谷然皆密邇圻甸或十舍五舍而地不必其開迹志不必在考憲毋慢焉已明徙其都睇鐘阜如四極中葉以降昌平結轖彼太室之勿親尚遑問夫神域限中外以一墻跬步勿踰庭户趢趗不自照更遑恤締造之櫛沐風雨哉是用上帝勿馨厥德乃東顧遼左將全畀所有而我聖朝膺圖籙以龍興俄朵也伊古積善纍德顯統運期景命長逺者莫過於蒼姫履武敏歆載造邰室不窋棄稷自竄公劉廞之豳館允荒君宗是依古公避薰育走馬岐下一傳再傳養晦遵時逯前歌後舞施輕吕於坶墅義士猶或非之謂口實不啻於升陑然而雅材繼作肇祀則陳即室匪康則緬涉渭遡漆沮之陶復述強理於道兊其詩曰無念爾祖又曰駿命不易一篇之中三致意焉矧我帝業之會昌也朱果靈皚孰與祈袚於郊禖三姓渝平孰與爭田之質成赫圖阿拉之復孰與止旅於芮鞫尼堪外蘭之蠱孰與構讒於侯虎七恨之齎仇孰深於串夷九部之推功孰多於耆八旗分屯軍孰整於三單三田受降信孰周於崇墉帝出乎震不崇朝而翦四路之旅天聰崇德繼奮皇武既環􅏳其郊郛舍而勿取彼不數稔養癰自戚君抗憤以殉國臣歸命而乞師我世祖爰命宗衮整旅入關雪其彌天之恥蠲我夙憾沛我新惠􅜚生氓無主澥水羣飛然後御宸極而大居正繩契已􅉨易姓受命應運之際有如是哉德若湯武猶有嗛焉奚論豐沛與淮泗夫中圖大宰世之樞也追本敬始詒燕之撫也載亳者傃景柏居鎬也恁原荼豈以西泰東約殊哉憬惺乎肇造之機符也左遼右瀋帝省溥源長白隆興天作髙山列聖經營鼎於是成憑霄之所鴹羾精氣通行固萬葉以為量矣章皇帝紹天闡繹鎮中區以運四維仁皇憲皇繼文繼武虔鞏洽乎重熙乃究福壤辨域邇圻因乎時也且我聖祖功德大成桄矣晊矣樹神明之式殷戀滿珠曰維初宅三厯陪都志永言裕維則也聖考躬代事於潛邸十三年中貞度敕幾不遑日􅨫時蓋有所俟皇上怤雲雷草昧之囏辛率祖攸行發祥積慶洄測其源自乾隆八年殷禮肇稱緝五朝之重光覲四祖之丕靈涉山海之嶮阻履肅慎之墟址景光橫甸之臯考度三關之圖訪戰迹於鐵背界藩斐芬尚間吉林松杏吕翁山之崖采風土於威呼法喇拉哈周斐額林帕格羅丹賽棐之細優宗潢藩部扈從留守陪臣髦俊耉耆武士之殊施秩遍神肆覲賜酺簡軍行獮宥罰給復恤商之茂禮既偹乃復洞洞屬屬如也越十九年再詣如初四十三年上儀三述視甲戌天子謂敬以愛達禮以義程感以慕至情以性生謨以逺裕政以久成鑒古者邇不泄奉先者章勿忘典莫切於上陵也重巽以申之後甲先庚諄迪雲礽億祀欽承乃定三載簡命皇子朝三陵之典而期嗣舉於十數年然而乾行之健無息大孝之慕不遷蓋推敬祖者以格上下神祗即推法祖者以究保聚休養故重壝周壖將作具暐也靈川秀􅛬祠官肇庀也嚴闉􅳮堞金湯申鞏也帑庫廪倉莞鑰眘董也四庫全書籖厨再就􅔑閣曰文溯於過澗之義湊焉闐河貢璆俶篆懿號侯其禕而乃祇晉世室貤昔瑑於舊京之閟宫禮惟時惟稱惟宜也既以翊奉命寶胄親藩侑焉容臺又之皇帝曰時哉朕瞻拜園寢五稔於兹夙夜繾綣動台志其練吉親往報饗爰諏孟秋自避暑山莊啓蹕帝厪行扈蒸徒之涉霖潦冒暑暍也期展八月屆時日月會於夀星諸藩從臣矚景抃蹈呼萬嵗賀聖節越既望斗車東軷高涼載塗塞宇澄􅣲由惠迪吉門指桞條邉而進發蒙古四十九旗扎薩克各司其屬歡呀拜匐入九關臺門奉天宗臣統軍卿尹庶尹奔走伏謁咸述厥職九月戊戌謁永陵癸卯謁福陵甲辰謁昭陵酬及陪塋當是時霜露既降皇情怵然通微合漠如存如生目相形留民無能名至誠乙巳車駕至盛京圜丘方澤堂子太廟咸致禮焉乃翕翕習習還蒞舊宫十亭翼如二木崇如循省堂構豐規廓閎入室出户儼若鬷假音容函香裸鬯遍於方望乃御崇政殿大朝會朝鮮國王使臣奉表起居在列蹈舞班末蕭露繼湑需雲纍靄象泰之交孚兑之説類親賢樂利之情示勞來匡直之惠十賚肆施若甘露霈渌澤醰郁視昔加渥焉於是周親卿士百執事相和而歌曰練時日兮駕巡東傃珠邱兮精禋通幽居兮朝鄷宫開南端兮降福崇浹慈惠兮懋賞重神人和兮四海同候人疆吏相率而歌曰畢司灑兮箕司除肅輿衛兮帝之謨吾何力兮賜級都慎守兮褱區區膠黌序孰之子挾册而歌曰景成謨兮閣鳯翔猗作新兮文溯光員增廣兮勸就將維夀考兮作人長子襟青兮民之望仁有造兮峩奉璋旗莊編户之衆操業而歌曰堯留韭兮禹留糧嵗四釜兮胥樂康曽孫甸兮富豫藏蠲復蠲兮箱斯倉稱萬夀兮隮公堂騖孝弟兮力田韎韐袀服之士擊刁斗而歌曰右鈕勘兮左斐蘭維􅋃矢兮夙所便德威鬯兮包垓埏偃玉鈐兮職負籣備不虞兮於久安旅嘽嘽兮武桓桓奏爾能兮皇情歡優糈廩兮九府圜酬渥惠兮孄軍團齯齒鮐背之叟奉粟帛而歌曰牢執豕兮酌焉匏享泰平兮如春醪近天顔兮承嘉褒祝聖夀兮天髙高億萬嵗兮偕欣翹飛翠華兮曵雲梢矜疑省釋之徒脫縲絏而歌曰圜之土兮福之堂犯有司兮惴不遑堯曰宥兮踰所望劌自懲兮順棐常懿景爍頌聲作猶且循枌社考茨椽敕萬幾酌民言裁豁山而涣號㸐霞綳以披章勤勞七起紹衣詮詳維巡之初賦以昌之義用昈彰長言不足詩以永焉總再至三至四至而家法治法彌闡大黋繫年駢輯申命天潢蓋勸九歌俾勿壞之義也沛宫父老南陽故舊依戀翠蹕雲瞻日就皇上府鑒藎誠玉鑾為之宿留乃履疊道之坦蕩摹戰圖之阻囏班􅛬秩州邐迤入關翼翼舒舒循薊門而朝乎東陵禮率初孟冬既望蹕旅京師告藏事於祏室謂通於神明光於四海者也緒業肇篤丕丕基聖有謨訓信如四時剬雅輯頌炳蔚來茲彼重來上陵之典奓敶神怪推媺漢儀以昔視今若白芨之料大椿不已乎乃𢋫載歌曰闥門基祥存原巘焉翊衛陵園視京輦焉仁祖勤止訏謨顯焉聖皇丕繩甄美善焉於萬斯年繹成典焉表恭進盛京通志表汪由敦臣等奉敕纂輯盛京通志恭呈欽定繕寫告成臣等謹奉表恭進者伏以皇猷建極瑶圖尊天作之區聖治崇文寶册煥帝臨之宅載堯封之井邑秀孕丹陵記漢服之川原祥鍾白水萬世丕基鞏固一時巨典光昭珥筆為榮垂紳共慶竊惟泰皇畫野制八土以居方顓頊分疆度九區而定地逮版章之益廓侯甸星羅遂志乘之紛傳簡編日積姒王治水廣搜嶽瀆之竒伯益作虞逺志海山之怪定職方之掌職在周官輯地理之書昉之班史諸道成經於隋代兩京續紀於唐時宋改軍州志太平之寰宇元臨中夏紀混一之方輿他如咸陽三輔之圖以逮曼倩十州之記敘桂林之風土亦偹參稽識荆楚之嵗時且資考鏡莫不垂之故府藏以名山况夫景命方隆載溯發祥之地神臯永奠逺維肇迹之邦瞻松柏之丸丸亳都作頌撫枌榆之厯厯漢社標名啓運鴻篇令典成於勝國承天大志嘉名號曰興都厯披往籍之遺快覩熙朝之盛欽惟皇帝陛下功齊幬載德協苞符探星影於河源化孚有截覽日華於海島光被無涯固已萃一統之車書偹萬邦之圖籍乃念瀋陽之域實為王氣所鍾遡肅慎之分封暨公孫之割據貞觀耀兵於唐壘明初設衛於開原沿及本朝巋然都會鴉青啓瑞河山開百代之基鴨緑凝祥風雨壯三韓之勢比周京之岐軍梓木千尋擬唐室之晉陽李花一樹顧此秀靈之壤可無紀載之編乃前朝之舊志雖存既嫌荒略昭代之成書具在復涉煩訛爰降明綸重修善本期體裁之簡當載筆綦嚴約部分於整齊操觚特慎發凡起例規撫悉稟乎睿裁别類分門托採盡衷於欽定首登聖製如尚書之冠典謨次列京城若下武之歌豐鎬由廟壇而陵寢挈領提綱繼星土與山川辨方正位郡統邑而京統郡人次地而物次人自户役以迄兵防經綸大偹由忠孝遞推列女幽顯咸昭風俗淳龎兼法輶軒之採藝文典貴並供石室之儲韶律頻更韋編幾續志龍興之重地纂成適遘辰年垂虎炳之𢎞文書就先呈乙覽銀州鐡嶺皇哉全盛之規玉軸牙籖允矣不刋之典臣等才慚吐鳯學愧囊螢欲賦三都徒搆思於十稔未窺八索敢托業於千秋幸承訓示之詳得卒編摹之役按圖改證如逰石紐之鄉執管鋪張恍見玉瑶之舊伏願珠囊朗揭金鏡高懸念櫛風沐雨之勤無亡繩武思航海梯山之盛更切詒謀咏流火於吹剝棗烹羊懷舊俗溯胥原而􅕾巘酌匏執豕繼休風將見龍負王舟重集萬方之玉帛龜呈神籙再凝五福於圖疇矣臣等無任瞻天仰聖激切屏營之至贊御製盛京賦贊癸亥汪由敦丹陵蒼蒼京邑煌煌我皇至止龍旗洋洋肆覲橋山祀事孔明載臨鄷宫有秩其容以朝以晏以詰戎兵儀舉禮偹風翔恩滂爰灑宸翰經緯宫商摛藻雲漢濡毫溟滄含跨東馬陶鑄班提筆不停綴蔚為天章昭示萬古何天之龍傳觀駭汗盥誦激昻敬勒筠篆冀託無強跋御製盛京賦恭跋癸亥汪由敦臣等伏蒙皇上宣示御製盛京賦三千三百餘言臣等依文輯注統若千萬言仰見睿藻矞皇輝麗雲漢函宇宙綜古今炳典謨鎔圖籍自書契以來著作之府鴻章巨篇未有盛於斯者也洪惟我皇清凝受寶命奠億萬載丕丕基肇迹神皋撫臨中夏發祥流慶實始盛京臣等竊嘗誦詩周文公召康公推述先王先公之始基靖民自有邵􅃮沮皇澗過澗陟降原隰以至作豐遷鎬築城度室之事皋門應門靈臺辟雍之宏規於耜築場索綯祭韭執豕酌匏之故俗微而松柏厲煆周原堇荼園鹿潛魚偹形於雅頌凡以明著祖德遐暢皇風薦扶輿之嘉祉鞏繼序之永圖豈徒侈都邑之隱軫誇陸海之膏腴鋪張炫耀藻賁觚翰云爾哉欽惟我皇上纘列聖之宏緒際三登之景運聿修懿典時邁舊京偹法駕奉金輿罄厯載之積誠謁橋山而展孝禮成肆覲會同有繹以燕以賚中外禔福望幸之黎庶聞和鸞而歡呼扶杖之耆老瞻翠華而相慶祖宗之靈斯格臣民之和允洽於是本覲光揚烈之忱溯基命造邦之統攬形勢之渾雄仰宫闕之素檏𬗟英賢之勳績懷德化之忠厚華實之毛充牣澍濡之澤鴻龎穆然逺念知夫天作帝省之勤所以孕虞育夏甄殷陶周者厥有所事爰抒寶墨掞奎章思若湧泉筆不停綴勒為斯賦垂示無極乾坤之容日月之光雲霞之采海山之藏覩化工而雕繢纂組不足以為色聞韶濩而鏗鏘考擊不足以為聲彼研京十年練都一紀者曽何足以仰企萬一哉臣等徵金匱之祕稽延閣之儲旁羅四庫綴緝二酉疏舉徵引多慚漏略附名簡末榮以為愧臣某等敬跋御製薩爾滸書事恭跋戊戌于敏中臣聞之書云皇天無親惟德是輔春秋傳云師克在和不在衆伊古經營締搆厥軌咸具其有能天人叶謀者蓋寥乎罕紀焉洪惟我太祖高皇帝受天明命肇造區夏時則有若薩爾滸之戰以我有衆數千蹙明兵四十萬神策協幾心德合一若林之旅罔有敵於我師於是蹂之尚間崖膊之斐芬山翦之阿布達哩岡殪厥大帥殱其士殆盡浮􅟆塞川喋血殷野走葉赫降句麗曾不越五旦晦而剗無遺孑若摧枯振蘀之昜臣嘗稽揆史册惟漢光武昆陽一戰為得天助然光武猝與敵遇會大雷雨幸以成功孰若是役之屢戰克捷我武既張若反風揚沙之異天特於終事時假以示應固非昆陽之戰所可同日語矣我皇上繹恩祖烈祇迪前光追維櫛沐之艱難丕顯成謨非漢唐開國所能及爰紬金匱石室之書親御丹毫臚詳紀實於赫神功維聖克述凡欽承之本念蓋一篇三致意焉亘古未有之偉烈緯以亘古未有之大文俾天下後世咸知國家集勳垂統震爍古今其至於億萬年永無斁以鞏我丕丕基而我皇上嗣服纘圖義征不譓機鈐獨斷默契傳心所為以守兼創者其凝承固有所本耳惟是鴻文副在祕閣海內無由悉覩臣不自揣量輒盥録一通刻諸貞珉昭示無極而臣區區欽服微帎亦籍以抒寫萬一云欽定盛京通志卷一百二十八
