body:
  text: 國朝藝文十三記一欽定四庫全書欽定盛京通志卷一百二十七國朝藝文十三記勅建䕶國寺墖記崇徳庚辰剛林夫幽谷無私有至斯響洪鐘虚受無叩不鳴而况於法身圓對規矩㝠立一音稱物宫商潛運故如來利見迦維託生王室憑五衍之軾拯溺㳺川開八正之門大庇交䘮法力維持乎八極慈威鎭攝乎羣魔大智靜㴠靈源普挹聖主道濟蒼生化隆無外念兹功徳允合瞻依特敕工部遴委喇嘛錫伯札綽爾吉弼勒圖朗蘓相為度鳩工盛京四面各建莊嚴寳寺每寺中大佛一尊左右佛二尊菩薩八尊天王四位浮屠一座東為慧燈朗照名曰永光寺南為普安衆庶名曰廣慈寺西為䖍祝聖夀名曰延夀寺北為流通正法名曰法輪寺各立穹碑永垂來禩銘曰皇圖肇啓寳域宏開仰兹佛日躋扵春臺雨暘時叙國無祲災三途靡忒五福斯來銀岡書院記康熈乙夘郝浴鐵嶺古銀州也浴甲午九月謫奉天戊戌五月下嶺卜築扵南門之右方十許畝中為書屋三間前有圃種蔬後有園種花左壁吾卧室也右壁一帯皆吾友連屋而居也屋中造甓床一丈風月之夕吾友畢來登牀趺坐床下鑽火烹茶漉酒縱談名理至夜分不散架揷天下古今圖書恣吾友展玩有化人來則焚香晤對參騐竺乘屋後一岡隱然龍卧所謂銀岡者也雨後登之見郭外羣山紫翠交冩其北山錦亘西繞而東山迤邐南屬簇擁萬狀中控一背是為鐵嶺然總維於一線之銀岡殆物之鼻祖者乎吾岡下所種桃李皆數度開花而成實矣所舉二三子亦裒然冠而似丈夫矣吾歸之嵗嵗徳在邜西牕北有杏一株發花數十蓓如蠟撚白梅香色䨇絶而花枝婉轉皆回頸西視是皆不足記獨念吾霜天雪夜一燈炳照大靜之餘徹四壁扵環海晤羣聖扵斯須截然有覺心目為豁於戲非吾銀岡吾安得有此一日也非吾至尊又安得有此銀岡之一日也泣撫銀岡留為書院有踵至吾岡而黙識浴一日之㫖者浴即近待於數十年逺待於千百世心皎然如一日也封長白山記康熈丁巳方象瑛康熈十有六年四月望日上以長白山發祥要地特命内大臣覺羅武穆訥一等侍衛兼親隨侍衛費雅什一等侍衛塞䕶禮等扵大暑前馳驛往五月四日啓行十四日至盛京二十三日至烏拉宣諭鎮守將軍等召村莊獵户皆無知長白者都綂尼雅罕族祖岱穆布魯世採獵以老退閒自言祖居額赫額音聞其父嘗云獵鹿長白山負以歸四日可抵家以此度之長白與額音距當不逺因問額音路幾何獵户噶拉達額赫等曰陸行十日水路乗小舟二十日乃命獵人喀喇前導各持三月粮又慮食盡馬乏不能歸也期將軍巴海載米一舟候於額音於是噶拉達額赫等由舟覺羅武穆訥率薩布素由陸六月三日啓行經温徳亨河防虎山庫勒訥林竒爾薩河温都河布爾堪河納丹佛勒地方輝發江發河穆敦林巴克坦河納爾琿河敦敦山扎倫果河几數十處抵額音而噶拉達額赫等亦至葢自江逆溯由呼努瑚河至佛多和河復順流來㑹纔七日耳十一日發額音一望林莾迷不得路薩布素率旂甲二百人伐木開道十二日悉衆行是日薩布素遣顧愫等先後馳報前進約百數十里登一山升樹而望遥見逺峯白光片片殆長白山也因留噶拉達額赫等督米珠蚌十四日與薩布素等㑹密樹茂林揣摩開路十六日黎明聞鶴鳴六七聲雲霧迷漫不復見山乃從鶴鳴處覔徑得鹿蹊循之以進則山麓矣始至一處樹木環密中頗坦而圓有草無木前臨水林盡處有白樺木宛如栽植香木叢生黄花爛漫隨移駐林中然雲霧漫漫無所見也衆惶惑前誦綸音禮甫畢雲披霧捲歴歴可覩莫不歡呼稱異遂攀躋而上有勝地平敞如臺遥望山形長濶近視頗圓所見白光皆氷雪也山高約百里五峯環繞慿水而立頂有池約三四十里無草木碧水澄清波紋蕩漾繞池諸峯望之摇摇若墜觀者駭焉南有峯稍低宛然如門池水不流山間則處處有水左流為松阿哩烏拉河右流為大小額音河瞻眺之頃峯頂遊鹿一羣皆駭逸惟七鹿忽墜落衆喜曰神賜也葢登山適七人時正乏食拜而受之回首望山倐復雪霧遂扵十八日南回至前登山高望處一氣杳㝠并不見有山光矣二十一日至二額音河合流處二十五日至阿嚕河則額音東流合處也二十九日由阿嚕庫河厯色克騰圖畢赫噶爾罕噶達琿薩滿薩克錫法克錫松阿哩多觀大江險絶處凡九七月二日次烏拉十二日抵寜古塔遍閲㑹寜諸府八月二十一日還京具疏聞上以發祥之地竒蹟甚多山靈宜加封號下内閣禮部議封為長白山之神嵗時享祀如五嶽焉夫封山之典肇始唐虞然報祀嶽瀆非有闗扵鍾祥之自也志稱長白山横亘千里高二百里巔有潭周八十里南注為鴨緑北流為混同國家龍興所自然至今無知其處者睿慮周詳穆然念祖宗所由興專官訪求備厯險異卒光大典以答神庥其享天心而致靈貺宜哉謹摭原䟽綴葺為記用志千萬世無疆之盛云奉天府文廟志康熈己未梁拱辰嘗讀班史有曰文徳者帝皇之利器武功其輔也余則以為武功者帝皇之利器所以開治者也文徳所以保治者也武功之所定者逺文徳之所化者深漢唐以來莫不皆然我太祖高皇帝之起於東陲也始以武功定全遼扵學校未遑也太宗文皇帝修建廟學而文敎聿興世祖章皇帝平定方夏首崇文治改衛為盛京設立師儒以訓子弟今皇帝即位多士克生先後繼美文明之化日隆而文廟漸起前後京兆以請時兵餉方殷増華有待猶眷眷不忘特諭守臣設法修建至康熈十八年秋拱辰再奉命尹兹土乃奉行前㫖率二府二州七縣之官儒紳士捐俸出財修治之於是聖殿櫺星門暨四周垣墻皆鼎新焉師儒得以瞻仰人士得以矜式豈非武功定而文徳興乎然予觀詩人所言景員之祥發扵殷土生民之慶本扵姜嫄則本朝之肇基必有出扵武功之先者也今也武功已定文敎復興人才扵是軰出治化扵是休隆矣然予願司敎者之求其實也夫詩書禮樂非徒以飭容觀琴瑟笙簧非徒以美聲律要以調習其性情消釋其鄙戾使之居家處鄉則有孝恭禮遜之行服官蒞政則有公忠亷仁之節斯學校為育才之區人士有治平之任不然雖實枚其磨礱閟洫其宫宇亦何益乎若溺扵文辭習扵佻達此又人才風俗所由敗壊者不可不豫為防也逰遼陽千山記康熈壬戌張玉書康熈二十一年嵗在壬戌海㝢削平慶典具舉春三月車駕至盛京告成功於列祖三陵畢謁巡蒞邊塞特敕扈蹕部院諸臣留都祗候臣玉書叨與侍從自興京奉命返轡時日休暇將徧厯州邑諏訪舊聞㑹積雨中阻不獲逺渉遼陽城南五十里為千頂山迤邐盤互夙擅竒勝望後十日持襆被杖䇿以行比過遼城獲覩太祖髙皇帝駐師築壘㩀河克敵之遺蹟又延問故老得年八十以上者二人指述舊事尤詳越宿冐雨入山既至風日開霽恣覽縱陟往返凡八日山多竒峰㠝坑稠疊不可指屈故名千頂僧寺最著者五曰祖越龍泉中㑹大安香巖志無紀載或曰唐貞觀中征高麗曾駐軍扵此語多附㑹據元皇慶中直學士陳景元撰僧雪庵塔記言僧自毉巫閭駐馬大安後移居鴨緑江復還香巖具有異蹟今香巖寺西有雪菴塔而諸山所傳名勝亦往往以雪庵著則五寺舊址雖不可考而其創建在元以前興起在皇慶以後亦可信矣夫遼陽為國家肇基重地陵宫相望百有餘里此山蟺蜒瑰異嫓之往代當在東都瀍澗西京灞杜之間而闗塞遼逺輪蹄罕及致使靈峯鷲嶺鬰而不彰臣玉書來觀欣嘆希覯隨跡所至用志梗概山不勝紀仍以五寺繫焉循遼城而南里許山色凝碧籬落類江左至八里村有梨數百株雨後吹白如雪踰石門度七嶺東南行湯泉泉近濁可滌不可飲也入山經邢崖徑路逼仄萬峯回互烏鳴樹底雜卉蓊翳梨最盛彌漫溪谷七八里不絶過南塔有官亭遺址勝國時將吏宴㳺休暇之地又數武至祖越寺寺環山而搆面俯背倚左右拱揖高輙數百仞巒岩洞石各各肖形有神人仙佛蓮月盂鉢螺髻獅象之屬惜無高人勝流持擇評品雖稱名近鄙仍而不變也由寺東縁磴而上脱㡌杖藜盤薄沙礫數百歩得巨石石形如丸圍徑以丈許兀踞峯頂凌虚聳特不欹不仄石上為松坡為石佛崖為羅漢洞洞對峙曰振衣岡磨崖大書蒼潤可愛名氏已蕪蝕畧見彷彿而已又里許厯危磴數百級至巔鑿壁為斗室顔曰無梁昔有老僧精梵律者常棲宿其地他僧處之或觸鬼物或虎嘯扵側中夜惴慄輙携軍持而下僧浩然云自祖越折而西可五百歩兩崖夾峙劃然如門既入泉流潨激泠泠如操石琴溯流而上一徑盤紆古木間植達龍泉寺聞竹鼓聲遥與泉聲應而軥輈鳥語雜㳫其中泉出寺後彌勒峯峯左有石洞方幅數尺珠光噴湧穿澗而溢寺僧截木承之刳腹類竹引入牖下有若懸溜凡祖越所見西北諸峯皆在寺東峯勢詭異險幻正側殊狀逰者心目駭蕩不諦視不能辨也寺延袤僅數畝其築室架壑皆依山偃仰有清越環映之致故山徑峭窄而取境特竒寺為故相國范文肅公舊逰地其子忠貞公所書字存藏經閣中寺僧寳而藏之出以示客結搆嚴泠如見其人龍泉距中㑹不十里山徑曠衍林隩暢蔚虎跡交錯竟日無行人晨興循龍泉東麓折而南有牝鹿十數注坂徐下僧曰此鹿就飲溪澗水耳畋獵罕至故與人狎時墮虎口至中㑹寺寺前為水閣方廣半畝夏秋之交霪潦演溢九峪之水滙注扵下閣因是得名其盛時水石交映禽鳴魚沫頗極登臨瞻眺之勝今閣久廢僅存石址而水勢亦湮塞尋所謂九谷水故道無識其源流者可為太息中㑹在五寺為簡寂禅宇剥落無復舊觀僧恥若遼陽人有學行築室數楹書史盈案龍泉西南諸山皆倚室東隅而松苔峯西峙與粥魚庵故址相望嵐氣環匝視靜而聽逺坐移時窅然深也出中㑹行十里許草樹藂宻溪流鏘然水穿石中時露時伏是為大安寺山址又里許徑路盤紆下馬拾級而上行五百餘歩徑漸平復騎距寺半里許竒峯疊嶂聳出雲表如立如踞如拱如戴孤挺峭厲率去地數千尺寺枕山之中前俯後仰萬象盤鬰入寺憇五峯丈室閣鈴松韻時發異響坐久之邀兩僧導㳺人授一藤杖循百佛堂過薛菴至瓔珞峯峯突兀無梯膝行而上有泉出石旁如盎既下入萬松林逶迤里許隱蔽日月野卉數十本色丹而妍錯互於古松之隂幽麗特甚自此山益竒徑益偪沙礫雜糅積葉盈數尺怪石怒攫下視無際心𢥠然而危乃令兩僧前挈後掖䇿杖其中同行七人穿叢莽排株朽纍纍然趾背之相錯也行十餘里至羅漢洞洞深五六丈懸崖後阻蘚壁對峙有明嘉靖中華學士察題石出洞口折而西遥望石穴如牖為雲封洞背雲封過馬蹄㠗當衆山之中南而通明北俯中㑹若襟帯然又百餘歩經石門渡嶺天風乍起山木盡號仰睇仙人臺一峯斗絶空際疑不可即循磴道徐上約數十尋至臺址左深潭右絶壁環顧諸山盡在肘腋之下臺距趾二丈許上布石枰桞桞州記仙奕山庶幾似之而其矗立萬仞之巔崚嶒竒詭飛鳥垂翼虎豹却顧海内諸山所罕覯也此峯居大安中㑹香巖之間山脈之所薈萃故逰大安者指為盡境折而下則去香巖為近於時夕陽在山隂氣慘肅不及還大安遂尋香巖而西距仙人臺二百歩有徑東南行孤峯旁突為觀音閣閣久廢而其地特勝衆山環列蒼靄畢㑹蔚然巨觀又東為夾峯元僧雪庵棲息之地峯下為洞洞口正黑傾亞不能措手足捫一穴僅容兩膝兩石離立横木其中背石履木下見深塹側身而入攀穴而出極山行之險甫出穴復對立一峯架木為梁闊僅踰尺引絙乃度夾峯之名以此峯頂有巨石有古屋有斷碑峯外道絶仍觸險出洞口厯鸚鵡石雨花臺循錦繡坡至香巖日已暝矣僧言深夜常聞虎嘯繞佛閣數匝而去遂墐户就宿曉起捫石碑得元直學士陳景元撰雪庵塔記碑覆土中百餘年掘土得之苔蘚瘢胝雜以塵垢字畫漫漶不可辨强起衆僧鉤剔滌除纎翳盡去所刓缺者纔七八字文載雪庵始末甚詳字體亦遒潤諸寺碑版之文此居第一由山後循舊徑度嶺又尋别峯東過䨇井撫朝陽寺碣折入松林經大安而返千頂勝概以大安為最而山徑竒特實在香巖大安交㑹之介以道出諸山之背邃奥深隱故多見側勢登覽者惮其僻逺往往避險而就夷皆未能窮極兹山之勝者也廣寜縣義學記康熈庚申項蕙蕙以庚申正月莅廣寜再閲月規治東隙地將誅茅為舍招邑子弟而延師敎之邑之父老似有疑而議者蕙悉其狀集諸公廨而問之曰吾儕小人誠不知治要竊見號神君者雖多殊績大抵不過急所當急緩所當緩而已矣我公下車勵精圖治以休息民力為心乃聞割清俸誅茅為舍以敎邑子弟是近迂非所望扵我公也余曰必何務之為急曰敎民稼穡力作貿易使勿興訟而耗財余曰若軰何知急其所緩正以急其所急也試畧言之吏治衰則民風敝而民風之敝不敝扵椎魯鄙模之氓而敝扵聰明才智之士椎魯鄙樸者或農或工或商即上之人不以督迫亦從事焉唯聰明才智者敎之農或越其畔敎之工或躍其冶敎之商或折其本彼之聰明才智心有所弗屑也其父兄初或溺而縱之繼雖不欲縱業已成習放蕩不可收拾呼朋引類忘三餐所自來視六愽為正業招尤啓釁蕩産傾家其為害一也又煽惑彼椎魯鄙樸者為其所為相率而從惡以致夫不之督迫而業農業工業商者竟日加督迫而不農不工不商矣游惰滿街滛酗成俗究厥病源實為戎首其為害二也况又不但不農而為之辭曰地瘠不但不工而為之辭曰力殫不但不商而為之辭曰貧無母曷子焉久則地不糞真成瘠矣力不用坐成殫矣家無以為生貧果徹骨矣夫乃縁餬口之艱難致輸公之濡滯為乾餱之過失起雀䑕之忿爭其為害三也嗟乎幸而生聰明才智之子弟是人所禱祀而求者而其為害至此無他不學之過亦不使之學之過也使之學則彼方澤身禮義之林奮志勲名之路翹翹自命曰吾士也向被其煽惑者榮其若是亦欲從為士而不可得不得不歸而各業其業從此四民莫不見義而遷家給人足比户可封矣蕙之欲為舍以敎邑子弟者職是故也在所緩耶急耶諸父老乃悦欲子來其事余不可爰興工於三月十二日乙丑落成扵三十日己未舍三楹苫以蘆垣以甓西依縣治東面龍山弁其門曰義學而典史邢君式巡檢秦君涵亦與有力焉異日者踵事増華尤余所望也因筆其經營之始事而勒諸石奉天府學兩廡記康熈壬戌高爾位國家以人才為本而人才以敎化為先自古培植人才靡不以學校為亟亟况龍興發祥之地將相名臣先後蔚起則宫牆爼豆之規有司又安敢不加之意哉位自順治丁亥叨列仕籍歴躋京尹膺豊沛之重任思廣植户口以培元氣凡無藝之征侵漁之弊以次釐剔夙夜兢兢與諸僚屬飲水茹蘗庶幾杜苞苴而絶耗羡仰報皇上加惠元元至意恭惟我太祖高皇帝以武功肇基遼左逮太宗文皇帝纘承鴻業建修文廟世祖章皇帝撫御區夏以瀋陽為盛京設京兆立州縣置師儒扵時從龍碩彦彬彬濟濟我皇上臨雍誦學尊禮先師可稱盛矣惟是奉天文廟肇創之初大殿雖已告成而兩廡尚未營構夫崇祀先哲所以式後進也恢宏廡廟所以肅瞻觀也邇者皇威赫濯干羽兩階聲敎四訖行見比户絃歌盛扵曩時式廓前規尤在今日顧念長吏俸入僅足養亷文武青衿率多貧士又難以營度之功重煩我父老子弟於是獨捐薄俸飭材庀工補建兩廡各三楹列諸賢之主而祭器亦具焉多士瞻仰之餘庶其景行往哲濯磨砥礪以襄聖天子升平之治乎是役也肇扵壬戌七月至九月告竣謹勒諸貞石用垂不朽開原縣文廟記康熈壬戌周志煥厯觀世之盛也比户絃歌崇儒明道必自學校始鄉學三代異名國學遞仍其號鄉學即今之郡縣學也論道明倫接洙泗之淵源續斯文扵不墜養老而敎射尚徳而毓才無不出於是也典最盛矣值今聖天子稽古右文躬親釋奠經筵講學博徴碩儒聖賢之道昭明于世誠唐虞三代之時也近又奉俞㫖敕滇黔諸省各官創建學宫使山陬蠻瘴之區得沾聲敎矧畿輔近地鑾輿臨幸若開原者而文廟茅茨不翦土階湫隘豈所以尊崇先聖之意乎但斯邑建立未久前任何公金序披荆剪棘剏茅屋三楹奉祀先賢繼任劉公超凡復立櫺星門外置左右二坊規模已備惟兩廡神牌俱未之設煥司牧是邦踰越二載心懐修葺力不能逮今敬捐資購工以瓦易茅餙聖殿而重新之置四配十哲兩廡先賢先儒神位葢欲為荒邑尚斯文之統以覲揚我皇上文治之盛即瞻仰宫牆者或亦有所感發焉重修奉天府學宫記康熈己丑廖騰煃王化非聖道不行聖道非王化不久王化洽則孔子之道益尊聖道尊則王者之化大啟故建學明倫所以崇道統正人心而廣治化於無窮者也粤稽奉天自太祖高皇帝神武建基太宗文皇帝式廓隆業創興學校世祖章皇帝統一區夏文命誕敷今皇上天縱聖神徳威翔洽無逺弗届仁義漸摩無思不服編户之子釋耒横經羽林之士投戈講藝詩書禮樂之盛四方郡國皆然矧奉天為發祥首善之地設學以來雖規制漸増而二十餘年未遑修葺其何以仰副我皇上崇文重道之至意顧念遼左沃野千里生聚日滋騰煃以謭劣材承乏京兆亦惟是勞來拊循之不暇其又何忍以兹役重煩我父老子弟為爰捐俸入不足謀之同事諸鉅公不足謀之諸長吏謀之諸紳士僉樂相予志遂鳩工庀材自聖殿而啓聖祠而兩廡而廟門而明倫堂胥巍然煥然此皆昔圮而今修者也殿以外繚垣奕奕廟以前㦸門峩峩又皆昔無而今有者也經始於康熈四十八年七月十三日落成扵康熈四十九年閠七月初十日計工五千三百有竒計費一千一百二十兩有竒役成而遊聖人之門者共知聖道之大將伯之助其可冺歟夫明政刑正風俗者天子之化也謹庠序飭倫紀者孔子之敎也今學校之振興若此滿漢士子服習其中優㳺徳敎人文蔚起不將與鎬京鐘鼓並美千古而不朽哉謹彚襄事諸賢鐫之扵石俾後有可考因并記之以詔學者重修銀岡書院記康熈乙未屠沂復陽郝中丞留居時所築室為書院公之自記備矣重修者誰邑今焦君釐正之宋令光大之也余惟天下之書院多矣惟嵩陽白鹿嶽麓石鼓四書院以大稱豈高閣周建長廊四起云爾哉葢大其人故大其書院也余讀公之文章想公之行事而有以識公矣公學探理窟才蔚國華嶽嶽懐方不移不屈前後厯任政績昭然而直言敢諌則吕獻可之先見范景仁之勇决殆又兼之矣顧公﨑嶇龍塞二十餘年讀書深造味道之腴有大過人者觀公之自記非眞聞道者而能言之乎後人登公之堂因依手澤有能識公之旨證公之心或聞風興起薰其徳而善良鄒魯文物近在海隅以成聖天子夀考作人之化則是公有大造於此邦也兹鐵嶺片石即與嵩陽白鹿嶽麓石鼓四大書院而五焉奚不可也夫興行敎化守土之責也表彰前哲後學之事也今余忝京兆後又與司空中美君為同垣友扵公為子姪行故因宋令之修復書院為文以記之宋令者誰江西鄉進士一驤也有善政與邑廣文何師曾者共襄斯舉則其人可知矣錦州府文廟記康熈丙申馬鍾華錦郡之有學葢即明之中左屯衛學也攷之誌書創建扵正統元年繼増修扵成化隆慶間嗣是廢修無常泊明季兵燹之餘學宫遂湮沒扵荒烟蔓草中矣今上龍飛之三年以錦州為府而府學復設郡伯宋公因遺址而重建焉凡殿廡祠堂門坊池橋之屬釐然具舉但厯年已久棟摧瓦解砂礫滿地蓬茨盈堦過者每興茂草之嘆余下車之始目覩心傷每與錦令周君議欲更新之適年值荒䘲物力維艱姑少待焉前大司成尹公入廟瞻禮不禁歎息曰廟貎傾圮若是非所以重道而崇先聖也遂慨然有捐修之志夫致仕者尚鋭意從事况余職守兹土則是役烏可已乎爰率諸僚屬與縉紳士庶或捐財或輸力無不踴躍從事經始扵戊戌之仲夏越次年秋告成構正殿三楹因舊規而加増其制兩廡各三楹啟聖祠三楹明倫堂五楹又拓㦸門坊砌亞字墻界之櫺星門舊制卑隘今易以木下實上空中高旁低壯若牌樓兩旁砌八字牆規模嚴整左右建坊峙耀通衢他如泮橋拜臺靡不盡制入其門者仰宫牆之巍煥睹芹藻之青葱而釋菜鼓篋講學行禮俾人勃勃然有希賢希聖之思洵陶鑄人才而振興斯文之盛地也是役也倡之者尹公和之者余而至於程工飭材營建措置則錦今周君之功居多云海城縣文廟記雍正戊申張士毅海邑文廟舊在縣治西南今明倫堂其故址地地既僻凹又經風兩剥蝕差不肅觀士毅以中州末學來令兹土每逄祗謁仰止庭除徘徊悚息即有更新之志恭惟我國家崇儒重道逺軼漢唐矧海邑為龍興盛地王化所昭廟貎不肅其何以振興文學對揚休命也乎越嵗丁未廣文齊公王謨秉鐸縣庠雅意襄贊並詢諸闔邑紳士等僉有同志而移建之議遂决因卜建扵新城厝石山陽逺山如屏近水若帯池擅龍蟠之勝峯環虎踞之竒地滿百弓力輸衆助工始扵是嵗八月越戊申嵗九月告成自照壁八字牆起内建櫺星門三間東西廡各三間大成殿三間因舊明倫堂為啟聖宫周圍紅牆八十餘丈越翼日迎位扵廟用特士毅偕諸紳士人等拜奠堂下朱楹丹渥廷陛崇高視諸舊制頗肅觀焉至扵祭器樂府尚須完整新甫徂徠容俟栽培不具論敬以事之始訖勒之扵石奉天試院記雍正癸丑吕耀曽拔士之必有試院非僅以壯觀瞻崇體統也葢欲覘其學者必令有以盡其長而欲盡其長者必先有以安其所奉天為國家發祥之地體重留都故與直𨽻共省而不與他府埒嵗科兩試學政之事亦屬府丞示有别也第裒集生徒每考與試不過數百人又不若直省之衆多是以昔之日未建試院皆臨期架木設棚遇風雨則不免淋衣汚卷多致草率成篇或有未盡其長之慨焉今天子御極之十有一年予䝉恩特簡來尹兹土而同榜族兄果初先生先予來視學建院之議已有成規即丞署之東偏崇舊基而廣之堂分前後塲列東西門楹井竈吏舍鼓亭三閲月而告竣葢已煥然而可觀矣約其費八百餘金果初首先捐俸各屬官紳及生童慕義者均有助而治中王柱國承徳今蔡書升則力贊而捐助為多錦府一屬亦聞風興起同時建一試院云憶壬辰嵗予世父司農坦菴公視學於此樂育人才刋有文萃一編一時紙貴猶未獲創興斯舉今果初毅然而成之夫豈非不朽之業歟予新承上恩命以左副都仍管尹事吏治民生尚需整頓仕而未優遑敢言學而不虞不文以為之記者以果初之創是學也葢欲多士之安其所而盡其長非僅以壯觀瞻崇體統已也果初行將内調甘棠之愛固能信其不朽且樂多士之相礪於有成也而予也更將竟果初之志置學田以給供膳矣欽定盛京通志卷一百二十七
