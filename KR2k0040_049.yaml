body:
  text: 欽定四庫全書欽定盛京通志卷四十五官署一盛京將軍公署盛京五部公署御史公署內務府公署三陵各官公署奉天府屬各官公署錦州府屬各官公署欽定四庫全書欽定盛京通志卷四十五官署臣等謹案古者建官分職皆有公署傳曰署者著也著其所而公廷尊瞻望肅也我國家肇基之初制度咸偹洎乎定鼎京師增設留都廨署朝夕視事足以臨民聽政臣等詳核各屬衙署倉庫及建置裁併緣起謹志官署第十九欽定四庫全書欽定盛京通志卷四十五官署一盛京將軍公署在德盛門內街東天聰六年設立六部時為吏部衙門順治元年奉裁康熙十三年重修為鎮守奉天等處將軍公署大堂三間川堂三間司房六處畨子司四間印房三間本房三間庫房四間東耳房三間儀門三間大門三間乾隆三年添造大堂二間十四年添建司務㕔三間八年奉頒御書屏翰邠豐扁額恭懸大堂倉城內西南隅康熙二十年建火藥庫城外東南隅共八間教場城內西北隅大㕔三間班房四間乾隆元年添建恩賞庫三間辦事房三間三十四年添建官兵領銀公所房四間又教場一所乾隆八年添建在渾河南大㕔五間該班房三間十一年添建炮房二間三十三年添建值月房一間官房原有五千四百一十六間係賞給官兵居住乾隆三十六年三奏明空閒塌毁者一千九百三十九間現在千四百七十間俱修理完竣八旗城門官兵值班堆房共七十八間戶部公署在德盛門內街東天聰六司年設立六部時建今因之大堂三間三司房共九間檔子房三間兩傍班房四間儀門五間大門三間乾隆八年奉頒御書宗邦㑹要扁堂額恭懸大倉六處通濟倉一百間康熙五十年建太平倉七十間新倉三十間以上三倉貯稗豆米石內倉三十間貯江米豆穀等項興京倉舊設八間康熙五十二年增建十間南館倉五間乾隆二十九年歸內務府經理銀庫共十八間草場城外東邉墻內稅課司公署外攘門內共六間官莊治事㕔三間大門一間禮部公署在德盛門內街東天聰六年設立六部時建今因之大堂五間後堂三間檔房三間司房六間千丁司三間六品官辦事房三間東西果樓各三間捒選果品房四間氷窖房三間果窖房三間土地祠一間值班房二間儀門一間大門三間乾隆八年奉頒御書典重明禋匾額恭懸大堂朝鮮使館德盛門內街東共十五間官房四處共十四間在德盛門外街西造酒醬及磨麵各工居住僧録司在白衣庵道録司在都城隍廂兵部公署在懷逺門內街西康熙三十年建大堂三間川堂五間司房六間當房四間土地祠一間驛丁房四間大門三間儀門一間乾隆八年奉頒御書陪京樞要扁堂額恭懸大刑部公署在懷逺門內街西天聰六年建順治元年奉裁康熙三年復設衙門重修大堂五間南白旗司三間藍旗司三間北黃旗司三間紅旗司三間前堂五間川堂三間儀門一間檔房三間大門三間乾隆四年添建本房三間贓罰庫三間科房三間乾隆八年奉頒御書弼教留都扁堂額恭懸大司獄司公署正房五間東廟房一間大門一間監獄城內西南隅共房二十五間重犯鎖禁于此輕犯八門羈候各設房五間工部公署天聰六年設立六部在懷逺門內街西順治元年改設德盛門內街東大堂三間川堂五間左右司房八間檔房三間儀門一座大門三間班房四間乾隆八年奉頒御書飭材山海匾額恭懸大堂庫銀庫五間鍋庫二間大堂南邊顔料庫正房三間匠作房三間大堂後紅土庫四間東廂熟鐵庫四間火繩庫四間西廂廢鐵庫四間綿麻庫三間紙庫三間又庫催住房十三間庫催四名樓軍十八名織造庫在懷逺門內東南樓房五間平房三間匠作房五間檔房三間門房一間火藥庫十間班房三間在大東門外萬泉河南邊墻內繕本官房七間在福勝門內街東秫稽厰城東南邊門內厰軍班房三間厰軍十四名御史公署雍正四年設大堂三間儀門一間大門一間班房五間內務府公署在大清門外東西房六間文書房一間東樓房五間南北廂房七間崇德三年建順治元年改為內務府辦事公所倉在衙門後二十八間庫大清門內樓七間轉角樓十間織造庫在銀庫後東三間西六間綿花庫三間鐵庫三間永陵總管公署三間掌關防官公署三間在西堡冰窖在東堡酒房六間醬房三間粉房三間麵房六間碾房三間黑牛館二十八間乳牛館三間福陵總管公署三間檔房三間掌關防官公署三間東西檔房五間碾房二間乳牛館三間牛犢房二間夀康太妃園寢碾房一間乳牛房二間昭陵總管公署三間檔房一間東南三里掌關防公署三間碾房三間乳牛房五間懿靖太貴妃園寢碾房一間乳牛房二間奉天府府尹公署在德盛門內街西順治十四年設大堂三間川堂三間書吏房六間內宅八間廂房書房賓館各三間儀門一座大門三間班房二間府丞公署在天祐門內街西康熙三年設大堂五間內宅五間東西廂房四間書吏房六間大門三間儀門一座三十九年府丞屠粹忠增建土地祠一間五十九年府丞任奕䥸建東書房二間試院在府丞署東大門三間儀門一座東西考房各三間大堂內宅各三間東廂房二間照壁一座東西轅門二座鼓樂樓二間碑亭一座雍正十二年府丞吕文櫻倡率官座紳及生童等捐修乾隆四十二年府丞李綬添建箭亭一治中公署在撫近門外街東大堂五間內宅五間治中乜承聖重修內宅正房五間宅後廂房三間羣房八間堂西科房二間堂外東廂房一間西廂房二間大門一間又南一間係治中王杜國建乾隆四十三年增建川堂五間儀門一間通判公署在天祐門內街東康熙三年建大堂三間川堂三間東西科房各三間班房六間書房三間庫房二間內宅住房三間儀門一間大門三間土地祠一間乾隆三十八年添建住房五間