body:
  text: 物産五穀類衣被類食貨類寶藏類蔬菜類草類木類花類果類欽定四庫全書欽定盛京通志卷一百六物産臣等謹案遼瀋古稱上腴赤玉美珠傳自漢紀扶餘之鹿率賓之馬湄沱之鯽東海之俊禽以及嘉榖靈草豐貂之屬備載前史我列祖龍興東土王氣所鍾百物阜昌伏讀御製土産諸什飛潛動植之靈林麓山海之産益仰見國家培飬之深土風之厚謹志物産第三十六欽定四庫全書欽定盛京通志卷一百六物産一五穀類穀後漢書夫餘傳土宜五穀挹婁傳有五穀辰韓傳土地肥美宜五穀束沃沮傳背山向海宜五穀善田種北史高麗傳人稅穀五石一統志穀有名西畨者高麗者皆奉天等處産焉西畨穀苗高如蜀黍穗如蒲髙麗穀火紅色如雞冠高丈許實如栟櫚子取粒作粥香美舊通志穀米有大小二種最大者曰沙穀粒最尖者名芝麻穀乾隆四十三年有御製盛京土産詩十二首一五穀恭載天章門粱較穀米粒大兼有黃白青赤諸色白粱即詩經之芑赤粱即爾雅之藁今統曰粱粟新唐書黑水靺鞨傳有粟麥細今按古以米之有稃殼者為粟今以穀之最而圓者為粟殼曰飯穀米曰小米考周禮九穀六穀之名有粱無粟則粱亦粟也今之小米色黃即黃粱也奉天錦州以此充賦粟秸八旗以上之官稷周禮職方氏東北曰幽州其穀宜三種注三種黍稷稻北盟會編同州地宜穄黍明一統志作穄今呼糜子米晚種早熟邊地尤宜黍稷之粘者為黍今呼大黃米可釀酒米粉充貢蜀黍種始自蜀今呼高糧土人率多飯此漚為米粉食品所珍嵗以充貢又蜀黍入麯燒酒供祀私燒者禁黍秸有工部壯丁交官黏蜀黍一種殼黃一種殼黑與蜀黍無異但性黏又一種笤帚黍性亦黏穗長可為帚稻新唐書渤海傳有盧城之稻青按稻即詩之稌有紅白二種出遼陽者色微味尤香美號遼陽青黏稻即糯米亦稱大米性黏味甘香嵗有常賦內務府亦以供祀按黏稻可釀酒亦可為糰糦糗等食所用頗贍漚為米粉食品尤珍秫爾雅謂之衆色赤性黏今稱小黃米亦有色黑性黏者小麥北史勿吉傳土多粟麥穄性按小麥即詩之來黑龍江所産色最潔白復宜入麵可充貢大麥即詩之牟奉天錦州大小二麥夏無霧雨則收蕎麥伏種秋收以黑龍江為良更三四磨者白如雪嵗取充貢愛琿麥麵甘香勝中土所産作餅鬆美穬麥有二種一類小麥而大一類大麥而大黑龍江多種之呼鈴鐺麥麵亦充貢稗宜下濕地术最甘滑出黑龍江者良嵗以充貢粳稗多生粳地味甘滑如粳土人以為粳所化亦以黑龍江所産為佳玉蜀黍莖葉似蜀黍子藏包中俗呼包兒术內務府漚粉充貢薏苡俗名草珠子米入藥曰薏仁出錦州者尤潔白而粒大蘇爾雅謂之桂荏今有紫白二種收子榨油通用京省脂麻即油麻俗呼芝麻萞麻子斑紅如牛蝨者可入藥黯花者俗名大麻子二種俱可榨油火麻雄曰枲雌曰苴子曰黂可榨油皮漚之為線麻內務府以收于官大豆古謂之菽今分黑白黃褐青斑諸色旗地及民丁賦用黑豆小豆有黧白赤黃黑數種赤者入藥緑豆粒粗而深緑者為上粒潤而淡緑者次之豌豆爾雅謂之戎粟遼史謂之回鶻豆合有大小二種蠶豆以蠶熟時有之呼按豆中惟此無枝蔓亦樹豆豇豆莢必雙生有紅白二種長而肥者充蔬皮薄者秋成食子名打豇藊豆色亦不一白者入藥菜豆如扁豆而莢長者可為蔬刀豆酉陽雜俎㯺浪郡有挾劍豆莢生橫斜如人挾劍即今刀豆雲豆種來自雲南而味更勝俗呼六月鮮衣被類棉新唐書渤海傳所貴者沃州之棉今遼陽蓋平海城亦多種棉內務府設有棉莊貢棉紡絲機匠織家機布染青藍大紅諸色入貢事按海城蓋平宜棉收時尚行逺省使旗民盡機杼不必待江南山東之布自然足衣矣絹北史百濟傳賦稅以布絹絲麻今復州寧海近海之處間有養蠶織絹者繭紬山繭所成海城蓋平復州寧海俱出亞於山東新唐書渤海傳俗所貴者龍州之紬又新羅傳開元中數入朝獻朝霞紬魚牙紬布後漢書挹婁傳有麻布東沃沮傳其租稅布馬韓傳作綿布辨辰傳作繅布晉書肅慎傳績毛以為布北史高麗傳人稅布五匹新唐書高句麗傳衣布帛及皮新唐書渤海傳顯州之布宋會要新羅出大小布毛施布金史地理志遼陽産師姑布契丹國志女真土産細布寧江州𣙜場以麻布為市大金國志女真惟多織布今奉天等屬亦有績毛為布者食貨類鹽濵海州縣出海邊鹽場有煎鹽有曬鹽寧古塔黑龍江有土鹽會典沿海之地皆民自煮鹽市易凡鹽場二十以州縣佐二官司其場務不𣙜不幾今內務府及户部有鹽莊上鹽備用此外發祥重地永無鹽課以又相傳東北邊門外有鹽生木皮特優恤之也上者東周禮職方氏東北曰幽州其利魚鹽後漢書沃沮傳其租稅鹽北史勿吉傳水氣鹽生鹽於木皮之上亦有鹽池新唐書黑水靺鞨傳有鹽泉氣蒸薄鹽凝樹顛五代史女真其南海曲有魚鹽之利金史遼金故地濵海多産鹽上京東北二路食肇州鹽率賓路食海鹽臨潢之北有火鹽濼烏爾古實壘部有鹽池皆足以食境內之民大定二十一年併遼東等路諸鹽場為兩鹽司各行其地北京宗錦之鹽行本路及臨潢府肇州泰州之各與接壤者亦預焉二十四年帝在上京謂丞相烏庫哩元忠等曰舊率濵以東食海鹽夫餘瑚爾哈等路食肇州鹽初定額萬貫今增至二萬七千若罷鹽引添灶户庶可易得二十五年還自上京謂宰臣曰朕聞遼東凡人家食鹽無引目即以私治罪細民徐買食之何由有引內罷遼東鹽使司元史遼陽之鹽太宗丁酉年始命北京路微收課稅所以大鹽泊硬鹽立隨車隨引載鹽之法每鹽一石價銀七錢半帶納匠人米五升癸卯年海蘭路嵗辦課白布二千匹率賔路布一千匹至元四年立開原等路運司三年禁東京懿州硬鹽不許過塗河界明一統志鹽生樹枝上亦有海鹽茶明一統志州衛出今海城諸山中亦有産土茶者土人採以為茶特味精而薄銅元史産銅之所曰大寧至元十五年撥採木一千户於遼陽錦瑞州採銅硃砂水銀在北京者至正十一年命以率賓人户於濟喇敏之地採煉鐡後漢書辰韓傳凡諸貿易皆以鐡為貨三國志辨辰傳國出鐡用鐡如用錢新唐書渤海傳所貴者位城之鐡遼史銅山縣産鐡撥户三百採煉隨征賊輸今各州縣皆有之水銀宋會要新羅出水銀元史産硃砂水銀之所遼陽省曰北京倭鉛一統志出錦州煤出本溪湖諸山生者曰炸子煉去濁煙者曰煤子可代柴炭硝城土熬成皮硝可攻皮芒硝可入藥火硝備軍需又南地亦可熬鹼內務府有城莊蜜一統志出奉天以東吉林諸山中契丹國志女真土産蜜蠟寧江州𣙜場市蜜蠟蠟一統志産黃白二種皆可用石弩周時有楛矢石砮晉書肅慎傳有石砮其利入鐡明一統志黑龍江口出名水花石堅利入鐵可作矢􅻞土人將取者必先祀神今用者少安石出混洞江北岸松榆樺等枯枝落水沒灌既久堅黑如石可以礪刃緑礬俗名黑礬煆赤曰礬紅俗呼紅土與山中白土黑土俱備黝堊丹艧之用寶藏類金元史産金之所遼陽省曰大寧開元至元十三年於遼東雙城採金册府元龜天寶七載黑水靺鞨獻金銀契丹國志女真土産有金銀寧江州𣙜場以北珠生金為市明一統志出雙城按遼雙城縣今鐡嶺界銀元史産銀之所遼陽曰大寧延祐四年遼陽惠州銅洞三十六眼立提舉司辦銀明一統志海州衛出銀嶺按銀冶之制始自渤海於鐡嶺置銀冶故鐡曰銀州今以發祥重地不復採取東珠後漢書夫餘傳大珠如酸棗北盟録宋崇道熙寧之間競尚北珠北珠者北中來𣙜場相貿易出遼東海汊中每八月望月色如畫則珠必大熱乃以十月方採取珠蚌而北方沍寒九十月堅氷厚已盈尺鑿氷沒而捕之元於史産珠之所曰什達勒達又至元十一年命松阿哩江愛琿江採珠今出混同江及烏拉諸江河中生於蚌蛤大可半寸小亦如菽採珠者以四御製盛月往八月歸正月入貢乾隆四十三年有京土産詩十二首曰東珠恭載天章門玉後漢書夫餘挹婁傳出赤玉三國志夫餘挹婁傳出赤玉太平御覽挹婁出青玉契丹國志女真土産玉一統志寧古塔出青玉今烏拉寧古塔赤玉不多見也凍青玉則間有之或云輝山洞中有玉脈出白玉然不能得也松花玉亦曰松花石出混同江邊砥石山玉色淨緑光潤細􅕹品埒端歙可充硯材又有浮御製盛金石亦可為硯乾隆四十三年有京土産詩四曰松花玉恭載天章門寶石舊通志靺鞨寶石色赤紅大如栗今黑龍江嫩江諸江岸出五色石通明如瑪瑙紅圓者象含桃或取以飾念珠又黑龍江錫爾哈石可敲火佳者晶瑩如玉陜日或成形彩珣玗琪爾雅石之美者有醫巫閭之珣玗琪今不聞有此惟小凌河出錦川石有文彩可為玩人往往得之又平頂山及駱駝洞石剖之有綵文可製器玩緑端石出寧古塔諸河邊空青出黑龍江最為難得漁人間獲之必呈諸將軍酬以值遣官賫進或官辨自得者即以進御奏其名例得優賞蔬菜類葵菜北史勿吉傳菜則有葵周書百濟傳土田下濕氣候溫暖有蔬菜之屬按葵種即詩所稱烹葵及菽是也韭菜禮名豐本土性鬆浮其發芃茂山韭獨莖一葉詩六月食鬱即此爾雅謂之藿蔥春發名羊角秋種以白露金史地理志海蘭路貢海蔥山蔥爾雅謂之茖葉似藜凡山韭山蔥內務府以時採取入貢薤本草一名火蔥又有山薤爾雅謂之葝蒜小蒜本中州種大蒜張騫自西域攜歸今有紫皮白皮二種小蒜生田原間今呼為小根菜嵗以入貢菘俗呼白菜有二種肥厚嫩黃者為黃芽白窄徑者為箭捍白芥有數種俗以大芥為芋芥以馬芥為癡芥白芥子入藥芹水旱二種赤白二色藕鬆脆亞於南省紫莖味酸花白不結子俗呼野芹菜菠薐菜唐太宗時呢波羅國所獻今呼菠菜莙薘菜本草作菜蔓菁爾雅芥頭即蔓菁詩謂之葑一名蕪菁萵巨有青赤二色俗呼生菜蕓薹俗呼臭菜子可榨油莧菜赤白二種皆可茹馬齒莧本草一名五行菜以其葉青梗赤花黃根白子黑也蒝荽種傳西域俗呼香菜茴萫本草作蘹香又云內生蟲可治疝小茴香西域種也本草一名蒔蘿同蒿形氣同於蒿亦可茹蔞蒿爾雅作蘩詩於以采蘩是也今呼蒥蒿菜內務府採以入貢蕨莖色青紫末如小兒拳初生時即採入貢每嵗仍貢乾者苦蕒即詩之茶與芑也禮月令四月苦菜秀即此葉似苦苣而細斷之有白汁花黃似菊根案皆可茹俗呼曲馬菜蓼種類不一有紫蓼青蓼香蓼赤蓼水蓼木蓼馬蓼之類禮記雞豚魚鱉皆寶蓼於腹中而和羹膾蓋香蓼也今人但取蓼子生芽亦可茹花椒地寒種者頗稀秦椒結椒長於棗而上鋭生青熟紅味極辛土人多食之又一種結椒向上者名天椒鹿藿一名䝁豆莢小而薄葉大如椒芋俗名芋頭藜即藋之紅心者莖長於藋可為杖灰藋俗名灰條菜地膚爾雅謂之王蔧今呼掃帚苗嫩可茹老時可為帚子入藥名地膚子薺師曠云嵗欲甘甘草先生薺是也開細白花結莢如小萍而有三角初生可茹詩其甘如薺即此遂詩言采其蓫俗名羊蹄夏至即枯子名金蕎麥根似大黃蘿蔔爾雅曰葖蘆萉今以圓而皮紅者為大蘿蔔長而色白者為水蘿蔔子入藥名萊服又一種色黃曰胡蘿蔔批藍南方謂之芥藍葉可擘食故北人謂之批藍山藥本名薯蕷亦可入藥越瓜種始自越一名稍瓜短者為菜瓜脆者為脆瓜黃瓜種來西域今為常蔬又高麗瓜色黃形圓俗呼柿子瓜又有南瓜種出南番又倭瓜種出東洋今皆為土宜矣攪瓜形類倭瓜而小內生筋絲醬醃蜜餞皆宜食時以筋攪取出之似縷切者絲瓜瓜時以食墜之則直老則筋如亂絲冬瓜本草一名白瓜壺盧即瓠瓜也今以長者名瓠子圓者名葫蘆皆可食又有細腰者為藥壺盧小而扁者為油壺盧老而堅皆可備器用茄有海茄水茄旱茄之别色亦各異紅花菜即山丹花宋蘇軾詩堂前種山丹鐺落瑪瑙盤則今之捲丹也黃花菜一名金針菜嵗與紅花菜並為賦又白花菜氣微羶子入藥黃瓜菜氣味如黃瓜山豇豆葉潤於榆緀赤無齒其莖中空氣味頗似豇豆步連菜生野中類苦菜葉微大莖如筋甜漿菜生野中葉長色白味甘酸漿菜似羊蹄而葉細酢可食爾雅謂之飱山兒菜似菠薐而髙大葉圓鮮可茹河白菜生近水田間采食之杏葉菜又一種曰歪脖菜皆沙參苗又有鳯尾菜莖如鳯尾蘑茹一統志諸山中皆有之大而黃者佳種類不一生於榆者為榆蘑生於榛者為榛蘑而榆肉生榆樹窟中味尤美即古所謂樹雞也舊志蘑菰有凍青羊肚蒿子雞腿銀盤粉子麅子定等名嵗採厚而佳者入貢夸蘭蘑菰生齊齊哈爾城東草地內七月入市夸蘭者氊廬椸木所立之周遭也木氣入土生蘑故名色白味腴食品所珍木耳質厚味勝他産內務府採佳者入貢石耳生山石上味勝木耳一統志一名靈芝諸山中有之龍芽有二種一曰樹龍芽葉似椿而大初長刺條來年於頂上吐芽採為茹其條便枯一曰地龍芽即升麻苗葉亦相似龍鬚菜一統志出金州海濵石上叢生狀如柳根鬚長者至尺餘白色土人呼為麒麟菜鹿角菜生海邊大如鐡線分了如鹿角紫黃色乾為海錯海絲菜明一統志復州衛出海蕰葉似亂絲又有海藻色黑如髮海帶似海藻而粗俗呼海白菜昆布新唐書渤海傳南海之昆布較之海帶則細其實一類也草類檾麻土人需此為繩種之田中户部官莊以麻交稅後漢書濊傳種麻飬蠶作綿布靛一名藍草內務府設靛莊為染布之用靛花入藥名青黛茜草可染絳詩稱茹蘆即此內務府採以充貢煙草冬可禦寒土人尤多食之出撫順者佳蕓香草葉類豌豆而細叢生可以辟蠧矬草可治木器內務府採以充貢葦出海城蓋平界今有稅紅根草葉瘦而長柔韌可為繩舊例採貢人京師又有黃根草似紅根草而色黃土採之羊草生山原間户部官莊以時收交備飼牛羊之用西北邊謂之羊鬚草長尺許莖末圓徑如松針黝色油潤飼馬肥澤居人以七八月刈積之經冬不變大宛苜蓿疑即此今人以苜蓿為菜蓋名同也星星草亦曰猩猩草出山谷間狼尾草又有馬尾草俱以形相似而名扁擔草又有莠草馬房草水稗草俱生田間可飼馬章茅可苫屋黃背草層層有節可代章茅亦曰黃茅荻爾雅謂之蕭蘆一名萑詩八月萑葦一名葭詩蒹葭蒼蒼爾雅葭蘆注曰葦一物而三名也塔子頭窪地叢生其根裏土壅如小塔小青草味苦田間以之充茗燕麥粒如麥而小爾雅謂之雀麥白草可織帽寧逺州出又黃草可染黃色莎草詩南山有臺指此莖宜簔笠根即香附馬蘭似蒲而小花藍無香可染色根可為刷禮月令荔根出即此子入藥名蟊實老少年一名秋紅一名雁來紅春夏葉色青黃至秋則漸紅如花土人謂之老來變一名十樣錦香蒲蒻如笋可食茸入藥名蒲黃又有菖蒲生湖泊中俗呼臭蒲荇葉圓紫赤莖如叉股蘋四葉相合中折十字浮生水面生陵地者則青蘋也藻葉大者曰馬藻葉細者曰水藴土人呼水藴為雜草冬取食之名凍青草菰一名蔣俗呼茭草春生笋亦可茹莖中如兒背者曰茭瓜結實曰菰米一云雕胡水蔥生水中如蔥而長又名翠管可為席今但織為團扇曰蒲扇萍浮生水面或云楊花所化紫背者入藥蓬爾雅釋名云齧雕蓬薦黍蓬今人統呼為蓬子蒿如意草一名箭頭草開紫花莖實下垂似如意可療治風瘡芃蘭蔓生葉緑而厚斷之有白汁子長數寸俗名雀瓢葛藤蔓延山谷長至數丈出寧海復州等處海南人以船載去治為絺綌土人但取東物貓兒眼草葉紋如貓睛木類松山中最多種類不一土人以結子者為菜松無子者為沙松脂多者為油松赤白松理細氣香木之貴者黃蒿松松枝葉如蒿生寧古塔石向子上他處所無又有刺兒松其松多刺俄羅斯松一名老鎗菜抽薹如萬苣高二尺餘葉出層層刪之其末層葉葉相抱如毬取次而舒已舒之葉老不堪食割毬烹之略似安菘郊圃種不滿二百本八月移盆官辨分畜之冬月苞䊺以貢依竒松生吉林北依竒甸子質瘦徑少枝葉色青如松土人不知何名因所生地呼為依竒松伐為材木性燥易裂入土則裂縫復合堅如石柏多生於西北邊外柏葉柏仁皆入藥香樹莖直叢生花黃長白山中最多可焚以祭神土人取以作香生近山石崖者有節名竹節香根作箭骲頭極佳不可多得桑後燕録遼川無桑慕容廆通於晉求種江南始得按此地桑類頗多特少飬蠶者耳皮入藥曰參白皮檿山桑中為弓材及車轅葉亦可飼蠶榆本地榆類甚多皆美材刺榆花榆尤佳刺榆大者中為車軸一名軸榆唐風所謂山有樞者此也花榆埋細宜為几案凡榆臃腫處花紋尤勝可飾器用人多珍之檀色紫赤紋細潤中車轅及箭笴其交枝處花紋尤細可為小刀柄槐爾雅疏葉大而黑者名榱槐晝合夜開者名守宫槐細而青緑者但謂之槐今山中皆有之花入藥未開者名槐子可染色杜一名甘棠移接梨樹結實甚佳小刺榆葉初生鮮可茹長僅丈餘質細而堅激打鎗竿多用之青楊葉大而圓採為箭笴嵗入貢白楊如青楊葉微小皮白木宜箭笴一種生水澤者多合抱刳為槽盆性不燥裂嵗入貢櫸樹高舉如栁今呼匱栁大者可刳為舟根可為骲頭栁杯棬之屬多用之直長者採取入貢備帳房之用柳河畔赤莖栁花秬栁質堅緻可為鎗竿蠟蟲食之一名蠟條樺北史室韋傳用樺皮蓋屋鞍按樺樹皮似山桃有花紋紫黑色可裹弓及鐙諸物諸山中皆有之而嫩江混同江之間尤多內務府採樺木箭笴烏拉有樺皮屯設壯丁採皮充貢亦貢箭竿木包紋極細作碗亦佳又黑龍江樺皮船僅受一二人攜以入水遊行便捷椵葉大皮黑紋細微赤者曰紫椵邊外人參多生椵樹之下內務府所貢椵板即此質白者曰粳椵椵皮可製繩引火鎗軍中需之椿葉香可噉者為香椿楸類核桃樹其木可為鎗桿及船槳每嵗採取備用皮堅韌亦可束物樗似椿而葉臭土人呼為臭椿杻爾雅謂之皮理糾結質最堅俗呼紐筋子木大者為車軸次於軸榆栲似樗而葉差狹爾雅注種即山樗柞一名鑿子木高大堅實中為車材皮黃充貢可染色木心黃朽者可為火絨黑龍江貢木火絨即此櫟亦柞類一名栩質堅土人多以燒炭實名橡子蒂曰橡碗可染皂按櫟葉染皂佳今尚無用之者棫亦栩類不結實俗呼薄羅樹俗以五月五日取葉裹麵蒸食之謂之薄羅餅青剛栁山中皆有之亦柞類材中為弓梀赤者葉細中為車輪白者葉圓木理堅緻其色亦中木碗刀柄之用暖木明一統志海州衛出或云即黃藥木皮溫厚可墊鐙心包弓抱細者中為鞭捍又薩哈連烏拉出小暖木形類杉松木質尤堅入水年久化為安石可充砥礪之用茶條質堅可為杖染皂勝於橡斗荆條一云牡荆成叢疏爽故又名楚一種葉圓花紫枝柔細可為筐筥一種粗徑者名鐡荆條根可為骲頭漆樹通考百濟海島出黃漆樹似小棕樹而大六月中取汁漆物器若黃金其光奪目皮白葉似椿花似槐木心黃深山有之但無採漆者楛一名雉尾荆色赤中為矢世傳肅慎氏楛矢即此舊唐書靺鞨傳有角弓矢及楛矢皂莢樹刺長皮潤結角如豬牙者入藥長而肥厚者多脂長而瘦薄者枯燥子黑山藤木之類枝柔韌中為鞭桿六稜木枝幹皆六稜最堅實明開夜合木一名金銀栁結子如花至冬不凋木理細潤老鸛眼一名鼠李木堅緻有花紋子赤黑如鴉眼皮可染色東瓜木似匱栁皮色青名水匱栁質堅中為硯材按本地石可為硯者出年頂山及駱駝洞然性滑瓦可為硯者出北鎮廟然性堅難磨得遼陽東上石橋金星礪石方可成器木可為硯者即遼陽東瓜木也質輕易攜頗能下墨雖非奇玩亦自可珍㮦柃木松漠紀開㮦柃木有文縷可愛多用為碗黃楊木堅難長東北大山間有之棘一名樲有赤白二種結子者名酸棗仁入藥不結子者為牛棘俗呼棗刺科白桵爾雅謂之棫木高五七尺堅緻可為杖其果紅色核麻而扁仁入藥名蕤仁杜仲山中有之皮薄不堪入藥凍青寄生樹下葉微圓子赤凌冬不凋青蔥可愛亮木古木根莖所化夜視有光遇雨益明移置室中即可燭物山中往往有之銀木明一統志載有此木雒常晉書肅慎氏有樹名雒常皮可為衣雒常山海經作雄常按字書雒與洛通或音作額花類長春奉天吉林黑龍江皆有之柔條紛披黃花爛漫逐時開放迎春經春即開又有探春春過始開亞於南中杏花春夏之交開如錦繡較南方稍遲黑龍江杏李無成樹者地氣寒也桃花有紅白粉紅諸色千山最勝又有碧桃花一種梨花千山最勝每春望之亦如香雪海李花松漢紀聞寧江州多草木如桃李之類皆成園至八月則倒置園中封土數尺覆其枝幹季春出之厚培其根否則凍死春暮放花蕊細如雪種亦不一惟黑龍江絶少丁香紫白二色生山原者名野丁香小桃紅花色紅亞於碧桃金雀花形如小雀黃色地檀花杏黃色大如粉團雀兒花黑龍江諸境有之色翡翠似鴛鴦菊而單蒂跗橫枝上如鳥之翔又閃縀花以色名似龍爪而小山丹而曲又有草芙蓉不知何以名葉細如皂莢花黃同菊瓣高者亭亭二尺許日竒花類蝴蝶花而小一莖十數花辰收申放數必竒故名葉如萱黑龍江出垂絲海常有絲下垂一種曰貼根植者甚稀牡丹紅黃兩色俱有之契丹國志渤海富室往往為圓池植牡丹多至二三百本有叢生數十幹者皆燕地所無芍藥大金國志金太祖十四年生紅芍藥花北方以為瑞女真地向多白芍藥花皆野生絶無紅者好事之家採其芽為菜以麵煎之凡待賔齋素則用之金人珍惜不肯妄設遇大賔縷切數絲置楪中以為異品柯按今英莪門外獵場中有芍藥兩叢相對繁密葉鬱然猶存其下不生雜草土人云凡鳥獸避迹不敢蹂踐花時人過之畏不採擷或有所犯必致疾病因名其御製花地為花園詳見園詩序及注薔薇有紅白色二種玫瑰紅者可入食品黃者花微小俗通呼刺玫野開者花皆單瓣色紅子赤名山刺玫石榴有紅白黃三種不結果者名番花石榴山丹紅花六瓣一名紅百合其跗未開者乾之即紅花菜鳯仙俗呼指甲草性能透骨子入藥木槿朝開暮斂即詩之舜華萵苣蓮即罌粟八月始花高尺許葉如萵苣生黑龍江者單瓣微紅中土人攜十層五色種布輒變又名生菜蓮花有紅有白子入藥常梨花黑龍江郊圃間皆有之土人繫繒條于上曰神所憑伏臘祠之有戕其枝者則怒不知何所取義翠蛾眉隨日側映鮮妍有致蜀葵花色不一俗呼黍菊花紫者可染色紅白者可治疾一種莖短花小而單者錦葵也俗呼小黍菊又葵黑龍江土人呼曰鬼膾葵向日蓮獨莖頂作黃花大如碗向日而轉亦名葵花又一種曰秋葵荷花即詩之菡萏爾雅謂之芙渠今名蓮花有紅白二色雞冠其形如雞冠有黃紅白數種素馨本出福建今郊原有之黃白二色白者團而小香勝茉莉水桂花細碎而香淡黃色旋覆花爾雅謂之盜庚色深黃入藥又名六月菊萱花亦曰萱一名鹿蔥喜生隂地花六出四垂乾則為金針菜相傳食之可以忘憂即詩所云焉得萱革言樹之背是也牽枝牡丹花粉紅色蔓生俗呼串枝蓮扁竹蘭花形三角即射干花山胭脂花有紅黃紫白諸色又名粉團花俗呼茉苨花紅藍花花可染色俗呼為紅花亦入藥馬纓花如絨一名合歡其葉晝舒夜捲金盞黃花如盞秋深猶茂玉簮一名白鶴仙未開時如白玉搔頭黃紫者差小亦名玉簮捲丹六出四垂大于山丹先結子枝葉間入秋開花于頂根如百合可充蔬石竹枝如竹花色不一子入藥名雚麥金錢色紫而圓落必以夜牽牛蔓生花色不一吉林人呼為喇叭花子入藥曼陀羅如牽牛花而大子如茄剪秋羅有紅黃諸色四圍參差如剪秋海棠入秋始花色亦嬌艷荷包牡丹亦海棠類也花形似荷包鬚亦如穗百日紅木本花如丁香又千日紅草本久而不萎醉八仙紫如丁香蘭草花葉如韭花粉紅色叢生莖上蔦蘿蔓生葉如藻花紫紅色江西臘花似菊色亦不一枝頗搖曵水葒花高者丈餘多生下濕地詩隰有遊龍即此今人園中往往植之繡毬花叢生如毬菊奉天地寒諸花皆後時惟菊開應節黑龍江菊花五月茁枝瘦弱八月移盆入室臨南忩下十月花大如錢萬年菊花葉類草芙蓉色黃枝柔蒙密延蔓一本可百餘花或曰即層瓣高麗菊也高麗菊産朝鮮枝葉類萬年菊單瓣色黃赤相間如虎皮凍青花葉如栁而圓新葉生舊葉始脫花紫色冬含蓓蕾春夏方開月季亦曰月月紅又有十姊妹一枝數朵相簇果類松子宋會要新羅出松子榛子松塔子契丹國志女真多産松實一統志諸山中最多率三嵗之中一嵗大收山按本草松子出遼東及雲南今烏拉寧古塔中最多採取入貢通行各省御製盛乾隆四十三年有松子恭載京土産詩十一曰天章門榛子香美甲于他省經荒火燒落者尤佳內務府採取入貢胡榛子結子如榛殼大實小其木柔長溫普形似櫨味甘而酢俗呼曰溫普乾隆四十三年有御製盛京土産詩十二曰溫普恭載天章門山樝爾雅曰朹梅土人呼為山裏紅佳者密餞入貢梨唐書渤海傳果有樂逰之梨一統志醫巫閭山出香梨今千山及廣寧者為上接梨香水梨平頂香或鮮或凍或密餞以時入貢又有羊奶馬奶諸名大者至半斤又有酸梨皮黑土人珍之而酢梨乾梨麵皆以充貢香瓜即甜瓜禮記為天子削瓜指此今禮部以時供祀有瓜園向有銀皮瓜芝麻粒高麗瓜諸名今密瓜尤佳蒂入藥名苦丁香西瓜相傳種自回紇今種自雲南哈密來者味尤勝其味酸而子大者名打瓜専取子充用松漢紀聞西瓜如扁蒲而國色極青翠經嵗則變黃其瓞類甜瓜味甘脆中有汁尤冷豫攜以歸可留數月但不能經嵗亦不變黃色有久苦目疾者曝乾服之而愈桃出廣寧及千山者佳又黑龍江貢紅黑桃皮玉櫻紅白相間其紅者曰朱櫻李新唐書渤海傳果有九都之李今出奉天者種類甚多杏奉天錦州諸山皆有之色味俱佳稠梨子一名櫻額梨果形如野葡蔔而稍小色黑味甘澀梨乾入貢屑為麵暑月調水服之可以止渴土人珍之山定子密餞充貢栗後漢書三韓傳出大栗如梨隋書百濟傳有巨栗今出千山者實小而味佳採以入貢花紅實紅黃色密餞入貢檳子似花紅而大秋子似花紅而小皆奈之屬有謂花紅即林擒者恐誤棠梨即杜梨味甘酸不一有赤白二種葡萄園産者大而味佳有紫碧圓長之别山産者實小味酸有黑白二種其尤小而深黑者即詩之奠今採入貢棗返陽有之又有軟棗其按本草以左思賦君遷為軟棗一名丁香柿形如柿實小而長今此地所産形如棗色青味甘蜜餞充貢蓋别一種也枸奈子形如麥實小味酸色紅菱一名芰色有紫有黑形有兩角三角四角佳者嵗取以供祀又六稜菱産黑龍江亦生芡實但所産甚稀蓮實小于建蓮亦可入藥郁李爾雅謂之棠棣今多生山原間子如櫻桃仁入藥奉天錦州等府凡郁李收實多者嵗必大熟二府之人常視為占候也銀杏一名白果錦州府出蘋果花粉紅色果紅碧相間沙果似蘋果而小寧逺州海島寺中出蘋沙等果最佳核桃寧逺州有之山核桃生楸樹上形似胡桃而長殼堅厚肉味頗勝文官果形如小香瓜五雜俎形如螺蓋别一種無花果不花而實生于枝葉之間安石榴漢張騫使西域得塗林安石榴以歸又名海榴普盤即木莓爾雅謂之箭蔓生實如桑椹而短色紅味甘酸桑椹味甘酸色紫黑伊爾哈穆昆出寧古塔叢生數寸莖端結菜色紅味甘而酸置器中少刻成水一名桃花水俗呼高麗菜出愛琿者曰花水色赤如豆入口成液離枝十餘日輒化為水以蜜收為膏充貢法佛哈一名紅櫻即白桵果密孫烏什哈出吉林寧古塔木樹連綴而生形類櫻桃味微甘酸一名烏察拉齊龍葵果小而圓一名大茄燈籠果外垂絳囊中含赤子如朱櫻俗呼紅姑娘錦荔枝一統志一名癩葡萄深黃色棄皮取瓤可充果亦堪作蔬又名苦瓜歐李子柔條叢生高二尺許花碎白實如小李味酸澀寧古塔愛琿皆有之杜實産愛琿小而赤似桑菜味酸欽定盛京通志卷一百六
