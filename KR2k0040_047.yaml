body:
  text: 學校一奉天府儒學各州縣儒學錦州府儒學各州縣儒學吉林儒學寧古塔儒學欽定四庫全書欽定盛京通志卷四十三學校臣等謹案我朝創業大東風教所自盛京實為首善天下仰化成焉逮今重熙纍洽庠序日興又增設官學義學規制大偹以訓俗而型方我皇上四蒞陪都恩綸叠沛增廣額數菁莪化被無逺弗届凡身列澤宫者涵濡於百年之久含咀於六藝之華澡德既深敷文益盛臣等敬編列學宫書院及各屬官學義學規條謹志學校第十八欽定四庫全書欽定盛京通志卷四十三學校一奉天府儒學在府治東南隅考明時瀋陽中衛學在衛治西北隅正統元年重建本朝天聰三年改建於此地初建聖殿三楹㦸門三楹櫺星門一座康熙五年增修學宫並建啓聖祠十九年府尹梁拱辰重修聖殿二十一年府尹髙爾位增建東西廡各三楹二十五年聖祖御製至聖先師孔子贊頒布天下勒石學宫二十八年頒御書萬世師表扁額奉懸大成殿各州縣同二十九年立下馬牌於學宫外三十二年工部請修啓聖祠增建明倫堂三楹東西齊房各三楹大門儀門並東西角門各一座樂器庫房書房西房各二楹並設守衛步兵十名四十九年府尹廖騰煃率屬及紳士等捐資增修聖殿為五楹並增大成門一座啓聖門一座照壁一座義路禮門各一座繚垣二百丈後又增建名宦鄉賢祠各一楹五十一年奉朱子升配十哲之次五十四年以宋儒范仲淹從祀雍正元年追封孔子五代王爵改啓聖祠為崇聖祠各州縣同二年復先儒明代黜祀者六人林放蘧瑗秦冉顔何范寧鄭康成增祀孔子弟子縣亶牧皮孟子弟子樂正子公都子萬章公孫丑漢諸葛亮宋尹焞魏了翁黃幹陳淳何基王柏趙復元金履祥許謙陳澔明羅欽順蔡清本朝陸隴其共二十人崇聖祠增宋張迪一人從祀四年世宗御書生民未有扁額頒懸大成殿各州縣同九年府尹黎致逺率屬及紳士等捐資重修殿廡門壁乾隆元年重修繚墻明倫堂東西齊房大門二門等處三年奉頒御書與天地參扁額恭懸大成殿各州縣同五年設學舞生額定三十六名八年聖駕親臨釋奠奉頒御書先覺斯民扁額二十八年奉頒御製文廟碑文十六年四十一年奉頒御製平定兩金川告成太學碑文二道二十年奉頒御製平定凖噶爾告成太學碑文二十四年奉頒御製平定回部告成太學碑文俱勒石明倫堂四十年奉頒樂器麾一編鐘八編磬十六琴六瑟四排簫二簫六箎四笙六塤二鼓一摶拊二柷一敔一節二羽三十六籥三十六四十四年奉㫖刋刻世宗憲王帝訓飭士子上諭一道勒石明倫堂各州縣同皇上東謹案乾隆八年十九年四十三年四巡俱親行釋奠禮八年御製文廟詩恭載天章門承德縣儒學縣學生員及儒學各事宜俱𨽻奉天府學兼轄遼陽州儒學在城東門內元初設於舊都司治後明洪武中都指揮潘敬葉旺移建於此永樂壬辰都指揮巫凱塑先師及諸賢像正統丙寅都督王祥重修景泰癸酉御史謝燫建尊經閣成化初副總兵韓斌重修乙未御史潘宣置祭器𢎞治壬子御史宋鑑建四齊及東西號房癸丑鑿泮池戊午御史羅賢改建櫺星門辛酉御史車梁重建尊經閣正德乙亥御史劉成德修廡像設雅樂巡按髙越續建名宦祠嘉靖己丑御史史褒善重修殿廡堂齊泮池三面坊牌增建鄉賢祠御史胡文舉建遼左書院一習武書院一社學六後皆廢本朝康熙十二年知州吳承基請即舊址建聖殿三楹四十九年知縣富中琰捐資重修奉天府經厯張禹錫署州事與學正陳五紀續為經理增聖殿為五楹五十年增建東西廡各三楹五十一年知州陳學海又增兩廡至十楹五十八年海城縣知縣王玉璿署州事建崇聖祠三楹六十年知州王瀚建文昌祠三楹雍正三年建㦸門三楹櫺星門一座乾隆二十六年知州明德捐資修葺並增建明倫堂三楹大門一座西齊房二楹東西耳房各三楹三十六年知州兆坊捐資重修三十八年學正趙相增建東齊房二楹大門班房三楹海城縣儒學在城南厝石山陽按舊志明洪武十八年建海州衛學宣德元年遷城南門內成化五年重修𢎞治五年遷城東南隅立敬一針亭後俱廢本朝順治十一年設海城縣知縣王全忠於舊城西南隅建聖殿三楹康熙七年知縣趙文炳建崇聖祠三楹十七年知縣江溥重修正殿增建東西兩廡十九年知縣陳王星增建㦸門一座五十年知縣王沛恂捐募重修增建明倫堂三楹書忠義節孝四大字於壁雍正五年知縣張士毅遷學宫於新城內並增建東西角門及八字墻照壁等處仍於學宫故址重修明倫堂三楹今為訓導學署蓋平縣儒學在城內東南隅按舊志蓋平衛學在衛治東南係明洪武癸亥年指揮吳立張良佐建後廢本朝康熙十一年於衛地設縣知縣劉羽繩於城內西北隅建聖殿三楹四十一年知縣趙守易重修並增櫺星門一座東西角門二楹五十四年知縣郭運昭復移建於此六十一年典史王震協同士民等捐建東西廡各三楹雍正八年又捐建崇聖祠三楹乾隆十三年重修東西廡二十二年重修聖殿二十四年增建忠義節孝二祠各三楹開原縣儒學在城內東南隅考縣治北舊有元大德年加封大成文宣王廟碑明設三萬衛學至成化中重修者三南城上有奎星樓至本朝初斷碑遺址猶存康熙四年知縣何金序建聖殿三楹於此十八年知縣劉超凡建櫺星門三楹左右木坊二座二十二年知縣周志煥重修正殿二十四年增建崇聖祠三楹四十九年知縣李渥捐俸建東西廡各三楹重修櫺星門一座並增建大成門三楹忠孝祠三楹五十九年知縣萬如濟訓導李如瑞倡率士民捐修崇聖祠開鑿泮池乾隆三十三年知縣多隆額訓導丁龍章倡率捐修鐵嶺縣儒學在城內東南隅考舊志明正統元年於鐵嶺衛治東南建學嘉靖十六年重修後廢本朝康熙三十七年知縣許志進於此捐建聖殿三楹櫺星門一楹五十年知縣焦獻猷捐修明倫堂三楹復議建崇聖祠三楹乾隆二十八年訓導趙文琳捐修東西廡各三楹㦸門一座開鑿泮池增建櫺星門為三楹二十九年合邑紳士捐建奎星閣復州儒學在城內東南隅舊志有復州衛學明季移於山東本朝雍正十二年於復州舊衛城設州治議建儒學於此聖殿三楹櫺星門三楹東西廡各三楹崇聖祠三楹乾隆十二年增建大門一座明倫堂三楹寧海縣儒學在城內考舊志有金州衛學明季移於山東本朝雍正十二年於舊金州衛地設縣治議建儒學乾隆十八年始建聖殿三楹東西廡各三楹㦸門三楹櫺星門三楹明倫堂三楹崇聖祠三楹開鑿泮池增建繚垣錦州府儒學在府治西即明中左屯衛學正統元年巡撫李公濬疏請創建成化己亥指揮白欽增修嘉靖丙寅巡撫魏學曾鎮守王治道等重修江奎有碑記其事本朝康熙五年知府宋之鉉因舊制重修聖殿三楹續修崇聖祠一所東西廡各三楹明倫堂五楹十七年知府劉源溥重修㦸門泮池等處二十三年知府孫成重修東西木坊二座三十九年歲貢陳芝秀於城東南隅建文昌宫四十年知府顧大位重修殿廡坊門等處四十二年衆紳士建奎星樓五十年知府唐之䕫教授何來似同捐修㦸門泮池五十八年府尹尹泰偕知府馬鍾華知縣周廷槐教授閻九疇倡率紳士等捐修聖廟生員劉俶捐修照壁一座雍正三年文昌宫燬紳士等捐資重建乾隆三十八年知府富察善等捐修殿廡四十二年知府阿敏等重修兩廡又乾隆二十八年奉頒御製文廟碑文十六年四十一年奉頒御製平定兩金川告成太學碑文二道二十年奉頒御製平定凖噶爾告成太學碑文二十四年奉頒御製平定回部告成太學碑文俱勒石明倫堂錦縣儒學在府治西北康熙四十四年知縣裘奏捐建聖殿三楹崇聖祠三楹五十年知府唐之䕫知縣冷又煦同捐建東西廡㦸門各三楹及泮池繚垣等處雍正二年知縣王承孟教諭時雨倡率紳士等重修殿廡並建櫺星門三楹照壁一座名宦鄉賢祠各一楹乾隆十七年知府富起通判德爾得等捐資重修謹案縣學生員及儒學事宜乾隆三十七年裁教諭後俱𨽻錦州府學兼轄寧逺州儒學在州治東明宣德五年建景泰四年重修舊有聖殿五楹東西廡各十楹㦸門一座櫺星門三楹內東偏有鄉賢祠三間已多傾圯本朝康熙二十二年府尹高爾位捐俸修葺三十六年知府李文熙於舊址捐修聖殿三楹崇聖祠一楹東西廡㦸門各三楹大門一座明倫堂三楹大門內西偏增建忠義孝弟祠三楹乾隆元年知州吳秉禮捐修二十八年知州永亮重修三十三年知州克升額倡率衆紳士捐資增建崇聖祠為三楹並修理櫺星門㦸門照壁池垣等處廣寧縣儒學在城內西北隅考舊志元置廣寧府路儒學在廣寧右衛西北明初於舊址設學正統辛酉都御史王翺改建於鎮東堂之右成化間都御史滕昭彭誼參政尚綱郎中毛貴重修巡按御史王嵩造祭器𢎞治間副使李貢設樂器正德間都御史劉憲增號舍葺泮宫嘉靖戊子都御史滿珍鑿泮池於櫺星門外長六大引大惠泉注之明季俱廢本朝康熙五年知縣佟湘年於聖殿後建崇聖祠九年知縣顔鳳姿因舊址重修聖殿三楹十六年知縣張文治建櫺星門砌繚垣十七年改建崇聖祠於殿東二十七年知縣項蕙建東西廡各三楹三十二年訓導王子梴修明倫堂三楹三十九年知縣王國柱重修聖殿及照壁並鑿泮池成板橋建東西木坊二座乾隆三十五年衆紳士捐修門廡泮池㦸門等處義州儒學在城內東南隅雍正十二年設州治議建儒學乾隆九年始建聖殿三楹東西廡各三楹㦸門一座櫺星門三楹崇聖祠三楹明倫堂三楹忠義節孝祠各三楹角門二座東西下馬木牌二座木坊一座照壁一座並鑿泮池吉林儒學在城內東南隅乾隆七年永吉州知州魏士敏捐建聖殿三楹崇聖祠三楹東西廡各三楹大成門一座櫺星門一座泮池一座照壁一座明倫堂三楹三十年同知圖善增建奎星樓三十五年奏請重修殿廡寧古塔儒學在城內東南隅乾隆三十五年衆紳士捐建聖殿三楹大門一座欽定盛京通志卷四十三
