body:
  text: 國朝藝文九詩四七言律一欽定四庫全書欽定盛京通志卷一百二十三國朝藝文九詩四七言律一奉命祭告北鎮恭紀康熙癸未陳廷敬使星十道出王城獨奉函書到上京大漠北來沙磧盡神山東望海雲生鶯花舊日朝陵路楊栁春光出塞情曽是翠華遊厯處臨軒故遣侍臣行遼河康熙壬戌孫在豐句驪一派此朝宗源繞塗山百谷中地向岐豐城帯礪水分瀍澗作西東金鼇浪拍連滄海鉄鳯雲髙舞大風自有神鯤歸帝網渭川應是載非熊恭和御製過吕翁山詩康熙戊寅髙士奇風霆迅掃六師移髙壘星羅指顧宜此地孤軍衘白壁當年合隊捲朱旗層沙直眺三闗逈列石迴看八陣奇正喜普天消戰伐文孫親厯頌開基恭和御製駐蹕大凌河康熙戊寅髙士奇雲梢羽葢夜停鑾古渡春氷望裏看嵗月已休新戰鼓山川猶記舊征鞍天髙漏轉千屯肅野曠星連萬幕雲􅌖藻横汾真不羡微臣珥筆和應難乾隆八年聖駕東巡盛京恭謁祖陵大禮慶成詩謹序乾隆癸亥陳世倌恭惟我皇上御極之八年庶績咸熙三辰時撫當累洽重熙之㑹溯經營締造之初念禮隆報本合萬國以抒忱孝首尊親䖍一心以昭格况豳岐開基業之始典倍切于追崇而園陵藏弓劍之區禮尤嚴乎禋祀于是以虞舜之大孝符周武之配京序值清秋時惟七月䖍諏吉日恭謁祖陵奉侍慈幃夙駕鸞輅于是百靈擁衛庶官景従縣㝢騰聲四野歌呼齊起川原生色萬郊禾黍俱豊出古北之雄闗詣潘遼之重地千重嶺岫遥瞻王氣之絪緼萬樹松楸羣仰神區之蔥鬱閟宫祗被典禮燦陳帳殿齋居質明将事孝惟一本孚愛慤于僾聞愾見之餘誠徹九原通神明于陟降上下之際皇上肅然止敬穆乎無言緬祖宗創造惟艱地闢天開允垂卜世卜年之乆念子孫繼承不易膺符受籙敢忘克勤克儉之模禮徐遍于三陵忱每將夫一敬告成大祀乃燕明廷助祭百工均頒酒脯輸誠六服咸與几筵大官之水陸畢陳飲御之公卿既醉爾乃衮垂藻火面南離以當陽廷肅鵷鸞共北辰之居所黒齒趨蹌于王㑹雕題拜舞于天朝徳教遐宣武揚斯舉火荼日月黄麾動而七校齊開龍虎鳥蛇畫角鳴而八陣咸合左射右射並宣天子之威大綏小綏仍戴聖人之徳而且推恩無外錫類多方自王公以逮軍民槩沾膏雨由京邑以連荒徼普煦陽和既時邁而伸設薦之誠乃迴鑾而理垂裳之治此皆皇上徳孚蒼昊孝通神明乃與圜丘祀天方澤祀地之禮並隆千古也臣忝掌絲綸徒塵政府謬司教習無禆吉人弗獲随従乘輿式觀典禮時逾三月未聆訓行于天言身領百遼莫效肅雍于相祀敬成七律聊抒戀主之愚忱恭賦十章用志饗親之達孝云爾熙朝區夏肇東瀛天作髙山啟大清三后神靈時陟降一人統御際承平祖宗文武垂先烈原廟衣冠想舊京報本不㤀親享祀旋看奏假賚思成鵷班拜手送鸞輿帝侍慈闈問省餘神列勾陳隨輦後時當零露届秋初閭閻共慶寜居樂稼穡羣占大有書更喜太平真氣象出闗民物似華胥王氣蒼茫屬瀋遼陪都東去路迢遥渾河曲折環邉極鉄嶺崢嶸接斗杓龍虎萬年長拱抱精靈五夜每趨朝橋山弓劍歸藏地時有紅雲上九霄祠官典禮疊相承列聖居歆儼式憑僾見愾聞通一氣水源木本溯三陵粢盛潔處齋心達膋膟焚餘香靄升聖祖昔年殷薦後又看繩武肅嘗烝履武姜嫄推聖母篤生始祖事神奇燕天髙帝初光宅纘緒文皇實肇基王業艱難垂世徳皇心乾惕協靈祗閟宫盥薦抒誠格有道曽孫對越時燕喜一堂羣受祗天厨稠疊湛㤙宣漢髙沛邑歌風日建武南陽置酒年長白嵐光遥對席松花江色靄浮筵君臣宛似家人㑹既醉歡欣黼座前殿名崇政肅朝紳稽拜信桓及逺人鶚立鵷翔齊舞蹈黄支烏弋並尊親八荒在闥聫中外六合為家篤主臣應遣畫師閻立本圖成王㑹獻丹宸雍容典禮敷文徳震㷍川原耀武功陣合歡鵝縁大閲軍分荼火為臨戎網留一面湯仁在禽失三驅易象同却笑揚雄誇羽獵何如吉甫詠車攻㤙詔頒來速置郵徳音汪濊徧神州聼將匝地歡呼動知是經天恵澤流錫類定能孚血氣宣威不獨鼓貔貅聖朝至治歸仁孝庸行従來即大猷告成大禮返皇畿路過灤河望六飛發駕金風方颯爽逥鑾玉雪正雰霏舞成七徳揚翬羽庭列千官拜衮衣赤鳯白麟休獻瑞太平端拱自巍巍聖駕束巡盛京茶謁祖陵大禮慶成詩謹序癸亥于振我皇上御極之八年泰階既平百揆時叙禮樂明偹朝野熙恬于是述祖徳頌宗功有事于三陵禮也臣切惟謁陵展孝為典最鉅載籍雖逺然漢唐以來可得而稽也漢嘗以正月上陵百官四姓公主諸大夫外國朝者侍子郡國計吏咸㑹至期晝漏初上大鴻臚設九賓于寢殿鐘鳴謁者引客就位如儀乘輿自東廂下升階展拜大官尚食太常奏文始五行之舞郡國上計吏以次前當神軒告其郡榖賈人所疾苦欲神知其動靜焉唐禮朝陵之先日設麾伏周衛陵寢至日質明七位子孫及諸侯百遼蕃服君長皆陪于司馬門内上至小次降輿入門再拜躬親執饌閲視先帝后服御之物引諸功臣並入執爵進俎奠訖乃復葢孝子之事親曲盡愛敬之心有如此者漢唐諸侯古去已逺然未嘗不縁情制禮以為法于後世故垂諸史冊以昭令式良有以也臣伏見我皇上御㝢以來盡孝盡誠善繼善述體祖宗之心以為心法祖宗之政以為政乎如見愾乎如聞葢未嘗一日釋也洪惟我朝發祥長白奄有中外肇萬世無疆之休實由我列祖列宗積徳累仁承天景命豐功駿業昭垂奕禩肆我聖祖六十一年之中三謁園陵恪修祀事孝之至仁之極也皇上敬䋲祖武諏吉日飛六龍慈寜偹法駕百官咸㑹六師景従遂届興京舉行盛典于時天澄其氣日朗其精松楸蔚然閟宫肅穆皇上萃精神嚴對越孝敬之至通于神明洞洞然屬屬然視于無形聴于無聲念經營締造之維難思夙夜敬承之不易籩豆既飭肸蠁如聞皇哉唐哉亦孝之至仁之極也昔周之王也定鼎郟鄏卜世卜年承承繼繼然姬公陳王業之艱難述農夫紅女衣食之事以推本風化之所由興必以始基靖民歸之后稷十五王而文始平之十八王而康克安之葢創業垂統若斯之難也故曰周家世篤忠厚以成其福禄而啟佑後人我祖宗亦世啓鴻圖以昭兹來許而垂諸萬祀皇上席重熙累洽之盛不㤀小心昭事之誠以視斯文之頌后稷于邠之咏公劉惟此王季貊其徳音至于文王惟新厥徳光懿顯爍何以加焉彼漢之衣冠出遊唐之荐衣獻服其𤨏𤨏耳曽何足以嫓此鴻庥光斯盛烈也哉臣忝列詞垣濫竽律館雖未獲躬隨清駕預于駿奔之末而朝夕論思日月獻納抒下情以通諷諭宣上徳而盡忠孝雖學殖荒落然雍容揄揚亦其職也矧夫盛徳所孚櫪馬猶知仰秣太和感召㳺魚尚解揚髻臣即庸愚敢㤀舞蹈因不揣蕪陋拜手稽首而獻詩曰萬乘東巡展孝思鳴鳶前載漾微思濕雲頓掃開方殿晴日平臨滿畫旗漢代歌風追鎬洛周家卜世著邠歧起居晨夕趨行殿仍似深宫定省時髙山天作發祥初長白縈逥結隩區鴨濬仙原瞻王氣鵲銜靈果啓鴻圖皇旄夙設周廬伏赤伏還陳受命符載撫杯棬欣主徳宸襟彌自歛盤盂萬峰岝㟧靄松楸鬰鬰䓤䓤佳氣浮寶祚無疆知地脈曽孫有道荷天庥衣冠拜處朝儀肅綸綍宣時恵澤流春露秋霜方怵惕歡聲早已動皇州雉堞崢嶸杳靄間睿謨握勝控雄闗南臨渤海兼遼海東接松山與杏山應運功成遺壘在太平日乆戌樓閒即今鷄犬桑麻地饗蜡吹豳自往還悠悠旌斾静無華來享來王縂一家到處如安記里鼓遣歸不假指南車鵝黄褶麗隨仙㐲狐白裘温扈翠華欲倩龍眠髙畫手摹成王㑹示荒遐朔風凌競馬驂驔鸛鶴魚龍士所諳伏扎能穿何論七前驅不戒總聞三千屯月上霜威冽萬幕雲深雪意酣日暮放罝鉦鼓卧又聞帳殿啟經函萬幾清暇富文章頃刻龍鸞天際翔賦就盛京思劍舄舞成世徳念羮墻宫懸肆業皇猷壯瓊笈鐫摹御墨香蠡管詎能窺聖學願偕儀鳯祀鏗鏘冬序初囬是小春一陽來復届芳辰鑾輿過處衢歌溢鳯輦歸時巷舞頻共識聖朝隆典禮咸知純孝格天人小臣愧乏巷阿頌鼓腹聊同擊壌民聖駕東巡盛京恭謁祖陵大禮慶成詩癸亥王㑹汾東巡秋燦九重霞黄道天開引翠華父老望深豊沛地理儀光盛帝王家龍旂紫塞懸弓月虎旅清霜拂劍花見説歡顔動文母我皇親侍彩鸞車晴色千林宿雨収望中禾黍緑盈畤香迎豹尾塍雲合影轉霓旌穗露浮已報豊年書太史便行秋稼指神州従臣共識皇情豫駐輦時時賦滿篝漠雲如海散朝煙皎皎青霄赤日懸遥望氣雄元莬郡更欣春照紫濛天呼嵩動地名王拜震電驚霆大號宣萬里星躔拱宸極盛朝威徳被無邉祖宗文武奠鴻功靈命長祥帝所鍾萬歳山光榖林樹千年雲氣鼎湖龍堆明金粟贍冠劍路駐仙斿繞柏松此日精䖍奉嘉薦樂歌清廟叶黄鍾寢殿崔嵬秘九閫遺弓瞻省動龍顔青邱丹水經營乆禹甸堯封氣象還星宿乆澄霄漢上熊羆常守翠微間孝思孚感無窮意相照金碑玉蘚斑南陽白水睹真人舊里今朝景物新天漢流精延析木醫閭修職貢玗珣大風表海明樓殿絶島浮洲帯鳯鱗一自重瞳臨眺後山川全覺路精神六龍時邁焕宗周鉅典瓌文次第修為想丹青開駿烈已知川嶽遍懐柔露蕭車馬東都㑹香案烟雲北闕浮天上詔書銜鳯觜飛來春色滿神州太平天子上陵迴晴日千門萬户開星緯珠囊増潤處鳯儀璚管應風來金甌永固占神策玉燭平調仰睿才共慶孝思䋲世徳蒼生流福詠康㢤聖駕東巡盛京恭謁祖陵大禮慶成詩癸亥夏廷芝熙朝孝治乆昭融緒纘前徽帝徳隆垂創艱難追駿烈聲靈赫濯溯鴻功橋山松洞千春鞏原廟馨香一氣通翠輦親臨崇報本淵源黙契總相同清時典禮重明禋駕擁龍旂正及辰沙磧千山森壁壘羽林萬騎肅鈎陳已看琛賮來重譯並使懐柔及百神絶徼歡闐宣徳化黄旂朱節紀東巡插天長白聳丹霄鴨緑濚洄江水遥州接青營雄地抽野分箕尾焕星杓素題樸角風猶古白馬彤車績尚昭烈祖神宗貽䕃逺千年儉徳溯陶堯寶城䓤欎䕶雲烟肸蠁初升對越䖍玉匣衮龍垂奕代寝園弓劍感當年宸衷肅穆抒三獻典禮精誠奉百籩至徳中孚能合漠仁㤙従此洽垓埏祝嘏頻聞告孝慈中和雅奏啓純禧百年禮樂涵濡日九廟神靈悦豫時往事何湏追㶚杜永年直欲邁周姬推恩更自酬房魏寄酹長深佐命思黄花丹葉正清秋仰奉慈顔頌作求視膳終朝陪鳯輦承歡曉日近龍樓九天作賦先霄漢萬國呼嵩拜冕旒大孝由來天下飬億年色笑進觥觩景物陪京衍慶長五雲開處坐明堂風清帝里黄圖㑹秋滿真人白水鄉寵渥需雲頒虎旅恩深湛露遍鵷行先時况有蠲租詔蔀屋茅簷共樂康蕃釐已降禮初成斾轉千貔野不驚十月陽春囬海㝢九重孝享洽幽明黄榆紫塞敷天澤東鰈西鶼遍頌聲光烈覲揚昭萬古小臣珥筆矢歌賡恭和御製葉赫舊墟元韻梁詩正初征自葛誓同甘聲討渝盟敢二三威震不湏雲列騎師貞合比鐵為函當年王氣占龍見此日遺墟賸草弇緬想艱難紆睿覧寒烟一抹塞峯南恭誦御製望葉赫舊墟敬惟太祖髙皇帝以十三戎甲奮跡于此復讐服衆遂成王業謹賦其事以示來許臣雖未能諳悉其風土然始基創業之美緬焉可想敬依元韻輙成二章奉述聖主永懐先烈之意張鵬翀龍師矯矯戰于甘一鼓何曽待再三敵幟乍驚天漢㧞讐頭早快月支函當時祖烈同擒鳳此日宸遊異勒弇轉笑公孫無勝筭擬將如礪保燕南膴原茶苦薺同甘列障今齊郡百三漠北藩封長控引關東王氣早包函從征猛士歌思沛載筆詞臣學愧弇瞻望陵原佳氣遶始基風化被周南恭和御製七月五日東巡啟蹕元韻甲戌劉綸灤陽候駕及新秋王氣東來滿畫斿按部蕃封宜置頓聫鑣衛士許番休杯流曲沼甘霖足錘照懸封霽景留不待縁邉訂圖誌時奉熱河勅修輯志出闗勝覧一時収暑退三更值閠餘囬瞻巖館憶清舒興京載詣郵仍便慈輦頻扶轡每紆令典昔曽傳鎬宴淳風今更溯豳居可知童叟謳歈切嵗紀將周望跂予恭和御製駐蹕吉林將軍署復得詩三首元韻甲戌劉綸巒腰雨過抹煙輕江面風來皺縠生蹕路牙旗初辨曉和門畫鼓已知晴㸑筒比户覘遺俗梯板通衢效衆情開代發祥多勝蹟山川擁衛盡輸誠宋瓦金源遡舊流龍興締造鞏皇州鳴鑣聲渡紅橋外列㦸光分碧嶂頭箕畢星文垂大野闗河顥氣發深秋横汾那足傳彛範攬勝空教倚柁樓鈴轅聼放紫宸衙茂典先聞道路誇問省萱闈時正永瞻依松棟制寜奢陛陳七徳觀型逺筵逮頭行報禮嘉肇域信符仁夀百行根有草挺三椏恭和御製松花江元韻甲戌劉綸泉或占蒙澤象咸天河一瀉衆光泉緑分鴨水真源濬黒溯龍江别派添初日浴時長照燭靈槎貫處鎮安恬宸游吉旦升香早數典何殊秩祀嚴恭和御製詠人参元韻甲戌劉綸瑶光屬地想芒寒秀孕金莖幾顆丹封識神山靈乙䕶採知仙葯矞雲漙無功上黨寜雙美餘氣朝鮮祗一端本草空矜方法偹天家徳産疏應難恭和御製望祭長白山作元韻甲戌劉綸王氣長鍾恊大亨禮先羣望仰精誠蕭燔仙露開金殿勺薦神漿挹紫英千嶂髙番俄朶碧三江逺滙闥門清顒祈肸蠻昭靈貺坤絡乾維䕶兩京恭和御製行圍即事元韻甲戌劉綸巨澥雄風表弁韓天開文囿畫圖看宵鋪錦騎雲雙匝曉擁黄旗日一竿霹靂弓鳴霜氣勁蹣跚獸竄葉聲乾停鑣每進中樞牘郵匭争教滯授餐圍邉勝蹟重徘徊烈祖頻經肄武來上將征途歌鹿疃材官驅野賦盧鋂三畋此地川原壮九伐當年壁壘開侍従何縁陳羽獵聖文披牒擅閎裁天山一桁逺排青蹴部聲環儼陣行日獲黄熊無置館時羅白雉亦充庭兩都士挾風雲氣陸海材呈草木靈信士獻􅜏豳俗古豫逰長共樂清寜恭和御製吉林土風雜詠十二首元韻甲戌劉綸威呼葦航不信詠葩經獨木真逾三板輕横比龍梭池乍躍挾疑馬皁陸堪行刳木為小舟剡木兩頭為槳左右按抑而行厰邉老樹空腔影江上平波􅉸笏聲來往松花緑痕剪膠杯小寓陋莊生呼蘭家家帯得雲霞氣栲栳當簷竅厚均截木中空引炕烟出之上覆荆筐以禦雨雪墐户易熏先作計烟樓難跨澷防人尾焦莫訝孤桐剩眼密還編六枳頻陘上迎神司命醉木居士合記分身法喇崢嶸霜雪利經過製備舟車互用多炙輠無由聼轆轆推蓬有分見峩峩一夫雀啄身先挽數客鷄棲足免蹉行水雪中無車無輪俗呼扒犁凈業湖頭尋好景氷牀唤渡較如何斐蘭不湏昔榦更膠絲閭史懸門小試之臂彀短檠聊復爾腰横大羽亦何為以榆栁為小弓童而習之别剡荆嵩綴雉羽曰鈕勘四方有志徴初服百戯俱陳誡誤兒窩集分明材易給學箕不侍教先施賽斐匠心一已始誰為不劌而亷適所宜木匕長四寸許曲柄豊末兼匙杓之用搏飯故應嫌手澤嚃羮兼恐累觀頥四酏注液霞翻杓九粺抄香雪滑匙丰擬陶瓠微抝頸古風常見席前時額林㡳誇鄴架與荀厨藏弆楣問事事俱中霤何曽妨藻井承塵焉用飾雕觚楣間横板猶古庋間儘教作供訛龕象未遣投栖詫屋烏對此詞臣増健羡書倉傏處省他圖施函合抱枵然詎不才刳中餘地見恢恢漢隂灌甕深勞給蜀國郫筩淺貯醅截大木為筩貯水釀酒皆用之漏義恒河參桶脱巵言宿海憶槎迴若虗自是天全盾喬木邠岐識厚培拉哈易著連茹詩詠綯誰云圬技賤還勞一絲不掛謀誠淺百堵皆興構起牢升木附塗良自便霑泥敗絮豈相遭綴麻草堵間縁以施墁也南人朱解綢繆意指㸃青蓑晾壁髙霞綳箕中揚簸釡邉塗司爟何煩束緼需以糠和膏傅梗為燭者膩恥魚膏驚懶婦枯憐木㭊引光奴廡春棄覈添新碧壁陣留煤認舊烏繼晷轉教新代蠟可知奢儉意懸殊豁山側理寜論錦水箋楮皮檾骨縂稱便搗苧絮為紙堅韌如韋千椎出白金花細百㢧披簾玉版堅端合編韋尊古柬那容覆瓿付時賢巘原舊俗多圖誌真蹟全憑粉本傳羅丹投壷超距擅殊稱角采還従腕脱興雉呌盧呼材已下麞驚鹿駭技常勝俗以麞鹿蹄腕骨随手擲視偃仰横側為勝負四奇衍陣冝推石其用薄圓石擊之則曰帕格雙隊爭衡好蹴氷應笑井公無别譜區區瓦注敢程能周斐良工度木早留皮埏埴翻資紉緝為采樺皮以代覆瓦體輕而工省著屋雪霜紛似畫移居風雨便如碁筏樓未占三間勝瓢室無踰十笏宜七月篇中歌入處補牋端藉御題知恭和御製薩尔滸元韻甲戌劉綸神風想象翠微問爕代當時肇造艱百匝圍開雲似掃千尋銘勤石堪顔尾虵陣䧟終難應杜松首䑕城孤早絶攀諾宻納應識木厨髙玉體雄圖先已奠天寰恭和御製恭謁永陵元韻甲戌劉綸長白儲精幹脉同神邱卜吉自遷豐山封顯號踰東鎮樹獻沴符效木公吉毖明禋懐日表寵鴻景運翼天中迴占嵗序俄周紀詹戀依依厪聖𠂻恭和御製恭謁福陵元韻甲戌劉綸穹碑百尺冠巍亭聖徳神功䕶萬靈下國共球滄海㑹先皇瑶蹕白雲扃峯環八柱承天極鼎建三台戴斗星得扈鑾輿陪奠醊一時霜露感初零恭和御製恭謁劉綸昭陵元韻文皇謨烈緬宣昭史頌重華恊聖朝閟殿鸞鈴徐警晝靈䑓馬杖悚騰朝八方早應龍旗建二木常傳鳯闕標展謁已成聞祗薦甘𤓰郵致詎云遥途次貢哈宻𤓰至遣親藩即日馳騎祗薦恭和御製七月五日東巡啟蹕元韻甲戌汪由敦仙館鳴鑾正早秋碧峰髙處引前斿鐻鍝逺奉周官譯甌脱同歌夏諺休沙路按程圖可數雲山即景句新留誠看䟦馬羣情喜快值朝來宿雨収停蹕俄經兩月餘行旌初展尾舒舒亂流逆溯奔濤壯過嶺逥看曲磴紆列部淳風安舊俗陪京佳氣䕶宸居紀行奎藻從頭起繪就豳風慰跂予恭和御製駐驆吉林將軍署復得詩三首元韻甲戌汪由敦萬家山郭霽烟輕朝爽凉飃習習生地以鍾靈開勝景天因留蹕快新晴迎鑾近效懽呼意與宅遐思眷顧情天作髙山應望秩清齋先日致䖍誠澄江如練帯清流載亳當年第一州節帥㦸轅開畫裏水虞漁艇聚沙頭千門燈火通深夜街市居人門外懸燈率至竟夜萬樹丹黄絢素秋衢述自來皆藉板愛聼屧響似登樓神堯過沛駐新衙八十年來更可誇繁息閭閻樂休飬流遺風俗異浮奢銀鱗出䋞均分賜寳硯鐫銘拜舊嘉松花石硯材最佳曽蒙思賜信士物華多異産豐貂珠蚌草三椏恭和御製望祭長白山作元韻甲戌汪由敦周邦時邁恊昭亨喬嶽升馨表至誠紫氣東來常鬰鬰白雲中起鎮英英祥徴朱果符長發秩配黄祗祐永清薦帛燔柴翹望處地靈億載䕶神京恭和御製行圍即事三首元韻甲戌汪由敦陣圖何藉按孫韓節制分明獮獵看羽騎䋲聫成合壁虎鎗環列挺長竿人披宿霧層峯現馬踏深林落葉乾為寄詰戎深意在不辭雨沐更風餐待圍林麓暫徘徊隔嶺聞呼四靣來旋見魚麗兼鶴列漫論鷹鏇與盧鋂逐禽駿足追風逺命中雕弧滿月開興至乘閒先得句七㐮雲錦日親裁秋山紅紫間䓤青虎跡麋迒鮮定形合噪有聲排磵户超騰無路驟烟庭載宣武節行時令近接留都鞏地靈一紀重來效神祖三驅應律奠清寜恭和御製吉林土風雜詠十二首元韻甲烟汪由敦威呼落葉浮漚匠意經刳來獨木體原輕憑教有力趨能負好放中流穏獨行擊汰浪花翻雪色貫槎星漢瀉風聲但容刀處看飛渡不待前溪新水生呼蘭浮烟曲笑供炊便立木前榮入望均表宅便疑封比户熱中知復恥因人朝暉一縷烟氲起暮雨千家㸃滴頻幾許翹薪供㸑下條枚錯認此分身法喇層氷積雪慣經過深巷交衢立侍多載弛負擔装磊磊行教叱馭儼俄俄當無自有車之用借用老子語㤀折偏知屐易蹉漫比耕犂賦秧馬罽帷紅板較如何斐蘭蒿矢榆弓控以絲左支右絀習安之勝衣便勵蓬桑志佩韘偏工彀率為舊俗羣師射雕手少成爭羡寜馨児挽強命中他年事百步千鈞待展施賽斐昭儉非闗襲古為授餐棘匕夕端宜漫因借箸前陳計従勸加餐笑解頤肥羜乳豚膏滿案芹香雲子􅉸流匙誰教踵事増髹漆羅列金銀又一時額林無多長物出東厨庋板依􅎝十襲俱大抵茗甌兼㮖箧那爭漢鼎更周觚落泥梁上妨巢燕映日窓間轉相烏蛛網烟煤勁掃拂横添四壁是新圖施函枵復何曽棄不材能宏端取量中恢厚儲擔石積升斗漏貯虀鹽譲醖醅穏置座隅憑取給移安㸑下幾巡逥田家老瓦盆堪並質素風宜奕世培拉哈斫蔴綴壁擬宵綯百堵興時亦孔勞塗塈不求工粉飾綢繆惟取得堅牢肯教剥落年時乆更耐横斜雨雪邅若使續成圬者傳栁州命意未為髙霞綳熒煌列炬徧脂塗春簸餘資秉燭需束緼有光分里婦燎鬚無意責童奴増華綘蠟誇龍鳯繼晷寒窓閱䨲烏花綴玉蟲開四照濃烟甲煎未應殊豁山不數成都十様箋蔡倫遺去頗稱便鋪來似雪光能透障處無風質自堅制草白庥宣並相帖摹繭紙慕群賢金花蠟印原非貴楮氏淵源有正傳羅丹博亦猶賢勝所稱鹿麞骨戲故鄉興成驍壶矢天為笑呼轉梟盧技絶勝席上手翻温似玊座間指撥瑩于氷莫言優劣紛無定智巧其中各擅能周斐梓材樸斷尚連皮棟宇垣墉樺木為板屋詩惟傳似玉竹樓記不數聼碁茅茨儉徳覃王化陶復先型溯土宜舊社枌榆縈睿思邠居經始詔聞知恭和御製薩尔滸元韻甲戌汪由敦一征肇迹萬峰間破陣推強大業艱戰壘只今餘灌莽靈旗長白䕶孱顔霜前錦樹當先矗雲外珠邱計日攀金匱遺編揚武烈詔謀億􅑤奠區寰恭和御製恭謁永陵元韻甲戌汪由敦靈鍾啟運福來同𤓰瓞綿綿衍緒豐木本水源徴世徳左昭右穆奉先公一峰華葢聞天表萬葉星榆宅正中此日升馨光聖孝載瞻松桷愴宸𠂻恭和御製恭謁福陵元韻甲戌汪由敦陪京東望勢岧亭天柱巍峩鞏地靈獨闢乾坤寜海宇長懸日月䕶雲扃龍旂展祀三年里鳯紀周迴十二星拾級載瞻松栢路九秋瀼露晩初零恭和御製恭謁昭陵元韻甲戌汪由敦武烈丕揚大統昭丹陵深閟萬靈朝熙天昌後開千葉膺籙維新奠一朝庭下松龍蟠廣䕃㐲前石馬識英標翠旗羽葆精禋展西接留都路未遥欽定盛京通志巻一百二十三
