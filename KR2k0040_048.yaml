body:
  text: 學校二釋奠禮典課士規條官學義學經制奉天府官學書院規條各州縣義學各州縣學田吉林各屬官學黑龍江各屬官學入學員額公宴賔興等禮直𨽻永平府遼學裁併附載山東復州金州二衛學裁併附載欽定四庫全書欽定盛京通志卷四十四學校二釋奠禮典文廟每年春秋致祭俱於仲月上丁日奉天府學定例府尹主祭几先期齊戒省牲俱如㑹典儀屆期府尹及該教官等率諸生質眀將事薦帛奠爵豆登簠簋鉶籩以次序列陳犧牲設舞樂悉如㑹典儀禮既成始受胙於學即古釋奠之義各州縣則令州牧知縣主之至每月朔望該教官率諸生於先師神位前上香焚帛俱用常儀課士規條明倫堂之左世祖章皇帝敕刋立卧碑順治九年設所以曉示諸生敦行勵學永為遵守又每月朔望各儒學教官傳齊該學生員於明倫堂設香案恭捧康熙四十一年所頒聖祖仁皇帝御製訓飭士子文雍正三年所頒聖諭廣訓萬言諭宣講訓示令該生等咸知恪凛嵗科兩試新進生員覆試學臣令諸生默寫聖諭廣訓一條又雍正元年題定各學生員由學臣飭令教官等立定課程每月兩次令其齊集學舍面加考校其新進生員照國子監坐監之例令在學舍肄業俟下案新進生員至學為滿或有親老家貧不能久居學舍亦必分題校藝無使曠業年終令該教官編定諸生甲乙冊彚報學臣所以示陶成而分優拙奉天府各屬課士章程俱府丞董其成官學義學經制雍正九年題定州縣於大鄉巨堡各置社學一區俱由該管官選擇生員學優行端者補充教習免其差徭量給廩餼其民間自立者即概稱義學凡子弟年十二以上有志學文者俱令入學肄業奉天各官學俱設冇助教旗籍子弟俱令習滿漢文並造姓名冊結於府丞試時甄别奬勵務期啓發童䝉成就俊乂是即三代黨庠術序之法所有各屬官學義學詳志於後各屬官學義學書院學田奉天府左翼官學一所在城內東南隅右翼官學一所在金銀庫西俱康熙二十年建每翼額設學生四十名滿學二十名習滿書漢學二十名習滿漢書並馬步箭滿學設滿文助教各一員漢學設滿漢文助教各一員每學教習各二人由奉天府尹選生員充補盛京禮部董其事雍正十年每翼增設內務府學生三十名肄業盛京三旗每旗額設學生二十名肄業八旗漢軍每旗額設學生十五名肄業宗室學一所覺羅學一所共二十二間俱在天祐門外乾隆二年建每學額設學生十名肄業書院規條瀋陽書院在學宫右工部侍郎李永紹建乾隆七年府尹霍備率屬置買地基捐建講堂五楹東廂五楹西廂五楹羣房十一楹三十一年府丞李綬因書院膏火無資奏請借帑營息三十二年將軍社圖肯等奏定於奉錦二屬學田內每年徴收銀兩彚交奉天府治中存貯以作書院經費掌教每年束修銀二百兩薪水銀三十六兩肄業生員二十四名每名月給膏火銀一兩五錢每年奬賞銀十三兩有零萃升書院三楹在府尹署東任奕䥸建今廢原設學田一百四十一畝九分三厘五毫湮沒已久乾隆三十年於丈出民人餘地內撥給學田二千畝徴銀一百二十兩遼陽州義學五楹在州治東雍正元年知州王瀚建遼左遼右二書院明𢎞治時建今廢習武書院明嘉靖中御史胡文舉建今廢原設學田七十畝零二分乾隆三十一年于餘地內撥給學田九百二十九畝八分共田一千畝徴銀六十兩海城縣海州書院三楹在南門外乾隆三年知縣戴惟橒建原設學田一百五十畝內湮沒二十八畝乾隆十四年增撥學田二百四十五畝三十一年於餘地內撥給學田六百三十三畝共田一千畝徴銀六十兩蓋平縣義學三楹在縣治西雍正七年知縣曹涵建原設學田五十二畝乾隆三十一年於餘地內增撥學田九百四十八畝共田一千畝徴銀七十兩開原縣義學三楹在學宫東南隅雍正三年建乾隆三十一年於餘地內撥給學田一千畝徴銀五十兩鐵嶺縣銀岡書院在縣治南御史郝浴建學舍三楹在學宫西北乾隆三十一年於餘地內撥給學田一千畝徴銀五十兩復州乾隆三十一年於餘地內撥給學田一千畝徴銀七十兩寧海縣南金書院一所乾隆三十八年知縣雅爾善倡率衆紳士捐建乾隆三十一年於餘地內撥給學田一千畝徴銀七十兩錦州府義學一所在學宫內明倫堂西原設學田七百六十畝乾隆三十一年於餘地內撥給二百四十畝共田一千畝徴銀七十兩義學學田七百四十五畝二分零知府李大綬捐置每年徴收銀兩以資修葺錦縣原設學田八百八十五畝乾隆三十一年於餘地內撥給學田一百十五畝共田一千畝徴銀七十兩寧逺州社學在中後所雍正三年建原設學田四百零十畝乾隆三十一年於餘地內撥給學田五百九十畝共田一千畝徴銀七十兩廣寧縣義學一所在署東康熙十九年知縣項蕙捐建四十九年知縣錢世勳於察院舊址重建乾隆三十一年於餘地內撥給學田一千畝徴銀六十兩義州乾隆三十一年於餘地內撥給學田一千畝徴銀七十兩吉林各屬吉林左右翼官學一所在城內東南隅康熙三十二年建八旗每佐領名下額送學生四名肄業每翼設助教一員寧古塔官學一所在城內東南隅雍正五年建八旗每佐領名下額送學生六名肄業白都訥官學一所在城南門內雍正四年建八旗每佐領名下額送學生四名肄業三姓官學一所在城內東南隅雍正十二年建八旗每佐領名下額送學生四名肄業阿勒楚喀官學一所在城內東南隅雍正五年建八旗每佐領名下額送學生三名肄業拉林官學一所在拉林堡內東北隅乾隆二十一年建八旗每佐領名下額送學生三名肄業以上四處官學各設教習一員係吉林將軍所轄黑龍江各屬齊齊哈爾官學一所在城東門內乾隆九年建八旗每佐領名下額送學生一名肄業墨爾根官學一所在城內乾隆九年建八旗每佐領名下額送學生一名肄業黑龍江官學一所在城內乾隆九年建八旗每佐領名下額送學生一名肄業以上各學每學設教習一員係黑龍江將軍所轄入學員額國初遼人入關者寄籍永平山海等處故永平舊有遼學後奉天二府屬州縣以次建立學校而盛京駐防八旗官兵子弟應試者因赴京遙逺亦入奉天府學百數十年來久道化成人文蔚起故額取亦日漸增焉奉天府嵗試額取文童七名原額六名乾隆三十六年奏准於復州學額內撥增一名滿洲文童十一名漢軍文童八名承德縣額取文童七名武童七名原額武童六名乾隆三十六年額奏准於復州學內撥增一名遼陽州額取文童五名武童五名海城縣額取文童五名武童五名蓋平縣額取文童三名武童三名原額二名乾隆三十六年奏准於復州學額內撥增文武各一名開原縣額取文童二名武童二名鐵嶺縣額取文童二名武童二名復州額取文童五名武童五名原額俱八名乾隆三十六年奏裁三名額數撥增奉天蘞平廣寧三學寧海縣額取文童四名武童四名錦州府額取文童九名武童四名錦縣額取文童七名武童七名寧逺州額取文童五名武童五名廣寧縣額取文童三名武童三名原額二名乾隆三十六年奏准於復州學額內撥增文武各一名義州額取文童四名武童四名科試各學文童額取與嵗試同乾隆元年奉恩㫖將奉天府學滿字號照中學例加五名錦州府復州學合字號照小學例加三名其遼陽州等學原額七名五名者加二名四名二名者加一名四十三年奉恩㫖將滿合二號及奉天所屬各學科考廣額一次其向取進六名以上者增額三名四五名者增額二名二三名者增額一名公宴賓興等禮中式文舉人每名給花紅銀十兩武舉人每名給花紅銀五兩㑹試公宴銀共一十五兩文武生員賔興銀兩每名自六錢一分二厘至八錢八分三厘不等直𨽻永平府遼學裁併附載順治初遼東十五學寄設永平置教職三員統之五年改設遼學裁教職二員設入學廩額各八十名嵗貢三名其十五學名目俱裁十一年設遼陽府題准設立儒學其永平府遼學生員俱歸遼陽府學肄業十三年題准諸生現居遼陽者在遼陽府學肄業其原寄永平府學者仍留永平學如有願還遼地者聽並令學臣按試時取諸生互結係真遼籍者方准寄永平學入試其永平寄學廩額八十名內分四十名歸遼陽府學至永平府寄學每案文童仍許入學四十名亦取遼學生員保結遼陽海城二縣學每學始設廩額五名俟人才日盛仍照縣學例每學設廩額二十名遼陽府學永平寄學每年各貢一名遼陽海城二縣學每二年各貢一名康熙五年復題准遼人寄籍永平者歸併永平府學應試其寄居籍貫及夾字號名目俱裁山東復州金州二衛學裁併附載國初沿明舊制遼東復州金州二衛學附入山東萊州府各置教職一員康熙五年題准遼人寄籍山東者歸併山東各學應試雍正五年覆准山東復州金州二衛學歸併奉天府由奉天府府丞考試如願留居山東者即入萊州府民籍應試其二衛學入學額數及廩額俱裁欽定盛京通志卷四十四
