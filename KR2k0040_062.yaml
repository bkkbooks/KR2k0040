body:
  text: 歴朝人物一漢晉前燕附北魏北齊北周隋唐欽定盛京通志歴朝人物臣等謹按遼為古營州域風厚土博長白巫閭之雄秀三江二遼之浩瀚磅礴鬱積間氣鍾靈士生其間英偉魁碩維嶽降神生甫及申有由然也兩漢六朝紀載簡略傳不數人洎乎遼金創業佐命之材屏藩之彦接踵繼起山川靈秀應運而興豈偶然歟臣等博考史傳徵信採輯謹志歴朝人物第二十三欽定四庫全書欽定盛京通志卷五十八歴朝人物一漢王閎樂浪􅠗邯人七世祖仲自琅邪遷至東漢初為郡三老更始敗土人王調殺郡守劉憲自稱大將軍樂浪太守建武六年光武遣太守王遵将兵擊之至遼東閎與郡曹吏楊邑等共殺調迎遵皆封為侯閎獨讓爵帝竒而徵之道病卒王景字仲通閎之子少學易遂闚衆書又好天文術數顯宗時有薦景能理水者詔與將作謁者王呉共修浚儀渠乃不復為害永平十二年議修汴渠引景問理水形便景陳其利害應對敏給帝賜景山海經河渠書禹貢圗發卒數十萬遣景與王呉治渠隄起滎陽至千乗海口千餘里景度地勢鑿山截澗防遏衝要疏決壅積十里立一水門令更相迴注無復潰漏之患隄成選御史建初八年遷廬江太守先是百姓不知牛耕郡界有楚孫叔敖所起芍陂稻田景至乃驅率吏民修起蕪廢教用犂牛由是墾闢倍多境内豐給又訓令蠶織為作法制初景以六經所載皆有卜筮而衆書錯糅吉凶相反乃𠫭紀衆家數術文書冡宅禁忌堪輿日相之屬適於用事者集於大衍元基云李久遼東人安帝時海賊張伯路寇東萊為青州刺史法雄所破逃還遼東久率鄉勇等共斬之遼地以寧晉李􅏷字宣伯遼東襄平人父信早喪𦙍甫有知識即以喪禮自居又以祖敏浮海不知所終設木主事之舉孝亷㕘北軍事遷樂平侯相政尚清簡入為吏部郎銓綜亷平賜爵闗中侯遷御史中丞恭恪直繩百官憚之泰始初拜尚書轉太子少傅拜侍中加特進俄遷尚書令𦙍雖歴職内外兒病貧無以市藥帝聞賜錢十萬詔拜司徒簡亮持重稱為任職卒諡曰成孫志嗣爵前燕附高詡遼東人善天文有權畧永嘉之亂避地隠居建武初慕容廆收攬豪傑詡杖䇿見之曰霸王之資非義不濟今晉室雖微人心猶附宜遣使江東示有所尊廆即遣長史王濟浮海詣建康勸進後廆承制以詡為郎中令及皝嗣進詡元莬太守皝破慕容仁復遼東欲盡坑其民詡諫止之皝又謀伐宇文逸豆歸詡曰必克但不利於将及進戰克之詡中流矢卒張統遼東人以樂浪帶方二城與高句驪主乙弗利相拒連年不解樂浪王遵説統歸廆廆為之置樂浪郡以統為太守遵㕘軍事後高句驪將如奴子據河城寇掠遼東統掩擊擒之韓夀遼東人太興二年慕容廆進據棘城宇文大人悉獨官率兵十萬逼城廆使召其子翰於徒河翰請於廆曰彼衆我寡易以計勝今城中之衆足以禦寇請為奇兵於外伺其間而擊之内外俱奮破之必矣若合兵為一使彼得專意攻城非䇿之得且示衆以怯恐士氣不戰自沮廆猶疑心夀進言曰悉獨官有慿陵之志将驕卒惰軍不堅固若竒兵猝起掎其無備必破之䇿也乃聴翰留徒河翰果出竒兵破悉獨官盡俘其衆北魏安同遼東人其先祖曰世高漢時以安息王侍子入洛厯魏至晉避亂遼東遂家焉同性端荘明惠好長者之言登國初魏太祖徴兵於慕容垂同奉使稱㫖從征姚平於柴壁進計截汾曲為南北浮橋乗西岸築圍姚興至遂不能救以功封北新侯明元即位命同持節循察并定二州宣詔撫慰問其疾苦糾舉守宰不法郡國肅然及太武監國以同與長孫嵩奚斤崔宏等八人共聴政同在官明察長於校練家法脩整為世所稱卒贈高陽王諡恭惠安難同之子幼有巧思初從杜超南伐以功為清河太守世祖時諸將頻征和龍皆以難為長史鑿山堙谷省力兼功遷給事中復以軍功賜爵清河子安原同之子雅性矜嚴沈勇多智明元時鎮撫雲中寛和愛下甚得衆心蠕蠕犯塞輒摧破之賜爵武原侯太武即位拜駕部尚書進爵河間公安頡原之子辨慧多䇿略最有父風太祖初為内侍長令察舉百僚糾刺無所避宜城王奚斤追夏主赫連昌至安定馬疫糧乏為所敗頡時為監軍欲決死戰斤言馬少欲待救騎頡曰兵疲力屈士有飢色不一決戰則死在旦夕何救之可待等死當戰死寧可坐受囚乎斤猶不從頡與尉眷等謀選騎待之昌来攻壘頡出力戰擒昌送京師賜爵西平公攻宋拔洛陽潰虎牢招降萬餘户頡為将善綏士衆及卒降者無不歎惜神䴥四年贈王爵諡曰襄屈恒字長生昌黎徒河人沈粹有局量太宗時以破平涼功賜爵濟北公㳟宗在東宫恒領太子少傅内外稱平世祖委以太政車駕出征常居中留鎮與盧魯元俱賜甲第卒贈征西大将軍諡曰成盧魯元昌黎徒河人寛和有雅度明元時以忠謹給侍東宫太宗親愛之及即位以為中書侍郎魯元益謹肅内外臣工莫不敬憚性多容納與人交掩惡揚美公卿咸親附之太祖征赫連昌親追擊入其城門魯元隨以出入有保䕶功遷太保録尚書事賜第於宫門南卒贈襄城王諡曰孝高道悦字文欣遼東新昌人初為諫議大夫正色當官不憚強禦孝文時詔嘉其蹇諤以為主爵下大夫太和問車駕将由水路幸鄴已詔都水回營構材以造舟檝道悦表諫以為闕居宇之功作游嬉之用損耗殊倍又深薄之危古今共慎於是車駕遂從陸路行道悦在官儼然難犯宫官上下咸畏憚之卒贈散騎常侍諡曰貞侯長子顯族拜給事中亦以忠厚見稱李元䕶遼東襄平人晉司徒𦙍八世孫少有武功軀幹雄偉鬚長二尺以魏平齊後隨父懐慶南奔為裴叔業司馬叔業歸魏元䕶賛成之景明初為齊州刺史封廣饒伯州内飢儉表請賑貸蠲其賦役高崇字積善父潛自高麗歸魏賜爵陽闗男居遼東崇少聰敏以端謹稱景明中襲父爵除洛陽令為政清斷發摘不避強禦吏民畏其威風縣内肅然嘗謂人曰孔門四科徳行為首人能立身約已不㤀典訓斯亦足矣卒贈滄州刺史諡曰成謹案陽闗男北史作開陽男高謙之字道讓崇之子少事後母以孝聞及長專意經史天文圗緯之書多所該涉襲父爵孝昌初行河隂令先是有人囊盛瓦礫指作錢物詐市人馬者逸去謙之偽枷一囚于市宣言是前詐馬賊今欲刑之遣腹心宻察市中私議有二人相見訢然曰無復憂矣遂執之悉獲其黨尋正河隂令損益治體多為故事時佞幸寵要皆嫉謙之除國子博士與袁翻常景酈道元温子昇等咸申欵舊好施贍䘏言諾無虧以父舅氏沮渠蒙遜曾據涼土國書漏缺乃修涼書十卷行於世後為李神軌所讒賜死永安中贈營州刺史諡曰康高㳟之字道穆崇之子少聰敏學涉經史所交皆名俊幼孤事兄如父母正光中為御史糾摘不避權豪孝荘即位除太尉長史加前将軍及元顥逼虎牢或勸孝荘赴闗西恭之曰闗中荒殘何可往請車駕北度循河東下號詔諸軍一向虎牢一赴河内為犄角勢孝荘然之夜至河内令恭之作詔書布告逺近於是四方知乗輿所在孝荘復辟除御史中尉仍兼黄門恭之外執直繩内㕘機宻凡益國利人之事必以奏聞諫争無所顧憚改鑄錢貨編次圗典選用御史皆當世名流人服其有知人之鑒後為爾朱世隆所害太昌中贈雍州刺史高子儒字孝禮崇之孫元顥入洛孝莊北巡子儒踰河至行宫備陳元顥敗在旦夕孝莊以為大慰已意授秘書郎進司徒中兵㕘軍襲爵興和中四方多有流民子儒為梁州北豫西兖三州檢户使安集甚衆竇瑗字世珍遼西遼陽人系出扶風平陵漢大将軍武曾孫崇為遼西太守遂家焉瑗仕魏為太常博士從爾朱榮東平葛榮封容城伯乞以封讓兄叔珍宣武時為廷尉卿及釋奠開講與温子昇魏季景李業興並為摘句天平中除廣宗太守有清白稱轉中山太守為吏民所懐累遷至大中正兼廷尉卿貧窘如布衣齊獻武王頒書州郡嘗稱瑗政績以為勸勵卒諡曰明北齊可朱渾元字通元遼東人寛仁有武畧少與齊神武相知後從爾朱天光平万俟醜奴等有功為宇文泰所疑遂歸神武累功拜司空封扶風郡王元平生用兵持重未嘗負敗皇建初配享文襄廟廷弟天元亦有将畧便弓馬封昌陽縣伯天保初位位尚書卒諡恭武按可朱渾元舊志以為不應濫入人物但北齊書既有列傳且稱元自云遼東人應存之以備考北周豆盧寧字永安徒河人驍果善射魏永安中從爾朱天光破万俟醜奴賜爵靈夀男周文時来歸從擒竇泰破稽胡與東魏戰于芒山皆有功進范陽郡公周保定四年卒初寧無子養弟永恩子勣及生子讚親屬皆請讚為嗣寧曰兄弟之子猶子也終不易時以此多之李弼字景和遼東襄平人六世祖根北史作振仕慕容垂為黄門侍郎祖貴醜平州刺史父永大中大夫弼少有大志膂力過人屬魏室喪亂嘗云大丈夫會須平寇難安社稷以取功名安能藉階資求榮位乎魏永安元年從爾朱天光討破赤水蜀以功封石門縣伯又與賀拔岳討万俟醜奴万俟道洛王慶雲皆破之弼恒先鋒陷陣賊咸畏之曰莫當李将軍天光赴洛弼因𨽻侯莫陳悦太昌初除南秦州刺史隨悦征討屢捷及悦害賀拔岳周太祖宇文泰討悦弼勒所部歸泰仍令弼以本官鎮原州太統中從平竇泰又從平𢎞農與齊神武戰於於沙苑以功拜特進十四年討北稽胡平之遷太保加柱國大將軍孝閔踐祚封趙國公弼每征討朝受命夕便引路畧不問私事秉性沈雄有深識故能以功名終卒年六十四諡曰武配食太祖廟廷謹案李弼系本隴西周太祖時来歸始家遼東並賜姓徒何考李延夀北史尚載弼為隴西成紀人葢就其始而言之今依周書所載列入遼東人物李􅎎字雲傑北史作靈傑弼之弟長不盈五尺性果決有膽氣為周文帝帳内都督從復𢎞農破沙苑􅎎跨馬運矛衝堅陷陣敵人見之皆避周文初亦聞􅎎驍悍至是方嗟歎之謂曰但使膽決如此何須八尺之軀也武成初從豆盧寧征稽胡有功封汝南郡公李綸弼之子有文武才以功臣子居顯職歴吏部内史下大夫並獲當官之譽位至司會中大夫封河陽郡公隋李衍字拔豆遼東襄平人父弼為周太師衍少專武藝慷慨有志畧仕隋為行軍總管討叛蠻平之進柱國後以伐陳功拜安州總管頗有惠政豆盧勣字定東寧之子聰悟有器局初周明帝時嗣寧爵授左武伯中大夫自以經業未通請解職遊露門學帝嘉之勅以本官就學嗣丁父艱武帝嗣位起復為渭州刺史甚有惠政大致祥瑞鳥鼠山絶壁千尋由来乏水勣馬足所踐忽踊飛泉又有白烏乳子庭前人為之謡曰我有丹陽山出玉漿濟我人夷神鳥来翔因號其泉曰玉漿泉隋開皇中拜夏州縂管上以家世貴盛勲效克彰甚重之李寛弼之孫幹畧過人自周及隋數任将領位柱國蒲山郡公號為名将度地稽粟末人本白山渠帥煬帝時窘于髙麗因率所部降拜右光禄大夫居桞城及征遼東之役從戰有功十三年從幸江都尋放還栁城為李宻所邀前後十餘戰僅得免謹案度地稽唐書作突地稽唐李謹行靺鞨人父突地稽初事隋及唐武徳初奉朝貢授總管以戰功封耆國公貞觀初進右衛將軍賜姓李謹行偉容貌勇冠軍中累遷營州都督高宗時破高麗于發盧河之西妻劉氏亦以伐匈奴功封燕國夫人上元元年發兵討新羅以謹行為安東鎮撫大使三戰皆捷新羅乃入貢謝罪三年破土蕃於青海封燕國公卒贈幽州都督陪葬乾陵李楷洛營州栁城人本契丹渠師中宗時累官左羽林大將軍封薊郡公吐蕃冦河源楷洛擊走之初行謂人曰賊平吾不歸矣師還卒於道諡忠烈李多祚其先靺鞨人號黄頭都督入中國多祚乃其後裔累軍功遷右鷹揚大將軍室韋及孫萬榮之叛命多祚進討以勞改右羽林大将軍領北門衛兵張柬之將誅二張以多祚素感慨可動以義就與定謀多祚泣數行下引天地以自誓遂與王同皎李湛等共誅易之昌宗中宗復位封多祚遼陽郡王李惠登營州栁城人為平盧軍禆将安禄山叛從董秦泛海畧定滄棣等州輕兵逺鬬賊不支戰輒北史思明叛惠登陷賊中以計得脱依来瑱及李希烈反以兵二千使屯隋州惠登挈州歸朝即拜隋州刺史居二十年興利去害田闢户增人歌舞之節度使于頔上其績詔加御史大夫李光弼營州栁城人楷洛子襲父封以功破吐蕃吐谷渾進雲麾将軍安禄山叛郭子儀薦其能詔加魏郡太守河北採訪使光弼以朔方兵五千東救常山降賊将安思義又却賊於饒陽會郭子儀守雲中詔悉衆出井陘與光弼合擊史思明于九門西大敗之及拔趙郡士多擄掠光弼坐譙門收所獲還之民至徳二載思明等将兵十萬攻光弼於太原時麾下兵不滿萬光弼撤屋為櫐石車石所擊輒傷賊思明為飛樓障以木幔築土山臨城光弼遣人穴地頽之又時遣突騎出乗賊俘斬萬計思明乃遁去乾元初九節度師潰于相州光弼整衆還太原未幾為天下兵馬副元帥賊方闚洛光弼悉軍趨河陽擒安太清于懐州廣徳元年擒浙東賊袁晁賜鐵劵圗形凌烟閣光弼知兵善用人謀定後戰能以少覆衆初與郭子儀齊名而戰功推中興第一卒贈太保諡武穆李彚光弼子有志操亷潔自矢元和初徐州苻離分為宿州以光弼有遺愛擢彚為刺史後遷涇原節度使罷軍中雜徭出俸錢贖将士質賣子還其家卒贈工部尚書王思禮高麗人入居營州初事哥舒翰以功授右衛将軍安禄山叛思禮勸翰表誅楊國忠翰不從潼闗失守思禮走行在及收東京戰數有功封霍國公乾元初討安慶緒九節度之師潰于相州惟思禮與李光弼全軍還光弼徙河陽代為河東節度副大使在鎮器甲完整儲粟至百萬斛奏輸其半於京師卒諡武烈侯希逸營州人天寳末為州禆将安禄山叛以其親將為平盧節度使希逸率兵與安東都䕶王元志斬之數擊賊有功以孤軍無援浮海保青州寳應初平史朝義加檢校工部尚書圗形凌烟閣李澄遼東襄平人隋蒲山公寛之裔徳宗時為滑州刺史李希烈陷汴渭州亦降興元初澄自永平遣盧融間道奉使詣行在徳宗嘉之署帛詔納蠟九授澄刑部尚書汴滑節度使澄宻勒訓士馬以誅希烈養子之戍白馬者及希烈悉衆圍陳州澄遂引兵歸國貞元初遷檢校尚書左僕射義成軍節度使封隴西王卒贈司空李璀渤海靺鞨人本姓茹父懐光為朔方将以功賜姓李建中四年朱泚圍奉天懐光入援倍道至河東敗泚兵於醴泉又敗之于魯店泚解圍去功髙威重為盧把所忌屯咸陽不進璀時為監察御史宻言于徳宗曰臣父必負陛下願早為備徳宗驚曰然則卿以何䇿自免曰臣之進言非茍求生臣父敗則臣與俱死矣使臣賣父求生陛下亦安用之及懐光死璀亦自殺欽定盛京通志卷五十八
