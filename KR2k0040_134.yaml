body:
  text: 國朝藝文十六奏疏序欽定四庫全書欽定盛京通志卷一百三十國朝藝文十六奏疏恭篆御製盛京賦奏乾隆戊辰傅恒竊惟字學為文章之祖篆書復正草之縁指事象形無體不備我朝文明光啟肇建國書得天地之元聲兼圖疇之奥旨我皇上神姿天亶聖學淵深制作集古今之成典謨駕虞夏而上特命臣等將國書仿各體篆法繙寫成字臣等袛奉明綸欽遵辦理伏查篆文筆于頡籀沿及斯邈有五體六體八體十體五十六種十二家之目或銘鍾鼎或著簡編世逺年湮已多散佚今攷金石所垂尚有三十餘體可供橅仿惟是繙寫宜有成書而典籍浩繁博綜匪易臣等伏讀御製盛京賦囊括羣言包羅萬彚義藴既富字數復多應請即以盛京賦清漢正文繕寫各家篆體兾藉雲漢之華用増芝蕙之重并請特簡大臣經理其事遴選滿漢儒臣給之筆扎敬謹繕録進呈仰侯睿裁庶垂藝苑之鴻文作墨林之瓌寶頒賜八體篆書御製盛京賦羣臣合詞謝恩奏乾隆戊辰張廷玉欽惟我皇上性超舜哲道邁堯思曽攄秘殿之毫用撰盛京之賦望風雲之勢地是邠岐掞日月之華文同義娰固已金聲玉振擅麗藻于書林壁合璣璇播鴻章于藝苑迺以萬㡬餘暇更搜八體諸文本大海所増加輯成蟲篆進羣工而指示俾協麟書麝墨模成字字龍跳虎卧魚牋寫就行行鳳翥鸞翔爰即三千餘言勒成三十二體在古法則形模各列已徴淵奥于揮毫而國書則體製俱陳尤駭神竒于運腕綜垂露懸針之妙愈彰御製輝煌集偃波倒薤之精益表天文璀燦洵屬人寰所罕見允為策府之竒觀臣等久沐榮光復䝉恩賜尚方捧出雀躍騰歡中禁頒來鵷行動色珍同玉檢瑞嫓球圖秘在書倉緗巾夾煥雲霞之彩藏諸家塾瑤函増星斗之光頒賜御製薩爾滸書事石刻羣臣合詞謝恩奏乾隆丙申舒赫徳欽惟我皇上紹承祖烈闡繹前光永惟國家締造之模推本烈聖艱難之緒我太祖髙皇帝誕膺景命肇起興京㑹觧吉林崖之圍因有薩爾滸之戰神人協應心徳同孚提我旅數千人摧明兵四十萬撫順之前師盡覆開原之宿將俱殱再掃寛甸之援兵爰撫朝鮮之降帥奏鴻勲于五日識皇天眷徳之隆揚駿烈于萬邦知聖代開基之盛皇上勤思丕績祗遹成謨追璿畧而神欽毎懐策馬援戈之勩展瑤遍而意切如見櫛風沐雨之勤乃因金匱之尊藏未普見聞于奕世爰御丹毫以親製臚詳事實于當年彰神武于古今溯前史罕儷經營之業炳大文于天地厯億載常懐兢翼之心垂訓于監夏監殷當承平而不忘克詰示戒于惟休惟恤合上下而共朂其艱勒自貞珉用昭垂于久逺頒之祕府遍宣賞于臣鄰臣等頌徳難名服膺有志仰皇𠂻之無斁守成與創業同源捧宸翰以交欽紀事以纂言並重頒賜奉天文武大臣御製薩爾滸書事清漢合壁謝恩奏乾隆戊辰𢎞晌本年五月十二日奉頒御製太祖大破明師于薩爾滸山之戰書事清漢合璧賞賜臣等各一函當即叩頭袛領訖欽惟我皇上紹聞祖烈袛遹前光仰惟髙皇帝肇業之隆始自薩爾滸宏勲之集時也明兵連營並進我旅分翼遄攻本心徳之同孚實神人之合應掃全師于三路膚功奏五日之間揚大武于八旗王基經一戰而定盖惟天祚徳膺眷顧以啟神謀而惟聖纉圖遵艱難以昭丕緒溯贊謨于皇室分勞揚同氣之休紀翊運于元勲致果協一心之誼永念夫櫛風沐雨非締構獨凛其艱勤思于擐甲援戈雖履盛無忘克誥闡亘古希聞之偉績重熈耀以天章譯本朝世守之成書更敷宣于國語編符聫壁共深欽佩于瑤鈐製式同文並致敬承于寶録前次頒邀石刻什襲永弁乎卿班今兹捧重琅函拜賜復周于臣僕臣等依光禁近宣職陪都循盥誦而抒忱展卷頒無疆之業同服膺而感徳諧音懐永矢之情序前通志序康熙甲子董秉忠聖天子御極以來武功震叠文教四訖幅􅊷式廓百度咸熈職方輿地之書直省漸次修舉而臣秉忠以叨簡命作尹奉天乃奉詔偕鎮帥臣督輯通志事書成將拜手獻之闕廷謹颺言其端曰古帝王以聖徳神功膺圖受籙必有王氣特鍾之地締搆鴻基而後四表宅心大業式闢綿寶厯於有永盖皇天眷命靈袛協應理同然矣我太祖以武功肇造太宗以文徳覃敷盛京實為發祥靈地世祖統御萬方燕京定鼎遂為留都皇上神謨睿畧眷念根本之邦畫疆設鎮分建州郡梯航貢琛欵邊内附者億萬計版圖所𨽻聲教所敷書契以來未有加焉臣竊按盛京乃古營州之域星躔箕尾拱長白挟巫閭襟繞滄溟跨馭大漠盖居出震之方扼天下形勝之首也稽之昔乘未有専書若是乎地靈獻瑞鉅典聿煌端以待開天立極之聖矣逖觀往古治化莫盛于周之成康雅頌所傳必推本古公文王岐豐之舊凡山澤險易之宜宫室苑囿之富與夫里巷風謠昆蟲草木莫不偹悉誠以王業所自川嶽懐柔已奠宗社磐石之基而祖宗積功累仁創制立法皆裕千萬世子孫久安長治之計今盛京固我國家岐豐地也是志也列其山川疆土則將遡高山荒作之勤稽其建置經畫則如述考卜燕貽之旨搜其民風物産則疑進幽風七月之章于以仰副皇上覲光揚烈之深心則一志而治道具焉矣受事以來早夜兢兢國初典制之大請之部臣邊圉諮之鎮帥内地則二三有司分厯考究為圖有九為志三十有二事舉其綱詞規其質訂閲之餘仰見列聖謨烈之顯赫昭融深懼固陋不文不能頌揚萬一伏惟石渠天禄珥筆之臣必有潤色大業黼黻休明者從兹旁搜博覧以期明備焉將留都名勝之盛典祖徳宗功並昭垂于奕世斯固中外臣庶所拭目欣瞻也夫前通志序康熙甲子邉聲廷國家撫有天下何以有志哉志以紀方土形勝人官物曲迄于英賢文行上追􅉨古下詔來兹而已志成獻之于上迺命詞臣裒集大書名曰一統志曰統志以天下言也至通志則以一省言之夫不越户庭而周知海内者志為之也我朝自建鼎以來戡定既久文命誕敷厯數十年而有億萬年之圖三四傳而有千百傳之緒追原厥故肇自太祖闢土開疆繼以太宗功徳隆盛爰及世祖正域四方今天子宵旰圖治罔有暇逸以致六合嚮風輸誠納貢者萬國皆共球矣其幅􅊷之廣濶物類之茂美人民之愛戴政事之舒長髙出前代駕軼隆古太平之象不待稽之載籍咸能通曉雖然藏之太府垂之奕世者志也盛京為根本重地帝業之所由來日昌日熾通志更不容已奉命纂輯良已有年祗以舊籍靡稽艱于速就去年夏六月京兆臣董秉忠甫任即檄令各屬咸至量能授事分類采輯或稽之稗史或詢之老成更取各屬新志増刪訂正詞尚質實義貴顯明數閱月而稿成帙雖簡約大義悉該尋付欹劂臣聲廷職司學政不敢以謭劣自諉間附商㩁它日奏之殿廷宣之宇下舉志所列而陳之自創基之始以至皇圖之大自畿内之制以及邊塞之防炳耀耳目考之天經天經如是其燦也察之地義地義如是其辨也徴之庶類庶類如是其蕃昌也荷鋤者農横經者士畫疆布位置度式昭推而至于臣忠子孝友信婦貞更至于方外遺踪避人遯世無所不著也終之以華國之事則雲漢為昭渡河作勢先典制而後高文如是其彰彰也閲斯編者可以覧盛京之大槩矣越嵗甲子春王臣聲廷以量移京闕卿貳之班不能待梓人之告竣而去然頌揚發祥大業樂觀是書之成則實鳬藻欣躍不能自已者也前通志序康熙甲子張鼎彛志何昉乎禹敷土奠山則壌城賦爰作禹貢葩經採列國之風詞加詳焉其義一也後世風俗通食貨志之屬皆襲其枝庶者耳然則志也者一方之文獻也史也即所以為治也取一方之所具而縷析之山川田賦有紀城郭宫室有紀人物風俗有紀前言往蹟以訖昆䖝草木之㣲靡不有紀士君子披卷而抽繹焉體國經野之道統是矣郡之志重乎邑省㑹之志重乎郡地有廣狹事有繁簡所闗者大則所舉者尤職其要也况創業垂統基萬世無疆之休嫓美邠岐豐鎬者乎盛京為我朝龍興地太祖神武天錫攻無不取戰無不克大業于焉托始太宗乃聖乃文任賢敷教百度釐修遐邇豫附已具撫有寰區之概世祖定鼎燕都天庥滋至禹甸周彊悉𨽻籍于職方氏要唯宏前聖遼左丕顯之緒也哉皇上宵旰圖㡬禮明樂備追述祖功宗徳纂修大清一統志以昭示來兹爰勅奉天府尹先修盛京通志以便彚輯為諸省弁冕粤稽往乗秦漢以來遼地界在邊陲竹策寥寥無足異者迨遼金建邦啟土文治未光紀載仍多闕畧明改郡縣為衛所雖舊有遼東志兵燹之餘無復蠧簡維時幅􅊷狹隘亦未有如今日混同愛渾諸地方數千里之廣悉歸版圖者也稽攷莫資撰述罔據是以珥筆者恒深舛漏之虞我皇上均知其故申命府尹㑹同奉天將軍寧古塔烏拉等處凡從古輿圖所未備者咸搜採勿遺勿訛于是京兆臣董秉忠仰體宸𠂻率二三守令夙夜敬勤以勷厥事不期年而告竣猗歟休哉誠千秋曠舉也臣典彛承乏典學兹土校士之暇為取其畧而三復之因思是役也非徒焜耀史冊侈方輿之雄濶我皇上盖有尊祖敬宗勵精圖治之深意存焉志山川疆域如誦天作高山庶無忘祖宗祥發之有自志城廓宫闕如誦臯門應門庶無忘祖宗締造之維艱念祖宗分職亮采董正百司志官制恍然周官立政之書也念祖宗貽謀勤儉開國忠厚志風俗恍然烹葵剥棗之什也重農勸穡不溢惟正之供則祖宗所其無逸之宥宻可法也為之志田賦崇儒重道扶進人文則祖宗菁莪樸棫之雅化可式也為之志學校長白鴨緑挺秀鍾英至本朝而天地之靈藴無復秘蔵從龍崛起一徳一心則祖宗知人善任之睿哲可師也為之志人物若夫前言往蹟必録昆蟲草木必登則祖宗寶善拜昌不貴異物之徳固有無在不存者繼自今聖子神孫紹休御極咸知取祖宗之所以治遼者治遼且將咸知取祖宗之所以治遼者治天下也不亦常留郅隆于盛世乎昔韓起適魯見易象春秋嘆曰吾乃今而知周之徳與周之所以王也後之君子觀是編亦可以知我皇清之徳之盛與我皇清之所以帝也重刻前通志序康熙辛夘廖騰煃盛京之有通志也所以弁冕諸省而誌祖宗之創業垂統根本鴻圖猶詩之冠以周南也其間山川田賦城郭宫室人物風俗以及前言往蹟昆蟲草木之微靡不詳偹始于康熈二十二年我皇上纂修大清一統志特敇奉天府尹臣董秉忠協同鎮帥督輯成書厯有年所臣騰煃康熈四十八年恭承簡命尹兹東土見地勢之豊隆人民之熈皥乃知王迹肇基皇天之眷命有自來矣爰取通志一書朝夕披讀恍如目覩邠岐豊鎬之盛惟是此書頒行日久印刷滋多梨棗䝉翳臣謹㑹同府丞臣吕履恒治中臣李舜卿通判臣嚴舒並府州縣臣唐之夔盧兆鵬李尚隆等協力訂正鋟板一新因思我太祖太宗文徳武功肇造區夏世祖統馭萬方定鼎燕京至我皇上以神謨睿算式于九圍版章孔厚式廓日増而尤惓惓于留都首善之地聖懐所注往往托之篇章以示其容保無疆之意是故封山有典訓士有文蠲租有詔東巡有詩臣于拜手諷誦之下仰見我皇上敬天勤民孜孜無逸之心此二帝三王之所以永世而千萬􅑤所宜法守者也用是齋宿繕寫敬鐫于三十二卷藝文之首俾讀是書者知萬嵗之暇留心于士風民瘼如此繼自今聖子神孫遡功徳之崇思締造之艱振振䋲䋲紹休勿替臣請誦萬年受祜之什以對揚美盛云爾留都文萃序康熙辛夘吕履恒留都文萃者予為奉天丞試士之作也嵗辛邜予自西臺蒙聖恩擢任此職例兼學政甫下車觀風得文若干首嗣是季有考月有課越明年壬辰春嵗試兩郡彚而集之名為文萃謂人文之所聚也天地翕而萬物生上下交而治道成學行合而文教興是故觀其所聚而見人文之大全也我皇上堯仁舜智稽古右文光華復旦之治嫓隆唐虞而聖學日新無時不以教養為務惟兹留都乃國家發祥之地風雨㑹和之區其土博厚其俗敦龎其民質直故其為文也清而能淳秀而不佻加以官兹土者自尹若丞而下咸思仰承徳意以收儒效漸摩日久蒸蒸丕變予不敏猥承諸君子後夙夜袛懼罔敢隕越是以從龍之裔人才輩出即各學人士亦彬彬可觀竊思文教武功隨時異用皆帝王御世之權而移風易俗之大機也昔者周室盛時辟廱鐘鼓四方攸同因之重熈累洽遂卜年世之逺論者謂周治尚文較夏商為明偹不知周之先祖父公劉太王之世其尚忠質也久矣我國家受天景命列聖相傳肇基興京恭惟太祖高皇帝知勇天錫保世滋大規模洪逺太宗文皇帝創制顯庸光大前烈立學校行釋奠禮美哉始基何文治之隆也欽惟世祖章皇帝以聖神文武之資奄有九州定鼎燕京𨗳民養士皆可為萬世法程豳岐豊鎬之盛逺過姬周而太和之在宇宙咸萃于聖主之勲華矣夫源之逺者流必長根之茂者發必盛易曰觀乎人文以化成天下恒之彖曰聖人久于其道而天下化成十五國風以二南為始基緜之九章推本受命之原而必以疏附後先為蹶生之助然則制藝之文其即古者言揚之典而學校之臣所由以人事君者乎且言者心之聲文者行之素也士有才能而不遇有司之過也時方郅隆而學不布聞亦士之恥也用是㧞其尤者授之剞劂俾海内人民知聖天子之欽明文思化成有本而陪京之風㑹三韓之才藪所以鍾聚于東北而發揚于天下者其來有自盖乾高坤厚之氣生長乎震然後巽齊于東南而萬物兊恱焉則國家萬年之景運于是乎徴而世有知言者亦將于此覘多士之器識而决其所成就豈徒競勝藝林取悦當世云爾哉續修通志序雍正乙夘王河恭惟世宗憲皇帝聰明睿知文武神聖時勤宵旰懋登上理董正治官則百僚師師而庶績熈也敬教勸學則多士濟濟而文治隆也秉耒者慶豐年而享含哺之樂懋遷者逺服賈而慰考飬之心固已風俗醇良遐邇如一百昌茂對中外皆同矣夫位天地而育萬物者太平之象也圖王㑹而採風謠者郅隆之規也周重邠岐漢尊豐沛者王業之所由基也書陳禹貢禮載職方者輿圖之所自始也伏惟本朝一統志典制所昭久有成書今經數十餘年化與日新治偕時懋規畫益加宏逺采輯更宜精核聖慮周詳爰詔直省重加増訂次第獻之闕廷俾珥筆諸臣㑹萃成帙用揚盛羙臣河荷承恩命督學東土兼署尹篆值盛京通志尚未告竣謹率所屬分類纂輯凡幅􅊷之廣生齒之繁文物之盛制度之詳莫不備載並前志或遺者亦旁搜博訪悉為増入自夏至冬五閲月而稿就值奉天府尹臣宋筠到任相與商㩁論定而各處覆詢之事與逺徼之所當詳者又以次俱到因復集原纂緝諸臣細加校仇益為増補又七閲月再易稿而後成校閲之餘見王業之所起與王化之所成蕩蕩巍巍際天蟠地有非筆墨之所能罄者焉盖自長白鍾靈鴨緑毓秀太祖太宗武功文徳炳耀寰區世祖定鼎燕京東西南北無思不服遼東發祥之地尊為留都聖祖六十餘年久道化成淪肌浹髓世宗憲皇帝覲光揚烈仁育義正者偹及周至而盛京根本重地尤厪睿懐雖漸被無涯而化行有自則恩膏與遼水皆流聲施共閭峯並峙宜乎山川風土載至治之光動植飛潜播太和之象者矣今聖天子統承丕緒孝治光昭凡所以宅中保泰者億萬年日進無疆斯天庥洊至亦億萬年日進無疆豈止發祥之地徳洋恩漙即山陬海澨日見淑氣殷流仁風翔洽我大清一統之盛其與清寧並乆也夫欽定盛京通至卷一百三十
