body:
  text: 山川三吉林各屬吉林寧古塔白都訥三姓阿勒楚喀琿春打牲烏拉欽定四庫全書欽定盛京通志卷二十七山川三吉林各屬吉林長白山即果勒敏珊延阿林在吉林城東稍折而南横亘千餘里東自寧古塔西至奉天府諸山皆發脈於此山巔有潭為鴨緑混同圖們三江之源古名不咸山亦名太白山亦名白山山海經大荒之中有山名不咸有肅慎氏之國晉書肅愼氏在不咸山北魏書勿吉國有徒太山唐書粟末水源於太白山金史世紀其在北者有混同江長白山混同江亦號黒龍江所謂白山黒水是也又禮志大定十二年封長白山神為興國靈應王即其山北地建廟宇有司致祭如嶽鎮故事明昌四年復册為開天宏聖帝其後廟廢葉隆禮遼志長白山在冷山東南千餘里其内禽獸皆白人不敢入恐穢其間以致蛇虺之害明一統志在三萬衛東北千餘里故㑹寕府南六十里横亘千里髙二百里其巔有潭周八十里淵深莫測南流為鴨緑江北流為混同江東流為阿雅噶河今考西南流入海者為鴨緑江東南流入海者為圖們江北流入海者為混同江並無阿雅噶河之名古今稱名之異也本朝誕膺天命考正祀典尊為長白山之神在城西南九里温徳亨山望祭春秋兩祭吉林將軍副都統主之盛京禮部遣官隨祭告如嶽鎮儀康熙十七年奉國家大典遣大臣祭㫖遣大臣覺羅武穆納等登山相視見山麓一所四週密林樷翳其中圜平草木不生出林里許香樹錯列黄花紛郁山半雲垂霧羃不可仰睇諸大臣跪宣㫖畢雲霧倐廓山形瞭然有徑可發其半有石砌臺坦平宜四望山顛作圜形積雪皚然及陟其上五峯環峙如府南一峯稍下如門中潭窈杳距岸五十丈許週可四十餘里山之四周百泉奔注即三大江所由發源也康熙二十三年復遣駐防協領勒輒等周圍相度山形勢廣袤綿亘畧如明一統志所云其巔不生他樹草多白花南麓蜿蜒磅礴分為兩幹其一西南指者東界鴨緑江麓盡處兩江㑹焉其一統山之西而北亘數百里以其為衆水所分舊志總謂之分水嶺今則西至興京邊茂樹深林參天翳日者土人呼為納嚕窩集從此西入興京門遂為魯窩集而北一岡袤四十餘里者土人啟運山自納呼為果勒敏珠敦復西指入英莪邉門其山是為天柱二山迴旋盤曲虎踞龍蟠其間因地立名為山隆業為嶺者不一要皆此山之支裔也山之靈異自昔稱名而神聖發祥於今為盛萬禩鴻基與山無極矣山按舊志謂在船厰東南一千三百餘里今考此實在吉林城東稍南六百里雍正十一年建望祭殿于温徳亨山嵗時致祀乾隆八年有御製駐蹕吉林晚望叩長白山詩十七年有御製望祭長白山詩十九年有御製望祭長白山詩俱恭載珊延白色也阿林山也䝉天章門國語果勒敏長也古語阿雅噶碗也珠敦山梁也事蹟謹稽實録長白山之東有布庫哩山其下有池曰布勒瑚哩相傳有三天女浴於池神鵲銜朱果置季女衣季女含口中忽已入腹遂有身尋産一男生而能言體貌奇異及長母告以吞朱果之故因錫之姓為愛新覺羅名之曰布庫哩雍順與小舠乗之母遂凌空去舠順流至河步于是登岸折栁及蒿為坐具端坐其上其地有三姓争為雄長日搆兵仇殺有取水河步者見而異之歸語人曰汝等勿争吾取水河步見一男子察其貌非常人也天不虚生此人衆往觀皆以為異因詰所由來答曰我天女所生天生我以定汝等之亂者且告以姓名衆曰此天生聖人也不可使之徒行乃交手為舁迎至家三姓推為國主以女妻之奉為貝勒其亂乃定遂居長白山東鄂多哩城國號滿洲是為開基之始越數世遭寇亂宗族多遇害有㓜子遁于荒野賊追之㑹有神鵲止其首追者遥望棲鵲處疑為枯木中道而返乃得免隠其身以終焉其後又傳為肇祖原皇帝是此山實為皇清億萬年發祥重地云尼什哈山國語尼什哈小魚也城東十二里週圍十里髙三百歩上有城周二里城西一井木生其中旁有鯽魚池三石砌乾隆十九年皇上東巡有山詩注云吉林將軍凡祈雨晴皆于是山御製尼什哈天章門恭載小白山城東三百五十里又有一在城東南一千七百餘里西接章茂草頂子海蘭山海蘭國語解見建置沿革卷城東五百五十里相近有海蘭窩集琿達山䝉古語琿達咱們也城東一千一百里多雍果山國語多雍果寸蟒縀也城東一千一百二十里哈喜山國語哈喜急也城東一千一百五十里庫哩哈山國語庫哩哈已唬住之謂城東一千二百二十里拉拉山國語拉拉末也城東一千四百五十里勒富特勒庫山勒富國語觧見疆域形勝卷䝉古語特勒庫楦也城東一千六百里納恩圗山城東一千七百四十里錫喀塔山城東二千一百里雅爾呼達山國語雅爾呼達導引也城西二十里週圍四十餘里又西九十里有伊拉齊山阿勒坦額黙勒山䝉古語阿勒坦金也額黙勒鞍也城西三百四十餘里葉赫山國語葉赫練麻也城西三百九十里克爾素山克爾素國語解見疆域形勝卷城西四百里近克爾素河雅克薩山國語雅克薩刷坍河灣也城西五百四十七里山之西有青陽浦城蒲泊山城西五百八十餘里亦名鄂克濟哈鄂摩山其下有泊中多産蒲國語鄂克濟哈菖蒲也鄂摩水泊也巴延博多和山巴延解見疆域形勝卷里國語博多和計筭也城南二十髙二里週圍十里阿濟格山阿濟格國語解見奉天府山川卷城南三十三里髙一百五十步週五里餘佛爾們山城南四十五里髙四里週圍十里佛斯亨山佛斯亨國語解見疆域形勝卷城南四百里索勒和等河俱發源於此費徳哩山城南五百里髙二十里週圍四百餘里南埒克山國語埒克磨刀石也城南六百五十里髙五里週圍十五里錫爾坦鄂佛羅山國語錫爾坦桅也鄂佛羅解見疆域形勝卷城北十里髙一里週三里鄂山國語鄂碾窩也又臼也城北七十七里髙一百步週四里金州鄂佛羅山鄂佛羅國語解見疆域形勝卷城北八十里法特哈鄂佛羅山國語法特哈蹄也鄂佛羅解見疆域形勝卷城北一百四十里巴延鄂佛羅山巴延鄂佛羅國語解俱見疆域形勝卷城北一百八十五里伊蘭茂山國語伊蘭三數也茂樹也城東南七百里餘在混同江東其上有伊蘭茂城巴延山巴延國語解見疆域形勝卷城東南三十里雅們山國語雅們衙門也城東南一百里堪達山國語堪達牛項下蔫皮也城東南一百三十里臺禄哩河流經其北伊努山國語伊努甚是也城東南一百七十里髙五里週圍三十里額敦山國語額敦風也城東南三百里髙六十里週圍八十里東南富爾瑚河及飛虎河俱發源於此平頂山城東南七百里黒山城東南一千里東北山曰黄頂子西沾山城東南一千一百三十里烏爾渾山國語烏爾琿一指也又半寸也城東南一千一百三十里北接香山額勒達山城東南一千一百八十里喀發山城東南一千一百九十里通肯山通肯國語解見疆域形勝卷城東南一千二百十里紅石䃳子山城東南一千三百餘里山河之西南有河曰紅石䃳子歪頭䃳子山長白山南城東南一千三百餘里山之西南有河曰歪頭䃳子河東接帽兒山自頭道溝迤東至十二道溝扺朝鮮界布達山國語布達飯也城東南一千七百里南達布達窩集望祭山即温徳亨山城西南九里髙一百五十步週五里每嵗春秋于山上望祭長白山之神雍正十一年建望祭殿于此國語温徳亨板也元家博多和山博多和國語解見本卷前城西南十五里髙一里餘週四里和托蘇山城西南三百餘里髙四十步週二里北有小堡薩克薩哈山國語薩克薩哈喜鵲也城西南四百里博多和山國語解已見前注城西南四百里墩臺山城西南四百里塞嚇哩山國語塞赫哩山髙大貌也城西南四百里髙一里餘巴延克喇山巴延解見疆域形勝卷喀喇解見錦州府山川卷城西南四百里週圍十二里科齊克山國語科齊克鴿子也城西南四百里在葉赫城北上有蒐登堡哈蘇蘭山國語哈蘇蘭桃皮也城西南四百里伊蘭穆哈連山國語穆哈連彈丸也伊蘭解見本卷前城西南四百里三峯並峙髙八十步週二里拉忻河發源於此庫幹蘭山國語庫幹蘭營盤也城西南四百餘里髙五十步週二里上有石砌小城週圍五十餘步西一門白石山即珊延沃赫近葉赫城城西南四百三十里髙四十步週一里又有一白石山在邊門珊延國語解見本卷前沃赫解見奉天府山川卷烏魯哩山國語烏魯哩羊棗也城西南四百七十里髙三里週圍三十里烏魯哩河發源於此黒嘴山城西南四百餘里即薩哈連洪科週圍百里國語薩哈連黒色也洪科碓也古城山城西南四百餘里高一百五十歩周二里夀山城西南四百餘里即查拉芬阿林康熙二十年聖祖仁皇帝謁陵禮成大蒐駐蹕於此恭遇萬壽聖節因賜名曰夀山乾隆十九年聖駕駐蹕於此亦恭遇萬夀聖節於幔城行慶賀禮見語查拉芬夀也阿林解御製八月十三日作詩注國見本卷前半截塔山城西南五百里在葉赫城上有半截塔故名徳克山國語徳克髙射也城西南五百餘里山前一泉流入哈達河察庫蘭山國語密庫蘭檀木也城西南五百餘里山上有石人一巴延山巴延國語解見疆域形勝卷城西南五百餘里髙五十步週二里穆當阿烟臺山國語穆當阿灣曲也城西南五百餘里髙一里週三里哈勒費延山國語哈勒費延扁也髙二百餘步周二里納爾琿山國語納爾琿細也城西南五百餘里近葉赫城髙一百步週二里山有二一近曕河髙一里週四里富勒哈山富勒哈國語解見奉天府山川卷城西南五百餘里髙五十步週一里達揚阿山國語達揚阿歸附也城西南五百餘里髙三里週圍二十里雅奇山國語雅竒箭罩也城西南五百餘里五里山城西南五百餘里髙二里週圍十里羅衫山城西南五百餘里髙一百步週二里臺山城西南五百餘里髙七十步週一里博勒和山國語博勒和潔浄也城西南五百餘里髙八十步週一里登噶拉山國語登髙也噶拉手也城西南五百餘里耕客山城西南五百餘里髙一百步週二里餘尼瑪瑚山城西南五百餘里髙二百步週三里我太祖髙皇帝壬子年征烏拉築木城于此愛新山國語愛新金也城西南五里百餘里髙一里週圍五十達喜穆嚕山國語達喜重叠也穆嚕房脊也又曰山梁也城西南五百十里髙二里周四十餘里南為瞻河北為葉赫尼雅勒瑪州山尼雅勒瑪國語解見奉天府山川卷城西南五百餘里髙一百步週一里敦珠克山城西南五百餘里髙一百步週一里威逺堡山城西南五百餘里即烏雅富山嘉石山城西南五百餘里近邊開原縣華家溝河發源於此烏珠山國語烏珠頭也城西南五百餘里近英莪邊門烏勒間山烏勒間國語解見奉天府山川卷城西南五百餘里又有一在城東北九百五十里札克丹山札克丹國語解見奉天府山川卷城西南五百五十里髙一里週圍十里勒富山勒富國語解見疆域形勝卷城西南五百四十里髙二里週圍二十里納嚕山城西南六百四十二里烏拉山烏拉國語解見建置沿革卷城西南六百六十里阿嚕山阿嚕䝉古語解見奉天府山川卷城西南六百七十里棟鄂山城西南七百六十里西有棟鄂河薩穆禪山城西南七百九十里太子河發源於此按明一統志太子河一名東梁水源出幹羅山與此不同三股泉山城西南七百九十五里和倫呼遜山國語和倫威也呼遜力也城西南八百二十里費葉稜烏山費葉稜烏國語解見奉天府山川卷城西南八百二十四里俊團山城西南八百三十里在長白山西近鳯凰城邉外之宣城即和齊寛穆哈連國語和齊寛美好也穆哈連解見本卷前瑪察山國語瑪察野菜也城西南八百八十里又西