完善否蒙古皆大慚垂首無以應太祖駐蹕鐵嶺城三日論功行賞以所俘獲分給先釋齋賽從者博囉齊等十一人使歸寄語諸部長述蒙古大敗齋賽及衆台吉悉為我國所擒乃班師鐵嶺縣界內厯代舊有城址唐王營城城東南三十五里周圍二里南一門建置年月莫考相傳為唐太宗伐髙麗時駐營於此今城址無存范河城城西南三十里亦曰汛河所周圍三里一百三十步門四明正統四年建並置千户太祖髙皇所于此我征明撫降之今裁仍設汛焉帝辛酉年懿路城城西南六十里周圍三里十五步南北二門本金挹婁縣明永樂五年修築置千户太祖髙皇所于此城圯今為站路謹案事迹已詳山川卷帝取明瀋陽道出懿蒲河懿路河注餘詳見古迹郡縣注鐡嶺縣界內諸堡柴河堡城東六十里周圍一里南一門曽十堡城西二十五里周圍一里門一撫安堡城東南四十里周圍一里七十二步東西南三門東曰花豹沖堡我太祖髙皇帝戌午年征明皆撫降之安巴堡安巴國語解見奉天府山川卷城東南八十三里周圍一里南北二門丁字泊堡城西南五十五里周圍一里南一門東曰宋家泊我太祖髙皇帝辛酉年征明皆撫降之今設汛焉史家堡城西北十五里周圍一里門一正西堡城西北二十里周圍一里門一南曰和爾海鋪平定鋪城北五十里周圍一里南一門新興鋪城西南十五里周圍一里門一城南鋪城西南三十三里周圍一里南一門腰鋪城西南四十五里周圍一里南一門以上諸堡鋪皆鐵嶺駐防分汛地復州州城本明復州衛城也遼金時為復州懷德軍元廢明洪武十年因舊城修築設衛周圍四里一百八十步門三東曰明通南曰迎恩北曰鎮海本朝初𨽻蓋平縣雍正十二年改設州治乾隆四十三年奉旨重修復州界內厯代舊有城址得利贏城城東八十里德哩山之上元季土人所築明初置遼東衛治此今城圮永寧監城城北五十里明嘉靖十四年范馬寺卿楊最甃築其城周圍二里二百五十三步門三東曰迎賓南曰曰永西曰聚泉今圮餘詳見古迹名勝注城南即永寧監河復州界內諸堡歸化堡城東二百里門一堡東為趙親屯楊官堡城西三十里門一欒固堡城南七十里我祖髙皇帝辛酉年征明撫降之今設汛焉十里鋪又北即紅山口堡北曰二鹽場堡城南八十里門一博羅堡博羅蒙古語解見奉天府山川卷城南九十里門一五十塞堡城北六十里周圍一里一百二十六步門一我祖髙皇帝辛酉年征明撫降之今設汛焉土城子城東二百十里分以上諸堡皆復州駐防汛地寧海縣縣城即明金州衛城也舊係土城明洪武四年指揮馬雲葉旺增築十年指揮韋富甃築周圍五里二百十六步髙三丈五尺門四東曰春和南曰承恩西曰寧海北曰永安池深一丈七尺廣六丈五尺本朝初𨽻蓋平縣雍正十二年設寧海縣乾隆四十三年奉旨重修旅順新城城西南一百二十里周圍一里二百十八步門一亦明時建我太宗文皇帝天聰七年征明取之事迹謹詳載關郵卷旅順口關注本朝康熙五十四年重修設佐領驍騎校水師營駐防見兵防卷寧海縣界內厯代舊城址大黑山城城東十五里大黑山上方約二里內有二井四面懸絶惟西一門可上相傳昔人避兵處今圮髙麗城城東三十里已圮旅順舊城城西南一百二十里周圍二百五十五步門一明初築城設中左千户所于此牧羊城城西南一百五十里周圍二百五十四步門一以上諸城建置年年月無考寧海縣界內諸堡鋪木厰堡城西六十里周圍二里二百四十一步南北二門堡西有木城驛城東為果厰鋪石河驛堡城北六十里周圍一里二百四十步南北二門我太祖髙皇帝辛酉年征明撫降之今設汛焉西曰四十里堡東北曰三十里鋪堡博羅堡博羅國語解見黑龍江山川卷城北九十里門一紅嘴堡城東北一百二十里周圍二百一百八十步門一我太祖髙皇帝辛酉年征明撫降之今設汛焉歸服堡城東北一百六十里周圍三里門一我祖髙皇帝辛酉年征明撫降之今設汛焉王官寨城東南三十里周圍三百四十二步南北二門山澗鋪城西南九十里周圍一里二百四十步南北二門以上諸堡鋪皆寧海駐防分汛岫巖城本金時岫巖縣地元廢明設撫民通判於此本朝初𨽻蓋平縣乾隆三十七年設通判管理四十一年省熊嶽通判以岫巖通判兼轄鳯凰城四十三年奉旨於舊址修建城垣周圍四百五十餘丈髙二丈東南二門岫巖城界內厯代舊有城址髙麗城城南一百三十里周圍里許俗呼東髙麗城疑為昔時髙麗所建今城圮無考岫巖城界內諸堡寨黃旗堡城東六十里周圍一百八十步黃姑堡城南一百七十里曹家堡城北三十里羊拉寨城南六十里龍頭寨城東北一百五里防以上諸堡寨皆岫岩城守駐分汛地鳯凰城城築於明成化十七年因朝鮮使臣還國道經鳯凰山下遇掠奏乞於舊路南别開一路以便往還遂築此城設官兵為邉關要地周圍三里八十步南一門本朝設城守章京駐防乾隆四十一年復設岫巖城通判兼轄並設巡檢司駐防蘭磐城城西二百四十里周圍一里十三步南一門本朝天聰七年修築鳯凰城界內厯代城址九連城城東近朝鮮界金史斡魯于海蘭甸之地築九城與髙麗對出戰入守明一統志在三萬衛東北九十里連屬有九考今鳯凰城邉外有九連城遺址即是舊志以為在吉林界誤湯山城城東南五十里我太祖髙皇帝辛酉年征明撫降之娘娘城城東南一百四十里宣城城東南一百七十里建以上三城俱在邉境迤東入朝鮮界自何代無考雪里站城城西北四十里周圍二里一百二十四步南一門曰鎮東明𢎞治四年建甜水站城城西北一百八十里周圍三里九十步南北二門其南曰甜水站堡有塔明時太祖髙皇置鐵場百户所于此我帝辛酉年撫降之鳳凰城界內諸堡長甸堡城東二百七十里其西北曰大甸堡我太祖髙皇帝辛酉年征明皆撫降之今設汛焉永甸堡城東二百七十里我太祖髙皇帝辛酉年征明撫降之今設汛焉堡之西曰團甸青苔峪堡城西一百七十里周圍三百三十六步南一門石城堡城北六十九里周圍二里一百步南一門靉陽堡城北一百二十八里周圍三里一百二十步西南二門南門曰靉陽城西有郭周圍一里九十步南一門上有靉陽城三字明時設守備鎮其地我太祖髙皇帝辛酉年征明撫降之今設汛焉孤山堡城北二十五里周圍二里三十步南一門我太祖髙皇帝辛酉年征明撫降之屯堡南曰磨石峪屯堡西曰細河安平屯薩瑪吉堡城北二百四十五里周圍一里六十步南一門我太祖髙皇帝辛酉年征明撫降之皆設汛焉一堵牆堡城北二百七十里周圍三里六卜步東南二門我太祖髙皇帝天命三年征明撫降之今設汛焉險山堡城東南八十里明嘉靖二十五年置我太祖髙皇帝辛酉年征明撫降之今設汛焉新甸堡城東南一百里我太祖髙皇帝辛酉年征明撫降之今設汛焉堡之北曰果甸鎮江堡城東南一百二十里與朝鮮分界處事迹謹稽實録天命六年秋七月鎮江城中軍陳良䇿潛通于明將毛文龍令别堡之民詐稱兵至大呼噪城中驚擾遂與湯山險山二堡民皆叛投文龍太祖命二貝勒阿敏同四貝勒率總兵副參等官引兵三千人遷鎮江沿海居民于內地大貝勒代善三貝勒莽古爾泰率兵二千人遷金州民于復州冬十一月太祖聞毛文龍屯兵朝鮮境命二貝勒阿敏統兵五千𠞰之渡鎮江乘夜入朝鮮境斬遊擊劉姓及兵一千五百文龍僅以身免九年夏五月毛文龍令逰擊三員引寇我國所屬之輝發地沿鴨緑江越長白山而至我守將素勒東阿奮擊之追逐三日盡殱其衆秋八月毛文龍遣兵渡朝鮮義州城西鴨緑江入島中屯田太祖命大臣楞額哩武善引兵一千襲之途中獲間諜告以明兵畫則渡江入島收穫夜則收兵復渡江宿義州江岸楞額哩乘夜進兵潛伏山僻處平旦度明兵已渡江率兵疾馳明偵者未及聲炮舉烽燧楞額哩已渡鎮江支流突至其島明將士大驚悉棄甲奔潰楞額哩等於陸地追逐斬五百餘級餘皆爭舟墮水溺死楞額哩等盡焚其積聚而還黃骨島堡城西南二百五十里周圍一里二百五十步南一門寬甸堡城東北二百九十里在邊外明神宗六年築以上二堡我太祖髙皇帝辛酉年征明皆撫降之今設汛焉通逺堡城西北一百里周圍一里二百十步南一門左二里又一城周圍一里九十步門一本朝右二里又一城周圍一里六十步門一置鳯凰天聰初修築置城守尉駐防于此後移城今設站為朝鮮貢道所經草河堡城西北一百二十里周圍一里一百六十步南一門我太祖髙皇帝辛酉年征明撫降之今設汛焉莽牛哨在邉外距朝鮮分界處一二里乾隆十一年奉天將軍請于此地設汛使彼此不致滋擾尋以與朝鮮不便停止汛以上諸堡皆鳯凰城守駐防分地欽定盛通通志卷二十九
