body:
  text: 城池一奉天府各屬興京承徳縣遼陽州海城縣盖平縣開原縣鐡嶺縣復州寜海縣岫巖縣鳳凰城欽定四庫全書欽定盛京通志卷二十九城池臣等謹案遼東西地自昔沿為郡國遼金以來升為上京中京東京建置諸城我國家營始豐垣崇墉峻列皇上厪念留都重地發帑興修百雉巍峩金湯鞏固作億萬年丕丕基永垂無極至於前代闉壘設衛防邉遺址所存掌故宜備臣等詳稽臚載謹志城池第十二欽定四庫全書欽定盛京通志卷二十九城池一奉天府各屬興京城池詳見京城志其境内諸城堡及厯代舊有城址分列於後大清謹案志凡前代舊建城堡分設防禦者均列入一統古蹟今本志既分列城池一門凡厯代舊址可考者俱附注於篇其古蹟止載郡縣舊存名目及名勝諸蹟鄂多理城在興京城東一千五百里為億萬世本朝最初建都於此實發祥重地事蹟謹詳載注及山川卷長白山注京城卷赫圖阿拉鄂多理原作俄朶里今譯改古城城西四里週圍一里一百二十步南一門建置年月未詳相傳為開國時六城之一事蹟謹稽實録興祖長子徳世庫居覺爾察地次子留闡居阿哈和洛地三子索長阿居和洛噶善地五子寶朗阿居尼瑪蘭地六子寶實居章嘉地分築五城與景祖所居赫圖阿拉城相距近者五里逺者二十里兼稱寧古塔貝勒景祖長子禮敦英勇過人號巴圖魯時近地部落有碩色納者生九子俱强悍又有嘉瑚者生七子俱輕捷多力能身披重鎧連躍九牛景祖第四子為顯祖宣皇帝顯祖嫡妃喜塔喇氏孕十三月而生太祖髙皇帝天表玊立聲若洪鐘儀度威重舉止非常國人稱為聰睿貝勒薩爾滸城薩爾滸國語解見奉天山川卷城西一百二十里週圍三里南與東各一門西南西北各一門外城週圍七里四面各一門乾隆八年十九年皇上東巡有詩四十一年有御製薩爾滸御製薩爾滸書事長篇四十三年有詩四十八年有御製題薩爾滸十二韻薩爾滸再題御製薩爾滸題句詩俱恭載天章門事蹟謹稽實録天命五年十月自界藩遷於此城建軍民廬舍先是己未天命四年明集兵瀋陽號四十七萬分為四路劉綎康應乾督兵四萬合朝鮮兵出寛甸口馬林麻岩潘宗顔督兵四萬合葉赫兵出三岔口李如柏賀世賢閻鳴泰督兵六萬由清河出鴉鶻闗杜松王宣趙夢麟張銓督兵六萬由渾河出撫順闗期並趨我都城三月朔我西路偵卒遥見火光馳告而南路偵卒又以明兵逼境告太祖即於辰刻親率貝勒大臣統城中兵出而命大貝勒代善前行時偵卒又以明兵出清河路来告大貝勒曰清河之界道途偪仄﨑嶇兵未能驟至我兵惟先往撫順以逆敵兵遂過扎喀闗與大臣扈爾漢等集兵以待時太宗文皇帝稱四貝勒以祀事後至謂大貝勒曰界藩山上我築城夫役在焉山雖險倘明之将帥不惜士卒奮力攻之陷夫役奈何我兵宜急進以安夫役之心大貝勒等善是言下令軍士盡擐甲日過午至太蘭岡大貝勒及扈爾漢欲駐兵隐僻地四貝勒艴然曰正宜耀兵列陣明示敵人壮我夫役士卒之膽俾并力以戰何故令兵立隐僻地耶大臣額亦都曰貝勒之言是也我兵堂堂正正以向敵人遂督衆兵赴界藩對明兵營列陣初衆貝勒兵未至我國防衛築城夫役之兵僅四百人伏薩爾滸谷口伺明兵過半躡擊至界藩渡口與築城夫役合據吉林崖杜松結營薩爾滸山分兵圍吉林崖我兵四百率衆夫役下擊一戰而斬明兵百人及大貝勒四貝勒至見明兵攻吉林崖者約二萬人又一軍列薩爾滸山巔乃議増千人往助四百兵於吉林崖俾自上馳下衝擊以右翼四旗兵夾攻其薩爾滸山之兵以左翼四旗兵當之遂遣兵千人登吉林崖太祖至問貝勒等破敵䇿具以前議告太祖諭先破薩爾滸山所駐兵是時我國近都城之兵乗善馬者先至乗駑馬者後至其數十里外者尚未至於是合六旗兵進攻薩爾滸山明兵列陣發鎗礟我兵仰而射之奮力衝撃不移時破其營壘死者相枕藉而所遣助吉林崖之兵自山馳下衝撃右翼二旗兵渡河直前夾擊明兵之在界藩山者短刃相接我兵縱横馳突無不一當百遂大破其衆明總兵杜松王宣趙夢麟等皆没於陣横屍亘野血流成渠其旗幟器械及士卒死者蔽渾河而下如流澌焉追奔逐北二十餘里至碩欽山時已昏軍士沿途搜勦者又無數是夜明總兵馬林營於尚間崖掘壕嚴斥堠鳴金鼓自衛我兵見之乗夜馳告大貝勒代善翼旦大貝勒以三百餘騎馳往馬林方拔營行見大貝勒兵至退回結方營環營掘壕三匝列火器俾習火器者立壕外繼列騎兵以俟又開原道潘宗顔一軍距西三里外營斐芬山大貝勒見之遣人馳告太祖時我國逺路之兵亦陸續至與大貝勒兵合明總兵杜松之後營遊擊龔念遂李希泌統步騎萬人駕大車持堅楯營於斡琿鄂謨地環營掘壕外列火器太祖見之與四貝勒率兵不滿千人分其半下馬步戰明兵發火器拒敵四貝勒引騎兵奮勇衝入步兵繼進遂斫其車破其楯明兵大敗龔念遂李希泌皆陣没焉㑹大貝勒使至以明兵營尚閒崖告太祖不待四貝勒兵引侍從數人往日中至其地見明兵四萬布列諭趣我軍先據山巔向下摶擊衆兵方欲登山而馬林營内之兵與壕外兵合太祖曰是将與我戰也我兵且勿登山宜下馬步戰命大貝勒往諭時左二旗兵下馬者方四五十人而明兵已自西突至大貝勒言於太祖曰兵已至矣即怒馬迎戰直入其陣二貝勒阿敏三貝勒莽古爾泰與衆台吉等各鼓勇奮進遂敗明兵斬首捕鹵過當方戰時我六旗兵見之不及布列行陣人自為戰前後弗相待縱馬飛馳直逼明營明兵發鳥鎗巨礟我兵衝突縱撃飛矢利刅所向無前明兵不能支又大敗遁走我兵乗勝追撃明副将麻岩及大小將士皆陣没總兵馬林僅以身免滅跡掃塵案角隴種尚間崖下河水為之盡赤太祖復集軍士馳往斐芬山攻潘宗顔軍令我兵之半下馬仰山而攻宗顔兵約萬人以楯遮蔽連發火器我兵突入摧其楯遂破之宗顔全軍盡没葉赫貝勒錦台什布揚古引兵助明至開原中固城聞明兵敗大驚而遁是日太祖收全軍至固勒班地駐營而明兵由南路進者已近逼都城太祖命大臣扈爾漢先率兵千人往禦翼旦復命二貝勒阿敏率兵二千繼之太祖率衆貝勒大臣還軍至界藩行祭纛告天禮大貝勒代善請曰吾先歸從二十騎㣲行探信祀畢上徐來太祖許諾三貝勒莽古爾泰亦相繼行四貝勒請以俱往太祖曰汝兄㣲行往探汝隨吾後行四貝勒曰兄獨往吾留此未安也遂亦行日暮大貝勒回至都城詣内庭慰告曰撫順開原二路敵兵已斬戮盡南來兵已遣将往禦我待父皇命當即往破之復出城十五里迎於大屯之野太祖自界藩申刻起行五更還都城平明命大貝勒三貝勒四貝勒統軍士禦明總兵劉綎留兵四千於都城待明總兵李如柏副将賀世賢等之兵初劉綎兵出寛甸進棟鄂路我居民避匿深山茂林中劉綎悉焚其柵寨殺其孱弱我駐防官託保額爾訥額赫率五百兵迎敵劉綎兵圍之數重額爾訥額赫死之并傷我卒五十人託保引餘兵與扈爾漢合扈爾漢伏兵山隘以待巳刻大貝勒三貝勒四貝勒引兵甫出瓦爾喀什窝集劉綎遣精鋭萬人前掠将趨登阿布達哩岡列陣大貝勒欲引兵先登馳下擊之四貝勒曰兄統衆軍留此相機為援吾先督兵登岡自上下撃之大貝勒曰善吾引左翼兵出其西汝引右翼兵登山俾將士下擊汝立後督視勿違吾言輒輕身入也四貝勒遂率右翼兵往先引精鋭三十人超出衆軍前自山馳下奮撃之兵力交接戰甚酣後軍隨至衝突而入大貝勒又率左翼兵自山西至夾攻之明兵萬人敗潰四貝勒乗勢追撃與劉綎後隊兩營兵遇綎倉卒不及陣四貝勒縱兵奮擊殱其兩營兵萬人劉綎戰死是時明海盖道康應乾步兵合朝鮮兵營於富察之野其兵執筤筅長鎗被籐甲皮甲朝鮮兵被紙甲其胄以栁條為之火器層疊列待四貝勒既破劉綎兵方駐軍衆貝勒皆至遂復督兵進攻敵競發火器忽大風驟作走石揚沙烟塵反撲敵營昏㝠晝晦我軍乗之飛矢雨發又大破之應乾遁去其兵二萬殱焉先是二貝勒阿敏偕扈爾漢前行遇明逰撃喬一琦兵擊敗之一琦收殘卒奔固拉庫崖朝鮮都元帥姜功烈營衆貝勒復整兵攻之姜功烈知明兵敗大驚遂按兵偃旗幟遣通事執旗來告曰此來非吾願也昔倭侵我國賴明助我獲退倭兵今以徳報之故奉調至此我兵之在明行間者已被爾殺明兵逃匿於我者止逰擊一人及所從軍士而已當執之以獻大貝勒與二貝勒三貝勒四貝勒定議乃曰爾等降先令主将來否則必戰姜功烈先令副元帥來降盡執明兵擲於山下付我明逰撃􅔬一琦自縊死翼日姜功烈率兵五千下山降衆貝勒宴勞之送詣都城時明經畧楊鎬駐瀋陽聞三路兵敗大驚急檄總兵李如柏副將賀世賢等回兵如柏等自呼蘭路遁歸我哨兵二十人見之據山上鳴螺繫帽弓弰揮之作招集大兵状已而呼噪下撃殺四十人獲馬五十匹明兵奪路而逃相蹂踐死者復千餘人是役也明兵雲集遼瀋又招合朝鮮葉赫分路來侵五日之間悉被我軍破滅其宿将重臣暴骸骨於外士卒死者不啻十餘萬我士卒僅損二百人大軍駐南路三日籍所俘獲人馬輜重鎧仗而還老城城南八里週圍十一里六十步門四城内西有小城週圍二里一百二十步門二城内東堂子有圍一里九十八步城外有郭自城北至城西週太祖髙皇南共九里九十步亦有四門我遷都帝丁亥年築此城癸夘年自此興京鹻厰新城城南一百四十八里週圍一百十步西南一門本朝天聰七年築界藩城城西北一百二十里在鐵背山上週圍一里東一門又一小城週圍一百八十步西本朝一門三年我天命太祖髙皇帝取撫順自築城居之興京遷至此依山城之南即界藩渡口事蹟謹稽實録嵗甲申明神宗十二年六月太祖率兵攻瑪爾墩寨其寨主納申奔界藩十三年二月太祖率披甲之士二十五卒五十畧界藩寨寨内人覺之遂回兵界藩等四城之主合兵追襲至太蘭岡之野太祖單騎回斬納申射巴穆尼斃之遂引歸不遺一騎四月太祖征哲陳部界藩等五城聞之集兵八百整陳以待太祖敗其衆又追至界藩險隘吉林崖立其巔見敗兵十五人趋岡太祖射前至一人貫其脊而殪餘悉墜崖死乃收軍還天命三年五月太祖令築城界藩居之四年二月命夫役一萬五千赴界藩城騎兵四百衛之三月既敗明四路兵於薩爾滸阿布達哩岡等處殱杜松劉綎等四月太祖遂諭諸王大臣宜於近邉之地牧馬屯田築城界藩設兵守禦以衛農人於是太祖西行示築城基址六月破開原班師太祖諭貝勒諸臣即於界藩築城以居遂駐蹕焉是月所建宫室皆成興京界内厯代舊有城址髙麗舊城城南一百二十里週圍三里三十步南與西各一門城西曰鍾家河村小峪里又西曰一堵牆鹻厰舊城城南一百四十六里週圍二里九十步南與西各一門以上二城建置年月無考章嘉城城東北三十餘里北曰歡寨西曰瑪前寨興京界内諸堡清河堡城西南一百六十里週圍四里一百八十步門四又北有堡曰鎮静堡我太祖髙皇帝壬戌年撫降之事蹟謹稽實録明神宗十六年我太祖始於清河闗口互市天命三年秋七月太祖統大兵進鴉鶻闗圍清河堡明副将鄒儲賢以兵一萬固守城上礟手約千餘一時競發滚木矢石齊下我軍樹雲梯不避鋒刅飛躍而上明兵皆潰遂抜其城鄒儲賢及兵萬人盡殱焉其一堵牆鹻厰二城官民皆棄城遁大軍遂趋遼東行二日復還軍毁一堵牆鹻厰二城盡遷其糧榖而還山羊峪堡城西南一百九十五里週圍一里一百四十步南一門西有小堡曰景家堡瑪哈丹堡瑪哈丹䝉古語解見彊域形勝卷城西南二百十里週圍二里一百三十四步東南二門南闗一城週圍一里一百四十步東西二門我太祖髙皇帝於戊午年征明撫降之仍設汛焉以上諸堡今皆為興京城守駐防分汛地奉天府府城即盛京城詳載京城志其各州縣界内本朝初所築城堡及厯代城址分注於後承徳縣附郭詳載京城志並詳古蹟卷注撫西城城東八十里舊名撫順城明洪武二十一年設千户所亦曰撫順関其城週圍一里七百三十六步池深一丈濶二丈門二今則週圍三里東南北三門盖明初為千戸所後改為鎮本朝城時重修也年設章京駐防乾隆四十三年奉康熈二十九㫖重修四十八年有御製撫順城詩恭載天章門事蹟謹稽實録明神宗十六年我太祖始於撫順清河靉陽寛甸四闗口互市以裕財源自此國富民殷云天命三年四月壬寅太祖率步騎兵二萬征明臨行書七大恨告天是夕大兵至古哷地駐營翼旦分兩路以進令左四旗兵取東州瑪根丹二處太祖與諸貝勒率右四旗兵及八旗䕶軍至斡琿鄂謨地駐營是晚㣲雨隂晴不定太祖欲還軍大貝勒代善曰我與明和好久矣因其不道是以興師今既臨其境若遽旋師将與明復修和好乎抑相仇怨乎興兵之名誰能隐之天雖雨吾之軍士皆有禦雨之衣所用弓矢亦有備雨之具更有何物慮霑濕耶且天降此雨以懈明邉将之心使我進兵正出其不意耳是雨利於我不利於彼也太祖善其言遂於亥刻進兵天忽晴霽月色如晝大軍分隊星馳隊伍綿亘百里黎明圍撫順城執一人令特書以諭逰撃李永芳永芳得書冠帶立城南門上言納欵事仍令軍士治守具我兵見之樹雲梯不移時登其城永芳乃冠帶下馬匍伏太祖於馬上以禮答之其城中人誡令勿殺並撫輯之於是撫順東州瑪哈丹三城及臺堡寨共五百餘悉下乃令諸将各營於所至之地太祖駐蹕撫順城明日留兵四千毁其城太祖率諸貝勒還至嘉班駐營論功行賞以俘獲人口牲畜分給之編降民為一千户時有山東山西江南浙江來撫順城貿易者十六人皆厚給貲費書七大恨之言付之遣還即以毁城兵四千䕶降民及所獲人口以歸太祖與諸貝勒合兵四萬出明邉境行二十里将駐營謝哩甸明廣寧總兵張承廕遼陽副将頗廷相海州叅将蒲世芳率兵一萬來追偵者以告太祖遂率大軍前進明兵據山之險分營為三掘壕引火器以待及兩軍以拒我八旗兵奮勇擊射初風自西起忽反風塵沙轉向敵營我軍乗勢衝入明兵不能支遂潰破其三營死者相枕藉陣斬總兵張承廕副将頗廷相叅将蒲世芳逰撃梁汝貴等追撃四十里而還獲馬九千匹甲七千副兵杖器械不可勝計明兵逃者十無一二我兵止損二人諸貝勒大臣奮勇先進者論其功之大小軍士被傷者按其傷之輕重分别賞賚有差駕還都城命安輯從歸降民千户父子兄弟夫婦毋令失所有親戚奴僕自陣中失散者盡察給之並給以田廬牛馬衣糧畜産器皿仍依明制設大小官属令李永芳統轄承徳縣界内厯代舊有城址十里河城城南六十里週圍一里一百三十步南一門明時設兵防守稱虎皮驛我太祖髙皇帝辛酉年征明撫降之今栽蒲河城城北四十里明設千户所于此城週圍七百二十五丈池深一丈濶二丈門二乃遼太祖髙皇東十八城之一我降之今裁帝辛酉年征明撫城西曰箭匠屯望望屯小新屯威寧營城城東南一百里週圍四里東西二門明時築城置鈇場百户所於此我太祖髙皇帝辛酉年征明撫降之今裁武靖營城城西南五十里週圍一里一百五十步南一門東即虎皮驛明時設兵防守舊太祖髙皇志誤為烏金營我降之我帝辛酉年征明撫太宗文皇帝追明總兵朱萬良至此大破之即其地也今裁營西曰蘇家衛郎家地蘇柯寨東南曰五里堡屯臺得勝營城城西南五十餘里週圍一里明時為軍士屯戍之所今栽以上諸城皆明時舊址章義城城西南七十里週圍二里一百七十二步東南門各一即金時章義縣故址今圮詳見古蹟郡縣注我城西南曰小烏拉屯長灘屯又南曰長勝堡太祖髙皇帝辛酉年征明撫降之又西曰西平堡壬戌年征明撫降之又北曰平安堡北豐城城西北隅後漢末公孫度據遼東置城于此謂之豐城司馬懿伐遼東豐人南徙青齊其留者曰北豐今城圮無存承徳縣界内諸堡舖沙嶺堡城西四十里週圍一里半東南二門即明之沙嶺墩堡東南曰寗官屯河湾屯净烟堡城西六十里週圍半里南一門即明之静逺堡我太祖髙皇帝辛酉年征明撫降之舊堡西曰翟家堡艾家堡北接邉站川盛堡城北三十里平洛堡城北四十里奉集堡城東南四十五里週圍四里南一門即奉即縣故址詳見古蹟郡縣注事蹟謹稽實録天命六年二月癸丑太祖率貝勒諸臣統大軍分八路畧明奉集堡明守城總兵李秉誠聞之引三千騎出城六里駐營遣兵二百人來偵遇我左翼兵兩路馳擊敗之至山嶺下有明兵結為方陣見我兵至遂拔營遁我兵尾擊之明兵兩路敗遁我兵追擊奮射之抵濠岸而還太祖統大兵離城北三里駐蹕髙岡時右翼兵亦至日午有厮飬卒來告明兵可二百人去此不逺太祖令貝勒大臣等率右翼兵搜𠞰同台吉徳格類岳託碩託撃敗明二百兵追至李秉誠屯兵處其衆二千皆潰遁四貝勒别引䕶軍至黄山明副将朱萬良駐營其地見我軍勢盛不敢抗亦拔營遁四貝勒追至武靖營而還與分路敗敵諸将士同歸大營太祖論功行賞遂班師三月遼陽既下奉集堡官民俱降大堡城東南八十五里週圍四里南北二門亦名古堡為承徳遼陽分界處又有四一在城東南二十里週圍二里二百步東西二門一在城西北五十里一在城西北九十里一在城北四國初十五里相傳皆時分防舊堡東州堡城東南一百十里週圍四里六十步東西二門為奉天将軍所轄界我太祖髙皇帝戊午年征明撫降之今設汛焉堡北曰官屯大官屯剌榆坨堡城西南一百二十里週圍一里一百二十四步西南二門惠逺堡城東北九十里週圍二里南一門北曰三坌堡我太祖髙皇帝戊午年征明撫降之十方寺堡城西北九十里週圍二里其東南曰上榆林堡皆我太祖髙皇帝辛酉年征明撫降之今設汛焉堡北曰嚴千户站堡西曰舊㙮遼濱塔堡城西北一百里週圍一里南一門白塔舖城南二十里週圍二里分以上諸堡舖皆奉天将軍駐防汛地事蹟謹稽實録天命六年三月明總兵李秉誠朱萬良姜弼領騎兵三萬來援瀋陽營於白塔舖遣兵一千為前探我國雅遜亦率精鋭往偵明兵前進雅遜遂走明兵施放鳥鎗遥追太祖聞之大怒欲親統兵前往四貝勒趋前勸止而自請行遂領䕶軍疾馳迎戰明兵潰奔掩撃至白塔舖又見三總兵統衆布陣四貝勒不待後軍至即率百騎進撃李秉誠朱萬良姜弼皆敗遁正追撃時大貝勒代善台吉岳託亦至同追四十里斬首三千餘級遼陽州州城即明遼東都司城也洪武五年都指揮馬雲葉旺因元遺址修築週圍十六里有竒門六十六年都指揮潘敬展築東城迤北又築土城永樂十四年都指揮王真復改築北城南北一里東西四里門二合之共週圍二十四里二百八十五步髙三丈三尺池深一丈五尺門九南二西一東二東北一外東西北各一乾隆四十三年奉㫖估勘舊址重修事蹟謹稽實録天命六年三月庚申太祖集貝勒大臣議曰瀋陽已拔宜乗勢長驅以取遼陽議定即進兵遼陽城守官聞我兵至守禦甚嚴辛酉日午我兵至城東南渡河未竟偵卒馳告城西北有兵至太祖統左翼兵先往明總兵李懐信侯世禄蔡國柱姜弼童仲貴等率兵五萬出城五里結陣太祖命左翼四旗撃其左時四貝勒引精鋭至欲進戰太祖止之曰吾已令左翼兵往撃汝勿前進可率右翼兵駐城旁覘之四貝勒力請曰令後至二紅旗兵留城旁覘視可也言畢遂領䕶軍前進太祖命台吉阿濟格勸止之四貝勒堅意行太祖遣二黄旗䕶軍往助四貝勒引軍衝入明營明兵發礟接戰擊敗之左翼兵亦至兩軍夾攻明兵大亂奔潰乗勝追擊六十里至鞍山乃還當接戰時有明兵從遼陽西関出適城旁兩紅旗兵見而撃之明兵争入城人馬自相蹂踐死者相枕藉㑹暮乃收兵距城南七里駐營壬戌上親率右翼兵破明步騎三萬於東門外令左翼兵奪橋先登西城是夜城中舉火列炬戰達旦道員牛維曜髙出邢慎言胡嘉棟户部郎中傳國及軍民等縋城而遁平旦明兵拒戰復大敗我右翼兵亦登城八旗同集一處沿城搜勦明經畧袁應泰在城東北鎮逺樓督戰見城破遂舉火焚樓而死分守道何廷魁率妻子投井死監軍道崔儒秀自縊總兵朱萬良副将梁仲善叅将王豸房承勲遊擊李尚義張䋲武都司徐國全王宗盛守備李廷榦等俱戰殁闔城結綵焚香以黄紙書萬嵗牌備乗輿迎上日正午大張鼓吹導引入城百姓夾道俯伏皆呼萬嵗是日駐蹕遼陽城衆勸監軍道張銓降堅不從以其言奏之太祖曰彼若知天命來歸宜優禮遇之今戰而被擒生又非其所願以願死之人而我養之豈肯為我用耶宜賜死以遂其志四貝勒惜銓尚欲生之反復開導不從乃使人縊而葬之遼陽既下河東之三河堡長寧堡長勝堡長永堡静逺堡鎮西堡慶雲堡鎮北堡威逺堡静安堡靉陽堡湯站堡鎮東堡奉集堡穆家堡險山堡鹽場堡紅嘴堡歸服堡孤山驛虎皮驛鞍山驛石河驛威寧營武靖營上榆林十方寺丁字泊宋家泊甜水站殷家荘薩馬吉永寧監五十寨古城草河新甸寛甸大甸永甸長甸鎮江鳯凰蒲河懿路范河中固熊岳欒固岫岩黄骨島青苔峪海州耀州盖州復州金州大小七十餘城官民俱薙髪降丙寅釋遼陽繫獄官民其奪職間住之官悉還職設遊撃八員都司二員以理其事論克城先登力戰諸将士功行賞畢發帑銀布帛大賚總兵以下各官及衆士卒有差太祖召集貝勒諸臣議曰上天眷我授以遼陽今将移居此城耶抑仍還國耶貝勒諸臣俱以還都城對太祖以此地乃明及朝鮮䝉古接壌要害之區宜即居之貝勒諸臣皆曰善遂定議遷都命遼陽官民移居北城闗廂其南大城則上與貝勒諸臣及将士居之東京城城東北八里修建年月俱詳載京城志遼陽州界内厯代舊有城址船城城西六十里週圍一里二百八十步南有一門相傳為元時養鷹處髙麗城城東南隅相𫝊髙麗據遼東時建俗稱髙麗營即明時設定遼中衛處巖州城城東北五十七里在石城山上週圍四里門一即金時岩州舊址詳見古蹟郡縣注遼陽州界内諸堡寨黄泥窪堡城西五十五里週圍二里門一其西北曰留二堡爛泥舖堡城北三十五里週圍六十四步門一八里荘堡城西南八里週圍一里一百四十步門一首山堡城西南十五里以近首山而名週圍三百五十二步門一沙河堡城西南三十里週圍一里五十六步南北二門長店舖堡城西南五十里週圍三百二步南一門唐馬寨堡城西南七十里週圍二里四十步南一門烟狼寨城西三十七里防以上諸堡寨皆遼陽駐分汛地海城縣縣城即明海州衛舊係土城明洪武九年指揮劉成等甃築週圍六里五十三步有竒髙三丈四尺門四東曰鎮武南曰廣威西曰臨清北曰來逺池深一丈一尺廣三丈五尺後城毁池淤本朝天命八年即舊城東南隅建新城週圍二里一百七十六步増建一門縣治仍設於舊城内乾隆四十三年奉㫖重修牛荘城城西四十里明置驛於此城週圍二里九十三步門三東曰徳盛西曰外攘北曰福本朝勝命八年重建設掌印章京駐防康熈二十一天年添設巡檢分駐東城西為海消湾又西南曰東昌堡曰瞻札綏薩屯耀州城城西南六十里週圍二里三百步南北二門本朝初修築大将揚古利守此曽敗明将毛文龍兵事蹟謹載鎮江堡下餘詳見古蹟城西曰夏家屯西南曰博羅衛又西南曰田家屯留名屯北曰䕶荘屯海城縣界内厯代舊有城址鞍山驛城城北六十里週圍一里二百四步門二明洪武二十年設驛神宗六年建城今圮南城東曰里科薩屯稍即鞍山温水河事蹟謹稽實録天命十一年夏五月明将遣兵侵鞍山驛守将巴布泰率兵撃敗之斬級千餘擒逰撃李良美海城縣界内諸堡夜深堡城西五十里週圍六十步門二三河堡城西六十里週圍一里六十步南北二門俗呼馬圏子堡東北曰穆家堡我太祖髙皇帝辛酉年征明皆撫降之土河堡城北十五里週圍一里七步門二甘泉堡城北三十里週圍一里九十六步門二太平堡城西南七十里週圍九十八步門一俗名青城子大官堡城西南九十里週圍一百八十步門一新開河堡城西北四十里週圍一里二百九十四步東南二門鐵石堡城西北七十里週圍一里二百八十步門一以上諸堡皆牛荘駐防分汛地葢平縣縣城即明盖州衛城也洪武五年指揮呉玉因舊土城修築九年展拓南面甃築週圍七里三步髙一丈五尺門三東曰順清南曰廣恩西曰寧海鐘鼓樓在城中衢池深一丈五尺廣一丈八尺乾隆四十三年奉㫖重修熊岳城城西南六十里即熊岳縣故址週圍三里九十九步南北二門我太祖髙皇帝辛酉年征明撫降之初置城守尉章京駐防雍正五年移奉天副都統一員鎮守于此兼轄㫖重修復州寕海岫岩鳯凰城等處乾隆四十三年奉餘詳見古蹟郡縣注城北曰伯家寨西曰郭家屯盖平縣界内厯代舊有城址新岫巖城城東二百四十里週圍一百步門一今圮又東十里有舊岫巖城古城城南六十里週圍八十五步今圯以上二城建自何代皆無考盖平縣界内諸堡頂山堡城南五十里週圍一里十五步歸州堡城南九十里週圍一里八十八步即遼時歸州城故址詳見古蹟郡縣注鐵嶺屯堡城北五十五里週圍一百九十步白家寨堡城東北五十五里週圍一百三十五步湯池堡城東北六十里週圍一百二十步以上諸堡皆盖平駐防分汛地開原縣縣城本元開元路地明洪武二十二年設三萬衛二十五年設遼海衛因舊土城之東甃築週圍十三里二十步髙三丈五尺門四東曰陽和西曰慶雲南曰迎恩北曰安逺角樓四鼓樓在中街池深一丈廣四丈乾隆四十三年奉㫖重修事蹟謹稽實録天命四年夏六月太祖統師四萬征明開原行三日大雨河漲道濘渡口水溢軍行未便諭貝勒大臣先進兵瀋陽以疑之遂發兵百人向瀋陽殺三十餘人擒二十人而還使人偵視開原無雨道不濘河水可濟太祖乃率大軍進薄開原城下明總兵馬林副将于化龍權開原道事推官鄭之範叅将髙貞逰撃于守志守備何懋官等嬰城固守城上少列兵餘皆陳四門外我兵設楯梯進攻而以偏師掩撃東門外所陳兵敗之明兵争入城填擁於門我兵奪門摶戰而攻城之兵雲梯未布即踰城入城上兵四面皆潰城外三面兵見城破驚竄我兵據門堵禦壕不得渡盡殱之鄭之範先遁得脱馬林于化龍髙貞于守志何懋官皆陣殁太祖登開原城坐南樓偵者以鐵嶺衛有兵三千來援馳告諸貝勒率兵迎戰明兵望見即奔我兵二十人追及之斬四十餘人太祖駐營開原三日籍所俘獲舉之不盡論功行賞乃班師英莪口城城東南二百十里週圍一百八十步門一在英莪邉門北餘詳見関郵卷注城西北自尚家臺扺関梁交城西南自趙吉里屯八家子屯東尼雅滿荘三家子屯溫塔什庫至赫徹穆路開原縣界内厯代舊有城址扶餘城本扶餘王城唐書乾封初薛仁貴從李勣攻髙麗抜扶餘城髙麗兵鼓而進仁貴横撃大破之舊志謂在開原縣界内今遺址方隅無考哈達舊城哈達國語解見于京城卷城東六十里明時置廣順関此亦曰南関後為哈達貝勒所居今城圮無考中固城城南四十里明永樂五年建為撫順站𢎞治十六年叅将胡忠奏請展築髙一丈八尺週圍七百三十五丈池深三丈八尺南北二門為遼東十八城之一我太祖髙皇帝辛酉年征明撫降之今站廢城亦圮相傳城週二里八十步開原縣界内諸堡尚陽堡城東四十里週圍三里南北二門舊名靖安堡有蓮花渚近堡曰黄泥岡堡西曰三家子麒麟城様舖堡城西十八里週圍一里南一門八寳屯堡城西三十里週圍一里南一門慶雲堡城西四十里週圍一里南一門我太祖髙皇帝辛酉年征明撫降之今設汛焉松山堡城南四十里週圍一里南一門呼濟堡呼濟國語解見吉林山川卷城東南一百五十里週圍一里威逺堡城東北三十里週圍三里南北二門我太祖髙皇帝辛酉年征明撫降之今設汛焉以上諸堡皆開原駐防分汛地鐵嶺縣縣城即古鋃州地明洪武二十一年設鐵嶺衛在今治東南五百里二十六年移置此地在遼河東週圍四里二百十六步髙二丈門四池深一丈五尺廣三丈乾隆四十三年奉㫖重修事蹟謹稽實録天命四年秋七月太祖統師圍鐡嶺城城外各堡兵奔入城其不得入者悉奔竄我兵樹雲梯攻城之北明逰撃喻成名史鳯鳴李克泰督軍拒守鎗礟矢石齊下我軍即登梯毁陴摧鋒突入城上兵驚潰陣斬喻成名等盡殱其衆太祖遂入城駐蹕是日䝉古嗒爾喀部貝勒齋賽扎嚕特貝勒巴克台吉色本等合兵萬餘欲助明乗夜至秫田以俟翼旦我兵十餘人出城牧馬齋賽兵見而撃射我兵在城中者知為䝉古兵即出城欲戰因未奉上命駐立以待而牧馬兵皆被殺傷太祖親出城諭戰諸貝勒大臣遂率兵奮撃敗其兵追至遼河陣斬及溺水死者甚衆擒齋賽與巴克色本等及其部将十餘人兵一百五十餘人翼日大宴奏樂齋賽等匍匐進謁齋賽從人名烏瑚齊者問曰上與衆貝勒大臣均無恙耶時四貝勒侍側應曰我軍中止牧馬兵十數人被傷餘皆無恙汝等鞍馬俱完善否䝉古皆大慚垂首無以應太祖駐蹕鐵嶺城三日論功行賞以所俘獲分給先釋齋賽從者博囉齊等十一人使歸寄語諸部長述䝉古大敗齋賽及衆台吉悉為我國所擒乃班師鐵嶺縣界内厯代舊有城址唐王營城城東南三十五里週圍二里南一門建置年月莫考相傳為唐太宗伐髙麗時駐營於此今城址無存范河城城西南三十里亦曰汛河所週圍三里一百三十步門四明正統四年建並置千户太祖髙皇所于此我征明撫降之今裁仍設汛焉帝辛酉年懿路城城西南六十里週圍三里十五步南北二門本金挹婁縣明永樂五年修築置千户太祖髙皇所于此城圯今為站路謹案事蹟已詳山川卷帝取明瀋陽道出懿蒲河㦤路河注餘詳見古蹟郡縣注鐡嶺縣界内諸堡柴河堡城東六十里週圍一里南一門曽十堡城西二十五里週圍一里門一撫安堡城東南四十里週圍一里七十二步東西南三門東曰花豹冲堡我太祖髙皇帝戌午年征明皆撫降之安巴堡安巴國語解見奉天府山川卷城東南八十三里週圍一里南北二門丁字泊堡城西南五十五里週圍一里南一門東曰宋家泊我太祖髙皇帝辛酉年征明皆撫降之今設汛焉史家堡城西北十五里週圍一里門一正西堡城西北二十里週圍一里門一南曰和爾海舖平定舖城北五十里週圍一里南一門新興舖城西南十五里週圍一里門一城南舖城西南三十三里週圍一里南一門腰舖城西南四十五里週圍一里南一門以上諸堡舖皆鐵嶺駐防分汛地復州州城本明復州衛城也遼金時為復州懐徳軍元廢明洪武十年因舊城修築設衛週圍四里一百八十步門三東曰明通南曰迎恩北曰鎮海本朝初𨽻盖平縣雍正十二年改設州治乾隆四十三年奉㫖重修復州界内厯代舊有城址得利贏城城東八十里徳哩山之上元季土人所築明初置遼東衛治此今城圮永寧監城城北五十里明嘉靖十四年范馬寺卿楊最甃築其城週圍二里二百五十三步門三東曰迎賓南曰曰永西曰聚泉今圮餘詳見古蹟名勝注城南即永寧監河復州界内諸堡歸化堡城東二百里門一堡東為趙親屯楊官堡城西三十里門一欒固堡城南七十里我祖髙皇帝辛酉年征明撫降之今設汛焉十里舖又北即紅山口堡北曰二塩塲堡城南八十里門一博羅堡博羅䝉古語解見奉天府山川卷城南九十里門一五十塞堡城北六十里週圍一里一百二十六步門一我祖髙皇帝辛酉年征明撫降之今設汛焉土城子城東二百十里分以上諸堡皆復州駐防汛地寧海縣縣城即明金州衛城也舊係土城明洪武四年指揮馬雲葉旺増築十年指揮韋富甃築週圍五里二百十六步髙三丈五尺門四東曰春和南曰承恩西曰寧海北曰永安池深一丈七尺廣六丈五尺本朝初𨽻盖平縣雍正十二年設寧海縣乾隆四十三年奉㫖重修旅順新城城西南一百二十里週圍一里二百十八步門一亦明時建我太宗文皇帝天聰七年征明取之事蹟謹詳載関郵卷旅順口闗注本朝康熈五十四年重修設佐領驍騎校水師營駐防見兵防卷寧海縣界内厯代舊城址大黒山城城東十五里大黑山上方約二里内有二井四面懸絶惟西一門可上相傳昔人避兵處今圮髙麗城城東三十里已圮旅順舊城城西南一百二十里週圍二百五十五步門一明初築城設中左千户所于此牧羊城城西南一百五十里週圍二百五十四步門一以上諸城建置年年月無考寧海縣界内諸堡舖木厰堡城西六十里週圍二里二百四十一步南北二門堡西有木城驛城東為果厰舖石河驛堡城北六十里週圍一里二百四十步南北二門我太祖髙皇帝辛酉年征明撫降之今設汛焉西曰四十里堡東北曰三十里舖堡博羅堡博羅國語解見黑龍江山川卷城北九十里門一紅嘴堡城東北一百二十里週圍二百一百八十步門一我太祖髙皇帝辛酉年征明撫降之今設汛焉歸服堡城東北一百六十里週圍三里門一我祖髙皇帝辛酉年征明撫降之今設汛焉王官寨城東南三十里週圍三百四十二步南北二門山澗舖城西南九十里週圍一里二百四十步南北二門以上諸堡舖皆寜海駐防分汛岫巖城本金時岫巖縣地元廢明設撫民通判於此本朝初𨽻盖平縣乾隆三十七年設通判管理四十一年省熊岳通判以岫巖通判兼轄鳯凰城四十三年奉㫖於舊址修建城垣週圍四百五十餘丈髙二丈東南二門岫巖城界内厯代舊有城址髙麗城城南一百三十里週圍里許俗呼東髙麗城疑為昔時髙麗所建今城圮無考岫巖城界内諸堡寨黄旗堡城東六十里週圍一百八十步黄姑堡城南一百七十里曹家堡城北三十里羊拉寨城南六十里龍頭寨城東北一百五里防以上諸堡寨皆岫岩城守駐分汛地鳯凰城城築於明成化十七年因朝鮮使臣還國道經鳯凰山下遇掠奏乞於舊路南别開一路以便往還遂築此城設官兵為邉関要地週圍三里八十步南一門本朝設城守章京駐防乾隆四十一年復設岫巖城通判兼轄並設巡檢司駐防蘭磐城城西二百四十里週圍一里十三步南一門本朝天聰七年修築鳯凰城界内厯代城址九連城城東近朝鮮界金史斡魯于海蘭甸之地築九城與髙麗對出戰入守明一統志在三萬衛東北九十里連属有九考今鳯凰城邉外有九連城遺址即是舊志以為在吉林界誤湯山城城東南五十里我太祖髙皇帝辛酉年征明撫降之娘娘城城東南一百四十里宣城城東南一百七十里建以上三城俱在邉境迤東入朝鮮界自何代無考雪里站城城西北四十里週圍二里一百二十四步南一門曰鎮東明𢎞治四年建甜水站城城西北一百八十里週圍三里九十步南北二門其南曰甜水站堡有塔明時太祖髙皇置鐵塲百户所于此我帝辛酉年撫降之鳳凰城界内諸堡長甸堡城東二百七十里其西北曰大甸堡我太祖髙皇帝辛酉年征明皆撫降之今設汛焉永甸堡城東二百七十里我太祖髙皇帝辛酉年征明撫降之今設汛焉堡之西曰團甸青苔峪堡城西一百七十里週圍三百三十六步南一門石城堡城北六十九里週圍二里一百步南一門靉陽堡城北一百二十八里週圍三里一百二十步西南二門南門曰靉陽城西有郭週圍一里九十步南一門上有靉陽城三字明時設守備鎮其地我太祖髙皇帝辛酉年征明撫降之今設汛焉孤山堡城北二十五里週圍二里三十步南一門我太祖髙皇帝辛酉年征明撫降之屯堡南曰磨石峪屯堡西曰細河安平屯薩瑪吉堡城北二百四十五里週圍一里六十步南一門我太祖髙皇帝辛酉年征明撫降之皆設汛焉一堵牆堡城北二百七十里週圍三里六卜步東南二門我太祖髙皇帝天命三年征明撫降之今設汛焉險山堡城東南八十里明嘉靖二十五年置我太祖髙皇帝辛酉年征明撫降之今設汛焉新甸堡城東南一百里我太祖髙皇帝辛酉年征明撫降之今設汛焉堡之北曰果甸鎮江堡城東南一百二十里與朝鮮分界處事蹟謹稽實録天命六年秋七月鎮江城中軍陳良䇿潜通于明将毛文龍令别堡之民詐稱兵至大呼噪城中驚擾遂與湯山險山二堡民皆叛投文龍太祖命二貝勒阿敏同四貝勒率總兵副叅等官引兵三千人遷鎮江沿海居民于内地大貝勒代善三貝勒莽古爾泰率兵二千人遷金州民于復州冬十一月太祖聞毛文龍屯兵朝鮮境命二貝勒阿敏統兵五千𠞰之渡鎮江乗夜入朝鮮境斬遊擊劉姓及兵一千五百文龍僅以身免九年夏五月毛文龍令逰擊三員引㓂我國所属之輝發地沿鴨緑江越長白山而至我守将素勒東阿奮擊之追逐三日盡殱其衆秋八月毛文龍遣兵渡朝鮮義州城西鴨緑江入島中屯田太祖命大臣楞額哩武善引兵一千襲之途中獲間諜告以明兵畫則渡江入島收穫夜則收兵復渡江宿義州江岸楞額哩乗夜進兵潜伏山僻處平旦度明兵已渡江率兵疾馳明偵者未及聲礟舉烽燧楞額哩已渡鎮江支流突至其島明将士大驚悉棄甲奔潰楞額哩等於陸地追逐斬五百餘級餘皆争舟墮水溺死楞額哩等盡焚其積聚而還黄骨島堡城西南二百五十里週圍一里二百五十步南一門寛甸堡城東北二百九十里在邊外明神宗六年築以上二堡我太祖髙皇帝辛酉年征明皆撫降之今設汛焉通逺堡城西北一百里週圍一里二百十步南一門左二里又一城週圍一里九十步門一本朝右二里又一城週圍一里六十步門一置鳯凰天聰初修築置城守尉駐防于此後移城今設站為朝鮮貢道所經草河堡城西北一百二十里週圍一里一百六十步南一門我太祖髙皇帝辛酉年征明撫降之今設汛焉莽牛哨在邉外距朝鮮分界處一二里乾隆十一年奉天将軍請于此地設汛使彼此不致滋擾尋以與朝鮮不便停止汛以上諸堡皆鳯凰城守駐防分地欽定盛通通志卷二十九
