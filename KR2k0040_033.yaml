body:
  text: 城池一奉天府各屬興京承德縣遼陽州海城縣蓋平縣開原縣鐡嶺縣復州寧海縣岫巖縣鳳凰城欽定四庫全書欽定盛京通志卷二十九城池臣等謹案遼東西地自昔沿為郡國遼金以來升為上京中京東京建置諸城我國家營始豐垣崇墉峻列皇上厪念留都重地發帑興修百雉巍峩金湯鞏固作億萬年丕丕基永垂無極至於前代闉壘設衛防邉遺址所存掌故宜備臣等詳稽臚載謹志城池第十二欽定四庫全書欽定盛京通志卷二十九城池一奉天府各屬興京城池詳見京城志其境內諸城堡及厯代舊有城址分列於後大清謹案志凡前代舊建城堡分設防禦者均列入一統古迹今本志既分列城池一門凡厯代舊址可考者俱附注於篇其古迹止載郡縣舊存名目及名勝諸迹鄂多理城在興京城東一千五百里為億萬世本朝最初建都於此實發祥重地事迹謹詳載注及山川卷長白山注京城卷赫圖阿拉鄂多理原作俄朵里今譯改古城城西四里周圍一里一百二十步南一門建置年月未詳相傳為開國時六城之一事迹謹稽實録興祖長子德世庫居覺爾察地次子留闡居阿哈和洛地三子索長阿居和洛噶善地五子寶朗阿居尼瑪蘭地六子寶實居章嘉地分築五城與景祖所居赫圖阿拉城相距近者五里逺者二十里兼稱寧古塔貝勒景祖長子禮敦英勇過人號巴圖魯時近地部落有碩色納者生九子俱強悍又有嘉瑚者生七子俱輕捷多力能身披重鎧連躍九牛景祖第四子為顯祖宣皇帝顯祖嫡妃喜塔喇氏孕十三月而生太祖髙皇帝天表玊立聲若洪鐘儀度威重舉止非常國人稱為聰睿貝勒薩爾滸城薩爾滸國語解見奉天山川卷城西一百二十里周圍三里南與東各一門西南西北各一門外城周圍七里四面各一門乾隆八年十九年皇上東巡有詩四十一年有御製薩爾滸御製薩爾滸書事長篇四十三年有詩四十八年有御製題薩爾滸十二韻薩爾滸再題御製薩爾滸題句詩俱恭載天章門事迹謹稽實録天命五年十月自界藩遷於此城建軍民廬舍先是己未天命四年明集兵瀋陽號四十七萬分為四路劉綎康應乾督兵四萬合朝鮮兵出寬甸口馬林麻岩潘宗顔督兵四萬合葉赫兵出三岔口李如柏賀世賢閻鳴泰督兵六萬由清河出鴉鶻關杜松王宣趙夢麟張銓督兵六萬由渾河出撫順關期並趨我都城三月朔我西路偵卒遙見火光馳告而南路偵卒又以明兵逼境告太祖即於辰刻親率貝勒大臣統城中兵出而命大貝勒代善前行時偵卒又以明兵出清河路來告大貝勒曰清河之界道途逼仄﨑嶇兵未能驟至我兵惟先往撫順以逆敵兵遂過扎喀關與大臣扈爾漢等集兵以待時太宗文皇帝稱四貝勒以祀事後至謂大貝勒曰界藩山上我築城夫役在焉山雖險倘明之將帥不惜士卒奮力攻之陷夫役奈何我兵宜急進以安夫役之心大貝勒等善是言下令軍士盡擐甲日過午至太蘭岡大貝勒及扈爾漢欲駐兵隱僻地四貝勒艴然曰正宜耀兵列陳明示敵人壯我夫役士卒之膽俾并力以戰何故令兵立隱僻地耶大臣額亦都曰貝勒之言是也我兵堂堂正正以向敵人遂督衆兵赴界藩對明兵營列陳初衆貝勒兵未至我國防衛築城夫役之兵僅四百人伏薩爾滸谷口伺明兵過半躡擊至界藩渡口與築城夫役合據吉林崖杜松結營薩爾滸山分兵圍吉林崖我兵四百率衆夫役下擊一戰而斬明兵百人及大貝勒四貝勒至見明兵攻吉林崖者約二萬人又一軍列薩爾滸山巔乃議增千人往助四百兵於吉林崖俾自上馳下衝擊以右翼四旗兵夾攻其薩爾滸山之兵以左翼四旗兵當之遂遣兵千人登吉林崖太祖至問貝勒等破敵䇿具以前議告太祖諭先破薩爾滸山所駐兵是時我國近都城之兵乘善馬者先至乘駑馬者後至其數十里外者尚未至於是合六旗兵進攻薩爾滸山明兵列陳發鎗炮我兵仰而射之奮力衝擊不移時破其營壘死者相枕藉而所遣助吉林崖之兵自山馳下衝擊右翼二旗兵渡河直前夾擊明兵之在界藩山者短刃相接我兵縱橫馳突無不一當百遂大破其衆明總兵杜松王宣趙夢麟等皆沒於陳橫尸亘野血流成渠其旗幟器械及士卒死者蔽渾河而下如流澌焉追奔逐北二十餘里至碩欽山時已昏軍士沿途搜勦者又無數是夜明總兵馬林營於尚間崖掘壕嚴斥堠鳴金鼓自衛我兵見之乘夜馳告大貝勒代善翼旦大貝勒以三百餘騎馳往馬林方拔營行見大貝勒兵至退回結方營環營掘壕三匝列火器俾習火器者立壕外繼列騎兵以俟又開原道潘宗顔一軍距西三里外營斐芬山大貝勒見之遣人馳告太祖時我國逺路之兵亦陸續至與大貝勒兵合明總兵杜松之後營遊擊龔念遂李希泌統步騎萬人駕大車持堅楯營於斡琿鄂謨地環營掘壕外列火器太祖見之與四貝勒率兵不滿千人分其半下馬步戰明兵發火器拒敵四貝勒引騎兵奮勇衝入步兵繼進遂斫其車破其楯明兵大敗龔念遂李希泌皆陳沒焉會大貝勒使至以明兵營尚間崖告太祖不待四貝勒兵引侍從數人往日中至其地見明兵四萬布列諭趣我軍先據山巔向下摶擊衆兵方欲登山而馬林營內之兵與壕外兵合太祖曰是將與我戰也我兵且勿登山宜下馬步戰命大貝勒往諭時左二旗兵下馬者方四五十人而明兵已自西突至大貝勒言於太祖曰兵已至矣即怒馬迎戰直入其陳二貝勒阿敏三貝勒莽古爾泰與衆台吉等各鼓勇奮進遂敗明兵斬首捕鹵過當方戰時我六旗兵見之不及布列行陳人自為戰前後弗相待縱馬飛馳直逼明營明兵發鳥鎗巨炮我兵衝突縱擊飛矢利創所向無前明兵不能支又大敗遁走我兵乘勝追擊明副將麻岩及大小將士皆陳沒總兵馬林僅以身免滅迹掃塵案角隴種尚間崖下河水為之盡赤太祖復集軍士馳往斐芬山攻潘宗顔軍令我兵之半下馬仰山而攻宗顔兵約萬人以楯遮蔽連發火器我兵突入摧其楯遂破之宗顔全軍盡沒葉赫貝勒錦台什布揚古引兵助明至開原中固城聞明兵敗大驚而遁是日太祖收全軍至固勒班地駐營而明兵由南路進者已近逼都城太祖命大臣扈爾漢先率兵千人往禦翼旦復命二貝勒阿敏率兵二千繼之太祖率衆貝勒大臣還軍至界藩行祭纛告天禮大貝勒代善請曰吾先歸從二十騎微行探信祀畢上徐來太祖許諾三貝勒莽古爾泰亦相繼行四貝勒請以俱往太祖曰汝兄微行往探汝隨吾後行四貝勒曰兄獨往吾留此未安也遂亦行日暮大貝勒回至都城詣內庭慰告曰撫順開原二路敵兵已斬戮盡南來兵已遣將往禦我待父皇命當即往破之復出城十五里迎於大屯之野太祖自界藩申刻起行五更還都城平明命大貝勒三貝勒四貝勒統軍士禦明總兵劉綎留兵四千於都城待明總兵李如柏副將賀世賢等之兵初劉綎兵出寬甸進棟鄂路我居民避匿深山茂林中劉綎悉焚其柵寨殺其孱弱我駐防官託保額爾訥額赫率五百兵迎敵劉綎兵圍之數重額爾訥額赫死之并傷我卒五十人託保引餘兵與扈爾漢合扈爾漢伏兵山隘以待巳刻大貝勒三貝勒四貝勒引兵甫出瓦爾喀什窩集劉綎遣精鋭萬人前掠將趨登阿布達哩岡列陳大貝勒欲引兵先登馳下擊之四貝勒曰兄統衆軍留此相機為援吾先督兵登岡自上下擊之大貝勒曰善吾引左翼兵出其西汝引右翼兵登山俾將士下擊汝立後督視勿違吾言輒輕身入也四貝勒遂率右翼兵往先引精鋭三十人超出衆軍前自山馳下奮擊之兵力交接戰甚酣後軍隨至衝突而入大貝勒又率左翼兵自山西至夾攻之明兵萬人敗潰四貝勒乘勢追擊與劉綎後隊兩營兵遇綎倉卒不及陳四貝勒縱兵奮擊殱其兩營兵萬人劉綎戰死是時明海蓋道康應乾步兵合朝鮮兵營於富察之野其兵執筤筅長鎗被藤甲皮甲朝鮮兵被紙甲其胄以栁條為之火器層疊列待四貝勒既破劉綎兵方駐軍衆貝勒皆至遂復督兵進攻敵競發火器忽大風驟作走石揚沙煙塵反撲敵營昏冥晝晦我軍乘之飛矢雨發又大破之應乾遁去其兵二萬殱焉先是二貝勒阿敏偕扈爾漢前行遇明逰擊喬一琦兵擊敗之一琦收殘卒奔固拉庫崖朝鮮都元帥薑功烈營衆貝勒復整兵攻之薑功烈知明兵敗大驚遂按兵偃旗幟遣通事執旗來告曰此來非吾願也昔倭侵我國賴明助我獲退倭兵今以德報之故奉調至此我兵之在明行間者已被爾殺明兵逃匿於我者止逰擊一人及所從軍士而已當執之以獻大貝勒與二貝勒三貝勒四貝勒定議乃曰爾等降先令主將來否則必戰薑功烈先令副元帥來降盡執明兵擲於山下付我明逰擊􅔬一琦自縊死翼日薑功烈率兵五千下山降衆貝勒宴勞之送詣都城時明經略楊鎬駐瀋陽聞三路兵敗大驚急檄總兵李如柏副將賀世賢等回兵如柏等自呼蘭路遁歸我哨兵二十人見之據山上鳴螺繫帽弓弰揮之作招集大兵狀已而呼噪下擊殺四十人獲馬五十匹明兵奪路而逃相蹂踐死者復千餘人是役也明兵雲集遼瀋又招合朝鮮葉赫分路來侵五日之間悉被我軍破滅其宿將重臣暴骸骨於外士卒死者不啻十餘萬我士卒僅損二百人大軍駐南路三日籍所俘獲人馬輜重鎧仗而還老城城南八里周圍十一里六十步門四城內西有小城周圍二里一百二十步門二城內東堂子有圍一里九十八步城外有郭自城北至城西周太祖髙皇南共九里九十步亦有四門我遷都帝丁亥年築此城癸卯年自此興京鹻厰新城城南一百四十八里周圍一百十步西南一門本朝天聰七年築界藩城城西北一百二十里在鐵背山上周圍一里東一門又一小城周圍一百八十步西本朝一門三年我天命太祖髙皇帝取撫順自築城居之興京遷至此依山城之南即界藩渡口事迹謹稽實録嵗甲申明神宗十二年六月太祖率兵攻瑪爾墩寨其寨主納申奔界藩十三年二月太祖率披甲之士二十五卒五十略界藩寨寨內人覺之遂回兵界藩等四城之主合兵追襲至太蘭岡之野太祖單騎回斬納申射巴穆尼斃之遂引歸不遺一騎四月太祖征哲陳部界藩等五城聞之集兵八百整陳以待太祖敗其衆又追至界藩險隘吉林崖立其巔見敗兵十五人趨岡太祖射前至一人貫其脊而殪餘悉墜崖死乃收軍還天命三年五月太祖令築城界藩居之四年二月命夫役一萬五千赴界藩城騎兵四百衛之三月既敗明四路兵於薩爾滸阿布達哩岡等處殱杜松劉綎等四月太祖遂諭諸王大臣宜於近邉之地牧馬屯田築城界藩設兵守禦以衛農人於是太祖西行示築城基址六月破開原班師太祖諭貝勒諸臣即於界藩築城以居遂駐蹕焉是月所建宫室皆成興京界內厯代舊有城址髙麗舊城城南一百二十里周圍三里三十步南與西各一門城西曰鍾家河村小峪里又西曰一堵牆鹻厰舊城城南一百四十六里周圍二里九十步南與西各一門以上二城建置年月無考章嘉城城東北三十餘里北曰歡寨西曰瑪前寨興京界內諸堡清河堡城西南一百六十里周圍四里一百八十步門四又北有堡曰鎮靜堡我太祖髙皇帝壬戌年撫降之事迹謹稽實録明神宗十六年我太祖始於清河關口互市天命三年秋七月太祖統大兵進鴉鶻關圍清河堡明副將鄒儲賢以兵一萬固守城上炮手約千餘一時競發滚木矢石齊下我軍樹雲梯不避鋒創飛躍而上明兵皆潰遂拔其城鄒儲賢及兵萬人盡殱焉其一堵牆鹻厰二城官民皆棄城遁大軍遂趨遼東行二日復還軍毁一堵牆鹻厰二城盡遷其糧榖而還山羊峪堡城西南一百九十五里周圍一里一百四十步南一門西有小堡曰景家堡瑪哈丹堡瑪哈丹蒙古語解見強域形勝卷城西南二百十里周圍二里一百三十四步東南二門南關一城周圍一里一百四十步東西二門我太祖髙皇帝於戊午年征明撫降之仍設汛焉以上諸堡今皆為興京城守駐防分汛地奉天府府城即盛京城詳載京城志其各州縣界內本朝初所築城堡及厯代城址分注於後承德縣附郭詳載京城志並詳古迹卷注撫西城城東八十里舊名撫順城明洪武二十一年設千户所亦曰撫順關其城周圍一里七百三十六步池深一丈濶二丈門二今則周圍三里東南北三門蓋明初為千戶所後改為鎮本朝城時重修也年設章京駐防乾隆四十三年奉康熙二十九旨重修四十八年有御製撫順城詩恭載天章門事迹謹稽實録明神宗十六年我太祖始於撫順清河靉陽寬甸四關口互市以裕財源自此國富民殷云天命三年四月壬寅太祖率步騎兵二萬征明臨行書七大恨告天是夕大兵至古哷地駐營翼旦分兩路以進令左四旗兵取東州瑪根丹二處太祖與諸貝勒率右四旗兵及八旗護軍至斡琿鄂謨地駐營是晚微雨隂晴不定太祖欲還軍大貝勒代善曰我與明和好久矣因其不道是以興師今既臨其境若遽旋師將與明復修和好乎抑相仇怨乎興兵之名誰能隱之天雖雨吾之軍士皆有禦雨之衣所用弓矢亦有備雨之具更有何物慮霑濕耶且天降此雨以懈明邉將之心使我進兵正出其不意耳是雨利於我不利於彼也太祖善其言遂於亥刻進兵天忽晴霽月色如晝大軍分隊星馳隊伍綿亘百里黎明圍撫順城執一人令特書以諭逰擊李永芳永芳得書冠帶立城南門上言納欵事仍令軍士治守具我兵見之樹雲梯不移時登其城永芳乃冠帶下馬匍伏太祖於馬上以禮答之其城中人誡令勿殺並撫輯之於是撫順東州瑪哈丹三城及臺堡寨共五百餘悉下乃令諸將各營於所至之地太祖駐蹕撫順城明日留兵四千毁其城太祖率諸貝勒還至嘉班駐營論功行賞以俘獲人口牲畜分給之編降民為一千户時有山東山西江南浙江來撫順城貿易者十六人皆厚給資費書七大恨之言付之遣還即以毁城兵四千護降民及所獲人口以歸太祖與諸貝勒合兵四萬出明邉境行二十里將駐營謝哩甸明廣寧總兵張承廕遼陽副將頗廷相海州參將蒲世芳率兵一萬來追偵者以告太祖遂率大軍前進明兵據山之險分營為三掘壕引火器以待及兩軍以拒我八旗兵奮勇擊射初風自西起忽反風塵沙轉向敵營我軍乘勢衝入明兵不能支遂潰破其三營死者相枕藉陳斬總兵張承廕副將頗廷相參將蒲世芳逰擊梁汝貴等追擊四十里而還獲馬九千匹甲七千副兵杖器械不可勝計明兵逃者十無一二我兵止損二人諸貝勒大臣奮勇先進者論其功之大小軍士被傷者按其傷之輕重分别賞賚有差駕還都城命安輯從歸降民千户父子兄弟夫婦毋令失所有親戚奴僕自陳中失散者盡察給之並給以田廬牛馬衣糧畜産器皿仍依明制設大小官屬令李永芳統轄承德縣界內厯代舊有城址十里河城城南六十里周圍一里一百三十步南一門明時設兵防守稱虎皮驛我太祖髙皇帝辛酉年征明撫降之今栽蒲河城城北四十里明設千户所于此城周圍七百二十五丈池深一丈濶二丈門二乃遼太祖髙皇東十八城之一我降之今裁帝辛酉年征明撫城西曰箭匠屯望望屯小新屯威寧營城城東南一百里周圍四里東西二門明時築城置鈇場百户所於此我太祖髙皇帝辛酉年征明撫降之今裁武靖營城城西南五十里周圍一里一百五十步南一門東即虎皮驛明時設兵防守舊太祖髙皇志誤為烏金營我降之我帝辛酉年征明撫太宗文皇帝追明總兵朱萬良至此大破之即其地也今裁營西曰蘇家衛郎家地蘇柯寨東南曰五里堡屯臺得勝營城城西南五十餘里周圍一里明時為軍士屯戍之所今栽以上諸城皆明時舊址章義城城西南七十里周圍二里一百七十二步東南門各一即金時章義縣故址今圮詳見古迹郡縣注我城西南曰小烏拉屯長灘屯又南曰長勝堡太祖髙皇帝辛酉年征明撫降之又西曰西平堡壬戌年征明撫降之又北曰平安堡北豐城城西北隅後漢末公孫度據遼東置城于此謂之豐城司馬懿伐遼東豐人南徙青齊其留者曰北豐今城圮無存承德縣界內諸堡鋪沙嶺堡城西四十里周圍一里半東南二門即明之沙嶺墩堡東南曰寧官屯河灣屯淨煙堡城西六十里周圍半里南一門即明之靜逺堡我太祖髙皇帝辛酉年征明撫降之舊堡西曰翟家堡艾家堡北接邉站川盛堡城北三十里平洛堡城北四十里奉集堡城東南四十五里周圍四里南一門即奉即縣故址詳見古迹郡縣注事迹謹稽實録天命六年二月癸丑太祖率貝勒諸臣統大軍分八路略明奉集堡明守城總兵李秉誠聞之引三千騎出城六里駐營遣兵二百人來偵遇我左翼兵兩路馳擊敗之至山嶺下有明兵結為方陳見我兵至遂拔營遁我兵尾擊之明兵兩路敗遁我兵追擊奮射之抵濠岸而還太祖統大兵離城北三里駐蹕髙岡時右翼兵亦至日午有厮飬卒來告明兵可二百人去此不逺太祖令貝勒大臣等率右翼兵搜𠞰同台吉德格類嶽託碩託擊敗明二百兵追至李秉誠屯兵處其衆二千皆潰遁四貝勒别引護軍至黃山明副將朱萬良駐營其地見我軍勢盛不敢抗亦拔營遁四貝勒追至武靖營而還與分路敗敵諸將士同歸大營太祖論功行賞遂班師三月遼陽既下奉集堡官民俱降大堡城東南八十五里周圍四里南北二門亦名古堡為承德遼陽分界處又有四一在城東南二十里周圍二里二百步東西二門一在城西北五十里一在城西北九十里一在城北四國初十五里相傳皆時分防舊堡東州堡城東南一百十里周圍四里六十步東西二門為奉天將軍所轄界我太祖髙皇帝戊午年征明撫降之今設汛焉堡北曰官屯大官屯剌榆坨堡城西南一百二十里周圍一里一百二十四步西南二門惠逺堡城東北九十里周圍二里南一門北曰三坌堡我太祖髙皇帝戊午年征明撫降之十方寺堡城西北九十里周圍二里其東南曰上榆林堡皆我太祖髙皇帝辛酉年征明撫降之今設汛焉堡北曰嚴千户站堡西曰舊塔遼濱塔堡城西北一百里周圍一里南一門白塔鋪城南二十里周圍二里分以上諸堡鋪皆奉天將軍駐防汛地事迹謹稽實録天命六年三月明總兵李秉誠朱萬良薑弼領騎兵三萬來援瀋陽營於白塔鋪遣兵一千為前探我國雅遜亦率精鋭往偵明兵前進雅遜遂走明兵施放鳥鎗遙追太祖聞之大怒欲親統兵前往四貝勒趨前勸止而自請行遂領護軍疾馳迎戰明兵潰奔掩擊至白塔鋪又見三總兵統衆布陳四貝勒不待後軍至即率百騎進擊李秉誠朱萬良薑弼皆敗遁正追擊時大貝勒代善台吉嶽託亦至同追四十里斬首三千餘級遼陽州州城即明遼東都司城也洪武五年都指揮馬雲葉旺因元遺址修築周圍十六里有竒門六十六年都指揮潘敬展築東城迤北又築土城永樂十四年都指揮王真復改築北城南北一里東西四里門二合之共周圍二十四里二百八十五步髙三丈三尺池深一丈五尺門九南二西一東二東北一外東西北各一乾隆四十三年奉旨估勘舊址重修事迹謹稽實録天命六年三月庚申太祖集貝勒大臣議曰瀋陽已拔宜乘勢長驅以取遼陽議定即進兵遼陽城守官聞我兵至守禦甚嚴辛酉日午我兵至城東南渡河未竟偵卒馳告城西北有兵至太祖統左翼兵先往明總兵李懷信侯世祿蔡國柱薑弼童仲貴等率兵五萬出城五里結陳太祖命左翼四旗擊其左時四貝勒引精鋭至欲進戰太祖止之曰吾已令左翼兵往擊汝勿前進可率右翼兵駐城旁覘之四貝勒力請曰令後至二紅旗兵留城旁覘視可也言畢遂領護軍前進太祖命台吉阿濟格勸止之四貝勒堅意行太祖遣二黃旗護軍往助四貝勒引軍衝入明營明兵發炮接戰擊敗之左翼兵亦至兩軍夾攻明兵大亂奔潰乘勝追擊六十里至鞍山乃還當接戰時有明兵從遼陽西關出適城旁兩紅旗兵見而擊之明兵爭入城人馬自相蹂踐死者相枕藉會暮乃收兵距城南七里駐營壬戌上親率右翼兵破明步騎三萬於東門外令左翼兵奪橋先登西城是夜城中舉火列炬戰達旦道員牛維曜髙出邢慎言胡嘉棟户部郎中傳國及軍民等縋城而遁平旦明兵拒戰復大敗我右翼兵亦登城八旗同集一處沿城搜勦明經略袁應泰在城東北鎮逺樓督戰見城破遂舉火焚樓而死分守道何廷魁率妻子投井死監軍道崔儒秀自縊總兵朱萬良副將梁仲善參將王豸房承勳遊擊李尚義張繩武都司徐國全王宗盛守備李廷幹等俱戰殁闔城結綵焚香以黃紙書萬嵗牌備乘輿迎上日正午大張鼓吹導引入城百姓夾道俯伏皆呼萬嵗是日駐蹕遼陽城衆勸監軍道張銓降堅不從以其言奏之太祖曰彼若知天命來歸宜優禮遇之今戰而被擒生又非其所願以願死之人而我養之豈肯為我用耶宜賜死以遂其志四貝勒惜銓尚欲生之反復開導不從乃使人縊而葬之遼陽既下河東之三河堡長寧堡長勝堡長永堡靜逺堡鎮西堡慶雲堡鎮北堡威逺堡靜安堡靉陽堡湯站堡鎮東堡奉集堡穆家堡險山堡鹽場堡紅嘴堡歸服堡孤山驛虎皮驛鞍山驛石河驛威寧營武靖營上榆林十方寺丁字泊宋家泊甜水站殷家莊薩馬吉永寧監五十寨古城草河新甸寬甸大甸永甸長甸鎮江鳯凰蒲河懿路范河中固熊嶽欒固岫岩黃骨島青苔峪海州耀州蓋州復州金州大小七十餘城官民俱剃髮降丙寅釋遼陽繫獄官民其奪職間住之官悉還職設遊擊八員都司二員以理其事論克城先登力戰諸將士功行賞畢發帑銀布帛大賚總兵以下各官及衆士卒有差太祖召集貝勒諸臣議曰上天眷我授以遼陽今將移居此城耶抑仍還國耶貝勒諸臣俱以還都城對太祖以此地乃明及朝鮮蒙古接壤要害之區宜即居之貝勒諸臣皆曰善遂定議遷都命遼陽官民移居北城關廂其南大城則上與貝勒諸臣及將士居之東京城城東北八里修建年月俱詳載京城志遼陽州界內厯代舊有城址船城城西六十里周圍一里二百八十步南有一門相傳為元時養鷹處髙麗城城東南隅相傳髙麗據遼東時建俗稱髙麗營即明時設定遼中衛處巖州城城東北五十七里在石城山上周圍四里門一即金時岩州舊址詳見古迹郡縣注遼陽州界內諸堡寨黃泥窪堡城西五十五里周圍二里門一其西北曰留二堡爛泥鋪堡城北三十五里周圍六十四步門一八里莊堡城西南八里周圍一里一百四十步門一首山堡城西南十五里以近首山而名周圍三百五十二步門一沙河堡城西南三十里周圍一里五十六步南北二門長店鋪堡城西南五十里周圍三百二步南一門唐馬寨堡城西南七十里周圍二里四十步南一門煙狼寨城西三十七里防以上諸堡寨皆遼陽駐分汛地海城縣縣城即明海州衛舊係土城明洪武九年指揮劉成等甃築周圍六里五十三步有竒髙三丈四尺門四東曰鎮武南曰廣威西曰臨清北曰來逺池深一丈一尺廣三丈五尺後城毁池淤本朝天命八年即舊城東南隅建新城周圍二里一百七十六步增建一門縣治仍設於舊城內乾隆四十三年奉旨重修牛莊城城西四十里明置驛於此城周圍二里九十三步門三東曰德盛西曰外攘北曰福本朝勝命八年重建設掌印章京駐防康熙二十一天年添設巡檢分駐東城西為海消灣又西南曰東昌堡曰瞻札綏薩屯耀州城城西南六十里周圍二里三百步南北二門本朝初修築大將揚古利守此曽