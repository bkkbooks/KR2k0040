body:
  text: 户口一盛京丁賦户口規制奉天府錦州府吉林各屬黑龍江各屬欽定四庫全書欽定盛京通志卷三十五户口臣等謹案周官登版籍而拜藏之重民數也盛京帝業所基深仁淪浹自世祖統一寰宇休養生息逮今百數十年耕屯相望户口日增盡勿吉挹婁之境莫不雲連櫛比蕃庶殷昌我皇上御極迄今民數嵗倍前時厯巡所至熙穰成風所以培植本根者至宏且逺也謹志户口第十五欽定四庫全書欽定盛京通志卷三十五户口盛京丁賦戶口規制奉天府順治十年以遼陽為府設遼陽海城二縣其錦州寧逺廣寧沙後四城尚屬佐領所轄是年定例遼東招民開墾至百名者文授知縣武授守偹六十名以上文授州同州判武授千總五十名以上文授縣丞主簿武授百總招民數多者每百名加一級所招民每名給月糧一斗每地一晌給種六升每百名給牛二十隻康熙七年例停十五年省遼陽府以瀋陽為奉天府康熙元年錦州改為縣三年奉天府添設承德蓋平開原鐵嶺四縣遼陽縣改為州廣寧改為府添設廣寧縣寧逺州五年改廣寧府為錦州府以錦縣寧逺州廣寧縣屬焉於時州縣新設户無舊籍丁鮮原額俱係招民三年起科其徙民於康熙七年歸併承德開原鐵嶺三縣為民即於本年起科其續發到者仍三年後起科奉天府屬每丁徵銀一錢五分錦州府屬每丁徴銀二錢是年始行編審法丁賦著於籍三十二年丁銀折豆每丁徵市斗黑豆二斗三升零七勺六抄九撮至三斗八升不等四十七年奉頒制斗每斗抵市斗五升五十二年詔人丁以五十年編審為定額以後滋生户口永不加賦五十三年人丁照舊例徵銀五十六年復徵豆照前例雍正二年編審徵豆四年復改徵銀五年置永吉州泰寧長寧二縣設復州通判七年裁泰寧縣十二年復州增設知州於金州衛設寧海縣俱屬奉天府又設義州屬錦州府是年編審二府丁銀實數乾隆元年裁長寧縣併歸永吉州十二年裁永吉州設吉林理事同知徵收地丁錢糧屬吉林將軍管轄二十六年至二十九年寧古塔白都訥三姓地丁俱歸各鎮副都統徴收由吉林同知彚總報銷三十七年裁錦州通判設岫巖通判兼管鳯凰城𨽻奉天府是年吉林各屬詔以三十六年編審為定額以後永不加賦惟開户入籍家奴官莊年滿幼丁仍按例加徴四十五年阿勒楚喀地丁亦歸副都統徴收由吉林彚報焉其奉天各屬户口舊無册籍自乾隆六年始行編審吉林黑龍江自乾隆三十六年始户口著於籍今纂丁賦户口一門斷自著籍之年為始奉天府屬康熙七年始行編審實在行差人丁共七千九百五十三丁共徴銀一千一百九十二兩九錢五分每丁徴銀一錢五分是時府屬承德遼陽鐵嶺海城蓋平開原六州縣舊志祗載總數並未分晰康熙二十四年編審原額新增實在行差人丁共一萬三千一百七十一丁共徴銀一千九百七十五兩六錢五分康熙五十年編審原額新增實在行差人丁共一萬八千六百二十三丁共徴銀二千七百九十三兩四錢五分雍正十二年編審原額新增實在行差人丁共二萬三千七百九十六丁共徴銀三千五百六十九兩四錢雍正五年設永吉州長寧縣十二年又設寧海縣俱屬奉天府舊志始分晰各州縣丁賦條項乾隆六年編審原額新增實在行差人丁共二萬八千三百五十八丁共徴銀四千二百五十三兩七錢乾隆元年裁長寧縣併入永吉州嗣後十年一編審乾隆十六年編審原額新增實在行差人丁共二萬九千二百九十九丁共徴銀四千三百九十四兩八錢五分乾隆二十六年編審原額新增實在行差人丁共三萬六千七百三十六丁共徴銀五千五百十兩零四分乾隆三十六年編審原額新增實在行差人丁共三萬七千二百五十二丁共徴銀五千五百八十七兩八錢乾隆四十六年編審原額新增實在行差人丁共三萬七千六百七十七丁共徴銀五千六百五十一兩五錢五分承德縣二十七社雍正十二年原額新增實在行差人丁三千四百六十九丁徴銀五百二十兩零三錢五分乾隆六年原額新增實在行差人丁三千九百二十五丁徴銀五百五十八兩七錢五分乾隆十六年原額新增實在行差人丁四千九百三十六丁徴銀七百四十兩零四錢乾隆二十六年原額新增實在行差人丁六千六百八十八丁徴銀一千零三兩二錢乾隆三十六年原額新增實在行差人丁六千八百一十四丁徴銀一千零二十二兩一錢乾隆四十六年原額新增實在行差人丁七千一百零二丁徴銀一千零六十五兩三錢遼陽州二十七社雍正十二年原額新增實在行差人丁四千五百三十九丁徴銀六百八十兩零八錢五分乾隆六年原額新增實在行差人丁四千五百七十五丁徴銀六百八十六兩二錢五分乾隆十六年原額新增實在行差人丁四千七百四十四丁徴銀七百一十一兩六錢乾隆二十六年原額新增實在行差人丁五千八百九十三丁徴銀八百八十三兩九錢五分乾隆三十六年原額新增實在行差人丁五千八百九十七丁徴銀八百八十四兩五錢五分乾隆四十六年原額新增實在行差人丁五千九百二十丁徴銀八百八十八兩海城縣二十二社半雍正十二年原額新增實在行差人丁三千七百五十七丁徴銀五百六十三兩五錢五分乾隆六年原額新增實在行差人丁三千八百三十八丁徴銀五百七十五兩七錢乾隆十六年原額新增實在行差人丁四千六百零九丁徴銀六百九十一兩三錢五分乾隆二十六年原額新增實在行差人丁六千五百九十八丁徴銀九百八十九兩七錢乾隆三十六年原額新增實在行差人丁六千六百一十丁徴銀九百九十一兩五錢三十七年撥給岫巖廳一千六百四十一丁乾隆四十六年原額新增實在行差人丁五千零四十一丁徴銀七百五十六