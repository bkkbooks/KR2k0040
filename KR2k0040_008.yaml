body:
  text: 欽定四庫全書欽定盛京通志卷四聖製四聖祖仁皇帝御製文詔敕諭欽定四庫全書欽定盛京通志卷四聖製四聖祖仁皇帝御製文詔謁福陵昭陵詔康熙十年奉天承運皇帝詔曰朕惟自古帝王誕膺天命撫育萬方皆由祖功宗德締造維艱俾後人克享成業所以天下一統之後必展告成之禮甚巨典也我太祖髙皇帝創建鴻圖肇興景運太宗文皇帝布昭功德式廓丕基至世祖章皇帝統一寰區大勳既集即欲躬詣山陵展祭告成未遑修舉朕纘承隆緒上託祖宗洪庥天下底定仰體皇考未竟之志恭謁福陵昭陵䖍修祀事以告成功禮竣旋京湛恩宜布於戲繼述無疆永著顯承之盛升平胥慶益彰樂利之休布告天下咸使聞知敕諭諭禮部康熙九年太祖髙皇帝創建鴻圖肇興景運太宗文皇帝丕基式廓大業克宏逮世祖章皇帝誕昭功德統一寰區即欲躬詣太祖太宗山陵以天下一統致告用展孝思因盜賊未靖師旅繁興暫停往謁朕以眇躬纘承鴻緒上託祖宗隆庥天下底定盜賊戢寧兵戈偃息每念皇考未竟之志朝夕寢食不遑寧處本欲先詣太祖太宗山陵再詣世祖山陵因奉太皇太后慈命以世祖升遐十年未得一詣陵寢於今年八月前往朕是以恭侍太皇太后先詣孝陵展謁禮成言還今欲仰體皇考前志躬詣太祖太宗山陵以告成功展朕孝思著議政王貝勒大臣內閣九卿科道各官㑹議具奏爾部即遵諭行諭禮部康熙十年朕前欲仰體世祖章皇帝遺志躬詣太祖太宗山陵展祭以告成功前命議政王貝勒大臣等㑹議議政王等以去年各處多有水旱之災且為時甚迫應用之物預備難及具題暫行停止今思太祖太宗創業垂統功德隆盛山陵在望刻不能忘去年恭謁孝陵禮成今已數月若再久延時日孝思莫殫朕懷靡寧兹當海內無事欲乘此時恭謁福陵昭陵以告成功用展孝思事關大典著議政王貝勒大臣內閣九卿科道各官㑹議具奏爾部即遵諭行諭禮部康熙十年朕仰體世祖章皇帝遺志欲躬詣太祖太宗山陵展祭以告成功前命議政王貝勒大臣九卿科道等㑹議以各處多有災傷暫行停止今奉太皇太后㫖謂朕躬謁山陵展祭告成關係大典即宜舉行以盡孝思朕仰遵慈命擬躬行謁陵禮應行事宜及需用各項著各該衙門速行備辦爾部即遵諭行諭隨侍諸臣康熙十年朕展謁山陵惓惓在念今得至發祥重地拜謁陵寢用展孝思祭禮已成朕懷大慰聖祖駕幸是嵗九月辛未陵成盛京謁各官宴賚有差召八十以上者民賜飲羣情禮文武諭歡洽因有是諭守陵總管副總管等康熙十年爾等職司祀典凡一應祭品必親加䖍視務盡誠敬副朕孝思諭户部刑部康熙十年奉天係祖宗發祥重地奉天府寧古塔等處除十惡死罪不赦外凡已結未結死罪俱著減等其軍流徒杖等罪俱著寬釋自山海關至奉天府所屬地方康熙十年十一年分正項錢糧俱著豁免諭內大臣覺羅武穆納等康熙十六年長白山乃祖宗發祥之地今無確知之人爾等前赴鎮守吉林將軍處選熟識路徑者導往詳視明白以便酌行祀禮爾等可於大暑前馳驛速去諭禮部康熙十六年長白山發祥重地竒蹟甚多山靈宜加封號永著祀典以昭國家茂膺神貺之意該部㑹同內閣詳議以聞命因有是時覺羅武穆納等自長白山還京復諭諭奉天將軍安珠瑚康熙二十年今雲南等處俱已底定海宇清平告祭天地太廟社稷畢即於陵寢行告祭禮盛京者祖宗開創根本重地朕時思念不忘今值天下宴安意欲躬詣山陵告祭前幸盛京時未至永陵致奠迄今尚歉於懷兹若果往當身歷其處仰瞻祖宗發祥舊址爾可密遣副都統穆泰暨賢能官員將所行塗程與駐蹕及應行之處自興京通吉林徑路詳看繪圖於同往章京內擇通曉者一員來奏恐踏看未周不能詳記道里山川也因無定期未行明示若俟定後商酌恐不及矣故爾密諭將軍身體佳否諭吉林將軍巴海等康熙二十一年今以雲南等處底定躬詣盛京告祭三陵意欲於扈從人等餧養馬匹之暇觀看吉林地方將軍應從何處帶領兵丁候迎可與盛京將軍定議行之再産鱏鰉等魚之處爾即詢明吉林錫特庫㑹同將需用諸物悉加備辦完整為此特諭諭禮部康熙二十一年比年以來逆賊吳三桂背恩反叛擾亂地方仰荷祖宗在天之靈默垂庇佑克奏蕩平應躬詣山陵展祭以告成功前初聞捷音即謁孝陵行禮兹奉太皇太后慈諭太祖太宗山陵亦應親往祭告隨命議政王貝勒大臣等㑹議僉謂事關大典允宜舉行今擬即謁太祖太宗山陵䖍申昭告用展孝思應行事宜及需用各項著各該衙門速行備辦爾部即遵諭行諭奉天將軍安珠瑚康熙二十一年詳覽爾奏所言雖是但令雲南蕩平告成功之大典不便延遲中止朕與廷臣公同酌議於二月十五日啓行已有定期此外别㫖俱口諭齎奏官員矣諭裕親王福全康熙二十一年相别以來忽復兼旬棣萼之思時在寤寐初四日已抵盛京山川形勢風土民情深維祖宗開創之艱難令人逺想慨然春風漸佳知意興甚適也特此布問不宣諭蘇大敦柱康熙二十一年兹上太皇太后奏啓為切陳微衷仰祈睿鑒事內云自山海關至盛京水土皆佳獸多魚鮮每當食頃輒念不能馳奉太皇太后甚歉於懷到盛京後身親網獲鰱魚鯽魚設法成段浸以羊脂者一種鹽醃者一種星馳遞送心期兩件奉到之日倘得味仍鮮美庶可稍見微誠山中野燒自落榛實及山核桃朝鮮所進柿餅松子白果栗子附候安奏啓同往等語所進之物同奏啓一併送至慈寧宫其銀瓶中所貯之魚到日鮮否明白奏知若太皇太后欲寄製成棗脯即實之瓶中封固付來為此特諭諭户刑二部康熙二十一年朕承祖宗丕緒撫御區宇日以子育元元為念自逆賊吳三桂倡亂滇南多方煽動軍興八載中外驛騷仰賴祖宗在天之靈默垂眷佑殄滅凶渠民生乂安疆圉底定爰特行遍祀山陵之禮用告成功兹恭詣福陵昭陵謁祭禮竣惟盛京為國家肇基重地朕躬親幸宜大沛澤以示殊恩山海關以外及寧古塔等處地方官吏軍民人等除十惡等真正死罪不赦外其餘已結未結一切死罪俱著減等發落軍流徒杖等犯悉准赦免奉天錦州二府屬康熙二十一年地丁正項錢糧著通行蠲免其官役墊補包賠等項應追銀兩察果家産盡絶亦并豁免用稱朕加惠根本優恤黎民至意諭敦柱蘇大康熙二十一年朕至渾河太子河遼河三河合流之處地名牛莊河水泛漲乘舟渡河扈從諸人以次待渡因暇舉網所得鰱魚五尾島子魚六尾鯉魚四尾􅠧魚四尾鯿魚三十二尾鴨嘴魚六尾重脣魚二尾中魚三尾杆條魚一尾共六十三尾欲遣人齎往恐日久變味故著驛遞馳送爾二人將魚進太皇太后兼奏明此意有何慈諭並此魚到日新鮮與否於隨常奏啓內詳細奏來為此特諭諭刑部康熙二十一年頃以逆寇殱滅海宇蕩平朕躬詣盛京展謁永陵福陵昭陵以告成功因而巡行邊塞咨詢民間疾苦東至吉林地方見其風氣嚴寒由內地發遣安插人犯水土不習難以資生念此輩雖干憲典但既經免死原欲令其生全若仍投畀窮荒終歸踣斃殊非法外寬宥之初念朕心深為不忍以後免死減等人犯俱著發往尚陽堡安插其應發尚陽堡人犯改發遼陽安插至於反叛案內應流人犯仍發吉林地方令其當差不必與新披甲之人為奴以昭朕軫恤民隱哀矜保全之意爾部即遵諭行諭裕親王福全康熙二十一年頃覽來奏具悉念朕之懷兹者告祭事畢巡行疆土兼講春搜正當草淺獸肥弓燥手柔之時且地多豺虎麋鹿此樂惜不與王共之也近狀想佳特此咨詢諭裕親王福全康熙二十一年别來未幾麥氣迎秋荏苒流光良增思念每閲來疏足慰朕懷兹東巡典禮事事已畢經過之處無不喜見升平二十日自盛京回鑾㑹面可期布問不宣諭大學士等康熙二十一年流徙寧古塔吉林人犯朕向來未悉其苦今謁陵至彼目擊方知此輩既無房屋棲身又無資力耕種復重困於差役况南人脆弱來此苦寒之地風氣􅏮冽必至顛踣溝壑逺離鄉土音信不通殊可憫惻雖若輩罪由自作然發遼陽諸處安置亦足以蔽其辜矣彼地尚有田土可以資生室廬可以安處且此等罪人雖在吉林等處亦無用也諭户兵工三部康熙二十一年從前盛京看守陵寢及山海關等城守章京員缺俱令其子弟頂補後停止此例悉由京師補授頃朕以昭告成功展謁永陵福陵昭陵因周視所歷地方見道路遼逺往返艱難若章京員缺盡從京師補授則家口遷移重為貧窶者之纍且將前任章京房屋田地掣給新補之員以致前官孤孀無倚不能回京如即欲留彼地則田廬既空資生何策困苦日甚深用憫然嗣後盛京看守陵寢及山海關等處城守章京員缺不必自京補授著於伊等子弟內令該將軍選擇賢能者具題引見頂補以免其往返遷移之苦倘伊等子弟無人堪用别有補授發往之員可另撥田房給與其前任章京田房仍行留給不必掣出令其孤孀得所爾三部㑹同詳議具奏特諭諭大學士等康熙二十一年朕巡幸沿邊地方見設立界限處墳墓毁損枯骨暴露者甚多朕心憫焉夫掩骼埋胔王政所重可令盛京將軍遍察而瘞埋之諭將軍巴海等康熙二十一年朕幸吉林地方訪詢民隱見兵丁役重差繁勞苦至極此等情由回鑾之日將軍以下至於兵丁教諭大意已有特㫖朕自至京師復為思繹不將各種無益差徭顯與革除兵丁人等終無禆益且不得霑實惠矣即如鷹鸇窩雛於三月尋覔四月內捕取最妨農事兼屬無益況所得鷹鸇不諳呼飼難至京師徒勞人力應行停止又自八月放鷹原欲令其調習以便齎送數年來並無名鷹貢至京師而烏拉地方兵丁輒於冬寒之時尋覔山雞人馬勞頓應行停止又圍以講武事必不可廢亦不可無時冬月行大圍臘底行年圍春夏則視馬之肥瘠酌量行圍令貧人採取禽獸皮肉須預先傳明日期以便遵行所獲禽獸均行分給其圍獵不整肅者照例懲治不可時加責罰苛求琑屑遇有猛獸須小心防禦以人為重勿致誤有所傷又如打鱏鰉等魚既有專管錫特庫等烏拉兵丁應停差役其搬移新滿洲採取造房并船隻桅木等項及偵探巡邏等差俱係軍務乃駐防官兵専責不可寬假應照常行此外偶爾差遣大臣侍衛督看採取東珠砍伐木植尋覔鷹鸇不涉每嵗定例所行之事似無過勞此後將軍以下領催以上應念兵丁逺居邊境無市貿易身冒嚴寒往採山木妻子汲水操作倍極艱辛時加憐憫吉林烏拉田地米糧甚為緊要農事有誤關係非細宜勸勉之使勤耕種朕軫念滿洲人民生理欲遣人專往以驛遞疲弊故因筆帖式來奏特諭知之諭副都統郎談等康熙二十一年羅剎犯我黑龍江一帶侵擾虞人戕害居民昔發兵進討未獲剪除歷年已久近聞蔓延益甚過尼滿恆衮諸處至赫哲費雅喀虞人住所殺掠不已爾等此行除自京遣往參領侍衛護軍外令畢勒克圖等五台吉率科爾沁兵百名寧古塔副都統薩布蘇等率烏拉寧古塔兵八十名至達瑚爾索倫一面遣人赴尼布楚諭以捕鹿之故一面詳視陸路近逺沿黑龍江行圍徑薄雅克薩城下勘其居址形勢度羅剎斷不敢出戰若以食物來餽其受而量答之萬一出戰姑勿交鋒但率衆引還朕别有區畫爾等還時須詳視自黑龍江至額蘇哩舟行水路及已至額蘇哩其路直通寧古塔者更擇隨行之參領侍衛同薩布蘇往視之時康熙二十一年八月初俄羅斯所屬羅剎劫掠邊境至是日漸擾纍聖祖遣郎談等往達瑚爾索倫聲言捕鹿以覘其情將行諭之諭議政王大臣等康熙二十一年據郎談等奏攻取羅剎甚易發兵三千足矣朕意亦以為然第兵非善事宜暫停攻取調烏拉寧古塔兵一千五百名並置造船艦發紅衣炮鳥鎗及演習之人於黑龍江瑚瑪爾二處建立木城與之對壘相機舉行所需軍糧取諸科爾沁十旗及錫伯烏拉之官屯約可得一萬二千石可支三年且我兵一至即行耕種不致匱乏黑龍江城距索倫村不逺五宿可到其間設一驛俟我兵將至淨溪里烏拉令索倫接濟牛羊甚有禆益如此則羅剎不得納我逋逃而彼之逋逃者且絡繹來歸自不能久存矣其命寧古塔將軍巴海副都統薩布蘇統兵往駐黑龍江瑚瑪爾諭寧古塔將軍殷圖康熙二十二年南方各省人人願往至寧古塔則不願者多朕以爾才能可用故簡任為將軍烏拉别無他事彼土之人惟好訐訟爾至當敷布教化俾識義理令俱改過遷善尤宜愛養兵丁令各得所我兵逼近羅剎須時加操練以修武備巴海暴戾貪汚不惜士卒遂致失所其新滿洲皆求主來歸理應撫綏慰勞施以教化俾安其生盛京副都統佟寶是一堪用之人在烏拉將及一載彼處地方情形必能洞悉爾到後暫留佟寶一二月奏明後方遣回諭大學士勒德洪明珠康熙二十三年爾等可傳諭議政王貝勒大臣征戰本非佳事不得已而後用之向者俄羅斯無故侵擾我邊陲後復漸入越我疆界索倫赫哲費雅喀奇勒爾等處之人皆被擾害不獲寧居掠其家口納其逋逃搶其村落奪其貂皮因彼頻年肆害曾屢行曉諭曰爾等無故入我邊境恣行搶奪朕何難遣發大兵將爾等撲滅但不忍即行殄戮故屢行曉諭欲令撤還爾衆歸我逋逃各居疆土互相貿易寧靜無事以安生業數次遣人亦於來使處屢有文移俄羅斯總無一次回報反於赫哲費雅喀之地仍行搶奪用是發兵於愛琿地方以堵截俄羅斯所行之路乃俄羅斯仍居我邊界不歸我逋逃今雖應行𠞰滅但念用兵本非佳事我惟順天而行將大兵前臨雅克薩以朕諭㫖遣人宣布俄羅斯諭之曰屢次令爾退回歸我逋逃之人遣使馳書者數矣數年以來未有一次信息回報既不歸我逋逃反入我境內擾害地方搶掠人民妻子肆行不止為此遣發大兵前往堵截爾等所行之路於恆衮等處之俄羅斯許其歸順待以不死而生養之汝等仍不退離雅克薩地方故遣發大兵往行征討我師威力豈難剿撲爾等若即破壤爾城郭殄滅爾噍類自立成灰燼矣豈惟爾等俄羅斯普天之下率土之人朕皆惻然仁愛咸欲令其靜寧無事各遂休養故不忍將爾等遽行殄滅屢次曉諭爾等欲各安生業共享太平則當即返雅庫地方以雅庫為界於彼處捕取貂皮於彼土收其物産勿入我邊界恣意妄行汝能將已納之逋逃歸還我則降我之俄羅斯亦發還於汝如此則邊塞貿易可通咸安樂利而兵革偃息生民無所擾害矣若執迷不悟罔遵諭㫖仍行抗拒則大兵進剿摧破雅克薩之城且盡行誅戮矣可遣人前往明白開示俄羅斯果能遵㫖即回以雅庫為界而我兵駐劄愛琿則於雅克薩地方安置哨兵令疆界寧謐倘仍行抗拒則大兵相機而行若不如此周詳區畫今雖取雅克薩我兵進則俄羅斯退我兵還則俄羅斯又進用兵無止息之日而民生亦不獲安矣應否如此議政王貝勒大臣㑹議具奏諭議政王大臣等康熙二十四年疏內不請發禁旅良是但直𨽻各省緑旗兵未歷戰陳且黑龍江火器甚多不須增用朕意選福建投誠善用藤牌官兵現在八旗及安插山東山西河南者五百人令臺灣投誠左都督何佑等率往薩布蘇一應咨題多屬支吾借端延滯度四月進兵不過刈取田禾事必無成此皆遣發黑龍江狂悖之人從中沮議不欲成事薩布蘇出身微賤髙視若輩無敢有違用兵所關甚巨宜周詳籌畫期於必克倘謀事草率復以明安達禮等退兵則羅剎將益肆披猖矣當自京城選賢能大臣一員統兵以行俟克取雅克薩之日班師又發盛京兵五百人代黑龍江兵守城種地出征兵還亦今還盛京種地一應事宜遣户部大臣一員督理所云早熟之榖即內地春麥今我兵亦多種春麥及大麥油麥霜降前六日皆得收穫則不因師出而曠一年田功矣藤牌兵給馬二千匹帶往盛京盛京各佐領亦派馬二千匹照舊制嚴督飼秣候京城馬到更代北行至瑪喇等所養馬皆預備於齊齊哈爾屯此間催䟎月抄可到聞此路間有缺水處不免貽誤今自盛京抵烏拉自烏拉經新設驛站路直且近當從此徑抵黑龍江沿途馬匹或有倒斃瑪拉以所備者足數補送如此則我兵馬匹無虞矣藤牌兵丁帶炮彈或十圓或二十圓以行其餉銀兵月給二兩官月給三兩敕直𨽻山時康熙二十四年正月議政王大臣等請共二東山西河南巡撫令各屬派熟習火器兵百五十人並遣賢能官各四員預備火器送京至日增發薩布蘇軍前協攻雅薩克城因有是諭復諭議政大臣等康熙二十四年兵非善事不得已而用之向者羅剎無故犯邊收我逋逃後漸越界而來擾害索倫赫哲費雅喀奇勒爾諸地不遑寧處剽劫人口搶虜村莊攘奪貂皮肆惡多端是以屢遣人宣諭復移文來使羅剎竟不報命反深入赫哲費雅喀一帶擾害益甚爰發兵黑龍江扼其來往之路羅剎又竊據如故不送還逋逃應即剪滅今仰副天心大兵逼臨雅克薩城姑再傳㫖羅剎云前屢經遣人移文命爾撤回人衆以逋逃歸我數年不報反深入內地縱掠民間子女搆亂不休乃發兵截爾等路招撫恆衮諸地羅剎赦而不誅因爾等仍不去雅克薩特遣徑旅徂征以此兵威何難滅爾但率土之民朕無不惻然垂憫欲其得所故不忍遽加殱除反覆告誡爾等欲相安無事可速回雅庫於彼為界捕貂收賦毋復入內地搆亂歸我逋逃我亦歸爾逃來之羅剎果爾則界上得以貿易彼此寧居兵戈不興倘執迷不悟仍然拒命大兵必攻破雅克薩城殱除爾衆矣如此宣諭後羅剎果回雅庫為界即駐師於黑龍江設斥堠於雅克薩令疆圉帖然否則大兵酌量進止不如此宣諭今縱克取雅克薩城我進則彼退我退則彼進用兵無已邊民不安爾等其詳議以聞諭議政王大臣等康熙二十四年黑龍江兵於是月起行五月中旬可至雅克薩城凡奏報軍機自雅克薩至額蘇哩經黑龍江前來恐紆道遲延令理藩院侍郎明愛於都爾伯特扎蘭特派兵五百人並索倫兵酌自墨爾根至雅克薩設驛奏報軍機庶免貽誤明愛往來覺察驛夫糧食匱乏以索倫所貯米支給黑龍江以內每驛原設二十人應核減一半併入蒙古若䝉古兵五百人過多再為核減索倫效力勤勞傳諭異日加恩以示鼓勵諭諸王大臣等康熙二十四年治國之道期於久安長治不可圖便一時當承平無事朕每殫心籌畫即今征羅剎之役似非甚要而所關甚巨羅剎擾我黑龍江松花江一帶三十餘年其所竊據距我朝發祥之地甚近不速加剪除恐邊徼之民不獲寧息朕親政之後即留意於此細訪其土地形勝道路逺近及人物性情以故酌定天時地利運餉進兵機宜不徇衆見決意命將出師深入撻伐然兵貴相機而動變化無窮惟恐諸將不遵朕指授致失機宜今收復雅克薩地得遂初心至於撫綏外國在使之心服不在震之以威近遣侍衛關保等往軍前諄諭之曰兵凶器戰危事古人不得已而用之朕以仁治天下素不嗜殺爾其嚴諭將士毋違朕㫖以我兵馬精强器械堅利羅剎勢不能敵必獻地歸誠爾時勿殺一人俾還故土宣朕柔逺至意兹一一奉行朕甚嘉焉復諭議政王大臣等康熙二十四年朕思凡事必周詳審度方獲實效不可輕率從事向者尚書明安達禮輕進至糧餉不繼將軍沙爾瑚達巴海等失計半途而歸遂致羅剎驕恣而索倫竒勒爾鄂羅春等心懷疑二朕詢其失機情形一一詳計今始奏功兵法云多算勝少算不勝詎可忽視且兵貴神速前逆賊吳三桂等叛朕思嶽州係湖廣門户遣人指示速戰始克嶽州遂一面進取四川以分賊勢一面密諭大將軍賴塔從廣西趨雲南於是諸省底定兵革休息然亦在將軍等奮勉效力耳倘怠忽不奉行雖有良䇿亦何益焉諭大學士勒德洪學士麻爾圖圖納康熙二十四年俄羅斯入我邊塞擾害鄂羅春索倫赫哲費雅喀等處人民搶掠其家口雖屢肆凶暴朕不忍遽興兵革故未即遣發大兵征討數遣使曉諭俄羅斯恃其遼逺仍復抗拒益侵伐我邊鄙之人肆虐不止用是遣大兵直抵雅克薩之城彼因困迫己甚而後歸降爰遵朕命宥其困而後降之罪釋之使還大兵迅速征行破四十年盤踞之俄羅斯於數日之間獲雅克薩之城克奏厥績薩布蘇向來逗遛不進兵之罪應概從寬免又雅齊納鄂山本獲罪發遣之人其所互告之事仍行察議今進剿官兵殊屬勞苦令伊等暫回吉林烏拉地方於盛京達瑚爾之兵酌量派往防守至雅克薩城雖已克取防禦決不可疏應於何地永駐官兵彈壓此時即當定議著大學士勒德洪學士麻爾圖圖納同郎談關保與議政王大臣等㑹議具奏諭大學士勒德洪明珠等康熙二十四年黑龍江兵食所關最為重要必當謀恆足之道爾等與議政王貝勒大臣㑹同詳議以聞又遣往黑龍江管轄緑旗兵丁之官甚多兵少而管轄之官多甚無益也可度量派官而兵更宜酌減以四百名為率亦既足用而兵糧不致過費且近冬之際緑旗兵在彼地殊無所事可由䝉古境每百名分為一隊俾遞送之既非久可至而兵糧又不至糜費矣其一併詳議以聞諭大學士勒德洪尚書科爾坤哈占等康熙二十四年科爾沁十旗今嵗進貢牛羊乳酒酥油諸物皆毋貢至京師悉送之黑龍江以給軍士籍其數奏聞仍以進貢例賞賚之如此似於兵丁有益議政王貝勒大臣會議以聞諭大學士勒德洪學士麻爾圖康熙二十五年日者大兵往征俄羅斯破雅克薩城釋俄羅斯不誅赦之使生還其時不並取尼布楚地者蓋以尼布楚地畫為疆索使俄羅斯不得越尼布楚界界外聽其捕牲也今薩布蘇等奏言俄羅斯復來城雅克薩地今當即往征而滅之耶抑或緩之以待黑龍江墨爾根地將士移家定然後進兵為宜耶令議政王貝勒大臣及與俄羅斯之役朋春佟保班達爾善郎談同爾等會議以聞諭大學士勒德洪明珠等康熙二十五年錦州鳯凰城等地方人民稀少頗有曠土可令如墨爾根黑龍江耕種之例為之其下所司諭大學士勒德洪明珠等康熙二十五年日者遣部員自吉林烏拉至黑龍江以䝉古錫伯達瑚哩索倫等人力耕種田穀大獲夫民食所關至重來嵗仍遣前種田官員以䝉古錫伯達瑚哩索倫等人力耕種郎中博竒所監種田地較諸處收穫為多足供驛站人役之口糧又積貯其餘榖博奇效力視衆為優其注之冊此遣去諸員可互易其地監視耕種博奇又復大獲則議敘焉諭大學士勒德洪明珠康熙二十六年雅克薩地官兵中烏拉寧古塔兵可還至愛琿城盛京兵可還至墨爾根地並令屯駐息馬過冬其事宜議政王貝勒大臣會同詳議以聞諭大學士勒德洪明珠康熙二十六年黑龍江官兵口糧關係至重屢次轉運米數并黑龍江墨爾根地方接續所種米數宜加察明自盛京等處廣運米石以為久逺禆益之計此皆當周詳區畫又發遣彼處遊手無事之人甚多其口糧作何酌給耶前至黑龍江一帶乃徑直通衢往來轉輸斷不致稍有阻滯如蔡育榮等巨富之人並殷實之家槩豫口糧殊覺未當彼處漢軍皆著察出披甲當差游手無事之人可分設官莊廣開田畝以為恆産令户兵二部賢能司官迅往逐一察明到日確議具奏諭尚書鄂爾圖郎中伊爾克圖溫保康熙二十六年黑龍江至為要地兵丁勞苦朕罔不知曩者俄羅斯占踞達瑚哩索倫等處擾害邊疆幾四十餘年後備足軍食永戍黑龍江以困逼之俄羅斯遂窘迫歸順茍糧儲不足則如沙爾瑚達塔海等之往征而不能成功矣朕所委曲區畫自盛京等處轉輸糧食及令所種米榖積貯至裕彼地大臣官員皆不思樽節濫給於無用之人茍且草率希圖軍儲罄盡勢必將彼等撤回在我之官兵撤回俄羅斯大衆亦難以齊來然或一二人或十餘人陸續聚集于黑龍江松花江之間構造木城盤踞其地則我取之維艱是俄羅斯為主兵而我反為客兵也今我惟多貯糧食永戍官兵則我兵以逸代勞矣如此則俄羅斯頻瑣來犯斷乎不能欲大隊侵入則彼糧食何能挽運耶若黑龍江不將我兵永戍自松花江黑龍江以外所居民人難以安居爾等皆係選擇差遣須殫心竭慮務期為久逺充裕之計詳加籌議惟此一舉也亦無事再遣矣諭奉天府尹王國安康熙二十八年奉天為根本重地今聞游民甚多務農者少一遇旱潦即難補救今年亢旱朕遣賽弼漢往奉天諸處將糜費米糧如蒸酒等項悉行禁止爾至彼當勸民務農嚴察光棍游手之徒奉天田土旗民疆界早已丈量明白以旗下餘地付之莊頭俟滿洲蕃衍之時漸次給與耕種近金世鑑奏請將旗下餘地俱與百姓耕種徴收錢糧此地畝縱給百姓所徴錢糧亦復有限所見何淺陋也今已另遣官前往丈量雖係彼處户部之事爾在地方亦須公同詳察永定則例毋忽諭户部康熙二十八年盛京地方今年亢旱米糧不收聞兵丁現在買米而食朕心深切軫念其令户部侍郎阿山乘驛速往與盛京各部大臣公同察明量其度嵗所需令內務府官往取莊上所有之米散給俾得均沾實惠盛京時康熙二十八年十月辛巳户部議覆隕米穀遼陽等處屯莊所種田地因亢旱及霜盛京不收應免其納租移咨買賑濟因有是户部詳計所需米數採諭諭户部康熙二十九年盛京兵丁全恃南畝耕穫及月給糧餉以為資生之計昨嵗盛京禾稼不登貧困兵丁艱於粒食曾以所有屯糧頒發賑救頃值軍興遣一等侍衛齊蘭布往調盛京兵丁隨發諭㫖令無馬匹者給以官厰馬匹無行糧者給以莊屯糧米官兵踴躍遄征倉卒之際置辦一切軍裝遂支領明年二月分應給俸餉又預支五個月錢糧刻期進發比厄魯時噶爾丹敗遁盛京官兵雖未經接戰而奮勇敵愾深可嘉悅今若將預支俸餉復行抵扣則窮乏兵丁必致生計艱窘朕心殊切憫惻所預給明年二月分應支俸餉及增給五個月錢糧著免抵扣仍照常支給俸餉以示朕愛養將士軫恤疾苦至意爾部即遵諭行諭內閣康熙二十九年邊外捕賊被殺者恤與身價被創者以受傷銀兩給之守關口之章京守備把總等官及軍士皆勉效勞勩亦賞賚之可諭兵部諭大學士伊桑阿阿蘭泰康熙二十九年盛京軍士皆能挽强但其地雖有筋與弦向無牛角所以軍士難得良弓盛京既有筋弦及工匠而户部庫內現貯牛角今年即發角二千對運至將軍公署將軍等可監視造弓散給軍士明年為始每年以角一千對發往盛京將軍可也諭內閣康熙三十年黑龍江軍士及船户人役以每嵗耕稼榖尚不支奏請若以此為例每嵗給發而所貯之榖有限遇需用米石時必致匱乏遣户部賢能司官一員會同黑龍江將軍副都統應作何核減給與詳議奏聞諭大學士伊桑阿阿蘭泰學士邁圖錫安南塔海傅繼祖康熙三十年盛京官屯五十所沿邊丁壯設為屯二十五所遷移於烏拉念此莊屯及沿邊丁壯居住年久已成聚落今遽令遷移如此衆多人户生業蕩然必致苦纍仍留於盛京與遷移於烏拉皆公家之屯其為納賦則一也朕意此莊屯應停其遷移於烏拉兵丁每嵗派三百名耕種或一嵗以烏拉之兵一嵗以捕牲之人輪年耕種亦可以積榖矣此事所關綦重著學士麻爾圖馳驛往盛京烏拉令將軍副都統各部堂官悉喻朕意伊等之意若何詳議回奏諭大學士伊桑阿阿蘭泰學士邁圖錫安博極𫝊繼祖王國昌年遐齡康熙三十年黑龍江松花江接壤之地彼處附近所居根竒勒諸姓中原有可披甲之人應酌量令其披甲駐防遣滿洲兵八十人往彼教訓之齊齊哈爾地方以索倫達瑚哩之衆酌量令其披甲駐防遣滿洲兵二百人往彼教訓之伊等居址附近亦心樂披甲如此則既無逺徙之苦亦不致需用糗糧矣可以此詢問都統巴海令理藩院集議政諸臣會議以聞諭尚書庫勒納康熙三十年黑龍江極東北之地日出日入皆近東北方所以黑龍江夜短日落亦不甚暗諭大學士伊桑阿阿蘭泰等康熙三十一年將軍薩布蘇佟寶等奏請驛站缺丁依數頂補無妻室者給以婦人驛遞再為增置壯丁馬畜錢糧俱行添設則驛站可不致困敝朕思驛站困敝者皆該將軍等不省徭役不簡事件絶其要務槩令馳驛勒索之所致也雖添置驛丁增給錢糧事若不務簡省究復何益且所需婦人為數多矣取給一時將焉可得伊等在彼其可得緣由或有成算耶可敕該將軍薩布蘇佟寶等如何減省徭役不致凋敝驛遞所缺男婦從何充補會同盛京將軍確議報部諭户部康熙三十二年今嵗盛京榖石失收糧價甚貴來年春夏恐糧價更貴必致窘迫亦未可定運糧之處亦著預議自盛京錦州乘海船往山東水路甚近今嵗山東地方年成豐熟俟來年氷解著盛京户部侍郎親身由海前往山東會同山東巡撫將附近地方米石多多發出由海運至三坌河賑賣與無糧之人諭户部康熙三十三年盛京等處去嵗禾稼不登粒食維艱聞今年收穫亦未豐稔米榖仍貴倘價值日漸翔湧則兵民生計恐致匱乏盛京等處地方關係緊要朕心時切軫念宜豫加籌畫作何恩給俾各資生著遣部院堂上官一員前往自甲兵以及匠役當差人等有力不能糊口者將人户數目察明造冊具奏爾部即遵諭行諭內閣康熙三十三年黑龍江墨爾根博爾多之地官員兵丁與索倫達瑚哩之人助其耕種亦有年矣若仍前相助力作其官員兵丁及索倫達瑚哩之人皆致勞苦此數年來所種之榖倘足以備用則集衆力以耕作可以停止著將軍薩布蘇詳議具奏遣筆帖式一人往諭內閣康熙三十三年盛京挽運原有船百艘乃實有用之具也存留預備凡遇緩急為益良多盛京工部無故奏而廢棄之今年從山東天津所運之米因乏轉運之船遂致遲誤盛京工部堂司官著該部嚴訊議罪具奏諭大學士伊桑阿侍郎珠都納副都統齊蘭布學士嵩祝户部郎中鄂竒等康熙三十四年副都統齊蘭布等自盛京還奏言今嵗盛京亢旱麥禾不登米價翔貴雖市有鬻粟而窮民力不能糴遂致重困盛京者根本之地可令珠都納嵩祝鄂奇等馳驛迅往㑹同盛京將軍副都統諸臣詳察窮乏者於去嵗海運米二萬石中動支一萬石計㑹散給令可食至秋成此一萬石散給而有餘者平價發糶兵民均有禆益又諸地有告糧乏者遣城守尉部員之賢能者併散給以賑之如二萬石不足散給發糶其速以聞諭户部康熙三十四年盛京地方比嵗荒歉粒食艱難朕心深切軫念本欲巡行省問疾苦情形遍敷恩澤今雖停止東行而所在貧窶兵丁尚望臨幸是宜仍加賑恤用禆資生應作何加恩爾部議奏又盛京兵丁錢糧兩季支領未支領前兵丁每致稱貸嗣後按月支給今嵗秋禾聞不甚豐茂恐生計漸難自今冬以至來秋應作何賑給不致失所共計需糧若干著盛京將軍副都統㑹同盛京户部侍郎察明詳畫其奏諭大學士伊桑阿阿蘭泰康熙三十四年雅克薩諸地夙産佳貂比年羅捕殆已至稀乏若以貂不及格之故遂復治罪則官員徒爾受過佳貂實無可得自兹以往額數既足以不及格之故免其處分其令户部理藩院內務府㑹同移文黑龍江將軍薩布蘇仍令其定議具奏諭內閣康熙三十四年盛京將軍等疏請給米但言兵丁而已其陵上執事人等及衆百姓並不言及此皆朕赤子爾等亦可會同將軍查明一并散給若使海運之米明年可到盛京兵民方可無慮諭大學士等康煕三十四年此奏甚屬疏忽馬甲之中亦有人口少者步甲之中亦有人口多者一例按甲支給可乎來年海道運米未可預必其全到即盛京田榖亦難預必其全收凡事須曲盡籌畫豈可拘執定議此本發回令察明人口散給時康熙三十四年九月丁丑盛京將軍公綽克托等疏言關原等處馬甲月給米二倉斛步甲月給米一倉斛今倉未不敷俟明年海運之未補給因有是諭諭大學士等康熙三十四年開原等處散給兵丁米榖若令行查必稽時日兵丁或至重困著珠都納嵩祝前往將不能度日人口數目查明一面散給一面具題諭內閣康熙三十五年黑龍江吉林烏拉地方頻嵗不登可移文盛京將軍令整繕船隻依前噶爾圖所運之例將盛京倉儲米穀以彼地人力運五千石至莫爾渾伊屯之地積貯之諭大學士等康熙三十五年從天津海口運米但以新造船與商船轉運尚恐船少應遣人往福建將軍督撫處勸諭走洋商船使來貿易至時用以運米仍給以雇值其裝載貨物但收正稅槩免雜費往取此船著各部院衙門𣲖出賢能司官筆帖式各一員令馳驛前去盛京時康熙三十五年二月內閣學士陶岱往賑濟奏請由天津海口運米至諭盛京因有是諭户部康熙三十六年朕前至寧夏黑龍江將軍薩布蘇曾奏伊處收貯糧米三萬餘石年久漸朽與其積之腐爛何若散之為有益乎且出陳可濟軍糧易新便於收貯宜如所請行時康熙三十六年九月乙巳黑龍江將軍薩布蘇疏言沿河被水之十八莊請計其人數將黑諭龍江所貯米糧散給因有是諭內閣康熙三十七年烏拉寧古塔吉林黑龍江等處新滿洲內曾授官職以老病解任者照其原官品級給俸祿以養贍之矣此等解任之官今其子弟承替則供職得人而俸祿亦不致虛糜其敕兵部逐一詳察具奏諭户部康熙三十七年盛京係列祖創業之地朕謁祭陵寢咨詢民瘼承德等州縣今嵗田禾未獲全登宜加恩恤應徴米豆概行豁免爾部即移文該府尹遍示閭閻家喻户曉務俾均沾實惠以副朕愛民至意諭內大臣等康熙三十七年開國佐運勳臣揚古剎費英東額亦都三人效力甚可嘉尚此三人墓朕祭昭陵之日親臨奠酒其餘諸臣效力亦屬可嘉康熙三十一年曾經祭奠者照前舉行頴親王薩哈璘克勤郡王嶽託等墓各遣大臣致祭聖祖駐蹕時康熙二十七年十月戊午諭盛京因有是諭福善等康熙三十七年太祖太宗開國定鼎爾祖輔佐勳勞爾等未必詳悉朕比年來觀閲實録知爾等之祖於開創時功績𢡟著深屬可嘉朕既親來謁陵必當臨爾祖墓奠酒爾等毋庸再奏時揚古剎費英東額亦都之子孫公福善等奏言聖駕欲親臨臣等之祖墓奠酒臣等不勝惶懼伏祈停止聖祖乃有是諭諭大學士等康熙三十八年黑龍江地方連嵗歉收著將烏拉收貯米糧運至墨爾根齊齊哈爾地方預備若彼處有引水種田之處著能耕種之人前去教導交該部議行諭大學士等康熙三十九年俄羅斯地方遙逺僻處西北海隅然甚誠敬噶爾丹窘迫求救彼曾拒而不答曩者遣人分畫邊界即獻尼布楚地以東為界尼布楚等處原係布拉特烏梁海諸部落之地彼皆林居以捕貂為業人稱為樹中人後俄羅斯强盛遂并吞之已五六十年矣逺服聲教劃疆獻地出自忠誠即此允當軫念也諭時俄羅斯差人奏進本章因有是諭吉林將軍揚福康熙四十四年此事不准行朕屢以太僕寺之厰馬並茶馬賞給京師兵丁及各處駐防兵丁所以兵丁無賠馬之苦歷觀宋明之時嘗議馬政皆無善䇿牧馬無如口外者朕口外厰馬今孳生已十萬牛有六萬羊至二十一萬若將如許馬與牛羊驅至近畿牧養即日費萬金亦不足也因擇塞外水草肥美處牧放是以亳不費餉而馬畜自然孳息前巡行塞外見馬畜彌滿山谷歷行八日猶絡繹不絶也時康熙四十四年閏四月乙未揚福請以吉林烏拉白都納等處動支庫銀買馬給兵丁牧養諭因有是諭大學士等康熙五十年天上度數俱與地之寬大吻合以周時之尺算之天上一度即有地下二百五十里以今時之尺算之天上一度即有地下二百里自古以來繪輿圖者俱不照依天上之度數以推算地里之逺近故差誤者多朕前特遣能算善畫之人將東北一帶山川地里俱照天上度數推算詳加繪圖視之混同江自長白山後流出由船厰打牲烏拉向東北流會於黑龍江入海此皆係中國地方鴨緑江自長白山東南流出向西南而往由鳯凰城朝鮮國義州兩間流入于海鴨緑江之西北係中國地方江之東南係朝鮮地方以江為界圖們江西長白山東邊流出向東南流入于海圖們江西南係朝鮮地方江之東北係中國地方亦以江為界此處俱已明白但鴨緑江圖們江二江之間地方知之不明即遣部員二人往鳯凰城㑹審朝鮮人李萬枝事又派出打牲烏拉總管穆克登同往伊等請訓㫖時朕曾密諭云爾等此去并可查看地方同朝鮮官沿江而上如中國地方可行即同朝鮮官在中國所屬地方行或中國所屬地方有阻隔不通處爾等俱在朝鮮所屬地方行乘此便至極盡處詳加閲視務將邊界查明來奏想伊等已由彼起程前往矣此畨地方情形庶得明白諭大學士等康熙五十年前差打牲烏拉總管穆克登等查看鳯凰城至長白山邊界伊等業將所查地方繪圖呈覽因路逺水大故未能至所指之地著於來春氷解之時自義州乘小舟溯流而上至不可行之處令其由陸路向圖們江查去但道路遙逺萬一中途有阻今朝鮮人供應將此情由令該部曉諭來朝正之朝鮮國官員書文給與帶付伊王諭奉天府尹郝林康熙五十三年盛京旗民雜處命案甚多爾必親歷所屬地方誠心教導母謂此非久任之地將事諉與將軍各部國家設一官即有一官之職為官者當立志盡職興起教化有一畨整頓方無忝厥職也欽定盛京通志卷四
