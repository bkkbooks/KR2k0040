front:
  text: 欽定四庫全書欽定盛京通志卷九十二
  hash: sha256:e1cc5eec0b71232f0f65889dbcc8d31addd879d4afb7dc940f7b14791519dc83
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0040_WYG_096-1a, image: WYG0503/WYG0503-0001a.png}
body:
  text: 仙釋後漢金元明國朝欽定四庫全書欽定盛京通志卷九十二仙釋臣等謹案隋虞綽銘遼比之蓬瀛仙都明文貴亦稱為招提勝境以故前代頗傳有仙釋之蹟雖其事或涉俶詭然魏收志釋老范蔚宗傳方術仙釋之志亦纂述所不廢也謹志仙釋第三十一欽定四庫全書欽定盛京通志卷九十二仙釋後漢丁令威遼東人學道於太平府靈波山後化鶴來集於遼陽華表柱歌曰有鳥有鳥丁令威去家千載今來歸城郭如故人民非何不學仙塜纍纍又搜神記云遼東城門有華表柱忽有一白鶴集柱頭時有少年舉弓欲射之鶴乃飛去徘佪空中而言如是遂高上冲天今遼東諸丁氏云其先世有升仙者不知名字帛和字仲理遼東海州人初入地肺山師事董奉又到西城山事王君王君與和大道訣曰往北山石室中熟視北壁當見壁有文字則得道矣仲理視壁三年乃見文字後入林慮山為地仙相傳謂既成神丹作金以濟窮民云按水經注神仙傳等書皆作帛仲理晉時有帛道猷帛本古姓舊志誤作白仲理林慮山或作徐無山金王予可字南雲遼西人父本軍校南雲亦常預籍年三十大病後忽發狂能把筆作詩文及說世外恍惚事南渡後游上蔡為人軀幹雄偉貌亦奇古戴青葛巾項後垂雙帶狀若牛耳一金縷環在頂額之間兩頰以青湼之指為翠靨衣長不能掩脛故時有哨腿王之目落魄嗜酒每入城市人爭以酒食遺之夜宿土室中人或問以故事其應如響諸所引書皆世所無有烹茶詩云簾捲緑隂花外月玉山冰雪醉扶翁凌霄花詩云啼鳥倒啣金羽舞驚蛇斜傍玉簾飛張伯玉與之游最狎壬辰兵亂有軍將欲挈之北歸館於州之瑞雲觀南雲明日見將領自言云我不能住君家瑞雲觀也越三日卒後有見之淮上者見大金國志按元好問中州集劉祁歸潛志又稱王予可係河東人王元粹字子正平州人系出遼世衣冠年十八九作詩有高趣性習専固世事不以累其業流寓襄陽遭亂隻身北歸寄食燕中遂為黄冠主太極道院其卒也淄川楊叔能挽之有五言造平淡隻影臥黄昬之句元劉秉忠本瑞州人按瑞州今廣寧縣境因曾祖官邢州徙家焉初名侃字仲晦少補邢臺節度使令史慨然投筆去𨼆武安山中遂從浮屠法更名子聰後游雲中留居南堂寺世祖在潛邸時海雲禪師被召過雲中聞其博學多材藝邀與俱入見應對稱㫖屢承顧問秉忠於書無所不讀尤邃於易及邵氏經世書至於天文地理律厯三式六壬遁甲之屬無不精通世祖正大位一時規模制作皆所草定賜第奉先坊拜光禄大夫太保參領中書省事至元十一年扈從至上都築精舍於南屏山居之秋八月無疾端坐而逝按劉秉忠在元既以勲名顯貴位至師保本不當以釋日之然其始也寄跡禪林其没也亦以禪脫是終始以禪悅者也故仍志之仙釋明張三丰遼東懿州人名全一一名君寶三丰其號也生有異質龜形鶴骨大耳圓目鬚髯如㦸以其不飾邊幅又號張邋遢洪武初入武當山修煉寒暑惟一衲一蓑或處窮寂或游市井或數日一食或數月不食浩浩自得書經目不忘有問之者終日不答若與論三教經書則吐辭滚滚皆本道徳忠孝行則一日千里靜則暝目旬日太祖聞其名嘗遣三山道士訪之不至其在揚州咏瓊花詩云瓊枝玉樹屬仙家未識人間有此花清致不沾凡雨露高標猶帶古烟霞厯年既久何曾老舉世無雙莫浪誇便欲載回天上去擬從博望借靈槎葢自况也既而羽化於甘州張指揮園中復屢見他處或言三丰金時人元初與劉秉忠同師後學道於鹿邑之太清宫說鈴云今西域入貢者猶見為台吉供養云然皆不可考黄花老人不知所從來天順中居葢州山寺有道術修煉數年一旦鶴來即乗之以去後人因名其地為伴仙山馬真一河南人年百餘歲矣明季居廣寧之北鎮廟中採蘑菇拾野果為食會廣寧大旱經畧袁崇煥使禱雨立應後去之山海闗與士人談經論藝剖決如流為人言休咎率奇驗後不知所終連姓僧葢平人成化間約百歲不計飢飽毎與羣兒戲於市歲旱祈雨輒應將死先以時日告人後有人自南來者遇之於途計其日即僧死之次日雪庵居千山香巖寺生有異質殁有舍利其葬處至今呼為雪庵塔行榮遼陽人精通禪理經史子集無不究覽尤深於詩律編註大藏釋音寳鏡凡十卷辛苦三十年始成馬禪居遼陽清風寺相貌竒古每夜環走首山喃喃三匝東方始白今寺中塑像在焉國朝古林湖廣長沙人朱氏子既而為僧居奉天諸刹康熙乙亥十月忽延僧俗至囑以後事夜半歸方丈留偈端坐而逝衆用僧法荼毘之現金色毘盧像從辰至午衣文數珠儼然可辨古林說法時有一顛僧相往來古林甚敬之人問其故古林曰此人行甚深吾不及也後此僧至村堡中覔車輪一具端坐輪上須臾火發與輪俱化至今相傳為異碧庵㓜不茹葷出家居保安寺能前知荼毘日火光中現觀音大士像及樓閣獅象種種異境人咸異之顛僧廣寧人不知姓名頗顛常與羣兒戲或畫兒掌中使拳之放拳則雷聲殷然兒輩往往乞雷以為笑樂又能煑石為糧或與羣兒食之以為味如芋也善醫請療者身到即愈後一難産家延之僧不肯行强之至門而婦遂産僧頂暴裂濃血不止每悵然曰吾行已壞真寃孽也從此不復至人家來就醫者或以濃血塗之往往而愈後不知所終欽定盛京通志卷九十二
