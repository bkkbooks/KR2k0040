body:
  text: 雜志欽定四庫全書欽定盛京通志卷一百八雜志臣等謹按帝王都會之區地大物博殷蕃奧衍珍竒間出遼地自古建國遼金作都經元明以逮我本朝靈異所鍾嘉祥偉績何竒不有謹分著各類録諸篇末以志都邑之盛為雜志第三十七欽定四庫全書欽定盛京通志卷一百八雜志周成王時肅慎來賀貢楛矢銘其栝曰肅慎氏之貢矢王俾榮伯作賄肅慎之命肅慎一乍思慎孔子在陳有隼集於陳侯之庭楛矢貫之石砮其長尺有咫仲尼曰隼之來也遠矣此肅慎氏之矢也燕太子丹遣荆軻刺秦王不中秦益發兵伐燕拔薊城燕王喜太子丹等皆率其精兵東保於遼東秦將李信追擊燕王王急用代王嘉計殺太子丹欲獻之秦秦復進兵攻之五嵗卒滅燕虜燕王喜昔箕子之後朝鮮侯見周衰燕自尊為王朝鮮侯亦自尊為王欲興兵伐燕以尊周室其大夫禮諫止之其後朝鮮稍驕虐燕乃遣將秦開攻之取地二千餘里至滿潘汗為界朝鮮遂弱秦并天下使蒙恬築長城到遼土時朝鮮王否立畏秦襲之略服屬秦不肯朝會漢初以盧綰為燕王朝鮮王凖與燕界於浿水及綰反滅燕人衛滿亡命東渡浿水降凖説凖求居西界收中國亡命為朝鮮藩屏準信之拜為博士賜以圭封之百里令守西邊滿誘亡黨稍多乃詐遣人告準言漢兵十道至求入宿衛遂還攻準準與滿戰不利走入海居韓地自號韓王滿遂據朝鮮雄於遼東保塞外為臣傳子至孫右渠抗命不賓元封三年武帝以兵伐之朝鮮亦發兵距險樓船將軍楊僕將齊兵先至戰敗遁走散而復聚右將軍荀彘破其浿水上軍乃前至平壤城下圍其西北楊僕亦往會居城南數月未下彘所將燕代卒多徑悍力戰僕因敗亡嘗持和節朝鮮大臣陰使人約降於僕往來未決彘使人降之不從又數與僕期戰僕欲就其約不會彘意僕前失軍今與朝鮮私善疑有反計未敢發武帝以兩軍乖異兵久不決使濟南太守公孫遂正之許便宜從事彘乃以意告遂執僕並其軍遂還報武帝誅遂彘擊朝益急朝鮮人殺其王右渠以降武帝以其地為樂浪臨屯元菟真番四郡徴彘棄市僕贖為庶人謹案臨屯郡治東暆去長安六千一百三十八里十五縣真番郡治霅縣去長安七千六百四十里十五縣漢武帝滅朝鮮以高句驪為縣使屬元菟其俗祠鬼神社稷靈星十月祭天大會名曰東盟國東有大穴號神隧亦以十月祭之漢元朔元年濊君南閭率二十八萬口詣遼東求內屬武帝以其地為滄海郡俗知種麻養蠶作綿布曉候星宿常用十月祭天飲酒歌舞名曰舞天又祠虎以為神作三丈矛數人共持之樂浪檀弓出其地句驪一名貊耳依小水以居因名小水貊出好弓所謂貊弓是也王莽初發句驪兵伐胸奴其人不欲行皆亡出塞遼西大夫田談追討之戰死莽令嚴尤擊之斬句驪侯傳首長安莽大悅更名髙句驪王為下句驪侯後光武復其王號建武二十三年東句驪詣樂浪內屬辰韓耆老自言秦之亡人避苦役適韓國馬韓割東界地與之故似秦語或亦名為秦韓東漢光武二十年封韓人蘇馬諟為亷斯邑君使屬樂浪郡公孫度父名延避吏居元菟時元菟太守公孫琙子豹年十八早死度少時名豹又與琙子同年琙見而親愛之遣就師學為娶妻後舉有道除尚書郎稍遷冀州刺史以謠言免同郡徐榮為董卓中郎將薦度為遼東太守東擊髙句驪西攻烏桓威行海畔初平元年乃分遼東為遼西中遼郡並置太守自立為遼東侯平州牧追封父延為建義侯立漢二祖廟承制設壇墠於襄平城南郊祀天地藉田理兵乘鸞輅九旒建安九年司空曹操表度為奮威將軍封永寧鄉侯度曰我王遼東何永寧也藏印綬武庫袁熙袁尚奔烏桓曹操征遼西熙尚與烏桓逆曹軍戰敗乃奔遼東公孫康尚先與熙謀曰先到遼東康必見我我獨為兄手擊之且據其郡猶可以自廣也康心亦規取尚以為功乃先置精勇於廄中然後請尚熙熙疑不欲進尚強之遂與俱入為伏兵所擒坐於凍地尚謂康曰寒不可忍可相與席康曰卿頭顱方行萬里何席之為遂斬首送於操挹婁人便乘船北沃沮畏之每夏藏於岩穴至冬船道不通乃下居邑落挹婁土氣極寒常為穴居以深為貴大家至接九梯冬以豕膏塗身厚數分以禦風寒謹案陶復陶穴著於雅詩古固有之但豕膏得熱氣則融安能塗厚數分此皆范蔚宗陳壽之莗好奇逞妄之辭特附糾其訛於卷挹婁國便乘船馬韓居處作草屋土室其户在上舉家具在中夫餘庫有玉璧圭瓚數代之物傳世以為寶耆老言先代之所賜也夫餘本屬元菟公孫度雄威海東長服外夷其王尉仇台更屬遼東漢時夫餘王葬用玉匣常豫以付元菟郡王死則迎取以葬魏破公孫淵時元菟庫猶有玉匣一具晉太始元年木連理生遼東方城二年白虎見樂浪郡咸寧二年甘露降元菟郡治建興元年八月嘉禾生襄平縣一莖七穗咸和八年五月已巳麒麟見遼東晉太康四年涉歸卒弟耐篡立將謀殺慕容廆時廆年十五出避難追者急乃走匿於遼東徐郁家入其屋以席自障追者入屋發視竟無所見太康五年國人殺耐迎廆立之慕容廆初有赭白馬常自乘之既為石虎所圍力弱分將危陷棄衆將逃以此馬奔而鞲之馬見鞍輒蹄齧不得近乃止俄而鄴使至石虎國有難廆旋歸至俊壽光元年馬四十九歲矣而駿逸不衰俊奇之比鮑氏驄命鑄銅以圖其象親為銘贊鐫頌其傍象成而馬死崔鴻撰十六國春秋韓恆初無傳見夢於崔鴻故遂記之北燕王馮𢎞立與宋通好魏延和元年太武親討之𢎞嬰城固守其營邱遼東成周樂浪帶方元菟皆降𢎞子崇亦降太武封崇為遼西王録其國尚書事遼西十郡承制假授文官尚書刺史武官征虜以下𢎞遣其將封羽率衆圍崇太武詔永昌王健敕之封羽又以九城降𢎞為魏所逼奔於髙麗至遼東髙麗遣使勞之曰龍城王馮君爰適野次士馬勞乎𢎞慙怒稱制答讓之髙麗乃處之於平郭尋徙北豐𢎞素侮高麗政刑賞罰猶如其國髙麗乃奪其侍人質任王仁𢎞忿怨之謀將南奔太武又徴𢎞於髙麗乃殺之於北豐子孫同時死者十餘人齊高洋嘗從文襄行過遼陽山獨見天門開餘人無見者及即位十年幸遼陽甘露寺禪居深觀唯軍國大事乃奏聞三月始還都何稠字桂林性絶巧遼東之役攝右屯衛將軍時工部尚書宇文愷造遼水橋不成師不得濟麥鐵杖因而遇害帝遣稠造橋三日而就初稠制行殿及六合城至是帝於遼左與賊相對夜中施之其城周圍八里城及女垣合高十仞上布甲士立仗建旗四隅置闕面别一觀觀下三門遲明而畢髙麗望見謂若神功夫餘王嘗得河伯女因閉於內室為日所照引身避之日影又逐既而有孕生一卯大如五升夫餘棄之與犬豕皆不食棄於路牛馬避之棄於野衆鳥以毛茹之王剖之不能破遂還其母母以物裹置暖處有一男破殼而出及長字之曰朱蒙其俗言朱蒙者善射也國王命之養馬朱蒙減駿馬食令瘦善養駑馬令肥王以肥者自乘以瘦者豫朱蒙後狩於田以朱善射限之一矢朱蒙雖矢少殪獸甚多夫餘之臣屢欲殺之其母以告朱蒙朱蒙乃與烏引烏建二人東南走至淹滯水欲濟無梁夫餘人追之甚急朱蒙告水曰我是日子河伯外孫今追兵垂及如何得濟於是魚鱉並浮為橋朱蒙既渡魚鱉乃解追騎阻水不及朱蒙遂至普述水遇三人一著麻衣一著衲衣一著水藻衣與朱蒙至紇升骨城遂居王夫餘其後支别為髙句麗因以髙為氏至曽孫莫來乃併扶餘唐太宗伐高麗時遼東城有朱蒙祠鎖甲銛矛妄言前燕世天所降方唐兵圍急飾美女以婦神巫言朱蒙悅城必完及績攻之急城遂潰巫言不驗李廣字𢎞基本遼東人後徙范陽博涉羣書少與趙郡李謇齊名為邢魏之亞以才學兼侍御史修國史南臺文奏多其辭也齊文宣初嗣霸業命掌書記天保初欲以為中書郎遇其病篤乃止廣嘗早朝假寐忽驚謂其妻曰吾向似睡非睡忽見一人出吾身中語云君用心過苦非精神所堪今辭君去數日便遇疾積年不起遂卒所薦士畢義雲集其文集七卷托魏收為之序隋大業八年焬帝征遼兵分二十四道鏤方長岑海溟蓋馬建安南蘇遼東元菟扶餘朝鮮沃沮樂浪為左軍黏蟬含資渾彌臨屯侯城提奚踏肅石碣東暆帶方襄平為右軍三月車駕度遼大戰於東岸破之甲午進圍遼東乙未舍臨海頓見二大鳥髙丈餘皓身朱足遊泳自如焬帝異之命工圖寫詔虞綽為銘覽而善之命勒海上沈光字總持吳興人少貧賤善緣竿直上號肉飛仙大業九年徵驍果伐遼東同類數萬人皆出其下時王仁恭破髙麗兵進攻新城衝梯竿十五丈光升其端殺傷十數人髙麗競擊而墜未及地適遇竿有垂絙接而復上帝望見壯之即拜朝散大夫後殉江都之難閻毗榆林盛樂人遼東之役以右翊衛長史領武賁郎將典宿衛時衆軍圍遼東城帝令毗詣城下宣諭賊弓弩亂發所乘馬中矢毗顏色不變辭氣抑掦卒事而去勿吉國其人徑悍常輕豆莫婁諸國其粟末部勝兵數千多驍武伯咄部勝兵七千安車骨拂涅號室黑水白山五部勝兵並不過三千而黑水部尤為徑健自拂涅以東矢皆石鏃最為強國人皆善射常以七八月造藥傳矢以射禽獸中者立死隋開皇初文帝詔其使曰朕聞彼土人勇今來實副朕懷厚勞之令宴飲於前使者與其徒起舞曲折多戰門容唐太宗征髙麗拔遼蓋二州之人以歸兵過城下酋長登城再拜帝嘉其能守賜絹百匹帝至渤錯水阻淖八十里長孫無忌楊師道等率萬人斬樵築道聫車為梁帝負薪馬上助役十月兵畢渡雪甚屬燎以待濟元萬頃從李績征髙麗管書記績命别將郭待封以舟師赴平壤馮師本載糧繼之不及期欲謀績而恐為諜所得萬頃為作離合詩遺績績怒曰軍機切遽何用詩為欲斬待封萬頃言狀乃免又使萬頃草檄讓髙麗而譏其不知守鴨緑之險莫離支報曰謹聞命徙兵固守軍不得入髙宗聞之投萬頃嶺外髙麗時蓋蘇文死子男生嗣帝遣李績薛仁貴等討之時侍御史賈言忠自軍中計事還帝問狀對曰必克諺云軍無媒中道回今男生兄弟鬭狼為我嚮道敵之情偽我盡知之故必克且髙麗祕記不及九百年當有八十大將滅之髙氏自漢有國今九百年矣而李績年八十是行不再舉矣未幾績果滅髙麗收其城七十有六唐貞觀二十二年新羅王真德遣子弟來朝太宗賜以所制溫湯及晉祠碑并新撰晉書渤海王亦數遣諸生詣京師太學習識古今制度新羅王真德於唐貞觀時遣子弟詣太學觀釋奠講論太宗賜所製晉書永徽九年真德織錦為頌以獻其詞曰巨唐開洪業巍巍皇猷昌止戈成大定興文總百王統天崇雨施理物體含章深仁諧日月撫運邁時康幡旗既赫赫鉦鼓何鍠鍠外夷違命者翦覆被天殃淳風凝幽顯遐邇競呈祥四時和玉燭七曜巡萬方維嶽降宰輔維帝任忠良三五成一德昭我唐家光開曜元年國王政明遣使者丐唐禮及他文辭武后賜吉凶禮并文詞五十篇開元中又遣子弟入太學學經術太和五年學生嵗滿者一百五十人皆還國唐開元二十五年遣邢璹使新羅帝詔璹曰新羅號君子國知詩書以卿醇儒故持節往宜演經誼唐開元二十六年渤海遣使寫唐禮及三國志三十六春秋新羅治法峻故少犯道不拾遺人知書喜學里有庠扁曰局堂處子弟之未婚者習書射其中三歲一試舉人有進士算學諸科號君子國唐龍朔三年百濟西部人黑齒常之來歸常之長七尺餘驍勇有謀略唐則天垂拱二年新羅王金政明遣使請禮記一部并新文章令所司擇吉凶要禮并於文館詞林採其詞涉規諫者勒成五十卷賜之寶厯元年新羅國王金彥升奏先在太學崔利貞等四人請權還其新赴朝貢金允夫等十一人請留配國子監習業從之渤海國男子多智勇有三人渤海當一虎之語勃海男子多智謀驍勇出他國右契丹太祖徙其名帳千餘户於燕有戰則用為前驅遼宗室珊蘇庫能知蛇語太祖從兄多科扎以本帳下蛇鳴命珊蘇庫解之知蛇謂穴旁得金以為帶名龍錫金珊蘇庫國語珊耳也蘇庫皮也原作神速姑多科扎多科徑路也扎易也原作鐸骨扎今俱譯改遼耶律倍太祖長子太祖薨倍知皇太后意欲立德光乃與羣臣請於太后而讓位焉太宗既立有疑倍意倍謂左右曰我以天下讓主上今反見疑不如適他國以成吳太伯之名立木海上刻詩曰小山壓大山大山全無力羞見故鄉人從此投外國擕髙美人載書浮海去之唐倍初市書至萬卷藏於醫巫閭絶頂之望海堂通陰陽知音律精醫藥砭焫之術工遼漢文章嘗譯陰符經善畫本國人物如射騎獵雪騎千鹿圖皆入宋祕府契丹有國時四時有行在之所謂之巴納春巴納曰鴨子河濼在長春州東北四面皆沙堝多榆桞遼主每至侍御各偹打鵝錘一柄刺鵝錐一枚於濼之側相去五七步排立有天鵝之處舉旗鳴鼓鵝驚飛起五坊進海青鶻遼主親放之鶻擒鵝墜勢力不加侍者舉錐刺取鵝腦以飼鶻得頭鵝薦宗廟羣臣獻酒舉樂皆插毛於首以為樂弋獵網釣春盡而還國語巴納地方也原作捺鉢今譯改遼太祖薨舒嚕后悉召從行大將等妻百餘人謂曰吾今為寡婦矣汝等豈宜有夫乃殺其大將百餘人曰可往從先帝左右有過者悉送木葉山殺於太祖墓隧中怒大將趙思溫使送木葉山曰爾先帝親信宜往見之思溫對曰親莫如后后何不行曰我本欲從先帝地下以子幼國中多故未能也然可斷一臂以送之左右切諫之乃斷其一腕而釋思溫舒嚕八旗姓原作𫐠律今譯改燕北雜録云有武圭者在契丹中十餘年以善歌𨽻帳下故習遼事甚悉圭常云達魯古河釣牛魚遼之盛禮河與海接正月方凍至四月而泮遼主與其太后皆設次氷側鑿氷竅四名曰氷眼使人於上下十里間以毛網截魚從而驅之至於氷眼中用繩鈎擲無不中者拽出之謂之頭魚遂相與出就别帳作樂上壽程大昌演繁露云遼人達古河釣牛魚以其得否占嵗好惡馮道使契丹詩曰曽叨臘月牛頭賜蓋遼主嘗以此享道也金時亦承遼制王易燕北録云牛頭即南方鱘魚又牛頭魚頭如牛生東海中疑即遼金所釣道所賦詩者南唐章僚海外行程記云髙麗有銅器名服席者與漢時單于賜蘇武之服匿同是一物特名稱小異耳僚舟至冷泉髙麗遣兵來衛有銅器畫以供炊夜用擊警即古刁斗也東夷箕子之國猶知重古三代俎豆至漢尚存則刁斗尚其傳習而近者矣演繁露云今使北者所得有韋而紅光滑可鑒曰徐吕皮而不詳所出問何以名則曰徐吕二氏工為此皮豫案燕北録載契丹興宗常禁人服金玉犀帶及斜噶哩布斜噶哩布乃回紇野馬衣也本此而言則徐吕者斜噶哩聲之轉者也噶哩原竹喝里今譯改遼統和九年八月壬午東京進三足烏大安四年正月五色雲出東方大如二千石囷司天孔致和謂人曰其下當生異人後為金太祖受命之祥遼史云天慶二年天祚於混同江頭漁酒半命諸酋長歌舞為樂女直阿古達端立直視辭以不能天祚謂蕭奉先曰阿古達顧視不常可托事誅之不然恐貽後患奉先奏阿古達無大過殺之恐傷向化者之心未幾阿古達起兵竟為所滅阿古達原作阿骨打今譯改遼儀衛志有雙寬印雙寬者鷙鳥之總名以為印紐取疾速之義雙寬國語解見人物卷原作杓窊今譯改遼天祚帝天慶五年置淵軍八營募自宜州者曰前宜後宜自錦自乾自顯者如之又有乾顯大營巖州營凡二萬八千餘人國語淵硯也原作怨今譯改金初國俗有被殺者其親族繫刃杖端與衆至其家使巫歌而祝之曰取爾一角指天一角指地之牛無名之馬向之則華面背之則白尾橫視之則有左右翼者其聲哀切悽婉若蒿里之音既而以刃畫地取畜産財物而還其家一經詛祝家道輒敗金昭祖久無子有巫者能道神語甚驗乃往禱焉巫良久曰男子之魂至矣此子厚有福德子孫昌盛可拜受之生則名之曰烏古鼐是為景祖又良久曰女子之魂至矣可名曰烏延巫又良久曰女子之兆復見可名曰烏達布又良久曰男子之兆復見然性不馴良長則殘忍無親親之恩必行非義不可受也昭祖方念後嗣未立乃曰雖不良亦願受之巫者曰當名之曰烏肯徹既曰生二男二女其次第先後皆如巫者言烏古鼐原作烏古乃烏延國語解見黑龍江山川卷原作五鴉忍烏達布國語解見古迹卷原作幹都拔烏肯徹蒙古語解見人物卷原作烏古出今俱譯改金史女真舊無鐵鄰國有以甲胄來鬻者景祖傾資厚價以與貿易亦令昆弟族人皆售之得鐵既多因之以修弓矢備器械兵勢稍振金景祖有黃馬服乘如意景祖沒遼貴人爭欲得之世祖弗與曰難未息也馬不可以與人遂割其兩耳謂之秃耳馬金景祖為人寬恕平生不見喜慍先時其下有叛去者遣人諭招之其人曰汝主和鑾也和鑾吾能獲之吾豈能為和鑾屈哉景祖好酒飲啖過人時人呼曰和鑾故彼以此訕之亦不介意焉國語和鑾慈烏也原作活羅金世祖天性嚴重有智識每戰未嘗披甲先以夢兆占其勝負常因醉騎驢入室中明日見足迹問知之自是絶不飲酒金世祖既破烏木罕師還疾篤元娶納喇氏哭不止世祖曰汝勿哭汝惟後我一歲耳肅宗請後事曰汝惟後我二年肅宗出謂人曰吾兄至此亦不與我好言乃叩地而哭俄呼穆宗謂曰烏雅舒柔善若辦集契丹事阿古達能之遼大安八年卒年五十四明年納喇氏卒又明年肅宗卒肅宗疾篤嘆曰吾兄真多知哉國語烏木罕髓也原作窩謀罕納喇八旗姓原作拏懶烏雅舒原作烏雅束國語舒文也阿古達原作阿骨打今俱譯改遼主命穆宗討肅哈里募軍得甲千餘女真甲兵之數始見於此蓋未嘗滿千也至是太祖勇氣自倍曰有此甲兵何事不可圖渤海留守以甲贈太祖太祖不受曰被彼甲而勝則是因彼成功也是時遼追哈里兵數千攻之不能克穆宗謂遼將曰退爾軍我當獨取哈里太祖策馬突戰流矢中哈里首墮馬執而殺之大破其軍金人自此知遼兵之易與也哈里國語解見兵防名宦卷原作海里今譯改金太祖十歲好弓矢甫成童即善射嘗南望髙阜一發過之度所至踰三百二十步天德三年立射碑以識焉金太祖始伐遼諸路兵得二千五百人遼將耶律色實墜馬遼人前救太祖射救者斃併射色實飲矢之半有突騎前又射之徹札洞胸太祖免胄而戰或自傍射之矢拂手顙太祖顧見射者一矢而斃謂將士曰盡敵而止衆從之勇氣自倍敵大奔蹂踐死者十七八遼蕭嘉哩等將步騎十萬會鴨子河大祖自將擊之甲士三千七百至者才三之一俄與敵遇會大風起乘風擊之遼兵奔潰遼人嘗言女真兵若滿萬則不可敵至是始滿萬云色實國語解見古迹卷四舊作謝十今譯改金史遼帝自將七十萬自圖們西還太祖兵止二萬追及使右翼先戰兵數交右翼合而攻之遼兵大潰我師馳之橫出其中遼師敗績金主攻黃龍府次混同江無舟以渡遼主使一騎前導乘赭白馬徑涉曰視吾鞭所指而行諸軍隨之以濟遂克黃龍府使人視其渡處深不可測金太祖收國元年五月甲戍拜天射桞故事五月五日七月十五日九月九日拜天射桞嵗以為常世宗大定三年以重九拜天於北郊十四年詔明安穆昆之民今後不許殺牲祈祭若遇節辰及祭天日許得飲會章宗明昌四年次奉先縣辛未拜天於縣西五年六月出獵拜天承安五年敕來日重五拜天服五裳者拜禮仍舊諸便服者並用女真拜泰和三年重五拜天射桞上三發三中宣宗貞祐元年閏九月拜日於仁政殿自是每月吉為常金太祖起兵常在行陳間初無文字國勢日強與鄰國交好始用契丹字太祖命完顔希尹撰本國字希尹乃因契丹字合本國語製女真字太祖大悅命頒行之其後熙宗亦製女真字與希尹所製字俱行希尹所撰謂之女真大字熙宗所撰謂之女真小字金興用兵如神戰勝攻取無敵當世俗本鷙徑人多沈雄兄弟子姪才皆良將部落保伍技皆鋭兵無事耕可給衣食有事戰可致俘獲勞其筋骨以能寒暑徴發調遣事同一家是故將勇而志一兵精而力齊金國凡用師征伐上自大元帥中自萬户下至百户飲酒會食略不間别與父子兄弟等所以上下情通無閉塞之患國有大事適野環坐畫灰而議自卑者始議畢即漫滅之不聞人聲軍將行大會而飲使人獻䇿主帥聽而擇焉其合者即為特將任其事暨師還戰勝又大會問有功者隨功髙下支賞舉以示衆衆以為薄則增之女真用兵以戈為前行號曰硬軍人馬皆全甲刀棓自副弓矢在後設而不發非五十步不射弓力七斗箭鏃至六七寸形如鑿入輒不可出隊伍之法伍長擊柝十長執旗百長挾鼓千人長則旗幟金鼓悉備將事執旗人視所向而趨自主帥至步卒皆自控馬每五十人為一隊前二十人全裝重甲持棍槍後三十人輕甲操弓矢遇敵必有一二人躍馬而出先觀敵陳之虛實或向其左右前後結隊而馳擊之百步之內弓矢齊發中者常多其分合出入應變若神女真善騎上下崖壁如飛精射獵每見巧獸之蹤能攝而椎之得其潛伏之所以樺皮為角吹作􅊯􅊯之聲呼鹿射之大金國志女真人濟江不用舟楫浮馬而渡金都會寧四時皆獵每獵以隨駕車密布四圍名曰圍場金天會三年七月錦州野蠶成繭金世諸帝每於常武殿築臺為拜天所重五日質明陳設畢百官班俟於毬場樂亭南皇帝靴袍乘輦宣徽使前導自毬場南門入至拜天臺降輦至褥位皇太子以下百官皆詣褥位宣徽贊拜皇帝再拜上香又再拜排食拋盞畢又再拜飲福酒跪飲畢又再拜百官陪拜引皇太子以下先出皆如前導引皇帝回輦至幄次更衣行射桞擊毬之戲亦遼俗也金因尚之凡重五日拜天禮畢插桞毬場為兩行當射者以尊卑序各以帕識其枝去地約數寸削其皮而白之先以一人馳馬前導後馳馬以無羽橫鏃箭射之既斷桞又以手接而馳去者為上斷而不能接去者次之或斷其青處及中而不能斷與不能中者為負每射必伐鼓以助其氣已而擊毬各乘所常習馬持鞠杖杖長數尺其端如偃月分其衆為兩隊共爭擊一毬先於毬場南立雙桓置板下開一孔為門而加網為囊能奪得鞠擊入網囊者為勝或曰兩對立二門互相排擊各以出門為勝毬狀小如拳以輕韌木枵其中而朱之皆所以習驍捷也既畢賜宴嵗以為常金世宗大定二十五年四月幸上京宴宗室於皇武殿飲酒樂上諭之曰今日甚欲成醉此樂不易得也昔漢髙祖過故鄉與父老歡飲擊築而歌令諸兒和之彼起布衣尚且如是况我祖宗世有此土今天下一統朕巡幸至此何不樂飲於時宗室婦女起舞進酒畢羣臣故老起舞上曰吾來故鄉數月矣今回期已近未嘗有一人歌本曲者汝曹來前吾為汝歌上歌曲道祖宗創業艱難及所以繼述之意至慨想祖宗音容如睹之語悲感不復能成聲羣臣宗戚捧觴上壽於是諸老人更歌本曲如私家相會暢然歡洽上復續調歌曲留坐一更極歡而罷金世宗善騎射國人推為第一每出獵耆老隨而觀之大定二十五年世宗幸上京召見百二十嵗老人賜帛金顯宗孝懿皇后徒單氏以皇統七年生於遼陽母夢神人授以寶珠光焰滿室既寤而生紅光燭庭世宗備禮納為太子妃生章宗昭聖皇后劉氏遼陽人天眷二年九月己亥夜后家若見黃衣女子入其母室中俄傾后生性聰慧讀書過目不忘世宗選入東宫生宣宗金人之常服四帶巾盤領衣烏皮靴其束帶曰陶罕巾之制以皂羅若紗為之其衣色多白三品以上窄袖盤領縫腋下為襞積而不缺袴其胸臆肩袖或飾以金繡其從春水之服則多鶻鵝雜花卉之飾其從秋山之服以熊鹿山林為文其長中骭取便於騎也陶罕玉為上金次之犀象骨角又次之銙周鞓小者間置於前大者施於後左右有雙䤩尾納束中其刻琢多如春水秋山之飾左佩牌右佩刀刀貴鑌鐵尚雞舌木黃黑相半有黑相距者為上或三事五事寶飾以醬瓣樺􅝑口飾以鮫或屑金鍮和漆塗鮫隙而礲平之醬瓣皮斑文色股紫如醬中豆瓣産其國故尚之國語陶罕帶飾也原作吐鶻今譯改馬擴茒齋自敘擴隨金主至混同江之北地不生穀麥所種止稗子金主聚諸將共食則於坑上用矮檯子或木盤相接人置稗子飯一碗加七其上列以虀韭長爪皆鹽漬者别以木楪盛豬羊雞鹿兔鹿麞狐狸牛馬鵝雁魚鴨等肉或燔或烹或生臠以芥蒜汁清沃陸續供列各取佩刀臠切薦食罷方以薄酒傳杯而飲謂之御宴者亦如此既還乃令諸郎君家各致酒殽請南使赴飯十餘日始造國書適經元日隔夕令人具車仗召南使赴宴凌晨出館赴帳前金主於炕上設金裝交椅而坐羣臣以名馬弓矢劔槊為獻且曰臣下有邪諂姦佞不忠不孝者願皇帝代上天以此弓此劍誅之各跪上壽杯國主酬酌之次令南使上壽杯國主親酌二杯酬南使且云我家自上世相傳止有如此風俗不會奢飾更不别修宫殿勞費百姓也當時已破遼上京取到樂工列於屋外奏曲薦觴金主不以為意殊如不聞又擴隨金主打圍自拉林河東行每旦金主於積雪中以一虎皮背風而坐諸將各取所佩箭一枝擲占逺近各隨所占左右上馬軍馬皆單行每騎相去五七步接續不絶兩頭相望常及一二十里候放圍盡金主上馬去後隊一二里立認旗以行兩翼騎兵視旗進趨凡野獸自內赴外者四圍得迎射外赴內者須主將先射凡圍如箕掌徐進約三四十里近可宿之處即兩梢合圍漸促須臾作二三十匝野獸併走或射或擊盡斃之復設虎皮坐取火炙啖騎散之宿處金主言我國中最樂無如打圍其行軍布陳大概出此地近咸州一里有幕室數間供帳略備州守出迎就坐有腰鼓蘆管琵琶方響筝笙箜篌大鼓拍板舞者六十七人但如常服出手袖外周旋曲折酒五行歸館次日中使賜宴赴州宅就坐樂作酒九行豬鹿兔雁饅頭炊餅白熟之類鋪滿几案最重油煮麵食以蜜塗拌名曰茶食非厚意不設以極肥豬肉或脂濶切大片一小盤子虛裝架起間插青蔥三四莖名曰肉盤子非大宴不設人各擕以歸舍南使朝見儀至日館伴使副同行就龍臺下馬行入宿圍西設氊帳各歸帳歇定客省使副使相見就坐酒三行少頃聞鞞鼓聲樂作閣門使引入即捧國書自山棚東入陳禮物於庭下傳進如儀贊通拜舞抃蹈訖使副上殿女真官員數百人班於西廂以次拜訖近貴者各百餘人上殿以次就坐餘並退兩廂結架小葦屋幕以青幕以坐三節人殿內以女真兵數十人分兩旁立執長柄小骨朵為儀衛國主所坐若今之講坐施重茵前施朱漆銀裝鍍金几案果楪以玉酒器以金食器以玳瑁匙筯以象牙遇食時數人擡舁十數鼎鑊以前雜手旋切割餖飣以進名曰御厨宴所食物精細而味和甘食餘以頒三節人樂作如前人數多至二百人每樂作必以數十人髙歌以齊管色聲出衆樂之表酒五行各賜襲袍帶次日赴花宴酒三行樂作鳴鉦擊鼓百戲以出有大旗獅豹刁牌砑鼓蹈蹺蹈索上竿斗跳丸弄撾簸旗築毬角抵鬬雞雜劇等服色鮮明又有五六婦人立於百戲後各持兩鏡髙下其手鏡光閃爍如祠廟所畫電母此為異耳酒五行各起就帳戴色絹花各二十餘枚次日復有貴臣賜宴兼伴射於館內庭下設垜酒三行伴射貴臣館伴使副離席各射三矢弓弩從便是日國中各王貴臣或微服隱稠人中以觀射次日朝辭後歸館挂綵燈百十餘為芙蓉鵝雁之形雜以絃管館伴使副為惜别之會名曰换衣燈會酒三行各出衣服三數件或幣帛交遺將出界送伴使副具酒食亦為惜别會亦各出衣服三數件或幣帛交通情意至兩界中間彼此使副回馬對立馬上一杯换所執鞭以為異日之記背馬回顧少頃進數步躊躇為不忍别之狀如是者三乃行女真刻木為契謂之刻字賦斂調度皆刻箭為號事急者三刻之旗幟之外各有字記大小牌子繫馬上為號樂有腰鼓管笛琵琶方響􅌙笙箏箜篌大鼓拍板元至元二十四年春二月或告諾延反詔巴延覘之乃多載衣裘入其境輒以與驛人既至諾延為設宴謀執之巴延覺與從者趨出分三道逸去驛人以得衣裘故爭獻健馬遂得脫馳還白狀諾延蒙古語解見名宦卷二原作乃顔巴延國語解見疆域形勝卷原作伯顔今俱譯改元至正十八年宋關先生破頭潘等破上都轉掠遼陽至髙麗二十三年復攻上都博囉特穆爾擊降之博囉特穆爾博囉蒙古語解見奉天府山川卷特穆爾解見名宦卷三原作孛羅鐵木兒今譯改明建文四年小河之戰斬燕將陳文王真自刎燕王棣見失兩將力自督戰平安操長鎗幾及之馬蹶不得前燕番將王騏躍馬入陳援去先是王嘗夢與平安戰敗見一男子豐貌美髯乘白馬提大刀自西來大呼救駕砍安馬應聲而倒王得脫問其姓名曰莘城隍也至是果符所夢明𢎞治三年開原五色雲見俗傳打孤椿者謂天旱是墓中新死人作怪所致掘墓碎之則雨成化間醫巫閭先生賀欽言於當道禁其事後數年王備禦始至適天旱村民來告欲踵故事王許之先生急投一簡論其妄且干國典王遂悔而急止之已而天雨訛言亦息後有彭姓者專以此惑衆先生言之王參戎杖其人火其書國初有正黃旗驍騎校金光前起身戎伍目不識字然見善必為訓戒兵丁不妄殺人不淫一婦不虜一物不燒一房妻龔氏識字誦經順治癸巳冬隨征福建道出武林聞具德和尚説法自此有得辛丑夏還駐節錢唐光前有疾龔為延醫光前止之曰我曽與汝親叩靈隱今正欲作轉身之計求和尚證明耳何以藥為龔笑曰不意君亦至此地位命造二棺曰當與金公偕行稍遲為公畢後事耳金合掌而逝龔於後十四日亦端坐而化瀋陽姚崇廣最有力嘗有人憩廟簷間崇廣暗挾楹柱起壓其人衣裾於下已而復為出之遂以力聞然終身不與人鬬有鬭者以力止之皆讋服莫敢支吾夫有勇力而不鬭狠又能服鬭者使之不鬭其人雖微固可傳也溝兒湯東三城子有一山洞洞口時有行迹未嘗見人出入好事者常探之初窮一洞見一小沙河褰裳涉之復遇一河遙與前洞相屬而洞口甚窄側身入中頗黑暗及聞水聲潺湲倐復開朗前阻一河徘徊欲渡忽得一小舟將操之過岸而舟繫鐵索一頭沈水引之甚長河風漸覺刺骨又念來時已久遂尋故徑而歸自此之後洞口亦無人迹奉天城東南有九頂鐵義山相傳為仙靈窟宅三教堂郭道常於山中苦修數年時奉天大旱禱雨無驗使郭道祈請起壇而雨當事者多敬重之延住三教堂自此世味已交回首靈山不可復入矣兵部郎中常某之僕嘗於夢中為人促去至一官署儀衛甚嚴主者呼之入與一囊命之曰汝將此囊中物散布某屯若干某堡若干勿得多寡任意又與一大羊為坐騎復戒之曰手寒則於羊身頻拭之僕既出騎羊背耳中但聞風聲凡所經歷之處取囊中物如主者言散布焉頗覺入手甚寒終不知為何物也既蘇聞某屯某堡皆下氷雹方悟而手已凍壞蓋僕性強忍頻拭羊身之戒未之聽也墨爾根布克依站名土人謂馹為站在新城之北八百里距七站或曰大力人為布庫曽有布庫居此故名今曰布魁誤也或曰有達瑚哩人名布克依耕於此或曰元置軍民萬户府五一曰布呼江今布克依枕嫩江南布呼江未知所在舊站去城十五里地名齊齊哈爾立城後移站於城城因站名官文書皆稱之墨爾根布克依東北四百二十里河邊相傳康熙初年掘井得石有莫來耕三大字繫唐年號但唐疆宇不及此且非誥誡勒石語也康熙五十年間出歪嘴雀羅雀者多得之形如阿藍色微黑上嘴直而下嘴曲後亦不見雍正九年薩哈連蘇拉章京那莫善得一古刀光澤異常有若水珠一顆隨刀上下以手拭之全無痕迹雍正十三年四月遼河得一魚重三百六十斤無鱗刺惟背上有若骨者一行共數十片煉其油色赤不知何名欽定盛京通志卷一百八
