  - {type: page-break, offset: 0, content: '', id: KR2k0040_WYG_021-1a, image: WYG0501/WYG0501-0292c.png}
body:
  text: 乾隆四十八年癸夘御製古今各體詩卷下欽定四庫全書欽定盛京通志卷十七天章皇上聖製詩乾隆四十八年癸夘長寧寺祖宗開創初天勇好以暇宫殿既經營寺廟亦搆架為示無不有殊非事祈借然而額長寧意豈在佛化士卒勝陣戰黎民豐耕稼外闢内以安長寧撫中夏萬世基肇兹守成責敢卸長寧寺恭瞻太宗所御冠服疊戊戌舊作韻盛京城外長寧寺一統志稱本御園冠服依然貽髙祖羮墻因得仰元孫上行下效開基業天聰六年者奢太宗訓誨我國風俗素敦淳樸近靡僣越不可不定為法制自今䕶軍以上許服縀餘俱用布一縀之值可當十布與其一縀成一衣何如十布得十衣也又崇徳元年為餙諭崇尚節儉毋事華靡凡鞍轡等物不許以金永行禁止是以君民效法崇尚儉樸煌煌年奉聖諭所當萬為法守也萬載千秋永保存七字敬賡豈徒爾朂哉奕葉此情敦實勝寺天聰建年後䝉古日覲來科爾沁於天聰太祖時久歸附太宗元年秋䝉古敖漢部奈曼部來歸嗣是喀爾喀巴林喀喇沁扎嚕特土黙特諸部相率朝貢是皆奉佛者梵宇於是開神道而設教易語理㝡該聖人豈外兹所謀逺且恢諸䝉古部落皆從奉佛教崇徳六年八月太宗以偏師破明總督㓋承疇兵十三萬於松山杏山歸而建實勝寺於盛京以紀功績聖人神道設教亦所以順人情安國俗也是寺名實勝征明得勝迴上下同努力成功資衆材因繹實之義萬理包以皆棄實務虚名所望難副懷崇實允在兹務名豈為哉法輪寺梵語轉輪王又稱帝釋天蓋司世間者皇王之謂然世出世間法相需相得詮四塔圍都城斯乃居北焉盛京地載門外法輪寺在北撫近門外永光寺在東徳盛門外廣慈寺在南外攘門外延夀寺在西四寺各建一白塔環衛都城相傳當時有喇嘛善相地術者曽云四塔全當一統果符所言果然一統成佳兆已符前茲令演國語三乗因以宣乾隆戊戌年命此寺喇嘛習國語所譯經宣揚宗乗宏闡之意聖因以誌弗忘數典兼令盛京旗人熟習國語也諸事弗忘舊二陵應鑒㫋酹克勤郡王園寢叠戊戌詩韻讓帝之冢子首陳推戴心克勤郡王岳託禮親王代善之長子也有謀勇多戰功天命十一年八月徳宻太祖升遐岳託與弟蕯哈以太宗有聖議推戴告其父代善曰國不可一日無君服當四貝勒才徳冠世深契夙心先帝聖心衆皆悦速繼大位代善曰此吾也乃夜作議書翼日徧示諸貝勒大臣於朝遂定議奉太宗嗣位又於天聰時奏請善撫降人及請於山海闗通州燕京三處急圖其一以定丕基與睿太宗嘉納之崇徳三年命為揚威大將軍親王分道征明所向克㨗以疾薨於軍郡王太宗聞之驚慟輟膳三日詔封多羅克勤康熙二十七年稱平聖祖為立碑紀功乾隆四十三年以王後改郡王復還原號並令配享太廟忘家惟為去聲國力勇更謀沉我祖所嘉許予躬應奠臨閟宫教配享彰善意猶深賜奠功臣揚古利墓别部自為長揚古利姓舒穆禄氏其父郎柱木庫爾喀部長也來歸識聖人報讐甫十四郎柱率所部人歸我部人太祖遣子揚古利入侍尋郎柱為所害揚古利手刃父仇時年甫十四士卒太祖深異之日見信任尚主焉每従征伐身先詔之止亦不止或力戰被傷猶裹創奮擊以故功最多前後大小百餘戰俘獲無算崇徳初従征朝鮮中駁傷没太宗親臨慟哭視含歛追封武勲王順治中配享正九太廟康熈三十九年御製碑文紀其功雍年加封號日英誠努力以終身所重心惟赤更兼勇絶倫鼎湖伴咫尺千載㑹精神賜奠功臣費英東墓薩爾滸之戰衝鋒首建功費英東姓𤓰爾佳氏先世為蘇完部長太祖初從其父索爾和率所部來歸授一等大臣尚主佐理國事薩爾滸之戰明經畧揚鎬率四路總兵松杜馬林李如栢劉綎分將來犯杜松駐兵薩爾滸山巔費英東率所部衝破其軍死者相枕藉杜松戰殁已而馬林劉綎兩軍皆覆李如柏遁歸是役也明以四十萬衆分道來犯五日之間殱其精鋭殆盡勢如破竹實費英東首功云遂成破竹勢真是冠軍雄奬善誡其惡費英東性忠直敢言奬善黜惡無所撓避我責而太宗嘗諭羣臣曰費英東見人不善必先自斥後劾見人善必先自奬勸而後舉故被劾者無怨言被舉者無驕色未聞諸臣以善惡直奏似斯人也天聰初配享世襲太廟順治十六年追録佐命功第一晋三等公康熈三十七年御製碑文表其勲乾隆四十三年以費英東為開國功臣之冠特晉封一等公攄謀濟以忠二陵近相望來往㑹雲風賜奠功臣額亦都墓自古逢開創必資英濟臣白山聖人作東海卓材彬額亦都姓鈕祜禄氏先世居長白山㓜時父母為仇所害年十三手刃父仇避居嘉穆瑚村依其姑㑹能以太祖過額亦都識為真主辭姑従行驍勇善戰少擊衆所向克㨗嘉爾忠秉素寕惟勇絶倫額亦都性忠誠勇敢嘗督兵攻巴勒逹城直渾河漲以繩聨軍士魚貫而度夜率鋭卒攻城守者驚起殊死拒額亦都跨堞戰飛矢貫股著於堞揮刀㫁矢戰益力被五十餘創不退卒抜其城而還其忠勇類如此用兵四十餘年毎克敵受賜輒分給冇功士卒不以自私天聰元年追封公配享中建碑墓道以旌其功康熈七年特大廟順治爵其子遏必隆為一等公枌榆佳域䕶一徳永相親文廟道接百王後文崇一統前我盛京太宗初創大業即模崇勅建道文廟於行釋奠禮開創規文重已肇一統文明之盛也䂓模誠有異聲教訖無邊念舊衣冠慎我諸王太宗雖崇文教於崇徳元年曽祖惟諭貝勒大臣曰昔金世宗奮圖法恐子孫效漢俗預為禁約以無忠祖宗為訓衣服語言悉遵舊制時時練習騎射以備武功先時儒臣巴克什達海庫爾禪屢勸朕改滿洲衣冠効漢人服飾制度朕不従實為子孫萬世之計在朕身豈有變更之理恐日後子孫忘舊制廢騎射以效漢俗故常切此慮耳爾等其謹識朕言乾隆十七年春恭讀實録敬述此庶遵諭鐫立卧碑於箭亭用以示子孫臣聴毋忘為萬年法守云懷新禮樂宣辟雍剏國學合在洽熙年今年仲春上丁釋奠太學禮成因思古辟雍之制擁水周環命禮工二部大臣等於彛倫堂前度地鳩工甃池引水創立辟雍殿以昭累洽重熈敬承繼序之意題景佑宫本於崇政殿名左兹改建南城祀崇政殿左移景佑宫向奉三官今於徳盛門内有舉應數上聲典無他當正名戊景佑宫本敬思太廟基宇戌嵗來此太廟在左名寔應副因飭度地城南别建觀宇以存舊日之制三官傳自古五福錫吾氓萬載陪京固瓣香申敬誠景佑宫瞻禮疊戊戌舊作韻重謁當秋日前來閲五年祖宗曽荷龍上聲瞻禮敢忘䖍建極叨天眷承家勵體乾毎懷篳路者益澟載舟然唐代十思疏豳風七月篇作歌示諸子我意慎聰傳故宫即事戊戌臨故宫廿七月猶數茲畨至故宫百禮以次舉舊去不可追新來豈恒住叶一瞬迅駒隙藉悟今兮古於古有蕭王踐阼稱建武章陵修園廟南陽賜租賦叶凡以思舊業善惡紛堪覩大都為子孫不忘其父祖違道斯弗逺吾語非徒語故宫再用唐太宗幸武功慶善宫韻李唐乗隋亂逈殊漢創基唐高祖本隋藩鎮以太宗刧父叛君乗隋變亂起兵晋陽事由逆取視漢髙之起自泗上亭長尤多慙徳慶善雖成功未足方今茲我祖崛興此天命與人時名正則言順我祖皆太祖以害誓景祖戴天顯為明所不共乃以七大恨告服愛天征明復仇雪恥寔為名正言順太宗嗣育羣生輯寧諸國順者撫之以徳逆者威之以兵征服朝鮮混一䝉古羣臣再三請上尊號乃即皇帝位於瀋陽建國號曰大清自古創業帝王得天下之正未有如我朝者内安而外夷陪都建斯地故國興來思惟是厪肯搆匪曰侈華㮰䕶衛仍衆僕修飾仍百司如山之有堂如川之有湄富矣加之教絃誦達邦畿是用識本末彬然成此詩題文溯閣老方四庫集全書竟得成功幸莫如四庫全書之集在余六十三嵗始思及而降㫖浩如淵海恐難促就是以甲午年聨句有逢㑹畧嫌遲嵗月就將惟亹願觀成之句兹甫十年而功就亦大快事也京國畧欣淵已滙陪都今次溯其初昨嵗壬寅仲春四庫全書第一分告成弆置文淵閣今癸夘春第二分全書亦竣勅總校内閣學士陸費墀送至盛京弆置此文溯閣源寧外此園近矣津以問之莊繼諸全書第三分弆御園之文源閣者擬於明嵗告成第四分弆避暑山莊之文津閣者懝於後年告成披袐探竒力資衆折𠂻取要意厪予唐函宋苑實應遜荀朂劉歆名亦虛東壁五星斯聚朗西都七畧彼空儲以云過澗在兹爾敢曰牖民舍是歟敬緬天聰文舘闢我開太宗踐祚之初肇開文館創時即駸駸興文教矣必先敢懈有開餘嘉䕃堂文溯閣既建遂搆讀書堂經營雖曰新宅二百嵗强顔堂以嘉䕃詎縁松檜蒼故宫我祖作臯應立伉將爾時屬草創禮樂殊未遑重熙承累洽適當文運昌即此對嘉樹封殖敢不蘉親族並興賢角弓勵毋忘仰熈齋沛里絃歌户口滋百年休養樂民旗毋庸易視熙和此率自勤勞昔日貽登鳯凰樓再疊甲戌韻前度東巡蒞此時再來乎否寄吟披戊戌嵗登鳳凰樓疊韻有再來乎否有餘思之句重登興冺今兮昔一晌情忘端與涯郊外黄雲秋稔近月中金粟露華滋隨時光景原堪愛奚必臨文屢繫思遼城望月再用唐文皇韻征遼功未成往復魏徵碣登城望蟾宫抒憤聊言綴我今異彼事望月月未缺縦觀清光映澄懷逸興結詎誇衣錦還實值邊氛滅燃霞綳觀書綳梗塗膏光燦霞盛京吉林土風以蓬梗為幹摶穀糠和膏塗之燃以代燭用資作勞謂之霞綳霞綳者國語也取音譯語亦無差幾餘棐几葩經展大雅公劉緬舊家向仿楊補之三疊圖箑留置此繼思齋因疊前韻再題楊補之曽作野梅仿其三疊冩花開戌秋遂以置斯去夘嵗依然見此來何必玉華説艱致盛京地寒是以無梅恰欣金粟得相陪香従離合中邊嗅是否畫禪莫漫猜賜奉天將軍永瑋將軍雖鎮守要任勝其他故國屏藩寄長謀教養多一身為表率六部視平頗聖祖曽孫爾勤劬當若何賜吉林將軍慶桂連疆因覲謁扈蹕日趨隨雖未父書讀慶桂乃尹繼善之子繼善詞臣出身慶桂由父廕得官猶存世徳規俾之習政事曽在軍機處行走已可鎮邊陲夫子訓孟武其言汝尚思慶桂多病且尚冇生母故訓之示盛京五部侍郎陪都制度規京國五部原應各備官盛京為陪都重地凖京制設立五部堂司官而吏部銓考則専統乎京師惟一合思鮮咨度入聲一五部各止侍郎統羣當念倍艱難一部之中雖不似京城分各司然亦有郎中員外等官為不少矣雖云漢語易清語今人率以漢語為易而以清語為難莫向新觀忘舊觀承平日久旗人習漢語者多能清語者反少朕甚憂之盛京為國家根木大臣等當董率官吏旗人熟習國語敦尚滿洲淳樸舊風毋令沾染漢人習氣競尚侈靡也明季末流滋逺異明季陪京設部院諸寺監雖投閑置散之地而樹黨分門互相攻擊甚者託名直言遥制中朝者有之以致言愈紛而政愈亂日引月長以及明亡我朝陪京五部各盡其職従無明末惡習是亦祖宗良法美政足垂為憲典也欽哉六計表衣冠御崇政殿受賀御殿視朝禮異常陪京受賀益徵祥祖功宗徳承天貺累洽重熙與物昌年越古稀心戒怠民資我養愛毋忘語云百里半九十歸政以前敢不蘉降㫖寛免奉天所属州縣錢糧詩以誌事陪京凡四莅每思開創勤而其守成難責實在予身知難無别法敬天與愛民庶弗致隕越稍答投難恩四度皆施恵普及民與軍軍則賜月餉前三次躬詣盛京皆優賚兵民蠲免租賦今四莅陪京恩施宜普因降㫖將盛京等處兵丁各賞一月錢糧又賞銀二萬兩交將軍分別等差加賞隨營出力兵丁又沿途辦差緑營兵丁亦查明賞給一月錢糧其奉天各州縣乾隆四十九年地丁正項錢粮通行豁免又莊頭應交倉糧一萬餘石免其交納又盛京興京等十五處旗地應納米豆草束免徵一半俾留都旗民益享盈寧之福民當免嵗緡用是頒十行甲辰賦豁均黔黎莫予謝應謝祖貽仁敬題大政殿八韻開國規模逺奉天宵旰厪武功威敵讋文治愛民殷一殿於中聳十亭以次分都俞合衆志吁咈亦欣聞濟濟思攄畧林林勉立勲太常明紀績世襲永酬勤我貝勒太祖等統太宗創業之初凡征伐皆大臣命王大臣兵若親征則王貝勤等扈従領隊宣力抒忠卓然可紀如睿親王統衆入闗簠誠公正戊戌嵗特降㫖追謚曰忠復予王封世襲又豫親王西平流冦南定江浙亦勅復親王世襲又禮親王以讓王而兼偉伐鄭親王肅親王克勤郡王皆茂著壯猷克昭勇義並命復其原號以此六王配享太廟俾其後裔承家襲慶共知效法維時大臣則揚古利費英東額亦都等均身建殊勲得封公爵世襲門替其餘公侯伯子男以軍功世襲者不可勝紀上下交成泰謀猷淨掃氛來孫承佑啓敢不敬為君清寧宫三疊舊作韻四度四十嵗一彈指似前自癸亥年初詣盛京越甲戌迄今癸夘凡四度瞻禮枌榆一彈指間四十年矣迅哉今昔日赫矣照臨天諸子示土障戊戌嵗燃霞綳觀書詩云土障葛燈宜此物陳編枕葄夜堪稽霞綳漢語糠燈也為盛京土物每來即燃之今嵗命諸皇子随侍來北俾習觀盛京舊佫以示不忘羣臣賜胙筵祭祭日神為國家最重典禮今坤寧宫每神及春秋立竿大祭皆謹遵昔年清寧宫舊制前癸亥甲戌戊戌三度來此俱恭舉祀神禮茲駐盛京仍照前舉行並召扈従皇子王公大臣及奉天將軍等賜食祭肉以昭錫福受釐普冾慈恵之意也馴兵弓箭閲恵庶賦租蠲次第政云布逍遥駕合旋向期兹己副弗曰待他年戊戌清寧宫有䝉五年庥如尚健重至待他年之句兹閲重至而精神强健如昔蒙顯承庥集慶惟益勵敬勤無斁云望醫巫閭山三依皇祖元韻迴蹕經平甸逺欣見翠蓉已知北鎮近應謁古祠重舜狩未傳典堯章永泐峯望中悉路徑遊處憶杉松憑輦秋猶暖睎巒雲未封由來欽故國自昔重禋宗廟貌新榱桷上年七月盛京將軍慶桂奏請修葺北鎮廟因降㫖發帑重修廟貌新神威䕶象龍一時騁遥目五字識䖍胸廣寧道中勝國扼衝地見廣寜縣志陪都屬邑城昔今形勢異原隰鑿耕盈攻奪緬前烈養教平聲厪後營重新脩百堵黎庶喜相迎廣寧詠熊廷弼王化貞事明季知兵數上聲廷弼而何復用王化貞化貞願請兵六萬一舉遼東期蕩平是事葉向髙當國為其座主其言聴餘者多隨順附合右廷弼乃如晨星經撫不和必致敗篤信撫又張鶴鳴一戰諸将自大潰廷弼退原罪不輕明季曉軍事者以熊廷弼為巨擘其經畧遼東布置頗合事機乃既用廷弼為經畧復用王化貞為廣寧巡撫化貞輕而愎素不習兵廷弼主守化貞主戰且馳奏請兵六萬一舉蕩平時葉向高當國化貞座主也頗右之廷臣惟何喬逺夏之令趙時用言與廷弼合餘多右化貞令毋受廷弼節制當是時中外舉知經撫不和必誤疆事而兵部尚書張鶴鳴篤信化貞従中主持化貞素任中軍孫得功為腹心盡發廣寧兵畀得功與我軍遇一戰明兵大潰化貞棄城出奔遇廷弼偕走入山海闗化貞孫得功是任得功乃言敵薄城廣寧大亂衆奔走一馬二僕棄城驚孫得功與我大軍遇於平洋橋鋒始交得功及參將鮑承先等先奔兵遂大潰得功降於我欲生縳化貞以為功訛言敵已薄城城中大亂化貞方闔署理軍書參將江朝棟排闔入大呼曰事急矣請連走化貞莫知所為朝棟掖出上馬二僕人徒步従遂棄廣寧城跟蹌走與廷弼遇於大凌河化貞哭廷弼㣲笑曰六萬衆一舉蕩平竟何如化貞慙議守寧逺及前屯廷弼曰已晚乃䕶潰氏入闗孫得功迎我大軍入廣寧化貞逃已兩日矣哭向廷弼弼㣲笑此笑殊為不近情國事為先私讐後斯時何時私讐營並致伏法因渝賂當化貞出走遇廷弼廷弼所將尚五千人設廷弼果能捐軀赴難尚可稱為節烈不然支撑寧逺前屯錦義兩州之間扶傷救敗収拾殘黎可茍延旦夕乃一聞化貞之敗轉自以料事能中㣲笑相稽是不以國事為重而以報復私讐為快竟與化貞倉皇風鶴並馬入闗其意以為我固嘗言之而不聴是其私心短見與化貞並致伏法而無辭公論者也明史又載廷弼已論死令汪文言賄魏忠賢四萬金祈緩既而背之忠賢大恨誓速斬廷弼此則明政不網政由宦寺以致䘮師棄地傾覆隨之而其初則由於葉向高之庇王化貞師生門户之害一至於此因過廣寧作歌述事以昭殷鍳云䘮師棄地國隨傾吁嗟門户害如此要之其主昬不明要之其主昬不明作歌自警警後生祭北鎮廟禮成述事鼎新當此日上年發帑修葺瞻北鎮廟殿宇丹雘一新兹拜落成帛祀例當年永鎮北方境仍従東路旋前癸亥甲戌皆従邉外至盛京謁陵後歸途展謁惟戊戌因出山海闗順途瞻禮今嵗従熱河啓蹕取道邊門仍於謁陵後自東路迴程入闗茲始申瞻祀之䖍廣生滋萬物錫羡佐穹天言念陪京近籲庥心倍䖍觀音閣佛閣連鎮廟由來非兩蹊功均生物頼徳以佑民齊息慮原無象縦觀莫有倪底須七景厯甲戌杪秋遊醫巫閭山得五言排律三十韻厯叙山中名勝如聖水盆蝌蚪碑桃花洞吕公岩道隠谷雲巢松曠觀亭等七景並於長律中一一分賦及之自合五言題棧道入巖闗花宫翠靄間憩躬坐清暇騁目俯孱顏旋亦别而去那能恒此間天成同一望奚必定盤山此山入崖口戊戌前題題醫巫閭四景翠雲屏西峯翠色罨眉兴恰似屏風展映簾片石千秋大方廣分明八辨説楞嚴八還辨見出楞嚴經道隠谷谷名道隠非充隠泌水洋洋足樂饑游藝不能無後議圖成逐鹿又何為東丹逐鹿圖為石渠寶笈上等畵巻聖水盆石崖蟠纚落垂紳泐句多看東海人聖水盆崖壁多泐朝鮮人詩故戊戌題句云多有朝鮮人泐句箕疇文化至今漸詩字不殊言語異朝鮮人有能國語者可以共言説通情至其為朝鮮語則全不能曉及令寫漢字則又章句分明亦一竒也同文可識正同倫曠觀亭曽聞萬卷貯山亭欲勝劉家陋室銘榱桷縹緗消已盡惟餘名共碧峯青過大凌河再依皇祖元韻前度往過斯返過前戊戌嵗出山海闗至盛京是以先經此地今嵗仍如癸夘甲戌之例由邊外至盛京歸途始過大凌河迴瞻心戚上陵歌長上聲年不似少年壯來恨難期去恨多自癸亥年初詣盛京恭謁七十祖陵迄今癸亥凡四十年来經四度兹春秋已有三雖精神自信如常而筋力㣲嫌遜昔古人言去日苦多非虚語也白日匆匆迅駒隙秋風獵獵拂鯨河艱哉勵我守成志敢曰當年早止戈大凌河詠事我軍圍大凌掘壕復築壘錦州四萬兵來援近尺咫乘風復縱火其勢雄如兕太宗應以暇精騎數千耳反風天佑順援兵敗披靡城中望已絶歸降乃致使獨有何可綱不従含笑死大壽張巡非可綱霽雲是天聰五年八月我月太宗親統大軍圍大凌河掘壕築壘為乆困計九明兵四萬自錦州來援太宗與諸月勒率精騎數千進擊應以整暇敵却走㑹大風敵乘風縦火勢甚熾將逼我陣天怱兩反風遂大破之生擒其監軍道張春等十月大凌城中糧盡明總兵祖大夀殺副將何可綱以降可綱遼東人史稱其先為袁崇煥中軍守備亷勇善撫士卒佐崇煥捍禦有功累荐遷至副將功加左都督偕祖大夀築城大凌河工甫竣我大軍攻之可綱堅守不下乆之糧盡援絶大壽反諸將皆欲降獨可綱不從令二人掖出城外殺之可綱顏色不變亦不發一言含笑而死云云可綱擢自偏禆委身許國見危授命實無愧唐之南霽雲而祖大夀反覆觀望不終臣節難與睢陽同日語矣觀大凌河養息牧馬羣馬政亦國之大經以資戎兵及驛傳漢唐宋明四大家要以唐牧為最善然已扞格有難行白家樂府率可見耕當問僕織問婢各有所司行之慣以漢人言養息馬何殊水火與冰炭遼金元事率荒略國朝馬政誠無間上都塩澤大凌河漢唐宋明馬政以唐為最善按唐書兵志置八坊於岐豳涇寧間地廣千里分四十八監後馬多地狹不能容又析八監於河西豐曠之地云云牧馬於耕桑之内地事已扞格難行向曽於樂府隂山道詩中辨其誣我朝馬政則有分布於上都即元之上都鹽澤即達布遜諾爾及此大凌河非耕桑之地各有牧塲就水草字育共二十萬二十八百餘匹仍嵗有孳生以資緑營驛站及内地駐防貿取實用前代馬政安能有此各有牧羣多無萬旂人司事勿勞民此處牧政夏則放逐水草馬以蕃息冬則分交内府官莊旂人餧養既非有害民間耕桑即今長途扈從馬或疲乏者亦得資更換逐水草自孳蕃衍此處經冬雖芻秣官莊供給原稱便長途扈從馬或疲一一與之資易換底須鋪錦事誇張觀馬羣應思治亂過錦州六韻錦州本要地事在必爭之徒以嚴防守因而久戌期錦州為遼瀋咽喉明駐重兵防守甚力崇徳五年春太宗令鄭親王濟爾哈朗等率兵修義州城駐劄屯田更畨圍錦州六年春環其成鑿壕立營圍困至七年三月錦州城始破葢屯戌之久已及三年矣呼庚巳絶望請誓尚陳辭賢翰正言責降臣决意隨先是天聰五年我大軍圍大凌河明總兵祖大夀力屈降附縦歸錦州復叛及崇徳六年我大軍圍困錦州至七年三月明援兵盡絶城中糧盡饑民相食大夀戰守計窮且聞松山已失乃遣人至鄭親王濟爾哈朗睿親王多爾衮軍前乞降二王據以入與盟告越數日大夀復遣三人至二王營中云可許誓及印文否如有即歸順矣二王怒云爾欲降即降不降即已我圍困此城旦夕可取有何顧慮而與爾盟誓乎遂羈其來使二遣一人歸諭之大夀惧始決意投誠率衆官詣軍門降遂克錦州祗今撫往蹟實永頼天禧版築重新整承平户口滋錦州道上再依皇祖詩韻沛里行行逺二陵望𣺌𠖇郡城新埤堄自戊戌秋降㫖修葺盛京一帶城垣命工部侍郎徳成㑹同將軍等督修迄今五年各城俱次第告竣觀瞻整肅雉堞一新塞野儼藩屏工作騐經過民風問憩停究因攻畚鍤盛京各城工雖經發帑一百三十餘萬物料給價工役給值於民間耕作無妨而畚鍤究雇用民力兹蹕路所經特予加恩將奉天所屬府州縣四十九年正項錢糧通行豁免其各莊頭應交倉糧概免交納义盛京興京等十五處旂地應納米豆草束亦着免徴一半以示優恤逭賦恵烟坰過錦州疊戊戌詩韻帝與臨衝際伐墉本是難軍薄太宗攻錦州時更畨圍困城中環兵守之錦州援盡糧絶時洪承疇集兵赴援被擒祖大夀計無復之乃率衆官詣軍門降獻錦州城即今崇百雉永古衛三韓力勿勞民户帑胥發地官戊戌秋飭修盛京一帶城垣共十八處部帑百三十餘萬錦州城估需銀五萬四千四百餘兩府州縣同錦府稱錦州府首縣即名錦縣故云誰與巧名安經吕翁山疊戊戌舊作韻明似承疇者幾人生降其國兆亡真固縁靦面不知恥亦以開心大布仁遼左馳驅従聖主江南經畧果能臣洪承疇在勝國身膺閫寄一旦力屈俘降固於臣節有虧亦由我其太宗推誠布徳能得人之心是以承疇感激圖報馳驅遼瀋宣力東南頗樹勞伐雖不克終於明季實能効用於本朝非如錢謙益輩進退無據者比也金陵縳致道周黄日無奈稜稜事説陳承疇既投誠本朝明人訛傳為陣亡優卹偹至後黄道周被執至金陵時承疇經畧江南以道周同鄉遣人慰問道周言先帝因洪經畧已死優賜祭𦵏舉國皆知今安得復有洪經畧云云詞氣激昻慷慨聞者感動承疇為之慚沮承疇道周皆閩人漳浦蔡聞之先生嘗言其鄉事最悉杏山晚眺再依皇祖元韻百年中外久承平猶仰天聰此赫聲杏山松山皆寧逺屏衛明遣總督洪承疇集援兵十三萬守禦甚力我太宗統大軍親征陳師松杏兩山間横截大路駐營明兵望見大懼欲戰則力不支欲守則糧已竭合謀退遁我軍先獲筆架山積粟遂濬壕斷松山杏山路并於杏山等處設伏遮擊凡殺敵五萬三千七百餘獲馬七千四百餘甲冑九千三百有奇明兵自杏山南至塔山赴海死者無筭而我軍誤傷者止八人餘無挫衂此皆我威赫太宗神武睿謀出奇制勝有也天濯耆定大勲寔前古所未折㦸沉沙復何有杏山祗剰晚霞明雪十月朔日行路那辭風雨逢毎當駐蹕雨從容今朝創見飛乾雪數上聲節恰欣值孟冬長道奚妨㣲濘踐逺山都被凍雲封拂廬收得天漿沃快煮三清韻事供寧逺道中作闗外曽餘百里遥謂之曰逺名誠囂欲寧而又弗能寧上下否政嗤勝朝我祖創興實泰運君臣努力同心奮荷天之龍定中原重熙累洽恩膏潤和則為泰乖則否消息之分敬怠耳用告後人尚慎哉分明殷鍳可忽此寧逺祖氏石坊再疊舊作韻二首明綱值夕不謀朝天命人心去已遥大夀屢招降乃就天聰三年征明太宗親統大軍寧遶巡撫袁崇煥錦州總兵祖大夀赴援我驚懼太宗用計間之明帝不察竟磔崇煥於市大夀率兵徑歸仍為明守錦州明帝既不追回又不加罪至天聰五年秋太宗統兵圍大凌河明兵四萬自錦州來援我軍進擊大破之生擒監軍道張春等十月大凌壘中粮絶祖大夀始舉城降夜至御營輸欵尋縦歸錦州大夀復叛與我兵相拒州至太宗復遣鄭親王濟爾哈朗等統軍更番圍錦崇徳七年三月大夀糧盡援絶戰守計窮又聞松山已失乃率衆官語軍門降遂克錦州計其屢懐觀望實為反覆無定而其初志尚依戀勝國猶一端之可節取者耳嘉其初尚戀朱朝寧逺重征值此朝因之詠古睪思遥貳臣傳復分甲乙用訓人毋事兩朝前曽勅國史館以明臣降附本朝者編列貳臣傳以為人臣身事兩朝者戒其中復示區别如洪承疇等著有勲績盡力本朝者為甲編其進退無據不齒於人如錢謙益軰為乙編若祖大夀雖大節已虧有負勝固而於我朝功績茂著子孫世禄仍予列之甲編云過中後所中前所脣齒相依所後前英藩効力拔城連中後所城在寜逺州西南八十里中前所城在寧逺州西南一百六十五里崇徳八年秋九月世祖初嗣位遣鄭親王濟爾哈朗英親王阿濟格統師征明扺中後所填平壕塹以紅衣礟雲梯攻拔其城擒斬遊擊吳良弼都司王國安等二十餘員馬步兵四千五百人俘四千餘人分兵略前屯衛斬總兵李輔明袁尚仁及副將以下三十餘員兵四千餘俘二千餘人又分兵至中前所明總兵黄色棄城遁遂克中前所俘千餘人凡先後獲鎗礟駝馬牛羊等物無算蓋恐明乗我國遭大故來侵故先伐之以揚我武實睿親王之嘉謨也昔時毁堞還平塹此日修壕更築堧戊戌秋飭修盛京一帶城垣命侍郎徳成㑹同盛京將軍勘估督辦共十八處自中後所城估需工料銀七萬一千八百零中前所城估需工料銀二萬六千零與義州等十六處城垣一律煥新蓋當征伐之際則填塹毁城今承平日久則修築垣墉攻守勢固不同也攻守由來不同勢康平業已有多年其間陣斬相持者與益可曾見古篇我予即世祖定鼎燕京特恩賜謚明末殉節之大學士范景文等二十人當時徵据傳聞未暇遍訪故得邀表章者祇有此數因於乙未冬命將明史及通鑑輯覧中所載明末死事諸臣徵考姓名仍其故官追予謚號一準世祖時例行於是得専謚者二十六人得通謚者一千六百五十人並各叙事實輯為勝朝殉節諸臣錄刊布頒行其有於遼瀋抗拒王師戰殁行陣及為我軍俘斬者得謚忠壯一人謚忠烈十二人謚忠節烈愍節愍七十七人中後所總兵李輔明等即予謚烈愍者也我朝事後家法推恩前代死事之臣雖曽於我對敵之人亦旌其臣節蓋前古所未冇云盛京所屬城垣修葺已成詩以誌事疊戊戌詩韻謁陵戊戌六騶過頽堕城垣見者多此日閭閻都屬我當年征伐迥殊他各處城坦明季用以守禦當年攻取之際掘毁者有之承平日久風雨所摧壊者亦有之閭閻依城郭而居非安民之道也因發帑命工部侍郎徳成同盛京將軍等督修因教發帑經營始普予重修次第科凡蹕路所經城垣八處義州城巨流河城撫順城廣寧縣城錦州城寧逺州城中後所城中前所城蹕路不經遇城垣十處遼陽州城海城縣城蓋平縣城熊岳城復州城寧海縣城鳯凰城岫巖城鐵嶺縣城開原縣城統不勞民力計共需帑銀一百三十一萬自戊戌至今癸夘予以五年限俱一律次苐新整煥焉改觀蹕路此番因便閲督工善否勘如何姜女祠墨胎可比伯夷賢戊戌曽經此泐篇應劭又云國君姓千秋史究孰真傳史記索隠引應邵云伯夷之國君姓墨胎氏則伯夷乃其民非墨胎氏矣而世傳伯夷為墨胎氏又以泥塑之像為墨胎兹姜女祠及夷齊廟皆泥塑像而姜女更以齊之杞梁事證之藎愈去愈逺然均以節烈稱善善欲長名相訛傳可以弗諭矣進山海闗並山連海真雄闗一夫當之萬過難雖然我祖開創際鼓衆鞾趯亦豈難一解我祖惜衆恐冐險傷人得地失不掩以此屢諭莫衝鋒我命太宗凡遇征討軍中將士有先登効賜號巴圖魯者屢諭諸大臣以此等忘軀勵勇之人宜加䕶惜勿再令首先登城致或傷損仁心仁言體卹偹至衆益感激思奮爭先効用前恭閲永久實錄曽命特書諭㫖恭述也聖謨以誌且以貽示子孫凜遵法守諸臣羣下心倍感二解萬里長城守豈易何處無可入之地直至燕京略山左天聰三年十月口圍太宗親統大軍征明入大安困燕京十二月大軍經海子而南且獵且行遂趨良鄉克其城復克固安還至盧溝橋明副將沈某率兵六千來禦進擊盡殱之列營於京城西南明總兵滿桂黒雲龍麻登雲孫祖夀等四人領馬步兵四萬結柵列鎗礟以禦我軍毁柵而入斬滿桂孫祖夀生擒黒雲龍麻登雲我軍無一傷者乃遣巴克什達海賫書與明國議和遂旋軍八年七月州朔太宗親統大軍入張家口宣府大同至山西應州旋師崇徳元年六月州命武英郡王阿濟格等統軍入長城越保定至安旋師三年八月命睿親王多爾衮等統師征明入牆子嶺至燕京畧山西界復由臨凊渡運河四年正月攻破山東濟南府執明徳王由樞還至天津共克城三十四降城六敗敵十七陣三月凱旋七年十月命饒餘貝勒阿巴泰等統兵征明分道入界嶺黄崖口直扺兖州府山東州縣相繼下凡攻克三府十八州六十七縣六月師還如入無人之境無人境恣入與出三解得之誠易慮守之宗諭太宗圍燕京時諸貝勒大臣請進攻能成太曰朕視將卒如子子賢雖無積蓄終立子不肖雖有積蓄不能守也此時正當善撫我軍蓄養精鋭因遂止勿攻蓋亦審時度勢有所待耳天時敬待因迴師大智大仁兼大勇惟恐窮武傷黔黎四解自成西入燕京亂朱家宗社失一旦亡明者賊實非我閏位為去聲我驅除難五解三桂開闗因一女吳三桂為明統兵守山海闗有寵姬陳沅留其父襄所及李自成䧟燕京襄家被刼陳沅亦為所掠三桂在闗聞燕京失守父為賊縶尚觀望不赴及聞陳沅䧟賊中乃决計詣睿親王軍前獻闗請大兵𠞰賊吳偉業有詩云不為君親來故國只因女子下雄關正指此也先是我行六世祖命睿親王統兵定中原授部奉天大將軍印日三桂遣將出闗來迎願率所前驅王得書即整旅入闗直趨燕京擊破流賊捷書驅奏傳檄安撫畿輔郡縣恭迎世祖定鼎京師賢王率入堂堂旅定京迎駕靖中原有周公徳功更巨六解陪京來往兹必經即境撫古感昊靈保泰持盈慎守器赤心語告後人聽七解山海闗詠事曽到燕京弗敢迴天聰三年十月我圍燕太宗文皇帝親統大師伐明京諸貝勒大臣俱請攻城良將太宗曰攻城固可必得倘堅城之下失我一二勁卒即得百城亦不足喜遂止勿攻寧資三桂始闗開賢王一戰天下定明社已墟吳三桂請兵於我睿親王統衆入闗李自成率馬步賊衆二十餘萬自北山横亘至海列陣以待睿親王戒我軍毋越伍躁進是日大風揚沙咫尺莫辨王促進兵令軍士呼噪者再風遂止奮擊賊衆追殺四十里自成敗竄遂趨燕京驅殱流賊所過州縣開城迎降乃傳檄安撫具疏恭迎我世祖至燕京定鼎以開萬年鴻業實睿親王之功也世祖中原大業恢南北劃疆尚可耳君臣失道致亡哉明福王朱由崧為其下所擁戴監國江寧使其君臣能枕戈嘗膽念亂圖存或可如晋宋之南渡偏安苟延嵗月乃任用奸邪晏安鴆毒以致臣民解體亡不旋踵實敗由自取也梅村四字雖能改萬右公評那得灰吳三桂請兵復仇實因其寵姬陳沅為賊所掠是以出闗乞師非由君父義憤也吳偉業梅村詩集云不為君親來故國只因女子下雄闗三桂聞此詩厚遺偉業求其改易偉業因改作只為不因四字餘俱仍舊蓋千秋公論自不能揜也山海闗四依皇祖元韻兩京適中戸奚必復稱邊監作殷之在守看秦已連經臣苦猶惜撫鎮懦空傳熊廷弼為遼東經畧王化貞為廣寜巡撫廷弼主守化貞主戰朝議右化貞者詆廷弼廷弼憤上言經撫不和恃有言官言官交攻恃有樞部樞部佐鬬恃有閣臣臣今無望矣蓋以葉向髙為化貞座師亦有憾於廷弼也明季時事方棘而門戸黨援操戈同室廣寜之棄我兵追逐化貞二百里如入無人之境所謂以設險者安在益信天心助順師克在和我國家同心恊力開創成功而明季師生門户害人家國至於此極昨著讀熊廷弼傳作以明季自壞長城深堪痛恨可以垂鍳萬世矣衆効劻勷力天昭開紀年祗今晏兵甲却久庶人烟廵狩路惟坦陽春時迨權十月為小陽春又淮南子冬為權權者所以權萬物也堯文依韻句禹蹟撫山川四度謁陵返迴瞻増綣然瞻謁北海神廟敬成長律戊戌重經渤海堧命脩神廟致誠䖍祈恬澥浪恒福國永佑桑田黙贊天是日帛香瞻㕉窟千秋爼豆奠垓埏欽惟二祖躬開剏早荷帡幪此濟川登澄海樓望海再疊癸亥舊作韻又自陪都轉斾旋城樓拾級眄溶潫今來古往祗一水漢躓秦顛無二天木几聊因閒詠句徐船何必逺求仙却縁悟得湯湯者納自諸河及小川登澄海樓三疊前韻題壁秦皇心實侈築城騎洪溟由旬語固誕茲存里誠盈俗稱秦時長城入海四十里者語固荒誕茲所存遺蹟不過里餘耳是果何為乎水白山仍青留此供笑談茅見塞匪亨儒臣擕聨句亦足詡登瀛虚受奚揀擇河濁江自清澄海樓聨句乾隆四十八年秋自熱河取道邉外四詣陪都恭謁祖陵禮成迴蹕入山海闗經澄海樓計自癸亥聨句及甲戌戊戌疊韻中間四十年矣命梁國治董誥仍依禁體賡和前吟御製雲上於天解近著衆聴傾至理非創説今春為雲上於天解謂需卦乾下坎上之義伏羲孔子皆因隂陽本然之理變文曰雲雲即水也音義者讀上為上聲程傳遂有雲氣上升於天之語是雲仍在天下矣蓋上應作去聲讀為上下之上天為圓體元氣運之以行其在水下之時非坎上乾下之需乎此至平至易之理不必求諸神奇茲登澄海樓實景現前益恍然於水天之義云歸墟豈辭盈輨運實一氣揲卦凡四營宗都斯㑹極臣梁國治御製闗塞此飛甍乾體有時下坎象無與京周天三百六十五度四分度之一日夜一周而不息其在上者穆穆清清舉頭視之為天其在下者囫囫圇圇右旋而輪轉者獨非天乎知地之在水下則可知天之在水下此需象所以為雲上於天而雲即水也曠然翕闢際廓矣隂陽更雙丸所出入八柱交撑擎鵬路徙緜邈臣董誥御御鼇山戴崚崢方員羅壺嶠金銀為闕城大志經載大意入海中至白銀城次至黄金城云云談天志騶誕築石嗤秦并手披星闥逈眼拓霞牕明鷁舟帆似㸃臣梁國治御製蛟室機誰振文勢露形重武聲雷掀轟向若悟損益㣲禹思平成曉市奇吐蜃秋風怒吞鯨精靈配廣大臣董誥御製顥氣含鮮英黒色晝亦晦紅光夜如晴雪𤓰種傳鶻盛京土産有海東青紺蟠名辨蜻古今註紺蜨似蜻蛉而色黝紺遼東呼為紺蟠螺蚌錦文被珊瑚華采熒是惟神祗宅臣梁國治御製豈徒琛寶呈弗揚四方㑹來朝萬邦貞蹻乘期羨覿航逺歐羅行韓碑百靈紀木賦前良評谷王知弗讓臣董誥御製月覇候哉生具隂火耀燄不塵珠剖瑩捉成五字吟記予四度程撫寧道中老矣慙予懶䇿鞭肩輿徐度小春天山隂積雪山陽化闗外觀豐闗内連塲圃茨京愜民望閭閻温飽慰心懸二陵佳氣行行逺不擬重瞻益黯然夷齊廟墨胎或謂夷齊姓劭應謂夷之君姓然司馬貞史記索隠云孤竹君是殷湯所封夷齊之父名初字子朝伯夷名允字公信叔齊名智字公達應劭云伯夷之國君姓墨胎氏是夷齊乃其民非墨胎氏矣又俗以泥塑像為墨胎戊戌姜氏祠詩曽註明其事千古氏誰能辨寔二人行果是稱賢頑夫廉以懦夫立公信原兼公達傳古廟瓣香仍下拜清風颯颯起遥天自盛京迴鑾至都之作啟程夏仲返冬初里閲三千月四餘諸禮従容幸巳蕆老年康健故猶如觀農大有他秋勝勅政原無片刻竦殷意繩前兼示後此行庶可告非虚命皇子等分繕癸亥甲戌戊戌癸夘四詣盛京恭謁祖陵詩卷即事成什四度陪京謁祖陵敬思前烈益兢兢易非開創誠辛苦難是守成勵繼繩向嘗為創業守成難易説以岑文本對唐太宗撥亂難守成不易之語為非葢守成者遺大投難卑心繼序苟無以光前烈啟後圖斯凜然有不終畆之憂是創業者未竟之難皆守成者分内之難不待失道失衆始為慙負前人但使式郭之版圖或有侵削垂裕之成憲或有廢弛即無以覲耿光而揚大烈是非安不忘危存不忘亡鮮有不盛滿中之者以此思難則所以持難者可知故予獨以難責夫守成者非敢忘創業者之難正以慰創業者之初心耳茲因命皇子等分繕四詣盛京謁示之陵詩巻復申其説以此别迴瞻増有愴再來度入聲已恐無能厯吟皇子命分繕予意期知雲與仍欽定盛京通志卷十七
