body:
  text: 厯朝藝文一前代帝王詔勅制祭告文赦文詩欽定四庫全書欽定盛京通志卷一百九厯朝藝文臣等謹案文章者經世之大業是以觀於人文可以稽察時變考鏡得失遼瀋山川雄秀王氣鍾靈自古帝王拓迹開統文武名臣謀謨獻替頒之詔令見之章奏布在方䇿咸可觀焉至如唐皇遼城之篇金宗上京之作風雅所存遺韻斯在兹篇輯厯代帝王詔勅詩文及臣下奏議雜著凡六卷謹志厯朝藝文第三十八欽定四庫全書欽定盛京通志卷一百九厯朝藝文前代帝王詔勅東漢安帝詔元菟太守姚光等遂成等桀逆無狀當明正刑章以示百姓幸㑹赦令乞罪請降鮮卑濊貊連年有事遷徙小民動以千數而裁送數十百人非向化之心也自今以後不與縣官戰鬬而自以親附送生口者皆與贖直縑人四十匹小口半之唐太宗征髙麗詔朕所過營頓每飭飲食毋豐怪水可涉者勿作橋梁行在非近州縣不得令學生父老迎謁朕昔提戈撥亂無盈月儲猶所向風靡今幸家給人足止恐勞於轉餉故驅牛羊以飼軍且朕必勝有五以大撃小以順討逆以安乗亂以逸敵彼勞以悦當彼怨渠憂不克耶遼太祖天贊三年詔上天降監恵及蒸民聖主明王萬載一遇朕上承天命下統羣生每有征行皆奉天意是以機謀在已取舎如神國令既行人情大附舛訛歸正遐邇無愆可謂大含溟海安納㤗山矣自我國之經營為羣方之父母憲章斯在允嗣何憂升降有期去来在我良籌聖㑹自有契於天人衆國羣王豈可化其凡骨三年之後嵗在丙戍時值初秋必有歸處然未終兩事豈負親誠日月非遥戒嚴是速遼道宗賜左伊勒希巴詔朕以眇沖獲嗣大位夙夜憂懼恐弗克任欲聞直言以匡其失今以數月未見所以副朕委任股肱耳目之意其令内外百官比秩滿各言一事仍轉諭所部無貴賤老幼皆得直言無諱伊勒希巴國語解見人物二原作夷離畢今譯改金太祖諭内外諸軍都統杲詔遼政不綱人神共棄之欲中外一統故命汝帥大軍以行討罪爾其慎重兵事擇用善謀賞罰必行糧餉必繼勿擾降服勿縦俘掠見可而進無淹師期事有從權毋須申禀金太祖撫諭遷民詔郡縣今皆撫定有逃散未降者已釋其罪更宜招諭之前後起遷户民去鄊未乆豈無懐土之心可令所在有司深加存恤毋輒有騷動衣食不足者官賑貸之金太祖諭東京諸路詔頃因兵事未息諸路闗津絶其徃来今天下一家若仍棄之非所以便民也自今顯咸東京等路徃来從其便其間被畧及鬻身者並許自贖為良仍令馳驛布告金太宗敦勸農功詔朕惟國家四境雖逺而兵革未息田野雖廣而畎畆未闢百工畧備而禄秩未均方貢僅修而賓館未贍是皆出乎民力苟不務本業而抑遊手欲上下皆足其可得乎其令所在長吏敦勸農功金世宗封長白山敕自兩儀剖判山嶽神秀各種其分野國將興者天實作之對越神休必以祀事故肇基王迹有若岐陽望秩山川于稽虞典厥惟長白載我金徳仰止其其髙實惟我舊邦之鎮混同流光源所從出秩秩幽幽有相之道列聖蕃衍熾昌迄于太祖神武徴應無敵于天下爰作神主肆予冲人紹休聖緒四海之内名山大川靡不咸秩矧王業所因瞻彼旱麓可儉其禮服章爵號非位于公侯之上不足以稱焉今遣某官某持節備物冊命兹山之神為興國靈應王仍勅有司嵗時奉祀於戯廟食之享亘萬億年維金之禎與山無極豈不偉與金世宗封混同江敕昔我太祖武元皇帝受天明命掃遼季荒茀成師以出至於大江浩浩洪流不舟而濟雖穆滿渡江而黿梁光武濟河而水氷自今觀之無足言矣執徐之嵗四月孟夏朕時邁舊邦臨江永嘆仰藝祖之開基嘉江神之効靈至止上都議所以尊崇之典盖古者五嶽祀三公四瀆視諸侯至有唐以来遂享帝王之尊稱非直後世靡文而崇徳報功理亦有當然者矧兹江源出於長白經營帝鄊實相興運非錫以上公之號則無以昭答神休今遣某官某持節備物冊命神為興國應聖公申命有司嵗時奉祀於戲嚴廟貌正封爵禮亦至矣惟神其衍靈長之徳用輔我國家彌億年神亦享廟食于無窮豈不休哉元成宗加封五鎮詔三代以降九州皆有鎮山所以阜民生安地徳也五嶽四瀆先朝已嘗加封惟五鎮之祀未舉殆非敬恭明神之義其加東鎮沂山為元徳東安王南鎮㑹稽山為昭徳順應王西鎮呉山為成徳永靖王北鎮醫巫閭山為貞徳廣寜王中鎮霍山為宗徳靈應王仍敕有司嵗時與嶽瀆同祀著為定式明太祖正神名號詔自有元失馭土宇分裂聲教不同朕奮起布衣以安民為念訓將練兵平安華夏天統以正永惟為治之道必本於禮考諸祀典知五嶽五鎮四海四瀆之封起自唐世崇名美號厯代有加在朕思之則有不然夫嶽鎮海瀆皆髙山廣水自天地開闢以至於今英靈之氣萃而為神必受命于上帝幽㣲莫測豈國家封號之所可加黷禮背經莫此為甚至如忠臣烈士雖可以加封號亦惟當時為宜夫禮所以明神人正名分不可以僭自今依古定制凡嶽鎮海瀆並去其前代所封名號止以山水本名稱其神郡縣城隍神號一體改正厯代忠臣烈士亦依當時初封以為實號後世溢美之稱皆與革去至孔子善明先王之要道為天下師以濟後世非有功於一方一時者可比所有封爵宜仍其舊庶㡬神人之際名正言順于理為當因稱朕以禮事神之意所定各神名號一五嶽稱東嶽㤗山之神南嶽衡山之神中嶽嵩山之神西嶽華山之神北嶽恒山之神一五鎮稱東鎮沂山之神南鎮㑹稽山之神中鎮霍山之神西鎮吳山之神北鎮醫巫閭山之神一四海稱東海之神南海之神西海之神北海之神一四瀆稱東瀆大淮之神南瀆大江之神西瀆大河之神北瀆大濟之神一各處府州縣城隍之神府城隍之神某州城隍之神某縣城隍之神一厯代忠臣烈士並依當時初封爵名稱之一大小神祠無功于民不應祀典者即係滛祠有司勿得致祭嗚呼明則有禮樂幽則有鬼神其理既同其名當正故兹詔示咸使聞知明成祖建北鎮廟敕北鎮醫巫閭山之神自昔靈應彰顯而為國祐民厥績光著獨其廟宇至今弗克修治朕心惓切夙夜弗忘敕至爾等擇日興工建立祠宇飭嚴祀事以稱朕崇仰之意制唐文宗授劉悟幽州節度使制門下朕聞將星明則英豪用靈旗指則妖集作氛祲銷勁草可以受疾風盤根然後見利器苟非處劇何以用長況幽并少年燕趙竒士居常以紫騮自騁失意則白刃相批將領斯難是先才傑昭義軍節度副大使知節度事澤潞磁邢洺等州觀察制置使金紫光禄大夫檢校尚書左僕射兼潞州大都督府長史御火大夫上柱國彭城郡王食邑三百户劉悟天與忠誠人推敬讓藴孟賁之勇不以力聞避亷頗之强使之心伏是以居危邦而智免臨大節而功髙嘗見委於先朝屢作藩於右地朕以遼陽巨鎮自我底寧始欲撫之以仁然後示之以禮而守臣嬰疾幕吏擅權撓政行私虧恩剥下過為捶楚妄作威稜不均饗士之羊但養乘軒之鶴致兹擾變職此之由不有將材孰懲兒戯敷求朕志深謂汝諧是用拔竒式冀宣力升以亞相寵之上公俾光十乗之行以壯三軍之氣可檢校司空兼幽州大都督長史御史大夫充幽州契丹兩番經畧盧龍等使散官勲封如故唐宣宗授張允伸幽州節度使制門下統制方隅昭宣威略苟非績効之茂孰當委寄之權故開幕任青登壇拜信建置斯重古今為常幽州節度留後檢校左散騎常侍張允伸性禀誠明才推倜儻端已每存于忠孝嗜學早習乎天人偘然器能冠于戎籍自維城遥領留務在躬惟専報國之心以洽奉公之道節度既煥儉恪彌勤況遼陽甲兵之雄幽都控馭之逺假機謀以董雜俗資刑賞以靖朔隣由是錫鈇鉞之正名授喉舌之顯秩升以亞相示之殊榮於戯施令在嚴失之者則虐為仁由恵過之者則非所宜政不建法苛不隳制講武備以禦冦舉化條以育人服吾寵光佇爾休問可檢校工部尚書幽州節度使祭告文明英宗禱雨告北鎮廟文予奉天育民愧凉于徳致兹久旱災及羣生夙夜省躬中心惓切神司方鎮憂憫諒同雨農于晴宜在其手特兹致禱尚冀感通𢎞布甘霖用臻豐稔匪予之恵時乃神庥明憲宗告北鎮廟文國家欽奉神明聿嚴祀事所期黙運化機庇祐民庶乃近嵗以来或天時不順或地道欠寧或雷電失常雨晹爽侯或妖孽漸作疫癘交行逺近人民頻遭饑饉流離困苦痛何可言惕然於中罔知攸措惟神奠鎮一方民所恃頼睹兹災沴能不疚心是用特具香幣遺官祭告尚冀體上帝好生之徳鑒予憂元元之意斡旋造化𢎞闡威靈悍患禦災變禍為福庶㡬民生獲遂享報無窮惟神鑒之明孝宗禱雨告北鎮廟文伏自去年無雪今春無雨田苖未能播種民庶實相憂懼予甚兢惕用是側身修省䖍致禱祈惟神矜憫小民斡旋大造早霈甘霖以滋禾稼以濟民艱庶年有豐稔之祥則神亦享無窮之報明武宗平寧藩告鎮北廟文去嵗以来寧孽作逆命官致討逆黨就擒内變甫清中外底定匪承洪祐曷克臻兹因循至今未申告謝屬者四方多事水旱相仍餓莩載途人民困苦盜賊嘯聚勦捕未平修省咎由實深兢惕伏望神慈昭格幽贊化機災沴潛消禎祥叶應永庇生民明世宗即位告北鎮廟文惟神功參造化永鎮北土奠安民物兹予嗣承大統謹用告祭神其歆鑒佑我國家赦文魏文帝諭赦遼東告遼東元菟將校吏民逆賊孫權遭遇亂階因其先人刼略州郡遂成羣凶自擅江表含垢藏疾冀其可化故割地王權使南面稱孤位以上將禮以九命權親叉手北向稽顙假人臣之寵受人臣之榮未有如權者也狼子野心告令難移卒歸反覆背恩叛主滔天逆神乃敢僭號恃江湖之險阻王誅未加比年以来復逺遣船越渡大海多持貨物誑誘邊民邊民無知與之交闗長吏以下莫肯禁止至使周賀浮舟百艘沉滯津岸貿遷有無既不疑拒齎以名馬又使宿舒隨賀通好十室之邑猶有忠信陷君于惡春秋所書也今遼東元菟奉事國朝紆青拖紫以千百為數載纚垂纓咸佩印綬曽無匡正納善之言龜玉毀于匵虎兕出於匣是誰之過歟國朝為子大夫羞之昔狐突有言父教子貳何以事君䇿名委質貳乃辟也今乃阿順邪謀脇從姦惑豈獨父兄之教不詳子弟之舉習非而已哉若苖穢害田隨風烈火芝艾俱焚安能白别乎且又此事固然易見不及鑒古成敗書傳所傳也江南海北有萬里之限遼東君臣無怵惕之患利則義所不利貴則義所不貴此為厭安樂之居求危亡之禍賤忠貞之節重背叛之名蠻貊之長猶知愛禮以此事人亦難為顔且又宿舒無罪擠使入呉奉不義之使始與家訣涕泣而行及至賀死之日覆衆成山舒雖脱死魂魄離身何所逼迫乃至於此今忠臣烈將咸忿遼東反覆擕貳皆欲乗桴浮海期于肆意朕為天下父母加念天下新定既不欲勞動干戈逺涉大川費役如彼又悼邊陲遺餘黎民迷誤如此故遣郎中衞慎邵琩等且先奉詔示意若股肱忠良能効節立信以輔時君反邪就正以建大功福莫大焉儻恐自嫌已為惡逆所見染汙不敢倡言永懐伊感其諸與賊使交通皆赦除之與之更始詩魏武帝古樂府碣石篇東臨碣石以觀滄海水何澹澹山島竦峙木樹藂生百草豐茂秋風蕭瑟波濤涌起日月之行若出其中星漢燦爛若出其裏幸甚至哉歌以咏志梁元帝燕歌行燕趙佳人本自多遼東少婦學春歌黄龍戍北花如錦元菟城邊月似蛾如何此時别夫婿金覊翠毦徃交河聞言入漢去燕營怨妾愁心百恨生漫漫悠悠天未曉遥遥夜夜聴寒更自從異縣同心别偏恨同時成異節横波滿眼萬行啼翠眉乍歛千重結並海連天合不開那堪春日上春臺乍見逺舟如落葉遥看浮艇似行杯汀沙夜鶴嘯覊雌妾心無趣坐傷離翻嗟漢使音塵斷空傷賤妾燕南垂隋煬帝紀遼詩遼東海北翦長鯨風雲萬里清方當銷鋒散牛馬旋師宴鎬京前歌後舞振軍威飲至解戎衣判不徒行萬里去空道五原歸秉旄杖節定遼東俘馘變彛風清歌凱㨗九都水歸宴洛陽宫䇿功行賞不淹留全軍藉智謀詎似南宫複道上先封雍齒侯唐太宗遼城望月詩元菟月初明澄輝照遼碣映雲光暫隠隔樹光如綴魄滿桂枝圓輪虧鏡影缺臨城却影散帶暈重圍結駐蹕俯九都佇覩妖氛滅金世宗幸上京歌辭猗歟我祖聖矣武元誕膺明命功光于天拯溺救焚深根固蒂克開我後傳福萬世無何海陵滛昏多罪反易天道荼毒海内自昔肇基至於繼體積累之業淪胥且墜望戴所歸不謀同意宗廟至重人心難拒勉副樂推肆予嗣緒二十四年兢業萬㡬億兆庶姓懐保安綏國家閒暇廓然無事乃眷上都興帝之第屬兹来遊惻然予思風物減耗殆非昔時於鄊於里皆非初始雖非初始朕自樂此雖非昔時朕無異視瞻戀慨想祖宗舊宇屬屬音容宛然如睹童嬉孺慕厯厯其處壯嵗經行恍然如故舊嵗從遊依稀如昨歡誠契濶旦暮之若吁嗟濶别云胡不樂欽定盛京通志卷一百九
