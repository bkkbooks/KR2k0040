路北近邊界為蒲與路今寧古塔在吉林烏拉之東北當為和囉噶路北至混同江䝉古界則蒲與路也元置海蘭府碩達勒達路明初設都司領衛一百八十四所二十其東北衛所多在寧古塔及所屬三姓琿春等處後皆屬本朝黑龍江將軍所轄齊齊哈爾唐虞息慎氏境周肅慎國地漢挹婁國北境晉同南北朝勿吉國黑水部隋黑水靺鞨唐初曰黑水靺鞨跨江分南北部開元中以其地為黑水州又置黑水府以部長為都督後屬渤海遼黑水部金肇州北境元開元路地明有黑龍江等地方五十八羈屬都司墨爾根唐虞息慎氏北境周肅慎國地漢挹婁國北境晉同南北朝勿吉國黑水部北境隋黑水靺鞨唐黑水部長所屬後屬渤海遼黑水部北境金蒲與路地元開元路地明屬黑龍江等地方羈屬都司黑龍江唐虞息慎氏地周肅慎國地漢挹婁國北境晉同南北朝勿吉國黑水部隋黑水靺鞨唐黑水部長所屬後屬渤海遼黑水部地金蒲與路地元開元路地明屬黑龍江等地方羈屬都司古肅慎氏地漢晉為挹婁國地後魏時始有黑水部為勿吉國七部之一隋曰黑水靺鞨唐初黑水跨江分南北部北為思慕靺鞨郡利靺鞨窟說靺鞨近西北者為室韋部間元中以其地為黑水州尋又置黑水府以部長為都督後渤海盛皆役屬之遼平渤海黑水復有其地其在南者繫籍于遼在北者皆不屬籍金時為蒲與路及肇州之北境金史地理志金之壤地封疆東極吉里穆烏哩改諸野人之境北自蒲與路之北三千餘里火魯火疃克實地為邊元𨽻開元路明初設都司統領之國初有索倫達呼爾二部居額爾古訥䝉古語舉起也河及精竒哩江之地並歸服於太宗文皇帝繼因羅剎即俄儸斯國人築城雅克薩地侵擾索倫達呼爾崇德四年移駐嫩江後羅剎復來侵擾康熙二十二年設將軍副都統于黑龍江築城鎮守二十五年發兵進勦羅剎克其城二十八年遣大臣於吉爾巴齊䝉古語執長纛人也河旁立石為界於是索倫達呼爾仍居舊地咸安業焉二十九年將軍移駐墨爾根三十八年由墨爾根移駐齊齊哈爾凡墨爾根黑龍江呼倫布雨爾呼蘭布特哈博爾多皆所轄也國語墨爾根精能也呼蘭解見京城卷布特哈漁獵也博爾多令餒肥牲畜也臣等謹案興京吉林黑龍江為古肅慎挹婁勿吉靺鞨渤海之地盛京之承德鐵嶺亦肅慎靺鞨邊境開原又肅慎及夫餘之界遼陽錦州寧逺廣寧義州等則古冀幽徼外之域秦漢時遼東遼西二郡所轄蓋平復州寧海岫巖鳯凰城則周之朝鮮漢之元菟樂浪隋之髙句麗而岫巖鳯凰城又兼接濊地此古來沿革之大凡也百濟新羅始皆三韓屬國在帶方樂浪之壞劉宋時百濟跨有遼西唐初新羅兼有吉林而旋俱入於渤海東北際黑水東南極朝鮮五京十五府六十二州所包廣矣遼興自上京為今呼倫布雨爾地而所分𨽻上京東京之郡縣皆以征伐所得人户建城置邑大抵多即其人舊居州邑之人名之故遼史所載州縣仍沿渤海舊名而實非其故地其東北之境原屬女真部金太祖起兵盡有遼地省併州郡元明建置各不相沿載於列史者可考也晉書肅慎在不咸山北廣袤數千里不咸即長白山松漠紀聞稱肅慎古城在渤海上京三十里渤海都臨呼爾罕國語大綱也為今瑚爾哈河實寧古塔境遼時遼陽府有肅慎縣黃龍府黃龍縣亦渤海肅慎縣地則為承德鐵嶺即古肅慎之明證也挹婁勿吉靺鞨疆域與肅慎相同渤海以挹婁故地為定理府領定瀋二州遼金元史皆言瀋州故挹婁地又遼金皆有挹婁縣遺址在鐵嶺縣南六十里明為懿路所懿路河亦在焉實挹婁之邊境而字音之訛也惟關原一邑始屬肅慎後屬夫餘自開原以北千餘里皆夫餘之境南北朝為慕容氏所侵走保沃沮又因百濟侵逼西徙近燕其國王城在遼為通州金為隆州即渤海之扶餘府也恭讀御製三韓訂謬云三韓建國本末諸史率多抵牾以方位準之蓋在今奉天東北吉林一帶壤接朝鮮證三韓為三汗並闢後漢書以石押頭之謬御製夫餘國傳訂訛斥范蔚宗陳夀之徒不識方言好竒逞妄實為萬世準繩謹於天章門內恭録全篇俾考古者永奉為典則因歷考史傳擇其可信者謹識如右欽定盛京通志卷二十三
