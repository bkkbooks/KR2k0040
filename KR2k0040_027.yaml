body:
  text: 建制沿革歷代建置沿革總表本朝建置奉天府州縣表錦州府州縣表吉林表黑龍江表歷代建置沿革考正訛附録欽定四庫全書欽定盛京通志卷二十三建置沿革臣等謹按書傳舜分青之東北為營州冀之東北為幽州以地志考之營州之域是為遼東而幽州實兼遼西之地遼東西之置郡蓋自秦始漢武帝時分設樂浪元莵臨屯真番四郡厥後屢有因革然郡縣之制未改也唐改為遼城諸都督府而秦漢之建置一變矣遼金元之世或建為京或分為路損益不同然所屬州縣之制亦未改也明改州縣為衛所𨽻於都司而遼金元之建置又一變矣我太祖太宗肇基遼瀋世祖統一方輿豐水詒謀留都作極規模宏逺超越前代爰稽唐虞以來建置沿革為表五考一謹志建置沿革第九厯代建置沿革考盛京禹貢冀青二州之域舜分冀東北為幽州即今遼河以西之地青東北為營州即今遼河以東之地商周為肅慎氏地戰國則遼河左右屬燕泰滅燕遣䝉恬略定東陲以其地置遼東西郡漢初因之武帝拓朝鮮地置樂浪元菟真畨臨屯四郡後改真畨臨屯為遼西遼東郡東漢復置屬國都尉漢末公孫度取之分遼東為遼西中遼郡東方諸國多附焉魏克公孫氏置東夷校尉居襄平分遼東昌黎元菟帶方樂浪五郡置平州後還合為幽州晉世髙句麗略有遼東百濟據有遼西後平二郡改為遼東國昌黎元菟帶方樂浪四郡𨽻平州如故尋為慕容廆所據歸後仍為遼東郡隋初髙句麗據之唐太宗伐髙麗置蓋遼二州髙宗平髙麗置都督府九州四十二縣百又置安東都護以統之封大氏為渤海國至五代其地入遼遼太祖修遼東故城以居號東平郡尋升南京又改東京金初因之後置遼陽府遼金郡邑沿革亦多元初設遼陽等處行中書省統路有七統軍民萬户府五而混同江南北之民分治焉明洪武四年置定遼東衛八年改遼東都指揮使司領衛十年革所屬州縣置衛二十五永樂七年復置安樂自在二州𨽻山東道此外雖有一百八十四衛二十所之設然非封域之內也大抵秦漢迄唐遼西之屬邑多遼金以後遼東之闢地廣元則南兼髙麗北通大漠明始以山海之內𨽻之燕京而開原以東遂分疆圉永樂時又界三岔河以北數百里與諾延駐牧限隔東西固不獨郡縣廢而幅􅊷亦殊矣我太祖肇基興京築新城於遼陽天命十年以瀋陽為盛京太宗底定全遼而宫闕之制備世祖統御六合定鼎京師盛京為留都順治元年悉裁諸衛設內大臣副都統及每旗駐防三年改駐防內大臣為昻邦章京給鎮守總管印十年以遼陽為府置遼陽海城二縣又於寧古塔設昻邦章京副都統鎮守之十四年省遼陽府以瀋陽為奉天府置府尹康熙元年改奉天昻邦章京為鎮守遼東等處將軍寧古塔昻邦章京為鎮守寧古塔等處將軍三年於故廣寧衛地設府領廣寧縣錦縣寧逺州四年改鎮守遼東等處將軍為鎮守奉天等處將軍改廣寧府為錦州府移治錦縣是年奉天府又添設承德蓋平開原鐵嶺四縣改遼陽縣為州十年於吉林烏拉設副都統十五年移寧古塔將軍駐吉林烏拉留副都統鎮守寧古塔二十二年於黑龍江設將軍副都統二十三年於黑龍江岸築愛琿城二十九年移黑龍江將軍駐墨爾根三十年於白都訥設副都統三十二年移黑龍江副都統亦駐墨爾根三十八年黑龍江將軍副都統皆自墨爾根移駐齊齊哈爾四十九年於墨爾根設副都統雍正三年於阿勒楚喀設副都統四年於吉林烏拉設永吉州寧古塔設泰寧縣白都訥設長寧縣俱𨽻奉天府五年設熊嶽錦州二副都統七年罷泰寧縣又于三姓設副都統八年設黑龍江副都統十二年於故復州衛地設復州於故金州衛地設寧海縣於錦州府增設義州乾隆元年罷長寧縣十二年罷永吉州二十七年於拉林設副都統三十七年於岫巖城設通判兼轄鳯凰城今按全省輿地西抵山海關東抵海濱南至圖們江接朝鮮界北至外興安嶺俄儸斯界皆屬奉天吉林黑龍江將軍所統而副都統復分鎮將軍所轄之地其餘各城各邊門又有城守尉防守尉等員為之分駐至編户之民則𨽻於州縣而以府統之其錦州一府仍屬於奉天府尹興京謹案縣興京為代建置王迹肇基之地故不列諸郡表其歷沿革悉於考內詳志焉唐虞息慎氏地周肅慎氏地按周肅慎氏即虞之息慎秦同漢挹婁地按文獻通考挹婁即古之肅慎東漢同晉同南北朝勿吉地隋髙麗地唐初置燕州後屬渤海改𨽻定理府遼定理府地屬瀋州金瀋州地元瀋陽路之北明建州衛地本朝太祖發祥之地尊為興京奉天府古遼東西地也東南為朝鮮界東北挹婁北夫餘南近海為沃沮漢所置遼東樂浪元菟三郡則今府治東南及朝鮮界內地唐渤海大氏置五京十五府六十二州其定瀋二州屬定理府即今府治遼置瀋州昭德軍統樂郊靈源二縣而𨽻于東京金改顯德軍統樂郊章義遼濱挹婁雙城五縣仍𨽻東京元改瀋陽路屬遼陽等處行中書省遂省諸縣明初置瀋陽中衛本朝天命十年升瀋陽為盛京順治十年以遼東為遼陽府設遼陽海城二縣十四年改遼陽為縣設奉天府以府尹治之康熙四年增置承德蓋平開原鐵嶺四縣改遼陽為州雍正五年於寧古塔境內增置泰寧縣於白都訥置長寧縣七年廢泰寧縣雍正五年又於復州衛置通判十二年於故復州衛地設復州於故金州衛地設寧海縣乾隆元年裁長寧縣十二年裁永吉州三十七年設岫巖城通判兼轄鳯凰城計州二縣六㕔一統於奉天府尹奉天府所屬州縣承德縣附唐虞禹貢青州之域夏同商息慎氏地周肅慎氏地秦肅慎氏地漢挹婁地晉挹婁地唐挹婁地睿宗時渤海大氏置瀋州遼瀋州昭德軍初為興遼軍後更名屬東京道更置三河縣尋改樂郊縣為瀋州治初置漁陽縣後改靈源縣初置鐵利州後省其某州懷德軍遼州始平軍崇州隆安軍治分奉集遼濱崇信各縣金瀋州顯德軍屬東京路治樂郊縣廢章義縣遼濱縣屬瀋州奉集縣廢屬貴德州元初為瀋州世祖于瀋州地置安撫髙麗軍民總管成宗時改瀋陽路明太祖時廢瀋陽路以其地置瀋陽中衛鎖蒲河撫順二千户所𨽻遼東都指揮使司本朝建都尊為盛京順治十四年設奉天府康熙四年設承德縣為畿內首邑遼陽州唐禹貢青州之域虞營州地夏青州地商青州地周青州地秦遼東郡漢遼東郡襄平縣屬遼東遼陽縣前漢屬遼東後漢屬元菟居就縣前漢屬遼東後漢省三國魏遼東郡治魏置東夷校尉治襄平縣省遼陽縣晉改遼東郡為國治襄千縣復置居就縣屬遼東國南北朝後魏襄平縣為遼東郡治後入髙句麗國隋髙句麗地唐安東都護府初置於平壤上元三年徙遼東故城儀鳯二年徙新城開元初又徙廢遼東京遼陽府初建東平郡天顯三年升為南京十三年改名東京置府治遼陽縣鶴野縣衍州安廣軍興遼縣屬焉巖州白巖軍屬瀋州湯州屬東京道金東京路遼陽府遼陽鶴野宜豐石城四縣屬焉元遼陽路至元六年置東京總管府二十五年改為遼陽等處行中書省治轉七路一府十二州十縣以鶴野縣省入遼陽為路治領遼陽一縣蓋懿二州明定遼中左右前後衛洪武中置並為遼東郡指揮使司治東寧衛自在州皆治焉又有中左二千户所左右前後四千户所本朝順治十年設遼陽府轄遼陽海城二縣十四年省遼陽府以瀋陽為奉天府置府尹康熙四年升遼陽縣為遼陽府屬奉天府海城縣周屬朝鮮秦屬朝鮮漢元菟郡地後改屬樂浪都尉東漢置都尉以封沃沮三國魏屬平州晉屬髙句麗隋屬髙句麗唐南海府李績平髙麗置蓋州入渤海為南京南海府統沃晴椒三州六縣遼海州南海軍統臨溟一縣耀嬪二州𨽻東京聖宗時廢南海府改置海州並置臨溟縣為海州治金澄州南海軍大德三年更名𨽻東京統臨溟析木二縣州治臨溟元省州縣屬遼陽路明海州衛太祖以故海州臨溟縣地置海州衛𨽻遼東郡指揮使司本朝順治十年改海城縣𨽻遼陽府十四年改𨽻奉天府蓋平縣周屬朝鮮地秦燕人衛滿所據漢西蓋馬縣屬元菟郡又安市縣屬遼東郡三國魏屬平州晉初因之後屬髙句麗隋屬髙麗唐髙麗國蓋牟城地太宗征髙麗取其地置蓋州後入渤海國仍置蓋州又改為辰州遼辰州奉國軍初白長平軍尋改名治建安縣與鐵州建武軍盧州歸州俱屬東京道金蓋州奉國軍明昌六年更名建安湯池熊嶽秀巖四縣屬焉元蓋州路至元六年並為東京支郡並湯池二縣入建安縣治尋又省建安縣入蓋州並入遼陽路明蓋州衛洪武元年設屬遼東都指揮使司本朝康熙四年改設蓋平縣𨽻奉天府開原縣唐虞息慎氏地商周肅慎氏地秦同漢屬大餘國地晉同隋同唐初置黑水州都督府後渤海大氏取扶餘地改為扶餘府又為上京龍泉府遼黃龍府境𨽻東京道同州鎮安軍屬東京道祺州佑聖軍屬遼州肅州信陵軍屬東京道金㑹寧府境屬上京後廢同州為銅山縣廢肅州為清安縣廢祺州為慶雲縣俱屬咸平府元開元路初設開元南京二萬户府四年改遼東路總管府至元二十三年改開元路銅山慶雲清安等縣皆省明三萬衛初名開元城洪武二十二年改曰開原尋置衛二十六年又徙遼海衛於此永樂七年又置安樂自在二州並屬遼東郡指揮使司三萬衛即開原鎮城也後徒自在州于都司城內本朝康熙三年設開原縣𨽻奉天府鐵嶺縣唐虞息慎氏地周肅慎氏地秦同漢挹婁國地隋越喜國地唐富州渤海大氏取越喜地改富州屬懷逺府遼銀州富國軍太祖置治延津縣兼領新興永平二縣屬東京道又興州中興軍雙州保安軍貴德州寧逺軍貴德縣俱屬東京道金新興縣皇統三年廢州省延津二縣入新興徙新興治屬咸平府又挹婁縣雙城縣俱屬瀋州章宗時廢雙城縣元省仍𨽻咸平府明鐵嶺衛古有鐵嶺城在衛治東南五百里地接髙麗界洪武二十一年置衛於北二十六年徙置嚚州地仍名鐵嶺衛領中左右三千户所屬遼東都指揮使司按遼志無嚚州當即銀州本朝康熙三年改設鐵嶺縣𨽻奉天府復州周朝鮮地秦同漢屬元郡魏屬平州晉髙句麗地隋同遼復州懷德軍初為遷民縣興宗置復州懷德軍治永寧縣兼領德勝縣屬東京道金復州懷德軍領永康化成二縣明昌四年降軍為刺史元遼陽路初屬蓋州治後入遼陽路明復州衛洪武十四年置建通明迎恩鎮海三門𨽻遼東都指揮使司本朝初裁衛改𨽻蓋平縣雍正五年改設復州通判轄復金二州之境十三年升為州𨽻奉天府寧海縣周朝鮮地秦同漢屬元菟郡晉初因之後屬髙句麗隋屬髙麗唐金州平髙麗初置金州統之後入渤海屬杉盧郡遼蘇州安復軍興宗置領來蘇懷化二縣金金州皇統三年降為縣屬復州貞祐四年復升為金州元初屬蓋州路後并入遼陽明金州衛洪武四年置領中左千户所屬遼東郡指揮使司本朝初𨽻海城縣康熙三年改𨽻蓋平縣二十年增設城守尉雍正五年設金州巡檢屬復州通判十二年改置寧海縣𨽻奉天府岫巖城周朝鮮界本濊地秦同漢屬元菟郡晉𨽻平州隋屬髙麗蓋州地唐初屬安東都護後屬渤海為東京龍原府地遼歸州歸勝縣地屬東京道金明昌初置秀巖縣屬東京元屬遼陽路明鳯凰城界內地本朝初𨽻蓋平縣康熙二十六年設城守尉駐守乾隆三十七年設通判管理四十一年以岫巖通判兼轄鳯凰城各添設巡檢一員鳳凰城周朝鮮界本濊地秦同漢屬元菟郡晉𨽻平州隋屬髙麗慶州地唐初屬安東都護後屬渤海為東京龍原府遼開州鎮國軍初廢開泰三年改置開封府開逺軍尋改治開逺縣統鹽穆賀三州屬東京道金石城縣地屬東京元屬東寧路明鳳凰城