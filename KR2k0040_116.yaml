body:
  text: 厯朝藝文四書簡牘序欽定四庫全書欽定盛京通志卷一百十二厯朝藝文書貽邴原書後漢孔融隨會在秦賈季在翟咨仰靡所歎息增懷頃知來至近在三山詩不云乎來歸自鎬我行永久今遣五官掾奉問榜人舟楫之勞禍福動靜告慰亂階未己阻兵之雄若棋奕爭梟與陶侃書晉慕容廆明公使君轂下振德耀威撫寧方夏勞心文武士馬無恙欽髙仰止注情彌久王塗險逺隔以燕越每瞻江湄延首遐外天降艱難禍害屢臻舊都不守奄為邊庭使皇輿遷幸假勢吳楚大晉啓基祚流萬世天命未改元象著明是以義烈之士深懷憤踴猥以功薄受國殊寵上不能掃除羣逆下不能身赴國難仍縱賊臣屢逼京輦王敦倡禍於前蘇峻肆毒於後凶暴過於董卓惡逆甚於傕泛普天率土誰不同忿深怪文武之士過荷朝榮不能滅中原之冦刷天下之恥君侯植根江陽發曜荆衡杖葉公之權有包胥之志而令白公伍員得極其暴竊為邱明耻之區區楚國子重之徒猶恥君弱臣強臣不及先大夫厲已戒衆以服陳鄭越之種蠡尚能弼佐勾踐取威黃池况今吳士英賢比肩而不聞輔翼聖主陵江北伐以義聲之直討逆暴之徒檄命舊都之士招懷存本之人豈不因風振落頓坂走輪哉且孫氏之初以長沙之衆推破董卓志匡漢室雖中罹寇害雅志不遂原其誠心乃忽身命及權據揚越外仗周張內慿顧陸拒魏赤壁克取襄陽自兹以降世主相襲咸能侵逼徐豫令魏朝旰食不知今之江表為賢俊匿志藏其勇略耶將呂蒙凌統髙蹤曠世哉况今凶敵逆暴中州人士逼迫世促顛沛之危甚於纍卵假號之強衆心所去敵有釁矣易可震蕩王郎袁術雖自詐偽皆基淺根微禍不旋踵此皆君侯之所見聞者矣王司徒清虛寡欲善於全已昔曹參亦崇此道著畫一之稱也庾公居元舅之尊處申伯之任超然髙蹈明智之權廆於寇難之際受大晉纍世之恩自恨絶域無益聖朝徒係心萬里望風懷憤今海內之望足為楚漢輕重者惟在君侯若戮力盡心悉五州之衆據兖豫之郊使向義之士倒戈釋甲則外患必除國恥必雪廆在一方敢不竭命孤軍輕進不足使勒畏首畏尾則懷舊之士內應無由自發故也故逺陳寫言不盡宣與庾冰書晉慕容皓君以椒房之親舅氏之昵總據樞機出內王命兼擁列將州司之位昆弟網羅顯布畿甸自秦漢以來隆赫之極豈有若此者乎以吾觀之若功就事舉必享申伯之名如或不立不免梁竇之迹矣每觀史傳未嘗不寵恣母族使執權亂朝先有殊世之榮尋有負乘之纍所謂愛之適足以為害吾嘗忿厯代之主不盡防萌終寵之術何不業以一土之封令藩國相承如周之齊陳如此則永保南面之尊復何黜辱之有乎竇武何進虛已好善賢士歸心雖為閹竪所危天下嗟痛猶有能履以不驕圖國忘身故也方今四海有倒懸之急中夏逋僭逆之寇家有漉血之怨人有復讐之憾寧得安枕逍遙雅談卒嵗耶吾雖寡德過蒙先帝列將之授以數郡之人尚欲并吞強敵是以自頃及今交鋒授刃一時務農三時用武而猶師徒不頓倉有餘粟敵人日畏我境日廣况乃王者之威堂堂之勢豈可同年而語哉上陶侃書晉韓矯自古有國有家鮮不極盛而衰自大晉龍興克平岫會神武之略邁蹤前史惠皇之末后黨搆難禍結京畿釁成公族遂使逆寇乘虛傾覆諸夏舊都淪滅山陵掘毁人神悲悼幽明發憤昔玁狁之強胸奴之盛未有如今日強寇之暴跨躡華裔盜稱尊號者也天祚有晉挺授英傑車騎將軍慕容廆自弱冠蒞國忠於王室明允恭肅志在立勳屬海內分崩皇輿遷幸元皇中興初倡大業肅祖繼統蕩平江外廆雖限以山海隔以強寇翹首引領係心京師常假寤寐欲憂國忘身貢篚相尋連舟載路馬一作戎不稅駕動成義舉今寇亂滔天怙其醜類樹基趙魏誇略燕齊廆雖率義衆誅討大逆然管仲相齊猶曰寵不足以御下况廆輔翼王室有匡霸之功而位卑爵輕九命未加非所以寵異藩翰敦奬殊勳者也今方詔命隔絶王路嶮逺貢使往來動彌年載今燕之舊壤北周沙漠東盡樂浪西暨代土一作山南極冀方悉為外庭非復國家之域將佐等以為宜逺尊周室近凖漢初進封廆為燕王大行將軍事上以總統諸部下以割損賊境使冀州之民望風向化廆得祇承詔命率合諸國奉辭夷逆以成桓文之功茍利社稷専之可也而廆固執謙光守節彌髙每詔所加讓動積年非將佐等所能敦逼今區區所陳不欲茍相崇重而愚情至心實為國計報封抽韓矯等書晉陶侃車騎將軍憂國忘身貢筐載路冦賊來和執使送之西討假國北伐塞外逺綏索頭荒服以獻惟北部未賔屢遣征伐又知東方官號上下齊班進無統攝之權退無等差之降欲進車騎為燕王一二具之夫功成進爵古之成制也車騎雖未能為官摧勒然忠義竭誠今騰箋上聽可否遲速當任天臺也與遼東撫巡諸公書明陳綰夫遼東之荒極矣敝關切近觸目劌心愧不能上鄭俠之圖亦嘗抱鄰父之憂竊為議之今之所謂救荒者非請發內帑乎非悉發官廩乎非勸借富民乎夫請發內帑大工鼎興司農告匱年例外不能多發矣悉發官廩遼之廩庾所積幾何勸借富民自霖雨壞蓋藏外國掠屯堡富者轉為貧矣今之所恃惟關西糴買一節耳然薊永嵗本不登加以沿邊糴買軍餉其資遼東者所謂以升合之水救涸魚也近以薊永米少遼人糴買者多則有商販轉市山東之粟自天津等處下船徑抵豐臺鎮遼人有力者從此轉搬無力者止赴山海㩦數十百文覔升斗於商販之手夫米價已騰貴加以輾轉接買大者驢馱車輦小者背負手提盤桓中途計車腳之費浮於米值亦止可達廣寧以西耳遼陽以東不惟隔三岔河而平陸溝渠車牛莫達其所仰給者惟金復等處及黃山一帶些須之産而關西之米踰河東者絶少夫轉輸不通糴買無從則米價日增雖月散數金無益也説者以為海禁少寬使天津直沽之船不抵豐臺鎮得抵三岔河不惟廣寧以西可濟而遼陽以東豈至踣斃如今日哉夫救荒如救焚溺海禁固不可弛然與活遼東千萬人旦夕之命孰重夫從權以濟一時之急而年豐禁復如故是從權以活千萬人之命而禁復在也夫遼鎮之𨽻山東者本以通海道也成化以前禁例未行文移往來花布鈔錠解送皆取海上捷徑故有無相通緩急相濟自禁例一行公私船隻盡廢究其所以不過杜絶逃軍之路又或以為泛海恐引外冦也夫欲絶逃軍惟嚴盤禁若倭冦自劉江望海堝之捷其不至遼東者且百餘年就慮其至不過逺哨望謹烽火而已即如江南時有倭冦豈能使江海之間不行隻艘乎此所謂失火之家不火食之計也嗚呼使遼境時和年豐道路無梗則可萬一山海寧前咽喉一線之地少有隔阻則遼境不孤懸絶域乎即今盜窺衢路轉輸萬難則咽喉之不塞者直一間耳其可不為寒心哉且登萊二府去金復等州不浹日而近考之會典正統年間登州衛猶存海船三十餘隻海道既廢船亦無存夫登萊阻山依海商賈不行其地有羡粟而無厚售設若少寬其禁使金復之人得以泛海貿易則一葦航之而遼陽以東皆可獲濟其與廣寧以西輦輸關內之粟者勞逸奚啻十倍也誠欲設為防範則嘉靖二十一年巡按嘗奏添邊備僉事駐金州矣今建議復添亦無不可不然則専責守備等官時為督察亦不至於滋姦而長弊就使有之較今日脫巾枵腹恐恐然慮蕭牆之變利害不有間乎夫斗米六七百錢人相食不顧而猶泄泄然守懲噎之過計愚竊以為過矣夫惟仁人君子切痌瘝之念而不惑於拘攣之議當必有以處此者綰曷容贅簡牘簡石齋陳先生明賀欽欽往年京師承教誨之勤恩同父母奉别至今忽忽九載企慕之私無間時刻屢辱惠書教并紀夢説自䇿讀近思録諸詩及門下從遊諸友論學書每一拜領如飢之得食渴之得飲欽感佩恩教莫可云喻苐昏昧之質立志弗堅加以壬辰析居以來創搆室廬課治田事不克専意于學是以雖荷教誨屢屢未能少進愧懼之至推其病源又以不知其要耳何者往時見書册中先聖賢垂教之言及親承先生之誨或涵養或省察或致知力行無所不信無所不悅隨所聞見以用其力特以實非自得不知大要見無一定力且弗専坐是迄今無少改于其故耳今者屢承開示潛玩久之乃知此理充塞天地貫徹古今無處不有無時不然事事物物各有本然之理吾人何必勞攘勿忘勿助循其所謂本然者而已然雖見得大意如此茍非格物致知灼見事事物物本然之妙烏能勉強以循之此知之所以當先也然非敬以涵養此心使其常主於中不馳於外則身且無主雖視不見雖聽不聞至粗至近者且不能酬應之况於究義理精微之極乎此涵養之功又在知之先也以是知今日用功之始惟當先事涵養放心不收終難為學此則決無疑也林絶熙端默有見誠晚學所當遵行欽又欲求僻靜處或山寺中靜坐以收久放之心苐老母年髙無他兄弟備養理無可出今春二月㩦一二生始就本城奉國僧寺杜門調攝旬日一歸省母於是收心讀書然亦弗能纍旬端默但孜孜持敬以收放心之意則弗敢忘耳前時因循負教罪過千萬自今稍識用功寧敢蹈故轍以自取絶于大賢君子耶自是以後積纍久之幸有所疑所得續當請教仰惟先生道明教行樂莫大焉欽之不肖再得親炙函丈不識在何年耳相望萬里不勝馳情謹貢此書不罪僭易幸甚簡都閫王公明賀欽昨日進拜蒙厚欵承喻教家人紡績推之以及城堡居人甚大惠也蓋此方之人素不曉此用是困於無衣若上之人教勸之使一方無一家之不紡績日後人人遂暖衣之願無號寒之苦則大人恩澤之漙極於久逺人之感惠不但有五袴之謡也桑棗之植亦有久逺之利不三數年便見成效又云欲作射圃於府中以教射藝亦大好事凡此俱望及時行之邊方之大幸也恐公務繁多或以此為不急則非吾民之福矣用敢瀆告惟髙明留意焉與鄧都閫書賀欽欽之不才荷蒙誤舉母老身病有孤盛意愧負愧負更望執事充此為國薦才之心廣詢博訪不間幽顯茍得其人隨其才德之巨細或上之朝廷或薦之鎮守或用以自輔或委拔衛所以主軍政此忠藎之大端也或以生之不才有孤盛意而遂沮夫薦賢之心豈可乎哉惟髙明勉圖之序放懷詩自序遼耶律孟簡禽獸有哀樂之音螻蟻有動靜之形在物猶然况於人乎然賢達哀樂不在窮通禍福之間易曰樂天知命故不憂顔淵簞瓢自得此知命而樂者也豫雖流放以道自安又何疑耶湛然居士集序元行秀萬松野老湛然居士年二十有七受顯訣于萬松盡棄宿學冒寒暑無晝夜者三年以至扈從西征六萬餘里厯艱險困行役而志不少沮跨崑崙瞰瀚海而志不加大客問其故曰汪洋法海涵養之力也又嘗慨然曰惟屏山間間可照吾心耳片言隻字皆出于萬化之原而膚淺未臻其奧者方索諸聲偶煆錬之餘正如撿指蒙學對句之牧竪望涯于少陵詩史者矣平水王鄰曰中書湛然有天然之才如寶鑑無塵寒氷絶翳按元裕之中州集載右相文獻公詩又稱趙間間為吾道主盟李屏山為中州豪傑如晉卿學問淵源有自來矣旁通詣極而要以儒者為歸故當經營創制之初馳驅絶域宜若無暇于文而雄篇秀句散落人間為一代詞臣倡始非偶然也贈金德容之任石州序明賀欽𢎞治丁巳仲冬吉月古宜金德容之任石州幕友人户科給事中賀欽時病居於家令其子士咨書贈德容曰當官三事古今所尚德容平生自誓曰居官取賄天罰其嗣又能謙謙自牧不忤于人自逰京師十數年來安於儉約常假貸以自遣若是者可謂有志於清慎勤者矣况德容厯事刑曺國朝憲章擬議熟矣讀書讀律修己治人尚可謂無術者耶兹行也首舉一州與賢太守相可否布善政以蘇窮民必有可觀者焉程子曰一命之士茍存心愛物於人必有所濟况操一州之幾要者乎德容勉乎哉勿若俗吏惟讎怨於齊民而竭智力於鞭撲也州之侍御崔公武選陳公欽之故人也今不知厯何官已投老否德容倘往拜而請焉必有善言也德容勉乎哉巡撫都憲侯公大參前兵部亞卿張公欽之同年友也今不知遷轉否德容為之治屬進謁之際必有善教也德容勉乎哉孔子曰事其大夫之賢者友其士之仁者此之謂也又何患善政之不布窮民之不蘇哉若然則病夫亦與有光矣德容勉乎哉醫閭先生集序明李承勳豫昔從伯氏世卿子大崖山中讀書至古之學者為己大崖慨然嘆而問曰今天下有若人乎豫未能對復嘆曰白沙陳先生公甫醫閭賀先生克恭真其人也吾將焚舉子業從之遊越數載還自白沙稱其緒論以為人心通塞之幾生生化化之妙有非見聞所及者必深思而自得之未易言也白沙之學以自得為宗喫緊工夫全在涵養端居靜坐不為私妄間隔至心虛氣靈天理流通大本立矣喜怒未發而非空萬感交集而不動舍是則滯礙於形器支離於占畢力愈勞而心愈亂不足以語道矣故其詩云吾能握其幾安用窺塵編先生之學亦出陳氏在諌垣時聞為已端默之旨篤信不疑謝病歸搆小齋讀書其中隨事體驗未知其要潛心玩味杜門不出者十餘年乃見實理充塞無間化機顯行莫非道體事事物物各具本然實理吾人之學不必求之髙逺在主敬以收放心勿忘勿助循其所謂本然者而已故為臣必盡其忠為子必盡其孝推之家庭里閭間冠婚葬祭服食起居必求本然之理而力行之久久純熟心迹相應不期信於人而人自信有邊將撲殺獻績者見先生即吐實曰不忍欺也城中亂卒焚劫不入其坊人扶先生往諭之衆見即羅拜而泣曰吾父也遂解散待罪城賴以全非盛德能至是乎嘗並而論之二先生之學均於為己白沙資質髙明而虛靜涵養之益為多故其見髙妙至其德立道尊體任自然從容和易不事矯飾不善學者見其暮年氣象之可親而不知其早年自治之甚力憚深思而欲徑造自然怠克治而欲妄效和易故多流于放蕩先生性本篤實其學主於躬行循循然自下學始法地之下以固其基法地之廣以聚其業如是而自治如是而誨人如是而始如是而終篤實之積光輝發外傑黠者心服而獻誠叛亂者醉德而革面豫昔撫東土訪先生之閭見其子進士士咨文行不忝所生又聞有老門生百戶胡深者亟欲招致匿不肯見先生之風髙矣逺矣今夏士咨輩録先生言行詩文奏議共若干卷遺余於戲先生之學本不可以言語文字求今先生往矣舍言語文字何可以見先生之心謹敘而傳之先生諱欽世為定海人以戍籍隸遼之義州衛登成化丙戍進士任户科給事中養疾回隱居醫閭山下克恭其字也遼人無老少貴賤至今稱為醫閭先生云定三城序明程啓充功名之際人之所開也殘慢之習政之所激也遲速之宜幾之所投也是以君子致覽焉石塘曽子舉進士拜縣令擢御史來按遼東當是時吕九州為巡撫乙未春御史南巡都御史北巡會於海州相得甚歡也已乃御史行而南都御史行而北北抵開原而返遼陽又兩日而難作時御史尚在熊嶽報至趨歸馳檄往諭門啓檄入張檄衆號檄下仆旗息鼓坐甲解櫜鞬釋官吏縳奉吕中丞入居都司衆驚曰御史至矣登陴走集日四五起逺近風靡列城響應御史兼程至官屬父老走逆入院諸叛卒呶呶待命軍民啼泣陳説御史慰勞父老問所便宜更張之人人自喜曰御史愛我也往唁吕中丞移之行臺上言曰臣待罪邊圉邊人不靖敢干制使罪唯在臣愚民不足誅唯聖明矜宥詔勿問諸臺諫請用師遣工部侍郎林公來按是月丙辰廣寧再變其夜撫順劫辱主帥御史復上狀朝野洶洶司馬憂益劇御史日事拊循涣其羣佯莫與較物色大憝稽其所往來謀稍解七月甲子晨集將校官屬下令曰三城干紀罔治脅從首亂者死其捕之國憲母登叛人左右相顧􅙚舌御史出袖中姓名分配校卒即走西城指授未移晷而縳八人明日撫順擒七人來獻又明日計殺陳羊兒陳羊兒者倡亂廣寧者也驍悍難敵故先事收之丁卯再擒十有二人後先遲速悉仰成算地方底綏反側震悚御史復上言曰遼東三變臣不佞見大同失畫屠戮慘毒臣欲以計滅賊故請勿問臣憤恨不敢忘已討擒元惡二十七人殺一人取其首賴陛下神靈軍民帖服唯臣死罪死罪天子覽之喜詔司冦議辟詔冢宰陟御史大僚詔司馬論功賞詔使者還别遣御史勘奏敕至遼人呼曰微公吾為大同矣我東人曷以報公諸父老請建生祠御史不許請肖像俎豆之又不可請為文紀實御史又謝乃守臺下不去御史曰父老且休豫方辭功請罪未遑也諸父老乃以李張二生來蒲河謁豫以狀啓充受狀太息曰嗟乎事幾之不可失也邊兵搆患始寧夏而甘肅而大同當其時非無撫按也特以處置失宜玩兵激冦損師纍月費數十萬殺傷數萬俾朝廷旰食可慨也唯遼變起三城五路震撼先是御史請勿問悉解關鑰豫心竊疑之比寓書於豫曰兹舉終當别圖先生幸教我也豫固謝未省也及其赫然決䇿不假兵革羣凶就繫弭兵裕民萬全無害雖古管葛豈其過之孔子不云乎必也臨事而懼好謀而成者也乃知諸鎮之變唯無人焉當患而謀以致喪師糜財禍亂薦作潔此相度宏濟孰多父老俎豆之朝廷爵賞之不亦宜乎重刻醫閭賀先生稿序明陳仁錫賀先生三十登進士三十一官給諌災異乞罷免其最沉痛之言曰但今所謂修省惟陛下一人耳三十二歸讀書醫閭山疏薦陳白沙宜居宰輔任經筵懸像靜室率子弟拜之草載事母薦起不赴尋遘艱上書陳四事劾內鎮守甚力執政迂之公輒自忖不學無術盡削其草剛毅類羅一峯一峯先生年友也事之亞于白沙教人先小學敦古禮革習俗義州化之冦不敢犯其里見先生且羅拜止殺嵗庚午余承匱司業上然大司成馬言有旨本雍坊翰會議孔廟從祀公最無間知其人不讀其書可乎是書得之前屯賀訓導君卿以選貢捍危城率先道義及進香河令勤政凜操撫恤遺黎公賢子孫也乞余序以傳先生生於義州古曰宜州醫閭山居其右余奉使遼東都司即其地今移而之寧逺矣初髙皇帝命功臣龍虎上將軍都督馬公雲葉公旺自登萊渡遼招附經營設都司馬東廣寧南錦州西大寧北一面鄰敵耳自徙大寧諸城人民盡豫諾延此州兩面受敵緣邊最要害云先生亟稱王中丞九臯創六馬營堡𢎞治間王參戎銘修建大清堡而大寧大平大康大安大定堡踰年皆復多者七百少者四百授之堡田耕且守而又極稱遼當世祠莫如馬葉二公大都開創衛所建立學校報德報功何可忘也公嘗言洪永間遼兵八分農種二分守城以八養二今盡反之銀糴中鹽尚若不足亟反二八農守之數使戰兵雖少而精不求給於農種之外邊防無虞大費亦省至哉言也豫憩寧逺屯計工而分粒土甚沃美公言猶信公以銀的教射語人曰進不為朝廷用退不為鄉里益吾恥之雖老病不敢不勉又稱懷柔伯念久雨治水口既僝工設酒筵所部將士有禮節其守臺貼臺不習于射官軍半私門敵至如入無人而爭買漢首以充級則齒牙憤裂各記姓名俟天道報復又念此方之人不習蠶織於是教家人紡績以及城堡公於貼臺守臺勸耕勸績用心如此躬行君子不虛耳嗟嗟中山王垂老薊門經營九載而從海之役屬之二將薊遼可兼中山兼之矣髙皇帝必使中山兼之者意者山遼海濶關外金城遼海相注灌遙呼山東舒吻近控薊門張翼遼薊各自為而全體相首尾耶意者大寧一失兩受敵兩受牽左枝右梧情形迫遽昔離之乃合今合之乃離耳茍求其故宜閲此書茍求其故而不得宜閲此書揣公之心若曰為人臣不保疆土保父母保鄉里以貽君父之憂豈人也哉兹余評閲意也欽定盛京通志卷一百十二
