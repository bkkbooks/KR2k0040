body:
  text: 名宦一漢後漢三國魏晉前燕附北齊隋唐欽定盛京通志名宦臣等謹案遼東於漢初雖已置郡而地以浿水為界自浿以外皆燕人衛滿所據故其時遼東太守特與滿申禁約而政蹟未有聞也建孝武元封三年悉定遼東分設真番臨屯樂浪元莬四郡益置官吏於是循聲卓然可紀矣自漢已後宦其地牧其民俎豆其土者代不乏人矧今留都重地自將軍五部以及尹丞守令莫不整敕紀綱仰副我國家澄敘官方之至意吏治蒸蒸不惟其名惟其實此名之所以克稱也歟謹志名宦二十二欽定四庫全書欽定盛京通志卷五十三名宦一忠節附漢謹案舊志於漢名宦首列荀彘楊僕蓋以其有定遼之功也考史記朝鮮傳燕人衛滿據朝鮮至其孫右渠殺遼東東部都尉涉何為冠亂元封二年秋遣樓船將軍楊僕與左將軍荀彘討之彘數與僕期戰僕欲約降右渠不㑹彘疑其有反計執捕之并其軍急擊朝鮮三年夏朝鮮人殺右渠來降遂定為真番臨屯樂浪元莬四郡彘還坐與僕爭功相嫉棄市據此則僕初無定遼之功彘雖定遼而以爭功見誅不掩其罪且僕本酷吏史氏黜之與張湯同傳則其人皆不足以冠名宦之首爰録自甘延夀以下庶于循名責實之義或有當焉甘延夀字君況北地郁郅人少良家子善騎射嘗超距踰羽林亭樓由是遷為郎纍遷至遼東太守車騎將軍有治行范明友宣帝時人拜度遼將軍嘗將二萬騎出遼東擊烏桓破之遼東西之民賴以安輯以功封平陵侯後漢祭彤字次孫潁川人建武十七年拜遼東太守時胸奴鮮卑及赤山烏桓連和强盛數入塞殺掠士民彤厲兵馬廣斥堠冦至數破走之二十一年秋鮮卑萬餘騎寇遼東彤率數千人迎擊之自被甲陷陳斬首三千餘級獲馬數千匹鮮卑震怖不敢復窺塞彤乃離其黨與撫以恩信威聲暢於北方西自武威東盡元莬及樂浪皆來內附野無風塵悉罷緣邊屯兵彤在遼東幾三十年衣無兼副顯宗徵為太僕及卒烏桓鮮卑追思無已每朝賀京師過冡拜謁號泣乃去遼東吏人為立祠四時奉祭焉耿䕫字定公扶風茂陵人耿國次子少有氣決以功封栗邑侯遷遼東太守有治績和帝元興元年貃人寇郡界夔追斬其渠帥南單于叛夔率鮮卑及諸部兵追至屬國故城追擊破之遷行度遼將軍事安帝建光中拜度遼將軍蔡諷安帝時人始拜遼東太守元初五年髙句驪王宫與濊貊寇元莬攻華麗城諷與元莬太守姚光擊破之夏髙句驪復與鮮卑入寇攻遼隊諷追擊于新昌戰殁功曹耿耗兵曹掾龍瑞兵馬掾公孫釜以身扞諷俱歿於陳忠節附載陳禪字紀山巴郡安漢人安帝永寧元年轉元莬侯城障尉拜遼東太守時邊人畏其威强北寇入邊禪不加兵但使吏卒往曉諭之單于隨使還郡禪于學行禮為說道義以感化之懷服而去龎參字仲達緱氏人河南尹龎奮舉為孝亷歷官遼東太守恩信大著後遷度遼將軍馮緄字鴻卿巴郡宕渠人緄父煥前在安帝時為幽州刺史疾惡致罰時元莬太守姚光亦失人和建光初怨者詐作璽書譴責煥光下遼東都尉龎奮使速行刑奮即斬光收煥煥欲自殺緄疑詔文有異止之煥乃上書自訟果詐者所為徵奮抵罪而煥已歿帝愍之賜煥光錢各十萬以子為郎中緄由是知名順帝時鮮卑寇邊以緄為遼東太守曉諭降集寇皆弭服邊陲以安耿曄字季遇耿恭之孫也順帝時為烏桓校尉破敵有功鮮卑震怖數萬人赴遼東降及敵寇遼東屬國曄移屯無慮城以拒之威振北方後遷度遼將軍种皓字景伯河南洛陽人舉孝亷順帝時遷遼東太守有政聲烏桓望風率服迎拜界上度尚字博平山陽湖陸人桓帝時為遼東太守數月鮮卑率兵來攻尚與戰破之邊人憚畏逺近綏寧延熹九年卒于官公沙穆字文乂北海膠東人習韓詩公羊春秋尤鋭思河洛推步之術舉孝亷桓帝永夀時纍遷至遼東屬國都尉善得吏人歡心卒于官趙苞字威豪甘陵東武城人舉孝亷為遼西太守抗厲威嚴名振邊俗遣使迎母及妻子道經栁城值鮮卑入塞劫苞母以擊郡苞督兵禦之賊出母示苞苞號謂母曰為子無狀本欲以微祿養不圖為母作禍今不得顧私恩毁忠節母遙謂曰人各有命何得相顧以虧忠義即進戰賊悉摧破母妻皆為所害事平封苞為鄃侯苞歸葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是何面目立于天下遂嘔血而死段熲字紀明姑臧人舉孝亷桓帝時遷遼東屬國都尉時鮮卑犯塞熲率所領馳擊恐賊驚去乃使驛騎詐齎璽書詔熲熲僞退設伏敵以為信入追熲熲縱兵大破之在邊十餘年秋毫不纍民與將士同甘苦未嘗一日蓐寢故所向有功公孫琙桓帝時為元莬太守永康元年扶餘王夫台將二萬餘人寇元莬琙擊破之熹平三年扶餘遂奉章貢獻橋元字公祖睢陽人桓帝末鮮卑髙句驪並叛舉元為度遼將軍假黃鉞元至鎮休兵養士然後督諸將討擊悉破散之在職三年邊陲安靜耿臨靈帝建寧元年遼西邱力居有衆五千餘落自稱王遼東蘇僕延有衆千餘落自稱峭王右北平烏延有衆人百餘落自稱汗魯王耿臨為元莬太守討降之先是殤帝安帝時髙句驪王宫數寇遼東蔡諷討之不能克宫死子伯固立犯遼東西安平殺帶方令建寧二年為臨所敗伯固降服乞屬元莬遼東西乃寧公孫瓚遼西令支人舉孝亷靈帝時除遼東屬國長史嘗從數十騎出塞見鮮卑數百騎瓚乃退入空亭中約從騎曰彼衆十倍于我今不衝之則死矣乃自持矛兩頭施刃馳殺數十人寇遁去憚其勇健不敢犯邊後以功封都亭侯謹按漢昭帝元鳳三年置度遼將軍後罷至東漢明帝永平八年復置屯五原曼柏蓋在今榆林北邊境去遼東絶逺其曰度遼者宋劉恕云遼訓逺謂度絶逺以征伐也考後漢李膺張奐皇甫規諸人皆拜度遼將軍而實未嘗蒞遼東之地舊志概引入遼東名宦未免冗濫今悉置不録三國魏牽招字子經安平觀津人曹操將擊袁談而栁城烏桓欲出騎助談操以招嘗領烏桓遣詣栁城說令罷兵後從討烏桓至栁城拜護烏桓校尉文帝立拜招使持節護鮮卑校尉廣布恩信招懷降附至十餘萬落田豫字國讓漁陽雍奴人魏文帝時持節護烏桓校尉牽招解雋並護鮮卑自髙栁以東濊貊以西鮮卑數十部相連結豫皆以計破散之豫清約儉素朝廷賞賜皆散之將士鮮卑素利等數來客見私意一無所受咸髙其節母邱儉字仲恭河東聞喜人青龍中加度遼將軍使持節護烏桓校尉率幽州軍至襄平屯邊隧遼西烏桓護留等隨袁尚奔遼東者並相率降從討公孫淵定遼東以功封安邑侯正始中髙句驪數叛儉督步騎萬人出元莬境與句驪王宫大戰沸流水連破之遂登丸都破滅其城宫㩦妻子逺竄初句驪沛者名得來數諫宮不從歎曰立見此地將生蓬蒿遂不食死舉國賢之儉令諸軍不壞其墓不伐其樹並釋其妻子令贍養得所遼人悅服正始七年復討髙驪及濊貊破之韓那奚等數十國皆降王頎字孔碩東萊人官元莬太守正始中母邱儉復征髙句驪其王宫遂奔買溝時儉遣頎追宫過沃沮千有餘里至肅慎氏南界刻石紀功刋丸都山銘不耐城穿山溉灌民賴其利張邈巨鹿人為遼東太守著自然好學論為人有逺識吏民懷之晉張華字茂先范陽方城人都督幽州軍事撫納馬韓新彌諸國依山帶海去州四千餘里前代所未附者二十餘國咸來朝獻謹按張華都督幽州宦績似不専在遼東境內但史言馬韓新彌東方諸國去幽州四千餘里則實兼今奉天吉林寧古塔之地因志之賈沈太康時為遼東都護先是慕容廆破扶餘其王依慮自殺其子依羅求請援于東吳校尉何龕龕使沈救之廆遣其將孫丁率騎邀之于路沈力戰斬丁遂復扶餘國慕容廆字奕洛瓌先世居遼秦漢之際分保鮮卑山三國魏初曽祖莫護跋率諸部入居遼西從伐公孫淵有功拜率義王乃以慕容為姓自云慕二儀之德繼三光之容也父涉歸以全栁城功拜單于遷邑於遼東北生廆雄傑有大度張華一見許為命世之器晉愍帝建興中拜廆昌黎遼東二國公時中原多故邊圉淪陷廆在遼東教民農桑修明刑政舉賢任能招撫流亡士庶歸之敗髙句麗之衆立遼東郡元帝太興中進封遼東郡公廆嘗言獄不可不慎賢不可不敬稼穡不可不急酒色便佞不可不戒著家令數千言卒贈車騎將軍開府儀同三司諡曰襄裴嶷字文冀河東聞喜人清方有幹略纍官滎陽太守以兄武守元莬求為昌黎太守武卒嶷被徵道梗不得達乃與武子開投廆廆以嶷為長史用其䇿遂破悉獨官嶷嘗獻捷于晉帝試留之以觀其意嶷辭曰慕容將軍越在海表乃心王室故遣臣萬里歸誠今若留臣必謂國家遺其僻陋孤其丹心是以微臣區區貪還反命耳帝乃遣還廆嘗謂羣僚曰裴長史名貴中朝而屈于此殆天所以授我也後出為遼東相轉樂浪太守韓恆字景山灌津人永嘉之亂避地遼東依校尉崔毖毖敗為慕容廆所得拜參軍咸和中廆僚屬宋該等建議表請廆為大將軍燕王之號恆駁曰晉室喪亂無復綱紀明公忠武篤敬憂勤社稷抗節孤危之中建功萬里之外終古勤王之義未之有也夫立功者患信義不著不患名位不髙今宜繕完甲兵以清四海若要君以求寵爵者非為臣之義廆未用其言後遷營邱太守政化大行慕容翰字元雍廆之庶長子性雄豪多權略猿臂工射永嘉三年遼東太守龎本以私憾殺東夷校尉李臻遼東鮮卑素喜連木丸津等因欲為亂翰言于廆曰求諸侯莫如勤王今連津跋扈托為龎本報仇內實幸災為寇遼東傾沒中原離亂勤王仗義今其時也宜合義兵問連津之罪興復遼東並吞二部以立霸王之基廆從之以翰為前鋒率騎東擊連津破斬之立遼東郡而歸于晉廆復遣翰攻段疾陸眷遂鎮徒河壁青山及鎮遼東撫安民人甚有威惠陽耽北平無終人清直端敏仕為遼西太守慕容翰攻段氏于陽樂獲耽廆甚敬禮用為謀主官東夷校尉前後燕附皇甫真字楚季安定朝那人弱冠髙才慕容皓即位任平州别駕時百姓勞瘁真意欲寬賦減稅休息戶役時不能從後以敗麻秋功拜奉車都尉守遼東營邱二郡皆有善政謹案裴嶷韓恆慕容翰雖皆為慕容廆所臣然當時廆率其僚屬尚臣事于晉故志內悉𨽻為晉名宦至慕容皓僭號稱王皇甫真以下諸人始另列諸燕以别之並附識于卷慕容恪字元恭皓之第四子從皓征伐臨機多奇䇿使為遼東鎮將甚有威惠髙句驪憚之不敢為寇及伐夫餘身當矢石摧鋒而進所嚮輒潰劉佩河間人為元莬太守咸康四年趙石虎攻慕容皓皓欲奔慕輿根諫而止劉佩曰今强寇在外衆心恟懼臣請出擊之縱無大捷足以安衆乃將敢死數百騎出衝趙軍所向披靡于是士氣百倍慕輿根等遂敗趙兵境內以安慕容農廆之裔孫初髙句驪寇遼東司馬郝景率衆救之為所敗遼東元莬遂沒農進伐髙句驪克之復遼東元莬二郡及慕容垂立國封農為遼西王在龍城五年庶政修舉後召還以慕容隆代之隆因農舊規修而廣之遼境遂安北齊髙寶寧武平末為營州刺史鎮黃龍夷夏重其威信周師將至鄴寶寧率驍鋭并契丹韎􅞘萬餘騎將赴救至北平聞鄴都不守便歸營州周遣使招慰寶寧却其敕書還據黃龍竟不臣周隋韋冲京北杜陵人文帝時封義豐侯遷營州總管冲寬厚得衆撫韎􅞘契丹皆能致其死力奚霫朝貢相續髙驪主元率韎􅞘萬餘騎寇遼西冲擊走之麥鐵杖始興人大業八年征髙驪為將時賊阻遼水拒守鐵杖將度遼謂其三子曰吾荷國厚恩今乃吾報命之秋唯誠與孝汝其勉之時造浮橋于遼水西岸既成引橋趨東岸橋短去岸丈餘賊大至鐵杖奮躍登岸與錢士雄孟金叉等皆力戰死詔贈鐵杖宿公諡武烈忠節附載謹按隋唐時從征髙麗諸將非宦于遼東著有名蹟者比舊志録為名宦殊失區别而其中固有攻克名城拓疆闢土與夫死節諸臣捐軀致命于其地者其豐功亮節不可不紀爰擇而志之來獲爾字從善江都人以平壤道行軍總管率樓船指滄海入自浿水去平壤六十里與髙麗遇進擊大破之追奔至城下毁其郛㑹宇文述兵敗乃旋大業十年又帥師渡海至卑奢城髙麗舉國迎戰獲爾擊破之髙元震懼執叛臣斛斯政詣遼東城下請降帝許之遂旋師李景字道興天水休官人大業七年從征髙麗為將攻武厲城破之九年復出遼東師旋追兵大至景擊走之進爵滑國公十二年煬帝令景營遼東戰具于北平粟帛山積景無所私江都之變盜賊蜂起遼西太守鄧皓救景遂歸栁城將還幽州遇賊見害契丹韎􅞘素感其恩聞之莫不流涕唐張儉字師約京兆新豐人以功纍遷營州都督兼護東夷校尉營州部與契丹韎􅞘奚霫諸部切畛髙麗引衆入寇儉擊破之太宗征遼儉率兵渡遼水趨建安城破髙麗兵封皖城郡公後改東夷校尉官為都護府即以儉為都護李道宗字承範太祖曽孫貞觀中髙麗莫支離阻兵不服太宗征之以道宗為遼東道副大總管道宗請將百騎先覘形勢帝問往返幾日對曰往返兼旬周覽十日遂秣馬束兵傍南山直入遼東城南相險易度營陳便處將還髙麗兵斷其後更走間道如期謁見詔與李績為前鋒拔蓋年城㑹救至道宗等所將才四千虜十倍軍中議保險以須道宗曰吾屬為前軍當清道迎乘輿尚何待遂選壯騎數十突進賊營左右出入績合擊大破之李績字懋功離狐人貞觀十六年以績為遼東道行軍大總管率十六總管兵以伐髙麗十九年績趨遼東自通定濟遼水拔蓋牟遼東白崖等城從戰駐蹕山功最多二十一年復與牛進達伐髙麗績克南蘇木底進達克石城乾封初仍充遼東道行臺大總管擊髙麗下十七城總章元年拔扶餘南蘇木底蒼巖城進圍平壤執髙藏男建等分其地州縣之薛仁貴絳州龍門人名禮以字行躬耕時將改葬其先妻栁曰天子自征遼東求猛將君盍圖功名以自顯富貴還鄉葬未晚仁貴乃應募至安邑㑹郎將劉君卬被圍仁貴馳救斬賊擊馬鞍由是知名王師攻安市髙麗率衆拒戰仁貴白衣持㦸鍵兩弓呼而馳所向披靡帝遣使馳問白衣者誰曰薛仁貴帝召見喜得彪將授遊擊將軍顯慶三年詔副程名振伐髙麗破之於貴端城四年破溫沙多門於橫山及戰石城有善射者多殺官軍仁貴乃單騎突擊賊弓矢俱廢遂生擒之乾封初援泉男生大破髙麗進拔扶餘威振遼海髙麗平進檢校安東都護封平陽郡公移治新城撫孤存老檢制盜賊隨材任職褒崇節義髙麗士衆皆欣然忘亡契苾何力鐵勒人太宗征髙麗烏骨城為白巖聲援何力挺身陷陳槊中腰尚輦奉御薛萬徹單騎往救出何力於萬衆之中帝親傅瘡藥何力益憤束瘡再戰城既拔得刺何力者髙突勃騶使自殺辭曰彼為主冒白刃以刺臣義士也捨之龍朔初拜遼東道行軍總管擊髙麗進兵鴨緑餘衆多降乾封初詔以何力為遼東道行軍大總管安撫大使副李績同趨髙麗何力大破髙麗於南蘇進拔扶餘先引兵趨平壤績軍繼之髙麗平程名振洺州平恩人破劉黑闥有功拜營州長史封東平郡王從征髙麗拜平壤道行軍總管攻沙卑城破獨山陳皆以少擊衆永徽六年以營州都督兼東夷都護擊髙麗於貴端水焚其新城顯慶三年與仁貴攻拔赤熢鎮破髙麗大將豆方婁龍朔三年與蘇定方等復伐髙麗敗之龎同善乾封初以遼東道行軍總管援泉男生及髙麗戰敗之男生率師來㑹詔拜同善特進遼東大都督封元莬郡公髙侃永徽中為北道安撫使以功厯安東都護乾封初進營州都督為遼東道行軍總管討髙麗咸亨初以東州道行軍總管破髙麗于泉山總章二年髙麗鉗牟岑叛復以侃為東州行軍總管與將軍李謹行討之鉗牟岑走新羅徙都護府治遼東州破叛兵於安市又敗之于泉山蘇定方名烈以字行冀州武邑人永徽六年為遼東道行軍大總管伐髙麗敗之於貴端水龍朔元年復破之於浿江劉仁軌尉氏人麟德初為帶方州刺史破百濟立唐社稷頒正朔及廟諱然後屯田儲糗糧訓士卒以圖髙麗總章元年為遼東道副大總管兼安撫大使與李績討髙麗平之泉男生字元德髙麗蓋蘇子為弟男建男産産等所逼遂率衆與契丹靺鞨兵內附明年入朝遷大都督遼東郡公詔還軍與李績攻平壤擒髙藏進卞國公奉詔安撫遼東並置州縣招流亡平斂賦罷力役民悅其寬卒諡曰襄勒碑著功龎孝泰龍朔元年為沃沮道行軍總管伐髙麗二年及髙麗戰于蛇水死之忠節附載許欽寂安陸人萬嵗通天元年契丹入寇詔為安東討擊使戰崇州敗被禽時契丹方圍安東脅令說屬城未下者欽寂呼安東都護裴元理曰賊朝夕當滅幸謹守遂遇害贈刺史諡曰忠忠節附載王元志天寶時為安東都護安祿山反與營州侯希逸共斬其親將拜元志平盧節度使兼御史大夫蘇元明奏德宗有云御史大夫王元志壓巫閭臨幽都其為時倚重如此全客努懷州武涉人開元中室韋首領段普洛數苦邊節度使薛楚玉使客努單騎襲之斬其首以歸拜左驍尉將軍數戰有功安祿山反平盧節度副使吕知誨降賊害安東副都護馬靈察客努與諸將殺知誨遣使與安東將王元志相聞天寶十五載以客努為栁城郡太守賜名正臣以元志為安東副大都護正臣遣使道海至平原與太守顔真卿相結且請出師未至而平原失乃還欽定盛京通志卷五十三
