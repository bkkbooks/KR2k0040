body:
  text: 欽定四庫全書欽定盛京通志卷十五天章皇上聖製乾隆四十三年戊戌御製古今各體詩卷下乾隆四十五年庚子御製敬題重繪太祖實録戰圖詩欽定四庫全書欽定盛京通志卷十五天章皇上聖製詩乾隆四十三年戊戌至盛京疊癸亥七言長律十四韻草四春秋心結東夢中佳氣逺蔥蔥於焉蒞止今朝慰驀爾回思昔日同開創每懷厪帝慮經營寧為去聲豫皇躬遼原猶謂地居僻瀋水端宜都建中帝初太祖高皇議都遼陽號曰東京尋復欲遷都瀋陽諸貝勒大臣皆以為未便太祖諭曰瀋陽形勝之地西征明由都爾弼渡遼河路直且近北征蒙古二三日可至南征朝鮮可由清河路以進且於渾河蘇克素護河之上流伐木順流下以之冶宫室供炊㸑不可勝用也時而出獵山近多獸河中水族亦可捕取朕籌之熟矣於是定都盛京宫殿略備廟社之制違衆議當定議獨念羣勞亦豈勞空重門臯應排銅闥崇宇輝煌櫛瓦瓏百雉岧岧因地利十亭翼翼亮天功盛京城髙三丈五尺周九里三百三十二步為門凡八南曰德盛天祐東曰撫近內治西曰懷逺外攘北曰福盛地載宫城之制左闕門曰文德右闕門曰武功內為崇政殿殿之後為鳯凰樓樓之後為清寧宫東為關雎宫西為麟趾宫後義增建大政殿殿前左右列亭十近北左右二亭為諸王議政之所以下分列八旗答陽勢據風雲會不日成皆子弟攻盛京修葺城垣建治宫室皆令八旗丁壯執役一切工作不以勞民西伐兵戈近敵壘北來賓客燕王宫號規太祖既遷都瀋陽至役尤太宗遂即帝位建國模太定自是征明之為近便而蒙古諸部落之來朝謁者並宴賚於此所謀大詎惜其小雖用儉仍示以豐悠久規模貽奕葉艱難締構緬神衷再臨故國景依舊正值清秋候尚融繼繩惟期百世永拜瞻敢謂一誠通獨殊掖輦前巡况癸亥甲戌兩次詣盛京皆奉增悽聖母臨幸今竟不可復得追思惟感不覺汍然淚眼紅大清門門以大清立將將應豈殊通情建二木業開太祖創基勤於庶政書之命建二木於門俾下情欲逹者以進實貽萬世良法啓運鎮留都百世當守法千秋永示謨歷觀為治者夫孰外斯乎盛京舊宫恭依皇祖原韻當年撻伐事敦鋪拓土開疆若契符根本室家立東國中原山海俯西區重來豳館欽先創慎守金甌勉後圖肯構綿綿期百世載賡元韻示鴻模御崇政殿六韻盛京宫闕鎮東遼締搆千年祖德昭草四春秋經嵗閲凖回平定早兵銷甲戌御殿時阿睦爾撒納率衆內附遣使先至曽命其隨班行禮是辦理新疆之始也兹凖部回部皆經平定其地並入我版圗疆宇較前益增闢矣重來崇政瞻斯殿便與臨軒擬視朝上兩次至此俱御崇政殿受賀兹以在聖母二十七月之內止御殿如視朝之例樂設而不作鎬邑那居停昔宴癸亥甲戌並御此賜臣工宴今嵗亦不舉行雲門雅樂徹今韶一欣一戚紛吾感曰繼曰繩敬久要難在守成創不易永思著説敢逍遙向嘗作創業守成難易説謂創業僅可謂之不易而守成實難豫之以難責夫守成者非敢忘創業者之難正欲守成者常知其難持而勿失以慰創業者之初心既以申警於後世且自朂焉登鳯凰樓用李白鳯凰臺韻舊都豈為事遨逰祖迹尋驚嵗月流户口已看填城郭耕桑更復拓墟邱松山峯靜拖遙岫遼水波恬帶逺洲此日升平歌樂利昔年開創憶焦愁清寧宫口號是宫為舊都正寢當時命名即合乾清坤寧而並有之仰見聖人有作必合天心受福無疆也此地建都隰原度於豳斯館似周初清寧合撰乾坤泰嘉兆燕京早並居恭瞻太祖皇帝甲胄作歌數人舉之且廢力被用臨陳常從容天生真人俾創業殊勇殊智殊仁𠂻三者闕一誠不可實録所載聽惟聰寬御下更嚴督戰及至要地先以躬棟鄂翁鄂洛拒命臨陳受傷退拄弓創愈復往終克攻大度反授射者封其城太祖攻棟鄂部還復攻翁鄂􅏖薄縱火焚城樓及村中廬舍太祖乘屋顛射城中城中鄂爾果尼潛射血至太祖傷首貫胄即拔箭以射敵應弦而踣雖流足猶鏖戰不已敵復有􅏖科者於煙熖中突發一矢射血肉太祖穿鎮子甲護項太祖拔之鏃卷如鈎並落衆競趨而前欲登屋扶掖以一太祖恐為敵窺亟諭止之時項下血湧如注乃手捫創一手拄弓而下二人掖而行忽迷仆旋稍蘇裹創如是者數四蘇輒飲水凡一晝夜血猶不止乃棄垂下之城而還及創愈復率兵攻克翁鄂洛城獲鄂爾果尼及洛科諸臣請誅之太祖曰彼為其主乃射我今為我用不又為我射敵耶乃皆授為牛録各轄三百人衆咸頌太祖大度迄今每讀實録至此緬懷輒為創業難難流涕時此甲胄即進御想像創迹猶餘紅嗚呼想像創迹猶餘紅敢不思念艱難亹敬恭恭瞻太宗皇帝所御弓矢矢計長四尺弓知徑百鈞寶藏示家法善用識天人敢懈詰戎念不忘創業辛傳觀相朂勵扈蹕有宗臣實勝寺瀋陽既建都佛宇於焉搆名之曰實勝義蓋叔孫取叶遂致定中原萬方徠輻輳雖資幽贊力允藉神功茂小子承先烈月將而日就戊辰築梵宇西山之東岫題額實同之金川功速奏戊辰夏征𠞰金川以番人恃其碉險因憶開國之初我旗人屢以雲梯冉薄登城者不可勝數遂於西山之麓設為石碉簡佽飛之士習之未逾月而精其技者得二千人命大學士忠勇公傅恆為經略統之以行且集諸路之兵期必濟事先聲所布其酋厥角請命因命赦其罪班師技未試而大功以成碉之側建寺曰實勝更合成功之旅立健鋭雲梯營於寺左右更建屋居之詳見向所作實勝寺碑記其後五年間凖回歸我宥乙亥平定準部己卯平定回部皆有健鋭營徑旅從征每當攻戰之時悉鼓勇效命因得迅奏膚功黷武則何敢詰戎亦云懋握勝胥以實循名幸略副惟勵繼繩心永賴祖宗祐長寧寺都會無不有道宫梵寺委長寧昔所名亦祗願寧此孰知天眷隆四海一家矣開創賴守成是責將誰諉圖易在思艱安民要察吏叶惟期萬葉安乃副二祖喜長寧豈徒來吾心廑未已長寧寺恭瞻太祖所御冠服故里當年如沛里御園今日作祗園盛京一統志載為長御花園順治十三年改寧寺貝螺永護三乘法冠服重瞻五世孫沐雨櫛風恆此共葛燈土障儼其存寧惟示儉兼示勩自審當何繩繼敦題法輪寺聖建四窣堵法輪寺在地載門外永光寺在撫近門外廣慈寺在德盛門外延夀寺在外攘門外四寺各建白塔一座相傳當時喇嘛有善相地術者曽云四塔全當一統斯惟城北隅欲因示蒙古寺初建即盛興黃教以彼時蒙古已有歸附者使之瞻奉皈向亦柔逺之一道也詎止事浮圖是日親瞻相當年緬創模法輪演國語以國語所譯梵經令喇嘛住寺演誦於此地為尤宜云永佑舊京都瞻仰頥和殿感成長句潔沼軒庭憩聖慈丙寅建此殿甲戌恭侍駐憩聖母臨幸盛京奉慈駕於此今來瞻仰祇添悲空教扈蹕憶前度誰識承歡歎永辭神御敢言一再奉夀皇祖妣除夕皇妣御容惟尊藏皇殿遇元旦同列祖列后神御敬奉瞻禮是以豫於舊典於禮不敢輕有所加雖夀聖母敬遵暢康宫春園為故此慈躬頥適之所然其地應留為萬年尊養東朝兩處皆不另奉御容神位今於此殿亦視園之夀康宫暢春例音容如在久長思寂寥朵殿銅龍鎖揮淚難堪欲去遲駐盛京故宫有懷三臨溯皇祖幾宿駐陪京肯搆勵今篤開基緬始營百年孳富庶萬户暢寧盈奉養殊前度癸亥甲戌兩次詣盛京皆奉悽愴聖母承歡行慶追憶曷勝悽然一繾情賜奉天將軍𢎞晌各省將軍駐奉天任最繁旗民紛雜處文武董雄藩用簡宗臣俊同為聖祖孫朂哉勤教養培此故風存賜吉林將軍福康安從征能奮武福康安以侍郎命征𠞰金川奮勇著績録其功授嘉勇男世爵列紫光閣前五十㓛臣二部亦通文知可棟梁任因教節鉞分迎鑾仍扈蹕鑒悃匪嘉勤汝父家聲在福康安為故大學士忠勇公傅恆之子勉之尊所聞示盛京五部侍郎陪都五部備官儀實各亮工有所司詎祗養高勝國似盛京設户禮兵刑工五部每部侍郎一人掌之凡盛京之事各視其職分屬焉非若勝國陪京備員虛設為投間置散之地也亦常掄彥內朝移侍郎中遇才猷練逹之人用之京部或外省督撫者皆有之曹郎互半中兼外五部司官向用本處人員雍正五年皇考以各員素多串通欺隱之弊概行撒回調補京缺而命在京各部堂官揀員發往補授乾隆八年幸盛京見各員頗知黽勉積習亦經悛改令將各司員半用本地人員半由京員遷調俾其不礙升途乾隆十八年復諭吏部議盛京郎中貟外主事各缺用京員十之七本地人員十之三以歸平允臺職應全罷允宜明李南京兼設都察院官屬更無所事事我朝盛京則不置此職也大異南京紛議論徒資撓亂竟何禆題迪光殿六韻陪京駐數日别殿搆西廂法祖依崇政崇政殿為盛京宫正中臨朝之所其後為鳯凰樓又後為清寧宫祀神之處皆不可居丙寅春於東廂搆頥和殿以奉聖母駐憩西廂即此敕躬亹迪光緬前敢曰闡示後願惟昌乾惕勵朝夕邇遐圖艾康陶謨允期德禹訓惠招祥五字攄心悃宵衣勉日強保極宫天與承新命人言至舊家起居喜惟朴室宇本非奢建極欽錫保繩先奠邇遐文皇武功詠意謂涉於誇繼思齋題壁齋搆陪都額繼思守成開創却殊施守成不敢曠吾職庶可無孤開創時亥年戌嵗兩來兹一度前猷一度思纍洽重熙蒙昔業繼之難矣願蘉之敬題崇謨閣故宫興王地實録合尊藏敬建崇謨閣丙寅年於繼思齋後建崇謨閣尊藏五朝實録永昭白水鄉蘿圖燦金匱瓜瓞演銀潢庚午冬十月以玉牒及每十五朝實録恭送盛京嗣後年修訂玉牒一次告成並如前恭送締造貽鴻業益兹厪覲揚恭詠太宗所製鹿角椅詰戎不廢獵得鹿角成斯武示儉兼示坐宜攜復宜雕幾曽弗藉磋切略為施後聖繼先聖山莊亦有之避著山莊有向曽皇祖所製鹿角椅恭詠酹克勤郡王園寢每陳開國策均合聖人心王戰功頗多且於天聰時陳奏善撫降人及請於山海關通州燕京三處急圖其一以定丕基並請駐兵金州瞭哨諸事太宗皆嘉納之不少赳桓衆獨嘉幹略沈佳城留故里致奠重躬臨彰善俾觀感伊豫此意深王之後襲封者改為平郡王今春以開國勳藩爵延於世自應仍其初封之號俾襲爵者顧名追念無忘其先人體團勳勞常懷效勉於訓示宗親有益曽命軍機大臣會同宗人府核議著為令賜奠功臣揚古利墓主吏勇過漢長孫陪似唐溯思同麥飯恩合奠椒漿百戰英惟勝一心誠且長揚古利以功授超品一等公世襲罔替公號曰英誠兩朝勳績赫異姓獨封王揚古利幼從其父來歸祖深異之日見信任因太命入侍且尚主每從征伐必身先士卒多而詔之止亦不止或受傷猶裹創行以故功績最著崇德初隨征朝鮮誤中炮傷而殁武勳太宗臨哭之慟親視含斂追封王賜奠費英東墓來歸識超衆獨入目無前費英東自少從身先太祖征討三十餘年兵士衝突竪陳當其鋒者莫不披靡嘗從征葉赫城上矢石雨下太祖再命之追對曰勢垂克必不退也竟拔其城嘉諭萬人敵其從英東太祖伐明取撫順也明兵來援炮驚費馬旁逸衆皆不前費英東回馬大呼揮諸軍並進遂破之也太祖撫髀嘆曰萬人敵從征三十年薦賢奬以豫劾惡誨於先我不善太宗嘗諭羣臣曰費英東見人必先自斥責而後劾見人善必先自奬勸而後舉故被劾者無怨言破舉者無驕色未聞諸臣以善惡直奏似斯人也開國思殊績贈封理合然賜奠額亦都墓冠世稱勇獨丁年識主真額亦都年十三手刃父仇避居嘉木湖村居數嵗戰太祖過其地額亦都識為真主遂從行驍勇善能以少擊衆所向克捷先登太祖知其能日見信任嘗攻巴勒爾達城率鋭跨堞而戰飛夫貫股著於堞揮刃斷矢戰益力被五十餘創不退卒拔其城而還其勇果類如此忠攄實異衆恩顧亦超倫風雨精神會松楸碑碣陳元孫能繼勇額亦都元孫豐畀額襲果毅公爵昨為副將軍征𠞰金川奮勇著績嘉其克紹祖風於公號加繼勇以旌之惜因病不能永年撫念為之嗟悼奕世有良臣大政殿六韻一殿正中據十亭左右分大政殿前建亭左右各五居首者為宗室王貝勒議政所其八則八旗大臣議政之處同心籌上下合志立功勳辛苦緬相共規模迥不羣世臣胥效藎宗子更攄勤太祖而行太宗創業之始凡征𠞰皆隨分命王貝勒統兵若親征則王貝勒扈領軍隊宣力抒忠是以不建開國諸王貝勒無軍功者每用思前烈誰當繼舊聞推恩與旌雪睿親王統衆入關掃蕩賊氛肅清京邑尋分遣諸王追殱流寇撫定疆隅凡創制規模皆所經畫即奉迎惟攝世祖車駕入都定鼎以立萬世丕基厥功甚巨政多年威福不無專擅為衆所畏忌於其薨後搆誣傾陷因指斂衣踰制坐以叛逆定罪除封削其屬籍時世祖尚未親政故衆得逞私修怨也豫每恭閲位王實録載從輔太宗升遐時諸王推戴請王即尊誓死不立世祖其後更以王貝勒等多諂媚王而不知尊崇阿濟主上嚴詞訓飭朂以盡忠而於同母兄英親王格之違法妄行責其非而降其爵王之藎誠公正心迹煙然豈可令其抱不白之寃於地下特降旨昭雪補入宗支復其王封仍與世襲並為修建園寢追諡曰忠詔太常春秋祠祀又豫親王西平流冦南定江浙實間國諸王戰功之冠乃因係睿親王同母弟誣獄株纍降封郡王致令勳績湮沒未免遺憾亦敕復其親王世襲如故又禮親王以讓王而兼偉伐鄭親王肅親王克勤郡王皆茂著壯猷克昭駿烈載左宗盟顧其後之王號禮改為康豫改為信鄭改為簡肅改為顯克勤改為平其子孫所襲皆非其始封之字因命復稱原號俾其後裔承家襲慶追念祖功共知效法亦所以風示宗族也又以此六王配享太廟用昭展親酬庸之典且敬體我恩弗太祖太宗締造之初心推替云奕世勵殷勤閲射大閲應同吉禮行停之閲射揀其精大閲乃吉禮此次固未舉行而巡方詰戎有不可廢况盛京為國家根本重北更即習射因擇其尢精者於宫門校閲並以行賞詎宜故國忘弧矢况是朝家舊法程命中挽強頻有奬耦升旅進各無爭却因臂病疏斯事不覺於心略愧生向閲射必親引弓發矢俾衆觀曕往往十中八九自臂痛以來久踈步射見射耦命中未免恧然於懷故宫即事轉瞬忽經草四年白駒隙與逝波川開疆拓土勉勿替甲戌詣盛京適準噶爾輝特台吉阿睦爾撒納內附遣使先至是時尚未籌及西師之役也繼因機有可乘乙亥遂平定凖噶爾己卯復平定回部拓境二萬餘里設官分駐兵民墾藝安居耕屯相望商旅亦絡繹往來儼如內地至兩金川本服屬土司乃敢負恩抗拒法不可宥因而命將申討一舉𠞰平於其地設鎮安營以杜後患凡皆仰體默佑祖宗創業之艱勉副守成之責亦實仰邀所至集勳馬保泰持盈慎益虔蒙藉前庥惟幸爾思量重侍更􅏰然癸亥甲戌兩至盛京皆於故宫侍后宴賦詩恭紀兹欲如前此之承皇太歡奉宴那可復得追思不禁落淚翻書擬欲遣煩緒其奈紛吾恨轉填燃霞綳觀書用舊韻譯漢語即粳燈為盛京土物每來即燃之以觀書不忘舊也土障葛燈宜此物陳編枕葄夜堪稽軍書如緬當年治亦似樵蒸歆配藜清寧宫再疊舊作韻草四春秋閲宫庭宛似前敢誇新拓地甲戍至此為籌辦新疆之始乙亥夏平定凖噶爾己卯春平定回部拓地二萬餘里北踰伊犁西扺業爾羌悉𨽻版圖耕屯相望并設官分駐商旅通行儼如內地而左右哈薩克東西布魯特以及安集延拔達克山諸部亦皆臣服實賴祖德天庥云垂佑惟亹舊承天祖迹懷肯構神禧欽奉筵祀神及神為國家舊俗今坤寧宫每日祭之春秋立竿大祭皆依昔年清寧宫例兹駐盛京仍照癸亥甲戌兩次行祀兩將神禮於此並召扈從之王公大臣及奉天吉林軍入內賜食祭肉以受釐錫福酌匏風朴素執豕饎精蠲不盡一心慕言將六御旋蒙庥如尚健重至待他年文廟我太宗皇帝始創大業即崇文重道建孔子廟於盛京行釋奠禮開國規模己肇萬年有道之長也猶未干戈戢已興禮樂融聖圖真廣大文教合尊崇璧水恆論道泮宫每獻功至今培正學比户鬯儒風遼城望月用唐文皇韻呈象湧滄瀛見光先勃碣桂樹吳剛修不放枝外綴散彩麗霄漢示沖表盈缺於時逾中秋廣寒徒念結夙興偏宜觀漸向西林滅題仿楊補之三疊圖箑即留置繼思齋遼東曽鮮見寒梅攜得踈花幾朵開隨路秋風那吹去先期冬雪幻飛來畫圖三疊何須較香色雙清喜共陪留置藝齊還什襲無端防惹午蜂猜於故宫用唐太宗幸武功慶善宫韻即效其體真人興白水屢遷此開基取遼太祖初建都宫興京其後陽因築城建室遷居之名曰東京夭命十年鮮路太祖以瀋陽形勝地西征明北征蒙古南征朝皆便易且採於山材木不可勝用又水多魚原多獸以時漁獵不可勝食乃定議遷都是為盛京規模遂大備矣近逺多景從建號始於茲得玉太宗功德隆盛混一蒙古征服朝鮮又璽符瑞於是諸貝勒大臣外藩蒙古台吉及漢人文武各官奉表請上尊號再三請始得帝俞允乃於天聰十年四月築壇德盛門外即皇位建國號曰大清改元崇德遂肇億萬年基業焉復讐興義兵鼓勇同趨時蒙古稱北臣朝鮮質東夷入關據正統安民勤文思勞每籌茅簷逸寧耽繡㮰百年久升平繼述豫所司眷言懷故京來巡遼水湄兵民誠富庶農桑帶郊畿幾餘攬藝編因賡文皇詩登鳯凰樓疊甲戌韻風清日朗九秋時嶽嶽層樓拾級披此日繼繩欽陟降當年開創溯津涯望氛久矣干戈戢俯庶欣哉鄽市滋一瞬流年過草四再來乎否有餘思寄題千山千山勝景久薌哉三度徒教寄詠回三臨盛京皆欲至而未果本異唐宗曽駐輦相傳唐太宗曽駐蹕於此然彼以征髙麗而過其處豫三次皆因謁祖陵而來事既不同且此地在唐僅為遼西以外邊郡今則為祖宗創業故都建置更不同也空傳丁令有遺臺山有仙人臺或因丁令威得名底須石洞花巖皆千山名勝到原匪探竒問景來却笑前遭泐崖處侵尋應已漶莓苔盛京土風雜詠十二首有序我國家發祥之初居鄂多理城地近吉林烏拉數世後棄而他徙至肇祖居赫圖阿拉爰創始基越我太祖膺運造邦乃討平圖倫還定烏拉撫有葉赫諸部遂遷居興京繼復克瀋陽因建都於瀋即今盛京故盛京土風與吉林同譬之成周豐鎬風規無殊沮漆也曩既成吉林土風十二章兹仍舉前題為盛京詠亦數典所當遞及耳各題小引已詳前作故不復綴威呼漢語小船也造舟周室昔為梁開國規模百務詳奢匪黃龍及青雀利資雨泛與煙航製堅質朴提攜便威呼刳木為之水行可載三人登岸則可挾之而趨或行窩集中遇小河港隨時可渡最為輕便圓底平舷坐起康何必樓船稱伐越呼威久已武惟揚呼蘭漢語竈突也豳岐家室屢為遷時處恆依舊俗然水火每資叩昏户㸑炊常看引朝煙疏風避雨安而穩直外通中朴且堅截中空之木刳使直逹樹之簷外引出炕煙覆荆筐其上以護雨雪而旁竅仍通滿洲舊製如此玉食寄言惟辟者莫忘陶復九章綿法喇漢語為扒犁即拖牀也服牛乘馬取諸隨制器殊方未可移似榻似車行以便曰冰曰雪用皆宜似榻無足似車無輪以牛馬挽行氷雪中可以致逺孤篷雖遜風帆疾峻坂無愁銜橛危太液拖牀龍鳯飾液池冬日則御拖牀其製有施氊幄及飾以龍鳯者椎輪大輅此堪思斐闌漢語榆栁小弓也桑弧蓬矢舉惟男示有事胥自幼諳榆栁為弓騂角未荆蒿作箭雉翎堪其名曰鈕勘二三卿士節權略日夕兒童戲以耽我滿洲以射為重雖小兒嬉戲亦習慣成自然云即此箕裘應共朂進之觀德更名談賽斐漢語匙也有救早是詠周雅異地同風古製存不改木為非玉作常資朝食與晡飱匙以木為長四寸許每食用之取其質也失時巧計傳昭烈投處仙方訝葛元何似兩忘供日用大東四釜定村村額林漢語擱板也橫施木板置楣桭家計精粗具畢陳楣棟間庋橫板以置瓶盎奩篋諸凡家具精粗咸備滿洲舊俗比室皆然舉之以示淳朴菽粟為文莫忘古雕幾作器漫求新寒衣飢食勞中婦耕九餘三厪主人咨爾後生勤數典更希寰宇普還淳施函漢語木筒也枯木荒山那計年虛中貯水借天然筒斫枯木為之因其自然虛中以受貯水釀酒皆宜既化無用為有用亦見尚質之意弗愁瓶罄為罍恥可佐樽盛用缶旋厨下風無慮落葉林邊雨尚憶鳴泉不材材際全其質善注南華二十篇拉哈漢語圬牆所綴麻也層層壞土砌為牆綴以漚麻色帶黃築土甃壞為牆壁綴麻下垂緣之以施圬墁亦國初朴素故俗也婦織男耕斯室處幼孳壯作舊風蘉底稱鑿遁顔家闔漫喻操嘻圬者王故俗公劉傳芮鞫九重此况慎毋忘霞綳漢語粳燈也摶粳塗梗傅之膏繼日相資夜作勞以蓬梗為幹摶榖粳和膏塗之燃以代燭用之作勞開國勤儉之風即此可見土障葛燈應憶朴駝頭鳯腦漫誇豪未知勤讀鄰鑿壁且佐服田宵索綯此日舊宮試燃者稱先何異土風撡豁山漢語紙也漚苧弗殊用敝麻以為紙乃朴無華搗敗苧故絮漚以為紙製朴而性堅猶存古初遺意不知有漢蔡倫合漫數上聲惟萊左伯嘉紀事傳言胥貴實銷金鋪玉那知奢卷筒金粟常臨帖藏金紙無摺痕者謂之卷筒較經背紙尤難得敢忘斯哉惕自嗟羅丹漢語鹿蹄踠骨也鹿踠骨非無用物以為戲亦有時需中原漫喻人人逐一具還看面面殊腕骨一具四面各異戲者持具四枚擲之各得一面則為四色全即以此分勝負偶語何須較土木采名乍欲擬梟盧帕格讀作哥漢語謂以薄圓石擊之也真足方投石可用從來如此乎周斐漢語樺皮房也野處穴居傳平聲易傳去聲樺皮為室鮮前聞樺皮厚盈寸取以為室覆可代瓦旁作牆壁户牖即以山中所産之木用之費不勞而工省乃我滿洲舊風無殊周室之陶復陶穴也風何而入雨何漏梅異其梁蘭異棼占吉簷頭鵲常報防寒墻角鼠還熏稱名則古惟淳朴却匪斐然周尚文周斐本滿洲語對音書之非取文義若如方觀承之書鄂博作峩軷引軷祭行路神之義曲為解乃失之鑿矣蓋滿文漢文音義各不同滿文漢文互譯則可取漢字以強合滿文則不可盛京土産雜詠十二首有序盛京山川渾厚土壤沃衍蓋扶輿旁礴鬱積之氣所鍾洵乎天府之國而佑啓我國家億萬年靈長之王業也是以地不愛寶百産之精咸粹於斯農殖蕃滋井里熙阜而且瓌珍可以耀采嘉珉可以興文豐毳可以章身壽苗可以夀世矧采於山獵於原漁於江不可勝食不可勝用稽古圖經志乘罕得而詳定余昔再蒞陪都頌揚光烈惟物産闕而未詠兹展謁珠丘三至此地念夫豳風之陳衣食生民之溯藝植撫百昌而昭大美亦述祖德者所不能忘也爰舉十二事各紀以詩且系之引具梗槩云五穀地脈厚則榖寶滋黍稷稻粱菽麥之類植無不宜畝獲數石而斗值三錢故百室盈而四釜充嵗以為常神臯五榖種皆宜后稷穡同有相之略異豳風躬耒耜兼精立政詰戎師髙原下隰秋常穫萬廩千倉嵗可期內地流民成土著胥吾赤子率聼平聲其盛京可耕之地甚多畿輔山左無業窮氓挈侣至者咸墾藝安居久之悉成土著日積日多雖於本地淳朴古風有礙然太平日久户口繁滋藉此以養無萬窮黎故向有禁之之例而未嘗嚴飭也東珠東珠出混同江及烏拉寧古塔諸河中勻圓瑩白大可半寸小者亦如菽顆王公等冠頂飾之以多少分等秩昭寶貴焉出蚌隂精稱自古大東育瑞未前聞混同鴨緑二江名圓流夥合浦交州獨産分取自珠軒供賦役採珠者乃打牲烏拉包衣下食糧人户合數人為一起謂之珠軒以四月乘舟往至八月回各以所得之珠納之於官如供賦然殊他蛋户效殷勤緯蕭亦識留名喻沽譽難更舊制云人參深山邃谷中參枝滋茁嵗産既饒世人往往珍為上藥蓋神臯鍾育厥草效靈亦王氣悠長之一徵耳奧壤靈區産草神三丫五葉邁常倫即今上黨成凡品自昔天公葆異珍昔陶𢎞景稱人參上黨者佳今惟遼陽吉林寧古塔諸山中所産者神效上黨之參直同凡卉矣氣補那分邪與正人參固能扶羸濟弱然余謂其助正氣即助邪火而人多思藉以資補每受其害而不悟亦足嗤矣口含可别偽和真文殊曰能活能殺冷笑迷而不悟人松花玉混同江産松花玉色淨緑細膩溫潤可中硯材發墨與端溪同品在歙坑之右長白分源天漢江混同江發源長白山國語曰松阿哩江松阿哩漢語天河也俗呼為松花江而金史乃有宋瓦江之稱皆音轉之訛耳方流瑞氣孕靈厖琢為硯佐文之煥較以品知歙可降起墨益毫功有獨匪奢用朴德無雙昨來偶製龍賓譜寶重三朝示萬邦近集內府所藏舊硯繪圖系説輯為西清硯譜而松花玉硯則擇其曾經望祖皇考題識及今所銘詠者入之貂烏拉諸山林中多有之索倫人以捕貂為恆業嵗有貢額第其等以行賞冬時供御用裘冠王公大臣亦服之以昭章采東瀛物産富難詳美毳尤稱貂鼠良食喜松皮和栗實色惟重黑乃輕黃貂以豐厚純黑者為上紫次之黃又次之毛潤澤而香則以喜食松栗之實故也蝨談被困蘇季子狗盜獻嗤齊孟嘗狐白那堪相比擬名裘黼黻佐朝章貂裘可作常服三品以上大臣及京堂翰詹官皆得用之若為端罩惟以供御餘則皇子諸王亦得用為朝祭之服鹿地多崇山茂林鹿蕃息而肥腯麋鹿尤他所罕覯扶餘之鹿所以稱美唐書也長白籼山夏育夥鹿以四五月遇雨生麛交以八九月攜麛就暖出林窠長白山崇地冷鹿以夏月山中避炎至秋冬乃成羣就暖向盛京圍埸而來取之無盡用不竭賜以有常受者羅將軍等冬日行圍所獲麅鹿山積擇其肥者以進嵗率千餘年節頒賜羣臣羅列充庭受者如拜割鮮之惠焉抱朴稱來經目少趙髙指處戒心多分明角解非同麈月令傳聞早定訛月令謂仲夏鹿角解仲冬麋角解今試之則木蘭之鹿與吉林之麋無不解角於五月已知月令之訛後見南苑所育之麈實於冬至始解爾蓋古人不辨麋與塵耳經文不可易因改正靈臺時憲並為鹿角解説以訂其誤熊羆盛京多窩集茂密蓊翳連林數十里熊罷每跧伏其中熊趫捷而羆憨猛皆獸之絶有力者甲戌行圍並曽殪之羆重千餘斤熊亦及半小者為熊大者羆羆惟東土始逢之熊各處皆有羆惟吉林盛京始有他處所無也蟄時居穴或居木熊羆冬令皆入蟄不食熊小或居木孔羆大則居穴也夢裏得祥必得兒力士刺須十始勝刺虎者不過五人一排向於盛京中使力士刺熊羆非十人不能勝蓋其力倍於虎也封駝負覺一難支獸哉何自解人語異苑徒傳子路竒堪達漢堪達漢出黑龍江似鹿而大其角可作射韘色如象牙而堅白勝之韘間環以黑章一線即角中之通理以點細密而勻正者為最音義率同爾雅爾雅釋獸鹿絶有力音義俱相近而字佩文韻未收今據廣韻用鹿中絶有力頎然垂胡因以樊纓比堪達漢國語馬樊纓也是獸項下懸肉相似因以得名戴角猶勝象決鐫履洳迅行如蹴雨逢岡遲進似騰煙是獸生山中而喜水行水則速行山則遲亦異聞也和闐玉韘夥新詠嘗命玉工仿角韘琢玉創為之及和闐嵗貢美玉每擇其精好者製為韘屢有題詠數典於斯未可捐海東青羽族之最鷙者有黑龍江之海東青焉身小而健其飛極髙能擒天鵝搏亦俊於鷹鶻鷙鳥從來有窟窠海東青窟鮮逢他鷹雕皆有窠巢多緣峭壁為之人不能上惟海東青從未見其寀也徒傳飛至滄瀛左亦自投於叢樾羅鶻骨雕周早輸健蠅營狗茍底須多禽中虎也却愁燕演雅名言可會麼輟耕録載演雅言海東青羽中虎也燕能制之羣集緣撲即墜云云以小制大物性往往如此亦猶腰黃啖虎之類也鱏鰉魚盛京之魚肥美甲天下而鱏鰉尤竒巨口細睛鼻端有角大者丈計重可三百斤冬日輦以充庖備賜亦有售於市肆者都人分鱠之目為珍品物巨其中目小者可知賦性必良馴即如雪象殊常獸自合江鰉異别鱗蹲岸釣難投美餌鑿冰射要繫長緡魚出黑龍等江非釣所能得捕之者以綱圍至岸邊伺魚首向岸挽強射之魚負痛一躍而上至陸地即易於掩取冬日或鑿冰以捕則必繫長繩於箭以掣取之頽然陳處欣兼惜倍勝椎牛饗衆人松子松子諸山皆産而窩集中所産更勝蓋林多千年之松髙率數百尺枝幹既茂故結實大而芳美亦足徵地氣滋培之厚也窩集林中各種松中生果者亦稀逢大雲遙望鋪一色寶塔近瞻湧幾重松子生松塔中其形下豐上鋭層辦鱗砌望之如窣堵每辦各藏一粒既熟則瓣開而子落鱗砌蚌含形磊落三稜五粒味甘濃偓佺曽遺去聲堯弗受小矣子房學步蹤溫普溫普國語譯漢音書之山中果也形似樝味甘而酢或借榅桲字書之考花木記以榅桲為梨别種則徒取音近固不相類耳山果還將山蜜浸去聲大於北地小於南關內山櫨大如彈子掣之可供殽核關外如熱河一帶之山櫨小不及半亦不中食盛京所産溫普大小介乎二者之間蜜漬之可以致逺實成露結而霜降味合梅酸與蔗甘可口已教述莊子狀形却覺漏嵇含地靈氣厚誠天府動植飛潛物普覃題永安橋向多沮洳盛京西百草里修道似隄盛京城西至廣寧向多沮洳行旅多艱築疊太祖初定瀋陽即命修道百二十里更建坦行永安彴太宗崇德六年又於此建永安橋自是坦行無阻遂教直接廣寧蹊當年師旅資撻伐此日農商受福禔有舉胥為奕世計經過惟亹繼繩兮廣寧途中對雪癸亥歸輿冬對雪今畨雪對季秋時可知關外偏饒冷且喜途中不負期近甸遙山遍皴染斜珠亂片正紛披此間宿麥原無種關外地氣較寒不似關內之布種秋麥無藉雨雪滋培而此時關外之雪在關內尚當作雨但未知畿輔各屬曽一律均霑否耳却為京畿繫逺思登澄海樓望海疊癸亥舊作韻包括乾坤轉復旋奫奫孰得測憑樓有興重斯日浮渤無邊逺接天誰見滄桑經變幻虛傳壺嶠隱神仙俯臨惟羡廓然量何以從容納百川登澄海樓再疊前韻題壁寰區實廣矣環以斯渤溟章亥己迷步河伯徒歎盈俯近無雙白望逺惟一青三登草五載所幸時均亨獨惜失妙迹仙班懷昔瀛癸亥年初登澄海樓張照梁詩正扈從聨句因命照書之壁間字勢雄秀雅與題稱今樓壁依然而妙迹已失用深惋悵照有瀛海仙班印撫今追昔不能不以之典懷耳永希弗揚波萬國朝皇清澄海樓聨句乾隆四十三年秋展謁祖陵蹕途出入俱由山海關回鑾因登澄海樓距甲戌之臨雖越二紀而登瀛勝槩憑覽依然因命于敏中梁國治再疊前韻聨句詩中禁體亦循曩例也御製歸墟日為納尾閭日為傾傾納兩無竭墟閭互相盈逺禆或仿佛邃古疇經營前巡閲二紀臣于敏中御製疊至臨層甍憑軒望蓬島回輿辭陪京壁惜張迹佚乾隆八年聨句詩命張照書壁神彩飛動足珍十九年重臨迹尚存今被俗人圬壁毁之實覺可惜所存惟汪由敦更書上石者耳碑撫汪體更界垠瓊閣竦聨藻標霞擎聲臚紫極動臣梁國治御製目迥青霄崢橫陳接雲宇直入餘石城秦時長城入海里餘俗稱四十里者偽也爾時如何築今域偕來并連山險寧恃聚米覘逾明遼矣廣軸振臣于敏中御製蒼然圓振噴雪白非晦釋名海晦也主引穢濁其水黑而晦斂日黃徒轟郝經詩忽憶黃河轟斂日朝夕信弗舛宗都量以成珠胎孕靈蚌金背騰橫鯨出素屑霜采臣梁國冶御製升旭輝若英地脈綿永劫隂火然恆晴樓臺氣吹蜃村舍居羅蜻用吕覽海上有好蜻者所居蜻至之事望秩昭蠁卜祠煥晶熒海之聖駕神並關後二日即樓旁命望祀北敕疆吏於度地興建宇祠景象倐紛集臣于敏中御製端倪自全呈東南坦崖塹西北拓安貞周環識體大噓吸通乾行摶風莊叟喻志怪齊諧評有經驗博物臣梁國冶御製惟錯徵含生尋仙鄙徐福運杼孰祖瑩北史祖瑩常語人曰文章須自出機杼三畨詠一韻可以命歸程往盛京恭謁祖陵禮畢回鑾進宫之作東臨故國仰前徽益切守成凛萬幾出警行行為入蹕秋陽冉冉變冬暉時已立冬六驄安吉適應稅兩月光隂迅若飛返必面今誰與面壽康徒自叩空幃詩乾隆四十五年庚子敬題重繪太祖實録戰圖八韻昊天有成命長白肇嘉徴二百實録內首蠔長白山約高里周圍約千里鴨緑混同愛滹三江所出初天降仙女於長白山東北布庫哩山下有神鵲銜朱果吞之成孕生男生而能言長成母告子曰天生汝令汝定亂可往彼處將所生緣由一一詳説乃與一舟順流而下言訖不見時長白山東南鄂謨輝三姓爭雄聞之往見果非常人異而詰之答曰我乃天女所生娃愛新覺羅天降我定汝等之亂衆皆驚異遂擁回三姓人息爭共奉為主以女妻之定號滿洲實我朝發祥之始也草創大東始規模方夏膺旅猶五百闕甲未十三增録內實載我蓋世太祖龍行虎步舉止威嚴心性忠實剛果武勇用兵如神初起止邊甲十三副兵不滿百克關偷城後攻納申完濟漢亦僅率兵四百諸部恩威並行順者以德服逆者以兵臨於是削平後攻克明國遼東諸城建都盛京帝業遂定圖逺先靖近捫創更鼓升實録內載攻翁鄂洛城時箭射太祖升屋督戰被賊箭中首透盈即以所拔之賊應弦而倒又被他賊中項鏃卷如鈎拔出衆見被傷欲扶回以手太祖恐敵知覺勿令近前項血湧出太祖揾箭眼拄弓從容下屋每恭讀涕動心其後兵力漸強太實録至此未嘗不流祖欲復先世之仇乃書七大恨告十天興兵親冒矢石授方略大破明師二餘萬於薩爾滸山遂因書七恨便以進千乘有戰無不克惟仁是用興艱難思祖德繼續勵孫承重繪傳奕世京時實録八册乃國家盛舊本敬貯乾清宫恐子孫不能盡見已命依式重繪二本以一本貯上書房一本恭送盛京尊藏傳之奕世以示我大清億萬年子孫毋忘暑山開創之艱難兹復命敬繪此册貯之避莊以便披閲永凜守成毋忘凛日兢欽定盛京通志卷十五
