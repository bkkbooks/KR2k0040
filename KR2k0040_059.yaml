body:
  text: 名宦三元欽定四庫全書欽定盛京通志卷五十五名宦三忠節附元穆呼哩䝉古人雄勇有謀與博爾濟博勒呼齊拉衮俱以忠勇事其主號為都爾本庫魯克猶華言四傑也太祖命穆呼哩為征遼東都總帥先是張鯨據金錦州自稱臨海王附於元元以鯨總北京十提領兵從多果朗南征鯨懷反側穆呼哩覺之令蕭額森監其軍至平州鯨稱疾逗遛不進額森執殺鯨鯨弟致憤其兄被害乃殺長史據錦州自稱瀛王改元興隆畧平灤瑞利義懿廣寜等州下之穆呼哩帥軍討致州郡復降致依險為阻穆呼哩欲設竒取之乃遣權帥烏頁爾等别攻溜石山堡且諭之曰汝等急攻賊必往援我出其不意斷賊歸路可一戰擒也又令䝉古布哈别屯永徳縣東伺之致聞溜石被圍果以兵救䝉古布哈遣騎扼其歸路且馳報穆呼哩中夜引軍急馳比曙抵神水與致遇而䝉古布哈兵亦會前後夾擊致遂奔潰抜開義縣進圍錦州致閉門拒守月餘其下縳之降穆呼哩殺致遼西平穆呼哩進位太師封魯國王卒諡忠武穆呼哩語解見名宦卷二原作木華黎國語博爾濟兩代奴也原作博爾术蒙古語博勒呼可也原作博爾忽齊拉衮石也原作赤老温都爾本四數也庫魯克超衆也原作掇里班曲律多果朗瘸也原作掇忽蘭額森平安也原作也先烏頁爾語解見名宦卷二原作吾也而布哈牤牛也原作不花今俱譯改史天祥燕之永清人太祖伐金署天祥都鎮撫平興州趙守玉敗金將達魯進克興中府從穆呼哩平錦州張致又㑹契丹漢軍擒闗肅復利州破尖山香爐紅螺塔山大蟲駱駝團崖諸塞即命天祥統錦州軍拔盖金蘇復等州遷鎮國上將軍利州節度使所部降民都總管達魯解見名宦卷二原作荅魯今譯改烏頁爾沙卜珠氏狀貌甚偉腰大十圍太祖五年烏頁爾與珠卜諾延克金東京有功九年從穆呼哩取北京先馳下之授北京總管都元帥留撫其人綏懷有方自京以南相繼降附趙守玉據興州烏頁爾討平之張致以錦州叛又攻破之太宗元年與薩里和爾濟征下遼東三年又與薩喇達征髙麗下十餘城髙麗請和送質帝大悦俾烏頁爾充北京東京廣寜盖州平州泰州開元府七路征行兵馬都元帥鎮撫東陲甚著威望烏頁爾語解見名宦卷二原作吾也而唐古特語沙卜珠字鈎也原作珊竹珠卜諾延蒙古語珠卜是非之是也諾延官長之稱原作折不郡演薩里和爾濟䝉古語薩里地弩也和爾濟執箭壺人也原作撒里火兒赤國語薩喇達執􅏛總領也原作撒里答今俱譯改懷閭公西域鄂勒歡人太祖時為瑞州達嚕噶齊民感其惠立徳政碑按元太祖時置達嚕噶齊監治郡縣瑞州即今寜逺州鄂勒歡國語解見吉林山川卷原作阿魯渾䝉古語逹嚕噶齊首領也原作達魯花赤今俱譯改胡秉彞霸州人為錦州知州初州民不業耕織秉彞編伊尹武侯耕田遺制及苗司農栽桑圖編行都部又於城東築濟民園種桑百餘畦聽民移植雖蔬菜果蓏栽植有方小民效法衣食饒足世祖至元中省部移檄東方和糴奉行不善秉彞令蓄積者聴自輸官民輦運赴倉侵魚遂息伊埒薩哈勒唐古鄂摩克氏世祖至元二十一年為北京宣慰使知諸王納延鎮遼東有異志請密備之二十三年立遼陽行省以伊埒薩哈勒為參知政事納延反帝自將征之伊埒薩哈勒掌運糧儲東方帝嘉其有先見且運糧有勞加左丞伊埒薩哈勒蒙古語伊埒顯顯也薩哈勒鬚也原作亦力撒合唐古鄂摩克俱見八旗姓譜原作亦兀烏密納延䝉古語解見黒龍江城池卷原作乃顔今俱譯改薩竒蘇回鶻人世祖時授北京宣撫鋤奸抑强遼東以寜會高麗有異志帝遣使究治則委罪於其臣洪察忽械送京師道出遼東薩竒蘇訪知洪察忽以直諫忤意即奏疏為直其事帝命釋之䝉古語薩竒蘇看守也原作撒吉思今譯改王居禮河東人世祖時知錦州勸學興農一以清心省事為本時境内嵗凶發倉賑濟全活甚衆有訟田不決者以情理開喻之其人相讓而退羅璧字仲玉鎮江人初為利州西路馬步軍副總管世祖至元十九年用丞相巴延言初通海運璧為運糧萬户進懷逺大將軍管遼瀋海運二十四年納顔叛璧以漕舟至遼陽浮海抵錦州小凌河至廣寜十寨諸軍賴以濟以功加昭勇大將軍巴延解見疆域形勝卷原作伯顔今譯改趙璧字寳仁雲中懷仁人世祖為親王知其名召見呼秀才而不名即位拜中書平章政事至元六年髙麗王植為其臣林衍所逐世祖命璧偕國主特訥克行以璧為中書左丞知東京等路行中書省事聚兵平壤璧議曰髙麗遷居江華島内恃其險故權臣無所畏忌擅逐其主今衍已死王實無罪若遣兵䕶歸復國於古京可以安兵息民策之上也帝從之時同行者分髙麗美人璧得三人皆還之師還遷中書右丞特訥克蒙古語解見黒龍江山川卷原作頭輦哥今譯改亷希憲字善甫博羅哈雅子也世祖至元十一年為北京行省平章時遼東多親王使者傳令㫖擾民官吏不能抗希憲至即為革正有西域人自稱駙馬營於城外縶富人誣其祖父嘗貸息錢索償甚急民訢之希憲命收捕之其人怒馬入省堂坐榻上希憲捽下跪而問曰法無私繫汝何人敢擅繫民其人惶懼國王亦為之請乃稍寛長公主入朝縱獵郊原擾民為甚希憲欲入奏公主請以鈔償民乃止自是貴人過者皆莫敢縱卒贈太傅追封魏國公後加贈太師恒陽王諡文正博囉解見奉天府山川卷䝉古語哈雅墻也原作布魯海牙今譯改洪福源髙麗麟州人其先中國人唐時遣才子八人往教髙麗即其一也子孫世貴於三韓名所居曰唐城嵗丙子金源契丹九萬餘衆竄入髙麗奪江東城池據之戊寅太祖命哈噶濟奇扎爾將兵追討福源父大宣迎降後髙麗之衆降而復叛刼大宣以東福源獨以所招集北界之衆來歸處於遼瀋之間帝嘉其忠賜金符為歸附髙麗軍民府總管屢有戰功後以高麗族子綧隂欲併統本國歸順民人譖之遂見殺後贈嘉議大夫瀋陽侯諡忠憲哈噶濟竒扎爾蒙古語哈噶濟堵也竒扎爾邊疆也原作哈赤吉扎喇今譯改姚樞字公茂本栁城人後遷居洛陽世祖至元二十年為遼東按察使武平縣民劉謐訟其嫂與所私同殺其兄成縣尹丁欽以成屍無傷憂懣不食妻韓問之欽語其故妻曰恐頂𩕄有釘塗其迹耳驗之果然獄定上讞公召欽詢之欽矜妻之能具以告公曰若妻處子耶曰再醮令有司開其前夫棺毒與成類併正其辜時比之包孝肅云來阿巴齊寜夏人征川蜀屢立戰功世祖至元二十一年同僉宣徽院事以遼左不寜授征東招討使招徠降附期以自新逺近帖然其子寄僧為碩逹勒逹屯田總管府達嚕噶齊納延叛戰于髙麗雙城調萬安軍達嚕噶齊來阿巴齊蒙古語阿巴齊圍場人也原作來阿八赤碩逹勒逹解見建置沿革卷原作水逹逹今俱譯改唐仁祖字夀卿輝和爾人世祖至元二十八年授翰林學士承㫖遼陽饑奉㫖往賑同事者欲如户籍口數大小給之仁祖曰昔籍小口今已大矣可皆給以大口之數同事者議其要名仁祖曰吾知為國恤民而已卒以大口給之輝和爾回部名原作畏兀今譯改烏赫高麗王族人王綧之子也授髙麗軍民總管東征左副都元帥世祖至元二十四年納延叛力戰屢捷復從伊嚕勒諾延討塔布台托歡大王於蒙克山那江統兵五千餘衆與巴喇噶齊托歡相拒遇於黒龍江絶流而戰箭中左臂忍傷復戰敵大敗二十五年從征哈坦圖嚕討降賊黨有功加授昭武大將軍遼陽等處行中書省事屢却哈坦兵世祖嘉其功賜玉帶二十九年改東征左副都元帥府立總管髙麗軍民漢軍萬户府以烏赫充職兼瀋陽安撫使髙麗軍民府總管烏赫國語解見疆域形勝卷原作兀愛伊嚕勒諾延蒙古語伊嚕勒愿心也諾延解見名宦卷二原作月魯兒郡演塔布五數也台有也托歡釡也原作塔不多朶歡䝉克原作蒙可巴喇噶齊托歡蒙古語巴喇哈齊管理什物人也原作八喇哈赤脱歡哈坦圖嚕蒙古語哈坦性暴也圖嚕頭目也原作哈丹秃魯今俱譯改逹春蒙古札拉爾氏初授東京等路總管府達嚕噶齊以亷勤進開元等路宣慰東京行中書右丞遼東道宣慰使納延叛力戰却之軍懿州州人羅拜道傍泣曰非公吾屬無遺種矣至遼西討擒餘黨禁止俘掠復領軍討哈坦帝嘉其功賜珍珠上服拜遼陽等處行中書省平章政事國語達春捷也原作塔出扎拉爾八旗姓原作扎喇兒哈坦蒙古語解見本卷前原作哈丹今譯改洪俊竒福源第二子幼以驍勇受知世祖中統二年雪父寃世祖憫之諭曰汝父誤絓刑章故於已廢之中庸沛維新之澤可襲父職管領歸附髙麗軍民總管世祖至元六年高麗權臣林衍叛俊竒從國王特訥克討平之歴遼陽尚書省右丞二十六年納顔叛從駕親征有功授遼陽等處行尚書省右丞以疾辭叛王哈坦等竄入髙麗遼陽二千里皆騷動特起俊奇鎮遼左賜金字圓符許便宜行事子萬襲職為髙麗軍民總管至元中從其父征納顔屢有戰功又從諸王奈曼阿雅噶齊與叛王戰於烏珠站黑龍江等處屢敗之累功授龍虎衛上將軍遼陽等處行中書省右丞柰曼部名䝉古語柰曼八數也阿雅噶齊執碗人也原作乃蠻愛牙哈赤烏珠國語解見吉林山川卷原作兀术今譯改洪君祥福源第五子初從世祖征納顔有功嘗類次車駕起居為東征録至元二十八年授遼陽行省右丞成宗大徳十年復任遼陽行省左丞奏請新省治増巡兵設儒學提舉官都鎮撫等員以興文化修武備武宗即位徵為同知樞宻院事歴遼陽行省平章政事劉敏中字端甫章邱人成宗大徳七年分遣宣撫使巡行諸道敏中出使遼東山北諸郡守令恃貴倖暴横者一繩以法錦州雨水為災輒發廪賑之官至翰林學士承㫖有中菴集二十五卷行世卒贈光禄大夫柱國追封齊國公諡文簡尉遲徳誠字信甫絳州人仁宗延祐二年拜遼東道肅政亷訪使上疏言事其畧曰勞諸王以懷其心防出入以嚴宫禁立諫官以逺讒佞崇科舉以求人材置常平以備荒年汰僧道以寛民力舉賢良以勵忠孝抑奢侈以厚風俗及拯鈔法裁冗員等事未報而卒王伯勝霸州文安人仁宗時為遼東行省平章政事遼陽省治懿州州敝陋民未知學伯勝始至為増郡學弟子員選賢師以教之使客至無所舎乃擇隙地為館廐度地百頃募民耕種以供廪焉嵗大旱伯勝齊戒以禱禱畢即雨人謂之平章雨延祐二年召為大都留守遼陽民狀其行事言於中書乞留伯勝不報民涕泣去卒贈太保封薊國公諡忠敏賀惟一里貫未詳官遼陽行省左丞相糴粟以給京師處置有法所致甚多民不見擾王忱字允中趙州寜晉人性明敏有才識趙璧引見裕宗於潛邸奉㫖授山北遼東道提刑按察司副使駙馬博和哩數獵民田忱以法繩之憲吏耿熙言徵北京宣慰司逋負計可得鈔二十萬錠裕宗遣使覈實熙懼事露壇增制語有并打算大小一切諸衙門等事十二字追繫官吏至數百人忱驗知其詐熙乃服罪博和哩國語解見吉林山川卷原作伯忽里今譯改張昇字伯髙其先定州人後徙平州泰定帝二年任遼東道亷訪使屬永平大水民多損瘠昇請發海道糧十八萬石鈔五萬緡以賑且蠲其嵗賦民得全活者衆李之英字允達山東鄒縣人嘗從曹元用受易從吳澄受春秋尚書從陳繹魯受詩禮河圖而就正於虞集泰定三年為遼左儒學學正士庶宗之有門生病而其家皆逺去者之英就視療治尋愈積習頓除王結易州定興人性敏悟從董樸受經深於性命之學憲使王仁見之曰公輔器也泰定帝元年拜遼陽行省參知政事遼東大水穀價翔湧結請於朝發粟數萬石賑之結平生非聖賢之書不讀非仁義之言不談晚邃於易著易書一卷及卒公卿唁於朝士大夫弔於家曰正人亡矣卒贈資政大夫追封太原郡公諡文忠有詩文十五卷行於世郭嘉字元禮濮陽人泰定三年進士為廣寜路總管時盜起軍興民苦轉輸吏胥因縁作奸嘉設法計户口第甲乙民甚便之募義兵數千教以坐作進退齊號令信賞罰東方諸郡糧富兵足惟嘉為最既而遼陽陷孤城無援嘉竭私財犒軍中義勇者誓以死守頃之賊至大呼城下曰遼陽已失何不降嘉一矢斃之賊稍引退遂開西門逐賊賊大至嘉力戰死贈太原郡公諡忠烈多爾濟䝉古人穆呼哩六世孫托克托子也幼備宿衛喜讀書於古君臣忠君愛民之道多所究心文宗二年襲國王位扈蹕上都詔便道至遼陽之國順帝至元四年奈曼台以賂故得為國王除多爾濟遼陽行省左丞相以安靜為治民用不擾境内綏寜後遷河南行省右丞相為政一如在遼陽時至正七年拜右丞相九年復為國王之國遼陽唐古特語多爾濟金剛也原作朶兒只䝉古語托克托定也原作脱脱柰曼台解俱見前原作乃蠻台今俱譯改胡巨源河東榆次人登進士第任髙麗軍民總管儒學教授多著述興學勸勵生徒蔚然著有文望達爾瑪高昌人累官刑部尚書順帝元統初陞遼陽行省參知政事髙麗使過遼陽謁省官各奉布四疋書一幅用征東省印封之達爾瑪詰曰印以署牘何為封私書況汝出國時我尚在京未為遼陽省官何得有書遺我得非詐耶遂還其書與布梵語達爾瑪法也原作答里麻今譯改太平字允中賀仁傑之孫勝之子也順帝至正十五年除遼陽行省左丞相糴粟以給京師處置有法輸多而民不擾吕震字伯起東平人至正十九年為懿州路總管後賊衆闗先生等陷遼陽行省震率郡兵逆戰死之贈震河南行省左丞追封東平郡公諡忠憲忠節附額森呼圖克名均字公秉太平子順帝至正十九年羣盜由開平府屯遼陽詔均往討至則遣將抜懿州省治盜渡遼河東奔額森解見本卷前呼圖克解見選舉卷原作也先忽都今譯改多爾濟巴勒字惟中穆呼哩七世孫順帝至正中為遼陽行省至官詢民疾苦知鄉民負販入城貴室公府皆强買之僅酬半價又編栁為斗大小不一市儈得髙下其手民咸病之即令有司勵防禁齊稱量於是貨物畢集而價自平恤孤老平錢法汰胥吏慎勾稽興廢墜明賞罰百司聞風震悚多爾濟解見本卷前唐古特語巴勒威也原作朶爾直班今譯改伊蘇䝉古人至正初賊陷大寜詔伊蘇討之遂抜大寜既而雷特穆爾布哈程思忠等陷永平伊蘇復灤州擒雷特穆爾布哈程思忠棄陣遁去詔拜伊蘇遼陽行省左丞相開省永平時金復海蓋賊並起西侵興中州隂由海道趨永平聞伊蘇開省乃轉攻大寜為守將王聚所敗伊蘇於是分命官屬勞來安輯使民什伍相保以事耕種民為立石頌之伊蘇䝉古語見黒龍江山川卷原作也速雷特穆爾布哈蒙古語特穆爾鐵也布哈解見本卷前原作雷帖木兒不花今譯改趙洙里貫未詳至正間為遼陽儒學提舉紅巾賊陷遼陽洙與妻許氏避資善寺賊至不屈厲聲叱之遂見殺許氏慟哭仆地罵不絶口亦遇害賊退寺僧收其夫婦屍合塟之忠節附欽定盛京通志卷五十五
