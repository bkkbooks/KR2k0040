body:
  text: 欽定四庫全書欽定盛京通志卷一聖製一太祖髙皇帝訓諭欽定四庫全書欽定盛京通志卷一聖製一臣等謹按古帝王經綸草昧肇造艱難至於大統光昭淳化翔洽乃追述王業之所由興作歌陳誡曰篤不忘是以始都之區典冊尤重我國家誕膺景命肇基東土式擴鴻圖以光四表洪維開國締造之初規模宏逺洎夫統一寰宇聖聖相承文教覃敷制作大備伏讀太祖太宗聖訓心事光明詞義正大與天地同量與日月齊光洵乎聰睿神武天縱聖人開國家萬年有道之基粵自世祖章皇帝躬集大勳恢宏前烈眷念邠岐舊業王迹所興典誥煌煌大文丕著逮聖祖仁皇帝躬勤法駕三詣陪都溯生民肇祀之初宅鎬遷豐之盛鋪鴻藻信景鑠方策所布拱若球圖我世宗憲皇帝紹聞衣德纍洽重熙以關左為龍興重地訓詞經畫深切周詳與列祖詒謨同垂法則佑啓萬年臣等敬謹裒集繕録卷首以昭我朝聖謨懿鑠世德作求之盛云欽定四庫全書欽定盛京通志卷一聖製一太祖髙皇帝訓諭已亥二月上欲以蒙古字製為國語頒行額爾德尼等以未能更製辭上曰漢人讀漢文凡習漢字與未習漢字者皆知之蒙古人讀䝉古文雖未習䝉古字者亦皆知之今我國之語必譯為䝉古語讀之則未習䝉古語者不能知也如何以我國之語製字為難反以習他國之語為易耶額爾德尼等對曰以我國語製字最善但更製之法臣等未明故難耳上曰無難也但以䝉古字合我國之語音聨綴成句即可因文見義矣吾籌此已悉爾等試書之何為不可於是上心獨斷將䝉古字製為國語創立滿文頒行國中滿文傳布自此始乙卯十一月上出獵時雪初霽恐草木之上浮雪霑濡乃襭其衣侍衛布揚古等見而私語曰上何所不有惜此衣耶上聞之笑曰吾豈為無衣而惜之但徒被霑濡無益且與其使此衣霑濡於雪何如留此鮮潔者賜汝等吾躬行節儉微物必惜正欲俾汝等效法耳天命三年戊午四月壬寅上既以七大恨告天興師征明臨行諭諸貝勒大臣曰此兵吾非樂舉也實因七大恨其餘小忿不可殫述凌迫已甚用是興師凡俘獲之人勿去衣服勿淫婦女勿離異其匹偶拒戰而死者聽其死若歸順者慎勿輕加誅戮遂親統師進圍明撫順城並以書諭遊擊李永芳曰爾明發兵疆外衛助葉赫我乃興師而來汝撫順所一遊擊耳縱戰亦必不勝今諭汝以降汝降則我兵不入城汝之士卒皆得安全若我入城則男婦老弱必致驚潰亦大不利于汝矣勿謂朕虛聲恐嚇而不信也汝思區區一城吾不能下何用興師為哉失此勿圖悔無及已其城中大小官吏兵民等獻城來降者保其父母妻子以及親族俱無離散豈不甚善降不降汝熟計之母不忍一時之忿違朕言致僨事失機也永芳受書納欵乃撫輯所下各臺堡徙城中人口以歸天命四年己未三月甲申朔明經略楊鎬總兵杜松劉綎李如柏馬林等督兵二十萬分四路來侵辰刻我國西路偵卒以明兵出撫順關馳告而南路偵卒又以明兵進棟鄂境馳告上曰明兵之來信矣我國南路駐防之兵有五百人其南路兵來即以此拒之明使我先見南路有兵者誘我兵而南也其由撫順所西來者必大兵也急宜拒戰破此則他路兵不足患矣即於辰刻發兵大貝勒代善先行諸貝勒續至界藩見我國築城夫役及兵四百據吉林崖時杜松結營薩爾滸山而自引兵仰攻我兵四大貝勒等議曰吉林崖巔有防衛夫役之兵四百人急增千人助之俾登山馳下衝擊而以右翼四旗兵夾攻之其薩爾滸山之兵則以左翼四旗兵備禦焉兵既往上至問破敵䇿四大貝勒以前議告上曰日暮矣且從汝等今分右翼四旗之二與左四旗兵合破薩爾滸山所駐兵此兵破則界藩之衆自喪膽矣再令右二旗兵遙望界藩明兵俟我軍自吉林崖馳下衝擊時并力以戰於是合六旗兵進攻薩爾滸山不移時大破之而所遣助吉林崖之軍自山馳下右二旗軍渡河夾擊界藩山麓明兵又大破之又破馬林兵於尚間崖又破劉綎兵於阿布達哩岡李如柏遁去天命四年己未四月丙辰上諭諸臣曰今戰馬羸瘠須牧以青草俾之壯宜於近邊之界屯田築城界藩設兵守禦以衛農人於是上西行示築城基址擇曠土以牧馬焉天命四年己未六月辛酉上既克開原城諭貝勒諸臣曰吾等勿回都城築城界藩治屋廬以居牧馬邊境勿渡渾河何如貝勒諸臣議曰不如還都近水草息馬濃陰之下浴之飼之馬乃速壯且使士卒歸家繕治兵仗便上曰此非爾所知也今六月盛夏行兵已二十日矣若還都二三日乃至軍士由都至各路屯寨又須三四日炎蒸之時復經逺涉馬何由壯耶吾居界藩牧馬於此至八月又可興師矣遂駐蹕界藩令軍士盡牧馬於邊天命五年庚申六月庚戌上曰凡有下情欲訴者恐不得上聞可樹二木於門外其有欲訴之言書而懸之於木俾朕覽其辭晰其顛末而按問焉由是事無巨細悉得上達天命六年辛酉正月甲申上率四大貝勒及台吉德格類濟爾哈朗阿濟格嶽託等對天地焚香祝曰天父也地母也今以暴國肆虐奉命徂征其烏拉輝發哈達葉赫同一語音之國已䝉垂祐悉以授豫既而征明又得撫順清河開原鐵嶺諸城及明四路來侵盡殱其衆無非天地之默相也吾所禱於皇天后土者吾子孫中縱有不善之人俾勿同氣推刃開戕害之端其不善之人惟天誅之若不俟天誅存心戕害天地鑒之奪其算無克永年或於昆弟之中有所行悖亂者不忍傷殘以義理所在殷勤教誡感格愚頑使自悔悟天地其眷顧之神祇其呵護之願我子孫祚永百世以及萬年用兹䖍告尚其無咎既往鑒乃來兹天命六年辛酉閏二月癸未築薩爾滸城工竣上念築城夫役良苦今犒以牛羣臣奏曰與其取諸公家何若征明以所獲牛畜給之上御殿集貝勒諸臣曰朕以人君無野處之理故築城以居夫君賢而后有國國治而后有君貝勒良而後有民民安而后有貝勒故天作之君恩養其下而下敬其上禮也至於諸貝勒宜愛其民民宜尊其貝勒即一家之中為主者宜恤其僕為僕者宜敬其主如其僕以力耕所穫供其主而不敢私其主積有財物亦贍其僕而無所吝如此則上下相親天心悅人情和無往不善矣夫築城所用木石豈出於築城之地耶鑿石於山採木於林長路轉運既已疲矣況又版築興作其勞益甚今爾等吝惜已財乃為此言不知征明原以伸大義奉天而行若為築城犒夫之故而略取其牛甚不可也言方競適有副都統博爾晉後至上問曰汝適安在徒步來耶何喘息不寧也博爾晉對曰自築城所來上曰爾輕身行憊如是彼挽運興築之夫寧不勞乎遂計夫役賜牛併以食鹽給之天命六年辛酉三月癸亥上集貝勒諸臣議曰天既眷我授以遼陽今將移居此城耶抑仍還我國耶貝勒諸臣俱以還國對上曰國之所重在土地人民今還師則遼陽一城敵且復至據而固守周遭百姓必將逃匿山谷不復為我有矣舍已得之疆土而還後必復煩征討非計之得也且此地乃明及朝鮮䝉古接壤要害之區天既與我即宜居之貝勒諸臣皆曰善遂定議遷都迎后妃諸皇子天命六年辛酉七月壬寅上以克取遼東御殿召集羣臣大陳筵宴上親舉金巵遍賜以酒又各賜衣一襲衆臣欣承寵賚皆叩首謝上諭之曰明之國最大也尚以為不足而欲并人之國故喪其師明之土最廣也尚以為不足而欲奪人之土故喪其地此皆天厭明祐我也賴爾諸臣攻戰之力仰承天眷故朕及爾等得至此地酒一巵衣一襲為物幾何豈足酬勞哉但念爾諸臣宣力疆場勤勞王事兹集殿廷用伸歡敘以見朕心嘉悅而已天命七年壬戌三月己亥上集貝勒大臣議曰我國家承天眷佑遂有遼東之地但今遼陽城大年久傾圮東南有朝鮮北有䝉古二國俱未弭帖若舍此征明恐貽內顧憂必更築堅城分兵守禦庶得固我根本乘時征討也貝勒大臣諫曰舍見居之城郭室廬更為創建毋乃勞民耶上曰今既與明搆兵豈能即圖安逸汝等所惜者一時小勞苦耳朕所慮者大也苟惜一時之勞何以成將來逺大之業耶朕欲令降附之民築城而廬舍各自營建如此雖暫勞亦永逸已貝勒大臣皆曰善遂築城於遼陽城東五里太子河邊創建宫室遷居之名曰東京天命九年甲子四月甲申上以遼陽既定建都東京奉移景祖顯祖諸陵安葬於東京之楊魯山設太牢焚楮幣上詣二祖陵奠酒行禮祝曰吾征明復祖父讐已得遼東廣寧祇移寢園永安斯土惟我祖考仰達天地垂福佑焉天命十年乙丑三月己酉上欲遷都瀋陽貝勒諸臣以嵗荒食匱諫阻上不許曰瀋陽形勝之地西征明由都爾弼渡遼河路直且近北征䝉古二三日可至南征朝鮮可由清河路以進且於渾河蘇克素護河之上流伐木順流下以之治宫室為薪不可勝用也時而出獵山近獸多河中水族亦可捕而取之朕籌此熟矣汝等寧不計及耶欽定盛京通志卷一
