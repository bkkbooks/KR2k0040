body:
  text: 田賦二奉天各屬官莊官園官泡附吉林各屬官莊黑龍江各屬官莊奉天各屬旗地吉林各屬旗地黑龍江各屬旗地各屬税課各項雜税欽定四庫全書欽定盛京通志卷三十八田賦二奉天屬官莊盛京附本城居住官莊一處膠泥河居住官莊一處離城二十五里四臺子居住官莊一處離城四十里翟家堡居住官莊一處離城四十五里竹山堡居住官莊二處離城五十里王網堡居住官莊二處離城五十里潘家臺居住官莊三處離城六十里章義站居住官莊一處離城七十里俱在城西鑲黄旗界才羅堡居住官莊一處離城四十五里在城北正黄旗界大楊家湖居住官莊一處離城六十里新臺子居住官莊二處離城八十里俱在城北鑲白旗界鐵匠屯居住官莊一處離城十五里在城南正紅旗界馬鬃屯居住官莊一處離城十五里火石橋居住官莊一處離城三十里各珍堡居住官莊一處離城三十里韓城堡居住官莊一處離城四十里俱在城南鑲紅旗界張官屯居住官莊一處離城十里在城南正藍旗界熊家岡子居住官莊一處離城二十里李官堡居住官莊一處離城二十五里沙嶺居住官莊一處離城四十里俱在城西鑲藍旗界興京附城居住官莊四處俱在鑲藍旗界和木哩居住官莊二處離城三十里木竒哩居住官莊二處離城四十里古魯居住官莊三處離城一百里營盤居住官莊一處離城一百二十五里俱在鑲白旗界達嚕里居住官莊一處離城三十里斡琿鄂謨居住官莊四處離城一百三十里俱在鑲紅旗界興京屬撫順城歐家屯居住官莊一處離城五里在鑲紅旗界二臺子居住官莊一處離城十里魚鱗舖居住官莊一處離城十里俱在鑲藍旗界遼陽州大堡居住官莊二處離城五十里俱在鑲黄旗界大東山堡居住官莊四處離城五十里廣山屯居住官莊二處離城五十里小東山居住官莊一處離城五十里大于仲堡居住官莊一處離城六十里楊家灣居住官莊一處離城六十里十里河居住官莊一處離城六十里四方臺居住官莊一處離城八十里古城子居住官莊二處離城八十里三臺子居住官莊一處離城九十里張家庄子居住官莊一處離城九十里俱在正黄旗界迎水寺居住官莊二處離城十里施官屯居住官莊一處離城四十里俱在正白旗界徐工堡居住官莊二處離城四十里夾河居住官莊二處離城十里俱在鑲白旗界營盤居住官莊二處離城十五里小營盤居住官莊一處離城十五里野老鸛灘居住官莊二處離城十五里岳家堡居住官莊一處離城十五里小紙房居住官莊一處離城十五里大紙房居住官莊一處離城十五里髙雁牆居住官莊三處離城十五里河工堡居住官莊二處離城三十里康家堡居住官莊一處離城三十五里夏家堡居住官莊一處離城四十里俱在正紅旗界平州居住官莊一處離城四十里在鑲紅旗界小屯子居住官莊三處離城三十里俱在正藍旗小糯米庄居住官莊一處離城十里梨花峪居住官莊一處離城三十里俱在鑲藍旗界牛莊城二臺子居住官莊一處離城十里三臺子居住官莊一處離城十五里鵪鶉堡居住官莊一處離城三十里俱在正黄旗界海城縣北闗外居住官莊一處離城四十里王七官屯居住官莊一處離城三十里散水坨居住官莊四處離城三十里俱在鑲白旗界大甘歌舖居住官莊一處離城十里沙河沿居住官莊一處離城十里俱在正紅旗界盖平縣沙河子居住官莊二處離城五里莫羅里居住官莊二處離城五里齊家務居住官莊一處離城五里茶棚菴居住官莊一處離城五里俱在正黄旗界鐡嶺縣黄貝堡居住官莊三處離城八十里俱在鑲黄旗界城南舖居住官莊一處離城三十里徐家湖居住官莊一處離城五十里八里庄居住官莊一處離城六十里俱在鑲白旗界馮備禦堡居住官莊七處離城七十里孤家子居住官莊一處離城八十里俱在正藍旗界廣寧縣東髙臺子居住官莊二處離城二百一十里俱在正黄旗界舊養息牧門居住官莊一處離城二百二十里陳檀木居住官莊一處離城二百八十里俱在正白旗界阿拉河古城子居住官莊一處離城一百八十里在白旗堡界以上官莊共一百一十六處俱𨽻盛京户部管理原額設官莊領催六名乾隆十二年侍郎藴著奏准添設拜唐阿領催一名専管拜唐阿鹽丁盛京户部原額設莊頭一百二十六名雍正八年奏准名數並分别等第頭等報糧莊頭十二名每名報糧三百八十二石二等報糧莊頭二十名每名報糧三百五十二石三等報糧莊頭三十七名每名報糧三百零七石四等報糧莊頭四十九名每名報糧一百九十二石共報糧莊頭一百十八名報糧三萬二千三百九十一石内除現在折交解運通州豆四千八百八十五石二斗又除人夫柴薪蓆片木炭箕箒木掀等項共折糧一萬零一百三十七石八斗通計折價銀二千二百三十兩零二錢一分六釐按年交庫仍存留糧五十石以備折給供應太廟三陵嵗時祭祀及過往差役需用鷄鵝鴨蛋紫花檾麻綿麻羊草青草蘇麥油柴燒酒豆石各項匠役口糧等用每年實應交倉糧一萬二千零六十八石盛京户部所屬棉花莊五處頭等報棉花莊頭五名每名報棉花七百觔共報棉花三千五百觔按年全數交庫盛京户部所屬鹽莊三處頭等報鹽莊頭三名每名報鹽一萬二千觔共鹽三萬六千觔拜唐阿鹽丁等共交鹽一萬四千觔二共額交鹽五萬觔存留鹽一千七百七十一觔以備三陵嵗祭及長白山北海祭祀熬白鹽之用每年實應交倉鹽四萬八千觔零壯丁二千二百五十一名拜唐阿鹽丁五百零二名莊頭壯丁等共承領官地四萬八千三百三十日零五分應徴米石草豆于乾隆四十二年侍郎喀爾崇義奏准改行折徴銀四百五十二兩一錢零五釐按年徴收交庫莊頭壯丁承