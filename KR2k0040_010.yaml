body:
  text: 欽定四庫全書欽定盛京通志卷六聖製六世宗憲皇帝御製文勅諭欽定四庫全書欽定盛京通志卷六聖製六世宗憲皇帝御製文勅諭諭領侍衛内大臣等雍正元年六月二十九日奉天地方乃我國家啓祥之所甚屬𦂳要朕前詣奉天聞地方人言論悉知兵丁差役煩多不能休息之處曾降諭㫖令將軍唐保住將無用塘哨悉行撤退唐保住雖將無用塘哨撤退而將軍副都統於定額親隨兵丁之外多帶百餘人省城官員又各帶其子弟因而屬員效尤各多帶兵丁以致應差乏人兵丁仍多勞苦又於鎗手中以選擇熟練之人為名每城調取二三十人田獵夫省城相隔遥逺往返人馬俱疲再自山海闗以至廣寧皇莊頭三百有奇止交筆帖式領催等微末人員駐劄中後所催徴錢糧辦理事務以致交結匪類糶賣官糧漁利入己且自中前所至錦州義州廣寧等處相隔二三百里詞訟案内干連之莊頭地方官調取抗不赴審即使到案亦抗不遵行以致案内遵行之人每多苦累再人命案件呈報地方官之後雖相距數百里亦必俟筆帖式領催檢驗炎暑日久難以憑信則百方檢驗慘不可言朕之所聞如此從前雖每年派卿員前往管轄莊頭因不實心辦理於地方並無禆益應遣大臣一員駐劄於寧逺錦州大凌河等處地方令其料理一應公務管轄里長獵户遇有詞訟事件會同地方官審結此所遣員官應令駐劄何處著領侍衛内大臣等兵部總管公同詳議具奏諭工部雍正二年十一月十四日盛京陵寢所需物料典禮攸闗理應敬謹允禩等議稱陵寢所用紅土折銀發往彼處採買可省脚價此特允禩存心隂險欲加朕以輕陵工而重財物之名也此議不可准行所用紅土著仍在京採買好者運送應用如有不肖官員串通部員不將紅土領運折銀携往本處採買定行重治其罪諭盛京將軍等雍正三年四月十二口邇來盛京諸事隳廢風俗日流日下朕前祭陵時見盛京城内酒肆幾及千家平素但以演戲飲酒為事稍有能幹者俱於人參内謀利官員等亦不以公務為事衙門内行走者甚少其聚㑹往來不過彼此相請食酒肉嬉戲而已司官竟有終年不一至衙門者堂官亦置若罔聞坐臺之人看守邊口俱係闗東人伊等雖有押送罪人之差而當兵者全無當兵之實為官者亦無為官之道朕深知此等陋習雖降諭㫖數次竟不悛改因將將軍大臣内不及者革退另簡爾等補授爾等雖係新任但能留心細訪即便知之應將盛京陋習極力整飭令其悛改復還滿洲舊日儉樸風俗勤學騎射武藝若有惡亂之人即加重處以儆其餘將軍大臣其欽遵朕㫖與下屬官員同心協力各自黽勉力改從前陋習再盛京地方乃本朝創業之地闗係甚重爾等將聚集惡亂之人不時稽查應逐去者作速逐出境外大臣等若仍相推諉不實心効力朕訪聞治罪之時勿復怨悔諭吏部兵部刑部雍正五年三月二十六日盛京人員習氣澆薄營謀鑽刺朋比侵盜甚是無恥屢加教誡終不悛改皆縁犯法參革究治之後仍在本地居住往往生事滋擾誘人為非無所不至此等敗類若不即令遷移望風俗之歸於淳厚終不可得嗣後盛京居住滿洲䝉古漢軍文武官員除因公詿誤獲罪者仍許本地方居住外其犯侵盜虧欠錢糧及姦貪訛詐之事降革者酌其所犯事由或令來京歸旗或著於各省滿洲駐防之處安揷如此則不肖之徒漸少而盛京澆薄之習可息爾三部嗣後凡遇盛京人員犯罪案件俱照此定擬仍將從前盛京旗員所犯侵盜錢糧姦貪訛詐等案内廢員查明奏聞諭兵部雍正七年八月十二日盛京旅順地方雖設有水師官兵而俱不能諳練水師事務若無教習之員恐其有名無實著福建水師提督藍廷珍於千總内揀選數員於兵丁内揀選數名熟諳水師者令赴盛京交與該將軍令其教習旅順水師官兵其由福建起身之時著該督撫照資助送往浙江湖廣弁兵之例給與盤費諭户部雍正七年九月三十日據奉天將軍多索禮奏稱今歲盛京秋成大稔禾稼𤓰菜等項俱獲豐收米糧價賤朕思米榖者乃上天恩賜以養育萬民者也若人人存心敬受天賜隨時撙節常留有餘崇儉去奢謹身節用則天心必垂黙佑雨暘時若俾受享盈寧之奉若暴殄天物輕棄五榖不思稼穡之可寳罔念農事之艱難則必上干天怒而水旱災祲之事皆所不免此從來天道人事之斷然不爽者奉天地方百榖順成已八年於兹矣令歲收成又慶豐稔榖價之賤自昔罕聞朕心深為慰悅感戴上天賜佑之恩則本地官民人等宜敬謹愛惜以仰承天賜向來奉天居民有以米榖飼養豚豕之陋習此即暴殄天物之一端已令地方官勸諭禁止不可因米榖饒餘復蹈前轍積貯乃王政之要圖民生之切務奉天地氣乾燥不比南方潮濕之區正當乗此豐收之時以為儲蓄之計著該地方官員通行曉諭勸導所屬民人若有榖之家果能留心積貯至於榖多價賤難於出糶者著大臣官員等即行奏聞朕當發官價糴買或從海道運至京師俾積榖之實獲利益必不使有榖賤傷農之嘆也諭内閣雍正七年十一月三十日奉天地畝向來多有隠匿每有三四畝報一畝者是以槩以上則徴科民力輸將甚為寛裕後因有隠匿積弊民間互相爭競紛紛訐訟官民不便前歲朕遣大臣官員清丈漸次釐正田畝皆得實數今若按畝俱照舊則徴糧恐小民輸將無力著盛京户部侍郎會同奉天府府尹確查田畝之肥瘠分别上中下三則起科酌定成額永著為令諭内閣雍正八年三月初三日向來朕聞福陵前面水法稍更故道祗以未得精通地理之人未敢輕議上年福建總督高其倬陛見來京伊素精堪輿之學特命率同主事管志寧等前往奉天敬謹相度據奏陵前水法因夏日溢口而流太近左畔山脚弓抱之勢微覺外張應即行修理石工俾循故道則水抱沙圓益増吉慶等語朕覽高其倬等奏摺及所繪圖様甚為明晣惟是祖陵工程闗係重大著將奏摺圖様發與滿漢文武大臣等公同閲看將應否修理之處敬謹定議具奏諭内閣雍正九年二月初八日據稽察寧古塔地方監察御史鄂昌奏稱原任奉天府永吉州知州杜薰因失察造印紙牌革職永吉州士民等紛紛具呈保留輿情廹切懇請代奏等語向來紳衿士庶保留本地官員者大半出於賄囑要結之私情而非愛戴攀轅之公道若允從其請則相率效尤弊端種種必為吏治民風之累是以屢頒諭㫖槩行禁止今覽御史鄂昌所奏朕思永吉州乃極邊之地人情質樸非内地可比况邊逺新設之缺况味蕭然官斯土者無可繫戀而民情若此則保留自出公心應當加恩於格外即該牧失察紙牌亦非不可寛宥之條著將杜薰仍留永吉州之任若居官果優俟三年之後著該府尹題請開復諭内閣雍正九年十二月十五日據奉天府府尹楊超曽奏稱臣查奉天各屬從前一切公務類皆取給於里下總計一歲之科派多於正額之錢糧如遇奏銷丁地驛站大造編審人丁大計考察官吏等項自臣衙門家人書吏以至治中知府州縣衙門均有陋規銀兩名為造册使費歲考科試生童自府丞治中知府州縣衙門俱有陋規銀兩名為考費至大小官員到任則攤派修理衙署舖設器用銀兩查㸃保甲換給門牌印捕等官則攤派紙張飯食銀兩以上諸項各州縣每項約攤派銀數十兩至百餘兩不等上司衙門既取給於州縣州縣復取給於百姓更有衙蠧里書從中指一派十侵收包攬弊竇多端臣訪聞之後即嚴飭各屬勒碑永禁并令嗣後如有上司衙門官吏索取前項陋規務使徹底澄清不許絲毫派累等語從來地方科派陋規甚為擾累該府尹楊超曽通行查禁辦理甚是但恐相沿已久官吏人等尚有陽奉隂違者又恐日久法弛將來接任之員或有仍襲從前之陋習者用是將楊超曽所奏宣示於外令奉天官吏人等永逺遵行以除積弊以恵閭閻諭内閣雍正九年十二月二十一日福陵紅門前大路與寳城甚近車馬俱由山根左畔行走有闗風水著行文奉天將軍府尹嗣後於渾河東南西南無闗風水之處設立船隻以渡行人紅門前大路及山根左畔嚴行禁止行走再渾河以北凡係風水之地所有草木不許擅動至遷移房屋禁止耕種地畝著賞給房價補還地畝諭内閣雍正十年六月十六日從前應行發遣黑龍江等處罪犯曾改發札克拜達哩克等處令其開墾耕種後因伊等在彼甚不得力是以停其改發仍令照前發遣黑龍江三姓等地方上年賊人窺伺札克拜達哩克時彼地所有罪人跟隨官兵守䕶城垣竭力捍禦甚屬可憫朕以加恩除其罪名令充緑旗兵丁入伍効力續據順承親王等奏稱伊等深知感戴朕恩共思黽勉可見有罪之人予以自新之路可以望其改惡從善若發往黑龍江三姓諸處不過終身為人奴僕而已朕意嗣後將發往黑龍江等處人犯改發於北路軍營附近可耕之地令其開墾効力在伊身可以努力自新而於屯種亦屬有益其如何遣發安置之處爾等詳議具奏諭内閣雍正十三年五月初八日三姓八姓渾春地方兵丁每年只支給餉銀十二兩著照寧古塔吉林烏拉等處兵丁之例給與二十四兩全分餉銀諭内閣雍正十三年六月二十九日朕聞奉天地方凡事闗旗民者俱送盛京刑部會審雖司員㑹同有司承審實皆司員主稿乃奉天司員積成陋習惟事威嚴一切人犯到案先將鎻鍊盤於地上令其膝跪謂之跪鎻繼以荆條互擊其背任意敲打謂之背花鞭又案無定限如上年八月間遼陽州民郭金美毆死旗人裴玉亨一案白晝毆傷更餘隕命當日旗員及知州會驗任聴屍親串同仵作混報多傷且傷痕寛長逾格承審司員不即禀駁亦不揆情度理惟執定傷痕刑夾供認草率定擬本年閏四月内葛森到任始駁令另行驗審相距已十餘月尚未定案又筆帖式皆本處生長之人所司者不過繙譯之事乃當審訊之時輒亦列坐詰問此皆朕訪聞甚確者國家定例訊鞫人犯必須審問情實其應用刑訊者自有一定規條今奉天司員承審人犯一經到案不察虗實便以刑罰相加且於定例之外創為跪鎻等項此從來所未聞者似此嚴刑重罰其中豈無寃濫至於筆帖式微員職司繙譯並無審刑之責乃公然列坐審詰命案有乖體制以上二事著嚴行禁止儻再蹈從前陋習經朕察出定將該堂官及司員等一併嚴加議處至辦理事件自有限期而人命等案闗係尤重若無定限則拖累牽連之弊不可勝數嗣後應如何定以限期俾得永逺遵行之處著盛京刑部侍郎會同該將軍悉心定議具奏欽定盛京通志卷六
