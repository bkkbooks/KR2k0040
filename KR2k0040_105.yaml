body:
  text: 古蹟二錦州府境內郡縣古蹟錦縣寧逺州廣寧縣義州欽定四庫全書欽定盛京通志卷一百一古蹟二錦州府境內郡縣古蹟錦縣古錦州即今州治秦置遼西郡晋永嘉中慕容皓始置西樂郡遼史地理志錦州臨海軍本漢遼東無慮縣地太祖以漢俘建州統州一嚴州保肅軍縣二曰永樂安昌金史地理志舊𨽻興中府縣三永樂安昌神水元時以錦州興中義瑞髙利惠川建九州并屬大寧路明廢以其地設衛今郡城為中左二屯衛地軍案金史志云興中府本唐營州遼霸州彰武重熙十一年升為府更名縣四興中為府治永德即遼安德州化平軍興城遼嚴州保肅軍宜民遼川州長寧軍元仍改為州今在錦州境外土默特界至錦縣一百六十里前志誤載今特為辨證附識錦州下開州在城東北五十里土人稱為古開州城時案遼金元三史此地倛無開州名或亦唐舊址建州在錦縣西北一百餘里遼史地理志建州係靜軍唐武德中置昌樂縣太祖完葺故壘置川州在靈州之南屢遭水害聖宗遷於唐崇州故城治永霸縣金史地理志建州保靖軍遼初名武寧後更金因之縣一永霸本唐昌黎縣地元廢軍屬大寧洛明為邉外地按此係遼之建興京州若金時建州在今建州故城今亦在土默特界已詳見前卷又按界因其境壤毗連遼時𨽻中京道故附識於此永樂故縣今錦縣治遼置為錦州治地理志云本慕容皓西樂縣地金因之元省縣入州安昌故縣在錦州西遼志屬錦州金因之元省今城西九十里有古安昌縣之永和村城基東有一塔塔下有金大定間碑即其故址又縣西五十里有古虹螺縣考遼金元三史無此名惟唐書唐平髙麗置縣百或係其遺址徒河故縣在錦縣西北相傳虞舜時已有此城劉恕外紀周惠王三十三年齊桓公救燕破屠河即徒河也漢置縣屬遼西郡後漢安帝時改屬遼東屬國都尉魏晋省入昌黎郡界後慕容氏復置太康十年慕容廆遷於徒河之青山元康四年移居棘城魏書地理志真君八年併徒河屬廣興縣通典徒河青山在營州郡城東一百九十里明一統志徒河城在廣寧中屯衛境內神水故縣在錦縣西北遼史地理志本漢徒河縣地開泰二年置神水縣屬中京大定府金屬錦州皇統三年發為鎮大定二十九年復升為縣元廢舊志城北有溜石山堡金末元將穆呼哩以張致地險兵精欲設竒取之遣兵急攻溜石山堡而使别將屯永德西十里致馳救溜石永德軍遣騎斷其歸路穆呼哩馳至神水與致遇永德軍亦致敗走錦州遂下穆呼哩見名宦卷二原作木華黎今譯改永德故縣在錦縣西北遼史地理志統和八年析西霸城東南龍山徒河境置安德縣初屬乾州更屬霸州尋置安德州化平軍於此金廢州大定七年改縣曰永德屬興中府元廢舊志永德城西北去神水城五十餘里東北去興中城百里謹案錦州境內秦漢以來為遼西郡前漢書遼西郡統且慮海陽新安平柳城令支肥如賔從交黎陽樂狐蘇徒河文成臨渝絫共十四縣後漢遼西郡統陽樂海陽令支肥如臨渝五城自渤海契丹相繼建置郡縣洎乎金元互有更易遼史所志沿革多附會穿鑿如以顯州為渤海顯德府遼州為唐遼城之類舛謬不可枚舉且考之輿圖兩漢所置諸縣今或有在錦州邊外喀喇泌科爾沁土默特諸部界者或有在直𨽻永平熱河界者悉當按其方隅詳加釐正至前史淆誤及名同地異者援引羣書確求徵信俾厯代分合之蹟瞭然可指而古今疆域之不同亦因之類見焉寧逺州柳城郡秦置縣屬遼西郡漢書地理志遼西郡栁城縣西部都尉治十六國春秋慕容皓以桞城之北龍山之南福德之地也使楊裕築龍城搆宫廟改桞城為龍城縣九年遷都龍城十二年號新宫曰和龍宫魏書地形志營州治和龍城大延二年為鎮真君八年并桞城屬焉隋書地理志遼西郡舊置營州開皇初置總管府改龍城縣為龍山十八年改為桞城大業初府廢置郡舊唐書地理志武德元年改為營州總管府七年改為都督萬嵗通天二年為契丹李萬榮所陷神龍元年移府於幽州界開元四年復移還桞城八年又往就漁陽十一年又還桞城舊治天寶元年改為桞城郡乾元元年復為營州領桞城一縣室韋靺並在東北逺者六千里近者二千里西北與奚接界北與契丹接界寰宇記營州南至大海三百四十里北至秦長城二百七十里至契丹界湟水四百里西南至平州七百里遼史地理志中京道興中府本漢桞城縣地唐營州都督府後為奚所據太祖平奚乃完葺桞城號霸州彰武軍重熙十年升興中府治興中縣金因之元至元七年降為興中府屬大寧路案營州本古孤竹國新唐書地理志營州西北百里曰松陘嶺其西奚其東契丹距營州北四百里至湟水營州東百八十里至燕郡城又經汝羅守捉渡遼水至安東都護府五百里府故漢襄平城也東南至平壤城八百里西南至都里海口六百里西至建安城三百里故中郭縣也南至鴨緑江北泊灼城七百里故安平縣也自都護府東北經古蓋牟新城又經渤縣長嶺府千五百里至渤海王城城臨輝罕海其西南三千里古肅慎城其北經德理鎮至南黑水靺千里據此可見唐時營州境壤遼濶錦州僅營州東境耳又按土默特右翼西有桞城據此似不應以桞城入錦州郡古蹟但隋唐時桞城郡所𨽻甚廣寧逺實為桞城郡地是不得以故城在外遂缺而不志也和州在寧逺州北一百二十里元史地理志初置和州屬大寧路至元五年併入利州為永和鄉今按利州遼統和十六年置因之在今邉門口外瑞州在寧逺州西南一百三十里唐貞觀十年以烏突汗逹干部落置威州於營州境後改瑞州又置來逺縣為州治後廢遼史本紀太平元年于來逺縣地置來州歸德軍領隰潤二州治來賔縣金天德三年改為宗州明昌六年改縣曰宗安泰和六年以避諱謂本唐瑞州地復改瑞州領縣曰瑞安海陽海濵元省縣入州明洪武二十二年改置廣寧前屯衛西至山海關六十里南至海二十里北至邉二十五里西北至大寧衛三百七十里城周五里有竒門三本朝康熙二年併入寧逺州興城故縣在寧逺州南遼史地理志本漢海陽縣地聖宗置嚴州保肅軍治興城縣屬錦州金皇統三年州廢以縣屬興中府元省全遼志興城縣在寧逺城南四十里海中覺華島考金史縣有桃花島今州南十五里海中桃花島上故地猶存按遼志謂本漢海陽縣地今考漢海陽唐時為馬城縣遼改置望都縣在今直𨽻永平府界不在此也海濵故縣在寧逺州西南前屯衛城西本慕容皓所置集寧縣地遼史地理志聖宗置隰州平海軍又置海濵縣為州治金初封遼主天祚為海濵侯皇統三年州廢以縣屬瑞州元省明初置山海關東遞運所明一統志海濵廢縣在廣寧前屯衛西八十里按遼志隰州所領為海陽潤州所領為海濵金志則謂潤州所統者海陽隰州所統者海濵二史志互異據松漠紀聞潤州西去平州一百四十里以道里計之當在舊榆關東今山海關西全遼志載海陽縣在前屯城西一百十里其地亦在山海關西明一統志亦以海濵縣為隰州治當從金志為是廣寧縣顯州今廣寧縣治漢置縣屬遼東郡為西部都尉治後漢屬遼東屬國元初二年遼東鮮卑圍無慮又陽嘉初鮮卑冦遼東屬國耿曄屯無慮城以拒之晋省唐置巫閭守捉城遼史地理志顯州奉先軍世宗置以奉顯陵顯陵者東丹人皇王墓也治奉先縣兼領山東縣今改山東縣曰廣寧為廣寧府治金史地理志廣寧鎮寧軍天輔七年升為府天㑹八年改軍名鎮寧許元宗奉使行程録自錦州八十里至劉家莊自劉家莊一百里至顯州遼東行部志廣寧本陽羅郡渤海顯德府遼世宗改顯州元省縣入廣寧府明置衛案金史廣寧府本遼顯州不言遷置然金志謂所治之廣寧縣本遼山東縣又御塞行程録云自廣寧府東行三十里至顯州蓋今縣城即遼山東縣金為廣寧府及廣寧縣其顯州奉先縣當在京縣東南又考渤海顯德府在渤海上京之南吉林南境遼史及遼東行部志皆謂顯州本顯德府地誤又案顯州即漢撫慮縣地漢書顔師古注云無慮即所謂醫巫閭也又案遼置嘉州嘉平軍康州統率賔縣皆𨽻顯州故址無考乾州在廣寧縣境遼史地理志乾州廣德軍本漢無慮縣地聖宗統和三年以奉景宗乾陵置奉陵縣為州治領海北一州延昌靈山司農三縣金史地理志天㑹八年廢州更縣名曰閭陽屬廣寧府遼東行部志閭陽乾州也去廣陵五里北盟㑹編離顯州七里别建乾州以奉陵寢元初廢縣立千戶所至元十五年以戶口繁多復立行千戶所後復為閭陽縣元一統志乾州故城在廣寧府西南七里遼統和二年置今基址頽然明初縣廢置閭陽驛于此明一統志乾州在廣寧衛西南七里閭陽城在廣寧衛西南五十五里舊志閭陽在城西南五十里周圍二百五十步並詳城池卷二按遼史乾州既以奉陵縣為州似不應有城恐明一統志誤遼州在廣寧縣東北遼置縣遼史地理志遼州始平軍縣二遼濵定安金史地理志皇統三年廢遼州以縣屬瀋陽元時縣亦廢明一統志在瀋陽衛西北一百八十里今在遼河西岸有遼濵塔為承德廣寧交界地平按遼史地理志遼州本佛寧國地渤海為東府唐太宗征髙麗拔遼城髙宗詔程名振蘇定方討髙麗至新城皆此地也太祖代渤海先破東平府遷民實之改為州軍曰東平太宗更為始平軍今考之唐書粟未靺鞨居最南稍東北曰汩泏部益東曰拂涅部其地距今承德廣寧甚逺遼史以遼州有東平軍之名遂謂即渤海東平府又因州名為遼遂謂即唐時遼城新城皆誤唐之遼城即遼東城新城又在其東北遼史混合為一非也况程名振等攻新城引還在髙宗永徽六年安得貞觀時李績既拔而其後復攻之錯謬顯然又案遼史志云遼州有遼河羊腸河錐子河蛇山狼山黑山巾子山今考羊腸河在廣寧縣城東四十五里錐子河在廣寧城東北四十里即珠子河也遼河亦經廣寧縣東北二百三十里蛇山一在廣寧城東三十里一在東北九十五里狼山在廣寧城東北二十里今名狼虎山黑山在廣寧城東北八十里又有西黑山在城東北七十五里大黑山在城東七十里小黑山在城東六十里則遼河實在今廣寧東境也又案橫州漢故遼陽地遼置在州西北九十里懿州在廣寧縣東北境外遼史地理志太平三年置曰懿慶軍更為廣順軍清寧七年為寧昌軍領寧昌順安二縣遼東行部志懿州吉遼西郡即栁城之域金初𨽻咸平府泰和末改屬北京路領順安靈山二縣元一統志豪州本遼時懿州金皇統三年省入順安縣後復置元初為懿州路至元六年降為東京支郡并省縣入州明初置廣寧後屯衛於此永樂八年徙衛治義州遂廢為界外站道八按遼史志在顯州東北二百里西北至上京百里明一統志廢懿州在廣寧衛北二百二十里又寧昌廢縣在懿州北二十里遼置為懿州治金徙州治以寧昌併入順安又靈山廢縣在懿州西金置元省又按遼史有兩懿山一載東京道一載上京道據史云初更廣順軍𨽻上京其實一州也第此懿州云本越國公主而上京又稱聖宗女長公主為小異考聖宗女為越國公主燕長主則聖宗之姑也史必有一誤又按史州舊志謂在廣寧衛北二百二十里以里數置之應在邉外但考元方輿勝覽云懿州轄順安靈山徽州同昌四縣州境有羊腸河則兼廣寧縣境地也閭州在廣寧縣東北遼史地理志州近醫巫閭山在遼州西一百三十里西北至上京九百五十里又有順州在顯州東北一百二十里西北至上京九百里亦遼置金皆廢案遼志謂順州本遼隊縣地誤壕州在廣寧縣東北遼置遼史地理志在顯州東北二百二十里西北至上京七百二十里又渭州髙陽軍遼駙馬都尉蕭昌裔建在顯州東北二百五十里原州在東北三百里皆遼置金俱廢原案遼志謂壕州本漢西安平縣州本漢北安平縣皆誤川州在廣寧縣西北本唐青山州北遼㑹同三年詔置白川州天祿五年去白字曰川州遼史地理志中京道川州長寧軍太祖弟明王安瑞置領𢎞理咸康宜民三縣金史地理志大定六年廢川州為宜民縣屬懿州承安二年復置川州泰和四年仍罷州屬大寧路明初廢金遼志大寧路明初廢全遼志川州城在廣寧城西北一百二十里方輿紀要川州有東西二城東川州遼所置也西南去義州衛一百五十里西川州金所置至南義州衛九十里又有徽州城在川州西金承安二年以徽川寨為徽川縣屬川州泰和四年州廢縣亦罷案川州故城在今䝉古土默特界似廣寧縣下不應載入但全遼志既云在廣寧城西北一百二十里而舊志據方輿紀要又有東西二城之說姑附志於此以備參考麓州遼史地理志麓州渤海置而按唐書通考渤海無此州名遼史載其名不詳其地又遼乾州所屬之司農縣本渤海麓郡縣併麓波雲川二縣入焉亦未詳渤海所𨽻之州今附於此乾川為漢無慮縣地因醫巫閭得名或麓州麓郡亦因附北鎮之麓而名歟房縣故縣在廣寧縣東南漢置屬遼東郡後漢屬遼東屬國晋省案水經大遼水自襄平縣又東南過房縣西今考後漢分置遼東屬國别領六城其昌黎賓從徙河三縣皆舊屬遼無慮雖屬遼東亦在遼水之西不應分縣獨在遼水之東如果在遼水之東則去遼東郡治甚近且輿安市平郭接壤何以獨析𨽻所國耶蓋房與險潰皆遼水西濵河海之地水經西字乃東字之訛舊志以房縣入海城古蹟恐誤險瀆故縣在廣寧縣東南漢置縣屬遼東郡應劭曰縣依水險故曰險瀆後漢屬遼東屬國晋省書按遼史以集州為漢險瀆縣非是地以後漢考之似應在京廣寧東南濵海之望平故縣在廣寧縣東北漢置縣屬遼東郡後漢因之晋屬元菟郡後廢金大定二十九年復升梁漁務置縣屬廣寧府元史地理志至元十五年改為望平軍民千戶所後復為縣明初廢明一統志望平廢縣在廣寧衛東北一百五十里按水經注大邊水自塞外東流直遼東之望平縣西漢縣蓋在遼河之東故晋初改屬元菟郡金縣在河西非漢故縣也遼金二志又謂山東縣本漢望平亦誤歸義故縣在廣寧縣東北世按遼史初置顯州渤海民自來助後宗嘉憫籍其戶置屬顯州金省鍾秀故縣在廣寧縣西南遼奉先縣地金天㑹八年改置鍾秀縣屬廣寧府後廢尋復置元至元六年省入望平縣明一統志鍾秀城在廣寧衛西南五里本遼奉先縣金置元省入閭陽縣後置千戶所舊志鍾秀城在廣寧城西南三里周二里有竒按明一統志謂元省鍾秀閭陽與元史省入望平之文互異以道里揆之望平逺而閭陽近似閭陽為是苐志說無確據且此城去廣寧僅三五里既非倚郭不當如此逼近疑金秀本在廣寧之東故元時併入望平此城乃後人傳訛非故縣也古通定鎮在廣寧縣東一百八十里舊志髙麗於遼水西置軍以警察渡遼者謂之武厲邏隋大業八年伐髙麗惟得遼水西武厲邏之地置遼東郡及通定鎮而已九年詔修遼東古城以貯軍糧即所置遼東之郡城以仍舊名亦曰古城也唐貞觀十九年伐髙麗李世績自通定濟遼水趨元菟即此義州宜州今義州治遼史地理志宜州崇義軍東丹王每於秋畋於興中以定州俘戶建州有墳山松柏連亘百餘里又世宗置𢎞政縣為州治在今州東北二十五里金天德三年改名義州移今治元省縣入州元史地理志大寧路有義州明洪武二十二年置義州衛及廣寧後屯衛於此從按遼史以宜州本漢遼西絫縣地新舊志並之今考水經注濡水至絫縣碣石山入海文頴曰碣石在遼西絫縣并屬臨渝水即今灤當灤河臨渝古渝關也漢絫縣應在今灤州樂亭間河入海處不在宜州也今以義州即絫縣者恐誤又按遼初置以州興化軍後廢州以其屬縣改𨽻義州又按遼史志上京慶州富義縣本義州太宗遷渤海義州民於此重熙元年降義豐縣後更名又云上京永州義豐縣本鐡利府義州重熙元年廢州改今縣在州西北一百里又嘗改富義縣屬慶州以今考之富義義豐當係渤海義州縣名遼徙其名分屬慶永二州非渤海故地乃史載富義義豐兩縣既云遷義州民於此雖仍舊民已非故地又云本渤海義州何自矛盾若此合遼金兩史考之似渤海義州之民分徙兩縣故地已空興宗時方以定州俘戶實之遂以義為宜宜與義音同字異金時改正以明渤海之舊正非漫然耳遼西州在義州東遼史地理志本漢遼西郡地世宗置遼西州阜成軍統長慶縣屬顯州統和八年以諸宫提轄司人戶置金廢為遼西鎮屬鍾秀縣全遼志遼西鎮在義州城東四十里開義故縣在義州東四十里遼史地理志世宗以所俘漢户置海北州廣化軍治開義縣初𨽻宜州後屬乾州金皇統三年廢州以縣屬義州元廢按遼史海北州在閭山之西南海之北考之五代史晋出帝過平州出榆關行七八日至錦州又行五六曰過海北州至東丹王墓則州境似在今廣寧界同昌故縣在義州北遼置初曰長慶軍𨽻上京後改成州興化軍領同昌一縣𨽻中京金州廢縣屬川州大定六年以縣屬懿州承安二年復屬川州泰和四年改屬義州遼史地理志在宜州北一百六十里古饒慶鎮在義州西五十里金置𨽻義州開義縣舊有廢城周一里舊志云俗訛為饒慶縣慶按元方輿勝覽云金崇義軍𢎞政開義饒三縣是金已改鎮為縣原志未詳考耳謹案義州等境為秦時遼西郡地元史地理志大寧路漢為新安平縣唐為營州所屬置饒樂都督府遼為中京大定府統州十縣九金因之元初為北京路總管府中統三年移興州及松山縣屬上都路至元五年併和州入利州為永州為永和鄉七年興中府降為州仍𨽻北京改北京為大寧路二十五年改為武平路後復為大寧路領司縣七州九是按之厯代輿圖大寧本為遼西地明初割錦義建利諸州屬遼東而於古㑹州大寧之地設北平行都司領二十餘衛洪武十四年封寧王於此二十二年分烏梁海原作兀良哈為諾延䝉古語解見名宦卷二原作朵顔福餘泰寧三衛設指揮同知逮建文時燕王首襲大寧及召烏梁海諸部落從行遂以大寧畀烏梁海由全寧抵喜峯曰諾延衛由錦義厯廣寧至遼河曰泰寧衛由黃泥窪踰瀋陽鐵嶺至開原曰扶餘衛自大寧併入三衛而遼地右境明時遂不𨽻版籍所有大寧古蹟大清一統志列入外藩本志亦例不臚載特以大寧本屬遼西境壤故附識其源流於卷欽定盛京通志卷一百一
