body:
  text: 祠祀三吉林各屬吉林寧古塔白都訥三姓阿勒楚喀打牲烏拉拉林黑龍江各屬齊齊哈爾黑爾根黑龍江呼倫布雨爾呼蘭欽定盛京通志卷九十八欽定四庫全書欽定盛京通志卷九十九祠祀三吉林各屬吉林先農壇在小東門外一里正殿三楹壇髙三尺濶二丈四尺雍正十年建社稷壇在小東門外先農壇側雍正十年建風雲雷雨山川壇在小東門外雍正十年建城隍廟在城內將軍署東前殿三楹東西配廡三楹大門三楹土地祠一間共十八間長白山望祭殿在城西南溫德亨山正殿五楹祭器樓二楹牌樓二座雍正十一年建向長白山望祭每歲致祭北海於混同江邊望祭松花江神廟在城小東門外北江邊正殿五楹大門三楹東西門各一牌樓二座乾隆敕建四十五年關帝廟有三一在城小東門外正殿三楹後建關帝三代殿三楹左右配廡各八楹鐘鼓樓各一大門二楹春秋致祭一在城北門外北頂山距城二里正殿三楹禪房三楹乾隆十九年皇上駕幸吉林匾額恭懸正殿又一在城西二百四十御書靈著豳岐里大孤山殿宇三楹八蠟廟在城內東南隅俗稱蟲王廟正殿三楹配廡大門共六楹三義廟在城內正街路北正殿三楹配廡兩楹祖師廟在城大東門內路南正殿六楹配廡各六楹大門二楹茶棚菴在城內將軍署前西街殿宇門廡各一楹文昌閣在城內東南隅魁星樓一座大門三楹知州杜薰建財神廟在城內西街路北正殿三楹配廡各三楹大門三楹藥王廟在城內西街殿廡各三楹三官廟在城內東北隅正殿三楹配廡三楹功德院在城內東北隅前殿三楹後殿五楹東西配房三楹大門三楹天齊廟在城大東門外正殿三楹配廡各六楹內地藏廟四楹鐘鼓樓各一大門三楹龍王廟在城小東門外正殿三楹配房三楹門宇四楹觀音寺在城東門外十二里龍潭山上正殿三楹東向祭祀房三楹禪室三楹乾隆十九年皇上駕幸吉林匾額恭懸正殿御書福祐大東百吉菴在城東門外殿宇共六楹西方寺在城西門外正殿三楹東西配廡各三楹耳房答三楹大門三楹又彌勒殿一楹鐘鼓樓各一大門三楹火神廟在城西門外正殿三楹東西配廡各三楹大門三楹山神廟在城西門外正殿三楹配廡各三楹大門三楹馬神廟在城西門外西南距城三里正殿三楹配廡各五楹大門三楹喜慶寺在城西九里歡喜嶺正殿三楹耳房大門共四楹九天元女廟在城西三百里小孤山真武廟在城北天元嶺距城二里正殿三楹耳房三楹寧古塔城隍廟在城外東南隅距城一里正殿三楹東西配廡各三楹大門一楹嘉蔭侯廟金大定中册上京諸林為嘉蔭侯立廟後廢今其地大木欉然皆數百年物也廟址無存關帝廟有三一在城外正西距城里許正殿三楹配廡各五楹大門三楹鐘鼓樓各一一在城外東南隅距城三里正殿三楹三代殿三楹大門三楹院左有文昌祠正殿三楹右有馬神廟正殿三楹一在城西南距城十里正殿三楹配廡各五楹大門三楹山神廟在城西里許正殿三楹東西配廡各五楹大門一楹地藏寺一在城西門外三里正殿三楹一在城外東北隅距城二里殿宇三楹觀音閣在城西門外三里正殿三楹大門三楹茶棚庵在城南門外殿宇四楹古佛寺在城外東南隅距城里許土地寺在城外東南隅距城里許正殿一楹山神廟在城外東南隅距城一里正殿三楹東西配廡各五楹大門三楹藥王廟在城外東南隅距城一里正殿三楹東西配廡各三楹大門三楹七聖祠在城外東南隅距城一里正殿三楹東西配廡各三楹大門三楹三官廟在城外東北隅距城里許正殿三楹東西配廡各五楹大門三楹娘娘廟在城外東北隅距城里許正殿三楹東西配廡各五楹大門三楹天齊廟在城外東北隅距城一里正殿三楹東西配廡各五楹大門三楹祖師廟在城外東北隅距城一里正殿三楹大山門三楹財神廟在城外東北隅距城一里正殿三楹東西配廡各五楹大門三楹龍王火神廟在城外西北隅距城半里正殿三楹東西廊房各五楹山門三楹白都訥社稷壇在南門外雍正十年長寧縣知縣郭涵奉文建風雲雷雨山川壇在南門外雍正十年長寧縣知縣郭涵奉文建先農壇在南門外雍正五年建城隍廟在城內西南隅正殿三楹旁廡三楹大門三楹雍正六年建藥王廟在城內東南隅正殿三楹東西配廡各三楹大門六楹真武廟在城內西北隅正殿三楹東西配廡各三楹大門一楹旁有山神廟一座正殿三楹娘娘廟在城南距城一里正殿三楹西廡三楹山門一楹關帝廟在城外東南河上距城一里正殿三楹東西配廡各三楹山門三楹鐘鼓樓各一康熙四年建祖師廟在城外東南隅距城一里正殿三楹大門一楹龍王廟在城外東南隅距城一里正殿三楹大門一楹石佛寺在城外舊東京城東南隅相傳金時慈聖太后所建石佛髙二大餘後石首墜有石工人欲鑿為碾甫舉錘頭涔涔痛置之是夕里人同感異夢於是舉石首湊法像冶鐵固之即故址建剎至今香火甚盛觀音寺在吉林峰下三姓馬神廟在城內西北隅正殿三楹山門三楹旁有城隍廟一座正殿三楹東西配廡各三楹關帝廟有二一在城內西北隅正殿三楹東西配廡各五楹大門三楹鐘鼓樓各一一在南門外正殿三楹東西配廡各五楹鐘鼓樓各一龍王廟在城北四里正殿三楹東西配廡各三楹大門三楹鐘樓一三皇廟在城外西南隅距城三里正殿三楹東西配廡各三楹大門三楹鐘鼓樓各一娘娘廟在城外東北隅距城五里正殿三楹西廡三楹大門一楹財神廟在城外西北隅近城正殿三楹東西配廡各五楹大門三楹鐘鼓樓各一火神廟在城外西北隅正殿三楹東西配廡各三楹大門三楹阿勒楚喀城隍廟在城內西北隅正殿三楹東西配廡各三楹大門三楹龍王廟在城內東北隅正殿三楹