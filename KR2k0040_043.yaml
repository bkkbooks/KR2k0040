body:
  text: 職官一盛京官制各属將軍所属員額盛京五部員額巡察御史員額内務府各司員額奉天府属州縣員額錦州府属州縣員額欽定四庫全書欽定盛京通志卷三十九職官一臣等謹案設官分職所以佐治宣猷我國家肇造東陲始有六部八旗之設洎乎永清大定以盛京為發祥重地立將軍五部暨鎮守防禦等員治理詳明班聫載備聖聖相承以時損益文武並用庶績咸熈臣等詳稽各属員額及厯任姓氏謹志職官第十七欽定四庫全書欽定盛京通志卷三十九職官一盛京官制太宗文皇帝時始定官制設六部部有承政如尚書有叅政如侍郎其八旗官守各有分屬世祖章皇帝撫有中夏定都燕京順治元年悉裁諸舊制以内大臣一員副都統二員及毎旗駐防章京留守瀋陽三年改駐防大臣為昂邦章京給鎮守總管印戸禮刑工四曹悉𨽻留守之昂邦章京掌焉十年以遼陽為府設知府教授置遼陽海城二縣又於寕古塔設昂邦章京副都統鎮守之十三年設遼陽府經厯十四年省遼陽府以瀋陽為奉天府置府尹改教授為奉天府教授旋設訓導後裁十五年始復設禮部置侍郎十六年復設戸部工部皆置侍郎與其官属十八年以府尹兼理學政康熈元年復設刑部置侍郎改奉天昂邦章京為鎮守遼東等處將軍寧古塔昻邦章京為鎮守寧古塔等處將軍三年以故廣寧衛地為廣寧府設知府通判教授經厯領錦縣廣寧縣寧逺州是年置奉天府府丞治中通判又添設承徳盖平開原鐡嶺四縣改遼陽縣為州四年改鎮守遼東將軍為鎮守奉天等處將軍改廣寧府為錦州府移治錦縣七年設奉天府司獄十年設吉林烏拉副都統十五年移寧古塔將軍駐吉林烏拉留副都統鎮守寧古塔二十二年設黒龍江將軍及副都統二十九年移黒龍江將軍駐墨爾根三十年復設兵部置侍郎於是五部備矣其僚屬亦屢増置焉是年設白都訥副都統三十二年移黒龍江副都統亦駐墨爾根三十八年黒龍江將軍副都統皆自墨爾根移駐齊齊哈爾四十九年設墨爾根副統雍正元年設寧古塔黒龍江值年御史一年而更三年設阿勒楚喀協領一員四年設奉天稽察御史一員設永吉州泰寧縣長寧縣俱𨽻奉天府移錦州通判于義州五年設熊岳錦州二副都統七年罷泰寧縣又設三姓副都統八年設尚書一人總五部尋罷設黑龍江副都統十年増設九官臺同知𨽻奉天府乾隆十二年裁十二年設復州寧海縣俱𨽻奉天府又設義州縣錦州府十三年増設熊岳通判乾隆元年罷長寧縣併歸永吉州九年設拉林副都統十二年罷永吉州改設吉林理事同知歸寧古塔將軍管轄二十一年添設阿勒楚喀副都統二十二年改寧古塔將軍為吉林將軍二十八年裁錦州通判設興京理事通判三十四年罷拉林副都統三十七年移奉天熊岳通判為岫巖通判兼轄鳯凰城以上前後建置大略如此其文職部曺以下武職協領以下添置裁汰悉於各衙門詳載焉各屬將軍所屬員額奉天将軍一員副都統一員滿洲協領八員䝉古協領一員漢軍協領二員舊滿洲佐領八員新滿洲佐領二十三員漢軍佐領二十四員䝉古佐領八員巴勒瑚佐領三員滿洲驍騎校三十一員乾隆二十九年撥往巴爾巴哈臺各二員四十三年補足額漢軍驍騎校二十四員䝉古驍騎校八員巴勒瑚驍騎校三員滿洲防禦二十四員乾隆五年移駐犁樹溝明水塘白土厰塔爾巴哈臺各一負牛荘盖州各五員共撥十四員現在實有滿洲防禦十員額設主事一員筆帖式十一員外郎六員増設委官二十七員乾隆二十七年經吉林将軍恒魯奏准多盛京設委官一百員因本城及所属各路差徭寡不一酌定本城留委官二十七員其餘二十三員酌撥各路當差俱由額設領催前鋒内揀選著帶七品金頂仍食本身錢糧謹按奉天将軍所属有興京遼陽牛荘盖平開原廣寧熊岳錦州義州諸處及各城邊門自都統而下各有城守尉佐領驍騎校防禦諸員備載兵防卷吉林將軍一員副都統一員協領八員䝉古協領一員乾隆三十年添設佐領五十五員内漢軍二員驍騎校四十八員内漢軍二員防禦二十四員管檔主事一員筆帖式十一員水師營總管一員四品官一員五品六品官各二員驍騎校各四員理驛站六品官二員助教二員随闗防筆帖式二員倉監督一員倉官一員倉獄官一員厫筆帖式二員醫官一員管站筆帖式三十六員謹按吉林将軍所屬寧古塔白都納三姓阿勒楚喀等處俱有副都統防禦等官詳載兵防卷黑龍江将軍一員駐劄齊齊哈爾副都統一員協領八員佐領四十員防禦八員驍騎校四十員印房主事一員筆帖式六員繙繹筆帖式四員銀庫主事一員筆帖式二員刑司主事一員管倉七品官一員筆帖式二員管理官莊七品官一員管理茂馨黙爾根等驛八品官二員原係六品乾隆三十六年巡察黑龍江御史薩欽奏准由有品筆帖式放者改七品無品筆帖放者改八品闗防筆帖式二員驛站二十處筆帖式二十員水師營總管一員四品官二員六品官二員筆帖式二員火噐營叅領一員駐劄吉林烏拉地方管轄黑龍江造船木料水手四品官一員五品官一員六品官一員謹案黑龍江将軍所屬黑龍江墨爾根呼倫布雨爾布昭特哈等處各有總管佐領等員駐防詳載兵防卷盛京五部員額户部掌奉天錢糧賦稅旗地荘官及棉靛鹽荘中江木葦諸稅皆領之額設侍郎一員郎中二員員外郎五員金銀庫郎中五員員外郎一員乾隆三十五年侍郎瓦京爾逹奏明改於各部中員郎中員外郎主事内通行揀選所有員外郎一缺歸回本部主事六員司庫二員管荘六品官二員筆帖式二十三員外郎九員庫使八員倉監督正副二員倉官十員倉外郎十員禮部掌奉天儀禮祭祀朝㑹燕饗及司園池養息牧牛之事所司