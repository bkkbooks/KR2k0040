body:
  text: 歴朝人物五金瀋遼諸路隸屬人欽定四庫全書欽定盛京通志卷六十二歴朝人物五金瀋遼諸路隸屬人田灝字黙之興中人遼天慶進士太祖定燕以功權節度使四遷知真定府事招降賊衆五千餘人賊壘悉平遷行臺左丞彰徳軍節度使是時新定力役灝捐籍之半而上之故相之徭役比他州獨輕同知河北東路都總管改同僉燕京留守司事民遮留不得出易服夜去累遷刑部尚書請老卒王伯龍瀋州雙城人天輔二年率衆歸太祖從攻臨潢以兵䕶糧餉遇遼兵五千餘邀路擊敗之四年從攻下中京并克境内諸山寨為靜江軍節度從宗望討張覺及伐宋皆有功睿宗經畧山東下青州伯龍功第一加太子少保攻濮州及徐泗廬和等州敗韓世忠酈瓊等軍功尤最皇統初累官寧昌軍節度使封廣平郡王正隆間贈特進定國公王政辰州熊岳人遼季高永昌據遼東知政材畧欲用之不就永昌敗渤海人爭縳以為功政獨逡巡引退吳王棟摩聞而異之言於太祖授廬州渤海軍穆昆從破白霫下燕都皆有功及伐宋降滑州留政為安撫使釋繫囚發倉廩民大悦時州郡皆殺守將為宋守獨政至州逺近降附宗望撫其背曰吾以汝為死矣乃復成功耶慰諭久之尋除同知金勝軍節度使時軍旅始定筦庫未立吏因縁為姦政獨明㑹計嚴扃鑰出納無錙銖之失吳王棟摩戲之曰官久而不加富何也對曰政以楊震四知自守安得富吳王笑曰前言戲之耳以黄金乗馬遺之天眷元年仕至保靜軍節度使致仕卒子遵仁遵義遵古皆知名高彪辰州渤海人彪始生其父陸格用術者言為其時日不利於已欲不舉賴彪母為營䕶數嵗竟逐之匿於外家遼人調兵東京時陸格已老當從軍悵然謂所親曰吾兒若在可勝兵矣彪聞之因見父代其行戰於珠赫店遼兵敗走彪獨力戰軍帥見之曰此勇士也令生致之東京既降彪遂從幹魯屢戰有功及從宗望伐宋屢敗宋軍於霸州河間天㑹五年授靜江軍節度使從帥府徇地山東嘗從宗弼與宋韓世宗戰於黄天蕩破其南岸舟師及攻陜西屢破宋軍彪勇健絶人能日行三百里身被重鎧行險如飛及臨敵身先士卒未嘗反顧大小數十戰率以少擊衆無不勝捷歴官樞密副使封舒國公卒諡桓壯彪性機巧通音律人無貴賤皆温顔下之陸格原作六哥今譯改毛子廉臨潢長泰人材勇善射遼季應募捕盜以功授東頭供奉官天輔四年率戸二千六百來歸令就領其衆天㑹三年除上京副留守兼鹽鐵事在臨潢十餘年吏民畏愛如一日除寧昌軍節度使海陵弑熙宗子廉聞之嘆曰不念國王定策之功耶遂致仕李三錫字懷邦錦州安昌人遼季盜攻錦州州人衆推三錫主兵事設機應變城賴以完入金攝臨海軍節度副使改知嚴州宗望伐宋三錫敗郭藥師軍於白河克汴京從棟摩䕶送宋二主北歸復知嚴州後三遷至武勝軍節度使察廉第一除河北西路轉運使致仕三錫政事强明所至稱治世宗舊聞其名大定初起為北京路轉運使制下而三錫已卒趙隇字徳固遼陽人仕遼為太子左衞率歸金後以伐宋攻真定有功累遷檢校尚書右僕射及齊國廢河南皆以宿將守之授隇宿州防禦使隇重義接儒士嘗以事至汴有故人子負官錢百萬以槖金贈之其子悉為私費復代輸之後坐事罷海陵時起為保大軍節度使再入為太子詹事鎮沁南卒高楨遼陽渤海人少好學嘗業進士幹魯討高永昌已下瀋州楨以母在瀋遂降幹魯以楨同知東京留守事天㑹六年以尚書左僕射判廣寧尹在鎮八年政令肅清吏畏而民懷之為中京留守平寇盜嚴禁令權貴皆震懾及在臺省彈劾無所畏避後封河内郡王卒年六十九楨性方嚴家無聲伎雖甚暑未嘗解衣緩帶對妻孥黙坐終日不一談笑其簡黙如此張浩字浩然渤海人好賢樂善博通經史尤長於詩初天輔中以策干太祖即命承應御前文字天㑹八年賜進士及第天眷二年詳定内外儀式歴戸工禮三部侍郎遷禮部尚書田㲄黨事起臺省一空以浩行六部事簿書叢委決遣無留人服其才以疾求外補歴平陽尹平陽多盜臨汾男子夜掠人婦浩捕得榜殺之盜遂衰息撤淫祠黜墨吏郡中大治大定初拜太師尚書令封南陽郡王所薦赫舎哩志寧等後皆為名臣初近侍有欲罷科舉者世宗問浩曰自古帝王有不用文字者乎對曰秦始皇世宗顧左右曰豈可使朕為始皇乎事遂寢七年十月勅有司於東宫涼樓前増設殿位浩諫曰皇太子雖為儲貳宜示以儉徳不當與至尊宫室侔乃罷之平生所著有華表山人集卒諡文康明昌中配享世宗廟庭五子皆貴顯盧克忠貴徳州鳳集人高永昌據遼陽克忠歸金源郡王幹魯幹魯克東京永昌走長松島克忠與渤海人托卜嘉追獲之收國二年授世襲穆昆其後定燕伐宋皆與有功除登州刺史天徳間同知保大軍節度使時綏徳州軍卒數人道過鄜城求宿民家是夜其家被盜剽主人財有司執夜宿卒榜掠誣服克忠察其寃獨不肯署未幾果得賊大定二年除北京副都留守㑹民艱食克忠下令凡民有蓄積者計留一嵗悉平其價糴之由是無捐瘠之患張元素字子貞與浩同曽祖高永昌據遼陽元素出歸幹魯世襲銅州明安天眷元年知涿州察廉最進一階遷東路都轉運使改興平軍節度使正隆末年天下盜起元素發民夫増築城郭同僚止之不聽未幾寇掠鄰郡皆無備而興平獨安世宗即位元素來見於東京與李石力言早幸燕都世宗深然之遷戸部尚書出鎮武定遂致仕年八十四卒元素厚重剛毅人俱畏憚之往往以片紙署字其上治瘧輒驗人皆異之李石字子堅遼陽人貞懿皇后弟也父綽爾齊任桂州觀察使高永昌據東京率兵攻永昌不勝死之石敦厚寡言而器識過人天㑹二年授世襲穆昆屬之宗弼天眷初為汴京都巡檢使海陵時託疾還鄉大定元年以定策功為戸部尚書參知政事石少貧貞懿后周之不受曰國家方急用人正宜自勉何患乎貧有慢之者初不校及為相其人以事見石惶恐石曰吾豈念舊惡者待之彌厚山東河南軍民交惡爭田不絶有司謂兵為國本姑宜假借石曰兵民一也惟當明其疆里示以法禁使之無爭趣有司拯問軍民之爭遂息北鄙嵗警朝廷欲發民穿塹以禦之石與丞相赫舎哩良弼皆以為無益勞民議遂寢大定中致仕進封廣平郡王卒諡襄簡明昌中配享世宗廟庭子獻可大定十年進士世宗喜曰太后家有子孫舉進士甚盛事也累官戸部侍郎封道國公綽爾齊䝉古語吹笳人也原作雛訛只今譯改梁肅字孟容廣寧奉聖州人幼篤志好學天眷二年擢進士第調平遥主簿遷絳縣令以廉入為尚書省令史遷定海軍節度副使營治汴宫肅分䕶役事攝大名少尹正隆末境内盜起百姓陷賊中不能自辨者數千人皆繫大名獄肅至官廉得其情讞出者十八九大定四年通檢東平大名兩路戸籍物力稱其平允他使者所至皆以苛刻増益為功百姓訴苦之朝廷勅諸路咸以東平大名通檢為準於是始定七年河決李固詔肅視之遂奏決河水六分舊河水四分今塞決河復故道為一再決而南則南京憂再決而北則山東河北皆可憂不若止於李固南築隄使兩河分流以殺水勢世宗從之十四年充宋國詳問使稱㫖遷濟南尹召拜參知政事肅知無不言致仕卒諡正憲按奉聖州金時隸廣寧張九思字全行錦州人皇統初補行臺省國書譯史三遷至亳州防禦使副劉仲延受宋國貢於泗州往嵗受貢毎以幣物不精責使者私饋不貲至九思獨不肯受仲延從之私饋遂絶累遷工部尚書清約終身高徳基字元履遼陽渤海人皇統二年進士大定九年為刑部尚書有犯應死者宰相欲從末減徳基曰法無二門失出猶失入也不從及奏世宗曰刑部議是也召諭之曰自朕即位以來與宰相爭是非者徳基一人而已十一年改戸部尚書徳基上疏乞免軍需房税農税鹽酒等課不報尋以坐朝官折支俸粟濫出官錢事罷職十二年卒楊伯雄字希雲臨潢人皇統二年進士調韓州軍事判官有二盜詐稱賈販為逆旅主人見欺至州陳訴實欲劫取伯雄伯雄覺其詐執詰之並獲其黨一郡駭服遷應奉翰林文字時海陵執政頻屬至其第伯雄諾之而不一往及海陵立遷右補闕召語至夜分問鬼神事對以未學必使言之乃曰臣家有一卷書記人死復生或問冥官何以免罪答曰汝置一厯白晝所為暮夜書之不可書者是不可為也海陵為之改容大定初為太子詹事集古太子賢不肖為書號瑶山往鑒進之及進羽獵保成等箴皆見嘉納及為諫議頗有獻納世宗嘗曰伯雄忠實人莫及也後除定武軍節度使改平陽尹先是張浩尹平陽有惠政至是百姓並稱之曰前有張後有楊卒諡莊獻張汝霖浩之子字仲澤聰慧好學浩嘗稱之曰吾家千里駒也貞元二年進士授左補闕大定九年以汝霖有學術允人望授太子諭徳兼禮部郎中進太子少師兼禮部尚書拜參知政事朝奏日世宗謂羣臣曰唐太宗明天子也晩年亦有過舉朕雖不能比迹聖帝明王毎思始終如一今年已高敬慎之心無時或怠汝霖對曰古人云靡不有初鮮克有終魏徵所言守成難者正謂此也上然之二十八年拜平章政事封芮國公世宗不豫受顧命進封莘章宗冬獵汝霖切諫詔答曰卿能毎事如此朕復何憂明昌元年卒諡文襄劉瑋字徳玉咸平人幼警悟業進士熙宗録其舊特賜及第轉尚書省都事奏擬經畫軍民田土世宗見其名曰劉瑋尚淹此乎遷戸部員外郎充使宋信國副使父兄皆以是官使江左當時榮之明年擢戸部尚書時河決於衞自衞抵清滄皆被其害詔兼工部尚書往塞之瑋齋戒禱於河功役齊舉河乃復故明昌三年拜尚書右丞卒諡安啓鄧儼字子威懿州宜民人天徳三年進士大定中有司奏使宋者世宗命選漢官一人梁肅以王翛張大節鄧儼對世宗曰翛大節苦無資歴與左右司官辛苦不同其命儼往累遷吏部侍郎明昌初為戸部尚書上命尚書省集百官議如何使民棄末務本以廣儲蓄儼言今之風俗競為侈靡莫若定制度使貴賤上下衣冠車馬室宇器用各有等差裁抑婚姻喪葬過度之禮罷去鄉社追逐無名之費用度有節則蓄積日廣矣後出知歸徳府致仕高竑渤海人以廕補官調貴徳縣尉提刑司舉任繁劇遷奉聖州録事察廉遷内黄令累官左藏副使元妃李氏以皁幣易紅幣竑獨不肯妃奏之章宗大喜諭曰所執甚善尋進同知大名府以功遷三官貞祐二年遷河北西路按察轉運使致仕孫徳淵字資深興中州人大定十六年進士調淶水丞察廉遷沙河令剛正幹能可任繁劇有盜秋桑者主逐之盜自以义刺足曰秋桑不禁採汝何得刺我訴之縣徳淵曰逐捕而傷瘡必在後今在前乃自刺也盜遂引服及去官民為刻石祠之貞祐二年拜工部尚書是時山東乏兵食有司請鬻恩例舉人居喪者許納穀就試徳淵奏此大傷名教事遂寢及致仕御史許古論徳淵忠亮明敏可大用近許告老士大夫竊歎望朝廷起復必能建明以利國家宣宗喜納未及用而卒孟奎字元秀遼陽人大定二十一年進士調黎陽主簿遷汲縣令察廉改定興令遷中都警巡使時平章政事完顔守貞禮接士大夫在其門者號冷岩十俊奎其一也累遷同知中都路都轉運使值旱詔審録寃獄多所平反大安初除博州防禦使凡屬縣事應赴州者不得迫於逆旅以防吏姦遷北京臨潢等路按察轉運使劾監軍虚造功狀詔以奎為宣差都提控貞祐初卒諡莊肅李英字子賢遼陽人明昌五年進士調通逺令蕃部取民物不與值英論如法貞祐初歴監察御史右副元帥珠格高琪辟為經歴官乃上書高琪曰中都之有居庸猶秦之崤函蜀之劍門也邇者撤居庸兵我勢遂去今土豪守之朝廷當遣官節制琪奏其書即以英充宣差都提控居庸等關隘悉隸焉英夜與壯士李雄等四百餘人出城縁西山至佛岩寺令李雄下山招募軍民得萬餘人擇衆所推服者統之時時出戰英被召還遷翰林待制因獻十策大槩謂居中土以鎮四方委賢親以守中都立藩屏以固關隘集人力以防不虞養馬力以助軍威愛禾稼以結民心明賞罰以勸百官遷守令以復郡縣并州縣以省民力頗施行之嗣督運救中都殁於兵珠格原作术虎今譯改欽定盛京通志卷六十二
