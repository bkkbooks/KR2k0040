body:
  text: 京城盛京城創建形勢事蹟興京城創建形勢事蹟東京城創建形勢事蹟欽定四庫全書欽定盛京通志卷十八京城臣等謹案國家造基東土營始興京洎乎遼陽底定瀋水建都肇正域於九圍擴宏規於億載我太祖髙皇帝神武布昭靈圖丕應太宗文皇帝緝熙重光大勲克集夫是以受命溥將總八方而為極也臣等幸扈雲䍐肅瞻天邑仰留都之閎煥緬締構之艱難謹志京城第四欽定四庫全書欽定盛京通志卷十八京城盛京城創建天聰五年建本遼金瀋州治元為瀋陽路總管府治明為瀋陽衛洪武二十一年指揮閔忠因舊址增築門四週圍九里三十步髙二丈五尺池二重内濶三丈深八尺週圍一十里三十歩外濶三丈深八尺週圍一十一里有竒我太祖天命三年城界藩六年城薩爾滸又城東京天命十年遷瀋陽天聰五年因舊城増拓其制内外甎石髙三丈五尺厚一丈八尺女牆七尺五寸週圍九里三百三十二步四面垜口六百五十一明樓八座角樓四座改舊門為八東向者左曰撫近右曰内治南向者左曰徳盛右曰天佑西向者左曰懐逺右曰外攘北向者右曰福勝左曰地載池濶十四丈五尺週圍十里二百四步鐘樓一在福勝門内大街鼓樓一在地載門内大街八門正戴方隅截然内池七十餘處水不外洩城邑既定遂創天地壇壝營太廟建宫殿置内閣六部都察院理藩院等衙門修學宫設閲武塲而京闕之規模大備天聰八年更名曰盛京順治元年遷都京師監往代留都之制續設昂邦章京鎮守量留户禮刑工四部分設各官並設府尹分蒞州縣康熙元年改昂邦章京為鎮守將軍十九年奉㫖築闗牆髙七尺五寸週圍三十二里四十八步東南隅置水栅二各十餘丈𨗳瀋水自南出焉二十一年奉㫖重修諸門城三十年增設兵部官制益詳三十二年飭工部修城垣三百六十餘丈並於街道開溝以渗積水四十九年遣京官一員協修堅固五十四年修理八門城樓四角樓及内外城垣一百一十餘丈乾隆八年皇上祗謁三陵駕莅盛京發帑修諸門城堞十八年復發帑三萬六千餘兩修内外城堞明樓三十七年三十八年四十一年四十三年四十四年四十五年叠修城牆甕圏砲房角樓闗廂規制益閎整云形勢盛京之地跨接東瀛金墉帶涘雉堞峻隅形勢崇髙水土深厚長白峙其東醫閭拱其西巨流鴨緑繞其前混同黒水縈其後山川環衛原隰沃膴洵華實之奥區也我太祖乘乾出震耆定宅中遂開億萬年之景運鴻圖創造斷自宸衷視彼奉春建䇿奚啻度越萬萬耶事蹟謹稽實録天命六年三月壬子太祖率貝勒諸臣統大軍征明瀋陽令軍士載營栅攻具乘舟順渾河而下水陸並進癸丑軍夜行見白藍二氣自西南來繞月暈之北至南而止明之偵卒知我兵至聲礮舉烽夜二鼓馳告瀋陽總兵賀世賢尤世功分兵乘城甲寅辰刻我兵至營於城東七里設立木城明兵於城外掘深塹剡木樹塹内覆以秫稭掩土其上内復鑿壕一道沿壕以木為栅近城復有大壕二廣五丈深二丈皆剡木樹其内又築攔馬牆間留礮眼排列鳥鎗礮具衆兵密布衛守城上兵亦登陴堅守乙邜辰刻我兵進攻乘勢衝入明兵七萬俱潰我兵繞城掩擊伏尸纍積陣斬總兵賀世賢尤世功等城遂拔殱其衆又破總兵陳䇿步兵二萬破總兵李秉誠朱萬良騎兵三萬復殱副將董仲貴㕘將張大斗之衆㑹暮乃收兵率諸貝勒引精鋭兵營瀋陽東門外教塲令衆將引大兵屯城内駐兵五日論功行賞天命十年三月己酉朔太祖欲自東京遷都瀋陽與諸臣議貝勒諸臣諫曰邇者築城東京宫室既建而民之廬舍尚未完繕今復遷移嵗荒食匱又興大役恐致煩苦太祖以瀋陽形勝之地籌之已熟遂不聴於是月壬子出東京啟行夜駐虎皮驛癸丑至瀋陽興京城創建興京在遼金時為瀋州地明初置建州衛於此我太祖髙皇帝發祥之地距盛京城東㣲南二百七十里其城週五里南一門東二門北一門外城周九里南三門北三門東二門西一門羣山拱䕶河水瀠環天府神臯毓祥萬禩我太祖癸邜年剏建内城乙巳年乃增築外城太宗文皇帝天聰八年改稱興京世祖章皇帝順治五年奉太祖髙皇帝配天南郊推本孝思追尊四祖以赫圖阿拉為創業之地設守城尉等官守之乾隆二十八年以錦州理事通判移駐興京與熊岳通判所轄之哨子河分界管轄形勢興京之地東傍邉牆西接奉天南界鳳凰城北抵開原層巒疊拱衆水環洄扼諸城之要區據三闗之雄隩我太祖經營考卜實始於此迄今推帝業之肇基益緬在原在巘之勞云事蹟謹稽發祥世紀始祖居長白山東鄂謨輝之野鄂爾理城在興京東一千五百里寜古塔城西南三百三十里勒富善河西岸皇始祖肇祖原皇帝始居於赫圖阿拉國語横甸也在興京之南鄂多理城西蘇克素䕶河國語魚鷹也嘉哈河國語秋後落葉也之間三傳至興祖直皇帝及景祖翼皇帝顯祖宣皇帝皆居於此至我太祖髙皇帝削平諸部丁亥遷居呼蘭哈達國語呼蘭竈突也哈達峯也南岡新城癸邜仍於赫圖阿拉舊址築城居之天命元年衆貝勒大臣上尊號曰覆育列國英明皇帝以興京為都城東京城創建太祖髙皇帝天命六年建在太子河東邉去遼陽州城八里其城週六里零十步髙三丈五尺東西廣二百八十丈南北袤二百六十二丈五尺城門八與盛京城同東向者左曰迎陽右曰韶陽南向者左曰龍源右曰大順西向者左曰大遼右曰顯徳北向者左曰懐逺右曰安逺天命十年遷都盛京遂於東京設城守章京康熙二十年城守移駐金州城内即寜海縣城宫殿與城同時建今管理驛站官守䕶形勢東京之地以遼陽為屏蔽以渾河為襟帶北接開原鐵嶺南連海城蓋平山林蕃薪木之利沮澤沃水族之饒我太祖髙皇帝創業之初築城於此一以經畫寜錦一以控制瀋遼聖謨深逺制勝有方與周頌所云天作髙山太王康之者有同揆焉事蹟謹稽實録天命七年春三月太祖集諸王大臣議以朝鮮䝉古二國俱未臣服宜另築城郭派兵堅守庻征明無後顧憂貝勒等俱諫太祖不從遂令築城於遼陽東五里太子河邉遷居之即今東京是也九年夏四月太祖命宗弟鐸弼等往奉移皇祖考妣靈轝將至太祖出東京二十里率諸王大臣至接官亭跪迎乃於城東北四里岡建立寢殿奉安焉又按實録天命九年正月額駙恩格徳爾率其部衆來歸太祖出東京迎至章義站大宴之賜賚甚厚臣等謹案盛京為壇廟宫殿所在謹先志之以明王業之有本也至興京為發祥初基仰見列祖詒謀世徳作求之盛東京國初暫建然聖祖創業初基肇域自東遂奄九有俱不得與郡縣城池並列敬稽事實著於京城之後欽定盛京通志卷十八
