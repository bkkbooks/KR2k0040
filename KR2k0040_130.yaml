body:
  text: 國朝藝文十二詩七七言排律七言絶句欽定四庫全書欽定盛京通志卷一百二十六國朝藝文十二詩七七言排律恭和御製謁祖陵禮畢車駕入盛京元韻乾隆癸亥鄂爾泰神皋初闢自關東東望佳哉氣鬱葱劔兆龍興曽表異水宗鴨緑亦來同雲雷先烈皆崇德宵旰吾皇祗敕躬淳化直追三古上孝思默運一誠中頗聞夏諺歌惟叙睹秋旻麗太空五緯文垂星錯落八鸞聲叶玉玲瓏艱思亶父遷居日勳陋宣王薄伐功虞代自來隆典祀周官從此罷祈攻于門遮莫同于野在廟還應視在宫風起雲飛過沛澤夕陽流水指岐豐千林蔽芾長垂䕃萬國傾葵各表衷大界光華何糾縵小春節候倍冲融三陵精氣端居接六代明禋是處通擘海金鳷騰欲上銅鉦捧出曉霞紅恭和御製謁陵禮畢車駕入盛京元韻癸亥張廷玉神京地似澗瀍東碧嶂丹邱氣鬱葱咸仰聲靈千載盛早看朝㑹萬方同皇圗肇造垂鴻緒道法相傳啓聖躬謨烈幸承神武後紹衣常切寢興中欣聞鳯輦來青甸快睹鸞旗映碧空倚蓋林花猶旖旎扶輪水石更玲瓏山川舊屬龍飛地堂構長昭燕翼功直以深仁成混一豈徒雄略善謀攻淳風已見超唐代儉德還應陋漢宫運際昌明逢履泰人懷樂育慶恆豐岡巒進麗邀慈鍳民物雍和愜帝𠂻羽輅秋臨天淡沱彤帷晝卷景怡融遙瞻紫禁規模逺迥望丹陵陟降通要識開基由稼穡周原䆉稏一時紅恭和御製謁陵禮畢車駕入盛京元韻癸亥梁詩正親扶慈輦駕徂東長白遙分勢鬱蔥列爵孫礽紛扈從諸藩酋長競來同祗懷展謁崇原廟不惜馳驅瘁聖躬一縷誠將蕭艾外十秋靈妥苾芬中風嘶石馬寒生隧霧隱松虬翠蔚空王氣龍蟠峰邐迤穹碑山立柱玲瓏升歌莫報重光烈返轡還思肇造功故里只今仍沕穆清時已久息衝攻沛中父老歡留蹕白水真人舊拓宫符瑞邈兮嗤禪岱規模皇矣識遷豐御朝漢殿星環極卜世周家帝誘𠂻桑梓恩敷膏露湛川原春到曉霜融神畿賦就方誇固時御製盛京賦臣詩正等恭與注釋盛禮文垂欲陋通西指燕京餘眷戀千山猶繞朵雲紅恭和御製謁陵禮畢車駕入盛京元韻癸亥張鵬翀長白崔嵬鎮海東薊門烟樹接青葱興朝王氣千年在聖主歡心萬國同下武配京追祖烈上陵展祀肅皇躬貔貅夜繞星廬外旌斾朝飛輦路中帶水回旋來逺障崇墉嶻嵲俯層空長懷茅土臨階墄詎侈璃琉作瓦瓏卜溯澗瀍前代業酹酬褒鄂舊時功麾旄西土咨盟㑹載亳鳴條緬造攻元莬城連十里郡鳯凰樓映萬年宫謳歌父老填衢巷抃舞兒童習沛豐禮樂修文明帝典搜苖纘武切皇𠂻休徴早識訾黃下戬榖常昭肸蠁融日月光華凝顯爍雲雷草昧感靈通五陵佳氣符元運萬乘鑾旗曜日紅聖駕東巡盛京恭謁祖陵大禮慶成詩癸亥朱佩蓮當陽聖主運乘乾祀典宏開孝格天殿上衮衣垂日月寰中繡壤奠山川重光謨烈文承武一德明良聖得賢布政九霄當寧日合歡萬國上陵年仰承大統羮墻見俯御雄圖帶礪全復覩唐虞州十二聿遵周孔禮三千肇基迹自留都始大孝躬勞庶物先撫有萬方民物富來同九牧貢輸駢春暉報德臨朝後仁粒思文受命前共戴慈宫尊養至式瞻烈祖祀禋䖍昌時特舉巡方典戚里欣承大饗筵周武杜中曽獻勺漢髙渭北亦陳瑄上監往代參經緯獨盛熙朝不襲沿耕藉南郊供簠簋蠶繅東苑理紘綖官修內外昭誠敬日練剛柔告吉蠲奉物參時將玉食敷天裒對走花駽羣僚從祀黃流瓉聖母先迎紫罽軿原廟衣冠遊舊里寢門飲膳問中涓享岐有事偕勤止陟巘無勞念慎旃默契璇宫開月扇喜臨華渚度花磚黃麾漸引祥光啓彩仗齊排瑞靄連灝氣逺圍秋淡沱氷輪回映月嬋姢疏桐呌露斜行鴈髙栁嘶風兩岸蟬光霽上開新氣象霏微四斂忽吹扇三霄澄景懸東壁萬里晴暉發北燕清曉衢歌傳白屋斜曛野笛掛烏犍欣瞻圻甸禾棲畝逺卜要荒黍被阡驛路不妨耕隴業沙隄别取牧場填騰驤出口飄雲罕迤邐延邉望海堧紅杏城髙分石碣黃花塞險扼喉咽卿雲似蓋文稠叠王氣如龍勢蜿蜒南部偵邏光抃舞北藩候望盡喧闐萬年天子欣臨境中國仁人喜蒞邉汜掃中塗成坦坦導游王路履平平往來甌脫遙呵護瞻仰韋韝正婉嬋芝蓋紆徐丹嶂合虹旗縹眇白雲穿懸崕遙指飛猿掛絶壁爭看技鼠緣行近芳林鸞護尾立當青草鷺擎拳因乘秋氣行時令爰往東都奮大畋田豕垂文原利執天狼觀象尚張弮鳴笳邉將雄擒虎負弩番兒媚獻豜沇沇溶溶奔大兕儦儦俟俟竄封猯合圍鹿塞芟蒿蔚周落麞山柞祀楩望裏合蘭河瀇潒環中蒲類海萋芊神姿自控三花鬛逺略徐搖七寶鞭照夜白翔尋影迅海東青聳入雲旋秋原莎靡矯媒雉大漠風揚縱爪鳶乍格遊騏收羂結轉鈎飛豹入拘攣曰驅有令從開網命中方呼倒應弦叠獲豵豝驚縱送盈庖脯臘貯肥鮮貙膢何止嫻車馬園寢從教執豆籩蓊薆枌榆森里社巍峩廊廟素題枅球圖玉府光瞻切劍舄橋山乍目擩帝子梧髙風往復大夫松老浪洄漩金波鳬鶴隂翔集銀海龜魚暗濯湔駊騀岡陵台座埓蔥蘢林麓鼎趺聨堯塋窀穸封如斧殷武宗祊角有梴梐枑中鋪張禮館旌轅外建衛齊員蓮花漏徹晨波湧蕭葉香升曉火燀聖德欽瞻龍繡衮母儀肅整鳯文鈿太官上食承蒿柱大樂宣音繞蕙櫋清液一泓浮鬱鬯紅霞幾朵透爐烟有孚盥薦昭顒若如在精誠見僾焉風馬飛揚來掩雲旗搖曵下褊􅝆居歆玉宇含丹渥具酌金尊漾碧漣德是馨香非黍稷道能肥腯到牲牷呈祥祕殿瑶芝秀應瑞長秋玉露鮮開創規模勞想像纘承懷抱屢沉研百年禮樂方興矣一統河山豈偶然今日巡遊俄朵址當初祥發闥門淵帝生東震原居位天作髙山最上巔自闢鴻䝉成宙宇向疑窟宅住神仙姜源育秀推人極亶父開基肇地偏海甸欎盤崇體勢遼濵奧衍逺連延四圍廣漠疆寬拓三𣲖澄江水曲踡與宅樂郊蕃藪澤建邦膏壤導䰻佃駕龍春日賔暘谷躍馬秋風戰阪泉拔木道通開草昧蹶生質訟化䝉顓威張楛矢山林啓䖍秉彤弓討伐専締造雨風經櫛沐艱難手足瘁胝胼小懷大惠仁風布邇懼遐驚武烈鐫上國舊推東海表王畿嗣涉大河遷綢繆家室從沮漆和㑹隂陽卜澗瀍矩地向方仁氣正規天分野尾星躔增城詄蕩飛樓櫓作廟崇閎架􅍻椽河鼓雙旗分羽翼隂符八陳總包纒聖神定鼎資先識文武持籌具妙銓海載東藩三箭定山連西域大旗搴神臯坱圠占昌世肇域鴻龎握治權爰拯生靈登袵席盡收品彚入陶甄貽孫翼子天無極報德崇功嵗必專剛拜几筵前烈篤佇瞻宫闕舊章懸虎臣矯矯重呼蹕髦士峩峩共佩瓀侍奉金輿携斗柄和調玉燭靖風祅弸彋吹幄聲徐轉婀娜揚旗態有翩城指鵝渾頻彳亍江遵鴨緑幾佪儃漫山文玉抽竒木彌水華蘋透瑞蓮蘆絮烟霞朱雁集菭衣雲錦白麟眠芬菲如適羣香國璀璨疑游萬玉田入境偕來瞻帝座升朝儼若撫天璇齊雲三殿星垣燦夾曜端門鳯翼騫大展垬球王㑹禮髙懸墳典帝京篇葵傾已遍東西峽蛾伏無分大小开鶴野仙臣瞻朵殿龍沙遺老拜烏氊金罍頒下疑瓊液玉饌分來厭麥饘大酺慶成丹詔下鴻恩喜沛紫泥傳侍僚宣力俱增級秋賦經巡概賜捐被德臣鄰膺祉福漸仁士庶念杯棬承平自極文明盛保治無忘武衛宣講旅凌河看整暇陳師渤海戒輕儇􅐀天髙樹靈鼉鼓拂漢遙揚彩鳯旜鵝鸛合離成隊伍墨荼竒正入鍵觀米似海軍容壯撼去如山陳勢堅耀雪鮮明擐鎧甲捎星浩汗擁戈鋋懸知奮武鷹鸇逐一自揚威虎豹㾓散即飈風彌坰野卷為收電净郊㕓花江襟帶鮫人集繡嶺屏藩雁户編靈藥採來參五葉豐貂羅取珥雙鬈村村家碓長腰米處處人穿縮頸鯿浪跋牛魚紅潑刺草遊蛇馬碧􅠠蜷風強壯士彎銅弩俗朴齊民衣木棉地美絶蚊還絶蝎年豐無蜚又無蝝金湯永固東京樂鼓舞歡留大駕還來日沛宫髙帳飲歸時輦路繞攀牽蒼生愛戴宸遊豫紫陌方長􅌖賞便一路承歡回玉勒有時迎笑傍珠韉雞翹夾道歌連臂豹尾交衢望叠肩饒樂郡邉飛蓋弭婆娑州外繡帷褰含情嵐翠濃堪滴薄醉林光秀可憐城上遍圍蓉錦幄道旁齊放菊金錢百昌接輅爭呈媚萬彚迎鑾競鬭妍榆塞霜花輕㸃䄂荆關紅葉薄飛箋黃童鶴躍雲成望白叟豨呼雪滿顛多效壺漿呈野簌或携筐筥獻香荃還朝揚拜沾堯酒奏治薰時入舜絃逺近人風欣過化往還農隙莫期愆象輿乍駐三靈協雉扇重開五曜圓頌上赤蛟綏奕奕曲成米鷺鼓鼘鼘河清海晏追三古華祝嵩呼遍八埏載筆小臣歌萬壽聖人仁孝永綿綿恭和御製車駕至吉林十二韻元韻甲戌劉綸銀漢分支入望迢大東仙仗候芳朝百年芮鞠民猶朴什倍枌榆物更饒雲護椴林香暗冉霜融華屋序均調仲秋令典修巡狩左翊雄圍壯瀋遼地接黃龍披牒舊天開白嶽降神遙歌風在昔傳過沛刻玉方今頌紹堯父老扶笻倍燕喜兒童舞拍誡纎恌歡聲拜賚常彌日盛事觀酺每徹宵覆隴髙囷元務本授㕓竒貨亦防澆巘原載度揚前烈井巷重經述近僚世仰豫逰頻有慶時懷櫛沐永無驕賡揚願得依奎藻邠頌長聼被里謡恭和御製謁陵禮畢車駕入盛京仍叠癸亥嵗舊作元韻甲戌劉綸王氣翹占魁柄東留都翠蓋駐蘢葱杏松勢衍昆邱接遼瀋流分宿海同億萬年基推肇跡十三甲奮仰親躬英雄草昧興嘉際和㑹隂陽卜宅中檄布狼荒人盡附巢焚蝸角壘先空重關霧净銷金虎二馬飈馳振玉瓏廡列十亭參大政朝崇雙楔䇿羣功鼎存郟鄏清時定車靖淮徐吉日攻尚憶岐陽胥故宇豈誇沛上過新宫金甌永奠恢無外玉輅重巡及屢豐原廟衣冠徴祖澤寢園弓劍厪宸𠂻地天交濟鴻圖翼日月貞明淑景融九㝢梯航羣望叶八紘户闥一家通奎章逺軼研京手光爥槫桑曙旭紅恭和御製謁陵禮畢車駕入盛京仍叠癸亥嵗舊作元韻甲戌汪由敦舊邦時邁澗瀍東億載皇基鎮鬱葱象緯昭回箕尾協隂陽和㑹雨風同閟宫僾㑶頻申慕繁祉遐昌正集躬轡轉珠邱晴旭裏鑾回枌社曉雲中綺分疆場鱗舒隰香靄街衢篆裊空保塞鴈臣儀肅肅獻琛海國佩瓏瓏依豐緬昔經營始卜洛方開締造功乃立應門宸寧建奚煩鼛鼓庶民攻山川永護真人里星斗都環太隱宫執豕酌匏風自古由庚華黍嵗維豐歡言父老知先澤陟降庭除企聖𠂻三殿恩綸霞彩煥十亭酺宴瑞光融周京敬奉徽音嗣黼座遙聞帝謂通一紀鸞旗重蒞止海天顒首日華紅恭和御製車駕至吉林十二韻元韻甲戌彭啓豐自入邊門路尚迢不咸在望慰崇朝倚江作枕烟雲護建木為城樺柞饒未到沍寒秋正好乍臨霜旦氣方調神淵育瑞龍潜海絶塞恢圖鶴化遼覽勝花江搜闕略紀聞松漠遡殷遙功同乘載師神禹典重封山述帝堯則壤賦輕因土瘠鳴鸞儀偹鎮民佻樹蟠參草烟籠曉魚捕鱘鰉火映宵舊俗覆茒差近朴流民移籍尚無澆挽弓甲士迎天仗述職藩封繞衆寮褶剪鵝兒山寨勇舟移畫楫水軍驕東隅快覩金輿轉北極遙傳天馬遙恭和御製謁陵禮畢車駕入盛京仍叠癸亥嵗舊作元韻甲戌彭啓豐陸海膏腴起大東留京烟樹接青葱珠邱秩祀千秋洽寶鼎丕基萬國同締造艱難思祖烈撫臨統一萃神躬奧區綺錯喬林外分野躔臨析木中積水回環籠碧甸崇墉嶻􅑖搆層空式瞻黼座螭頭麗初立臯門鴛瓦瓏卜溯神京瀍澗脉酹酬列爵鄂褒功順天膺命徴圖籙大政當陽息戰攻河繞句驪千里郡日輝翔鳯萬年宫吾皇昔駕當淵獻此日重臨舊沛豐禮序樂和昭盛典省方問俗勵寅𠂻明星自照霓斿采白露仍兹黍谷融聲教逺孚荒服至精禋昭格瑞符通扶輿獨厚陪都運滄海長升旭日紅恭和御製東巡盛京叩謁祖陵是日起蹕得詩八韻元韻戊戌和珅盛京東上復興京三度經臨法祖情擇日已占七月吉計程便擬六旬行仰瞻共頌晴明好默㑹方欽感格誠望去祥光迎輦近看來紫氣自開呈陪都只隔千餘里帳殿遙分草四旌侍從連營環拱極倉箱遍野履豐成家緣是舊羣思返往却如歸豈憚征更見恩膏隨地溥翠華到處盡寧盈恭和御製至盛京叠癸亥七言長律十四韻元韻戊戌和珅稅駕陪都到大東郊原禾黍望青葱豳岐已是三巡蒞景象依前兩次同御殿典章須用吉謁陵誠敬必親躬遺裳永貯鳯樓上法物傳看祕閣中臯應連雲崇紫籞罘罳籠靄近晴空規模已偹成餘朴金玉其相却似瓏式廓是增欽眷顧成城孔哲見神功敷文來格垂干羽我武惟揚表戰攻自此經營基帝業豈因宴豫處深宫朕哉無異書言亳允矣方知詩詠豐詢俗採風勞廑念時和嵗稔契宸𠂻恩施惠逮臣民溥絃誦聲聞德化融迎輦列藩邉塞至瞻天屬國海門通停居七日初旋蹕回首崇墉拂曙紅恭和御製御崇政殿六韻元韻戊戌和珅締造洪圖跨瀋遼殿名崇政睿題昭不期玉帛三千㑹嗤彼金人十二銷昨日停居方止蹕今朝拂曙便臨朝班聨羣牧欽堯陛樂舞雙懸想舜韶賔此四門門盡闢衍兹五福福頻要小臣何幸叨陪從拜手欽瞻御座遙恭和御製東巡盛京叩謁祖陵是日啓蹕得詩八韻元韻戊戌梁國治秋來彌望稼如京蹕路東瞻二紀情為仰星榆天上種因遵遼海日邉行練時暇待中元節展禮申將積嵗誠問俗兩都封社舊賡詩七月畫圖呈山環水抱論襟帶風起雲飛想斾旌考卜幾遷王業定艱辛如此武功成萬年承烈貽桓撥一語知難凛邁征民事更殷兼省斂新膏如露灑豐盈恭和御製至盛京叠癸亥七言長律十四韻元韻戊戌梁國治兩紀遙瞻紫氣東出關雲樹藹蘢葱蹟徴遼祖興王近事與周家創業同繼世豳岐勤卜宅當年甲胄想擐躬地連山海星躔北威御遐荒日麗中制勝早傳諸部定養時留彼賊氛空松雲更仰伊耆棟珍瑋從捐和氏瓏政曰撫懷遐自邇道惟文武德兼功敷方遂此柔羣服寶命從新溯造攻和㑹隂陽開沃野來宗福祿賀新宫雲回大嶺林巒合水滙三江品物豐百嵗枌榆欽盛烈一經城壘愓宸𠂻衣冠快覩朝儀肅樓殿重臨曙色融家國萬年詒有則天人一氣感相通帝城雲裏光輝接長對扶桑浴日紅恭和御製御崇政殿六韻元韻戊戌梁國治祖宗開國創全遼闢土成城聖烈昭正殿曉臨天宇豁餘氛先見日光銷威加寰海歸宸極儀想風雲㑹大朝七日禮成申渙號三秋恩遇起春韶東漸早訖西南朔荒享奚論侯甸要最是發祥根本地中和一氣兩京遙恭和御製東巡盛京叩謁祖陵是日啓蹕得詩八韻元韻戊戌謝墉郅治光前溯舊京永言慈孝展衷情風傳夏諺恩膏沛典繼秋嘗吉禮行舜慕尚餘霜露愴文謨式紹豆登誠歡聲關隘偕騰祝佳氣橋山逺豁呈祗為惟馨勤法駕共瞻不狩偃綏旌祖功東北謀詒燕聖略西南告武成小相願為䖍夙戒屬車陪奉快遄征質明一路和門竚至敬終朝仰捧盈恭和御製至盛京疊癸亥七言長律十四䪨元韻戊戌謝墉北極坤輿旭日東留都氣象鬱乎葱文謨紹述勤三駕天作初基闢一同箕斗星垣推亥步松雲棟宇緬堯躬鵽鳩告瑞徴無外鵽鳩集太祖建都瀋陽之先有遼陽為外藩歸順之兆寶璽延禧兆宅中國璽為太宗獲元代傳區宇混一之徴建國舊曾占太卜築城今復召司空築奉特命撥帑增天所屬城垣九閶爰詄龍樓煥百堵重興雉堞瓏講事宜兹修牧正伐材自昔冨公功溯維伊洫兼伊匹允矣既同復既攻是斷是遷瞻奕廟攸寧攸芋嗣雍宫畏威懷德邦咸喜克敵安民嵗屢豐宏以漢京規地利繩其祖武啓皇衷四夷陪扈鞮鞻逺凖回及金川諸部皆入版圖列扈從執隸圉較前度巡幸益昭德威逺鬯列聖居歆肸蠁融正賦蠲供兼且獨奉天所屬以今嵗巡幸免正供而適逢輪流普免之年租賦特命全蠲明年髙年行慶溥而通人粟賜老肉布帛引年有加清寧奠麗歌時邁宵旰依然燭剪紅恭讀癸亥此次三度御製有故宫詠燭詩巡幸聖夀益髙而旰勤聖敬日躋宵宵勞彌昭行健恭和御製御崇政殿六韻元韻戊戌謝墉武功文德廓全遼正殿巍峩燕翼昭繼志早看三蘖靖甲戌撒納巡幸盛京後討逹瓦齊阿睦爾大小和卓木以次平定凡三出師善繼善述莫大乎是策勳又見二尸銷前年宗討大兵平定兩金川與後坰太二剪叛奄有諸部先揆重臨風起雲飛地載溯遷豐卜鎬朝敬職分行排漢蕝扈盛駕諸臣服蟒服由東階上京諸臣服朝服由西上孝思永慕靜虞韶醍醐茗飲升階陛鹵簿鵷班統甸要使恩命殿上西班賜茶朝鮮臣一體由末上中外一家益恢祖烈垂訓麟振諄創守恭讀艱難聖論頻以創守示訓康強逢吉萬年遙恭和御製東巡盛京叩謁祖陵是日啓蹕得詩八韻元韶戊戌錢汝誠祇謁橋山溯鎬京展軨撰吉企乾情精禋預敕儀惟偹獮政先時詔罷行先期有一切詔凡行圍閲兵筵宴概不舉行草四年來䖍慤達第三巡舉憲章誠嘗三巡聖祖盛京每懷締造前光迪特與蠲除下隱呈凝露秋方滋福壤帶陽人共仰華旌癸亥詩有東巡冬至後尚暖之句御製人言羣道帶陽歸鴻釐大有皆垂貺駿烈豐功藉告成自甲戌以來平定西陲闢地二萬條里近復𠞰滅金川凡此鴻勳皆賴聖心在天默佑益切䖍寅記里邠邰兹在望首途通潞此初征前兩次師東東巡皆由熱河由烟啓蹕今嵗自京行出山海關始郊取道瑶函早為陳王業創御製全韻詩述詳備業艱難事至為蹕路新篇更執盈恭和御製至盛京叠癸亥七言長律十四韻元韻戊戌錢汝誠特舉升馨翠輦東橋山敬仰鬱葱葱三巡偹覽川原習兩紀重修典禮同瀍澗經過懷曩蹟應臯蒞止肅宸躬塵清碝墄秋逾半彩映璇題日在中萬戶枌榆舒化宇九天閶闔敞晴空土風紀盛珠霏琲物産摛華玉韻瓏物産御製盛京土風雜詠各十二章武庫留貽尊什襲盛京尊藏太宗所太祖所貽甲胄及貽弧矢冠服藎臣奠酹念崇功清寧禋祀神惟妥壇廟鳩材敕急攻析木星輝長白野蓬萊雲護紫微宫燕詒啓緒欽居鎬鴻構承謨想作豐紹繼肻堂天子孝經營與宅聖人衷雞竿青宥新恩大鳯詔蠲除愷澤融恩澤巡幸盛京凡所經過捐除嘗賚周普又特諭逾格肆赦尤為欽恤至仁式示昭垂千葉永宣布上以盛京為根本重地諭㫖垂示奕葉宏開詄蕩八門通靈臺此日占佳氣糾縵非烟旭景紅恭和御製御崇政殿六韻元韻戊戌錢汝誠紫闕巍峩鎮瀋遼卿雲黼扆頌光昭樂陳玉砌儀惟偹樂設而不作香裊金猊篆未銷三至翌辰勤蒞政兩京分侍肅班朝是日扈從諸臣班在東盛京臣僚班列于西風飄秋殿烟初霽人到春臺景亦韶茗碗甘濃逾酒醴二品以上臣工䝉恩入殿賜茶陪臣拜舞列綏要朝鮮使臣入貢繼繩六世同臨照旭日曈曨碧海遙七言絶句上陵歌應制康熙壬戌王士禎兩京相望海雲開馳道如弦候騎催金馬碧雞新奏捷太平天子上陵來令支回合萬重山閃日旌旗虎豹間東望風雲過沛上西來車騎出蕭關遼水東回北鎮斜龍蟠虎踞帝王家依依最是關門栁十二年前拂翠華艱難王業本岐豐扶杖米觀父老同詔賜大酺還給復一時歌舞遍遼東奉使祭告事竣至閭山清安寺登大士閣康熙壬戌沈荃聞說閭山第一峰蒼崖終古白雲封天風忽起松濤落下界回看隔幾重山閣層層架石梁洞門窅窅瀑飛凉攀蘿直上三千尺鳥語花香白畫長聖駕東巡盛京恭謁祖陵大禮慶成詩乾隆癸亥宋楠一統河山正百年開基遙溯鎬豐前龍旗十乘親承糦載詠思文后稷篇艱難王業起關中展祀欣看大駕東十日為霖天忽霽共知聖孝格元穹愛日依依翠幰開秋原玉露净飛埃松花江水明于鏡照見紅鸞扇影來海上三山戴巨鰲橋陵劍舄彩雲髙薌蕭焫處天光合五色曈曨映柘袍真庭肅肅下靈旗縹眇雲璈奏假時干羽兩階昭世德鳯樓重見鳯來儀玉府丹書百世存河山帶礪儼新恩鑾輿親酹功臣墓又見髙皇六葉孫名山望祀百靈趨積翠中天翊聖圖應似白雲封內起山祗萬嵗效嵩呼宫殿龍眉跡已陳秋山木落自嶙峋從官一騎頒香幣異代猶䝉錫類仁行殿遙聞晝漏清龍賔十二燦芝英彩毫珠玉三千字親灑雲箋賦盛京講武還登將將壇黃旗開處五龍蟠君王神武真天授列陳先應懾可汗平沙毳帳儼分行稽首齊稱萬夀觴一自華山歸馬後百年甌脫盡耕桑需雲靄靄宴枌榆遼瀋今年並賜租鳯詔九重天上至一時歌舞遍康衢一行貢使自朝鮮詔許承恩侍廣筵歸向東瀛誇盛事堯尊親沃聖人前八年勤政攬宵衣肯為時巡廢萬幾依舊緑章躬省覽朝朝批答下綸扉元冥應候玉花攢鈴索無聲漏向闌遙憶塞垣當此夕六龍天近倍高寒堯階蓂葉四回開日下欣聞玉輅回最憶千官隨豹尾紅雲遙捧日車來聖駕東巡恭謁祖陵扈從紀事敬依癸亥御製回鑾途次用平聲韻三十首甲戌汪由敦豳館珠邱路指東鑾輿夙駕曉蘢葱星霜一紀精誠積掖輦依然昔嵗同烏桓鴈塞嶺千重詄蕩天門萬國宗到處黃雲浮麥隴行來喜色動慈容灤水潮河似錦江迎鑾新部比藩邦馬前厥角瞻天表耳貫明珠毳服厖長夏山莊小駐時新荷葉葉栁絲絲水芳巗秀清凉地殿角薰風正午吹沼魚囿鹿正鮮肥供膳乘凉試步圍恰喜前峰吐華月玉驄馺娑入林霏水檻風軒八面疏洞天福地景標初披章召對仍無息較射裁詩更課書名王衮繡效鳬趨雜伎看馳六尺駒教上御床親奠爵推心柔逺示神模曲水芳園展緑荑錘峰月上幔城西銀花散作千林錦寶界平鋪五色泥新秋曉發衆情諧西出中關景物佳帳殿披帷迎逺岫四宜居是讀書齊伊孫千折路紆回靣面芙蓉湧翠來駝􅕫馬嘶車列隊平沙萬幕此間開除道成梁念苦辛分藩列部蹟猶新奈曼敖漢經行地盡是含哺鼓腹人射生逐草舊來聞毳幕氊裘擾塞紛此日山田青不斷新畬髙隴力耔耘栁條邉裏散千村扳屋柴籬畫意存想見陟原荒度處吉林城上瑞雲屯窩集平聲閜度和鑾彌野阹山次第看射得黃羆仰神力圍來白鹿奉慈歡龍軒鳯翥衛羣山才指橋陵雪涕澘寶鼎星榆表神樹英登伊淢儼仙寰葉赫荒城灌木邉揮戈汗馬想當年前屯撫順多遺跡總是軒皇舊阪泉天柱東擎宿霧銷佳城深閟萬靈朝翠華甫蒞先趨謁詰旦升馨更焫蕭王氣昭陵龍虎交嘶風二白立秋郊誠孚帝右凝嘉貺不藉江淮三脊茅都邑何關守衛牢八紘歸命浹春膏圖球宗器傳東序貝胄雕鞍獸錦􅌢王㑹圖成職貢多梯航琛賮歷關河朝鮮譯使青驪馬蕃部降渠錦背駝土風舊俗戒浮誇豐鎬遺規百萬家坤厚積髙本長白星潢源逺接松花鮐背扶擕傍御床酺筵起舞荷龍光萬年樂利䝉先澤彌信周詩頌不忘北鎮扶輿拱帝京明禋祗薦駐霓旌回鞭問景探雲壑纈樹紅泉步步迎髙咏飛樓筆有靈雲瀾浩瀚納滄溟望洋多愧涓流細目眩齊烟九㸃青扶桑朝靄護京陵聖代鴻圖億載興詎倚雄關嚴鎖鑰萬山環拱海天澄孤竹遺墟暫憩遊湍流峭壁野烟浮平臺松籟供天藻長共清風萬古留繡甸逶迤膏澤深負暄時切頌堯心車篝􅖽秸千村樂祗有勤氏意倍欽蕭蕭班馬有騢驔御頓安營午正三衛士控強能巧中健兒角觗力沉酣行殿清暉月上簾往還五見玉鈎纎宵衣正念寒征苦又課農家瑞雪占朝衣初整拂塵衫奏賀明光樂頌咸日捧瑶箋朱尚濕鴻篇五百襲琅函讀御製盛京賦恭跋丁亥裘曰修煥乎一賦典章存册府昭垂萬祀尊不比詞臣東觀筆導揚先澤有神孫地闢天開啓聖時鍾靈長白事多竒鯫生管見何從測試誦生民清廟詩絡海包山盡大東指撝方夏劃鴻濛風雲助力天垂象寫入淋漓墨瀋中萬世丕基有自來不忘耕戰帝圖恢就中仁義堪為守拒符瑞之難諶信仁義之堪守御製中賦語也前聖心傳片語該仰識幾餘下筆親土風原是數家珍禽魚草木恩暉及物物都歸大造春藉甚三都與兩京鋪張綺繡戞瑶瑛須知雲漢為章處不向行間字裏爭研練曽聞費十年請看天筆似飛仙扶輿灝氣同磅礴傾倒詞源萬斛泉翠華兩度上陵還未得追趨豹尾間不是此番身奉使一生虛愧㸃清班盛京通志卷之一百二十六
