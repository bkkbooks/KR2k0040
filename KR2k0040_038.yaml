body:
  text: 津梁附船艦奉天府錦州府吉林黑龍江糧船附載欽定盛京通志津梁臣等謹案夏令十月成梁言橋梁也爾雅方舟乗泭言舟渡也王政利涉自古先之盛京為岐豐重地我太宗文皇帝創修叠道遼河大岸遂成坦途列聖纉緒䋲武我皇上翠華四詣凡橋梁津渡添建修葺四民懽忭免厲揭之勞臣等釐考各屬橋渡臚注於篇謹志津梁第十四欽定四庫全書欽定盛京通志卷三十四津梁奉天府各屬興京石提木橋雍正九年設在啓運山西赫穆哩渡城北蘇子河額設槽船二隻水手十三名呼勒渡呼勒國語解見吉林山川巻亦在蘇子河額設槽船二隻水手十二名以上二渡係開原縣管理斡瑚穆渡蘇子河西北渾河上流額設槽船二隻水手十四名穆喜渡穆喜國語解見闗郵巻在蘇子河西南額設槽船二隻水手十二名以上二渡係鐵嶺縣管理承徳縣馬官橋城東二十里䕶城河橋城西門又有一在城北門外轉灣橋城西二十里永安橋城西三十里蒲河經其下俗又名大石橋敕建本朝崇徳六年初我太祖始定瀋陽以西路道途沮洳命修叠道一百二十里太宗時復建此橋以便行旅至今賴之康熙二十一年聖祖東巡過此有一首恭載御製永安橋口占聖製門乾隆八年有皇上東巡過此御製雪中過永安橋詩二首十九年有御製再咏永安橋詩四十三年有御製題永安橋詩疊道詩四十八年有御製疊道疊戊戌韻詩均恭載天章門渾河橋城南十里白塔舖橋城南二十里北橋城北邊門外蒲河木橋城北二十五里李岡屯橋城北三十五里大窪橋城北四十里泥溝舖橋城北五十里范家橋城北九十里桑林橋城東南二十里白蒿溝橋城東南三十里石橋城東南三十五里奉集堡橋城東南四十五里板橋城西南三十五里巨流河浮橋城西南一百里經以上共橋十九座乾隆四十三年商民捐修一次石廟子渡城東二十里舊設渡船二隻乾隆五年奉裁改設槽船二隻額設水手十二名七間房渡城東六十里雍正十年設渡船二隻額設水手三十二名乾隆五年奉裁遼河渡城西一百里舊設渡船二十二隻額設水手五十七名乾隆五年奉裁十方寺渡城西遼河上係承徳鐵嶺交界處額設渡船二隻水手十二名渾河渡城南十里額設渡船二隻水手四十名又有渡船四隻係巨流河浮橋船乾隆十九年撥至渾河渡口額設水手二十四名遼陽州昇仙橋城東門外鎮逺橋城西門外昇平橋城西門外安定橋城南門外已圯萬寶橋城北四十五里蛤蜊河上梁水橋城東北三里座以上共橋六太子河渡城東北十五里額設渡船二隻水手十二名海城縣沙河橋城西十里利涉橋城西四十里三岔河橋城西六十里事蹟謹稽實録天命六年春三月我兵既克遼陽城辛未太祖命台吉徳格類齋桑古率八旗大臣引兵一千安撫人民併閲三岔河橋至海州城中官吏及殷富之家張鼓樂肩輿來迎兩台吉攬轡傳令禁軍士不得奪民財物登城宿勿入民家既入城兩台吉宿公廨軍士俱屯城上次日所遣閲視三岔河之人來曰橋已拆斷亦無舟楫遂安撫人民而還三里橋城北五里土河橋城北十五里八里橋城西南八里夾河橋城西南三十里楊家橋城西南七十里橋頭橋城西南七十里散水橋城西北三十里以上共橋十座三岔河渡城西六十里額設渡船二隻水手二十名蓋平縣聖旭橋城東門外惠風橋城南門外清河橋城南門外堝頭河橋城南二十五里仙水橋城南四十里俗名張果老橋石上有掌指及驢跡狀今圯猶存石址仙人橋城南五十里已圮猶存基址新安河橋城南六十里熊岳河橋城南六十里淤泥河橋城北五十五里俗名大石橋小石橋城西南二十里以上共橋十座開原縣和陽橋城東門外久圯乾隆三十一年重修廣順橋城東六十里慶雲橋城西門外馬鬃河橋城西三十里亮子河橋城西五十里清河橋城南門外太平橋城南門外今圯八里橋城南八里頭臺子東三山橋城南三十里安逺橋城北門外今圯以上共橋十座扣河渡城東三十里雍正五年設渡船二隻係奉天府各州縣派撥水手擺渡𨽻開原縣驛丞管理清河渡城南二里舊設槽船二隻水手十二名又有渡船二隻係乾隆十九年由巨流河撥至四十一年因渡口水淺移送遼河口濟渡鐵嶺縣遼海橋城南十五里柴河橋城北三里周勝橋城北十里今圮范河橋城西南范河南一里小橋范河南三里清河橋城西南懿路城南門外以上共橋六座麒麟渡城西額設渡船二隻水手二十名范河渡城南三十里額設槽船二隻水手二十名係承徳縣撥入就近管理復州真武橋城東門外沙河橋城南八里公王壩橋城南八十里北清渡橋城西南四十里以上共橋四座寜海縣卦符橋城北三十里岫巖城葉和尚橋城西南一百八十里錦州府錦縣雙楊店橋城東二十里十三山石橋城東八十五里小凌河橋城西門外高橋城西五十里葛王碑橋城北十八里利涉橋城東南三十里在星聚屯康熙十六年建以上共橋六座小凌河渡城東十五里額設渡船二隻水手三十名大凌河渡城東四十里額設渡船一隻水手五十名寧逺州募建石橋城西南中右所城南門外小石橋中右所西南土城門外石橋城西南中前所城東二十里五里橋城西南二十五里亂石山下以上共橋四座廣寧縣通濟橋城中鼓樓南經濟橋城内東隅會流橋經濟橋南城内長春大惠二水至此合流鄰泮橋城内儒學西今圯大惠橋城東門内大惠水經其下迎秀橋城西門内長春橋城西門内長春水經其下新廣濟橋城南門外秀水橋城南門外新橋城北門外拱辰橋城北門外教塲南今圯觀瀾橋城東南門外羊膓河橋城東三十五里火石橋城東三十五里平逺橋城東湖溝舖東三里柳河溝橋城東二百二十里雍正九年募修堤道隨水勢建木橋數座乾隆四十三年經商民捐修添建石橋一座木橋六座四塔橋城南九十里今圯平洋橋城東南高平驛東五十里廣濟橋城東南盤山驛東五十里以上共橋二十五座義州閲武橋城南門外通逺橋城南門外今圯凌河橋城北門外座以上共橋三吉林各屬吉林遵法橋城内將軍公署南珠嚕多觀河橋珠嚕多觀國語解俱見吉林山川卷城東二百九十里相傳為任和尚募建二以上共橋座烏拉渡烏拉國語解見建置沿革卷城西十里康熙十一年設渡船六隻二十五年添設渡船二隻乾隆五年奉裁四隻現額設渡船四隻松花江渡城東南康熙三十三年設渡船八隻雍正二年移二隻於阿勒楚喀現在額設渡船六隻葉河渡城西南與開原縣交界處額設渡船二隻係奉天府各州縣𣲖撥水手擺渡𨽻開原驛丞管理寧古塔石甸子橋城西一百餘里黑石甸子空處相傳亦為任和尚募建阿勒楚喀阿勒楚喀渡城東北雍正二年自松花江移設渡船二隻以上諸渡俱係吉林將軍管理黑龍江各屬齊齊哈爾呼倫河渡呼倫䝉古語解見吉林山川卷城東六百里額設渡船二隻嫩江渡城西五里額設渡船二隻係水師營所轄塔拉爾河渡塔拉爾蒙古語解見闗郵卷城東北六十里舊設渡船二隻雍正五年移設一隻于墨爾根嫩江渡口現在額設一隻係黒龍江站官管理墨爾根訥黙爾河渡訥黙爾國語蒙古語解見疆域形勝卷城南一百六十里額設渡船二隻嫩江渡城西北一里雍正五年自塔哈爾河移設渡船一隻黑龍江黑龍江渡城東額設渡船二隻乾隆十四年添設以上三渡俱係黒龍江水師營管理糧船附載奉天運糧船八十隻康熙三十三年造後裁遼河運糧船一百隻康熙二十二年造後裁伊屯河槳船二十隻康熙二十二年造運糧船一百隻二十九年改造槳船二十隻混同江運糧船三十隻康熙二十二年原造五十隻二十三年添造三十隻五十八年裁去五十隻現存三十隻額設水手修船夫役共三百三名齊齊哈爾運糧船四十隻康熙三十八年自墨爾根撥來五十隻三十九年撥往黑龍江十隻現存四十隻墨爾根運糧船六十六隻康熙二十八年自黒龍江撥來二十九年裁去十六隻三十八年盡撥往齊齊哈爾黑龍江運糧船六十隻康熙二十二年自船厰撥來一百三十二隻三十八年撥往墨爾根六十六隻三十九年自齊齊哈爾撥來十隻現存四十隻呼倫運糧船十隻乾隆五年添造三以上共額設水手修船夫役百名按以盛京上各處船隻過應修理俱於工部支銀辯理聖祖仁謹案康熙二十二年二月輓維艱皇帝念烏拉水陸重鎮輸特命盛京刑部侍郎噶爾圖防守協領音建琿相視可達混同江河道繪圖進呈復遣噶爾圃等乗小舟自遼河遣烏拉副都統斡哩瑚等自伊屯口測其水道淺深覆奏奉旨設倉四處内地設于巨流河之開城邊外設于鄧子村烏拉設于伊屯門及伊屯口農隙時運米貯于開城倉内以春秋二季舟運至鄧子村交卸自鄧子村至伊屯門百里無水路車運至伊屯門倉内由伊屯河舟運出伊屯口竟達混同江其遼河伊屯河俱造運船百隻以瀛臺白剪油船為式俱加長三丈五尺濶七尺高二尺五寸毎隻載米六十倉石為率其混同江用大船八十隻接運毎船載米二百石為率其遼河運丁滿兵三百名奉天所屬各州縣分派水手六百名毎名月給銀一兩仍免具丁地伊屯河及混同江水手俱由寧古塔將軍分派嵗以為常嗣後各鎮開墾既廣儲峙有素無事輸粟之勞運船積於無用臣等謹稽始末仰見我祖軫念民瘼有備無患之至意且以見經畫之事隨時異宜謹詳識馬欽定盛京通志卷三十四
