body:
  text: 列女本朝宗室福晉奉天將軍所屬八旗節婦欽定四庫全書欽定盛京通志卷九十四列女二本朝宗室福晉烏拉福晉納喇氏貝勒莽古爾泰次福晉也貝勒卒欲從殉太宗文皇帝諭止之福晉固請遂至别室自盡侍妾一人亦從死焉福晉納喇氏克勤郡王嶽記福晉也崇德四年嶽託薨福晉以身殉焉奉天將軍所屬八旗烈女劉四姐遼陽正黃旗人少失恃父有廢疾女自幼常依嫂以居嫂與牛七通恐四姐發其事欲並汚之四姐抵死不從嫂遂與牛七殺四姐事發姦淫俱誅為四姐建貞烈坊於遼陽西門外王國勳妻汪氏奉天漢軍正白旗人守貞教子孫琮舉孝亷皆汪氏教育之功夀至八十五又王國輔妻孫氏夫殁僅一子朝夕督課教育有成遂襲佐領孫氏撫愛侄輩衣食必先已子尤人所難時與國勳妻稱一門雙節王命召妻滕氏蓋平城守漢軍滕天成姊也氏適命召未期命召從征粵東後自京移家往滕抵粵甫五日命召病卒乃號泣自縊李度妻趙氏奉天鑲黃旗人年十九夫亡無子苦節六十一年夀逾八十清格妻瓜爾佳氏奉天正紅旗人年十九而寡以苦莭終阿克順妻趙氏孀居三十餘年志節堅白族里賢之索斐妻索佳氏名楠珠夫亡守節三十餘年阿哩尼妻托和囉氏名阿雅爾漢夫亡守節三十餘年阿布尼妻納喇氏名妞妞夫死矢志不二苦節三十餘年阿克恕妻覺羅氏名胡什巴夫殁青年守志百折不移雅爾遜妻赫舍里氏夫以疫終氏事孀姑撫幼子守節三十餘年義思哈妻覺羅氏夫早夭氏矢志靡他興京又禮部壯丁金柏連妻李氏旗巴拜妻王氏釋鑲黃旗莫輝洛妻徐氏正黃迦保妻納喇氏漢軍鑲黃旗堇國祥妻李氏張明儒妻汪氏正白旗劉得祿妻趙氏劉廷印妻旌表金氏其於康熙年間先後穆立泰妻趙氏福陵總管所屬正黃旗人年二十而寡家貧守節三十餘年剛安泰妻趙氏福陵總管所屬正白旗人年十九而寡守節三十餘年費楊武妻傅氏福陵總管所屬鑲紅旗人年十八而寡守節五十餘年竈保妻瓜爾佳氏昭陵總管所屬正黃旗人夫亡守遺孤嫠處四十年伍達克妻䝉古索氏昭陵總管所屬鑲白旗人夫亡二子皆幼堅志守節氷操厯四十五年書魯木妻郎氏昭陵總管所屬正藍旗人夫亡子幼苦節四十一年費楊古妻赫舍哩氏昭陵總管所屬正藍旗人夫亡上無舅姑下無子女三十四年苦節不渝烏河諾妻覺羅氏昭陵總管所屬鑲藍旗人夫亡子弱苦節五十年高登舉妻謝氏昭陵千丁內鑲黃旗人夫亡氏甘貧守節四十年未嘗有怨色張成文妻金氏昭陵千丁內鑲黃旗人青年夫殁勵志守孀年近六旬艱苦備至胡登元妻祁氏昭陵千丁內鑲黃旗人年十九而寡守節五十六年李天鳯妻李氏昭陵千丁內鑲黃旗人夫亡守節厯五十餘年古禮妻李氏奉天鑲黃旗人古禮陳亡李氏守節終身韓奇妻郎氏奉天鑲紅旗人年十八夫亡以節終王守貴妻李氏寧海正黃旗人夫家近海地多流寓氏偶為山東客民宫奉高所見不及避驟為所逼扺死拒之奉高不得所欲搯氏喉至死奉高伏法特建烈婦坊以表之劉元輔妻吳氏漢軍鑲白旗人夫亡幼子亦夭吳氏孤貧終無二志滕文煥妻崔氏奉天正白旗人甫納䏂文煥即殁氏誓死不嫁至滕門守節三十餘載雍正十年入節孝祠滕文煜妻徐氏奉天正白旗人夫早亡氏堅守孀操厯三十餘載終始如一徐得妻許氏漢軍鑲黃旗人守節撫孤三十餘年劉登科妻賈氏漢軍鑲黃旗人夫殁誓不再適三十餘年完守節操筆帖式福克山妻塔坦氏奉天鑲黃旗人年十九夫亡氏奉孀姑撫幼子曲盡孝慈苦節三十餘年李建龍妻盧氏奉天鑲黃旗人夫亡子濬方幼門祚衰薄氏矢志柏舟苦節不渝建龍侄澄妻劉氏源妻李氏俱青年守節一門三節實自盧氏倡之艾教民妻羅氏鳯凰城正白旗人夫亡羅氏年十九子方周嵗家徒四壁羅氏奉姑撫子守節五十餘年筆帖式諾敏妻鈕祐祿氏奉天正紅旗人夫亡幼子相繼俱夭孤苦零丁誓不更適夏璽妻扈氏鳯鳯城守漢軍夫亡子方數月氏青年赤貧苦節四十餘年圖桑阿妻趙氏年十六而寡守節四十九年闕元保妻趙氏夫陳亡氏年十七守節以終瑚勒格諾妻書氏子未周夫亡守節艱辛備至以上四人舊志未詳旗分又護軍蘇達立妻趙氏筆帖式宫色妻趙氏奉天鑲黃旗騎都尉薩木哈妻色勒哩氏常祿妻赫舍哩氏穆澄妻王氏覺和托妻覺羅氏桂兒妻田氏伍栭妻陳氏杜爾泰妻姚氏趙拜妻瓜爾佳氏伍爾妻陳氏曾保妻閔氏常祿保妻何氏趙巴燕妻關氏覺圖妻王氏舍立泰妻趙氏吳靈阿妻關氏三雅圖妻顔氏魯夀妻于氏正黃旗西蘭泰妻王氏那爾泰妻烏雅氏瓦什妻扎拉氏雅蘭泰妻李氏伍勒妻髙氏沙賴妻黃氏海蘭妻趙氏正白旗賽達禮妻烏雅拉氏達崇阿妻張氏保住妻覺羅氏沙賴妻納剌氏那喇庫妻白氏鑲白旗莽古爾賚妻瓜爾佳氏鄂阿納妻高氏阿金妻烏嚕特氏正紅旗關六格妻康氏白蘇朗妻溫察氏達薩布妻韓氏安圖妻高氏巴延圖妻傅氏溫補妻王氏白斯瑚郎妻溫察氏和善妻趙氏長夀妻吳氏松額托妻蘇氏瑚西那妻劉氏輝奇妻費氏伊拉根妻趙氏尼卜鈕妻吳氏剛阿塔妻唐氏鑲紅旗奈信妻舒舒覺羅氏薩密哈妻瓜爾佳氏白圖妻吳氏農生妻關氏乃新妻獨獨覺羅氏哈爾吉納妻瓜爾佳氏莫和勒妻阿蘇特氏扎爾呼妻巴雅喇氏石頭妻圖默特氏鈕什妻們綽克氏那爾泰妻卓絡特氏李芬芳妻孫氏鑲藍旗花薩里妻瓜爾佳氏納楞額妻喀爾拉氏薩那王妻氏喀里代妻關氏多利妻寧氏陶法哈妻孫氏索色妻吳氏希爾德妻烏嚕特氏張國賔妻楊氏正藍旗固爾泰妻史氏察穆布妻巴雅喇氏保拜妻楊氏渾奇妻瓜爾佳氏麻色妻馬氏馬楊阿妻楊氏達蘭泰妻張氏間散保住妻倉氏法吉納妻趙氏都伯盛妻傅氏麻奈妻馬