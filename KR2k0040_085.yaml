body:
  text: 國朝人物奉天籍屬欽定四庫全書欽定盛京通志卷八十一國朝人物奉天籍屬林天擎蓋平人順治二年知山西蒲州府時冦亂頻仍境土初闢天擎招流亡寬夫役築廬舍掩胔骼省刑罰薄賦稅安插兵民具有幹略州人胥頌之卒祀山西名宦陳素抱鐵嶺人順治二年知山西猗氏縣邑人陳蠻子脅衆為亂素抱曰賊愚而詐人必不附已而果為鄉勇所殺五年逆鎮姜瓖之亂大軍分路進勦素抱已偹兵潼關伺帥府渡河力陳猗氏民必不應賊請以其子佩從令先馳至縣召士民出迎帥府慰勞大軍遂不入境猗氏民感其德王廷用奉天人順治二年知陜之華州時冦亂甫定征役尚煩民多愁苦廷用申請臺司計闔州糧石每里十甲均輸差糧不擾閭閻始有更生之樂張文德遼陽人順治三年知山西垣曲縣晉省數遭冦亂所在荒殘文德鎮以寬大刑清政簡潔已愛民在任數年民氣始蘇卒於官士民感涕建祠祀之張杰奉天人順治三年浙東初定擢杰為總兵官鎮定海時海冦盤踞舟山與內地山賊相煽杰勦撫並行賊多降附復㑹勦舟山殱其衆移鎮黃巖率溫州水師出海從大軍恢復舟山有功調防京口康熙元年為浙江水師提督加宫保吕秉忠奉天人順治三年為江南太平同知時姑孰初定土冦竊發前此督捕者多羅織無辜秉忠力為詳釋保全無算叛鎮金聲桓擾江西郡縣順流北下秉忠奉督撫檄守陳沙洲軍容整肅賊兵不敢窺渡在任三年清介亷潔及升知府去無舟車費巡按竇蔚贈以俸金始得啓行陳儲賢遼陽人順治三年知山西之榆社縣時屢經流冦蹂􅏳瘡痍未復儲賢撫民慈愛比户俱樂更生如登袵席及儲賢去任有王來峯者蓋平人接任榆社亦稱撫字最民有父去母來之譽及卒並祀名宦祠徐騰鯨奉天人順治三年署泉州之安溪縣值土冦林艮等聚黨劫掠騰鯨練鄉勇設竒計屢出力戰斬馘甚衆賊遁去不敢再犯安溪四境寧靜邑人深感其德蔣三捷奉天人順治初任通州兵偹道亷明有威惠政聲甚舉向有解撥兵米耗費民多病之三捷力為革除及大軍北征運餉絡繹三捷於經費不足者悉出已資辦具不以煩民民甚德之許可用蓋平人順治四年為山西雁平道賊渠劉遷糾衆犯代州可用嬰城堅守密遣人期大軍合勦遷遂授首州城卒獲安全代人立祠祀之連登奉天人順治四年知直𨽻順德府嵗饑力為賑救全活甚多有猾吏以練習久任事登一日三發其奸吏惕息改行擢山東副使有瞽者數十人當轍卧曰吾輩不能覩公顔色請撫摩以志去思登從之再拜痛哭而去邑人立生祠於北門內六年備兵登州時海氛未靖登勦撫兼得民賴以安捐俸修學而鞫獄尤稱明敏一時有神君之頌卒於官並祀北直山東名宦趙世禎開原人順治初知江南之沛縣厯遷知江南安慶府均地丁省徭役值嵗饑旱捕蝗禱雨皆有實政十年歿於官貧無以殮皖人肖像祀之于永綬奉天人順治四年由副將屢積軍功擢任福建汀州總兵官汀與贛接壤值叛鎮金聲桓據江西又土冦竊發環逼郡城四路援絶永綬帥副將髙守貴堅守拒戰汀郡獲全未幾疾作正衣冠端坐而逝汀人畫像以祀之門育英瀋陽人順治五年知江南六安州之霍山縣土冦作亂蔓延不已育英悉力捍禦身先士卒轉戰深入渠魁授首城邑獲全霍人銘頌勿喧卒祀名宦徐來麟奉天人順治五年知山西平陽府是年姜壤遣叛黨攻平陽來麟悉力捍禦郡城獲全已而延安王老虎應賊渡河拔汾州復攻平陽來麟與巡道王無黨參將范永宗固守時出鋭師擊之擒其僞將劉光明㑹大軍至賊解圍走來麟追斬賊首劉四亨於唂口村餘衆悉潰時副都統杜珉以兵應援而運城獲全總兵李延夀夜襲竇村而五臺圍解陳秉彛奉天人順治中知江南如皋令下車敷政以去弊惠民為先務㑹霪雨江水泛溢民多流亡秉彛親勘災荒加意撫循施粥設賑全活甚衆趙汲錦州人順治五年初任直𨽻盧龍令亷明仁厚前令修學未竣汲慨然自任重修明倫堂櫺星坊及門廡齊房皆繼成之時部檄召辦芻豆羽書旁午民間供應不及汲乃給值鋪商以所收米豆備運不稍擾民而公事立濟八年升泰州知州下車即擒大盜游三游四等一境肅然民賴以安疏淤河修學宫設藥厰貸貧民完漕缺廣積儲州被水災力請蠲恤其德政不可枚舉郭永靜奉天人順治初知江西之上饒縣值叛鎮金聲桓作亂江右無完土永靜綢繆措置善保疆境民始得安及亂定後搜捕黨惡株連甚衆永靜詳察情僞全活甚衆王宇春奉天人順治五年知江南揚州府為政虛已和衷咨詢民間疾苦有所見聞即力為拯救凡勾稽㑹計皆手自考定不假掾吏吏亦咸畏之無或作奸犯科時有一清如水之譽彭可謙奉天人順治五年知山東之堂邑縣時土賊侵犯甚亟可謙訓練民兵廣設方略獲其渠魁奪還被虜男女七百餘人事平方議叙功而部故以催徵不力難之可謙曰遲我十年升轉待民力全復何如撫臣知其不可動為疏請得免新舊稅糧擢為本府屯田同知郭士賢奉天人順治六年為江寧上元令公正亷明撫字以仁嘗請於上官捐贖鍰以充倉糧蠲積缺之困於嵗歉者邑人德之久而不忘去任後祀之安應麟奉天人順治初知山西浮山縣時叛鎮姜壤餘黨踞縣東南應麟偕千總秦文英耆老張三鳯入賊巢諭之降者八百餘人悉遣歸農申請豁荒糧數千石以紓窮民之力復修縣治之毁於賊者田廬井里始皆復業秦宗堯義州人性亷儉順治六年知陜之華州甫下車鼎新文廟以作士風及大同姜壤之亂宗堯轉輸不擾又流冦盤踞石脆山出沒無常宗堯直搗賊窟殱之州境以寧尋擢知江南寧國府時選召天下賢守令十六人各敕賜衣一襲宗堯與焉張一龍錦州人順治六年知山西沁源縣叛鎮姜壤之亂太行綘霍間多為賊脅及大軍勦平賊黨議縣人從賊罪欲駢誅之一龍泣爭願以百口保其無他縣人獲全以遷秩去邑人號泣遮道送者不絶復建祠祀之王添貴奉天人順治六年知山西隰州逆鎮姜壤之亂土賊蜂起隰州尤甚添貴率大軍搗其巢穴賊咸潰走其降者悉令歸農事平將領疑居民從賊將議屠城添貴力請始獲免爰為安輯流亡開墾荒畝以時修和善政日舉隰人德之穆爾謨寧逺人順治初知江南贛榆縣精明强毅聽斷如流案無積塵時土冦猖獗爾謨親師鄉民勦捕斬其渠首賊逺遁不敢復犯縣境以安侯世爵奉天人順治七年知山西寧鄉縣時逆鎮姜壤亂後賊餘黨衛敏破縣城據之世爵簡士卒躬自督率巷戰誓不與賊俱立賊懼委城去世爵招撫流離慰安反側閲二年遂有盈寧之樂比解組百姓攀轅流涕袁仲選奉天人順治七年知山西澤州時逆鎮姜壤叛黨猶據城仲選未至先出令宣示具言大同破瓖授首狀賊見狀咸遁去及􅊩任招流亡安反側閭井晏然大軍以州人嘗從賊議屠之仲選為民哀請且以家口保之主帥曉澤人曰吾以爾使君故免爾等死爾等其服使君之教為善自新民皆歡呼謝卒後民建祠祀之秦世禎廣寧人順治八年巡按江南清亷剛果力湔積弊墨吏蠧胥誅逐不遺理囚多所平反漕卒為橫索贈無藝疏請立五米五銀法著為令一時稱為善政陳培禎奉天人順治中任江南左布政以亷幹稱十六年值海冦鄭成功犯江寧勢張甚被圍日久城中食盡民將為變培禎開聚寶門以通運人心乃安旋與總兵梁化鳯潜開小東門出不意擊賊大破之江寧圍解境土敉寧湯九圍奉天人順治中知安徽來安縣民多凋瘵九圍一意匡救邑田畝多鬻於省州紳士里役大為民害九圍定為官收官解之法積困以蘇楊鶴年奉天人順治中以鳯陽守兼署滁州篆時冦入犯滁州密邇㑹城人心惶擾鶴年嚴為守備以鎮靜處之訛言繁興皆置不問人服其持重及賊平闔屬卒無恙而詐僞亦息士民賴之樓希昊奉天人順治九年以參政分守南汝時賊黨吳加寬于七等煽亂希昊率葉令許鴻翔勦平之境內獲安賊平後辟草萊招流散治田疇賑貧乏遺黎始安堵如故牟文龍錦州人順治九年知江南儀徵縣機警有幹才征戍往來多索牽挽夫役文龍應付有方民賴不􅉵邑多秀良文龍請增學額以勵士風康熙八年任開封河務同知值河流衝决躬自辦料督工奔走嚴霜烈日中者四載及攝府篆尤多善政後以最遷慶陽守民遮道攀留數里不絶陶鼎鉉奉天人順治九年知直隸趙州亷潔自持明於聽斷治聲甚著值大軍南征畿南州縣多差役鼎鉉身自督辦公事集而民不擾吳允升奉天人順治九年知江南廬州府興水利勸耕桑嚴奸宄清保甲境土大治值嵗旱設法賑濟全活甚衆又捐俸撫恤運榖平糶黎庶無流離之苦皆各安其居李如桂瀋陽人順治十年知陜西紫陽縣時甫遭兵燹邑治荒殘如桂撫綏遺黎墾田築城修學養士百廢具舉後以僉事提學兩浙廣勵人文賢材蔚起自守尤著清操鄒藴賢奉天人順治十年知山西解州時州治屢經冦亂民生凋敝藴賢絲毫不取諸民輕徭緩徵以蘇積困閭里漸知樂業既去州人建祠祀之胡士梅錦州人初任河南祥符令時汴城因河決為民害士梅招流移問疾苦新安十三寨之民賴以全活者甚衆順治十年遷赤城同知擢河南屯田道闢荒地千餘里增課至二十七萬兩舉治行卓異馬呈祥奉天人順治中知陜之同州有强幹才時經兵燹後百務未舉呈祥招集流亡修城堡清糧地勸耕植民以復業北山餘冦未息呈祥兼行撫勦脅從降附者悉遣歸農反側靖而州境安胡有德奉天人知陜之華州慈惠明决順治十一年夏大旱具文城隍深自刻責須臾風雨驟至秋禾有成人咸謂其精誠所感召嘗憫所屬寒畯嵗給榖至數百石俾資膏火一時人士咸愛戴之羅麗宸奉天人順治十一年知粵之髙州府英敏亷幹心存撫字嘗偶疾不視事聞堂下有呼寃聲力疾出問白其寃軍興之際富民苦重役多請出資告免麗宸即以所資助役使貧民均其徭時藩帥下悍將以客兵駐府白晝攫於市麗宸馳戒其將下令約束民乃安堵後以赴省疾卒民甚哀之傅應薦奉天人順治十二年知江南泗州曉練吏治己亥夏淮漲灌城水大至左右趣登舟應薦叱之曰吾他適如我民何乃於堤前拜水疾呼禱畢水勢驟減城得不沒一時以為神明所感徐化成奉天人初任河南光州有巨敦張可大羅平等負固山寨化成設計擒之賊渠授首境土安輯順治十六年升河南左布政藩署自遭河患連年移駐雍邱康熙二年始歸省㑹化成捐俸更建衙署役興而民無所擾王興禹廣寧人康熙元年通判湖廣常德置義塜廣賑濟居官亷正及權知府事時山冦剽掠城邑為墟興禹一意招集贖回被虜子女驅逐悍卒諸所徵發不事追呼胥吏作奸必置之法威惠並著邱文崇順天人康熙二年知粵中之化州加意安輯俾民各安其業時大軍規畫征勦凡兵丁所至郡縣恣其所為崇文盡力措置悉按經費支給餘概不以纍民供億之繁十減五六化人祠祀之李應棠奉天人康熙四年知四川名山縣川省自明末張獻忠亂後山冦頻出滋擾户口稀少應棠之任招徠流播開闢荒蕪繕城郭修縣治民不勞而樂趣事時稱賢令王章錦州人康熙初為陜西興安知州甫到官值軍興總鎮責州民輸糧牧馬民大困敝章申請上官立禁除之州故無學校士無由嚮學章出資創建十七年會兵進勦茅麓山巨盜芻糧器械應機立辦鄖陽巡撫檄州民運鑲章念民力已竭竟不應制府察核得其實亦不加罪張國輔奉天人任河南汜水縣明决果斷釐弊鋤奸建義學置義田振興文教勸課農桑初汜人不知育蠶國輔督令宅旁隴畔家悉樹桑不數年緑陰滿徑繭絲滿室民享其利又設立布市革里長陋規修城堤編裁榆栁興利除害有古良吏風卒於官士民祀之何朝聘奉天人康熙初知江南舒城縣寬簡慈和與民休息公暇即躬自勸農招民墾田給以牛種治舒七載訟獄衰息比户但聞誦讀機杼之聲一時稱為賢宰閻竒英奉天人康熙初任粵之潮州通判兼署府篆值叛鎮劉進忠反奉委籍沒其家執逆婦周氏囚之手斬悍僕十餘人餘黨悉就俘從大軍討平逆亂功績懋著後復聞海冦陷漳州憂憤成疾卒潮人哀之劉宏德開原人康熙中任直𨽻涿州知州寬仁敏練案無留牘獄鮮滯囚其居平儉約一室之中惟茶具數事咸重其清節王宏仁遼陽人康熙十三年初任浙之湖州守嗣調衢州時逆藩耿精忠叛衢為浙閩要衝滿漢將士畢集宏仁調度供億不擾於民指陳方略動中機宜又力請蠲賑兼施以蘇民困衢人德之趙清貞奉天人康熙十四年知江南之滁州下車伊始即以廣儲畜為要務值嵗旱力請蠲賑全活無算聽訟明敏不枉斷不苛求民皆懾服吏胥畏憚不敢舞文骫法髙必騰遼陽人康熙十四年知浙之烏程縣聽訟明允不狥干謁值編審全賦釐剔積弊必騰詳加勘核官民一則徭役均平􅊩任九年擢守新寧士民遮留填溢閭巷李煦奉天籍昌邑人康熙十七年補粵之韶州守時海氛漸靖民求安集煦乃招集流亡修復學校力行教化弊絶風清改任時民為立遺愛祠於湘江門外李燦奉天人康熙中知江南池州府飭六邑減耗羡嚴保甲倡修府學建城東回瀾書院以勵士習又築貴池黃屯阪埂開銅陵洋山磯路重建城南濟川橋水陸通衢民大稱便馬化龍奉天人康熙二十年知江西南安府絶請托革浮耗禁科𣲖正色率下屬吏敬憚尤敦勵士風倡修文廟開設義學政聲大著潘士端錦州人康熙中知江西鉛山縣時山賊盤踞屢出冦掠士端募死士授以方略馘斬二百七十餘人生獲九人繯首曉示賊遂遁去一境戢安民咸欣悅孫育珩奉天人康熙中知浙之新城縣以亷惠為治開永昌縣新渠築堰以資灌溉嵗苦旱徒步數十里以禱甘㴻立沛郊原霑足轉歉為豐因感寒疾卒民巷哭肖像祀之至今舁像禱雨無不應者賈有福錦州人康熙二十三年知粵西之鬱林州值土冦猖獗肆出劫掠潯梧各路進兵㑹勦有福匹馬從征奮勇陷陳諸盜相繼授首州經兵燹後多逋缺力請蠲除以蘇遺黎民獲安堵有福我孔多之頌董鼐奉天人康熙二十四年知山東武定州訪察積弊立除里長之役又詳請臨清米石改折銀兩及德州運米就近兑給兵糧民纍永除軍亦稱便及卒入祀名宦祠徐嘉賔奉天人厯任監司屢擢至雲南按察使不通餽遺不受請謁雪寃懲慝宵小絶迹及遷布政司均賦役定義學籌制省城書院膏火俾士人卒業於此並興水利以利農田偶遇偏灾拯恤流移全活甚衆乾隆十一年入祀滇省名宦何顯祖義州人康熙二十六年知河南汝寧府仁慈爽亮政事練達下車日十四城利弊即時興除吏畏民懷聲名藉甚後有陜西運米之役極言汝寧地瘠民貧不可例他郡上官卒從其議去任後民立祠祀之黃驥復州人康熙三十三年授山東夀光縣訓𨗳整飭學規凡士子有涉訟缺糧者輒擯斥不許接見訪其行事改則禮之以是人知自愛至於廟廡堂齊以時修葺不假力於有司士人尤重其義式化者日衆王輔奉天人康熙中知山西平陽府平陽地震火灾數見官署民舍多燬諸豪暴乘間剽掠悉擒置重典民始獲安嵗疫死者給以棺其不足以席繼之又不足則為大冢數十别男女埋之又榜招他郡邑人能占籍曠地胥為永業聞者爭集户口不至大耗云吳殿弼遼陽人父三元仕至貴州遵義守性亷介不茍合逆藩吳三桂知其名欲與通譜三元終不納及三桂敗諸通譜者皆得罪人始服其卓識殿弼以貢生效力軍前隨征水西積功授大姚令再補慈溪值大嵐山劇冦龔萬里時出剽劫殿弼與鄰近四縣團練鄉勇㑹勦迄於冦平鎧甲衣糧殿弼多自捐備在慈十年雖征調浩繁旱疫頻仍而案無寃牘境無流殍既擢松江郡丞邑人追思崇祀名宧周銓元錦州人康熙三十五年由河南管河道升授河南分守道詳豁協辦江南栁束改河夫協𣲖里下者官自雇覔民獲更蘇因小灘窵逺運米未便議改衛河水次官民便之卒祀名宦祠欽定盛京通志卷八十一
