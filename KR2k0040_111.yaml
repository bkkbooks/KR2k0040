body:
  text: 物産二藥類禽類獸類水族類蟲豸類欽定四庫全書欽定盛京通志卷一百七物産二藥類凡草木禽獸蟲魚諸類有入藥已見本類者不更臚載人參春秋運斗樞搖兒散而為人參金史地理志遼陽府産人參契丹國志女真地饒山林土産人參寧江州𣙜場以人參為市新羅貢成形人參一統志盛京吉林烏拉諸山中産焉邃谷深巖參株叢茁嵗生滋饒上藥咸珍皆由土氣鍾靈神臯育蔚瑞草儲精敷榮萃秀實足為億萬載靈長之徴云舊志凡初夏得者曰芽參花時得者曰朵子參霜後得者曰黃草參參鬚參果參子參膏無不珍之髙麗人參贊曰三丫五果背陽向隂欲盛京來求我椵樹相尋頗得其形似吉案地方行放地方行放額爾敏合勒們參栗林烏蘇哩綏芬英峩嶺東山羅拉密瑪延等處參票乾隆三十八年定例於欽盛京五部侍郎府尹等官內前往每次年請放參票𣲖一員協同辦理停派京員各將軍等於刨夫回山後密看多寡情形定擬其奏由部給參票紅票分水陸路給發並給腰御製人牌於緊要隘年驗放又乾隆十九年有參詩四十三有御製盛京土産詩三曰人參俱恭載天章門茯苓宋㑹要新羅出茯苓今按生松樹下抱本者為茯神吉林烏拉大山中多老松茯苓茯神及松香皆有之五味子爾雅謂之荎蕏凡入藥以遼東子少肉厚者為勝金史地理志大定府出五味子一統志今奉天錦州二府及吉林皆有之茱萸金史地理志大定府産茱萸今産奉天東北諸山亦有之亞於吳細辛一名少辛管子五沃之土羣藥生少辛是也醫家以遼細辛為佳通行各省白附子一名節附俗呼兩頭尖母為烏頭産遼地者通行逺省金史地理志東京路遼陽府一産白附子明統志都司出黃精服食上品博物志太陽之草名曰黃精初生苗土人採食之名筆管茉玉竹似黃精苖即小筆管萊鈎吻不同赤芍即芍藥根吉林黑龍江所産較勝他處亦有白者金線重樓本草作蚤休明一統志重樓金線長白山出按是草生於深山隂濕之地亦名紫河車亦名草甘遂亦名三層草處處有之未有採者艾爾雅謂之氷臺葈耳即詩之卷耳俗呼蒼耳子百合根如蒜頭有瓣又一種卷丹子生葉間又山丹似百合而小亦名紅百合根皆可食蓋一類三種惟百合入藥奉天吉林黑龍江皆産此木通一名通脫木澤蘭莖方節紫葉似蘭草而不甚香根名玉環菜山谷隂濕處亦有生者地丁有紫花黃花二種車前即詩之芣苡好生道旁布葉如輪俗呼車輪菜抽穗結子即名車前子絲子爾雅謂之唐䝉今豆田中多有生者甘草邉地生者勝桔梗古名薺苨即杏葉菜苖曰明葉菜根為甜桔梗五加皮五葉交加故名宜漬酒貝母花白葉似韭一名􅔾商陸即易之莧陸處處平澤有之牛旁子一名惡實葉亦可為火絨黃芩有條芩有枯芩吉林黑龍江諸處皆産焉逺志苗名小草即詩之葽貫衆葉圓碎一枝而衆葉貫之又名鳯尾草入藥用根地榆葉似榆而長花可染色生於平原曠野石葦生諸山中石上衛茅幹上皮薄旁展者如箭羽石花生石崖上如兒拳外白內緑遇雨則開形同柏葉採置水中經月如新即卷柏也樹膽生樹間如膽四臺草生東海岸土人珍之乂龍膳草白蘚夏枯草白芽香山谷中亦間生焉柴胡有竹果韭葉之别蓋以質之柔硬分也不及延安所産之良亦産前胡防風宋㑹要新羅出防風黑龍江諸境亦産焉土黃連愛渾産黃連皆雜煙莾中萎於霜雪無採㔉者石决明宋㑹要新羅出石决明薄荷揚雄甘泉賦作苃葀葉似荏而尖長香味不如南中所蒔升麻裏白外黑者名鬼臉升麻别有一種曰緑开麻元參廣雅鹿腸元參也苦參即野槐根丹參色紫微苦産山谷隂處獨活一類二種節踈色黃者為獨活色紫節密者為羌活白前形似牛滕粗長堅實而易斷白薇其形短小柔軟而能彎白蘝蔓赤枝有五葉根如卵而長三五枚同窠一種曰赤蘝大㦸色白不反浙産之佳威靈仙根叢鬚數百條長者二尺餘色黑俗名鐡腳紫草山産粗而色紫紫梗園産細而色鮮王不留行花如鈴鐸實如燈籠殼五稜多生於麥地瓜蔞即詩之果裸根即天花粉前志載之今不多見蒺藜即詩之茨蔓生野地又一種入藥者名沙苑蒺藜不多産海金沙莖細如線葉紋皺處有砂木賊與麻黃同形諸山中亦産天南星麻黃諸藥白頭翁草本色白茺蔚即詩之蓷今名益母草黑龍江所産尤茂葶藶入夏即枯亦如夏枯草禮月令孟夏草死即此萹蓄赤莖節好生道旁爾雅謂之竹俗呼猪牙草藁本山海經謂之藁蓄蛇床花似水芹子如蒔羅爾雅謂之虺牀蒼术一統志出廣寧者佳苗曰鎗頭菜牽牛黑白二種又名黑丑白丑三稜次於荆産者大小薊花青紫葉多刺俗呼牛戳口有大小二種乾葛春生苗引蔓色紫根形大於臂本草鹿食九草此其一種一枝蒿一名五龍草又有天仙子漏蘆寄奴草馬鞭草山谷間悉叢生焉皆入藥無名異俗呼土子鍾乳石生山洞中老鸛嘴蔓生枝間結角形如鸛嘴入藥治風亦可染皂地骨皮即枸杞子根以冬令掘之入藥尤佳桑寄生山中各樹多有寄生惟桑上者入藥豨蘞爾雅茢薽豕首即今之豨蘞草金稜銀線素莖紫荄可治風病滑石明一統志出海州衛今海城縣出者良荆芥有二種圓穗者荆芥扁穗者假蘇處處叢生明一統志遼東都司出沙參生海邉者細長堅實生山地者質鬆次之馬兜鈴根即青木香藜蘆苖類山葱俗呼嚏噴草赤雹蔓生結果如小瓜色正赤禮月令孟夏王瓜生即此金銀花花黃白一色蒂必成雙一名忍冬茵蔯因宿根而生故名禽類雞後漢書三韓傳自長尾雞尾長五尺本草遼有食雞角雞二種今有九斤黃大勝諸雞又毛之反生者曰番毛雞白毛烏骨者曰烏骨雞雉俗呼野雞禮月令孟冬雉入大水為蜃遼地雉雞冬月羣飛入海潮上擁入沙中久之變蜃殼宜軍中號器變而未成海濵人常得之猶雉形也每七月捕雉雛供祀冬月有野雞圍羅雉入貢鵝肥美勝於他處鵠俗名天鵝江海間皆有之其毛可為服飾鴨亦曰鶩凡鵝鴨內務府冬月入貢雞鵝鴨蛋户部莊交官備用野鴨爾雅鸍沉鳬以性好沒故名今湖泊最多有緑頭尖尾黃腳等名紅鴨形如白鷺翅白蒲鴨大於野鴨色黃沙雞似雉而小腳有毛爾雅注鳻鳩大如鴿似雌雉鼠腳無後趾足髙二寸今以入貢多出黑龍江諸林中亦呼樹雞味勝家雞鶴瘦頭朱頂長頸髙腳一名仙禽有灰白二種産遼陽河海之濵自古所稱鸛水鳥黑白二種羽充貢可為箭翎鴻鴈大曰鴻小曰鴈禮月令季秋鴻鴈來賔季冬鴈北嚮今黑龍江境內有池極濶春時鴈來自南夏月孶息其中秋復南翔䳺一名鷃鴽屬也禮月令季春田鼠化為鴽夏小正鴽亦化為鼠本草以無斑者為鷃與鵪為二物今呼為黃鵪鶉性喜鬪土人呼為鵪鶉惟青蛙化者則不鬪練鵲似鵠而小黑褐色頂上披一帶一名帶鳥長尾白羽今呼拖尾練黃鸝一名倉庚風土記六月東南風長海魚化為黃雀又季秋雀入大水為蛤指此俗呼黃鳥慈烏色黑能反哺者俗呼老鴉鴉即詩之鸒爾雅謂之鴨鶋似慈鳥而大不反哺嘴腹白土人呼曰山老鴉鵲一名靈鵲開户必背太嵗如嵗多風則巢下枝俗呼喜鵲鶺鴒青灰色尖尾長喙頸黑腹下白飛則鳴行則採鴛鴦形如小鴨色黃有文紅頭翠鬚止則相偶飛則成雙鷺鷀林棲水食潔白如雪者曰白鷺又有紫鷺碧鷺種類大小不一鷗亦曰鷖性好浮形如白鴿遼渾諸河有之鷹一名鷞鳩種類不一古以出遼海者為上新唐書黑水靺鞨傳出白鷹契丹國志女真禽有鷹鸇一統志白鷹尤為鷙猛吉林寧古塔諸山有之鵰似鷹而大色黑山海經謂之鷙今多出奉天以東諸山中及寧古塔諸山其品不一上等色黑者曰皂鵰有花紋者曰虎斑鵰黑白相間者曰接白鵰小而花者曰芝麻鵰羽宜箭翎於松枝上繩套名為鵰手內務府有鵰丁嵗取以充貢鵰之最大者能捕麞鹿上中間有之海東青亦曰海青鵰之最俊者身小而捷能擒天鵝爪白者尤異次曰玉爪駿俊異絶倫一飛千里遼時以海青鶻擊天鵝首得者薦之宋廟通考女真出海東青元史地理志海蘭府碩達勒等路有俊禽曰海東青由海外飛來土人羅之以為土貢明一統志五國城東出一統志最大者力捕麞鹿今多出黑龍江烏蘇哩江乾隆四十三年有御製盛京土産詩九曰海東青恭載天章門鶻大曰鶻小曰鴉鶻鷂即鸇類一曰隼又曰晨風本草釋名鷹小為鷂今大小種類亦異有花豹白豹細胸松兒朵兒攔虎獸諸名鳶鴟類俗呼鷹奴亦名鷂鷹鷀䳓鶖類毛色不一有花者名胡鷀䳓鶖似鶴而大秃頂長頸赤目好啖蛇一名秃鶖翮可翎箭鵜鶘形類鵠灰色長嘴大脖每竭水取魚一名淘河鸕鷀似鴨而黑嘴曲如鈎食魚入喉則爛涎可治鯾骨可治噎青􅝄鵜類一名信天緣俗呼青莊紅牙背白翅微紅羽亦可翎箭魚鷹大於鴉色黑鈎嘴食魚一名鈎魚即燕有越燕胡燕二種今土人以善構巢者為巧燕不善構者為拙燕凡燕秋後多蟄山崖之內至春始蘇來依人屋間來去皆以社時故曰社燕鴿依人鳥也來去無定一名鵓鴿戴勝似山鵲尾短長嘴青色頂有毛角似戴花鳩毛色大小不一通呼斑鳩又有鳴鳩禮月令仲春之月鷹化為鳩仲秋之月鳩化為鷹即此形大於斑鳩長尾者一名布穀鴇水鳥似鷹有斑文無後趾鵏似鵝而大灰白二色羽可翖箭鶡䳄者毛色若灰雄若濃靛猛鷙善鬬稱鶡雞又呼黑雞出愛渾深山中嵗捕生者入貢黎雞類雉而小背黑昧爽即鳴又穿草雞色黃石雞類雉身小如鴿尾短嘴紅鶬雞大如鶴紅頰長頸髙腳寒號蟲一云印鶡鴠狀如小雞足有肉趐夏月毛盛冬月毛脫鳴益急糞入藥即五靈暗蝙蝠爾雅謂之服翼晝伏夜龍糞入藥即夜明砂鷦鷯即詩之桃蟲似黃雀而小青斑長尾喙利如錐取葦花為巢最工緻焦贑易林桃蟲生鵰即詩拚飛維鳥之說爾雅鷦鷯剖葦今俗呼為巧女白翎雀雀類不一青黃色翎白鴈春北秋南白翎雀窮冬沍寒不易其處元人重之故元世祖樂有白翎雀歌又有大眼雀晴大而圓白眼雀目有白圈靛雀色如靛小雀依人簷下俗呼家雀蒿雀多伏蒿間俗呼蒿溜兒黑雀爾雅謂之鷑鳩田間有食禾之蟲此雀羣飛食之亦有功於農事者又有金翅雀色黃善鳴水黃肚雀俗呼黃肚囊有大小二種小者長嘴短尾大者尾根正白油鸛兒形類大水尾根白打蟈鳥形如小水而大首翅尾黑色胸下白孤頂類烏鴉身黑嘴白鵃鳥大如燕色碧嘴長尾短即翡翠之小者俗呼魚狗啄木爾雅曰鴷啄木嘴如錐長數寸形色大小緑黑不一諸烏舌皆根于喉而藏於味惟啄木舌根過腦後舌尖引之逾長樹中蠧蟲雖潜穴隙皆能勾取食之俗呼啄木官子縮脖鳥灰色形如鸛翅大腳髙飛則縮頸俗呼縮脖子錫嘴嘴白又有銅嘴似雀而大色灰黑喙青黃如銅又鐵嘴形類窩藍無角頂又蠟嘴即桑扈之屬喙如黃蠟畜之可玩紅料色紅善鳴色花者謂料之花料又謂之麻紅白頭翁形如鶺鴒頭白身灰黑又有名拙老婆頷下色紅哥哥鳥其名自呼曰哥哥畫眉似鶯而小黃黑色其眉如畫善鳴山林中間有之又有三道眉其眉似分三道山和尚類山鵲而小尾短灰黑色鴟鵂身大色黑黃而斑畫目無見夜則明其頭如猫俗呼夜猫子惡聞其聲栁葉兒色淡緑小如指又串栁兒類桞葉雀形微大鷽尾長嘴紅似鵲而有文采一名山喜鵲或呼為勃姑鳥亦名綵鵲毛羽文綵者亞於翡翠鳯頭鳥一名阿藍韋昭謂之鴳扈有毛冠者曰鳯頭吕覽注鴳一名冠雀是也小者曰清水又曰呌天爾雅謂之鶻鵃尾短多聲千里紅頂有紅毛喜食蘇子俗呼蘇雀黑龍江稱老鎗雀出俄羅斯地雪後即來羣飛入海以十一月網而取之炙食甚美鐡背雀大於家雀灰色尾分兩白翎鐡腳雀之大者爪堅如鐵置覆網取之漏網者未幾復至亦鳥之義而愚者冬則羣飛入海獸類牛周禮職方氏幽州其畜宜四擾注四擾馬牛羊豕隋書百濟傳畜有牛五代史女真地多牛鹿野狗金史地理志大定府産乳餅蓋餅以牛乳為者今內務府有黑牛館飼純黑者以供祀亦獻乳酪牛黃舊唐書開元十一年新羅來獻牛黃馬後漢書夫餘傳出名馬濊傳出果下馬北史勿吉傳出三尺馬新唐書渤海傳俗所貴者率賔之馬按率賔即今奉天東南之地與髙麗僅隔域一江乃內地馬大髙麗馬小可知物産亦限疆也今有官馬羣駐牧各處馬極蕃庶而西北塞外來者亦良索倫之馬則身長陡徙毛甚短而澤駝宋㑹要新羅地宜槖駝長頭髙腳背有肉鞍謂之駝封可負槖囊又名槖駝今呼駱駝食少任重而行速軍中需之亦産騾及驢土人負重者恆以驢代腳力焉羊北盟録女真産名馬多牛羊今內務府亦有羊館豕後漢書挹婁傳好養豕北史勿吉傳其畜多豬百濟傳有豬新唐書渤海傳俗所貴者鄭頡之豕黑水靺鞨傳畜多豕金史地理志㑹寧府貢豬大金國志女真獸多白彘犬通考女貞地多良犬犬今按犬類不一極曰田犬二曰吠犬三曰食奉天錦州田犬健有力能制虎者最為難得又外蕃犬可供驅䇿故元史有犬站以犬代馬今黑龍江以北費雅哈部落尚役犬以供負載猫姓善捕鼠又有野猫居山谷中狐類口方色倉黃有斑善摶亦曰野狸野馬三國志鮮卑傳其獸異者野馬形如馬而小野驢通考女真獸多野牛驢之類按野驢似驢而色駁鬃尾長山羊生山中似羊而大善登山皮灰黑色黃羊大於羊毛蒼黃一統志出錦州邉外冬月入貢野猪通考女真獸多野猪今山中有之冬月獵得者醃以入貢蜜狗生烏拉諸山中嘴尖如狗尾黑可飾盔纓虎北魏書勿吉傳有虎豹羆狼今諸山中皆有之邉外間有白質黑章者尤猛鷙圍中以激打鎗手制之虎骨熬為膏入藥豹似虎而小白面團頭色白者曰白豹黑者曰烏豹文圓者曰金錢豹最貴重文尖長者曰艾葉豹後漢書􅐮傳其地又多文豹熊羆小者曰熊大者曰羆一云羆似熊黃白色今山中熊類不一有人熊猪熊猴熊狗熊諸名御製盛獵得者入貢乾隆四十三年有京土産詩七曰熊羆恭載天章門麋鹿鹿大麋小禮月令仲冬麋角解仲夏鹿角解今考麋鹿俱於夏至解角御盛京吉林有麋無鹿見春夏謂之青草圍秋曰哨鹿製鹿角解詩後說凡獵圍冬曰大圍進貢則有湯鹿毛鹿合子鹿及腸肚舌尾夏秋貢乾醃肉及茸角筋皮新唐書渤海傳俗所貴者扶餘之鹿扶餘即今開原以北地正為田獵之所又外藩俄羅斯地方不産牛御製盛馬多役鹿以供負載性甚馴乾隆四十三年有京土産詩六曰鹿恭載天章門鹿角煎為膏入藥亦有用骨作膠者松漠紀聞鹿頂合燕以北者方可車須是未解角前才解角血脉通好者有人字不好者成八字有髓眼不實北人謂角為鹿角合頂為鹿頂合南鹿不實定有髓眼不可車北地角未老不至秋時不中麋角與鹿角不同麋角如駝骨通身可車却無紋鹿頂骨有紋上下無之亦可熏成紋鹿茸角之初生者方書麋茸補陽鹿茸餔隂今入藥者但言鹿而不及麋鹿筯金史地理志復州舊貢鹿筯馬鹿一名八又鹿嵗取其角交官一統志形大如馬山中極多亦曰父鹿駝鹿埤雅北方有鹿形如駝一統志出寧古塔烏蘇哩江一名堪達漢頸短形類鹿色蒼黃無斑項下有肉囊如繁纓大者至千餘斤角扁而潤瑩潔如玉中有黑理截之錗為决勝象骨直御製盛數萬錢乾隆四十三年有載京上産詩八曰堪達漢恭天章門麅麞類色蒼赤又黑龍江地方每冬有白項野麅從海邉來不可勝數形比內地微大但味稍腥麅􅍪類毛長犬足皮堪履舄麠爾雅大麃一角牛尾漢武帝郊雍得一角獸即此今大山中間有之狼皮毛青白者貴㑹典品官坐褥冬用皮有定制一品用狼二品用獾三品用貉四品山羊五品以下用白羊皮公侯極品用虎豹皮麞鹿屬無角即詩之麕獵時以背式骨交官有定數麝形似麞一名香麞喜食柏臍血入藥名麝香豺足似拘瘦如柴性鷙猛善逐獸獾似狗而矮體肥行鈍皮冝裀褥貉狀如狸性好睡猞猁孫類野狸而大耳有長毫白花色小者曰烏倫明一統志謂之上豹今出索倫者佳嵗入貢亦作失利孫狐色赤而大夜擊之火星迸出毛極溫暖集腋為裘尤貴重元狐出下江大於火狐色黑毛暖最貴又青狐亦名倭刀沙狐生沙磧中身小色白腹下皮集為裘名天馬皮頰皮名烏雲豹按狼獾狐貉一切有用之皮皆有打牲人取以上官貂熊一統志大如狗紫色出寧古塔者頭紫黑兩肋微白貂鼠後漢書挹婁傳出好貂東沃沮傳其租稅貂三國志夫餘傳出貂狐挹婁傳出好貂所謂挹婁貂晋書肅慎傳貢貂皮北魏書室韋傳亦多貂皮新唐書黑水靺鞨傳土多貂鼠金史地理志大定府産豹鼠今烏拉諸山林多有之近東北邉者色黃邉外者色紫黑皮甚輕暖以松子為糧打牲者八月往十二月回皆於雪天尋其跡而捕焉每嵗以時入貢黑龍江索倫達呼御製盛哩諸人以捕貂為業乾隆四十三年有京土産詩五曰貂恭載大章門銀鼠吉林諸山中有之毛色潔白皮禦輕寒金史地理志遼陽府産鼠毫白鼠皮即此灰鼠契丹國志女真獸有青鼠貂鼠上按青鼠即灰鼠吉林諸山中有之灰白為灰黑者次之鼬鼠明一統志海州衛出俗呼黃鼠狼又名騷鼠其尾髙麗市以作筆香鼠小於鼠捕雀蚡鼠形似鼠而大常穿地以行即田鼠也鼠頭似兔尾有毛黃黑色性好在田間食殼豆即碩鼠也遼金元時用以供饌名為黃鼠今呼豆鼠蝟似鼠有毛刺腳短尾長物犯之則形縮毛張如集矢俗呼刺蝟皮入藥松鼠蒼黑色大尾好食樹果小者大不過三寸通身豹文艾虎鼠類能捕鼠白新唐書渤海傳太白山之兔黑水靺鞨傳土多白兔開元天寶間來獻鯨晴貂鼠白兔皮金史地理志遼陽府産白兔龍按白兔似而大毛純白出黑江跳兔前足寸許後足近尺爾雅謂之蹶有按廣寧義州北境及黑龍江界內皆之水族類魚後漢書東沃沮傳其租稅魚松漠紀聞每春氷始泮遼主必至寧江州鑿水釣魚今奉天吉林諸河皆産魚各種皆偹黑龍江五月魚車塞路六七月水漲則大魚不入網江涷鑿氷取之鯉奉天吉林諸河皆有之黑龍江夏多鯉冬多鯾鱖魴縮項穹脊扁身細鱗俗呼鯿花諺云居就糧梁水魴今太子河即古東梁河魴魚尤美鱖扁形濶腹大口細鱗有斑采明者為雄晦者為雌一名鰲花又名花罽魚鯽新唐書渤海傳俗所貴者㴞沱河之鯽今惟錦州溜馬汀者以時入貢寧古塔混同江者亦佳細鱗魚圖身細鱗出山流狹處又黑龍江出者名赭鱸嵗貢百尾九月棲江濱捕而畜之亦曰遮鱸又有島子魚頭尖而色白八稍魚一統志寧逺州出哲緑魚似鱸魚色黑一統志味美不腥出寧古塔黑龍江鱏鰉金史地理志上京嵗貢秦王魚者按鱏鰉一名鱘鰉亦名尉魚或謂之神魚相傳樂浪尉溺死海中所化也今出混同江鼻長有鬚口近頜下雖鱗色不同而形體相類俗統呼鱘鰉又名阿金魚以丄諸色魚嵗各以時入貢乾隆四十三年有御製盛京上産詩十曰鱏鰉恭載天章門發緑魚似鯿花而大色黑鱧圖而長鱗細色黑苩有七㸃作北斗象俗呼黑魚亦産鰱首肥而巨鱗身圓而長赤脉貫瞳爾雅名鮅俗呼赤眼魚鱮似魴而弱腴腹細鱗頭鋭形扁俗呼鰱子魚鱅山海經鱅魚似鯉大首今有至四五十斤者俗呼鰟頭魚鯇似鱒而大身圓肉厚有青白二色俗呼草啃魚鯼圓厚而長口在領下腹黑背微黃大者或至數十斤鮠無鱗似鰋而大俗呼槐子魚出黑龍混同江中其皮可衣鮎即詩之鰋身圓性偃無鱗生流水者色青白生止水者色青黃一統志鮎魚混同黑龍兩江出大者至數十斤或百餘斤取皮製衣柔韌可服鯔狀如青魚身圓俗呼栁根鱎鱤即詩之鰥俗呼鱤條鰷形狹而長鱗白而細其性浮俗呼白漂子雷魚小者如指色黑尋河兩岸而行雨多則有鱵形同鱠殘喙尖有一細黑骨如針俗呼針娘魚竹魚狀如青魚翠色可愛鱎鱗細形窄腹扁頭尾向上亦曰白魚重唇魚即詩之鯊如鯽而狹淡黃色嘗張口吹沙黃鯝似白魚而頭尾不昻濶不踰寸長不徑尺土人呼為黃骨子沙鮀體圓有斑俗呼沙鯝魚黃顙魚似鮎而小背青黃色無鱗俗呼昻刺赤色者名紅昻刺赤稍魚身白翅紅馬口魚口大身小又有紅娘子魚近腮有紅黃雜采抿子魚脊髙腹平鱗小味腴船矴魚長二三寸大頭闊口黃色有斑見人則以喙插泥中又箭頭魚頭尖小如箭秋生子魚出蓋平清河形類白漂即海鮐之類䲐魚字彚出樂浪瀋小今奉天錦州皆有之河豚狀如科斗腹下白眼能開閉血皮頭子有毒殺人人鮮食之江獺出江中者名江獺形似狗而小長尾色青黑亦有白色者獺穴必預度水所不至故鄉人以是為潦水之候黑龍江混同江等處尤多鱓似蛇無鱗腹黃俗呼黃鱓鰌似鱓而短爾雅謂之䱻俗呼泥鰍鰸字彚似蝦無足出遼東鮻河中者眼白河中者眼赤鰻鱺似蛇而腹白一名白鱓海中者名海鰻鱺其大數倍鱉俗呼團魚人名腳魚甲入藥亦産龜蝦出海中者去殼曰蝦米通行各省大者長數寸合配曰對蝦小者曰金釣蝦大凌河有蝦醬取油通行各邑小蝦出蓋平海邊者名紅毛子作蝦醬尤佳晒乾者為蝦皮蟹俗呼螃蟹至秋味腴又海蟹頗大而腥有虎皮金錢諸名造化權與蟹易螯並脫殼今人往往見之北盟録女真海多大魚螃蟹蛙即蛙一名田雞有時化為鶉土人呼為青蛙山蛤禮月令雀入大水為蛤即此多伏岩中似蝦蟆而大腹黃紅色俗呼哈什蟆向亦充貢按周禮幗氏所掌蛙黽之屬即青蛙哈什蟆之類蝲蛄蟹身魚尾澤畔石下有之海參形如蟲有肉琿春出者尤勝偏口魚背青服白形扁而薄匾行水中先按海中魚惟此先至雁魚次之故諺云偏後雁雁魚身圓無鱗尾多三一名霸魚海青魚長五六寸出寧海縣至時海水有聲回時水噴起如箭俗云青魚上下有大魴魚尾而食之故然鱭形薄多刺海中有之俗呼刀鱭同勒魚似鯉而頭微大鱗小重不過斤許出海中鮝身薄多刺出束海嵗以時逆水而上多且厚土人每羣取之名曰淘灣乾者名勒鮝俗呼火勒魚通行郡邑明一統志肋魚金州衛出鯊青色皮有沙文如鹿者曰鹿沙文如虎者曰虎沙可飾器用背上鰭鬛名沙翅泡去外皮榮若銀絲極脆美食品珍之相傳鯊以胎孕口吐而生鰣似魴而長色白其肪在鱗海中間有之比目魚魚各一目兩相合乃行爾雅謂之鰈俗呼鞋底魚今海中别有一種兩目微偏亦名鞋底魚非比目魚也烏鰂形若莗口在腹下八足聚生口旁如帶東海一名黑魚腹中有墨見人則吐以自蔽骨入藥名為海螵蛸海􅬅生東海蕩蕩如沐能運動無耳目一名水母一名石鏡茄柴反和鹽漬之可以佐酒海骨董魚即大頭魚身粗短味亦腴一名家鱭魚羊魚身圓色黃尾龍刺人相傳羊魚胎生初生魚閒雷輒羣入母腹土人往往於大羊魚腹中得衆小魚云鏡魚圓而色白達發哈魚黑龍江寧古塔諸江河有之秋八月自海逆水入江驅之不去充積甚厚上人克有履魚背而渡者腹中子大如玉蜀黍邊地人取魚炙乾積之如糧竒爾富魚黑龍江出烏庫哩魚一統志寧古塔出四五月時自海迎水入江石首魚一種似海青魚身微寬鱗細名白迷子頭中有兩白石如玉一種扁身弱骨有雜黃色名黃花魚腹鰾可粘物皆出東海鱠殘魚色白無鱗若巳鱠者俗呼翅條魚即杜詩所稱白小也又渾河一種銀魚形小色白惟冬月得之味甚鮮美牛魚本草生東海中頭似牛潛確類書海牛紫色無角龜足鮎尾性敏捷見人則飛入於海膏可燃燈皮可為弓鍵矢服程大昌演繁露契丹主滔爾河釣牛魚以占嵗周麟之海陵集有梁大便者先朝內侍也入館傳旨賜金蘭酒二瓶銀魚牛魚二盤牛魚出混同江其大如牛周必大二老堂志牛魚一尾之直與牛同周樞密麟之使金金主愛之享以所釣牛魚非舊例也樞密糟其首以歸獻於朝同館王龜齡目為魚頭公明一統志牛魚出混同江大者長丈餘重二三百斤無麟骨脂肉相間食之味甚膄今罕見或云即今之鱏鰉魚也是一是二存以參考勾星魚黑龍江出鱗斑然如列星長喙漁者間以箸探其口齧之至死不釋段刃之釡中猶躍躍也倒鱗魚出寧古塔船厰城東南龍潭山頂鱗皆倒生相傳以為龍種海馬馬頭蝦身海驢形似驢常於秋月登島産乳皮製雨其雨不能潤本草能入水不濡出東海島中今亦罕見海歡本草皮可供衣裘其形不可考海狗本草獸身獸頭魚尾尾連兩短足毛有斑文油能澄水腎入藥名腽肭臍出東海及寧古塔土人跳氷取之海豚形如豚鼻在腦上隨風湖出入舟人候以占風海貓形如貓一名黃貓海豹新唐書新羅傳間元中數入朝獻海豹皮形大頭如馬者名獵獺皮紋有花㸃名海豹皮打牲人以之交官可飾鞦轡蓋平寧海混同江皆有之蚌蛤本草形長曰蚌圓曰蛤江海皆有惟鳥拉諸江出者多狹而長內産孕明珠文蛤殼有花斑出東海即蚶之類蚶爾雅曰魁陸本草作魁蛤圓而厚殼外理縱橫俗呼瓦蠪子蝮無鱗有殼一面附石細孔錐雜或七或九肉亦珍品出東海殼即石决明蠣黃磈礧相連附石如房明一統志謂之蠣房今東海有之肉名蠣黃殼即牡蠣石􅨒蚌蛤之屬一名龜腳産海中石上得春雨則生文似花草荀子東海有紫􅎕即此蟶亦蚌之屬出海濵水泥間肉在殼中上分兩岐一長一短與月消長土人取之者計日下釣得之甚易乾為海錯通行各處蠔似蟶而溜一統志出寧逺州鹵地海紅長寸許中有毫螺易離為螺即此種類大小不一出海中者種類尤多金史地理志大定府産螺杯蜆隋劉臻謂之扁螺車螯蛤之大者即蜃也東海有之龍骨黑龍愛琿諸江岸數尺下恆有之或曰龍蛻斑魚皮通考濊其海出斑魚皮契丹國志烏合阿里瑪每年貢膠魚皮鐵驪國亦貢膠魚皮漢按斑魚後當作從魚蟲豸類蠶三國志三魏傳知𧖟桑辨長傳曉蠶桑舊唐書高麗傳種田養蠶按順治元年盛京地方留養蠶屯十處而遼地多寒畜之者猶少山蠶一名樗繭海城蓋平寧海復州人放之樗柞等樹春秋收繭練絲為紬蜂俗以在地作房者曰土蜂大黃蜂曰馬蜂釀蜜者曰蜜蜂內務府及禮部皆有蜜丁取蜜交官蜜巾煉出者為黃獵蜾螺亦名土蜂純雄無雌負桑蟲而為子即㟰蛉也蟻種類不一大者曰蚍蜉小者曰蟻俗呼麻蟻惟黑龍江獨無緑繭多生山中杏條上絲色堅韌箭扣用之蠟蟲大如蠟飛食花櫃栁木涎著枝莖收煉成白蠟較川産者微黃蟋蟀似蝗而小光澤如黑漆善跳好鬪秋後則鳴爾雅謂之恭一名促織俗呼趨又竈馬如促織好穴於竈亦名竈雞蟪蛄便腹青色秋鳴以股冬亦可畜交春則死所謂蟋蛄不知春秋也廣雅謂之蟧蛁俗名聒聒阜螽長角修股善跳作聲形色不一螳蜋禮月令仲夏螳螂生俗呼刀即深秋乳子作房著樹枝是為螵蛸蜣蜋黑甲出一名吉蜣一名推車客俗呼使客郎所轉之丸納於土子生其中蛾𧖟蛾而外凡草木蟲以蛹化為蛾者甚衆蝶形色黃白大小不一皆蟲所化山中蝶大如掌采色斑爛子即山蠶也又花樹間蠧之大者暑時置熱石上輾轉久之即可化蝶螢即詩之熠耀今名螢火蟲禮月令季夏腐草化為螢至夜有光嘗見蟋蟀果螺之類夜亦有光但不能飛耳唐子卿有水螢賦謂是水蟲所化蟬種類不一土人有秋蟬茂凉蝍蟟秋蛩諸名螬一名蛸螬生糞土中大者以背行駛於腳久之化為蟬則如風飲露清濁係於變化有如此者蚓禮月令孟夏蚯蚓出冬至之日蚯蚓結俗呼曲蟺白頸者入藥蜻蜒六足四翼羣飛水際爾雅謂之負勞尺蠖似蠶而絶小促其腰使首尾相就乃能進步馬陸一名百足斷之能行觸之則捲俗呼腳蟲深山叢樹中間有之不若南中之多鼅蛛大者為鼅蛛小者為蟢子長踦者即詩之蠨蛸壁錢似蜘蛛而色斑壁上作幕如錢負蟠即詩之伊威俗呼濕生蟲蟫書中蟲一名蠧魚蟾蜍背黑無㸃多痱磊居陸地俗呼癩蝦蟆蝦蟆一名青蛙見水族初生有尾名蝌蚪蠓一名䘊郭璞曰蠓飛蟻則天風卷則天雨凡草木葉有泡起中生小蟲如蠓泡處乾脆蟲即飛出蝸牛爾雅謂之䗂蝓池澤中小螺白色頭有兩黑角涎畫屋壁悉成銀色或云可避毒蟲蠍最畏之又土蝸生早地草上或石上俗呼鼻涕蟲二種皆入藥木牛小黑而長下細上粗善通乳螻蛄穴土而居短翅大服腰細如蜂禮月令孟夏螻蟈鳴螻蟈蝦蟆也非一物孔穎達以螻蛄為鼠俗呼土狗又水蛭蚰蜒斑蟊蜈蚣蜉蝣山原草澤中亦間生焉蠍虎即守宫食蠆故呼蠍虎蠆即蠍也其毒在尾明一統志遼陽蠍臺舊有大蠍蛇師即蜥蜴俗呼馬蛇蛇種類不一大者往往有冠幘名烏稍其短小名七寸子者最毒蠅虎身黑而扁嘴邊有雙肉爪攫蠅食之蠅其聲在翼壯者腹大生蛆蛆復化為蠅蚊齧人長吻如針一名蚋近奉天省城處絶少而黑龍江蚊不入室虻俗呼瞎虻亦草根所化廣寧道夏月最多酷齧牛馬行人苦之又山海經稱有飛蛭琴蟲大青蛇今不聞焉欽定盛京通志卷一百七
