body:
  text: 乾隆十九年甲戌御製古今各體詩欽定四庫全書欽定盛京通志卷十三天章四皇上聖製詩乾隆十九年甲戌七月五日東巡自避暑山莊啓蹕之作避暑居停逮曉秋朝來清蹕啓龍斿逺人宴賚鴻儀偹炎月棲遲馬足休恰悟兹來即向往因思欲進每資留山田是處蔥華黍未敢先期道有收上陵誠藴十年餘皓日金風行色舒山館南看嶂猶近吉林東指路還紆每懷侯度咨休助常喜慈寧奉起居七萃率能知大義寧因跋涉怨咨豫御行營六韻崔巍帳殿鬱蘭坡星拱周遭萬幕羅豈限幅員分內外亦陳斥堠不譙呵繹思厥度期無斁到處其居慶有那視膳寢門欣一例勑幾午夜協中和掃除扎薩咸惟謹蒙古四十九旗各有扎薩克領其衆警蹕金吾底用多長白吉林佳氣繞敢忘天作烈文歌賜盛京將軍阿蘭泰出寄干城入侍宸阿蘭泰在御前侍衛裏行據鞍矍鑠尚精神東都留守分明是應令耆英會裏人阿蘭泰年六十餘而鬚鬢皆白故戲及之賜吉林將軍傅森數處開牙盡有名大東坐鎮翼陪京將軍底事無勳績纍洽重熙值太平碧桞圖山名蒙古語謂礪石為碧桞在克爾素邊門外癸亥東巡過此曽有作今嵗至吉林應進伊屯邊門取路少北而東故遙見之舊識吉林路遙瞻碧桞圖依然峰矗彼曽憶句吟吾何日山為礪流年隙過駒拈髭長若許罨畫了無殊桞條邊西接長城東屬海桞條結邊畫內外不關厄塞守藩籬更匪舂築勞民憊取之不盡山木多植援因以限人過盛京吉林各分界蒙古執役嚴誰何譬之文囿七十里圍場豈止逾倍蓰周防節制存古風結繩示禁斯足矣我來策馬循邊東髙可踰越疏可通麋鹿往來外時獲其設還與不設同意存制具細何有前人之法後人守金湯鞏固萬年清詎繫區區此樹桞入伊屯邊門部落行將遍吉林望不遙迎人山色近礙路漲痕消村墅經楓葉邊牆進桞條初來原故土所遇匪新招瞻就心何切勤勞意豈驕省方逢大吉寶穡報豐饒台尼堪外蘭昔日正王師國語謂漢人為尼堪我王業太祖首征尼堪外蘭肇興也三逆遺羣亦戍兹康熙年間平三藩以其遺類戍此守台因名曰台尼堪萬里流遷怨誰致百年户口慶今滋即看多稼連岡熟那覺嚴寒傍塞竒試語尼堪歸故土轉應哀籲歎仳離村行語言不異舊音聲新到頗懷故土情白叟黃童皆忭喜山村水郭動逢迎播穀藝麻羣力作彎弓習射暇中兼尋常記得淳風美即景還教取次覘粳燈土舍㸑生塵革履布袍粗蔽身十二羽林皆識否汝先原亦若斯人移人漓俗是皇州觸目花街復酒樓快看吉林村落景古風不易返從頭賜吉林將軍及官員兵丁宴黃幔青山皓日晴沛豐歡宴浹羣情恩頒軍士皆鳬藻席預嘉賓適鹿鳴時蒙古王公扈駕者亦令入宴却喜多人能舊舞國朝起舞乃舊俗宴樂每每用之俗所稱嘛克新者也翻嫌小部鎮新聲本來此地無租賦底用當筵籲減征車駕至吉林得七言排律十二韻踰千塞甸厯迢迢暢慰初心到一朝天作髙山保之永地呈沃壤壯哉饒星分箕尾神臯衍俗重耕桑協氣調左氏浮夸紀周晉史家建置考金遼為藩南接陪京近扼塞北臨黑水遙一旅艱難緬亶父兩畨巡幸遡唐堯康熙年間幸至皇祖凡兩次巡此繩先惟是期無忝裕後還因視不恌問寢承歡常愛日敕幾熙績每衣宵劭農為慶農逢稔省俗猶欣俗逺澆軍士歡虔皆子弟戚賓侍從擬臣寮持盈保泰心恆凛蒙業延休志敢驕陶復當年未家室瀋陽因肇大風謡駐蹕吉林將軍署復得詩三首霏微夜雨曉來輕啓蹕油雲倐忽生幾點秋霖剛過陳滿空皓日大開晴地靈信是庥祥兆人意都增悅豫情天作髙山景仰近應歆切切繼先誠星漢南來直北流國語松阿哩烏拉松阿哩者即天河也漢語因名松花江縈回漭沆衛神州城臨鏡水滄煙上地接屏山緑樹頭輻輳閭閻市中日往來舸艦織清秋設教圖入丹青畫應擬宣城謝氏樓皇祖當年駐棨衙迎鑾父老尚能誇詎無灑掃因將敬所喜朴淳總不奢木柱煙筒猶故俗紙窗日影正新嘉盆中更有仙家草五葉朱旒茁四丫松花江滚滚遙源出不咸松花江即混同江源出長白山山海經作不咸山大東王氣起龍潛劈空解使山原折接上那辭霧雨添兩岸參差青嶂印一川縈繆碧波恬地中呈象原簷鼓松花江以松阿哩烏拉得名松阿哩者即國語天河也石辨支機孰是嚴詠人參性溫生處喜偏寒一穗垂如天竺丹五葉三丫雲吉擁玉莖朱實露甘漙地靈物産資隂隲功著醫經注大端善補補人常受誤名言子産悟寬難望祭長白山作詰旦升柴溫德亨山名建望祭殿於此髙山望祭展精誠椒馨次第申三獻樂具鏗鏘叶六英五嶽真形空紫府萬年天作佑皇清風來西北東南去吹送羶薌達玉京松花江放船恭依皇祖詩韻隆崇長白佑維清松花江源山頂生飛流銀河練影明縈回千里竹箭輕望祭申悃和鸞鳴臨江遂命青雀橫水天上下秋光晶馮夷靜恬濤不驚擊汰直達吉林城滄浪之水義最精俯看直欲濯我纓詎必昆明習戰兵隆崇長白佑維清繼繩祖烈希景行從流寧為去聲欣渟泓松花江捕魚松江網魚亦可觀潭清潦盡澄秋煙虞人技癢欲效悃我亦因之一放船施罟濊濊旋近岸清波可數鰷鱸鰱就中鱏鰉稱最大度以尋丈長鬐軒波裏頽如玉山倒擲義百中誠何難鉤牽繩曳乃就陸椎牛十五一當焉舉網邪許集衆力銀刀雪戟飛繽翻計功受賜即命罷方慮當秋江水寒尼什哈山吉林城東十二里尼什哈山巍岌嶬度江攬景一登峰紅緑清秋錯如綺精藍大士乃白衣何代補陀飛至此天池澄湛萬山巔翠樾倒影波中美旱不知竭潦不盈亦不飛流落澗底地靈雩禜固其宜吉林將軍凡祈雨晴皆於是山兆叶維魚誰所始尼什哈者即漢語謂魚也吉林覽古雜咏克商肅慎致梯航楛矢陳庭理或常未必幅員歸北土詹桓辭晉失誇張荒略山原限大東漢唐紀載鮮精窮購詩只有雞林使雞林即今吉林蓋語音之訛真鑒偏教幸白翁遼金以後率堪詳府設黃龍因見祥地力三農真沃土舟通百貨宛江鄉宣和聲色恣情奢壓境難回徑旅加可笑蝨生幽五國風流猶自號琵琶採珠行圓流育蚌清且淪元珠素出東海濱旗丁泅採世其業授餐支餉居虞村我來各欲獻其技水寒凍肌非所論賜酒向火令一試精神踴躍超常倫秋江川媚澄見底方諸月映光生新威呼蕩槳向深處長繩投石牽船脣入水取蚌載以至剖劃片片光如銀三色七采亦時有百難獲一稱竒珍命罷旋教行賞賚不覽安識真艱辛世僕執役非蛋户元稹何關譬海神詠鱏鰉魚有目鰥而小無鱗巨且修鼻如矜闟戟頭似戴兜鍪一雀安能齧半豚底用投伯牙鼓琴處出聽集澄流再題東珠六韻詎是鮫人泣兼非外域求地靈多瑰産水德正圓流龍吐豈無謂雞銜亦可侔楚人非善賈河上有深謀擲米光能變傾盤走不留何須較合浦早愧五湖投駐蹕庫勒訥窩集口窩集夫何許遙瞻已不凡真堪稱樹海乍可悟華嚴紫翠紛閜砢蘢蔥鎖崿巖恰如望瀛渤未飲早知鹹窩集行履山念無海泛水忘有陸今兹識窩集萬彚惟一木江南塞北攬槩頻豈無林箐皆子孫東方甲乙稟靈秀固應富有植類羣始從茈虒入麓口漸進蕭森失見後祗容線隙露天光馬弗敢旁遵路走不能婁舉丹黃青亦有翻書莫辨名爾雅所紀限方域安能到此杞宋徵恭天蔽虧絶飛鳥其下菁英茁仙草落葉布地似黃金疑是長者來問道華嚴海會諸佛處一菩薩一菩提樹心花顯映多吉祥世塵逺隔如雲霧宇宙以來便有此大椿扶桑非其比定應默煩靈祗呵不知遞閲人代幾隂晴變幻光怪竒谷神出巧能爾為畫師未可形容擬大匠詎敢斤斧斯初經奧壤心神清色惟真色聲真聲欲笑稽含花木疏點筆聊為窩集行八月十三日作紫禁朝儀豳野間時東巡取道吉林駐蹕查拉芬阿林即於幔城行禮曉晴信可悅慈顔夜間微雨曉即大晴營臨西水誠瑶水座對南山是夀山國語謂夀為查拉芬康熙二十一年以是皇祖駐蹕於此值萬夀節山得名亦有冰桃千歲熟却欣霜桕萬峰殷肇祥襲慶承皇祖先澤惟懷繼述艱行圍即事三首控弦舊俗重三韓巡狩當秋取便看璧水圓流縈捺鉢玉山直影矗槍竿風前落葉蕭蕭下霜後平莎漸漸乾獲鹿較於北塞美寢門特進勸加餐崇椒擇勝小徘徊為友為羣得得來八月有鷹皆掣韝居候切齊風無犬不重鋂唐弓奚必千鈞力湯網惟慙三面開日日留人待章奏持來馬上便親裁楓槲丹黃松柏青谷神色色復形形待圍籍草為茵褥馳獵阹山作户庭鳬藻衆軍皆子弟龍興舊地倚威靈覲光揚烈惟豫責志奠皇圖萬載寧輝發故城懷古有序昔輝發貝勒拜音達里持兩端於我朝及葉赫之間屢背姻盟因山築城凡三層以自固我太祖一舉而平之至今經其城仰神威之如昨勵慎守於無疆天教草昧起英雄開創艱難自大東剗削蓬蒿基景運驅馳險阻立豐功渝盟徒恃營三窟不戰惟勞舉一戎荒堵秋風懷昔日欽承統緒凜豫衷登輝發故城再賦輝發河東嶵崣峰云是當年征戰處拜音達里輝發貝勒名也抗王師築城三遭守險固質臣取還婚弗娶潛與葉赫通盟屢患在肘腋弗翦除堂堂大業何由樹我祖神武真天人一時龍虎風雲附師興五日破堅城殱魁宥脅為臣庶即今旗籍那拉氏百年世祿被恩遇我來仰烈憶草創撫迹應親攬艱勮威呼雙槳渡溪河彼岸候馬亂流預葦叢蔽騎披冒過其下浸淫盡沮洳山從人面起嵯峩仰不見天密林櫖䇿騎尋徑歷其巔雉堞久頽蔓草護故老無能為我言敬觀締造披實録叶徒見山髙水清概懷哉久安長治故從臣謂我今日勞較昔如何莫輕語吉林土風雜詠十二首有序吉林在盛京東北我朝發祥所自舊俗流傳有先民遺風焉甲戌東巡駐蹕連日江城山郭廬旅語言想見岐豳式廓之始咨詢土風拈二字成語者為題得近體十有二首聊紀一二云爾威呼刳巨木為舟平舷圓底脣鋭尾修大者容五六人小者二三人剡木兩頭為槳一人持之左右運棹捷若飛行取諸渙卦合羲經舴艋評量此更輕刳木為舟剡木楫林中㩦往水中行窩集中山溪相間凡採參捕貂者㩦威呼以往遇水則乘之飽帆空待吹風力柔櫓還嫌劃水聲泥馬賖枯尤捷便泥馬賖枯者以樺皮為之只容一人兩手持小槳划行恰如騎鯉遇琴生呼蘭因木之中空者刳使直達截成孤柱樹簷外引炕煙出之上覆荆筐而虛其旁竅以出煙雨雪不能入比室皆然中通外直求材易暮㸑晨炊利用均曲突徙薪誠上䇿焦頭爛額更何人踈煙土銼烹蒸便夜雨荆筐蓋覆頻却有千年遼海鶴驀疑華表話前身法喇似車無輪似榻無足覆席如龕引繩如御利行冰雪中俗呼扒犁以其底平似犁蓋土人為漢語耳架木施箱質莫過致遙引重利人多冰天自喜行行坦雪嶺何愁嶽嶽峩駿馬飛騰難試滑老牛緩步未妨蹉華軒誠有輪轅飾人弗庸時奈若何斐闌弧矢之利童而習之小兒以榆桞為弓曰斐闌剡荆蒿為矢翦雉翟雞翎為羽曰鈕勘榆桞彎弓弦壓絲剡荆作箭雉翎翍壯行幼學率由舊蓬矢桑弧匪襲為揖讓豈知爭君子闓抨惟覺慣童兒曽聞肅慎稱遙貢可惜周人未解施賽斐古人食皆以七羮則以勺國俗舊用木七長四寸許曲柄豐末猶古制也質古惟稱以木為曲長且橢進餐宜鼎中底用輕染指座裏應教笑朵頤無下奢哉嗤彼箸有救便矣藉兹匙青泥坊底芹香處杜老居然得句時額林庋橫板楣棟間以貯奩篋瓶􅑥諸器具兼几案匱櫝之用庋楣橫版當中厨家計精粗箇裏俱鼠閙欲投還忌器爵飛同量不妨觚竈間那識薪為蠟几上常看皮是烏淳朴遺規恭儉德風聲擬使遍黃圖施函斫木為筒因其自然虛中以受物貯水釀酒皆用之視束鐵編篦攢木片為器者天質為勝誰云瓠落不中材虛受天然器量恢泉貯雲漿消舊渴春篘石凍醱新醅早嗤轇釜催人去閭閻有無相通客至必留飯其有頡羮者羣以為吝而笑之何用修筒引水來可供瓶罍謝梁棟孰非造物善栽培拉哈土壁堵間綴麻草下垂緣以施圬墁此國初過澗芮鞫間故俗也乘屋乘間事索綯經營婦子共勤勞禦寒塞向諸凡預施墁編麻要取牢出氣天忩柱左右拉哈墻壁之上據棟中𥪡柱以承梁左右留二孔出氣謂之嘛木哈圖拉圖拉者漢語所謂柱也通煙土銼炕周遭室家豳館風猶在慙愧宫庭雉尾髙霞綳蓬梗為幹摶榖粳和膏傅之以代燭燃之青光熒熒煙結如雲俗呼粳燈蓬梗粳粃膏傅塗茅簷夜作每相需績麻乍可呼燈婢耽奕非關誚燭奴最愛焰輝一室朗那辭煙染滿窗烏葛燈籠是田家物勤儉遺風與古符豁山夏秋間搗敗苧楮絮入水漚去聲之成毳瀝蘆簾勻暴為紙堅韌如革謂之豁山凡紙箋胥以是名之搗苧漚麻亦號箋粘窗寫牘用猶便百畨徒訝銀光薄萬杵還輕越竹堅但取供書何貴巧便稱鋪玉詎能賢高麗鏡面尋常有愛此淳廉舊制傳羅丹鹿蹄腕骨也舊俗以蹄腕骨隨手攤擲為戲視其偃仰橫側為勝負小者以麞大者以鹿瑩澤如玉兒童婦女圍坐擲以相樂以薄圓石擊之則曰帕格投石軍中以戲稱手彈腕骨俗相仍得全四色方愈快腕骨一具四而各不同持四枚擲之各得一色則為四色全大約以此分勝負何必三梟始絶勝閨秀爭能守爐火一手攤擲承空上下各取之以不動局上者為工婦女多能之非男子事也兒童較逺驟寒冰又有較逺之戲趨水上以中為勝名曰撒罕無端勝負紛憂喜麞鹿那知有許能周斐樺木之用在皮厚者盈寸取以為室上覆為瓦旁為墻壁户牖體輕而工省逐獸而頻移山中所産不可勝用也巢處遺風藉樺皮上簷側壁總堪為端誇不漏還勝瓦豈慮頻遷等奕碁甕牖繩樞猶未備夏涼冬暖且相宜五侯第宅皇州遍芮鞫先型爾尚知海蘭河屯有序海蘭河屯者漢言榆城也遵槎爾筏嶺而西旁見舊城之基焉雉堞無存土壘尚在昔年征戰之時各築堡自守遺老既盡無能道其事者以其生榆樹焉則謂之榆城而已虎視龍爭各據時高培戰罍濶穿池何年貝勒失名姓昔東方部落強有力者率自稱貝勒剩此荒城祗址基總為聖人驅除去聲難維新天命眷歸期秋風榆戍經過處奮旅維艱企繼思即事五首吉林圍接盛京圍天府秋高獸正肥本是昔年馳獵處癸亥年謁行圍祖陵亦以路便於此山情水態記依稀依疆執役兩將軍率下從公各效勤都是沛豐諸子弟爭先奮勇起風雲詰戎深意寓於畋故國圍場近栁邊聞説彎弧新射虎稜稜神武至今傳我為習太祖獵之太宗定鼎盛京即留此地以武教所每以此事為重立法亦甚嚴或逢熊虎無不之意親御弧矢馬上射之詰戎示後至深逺矣箭取儦羣俟友鹿網來巨口細鱗鱸雲中山色能生動澗底泉聲乍有無即漸皮衣換絮衣長途定省奉慈闈留都父老心猶急重喜翠華指日歸塔兒頭歌有序兩山之門積水不流嵗久沮洳色如鐵鏽國語謂之塞勒克特木克漢語則謂之紅鏽水草生其上纍纍成墩國語謂之烏喀達漢語則謂之塔兒頭又蒙古語凡小兒始學步艱行者謂之塔兒圖疑即此語之誤作塔兒頭歌深林大谷太古然林有落葉谷有泉泉渟葉積成鏽水漬泥蔓草相連牽草腐為壤壤生草月長日引經霪潦禹乘四載不敢問付之地媪任濕湫髙低羅列窣堵波明駝負重愁若何驚麞駭鹿每遁迹獵騎縱射還得多南人欵假忽見此下馬扶奴勞步履豈繞舍利學苾芻不報無道稱君子燃霞綳觀書因題豈無綘蠟將銀燭愛此熒熒古與稽劉向傳經寧我事居然天祿照青藜暖三首邇來風日又回暄射獵渾嫌細毳溫且免輿儓切膚冷况欣駝馬軟臕存天寒則駝馬臕易瘦天暖草肥則駝馬臕尚可支也暄冷天公本無意喜暄畏冷自人情撫時端可通於政以重為威底有成猶憶前巡暖異常人言都道帶來陽盛京向稱極寒地癸亥東巡時亦覺暄暖異常曽有人言羣道帶陽歸之句陪京己近欣南望咫尺英莪邊牆門名關栁牆花園有序癸亥東巡時道經此地繁柯密葉欎然猶存昔曽託興成章兹復摛毫命什聞説名園近興懷昔景賒叢中無别草兩叢相對其下不生雜草枝上想繁花了了增山色堂堂閲嵗華本來百獸避土人云凡鳥獸避迹不敢蹂踐底用木欄遮植物鍾靈氣竒蹤多異傳相傳花時人過之畏不採擷或有所犯必致疾病示不然猶是卉何以獨長年那辨滄桑後難稽池館前每來花謝過笑我偶無緣進英莪門重關申畫郊圻分煌煌祖制千秋遵康熙年間始建栁條邊西自山海關東屬海又一自鐵嶺而分北東繞吉林過虞村而止是為外障其內則圍場地圍阹背指行歷盡舉頭喜見英莪門結繩列柵金城固休養善守深意存入關樹葉尚餘緑靈占地氣心通神栁條邊蓋依興安嶺而建山分隂陽故地之寒暄判然不同即長城亦然築場納稼率已卒連村額慶多高囷猶道今秋才半熟不知苖碩農情真我進英莪凡兩度興京近矣懷生欣橋山指日此敬謁周甲思慕焉能申即事三首路依中谷墅依隈野老欣迎翠輦回笑指碧川漩澓水英莪門外帶將來澗瀍本是故鄉民露冕重看意倍親賜復蠲租自常例更思鮮平聲惠水災貧時以車駕巡幸賜復一年又因秋潦加恩撫恤路側荒垣倚碧嶒當年戰守是誰曽停鞭欲問開疆事故老稀存杞宋徵三關第一關名雅爾哈國語雅爾哈即漢語豹也天閶虎豹雄神州第二代岷極險絶國語代岷即漢語雕也雕鶚到此還應愁三關扎喀逮邊壤國語扎喀即漢語邊也一成之旅懷前猷由來攘外先奠內始基沮漆多綢繆紹世貽統建大業蓬蒿斬艾躬勞憂深根固蒂綿萬葉試看納緑源長流興京疊舊作韻一成傳昔代六御駐秋時鼎峙留都近龍興大業基經營堪想像繼述益懷思陟巘爰瞻逈降原復相去聲卑地呈龍鳯闕天畀日星姿廬旅遡過澗椅桐紛樹陂風雲環帝座黔赤迓王旗締造誠恢廓混同豈留去聲遲重來心越悚永祐德恆垂奕葉欽堂構艱難尚克知恭瞻啓運山作歌長白龍幹西南來靈山啓運神堂開源逺流長綿奕世駢蕃禔祉皇圖培肇祖衣冠祕陵室三祖元宫千載謐仇成不共何忍言七恨興師此第一我我景祖太祖顯祖陷明氏之計致不諱是以興師討明以此為七大恨之首爰始爰謀緬亶父橋山景佑猶故土昌平樵採禁至今朝家厚德昭千古明季謂我朝興自遼東乃毁及金陵為壓勝我朝雖有此二祖之恨而彼南京孝陵及昌平十三陵皆為護集樵採厚德仁風垂則千古云乘馬過興京再詠赫圖阿拉連興京國語赫圖阿拉者即漢語橫甸也我橫甸祖宋舊發祥地順治年間尊為興京在其南惟餘叢城迹榛莾生矣依山樹柵聊為城秋風策馬一憑閲兆基締構欽龍興茅茨木突風猶古故宫欲覔迷處所涕零始業何其艱九重萬户遑安處顯佑宫疊舊作韻重至興王里言瞻顯佑宫呵靈金闕肅拾級玉階崇追念當開創惟欽禮昊穹握符承帝佑基命建神功萬寓拱皇極千秋鎮大東繼繩滋勵志對越益虔𠂻何有揚光烈惟應仰駿鴻皥熙猶未致怵惕每慙躬薩爾滸國語薩爾滸即漢語木厨也峰勢肖之因以得名厨峰鐵背界藩二山名間舉義旗初創業艱諾密無能誇地利初薩爾滸城主諾密納背盟合尼堪外蘭拒我師誅之太祖定計取其城杜松安足抗師顔既得薩爾滸遂駐師於此以五百人破明四路兵數十萬殱杜松於鐵背山秋風瑟瑟重經過天武稜稜莫仰攀寄語方來應敬念豈容易撫有瀛寰重陽日侍皇太后宴九九符陽數秋秋協嵗行海山增介祉風物麗陪京豳樹丹含籟岐花黃放晴登高真恰當曽此俯寰瀛新月行營三度看蛾月夜漸添長景倍新帳殿篆凝輝雉尾網城漏遞晃魚鱗一天秋思吟新魄萬幕寒衾憶從臣忽聼逺村砧杵動授衣時節恰臨豳恭謁永陵四祖分陵墲壝同鴻禧景佑奠岐豐制因漢氏修園寢尊擬周家號古公念結拜瞻千里外派綿繼續萬年中曰承曰啓均豫責惟敬惟勤勵此衷恭謁福陵天柱隆崇萬載亭陵山名天柱山福貽奕葉藉威靈風雲儼若通神縡龍虎常如護帝扃黍稷一時陳爼豆瞻依十載易霜星敬觀實録思開創每悉艱難淚雨零恭謁昭陵丕顯丕承王業昭肇基景命大清朝那同鼎足分三國可擬戎衣定一朝兩白常趨石馬汗陵前立仗石馬曰大白小白蓋太宗當日所乘以略陳破堅者萬青永護玉峯標元孫五世親陳奠僾愾聲容未覺遙謁陵禮畢車駕入盛京仍疊癸亥嵗舊作七言排律十四韻周甲遵塗又向東吉林佳氣鬱蔥蔥故鄉遺俗今猶在創業開基古鮮同走馬率西時相宅如龍逴海每勞躬皇威逺鬯先攘外聖澤深孚早建中名正底須慙德抱我明以太祖之興兵伐報先讐非利其土地氣雄真使敵羣空既申頻價魚書議既得瀋陽遂屢遣使議和垂得還旋玉轡瓏我師謂太宗圍燕京垂得命班取之甚易守之猶難云帷幄運籌宣衆力風雲締構贊天功王師本是征無戰勝國徒稱守且攻爰藉驅除膺大寶我下世祖平流冦之亂得天定鼎燕京於古為正遂遷都邑設酆宫上陵近紀諏秋吉狩漠觀風樂嵗豐纍洽重熙蒙祖德月將日就惕豫衷留京蒞止當年宛父老瞻依喜氣融滄海車書虔輻輳朝鮮遣陪臣稱賀九關閶闔洞開通推恩行慶遵常制何必酺筵醉頰紅至盛京故宫日作精禋敬展十年思蒞止留都駐羽旗秩秩肯堂欽祖德依依愛日奉親慈氣回嫩暖情均暢雲放新晴喜共知信擬貞觀欹案側武功得句再巡時癸亥十月車駕發盛京時有會復如唐后武功咏再巡之句御崇政殿重臨慶善仰徽興黼座維皇祖所憑來賀西鶼復東鰈時凖噶爾輝特部台吉阿睦爾撒納內附差使先至又朝鮮例遣陪臣奉貢致賀敢忘夕業更朝兢君臣一德思前篤禮樂百年踵後增卜世繁禧綿億載大紅海旭正初升故宫侍皇太后宴金風皎日麗仙屏樂奏雲韶鳯下聽興慶重來溯締構大安到處奉慈寧雲呈東海迎鼇駕祥擁西池介鶴齡敬領徽音識心所曰欽繩繼守先型實勝寺精藍何處無初地佑皇圖虔禮世尊相敬思開國模艱難緬御鎧威烈仰神弧尊奉胄及太祖所貽甲太宗所遺弓佛是仔肩重憂勤益切吾清寧宫疊舊作韻故宫兹路寢禋祀例依前祭亥東神為國朝舊俗必於正寢癸巡時敬謹舉行今仍之承構惟懷祖居歆總賴天西南仍啓户翰墨亦陳筵依舊三秋景那能百慮蠲流隂誠荏苒清暇暫周旋言念蘋蘩主愴然憶昔年癸亥年來時追孝賢皇后相隨撫今昔有感於懷頥和殿有序於清寧宫左側搆室數楹為聖母息居之所名曰頥和殿而系以詩松鶴顔齋表清越避暑山莊松鶴清越皇太后之地也聖祖奉聖母山莊所御亦以松鶴名齋頥和名殿奉晨昏孝慈家法千秋仰儉朴初風一室存登鳯凰閣層甍建置憶當時表裏山河座下披鼾睡豈能容榻側縱觀直欲奄天涯九秋如昔風光好百嵗而今户口滋繁似京華非不美俗漓用此為縈思欲逰千山復不果念結龍泉祖樾間遊期又復爽千山既憐倦馬當秋瘦且付枯僧抱月間坐可披圖悟離即恍如對瀑聼潺湲終須卧象諸峰側霜磴煙蘿取次攀長寧寺恭瞻太宗所貽冠服二首羮墻有志難為覩冠服重瞻仰聖靈應現吉祥雲作蓋千秋萬載護長寧戎衣汗馬躬勞苦繼述常懷烈祖靈儉朴心欽發篋始微言那藉李邦寧按元史大安誾中有故篋李邦寧對云此世祖所遺裘帶有聖訓曰藏此使見吾朴儉云云過功臣費英東揚古利等墓題句志感橋山柏里鬱相望開國同心想杜房一二藎臣茲扈蹕逸勤胥及爾寧忘躬臨酹酒當年事癸亥初至盛京凡功臣墓皆親臨賜奠遣奠依然表舊勞兹以重來各遣大臣致酹動我愴然翹望處山陵氣接朔雲高恭咏太宗所製鹿角椅彎弧曽逐鹿製器擬乘龍七寶何須羡八義良足供庫藏常古質山養勝新茸那敢端然坐千秋示儉恭故宫對月殿秋輪欲小近海光愈潔初度埤堄闉漸朗琉璃闕衣宵古已然示沖今豈别繩先益增惕惜隂敢即恱同漢歌大風異唐臨遼碣可愛永蟾輝何須問圓缺大清門我太祖神武明哲創業開基日不暇給而勤於庶政建二木於門俾下情欲達者書之以進法貽百世澤永萬年令許投書異缿筒無聲聽俾下情通古風淳噩非緣襲謗木堯年聖制同賜王公羣臣及盛京官員宴即席得句崇政光華午日晴笙歌酒醴樂聨情寧誇漢代橫汾水訝擬周家宴鎬京兕爵三巡湛露泛蛟罏一縷瑞煙輕同堂均有亮功責誰進嘉言朂守成大政殿翬飛朵殿煥觚稜左右亭分以十稱永念誰知此時切疇咨獨憶昔年曽紹聞衣德千秋凛燕翼貽謀萬葉承三致意惟欽繼述吾心寧敢懈兢兢恭奉皇太后自盛京回鑾之作盛典崇禋次第修安輿虔奉啓龍斿幾多别緒留豐里頗有征人望薊邱屈指再臨期後日追思夙駕溯前遊去來今了不可得一念繩先奕葉謀永安橋盛京城西至廣寧向多沮洳行旅頗艱我太祖初定瀋陽即命修除疊道一百二十里太宗崇德六年義建永安橋自是師行無阻用集大勳䇿馬經過摛毫志事除道修橋經指揮師行來往迅如飛奚稱貞觀征遼日布土徒勞奏績希過句驪河潦盡寒潭碧水澄浮橋旋轡舊相仍樂浪元菟古難考安市襄平近可徵納稼村間場有積趂歸人急馬才勝句驪渡後頻翹首己隔雲煙望二陵廣寧道中廣寧道中跋馬行敗壘荒堡頻逢迎云是當年防守處江山坐失嗟有明外猜內忌政紛亂謀臧不從不臧薦其間門户尚相爭文臣掉舌武臣竄增餉未逮士卒家逍遙河上擁棨牙成梁華表至今在爵里世胄滄桑誇後臺烽火更番置朝偵夜望亦云偹設邏徒布千萬兵王師一舉皆捐棄遼東不保全遼西破竹安禁飛騎馳我來撫迹仰前烈百年古縣成雍熙皇天無親德惟本民不可下曰可近一言敬告守器人待言守時計己晚祭北鎮醫巫閭山敬謁橋山大典昭旋輿蠲吉祀寅朝提封於昔更無北望秩而今溯有姚廟古百王虔盛享神庥億載佑全遼髙低黍稷盈豳野嵗嵗顒祈風雨調畫松北鎮廟中古松半枯槎丫夭矯東幹蒼蒼鬱然偃蓋祭畢周覽立樹下貌之而係以詩鎮廟門西似蓋松半存枯幹半蘢蔥凝神如見抱朴子圖貌慙非陳所翁立下忽疑晴與晦現前可悟色兮空何當六月根旁坐讀疏仡聼謖謖風杪秋遊醫巫閭山得五言三十韻奧宇坤維鎮神堂碣石開嶐嵸參漢逈案衍向陽恢舜典升柴載山經括地晐昔曽望巒嶺癸亥嵗有過廣寧望醫巫閭山之作今已近壇陔禋祀帛籩薦威儀卿尹陪達誠仙闕退問景玉鞭催驀入栗梨墅延緣峛崺堆圃場崇有積雞犬靜無猜頻見耕荒隧疇能保一阫日髙方覺暖風細不生埃盤谷深成阻牛山久己峐寺頽僧避去屋寂鳥飛來遂造﨑嶇遍從看草木才地靈自呵護天意本栽培寫霧豁宫霍流澌落漩洄栁書人作字松抱石為胎初狹塵凡限中宏造化胚便因窮窈窕旋命減輿儓詰曲遵崎徑蒙茸藉嫩苔懸崖飛瀑水切皓聳瑶臺右聖水盆尚有芝英碣寧妨薦福雷右蝌蚪碑武陵雖假借洞口試徘徊作記徵彭澤成詩憶楚材右桃花洞寧知進士第轉遜嶽陽杯右吕公岩肥遁幽棲處翹思獨往才右道隱谷雲巢真可號龍種是誰栽右雲巢松最後中峰矗居然一笠嵬右曠觀亭海天惟浩蕩心目與兼該始遇欣佳矣曠觀誠壯哉安期如却掃意不在蓬萊遊醫巫閭雜咏翠雲屏嶊崣孤峯削玉華山樞旁出古槎丫何人解事為鐫泐語鑿空猶道女媧上有舊鐫明御史張學顔題補天石三字道隱谷深谷棲遲可樂賢路遙偶未訪林泉東丹潛志讀書處逐鹿成圖豈恝然石渠寶笈藏東丹逐鹿圖聖水盆垂崖迸水落絲絲冬不凝冰事匪竒應為仙家修養法將臨玉女洗頭時曠觀亭飛來一笠冠巑岏海水天雲入曠觀竒迹無窮宇宙內欲幽探遍故應難哈密瓜至遣諴親王果親王恭薦二陵感而有作西極甘瓜熟來從包貢郵薦新遵昔例癸亥謁貢瓜陵禮畢適至曽遣誠親王和親王賫往恭薦柔逺賴前猷己覺雲山隔其如嵗月悠較豫應厚幸又得謁珠丘錦州道中築場納稼野村間羽蓋逶迤展謁還七萃翹心指帝里萬年愈色奉慈顔潦澄急水將慢水秋老松山復杏山盡是開基用武地時平益切守成艱題寧逺祖氏石坊燧謹寒更烽候朝鳩工何暇尚逍遙若非華表留名姓誰識元戎事兩朝過中前衛峰堡岡臺每相入聲望耗民無救墮明綱椓人久擅殺生柄怯將徒稱守禦方極目一時警蹕路回思此地戰征場動關心懼仔肩重祖業維艱刻敢忘題望夫石薑女祠前有石名曰望夫或云即薑女墓事雖不經而有關風化故詠之執役當時為護邊隕城堅節孟薑傳牧兒遺火咸陽燎片石贏他歷海田山海關仍恭依皇祖原韻長塞滄瀛倚雄關碣石邊抱環四城接南北二翼城東西二羅城皆洪武時徐達建延亘萬峰連兩度鑾輿歷千秋聖製傳小陽仍問景弱水不論年禾稼納場圃人家富井煙撫兹偃武會敢忘詰戎權戰迹餘平野關內平野即破流賊十萬衆處人情譬涉川丹陵回望逺攬轡意拳然再登澄海樓疊前韻拾級登岑樓復此俯巨溟寒暑幻冬夏日月浴虧盈界嶴光並耀際天色同青最巨斯絶類守信故永亨蹄涔易致涸注兹恆為瀛涇渭誠小哉徒分濁與清再登澄海樓疊前韻聨句有序乾隆十有九年秋由吉林至盛京恭謁三陵禮成旋蹕以孟冬二日入關再登澄海樓距癸亥前遊周一紀矣閲壁間舊題墨瀋猶新爰續舉成例命汪由敦劉綸用禁體聨疊前韻既暢登臨並志嵗月云御製坤載既盤礴坎德靡虧傾脈屬天地氣量應朝夕盈朱垠際閩廣朔野奄幽營再巡臨碣石臣汪由敦御製重登俯雕甍梁適侍子舍時梁詩正侍養南還張騫返仙京張照已物故壁詩猶好在屋籌凡幾更螺丸大塊點屓負岑樓擎霞標傍檻矗臣劉綸御製雪嶠羅忩崢東叟尋蓬嶼巨蜃吹層城霧露不辭受壑谷容來并雲錦織回紫玉繩接通明陽侯逞陵軼臣汪由敦御製嶽祗恣磓掁斫陳萬馬駭突圍千牛轟禁體續前例罰期嚴後成㕙毫蘸勺蠡犗餌投長鯨志怪迹誰核臣劉綸御製求真才豈英一杯納日月億劫噓隂晴底事稱白鷺奚從欵紅蜻爰居享鞺鞳鮫室眩煌熒藏積梵書列臣汪由敦御製巨最韓碑呈何無復何有曰虛亦曰貞赤石靈運進緑綺成連行逺航越裳候竒賮賈胡評隱娥歸墟守臣劉綸御製颶母舶趕生珊瑚周其趾蠙珠耀厥瑩壯觀向空廓郵籖漫促程夷齊廟得聖之清孰與齊首山途便此憑躋為傳公信及公達底較遼西復隴西宋代何須錫圭冕伊人本自視塗泥史遷慨羡青雲士未識浮名本稗稊恭奉皇太后回鑾述事上塞吉林取道便明禋劼毖心虔山川往復五千里甲子周回十二年自癸亥東建謁正周三陵距今年甲戌一紀武帳常承寢門豫都人喜迓蹕鑾旋酆宫悉得開基迹守業惟勤勵體乾欽定盛京通志卷十三
