body:
  text: 歷朝人物七明欽定四庫全書欽定盛京通志卷六十四厯朝人物七明吳成遼陽人從成祖起兵設伏淝河進兵小河合戰齊眉山靈璧皆殊死鬬功最多由都指揮僉事擢都指揮使永樂初三從出塞有功洪熙元年進左都督宣德初以成嘗宿衛東宫録舊勞封清平伯三年帝北征從敗賊於寬河進侯爵尋卒贈渠國公諡壯勇畢恭廣寧前屯衛人其先山東濟寧籍恭有文武才正統間以巡撫王翺薦授百户厯指揮僉事圖上方略開設迤西邊堡墻壕增置烽堠兵威大振進署都指揮僉事守備寧前等衛在任五年邉鄙寧謐進掌都司撫士卒革姦弊廣屯田興學校政事平理軍民咸稱之所著有邉城吟稿范廣遼東人正統中嗣世職為寧逺衛指揮僉事積功進遼東都指揮僉事廣性剛果精騎射驍勇絶倫每臨陳身先士卒英宗北狩廷議舉將材于謙薦廣充左副總兵額森犯京師廣躍馬陷陳敗之又敗之於紫荆關録功進都督同知景泰初以總兵官巡邉駐居庸還京副石亨提督團營軍馬亨素銜之英宗復辟誣廣黨于謙下獄死成化初廷臣訟其寃命子升仍襲世職額森蒙古語解見名宦卷原作也先今譯改顧能定遼前衛人性剛直與人寡合天順元年進士授户部主事有清操生平不妄受人一錢天順間監收通州糧盡革諸弊再往淮安收錢計一嵗所入九倍於昔尋升本部員外郎成化初天下清官四員能居都御史楊繼宗之次憲宗刻名於便殿柱上惜不及大用云耿賢定遼前衛人由指揮升都指揮僉事掌都司印備禦金復鐵嶺尋守備寧逺轉右參將分守開原善撫士卒不妄交際致仕歸所屬憫其清苦各餽金幣賢悉分之軍士後卒葬城東杏林山與其師顧能墓相近詩人弔之以為師弟雙清云胡深定遼後衛人早孤育於伯父登天順八年進士授監察御史剛正嫉邪不避權幸成化初與同官鄭已等爭慈懿太后山陵事彗星見復與同官言大本未建異端太盛進退賞罰未公財用工役未省賑濟無䇿備禦無方凡八事帝優詔答之又上疏請斥姦邪痛詆大臣劾大學士商輅之失節兵部尚書程信之剛暴禮部尚書姚夔之黷貨不納深嘗巡按陜西諸大臣既被劾惡之坐以按陜時杖殺人謫黔陽縣丞稍遷鬱林知州辛於官祀鄉賢賀欽字克恭其先浙江定海人以戍邉籍義州又家廣寧少好學讀近思録有悟成化二年登進士授户科給事中直言敢諌嘗書鄙夫章于壁以自警師事陳白沙先生獻章既歸肖其像事之𢎞治改元用閣臣薦起為陜西參議未至而母死乃上疏懇辭且陳四事一資真儒以講聖學二薦賢才以輔治道三遵祖制以處內官四興禮樂以化天下疏凡數萬言其云處內官者指王振曹吉祥汪直輩陷君誤國蠧政害民內不可使預大政外不可使掌兵權尤為切要奏入報聞正德四年太監劉瑾括遼東田東人震恐義州守又貪橫民變聚衆劫掠相戒曰毋驚賀黃門欽聞之急諭禍福以身任之亂遂定欽學不務博涉靜思默識専讀四書六經小學期于反身實踐謂為學不必求之髙逺在主敬以收放心而已每教人讀白鹿洞教條嚴為己為人之辨隱居醫巫閭山下讀書之暇釣遊凌溪徜徉自得有醫巫閭集行世别號醫閭沒後鄉士大夫為之立祠於釣臺陳夀字本仁其先新淦人祖志𢎞代兄戍遼東遂籍寧逺衛夀少貧甚得遺金坐至夜分還其主從鄉人賀欽學登成化八年進士授户科給事中言時政無隱彈劾不避權貴𢎞治十三年以右僉都御史巡撫延綏敵兵入掠擊却之未幾何碩托囉率衆大至夀自出帳擁數十騎據烏皮几指揮敵疑之遂引去既而授諸路將領方略邀擊之皆克捷軍聲大振尋遷右副都御史掌南院正德初劉瑾矯詔逮南京科道戴銑等夀抗章論救瑾怒罷其官九年復起巡撫陜西盜賊屏息亷名尤著夏大旱戒刑清獄齋心誠禱天乃雨嵗大熟尋拜南京兵部侍郎陜人呼號擁輿移日不得行進刑部尚書致仕卒年八十三夀清廉厯官四十年無家可歸寓南都所居不蔽風雨其卒也尚書李充嗣府尹冦天敘為之殮和碩國語解見關郵卷蒙古語解見黑龍江山川卷原作火篩托囉國語解見黑龍江山川卷原作脫羅今譯改潘輔廣寧人𢎞治六年進士授順天永清縣尹有冰蘗聲時盜賊竊發境江緝捕有方畏威逺遁民皆安堵後卒於官孫磐定遼右衛人少有氣節登𢎞治九年進士初觀政即上疏言近日諌官以言為諱請定建言者為四等最上不避禍患抗彈權貴者其次揚清激濁能補闕拾遺又其次建白時政有裨軍國皆分别擢敘而粉飾文具循默不言者則罷黜之庶言官知警不至曠瘝時不見用尋擢吏部主事正德元年宦官漸用事磐復上疏言今日弊政莫甚於內臣典兵乞盡撤各鎮中官還京専以邊務責將帥不從時劉瑾得志深嫉之斥磐為姦黨遂免官瑾誅復起河南按察司僉事值流賊猖獗資給軍餉鎧仗以至保障留都遏賊東殄磐之籌畫居多王春廣寧左屯衛人𢎞治九年進士授翰林院檢討升周府長史時宗室以巡撫勾稽廩祿聚衆往譟於門後因治兵備大盜宗室疑之皆挾兵自衛春啓王遍諭其故且止巡撫兵衆乃安有復菴詩集行世崔哲遼陽人𢎞治十二年進士正德初知威州以德服逺邊陲無警後改任澤州撤淫祠廣儲蓄善奬進後學課試皆有程期張經字天敘瀋陽中衛人正德六年進士授新樂縣知縣擢監察御史按宣府劾鎮守太監丁喜貪肆罪嗣為喜所訐逮繫詔獄都御史彭澤及兩京監官論辨其誣謫河南河內縣典史憂忿卒於途妻子扶柩歸葬嘉靖改元追贈光祿少卿范鏓字平甫其先江西樂平人遷瀋陽舉正德十二年進士授工部主事擢員外郎嘉靖三年伏闕爭大禮下獄廷杖遷河南知府嵗大飢巡撫潘塤駮諸請賑文牒候勘實乃發鏓不待報輒開倉賑之全活十餘萬人厯遷右副都御史巡撫寧夏鏓為人持重有方略既蒞鎮不尚首功一意練步騎廣儲蓄善治關隘亭障寇為逺徙居數年引疾歸起故官撫河南尋召為兵部右侍郎奉詔總理邉關厄隘奏上經略潮河川居庸關諸處事宜帝才鏓甚即命為兵部尚書鏓以老辭帝怒削其籍時嚴嵩當國而鏓本由徐階薦天下推為長者惜其去不以罪久之乃卒隆慶元年復官鏓為官剛斷明察其巡撫寧夏時清查侵盜糧草裁革冒功升賞弛廢振興邊境肅然傅鑰字希凖廣寧人正德六年進士授給事中嘗論邉事為尚書王瓊嘆服會宣大將領失利亡卒甚多廷議遣鑰覆視上曰是嘗言邉事者稱是選矣鑰至鎮考治甄别不隨不苛得實以報嘉靖間纍升山西按察使用法平恕兼得大體富民某殺人當死以貨免鑰收鞫之置於法知縣某主薄某皆良吏為姦人所搆事下按察司或謂鑰云是當道所欲入也鑰曰法如此可枉徇乎竟白之終河南巡撫徐景嵩定遼中衛人正德九年進士尹咸寧升户科給事中彈劾不避權貴厯河間知府山西按察副使趙國忠字伯進錦州衛人嗣指揮職嘉靖初舉武會試進都指揮僉事擢錦義右參將連破敵進署都督僉事為遼東總兵官有功進都督同知嗣代趙卿鎮宣府命部將逆擊諳達於大滹沱敗之寇盡走及諳達薄京師國忠趨入衛移護諸陵寇見國忠陳於紅門畏不敢入三十一年再鎮遼東禦却小王子數萬騎明年逐敵出塞多斬獲進秩一等國忠善戰射穿札為將有威嚴厯兩鎮繕亭障練士馬邉防賴之諳達國語解見吉林山川卷原作俺答今譯改李景登廣寧人神宗二十年進士任猗氏縣才敏氣恬不以崖岸自異請除荒地課贍書生升吏部主事出知漢中府冰操嚴潔明敏果斷蒞任三年案無留牘獄無沉滯佟卜年遼陽人神宗四十四年進士知河間縣節用愛人除門則俵馬大户三害境內獲安邑人立祠祀之事見畿輔通志祖寬遼東人少從軍有功纍官寧逺參將勇敢善戰部卒多塞外降人所向克捷崇禎五年叛將李九成圍萊州詔發關外兵討之寬為前鋒率五百騎遇賊兵三千於沙河寬殊死戰賊退走解萊州圍進都督僉事八年為總兵官討流賊挫張獻忠於焦村復遇汝州賊寬率軍至大敗之十一年王師下山東濟南失守時誣寬以失陷藩封被逮棄市寬敢戰有功稱良將性剛使氣不為文吏所喜卒罹大辟莫為救論人頗謂失刑云欽定盛京通志卷六十四
