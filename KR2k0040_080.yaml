body:
  text: 國朝人物十二鑲黃旗䝉古正黃旗䝉古正白旗䝉古正紅旗䝉古鑲白旗䝉古鑲紅旗䝉古正藍旗䝉古鑲藍旗䝉古欽定四庫全書欽定盛京通志卷七十六國朝人物十二鑲黃旗䝉古西喇巴雅爾姓布庫特𨽻鑲黃旗蒙古世居扎嚕特初任佐領崇德三年從貝勒嶽託入牆子嶺趨山東明太監馮永盛以兵邀戰擊敗之明年春旋師過三屯營敵扼險以拒相持七晝夜乘其懈擊之皆潰順治元年以參領從入關擊敗流賊李自成二年從郡王阿巴泰鎮守山東旋與都統凖塔等進師淮安屢敗明兵其潰衆竄據海中雲臺山往𠞰平之三年從肅親王豪格討流賊張獻忠道出西安敗賊將髙汝礪等於秦州階州乘勝抵四川殪獻忠於鳯凰陂五年凱旋擢副都統先後叙功復遇恩詔加世職至一等輕車都尉兼一雲騎尉十八年卒孫卓特博襲都爾瑪姓錫納明安先世居喀喇沁地太祖時來歸𨽻鑲黃旗䝉古天聰二年從貝勒嶽託攻錦州有俘獲五年從圍大淩河城城中兵出戰奮擊敗之八年從內大臣多爾濟略大同敗明總兵曹文詔軍文詔善用矛明季驍將無出其右者既捷第都爾瑪功最賜號巴圖魯尋授佐領崇德六年大軍攻錦州明總督洪承疇以兵十三萬來援列營松山我師分左右翼截擊之都爾瑪超伍先進破其營屢敗其兵於杏山塔山間承疇軍數挫衄又糧餉將匱其將吳三桂王朴謀引兵遁都爾瑪從內大臣錫翰設伏髙橋襲擊之斬獲無算遂圍松山城明兵潰圍出犯我營都爾瑪力戰却之叙功授三等輕車都尉世職順治二年晉爵三等男其後叠遇恩詔晉至二等子授內大臣康熙三年卒賜祭葬諡忠直以其孫齊什襲翁愛姓卓爾古特世居科爾沁太宗時來歸𨽻鑲黃旗䝉古授佐領崇德二年偕佐領喀凱舒書等征瓦爾喀俘獲甚衆四年率所屬分屯義州督耕勤所獲糧獨多七年從貝勒阿巴泰征明越燕京至山東攻莒州城先登順治元年大軍入關討流賊翁愛以署副都統督後隊兵尋𠞰賊將陳永福於太原翁愛以兵薄城賊突出犯擊却之二年從英親王阿濟格征陜西敗賊綏德州賊渠李自成遁湖廣復躡擊之斬獲無算三年授禮部理事官兼前鋒參領從肅親王豪格征流賊張獻忠過陜西擊敗叛鎮賀珍於雞頭關進兵四川三戰皆捷先後叙功並兩遇恩詔晉一等輕車都尉九年擢副都統十五年卒賜祭葬如例弟特澤襲多爾濟達爾罕姓博爾濟錦世居翁牛特為察哈爾部大臣天聰八年㩦族屬來歸隸鑲黃旗䝉古崇德元年授一等男任都察院承政三年更定官制改都察院參政六年明總督洪承疇以八鎮兵援錦州軍於松山大軍合攻之明兵潰走杏山都統阿賚伊拜等截擊其潰衆多爾濟逹爾罕往監戰核所俘馘還報稱㫖尋擢內大臣兼參政七年太宗幸牧馬所命內大臣侍衛與降將祖太夀等校射多爾濟逹爾罕發矢輒中得恩賚從貝勒阿巴泰征明自薊州至山東所至輒捷順治二年加一雲騎尉四年考滿晉爵三等子復擢都察院承政七年三月解院事仍為內大臣尋列議政大臣三遇恩詔晉一等子兼一雲騎尉十七年卒賜祭葬諡順僖子博第襲阿什岱姓揆龍𨽻鑲黃旗䝉古天聰三年隨征明攻威縣先登克之賜號巴圖魯授佐領世職順治元年隨豫親王多鐸南征破流賊平定河南七年九年兩遇恩詔加世職一等輕車都尉十五年從征貴州有功十六年𠞰海賊鄭成功于瓜洲破其衆叙功授三等男卒固慕德徹臣𨽻鑲黃旗䝉古天聰六年來歸授三等總兵官崇德三年隨貝勒嶽託征明攻髙陽奮勇先登克之叙功纍加世職三等子康熙六年卒賜祭葬如典禮布伊錫哩姓鄂爾克特𨽻鑲黃旗䝉古崇德七年隨圍錦州擊松山敵兵敗之順治三年隨肅親王豪格征四川屢敗賊渠張獻忠之衆及賊平俱在事有功七年九年兩遇恩詔又叙功加世職二等輕車都尉十三年任護軍統領康熙十二年加太子少傅十三年卒諡壯果羅什𨽻鑲黃旗䝉古初任佐領崇德七年從貝勒阿巴泰征明擊三河西馬步兵有功順治元年從睿親王多爾衮入關擊流賊以步戰突陳論功授三等輕車都尉七年九年兩遇恩詔加一等輕車都尉十八年擢副都統隨征雲南卒賜祭葬如典禮賴護𨽻鑲黃旗䝉古崇德時屢從征伐有功纍擢至副都統順治元年從入關十一月從豫親王多鐸南征破流賊平定河南江南並有功加佐領世職七年加一騎都尉多鐸和姓博爾濟吉特𨽻鑲黃旗䝉古初任佐領天聰二年隨征明景州有俘獲崇德五年再圍錦州敗松山杏山援兵七年圍錦州復敗明松山援兵又敗明經略洪承疇軍屢以善戰有功授佐領世職又隨征薩哈連烏拉部多俘獲順治元年隨入關破流賊平定河南三敗賊於潼關二年征杭州屢克捷三年從征騰吉思敗土謝圖汗等之衆七年九年叠遇恩詔加世職一等輕車都尉卒阿雅齊姓烏朗哈𨽻鑲黃旗䝉古以人户來歸授遊擊世職天聰三年隨征明燕京同武賴敗明兵于盧溝橋南復敗之於涿州崇德三年從征山東與明兵連戰七書夜屢有功五年征明錦州擊松山兵敗之順治元年從入關擊流賊追敗之慶都叙功叠遇恩詔加世職二等男卒額對姓博和羅特𨽻鑲黃旗䝉古崇德三年從征明攻安肅以第二人登六年圍錦州擊明兵敗之八年征明山東攻兗州以第四人登加授三等參領賜號巴圖魯將旋師復擊敗明兵於邊順治元年從入關敗流賊於慶都復𠞰馬山口土賊盡殱之論功再遇恩詔加世職三等男卒庫碩姓圖克齊納喇𨽻鑲黃旗䝉古崇德三年隨征明山東攻恩縣先登克之纍加世職至三等輕車都尉克什圖姓錫拉𨽻鑲黃旗䝉古初任佐領崇德三年從征明山東屢敗敵兵攻濰縣先登克之順治元年從入關擊流寇有功加世職弟克什特别見忠節傳衮綽斯姓烏朗哈隸鑲黃旗䝉古崇德三年從征明擊通州兵敗之又敗明追兵於董家口五年七年隨圍錦州皆在事有戰功八年征明山東破八總兵援師纍戰皆大捷得優賚纍加世職三等輕車都尉綽爾們姓喀爾諾特隸鑲黃旗䝉古初係察哈爾阿濟格宰桑率族來歸崇德六年隨圍錦州敗明經略洪承疇三營步兵又敗其松山援軍順治三年隨征蘇尼特部騰吉思等在事有功授副都統加一雲騎尉子隆古順治初從征廣東著有軍功布勒姓噶濟特隸鑲黃旗䝉古崇德七年隨圍明錦州紀勳二次八年從攻明山東臨清州奮勇先登克之賜號巴圖魯授世職佐領順治元年從入關擊流賊步戰有功纍加世職至一等輕車都尉竒拜姓噶齊特𨽻鑲黃旗䝉古崇德七年從圍明錦州以步戰有功八年征明山東從攻兖州先登克之賜號巴圖魯論功授佐領世職順治初復以擊流寇有功進秩同旗有博勒姓鄂爾圖特亦以崇德八年從攻明山東䝉隂先登克其城賜號巴圖魯順治初纍加世職二等輕車都尉海什姓克錫克特隸鑲黃旗䝉古崇德八年從攻明直隸安肅先登克之賜號巴圖魯授佐領世職順治元年追敗流賊於慶都復有功進秩同旗有敏安崇德時隨征明山東攻兖州德州皆先登陷陳又有阿爾賽從攻明直隸威縣先登並授三等輕車都尉拜思噶爾姓烏朗哈𨽻鑲黃旗䝉古崇德八年從征明山東屢戰有功嗣遇恩詔加二等輕車都尉武塔齊姓鄂爾克特隸鑲黃旗䝉古崇德八年從征明山東攻莒州奮勇先登克之叙功授佐領世職德根姓濟默隸鑲黃旗䝉古世居義州順治五年從征江西叛鎮金聲桓攻南昌先登授騎都尉十年從征廣東破李定國軍以功兼雲騎尉正黃旗䝉古阿岱姓鄂爾果諾特世居喀爾喀歸我太祖隸正黃旗䝉古授三等輕車都尉世職天聰時授參領駐防伊蘭布哩瑚巡檄海濵猝遇明兵擊斬千人擒一逰擊以歸明水師千餘犯海州復率兵三百馳擊之多斬馘撤防還太宗親賜酒勞之晉二等輕車都尉纍遷至都統隨貝勒代善自喀喇鄂博攻得勝堡殪守卒殆盡崇德初隨武英郡王阿濟格攻克定興寶坻諸城設伏擊三屯營援兵盡殱之太宗親征朝鮮阿岱樹雲梯薄城先登其王李倧棄城遁三年隨具勒嶽託攻牆子嶺明總督吳阿衡以六千人來援負嶺立營分軍三隊列械而陳阿岱潛率竒兵踰嶺繞其後奮呼踰阿衡營大軍復直前夾擊之覆其軍功最四年卒孫巴琅勇敢善戰順治十一年靖南將軍珠瑪討僞晉王李定國於廣東巴琅以參領從時定國寇新會我軍自三水馳擊賊大潰定國復糾步騎四萬分踞山谷巴琅陟險薄賊營鏖戰馘賊甚衆叙功晉爵二等男十三年卒巴琅弟托班從征逆藩吳三桂擊敗賊將談洪於陽平關乘勝抵朝天關擊敗賊將石存禮連破其木城進征保寧賊將吳之茂斷我餉道托班連矢殪賊賊皆潰走又擊賊將王屏藩於郿領龍潭驛叙功晉爵一等男三十三年卒哈岱姓烏密隸正黃旗䝉古父巴賚都爾莽奈初為察哈爾大臣及林丹汗敗奔唐古特乃率戶口來歸授一等男從征明越燕京下山東從攻寧逺錦州戰松山杏山間屢戰有功再攻錦州中流矢歿於陳恤贈三等子越明年以哈岱襲爵哈岱年十七時隨其父攻寧逺父所乘馬蹶哈岱不及介馳入陳擁父乘其騎以出太宗聞而嘉之賚豫甚厚至是襲爵從大軍征明敗敵密雲進攻易州順德克之遂略地至山東臨清順治元年從定燕京二年大軍既平江南從貝勒博洛征浙江敗敵於海寧進定杭州師還得恩賚三年從豫親王多鐸追𠞰騰吉思擊敗土謝圖汗兵及碩雷汗兵四年進二等子六年從英親王阿濟格討大同叛鎮姜瓖屢戰皆捷多斬獲十二年閩賊鄭成功據金門厦門兩島縱橫海上遣其黨阮思陳六御陷浙江之舟山哈岱從大將軍伊勒德往𠞰之十三年進師定海思等列戰艦於蛟門大敗之逐北至衡水洋連斬思六御俘其餘黨舟山平十四年晉一等子康熙四年擢為內大臣明年以討逆藩吳三桂往徵喀喇沁翁牛特蘇尼特諸部兵移駐大同河南兖州十九年卒年六十有三賜祭葬諡勒壯立碑墓道孫阿喇納襲雍正元年追録巴賚都爾莽奈功入祀昭忠祠阿賴姓莽努特世居喀爾喀太宗時挈族來歸隸正黃旗䝉古嘗奉使阿祿部招降其部長率其部人俱至上以為能賜號達爾漢既而降人有叛去者率兵五百窮追之閲數月乃得斬倡叛者四人盡俘其衆以還征喀穆尼罕部擒其部長葉雷獲户口牲畜無算崇德元年授一等輕車都尉兼一雲騎尉世職加號庫魯克達爾漢三年授禮部右參政四年擢都統六年大軍圍錦州明總督洪承疇自松山來援阿賴設伏杏山邀擊之擊馘甚多尋攻松山城承疇遣兵二千迎戰阿賴沿壕縱擊殪其軍鋒敵將敗退入城大軍扼之不得入遂皆棄甲降順治元年偕都統葉臣平定山西三年從豫親王多鐸追𠞰騰吉思將及賊反鬬降阿賴分兵繞出其後潰遁截擊之擒斬甚衆五年偕尚書武達海駐漢中防𠞰叛鎮姜瓖六年瓖黨姚舉等陷欣州賦賴馳兵赴援破賊石嶺關進復欣州賊平乃班師三遇恩詔晉世職為二等男九年駐防西安尋還京以老疾解都統任康熙十二年加太子太保十七年卒賜祭葬諡襄武立碑墓道以其從孫髙良襲伊勒都齊姓莽努特世居察哈爾太宗時來歸隸正黃旗䝉古尋授護軍參領天聰八年略地宣府率所部攻下十二堡崇德五年屯田義州敗明騎兵於寧逺六年從圍錦州借護軍統領濟什哈擊却松山援兵八年從入關敗衛城先登叙功授雲騎尉世職順治元年從入關敗流賊李自成再敗之望都是年冬署護軍統領從豫親王多鐸𠞰自成於陜西薄潼關賊將劉方亮乘夜襲我營伊勒都齊與護軍統領圖賚奮擊之大破敗遂克潼關二年移師定江南攻克揚州尋從貝勒博洛下浙江敗明將王之仁於平湖逐北至太湖獲其舟數十大軍進定杭州屢以功晉世職為三等輕車都尉三年騰吉思叛奔喀爾喀從豫親王追之既及大軍擊之潰與都統阿賚伏兵截擊其潰衆遂徇圖拉河而西喀爾喀部衆連出邀戰大敗之獲馬駝無算以功晉二等輕車都尉六年從鄭親王征明桂王朱由榔於湖南時由榔將王進才袁宗第郝永忠等分據沅靖間伊勒都齊進兵武岡破進才寨九宗第寨五分兵追𠞰永忠下黎平遂北至永從縣多所斬獲七年凱旋八年擢副都統九年兼任刑部侍郎三遇恩詔晉爵至二等男十年十一月以勘佐領敦達哩獄不當坐降爵一等罷侍郎任十七年以疾解副都統任康熙十二年加太子少師是年冬逆藩吳三桂反以衆犯湖南順承郡王勒爾錦率師討之以伊勒都齊贊其軍務簡精鋭先發十三年次荆州賊陷常德府將窺湖北遂移兵防守武昌十六年卒於軍十九年追論守武昌時不殱虎渡口賊致陷太平街降世職為雲騎尉以其從子瑪塔襲額爾格勒珠爾姓博爾濟吉特隸正黃旗蒙古先世居克魯倫地天聰中偕其兄竒塔特偉徵來歸竒塔特偉徵官前鋒統領戰於大凌河陳沒恤贈三等男别見忠節傳額爾格勒珠爾素驍勇崇德三年從大軍征明越燕京南下山東明兵犯前鋒參領錫特庫營率所部馳救大破明兵六年從圍錦州城中兵出戰擊却之復敗其松山援兵順治元年從入關敗流敗李自成叙功豫騎都尉世職遇恩詔加一雲騎尉卒無子以從子察琿襲鄂本岱姓曼靖隸正黃旗䝉古世居喀爾喀天命六年來歸七年從征明克廣寧以功授輕車都尉世職天聰元年從攻錦州等處有功二年從征察喀爾多羅特部落率精鋭二百連敗敵敵回兵死戰衆却鄂本岱躍騎突前勝之論功加一等輕車都尉擢都統三年隨征明方入邊遇敵兵五路來犯率兵擊敗之並斬其渠師遂拔大安口及自遵化回兵敵衆四面環追鄂本岱迎斬其驍將一敵潰乃殿以還敘功加至三等男五年從圍大淩河城復以功得優賚九年卒訥們隸正黃旗䝉古本名揚天聰五年七月太宗親征大淩河掘壕困之城內兵出戰楊由太宗御前突入敵陳擒降明之䝉古一人隨擊明錦州兵與弟圖默特從纛前衝入敵陳敗之直扺其步營其弟中箭墮馬揚援出之又往攻錦州多俘獲回至邊外六十餘里遇明兵揚奮勇殺入陳復勝之俘獲無算加授逰擊世職九年賜名達爾漢哈丹巴圖魯先是我圖使臣遇賊五人欲害之因是奔阿魯揚追至興安嶺盡殺之因賜是名行師令居前從獵令居中初布哈等率師略明寧逺地為明兵所困時揚已先行還擊破之論功得優賞順治四年緣事除賜名及原職嗣叠遇恩詔仍加授二等輕車都尉文程姓嘉噶穆克隸正黃旗䝉古國初來歸天聰三年擢副都統從征明至通州敗明經略盧象升兵多斬獲崇德六年從征明圍錦州敗明經略洪承疇兵順治二年加佐領世職七年九年叠遇恩詔加三等輕車都尉卒多格申姓克濟特隸正黃旗䝉古天聰六年我師征明至大同多桑申來歸是年征察哈爾以多格申為鄉導前驅有功又以說降征逃之台吉等援佐領世職順治七年九年叠遇恩詔加二等輕車都尉任副都統康熙八年卒蘇朗姓烏朗堪隸正黃旗䝉古崇德二年同族人蘇布第來歸授佐領世職仍管喀喇沁佐領事兼任參領三年隨征明燕京擊敵有功六年從明征圍錦州擊敗杏山騎兵我軍圍松山時有明步卒來犯壕塹擊敗之順治元年隨入關以步戰擊敗流寇二年叙功超授二字參領世職六年任正黃旗滿洲副都統七年九年叠遇恩詔加三等男康熙十三年逆藩吳三桂反以副都統鎮守池州閏三月三桂賊黨犯荆州命蘇朗赴援合𠞰至湖廣卒於軍阿爾薩朗隸正黃旗䝉古初名們都天聰九年從征明攻松山遇明總兵祖大夀兵來戰們都以四十七人擊殱之至錦州復大捷太宗嘉其勇賜名阿爾薩朗授三等參領世職順治元年隨定山西五年從征太同叛鎮姜瓖有攻及凱旋遇恩詔加世職二等輕車都尉慱羅兑姓果爾羅特隸正黃旗䝉古本察哈爾部人太宗時率族來歸崇德八年隨征明至山東在事有功順治元年隨入關擊破流冦有功五年隨征江西叛鎮金聲桓屢敗賊衆至南昌之東江獲其糧十三艘大敗賊衆以功三遇恩詔加世職二等輕車都尉布雅泰隸正黃旗䝉古崇德三年從征明至山東攻臨清先登克之順治元年入關擊流賊復有功加授佐領世職巴圖隸正黃旗䝉古初任佐領崇德六年隨圖錦州時明經略洪承疇騎兵奪我兵巨駁巴圖隨副都統幹都擊敗之又擊敗寧逺兵於城下順治元年隨入關追擊流冦於慶都大敗之二年正月連敗流寇於潼關五月進師江寧獲其戰艦三百餘三年隨征福建敗賊于建寧論功及兩遇恩詔纍加世職至騎都尉加一雲騎尉十二年卒昻阿姓阿穆哈爾努隸正黃旗䝉古崇德二年自巴林來歸太宗嘉之授一等侍衛隨征朝鮮三年從征明攻昌平州等處俱在事有功授佐領世職順治十六年卒額爾岱姓博爾濟錦隸正黃旗䝉古崇德三年使征明山東攻長清先登以功授佐領世職是役也同旗有和爾哲亦以攻長清先登有功賜號巴圖魯授佐領世職阿敏隸正黃旗䝉古崇德六年隨征明圍錦州遇明經略洪承疇兵於松山阿敏衝入敵陳繫敗之順治元年入關擊流賊以步戰追敗之慶都論功授佐領世職三遇恩詔纍加至二等輕車都尉巴達隸正黃旗䝉古崇德八年隨征明攻前屯衛先登順治元年入關擊流寇有功七年九年叠遇恩詔纍加世職三等輕車都尉同旗有諾敏崇德八年從征明攻趙州先登賜號巴圖魯纍加世職二等輕車都尉正白旗䝉古武訥格姓慱爾濟吉特𨽻正白旗䝉古先居葉赫國初來歸從征烏拉布占泰力贊進戰遂滅烏拉天命十一年别將兵擊明華島破之盡殱其衆天聰三年從征明入龍井關克遵化進營於京城北明督師袁崇煥等援師至左翼䝉古兵先進少却武訥格等復進戰始敗之太宗取䝉古諸貝勒所俘獲物以半與之令分賞進戰將士其冬統兵征察哈爾降二千户五年復從征明時祖大夀守大淩河城杏山守將與之書有㩦軍士棄城或單騎潛來之語武納格獲以獻於是大軍圍城為久困計武訥格率本旗䝉古兵圍城東南偏明兵欲突圍出擊敗之城中兵不敢復出七年攻明山海關歸明兵來襲武訥格殿力戰却之太宗嘉之曰人臣為國義當如是叙功封三等公八年率䝉古左翼兵與諸貝勒俱進獨石口尋以武訥格為䝉古兩翼主帥自得勝堡收䝉古之逃入陽和者四百七十人武訥格性聰明通䝉古文及漢文驍勇善戰所至有功九年卒賜祭葬如典禮德穆圖武訥格子也初任佐領從征伐即有功崇德三年正月擢户部承政七月改右參政四年兼副都統六年從鄭親王濟爾哈朗圍錦州有䝉古諾木齊父子者初降明居州之外郛及是約降於我為明將所覺以兵防之不得出鄭親王令德穆圖往援援其子阿桑吉出而不力援諾木齊乃罷參政及其兼職専任以佐領七年從貝勒阿巴泰征明自薊州薄燕京長驅至山東順治元年從入關破流賊李自成追擊至望都叙功授騎都尉二年從豫親王多鐸擊敗流賊李自成於潼關移師定河南遂下江南敗明將鄭鴻逵於瓜州又偕都統瑪拉希徇常州明將黃蜚以舟師迎戰再敗之旋分兵攻宜興崑山並克之叙功加一雲騎尉復任副都統三遇恩詔晉一等輕車都尉世職九年卒子霍逹襲齊墨克圖德穆圖仲弟也早嵗屢從行陳崇德三年偕參領沙爾瑚達略寧逺界敗明兵於紅山口斬其裨將二初齊墨克圖兄弟三人季日廣泰其父武訥格纍爵至三等公既卒以廣泰襲至是坐違軍令奪爵明年命齊墨克圖降襲為一等男巡哨至錦州明將引五百人來拒擊走之獲馬六十搴其大纛而還大軍三圍錦州齊墨克圖皆在事有功八年偕護軍統領阿爾津哈寧阿等往征黑龍江攻克都里屯招降大噶爾逹蘇小噶爾達蘇乃能吉爾三屯俘獲無算賜豐貂銀幣尋擢副都統順治二年以入關破流賊功加騎都尉併授三等子三年從將軍和洛㑹討陜西賊賀珍分兵破其黨劉文炳於蒲城珍遁走武功追擊之斬獲甚衆五年卒以其子薩哈納襲騎都尉仍爵廣泰為一等男明安達哩姓錫嚕特隸正白旗䝉古世居科爾沁父博博圖太祖時率七十餘户來歸授為佐領天聰元年從征錦州歿於陳贈三等輕車都尉以明安達哩襲兼管其佐領事崇德三年進護軍參領從貝勒嶽託征明毁密雲東北邊牆入擊敗明太監馮永盛兵攻下南和六年從圍錦州擊敗其山巔兵及松山援兵我師浚長壕架橋共上為久駐計明兵出城奪橋戰却之明總督洪承疇以兵十三萬來救力戰敗其三營晉二等輕車都尉七年冬從貝勒阿巴泰克薊州薄燕京破明總督趙光汴軍蹂其步卒於三河進略山東八年春師還明將張登科和應薦合八鎮兵邀戰於螺山擊潰之登科應薦敗沒又偕都統鰲邦破明總督范志完軍是年推禮部參政兼副都統順治元年從入關敗流賊李自成二年從英親王阿濟格𠞰賊延安七戰皆捷徇鳯翔而東招降三十餘城三年改兵部侍郎㑹蘇尼特部騰吉思與弟騰吉特叛走喀爾喀從豫親王多鐸追及於額克特山大破之斬其台吉茂海獲其輜重並擊敗土謝圖汗及碩雷汗兵五年擢都統七年兼任兵部尚書先後叙功並遇恩詔晉爵至一等男九年列議政大臣晉二等子十年興安鎮總兵任珍擅殺事覺坐徇隱罷尚書任降一等輕車都尉兼一雲騎尉十一年征俄羅斯敗敵黑龍江十三年起為理藩院尚書十五年以安南將軍駐防荆州十六年海賊鄭成功犯江寧聫結艨艟千餘泊三山峽安逹哩率所部赴援總督郎廷柱總管喀喀穆開神䇿弓夾擊之賊大潰陳擒其大將獲戰艦器械無算成功竄入海尋移駐浙江舟山以防成功十七年還京授兵部尚書康熙三年加太子太保六年遷吏部尚書以疾致仕八年卒賜祭葬諡敏果子都克襲額琳齊岱青姓博爾濟吉特初為哈察爾部宰桑天聰六年大軍征察哈爾林丹汗奔土默特旋竄唐古特其部人無所屬皆散走䝉古諸部額琳齊岱青知我太宗為真主欲挈其族內附明年太宗親統師征大同凱旋出尚方堡額琳齊岱青約部人多爾濟塔蘇爾海率七百戶來從歸分隸䝉古白旗崇德元年爵以二等子三年從睿親王多爾衮入青山口越燕京趨山東每戰輒捷六年鄭親王濟爾哈朗圍錦州明兵自松山一再來犯劫我巨炮擊卻之明總督洪承疇集步騎十三萬援錦州列營松山我兵連破其步卒三營額琳齊岱青皆在事有功七年晉爵一等子世襲罔替八年卒以其子札木素襲色爾格克姓博爾濟吉特隸正白旗䝉古天聰時積軍功為一等侍衛崇德時從圍朝鮮國王李倧遁南漢山城移師攻之奮勇登山中重創從圍錦州者再屢以少勝衆擒斬其梟將勇敢為一軍冠明總督洪承疇軍松山以援錦州我軍鑿壕圍之明兵屢欲突圍出輒為所擊退從貝勒阿巴泰征明越燕京薄臨城進師山東攻青州戰俱力順治中晉爵至二等男任內大臣康熙十二年加太子少保二十年卒賜祭葬如禮孫錫札保襲棟和羅隸正黃旗䝉古天聰八年授佐領世職從征烏蘇嚕烏拉有俘獲崇德五年征明圍錦州在事有功順治元年以副都統率後隊入關四年任禮部理事官考滿加世職三等參領七年九年叠遇恩詔加世職一等輕車都尉兼一雲騎尉十六年卒賜祭葬諡勤僖立碑紀績阿蘭𨽻正白旗䝉古崇德初來歸管佐領事授佐領世職三年從征明擊敗明兵於邉境六年從攻松山有功順治二年從征流賊於延安綏德等處屢戰皆捷加世職三等參領四年卒瑪希𨽻正白旗䝉古崇德初來歸五年從征明松山屢立戰功順治三年從肅親王豪格破張獻忠平四川論功並遇恩詔加世職一等輕車都尉噶尼𨽻正白旗䝉古崇德三年從征明攻霸州先登賜號巴圖魯授佐領順治二年從征流賊有功加世職三等參領武格碩𨽻正白旗䝉古崇德三年從征明山東攻利津先登賜號巴圖魯授佐領世職順治二年從征流賊衛天命於黃羅山俘其衆六年蘭州􅉰民叛從貝子屯齊討平之十一年從征廣東破僞晉王李定國之衆於新㑹論功纍加世職一等輕車都尉加一雲騎尉蘇祿克𨽻正白旗䝉古管佐領崇德三年從征明攻南和先登順治元年從入關擊流賊有功七年九年叠遇恩詔加世職三等輕車都尉同旗有興那噶爾亦以崇德三年從征明攻博興先登賜號巴圖魯纍加世職二等輕車都尉正紅旗䝉古恩格圖科爾沁䝉古世居哈達太祖時來歸𨽻正紅旗授佐領駐防伊蘭布里瑚明兵犯海州率兵三百擊走之天聰三年入大安口下遵化越薊州而西徇三河攻順義明大同總兵滿桂赴援敗之桂奔燕京遂自通州渡河薄京城戰永定門外桂陳殁明年還軍過遵化破侍郎劉之綸軍於娘娘廟山戰皆力功最八年授三等輕車都尉世職擢兵部參政考滿晉世職二等進都統崇德元年武英郡王阿濟格入喜峯口設伏三屯營敗明兵而殱之二年大軍征朝鮮恩格圖並在軍中三年從貝勒嶽託進兵密雲距牆子嶺五里率先越髙峯下搗明總兵吳阿衡營阿衡敗死五年從鄭親王濟爾哈朗圍錦州分兵攻松山城城中兵夜襲我營督所部戰郤之六年明總督洪承疇以兵十三萬援錦州駐於松山連營抵乳峯山勢張甚大軍浚濠築壘以持久困之恩格圖更畨戍守卒擒承疇順治元年從入關敗流賊李自成二年叙功晉一等輕車都尉兼一雲騎尉復從豫親王多鐸破流賊於潼關賊夜犯正黃旗營恩格圖往禦之俘斬甚衆前後凡四戰皆捷移師征江南敗明將鄭鴻逵於瓜洲乘勝下浙江大破敵於錢塘獲舟三十五攻取嘉興府及崑山縣二城三年晉爵三等男從征福建招降府二縣十三遣將協擊僞帥吳凱攻克分水關進𠞰海賊於南靖破其衆七千皆有功四年晉二等男尋進一等五年征江西叛鎮金聲桓卒於軍子額勒濟圖幼以兄子克什圖襲十八年别授克什圖騎都尉職而以額勒濟圖襲一等男烏爾哲圖姓卓科𨽻正紅旗䝉古崇德三年從征明山東攻昌邑先登叙功授雲騎尉薩拜姓哈勒齊塔特𨽻正紅旗蒙古初任佐領崇德六年隨征明圖錦州有克敵功順治元年從入關擊流賊有功七年九年叠遇恩詔纍加世職二等輕車都尉達賴𨽻正紅旗䝉古崇德八年隨征明山東攻新城先登賜號巴圖魯授雲騎尉鑲白旗䝉古綽拜姓巴林世居葉赫太祖時來歸𨽻鑲白旗䝉古尋管佐領事天聰中征瓦爾喀部深入額赫庫楞及額埒嶽索多所俘獲崇德三年以户部理事官從睿親王多爾衮征明入青山口越燕京略山東直抵濟南先衆奮擊克其城七年圍明總督洪承疇於松山承疇遣兵乘夜越濠犯鑲黃旗營綽拜擊郤之墜濠死者甚衆順治元年從入關五年大將軍談泰討江西叛鎮金聲桓綽拜以參領從克復饒州南昌七年任倉場侍郎八年改副都統尋兼工部侍郎擢都統屢論功復遇恩詔晉爵至一等男九年十二月卒賜祭葬立碑墓道於齊墨克圖襲阿爾沙瑚姓斡三初為察哈爾林丹汗護衛天聰六年太宗征察哈爾林丹汗竄奔唐古特阿爾沙瑚率所屬四十餘户來歸𨽻鑲白旗䝉古授三等輕車都尉世職崇德中隨貝勒嶽託征明至山東攻克濟南征索倫部擒其部長博穆博果爾從圍錦州明援軍次松山突騎劫紅衣炮力戰郤之復破其步卒三營論功晉一等輕車都尉八年卒以兄子果勒沁襲果勒沁初任佐領崇德元年從上征朝鮮偕侍衛二十人敗朝鮮兵於桃山村順治元年從入關纍論功復遇恩詔晉爵至二等男厯官至鑲白旗䝉古都統時明桂王朱由榔竄緬甸僞晉王李定國僞鞏昌王白文選分據孟艮木邦假擁戴由榔為名復集潰衆出掠世祖命內大臣愛星阿為定西將軍進討而以果勒沁及都統卓洛遜塔副之乃出騰越取道南甸隴川猛卯次木邦偵知定國走景線而文選遁據錫箔江果勒沁等簡精鋭疾馳三百餘里至江濵文選已毁橋遁走茶山遣總兵官馬寧追至猛養文選窮蹙歸降大軍次舊挽坡緬人以由榔獻乃旋軍康熙三年晉爵一等男兼一雲騎尉尋列議政大臣八年改滿州都統九年二月卒賜祭葬諡襄敏子鄂爾輝襲古爾欽𨽻鑲白旗䝉古天聰六年來歸授三等參領世職崇德元年從征朝鮮敗敵於桃花村三年隨貝勒嶽託征明有功七年從圍錦州又敗洪承疇三營兵加世職為一等參領順治元年從入關擊破流賊十七年征雲南獲桂王朱由榔前後論功纍加世職一等男官都統兼議政大臣九年卒賜祭葬諡襄敏雅穆蘇姓齊勒果特𨽻鑲白旗䝉古國初來歸受為旗長天聰九年領哨卒巡沿海邊有俘獲崇德八年隨征明山東攻濱州先登賜號巴圖魯授佐領世職順治七年遇恩詔加授世職騎都尉兼一雲騎尉噶爾圖姓烏拉哈濟爾默𨽻鑲白旗䝉古崇德六年圍明錦州城中兵出犯隨超哈爾擊敗之明松山兵夜犯壕塹復擊却之順治元年從入關擊流賊以步戰立功屢遇恩詔授世職騎都尉託克託輝姓談凱𨽻鑲白旗䝉古崇德六年征明擊松山兵敗其衆掘壕圍之敵兵夜犯擊却之八年隨征明山東凱旋出邊擊敗明總兵吳阿衡兵順治元年隨破流賊於潼關追賊至西安殱其衆叙功叠遇恩詔加世職騎都尉兼一雲騎尉巴雅爾姓哈爾濟諾特𨽻鑲白旗䝉古崇德八年隨征明山東攻利津先登順治元年入關擊流賊追至慶都大敗之以功加佐領世職四年卒同旗有鄂思祜亦以從征松山等處有功授雲騎尉扎努姓烏朗哈𨽻鑲白旗䝉古崇德八年隨征明入邊屢敗明兵順治元年從入關敗流賊于慶都三年隨豫親王多鐸追騰吉思擊敗土謝圖汗兵叙功三遇恩詔加世職一等輕車都尉鑲紅旗䝉古弼喇什姓博爾濟吉特初為䝉古喀喇沁部台吉天聰二年來歸太宗征察哈爾召䝉古諸部各率其屬以從於是駐蹕綽囉郭勒弼喇什隨其汗拉斯喀布來朝遂從擊察哈爾敗之於錫爾哈錫伯圖俘獲甚衆復從貝勒嶽託征棟奎戰甚力追斬拜斯噶勒扎穆等百餘人尋率所部來歸𨽻鑲紅旗䝉古尚多羅郡主崇德元年叙功爵三等子世襲罔替順治三年從豫親王多鐸追叛人騰吉斯等於喀爾喀道卒子多爾濟襲哲伸姓烏努瑚𨽻鑲紅旗䝉古從察哈爾來歸授二等侍衛崇德元年隨征朝鮮乘船先渡朝鮮兵乘大船用長鈎來挽我船哲伸射殪其持鈎兵二人敵船奔潰我師遂渡海進擊朝鮮兵大敗之六年隨征明松山屢戰有功順治元年入關擊流賊射殪賊渠六人二年隨征湖廣流賊一隻虎有功授騎都尉額爾濟圖姓巴林𨽻鑲紅旗䝉古崇德三年隨征明山東攻海豐奮勇先登賜號巴圖魯授佐領世職順治元年入關擊流賊復有功嗣遇恩詔加世職一等輕車都尉納爾泰姓巴林𨽻鑲紅旗䝉古崇德三年從征明攻墻子嶺穴其城取之順治初屢遇恩詔加世職二等輕車都尉多羅伊姓翁果特𨽻鑲紅旗䝉古崇德六年圍明錦州連擊敗杏山松山兵順治初加世職二等輕車都尉充吉爾姓伯蘇克𨽻鑲紅旗䝉古崇德六年隨圍明錦州擊松山兵敗之八年從征寧逺城中兵出犯復敗其衆順治初授佐領世職加一雲騎尉鄂爾錦𨽻鑲紅旗䝉古崇德八年從征明山東攻濮州先登賜號巴圖魯授佐領正藍旗䝉古阿濟拜姓卓特𨽻正藍旗䝉古世居巴林初任佐領天命三年大軍取撫順明將張承廕自廣寧來援阿濟拜奮擊之承廕敗殁四年破明將杜松兵於界藩七年從攻廣寧戰沙嶺並有功天聰三年以參領從入邊略通州有斬獲進薄燕京擊明督師袁崇煥兵於廣渠門外敗之九年偕護軍統領布哈率八十人襲寧逺俘七人獲馬牛百四十有竒明將以千騎追至布哈戰殁阿濟拜力郤敵衛所俘獲以歸順治元年從入關敗流賊李自成尋偕都統伊拜𠞰賊山西連破賊於澤州擢副都統三年從肅親王豪格討流賊張獻忠過漢中與都統巴哈納擊走叛鎮賀珍遂趨秦州偕尚書星訥敗賊將高汝礪進擊獻忠於西充滅之先後叙功並遇恩詔晉世職至一等輕車都尉兼一雲騎尉九年卒賜祭葬諡忠勤立碑墓道以其弟鄂兑襲竒塔特徹爾貝姓哈爾圖特初為察哈爾部宰桑天聰六年太宗親征察哈爾其汗林丹驚遁所部皆潰散竒塔特徹爾貝别率四百户駐哈屯河尋渡河來歸𨽻正藍旗䝉古崇德元年晉三等子三年從入青山口越燕京略山東四年從征寧逺以火器攻其城敵出禦戰擊却之六年大軍圍錦州明總督洪承疇集兵赴援營松山西北竒塔特徹爾貝率所部戰大捷既而敵騎劫我巨炮馳擊之潰復破其步率三營七年叙功晉二等子順治元年從入關追敗流賊李自成於望都三年蘇尼特部騰吉思兄弟叛奔喀爾喀竒塔特徹爾貝從豫親王多鐸往追之行次英噶爾察克山聞騰吉思駐衮噶魯台遂兼程疾進獲其孥於額克特山及喀爾喀部土謝圖汗以衆二萬拒戰於扎濟布拉克竒塔特徹爾貝擊敗之逐北三十餘里未幾碩雷汗以二萬衆至復擊敗之四年叙功晉一等子九年豫世襲十二年如喀爾喀部宣諭土謝圖汗車臣汗等皆輸誠欵服受其盟辭而還康熙三年卒賜祭葬子鄂諾勒襲布爾哈圖姓博爾濟吉特䝉古喀喇沁人初為其部貝勒天聰三年六月遣使納貢九月來朝十月太宗親統大軍征明使布爾哈圖為嚮𨗳以其前在喀喇沁時曽往來明國習知關隘也入邊攻克龍井關紅山口大安口諸城徇羅文峪下之留布爾哈圖駐其地四年明副將丁啓明率兵三千來犯勒兵邀擊之再戰陳擒啓明及遊擊以下官三員斬獲無算賜號岱達爾漢五年詔以貝勒阿巴泰女妻之征察哈爾率所部從尋挈人户來歸𨽻正藍旗䝉古崇德元年叙功授一等子爵世襲罔替順治元年卒子班珠勒襲後遇恩詔晉爵至一等伯畢力克圖姓博爾濟吉特世居科爾沁太宗時來歸𨽻正藍旗䝉古從征朝鮮及明錦州屢有斬獲順治元年從豫親王多鐸追𠞰李自成於潼關明年定西安移師拔揚州下江寧所至有功授騎都尉世職纍官副都統六年明大學士李建泰據太平我大同總兵姜瓖叛應之乃駐防平陽敗賊黨郭中傑於絳州又敗賊於張湖村七年進圍太平逾六旬不下潜匿卒濠中穴地道以火藥轟其城城毁遂擒李建泰及賊黨俱伏誅瓖勢乃孤八年還京兼任禮部左侍郎屢加世職至一等輕車都尉十一年從靖南將軍珠瑪喇征廣東破僞晉王李定國兵於新㑹乘勝追至興業僞都督吳三省僞總兵楊成王三才以步卒千餘拒戰斬殺過半進抵橫州定國渡江逺竄凱旋叙功晉三等男十三年司𣙜員外郎朱世德虧帑誤援恩詔議免坐革侍郎任降世職二等十七年署護軍統由榔竄緬甸李定國與其黨白文選等分踞孟艮木邦十八年我師㑹於木邦定國走景線文選遁據錫箔江濱我師至毁橋遁畢力克圖至江岸獲其諜者遂結筏渡江次舊挽坡距緬城六十里而軍分兵進駐蘭鳩江緬人以由榔獻我總兵官馬寧追及白文選於猛養文選降乃旋師康熙元年叙功晉世職為一等輕車都尉兼一雲騎尉八年擢都統列議政大臣十二年加太子少師十四年平涼總兵王輔臣叛附逆藩吳三桂肆掠陜西郡邑乃授平逆將軍帥師駐大同尋延安綏德皆陷賊遂移駐榆林勒軍為三隊疾擊賊於楊家店渡口復吳堡進師虎爾崖口擊走僞總兵朱龍等綏德平賊將李士英棄延安遁遣副都統覺和託追擊至宜川俘斬無算分兵徇保安安塞宜川延長安定諸縣皆復之移師㑹揚威將軍阿密達征平涼將至輔臣驅賊萬餘迎戰畢力克圖督兵合擊陳斬僞總兵郝天祥復命撫逺大將軍圖海至師輔臣降畢里克圖移駐寶雞勦撫餘賊招降參將李天秀等三十一員復靈臺華亭崇信諸縣屢破賊於蟠龍山顯義關尋復成縣招降僞副將王光生等十九員與將軍王進寶定漢中凱旋仍任都統二十年卒年七十有三賜祭葬諡恪僖孫常逺襲二十五年追叙平陜西功晉二等男世襲䝉格圖𨽻正藍旗䝉古初任佐領崇德三年隨貝勒嶽託征明敗明兵於河西務七年明經略洪承疇率三營兵來援復隨大軍破之論功得優叙順治元年入關擊流寇復有功加授佐領世職官副都統卒巴布海姓巴魯特𨽻正藍旗䝉古崇德三年隨征明至真定攻饒陽先登賜號巴圖魯授佐領世職七年復隨征山東敗明總兵吳三桂軍順治二年南征至江南敗僞總兵黃蜚等軍三年隨征四川敗流賊張獻忠論功纍加世職一等輕車都尉鄂梅𨽻正藍旗䝉古崇德三年從征明山東攻齊河以第一人登順治初從擊流冦復有功加佐領世職桃梅𨽻正藍旗䝉古崇德三年隨征明山東敗明太監馮起潛軍六年我師圍錦州敗敵兵於松山順治初纍加至三等輕車都尉恩格森姓枕阿塔𨽻正藍旗䝉古崇德五年隨征明擊松山兵敗之六年我師圍錦州同擊敗明經略洪承疇三營步兵順治初以平寇功纍加世職騎都尉兼一雲騎尉納爾德姓卓特𨽻正藍旗䝉古崇德六年隨圍錦州率所屬甲士敗敵於山嘴又敗其馬步軍八年隨征明敗明兵於安肅三河等處順治二年追破流寇於潼關我師渡關為殿賊騎兵犯我者三皆擊敗之六年南征杭州有克捷叙功屢遇恩詔加世職騎都尉瑚班姓齊默斯𨽻正藍旗䝉古崇德八年隨征明山東攻恩縣先登順治初遇恩詔加世職三等輕車都尉同旗有喜福亦以征明先登克南和得優叙鑲藍旗䝉古幹都先世自葉赫遷巴林因以巴林為氏太祖時來歸授佐領𨽻鑲藍旗䝉古天聰元年從征寧逺擊敗明兵於城北山罔三年從攻大安口復擊敗明兵於玉田明年大軍自遵化出邊幹都為殿纍加世職為二等輕車都尉崇德中任兵部理事官從貝勒嶽託征明擊敗明總兵祖大夀太監髙起潜軍進趨山東攻克濟南城師還取道蠡縣復克其城從征瑚爾哈部擊索倫兵於掛拉爾屯馘二百三十人以歸大軍圍錦州明總督洪承疇援駐松山屢以步騎來犯幹都皆擊敗之恭順王孔有德長史徐勝芳陷於陳幹都突騎援之出順治元年從入關隨豫親王多鐸克潼關取西安二年移師下江南取宜興崑山二縣三年從端重親王博洛平浙江追𠞰明總兵方國安於黃巖環城以困之偵賊勢既蹙撤圍一面縱其出擊之賊皆潰城遂拔大軍進征福建幹都先衆攻克分水關追𠞰明唐王朱聿鍵於汀州招降漳州府及漳平縣五年征南大將軍談泰討叛鎮金聲桓於江西幹都為前鋒尋以疾卒於軍幹都前後論功遇恩詔晉爵二等男子武山布襲圖瞻𨽻鑲藍旗䝉古自巴嶽特率族來歸太祖以貝勒女妻之崇德七年圍錦州明松山兵來犯擊敗之又敗明經略洪承疇兵及松山後崖兵順治元年隨入關擊流賊冇功纍加世職騎都尉兼一雲騎尉托克托爾姓台綽𨽻鑲藍旗䝉古國初來歸時方以䝉古分𨽻八旗每旗設佐領五因即令管一佐領事天命十一年貝勒代善攻囊努克以托克托爾為嚮道取之論功授備禦世職順治初論平流寇功七年復遇恩詔加世職騎都尉兼一雲騎尉綽通姓傳蘇特𨽻鑲藍旗䝉古初從征庫特塔布囊有斬獲天聰二年從征大凌河六年從征察哈爾皆屢立戰功授佐領世職十二年卒叟什姓瑚拉巴思𨽻鑲藍旗䝉古崇德時從征明攻清豐先登克之賜號巴圖魯授佐領世職䝉格姓烏朗哈濟拉默𨽻鑲藍旗䝉古太宗時同兄額色宜自巴林率族來歸從征額赫庫倫等處多俘獲崇德三年復以從征明有功加佐領世職桑格姓巴林𨽻鑲藍旗䝉古從父康喀自䝉古來歸崇德五年從圍錦州積功加世職三等參領烏巴哩善進姓噶必齊克𨽻鑲藍旗䝉古崇德時從征明張家口有功加世職三等參領同旗有鐸魯伊姓翁果特崇德八年征征錦州以軍功得優叙順治初遇恩詔加世職二等輕車都尉色塞姓阿勒特𨽻鑲藍旗䝉古崇德五年隨圍錦州擊松山杏山兵敗之七年我師復圍錦州有敵兵來犯射殪其前鋒順治初授世職騎都尉兼一雲騎尉充錦爾姓博蘇特崇德時以從征錦州等處有功授佐領順治十年復以從征廣東湖廣積功加世職三等子欽定盛京通志卷七十六
