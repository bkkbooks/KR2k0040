body:
  text: 古蹟三吉林境内郡縣古蹟黒龍江境内郡縣古蹟欽定四庫全書欽定盛京通志卷一百二古蹟三吉林境内郡縣古蹟吉林顯徳府在吉林城東南新唐書渤海傳上京南為中京曰顯徳府領盧顯鐵湯榮興六州地理志自鴨緑江口舟行百餘里乃小舫泝流二百里至神州又陸行四百里至顯州天寳中王所都州按顯州即顯徳府唐先天二年賜名呼爾罕是也遼史謂即平壤城又以遼所置東京之顯州為本顯徳府地皆誤長嶺府在吉林城西南新唐書長嶺營州道又渤海長嶺府領瑕河二州遼史地理志東京長嶺府遼史本紀太祖天顯元年遣康黙記韓延徽攻長嶺府八月下長嶺府按長嶺府遼志不詳沿革或仍渤海之舊長嶺亦作長嶺古字相通今吉林西南五百里有長嶺子國語謂之果勒敏珠敦南接納嚕窩集北接庫勒納窩集自長白山南一嶺環繞至此為衆水分流之北北流為雅吉善輝發等河入混同江西北流為英莪哈達葉赫克爾素等河長嶺府之名當取諸此錦州復州雖亦有長嶺皆不如此之最著則渤海長嶺府地為吉林長嶺子無疑以上果勒敏珠敦各語解俱見疆域形勝山川等卷雞林州舊唐書龍朔三年詔以其國為雞林州都督府授其黄金法敏為都督新唐書王居京城環八里龍朔元年以其國為雞林州大都督府咸亨五年王金法敏略百濟地守之上元二年劉仁軌破其衆于七重城以靺鞨兵浮海略南境又詔李謹行屯買肖城按唐書雞林御製吉乃吉林語音之譌詳見林覽古詩注寧江州在吉林城北混同江東岸遼史地理志寧江州混同軍清寧中置統縣一混同縣金廢金史本紀太祖進軍寧江州十月朔克其城次來流城來流即今拉林河大金國志太祖十三年起兵攻混同之東寧江州遼髙仙燾敗失寧江州遼再遣蕭嗣先屯珠赫店臨白江與寧江州女真兵對壘女真潜渡混同江掩擊之嗣先兵潰松漠紀聞寧江州去冷山百七十里地苦寒毎春冰泮遼主必至其地為樂金祖起兵首破此州按遼金二史金太祖起兵先攻寧江州遼守將蕭烏納戰敗棄城渡混同江而西是州在江以東矣髙士奇扈從録云大烏拉去船厰八十餘里即遼之寧江州也解珠赫國語解見選舉卷原作出河烏納國語見黒龍江山川卷原作元納今俱譯改河州在吉林境遼史地理志河州徳化軍置軍器坊按明人地志云廢河州在黄龍府北遼置河州有軍器坊又引一統志開元東北五百里有温登河源出坊州北山北流入松花江所謂坊州疑即河州矣考遼金無坊州第因河州有軍器坊而遂以坊州屬之亦恐未足為慿也又接黄龍為開原地則河州在吉林境内無疑特舊址今無考涑州在吉林境其地與建州相近新唐書郢銅涑三州為獨奏州獨奏猶言直𨽻州不轄於府事得専達也通考涑州以其地近涑沫江得名葢所謂粟末水也遼史地理志東京涑州渤海置廢率賔路在城東南新唐書率賔故地為率賔府領華益建三州遼史地理志東京率賔府刺史故率賔國地金史地理志上京率賔路遼時為率賔府本率賔故地太宗天㑹二年以扎蘭路都貝勒所居地瘠遂遷於此海陵罷萬户置節度因名率賔路節度使世宗大定十一年以扎蘭率賔相去千里既居率賔不可忘本遂命親管明安名曰扎蘭明安承安三年設節度副使西北至上京一千五百七十里東北至瑚爾哈一千一百里西南至海蘭路一千二百里北至邊界二千里元廢金史本紀昭祖耀武至于率賔扎蘭之地所至克㨗又金史穆宗時圖們渾春水之交烏庫哩部埒克卓多與率賔水烏庫哩達薩塔起兵于穆嚕密斯罕城太祖往攻破之撫寧諸路如舊因致穆宗教圖們渾春葉赫錫馨四路及嶺東諸部自今勿復稱部長又金史康宗使碩碩歡撫定邊民率賔民不聴命使威㤗等至和羅噶川召諸官僚告諭之率賔水居沃赫貝勒不至烏塔伐沃赫克之又金史太宗天㑹二年二月命徙扎蘭路都貝勒完顔忠于率賔水物率賔原作恤品又作速頻扎蘭國語解見人卷三原作耶懶又作押懶貝勒國語解見人物卷三原作孛堇明安國語解見錦州府山川卷原作猛安渾春國語解見建置沿革卷原作渾蠢烏庫哩八旗姓原作烏古論國語埒克解見吉林山川卷原作留可國語卓多織也原作詐都達薩塔修理也原作敵庫徳穆嚕國語解見吉林山川卷密斯罕墨線也原作米里迷石罕鍚馨國語解人物卷四原作星顯碩歡國語解見人物卷四原作石適歡威㤗䝉古語解見人物卷三原作幹帶和羅噶蒙古語解見建置沿革卷原作活羅海沃赫䝉古語解見奉天府山川卷原作幹豁烏塔蒙古語解見名宦卷四原作烏塔今俱譯改廢海蘭路在城東南金置金史地理志置總管府貞元二年改總管為尹西北置上京一千八百東南至髙麗界五百里元史地理志海蘭府碩達勒達等路土地曠濶人民散居元初設軍民萬戸府五撫鎮北邊一曰桃屯距上都四千里一曰瑚爾哈距上都四千二百里大都三千八百里有瑚爾哈江并混同江又有海蘭河流入于海一曰鄂多里一曰托郭琳一曰布呼江各有司承分領混同江南北之地其居民皆碩達碩勒女真之人各仍舊俗無市井城郭以射獵為業設官牧民隨俗而治元一統志自南京而南曰海蘭府又南曰雙城直抵于髙麗之王京阻按金史本紀景祖時海蘭烏凌阿部鍚馨距不服攻之又云景祖為人寛恕海蘭水有率衆䧏者録其嵗月姓名即遣去俾復其故又云自景以來兩世四主志業相因卒定離析一切治以本部法令東南至於伊勒呼海蘭扎蘭托卜古倫東北至于五國矩威圖塔金葢盛於此又云穆宗末年阿蘇使徳濟誘謆邊民海蘭甸人執之康宗遣使撫納四年髙麗築九城于海甸以兵數萬來攻烏色敗之幹魯亦築九城與髙麗九城相對髙麗復來攻幹烏色復敗之髙麗約以還逋逃之人退九城之軍復所請故地乃罷兵又太祖收國三年海蘭甸長城髙麗増築三尺詔慎固營壘又太宗天㑹二年海蘭路軍帥完顔呼嚕古等言往者嵗捕海狗海東青鴉鶻于髙麗之境近以二舟往彼乃以戰艦十四要而擊之盡殺二舟之人上曰以小故起戰争甚非所宜今後非奉命毋輒往據此是海蘭路與髙麗相接又按吉林寧古塔境内國初猶有海蘭路之名今考海蘭河不一其與髙麗相近有安巴海蘭畢喇阿濟格海蘭畢喇在寧古塔南四百十里合流入布爾哈圖河以達噶哈哩河又寧古塔城西北二百里有海蘭窩集綿亘數百里别有海蘭河出焉東流入瑚爾哈河則元時海蘭府碩達勒達路明時海蘭衛所在與金時海蘭路之南近髙麗者似非一處然今寧古塔城南至圖們江朝鮮界六百里而南北皆有是河則是海蘭窩集延袤至廣大小海蘭河其皆金時海蘭路一帶舊壤也碩達勒達國語解見建置沿革卷原作水達達桃屯䝉古語解見建置沿革卷原作桃温瑚爾哈䝉古語解見吉林山川卷原作胡里改鄂多哩原作幹朶憐托郭林䝉占語解見建置沿革卷原作脱幹憐國語布呼鹿也原作孛苦烏凌阿八旗姓原作烏林阿國語伊勒呼一順也原作乙離骨托卜正也古倫國語解見人物卷三原作土骨論唐古特語矩威遊行也原作主隈國語圖塔存留也原作秃答阿蘇國語解見黒龍江山川卷原作阿疎國語徳濟上分也原作達紀烏色解見人物卷原作幹賽蒙古語呼嚕古手指也原作忽剌古今俱譯改歸仁廢縣舊志在開原縣東北吉林界遼史地理志通州安逺軍本扶餘國王城渤海號扶餘太祖改龍州聖祖改今名統安逺通逺歸仁漁谷四縣金州廢縣併入歸仁屬咸平府元初廢遼東行部誌歸仁縣遼時為安州元一統志歸仁故城在咸平府北舊安州金皇統三年改為縣後廢故址猶存全遼志開原北陸路第三站曰歸仁站即故縣也又玉山廢縣亦在開原東吉林烏拉界金承安三年以穆遜珠巴郭勒之間相去六百里之地置縣屬咸平府貞祐二年升為州金末廢語按遼志有兩歸仁縣一𨽻遼陽穆遜䝉古解見黒龍江山川卷䝉古語珠巴盤道也郭勒河也原作瑪速集平郭勒今譯改烏爾古徳哷勒部金史地理志烏爾古徳哷勒統軍司後升為招討司與夫餘路近古按烏爾古徳哷勒為遼國外十部之二烏爾一部徳哷勒八部不能成國附庸于遼時叛時服各有職貢猶羈縻州也見于遼營衛志部族表史言與夫餘路近當俱在今吉林境北索烏爾古蒙古語徳哷勒倫語解俱見人物卷二寧古塔渤海上京在寧古塔城西南新唐書渤海本粟末靺鞨附髙麗者姓大氏髙麗滅率衆保挹婁之東牟山萬嵗通天中契丹盡忠反有舍利齊齊克仲象者度遼水保大白山之東北阻鄂掄河自固武后封為鎮國公其子祚榮建國自號震國王地方五千里盡得扶餘沃沮弁韓朝鮮海北諸國先天中為渤海郡王以所統為呼爾罕州自是始去靺鞨號専稱渤海子武義直大圖宇私改年號天寳末徙上京直舊國三百里呼爾罕河之東建五京十五府六十二州此為肅慎故地曰上京龍泉府賈耽曰自安東都䕶府東北經古葢牟新城又經渤海王城城臨呼爾罕河其西南三十里有古肅慎城其北經徳里鎮至南黒水靺鞨千里又曰自神州陸行四百里至顯州又正北如東陸百里至渤海王城按舊志謂渤海上京在烏拉境内今以唐書考之當在寧古塔西南境與金上京相近明一統志云金滅遼設都於渤海上京是也齊齊克仲象原作乞乞仲象䝉古語鄂掄缺也原作奥婁武義直大圖宇原作武藝斥大土宇今俱譯改㑹寧府在寧古塔城西南金史地理志上京路即海古勒之地今之舊土也國初稱為内地天眷元年號上京海陵貞元二年遷都于燕削㑹上京之號止稱會寧府大定十三年復為上京寧府府一領節鎮四防禦一縣六鎮一舊有㑹平州天㑹二年築契丹之珠敦域也後廢又金史㑹寧府初為㑹寧州太宗以建都升為府天眷元年置上京留守帶本府尹兼本路兵馬都總管後置上京海蘭等路提刑司戸三萬一千二百七十東至瑚爾哈六百三十里西至肇州五百五十里北至夫餘路七百里東南至率賔路一千六百里南至海蘭路一千八百里縣三松漠紀聞自上京至燕二千七百五十里三十里至㑹寧頭舖四十里至第二舖三十五里至阿薩爾舖四十里至拉林河四十里至巴達貝勒舖七十里至賔州渡混同江北盟㑹編出榆関以東第三十八程至拉林河終日之内山無寸木地不産泉又五里至矩古貝勒寨盡女真人第三十九程至舘去上京尚十里許亢宗奉使行程録過混同江四十里宿呼勒希寨三十六程自呼勒希寨東行五里契丹南女真舊界也八十里至拉林河行終日無寸木地不産泉人擕水以行渡河五里至矩古貝勒寨第三十七程自矩古貝勒寨七十里至達河寨第三十八程自布達寨行二十里至烏舍郎君宅又三十里至舘此去北庭尚十里高士奇扈從録沙林東南十五里曰火茸城金之上京㑹寧府也廣四十餘里中間禁城可里餘三殿基址皆在碎碧瓦棊布其上禁城外有大石佛髙可三丈許蓮花承之前有石塔向東小欹出大城而西則芰荷彌渚逶迤綿𣺌莫窮其際渚間有亭榭遺跡自沙林而東八十里為寧古塔按金史原文云國言金曰按出虎以按出虎水源於此故曰金源建國之號葢取諸此考國語金曰愛新金史舊解以金為按春國語耳墜也耳墜以金為之因誤為金并按出虎亦誤為金吉林境内無愛新水亦無按春水考之當為阿勒楚喀河葢據松漠紀聞北盟㑹編及大金國志諸書金上京行程過拉林河一程即至上京驛東去阿勒楚喀不過百餘里阿勒楚喀河源在吉林城北拉林河源在吉林城東北而金上京宫闕在混同江二百六十里去拉林河一百七十五里核之則即阿勒楚喀之明證也且金太祖實録云契丹以鑌鐵為國號鑌鐵雖堅終有銷壌惟金一色最為珍寳自金本國可號大金亦並未云有金水源也又按舊志云寧古塔西南六十里瑚爾哈河之南有古大城周三十里四面七門内城周五里東西南各一門内有宫殿舊址即㑹寧府之遺跡也今按之松漠紀聞北盟㑹編奉使行程録所載里數俱同可見金上京之地總在今寧古塔之西混同江之東其去混同江二百六十里以今道里按之當在塞齊窩集左右塞齊窩集嶺上有故城址相傳為金時闗門葢自船厰東十里過混同江至尼什哈站三十里至交密峰四十里至額赫穆站十里至納穆窩集三十里至山神廟五十里至拉廢站七十里至推屯站三里至塞齊窩集又東三百九十里至寧古塔塞齊窩集在吉林城外混同江東二百四十餘里而拉林河源之拉林山在城東北二百四十五里阿勒楚喀河源之扎松本阿山在城東北三百里俱屬相近蘇以繩量道朝康熙十六年寧古塔將軍薩布里量度為丈百八十丈為里自寧古塔西闗門量至吉林東關門凡九萬八千丈為五百五十里後分八站作六百三十里雖古今里數未必盡同然正約畧可見耳又按瑚爾哈路為寧古塔地今自吉林至寧古塔城凡程站里數亦約畧相同正無可疑也䝉古語海古勒行軍殿後也原作海古珠敦䝉古語解見吉林山川卷原作周特䝉古語阿薩爾閣也原作阿薩國語巴達張大也原作報打矩古唐古特語矩十數也古身也原作句孤布達國語解見吉林山川卷原作簿撻烏舍國語解見流寓卷原作兀室今俱譯改廢瑚爾哈路在寧古塔城東渤海上京地金史地理志瑚爾哈路初置萬户海陵改置節度使承安三年置節度副使西至上京六百三十里北至邊界哈喇巴圖千户一千五百里又金太宗天㑹六年徙昏徳公重昏侯于韓州八年徙瑚爾哈路元史地理志瑚爾哈距上都四千二百里大都三千八百里有瑚爾哈江并混同江又有海蘭河流入于海瑚爾哈國語解見吉林山川卷原作胡里改哈喇䝉古語解見黒龍江山川卷二巴圖䝉古語解見疆域形勝卷原作合里賔忒今俱譯改曲江故縣舊志在故㑹寧城東北金史地理志大定七年置鎮東縣屬㑹寧府十三年改曰曲江又有宜春縣亦大定七年置屬㑹寧府元初與府俱廢按曲江初名鎮東以在㑹寧之東也以其當水曲之地故名曲江今寧古塔城正當瑚爾哈河灣曲處疑即是曲江縣也白都訥肇州在白都訥城南金史地理志肇州防禦使舊名珠赫店天㑹八年以太祖兵勝遼肇基王迹于此遂建為州天眷元年置防禦使𨽻㑹寧府海陵時嘗為濟州支郡承安三年復以太祖神武龍興之地升為節鎮軍名武興五年置漕運司以提舉兼州事後廢軍貞祐二年復陞為為武興軍節鎮置招討司以使兼州事戸五千三百七十五縣一始興與州同時置有鴨子河黒龍江金史本紀遼都統蕭嘉哩副都統托卜嘉將歩騎十萬㑹于鴨子河北太祖自將擊之黎明及河遼兵方壞陵道選壯士十輩擊之大軍繼進遂登岸與敵遇于珠赫店㑹大風起塵埃蔽日乘風擊之遼兵潰逐至沃楞濼殺獲不可勝計遼人嘗言女真兵若滿萬則不可敵至是始滿萬云元一統志上京之北曰肇州治始興縣金皇統三年置按元志建置年號與金史異史言黒龍江在州境與所言上京之北正合又金史帝紀即稱混同一名黒龍江故史志多誤混為一又按元時亦有肇州元志附于廣寧路下注云按哈喇巴圖魯傳至元三十年世祖謂哈喇巴圗魯曰納延故地曰巴拉呼者産魚吾今立城而以伊斯蘇琿哈喇納蘇竒爾濟蘇三部人居之名其城曰肇州汝往為宣慰使既至定市里安民居得魚九尾皆千斤來獻又成宗紀元貞元年立肇州屯田萬戸府以遼陽行省左丞阿薩爾領其事而元一統志與經世大典皆不載此州不知其所屬所領之詳舊志以廣寧為納延分地附注于廣寧之下葢以元之肇州明初已不知所在今考博多歡傳太祖分封東諸侯以二十為率納延得其九五則其地自大不但廣寧而已又伊實特穆爾傳云納延之遺孽哈丹托壘復叛伊實特穆爾過黒龍江搗其巢穴可知黒龍江左右實納延故地疑元之肇州即仍金舊且近混同黒龍二江故産大魚耳今白都納城東南阿勒楚喀河西岸古岸周二十里内子城周四里南距吉林城三百四十里東去㑹寧城六百里與金史道里相合疑即肇州遺址又按北盟㑹編遼天慶四年金太祖㑹集諸部全装軍二千餘騎首破混同江之寧江州大敗渤海之衆獲甲馬三千又敗蕭嗣先于珠赫店及拉林河黄龍府咸州好草峪四路都統誅斬不可勝計據此則肇州在拉林河之東吉林之北益明矣解珠赫國語解見選舉卷原作出河嘉哩國語見黒龍江山川卷原作乣里托卜嘉國語解見人物卷二原作撻不野國語沃楞波紋也原作幹論䝉古語哈喇黒色也國語巴圖魯勇也原作哈喇八都魯納延䝉古語解見黒龍江城池卷原作乃顔蒙古語阿巴喇呼畋獵也原作阿八剌忽烏蘇哈喇䝉古語解見黒龍江山川卷哈納斯蒙古語從何處之謂奇爾斑㸃也濟蘇顔色也原作兀速憨哈納思乞里吉思額森䝉古語解見名宦卷三原作阿散國語博多歡謀畧也原作博都歡伊實唐古特語解見人物卷二特穆爾䝉古語解見名宦卷三原作玉昔帖木兒哈丹托壘蒙古語哈丹山峰也托壘小猪也原作哈丹秃魯干今俱譯改長春州其舊址應在今白都訥地及杜爾伯特扎賴特階州之北境遼史地理志長春州韶陽軍木鴨子河春獵之地興宗重熙八年置統縣一長春縣本混同江地户二千金史地理志泰州昌徳軍本契丹二十部族牧地大定二十五年罷承安二年復置于長春縣北至邊四百里南至懿州八百里東至肇州三百五十里户三千五百四縣一曰長春即遼長春州天徳二年降為縣𨽻肇州承安三年來屬大金國志太祖十四年遼天祚帝率蕃漢兵十餘萬出長春路分五部北出駱駝口太祖乗其未陣三靣擊之天祚大敗退保長春太祖乗勝遂平渤海遼陽等四十四州三姓五國部在寧古塔城東北亦曰五國頭城遼史營衛部族志五國部博和哩國博諾國鄂羅穆國伊埒圖國伊勒希國聖宗時來附命居本土以鎮東北境屬黄龍府都部署司重熙六年設節度使以領之契丹國志女真東北與五國為鄰五國之東接大海出名鷹自東海來者謂之海東青遼人酷愛嵗嵗求之女真至五國戰鬬而後得不勝其擾大金國志宋二帝自韓州徙五國城五國城者在西樓東北千里北盟㑹編五國之東接大海出海東青女真毎發甲馬千餘人入五國境接東海巢穴取之與五國戰鬬而後得金史本紀景祖時五國之諾部節度使叛遼鷹路不通景祖襲擒之又遼咸雍八年五國穆延部舍音貝勒叛遼鷹路不通景祖伐之舍音敗走元一統志開元路三京故國五國舊城東北一都㑹也又云混同江發源在長白山北流經渤海建州西五十里㑹諸水東北流上京下達五國頭城北又東北注于海明一統志五國頭城在萬里衛北一千里自此而東分為五國舊傳宋徽宗𦵏于此髙士竒扈從録自寧古塔東行六百曰章圖哩噶善松花黒龍二江合流于此有大土城或云五國城按五國城之説不一或謂寧古塔東松花黒龍二江合江之處有土城焉或以為在朝鮮北境近寧古塔有故城在山上或以為去燕京三千八百里西至黄龍府二千一百里或謂寧古塔相近搶頭街有舊城址五疑即是也據金太宗本紀云天㑹六年徙昏徳公重昏侯于韓州八年再徙瑚爾哈路則實在寧古塔地宋史稱韓州五國城誤合為一地第諸書皆約略之辭未有實據今三姓地方有五國城遺址國博和哩國語解見吉林山川卷原作剖阿里語博諾也原作盆奴里亦作蒲聶䝉古語鄂羅穆渡口也原作奥里米伊埒圖䝉古語解見名宦卷三原作越里篤伊勒希國語解見人物卷二原作越里吉穆延八旗姓原作文撚舍音國語解見人物卷三原作謝野章圖噶善原作𦍑突里噶尚今俱譯改阿勒楚喀賓州在阿勒楚喀境本渤海城遼史地理志賔州懐化軍節度本渤海城統和十七年遷烏舍户置刺史于鴨子混同二水之間後升兵事𨽻黄龍府都部署司金史本紀太祖十三年命布呼等攻拔賔州烏舍楚古爾蘇來䧏遼將徹格爾戰于賔州布呼敗之鐵驪王以所部降松漠紀間翁舎展國最小不知其始所居後為契丹徙置黄龍府南百餘里曰賓州州近混同江即古之粟末河部落雜處以其族之長為千户統之又契丹自賓州混同江北八十里建寨守禦女真契丹國志宋政和五年金太祖攻遼破賓州元一統志上京故縣古肅慎氏地渤海大氏改為上京金既滅遼即上京建邦設都後改㑹寜府京之南曰建州京之西曰賓州又西曰黄龍府又廢祥州在賓州西南遼祥州瑞聖軍統懐徳縣屬黄龍府遼史地理志祥州瑞聖軍節度興宗以鐵驪户置兵事𨽻黄龍府都部署司統縣一懐徳縣金史太祖十三年烏達布復敗徹格爾蕭伊蘇于祥州東斡琿等兩路降又廢威州在賓州南遼置亦曰武寜軍屬黄龍府契丹國志宋政和五年金太祖攻遼取祥威二州進薄益州按鴨緑江一名益州江則益州實與鴨緑江近當在長白山西南但遼史不言仍渤海之舊今故址無考布呼解見本卷前原作僕虺烏舎國語解見流寓卷三原作兀室䝉古語楚古爾蘇杉木也原作雛骨室徹格爾䝉古語解見忠節卷原作赤狗兒翁舎展八旗姓原作嗢熱者國語烏達布令買也原作吾都布伊蘇蒙古語解見人物卷二原作乙薛幹琿國語臭也原作斡勿今俱譯改完顔部在阿勒楚喀境詳會寜府按出虎注金史本紀金之先居肅慎地有混同江長白山混同江亦號黒龍江所稱白山黒水是也始祖居完顔部布爾噶水之涯弟博和哩居扎蘭至獻祖徙居海古勒水始有楝宇之制遂定居于阿勒楚喀之境昭祖耀武至于青嶺白山順者撫之不從者討之景祖稍役屬諸部自白山葉赫圖們扎蘭托卜古倫之屬以至五國之長皆聴命是時遼之邊民有逃而歸者鐵驪烏舍之民亦逃而未歸前後願附者衆鄂敏水冨察部特克伸特布水完顔部圖們水温特赫部舍音水完顔部皆相繼來附又金史太祖進軍次遼晦城諸路兵皆㑹于拉林水遇遼軍敗之進軍寧江州諸軍填塹攻城十月朔克其城鐵驪部來送款次拉林城以俘獲賜將士拜格酋長和索哩以降城蒙古語布爾噶叢栁也原作㒒斡葉赫部名原作耶悔國語鄂敏飲也原作幹冺冨察八旂姓原作蒲察特克伸特補國語特克伸齊也特布令其望也原作泰神忒保温特赫八旂姓原作温迪痕舍音國語解見人物卷三原作神𨼆拜格原作鼈古國語和索哩脬皮也原作胡蘇今俱譯改琿春東海窩集部在琿春城東南凡沿海林木叢茂處皆為窩集明時有瑚葉綏芬雅蘭西林赫錫赫鄂摩和索囉佛訥赫那木都嚕烏勒固宸穆稜扎庫塔東額赫庫諸部我太祖於丁未嵗至甲寅嵗俱克取其部撫降之詳見城池卷黒龍江境内郡縣古蹟齊齊哈爾故夫餘路在齊齊哈爾城東南原作蒲與今譯改金史地理志夫餘路國初置萬户海陵例罷萬户改置節度使承安三年設節度副使南至上京六百七十里東南至瑚爾哈路一千四百里北至北邊界和爾和屯穆昆三十里又金史金之壤地封疆東極濟喇敏烏達哈諸野人之境北自夫餘路之北三千餘里和爾和屯穆昆地為邊元史夫餘路屯田萬戸府世祖至元二十九年十月以蠻軍三百戸女真一百九十户於咸平府屯種三十年命本府萬户呼嚕古岱領其事乃于楚勒罕拉林等處立屯仁宗大徳二年撥蠻軍三百戸屬肇州蒙古萬户府止存女真一百九十户依舊立屯為田四百頃國語和爾和櫃也原作火魯火濟喇敏厚也原作吉里迷䝉古語烏達噶次數也原作兀的呼嚕古䝉古語解見本卷前岱有也原作和魯古解國語楚勒罕㑹盟也原作荼剌罕今俱譯改黑龍江故黒水府在黒龍江境内新唐書黒水靺鞨傳開元十年其部長來潮拜渤利州刺史於是置黒水府以部長為都督領黒水經畧使其地南距渤海東北皆際海西抵室韋南北袤二千里東西千里地里志黒水州都督府開元十四年置唐㑹要武徳三年部長突地稽遣使朝貢以其部置然燕州以其長帥為都督總管真觀十四年以黒水地為黒水州開元十三年於黒水部落内置黒水軍續又以最大部落為黒水府仍以其領都督諸部刺史𨽻屬馬冊府元龜黒水帥突地稽隋末率部落千餘家内屬處之管州唐武徳初以其部落置燕州以突地稽為總管通考開元十年拜黒水部長帥為渤利州刺史於是安東都䕶請置黒水府以部長為都督刺史領黒水經畧使故開元路在黒龍江境内元史地理志古肅慎之地隋唐曰黒水靺鞨唐初渠長阿固郎始來朝後乃臣服以其地為燕州置黒水府其後渤海盛靺鞨皆役屬之人其後渤海浸弱為契丹所攻黒水復擅其地東瀕海南界髙麗西遼北與契丹接即金始祖之部落也金太祖既滅即上京設都元初乙未嵗立南京萬户府治黄龍府至元四年更遼東路總管府二十三年改為開元路領咸平府復割咸平為散府俱𨽻遼東道宣慰司中統三年割遼河以東𨽻開元路四年罷開元宣慰司元一統志南鎮長白之山北浸鯨州之海三京故國五國舊城亦東北一都㑹也開元勁健善戰習射獵有狗車木馬輕㨗之便木馬形如彈弓馬四尺濶五寸一左一右繫於兩足激而行之雪中冰上可及奔馬狗車以木為之其制輕簡形如船長一尺濶二尺以數狗拽之二者皆于氷上雪中行之北按開元之地元時所轄甚廣吉林寧古塔以皆在其中但元史志云即唐黒水府元一統志亦云三京故國五國舊城則開元路之為黒龍江地面毫無疑義不得以其後徙治開元且因明有開原衛之設遂拘泥以為開兀一縣之地始為開原路也又按木馬國語謂之遜塔哈狗車國語謂之舍爾赫漢語謂之爬犁今吉林黒龍江境内皆有之呼倫布雨爾臨潢府遼史地理志上京臨潢府本漢遼東郡西安平之地天顯十三年更名上京府曰臨潢轄軍府州城二十五統縣十上京太祖創業之地負山抱海天險足以為固地沃宜耕植水草便畜牧金齪一箭二百年之基壮矣金史地理志臨潢總管府地名西樓遼為上京國初因之天春元年改為北京天徳二年改北京為臨路潢府路貞元元年以大定府為北京置臨潢大定後罷路併入大定府路淀按遼志上京道有大神淀興國恵明湖及涼為今呼倫布爾爾池庫楞湖淶流三面繞京為今烏爾繖河東入曲江則入于松花江也潢水出興安嶺則遼上京之在呼倫布雨爾及車臣汗部界已屬可據雖其所轄之府州二十二縣十俱有在邊外者而臨潢既可按圖而稽宜誌之以補前志所未及並於古蹟名勝條下詳志焉欽定盛京通志卷一百二
