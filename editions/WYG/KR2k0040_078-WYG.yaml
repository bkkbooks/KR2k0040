body:
  text: 國朝人物十正藍旗滿洲欽定四庫全書欽定盛京通志卷七十四國朝人物十正藍旗滿洲達爾漢姓郭絡羅隸正藍旗滿洲先世居沾河父揚舒率部衆來歸我太祖以長公主下嫁之時鴻業初創輝發哈達諸部恃强拒命揚舒戮力行間所至有功及卒太祖親奠醊焉達爾漢為長公主所出生而英特比長尚公主為額駙管佐領事天命四年二月從敗明兵於界藩八月從征葉赫下其城積功封一等男太宗即位列八大臣尋擢都統征札嚕特部單騎突陣擒其渠又征棟鄂部大破之俘古穆楚赫爾父子以歸天聰元年從征朝鮮克義定安諸州三年從征明以鑲黄旗兵拔遵化五年以本旗兵從攻大凌河敗明人步騎五百九年征明山西同都統阿山營於要地制明寧錦兵使不得西援途遇敵兵八百共擊敗之斬錦州副将劉應選崇德元年從武英郡王阿濟格征明攻順義縣先登六年從征錦州順治元年卒鄂洛塞臣額駙達爾漢之長子也天聰中從其父攻大凌河崇德元年從征朝鮮並有功五年六年兩圍錦州鄂洛塞臣並在軍中屢引兵斷其樵採擊敗松山援兵明總督洪承疇擁衆十三萬來援連破其步卒三營以功授二等輕車都尉世職擢副都統順治元年将兵定黑龍江諸部凱旋特遣大臣宴勞於郊二年從豫親王多鐸𠞰流賊李自成進薄潼關賊堅壁拒守鄂洛塞臣奮勇先登擒其渠於陣洊晉爵二等男六年擢都統尋改刑部侍郎疊遇恩詔晉爵二等子十六年駐防荆州以兵破海賊鄭成功於揚子江康熙三年卒贈太子太保諡果毅賜祭葬如例布當姓博爾濟吉特初為烏嚕特部貝子天命七年率部衆來歸授二等輕車都尉俾領所部䝉古為一旗天聰三年從征明入龍井關攻遵化明總兵趙率教等以步騎四千來援大敗之叙功晉爵三等男六年從征察哈爾師還俘獲少又不即隸户籍所部䝉古亦多違約束不能成一軍遂改隸滿洲正藍旗崇德三年擢刑部右㕘政四年卒子衮濟襲爵布當之弟曰色稜遵化之役亦在軍中及圍錦州並有戰績順治元年從入關追敗流賊李自成屢殱其衆二年復隨豫親王多鐸追擊之于潼關自成竄商州移師将下江南賊黨亦轉而南躡我師後色稜為殿進擊破走之三年騰吉斯叛附喀爾喀從豫親王往追其衆擊敗土謝圖汗碩雷汗等援兵叙功並遇恩詔晉世職至一等輕車都尉兼一雲騎尉十二年卒子札木揚襲蘇嚕邁姓嵩佳隸正藍旗滿洲世居棟鄂幼從征太祖奇其勇從攻撫順遼陽瀋陽並先登搏戰取之授佐領天聰元年征朝鮮攻義州以二十人先登三年征明克紅山口城授騎都尉世職四年圍永平乘夜攻城力戰被創太宗遣大臣往視加三等輕車都尉世職賚以馬幣賜號曰巴圖魯尋擢副都統為兵部㕘政從攻旅順口及寧逺城並有功其攻鵰鶚堡也飛礟傷其口獨戰未常反顧竟破之以殘廢辭職順治七年九年三遇恩詔加世職一等輕車都尉進至三等男康熙元年卒諡勤勇長子蘇爾濟順治元年從入關亦屢著有軍功達海姓覺爾察隸正藍旗滿洲其祖博洛來歸父艾宻禪任散秩大臣達海九嵗即通滿漢文義弱冠太祖賜居内院司文翰每草詔令稱㫖遂命正訂國書達海更為對音切字諧聲文義周宻譯明㑹典素書三畧諸書莫不稱善天聰三年太宗伐明不欲究武遣達海賫書與明議和明人閉關不啟復以書二一置德勝門外一置安定門外四年克永平令達海立城上執黄纛諭降其民是年譯書成授三等輕車都尉世職命曰巴克什五年征大凌河使招總兵祖大夀反復善諭大夀遂降十二月定朝儀六年詳定國書字體酌加圏㸃六月病篤太宗垂涕遣侍臣諭曰朕以達海偶疾耳今竟不起惜哉未寵任後當優恤其子賜以蟒綺達海感泣而卒年三十八嵗尋召其子三人賜予甚厚追諡文成康熙八年其孫祕書院學士禪布乞立碑聖祖以達海精通滿漢文所増加字義於今賴之著有勞績命追立碑石雅秦達海長子也天聰八年襲父職為騎都尉崇德三年大軍征明入董家口抵燕京還軍青山口明将以兵來襲雅秦率步卒擊敗之六年從圍錦州戰松山屢有功任吏部理事官八年改户部順治元年從入關破流賊李自成加三等輕車都尉尋擢吏部侍郎八年擢國史院大學士三遇恩詔晉爵三等男未幾卒康熙三十一年聖祖追念前勞遣官祭其墓阿山姓伊爾根覺羅世居穆溪從其父阿爾塔什歸我太祖隸滿洲正藍旗俾大貝勒代善轄之大貝勒置不用阿山頗觖望乘間逸去既而悔懼復歸請罪太祖察其才特宥之置諸左右不以屬代善阿山遂感激自効天命六年從征遼陽有功授二等輕車都尉世職太宗即位擢居十六大臣之列尋與都統楞額禮征札嚕特率六百人入巴林多所俘獲進爵三等男天聰元年從征朝鮮攻克義州城三年大軍征明從攻紅山口取其城趨燕京戰永定門外陣擒其總兵麻登雲四年圍永平以猛士二十四人冒礟火先登遂克其城晉爵三等子五年從征大凌河以兵三百徇松山路敗明兵二千未幾進都統八年畧地錦州西征察哈爾收其潰衆以歸九年明人聞我師将入大同檄山海關兵赴援阿山将前鋒兵四百趨錦州以遏之遇明副将劉應選等於大凌河縱兵突擊殪應選于陣擒遊擊曹得功等四人斬級五百乘勝取臺堡一凱旋太宗親勞之郊崇德元年從武英郡王阿濟格征明下鵰鶚堡長安嶺二城别将兵攻克東安縣二年以舟師攻皮島西北隅先登克之斬守将沈世魁晉一等子予世襲六年從圍廣寧攻錦州者再並有功七年復從饒餘貝勒阿巴泰征明入墻子嶺越燕京南下山東屢戰皆捷順治元年從擊流賊李自成於山海關自成敗走遂與都統瑪拉希自蒲津濟破賊黨於平陽留鎮其地二年晉爵三等公是時西安已平豫親王多鐸還定河南移師下江南阿山以所部從自泗州渡淮攻克揚州督舟師而南敗明鎮海伯鄭鴻逵兵於𤓰洲再敗之儀徵進取南京追擒明福王朱由崧于蕪湖乘勝偕貝勒博洛定浙江降明潞王朱常淓于杭州以次下嘉興湖州紹興寧波嚴州凱旋得恩賚三年坐枉治所部雅巴海妻獄削爵罷都統任旋復授一等子四年卒薩璧翰姓納喇隸正藍旗滿洲先世居輝發父繖坦太祖時率屬來歸任佐領既卒薩璧翰代之太宗即位列十六大臣視正藍旗副都統事天聰五年擢户部承政是年八月從圍大凌河城明兵出城拒戰擊却之逐北至城濠八年考滿授騎都尉世職崇德二年命改隸饒餘貝勒阿巴泰㑹薩璧翰從子烏達哩以侍衛從征朝鮮以葢州駐防甲士為厮役事覺薩璧翰失察革世職三年裁六部承政各一員改薩璧翰為吏部㕘政四年列議政大臣六年從攻錦州明援兵自松山挑戰薩璧翰先驅突陣敵大至圍之數重薩璧翰身被數創戰益酣左右馳擊大呼突圍以出嗣以創發卒于軍長子漢楚哈次子喀爾沁並任為佐領鄂謨克圖姓納喇先世居葉赫太祖時來歸隸滿洲正藍旗天聰元年從征寧逺明總兵滿桂於城東列陣進擊之殪敵無算三年以䕶軍校從征大同攻保安州城先登克之賜號巴圖魯授三等輕車都尉世職崇德三年從睿親王多爾衮征明由青山口入畧地至山東而還五年六年兩從圍錦州多斬獲七年戰杏山追躡呉三桂兵至連山大捷加世職二等輕車都尉順治元年從入關擊走流賊李自成加世職一等輕車都尉從定山西下太原移兵赴陜西㑹英親王阿濟格師破自成兄子錦於延安時豫親王多鐸已入潼關下西安自成竄走湖廣二年命英親王帥師征之鄂謨克圖以所部從每戰輒捷三年從討流賊張獻忠於四川平之叙功並遇恩詔晉爵至一等男厯官副都統康熙十二年卒諡曰襄壯伊拜姓赫舍里隸正藍旗滿洲初事太宗為佐領天聰八年授雲騎尉世職九年擢都統崇德元年從入長城攻克昌平定興諸州縣俘獲甚衆三年從入青山口越燕京略山東五年從圍錦州屢敗松山杏山援兵城中兵突圍出戰偕左翼軍擊卻之六年復圍錦州破其山巔步卒再破其騎兵於城下叙功晉騎都尉明總督洪承疇以兵十三萬救錦州營於松山伊拜倚杏山而軍以扼其歸路既而明兵屢敗遂乘夜自松山竄走伊拜截擊之逐北至塔山斬馘無算順治元年從入關擊敗流賊李自成尋偕都統葉臣𠞰賊將陳永福於太原克其城招降旁近郡邑二年從英親王阿濟格出師塞上入榆林搗綏德敗自成兄子錦于延安㑹豫親王多鐸已破賊潼關克西安自成竄走湖廣遂移師躡賊南下武昌連拔其營尋自成走死九宫山錦與其黨降於明大學士何騰蛟並授桂王朱由榔偽職騰蛟乃以所部舊將暨錦等分設十三鎮竊據湖南諸州郡勢甚張五年鄭親王濟爾哈朗率師征之伊拜以所部從六年下湘潭執騰蛟分兵趨衡州距城三十里敵以兵千餘扼橋結重柵而屯自橋迤南鱗次列寨抵城下伊拜督兵爭橋大呼躍入其柵柵毁敵不能支皆反走乘勝蹴之盡覆其寨進薄城陣斬偽總兵陶養用遂定衡州大軍别徇寶慶辰州武岡沅州靖州俱捷七年凱旋得恩賚九年列議政大臣累晉爵至三等男十五年卒年六十有五賜祭葬立碑墓道以其第三子費揚古襲阿爾津姓伊爾根覺羅隸正藍旗滿洲世居穆溪父齊瑪塔太祖時來歸阿爾津與從兄阿山屢從征伐積功授二等輕車都尉世職天聰四年永平灤州失守太宗盡繫諸將以阿爾津於灤州城内曽力戰既出復能殺敵特貰之九年大軍征察哈爾時阿爾津駐歸化城擒追喀爾喀部通明諜間獲其駝馬等物晉世職一等輕車都尉崇德元年太宗親征朝鮮其國王李倧遁入南漢山城阿爾津率精鋭追躡敗其援兵于要隘二年率每旗親軍五人往鐵山緝明哨卒尋列議政大臣六年明總督洪承疇守松山阿爾津屢擊敗其步騎兵敵走保一臺阿爾津率三旗䕶軍攻克其臺斬敵將三人盡殱其衆復破敵營三并援出前鋒之被圍者順治元年從入關追敗流賊李自成於安肅尋以從征江南四川並有功屢加世職至一等子爵又一雲騎尉九年授定南將軍𠞰湖廣賊寇十二年授寧南靖寇大將軍守荆州統兵破賊渠姚黄於夷陵招撫蠻部洞酋十五年進征雲南卒於軍詔贈太子太保諡端果立碑如例庫爾禪伊拜弟也初任佐領天聰九年從征黑龍江有功授雲騎尉世職崇德三年擢都察院理事官兼任㕘領五年從工部承政薩穆什喀征索倫師還其部長博穆博果爾與烏拉兵邀戰於路擊敗之尋從攻錦州三戰皆捷六年擢都察院㕘政再圍錦州明兵自松山來援奪我巨礟力戰卻之敵悉衆犯我山巔營率所部擊斬四十一人敵棄軍械潰走所獲甚衆八年擢副都統順治元年從入關敗流賊李自成于望都二年從豫親王多鐸擊賊潼關連破其兩營四年駐防濟南遣兵𠞰土賊謝遷等于淄川明年還京授都察院承政尋改㕘政六年偕都統譚泰征江西叛鎮金聲桓卒于軍前此屢以功叙並遇恩詔晉世職為一等輕車都尉及是以其子舒赫襲科爾崑姓阿顏覺羅隸正藍旗滿洲初為貝勒阿巴泰䕶衛天聰六年從征察哈爾崇德元年從征朝鮮皆有功授前鋒䕶衛五年從鄭親王濟爾哈朗圍錦州偕佐領索歡敗明兵於松山明總督洪承疇以兵十三萬來援挫其前鋒六年從英親王阿濟格駐師杏山擊走寧逺騎兵追至連山馬中流矢仆科爾崑躍起手斬騎者一人乘其馬而還尋英親王閲視寧逺城濠科爾崑與索歡從敵騎猝至戰卻之衛王以行而索歡陷重圍科爾崑復單騎突入圍翼之出七年從貝勒阿巴泰征明下薊州破明總督范志完軍於豐潤又偕前鋒㕘領鄂碩破其援兵八年授佐領兼兵部理事官順治元年四月擊敗流賊李自成於山海關再敗之望都六月從都統葉臣𠞰賊黨陳永福於太原戰城下賊未衂遽斂兵入城計必乘夜襲我營遂設伏以待夜半賊果至伏發盡殱之卒下其城從英親王追李自成於湖廣連破賊叙功授世職騎都尉兼一雲騎尉三年從肅親王豪格𠞰流賊張獻忠過漢中擊敗叛鎮賀珍兵進擊獻忠於西充之鳳皇坡殪之分𠞰其餘黨斬獲甚衆五年凱旋洊晉二等輕車都尉六年任前鋒㕘領從鄭親王濟爾哈朗征明桂王朱由榔於湖廣進兵湘潭破西山擒其大學士何騰蛟乘勝下寶慶武岡分兵克沅州道州復晉一等輕車都尉兼一雲騎尉九年從敬謹親王尼堪戰於衡州偽晉王李定國列象陣以拒科爾崑發矢貫象鼻象奔大破定國兵又敗偽秦王孫可望於寶慶而敬謹親王以窮追定國沒於陣科爾崑還奏捷諱之既而事聞乃坐奪爵十三年擢䕶軍統領十四年孫可望來降定國與偽鞏昌王白文選擁由榔據雲南大軍分三道進討科爾崑從大將軍洛託自沅州入貴陽與副都統瑪爾賽將趨黄平州聞文選方踞七星關瑪爾賽分兵由萬奇嶺攻其前挑文選出戰佯北以致其追而自率兵三千出間道攻其後呼噪縱擊文選後軍亂瑪爾賽還師夾攻之賊潰遁遂取黄平明年還京初李自成死餘賊郝永忠等降於何騰蛟騰蛟就擒永忠與其黨李來亨劉汝魁竄伏歸州興山間康熙二年命都統穆哩瑪圖海討之圖海出歸州𠞰汝魁諸賊穆哩瑪出宜昌𠞰來亨諸賊科爾崑以䕶軍隸穆哩瑪率兵五千先驅搗其巢于茅麓山永忠來亨悉衆拒戰時穆哩瑪既以大軍至與科爾崑登髙覘賊勢伺其稍怠縱兵擊破之科爾崑曰賊既創將致死於我軍計必乘夜襲我營乃簡勁卒伏隘口來亨率衆萬餘來犯遇伏大敗去明日賊集敗衆數千列刀盾而陣我兵張兩翼緩進科爾崑疾攻其中堅鋒既交兩翼兵横擊之賊敗潰賊有别巢曰譚家砦多儲積芻糧倚以濟餫為持乆計科爾崑分兵攻之拔其柵賊將李嗣名中流矢死賊以死守砦科爾崑以兵斷其汲道未二旬賊渠髙必正黨守素率其屬一百六十餘人來降科爾崑旋師與穆哩瑪合而圖海亦滅汝魁諸賊㑹師茅麓山作長圍以困之來亨自經死餘黨悉降乃班師以功授雲騎尉世職八年卒賜祭葬如典禮子摩囉歡襲覺羅郎球隸正藍旗滿洲景祖第三凡索倫阿之曽孫也初任理事官兼䕶軍㕘領崇德六年從征錦州擊敗松山援兵既而明總兵王樸呉三桂自杏山敗遁郎球與内大臣錫翰等設伏髙橋截擊之追至塔山盡殱其衆樸三桂僅以身免七年授禮部㕘政明年擢承政順治元年改任禮部尚書贊定郊廟大典二年隨順承王勒克德渾征流賊於湖廣明年師至石首偵知賊欲渡江走荆州郎球乃分兵趨江濵覘賊既渡盡取其舟及大軍擊賊荆州賊敗還不得渡悉俘斬之尋授三等輕車都尉歴遷吏部刑部尚書兼滿洲正藍旗都統八年英親王阿濟格有罪坐徇隠免官奪世職九年復任禮部尚書列議政大臣十一年遷户部累加少保兼太子太保十三年坐庇員外郎朱世德請免其所虧𣙜遂罷康熙五年卒年七十有三賜祭葬如例費揚武姓納喇隸正藍旗滿洲累官㕘領崇德七年冬從貝勒阿巴泰征明甫入邊明山海關總兵馬科迎戰費揚武破走之遂越燕京趨山東力戰膠州城外破明兵千餘乘勝薄濵州以雲梯克其城及師還先後破明總督范志完總兵呉三桂軍衛所俘以還叙功授雲騎尉世職順治元年從入關大破流賊李自成騎兵尋署䕶軍統領從豫親王多鐸追𠞰自成師抵潼關賊將劉宗敏等引衆拒戰費揚武率所部兵敗賊山下連破其兩營二年移師下江南攻揚州獲船二百餘進抵江寧逐北至蕪湖明總兵黄得功敗死尋從貝勒博洛定浙江擊走明閣部馬士英於杭州復以兵平海寧平湖土寇獲明總兵王之仁戰艦十有六十二月授議政大臣屢以功晉騎都尉加一雲騎尉予世襲四年從征福建卒於軍以其子雅素喀襲武達禮姓納喇隸正藍旗滿洲初為前鋒侍衛兼王府長史崇德八年擢國史院學士順治元年從豫親王多鐸討李自成進師潼關下西安自成走商州二年移師下江南三年從端重親王博洛征福建時明唐王朱聿鍵僭號福州海賊鄭芝龍受偽爵為平國公大軍入閩擒斬聿鍵芝龍猶擁兵觀望端重親王遣武達禮赴泉州開諭之芝龍乃降五年擢工部啟心郎八年遷刑部屢遇恩詔晉世職三等輕車都尉十一年擢兵部左侍郎專司督捕十七年以督捕不力降通政使並降世職為騎都尉聖祖即位擢吏部侍郎康熙五年以病免八年起刑部侍郎歴任工部刑部禮部吏部尚書二十年三月致仕五月卒賜祭葬如例錫特庫隸正藍旗滿洲自幼從征伐天命初授備禦天聰四年從征明擊敗其前哨八年九年畧明錦州有俘獲崇德二年同勞薩等往偵明邊俘斬其二十二人還七年入明邊斬其守備等員俘獲甚衆論功授二等㕘領世職順治元年從入關平定山西太原等處復有功三年從追騰吉思累加世職一等男扈扎拉隸正藍旗滿洲父瑚什崇德二年在皮島陣亡見忠節傳扈扎拉襲父佐領六年從征明錦州有功順治初加二等輕車都尉官副都統康熙十二年卒賜祭葬如典禮蘇法蘇魯邁第三弟也初任佐領崇德三年從征明攻克山東泗水順治元年追敗流賊于潼關得功三次旋征江南攻克宜興崑山累加三等輕車都尉世職哈爾松阿姓鄂卓隸正藍旗滿洲初任禮部㕘政天聰八年奉命往迎察哈爾歸附之衆收五千户而歸又以出使土特功授佐領世職崇德三年更定官制改為理事官四年隨征薩哈連烏拉有功五年隨征明圍錦州敗松山步兵六年復圍錦州敗明經畧洪承疇三營步卒又以屯田著績順治初累加世職至二等輕車都尉滿都禮隸正藍旗滿洲世居葉赫東城葉赫未平時即先衆來歸太祖遣之諭葉赫往返十二次盡招其親族來歸論功授備禦世職天命四年從攻撫順六年從征遼陽俱克敵有功被創不稍退敵兵侵我臺堡奮擊敗之以功加遊擊世職任㕘領尋以從征寧逺縁事革世職仍任㕘領兼佐領及征棟鄂卒於軍碩什烏巴什姓納拉隸正藍旗滿洲天命七年奉命往招察哈爾察哈爾汗不從且誘之降碩什烏巴什不屈囚之三載乘間得脱裸體忍饑逃歸太祖憫之給人户有差又奉敕招諭巴克貝勒時有昂阿貝勒者以兵邀諸路諸人皆畏懼碩什烏巴什獨挺身前進大敗其衆直抵其地招諭而還太祖嘉之以御用袍帶及馬賜之授備禦世職薩木哈圖隸正藍旗滿洲天聰三年隨太宗征明攻遵化先登克其城太宗以金巵酌酒勞之授備禦世職仍諭以有過俱赦家貧即䘏賜號巴圖魯並賚馬駝縀布等物八年卒寧格禮姓寧古塔隸正藍旗滿洲國初來歸以功授世職三等㕘領崇德八年隨征黑龍江及雅克薩奮勇擊敵論功加授二等㕘領世職同旗有尼哈哩亦以軍功授世職三等㕘領希雅爾球𨽻正藍旗滿洲崇德三年隨征明至山東攻棲霞以第二人登城拔之順治間三遇恩詔加三等輕車都尉世職諾木圖𨽻正藍旗滿洲天聰八年授佐領崇德五年從征明圍錦州我師駐吕翁山巔明總兵呉三桂縱兵來犯擊敗之六年再圍錦州擊松山兵有功順治初入關追敗流寇有功累加二等輕車都尉世職達理善𨽻正藍旗滿洲國初從征羅刹與敵戰於江中首先躍入賊船破之論功授佐領世職隨蓀𨽻正藍旗滿洲天聰八年往探明寧逺壕塹路遇明兵擊敗之又敗明沙河所兵順治元年從入關敗賊偽總兵唐通于一片石又追賊至安肅斬馘甚衆至慶都復大破之論功並屢遇恩詔加三等輕車都尉拜音察理𨽻正藍旗滿洲天聰八年從征明攻保安州先登破之論功加優叙復以其子什特庫入關破流賊有功加贈二等輕車都尉衮泰𨽻正藍旗滿洲崇德三年隨征明至山東攻沂水以第一人登賜號巴圖魯授佐領世職順治元年從入關擊流賊敗之又追敗之於慶都論功三遇恩詔加二等輕車都尉世職巴蘭姓博爾濟錦𨽻正藍旗滿洲崇德三年從征明敗明兵於臺頭營渾河岸等處順治二年隨南征至湖廣浙江屢戰有功授一等㕘領五年從征福建沿途招降郡縣復敗賊于泉州南安論功屢遇恩詔加二等男世職巴輅𨽻正藍旗滿洲初從征薩哈連烏拉有功任佐領崇德三年隨征明山東攻克陵縣又連敗明兵順治元年從定山西敗流寇於絳州二年南征敗賊於九江之富池口復追擊至湖廣承天獲戰艦無算三遇恩詔加三等輕車都尉世職拜音達哩𨽻正藍旗滿洲崇德三年隨征明攻山東棲霞以第一人先登克之賜號巴圖魯授佐領世職順治三年隨征福建進攻延平累戰有功三遇恩詔加二等輕車都尉剛阿達姓達木扎𨽻正藍旗滿洲崇德三年隨征明至廣平圍臨洺關以第二人登城拔之順治初累加三等輕車都尉世職卓和諾姓台楚嚕隸正藍旗滿洲崇德三年從征明攻南宫先登克之八年復從征明敗明兵於三河順治元年隨入關擊流宼復有功三遇恩詔加二等輕車都尉世職篇古𨽻正藍旗滿洲崇德三年從征明山東敗明兵於膠州進攻濵州督雲梯先登順治初入關擊破流賊于潼關平定河南江寧俱在事有功尋至浙江敗明偽大學士馬士英軍復敗之平湖論功以佐領加一雲騎尉琿達理𨽻正藍旗滿洲崇德三年隨征明攻霸州以第三人登順治初遇恩詔加三等輕車都尉同旗有邦鈕崇德三年從征明攻鵰鶚城有功又有弼赫納崇德八年從征明攻濵州有功皆累加輕車都尉世職綽達什𨽻正藍旗滿洲崇德三年從征明敗明太監髙起潛軍又敗其錦州兵六年從圍錦州擊敗明松山兵及明經畧洪承疇三營軍明年征寧逺敗明總兵吳三桂軍順治二年追敗流賊于潼關及平河南江寧俱在事有功尋至浙江敗明偽大學士馬士英于杭州獲戰艦無算三年從追騰吉思敗土謝圖汗及碩雷汗兵又連敗賊張二等六年從征山西叛鎮姜瓖大敗其兵九年征鄂爾多斯復有功十一年從平廣東累加一等輕車都尉世職珠赫納姓伊拉哩𨽻正藍旗滿洲崇德三年隨征明至山東屢敗敵有功順治初遇恩詔加世職三等輕車都尉十一年從征廣東破偽晉王李定國軍於新㑹論功加二等輕車都尉世職蘇爾德𨽻正藍旗滿洲崇德五年從征明圍錦州敗松山杏山軍六年再圍錦州敗明經畧洪承疇軍明年從征寧逺復在行間有功順治元年隨入關擊流寇二年追敗流賊於潼關及南征克江寧進師髙淳復敗敵有功授佐領世職三年從定福建連敗敵兵於建寧汀州論功又加一雲騎尉同旗有布岱崇德時從征山東以功賜號巴圖魯授佐領順治初加二等輕車都尉世職瑚紐𨽻正藍旗滿洲崇德二年從圍錦州擊敗明經畧洪承疇軍復夜逐哨卒多俘馘順治元年隨入關追流賊有功嗣遇恩詔加世職三等輕車都尉十五年從征貴州擊偽總兵羅大順軍連戰勝之凱旋至江南敗海賊鄭成功之衆論功加授二等輕車都尉世職傅魯肯𨽻正藍旗滿洲崇德八年從征明至山東攻武城以第一人登賜號巴圖魯授佐領順治初贈二等輕車都尉世職蘇勒特姓民覺羅𨽻正藍旗滿洲崇德五年從征明圍錦州連敗杏山松山兵六年復圍錦州破明經畧洪承疇三營軍八年征寧逺城中兵出戰擊敗之順治元年隨入關破流賊有功二年追破流賊於潼關五月平定江南又屢敗敵兵於髙淳鎮平以功授佐領世職三年隨平福建薄建寧延平汀州皆在事有功加一雲騎尉嘉塔𨽻正藍旗滿洲初從征明燕京及寧逺皆有功崇德三年圍錦州擊敗明松山兵順治元年以入關擊流寇有功加佐領世職是年冬追𠞰流寇至陜西綏德延安等處連戰皆捷追至武昌復破其衆師至九江獲戰艦無算屢破賊衆三年從征騰吉思擊敗土謝圖汗及碩雷汗兵以功累遇恩詔加一等輕車都尉世職希佛姓民覺羅𨽻正藍旗滿洲崇德六年從圍錦州擊敵有功得賜馬順治初從擊流寇著有勲績又以破海寇鄭成功累加雲騎尉世職蘇斐𨽻正藍旗滿洲崇德三年從征明至山東攻臨淄掘壕克之授佐領順治元年隨追流寇三敗其衆於潼關二年從征江南攻克宜興崑山常熟等處録功加優叙欽定盛京通志卷七十四
