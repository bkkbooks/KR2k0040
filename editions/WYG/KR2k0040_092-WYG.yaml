body:
  text: 文學北魏遼金元明國朝欽定四庫全書欽定盛京通志卷八十八文學臣等謹案遼瀋山川雄秀文學始於漢王景班史稱之而其書不傳北魏時屈遵最著自遼祖起松漠輦致晉圖書景聖之間文風蔚起逮乎金源人材輩出文物聲名彬彬盛矣我國家發祥肇迹覃敷文教留都近地漸被尤先我皇上翠䍐頻臨詔廣學額士之鍾靈毓秀以漸被夀考作人之化其必有日新月盛濟濟維楨者矣謹志文學第二十七欽定四庫全書欽定盛京通志卷八十八文學北魏屈遵字子皮徒河人博學多才藝名著當時歸魏太武拜中書令出納王言兼總文誥賜爵下蔡子按徒河北史作徒何遼耶律古裕字休堅六院部人古裕冲澹有禮法工文章統和中為本部太保開㤗中鞫覇州疑獄稱㫖授啓聖軍節度使太平中復為本部太保謝病歸俄擢南院大王歎風俗日頺請老不許興宗命為詩友數問治要多所匡建奉詔與林牙耶律庶成蕭韓嘉努編遼國上世事迹及諸帝實録未成而卒年九十唐古特語古裕梹榔也原作谷欲韓嘉努原作韓家奴今俱譯改蕭韓嘉努字休堅納喇部人少好學弱冠入南山讀書博覽經史通遼漢文字重熙四年官天成軍節度使徙彰愍宫使帝與語才之命為詩友屢有獻納詔作四時逸樂賦稱善詔與耶律庻成録約尼可汗至重熙以來事迹集為二十卷又詔博考經籍情文制度可行于世不繆于古者撰成三卷又詔譯諸書有六義集十二卷行世納喇八旗姓原作湼剌約尼觧見孝義卷原作遥輦今俱譯改耶律庶成字喜隠㓜好學讀書過目不忘善遼漢文字尤工於詩官樞密直學士與蕭韓嘉努各進四時逸樂賦與撰實録禮書修定法令有詩文及譯方脈書行於世耶律良字實訥生於乾州讀書醫巫閭山重熙中補起居注清寜中上幸鴨子河作捕魚賦遷知制誥請編御製詩文目曰清寜集上亦命良詩為慶㑹集親為之序後以功累官同知南院樞密使出知中京留守追封遼西郡王謚忠成實訥䝉古語解見名宦卷原作習撚今譯改耶律富魯字諾延庶箴子重熙中舉進士聰悟好學博通經籍契丹人舉進士自富魯始除牌印郎君應詔賦詩立成興宗嘉賞顧左右曰文才如此必不能武事㑹從獵富魯矢中三兎興宗竒之轉通進父庶箴寄戒諭詩富魯答以賦世稱典雅富魯解見黒龍江城池卷原作蒲魯諾延解見名宦卷原作乃展今俱譯改耶律孟簡字復易性頴悟六嵗時父劉家努晨出獵令賦曉天星月詩孟簡應聲而成父大竒之既長善屬文太康初以得罪奸臣伊遜流保州及聞皇太子被害不勝哀痛以詩傷之孟簡義命自安及釋歸詣闕上表請修國史曰本朝之興㡬二百年宜有國史以垂後世上命置局編修孟簡謂餘官曰史筆天下之大信一言當否百世從之茍無明識好惡狥情則禍不測可不慎歟乾統中為六部院太保處事不拘文法時笑其迂孟簡聞之曰上古無簿書法令而天下治簿書法令豈聖人致治之本乎伊遜解見人物卷原作乙辛今譯改謹按舊志以耶律學古耶律資忠耶律哈瑠列入遼文學今考遼史三人本傳學古保障南京功業昭著資忠哈瑠則守正不阿品誼端正俱未可僅以文學賅之是以移載入本志人物門是卷所載則悉係以文學知名者謹附識其體例于篇金完顔朂字勉道穆宗第五子好學問國人稱為秀才宗翰宗望定汴太宗使朂勞軍贈賄皆不受惟載書數車而還朂好學能文所撰本國郡望姓氏譜及他文甚衆累功封金源郡王邢具瞻字嵓夫遼西人天㑹二年進士與吳激蔡珪為文章友工于詩詞仕至翰林待制楊伯仁字安道伯雄之弟也天性孝友讀書一過不忘文詞典麗時輩莫及登進士第飬親不求調天徳二年除應奉翰林文字轉修撰世宗時孟宗獻發解第一伯仁讀其程文稱之曰此人當成大名是年宗獻府試省試廷試果皆第一號孟四元時論以為知文尋授伯仁左拾遺上書論事改大名少尹郡中豪民恣横伯仁窮竟渠黨四境帖然讞館陶大辟得其寃狀縣人為之立祠鄭子􅆅字景純大定府人㓜與兄子京時稱為鳯毛及冠有能賦聲天徳三年廷試一甲三名子聃自負常恨不得居第一人正隆二年海陵以進士第一程文問子􅆅子聃少之海陵不恱乃使子聃與翰林修撰楊伯仁宣徽判官張汝霖等同進士雜試子􅆅文果第一海陵竒之擢修撰改侍御史京畿旱詔子􅆅决囚遂澍雨人以比顔真卿累遷侍講兼修國史以海陵實録専任之子􅆅英俊有真氣為文亦然平生所著詩文至二千餘萹馮子翼字士羙大定府人正隆二年進士性剛果與物多忤用是仕宦不進以同知臨海軍節度使事致仕工詩樂府劉仲尹葢州人正隆二年登第後以潞州節度副使召為都水監丞能折節讀書諸詞樂府俱極藴藉墨梅詩􅀹為人傳誦有龍山集傳世按仲尹劉祁歸潜志又作遼陽人張景仁字夀甫遼西人累官翰林學士承㫖大定初與宋議和國書徃復多出其手世宗常稱之曰今之文章如張景仁與宋人往復凡七書指事逹意辯而能裁真能文之士也遷學士兼御史大夫時塟元妃李氏平章政事烏庫哩元忠以都水丞治道不如式决之四十景仁劾元忠擅斷六品官無人臣禮朝廷肅然史臣以儒者之勇許之耶律履遼東丹王七世孫家廣寜方五嵗時卧廡下見㣲雲往來天際忽謂乳母曰此所謂卧看青天行白雲者耶及長秀峙通悟博學多藝善屬文精厯算書繪事初舉進士惡搜檢煩𤨏去之廕補承奉祗候國史院書寫擢經史院編修世宗問朕讀貞觀政要見魏徵嘉謀忠節近世何故無如徵者對曰忠嘉之士何代無之在用不用耳世宗曰朕超用劉仲晦張汝震以其居諫軄屢有忠言也安得謂之不用履曰海陵杜塞言路天下緘黙成風願陛下懲艾前事開諫諍之門天下幸甚章宗好讀左傳召質所疑履曰左傳駁而不純尚書孟子聖賢純全之道願留意焉帝嘉納之後拜參知政事特賜大定三年孟崇榜下進士及第累官禮部尚書兼翰林院直學士明昌三年進尚書右丞卒謚文獻初族父徳元未有子以履為後既而生子震徳元殁盡推家資與之子辨材善材楚材皆有名耶律履金史作移剌履今從耶律楚材傳改正李獻可字仲和遼東人太師金源郡王石之子世宗元妃之弟大定十年累官大興少尹遷户部侍郎終山東東西路提刑按察使長于詩絶句尤佳王庭筠字子端葢州熊岳人後家河東父遵古官至翰林直學士庭筠生未期視書識十七字七嵗學詩涿郡王修一見期為國士登大定十六年進士調恩州軍事判官臨政有治績明昌元年詔試館職中選坐論事罷卜居彰徳讀書黄華山寺因以自號三年召為應奉翰林文字命與秘書郎張汝方品第書法名畫嗣遷修撰㤗和元年扈從秋山應制賦詩三十餘首上甚嘉之明年卒詔有司賻䘮事求其平生詩文蔵之秘閣庭筠儀觀秀偉外若簡貴人初不敢與接既見和氣溢于顔面少有可取極口稱道從遊及所薦引者皆一時名士世以知人許之為文能道所欲言暮年詩律深嚴七言長篇工險韻善書法學米芾尤精山水墨竹著有藂辨十卷文集四十卷子曼慶亦能詩并書仕至行省右司郎中自號澹游云按王庭筠金史作河東人元好問中州集作熊岳人髙衎字穆仲遼陽渤海人自少有能賦聲同舍生欲試其才使一日賦十題未暮皆就彬然可觀登進士第乞歸養逾二年方調補漷隂丞世宗時累擢至吏部尚書向每季選人至吏部託以檢閲舊籍謂之檢卷有滯留至後季猶不得去者衎三為吏部知其弊悉除之嵗餘銓事修理選人便焉完顔永成本名鶴野世宗子風姿竒偉博學善屬文世宗尤愛重之大定七年始封瀋王章宗即位進封吳尋進封兖判太原府事永成自㓜喜讀書晚年所進益醇暇日與文士相􅋀磋接之以禮未嘗見驕色自號樂善居士明昌三年永成誕日上賜以詩有羙譽自應輝玊牒忠誠不待起金縢之句當世榮之承安改元封豫王再判平陽府事以疾召還尋薨諡忠獻有文集行於世完顔璹世宗孫亦名夀孫字子瑜資質簡重博學有雋才喜為詩工真草書正大初進封宻國公璹奉朝請四十年日以講誦吟咏為事與文士楊雲翼趙秉文雷淵元好問李汾王飛伯等交善初宣宗南遷璹載其家法書名畫一帙不遺居汴中口多俸少客至不能具酒肴蔬飯共食焚香煑茗盡出蔵書相賞樂談大定以來故事終日而不厭也至曹王出質璹見哀宗於隆徳殿請代其行哀宗慰止之未幾以疾卒平生所著詩文甚多自刪其詩存三百首樂府一百首號如菴小稿元好問中州集云百年以來宗室中第一人也完顔守禧字慶之璹第五子也年少有俊才丰神秀徹作詩多隽語璹特愛之龎鑄字才卿葢州人少擢第仕有聲南渡後為翰林待制遷户部侍郎尋縁事倅東平改京兆路轉運使卒鑄博學能文藹然為一時名士工詩造語竒健不凡世多傳之畫史云鑄善山水禽鳥田永錫義州人少有詩聲其過東坡墳詩云富貴一塲春夜夢文章萬斛冷雲泉英魂返卻眉山秀依舊春風草木天為人傳誦興定末試南京擢第遭亂南遊江淮間卒劉光謙字逹卿瀋州人父澤為部掾劉之昻與之酬倡有侯門舊説炎如火陋巷今猶冷似氷半夜杯盤長袖舞白頭書冊短檠燈句用是人不敢以府史待之達卿資幹局處事詳泰和三年進士累官司農少卿工詩馮文叔遼東人工詩其客舍詩有句云生事穽中摇虎尾窮途天下轉羊腸三朝不遇馮唐老半夜悲歌寗戚狂為世所稱王革字徳新一名著臨潢人以䕃補官正大中六赴廷試賜出身調宜君簿為人藴藉少有才思詩筆尖新髙憲字仲常遼東人衎之孫王庭筠之甥㓜學於外家故詩筆字畫有舅氏之風天資頴悟博學强記年未三十作詩已數千首自言于世味一無所好惟生死文字間而已官博州防禦判官遼陽破殁於兵元耶律鑄字成仲楚材子㓜聰敏善屬文領中書省事採歴代徳政合於時宜者八十一章以進從憲宗征蜀屢出竒計世祖中統二年拜中書左丞相至元初加光禄大夫奏定法令三十七章吏民便之初清廟雅樂止有登歌詔鑄制宫懸八佾之舞樂成賜名大成十年遷平章軍國重事監修國史朝廷有大事必諮訪焉卒贈太師懿寜王諡文忠耶律希亮字明甫楚材之孫鑄子也九嵗師北平趙衍未浹旬已能賦詩至元八年授符寳郎十一年既平宋世祖問宋諸降將曰日本可伐否皆曰可希亮曰干戈甫定人得息肩俟數年後興師未晩世祖然之累遷吏部尚書至大中武宗訪求先朝舊臣特授翰林學士承㫖知制誥兼修國史乃􅁼次世祖嘉言懿行以進希亮性至孝額哷布格反時脅之西行困厄遐方家貲蕩盡僅藏祖考畫像四時陳列致奠朔漠之人咸共嘉嘆雖疾不廢書史或中夜起坐取燭以書所著詩文及從軍紀行録三十卷目曰愫軒集卒封漆水郡公謚忠嘉額哷蒙古語解見吉林山川卷布格解見人物卷原作阿里不哥今譯改明陳鑑葢州人正統戊辰進士賜及第官翰林學士使朝鮮有皇華集行世後官國子監祭酒陞禮部侍郎張鉞義州人弱冠即以詩名景泰間領山東鄉薦累官解州知州篤行古道表率鄉閭出其門者多致通顯陳宗遼海人初城南池中多􅘟忽生黄花一莖其大如盤色甚鮮麗術者異之曰城中當出竒士已而宗生四嵗能書五嵗屬文號神童十八登進士官刑部主事陞尚寳寺卿卒張升定遼中衛人聰明有㒞才善屬文嘗謁巡撫王翺試諭㓂檄援筆力就辭氣沛然翺大驚異舉正統丁卯鄉薦任本學訓導後改萬全都司儒學訓導學宫舊有井向苦鹹升浚之遂甘冽土人呼曰張先生井所著有裔菴稿行于世崇祀鄉賢國朝金世徳鐵嶺人𨽻正黄旗漢軍淹貫經史兼習國書順治初以廕補内院編修凡有大著作恒午夜馳召之康熙丙午因招撫閩海功累遷副都御史巡撫順天濬水利勤賑䘏多惠政見屬吏必令盡所欲言喜讀循吏傳清白自矢人莫敢干以私卒諡清惠髙璜奉天人𨽻鑲黄旗漢軍㓜沉毅讀書工文第進士康熙二十一年任江西提學道時文風卑靡璜力振起之以江西先正之文砥礪諸生風氣為之丕變捐俸修南昌府學及郡邑學之廢壊者善政甚多士民立碑祀之欽定盛京通志卷八十八
