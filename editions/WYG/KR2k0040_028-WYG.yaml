body:
  text: 疆域形勝盛京統部奉天府錦州府吉林黒龍江欽定四庫全書欽定盛京通志卷二十四疆域形勝臣等謹按周官掌疆掌固之設所以正疆域規形勝聖人宅中圖大創業垂統必先申畫郊圻然後可以肇域四海緜之詩曰周原膴膴言相度形勢也迺疆迺理言釐定疆域也我國家締造盛京廣袤五六千里奄有大東遂恢九有大一統之規實肇於是臣等載考輿圖備述南北東西所至與夫山河襟帶之勢謹志疆域形勝第十欽定四庫全書欽定盛京通志卷二十四疆域形勝盛京統部疆域西南至京師一千四百七十餘里東至海四千三百餘里西至山海闗八百餘里直𨽻永平府界南至海七百三十餘里北至黒龍江外興安嶺五千一百餘里俄羅斯界東南至錫赫特山國語錫赫特牲畜短少之謂也二千九百餘里朝鮮界西南至海八百餘里東北至費雅喀四千餘里海界西北至西結臺六百九十餘里䝉古奈曼界大凡東西廣五千一百餘里南北袤六千八百三十餘里東南至西北二千六百九十餘里西南至東北四千八百餘里形勝全遼形勢地當渤碣之間東包滄溟西連燕代遼河塹其左冷陘屏其右控潢水帶龍江俯登萊通松漠廣輪周延數千餘里西可以入雲中抵上谷北可以踐龍庭登天山東可以制島人服新羅百濟之屬我朝肇興伊始實維作京重闗巨扄扞衞天府洵足以培帝業之根本壯留守之雄都矣奉天將軍所轄疆域東至興京邊二百八十餘里吉林界西至山海闗八百餘里直𨽻臨榆縣界南至寧海南境七百三十餘里海界北至開原邊境二百六十餘里東南至鎮江城五百四十餘里朝鮮界西南至海八百餘里東北至威逺堡二百三十餘里吉林界西北至九官臺邊門四百五十餘里䝉古界興京城守疆域西北至盛京城二百五十里至京師一千七百一十餘里東至納圖們國語納地也圖們萬數也三十五里吉林界西至瑪哈丹城䝉古語瑪哈丹有肉也一百九十里奉天將軍所轄界南至蘭河峪一百八十里鳯凰城城守界北至薩克禪一百一十里開原城守界東南至李家河十五里鳯凰城城守界東北至英莪門國語英莪母駝也一百五十里吉林將軍所轄界西南至清河城一百六十餘里鳯凰城城守界西北至雅瑚穆一百三十里開原城守界形勝二水環流三闗雄峙發祥勝地鴻業攸基奉天府疆域東至撫順八十餘里撫順城守界西至土衚衕山七百八十里寧逺州界南至寧海縣紅頭崖七百三十餘里海界北至白都訥松花江八百七十餘里䝉古界東南至遼陽州浪子山一百八十里鳯凰城守界西南至官牆七百九十餘里寧逺界東北至穆稜河蒙古語穆稜江也二千四十里吉林界西北至義州大寧堡四百五十餘里邊界承徳縣附郭疆域東至撫順八十里撫順城守界西至遼河一百里廣寧縣界南至十里河六十里遼陽州界北至懿路站七十里鐵嶺縣界東南至大堡八十五里遼陽州界西南至新臺子七十五里遼陽州界東北至黒林子八十里奉天將軍所轄界西北至十方寺九十里銕嶺縣界形勝滄海朝宗長白拱峙渾河遶其西南混同環其東北締造鴻規實基於此遼陽州疆域自州治北至盛京一百二十里東至官馬山七十五里鳯凰城守界西至狼烟寨五十里牛莊城守界南至黒峪八十里海城縣界北至楊家灣六十里奉天將軍所轄界東南至浪子山六十里鳯凰城守界西南至鞍山驛六十里牛莊城守界東北至十里河六十里承徳縣界西北至船城六十里奉天將軍所轄界遼陽城守疆域東至一堵牆三百五十里興京界西至網户屯一百二十里廣寧城守界南至生鐵嶺一百三十里岫巖城守界北至十里河六十里奉天將軍所轄界東南至分水嶺一百九十里鳯凰城守界西南至新臺子九十里牛莊城守界東北至張起寨一百二十里撫順城守界西北至四方臺九十里廣寧城守界形勝披山帶河沃野之地海城縣疆域自縣治北至盛京二百四十里東至牛心山九十里鳯凰城守界西至三岔河六十里廣寧縣界南至耀州六十里蓋平縣界北至鞍山驛六十里遼陽州界東南至白土嶺六十里蓋平縣界西南至大孤山八十里蓋平縣界東北至龍降洲八十里遼陽州界西北至接官堡六十五里遼陽州界牛莊城守疆域東至猪窩嶺九十里遼陽城守界西至八王廟九十里廣寧城守界南至金長嶺六十里蓋平城守界北至高麗房身七十里廣寧城守界東南至康家嶺一百里岫巖城守界西南至海一百里東北至安山八十里遼陽城守界西北至三家子七十里廣寧城守界形勝羣山拱繞遼海縈流為南區之要害盖平縣疆域自縣治北至盛京三百六十里東至剉草峪一百一十里岫巖城守界西至連雲島十五里海界南至李官屯河九十里復州界北至淤泥河五十里海城縣界東南至大莊河二百四十里復州界西南至灰洲九十里海界東北至白土嶺八十里海城縣界西北至小孤山六十里海城縣界盖平城守疆域東至魏家大嶺一百五里岫巖城守界西至連雲島十五里海界南至鳴珂嶺三十里熊岳城守界北至金長嶺七十里牛莊城守界東南至哈什瑪嶺九十一里岫巖城守界西南至望海寨三十里熊岳城守界東北至白土嶺一百里牛莊城守界西北至青堆子七十里牛莊城守界熊岳城守疆域北至盛京四百二十里東至畢哩河一百二十里岫巖界西至兎兒島二十里海界南至永寧監六十里復州城守界北至鳴珂嶺三十里蓋平城守界東南至歸化堡一百餘里寧海城守界西南至五十寨五十餘里海界東北至十道口四十餘里蓋平城守界西北至深井子三十餘里海界形勝西南渤海東北羣山留都巖邑開原縣疆域自縣治西南至盛京二百里東至耿家莊七十里邊界西至遼河六十里城守所轄界南至山頭舖河五十里鐵嶺縣