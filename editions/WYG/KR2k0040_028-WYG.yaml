訥黙爾河訥黙爾國語解見本卷前一百六十里河南齊齊哈爾界北至内興安嶺伊拉古爾山一千三百一十里嶺北黒龍江界東南至内興安嶺諾黙爾河源四百里嶺東黒龍江界西南至訥黙爾河入嫩江河口二百二十里江南齊齊哈爾界東北至内興安嶺額爾克山䝉古語額爾克權也二百九十五里嶺北黒龍江界西北至伊克庫克圖山蒙古語伊克大也庫克圖青色也一千二百七十里山北黒龍江界山西南呼倫布雨爾界形勝北負羣山南臨沃野黒龍江疆域西南至齊齊哈爾城八百餘里東至外興安嶺興安河二千六百里寧古塔界西至内興安嶺一百五十里嶺西墨爾根界南至内興安嶺喀穆尼峰國語喀穆尼闗隘也七百里齊齊喀爾城界北至外興安嶺二千五百里俄羅斯界東南至畢瞻河一千二百餘里寧古塔界西南至内興安嶺一千一百里齊齊哈爾城界西北至吉爾巴齊河吉爾巴齊蒙古語解見建置沿革卷一千七百九十里俄羅斯界形勝左枕龍江右環興嶺東國藩垣北門管鑰呼倫布雨爾疆域東至齊齊哈爾城七百六十里東至内興安嶺之哲爾格山蒙古語哲爾格等次也三百五十餘里嶺東齊齊哈爾城界西至哈瑪爾山蒙古語哈瑪爾鼻也四百七十里喀爾喀界喀爾喀國語解見本卷前南至穆固圖爾山蒙古語穆固圖爾無角乳牛也四百四十餘里車臣汗界北至安河七百一十餘里河北黒龍江界東南至内興安嶺額赫嚕爾山四百餘里齊齊哈爾城界西南至邊境四百餘里車臣汗界東北至伊克庫克圖山九百二十里山北黒龍江界山東南墨爾根界西北至額爾古訥河額爾古訥蒙古語解見建置沿革卷二百二十里俄羅斯界形勝北控俄羅斯南撫喀爾喀山河險固並重龍江欽定盛京通志卷二十四
