body:
  text: 城池二錦州府錦縣寜逺州廣寜縣義州欽定四庫全書欽定盛京通志卷三十城池二錦州府府城即明廣寕中左二屯衛城也遼置錦州金元因之明洪武二十四年指揮曹奉即舊城址修築週圍五里三百二十步髙二丈五尺成化十二年都指揮王鍇増展南北四十五丈東西九十五丈𢎞治十七年叅將胡忠併築南闗週圍六里二十三步形勢若盤俗謂之盤城門四東曰寕逺南曰永安西曰廣順北曰鎮北鐘鼓樓在中街池週圍七里五百七十三步濶三丈五尺深一丈二尺今城仍舊週圍五里一百二十步東有闗廂小城相附舊載三里一百六十步髙一丈五尺門三曰小東門小南門小北門其增築之年無考今按城基週圍二里乾隆四十三年奉㫖重修皇上東謹案乾隆八年十九年廵俱有御製錦州道中詩四十三年有御製錦州道上恭依皇祖詩韵過錦州詠祖大夀事錦州道中書事詩四十八年有皇御製過錦州六韻錦州道上再依載祖詩韻過錦州叠戊戍韻詩俱恭天章門事蹟謹稽實錄天聰五年我兵圍大凌河城明總兵祖大夀降太宗縱還錦州越四年命豫親王多鐸率兵駐廣寕大臣阿山石廷柱等以兵四百攻錦州大夀令其副將劉應選率兵三千迎禦而自勒步騎出城五里立營我軍至大凌河西遇劉應選兵阿山以敵衆我寡遣人馳告豫親王王即移師馳赴自山而下塵起蔽天明兵大驚奔潰我軍陣斬劉應選殱其兵五百大夀退入城崇徳四年春我軍圍松山分兵駐錦州西北烏馨河口大夀時在寕逺令副將楊震祖克勇徐昌永率騎兵六百趨錦州經烏馨河口我軍擊敗之斬八十四人擒揚震太宗自松山馳至錦州分兵搜勦山寨斬徐昌永擒祖克勇以還五年春命鄭親王濟爾哈朗等率兵修義州城駐劄屯田更番圍錦州使民人不得耕種太宗親往閲視有杏山城西五里臺之䝉古蘇班岱等欲携三千餘戸來歸我兵往衛以行明兵七千躡追我兵還擊卻之擒其副將楊倫叅將李得位等六年春我兵環錦州城鑿長壕立營城郛䝉古諾木齊等使人持書縋而下約獻東闗為祖大夀所覺欲擒衆䝉古諾木齊率衆與戰聲聞闗外我軍薄城下䝉古縋䋲援以上夾擊祖大夀追入内城環兵守之諾木齊率衆來歸郛内戸口及器物悉移義州城時明總督洪承疇以錦州危困集兵十三萬赴援太宗親統師擊卻入松山城重圍以困之七年春城破擒洪承疇及祖大夀之弟總兵祖大樂逰擊祖大名祖大成等縱祖大成入錦州與祖大夀相見時錦州城中糧盡人相食祖大夀聞松山已失度錦州不能守遣人赴鄭親王濟爾哈朗睿親王多爾衮營言若得見祖大樂即出降兩王令祖大樂與使者見三月丙子祖大夀遣人請盟兩王叱之曰我軍圍困此城旦夕可取有何顧慮乃與爾盟誓乎欲降則降不降則已誰强爾降也祖大夀乃遣其兄子祖澤逺同其中軍官髙勲乞宥罪明日率衆官詣軍門叩首降獻錦州城太宗命諸王留兵駐防凡祖大夀族黨及部衆悉生全贍養之錦縣附郭大凌河城城東四十里週圍三里二卜步門一明宣徳三年置中左千戸所於此屬廣寕本朝左屯衛駐防今置汛焉並為養息牧地餘詳見初設兵山川卷大凌河注事蹟謹稽實錄天聰五年夏五月寕逺人張士粹來歸又有兩人自錦州來歸俱言明人築城大凌河太宗命葉努錫特庫喀木齊哈往覘生擒二人言明總兵祖大夀副將何可綱䓁率山海闗外八城兵及夫役築城欲乗我兵未至時竣工秋七月己亥太宗率貝勒大臣統大軍西發八月丁未抵大凌河進圍其城命大臣楞額禮率正黄旗兵圍北面之西額駙逹爾漢率鑲黄旗兵圍北面之東貝勒阿巴泰率䕶軍在後策應覺羅色埒率正藍旗兵圍正南面貝勒莽古爾㤗徳格類率䕶軍在後策應宗室芬古率鑲藍旗兵圍南而之西貝勒濟爾哈朗率䕶軍在後策應大臣武納格率左翼䝉古兵圍南而之東喀克都哩率正白旗兵圍東面之北貝勒多鐸率䕶軍在後策應大臣伊爾登率鑲白旗兵圍東面之南貝勒多爾衮率䕶軍在後策應額駙和碩圖率正紅旗兵圍西面之北大貝勒代善率䕶軍在後策應大臣鄂穆岱率右翼䝉古兵圍正西面葉臣率鑲紅旗兵圍西面之南貝勒岳託率䕶軍在後策應䝉古貝勒明安等各率所部兵於空隙䖏列營額駙佟養性率舊漢兵載紅衣礟當錦州大道而營諭曰攻城恐士卒被傷不若掘壕築牆以困之彼兵若出我則與戰外援若來我則迎擊於是諸將分赴汛地環城四面掘壕深廣各丈許壕外築牆髙丈許牆上加以垜口又離牆五丈餘四週掘壕廣五尺深七尺五寸壕上鋪秫稭覆以土營外亦掘壕深廣各五尺許上臨城南山岡閲視有敵騎兵百餘出城逐我採樵者命侍衛率䕶軍擊之擒其都司王延祚庚戍敵騎兵百餘出城布顔圖譚拜率䕶軍擊之斬三十餘人獲馬二十四辛亥明步騎兵約五百出城額駙達爾漢率八十人擊敗之追至城壕而還復有出城刈禾者布顔圖率䕶軍四十人擊之斬三十人貝勒莽古爾㤗徳格類所轄䕶軍斬十八人貝勒濟爾哈朗所轄䕶軍斬十五人總兵官馬光逺招降城南一臺内百總一男子五十婦女四口逰擊范文程招降城西一臺内生員一男子七十二婦女十七口諭各付光逺文程贍養之癸丑命大臣揚善翁阿岱蘇達拉率䕶軍列壕邉遇敵人過壕乃接戰圖賚南楚哈克薩哈率䕶軍列兩黄旗之間見敵人逐我採樵者乃邀擊之諸將甫至汛地明兵出城誘戰圖賚即率兵往擊額駙逹爾漢率鑲黄旗兵繼進四面軍士見之亦各進戰兩藍旗兵徑抵城壕舍騎步戰逼明兵入壕明兵墮壕死者百餘人我兵獲馬三十壕岸敵兵與城上敵兵礟矢齊發兩藍旗兵乃退是日額駙佟養性督舊漢兵以紅衣礟攻城西南隅一臺穿其雉堞擊死一人䑓兵驚懼遂降我兵列車楯於臺下以礟攻城之南面壊其雉堞四敵樓二又攻毁城東一臺䑓兵乗夜遁我兵追及盡殱之丙辰正紅旗牧馬取草兵遇明臺軍出被殺者十人失駝十馬三十五大貝勒代善貝勒濟爾哈朗多鐸等率兵三十往圍其臺發紅衣礟擊之焚近臺房屋百餘間獲駝馬三十餘諸貝勒還營留兵守之及夜臺軍突出備禦留哈擊敗之斬九人生擒一人言臺上死於礟者三十人又獲駝馬牛三十餘先是命阿山勞薩圖魯什率兵二百往錦州偵敵擒明兵十一人又設伏路旁獲七人牛騾十餘丁巳明援兵二千自松山來阿山勞薩圖魯什率兵三百擊敗之斬百餘人獲其纛二甲子命貝勒阿濟格碩託率領纛大臣毎旗一員精兵五百䝉古兵五百往松山遮擊明援兵太宗親詣指示立營瞭哨之地而還越一日明錦州副將二員叅將逰擊十員率兵六千至時大霧覿面不相識我軍列陣以待忽有青氣自天衝入敵營霧開如門頃之即霽阿濟格碩託遂率兵進擊大敗之追殺至錦州城生擒逰擊一員獲甲胄二百十九馬二百有六旗纛十五是日祖大夀遣兵出城奪我軍已得之臺甫樹梯和碩圖葉臣芬古色埒武訥格鄂穆岱圖爾格明安各率兵出營偕敖漢奈曼䝉古兵齊進夾攻大敗之明兵奔入城追擊至城壕乃止九月乙亥命譚布率䕶軍一百五十人邀擊明兵出城樵採者斬三人生擒二人庚辰我軍攻克大凌河西五里外一臺盡殱其衆辛巳遣陣獲逰擊一員携大纛十五小旗二繞城下呼曰山海闗總兵遣我盡率所部兵來援為滿洲往圍錦州之兵所敗斬殺幾盡我被擒至此癸未偵知明山海總兵官宋偉遵化總兵吴襄寕逺巡撫邱禾嘉率闗外馬步兵悉入錦州城太宗以貝勒阿濟格碩託軍中兵寡命總兵官額駙揚古利率八旗䕶軍之半往益之丁亥命貝勒多鐸率䕶軍二百行營兵一千五百額駙佟養性率舊漢兵五百携車楯往擊太宗親率䕶軍二百縁山前行見錦州城南塵起遣圖魯什勞薩率兵二百往覘頃之明兵七千逐圖嚕什等至小淩河岸太宗見之遂擐甲渡河率䕶軍二百直衝而入敵兵七千悉潰遁追擊至錦州城敵墮壕死者甚衆城中復出步兵列車楯大礟於城外以騎兵隨其後距我軍里許太宗督兵擊敗之斬副將一生擒把總一乃收軍拜天以兵留付阿濟格而還至中途凡被創士卒徧勞之酒庚寅命營卒執旗幟離大凌河城十里馳騁揚塵聲礟不絶為錦州援兵狀祖大夀遂率兵出城攻西南隅我兵已㩀之臺樹梯將登我鑲藍旗鑲紅旗右翼䝉古烏嚕特䝉古四營兵齊出奮戰太宗預率䕶軍伏山内突馳進擊敵知墮計奔入城陣斬臺下者十七人中創死者百餘人自是祖大夀閉城不敢復出乙未明太僕寺卿監軍道張春與總兵吴襄等率副將叅將逰擊守備都司等官百餘員馬步兵四萬餘來援過小凌河駐營掘壕列車楯鎗礟我哨兵馳告太宗親率行營兵之半往視諭諸將曰敵壁壘嚴整不宜輕戰致傷我衆且俟彼起營前進乗隙擊之遂引軍還戊戍明兵四更起行次長山距大凌河城十五里太宗與大貝勒代善率兵二萬往擊至則敵已列陣太宗宻遣精鋭設伏扼敵歸路以行營兵推戰車近敵䕶軍及䝉古兵繼列先令騎兵衝敵陣敵鎗礟齊發鉛子如雹其聲震天我騎兵縱横馳突飛矢如雨敵敗郤我右翼兵悉衝入敵陣先殺其步兵四向追擊其騎兵左翼兵避敵鎗礟踵右翼兵而進敵營未盡破仍復拒戰額駙佟養性奉命率所部兵屯於敵營東發大礟火箭攻之時有黒雲起風從西至敵乗風縱火勢甚熾將逼我軍天忽雨反風敵營燬其兵焚死者甚衆我兵復合攻之敵潰遁截殺大半追奔四十里其先為右翼兵追擊者遇我伏兵發悉殱之陣斬副將張吉甫滿庫王之敬盡獲其駝馬車牛甲胄器械生擒監軍道張春副將張洪謨楊華徴薛大湖叅將姜新逰擊黄澤千總姜桂等是日祖大夀聞鎗礟聲謂仍是設計誘之不復遣一人出冬十月丁未太宗以書三函予祖大夀及副將何可綱張存仁並命陣獲文武官二十三員各以己意為招降書令千總姜桂齎往祖大夀率衆官出城見之與之食謂曰爾不必再來我寕死於此城不降也己酉太宗遣官八員率兵五百盡出舊漢兵載紅衣大將軍礟六位將軍礟五十四位攻魚子嶂臺是臺峙立邉界垣牆甚固攻三日擊壊臺垜敵中礟死者五十七人叅將王景携男子二百三十九人婦女㓜稚三百三十九口來降逺近百餘臺聞風惴恐或降或逃所遺糧糗足供我士馬一月之需王景既朝見賜以貂裘貂㡌明日翟家堡守臺百總一生員一率百人降獲牲畜五十甲寅陳興堡守臺百總祖邦傑來降賜縀衣一令往招臺内人降不從我軍用礟擊之死傷大半降者四十五人是日遣陣獲叅將姜新往招祖大夀等時大凌河城内糧絶薪盡我兵修築壕塹益堅軍容整暇祖大夀等謀突圍而出偵我軍防守嚴宻一人不能逸而援兵自外至者又敗潰窮蹙無計乃出城與姜新揖見令逰擊韓棟隨至既朝見太宗命巴克什逹海庫爾禪與姜新送之入城韓棟始來時由正黄旗大臣楞額禮所守之門入軍士俱戎服執㦸林立門内外及逹海庫爾禪送韓棟入城楞額禮亦不容􅃍過令逺立詢問姓名詳察面貎一一驗畢然後令行韓棟目擊我軍紀律及堵守嚴宻狀料一人不能潛脱還白大夀大夀降志始决其義子祖澤潤以書二函繫於矢自城内射出請遣副將石廷柱往丙寅石廷柱達海庫爾禪隆什寗完我往城南臺下大夀令韓棟送其子可法赴我軍為質邀石廷柱過壕相見言當先定攻取錦州之策乃舉城歸順石廷柱還奏太宗命同達海往諭曰我既招降爾等復攻錦州恐我兵過勞爾等降後錦州或以力攻或以計取任爾等為之不然爾等坐守城中我惟有駐兵圍困而已戊辰大凌河城内各官皆與祖大夀同謀歸降獨何可綱不從祖大夀令二人掖出城外於我諸將前殺之遂遣副將四員逰擊二員來誓及暮大夀至命入幄坐於左設饌宴之賜御用黒狐㡌貂裘及金飾鞓帶縀靴雕鞍白馬大夀宻陳取錦州之策仍入城己巳命貝勒阿巴泰徳格類多爾衮岳託率副將八員官四十員兵四千人俱作漢裝偕祖大夀率所屬兵三百五十人作潰奔狀襲取錦州是夜二更起行礟聲不絶錦州城中聞之以為大凌河城中人得脱分路應援並為我軍擊敗㑹大霧人覿面不相識軍皆失陣伍乃收兵還十一月庚午朔太宗諭諸貝勒曰與其留祖大夀於我國不如縱入錦州令其為我効力即彼叛而不來亦聴之若不使往倘明國别令人㩀守錦州寕逺則事難圖矣今縱大夀一人去而携其子姪及諸將士以歸厚加恩養再圖進取庶幾有濟遂賜大夀宴命石廷柱庫爾禪送之隨行厮卒二十六人皆與之馬及晩渡小凌河徒步還錦州是日大凌河歸降將士皆薙髪先是明步騎兵及工役商賈共三萬人及我軍圍之或戰死或餓死或相食至是存者萬一千六百八十二人馬三十餘命歛軍中米二百三十三石分給之察出滿洲八人前此逃入者斬以徇其䝉古人有兄弟親戚在敖漢奈曼喀喇沁者仍歸各部落外尚存一千五百七十人選其精鋭者上與諸貝勒收養其餘分撥八旗官員及諸貝勒䕶衛並國中富戸撫恤乃悉毁大凌河至廣寕一路墩臺而還小凌河城城東南十八里週圍一里二百十八步東南二門本朝康熙二十九年設佐領驍騎校駐防餘詳見山川卷小凌河注天橋塲城城西南五十里週圍一里門一為控扼海口之地本朝雍正元年設巡檢司於此錦縣界内厯代舊有城址古大人城城内府治東相傳唐太宗征髙麗時儲粟於此今圯古虹螺山寨城城西五十里考遼金元三史地理志俱無此寨名唐書亦不載其名俗傳為渤海時所建週圍二十三里三百三十四步南三門今圯安昌永和村城城西九十五里遼置金因之元廢週圍二里一百十九步門四今圯右屯衛城城東南七十里元時為閭陽縣之臨海鄉明洪武二十六年置廣寕右屯衛於十三山堡明年移此葺公主寨故址以為衛治永樂中指揮徐琦李通築城週圍四里二百六步髙二丈九尺門三東曰鎮海南曰永安西曰迎恩池深八尺廣一丈週圍五里八十六步今城圮池湮俗訛為牛頭衛稍城東有舊枯凌衛北為秃老子店村四里屯東為新莊屯南為曺官屯超屯雙屯錦縣界内諸堡十三山堡城東七十里週圍一里二十步成堡之西北曰戴家屯島兒嶂屯南曰化峪村新甸村錦昌堡城西二十里週圍二里二百步南一門我太祖髙皇帝壬戊年征明撫降之今設汛焉鷹手堡城西三十里週圍一里三百歩南一門松山堡城南十八里明時設中屯千戸所於此週圍三里一百二十步門三今仍分汛駐防本朝謹案六年大軍取錦州克捷於此事蹟謹詳載崇徳山川卷松山注大勝堡城北三十里週圍一里四十七步門一我太祖髙皇帝壬戌年征明撫降之今設汛焉大茂堡城北三十五里週圍一里一百歩門一我太祖髙皇帝壬戌年征明撫降之今設汛焉髙山堡城東南二十五里週圍三百三十二步南一門團山堡城東南五十里週圍二百四十步門一又有一在城西南九十里週圍一百六十步門二杏山堡城西南三十里週圍二里一百六十歩東西二門今設汛於此本朝崇徳七年大軍取杏山堡事蹟謹詳載山川卷松山注堡東曰劉七屯大興堡城西南四十里週圍一里一百八十歩門一椵木衝堡城西南五十里週圍一里門一塔山堡城西南六十里明宣徳五年指揮李旺建設寕逺左屯衛於此週圍三里四十步本朝崇徳七年大軍取塔山堡事蹟謹詳載山川卷塔山注長寕堡城西南七十里週圍一里一百三十四步門一連山堡城西南八十里週圍一里二百六十步門一沙河堡城西南八十里週圍一里一百三十四步門一堡之東為八家營子北曰穆家屯十里屯寺兒堡城西南九十里週圍一里三百四十六步門一堡之東為萬寳城流水堡城東北二十里週圍二里三十四步門一營城子堡城東北三十里週圍一里六十步門一石家堡城東北四十里週圍一里一百二十步臧家堡城東北四十里週圍一里二百十步齊家堡城東北四十五里週圍一里開州堡城東北五十里週圍一里嶂臺我堡東曰魚子太宗文皇帝辛未年征明攻降之於堡北曰靠塔屯羅家屯夏家溝堡西曰家屯白廟子髙橋舖城西南五十里週圍一里二十四步門一以上諸堡舖皆錦縣駐防分汛地寕逺州州城即明逺衛城也本廣寜府前屯中屯二衛地明宣徳三年總兵巫凱都御史包懐徳上狀請分二衛地於曹莊湯池之北建衛治賜名寕逺築城週圍五里一百九十六步髙三丈門四東曰春和南曰延輝西曰永寕北曰威逺鐘鼓樓在中街池深一丈五尺週圍七里八步明季増築外城週圍九里一百二十四步髙如内城門四東曰逺安南曰永清西曰迎恩北曰大定四角俱設層樓今因之乾隆四十二年奉㫖重修皇上東謹案乾隆八年巡有御製寕逺道中作詩十九年有三年有御製題寕逺祖氏石坊詩四十御製寕逺道中作歌寕逺祖氏石坊疊舊作韻二首四十八年有御製寕逺道中作寕逺祖氏石坊并疊舊作韻二首俱恭載天章門事蹟謹稽實錄天聰元年夏四月太宗聞明人於錦州大凌河小凌河築城屯田五月辛未親率諸貝勒大臣由上榆林征明甲戍至廣寕舊邉命貝勒徳格類濟爾哈朗阿濟格岳託薩哈璘豪格率精鋭為前隊令諸將率棉甲軍携雲梯挨牌為後隊乙亥入白土塲乗夜進發前隊兵執明哨卒至知右屯衛有兵防守小凌河大凌河修城未竣亦以兵駐防錦州城繕修已畢馬步兵凡三萬丙子太宗率兩黄旗兩白旗兵直趨大凌河明守城兵棄城遁大貝勒代善貝勒阿敏碩託率正紅鑲紅鑲藍旗兵直趨錦州遂圍其城貝勒莾古爾㤗率正藍旗兵直趨右屯衛丁丑攻錦州城西隅垂克明總兵趙率教令城上三面守兵并力合拒辛巳明巡撫袁崇煥自寕逺遣二人齎書赴錦州與太監紀用為我哨兵所獲書中有調集水師援兵六七萬將至山海等語貝勒莾古爾㤗濟爾哈朗等率偏師至衛塔山運糧士卒前軍八十人與明兵二萬人遇擊却之丁亥額駙蘇納率䝉古兵往截塔山西路遇明兵二千進擊敗之獲馬一百五十餘壬辰太宗率代善阿敏莾古爾泰濟爾哈朗等率兵三千往寕逺迎擊明援兵癸巳黎明至寕逺城北闗明逰擊二員率步兵千二百餘人掘壕以車為營列火器守禦我兵面城列陣攻其步卒不移時盡殱之明總兵滿桂之兵及宻雲兵於城東二里列陣沿城環列鎗礟太宗諭諸貝勒曰此地逼近城垣若即進攻難以盡力縱擊可稍退以觀動静於是退軍踰山岡既而環視明兵堅壘不動太宗欲進擊阿濟格請從代善阿敏莾古爾泰皆以距城近不可攻勸阻甚力太宗命近御諸將及侍衛等皆冠兠鍪諭曰昔皇考攻寕逺不克今我攻錦州又未克若遇此野戰之兵尚不能勝其何以張我國威耶遂親率阿濟格與諸將侍衛等疾馳進擊明前陣騎兵不能當敗走寕逺城下盡殪之屍填壕塹諸貝勒皆愧奮不及胄亦馳而進明兵大敗委棄甲仗徧地士卒死傷者無算是日我軍還駐雙樹堡六月己亥攻錦州城南隅因城壕深濶難以驟㧞時值溽暑天氣炎蒸太宗憫念士卒勞苦遂班師中後所城城西南八十里明宣徳三年置前屯衛中後千户所於此築城週圍三里一百七十步髙三丈門四東曰潤和南曰歌薰西曰説澤北曰寕瀾池深一丈廣二丈週圍四里二百步東南有關廂城三面週圍一里十一步門二東曰威逺南曰鎮朔本朝康熙初設巡檢司及佐領驍騎校官兵駐防乾隆四十三年奉㫖重修事蹟謹稽實録崇徳元年秋九月世祖初嗣位遣鄭親王濟爾哈朗英親王阿濟格統師征明壬寅載紅衣礟及諸火器西發甲寅抵中後所乙夘薄暮移軍城北填平壕塹以紅衣礟攻城丙辰城頺遂用雲梯挨牌拔其城擒斬逰擊吴良弼都司王國安等二十餘員及馬步兵四千五百人俘四千餘人分兵畧前屯衛中前所等䖏俘四百人己未由寕逺衛進發庚申抵前屯衛立營柵運挨牌雲梯紅衣礟於城西自亥時發礟攻城明日午時城破斬其總兵李輔明袁尚仁及副將以下官三十餘員兵四千餘俘二千餘人又分兵至中前所明總兵黄色棄城遁遂拔中前所俘千餘人先後獲鎗礟駝馬牛羊金銀等物無算中前所城城西南一百六十五里明宣徳三年指揮葉興建置前屯千戸所於此週圍三里八步髙三丈門三東曰定逹西曰永望南無字池深一丈廣二丈週圍四里三百歩本朝康熙二十九年設佐領驍騎校駐防乾隆四十三年奉㫖重修十九年皇上東巡有御製中前衛詩四十八年有載御製中後所中前所詩俱恭天章門寕逺州界内厯代舊有城址南古城城西三十五里週圍二百十六步門一建置年月無考海防五城城南二里二百四十步週圍一百九十八步門一其二在城南四里半週圍一百九十八步門一其三在城南五里週圍一里一百步門一其四在城南六里二百八十八步週圍一百九十八步門一其五在城南九里一百八步週圍一百五十八步門一以上五城皆明太監髙起潛請建儲海運糧石於此今俱廢城圮曹莊驛城城西南十二里週圍一里一百二步門一明時設驛於此并築城防衛今裁中右所城城西南三十里即沙後所城明宣徳三年建週圍三里七十二步門三東曰永和南曰南薰西曰右定今城圮池淤東闗驛城城西南六十里週圍一里二百五十二步門一明時設驛於此并築城防衛今裁海驛南曰三里橋村北曰望甸村又西南曰團河屯沙河所城城西南一百里週圍一里二百二十六步門一亦曰沙河驛明置驛於此今廢皇上東城圮乾隆四十三年巡過此有御製仍駐沙河所詩恭載天章門前屯衛所城西南一百三十里本唐時瑞州地遼改來州金復舊元因之明洪武己夘都指揮曹毅因舊址修築土城週圍五里三十步髙三丈五尺宣徳正統間偹禦畢恭等前後甃砌門三東曰崇禮西曰武寕南曰迎恩池深一丈濶二丈週圍六里二百步今城圯池淤城西北曰平山營城東曰髙兒營髙嶺驛城城西南一百五十里週圍一里七十八步門一明時設驛於此并築城防衛今裁北古城城西北三十里週圍一里一百二十步門四建置年月無考寕逺州界内諸堡雙樹舖堡城東十八里週圍二里門二楊安堡城西十二里週圍一里門一團山堡城西三十里週圍一里七十二步門一仙靈寺堡城西四十里週圍一里門一黒莊窠堡城西五十里週圍二百八十八步門一錦川堡城西六十五里週圍一里門一劉彦章堡城西七十里週圍一里門一三道溝堡城西八十五里週圍三百二十八步門一髙臺堡城西八十五里週圍一里四十二步門一瑞昌堡城西一百五里週圍三百三十步門一平川營堡城西一百二十里週圍三百五十二步門一三山營堡城西一百三十七步週圍二百三十二步門一背隂嶂堡城西一百四十八里週圍三百五十二步門一鎮邉堡城北十八里週圍一里門一俗名寨兒山堡鹽塲堡城西南二十五里週圍一百二十四步我太祖髙皇帝辛酉年征明撫降之今設汛焉曲尺河堡城西南四十八里週圍二里四十四步門一髙兒舖堡城西南一百十五里週圍一里二十二步門二東曰寅和西曰徯膏灰山堡城東北二十里週圍一里三十六步門一興水縣堡城西北十八里週圍一里十四步門一南闗廂三百八十步正安堡城西北二十里週圍一里二十步俗名白塔峪我太祖髙皇帝壬戌年征明撫降之汛以上諸城堡皆寕逺駐防分地寕逺縣縣城即明廣寕中左右三衛地金時置廣寕府元為廣寕路明洪武間指揮王雄因舊址修築都督劉真甃砌永樂間總兵劉江増展東南闗𢎞治間備禦胡忠展西隅正徳間備禦李溱展南闗週圍五百四十六丈池深一丈五尺廣二丈週圍十一里四十五步後展新城週圍十七里門六東曰永安南曰迎恩西曰拱鎮北曰靖逺東南曰泰安其西南一門土塞角樓四座西曰瞻秀北曰鎮朔東南曰柔逺西南曰望京鐘樓在大市東街鼓樓在大市北街嘉靖丁酉都御史任洛總兵馬永重修今按城週圍十里二百八十步髙三丈五尺厚一丈五尺南闗廂三面週圍三里二百二十步門三東曰宣化南曰迎恩西曰振武内城與闗廂共十四里二百四十步乾隆四十三年奉㫖重修皇上東謹案乾隆十九年四十三年四十八年巡皆有御製廣寕道中詩並廣寕詠熊廷弼王化貞事詩恭載天章門事蹟謹稽實録天命七年春正月太祖留族弟鐸弼貝和齊及額駙蘇巴海統兵守遼陽親率貝勒大臣統師征明乙夘次遼河之東昌堡丙辰寅刻大軍起營辰刻渡遼河明防河兵見我軍勢不可當遂遁走我軍前隊精鋭追擊二十里外至西平堡乃止申刻大軍繼至圍之丁巳招其城守副將羅一貴降不從辰刻布梯楯攻其城四面兵皆潰午刻克之一貴及兵萬人俱殱焉尚未收軍偵者馳告廣寕城兵至我軍迎擊未及成列明總兵劉渠祁秉忠李秉誠副將劉徴鮑承先叅將黒雲鶴麻承宗祖大夀逰擊羅萬言李茂春張明先等引兵三萬乗機急戰我兵不暇布陣即飛馳突入奮射衝擊明兵力不能支我軍乗勝追擊斬殺無算至平洋橋堡劉渠祁秉忠及劉徴黒雲鶴李茂春張明先戰死全軍盡沒惟李秉誠鮑承先祖大夀羅萬言遁去㑹暮還軍太祖駐蹕西平堡明敗兵入廣寕城明經畧熊廷弼巡撫王化貞知西平堡己失援兵盡殪遂與監軍道髙出通判萬有孚等棄城入山海闗巡道髙邦佐奔至杏山驛自縊死其廣寕守門逰擊孫得功守備黄進千總郎紹貞陸國志等遣七人來乞降賜以銀及信牌遣還戊午西興堡備禦朱世勲遣中軍王志髙乞降亦賜以銀及信牌遣還是日論諸將士功以所俘獲分别賞賚餘者給散衆軍己未大軍起行赴廣寕有我國人石天柱者前投明為千總至是偕秀才郭肇基出迎曰守城官吏皆遁我等已守禁門矣太祖賜以所乗鞍馬及令旗一又正安堡千總來降賜以信牌二並遣還庚申大軍行至廣寕城東三里許之望昌岡城中比户焚香紳士庶民備乗輿設鼓樂執旗張葢俯伏迎謁未刻入城駐蹕巡撫公廨明逰擊羅萬言前逃入山至是來降其平洋橋守堡閔雲龍西興堡備禦朱世勲錦州都司陳尚智鐡塲守堡俞鴻漸大淩河逰擊何世延錦安守堡鄭登右屯衛備禦黄宗魯團山守堡崔盡忠鎮寕守堡李詩鎮逺守堡徐鎮静鎮安守堡鄭維翰鎮静堡叅將劉世勲守堡臧國祚鎮邉守堡周元勲大清堡逰擊閻印大康守堡王國泰鎮武都司金礪劉式章李維龍王有功及閭陽驛十三山站小凌河松山杏山牽馬嶺正安錦昌中安大寕太平大安大定大茂大勝大興盤山驛四十餘城之官各率所屬兵民來降太祖駐軍十日從廣寕城移軍向山海闗明經畧熊廷弼盡焚沿途村堡廬舍而走大軍至中左所乃還大貝勒代善與四貝勒率兵往義州移其戸口至則閉門以拒招諭不從遂攻克之斬其駐守兵三千太祖還駐廣寕二月癸未駕還遼陽留諸貝勒統兵守廣寕城以河西歸降各城堡官民移之河東時有西平堡遁去副將鮑承先亦來歸白土厰城城北六十里週圍一里一百二十步門一即白土厰邉門詳見闗郵卷巨流河城城東北二百三十里本朝崇徳元年建週圍二里門三南曰拱固西曰鎮西北曰鎮邊康熙二十年置廵檢司於此乾隆四十二年移駐鳯凰城四十三年奉㫖重修曰城南有古開城西郭家堡新民屯廣寕縣界内歴代舊有城池髙麗坂城城東三十三里週圍一里今圮羊膓河城城東四十五里週圍一里今圮小黒山城城東六十里週圍二里六十八步門一城之北曰團臺項家屯常屯大黒山城城東七十里週圍二里一百五十步門一城南曰十里牧盤山驛城城東南五十里週圍二百六十步門一明時置驛於此今裁鐘秀古城城西南三里週圍二里二十步金時縣治明時置千戸所於此餘詳古蹟郡縣注閭陽驛城城西南三十里週圍二里五十步南北二門金時縣治明時置驛於此今載驛東曰鄂陀堡望山堡北曰陳興堡臺西北曰寕東堡髙城在閭陽驛城西相傳為唐太宗征髙麗時屯兵處今圮廣寕縣界内諸堡土堡子城東三十里週圍一里中安堡城東三十里週圍一里七十二步門一白旗堡城東一百六十里週圍一里本朝康熙二十九年設佐領驍騎校駐防乾隆十七年移前屯衛巡檢駐此穿心堡城東六十三里週圍一里馬市堡城北二十里週圍一里一百六十步門一鎮東堡城北四十里週圍二里一百二十步門一我太祖髙皇帝辛酉年征明撫降之今設汛焉髙平堡城東南九十里週圍一里八十二步東西二門堡南曰鎮武堡北曰魏家城平洋橋堡城東南一百二十里週圍二百七十九步門一我太祖髙皇帝壬戌年征明撫降之今設汛焉勒堡之西曰羊圍子屯南曰徐家屯北曰達鄂謨傅家莊堡城東南一百二十里週圍三百三十一步門一沙嶺堡城東南一百五十里週圍二里門一村堡西南曰天成堡杜家臺村光衮臺鐡塲堡城東南一百六十里週圍二里八十步東西二門明時設鐵塲百戸所於此今設汛焉北鎮堡城西南三十里週圍一里一百二十六步南北二門中安堡城東北三十里週圍二里三百二十步門一我太祖髙皇帝壬戌年征明撫降之今設凡焉鎮安堡城東北五十里週圍一里二百八十五里門一我太祖髙皇帝壬戌年征明撫降之堡北曰蕎麦冲紅石槽長永堡城西北醫巫閭山之北週圍一里有竒門一我太祖髙皇帝辛酉年征明撫降之汛以上諸城堡皆廣寕駐防分地義州州城本明義州及廣寕後屯二衛地遼時為宜州崇義軍金改義州統𢎞政開義同昌三縣元因之明改衛洪武二十二年指揮何浩仍舊修築永樂宣徳間都指揮楚勇甃砌週圍九里十步髙三丈門四東曰熙春南曰永清西曰慶豐北曰安泰池深一丈五尺廣三丈八尺週圍九里一百六十六步本朝初屬廣寕康熙十六年陸續修葺置城守及巡檢司雍正十二年設義州乾隆四十三年奉㫖重修義州界内厯代舊有城址馬嶺驛城城東四十五里週圍一里門一明時築城置驛於此今裁新站城城東四十里週圍一里一百四十二步其建自何代無考古饒慶城城西五十里金置週圍一里今圮俗訛為饒慶縣城詳見古蹟三角城城東南五十里週圍二百五十五步門一營城城東北二十里週圍一里王半城城東北三十里週圍一里門一以上三城建自何代無考大棘城城西北古顓頊之墟慕容廆曽都此今無考義州界内諸堡永寧舖堡城東二十里週圍二里一百八十步門徳勝堡城西十五里週圍一里大康堡城西二十里週圍二里門一我太祖髙皇帝壬戌年征明撫降之今設汛焉太平堡城西二十餘里週圍一里一百八十步門一我太祖髙皇帝壬戌年征明撫降之今設汛焉齊家堡城南四十五里景家堡城東南二十里週圍一里一百八十步石佛堡城東南四十里破城子堡城西南二十里週圍五里八塔堡城西南二十五里週圍一里一百八十步團山堡城西南三十里週圍二里門一我太祖髙皇帝壬戌年征明撫降之今設汛焉大安堡城西南三十里週圍一里一百八十歩門一我太祖髙皇帝壬戌年征明撫降之今設汛焉孔堡之西北為二佛廟近九官臺邉門又西為家房身李三屯接松嶺子邉門孫凌堡城西南三十里週圍一里門一大定堡城西南四十里週圍二里門一我太祖髙皇帝壬戌年征明撫降之今設汛焉堡之南曰老邉屯西南曰張綱屯正義堡城東北十八里存一碑堡之北曰趙家屯大寜堡城東北三十里週圍一里一百八十步我太祖髙皇帝壬戌年征明撫降之今設汛焉堡之東為望民屯望賔屯大清堡城東北五十里週圍二里三十步門一我太祖髙皇帝壬戊年征明撫降之今設汛焉大静堡城東北六十里週圍二里門一鎮彞堡城東北六十里週圍三里一百八十步門一瓦子峪堡城東北六十五里週圍二里地以上諸城堡皆義州駐防分汛欽定盛京通志卷三十
