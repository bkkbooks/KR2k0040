body:
  text: 歴朝人物六元欽定四庫全書欽定盛京通志卷六十三厯朝人物六元耶律楚材字晉卿遼東丹王托雲八世孫金尚書右丞履之子也身長八尺美髯宏聲天資英邁博通天文地理厯律術數及釋老醫卜之説金貞祐三年為中都行省員外郎中都陷太祖召見處之左右從征西域製庚午元厯上之太祖毎征必命之卜多竒騐嘗謂太宗曰此人天賜我家爾後軍國庻政當悉委之甲申兵次東印渡駐鐡門闗侍衛見一獸如鹿而馬尾其色緑作人言曰汝主宜早還太祖以問楚材對曰此瑞獸也其名角端解四方語好生惡殺今大軍征西已四年矣上天降符以告陛下願承天心宥此數國人命太祖遂還太宗即位楚材奏諸州縣長吏専理民事萬户府專總軍政課税専掌錢榖各不相統攝著為令權貴不得志遂為舒穆嚕軒逹布等搆陷而太宗獨察其誣及軒逹布獲罪太祖命楚材鞫治楚材請寛之太宗私謂近侍曰楚材不較私仇真長者汝曹當效之太宗至雲中諸路所貢課額銀幣及倉廪物料文簿具陳于外悉符楚材原奏之數笑曰卿何使錢幣流入至此即日授以中書省印事無鉅細悉以委之時民多誤觸禁網國法無赦令楚材議請肆宥條便宜十八事太宗悉從之金汴京將下大將蘇布特請屠汴楚材馳見太宗曰得地無民將焉用之且弓矢甲仗金玉等匠及官民富貴之家皆聚此城殺之則一無所得是徒勞也於是百四十餘萬户皆得保全又求得孔子五十一代孫襲封衍聖公付以廟地及楚材奏定賦税朝臣皆謂太輕楚材曰將來必有以利進者則以為重矣楚材又奏制器者必用良工守成者必用儒臣請校試之乃命以經義詞賦論分為三科儒人被俘為奴者亦令就試其主匿勿遣者死得士凡四千三百人免為奴者四之一楚材又請一衡量立鈔法定均輸庶政畧備民稍蘇息太宗嗜酒楚材屢諫不聼乃持酒槽鐡口以獻曰此鐡為酒所蝕尚致如此而况五臟太宗悟賞以金帛太宗疾篤脉已絶皇后不知所為召楚材問之對曰今任使非人賣官鬻獄囚繫非辜者多宜赦天下后亟欲行之楚材曰非君命不可頃之太宗少蘇后以為言乃首肯赦發而脉生疾愈楚材以太乙數推之不宜田獵為左右慫惥遂出獵尋崩于行在皇后稱制温都爾哈瑪爾専政用事有㫖凡温都爾哈瑪爾所建白令史不為書者斷其手楚材曰國之典故悉委老臣令史何與焉事若合理自當奉行如有不可死且不避况斷手乎后不悦楚材憤悒而卒時有譛言天下貢賦半入其家者后命近臣覆視之惟琴玩十餘及古今書畫金石遺文數千卷而已楚材為相二十年正色立朝不避權勢每陳國家利害生民休戚辭色懇切太宗嘗曰汝又欲為百姓哭耶楚材毎言興一利不若除一害生一事不若減一事人以為名言至順初贈經國議制寅亮佐運功臣太師上柱國追封廣寕王諡文正所著湛然居士集十四卷國語托雲凖頭也原作突欲舒穆嚕八旗姓軒逹布國語拈香也原作石抹咸得卜蒙古語蘇布特珍珠也原作速不壹温都爾蒙古語解見蒙國江山川巻哈瑪爾鼻也原作奥都剌合蠻今俱譯改王珣字君實本耶律氏金末避難遼西家義州開義更姓王武力絶人善騎射曽遇道士謂曰君相竒甚他日因一青馬貴居嵗餘客有市青馬者珣喜以道士言騐倍價買之後乗以戰進退周旋悉如意又嘗得古刀於凌水有驚輒鳴故所向皆建竒功初以鄉兵歸穆呼哩援元帥兼領義川二州軍事及張致僣號錦州珣以全軍㑹穆呼哩兵復開義擒揚伯傑等錦州破穆呼哩悉以付珣珣但誅致家餘皆釋之以功賜金虎符充兵馬都元帥鎮遼東兼義川等州莭度使珣貎黒人呼為哈喇元帥哈喇中國言黒也甲申春卒珣為政簡易賞罰明信誅強撫弱毫髪無徇穆呼哩見名宦巻原作木華藜今譯改何實字誠卿北京人父道忠仕金為北京留守實少孤依叔父居氣節不凡家人常入卧内見青蛇蜿蜒衣被中駭視之乃實也及長多雄畧驍勇善騎射通諸國譯語錦州張致叛謀于實實叱拒之籍户口來歸穆呼哩與論兵事竒變百出拊髀欣躍大加稱賞遂引見太祖選充前鋒時張致復據錦州實與賊遇于神水縣挺身陷陣以功為帳前軍馬都督彈壓迨取燕南齊西山右等處畧地攻城所向克㨗累功至元帥左監軍癸未破走武仙於邢州士民安堵戍於邢多善政邢民敬如神明太宗時賜世爵更賜白貂帽貂衣弓矢等件以疾遣歸劉世英其先范陽人後遷遼陽川州初穆呼哩經畧遼東世英𨽻麾下以功充行軍副總兵庚辰平陽諸郡被兵之餘民物空竭世英言于穆呼哩曰自古建國以民為本今殺掠殆盡異日我師復來孰給轉輸収存恤亡此其時也穆呼哩善之遂奏授絳州節度使兼行帥事卒弟亨安嗣其職累立戰功賜金虎符稱為驍將征巴蜀進圍成都有喬長官與亨安争功未㡬攻城喬為砲所傷亨安負之以出喬感愧亨安攻金伐宋出竒制勝從軍十年所獲金帛悉推與將佐故士卒咸樂為用焉舒穆嚕額森遼人祖庫哷勒誓不食金禄父托里布扎爾亦不仕額森年十嵗問其父宗國之所以亡即大憤及長勇力過人多智畧聞太祖起朔方匹馬來歸首言東京為金開基之地蕩其本根中原可傳檄而定太祖悦命從穆呼哩取東京額森為先鋒諜知金人新易留守将至獨與數騎邀而殺之懷其所受誥命至東京入據府中夜下令易置其将佐部伍三日穆呼哩至不費一矢得地數千里定城邑三十二移師圍北京城破將屠之額森以上聞得赦進上将軍以御史大夫提控諸路元帥府事舉遼水之西灤水之東悉以付之後從穆呼哩攻蠡州先登中石歿舒穆嚕八旗姓額森解見名宦巻原作石抹也先蒙古語庫哷勒生銅也原作庫烈兒托里蒙古語觧見黒龍江山川巻布札爾汚穢也原作脱羅畢察兒今俱譯改田雄字毅英北京人㓜孤能樹立以驍勇善射知名從穆呼哩征興中廣寕諸郡定府縣二十有九屢著戰功從太宗攻西和興元等州功尤最賜金符召為御前先鋒招納河南降附民皆安堵而别部将縱兵擄掠雄力為救䕶至出已財與之民免于害癸巳鎮撫陜西總管京兆等路時闗中苦兵革郡縣蕭然雄披荆棘立官府招徠未降者教民力田京兆大治追封西秦王李守賢字才叔大寕義州人初與兄庭植歸穆呼哩入朝太祖命庭植為右副元帥守賢援錦州臨海軍節度觀察使遷河東南路兵馬都總兵鎮河東太宗南伐道平陽見田野不治以問守賢曰民貧窘乏耕具詔給牛萬頭仍徙闗中人民墾地河東時河中未下守賢請自北面鑿城先登如其言城果下由蒲津南濟潼闗破趙雄兵時㑹師圍汴守賢留屯嵩汝金兵十萬保少室山守賢以三千破之攻河南降其渠帥洛西遂定髙宣遼陽人太宗元年詔宣為元帥賜金符從睿宗攻大名宣進曰奉命出師伐罪弔民願勿嗜殺人以稱上意睿宗召元帥穆納諭之下令軍中如宣言及城破兵不刃血民心悦服四年從破金兵三峯山降宣者三百餘户籍以獻以宣為鷹坊都總管賜金符仍令子孫世其職卒皇慶二年贈宣力功臣銀青榮禄大夫大司徒封營國公諡簡僖索倫語穆納水鑹也原作木乃今譯改王榮祖字敬先珣長子性沉厚勇力絶人襲崇義軍節度使入朝上聞其勇選三力士與摶皆應手而倒討金平章政事葛布格所至有功授北京等路征行萬户换金虎符伐髙麗圍王京髙麗奉表入貢擒布希萬努再伐髙麗破十餘城降天龍諸堡皆禁暴掠民咸悦服移鎮髙麗募民戍屯闢地千里中統元年詣闕世祖慰之曰卿父子勤勞于國誠節如一授沿邊招討使兼北京等路征行萬户還鎮卒葛布根蒙古語布格巫也原作葛不哥布希萬努見名宦巻原作蒲鮮萬奴今俱譯改趙良弼字輔之女直人父慤明敏多智畧舉進士世祖在潛邸召對稱㫖擢邢州幕長己未世祖南征召參議元帥事兼江淮安撫使良弼親執桴鼓為士卒先五戰皆㨗所至禁焚廬舍殺降民宣布徳意人皆安堵及商議陜西省事蜀人費寅以私憾誣亷希憲商挺在京兆有異志引良弼為徴帝詰良弼良弼泣曰二臣忠良願剖臣心以明之帝切責良弼至欲斷其舌良弼誓死不變帝意解費寅卒以反誅至元九年奉使日本至金津島金津守延入板屋太宰府官陳兵四山脅取國書至于再三良弼曰不見汝國王寕持我首去書不可得也日本知不可屈遂遣使入覲良弼復命帝曰卿可謂不辱矣後帝將討日本三問良弼皆力言勿擊便從之十一年同僉樞密院事屢以疾辭得㫖居懷孟良弼有地三千畝乃析為二六與懷三四與孟州皆永𨽻廟學以贍生徒嘗言人情之難制者怒為甚必克已然後可以制怒必順理然後可以忘怒能忍所難忍容所難容事斯濟矣卒年七十贈推忠翊運功臣太保儀同三司追封韓國公諡文正伊竒哩女直人㓜𨽻悟能記誦及長以孝友聞事世祖于潛邸備宿衛至元七年命為監戰以所領軍圍襄陽一時名将索多劉國傑李庭等皆𨽻麾下攻樊城率衆先登受賜悉分與將士從巴延南伐以兵破宋將夏貴於防羅洑加定逺大将軍及攻常州安吉皆有功十三年宋降巴延命伊竒哩監守其宫號令嚴肅秋毫無犯拜鎮國上將軍浙東宣慰使鎮守紹興國語伊竒哩一連也原作謁只里蒙古語索多大領也原作唆都巴延解見疆域形勝巻原作伯顔今俱譯改趙炳字彦明惠州人㓜失怙恃鞠于從兄嵗饑遇盗將殺其兄炳年十二泣代死盗驚異舍去甫弱冠侍世祖于潛邸以恪勤蒙眷署為州長中統元年判北京宣撫司北京控制遼東番夷雜處號稱難治炳至皆安定濟南妖人作亂炳為濟南總管止罪首惡餘黨解散復遷遼東提刑按察使遼人聞其至豪猾屏跡至元九年授京兆路總管兼府尹皇子安西王開府于秦時多納炳言免逋捐賦秦民大悦王薨炳被㫖入見具陳民間利害因言王薨之後運使郭琮郎中郭叔雲弄權不法帝即令乘傳偕敕使往按至則琮等假嗣王㫖収炳妻孥徙炳等于平凉北崆峒山炳子仁榮訴于上上馳使脱炳琮等醉使者以酒遣人毒炳于獄其夜星隕有聲如雷帝聞之撫脾嘆曰失我良臣俄械琮等至親鞫得其實命仁榮手刃琮叔雲于東城詔雪炳寃贈中書左丞諡忠愍髙天錫宣子事世祖于潛邸甚見親幸中統二年授父官尋改燕京諸路總管按察司副使天錫與丞相言曰農桑衣食之本不務本則衣食不給教化不興古之王政莫先于此願留意焉丞相以聞遂命立司農司以天錫為中都山北道廵行勸農使遷司農少卿進兵部尚書卒後贈推忠保義功臣太師儀同三司上柱國追封營國公諡莊懿子諒後亦官至兵部尚書卒諡宣靖劉國傑字國寳女直人姓烏庫哩後改劉氏國傑貌魁雄善騎射膽力過人從巴延攻宋襄樊及南征破張世傑兵有功加懷逺大將軍賜號巴圖巴圖者華言勇敢之稱也至元二十三年平湖南廣東冦盜二十五年平湖南盜詹一仔餘衆悉降或請盡阬之國傑曰多殺且不可况殺降乎乃相地為三屯遷其衆屯守以備賊後皆為良民二十七年江西盜起國傑下令徃擊賊諸將皆曰此他省盜我勿與聞國傑曰縱敵生患患将難圖豈可以彼此言耶遂進兵連破之又破永州盗李末子千七及上思州黄勝許取賊巢地為屯田募慶逺諸獞人耕之以為兩江蔽障上遣使即軍中賜以玉帶元貞元年加湖廣行省平章政事經營茶陵衡彬桂陽之地東盡交廣西亘黔中皆設屯戍守之盜賊遂息大徳五年羅鬼女子蛇節反賊多健馬官兵戰失利詔國傑討之國傑令人各持一盾布釘其上俟陣合棄盾偽遁賊果逐之馬遇盾皆倒遂大敗賊擒斬蛇節臺臣言國傑在軍中每以家財賞士帝命倍償之國傑常言吾為國宣力視死如歸雖身棄草野不恨何必馬革裏屍還𦵏哉平日推誠待士故戰則有功江西湖廣廣東雲貴諸盗以次削平卒贈推忠効力定逺功臣光禄司徒柱國封齊國公諡武宣烏庫哩原作烏古倫巴圖蒙古語解見疆域形勝卷原作覇都今俱譯改張庭珍字國寳臨潢全州人父楫仕金後來歸授為北京都轉運使因家北京憲宗即位以庭珍為筆且齊時髙麗徙江華島命庭珍徃問其故其王言大軍嵗入侵掠避而走險不得已也因厚賂庭珍却之歸以狀聞帝為禁戍兵無擅入其地髙麗遂安世祖即位將北伐以庭珍熟知西京入漢南路授同僉土蕃經畧使至元六年安南入貢不時以庭珍為安南王逹嚕噶齊由大理至安南世子光炳立受詔庭珍反覆責之光炳慚憤使衛兵露刄環立庭珍坦卧乃皆服遂入貢及從伐宋累功至南京路總管兼開封府尹有控鶴軍士賃大宅聚居縱横街陌庭珍察其必為盗急捕之果然索其黨俱殺之民以為神河決太康漂溺千里庭珍括船縳筏載糧糗四出救之全活甚衆俄卒于官庭珍性清慎丞相巴延嘗語人曰諸將渡江無不荒貪惟我與國寳始終自守聞者以為知言蒙古語筆且齊寫字人也原作必闍赤逹嚕噶齊解見名宦巻原作逹魯花赤今俱譯改張庭瑞字天表庭珍之弟㓜以功業自許兵法地志星厯卜筮無不推究以宿衛從憲宗伐蜀為先鋒中統二年戍守青居築城虎嘯山宋將夏貴以重兵圍之庭瑞堅守以全城有功及圍重慶舟楫兵仗糧儲皆倚以辦蜀平陞諸蠻夷部宣慰司碉門羌入市爭價殺人被繫羌酋謀刼之已㫁䋲橋魚通司來告急左丞汪惟正問計庭瑞曰羌俗以鬬殺為勇今如蜂毒一人而即以門牆之寇待之不可宜遣使往諭禍福彼自回矣惟正即以庭瑞為使果不勞兵而罷都掌蠻叛命庭瑞討之蠻聮松枝為牌自蔽庭瑞所射矢出其牌半簳蠻驚曰何用弓矢如此之力即請服授叙州等處蠻夷部宣撫使改潭州路總管耶律有尚字伯強遼東丹王十世孫有尚資識絶人篤志好學受業許衡邃于性理而尤以誠為本人莫不服為有道君子至元十年衡還鄉里朝廷乃以有尚為助教嗣領其學事久之出知薊州以寛簡得民裕宗在東宫召為詹事長史復除國子監司業時學館未建師弟子皆寓居民屋有尚屢以為言二十四年朝廷乃大起學舍始立國子監及監官而増廣弟子員于是有尚陞國子祭酒儒風為之丕振尋以親老辭職歸大徳時以安車召之復起為昭文館大學士兼國子祭酒有尚前後五居國學其立教以義理為本而省察必真以恭敬為先而踐履必端身為師表數十年海内宗之猶昔之宗衡也年老致仕朝廷賜楮幣七千緍于其家卒年八十六諡文正鄂屯希愷女直人父保和以元帥領保定順徳諸道農事凡闢田二十餘萬畝致仕卒希凱襲勸農事郡縣水旱力請蠲租及調知冀州變健訟之俗奪蒙古所侵民田歸于民陞河中知府秩滿歸應調以不見權臣阿哈瑪特降知景州卾屯解見選舉巻原作奥敦蒙古語阿哈瑪特長子也原作阿合馬今俱譯改李希賢遼東人延祐間為臨武令爱民禮士獄訟清明常語人曰君子學道則愛人自然生明能㫁去任後邑人立石頌徳題其額曰學愛逹實布哈髙天賜之孫諒子成宗命世其祖父官以居䘮辭延祐四年帝謂之曰汝祖嘗為司農今復以授汝遂遷榮禄大夫大司農英宗居東宫達實布哈撰前代嘉言善行名曰承華事畧並畫豳風圖以進帝覧而奨諭之曰汝能輔太子以正朕甚嘉之命置圖書東宫俾太子時時親省逹實解見選舉巻布哈解見名宦卷原作塔失不花今譯改王克敬字叔能大寧人㓜竒頴丞相鄂勒哲一見許為令器朔土習尚少文克敬獨孜孜為儒者事既仕累官江浙行省左右司都事時番陽大饑總管王都中出廪粟賑之行省欲罪其擅發克敬曰番陽去此千里比待命民且死彼為仁而吾屬顧為不仁乎都中因得免拜監察御史遷左司都事時英宗勵精圖治丞相拜珠請更定前政不便者㑹議中書堂克敬首言江南包銀民貧有不能輸者有司責之役户當罷之兩浙煎塩户牢盆之役其重者尤害民當免其他役從之泰定中出為紹興路總管有惠政尋由參知政事行省遼陽俄除江南行臺治書侍御史又遷淮東亷訪使以正綱紀為己任不縱貪墨不阿宗戚聲譽益著入為吏部尚書元統初為江浙行省参政年五十九即請老謂人曰穴趾而峻墉必危再實之木必傷其根無功徳而忝富貴何以異此卒封梁郡王諡文肅蒙古語鄂勒哲夀也原作完澤拜珠往也原作拜住今俱譯改崔敬字伯恭大寕惠州人通刑名法律之學天厯初累官至中書省椽至元六年拜監察御史時既毁文宗廟主又削文宗后皇太后之號徙于東安州而放其子雅克特古斯于髙麗敬上疏請迎歸太后太子以全母子之情盡骨肉之義又上疏諌天子巡幸上都宜御内殿其畧以為當與宰臣謀治道經筵進講究古今盛衰之由時帝數以厯代珍寳分賜近侍敬切諫以恩不可濫乞追回所賜以待有功是年出僉山北亷訪司事至正初遷河南又遷江東所至抑豪強惠困窮洗寃滯興學勸農百廢具舉十一年遷同知大都路總督府事直沽河淤數年委敬治浚之不三月告成咸服其能十五年為濟寧屯田使立營屯種其法井然十七年分省陵州時盗據齊魯敬兼領兵刑户工四部事供給諸軍事無不集又命王恪等諭田豐李秉彛悔過自新山東郡邑之復敬䇿居多卒諡忠毅雅克蒙古語解見黒龍江山川巻特穆爾解見名宦卷原作燕帖木兒今譯改欽定盛京通志巻六十三
