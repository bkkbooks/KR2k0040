府又為龍泉府是也今遼史既謂咸州本高麗銅山地渤海置銅山郡地在龍泉府南夫云渤海銅山已不得厠入扶餘况云龍泉府南而全遼志乃云開原城北可乎即如松漠紀聞云咸州南至瀋州二百十里御寨行程録云瀋州樂郊館北至咸州咸平館二百二十里今自盛京北至開原竇二百餘里明言從餘也若謂咸平盛京北行抵開原南界其里得二百必越過開原而在其隅之東北當又不知其相去幾里乃僅云二百耶且於文亦不得云北至開原而止也據遼史銅山之説咸平於古當在扶餘越喜二國之交渤海龍泉府南今鐵嶺地為似作䝉古語浩里例也原郝里今譯改興州在鐵嶺縣南六十里遼史地理志興州中興軍渤海置州治常安縣金史地理志大定二十九年改為挹婁縣属瀋州北盟㑹編第二十四程至梁魚務過遼河二十七程至興州許亢宗奉使行程録自瀋州七十里至興州遼太祖破渤海建為東京路自此所至居民稍盛元時廢明時改為懿路城周三里有奇永樂五年修築置左中二千戸所於此今為懿路站並詳城池卷吉按遼志興州本漢海宜縣地渤海置州領盛蒜山鐵山三縣皆廢在東京西南三百里金志挹婁縣遼舊興州常安縣遼嘗置定理府於此本挹婁故地遼金二志互異當從金志又遼史中興軍金史作興中軍亦異貴徳州在鐵嶺縣東南遼史地理志貴徳州寧逺軍本漢囊平縣地漢公孫度所據太宗時以所俘漢民置聖宗建貴徳軍又置貴徳縣為州治金廢軍存州治縣元一統志貴徳州今廢為巡檢司公孫廢城在貴徳州漢末公孫度為遼東太守治㐮平傳子至孫據有其地遺址尚存又大寳城亦在貴徳州方輿紀要貴徳在瀋陽衛東八十里又奉徳廢縣在貴徳州東遼志属貴徳州金廢信州在鐵嶺縣東北界遼史地理志本越喜故地渤海置懷逺府治懐福縣聖宗開泰七年以地鄰高麗置信州彰聖軍又改置武昌縣為州治金為信州彰信軍元時州縣俱廢元一統志信州在黄龍府西治武昌縣金皇統三年置志按信州自是古越喜地在今開原縣南全遼云在開原東北三百十里非是又按科爾沁左翼東南三百八十里有故城土人呼為信州城但以地里考之鐵嶺東北遼時信州境也故仍附誌焉雙城故縣在鐵嶺縣西遼史地理志雙州保安軍本挹婁故地渤海置安定軍久廢烏魯斯王從太宗南征以所俘鎮定二州之民建城置州冶雙城縣全遼志雙城縣在鐵嶺城西六十里考鐵嶺實為挹婁國地今挹婁城在其南境雙州在鐵嶺城西知亦挹婁故地也烏魯斯䝉古語解見人物卷原作漚里僧今譯改復州永康故縣今復州治遼史地理志復州懷徳軍興宗置統縣二永寧徳勝金大定七年更名永康元廢明置衛於此元一統志廢復州本遼遷民縣属黄龍府後置復州號永寧軍節度改縣曰永寧復又更為永康省豐水扶羅入焉金因之地肥沃有耕稼之利明一統志復州衛在都司城南二百四十里又舊志云永寧監城在復州城北五十里明初𨽻苑馬寺嘉靖十四年苑馬寺卿楊最以石甃之神宗五年重修並詳城池卷歸勝故縣在復州城北六十里有土堡遼史地理志歸州太祖平渤海以降戸置後廢統和二十九年伐高麗以所俘渤海戸復置又按復州城南六十里有横山縣建置無考寧海縣化成故縣今寧海縣治遼史地理志蘇州安復軍本高麗南蘇地興宗置兼置來蘇縣為州治金廢州皇統三年改置化成縣𨽻復州貞祐四年復陞為金州元廢明一統志唐置金州至元廢今置金州衛於此又有懐化廢縣在縣東遼置属金州金廢松漠紀聞東京有蘇扶等州與中國登州青州相直東丹王封于此謂之人皇王不得立自蘇乘筏浮海歸唐鴨江行部誌自永康次順化營中途望西南兩山巍然浮于海上訪諸野老云此蘇州闗也遼之蘇州今為化成縣闗禁設自有遼以其南來舟楫亦出此途不能登岸想隋唐之伐高麗兵糧戰艦亦自此來南去百里有山曰鐵山常屯甲士七千人以防海路按元史有金復屯田萬戸府是元亦未嘗廢也又按遼志謂蘇州本高麗南蘇地漢志高句麗縣有南蘇水或城因此得名今以地里考之南蘇州不應在寧海界内恐不免附㑹哈斯罕路金史本紀太宗天㑹二年命南路軍帥楝摩以甲士千人益哈斯罕路以備高麗七年徙哈斯罕路節度使治寧州置都統司明昌四年廢有化成闗國言曰哈斯哈雅通考遼遷女真大姓于遼陽之南而著籍焉使不得與本國往來謂之哈斯罕又金史呼錫黙傳以哈斯罕歸太祖自言為始祖兄阿庫納之後北盟㑹編遼太祖遷女真大姓數千戸置遼陽之南使不得與本國相通名曰哈斯罕謂之熟女真自咸州東北分界入山谷至於粟末江中間所居𨽻咸州兵馬司許與本國往來非熟女真亦非生女真也自粟末之北寧江之東北處界外者則謂之生女真遼國沿邊置東京黄龍府兵馬都部署司咸州湯河兵馬司東北路統軍司分𨽻之謂之羈縻道隅按寧州遼属東京道縣一新安史雖不言方而闗曰化成則即為寧海境無疑曷哈斯罕國語解見闗郵卷原作合蘇欵又作蘇館哈斯哈雅䝉古語哈斯玉也哈雅牆也原作曷撒罕酉棟摩國語解見名宦卷原作誾母呼錫罕裙也原作胡十門阿庫納窮盡之盡也原作阿古迺今俱譯改岫巖城秀巖故縣在岫巗城東本名大寧鎮金明昌四年升為秀巖縣􅁗和四年廢為鎮貞祐四年復為縣元廢明設撫民通判駐此今為岫巖明一統志在都司東南三百里今葢平縣東二百四十里有新秀巖城其東十里又有舊秀巖城舊志新秀巖城在縣東一百六十八里舊秀巖城在新城東四里皆非今秀巖城地鳯凰城開州即今鳯凰城遼史地理志開州鎮國軍本濊貊地屬東京高麗為慶州渤海為東京龍原府都督慶鹽穆賀四州事故縣六曰龍原永安烏山壁谷熊山白楊皆廢叠石為城周圍二十里唐薛仁貴征高麗與其大將温沙門戰熊山擒善射者於石城即此遼太祖平渤海徙其民于大部落城遂廢聖宗伐新羅還周覽城基復加完葺開泰三年遷雙韓二州千餘戸實之號開封府開逺軍節度更名鎮國軍治開逺縣兼領鹽穆賀三州金廢全遼志開州城在遼陽城東三百六十里即今鳯凰山堡四面石崖峭壁東北二門城隨山鋪砌可容十萬衆唐太宗駐驆於此城今廢東按後漢書濊貊與高句麗沃沮南與辰韓接窮大海西至樂浪新唐書渤海以濊貊故地為東京曰龍原府亦曰柵城府領慶鹽穆賀四州又云龍原東南瀕海日本道也其地在今朝鮮東界考明成化中朝鮮使還遇掠鳯凰山下奏乞更開貢道於舊路南因築此城則今鳯凰城已非遼為開州渤海為龍原之舊矣古今建置不同特存其名耳不必膠柱而論也又舊志云鳯凰城在府東南四百二十里遼陽一百二十里四百二十减一百二十知城去遼陽果三百餘里也全遼志説合博索府在鳯凰城東金史地理志博索府路國初置統軍司天徳二年置總管府貞元元年與海蘭路總管並為尹兼本路兵馬都總管此路皆明安戸元史地理志元初以博索府廣寧府等作四路至元十七年以博索府属遼陽行省後廢博索府為巡檢司唐賈耽道里紀登州東北海行入鴨緑江口舟行百餘里又小航沂流三十里至泊汋口得渤海之境渡遼水五百里至安東都䕶府府故㐮平城也東南至平壤城八百里西南至建安城三百里故平郭縣也南至鴨緑江北泊汋城七百里故安平縣也明一統志博索府在遼東都司東四百七十里金置總管府元省汋按此為自營州陸行之路安平係西安平泊口泊汋城當即博索二字之轉音也唐貞觀二十二年薛萬徹伐高麗圍泊汋城而還即此据賈躭所紀城在鴨緑江北西南去鴨緑江入海處僅一百三十餘里元時所以割高麗之義州來属也漢志稱馬訾水由西安平入海焉訾即鴨緑江元一統志亦稱鴨緑江由博索府東南入海則博索之本于泊汋明矣九又按自遼陽城守東南至鳯凰城守界一百十里鳯凰城東南至義州界一百二十里為朝鮮界凡三百十里明志稱鳯凰城在遼東都司東南三百五十里博索府應在鳯凰城東一百餘里今博索原作婆速譯改來逺州在鳯凰城及岫巖東南界遼史地理志來逺城本熟女真地統和中伐高麗以燕軍驍猛置兩指揮建城防戌兵事属東京統軍司金史地理志來逺州舊來逺城本遼熟女真地大定二十二年升為軍後為州元一統志來逺城本熟女真地遼伐高麗於此建城先是高麗軍敗值冬雪彌旬不止人馬多斃軍會鴨緑江餘軍漂溺遼主隆緒次來逺界有防邊猛軍數十人遇而刼之逮間所從來開襟示其金製環甲衆軍驚散遼主至遼城收不在營中者誅之金升來逺軍欽定盛京通志卷一百
