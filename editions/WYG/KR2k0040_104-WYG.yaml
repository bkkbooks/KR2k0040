body:
  text: 古蹟一奉天府境内郡縣古蹟興京承徳縣遼陽州海城縣葢平縣開原縣鐵嶺縣復州寧海縣岫巖城鳯凰城欽定四庫全書欽定盛京通志卷一百古蹟一臣等謹案遼為有虞營州之域今錦州徒河故城相傳舜時已有之劉恕外紀周恵王三十三年齊桓公救燕破屠河即徒河也迨秦北築長城屬之遼東今寧逺有長城故址自漢以來置遼東西樂浪元菟諸郡則挹婁扶餘沃沮遼隊安市襄平無慮徒河諸蹟今皆可考唐太宗征髙麗遼金建都宫室官署之傳益彰簡冊甄而録之謹志古蹟第三十四欽定四庫全書欽定盛京通志卷一百古蹟一奉天府境内郡縣古蹟興京定理府在城西北舊址無考唐時渤海大氏建新唐書挹婁故地為定理府領定瀋二州金史地理志東京定理府刺史故挹婁國地遼史地理志瀋州挹婁縣遼嘗置定理府刺史于此本挹婁故地大定二十九年更名有范河清河按范河清河俱在今鐵嶺縣南遼定理府刺史之置及定州之廢史文闕畧不詳以金史參考之金之挹婁縣即唐時渤海之定理府遼為興京興遼軍則定理府舊址為地無疑界西北鐵嶺縣迤東南之又按瀋州新唐書誤瀋為潘今改正建州在城東舊址無考元一統志金上京之南曰建州明實録永樂二年置建州衛十年置建州在衛宣徳七年置建州右衛今按建州考之遼金地志在淶州定理之間為開原之南興京界内地乃我圖阿拉實明右衛也朝岐邠故壌而赫又按建州有二一在錦州邊外五代史遼徙晉帝太后於建州自遼陽更南行一千二百里始至元史托爾楚傳納顔叛托爾楚棄妻子與麾下十二騎直抵建州拒咸平一千五百里是也遼置建州保静軍於此元時未即唐之崇州今為喀喇沁及土黙特右翼境非渤海時所置之舊建州也語䝉古語托爾楚絆住也原作塔出納顔䝉古解見黑龍江城池卷原作乃顔今俱譯改南蘇州在城西高句麗置舊址無考晉書永和元年燕王皝使慕容恪攻高句麗抜南蘇置戍而還隆安二年慕容盛襲高句麗抜新城南蘇二城開境七百餘里隋書大業七年伐高麗分遣段文振出南蘇道新唐書乾封二年薛仁貴破高麗抜其南蘇木底蒼巖諸城顯慶中置南蘇州於此後廢即按遼志以蘇州安復軍為高麗南蘇州蘇州今金州也今考漢志高句麗縣有蘇水高麗置城葢因此水為名晉載記慕容皝自南陜以伐高句麗胡三省通鑑注謂南陜在遼東之東南蘇木㡳賈耽謂新城在遼東東北則南蘇木底當在新城東南為今興京界不在金州境可知舊志但據遼史載南蘇木底二城入金州古蹟誤木底州在城西舊址無考晉書咸康八年慕容皝擊高句麗高句麗有二道其北道平濶南道險狹慕容翰曰虜以常情料之必謂大軍從北道當重北而輕南今以鋭兵從南道擊之出其不意丸都不足取也别遣偏師從北道縱有蹉跌其腹心已潰四支無能為矣皝從之遂克高句麗葢從北豐而進者為北道從南陜入木底城而進者即南道新唐書乾封二年薛仁貴攻抜之尋置木底州於此後廢又有新城亦在界内晉咸康五年慕容皝擊高句麗兵及新城高句麗乞盟乃還隋大業九年復破高麗遣王仁恭出扶餘道仁恭進至新城攻之不拔唐乾封二年李世勣伐高麗度遼謂諸將曰新城高麗西邊要害不先得之餘城未易取也遂壁西南山臨城下進擊一十六城皆抜之胡三省通鑑注新城西南傍山東北接南蘇木底等城按遼史以遼州為新城誤詳後遼州注高句麗故縣在城北前漢書武帝元封四年開朝鮮地置元菟郡又置高句麗縣為郡冶應劭曰故句麗國三國魏志漢武初以沃沮城為元菟郡後為夷貊所侵徙郡句麗西北後漢公孫度時皆治高句麗縣呉書元菟郡在遼東北相去二百里是也後廢按漢志縣為小興京遼水所發源今葢即漢高句麗縣地高句麗國北近渾河之源本在縣東去遼東千里漢置縣取其名耳元菟郡雖初治沃沮尋徙句麗漢志可考方輿紀要謂公孫度始改置於遼東之北治高句麗縣非是又呉書謂郡去遼東二百里而郡國志遼東郡下云雒陽東北三千六百里元莬郡則云四千里其實相去四百里也又按漢書元莬郡祇領三縣高句麗上殷台西葢馬承徳縣瀋州今奉天府冶漢遼東郡渤海置瀋州故縣九皆廢遼置興遼軍後改瀋州昭徳軍元曰瀋陽路遼史本紀太祖神冊六年詔徙檀順民於東平瀋州地理志太宗置興遼軍後更名金史收國二年斡魯與遼軍遇於瀋州進抜其城後更為顯徳軍又承徳縣治東北隅即古樂郊縣遼初俘薊州三河之民置三河縣於此後改曰樂郊為瀋州治金因之又有章義遼濱挹婁雙城四縣後俱廢元初統名瀋州後曰瀋陽路尋治遼陽明洪武二十一年修築故城周十里有奇南有南闗曰定遼都衛許亢宗奉使行程録自顯州一百五十里至梁漁務又一百三里至摩綽寨又八十里至瀋州宗按遼史志云瀋州本挹婁國地又按唐書睿時渤海大氏置瀋州轄定理府遼初廢州置三河縣後改樂郊縣為瀋州治則知今承徳縣實古挹婁地而瀋州之名自渤海始樂郊之名自遼始也又考承徳縣北至鐵嶺界七十里挹婁故城在鐵嶺縣南六十里承徳鐵嶺漢晉間同為挹婁國地此明徵矣或據後漢書挹婁在夫餘東千餘里云其去遼東尚逺誤也今國語摩綽拙也原作沒咄譯改蒲州在承徳縣北四十里渤海置松漠紀聞興州四十里至蒲河四十里至瀋州元一統志蒲河在瀋陽路源出鐵利國蒲谷流經蒲水田過故名按蒲州遼初已廢本鐵利國地自應以蒲河得名以宋洪皓所記考之距瀋州四十里今承徳縣城西北四十里香壚山蒲河源在焉蒲州之設亦應在此集州在承徳縣東南渤海置奉集縣又置集州遼史地理志集州懐衆軍古陴離郡地金史地理志貴徳州奉集縣遼集州奉集縣本渤海舊縣元時廢明為奉集堡置鐵場百戸所屬鐵嶺衛明一統志在撫順千戸所南八十里今承徳縣東南四十五里東去鐵嶺衛二百十里有土城周四里正南一門名奉集堡外有鳯集堡橋即其遺址也並詳城池卷按舊志集州古險瀆縣漢時險瀆縣高麗為霜巖縣渤海置州今考險凟縣前漢屬遼東郡後漢設遼東屬國都尉險瀆應為遼東之西境又考綱目釋地險瀆在樂浪浿水之東浿水又在高麗平壌城東則險凟應在鴨渌江及高麗境舊志載入承徳縣境今從刪又廣寧縣境舊志亦載有險瀆故縣或異地同名或建置不一姑存之以志闗疑又按懐衆軍金史作懐逺軍崇信故縣在承徳縣東遼史地理志崇州隆安軍本漢長岑縣地渤海置州故縣三崇山溈水綵城皆廢在京東北一百五十里冶崇信縣金時廢按長岑縣漢屬樂浪郡在今朝鮮界内遼崇州即其地也又按渤海州名有榮州無崇州榮為中京所屬與湯興二州相次今遼史以崇州次於湯興後而東京所屬别有榮州又不載其沿革疑崇字即榮字之訛而榮州又複出也章義故縣在承徳縣西南漢㐮平地遼置昌義縣為廣州治金改為章義元廢遼史地理志廣州漢屬襄平縣高麗為當山縣渤海為鐵利郡太祖遷渤海人居之建鐵利州統和八年省開㤗七年以漢戸置治昌義縣金史地理志章義縣遼舊廣州皇統三年降為縣屬瀋州元廢明為章義站松漠紀閒瀋州六十里至廣州七十里至大口明一統志章義廢縣在瀋陽衛西南六十里舊志今縣西南七十里有章義站城周二里又西南七十八里有舊章義站城周四里故址並存焉詳見城池卷義按新唐書鐵利故地為鐵利府領廣汾蒲海歸六州海州非今海城縣地靈源故縣舊址無考遼初建漁陽縣後更名屬瀋州謹案前漢書遼東郡統縣十八襄平新昌無慮望平房候城遼隊遼陽險瀆居就高顯安市武次平郭西安平文畨汗㳫氏後漢書遼東統縣十一而以高顯候城遼陽屬元菟郡安帝又増置六城領以邯鄉西部都尉核其方隅半在遼西今考之遼金元諸史其自渤海時已廢及更置者皆不可考惟遼金尚沿其舊雖有裁併猶可稽考爰備録如右遼陽州渤海國在遼陽州東北唐時渤海大氏建遼改擴東京遂廢按渤海之地有三其曰郡者則兩漢晉魏隋也郡治遷徙不一或在幽兾兖三州之地縣則金元有之惟屬山東濱州之一其曰國者則自唐始即大氏所都也地直營州東二千里南北扺新羅東窮海西扺契丹地方五千里營州今錦州府境渤海去錦州東二千里應不在遼陽境内則以遼陽境内舊址為渤海國者誤遼陽郡其地即今遼陽州治遼曰東京遼史地理志神冊四年葺遼陽故城以渤海漢戸建東平郡天顯三年遷東丹國民居之升為南京城名天福幅員三十里八門宫城在東北隅南為三門壯以樓觀四隅有角樓相去各二里外城謂之漢城天顯十三年改為東京府曰遼陽冶遼陽縣又金史遼時遼陽縣渤海為金徳縣金因之元至元二十五年改為遼陽路明洪武五年改建定遼城廢遼陽縣屬按遼陽本漢縣名屬遼東郡後漢安帝初改元菟即晉廢其舊址久堙以漢書地理志及水經注考之其地當在州西北界承徳遼陽之間梁水渾河交會之處今州乃遼金之遼陽也遼志云本漢浿水縣高麗改為句麗縣渤海為常樂縣浿水在漢樂浪郡今朝鮮界内金徳常樂乃渤海中京顯徳府縣名皆不在此又按新唐書渤海所建府州無遼陽之名而遼史志即謂之遼陽故城金志直云渤海遼陽故城疑唐中葉安東都䕶府廢後渤海置城於此謂之遼陽事或有之然考遼史本紀太祖三年幸遼東神冊三年幸遼陽故城四年建東平郡天顯元年始攻抜渤海扶餘城進圍忽汗城降大諲譔置東丹國太宗三年遷民於東平郡是渤海未平之先遼陽之地早入契丹初名遼東復名遼陽或即遼時命名非由渤海也遼志不考地理遂謂東京即平壤城亦即忽汗州又即中京顯徳府以相去各千餘里之地合而為一誤甚又按唐置遼州即今郡治與遼時所置在廣寧者並非一地平州在遼陽城東四十五里其廢址今為土堡俗猶呼州晉書漢公孫度自稱平州牧魏克公孫淵遂置平州晉因之後魏廢湯州在遼陽州西北遼史地理志本漢襄平縣地渤海置州故縣五靈峯常豐白石均谷嘉利皆廢在東京西北一百里金廢西安平故縣在遼陽州城東漢置縣屬遼東郡後漢因之三國呉志孫權遣謝宏陸恂拜句麗王宫為單于恂等到安平口即安平縣海口也晉書安平縣𨽻遼東郡咸康七年石虎將王華帥丹師自海襲燕安平破之後入高麗為泊汋城唐書地理志安東府南至鴨緑江北泊汋城七百里故安平縣也今遼陽城東六十里有屯名安平即此紫蒙故縣在遼陽州東遼置屬遼陽府金廢遼史地理志紫䝉縣本漢鏤芳縣地後拂湼置東平府領䝉州紫蒙縣後徙遼城并入黄嶺縣渤海復為紫蒙縣今按其地皆不在今州境石城故縣在遼陽州東金置屬遼陽府金史地理志興定三年以縣之靈巖寺為巖州名其倚郭縣曰東安置行省元省州按金初分巖州地為石城縣今其地在遼陽城東石城山並詳白巖縣注鶴野故縣在遼陽州西遼史地理志本漢居就縣地渤海為雞山縣遼改鶴野縣屬遼陽府金因之仍屬遼陽元至元六年省入遼陽縣明一統志鶴野廢縣在都司城西八十里襄平故縣在遼陽州北漢置縣為遼東郡治髙帝八年封紀通為侯國後漢晉皆為郡治永嘉後屬慕容氏亦謂之遼東城慕容廆使其子翰鎮遼東即是城也後入高句麗隋書大業八年度遼水圍遼東城新唐書貞觀十九年太宗親征高麗抜遼東城以其城為遼州儀鳯初移安東都䕶府於遼東故城後後移新城賈耽曰自營州東一百八十里至燕郡城又經汝羅守捉渡遼水至安東都䕶府五百里府故漢㐮平地也方輿紀要在都司北七十里土人相傳今遼陽城西北隅故明定遼左右後三衛治即其地白巖故縣在遼陽州東北本高麗白崖城唐太宗抜之以其地為巖州後廢遼復置治白巖縣屬瀋州遼史地理志巖州白巖軍本渤海白巖城統縣一白巖縣金省改屬東京石城縣今巖州城在遼陽州東北五十七里石城山上周四里一門詳見城池卷按白巖𨽻瀋州故舊志於承徳遼陽均載今以地考之既在遼陽境内承徳縣下應刪以免重衍居就故縣在遼陽州西南漢置縣屬遼東郡後漢省晉復置晉書咸和九年慕容皝擊其弟仁於遼東克㐮平居就尺新昌皆降於皝興遼故縣在遼陽州西南遼史地理志本漢平郭縣地渤海改為長寧縣遼曰興遼縣屬遼陽府金廢宜豐故縣在遼陽州西南遼史地理志置行州安廣軍領宜豐縣為州治金史地理志皇統三年廢州以縣屬遼陽府元初縣廢明一統志宜豐廢縣在都司城西南一百里按金史近東梁河應在州城太子河傍㳫氏故縣在遼陽州界漢置縣屬遼東郡後漢因之晉省三國呉志嘉禾初孫權欲征公孫淵陸瑁諫曰㳫渚去淵道里尚逺孫按㳫渚在遼陽漢書遼東郡有㳫氏也時公淵居襄平呉師航海遼東登自㳫渚考襄平實鐵嶺故地遼陽西北至承徳承徳西北至鐵嶺道里數百故云逺耳海城縣沃沮國今縣城以東皆其故壌後漢書東沃沮北與邑婁南與濊貊接在葢馬大山之東今按明一統志以葢馬大山地在朝鮮則其國都在今縣界之外海州其外邑也但漢之葢馬即唐之葢牟則海城之為㓇沮地無疑後漢書又有北㓇沮去南沃沮八百餘里特其舊址皆無可考東按三國魏志東東沮在高句麗葢馬大山之濱大海而居北與挹婁扶餘南與濊貊接初衛滿王朝鮮時㓇沮皆屬焉前漢書武帝元封二年殺滿孫右渠分其地為四郡以㓇沮城為元菟郡後徙高句麗西北沃沮還屬樂浪漢末臣於句麗其土地肥美背山向海宜五榖善田種人性盾直彊勇飲食居處衣服禮節有似句麗北㓇沮去南沃沮八百餘里亦與挹婁接人抵其境壌廣潤長白山迤西一帶皆是海州今海城縣冶遼史地理志海州南海軍本㓇沮國地高麗為沙卑城亦曰卑沙城或訛為卑奢城自登萊海道趨高麗之平壌必先出此隋書大業十年來䕶兒出海道至卑奢城敗高麗將趨平壤高麗惧而請降新唐書貞觀十九年伐高麗張亮程名振帥舟師自東萊度海襲沙卑城其城四面懸絶惟西門可上唐兵攻抜之耀兵鴨緑江上渤海號南京南海府疊石為城幅員九里都督沃晴椒三州遼置海州南海軍領耀濱二州縣一臨溟縣金天徳三年改名澄州元州縣皆廢明置海州衛於此漢按遼志州本沃沮國地高麗為沙卑城考後書東沃沮在高句麗葢馬大山之東漢之葢馬唐為葢牟即今葢平縣也今海城西南至葢平界八十里是海城正在葢平矣自此説明則知在漢為㓇沮在高麗為沙卑在渤海為南海府在遼為海州更無疑也又按明一統志臨溟廢縣在海州衛東一百八十里耀州在海城縣西南六十里本渤海椒州遼置耀州領巖淵縣𨽻海州金廢今有耀州城周二里餘即其故址並詳城池卷縣按遼史地理志耀州本渤海椒州𨽻海州故五椒山貂嶺斯泉尖山巖淵皆廢東北至海州二百里嚴淵縣東界新羅故平壌城在縣西南東北至海州一百二十里明一統志廢耀州在海州衛西南二百里考海城唐初置葢州入渤海為南京南海府統沃晴椒三州六縣遼時耀州即南海所統之椒州也又漢書稱高句葢馬大山在平壤今海城西南實葢平界矣嬪州舊址無考遼史地理志在海州西北一百二十里本渤海晴州領天晴神陽蓮池狠山仙巖五縣遼盡廢改置嬪州柔逺軍屬海州金又廢按之應在海城廣寧交界之地新昌故縣在海城縣東漢置縣屬遼東郡後漢因之永寧二年高句麗與鮮卑冦遼東太守蔡諷追擊之於新昌戰没晉亦為新昌縣咸和九年慕容仁自平郭趨新昌都䕶王寓擊走之遂徙新昌入襄平時仁與慕容皝相攻也金史地理志臨溟縣有鎮曰新昌疑即漢時舊縣地遼隊故縣在海城縣西漢置縣屬遼東郡顔師古曰隊音遂亦作隧後漢省公孫度復置三國魏志景初元年幽州刺史毌邱儉擊公孫淵屯遼東南界淵逆儉於遼隊㑹天雨十餘日遼水大漲儉戰不利引軍遂明年司馬懿征淵淵遣將軍卑衍楊祚屯遼隊塹二十餘里懿佯出其南而潛軍濟水出其北徑指㐮平晉廢水經注大遼水東逕遼隊縣故城西遼史地理志仙鄉本漢遼隊縣渤海為永豐縣遼改名屬東京遼陽府以仙人帛仲理得名也金廢明一統志遼隧廢縣在海州衛西六十里又順州遼置本遼隊縣地在顯州東北一百二十里按遼隊應在今三汊河牛莊之地析木故縣在海城縣東南四十里遼史地理志渤海為花山縣遼置縣改名屬遼陽府尋𨽻銅州廣利軍金皇統三年廢州以縣屬澄州元省今有土堡周二里有奇土人猶稱析木城即其遺址今按遼志以析木本漢望平縣地而諸志從之考水經注大遼水自塞外東流至遼東之望平縣西屈而西南流逕㐮平縣故城西是漢之望平居㐮平之北其地當在今遼陽以北近遼河之上流析木在海城東南相去轉逺遼志之言非是且遼志既以顯州之山東縣為漢望平縣而又以此為望平縣亦自相矛盾矣葢平縣葢州今葢平縣治遼史地理志本高麗葢牟渤海改為葢州又改辰州以辰韓得名井邑駢列最為衝㑹遼徙其民于祖州初曰長平軍尋改辰州奉國軍統縣一建安金史地理志明昌四年罷哈斯罕建辰州遼海軍六年以與陳同音仍名葢州領湯池建安岫巖熊岳四縣元史地理志初為葢州路至元六年并為東京支郡八年省建安縣入州屬遼陽路元一統志葢州地最要衝稱為繁富契丹移其氏於上京西祖州後陞為長平軍明初改置衛按遼志辰州本高麗葢牟城唐太宗㑹李世勣攻破葢牟城以為葢州即此渤海初為葢州後又改辰州熊岳城亦高麗城叠石周二十里唐薛仁貴與高麗大將温沙門戰熊山擒善射者于石城是已二城實同為高麗之門户考熊岳城在今葢平縣西南六十里可知葢平之為唐時葢牟决然無疑若據朝鮮古志云辰韓反在朝鮮之東以為甚逺不知海城周秦時實屬朝鮮今海城東南至葢平界六十里則古葢州自在朝鮮之東明矣盧州在葢平縣西南六十里遼史地理志盧州元徳軍本渤海杉盧郡故縣五山陽杉盧漢陽白巖霜巖皆廢在京東一百三十里治熊岳縣西至海十五里旁有熊岳山金廢州併入縣隸葢州元省入建安至元三年又併建安縣入葢州今縣城南六十里熊岳城即其址也詳見城池卷歸州在葢平縣西南九十里遼史地理志太祖平渤海以降戸置州後廢統和二十九年復置治歸勝縣金廢州降縣為鎮隷復州今有土堡曰歸州城周一里有奇即其故址詳見城池卷平郭故縣在葢平縣南漢置縣屬遼東郡後漢因之晉省縣而城存晉書大興四年慕容廆以其子翰鎮遼東仁鎮平郭咸和八年仁據平郭以叛慕容皝咸康二年皝襲仁於平郭自昌黎東踐氷而進凡三百餘里至厯林口捨輜重輕兵趨平郭遂克之七年皝又使其子恪鎮平郭魏書太延二年北燕主馮宏奔高麗高麗處之於平郭尋徙北豐後高麗改置建安城新唐書貞觀十九年伐高麗張儉進度遼水趨建安城又李世勣言建安在南安市在北安市先下然後向建安二城葢相近也儀鳯初徙熊冿都督府於建安故城賈耽曰自安東都䕶府西南至建安城三百里故平郭縣也安市故縣在葢平縣東北漢置縣屬遼東郡後漢及晉初因之後高句麗為安市新唐書貞觀十九年征高麗攻安市不克引還咸亨三年高麗餘衆復叛遣將高侃擊之敗之於安市城渤海置鐵州遼史地理志鐵州建武軍本漢安市縣高麗為安市城渤海置州故縣四位城河端蒼山龍珍皆廢冶湯池縣在東京西南六十里金州廢以縣屬葢州元省入葢州鴨江行部誌湯也縣本遼時鐵州明一統志安市廢縣在葢州衛東北九十里鐵場堡即其地又湯池堡在縣東北六十里即故湯池縣也置按遼志鐵州本渤海置也其曰安市城者漢安市未有城高麗乃置城唐薛仁貴征高麗白衣登城即此金時葢州所統有湯池縣即遼鐵州高麗安市城漢故縣也考今湯池堡去安市廢縣僅十里耳良是又按安市唐書薛仁貴傳作安地開原縣開元府今開原縣治西元初設開元府後改開元路明洪武中改元為原以其地為三萬衛史按明一統志古開原城在三萬衛西門外元地理志金末其將布希萬努據遼東元出師伐之禽布希萬努至開元東土悉平開元之名始此元時於此置萬戸府明因之設三萬衛耳又考舊志扶餘府黄龍府黄龍塞並在今開原縣境此可據矣布希萬努原作蒲鮮萬奴今譯改扶餘府後漢書在元菟北千里南與高句麗東與挹婁接土平敞宜五穀出名馬赤玉貂豽三國魏志扶餘去漢元菟郡千里南與高句麗東與挹婁西與朝鮮接北有弱水方可二十里其民土著有宫室倉庫牢獄多山陵廣澤上宜五榖其人彊勇謹厚飲食皆用爼豆會同拜爵冼爵揖讓升降以殷正祭天其國善養牲出名馬赤玉貂美珠珠大者如酸棗有軍事祭天殺牛觀蹄以占吉凶蹄解者為凶合者為吉其居喪男女皆純白著布面衣去環珮大體與中國相彷彿新唐書夫餘契丹道也扶餘故地為扶餘府常屯勁兵捍契丹領扶仙二州按扶餘去漢遼東郡尚一千四五百里今之開原去遼陽城僅三百餘里而赤玉美珠相傳出今黑龍江境内則扶餘之境乃盡寧古塔黒龍江諸地非開原一縣也且史文明言方可二千里則其廣逺可知開原特其南境若必拘泥以開原非扶餘地此真鑿枘之見矣黃龍府自開原縣境東至吉林皆黄龍府地本渤海扶餘府遼史本紀東京龍州黄龍府太祖平渤海次扶餘城有黄龍見於城上更名黄龍府保寧七年軍將燕頗叛府廢開􅁗九年遷城於東北統安逺益威清雍凡州五黄龍遷民永平凡縣三金史本紀收國元年正月太祖自將親攻黄龍府進臨益州州人走保黄龍取其餘民以歸留羅索尼楚赫守黄龍上自率兵趨達嚕噶城八月次混同江無舟乗馬徑涉遂克黄龍天眷二年改濟州利涉軍以太祖涉濟故也天徳二年置上京路轉運司四年改為濟州路轉運司大定二十九年改隆州利涉軍貞祐初陞為隆安府元初屬開元路羅按今吉林城西北二百餘里博屯山上有金索墓碑末云歸葬濟州之東南隩濟州即黄龍府據此則似濟州在今吉林地矣不知山在西北二百餘里已明不即是吉林地且碑云濟州東南隩又不知其在濟州幾百里也於吉林云在西北於濟州云在東南則是博屯正在二地犬牙相錯之界將謂此山古屬濟州今屬吉林或未可定然即此知吉林濟州之相去數百里而不得合一明矣考今開原正在吉林西北而古開元城實在縣境便知自此而東皆黄龍故地也縣又按扶餘府地隣契丹遼改黄龍府今開原及開原邊外之境扶仙二州遼時俱廢扶州即因夫餘得名當為附郭所屬縣名見於遼史屬龍州者八屬通州者六當即扶仙二州所隷苐遼史既言改夫餘府為龍州又言改龍州為通州而所置諸縣或沿或併尚仍其舊史有訛誤疑遼之龍州其地本廣因燕之役舊治已廢開泰中移黄龍府于東北又分置通州也黄龍府所屬長平等縣為扶州屬邑通州所属夫餘等縣即為仙州属縣也又按渤海夫餘府與契丹為隣奉能過開原以北遼之黄龍府境則又加廣逺矣舊五代史言北至混同江僅百里是又遼史遷府於東北之明證也若必專指開原未免拘壚爰悉引諸書附識於後以備叅考云許亢宗奉使行程録自信州九十里至富魯貝勒寨又四十里至黄龍府契丹太祖初攻渤海