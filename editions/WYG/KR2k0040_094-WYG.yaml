body:
  text: 流寓漢晉前燕附北魏唐五代晉宋元明國朝欽定四庫全書欽定盛京通志卷九十流寓臣等謹按東漢管寧與邴原王烈避地遼東挹其遺躅者至今為美談而攷諸志乘則西漢王仲逢萌實為稱首葢遼東風俗醇美擇地之士恒樂依之自是以來流寓於此者或以功名或以節介或以儒學雖所操不同要其風徽可愛慕則一也謹志流寓第二十九欽定四庫全書欽定盛京通志卷九十流寓漢王仲瑯琊人好道術明天文諸吕作亂齊哀王襄謀舉兵數問於仲及濟北王興居反欲刦仲為將仲懼禍及浮海東奔樂浪山中因家焉七世孫閎八世孫景並見人物志逢萌字子慶北海都昌人家貧為亭長擲楯歎曰大丈夫安能為人役哉遂去學於長安通春秋平帝時見王莽殺何武鮑宣等數百人及其子字謂友曰三綱絶矣不去禍將及人即解冠挂東都城門將家屬浮海客於遼東光武即位始還鄉至瑯琊勞山屢徴不起管寧字幼安北海朱虛人漢末㓂亂與邴原王烈避地遼東公孫度虚館以候之寧見度語惟經典不及世事退居岩谷因山為廬鑿坯為室越海避難者依之旬月成邑遂講詩書陳俎豆飭威儀明禮讓非學者不見由是度安其賢民化其徳寧所居屯落汲者男女雜㳫或争井相鬭寧乃宻置器井傍以待汲者鄰有牛暴寧田寧為牽著凉處自為飲食過於牛主牛主大慚由是禮讓行於海表常坐一木榻積五十餘年未嘗箕股當膝處皆穿又常著皂㡌終不更易度子康欲官寧以自輔終不敢言其敬惮如此及魏文帝禪位徴寧還是時公孫康死嫡子不立而立弟恭寧曰廢嫡立庶人有異心亂之所由起也乃將家屬浮海其後淵果奪恭位僣稱王為司馬懿所滅遼東大亂卒如寧言寧之歸也海中遇暴風船將溺舟中慮有過惡者請自禱于神寧曰吾自省生平惟有一日不冠三朝晏起而已此外無小失道無所禱也言方竟夜風晦明船人忽望見火光輒趨之得島島無居人亦無火燼咸以為神光之助寧船自若風止而渡初寧在遼東度父子有所資遺皆受而藏焉及西渡盡封還之既至屡徴不起年八十四卒王烈字彦方平原人以義行稱鄉里有盜牛者主得之盜曰刑戮自甘乞勿使王彦方知也董卓之亂避地遼東躬秉農器布衣疏食東域之人奉之若君太守公孫度接以昆弟之禮欲屈以官烈乃為商賈自穢得免後曹操聞烈名徴之終不至建安二十四年時年七十八終于遼東邴原字根矩少與管寧同里並以操尚著稱黄巾起原將家屬浮海遂至遼東時同郡劉政有勇畧公孫度欲殺之盡捕其家原以政付太史慈使䕶歸里既而謂度曰將軍前欲殺劉政以其為己害也今政已去君之害除矣度曰然原曰君之畏政者以其有智也今政已免智將用矣不若並赦政家無重怨也度乃出之原又資送政家還郡居一年歸原者數百家教授之聲不絶原性剛直常以清議格物公孫度以下不能安管寧以言非其時皆招禍之道宻遣原西還原行數日度方覺歎曰邴君所謂雲中之鶴非鶉鷃之網所能羅矣國淵字子尼樂安人師鄭康成後與邴原管寧等避亂遼東淵䔍學好古嘗講學于山巖士人多推崇之由此知名按邴原國淵後皆仕魏而其流寓遼時則猶漢時也故仍繫之漢凉茂字伯方山陽昌邑人少好學議論常據經典以决是非官樂浪太守公孫度在遼東留茂不遣之官而茂終不為屈尋徴還復為魏郡太守太史慈字子義黄縣人猿臂善射少好學為郡奏曹史因避仇之遼東孔融聞其名數餽其母及融為黄巾管亥圍於都昌慈適從遼東還奉母命之都昌復突圍往平原說劉備求兵為融攻黄巾破之晉趙至字景真代郡人年十四入太學遇􅄞康冩石經徘徊不能去為康所知又與康子蕃友善及向遼西占戸乃與蕃書叙别陳志操文辭甚美後舉郡計吏到洛至父欲其宦立仍遣歸遼西幽州三辟部從事斷九獄見稱精審盧諶范陽人建興末隨劉琨投段匹磾後琨為匹磾所害諶復投段末波於遼西元帝初末波通使江表諶因其使抗表理琨寃晉累徴諶為中書侍郎而末波留之不遣後石季龍破遼西用為國子監祭酒侍中諶恒以為辱毎謂其子曰吾殁後但稱晉司空從事中郎爾撰祭法注莊子及文集皆行於世髙瞻字子前渤海蓚人少而英爽有俊才光熙中調補尚書郎永嘉之亂北徙幽州既而隨崔毖及毖謀伐慕容廆瞻固諫不從毖敗廆署瞻為將軍瞻稱疾不起廆敬其姿品數臨候之仍辭以疾篤廆不平遂以憂卒前燕附游邃廣平人與逢羡宋奭皆嘗為昌黎太守時晉室衰亂初避地於薊後徙寓遼東仕廆為龍驤長史創定朝儀裴開字士先河東聞喜人與其叔嶷同歸慕容廆開才畧深逺仕至軍諮祭酒皇甫岌安定朝那人與弟真俱寓遼東廆皆擢用之竝以文章才儁任居樞要封奕字子専渤海蓚人祖釋仕晉為東夷校尉後釋卒奕在遼東慕容廆召與語悦之曰竒士也嗣釋子悛及抽咸來奔喪廆一見皆留之以悛為叅軍抽為長史復以奕為軍諮祭酒掌軍國機要奕為人喜怒不形政務之暇留心講論接引後進如若不及後仕皝屢立戰功位至相國封武平侯宋該字宏宣平原人與同郡劉翔杜群先依王浚又依叚氏皆以為不足託率諸流寓同歸於廆仕右長史朱左車會稽人胡母翼太山人皆流寓遼東以舊徳清重慕容廆引為師友劉瓚字彦真平原人經學該通性甚清真受業者常數百餘人寓遼東慕容廆重其學引為東庠祭酒慕容皝帥國胄束脩受業焉逢羡北海人與北平西方䖍蘭陵繆愷同時並寓遼東慕容廆引羡與䖍俱為謀主愷以文章才俊職任樞要北魏陸希道字洪度鉅鹿郡公叡之子也魏孝文時叡坐穆㤗事賜死妻子徙遼西希道厯覽經史頗有文致及後召還累遷前將軍郢州刺史善於撫邉甚有威畧唐蔣儼義興人擢明經為兵曹㕘軍太宗伐髙麗募為使者人皆憚行儼獨奮然言曰天子雄武四海畏威蕞爾國敢圖王人有如不幸固吾死所也遂請往及至為莫支離所困以兵脅之不屈納之土室中及髙麗平乃歸帝竒其節授朝散大夫五代晉張礪為翰林學士石晉末隨晉帝遷於契丹遼主徳光重其文學仍以為學士礪逃歸為追者所得徳光責通事髙唐英等曰吾戒爾等善待此人致其逃去過在爾也待礪如故胡嶠同州郃陽令石晉末䧟遼為蕭翰掌書記居福州著䧟蕃記凡所經行記之甚悉宋歐陽修作五代史多採之按福州遼上京名在原州北舊志作復州誤馬允卿石晉時為青州刺史遼太祖兵至堅守不降城破被執太祖義而釋之徙其家於毉巫閭允卿以詩禮世其家四世孫人望登進士為遼名臣宋洪皓字光弼鄱陽人仕宋使於金被拘不屈將殺之有為跪請者後流於冷山距會寧府二百里四月草生八月已雪金陳王烏舍聚落在焉烏舍知皓賢延使教其子復偕之入燕得聞徽欽居五國城密遣人奏書獻桃栗梨麫凡留金十五年紹興中和議成乃得偕張邵朱弁南歸後金使至必問皓為何官居何地其見重如此初皓留金時以教授自給因無紙則取樺葉寫論語孟子大學中庸傳之時謂之樺葉四書所著詩文金人鐫行之國語烏舍皮條也原作悟室今譯改張邵字才彦烏江人登宣和上第詔求可使北朝者邵慨然請行金人先拘之燕山僧寺復徙之會寧府邵卒不屈節和議成乃遣南歸官秘閣修撰卒贈少師元王垚字樂人工詩文尤長於康節經世之學流寓遼東至大改元瀋陽王引見奏垚充說書從王使髙麗還陳便利三十餘事陳韶孫廣州畨禺人父瀏以罪流肇州韶孫年十嵗朝夕號泣願從父俱行道過遼陽平章達春見而憫焉欲復送韶孫還鄉韶孫曰既不能以身代父當死生相隨歸非所願也達春驚異厚賚之大徳六年瀏死韶孫哭盡哀見者皆為泣下肇州萬戸府以聞命遣還郷里仍旌異之達春國語解見名宦卷原作塔出今譯改明陳循字徳遵泰和人永樂乙未廷試第一厯仕四朝官大學士景泰時功在社稷為徐有貞所忌石亨迎駕譖殺王文于謙並戍循鐵嶺衞亨敗乃釋歸田里辛浩字養正江夏人厯官監察御史彈劾不避權勢謫居遼陽乃選教將卒子弟多所成就天順中始復官閻寛字徳原樂安人官監察御史彈劾無少避為錦衣指揮馬順所忌以事中傷之謫居鐵嶺遂家焉張鵬字騰霄淶水人官御史立朝蹇諤持大節天順初為石亨所搆左遷戍遼東亨敗乃復官還京仕至兵部尚書劉玭字求素安福人官刑部員外有胡指揮某因妻姦謀殺人玭論如法其人素附權幸改讞於錦衣衞坐玭以故入罪謫戍遼陽玭在遼東五年日以文章自抒寫題其集曰養晦後卒於遼胡世寧字永清仁和人累官江西副使以論宸濠不法謫戍瀋陽寄居廣寧三年學者宗之及宸濠敗世寧起官至太子太保兵部尚書卒諡端敏劉琦字廷珍洛川人官兵科給事中時妖人李福達罪當死權貴郭勛庇之琦抗疏陳其顛末上怒謫戍瀋陽衞琦在瀋陽十餘年講學不輟上毎曰劉琦嘗進讜言蓋已悟其直矣後遇赦召還京王儼字民望華容人厯官侍郎正徳間求直言儼首論鹽法芻粟悉為貴戚宦官侵壞劉瑾衘之誣以他事繫獄煆煉無所得瑾又使人諷儼附己不聽矯詔謫戍遼東僑居遼陽瑾誅乃還嘉靖初賜存問年八十有八乃卒黄正色字士尚無錫人厯官南臺御史時巨璫鮑忠䕶太后梓宫𦵏承天怙寵黷貨正色陳其罪忠等誣正色于梓宫前騎馬張扇遣戍遼左正色荷戈就道隆慶初復原官召還遷南京太僕卿卒祀遼陽三忠祠徐文華字用光四川嘉定人仕至監察御史嘉靖間以誣獄編戍遼陽文華有節操工詩文與給事中安磐侍御程啟充給事中彭實以吟咏為事日相唱和無憂戚容後召還卒隆慶初贈僉都御史夏良勝江西南城人官太常寺少卿嘉靖時以議大禮謫戍三萬衛後終於寧逺國朝沈文奎浙江會稽人𨽻鑲白旗漢軍年二十以諸生游遵化天聰三年大兵下遵化文奎謁貝勒豪格遂㩦歸瀋陽因家焉大宗命直文館崇徳元年特㫖甄别内院人員分為四等文奎名列一等第二擢授𢎞文院學士順治元年從入闗厯官保定巡撫淮揚漕運總督有政績祀名宦祠詳浙江通志苗君㮨昌平人明季諸生遭時多難隸籍黄冠喜讀儒書究心史學至老不倦居盛京之三官廟翰林髙士竒稱其有𨼆者之風郝浴字雪海山東定州人順治己丑進士任四川巡按守保寧城時巨冦劉文繡等踞滇黔吳三桂握重兵屯保寧久無功浴至決䇿破賊有安蜀功因劾吳三桂跋扈狀三桂衘之譖以他事降調謫戍鐵嶺讀書講學無間寒署註周易解士人宗之稱為復陽先生聖祖幸奉天浴跪迎道左具述按蜀始末聖祖為之傾聽慰勞良久十四年特㫖取還録用浴留其居為銀岡書院後仕至廣西巡撫崇祀名宦欽定盛京通志卷九十
