  text: 欽定四庫全書欽定盛京通志卷八十九
  hash: sha256:5b05e9ea97b4e285b509d64424d67280c8a9d174a3ffd3ba1da68713d292e1a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0040_WYG_093-1a, image: WYG0502/WYG0502-0779c.png}
body:
  text: 𨼆逸漢晉遼金明國朝欽定四庫全書欽定盛京通志卷八十九𨼆逸臣等謹按遼瀋多名山大川自古隠逸之士恒韜跡焉漢李敏晉公孫永其著也遼金以還亦時有枹瓌材藴積學潛徳而不耀者採其軼事發其幽光謹志𨼆逸第二十八欽定四庫全書欽定盛京通志卷八十九𨼆逸漢李敏襄平人河内太守去官還里公孫度欲用之敏惡度所為恐見害乃將家屬浮于海莫知所終晉公孫永字子陽襄平人幼好學恬虚孤棲平郭南山非身墾殖不食吟咏岩間欣然自得年九十餘操尚如一慕容暐徴之不屈王公以下造之皆不與言雖經隆冬盛暑端然自若後苻堅亦以禮遣使致問未至而永卒堅深悼之諡曰崇虚先生遼蕭扎拉字實内北府宰相巴雅爾之弟不事生産淡泊自如統和末召為南京兵馬都指揮使以疾求退不許遷伊勒希巴又以疾辭許之遂入頡山杜門不出親友或過之終日言不及世務耶律資忠目之曰頡山老人䝉古語扎拉帽纓也原作扎剌實訥解見名宦卷原作虚輦巴雅爾䝉古語解見名宦卷原作排押伊勒希巴解見人物卷原作夷离畢今俱譯改耶律官努字希𨼆沈厚多學自言愚鈍不任官重熙中加歸義軍莭度使輒請致仕官努與蕭斡友善斡謂官努曰仕不能致主澤民成大功業何屑屑為也吾與若居林下以枕簟自隨觴詠自樂雖不官無慊焉官努然之時稱三逸官努原作官奴斡原作哇今譯改蕭普爾普字綏蘭父母早喪鞠於祖父烏爾古納性孝悌年十三烏爾古納卒自以早失怙恃復遭祖喪哀毁踰禮族里嘉歎嘗謂人曰我於親不得終養今雖莫為訓者茍不自勉何以報鞠育恩自是力學於文藝無不精乾統間以烏爾古納之故召之不應常與親識㳺獵山水奉養無長物僕𨽻欣欣如也或曰公胡不念以嗣先世功名荅曰自度不足以繼先業年踰强仕安能益主庇民累徴皆以疾辭晚年謝絶人事𨼆居自得潛心佛書延有道者談論彌日人問所得何如但曰有深樂惟覺六鑿不相攘餘無知者唐古特語普爾普祥也原作蒲离不綏蘭解見忠節卷原作挼懶烏爾古納蒙古語滋生也原作兀古匿今俱譯改金李經字天英錦州人作詩極刻苦能為竒語不蹈襲前人李純甫見其詩曰真今世太白也再舉不第拂衣去歸𨼆於鄉南渡後其鄉帥有表至朝廷士大夫識之曰此天英筆也朝命使倅本州竟去不知所終劉祁歸潜志云天英少有異才入太學肄業李屏山見其詩盛稱諸公間其為詩妙處人莫能及號無塵道人夜雨詩云燈火萬家夜蕭蕭簾外聲晚望云夕陽萬里眼人立秋黄中夜起云夜半不得月河漢空星辰又步雲意云一片崑崙心夕陽小煙樹又四言云老峰蹙雲壁立挽秀林隂灑雨蒼蒼玉闘虛明滿鏡夜氣成晝皆𨼆淪語也髙仲振字正之遼陽人以家業付其兄挈妻子入嵩山博極羣書尤深於易及皇極經世書𨼆居山中安貧自樂不渉城市山野之人亦知敬之常與弟子張潛王汝梅行山谷間人望之翩翩如神仙或曰仲振嘗遇異人教以養生術終日黙坐骨莭戛戛有聲所談皆世外事云按張潛王汝梅金史皆入𨼆逸傳明賀士諮欽之子欽於晚年即𨼆居醫巫閭山下士諮性通敏博極羣書領𢎞治壬子鄉薦抱道自娛絶意仕進陳白沙見而稱之既領鄉薦不求仕進後都御史張文錦薦其才應詔陳務實學存敬慎謹細微親賢逺邪十二事不報即辭歸𨼆居終身國朝朱國梓前屯衛人貢於鄉崇禎時徴任兵部主事不就清介周慎陞永平道值流賊李自成之難國梓時居海濵與衆舉義共請大兵入闗破流㓂旋奉母𨼆石門寨山中終身嘯歌布衣自樂陳景元奉天人號石閭甘老布衣恥言名利閩中雷鋐有五布衣詩石閭居其一欽定盛京通志卷八十九
