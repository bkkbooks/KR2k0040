body:
  text: 田賦一盛京民田徴賦規制奉天府屬民地錦州府屬民地吉林各屬民地欽定四庫全書欽定盛京通志卷三十七田賦一臣等謹案遼地沃野十里國家作京伊始墾闢田疇百數十年以來省耕薄斂優賚頻加亦既無曠土無㳺民矣我皇上加惠陪京蠲租賜復巡軒莅止叠沛恩綸旗地官莊休助兼施豐亨裕大之模誠萬年無斁云臣等詳考各州縣賦額以及莊田税課之屬謹志田賦第十六欽定四庫全書欽定盛京通志卷三十七田賦一盛京民田徵賦規制盛京各屬民田自順治十五年始定徴賦之制每畆嵗徴銀三分凡新墾地畆三年起科康熙十一年改為十年起科十五年復改為三年起科十八年定為六年起科不分等則每畆嵗徴銀三分不加閏二十二年綜計奉天錦州二府新舊起科地共三十一萬二千八百五十九畆有竒嵗徴銀九千三百八十五兩有竒於是各州縣田賦之額乃著於册三十二年改徴粟米每畆嵗徴粟米三升有竒四十三年錦縣寧逺州應徴粟米仍改徴銀解交承徳遼陽海城蓋平開原鐵嶺廣寧七州縣買糧貯倉四十七年頒制斗前此徵米皆以闗東市斗至是以制斗為凖每斗扺市斗五升毎畆嵗徴粟米七升五合五十三年徴銀如舊制五十六年復徴粟米雍正六年銀米各半徴收八年分上中下三則起科上則地每畆嵗徴粟米六升三合八勺三抄中則地每畆嵗徴粟米四升二合五勺五抄五撮下則地每畆嵗徴粟米二升一合二勺七抄六撮上則嵗徴銀三分中則嵗徴銀二分下則嵗徴銀一分各州縣等則畧同惟五年増設之永吉州長寧縣每畆徴銀三分不分等則乾隆元年裁長寧縣歸永吉州徴收十二年裁永吉州設吉林同知徴收十九年清丈泰寧舊縣民地雍正五年以寧古塔地置縣七年省册報起科歸寧古塔副都統徴收三十三年清丈奉天錦州二府地凡民人私墾者准為餘地分上中下三則徴租上則每畆嵗徴銀七分中則每畆嵗徴銀六分下則每畆嵗徴銀五分三十五年民典旗人餘地及永逺徴租暫行徴租地畆俱歸州縣徴收四十六年盛京吉林民人私墾地畆續經查岀者每畆嵗徴銀八分仍在旗倉納米二升六合五勺五抄以懲匿報之弊著為令奉天府屬順治十四年設府領遼陽海城二縣十五年至十八年遼陽海城起科地四萬八千一百六十五畆四分四釐四毫二絲徴銀一千四百四十四兩九錢六分三釐三毫二絲六忽金州明時衛所本朝初廢至是年設金州巡檢以徵其賦𨽻海城縣康熙四年改𨽻盖平縣十九年裁雍正五年復設巡檢𨽻復州通判起科地七千一百六十七畆六分八釐徴銀二百一十五兩三分四釐共田五萬五千三百三十三畆一分二釐四毫二絲賦銀一千六百五十九兩九錢九分三釐七毫二絲六忽康熙元年至三年遼陽金州續報起科地五百五十八畆四分四釐徴銀十六兩七錢五分三釐九毫八絲是年増設承徳盖平開原鐵嶺四縣升遼陽縣為州與舊設之海城縣並𨽻於府自是至二十二年府屬六州縣續報起科地十四萬四千五百零六畆五分一釐七毫徴銀四千三百三十五兩一分二釐二毫内開除承徳蓋平金州編兵入旗及遼陽海城蓋平開原鐵嶺等州縣運糧水手各項地畆免徴不計外統計新舊起科共田十八萬二千九百七十三畆四分六釐一毫三絲三忽是為田額共賦銀五千四百八十八兩六錢五分三釐八毫三絲九忽九徴是為賦額具晰載各州縣條下自康熙二十三年至雍正四年府屬六州縣續報起科地十四萬七百十七畆二釐統計原額新増共田三十二萬三千六百九十畆四分八釐是時改徴粟米徴米始於康熙三十二年至五十三年仍徴銀越三年復徴米雍正五年改為銀米各半徵收具詳徵賦規制條下共賦米二萬一千二百七十石五斗六合有竒自五年至十三年舊𨽻府屬之承徳遼陽海城蓋平開原鐵嶺六州縣並増設之永吉州長寧縣雍正五年以吉林地置州以白都訥地置縣復州雍正五年設通判駐復州舊衛城十二年改置州海寧縣雍正十二年以金州舊衛地置續報起科及丈出地雍正五年通行清丈八十八萬零九十七畆九釐統計原額新増共田一百二十萬三千七百八十七畆五分一釐分上中下三則銀米各半徴收雍正八年始定分則之制具詳徵賦規新條下共賦米二萬五千三百零四石三斗二合九勺四抄賦銀一萬四千一百六十四兩八錢九分五釐六毫七絲具晰載各州縣條下自乾隆元年至四十六年府屬之長寧縣永吉州既先後裁改乾隆元年省縣入州十二年州廢改設吉林同知屬于將軍不復𨽻府所有承徳遼陽海城蓋平開原鐵嶺復州寧海八州縣並分設之岫巖城金時縣城在盖平縣東乾隆三十七年設通判治此析遼陽海城蓋平復州地及鳯凰城以𨽻之續報起科及丈出地乾隆三十年通析清丈五萬二千三百三十四畆二分五釐四毫統計原額新増共田一百二十五萬六千一百二十一畆七分六釐四毫分上中下三則銀米各半徴收分則之制晰載各州縣條下共賦米二萬九千六百二十三石六斗六升七合七勺賦銀一萬三千一百八十九兩二錢七分八釐又民人徴租餘地乾隆三十年丈出私墾地畆三十一年准作餘地徴租五十萬零四千五百六十七畆零三毫徴租銀二萬六千八百五十八兩六錢零五釐民租旗地乾隆三十五年歸州縣徵租十九萬九千八百六十八畆五分四釐徴租銀一萬二千八百四十一兩四錢四分三釐具晰載各州縣條下承徳縣康熙三年置縣為奉天府治二十二年田賦之額始著於册原額地三萬四千一百五十六畆五分徴銀一千零二十四兩六錢九分五釐自康熙二十三年至雍正十三年増地十一萬八千三百四十八畆零四釐共地十五萬二千五百零四畆五分四釐分上中下三則銀與粟米各半徴收雍正五年分則之制見前徵賦規制條下共徴粟米三千二百六十七石九斗二升八合二勺八抄三撮徴銀一千六百零一兩二錢九分七釐六毫七絲自乾隆元年至四十五年零丈十次海丈一次各縣自行查丈為零丈府屬通行查丈為海丈續報起科并出旗民人隨帶地共増地六千五百八十三畆七分七釐五毫内開除水沖沙壓地二千九百六十九畆二分五釐實在原額新増共地一十五萬六千一百一十九畆零六釐五毫銀米各半按三則折中徴收徴米者毎畆徴四升二合八勺八抄五撮徴銀者每畆徴二分二釐共徴米三千三百四十五石二斗八升八合一勺徴銀一千六百三十九兩二錢五分民人徴租餘地自乾隆三十年通行清丈查出民人私墾地畆作為餘地徴租是年至四十五年節經清丈共丈出地二萬一千三百三十六畆内開除水沖沙壓地七十五畆實在餘地二萬一千二百六十一畆每畆徴銀六分共徴銀一千二百七十五兩六錢六分民典旗人餘地及永逺徴租暫行徴租地自乾隆三十五年歸縣徴收是年至四十五年節經收除實在民典旗人餘地四百一十七畆每畆徴銀六分内盖房地一畆二分照上則徴銀七分共徴銀二十五兩零三分二釐實在永逺徴租地一千七百零四畆一分每畆徴銀六分共徴銀一百零二兩二錢四分六釐實在暫行徴租地一萬零一畆每畆徴銀六分共徴銀六百兩零六分遼陽州順治十年置縣康熙三年改州二十二年田賦之額始著於册原額地二萬九千九百三十五畆九分八釐八毫三絲三忽徴銀八百九十八兩零七分九釐六毫四絲九忽九微自康熙二十三年至雍正四年増地一萬九千零七十畆五年通行清丈後増地十七萬六千四百五十三畆有竒是年至雍正十二年増地三百七十畆有竒共地二十二萬五千八百二十八畆九分分上中下三則銀米各半徴收共徴米五千零四石零六升二合七勺九抄一撮徴銀二千三百七十一兩二錢三釐四毫五絲自雍正十三年至乾隆四十五年零丈十三次海丈一次續報起科并出旗民人隨帶地共増地二萬一千四百八十四畆二分三釐内開除水沖沙壓并重科地一千七百一十五畆實在原額新増共地二十四萬五千五百九十八畆一分三釐銀米各半按三則折中徴收共徴米五千四百八十六石七斗一升一合三勺徴銀二千五百七十八兩七錢八分外有全徴銀地一項自雍正五年析鳯凰城界内地𨽻於州計二千七百九十五畆八分六年又析岫巖城界内地𨽻於州計一千四百六十畆零八分每畆徵銀二分一釐不徴粟米共徴銀八十九兩三錢八分八釐六毫乾隆三十七年析歸岫巖城地一千四百二十六畆七分實在地二千八百二十九畆九分徴銀五十九兩四錢二分八釐民人徴租餘地自乾隆三十年通行清丈查出民人私墾地畆作為餘地徴租是年至四十五年節經清丈共丈出地二萬一千五百二十六畆二分内開除撥歸岫巖城餘地七十二畆二分實在餘地二萬一千四百九十四畆五分每畆徴銀六分内連界岫巖地一千一百二十三畆七分四釐每畆徴銀五分共徴銀一千二百七十九兩一錢五分五釐民典旗人餘地及永逺徴租暫行徴租地自乾隆三十五年歸州徴收是年至四十五年節經收除實在民典旗人餘地二千四百零七畆五分每畆徴銀六分内連界岫巖地每畆徴銀五分共徴銀一百二十四兩二錢六分九釐實在永逺徴租地九十畆每畆徴銀六分共徴銀五兩四錢實在暫行徴租地二千四百九十八畆每畆徴銀六分共徴銀一百四十九兩八錢八分海城縣順治十年置縣康熙二十二年田賦之額始著於册原額地三萬零八百八十一畆三分四釐三毫徴銀九百二十六兩四錢四分零二毫九絲自康熙二十三年至雍正十二年増地十五萬四千四百零五畆有竒共地十八萬五千二百八十六畆三分八釐内有岫巖城全徴銀地四千三百七十七畆有竒雍正六年析𨽻於縣每畆徴銀二分一釐共徴銀九十一兩九錢二分五釐乾隆三十七年仍析歸岫巖城不復𨽻縣分上中下三則銀米各半徴收共徴米七千四百七十八石八斗六升零七勺二抄五撮徴銀一千九百九十一兩四錢六分九釐六毫九絲自雍正十三年至乾隆四十五年零丈十五次續報起科并出旗民人隨帶地共増地二萬零七百八十二畆二分有零内開除水沖沙壓地七百五十七畆八分並撥歸岫巖城四千三百七十七畆有竒實在原額新増共地二十萬零九百三十三畆三分四釐九毫銀米各半按三則析中徴收共徵米五千二百七十四石五斗零四勺徴銀二千一百零九兩八錢零一釐民人徴租餘地自乾隆三十年通行清丈查出民人私墾地畆作為餘地徴租是年至四十五年節經清丈共丈出地三萬九千四百七十四畆三分七釐八毫内開除水沖沙壓地一百十九畆一分五釐并撥歸岫巖城餘地四千二百零五畆零三釐八毫實在餘地三萬五千一百五十畆零一分九釐每畆徴銀六分共徴銀二千一百零九兩零一分二釐民典旗人餘地及暫行徴租地自乾隆三十五年歸縣徴收是年至四十五年節經收除實在民典旗人餘地二千四百八十九畆五分每畆徴銀六分内連界盖平旗地三百九十三畆每畆徴銀七分共徴銀一百五十三兩三錢實在暫行徴租地二千七百一十五畆九分每畆徴銀六分内連界盖平旗地七百二十九畆每畆徵銀七分共徴銀一百六十五兩四錢一分四釐盖平縣康熙三年置縣二十二年田賦之額始著於册原額地一萬六千三百六十四畆二分九釐徴銀四百九十兩零九錢二分八釐七毫自康熙二十三年至雍正四年増地一萬九千六百二十九畆一分一釐五年通行清丈後増地六萬八千零八十畆八分是年至十二年増地二萬