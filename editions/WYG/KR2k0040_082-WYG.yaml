body:
  text: 國朝人物十四正白旗漢軍正紅旗漢軍欽定四庫全書欽定盛京通志卷七十八國朝人物十四正白旗漢軍石廷柱𨽻正白旗漢軍先世為遼東武弁父翰始家焉兄弟三人長國柱次天柱次即廷柱天命七年來歸國柱天柱俱積軍功至副將廷柱當太祖初命在文館任事授三等輕車都尉世職十一年從征囊努克取其屯寨晉三等男天聰三年率兵勦明故將毛文龍所屬諸島有俘獲四年收復漢兒莊率其城將士來謁五年圍大凌河城諭降祖大夀六年從征察哈爾七年隨攻旅順口以功晉三等子世職崇徳九年太宗御演武場以廷柱軍容整肅賚之二年以廷柱為漢軍左翼都統四年戰松山屢破敵兵六年陳取錦州策太宗嘉納之再圍松山乗夜破敵晉爵二等子七年分漢軍為八旗以廷柱為鑲紅旗都統順治元年從入闗平定山東山西河南累以戰功加至一等伯十二年以鎮海將軍鎮京口戢和兵民百姓安堵有石佛之稱十四年乞休加少保兼太子太保致仕尋卒賜祭葬諡忠勇子六人華善琳珍俱知名華善官至將軍防守鎮江殁後鎮江人思其徳建祠立碑華善子文炳仕至杭州副都統亦有政績和濟格爾䝉古烏嚕特人𨽻正白旗漢軍天命七年大軍圍廣寜城偕守備石廷柱來歸授叅領十一年從征囊努克棟奎皆有功天聰三年偵明兵於薊州五年敗大凌河城援兵斷其樵採崇徳三年從征明至山東屢戰皆㨗五年擊破松山歩兵杏山騎兵六年明總督洪承疇援錦州駐軍松山一再犯我師復自松山分踞髙橋三臺和濟格爾力戰敗之七年攻克塔山杏山二城畧功授騎都尉加一雲騎尉先是分漢軍為四旗以和濟格爾為鑲白旗副都統至是分為八旗改正白旗副都統遂為漢軍正白旗人八年從攻寜逺克中後所前屯衞二城順治元年晉世職為三等輕車都尉三年卒子巴圖襲徐大貴𨽻正白旗漢軍初任佐領兼工部理事官崇徳五年從圍錦州屢敗松山杏山援兵是時明總督洪承疇駐軍松山分兵踞髙橋南三臺大貴攻克之既而明兵千餘乗夜犯我營率所部力戰斬二十餘級七年從克塔山杏山二城授雲騎尉世職八年從克中後所前屯衞二城晉世職為騎都尉順治元年擢副都統從征山西定太原勦流賊李自成於延安大破之二年從豫親王多鐸平定河南江南晉三等輕車都尉三年遷刑部侍郎兼副都統如故七年駐防杭州九年偕平南將軍金礪勦閩賊鄭成功時成功踞海澄以衆三十餘萬㓂漳州大貴督兵進擊殱賊三萬餘遂攻海澄賊扼隘拒戰連破之晉世職至一等輕車都尉加一雲騎尉十二年晉爵三等男先是明魯王朱以海據舟山既敗走依成功成功乗其赴南澳遣人沉之海而其諸將阮思陳六御等願留為成功用及是思等引衆䧟舟山大貴從大將軍伊勒徳征之十三年進兵定海思等以戰艦二百餘迎戰敗之望江再敗之衡水洋思六御授首遂復舟山十四年引疾乞休加太子少保致仕尋叙復舟山功晉爵二等男康熙十八年卒賜祭葬諡勤果馬國柱遼陽人𨽻正白旂漢軍天聰八年舉人入直内院崇徳三年授都察院理事官順治元年巡撫山西時甫平大同忻代太原遂以次定汾州平陽潞安澤州胥安輯之而境内土賊螽起乃馘閻汝龍於陽曲䧏髙九英於嵐縣勦梁自雨李俊於交城陽曲山西悉平擢宣大總督遷江南江西河南總督檄兵會侍郎鄂屯俘斬安慶土賊馮洪圖及其黨將懋修鍾武㑹江西總兵金聲桓據南昌叛賊將潘永禧突犯徽州遣官兵撃郤之復遣副將楊捷等克復都昌擒偽尚書余應柱乗勝趨武寜擊敗賊黨鄧雲龍等未㡬廣東叛將李成棟犯贑州大破其衆而聲桓已為大軍所蹙赴水死江西悉平是時江北諸賊依山結寨詭以奉明宗室名時出刧掠國柱遣副將朱運亨等擊英山賊陳元破之於三尖山檄總兵卜從善勦白雲梅家英窠諸寨偽石城王朱統錡糾賊五千餘由金紫寨赴援擊郤之乗勝連破賊寨擒偽總兵孔文燦偽副將方學達等復總兵㑹提督巴山張大猷勦六安州賊陣斬其渠張福寰候應龍䧏其黨王俊籍維倫等江北悉平先是偽國公張名振奉明魯王朱以海竄舟山偽侯吳凱踞大蘭山􅂇之國柱寓招凱凱與偽伯顧竒勲偽將軍姜君獻偽總兵陳徳芝等來降名振勢遂孤盖順治六年事也是年秋江南河南州縣雨雹傷稼請履勘蠲䘏之復請改南京國子監為江寜府學並報可九年福建賊張自盛竄入江西大覺嚴檄提督劉光弼㑹閩兵合勦自盛就擒十一年名振由海道屢犯崇明劉河吳淞遣總兵王璟副將張思達等率水師分擊之連敗賊於靖江㤗興燬其船名振逺遁入海尋湖廣賊頼龍等犯江西國柱與湖廣總督祖澤逺會師搗其巢於桂東獲頼龍等斬之累加太子太保以年老致仕康熙三年二月卒賜祭葬如例祀江南山西名宦宜永貴遼陽人𨽻正白旗漢軍任佐領兼㕘領崇徳五年從圍錦州以礟攻克凉馬山等處六年復圍錦州戰松山克髙橋南三臺七年以礟克塔山附近各臺及其城叙功授雲騎尉世職八年攻克中後所前屯衞二城晉騎都尉順治元年任兵部理事官二年從征河南追敗於潼闗又從征江南進克揚州破敵戰艦斬馘無算六年為臨清總兵大破土賊杜全張文齊等於朝城濮州皆授首九年任都統尋授倉塲侍郎晉世職一等輕車都尉十一年授南贑巡撫攻偽都督許勝可兵於羅漢岩擒斬之十三年調福建㑹海冦鄭成功率衆猝犯福建薄城下時官兵俱赴漳泉徳化永春守城单弱永貴力疾登陴拒守乗間出城斬俘不可勝計賊鋒頓挫一月圍解康熙四年致仕尋卒賜祭葬如例以追叙福州全城功加至三等男蔡士英錦州人𨽻正白旗漢軍順治元年以佐領從入闗𠞰山東土賊康玉環及招撫山西攻克太原皆有功三年隨征浙江定福建六年征叛鎮姜瓖復朔州及汾州府九年以右副都御史巡撫江西𠞰廣信土賊楊文吉安土賊劉京等悉平之士英奏請豁江西勘實荒田免逋賦五十八萬有竒免缺丁五十九萬有竒又請减瑞州浮粮十萬餘石袁州粮率每畝浮一斗六升有竒士英請减之視新喻九斗三合為定額以蘇積困疏上皆報可民甚徳之十二年晉淮安漕運總督興利除弊逺近悦服晉兵部尚書康熙四年卒賜祭葬諡襄敏祀江西淮安名宧所著有撫江集督漕奏議於時躍廣寜人𨽻正白旗漢軍順治二年任江南合肥令遷河南懐慶守擢分守河南道𠞰土賊劉芳等平之八年任陜西按察使聴斷明允案無積牘一時有於不落店之謡駐防兵擾民時躍一繩以法馭吏尤嚴所屬無敢受賕者十年巡撫廣西時李定國等擁朱由榔尚盤據雲貴朱盛濃等應之時躍至斬賊無算陣擒盛濃十四年孫可望䧏定國竄入雲南南寜太平等六郡尚為賊黨所據時躍籌兵畫餉親督師進𠞰六郡以平十八年擢廣西總督偽徳陽王朱至濬竄入安南時躍遣使招撫至濬等投城加都察院右都御史康熙二年卒於官賜祭葬如例祀廣西名宧夏一鶚奉天人𨽻正白旗漢軍順治三年知江南常州府時山湖藪澤尚多伏莾一鶚悉心勞來威惠並著盗賊皆為良民尋轉江寜知府及江西分守道八年授江西巡撫江右境土初定政多穢濁土地荒蕪一鶚㕘劾貪吏二十餘員吏治澄肅請釐錢粮户口招集流亡開墾荒地給還官産安揷明朝廢冡期年政務具舉明翰林傅鼎銓等受偽職聚衆為亂徃來福建江西一鶚調兵分路夾擊追至福建斬級萬餘生擒鼎銓并偽總兵楊起龍等又九仙山賊首陳九思宜黄賊首曾明等負固山寨出沒為㓂一鶚𠞰撫兼用分地設防賊黨先後就戮境土悉安嗣卒康熙十七年崇祀江西名宧祠閔三元𨽻正白旗漢軍世居錦州順治初隨入闗五年授河南鹿邑令為人亷明有才畧時邑新墾粮多詭寄力為釐正由是賦役均而國課增官署學宫皆毁於兵燹三元一一創立規度稍備鹿邑自黄水汜濫後舊溝淤壊三元徧閲境内相其髙下詢覽舊蹟共開渠增培使瀦水之區悉達於河邑北枕渦河為患三元増築堤防㑭永無衝決在任五年百廢具舉及去任士民道遮攀留立碑以記卒祀名宦金培生奉天人𨽻正白旗漢軍順治初任陜之潼闗道時闗中㓂亂初定民未安集草竊乗時間發培生築城浚隍興教化勵風俗嚴保甲勸開墾著有治績及卒入祀名宦王宗聖奉天人𨽻正白旗漢軍順治中知江南之舒城令詳慎明决吏不敢欺而獄無枉縱案無積滯邑當兵燹後安輯流亡惠威並著吏民咸深感戴卒祀本邑名宦遲日巽廣寜人𨽻正白旂漢軍順治七年知山西觧州之夏縣時叛鎮姜瓖餘孽猶潛伏山林日巽練鄉勇躬徃督戰殄之脅從者赦之俾得復業又力請蠲積逋減役省徭夏人始蘇崔宗人奉天人𨽻正白旂漢軍順治十二年知江南常州府惠貧弱抑豪强發摘奸伏吏民驚若神明十三年大軍征閔駐郡時有逰騎逐婦女二人溺死宗泰即白諸將軍按法治之麾下肅然民得安堵卒祀名宦石文晟奉天人𨽻正白旂漢軍康熙中知山西平陽府時嵗饑方有造船運米役上官又令民輸草三十五萬束於大同文晟請就近收買罷之又言賑饑煮粥止便少壯能就食者老病婦孺且坐斃請散賑官親厯山僻安户給之全活無算康熙三十三年巡撫雲南豁達多才畧為政務舉大綱先是雲南屯賦仍前明舊額科重賦繁軍民病之又晟疏請減十之六又請增鄉試解額以振起人文士民無不敢戴及調廣東巡撫尤多惠政粤人思其徳祀名宦于翔漢奉天人𨽻正白旂漢軍康熙十三年知陜之隴州先是逆藩吳三桂遣偽將軍元攻隴州前官翁世庸被報城䧟未幾大軍克復隴州賊西遁復遶踞闗山頂塞路守險總督哈占等卒兵屯咸宜闗相持不下翔漢供億彌年人民安堵擢鳯翔知府休養瘡痍人頼以安蔡敏榮士英子𨽻正白旂漢軍康熙十九年授綏逺將軍同諸軍恢復雲南賊平後改授雲貴總督時逆氛初靖流離載途敏榮招撫散亡給牛種勸耕作流民漸復業奏上籌滇十疏設施各有條理滇人徳之余三級𨽻正白旂漢軍世居遼東初任湖北黄州府同知轉武昌守秉公持正修舉百務才能肆應事集而民不病厯任山東按察使尢亷明平允不狥情不枉斷及轉廣東布政使清操彌著公署中饘粥宴如也卒祀湖廣名宦蔡毓秀奉天人𨽻正白旂漢軍康熙十六年知浙之奉化縣值嵗暮鄉民以逋課治獄者數十人悉放還家約以新正完課民感泣如約邑有盗魁二人行刼横州里毓秀擒磔扵市積匪歛迹請免運衆役兵米民累得甦輿誦徳之遅維坤廣寜人𨽻正白旂漢軍康熙十九年知山東聊城縣寛嚴皆中節公暇即詣隴畝勸民力作兼諮訪時事長幼皆得盡言故所興革皆切中利弊闔邑大治尋卒於官祀名宦楊宗仁奉天人𨽻正白旂漢軍康熙中由甘肅階州知州遷臨洮同知監蘭州鎮逺橋商税正額外一無羡餘值嵗歛請發倉賑饑减税額招流亡上官有疑獄輒付宗仁一訊即决郡多盗有老爪賊尤為民害因讞他獄得百餘案皆窮治捕置諸法盗風頓息滕天綬遼陽人𨽻正白旂漢軍康熙二十五年知陜之漢中府練達精敏公廷清暇嘗言政以富教為本爰修復廟學倉厫㑭民知務本漢南素繞水利天綬相視地形築堤建閘啟閉有期蓄洩有界自是争端永杜灌溉之利垂諸永乆卒祀漢中府名宦董學詩遼陽𨽻正白旗漢軍康熙二十六年知山西懐仁縣年少精敏待士撫民咸得治體在任三年治行為當時最劉民瞻𨽻正白旂漢軍康熙二十八年知山西沁州值嵗荒設法賑救全活無算陞平陽府同知累陞至直𨽻正定知府并著賢聲後崇祀沁州名宦羅文瑜𨽻正白旂漢軍世居廣寜順治乙未進士授山東曹縣令弱􅃣蒞任即能發奸摘伏奸宄潜踪待士和而有禮御下寛而不縦時文量官地立法詳宻弊清而人不擾尋擢濟南守卒祀曹縣名宦羅文現𨽻正白旂漢軍世居廣寜康熙三十五年擢汝南道勵士習勸耕農招墾荒地飭嚴保甲盗息民安聴訟詳慎鋤强除暴每冬月捐俸施粥全活無算崇祀名宦白璧琛奉天人𨽻正白旂漢軍康熙五十一年擢粤之廣南韶道墨吏望風引遁江灣向為奸藪璧琛至任設法𠞰滅之西山猺獞相鬭单騎厯險諭降之嵗朝禱雨輙應轉荒為豐民咸頌之正紅旗漢軍寗完我𨽻正紅旗漢軍世居遼陽天命初來歸事貝勒薩哈璘以兼通䝉古漢文任事文館天聰四年偕達海招諭永平從征大凌河撫諭察哈彌部以功授騎都尉世職六年與范文程馬國柱等疏陳伐明之䇿太宗嘉納尋以好博革世職閒居數年順治元年起用為學士二年擢内院大學士六年修太宗實録允總裁官加二等輕車都尉晉議政大臣十三年加少傅兼太子太保十五年致仕康熙元年聖祖念其贊理機務年乆命擢其子為内院學士四年卒賜祭葬立碑墓道諡文毅雍正八年詔入祀賢良祠郎賽𨽻正紅旂漢軍世居開原鐵嶺本姓劉天命元年來歸四年太祖取明撫順郎賽從著勲伐六年從取明瀋陽在事有功崇徳七年漢軍分𨽻八旗郎賽始𨽻正紅旂尋管佐領八年隨征明寜逺拔中後所前屯衞敗遊繫吳良弼等斬縂兵李輔明等十二月隨征黑龍江俘獲甚衆順治元年隨入闗破賊將唐通於一片石嗣追流賊至潼闗率衆前驅大破之二年抵揚州克其城尋破江隂等郡叙功累加世職至一等輕車都尉十三年擢為寜海將軍鎮守福建十六年海㓂鄭成功率兵犯鎮江朝廷遣禁旅至福建㑹同郎賽由厦門進𠞰禁旅因風失利事連郎賽並逮問削爵康熙八年事白復職十年卒吳守進𨽻正紅旂漢軍初事太祖以功授㕘將世職天聰五年七月初設六部以守進為户部承政嗣晉佐領崇徳三年更官制授户部佐㕘政四年縁事革世職六年隨圍錦州以巨礟克塔山四臺斬馘甚衆七年擢都統敗明松山杏山兵復擊明吕翁山兵敗之又追敵入杏山拔其城順治元年從平山西攻太原克之二年南征敗明太監髙起潜軍於洋子江獲其船艦從攻揚州嘉興及江隂皆有功四年累加世職至一等叅領充定西將軍五年卒子國柄國正皆以功名顯吳世俊𨽻正紅旗漢軍世居開元初以佐領兼叅領崇徳五年大軍圍明錦州世俊發巨礟克取馬家湖臺六年復圍錦州偕都統金礪敗明兵於吕翁山口七年攻塔山杏山毁其城八年隨鄭親王濟爾哈朗攻寜逺克前屯衞中後所二城順治元年隨都統葉臣招撫山西時流賊李自成遁陜西其偽伯陳永福猶據太原世俊與諸將攻克其城山西既定還兵擊鮑家莊賊殱之復隨英親王阿濟格追𠞰自成于陜西自成遁走湖廣三年隨端重親王博洛定浙江敗偽閣部朱大典與金華破其城大典自焚死餘黨悉平是年擢都察院左副都御史六年授正紅旗漢軍副都統屢以功叙復三遇恩詔晉爵至三等男十年以疾致仕十八年卒賜祭葬如例子延祚襲王國光漢軍正紅旗人天命初隨父一屏來歸年十四勇敢善戰初任佐領兼户部理事官崇徳中累遷副都統兼户部叅政八年隨鄭親王濟爾哈朗攻寜逺克前屯衞中後所二城順治元年改六部叅政曰侍郎國光仍任户部三年隨定西大將軍和洛㑹駐防西安擊敗興安賊孫守法胡向宸又敗其黨歐文炳等進搗賊巢拔之五年擢都統六年隨英親王阿濟格征大同叛鎮姜瓖攻克佐衛朔州汾州太谷四城十年隨定逺大將軍貝勒屯齊征湖廣擊敗偽晉王李定國于永州又敗偽秦王孫可望于岔路口多所斬獲十二年海賊鄭成功張名振犯浙江偕寜海大將軍伊勒徳往征之敗其衆於舟山成功等遁入海十三年授兩廣總督加太子太保國光亷明果斷時西逆未靖土㓂充斥國光嚴詰盗賊立連坐保甲承審之法十五年以疾還京十八年授鎮海將軍駐防潮州康熙三年㑹平南王尚可喜合兵𠞰碣石叛將蘇利進師燈籠山蘇利乗我軍未成列率衆萬餘突來摶戰我軍左右夾擊賊衆潰遁追薄碣石衞城四靣環攻㧞之擒斬蘇利及偽總兵陳英偽副將李慧等餘黨竄匿山谷國光督兵搜捕之偽總兵鄭盛窮蹙自縊死賊遂平五年還京復任都統先後叙功復遇恩詔晉爵一等男八年以老致仕九年卒賜祭葬如例諡襄壯王國詔國光弟天聰四年大軍征明國詔年十六即從征克永平五年從征大凌河崇徳元年從征朝鮮攻納摩山被重創得賞叙八年從攻明前屯衞被創順治元年從征山西克潞安追流㓂至湖廣三年隨征湖南有功六年征大同叛鎮姜瓖取朔州叙功授佐領累陞至都統康熙十三年乞休逆藩吳三桂反國詔隨征至湖廣以疾卒賜祭𦵏加典禮李國英奉天人𨽻正紅旗漢軍順治三年從肅親王豪格定蜀殱張獻忠大軍凱旋留國英鎮保順間勦平餘賊代王遵坦為巡撫治兵閬中軍旅之後饑疫頻仍國英勸農桑備戰守禮賢興學士民始復業五年賊黨譚洪犯保寜擊敗之王命臣等據順慶國英分兵三路進殱其衆追抵潼川遂定龍安綿達等州縣六年擒斬謝光祖等九年孫可望劉文秀逼閬中漢沔宸動國英擊破之十四年以兵部尚書總督川陜大興屯田以牛種數萬給墾者軍儲以足駐節所在與士卒同甘苦俸糈所入盡供餉士用康熙元年奉詔帥湖廣陜西河南四川四省㑹兵𠞰茅麓山賊李來亨袁宗第等國英師次䕫府伐榛莾開道以進遂奪羊耳山敗宗第於茶園坪追及巫山據其城宗第又合郝永忠劉體純引衆數萬來攻我兵出戰體純潰自殺乗勝追至黄草坪永忠宗第以次授首遂進兵圍來亨於茅麓山來亨窮蹙焚妻子自經死㓂孽悉平國英鎮蜀凡二十有二年以勞卒於官賜祭葬諡勤襄追敘𠞰賊功晉二等男雍正十年入祠賢良祠線國安遼東人𨽻正紅旗漢軍崇徳元年隨孔有徳航海歸誠從征海外各島及克服朝鮮皆在事有功順治元年隨大軍入闗追𠞰流賊李自成於潼闗破金溝寨復從征江南克揚州以兵先渡揚子江克江隂四年隨征湖南取衡山六年授總兵官復隨攻湖南多所擒獲招安反側官兵六七萬人隨進取廣西之桂林柳州功最隨征南寜七年李廷國犯桂林提師赴援定國遁去九年授提督十年李廷國擁衆數萬復犯桂林國安與陳維新計敗之遂平定全粤十一年復永寜州叙功加太子少保征蠻將軍順治十二年叙恢復桂林功授三等伯世襲十五年隨進取滇黔戰李定國於凉水井賊殺五千有餘復戰於水寨山口殺賊萬計十八年授都統康熙五年因老乞休十四年卒國安性亷介二十餘年清操如一人咸以為難蘇宏祖𨽻正紅旗漢軍崇徳三年直内院授啟心郎八年考滿加世職順治十一年擢福建興泉道捍㓂修城設倉濟民頗著功績十五年巡撫南贑時巨㓂李玊廷刦掠雩都降而復叛者再宏祖遣將擒之戮於市嶺北平與民休息以振興文教為己任卒祀福建江西名宦孫徳盛𨽻正紅旗漢軍初任佐領崇徳八年從征明寜逺㧞前屯衞中後所順治元年隨南征破流賊平河南江南有功三年加佐領世職四年擢西安副都統加世職至輕車都尉孫荗蘭遼陽人𨽻正紅旗漢軍順治二年任直𨽻翼州牧再任覇昌道有惠政四年任山西布政使先是駐防滿兵圏種民地以廢藩土田給之屯丁豪覇者抗不輸租荗蘭重法繩之民不失業或軍民相搆訟者質成必凖情理九年擢陜西寕夏廵撫尋休致晉人思其徳崇祀名宦祠徐永順𨽻正紅旗漢軍世居遼東順治六年任天津道時官兵𠞰靜海土賊獨天津境内無賊烽火不驚百姓安堵累擢至福建巡撫卒後天津人思其徳崇祀名宦祠吳興祚清河人𨽻正紅旗漢軍順治十二年知大寜縣縣界萬山中經流㓂蹂􅏳後四境凋弊民多轉徙學宫鞠為荗草興祚招民勸墾興學飬士不再期民復舊業寖聞弦誦聲康熙二年任無錫令邑最號繁劇前任多以罪廢數十年無遷擢者興祚至尚有前令數人虧空未完纍纍追繫興祚慨然曰彼囊空如洗拘之何益寜為代賠㑭得歸鄉井耳因設祖席延數令至告以代完諸公可即作歸計前令皆感激去在任數年以治行報最十五年廷推特擢福建按察使以計擒土賊朱統錩十七年陞巡撫加兵部尚書以兵擊破海賊劉國軒于赤澳等處焚其船興祚在任首薦臬司永寜于成龍世號知人時海氛未靖興祚留意戎行識㧞將材總督標下藍理過誤將行興祚知其忠勇可用緩頰為開生路後可以拖塲大戰䝉聖祖奬賚優擢顯職理感舊恩繪興祚像奉之姚啟聖平海壇興祚與之協謀取金門厦門叙功加騎都尉又一雲騎尉世襲二十年調两廣總督屢上疏言撫粤事宜皆中利弊三十一年授歸化城右翼漢軍副都統三十六年從征噶爾丹卒于軍興祚素善書精詩律所著有宋元聲律選及史遷句解行世許世昌遼東人𨽻正紅旗漢軍順治十四年巡按江西興利除弊亷平不苛寃獄多所平反康熙元年巡撫福建先是海㓂陸梁沿海諸郡制造戰船火炮世昌慮部議核減浮價勢必分派民間遂具疏立請准銷又請代完紳衿逋負免其解部究追又請蠲順治十三年以前牛角等税加價一十餘萬免民屯乆荒田糧六十餘萬又給遷界窮民牛種勸令開墾復捐俸委官于七門及近郊各處賑粥施藥以濟遷民之饑疫者時有萬姓饑病仁天活命之謡劉秉權遼東人𨽻正紅旗漢軍初授國史院學士康熙七年巡撫廣東懲貪墨禁苛派革供應風紀肅然時方巡海展界秉權安揷男女十六萬有竒墾田二萬五千餘頃至復竈丁而鹽課足减屯賦而戍卒安重師儒崇禮學而文風振皆治績之最著者嵗甲寅潮州鎮劉進忠叛秉權親赴潮帥師斬偽將金統挫其鋒勤謀𠞰撫以積勞卒於官汪世臣奉天人正正紅旗漢軍以廕襲世職順治十六年隨征湖北累著戰功駐防潮州時蘇利犯順世臣隨將軍王國光與賊戰於石井寨親冒矢石戰方酣又以竒兵繞出賊營勝之降其餘衆潮郡悉平尋擢廣東副都統在粤三十餘年訓練嚴明地方寜輯以疾終祀名宦王永譽國光子康熙十三年授河南提督時河北鎮察禄叛應吳三桂遣禁旅𠞰賊於懐慶永譽由孟津渡河為掎角勢兵至擒之不煩血刀嚴戢部伍閭里晏然尋調安慶提督逆藩耿精忠遣偽都督宋標等䧟江西饒州犯徽州十四年永譽進師擒宋標磔之十七年改江南提督十九年遷廣東將軍三十五年聖祖親征噶爾丹永譽統正黄正紅兩旗由中路進噶爾丹遁永譽督兵追躡偵賊逺竄乃還四十三年卒祀河南名宦李芳春葢平人𨽻正紅旗漢軍順治五年知直𨽻慶雲縣邑當殘破之餘芳春年少賊甚易之屢出滋擾芳春乃與協鎮郭天培等宻謀𠞰捕前後擒賊等二千餘人訓練鄉民皆知守禦賊相戒不敢入境劉徳芳遼陽人𨽻正紅旗漢軍初任山東東昌守勤於政事勸課農桑優禮齒徳民情向化值嵗旱徳芳歩禱輙應卒至豐稔康熙四十三年擢四川按察使讞決平允時打箭爐甫定茶鹽𣙜課壅遏不行徳芳籌畫盡善嵗無停滯民思其徳嘗葺文翁石室為錦江書院蜀之人士欣然向學卒祀山東四川名宦孟希舜奉天人𨽻正紅旗漢軍順治八年知江南之廣徳州請免州縣地畝溢額銀六千七百餘兩嵗旱勘災申豁秋糧十分之一民賴以安其居官以愛民為本一時有杜母之譽董宏毅奉天人𨽻正紅旗漢軍康熙中知江西奉新縣時耿精忠煽亂以兵逼城宏毅率官兵捍禦手斬為内應者發矢先斃其偽左將軍生擒六人賊潰城賴以全明年賊萬餘踞城北獅山礟石雨下宏毅殱其前鋒又斬賊于邑之棉花地賊衆悉平邑遭亂後丁缺田荒為繪圖申請減賦之半在職四載勤勞奉公王之紀鄱陽人𨽻正紅旗漢軍康熙十六年知福建之徳化縣時逆㓂初平瘡痍未起之紀簡靜鎮撫不事紛更清理訟獄減省興作政舉民安及去任士民攀轅乞留卒祀名宦王毓竒奉天人𨽻正紅旗漢軍康熙三十二年知四川之瀘州除耗羡嚴保甲勸耕織盗賊歛避民安其業比户有豐寜之慶其殁也州人祠之王臣𨽻正紅旗漢軍父國泰别見忠節傳臣以廕初任廣東駐防協領康熙三十九年擢湖廣永州總兵整飭戎行撫䘏士卒亷介自矢不受餽遺永州頻年遭火加以大水四十四年州又大旱臣隨時設法救民無算尋卒永人思其徳崇祀名宦欽定盛京通志卷七十八
