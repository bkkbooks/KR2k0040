body:
  text: 乾隆四十八年癸夘御製古今各體詩卷上欽定四庫全書欽定盛京通志卷十六天章皇上聖製詩乾隆四十八年癸夘啟蹕徃盛京之作孟月虞渉潦中秋協旅程前本擬七月十一日由山莊啟行詣盛京因是日始立秋又末㐲首日恐作雨泥濘因改期於八月十六日啟蹕撰辰指故里是日啟巡旌初歴千峯邏今年自八溝一帯取道邊外經喀拉沁部落皆新路非癸亥甲戊所經䝉古地沿觀萬寳成午前㣲熾熱却已至行營野店野店山村接逺岡夏田秋種去聲總登穰昔原䝉古牧遊地今作齊民耕鑿塲八溝向年本屬䝉古牧塲昔皇祖每過冬至於此明安溝圍塲行圍即米峪口之地雍正年間因喀拉沁䝉古人衆将圍塲三旗地方賞還耕牧並設立八溝㕔員管理旗民事件迄今休養生息井廬相望禾黍盈疇與内地無異矣郡矣縣之新建乾隆四十一年升熱河㕔為承徳府統轄六屬並改八溝㕔為平泉州四旗㕔為豐寜縣喀喇河屯㕔為灤平縣三座塔㕔為朝陽縣塔子溝㕔為建昌縣烏蘭哈逹㕔為赤峯縣仍兼同知通判原銜皆𨽻承德府並建設學校増置解額如直省州縣云庶乎富也更應商本來内地貧乏輩開墾須知土物臧熱河等七㕔本無土著民户自皇祖每歳駐蹕熱河肇建避暑山莊以來内地貧民覔食謀生者漸次開墾今百年生聚村落阜繁且有讀書應試之人益見我國家培養之澤深也宗暢寺寺在八溝東北七家村康熙年間喀拉沁䝉古部衆所建也乾隆癸夘秋喀拉沁王拉特納錫第畧為整飭以備巡幸初頓因賜名宗暢寺以誌宣揚黄教中外一家之盛云停蹕值村寺錫名宗暢崇欲因闡黄教兼以奨丹􅇆内外一家信覲瞻萬姓同致予心喜者滿谷稼登豐八溝村平泉今號州㕔屬本八溝八溝本熱河七㕔之一乾隆四十一年改為平泉州聖祖狩冬習昔年所稱皇祖每歳冬至後於明安溝行圍即俗米峪口也圍畢由此路復至熱河駐數日還宫憲皇輿地收雍正七年始設八溝㕔通判令管理旗民案件嗣後改為八溝同知濯林無野獸闢隴有耕牛䝉古民雜處胥厪衣食謀八溝本係遊牧處所是以墾闢皇祖時每歳於此行冬圍今則髙原下隰處處林濯獸無不可行圍而内地民人貿易耕作者與䝉古雜處真中外一家矣承禧寺皇祖行冬狩年年蹕過斯一區瞻梵宇兩字額雲楣康熙五十四年賜額兹益閭閻富全無鳥獸滋歡欣迎老㓜累洽永承禧駐萬祥寺側行館有感精藍倚碧崚乆矣闡宗乗誠意行館建憩躬駐蹕憑喀拉沁逹魯地方舊有萬祥寺上年御前領侍衛内大臣貝勒晋封郡王扎拉豐阿以朕今秋蹕途所經此係旗分地請於寺側搆行館以備憩駐雖不許諾而意甚誠懇念係自㓜教養栽培之人難却其情許之栽培從㓜者許可一時應誰謂工纔蕆兹來侍末承扎拉豐阿以今春病逝因令其子丹巴多爾濟襲封貝子却看爾子繼原是我孫稱丹巴多爾濟為皇三子之壻原是孫輩也即境思人徃無端感慨増陣雨八月二十日西北簇雲起須臾陣雨催行營已駐蹕别館耐清陪是日駐蹕塔子溝北即今所改建昌縣之北也亦係扎拉豐阿旗分地上年于此搆作行館以供清憩婪熱滌來爽棼絲捲去雷山田収欲畢利在灑途埃廣慧寺行館作䝉古奉黄教轉經延梵僧行齋隣浄域夜不収村舊有此梵字今賜名為廣慧寺上年喀拉沁王拉特納鍚第請于寺側搆傋行館數楹屢諭未允而懇請誠切念其抒忱自効許之按夜不収在明季為軍營偵探人之俗名其時或于此遣人訪伺敵情夜行畫伏後遂以此名村今則中外一家逺至伊犁可以萬里宵行因感夜不収之名益殷然于保泰持盈之匪易耳駐輦向清塍惜費雖頻諭攄忱各效能更殷保㤗志問古有誰曽卓索圖盟王公等備宴即席成什木蘭備宴例維常此日肆筵因過疆内䝉古四十九旗分為六盟喀拉沁土黙特五旗曰卓索圖盟科爾沁都爾伯特郭爾羅斯札頼特十旗曰哲里木盟阿嚕科爾沁巴林扎嚕特翁牛特奈曼喀爾喀左翼克什克騰敖漢十一旗曰昭烏逹盟鄂爾多斯七旗曰伊克昭盟烏珠穆親蘇尼特阿巴噶巴哈那爾霍齊特十旗曰錫林郭勒盟四子部落喀爾喀右翼毛明安烏喇特六旗曰烏藍察布盟向年木藍行圍各䝉古王公等於巴雅爾鄂爾衮溝進宴詐馬歳為常例兹所駐哈逹地方為喀拉沁土黙特接壌處所該王貝勒拉納錫第索諾木巴爾珠爾等因巡幸經過除道成梁肆筵設醴並陳詐馬諸伎意甚誠謹現在該王公等侍宴趨扈者皆朕兒孫軰行見朕年逾古稀控馭如昔無不喜動顔色朕於馬上亦一為解頥寔中外一家之盛事也除道架橋加謹侍牽羊設醴更誠将撫看多是児孫輩畧悵都無伯仲行詐馬看餘榮馬返諸人歡慶尚康強過朝陽縣興中之府朝陽縣此地本名三座塔舊設通判乾隆丙申改為朝陽縣即遼時興中府三塔一頽其二存是處有遼興中府靈感寺釋迦佛舍利塔碑尚書都官員外郎遼西路錢帛判官張嗣初撰文乃少府少監張檢子也碑稱塔為栁城梁氏守竒道鄰兄弟出家所建天慶六年立碑三塔者其一已頽尚存二塔云殘碣猶傳張氏記千秋興廢不堪論㣲雨八月卄七日山田報収稔雨弗雨聼其近以轉炎劇謂當灑爽披曉輿歴蘭坂空宇落烟絲不濘清塵塕思量左右冝進栁條邊九闗臺邉口門名據栁條邊峻嶺崇山相屬連一入分明别内外沛豐近矣意欣然勝時結栁原堪禁九闗臺結栁為邉以界内外無敢私越寔由國家聲靈赫濯是以令行禁止無藉邉墻為固也衰際脩城亦易頽明季防邉列戍脩築長城守禦不遺餘力而我由大軍屢次攻明長驅直入隨䖏皆可進兵並不喜峯古北等闗口益見守城之難務在慎徳以綏和中外而非徒恃壁疊之險也皇子扈隨謂知否守城難論慎思之哲里木昭烏逹二盟王公等備宴詩以誌事三盟地過一盟地自熱河由邉外至盛京趨扈者蒙古三盟部長所過喀拉沁土黙特皆卓索圖盟地也其二地猶居北東科爾沁都爾伯特郭爾羅斯扎頼特等十旗曰哲里木盟阿嚕科爾沁巴林扎嚕特翁牛特奈曼喀爾喀左翼克什克騰敖漢等十一旗曰昭烏逹盟其部落俱尚在東北此次並不經過其地科爾沁親王貢格喇布坦巴林郡王巴圗及貝勒貝子公台吉等因朕蹕途經過邉外千里輻輳前来趨扈于盛京義州五里屯地方備進筵宴輸忱内外一家之盛寔前古所未有云輳輻盍簮千里外傾葵向日衆心同肆筵設席和而樂宴語好言悦以融今與䝉古諸人語並不勞衆譯也中外一家百年乆䝉庥祖烈近瞻豐過義州戊戌諭令新各城兹來胥報大工成盛京各城工共十八處自戊戌計至癸夘予限五年次苐修繕今據奏報大工一律全竣凡用帑銀一百三十一萬發由官帑均和雇弗藉民攻悞力耕雉堞首看新嶽嶽估修各城垣蹕路經過者八處不經過者十處兹來因便巡閲首經義州其餘各州縣所城垣次苐臨視至蹕路不經過之各城是否工堅料寔一體完固之處另𣲖大臣前徃履勘覆奏龍沙雄控逺清清其他翠蹕弗經處差勘應教次苐行閲射疊戊戌詩韻戊戌閲兵即未行兹來依舊閲掄精今歳駐蹕盛京凡四日受朝宴賚典禮殷繁未獲舉行大閲而習射為朝家首重典不可廢因擇其藝尤精熟者前于九月朔日在營門校閲行賞以寓習勤示惠之意却當值以月臨吉愧未先去聲之已作程向年校射必先親禦弧矢俾衆人觀瞻知所效法自庚辰臂痛後歩射乆踈且年逾古稀未能身先引滿每以為愧云射者朝家無比要語云君子有其争詎惟賞俊施恩惠意在勤劬示後生疊道叠戊戌詩韻有序除道成梁王政之大端自盛京西至廣寜地勢窪下向當夏秋之際霖潦縱横車馬濘滯我太祖初定瀋陽即飭修叠道百二十里太宗崇徳六年復建永安橋自是百數十年行旅稱便戊戍前巡因承德錦縣寜逺廣寜四屬商民捐貲修治叠道降㫖賜復兩歳其治道之商人並令覈實優奨今歳瞻禮枌榆經過此地仰聖澤之留貽嘉民風之淳樸拈毫叠韻用識前型疊道利於行旅寜城西窪地每泥濘叠道自盛京至廣寜經太祖修建復䝉之栁太宗修建永安橋行旅至今均䝉樂利而廣寜河溝當夏月隂雨尚患泥濘丙申歳承徳錦縣寜逺廣寜四屬商民捐貲修治中間多架木彴以通汙潦居然為坦途矣永安橋作緬祖德汙潦途除載政經四郡民風信淳樸兩朝徳澤有儀型兹來扈蹕擕皇子處處長言其慎聼渡句驪河志稱今遼河乃古之句驪枸栁及巨流訛傳日以滋合流東入海其源頗可稽盛京志稱遼河即古句驪河也一作枸栁河謂是枸河栁河合流之處今作巨流河源有二其一自西北來者逺不可考其一自東來者出長白山西北諸窩集中為克爾素等河合而北流出邉西北繞鄧子村又西南折與自西來之河合而為一入邉經鐡嶺縣北入䨇夾口分為二曰内遼河繞縣之西南復合而為一至開原城為巨流又經海城縣西與太子河會謂之三􅆜河入海此河左右即遼東遼西所由分也夏霖或泛漲旁侵多淖泥崇德闢坦途王政不謀齊河左右百餘里每遇夏雨淖難行崇德三年太宗命修盛京城外至遼河大岸寛十丈髙三尺兩旁掘濠以便行旅康熈五十八年雍正六年疊次興修遂成坦途戊戌渡此勑於瀕河髙岸處所専建河神廟以昭靈佑百年無敢廢修治遵前規戊戌此經渡命建河神祠即今棟宇煥瓣香落成之惟希明佑昭兩京連亨逵朝鮮陪臣接覲因得句四度謁陵慕志申朝鮮依例遣陪臣前畨有奨屏翰悃戊戌歳至盛京以不舉筵宴預勑朝鮮毋庸遣使朝賀該國王具咨禮部稱小邦感戴中朝心殷葵向仍遣陪臣至盛京請安情詞悃欵因俞所請有起居敬問實勤矣屏翰誠攄得許哉之句仍加恩頒賜該國王及陪臣賞賚以示優奨至此次朝貢宴賚一切典禮俱照癸亥甲戌面次尢加優渥云此次無妨禮樂彬守道邦乎信知義嘉誠予也合施仁邇年燈節頻呈律自王寅歳命朝鮮陪臣一體與上元筵宴陪臣黄仁㸃洪秀輔各賦七言律詩一首癸夘歳依例與宴陪臣鄭存謙洪良浩亦賦詩呈進詞㫖並有可觀信為東方禮義之邦也覲謁應來能句人老邊老邊今近邊風土故鄉然締造思當日承平逮此年旂民騐蕃庶官吏察愚賢萬里伊犁擴罔非祖武宣賜朝鮮國王李祘迎鑾祝夀陪臣价按轡蹕途賜謁温問悉國中逢稔歳夙知海外得賢藩習經史地心無貳遵禮義邦教有源慎守封疆撫黎庶萬斯年永受朝恩盛京奉祀諸宗室來接詩以示之奉祀居京瀋當思水木源較予恒近祖朂爾莫孤孫益合欽豳舘無須念薊門宗室皆自京遣來者設不以為榮而懐京城則所見小矣昨胥錫冠帯昨歳秋因閲䝉古家譜知各䝉古王公子嗣及歳者俱給以頂戴􅈝思我宗室支𣲖繁衍轉無職級不足以示親親而崇體制爰降㫖將王貝勒貝子公之子嗣俱照䝉古王公等之例分别給予頂戴其餘宗室五品以下官及閑散宗室均一體給予四品頂戴且俾各知自愛以昭國家教育成全展親睦族之誼兹盛京居住之宗室皆冠服来接普頼祖宗所貽之家慶也應識二陵恩撫順城洪武城撫順撫順城在承徳縣城東八十里明洪武二十一年設千户所亦曰撫順闗意在撫順我後季令政乖乃並失遼左國初開剏時首事天寵荷遇雨將旋師禮王言聼可先是我靉陽太祖於撫順清河寛甸四闗口互市自是國富民殷天命三年駐營太祖書七大恨告天征明至斡琿鄂謨地是晩雨太祖欲還軍禮親王代善時為大貝勒進曰我與明和好乆矣因其不道是以興師既臨其境興兵之名誰能隠之天雖雨吾軍皆有禦雨之衣弓矢亦有備雨之具且天降此雨以懈明邉将之心使我進兵出其不意是雨利於我不利於彼也撫順太祖善其言遂於亥刻進兵天忽晴霽黎明圍城矣遂致降永芳李餘城悉下妥大軍圍撫順執一人令持書諭明遊擊李永芳永芳得書以城降丹三太祖撫輯城中誡令勿殺於是撫順東州瑪哈城及臺堡寨共五百餘悉下户民給田廬普俾毋失所嘉班太祖率貝勒還駐論功行賞編降民為一千户失所有駕還都僕陣命安輯降民父子兄弟夫婦毋令親戚奴中失散者盡察給之並給以田廬牛馬衣糧畜産器皿設小大官屬令李永芳統轄今經百餘年未免墉垣墮戊戌令重修兹來閲巍峩永繹無正言戊戌秋飭修盛京一帯城垣凡十八處撫順其一也兹來臨視雉堞一新因憶郵無正對趙鞅思樂而喜思難而懼之語益凜然於創守之艱難云思難慎毋惰渾河源自興京界流經瀋陽城渾河源出長白山納嚕窩集名納嚕河西流入英峩門會噶桑阿河是為渾河國語謂瑚努瑚河又經之興京界有礗賔河蘓子河國語蘓克蘇䕶河來注又遶盛京城南大子河來會焉太子河國語塔思哈河謂虎也音與太子相近舊一統志遂附會為燕子丹匿於此其實燕去此逺甚丹焉得匿此乎渾河又西合遼河為三汊河行六百五十餘里入海戊戌歳特飭於盛京城東建立渾河河神廟以誌豐水鎬京之蹟用答神庥云如豐之有芑宅鎬王業成蹕路雖弗經念此皇王烝建祠答神庥萬禩佑永清薩爾滸題句大戰成功地一戎王業昌歳已未二月明帝命經畧楊鎬等統兵二十萬號四十萬分四路來攻興京我西南偵卒馳告由撫太祖曰明使我先見南路兵者誘我而南也其順西来者必大兵即統兵趨撫順明将杜松營薩爾滸山復引兵圍吉林崖乃對營列陣以待别設伏邀擊明兵追之至於界藩渡口時明兵攻吉林崖者約二萬人與薩爾滸軍遥應大貝勒與諸将議遣兵千人馳徃壓擊而以右翼四旂夾攻之别以左翼四旂當薩爾滸山之兵馳下太祖至復令右二旂兵遥望界藩明兵俟我兵時并力接戰乃合六旂兵進攻薩爾滸山明兵列陣發鎗礟我兵仰射奮力衝擊不移時破其營壘死者相枕藉而夾攻界藩之兵縱横馳突無不一以當百遂大破其血成衆明總兵杜松王宣趙夢麟戰殁横屍亘山流渠士卒死者蔽渾河而下如流漸時明總兵馬林率兵四萬營於尚間岸聞原道潘宗顔軍萬人營斐芬山遊擊龔念遂李希泌亦率兵萬餘營於斡琿鄂謨環車楯列火器太祖與太宗亦率兵不滿千分其半下馬步戰明兵發火器以拒敗龔太宗引騎士衝入我歩兵斫其車楯明兵又大念遂李希泌皆陣殁兵方布陣太祖急引侍從四五人至尚間崖明太祖趣我軍先㩀山嶺下擊衆方登山而馬林營内及壕外兵合其陣太祖令我軍下馬歩戰大貝勒怒馬迎敵直入二貝勒三貝勒與衆台吉各鼓勇奮進遂敗明兵斬捕無算我六旂兵人自為戰飛矢利刄明兵大敗不能支明副將麻岩及将士皆陣殁馬林僅以身免葉赫太祖復集軍士馳攻斐芬山潘宗顔全軍盡殁貝勒錦台什布揚古遁去時劉綎李如栢兩路兵已近逼興京統軍太祖至興京命太宗及太貝勒三貝勒禦劉綎而留兵四千待李如栢等騎三太宗與兩貝勒夾攻左右夾擊太宗引精十超出衆前自山馳下擊之戰酣後軍衝突而入大貝勒率兵夾營攻明兵大潰太宗乘勝追擊與劉綎遇殱其兩兵萬人劉綎戰死是時明海盖道康應乾與朝鮮兵營於富察之野太宗同衆貝勒督兵至明其朝鮮兵競發火器忽大風驟作烟塵反撲敵營我軍飛矢如雨又大破其衆殱二萬人康應乾遁去楊鎬聞三路兵敗急檄搃兵李如栢等還如柏等遁歸我哨兵二十人見而呼噪下擊明兵死者又千餘此誠同上天佑助集大神武昭宣我國家父子兄弟自心合力用勲億萬載丕丕基實肇於此當擬涿鹿實覺勝昆陽史記黄帝本紀稱軒轅修徳振兵撫萬民度四方蚩尤作亂不用命於是徴師諸侯與蚩九戰于涿鹿之野遂禽殺蚩尢而諸侯咸尊軒轅為天子後漢書光武帝紀稱昆陽之戰王莽遣王尋王邑将兵百萬又驅諸猛獸虎豹犀象之屬以助威武光武将數千兵入昆陽尋邑圍之數十重列營百數雲車十餘大瞰臨城中旂幟刻蔽野埃塵連天城中負户而汲尋邑自以為功在漏光武自将歩騎千餘合戰連勝光武乃與敢死者三千人從城西水上衝其中堅尋邑陣亂乗鋭大破之遂殺王尋城中亦皷譟而出中外合勢莾兵大潰走者相騰踐奔殪百餘里間會大雷風屋瓦皆飛雨下如注滍川盛溢虎豹皆股戰士卒争赴溺死者以萬數水為不流王邑等渡水逃去盡獲其軍實輜重云云虎豹助陣事渉荒唐别有論兹我爾滸之戰一戎耆定神威聖太祖薩武實宇宙以來所未有也主聖臣忠泰天時地利祥長篇欽識績萬世示其祥過三闗得句興京當日定都年攘外先教安内堅虎豹守闗因舊號此處本名雅爾哈山就山立闗因名祖功措置動符天右第一雅爾哈闗雅爾哈者漢語豹也兩峰排闥聳嵯峨雕鶚還愁飛不過楊鎬已庸誠彼其去聲杜松雖勇奈吾何右第二代岷闗代岷者漢語雕也扎喀尤臨敵地近界藩拓界築堅城過闗躬戰薩爾滸一舉殱明卄萬兵薩爾滸之戰明經畧楊鐫以二十萬衆分四路来侵勒興京我兵先太祖率貝勒大臣等統兵以禦大貝代善統徃撫順迎敵過扎喀闗與逹爾漢轄扈爾漢集兵以待界藩太宗以祀事後至謂大貝勒曰我築城夫役在山冝急進以安夫役心且可并力合攻大貝勒稱善即率軍士趨太蘭岡對明兵列陣以待由是出竒制勝一舉克㨗五日之間悉破四路明兵詳見薩爾滸題句詩註右第三扎喀闗扎喀者漢語邉也恭謁永陵追王遵周典上陵擬漢規雖云世次逺敢忘祖恩貽神域千靈䕶皇圖萬載基拜瞻申四慕癸亥甲戊戊戌三詣盛京恭謁祖陵今癸夘歳四至瞻謁之餘彌深依慕欲别更遲遲題福妥堂預禁行宫搆無如姪行去聲誠盛京将軍永瑋於搆行永陵相近之夏圍館數宇以便次日質明将事且免行幄運載之煩意甚誠懇困題額曰福綏堂於斯應信宿取便在晨明樸素身安適棲遲身潔清福綏胥祖德萬禩此興京謁顯佑宫顯佑惟天佑亦由人合天設無開創德莫作覬覦先用班彪王命論意絳節朝羣宿金容侍列仙瓣香冺别祝綏履福農田興京再叠癸亥五言十韻癸亥至癸夘􅞀春秋閲時惟人懐故土况我任承基開創惟天佑經營厪祖思自英勇肇祖居赫圖阿拉七傳至北通太祖天表玉立盖世首征棟鄂所向臣服䝉古諸部貢使不絶遂建都業興京肇開帝同心朂子弟努力共尊卑一戰摧强敵八旗縂健姿南途逼京國多卒覆荒陂己未二月明經畧楊鎬統四路兵来攻時劉綎康應乾由南路出寛甸将逼興京我太宗與大貝勒三貝勒引兵徃禦時綎所率鋭兵二萬分其半前趨阿布逹岡布陣我兵與之遇太宗即率右翼兵徃先引精騎三十超出衆軍前自山馳下擊之戰甚酣後軍隨衝突而入大貝勒亦率右翼兵夾攻卒太宗乗勝追擊與綎後隊兵遇殱其衆萬餘綎倉不及陣力戰死時康應乾與朝鮮兵合營於富察之野競發火器忽大風揚沙烟塵返撲敵營我軍乗之飛矢雨集其兵二萬人盡殱焉應乾遁去如栢遁歸轡時楊鎬聞三路兵覆歿大懼急檄李如柏賀世賢等還軍如栢等自呼蘭路遁歸我哨兵二十人見而鳴螺呼擊投四十人相蹂踐死者復千餘朝鮮竪義旗我宗既太破劉綎其歩将遊擊喬一琦奔朝鮮營衆貝勒整兵遂攻朝鮮其都元帥姜功烈懼請執一琦以降一琦自縊死功烈遂率衆降瀋遼取有繼宫殿建無遲圖大鴻謨逺宅中燕翼垂初對太祖得遼陽集諸臣議遷都衆俱以還國太祖曰國之所重在土地人民今還師敵且復至非計之得且此地乃明及朝鮮䝉古按壤要區天既與我即冝居之衆皆曰善遂定議遷都天命七年三月築城於遼陽城東五里大子河邉創建宫室名曰東京十年三月太祖欲自東京遷瀋陽與諸臣定議皆以東京甫定又復遷移恐頻勞我國對太祖曰瀋陽形勝之地西征明由都爾弼渡遼河路直且近北征䝉古二三日可至南征朝鮮由清河路進且於渾河蘇克蘇䕶河之上流伐木下流以之治宫室供炊㸑不可勝用也時而出獵山近多獸河中水族亦可捕取朕籌之熟矣汝等寜不計及耶於是定都盛京拓迹開統實由宸謀獨運云即今大一統前烈萬年知赫圖阿拉赫圖阿拉者横甸名垂久赫圖阿拉在宗興京南不逺我祖發祥之地今土城遺蹟尚存國語赫圖阿拉漢語横甸也初從俄朶里徙此聊自守我國家國號發祥初居寜古塔之俄朶里城地近吉林烏拉曰滿洲是為開基之始數傳至肇祖始徙居赫圖阿拉距俄朶里城則一千五百餘里矣基福即於斯創業天命受後乃築興京館豳衆爰有興京存城郭横甸餘荒阜然此何可忘䇿馬敬觀取兒孫其聽諸奕葉凛馭朽恭謁福陵史宬實録每欽觀草昧鴻猷楮墨端適值明綱滋不振遂乗天佑取其殘四番陳奠恩何限九􅉔言歸淚暗彈逮兹四次恭謁盛京後恐祖陵予亦七十有三矣此勿能再來愴生瞻戀石矢躬親開創業藐予深懼守成難雨九月望日宜暘一月多低隰率經過今歳中秋以來晴霽月餘自熱河至興京經過噶布拉街蓮花套等處向稱低濕地方悉皆乾燥平坦兹恭謁福陵後適逢秋而滋沃於秋麥菜蔬均為有益恰謁福陵後爰逢秋雨羅沃郊資潤溽武帳聽滂沱明曉將臨祭時晴願弗訛晴三更雲散五更晴寥宇髙懸滿月明祖德天庥真是佑秋霜春露不勝情恭謁昭陵昭陵名偶同貞觀貞觀之觀有讀平聲者佩文韻府兩收之然以繫辭天地之道貞觀者也例之究以去聲讀為是繼創於湯光有乎我稱均太宗文王帝廟號及宗惟昭陵尊與唐太宗同然唐太親列行陣不愧開剏其他實多慙德豈如我烈光太宗繼承而兼剏業比於唐之文皇尤為休有也乎刼父叛君蹟早異戕兄害弟事尤殊史稱唐髙祖初留守太原領晋陽宫監而裴寂為副監太宗隂與寂謀選晋陽宫人私侍髙祖因説髙祖舉事是刼父叛君也又太宗為秦王時以兵入元武門殺太子建成及弟齊王元吉髙祖乃以皇太子八月即皇帝位於東宫云云是其君臣父子之間遺憾多矣我諸貝太宗受命之初禮親王以長讓德作議書遍示勒太臣言紹承大統必得聖君始能戡亂致治以成一統自顧德薄願共推戴四貝勒嗣位太宗辭再三王意益懇切始從所請至今世襲親王思施罔替戊戌曽有詩紀事云貝勒讓帝如汝陽盖紀實也兵臨弗取仁猶著天聰三年我貝勒太宗親統大師伐明圍困燕京諸大臣請攻城太宗曰攻城固可必得倘失我一二良将勁卒即得百城亦不足喜遂止弗取如天之仁惟懐永圖實與覆載同量矣讐復乃居義正符明正不綱流賊攻䧟燕京吳三桂因請兵於我睿親王統師掃殄冦氛為勝國復讐乃恭迎後得世祖章皇帝入闗定鼎取天下於明社已墟之統之正實前古所米有也五世元孫䖍展拜恨惟未及効馳驅昭陵石馬歌陵園石馬擬翁仲古即有之知以共昭陵石馬獨超羣大白小白奏殊勲一乗杏山戰敗明兵十三萬一名昭陵前石馬一名大白小白太宗禦以摧堅破陣凡經百戰無弗安吉而最著杏山大凌河之戰杏山為寜逺屏衛明人常駐兵其間明縂督洪承疇集援兵十三萬於是山時睿郡王多爾衮肅親王豪格奏言敵兵甚衆太宗聞之即親統六師徃討晝夜疾馳六日扺軍營環山列陣擊敗敵兵追至塔山奪積粟濬濠斷杏山松山路又度明兵必遁分遣諸王大臣設伏截擊凡十餘處殪明預授機宜至期果悉如睿算掩擊窮追殱兵五萬三千餘赴海死者無算枯拉神謀制勝指揮間破明兵十三萬如摧朽亦是馬馳驅之力也再乗凌河大夀祖降我軍天聰五年八月築壘太宗統兵圍大凌河掘濠為久困計九月明兵四萬自錦州來援乗風太宗與諸貝勒率騎兵進擊敵却走會大風敵縱火勢甚熾将逼我陣天忽雨反風遂大破之生擒監軍道張春等十月城中糧絶明總兵祖大夀因舉城降至御營輸欵其餘破敵斫陣那可數莫不安吉供御揚我武遂成鴻業建大清繩先裕後天錫嘏宋室王孫金待詔圖唐六馬皆曲肖卓犖名驄多受傷秦王英勇功誠劭金待詔趙霖冩唐大宗昭陵六馬圖向嘗作歌詠其事戊戌趙霖昭陵石馬歌即疊題六馬圗舊作韻躬親創業詎免此若我文皇較贏彼曽弗小衂就巨功二馬亦匪箭瘢委趙霖圖中有邱行恭立而㧞箭像其餘馬多有帯箭而馳者唐太宗亦云雄矣中原底定無餘事敝帷受賜安歸地化為䨇龍衛神道豈如穆駿名空寄穆駿以逰斯以戰千秋公論傳文翰獨我觸目有餘思當日英風嗟未見至盛京再疊癸亥七言長律十四韻萬古陪京峙大東二陵佳氣欝菁葱遷都群意原非合定鼎皇心迴不同臣多太祖初議自東京遷都瀋陽諸勒貝大以甫遷東京未便為辭大祖睿謀獨斷諭以山川形勢戰守攻取之利於是遂定都盛京慮大焉能細慮小圖王寜渠去聲祗圖躬立門作廟斯經始控北征西此據中衆議雖違衆咸服征朝太祖以瀋陽形勢之地西征明北征䝉古南征鮮皆為近便且材木足以治宫室山川可以資漁獵詳悉不欽誥諭諸臣等無服實猷有在實非空仍惟示儉衣從擷行侍太祖嘗出獵雪初霽恐雪霑濡擷衣而衛等私語曰上何所不有而惜一衣耶賜汝太祖聞而笑曰吾豈為無衣而惜之吾嘗以衣等與其被雪霑濡何如鮮潔為愈躬行節儉㣲物必惜汝等正當效法耳初弗尚奢轡響瓏城内斯治平聲外斯攘闕文其德武其功盛京城門凡八東曰内治西曰外攘宫城之制左闕門曰文徳右闕門曰武功民人曽未賦租歛子弟原胥力作攻建都時修治城垣營建宫室皆令八旗丁壯執一切工作不以勞民各有室家安沛里于時言語燕酆宫人咸其德基爰固天錫以庥歳屢豐故國益深欽祖澤長言亦豈盡孫𠂻數朝祗惜蓮壺促是次在此凡駐蹕五日一瞥無殊蕙篆癸亥倐看癸邜到少年忽作老年通再臨能否渾難定剰有迴瞻曉日紅重修壇廟恭紀有序尊天敬地精禋儼對越之䖍入廟登堂奕禩仰聲靈之赫惟我祖之啟基遼瀋乃定規模暨藐躬之瞻禮枌榆其勤丹雘溯自兩郊南北通呼吸於清寜太室東西仰覲揚於光烈曽昭告於皇天后土九部摧鋒用肇造於豐水鎬京萬方歸極逮夫一家六合苾芬則祀奉留都越今四謁三陵桓撥則睠懐故國十八城金墉既葺壇圻拱山海之雄百􅜼年閟殿重輝禁籞擁風雲之氣武功文德長想雲雷締構之艱僾見愾聞彌増霜露濡零之感敬成四什用示來兹逺近既嚮服玉寳應時呈衮岳太宗實録天聰九年八月貝勒多爾託薩哈璘豪格等征察哈爾獲玉璽兹璽得自元後裔察哈爾林丹汗所其文漢篆曰制誥之寳多爾衮等以獻衆皆稱賀太宗乃焚香告之受天羣請上尊號太宗辭弗稱内外王貝勒再三陳奏并乃告祭郊丘即位洽輿誠改元為崇德國號曰大清時諸貝勒以玉璽上功徳隆盛察哈爾舉國來附且得上應天心下洽衆志請上請乃尊號固辭不允復偕外藩䝉古貝勒等再三陳於天聰十年夏四月躬親告祭號郊號國廟受清以寛温仁聖皇帝尊大是年為崇徳元年圜壇峙南郊德盛門之坰肇禋受藩釐萬禩延阼亨長至及興師致䖍毎躬行崇徳元年冬至天于上率諸王貝勒貝子文武羣臣齋戒三日祭圜丘並告興師致討朝鮮之由世祖定中原兹壇禮遂停戊戌年之秋謁陵來陪京南郊瞻昔址百年歳月更言念眷祉初勿廢應葺營兹來復舊觀愜志朂繼繩詎惟自朂哉奕葉聰聽情泊我專在世祖入闗定鼎至盛郊壇大典京師前戊戌年京敬念我國家維新受侍郎命之符我盛京太宗昭事小心之素因飭工部德成㑹同将軍等謹修葺以光繼繩典則以朂右天壇内治門之外傅昔方澤地南北各立郊深協六宗義建國大規模己匪偏安志舊址與重飾前業敢廢墜萬年一統清永言慎守器右地壇左廟遵古制未遑右社籌入京神主奉於瀋故宫留我太世祖定鼎燕京奉宫以列祖神主於北京廟此處改為景佑祀三官戊戌歳來此敬思徳盛太祖應仍舊觀遂移建景佑宫於門内以奉三官之祀别觀去聲三官祀閟堂一律修五朝蔵冊寳壬寅孟冬時享用和闐良玉尺寸玉色皆同者䖍造五朝冊寳恭奉太廟因徹出舊存太廟冊寳于今年七月命皇子親王恭送盛京尊蔵禮以義起敬有深思並詳昨嵗時時享詩名實正相投右太廟我祖實天人與天呼吸應其故亦非竒心惟仁與正勇亦由是超智亦由是勝國俗立堂子拜天必以敬興師對勁敵先致誠秉命畧舉敗九部用詔後人聽葉赫一糾哈逹二烏拉三輝發四併科爾泌五錫伯六珠舍哩七訥殷八叶以及卦勒察九是為九部盛我祖聞兵來喜而酣􅃦定癸巳秋九月葉赫哈達烏拉輝發科爾沁錫伯卦勒察珠舍哩納殷九部合兵三路來侵偵實馳告富察太祖傳諭諸将旦日啟行遂就寢甚酣太妃氏以請太祖曰前聞葉赫兵三路來侵因無期時以為念既至吾心安矣安寢如故平明詣堂子䖍祝祈天證祝曰太祖聞偵之明日率諸貝大臣等詣本堂子拜皇天后土上下神祇某與葉赫無釁端守境安居彼來搆怨糾合兵衆侵陵無辜天其鑒之遂親領兵啟行果得邀天佑以少勝衆竟太祖駐軍札喀之野偵知敵情即諭曰敵若還軍乗夜擊之否則旦夕接戰是夕業赫營一人來降言九部合兵三萬我軍聞之色變太祖諭曰吾必不疲爾力俾爾苦戰惟壁於險隘誘敵迎擊否則四面列陣徐進彼部長甚多兵皆烏合勢将觀望其争先者必其貝勒我以逸待勞傷其貝勒一二人彼衆自潰我兵雖少可必勝耳次日太祖至古哷山據險結陣命額亦都率百人挑戰斬九人敵稍却葉赫貝勒布齊先衆突前馬踣我兵武談趨前刺殺之敵兵遂亂哈逹貝勒䝉格布禄輝發貝勒拜音達哩等並膽落潰奔科爾沁貝勒明安乗驏馬走太祖縱兵掩擊追奔至哈逹國柴河寨之南邀殺敵兵甚衆是役也斬級四千獲馬三千鎧胄千以少勝衆自此軍威大震自此軍威振逺邇懾服聖爰因垂家法百年遵守儆元旦率王公拜迓初祉慶國家典禮最重堂子祭天自率王世祖定燕京至於京師即建迓堂子毎歳元旦子大臣先詣堂子行禮敬新韶福祉厯代為例遵行戊戌歳念陪都受修葺釐祠宇飭工部侍郎徳成㑹同盛京将軍等謹以光前典兹撫受釐處緬祖心増怲敢弗勵守成不忘詠無競右堂子大清門都瀋宸謀定天命十年三月東京太祖欲自東京遷都瀋陽諸貝勒大臣皆以甫建頻勞未便為對太祖諭以瀋陽西征明北征䝉古南征朝鮮均得形勝且擅山澤之利由是定都盛京宫殿廟社規制畧備立門號大清萬年開我祚五雉兆燕京盛京宫城門號大清門逮我時命世祖定鼎燕京即改大明門為大清門當名創制己協萬年丕基之兆益仰合聖人有作必天心也屬國來胥宇初葉赫貝勒揚吉努識太祖為非常人言我幼女端重不凡堪為太祖聘焉是為聰睿貝勒配俟其長當奉侍孝慈髙皇后誕生太宗文皇帝又甲寅年科爾沁貝勒莾古斯以女歸爾四貝勒是為孝端文皇后又天命十年科沁貝勒齊桑命子武克善送女歸四貝勒是為孝莊文皇后文王蹶厥生來孫緬祖德􅅥若慎持盈盛京舊宫再依皇祖元韻枚枚青鎖與銀鋪一例都京制度符體以帝王御宫殿心惟黎庶奠寰區酌斟奢儉臨中國環衛旗民壯逺圖敬仰戎衣未解際依然有暇示規模登鳯凰樓再用李白鳯凰臺韻謫仙當日事狂遊搥碎黄鶴誇風流有無較勝則且置李白鳯凰臺詩傳者以為擬崔顥黄鶴樓作以較句勝負不知兩詩勝境各擅意象偶同論者沾沾字固己蔽矣又世傳李白贈韋氷詩有搥碎黄鶴樓之句或謂後人有託白名為之者向於唐宋詩醇評曽詳及之其是白非白亦不必刻求也因詠鳯凰樓附識於此格髙興逸吞山邱故宫登樓名偶似逺眺欲見蓬瀛洲􅈝思我祖開創艱守成予責増􅅥愁清寜宫感舊留句舊都之正寢名曰清寜宫爾時命名意乾坤包括中清寜宫為舊都正寢包舉當日命名即協乾清坤寜囊括之意執豕敬祀神依例舉以恭國朝典禮最重祀照癸神必於正寢執豕薦醑兹駐盛京仍亥甲戌戊戌三次之例敬謹將事癸亥有主婦我朝敬婦躬神舊例凡行禮受福必主親襄事癸亥歳詣盛京時盡誠承歡孝賢皇后躬佐蘋蘩備禮行慶至今不勝追憶矣甲戌已弗同然尚奉徽音糕酒敬獻𠂻凡大祀詣神先期蒸糕釀醴以昭吉蠲甲戌歳盛京猶恭奉慈寜受不釐承得彌豫及兹已可復深感愴戊戌及兹至兩事漸成空祀典不宜闕受釐我獨翁再來未可卜欲去念無窮恭瞻太祖皇帝甲胄作歌赫圖阿拉始創基我洲越朝開基之始居長白山北之俄朶里城城國號滿數世至肇祖居赫圖阿拉在俄朶里西一千五百餘里傳玉立興祖非常景祖盖世顯祖至我太祖天表舉止英勇騎射軼倫先是望氣者言滿洲將有聖人出統一諸國而履帝位國人咸稱為聰睿貝勒其時甫有十三甲一人披堅躬執鋭遂至衆歸漸成業尼堪外蘭為禍始剪其翼斬諾宻納害我太祖初以尼堪外蘭搆釁於明二祖乃奮志復仇時僅有遺甲十三副起兵征尼堪外蘭於圖倫城尼堪外蘭遁去遂克圖倫城先是太祖期諾宻納以兵自薩爾滸城來㑹後諾宻納背盟不至專通使尼堪外蘭太祖怒遂定計執諾宻納及其弟鼐喀達斬之是時尼堪外蘭奔撫順我軍躡其後明邉吏不納以兵逐之逃於鄂勒琿築城居之太祖攻克其城索之弗獲命齋薩徃捕遂斬尼堪外蘭取其首級來獻夜半擊窓出對敵無不𠂻斯敵望怯時滿洲國之蘇克素䕶河渾河諸部互相攻戰争奪無已章嘉城諸族人忌為導太祖英武同謀加害以渾河部兆嘉城長理岱乗夜隂晦至上所居欲㧞柵潜入奮足太祖聞犬驚吠持刀叱之因以刀柄擊窻櫺復撼窻為欲出狀既而由户出賊驚遁太祖乃率兵征兆嘉城鑿山為磴以䋲束馬踰嶺至城下圍攻克之獲理岱宥其死而贍飬之天勇深沈復大度執讐屢縱弗即殺棟鄂哈達頻搆難遂議攻之制先發警悟太祖雄謀大畧用兵如神而又軼倫臨機應變嘗夜獲賊佯𠂻詢曰爾非盗牛來耶縱之去又一夕將寢忽心動甲控弦以待射中賊撻而釋之盖深沈大度類如此又攻圖倫城時棟鄂部欲乗機侵我適其部内亂遂率兵徃征克之哈逹葉赫輝發等九部合兵三萬來侵衆自太祖曰彼部長甚衆兵皆烏合我以逸待勞彼潰乃於古埓山據險結陣命額亦都率百人挑戰斬九人敵稍却葉赫貝勒布齊馬踣為我兵刺殺哈達貝勒䝉格布禄等並膽落潰奔我軍縱兵掩擊追奔至哈達國柴河寨之南斬級四千獲馬三千鎧胄千以整以暇破九部三萬之衆自此軍威大振逺邇懾服矣登城受傷徐下城緬想其績猶存匣復攻太祖攻楝鄂還翁鄂洛薄其城乗屋顛射賊城中鄂爾果尼潛射血至太祖傷首貫胄即㧞箭以射敵應絃而踣雖流足猶鏖戰不己敵復有洛科者於烟㷔中突發一矢射血肉太祖穿鎖子甲䕶項太祖㧞之鏃巻如鉤並落衆競趨前欲登屋扶掖乃以太祖恐為敵窺亟弓而諭止之時項血湧如注一手捫創一手拄下二人掖而行忽迷仆旋稍甦如是者數四甦輙飲水及創愈復率兵攻克翁鄂洛城獲鄂爾果尼及洛科又為太祖釋弗誅曰彼為其主乃射我今為我用不我射敵耶乃皆授為牛录衆咸頌太祖大度毎讀為悵實録至此緬惟􅅥也開創艱難輙然流涕瞿然悚誅逆撫順來者多定居興京逺近讋薩爾滸戰大勲成發蹤指使仍親渉來孫展函緬勞績太室一脉承禘祫悵然而涕䕫然懼恒慮守成失前法恭瞻太宗皇帝所御弓矢弓矢丈夫事國朝更擅精髙皇曽示度昔我翁錦太祖憇洞城之野有棟鄂部善射人紐乗馬佩弓矢過召至前指百歩外栁太祖命之射紐翁錦發五矢中其三上下相錯發五矢皆中衆視之五矢所集僅五寸許鑿落塊木而五矢始出共歎為神技云文帝善繩英薩爾滸之戰明總兵劉綎統二萬由南路出寛甸將逼興京太宗與大貝勒二貝勒三貝勒率兵徃禦奮擊太宗先引精騎三十人超出衆軍前自山馳下戰甚酣大貝勒亦自山西夾攻死太太宗總兵奮擊殱其兩營兵萬餘劉綎戰宗復督兵攻明海盖道康應乾明兵與朝鮮兵合競發火器怱大風揚沙烟塵反撲敵營昏㝠晝晦我軍乗之飛矢雨集其兵二萬人盡殱馬翠羽惟䖍弆朱弦孰敢抨貞觀傳喻政較此遜先聲駐盛京故宫有懐疊戊戍舊作韻規模儼天府制度儷京都此駐期五日前來免百營戊戌來此尚在卄七月期内惟清寜宫祀禮神照例恭祭其餘一切吉皆未舉行燕觴難重去聲罷朝賀賜宴此畨皆依例行烏哺悵増盈東望頥和殿丙寅年於清寜宫左搆室數楹名曰焉頥和殿恭奉聖母慈駕駐憇於此如何置慕情題迪光殿崇政西廂搆寢殿惟期樸素弗期寛盛京正朝曰崇政於西廂隙地别搆寢殿為駐憇之所規制儉樸一遵家法顧名思義増心􅅥怡性憇躬容膝安永念天威凜遏佚慎修已德敢盤桓祖宗謨烈越千古欲迪前光實更難保極宫陪都即帝都保極額檐扶敬識箕疇訓乆荒周雅圖無偏王道蕩有赫祖功膚念此寢興適敢忘昔日劬繼思齋題壁二首祖宗思盖因創業子孫思當在守基創守不同同基業繼之敢不敬思之創守昜難曽著論向嘗作創業守成難易説云唐岑文本以為創業難守成不易余以為創業之難至矣然紀綱制度可留俟後人守成者茍無以光先烈啟後圗斯憬然有不終畆之憂是非安不忘危存不忘亡鮮有不盛滿中之者以此思難則所以持難者可知矣故余獨以難責夫守成者非敢忘創業之難正以慰創業者之初心耳敬承繼序惟懐永思櫽括前説載告後人焉守難謹以定評辭聰聽載告雲仍輩繼此萬年慎此思恭詠太宗所製鹿角椅疊戊戌舊韻習武寓習獵神弓射鹿斯命工取角便成椅憩躬冝大用物無棄儉懐訓有施載觀敢言坐手捧額欽之敬題崇謨閣我建崇謨閣由來意寓深丙寅年敬建崇謨閣於繼思齋後尊藏五朝實録牒圖傳帝系實録緬天臨故土寜容闕十年遞送欽庚午冬十月以玉牒恭送盛京嗣後毎十年一修玉牒告成依例恭送尊藏閣中繼哉祈永命慎矣惕難諶敬瞻頥和殿感而題句昔年搆築事東朝丙寅建此殿甲戌臨幸盛京恭奉聖母駐憩於此此日金鋪鎻寥寂偶歩寸𠂻無别思徽音如昔黯魂銷欽定盛京通志卷十六
