body:
  text: 城池吉林各屬吉林寧古塔白都納三姓阿勒楚喀琿春打牲烏拉欽定四庫全書欽定盛京通志卷三十一城池三吉林各屬吉林城在奉天府東北八百餘里舊名船厰城康熙十二年副都統安珠瑚監築南臨松花江東西北三面竪松木為墻髙八尺北面二百八十九步東西二面各二百五十步每面一門城外週圍有池外有土墻為邊邊墻東西亦依河岸週圍七里一百八十步雍正五年於境内增設永吉州乾隆十二年奉裁改設理事同知今存土城西仍一門東與北各二門皇上東謹案乾隆十九年巡有御製車駕至吉林得七言排律十二韻駐軍署詩吉林覽古雜咏詩俱恭載驆吉林將天章門克爾素城克爾素國語解見疆城形勝卷城西三百七十里週圍一里我太祖髙皇帝壬子年征烏拉部築木城於此今設汛焉克爾素原作赫呼蘇今譯改吉林境内歴代舊有城址尼什哈城尼什哈國語解見吉林山川卷城東十二里在尼什哈山上即鄂摩城週圍二里南一門北二門城西一井木生其中旁有鯽魚池三石砌建自何年無考我太祖髙皇帝癸丑年攻克烏拉部撫降之綏哈城綏哈國語解見吉林山川卷城西五十里週圍一里雅哈城雅哈國語解見吉林山川卷城西三百十里週圍一百二十步葉赫城葉赫國語解見吉林山川卷城西四百九十五里舊為葉赫貝勒所居週圍四里東西二門又有葉赫山城在葉赫城西北三里週圍四里南北二門内有小城週圍二里南北二門明時於其地置北闗互市又有葉赫珊延府城與葉赫城相距里許週圍一百六十步門一皇上東相傳皆葉赫所築乾隆八年廵有御製望葉赫舊墟詩恭載天章門事蹟謹稽實録葉赫之先䝉古國人姓土黙特滅呼倫國所居璋地之納喇部遂據其地因姓納喇後遷於葉赫河岸號葉赫國其始祖星根逹爾罕生錫爾克明安圖錫爾克明安圖生齊爾葛尼齊爾葛尼生楚孔額楚孔額生台楚台楚生二子長清嘉努次揚吉努兄弟各居一城綏服附近諸部哈逹國人多歸之遂皆稱貝勒太祖初如葉赫其貝勒揚吉努識上為非常人曰我有幼女俟其長當奉侍太祖因以禮聘馬甲申年明寜逺伯李成梁聴哈逹國䜛搆誘清嘉努揚吉努兩貝勒至開原并從兵三百皆殺之清嘉努子布齋揚吉努子納林布禄各繼其父為貝勒李成梁率兵圍攻納林布禄所居東城不克而歸乃與和好焉戊子年納林布録送妺來歸太祖是為孝慈皇后誕生太宗皇帝辛夘年納林布禄遣使伊勒當阿拜斯翰來告曰爾國人衆我國人寡可將額勒敏扎庫穆二地以一與我太祖諭曰我乃滿洲爾乃呼倫爾國雖大我豈肯取我國即廣爾豈得分且土地非牛馬比豈可割裂分給爾等皆執政之臣不能各諌爾主奈何靦顔來告耶既而葉赫哈逹輝發三國貝勒復各遣使來太祖宴之葉赫使人圖爾徳起請曰我主有言欲相告恐觸怒見責奈何太祖曰爾不過述爾主之言耳所言善吾聴之出惡言吾亦遣人以惡言報之吾豈爾責乎圖爾徳曰我主云欲分爾地爾不與欲令爾歸附又不從倘兩國興兵我能入爾境爾安能蹈我地耶太祖聞言大怒引佩刀斷案諭曰爾葉赫諸舅何嘗親臨陣前馬首相交破胄裂甲經一大戰耶昔哈達國䝉格布禄與其兄之子岱善自相擾亂故爾等得以掩襲之何視我若彼之易也况爾地豈盡設闗隘吾視蹈爾地如入無人之境晝即未至夜亦可來爾其奈何昔吾以先人之故問罪於明明歸我喪嵗輸金幣汝父見殺於明曾未得收其骸骨徒肆大言於我何為也遂作書命巴克什阿林察持往布齋使人迎見阿林察出書誦之布齋曰吾既見書不必令吾弟見也阿林察曰我主有命此書不令俱見勿歸布齋曰吾弟言辭不遜汝主怒之良是但吾弟見書又恐有傷于汝耳阿林察乃還未㡬長白山珠舍哩部長裕楞額訥殷部長藪穏色克什同引葉赫兵刦我東界洞寨羣臣入告太祖曰任彼刦之可也此不過我同國之人逺附葉赫刦掠我寨耳水豈能越山而流火豈能踰河而然乎葢水必下流火必上然珠舍哩訥殷二路終當為我有也癸巳年夏六月布齋納林布禄與哈逹烏拉輝發合兵刦我瑚布察寨太祖率兵擊之而遁秋九月布齋納林布禄復糾哈逹烏拉輝發科爾沁錫伯卦勒察珠舍哩訥殷諸部兵來侵太祖擊敗九國之兵於古哷山布齋所乗馬觸木而仆我兵名烏坦者趨而前踞其身刺殺之納林布禄與其弟錦台什見布齋被殺皆痛哭而逃丁酉年納林布禄錦台什及布齋之子布揚古遣使來告曰吾等不道兵敗名辱自今以後願復締前好重以婚媾布揚古請以妺歸上錦台什請以女歸上次子代善太祖許焉具鞍馬鎧胄為聘更椎牛刑白馬誓盟太祖諭曰爾等踐盟則已有渝盟者待三年不悛吾乃征之未㡬納林布禄背盟有穆哈連者引陣獲䝉古馬四十匹來歸我國納林布禄奪其馬執送穆哈連於䝉古又以錦台什所許我國貝勒代善之女適䝉古喀爾喀部貝勒齋賽癸夘年孝慈皇后疾篤思見母太祖遣使至葉赫迎之納林布禄不許止令僕人南泰來視太祖曰汝葉赫諸舅無故掠我瑚布察寨又率九國之兵侵我自悔起兵開釁之罪刑馬歃血祭天盟誓願聫姻通好旋即背盟以既許歸我之女改適䝉古今我國妃病篤欲與母决又不許是終絶我好也既如此兩國當復相仇我將問罪汝邦築城汝地矣甲辰年春正月太祖率兵征葉赫攻克璋城及阿齊蘭城取其七寨俘二千餘人而還癸丑年春正月太祖滅烏拉國布占泰逃奔葉赫時納林布禄已卒太祖遣使諭錦台什布揚古曰昔我陣擒布占泰赦其死而贍養之又妻以三女輙敢以恩為仇是以問罪往征削平其國今投汝汝其執之以獻使者凡三往錦台什布揚古不從秋九月太祖率兵四萬征之有逃卒至葉赫洩軍期葉赫遂盡收散處居氏其烏蘇城以痘疫未收我兵圍之太祖諭城中人曰降則贍養之不降則進攻城中人曰大國兵衆豈我等所能禦茍撫我我曷為不降其城長瑚什穆繖坦遂開門降匍匐謁見太祖酌金巵飲之各賜冠服葉赫所屬璋城吉當阿城雅哈城克爾素城和敦城喀布齋賚城鄂吉岱城及屯寨凡十九處盡焚之收烏蘇城降衆三百户而還錦台什布揚古使人愬於明曰哈逹輝發烏拉三國滿洲已盡取之今復侵我葉赫其意欲削平諸國即侵取遼東以建國都將使開原鐵嶺為牧馬之埸矣明乃遣逰擊馬時楠周大岐率練習火器者千人守衛葉赫東西二城太祖聞之欲致書於明遂躬詣撫順所城庚辰夘刻行至古哷城之野日之兩旁有青赤二色祥光對照如門太祖見之率衆拜其光乃止翼日至撫順所逰擊李永芳出城三里外迎太祖以禮接之永芳𨗳入教場太祖以書與永芳曰昔葉赫哈逹烏拉輝發䝉古錫伯卦勒察珠舍哩訥殷九國於癸巳嵗合兵侵我我是以興師禦之天厭其辜我師大㨗斬葉赫貝勒布齋生擒烏拉貝勒布占泰以歸逮丁酉嵗刑馬歃血以盟通婚媾無㤀舊好詎意葉赫渝棄前盟將已字之女悔而不與至布占泰我所恩養者也反以徳為仇故伐之而殱其兵取其國布占泰子然一身奔於葉赫我索取之又不我與此我所以征討葉赫也我與汝國何嫌何怨欲相侵耶太祖既與書永芳遂還乙夘年貝勒大臣等聞葉赫欲以布揚古所許我國之妹適喀爾喀部貝勒巴哈逹爾罕之子莽果勒岱皆憤怒請曰葉赫女既為上所聘又將以適䝉古無禮莫甚焉宜乗其許而未行急發兵攻其城而取之太祖諭曰征討國之大事若以負婚之故怒而興師則未可也葢此女之生釁所由起實非偶然哈逹輝發烏拉三國皆因此女興兵搆怨相繼滅亾是此女召釁亾國已有明騐今明又助葉赫天殆欲亡葉赫以激怒我而啟大釁也若奮力征之縱得此女徒至不祥即歸他人亦不永年吾知此女之流禍已盡死期將至矣諸貝勒大臣仍欲興師堅請太祖曰使我因此發怒興師征討汝等猶當諌止吾早已洞徹事機釋然于中置諸度外汝等何反堅請不已耶吾無憾汝等何憾焉吾㫁不勞師動衆也尋葉赫以此女嫁䝉古未一年果亡諸貝勒大臣請興師征明曰此女年已三十有三受我國之聘垂二十年因明國興兵衛助葉赫錦台什布揚古恃其勢遂與䝉古今征明宜也太祖曰明恃勢横行抗違天意使我今日仗義伐明天必佑之天佑我可以克敵但我國儲積未充縱得其人民必無以養之恐我國人民反致損耗惟及是時撫輯我國固疆圉修邉備重農積穀為先務耳天命四年春正月太祖命大貝勒代善率大臣十六人兵五千往守扎喀闗以防明兵親統軍征葉赫深入其界自克伊特城尼雅罕寨距葉赫城東十里克大小屯寨二十餘其逃奔入城者盡追擒之又取葉赫所屬䝉古逰牧畜産整兵而還離葉赫城六十里駐營翼日班師先是錦台什布揚古聞我兵往征遣使向明開原總兵馬林告急馬林率兵出葉赫城四十里見我國兵勢强盛不敢戰而退三月明兵四路來侵錦台什布揚古欲助明引兵至開原中固城聞明兵已大敗乃還秋八月太祖統軍征之時太祖已取明開原鐵嶺葉赫貝勒錦台什居東城布揚古居西城葉赫偵者馳告曰滿洲兵至矣葉赫人皆驚擾屯寨居民近者避入城逺者匿山谷我軍先馳向西城布揚古偕其弟布爾杭古率兵出城西門陟岡鳴角鼓噪望見我軍旌旗劍㦸如林隊伍整肅前後絡繹自度弗能禦倉皇入城諸貝勒遂督兵圍之太祖親統軍圍東城先破其郛軍士薄城布列梯楯呼錦台什出降錦台什不從答曰吾非明兵比等大夫也肯束手歸乎與其降汝寜戰而死耳太祖遂督兵攻城兩軍拒戰矢如雨雹城上發火器擲巨石滚木我軍冐矢石穴其城城墮遂入城敵衆皆敗潰太祖遣人執幟禁約軍士毋得妄殺又使人持上黄葢傳諭城中降免死於是城中兵民俱降錦台什携其妻及幼子登髙臺我兵圍之呼曰汝降速下否則進攻錦台什曰吾戰不能勝城破困於家縱再戰豈能勝乎汝皇子四貝勒吾妺所生也得相見聞其盟言吾乃下時四貝勒攻西城太祖召之至命曰爾舅有言待汝至乃下汝往彼下則已不下以兵毁其臺四貝勒既至錦台什曰吾與甥未識面真偽烏能辦我國大臣費英東額駙逹爾漢曰汝視常人中有如我四貝勒魁梧竒偉者乎汝國使者必嘗語汝何難識别耶若仍不信曩者我國議和之時曾以媪往媪乳汝子徳勒格爾今尚在盍令視之錦台什曰何用媪為也觀此子辭色似未承父命善遇我也特誘我下臺而見殺耳吾石城鐵門既失困守此臺縱戰不能勝但吾祖父世居斯土我生於斯長子斯則死于斯而已四貝勒曰汝疲勞百姓至于數年所築重城今皆摧破獨據此臺何為也汝欲誘人至此與汝并命孰肯如汝之意耶汝如何曰得我活汝盟言汝方下也豈戰不能擒汝而與汝盟歟吾已在此汝下引汝往見父皇生殺惟父皇命且汝當日之意將欲翦滅親戚我屢欲和好遣二三十人至汝國汝輕視我國謂懼而求和殺我使臣或覊留焉致有今日傾覆之禍若父皇念汝惡則戮汝倘不念汝惡以吾之故貸汝汝生矣凡勸諭者再三錦台什仍執前言不下四貝勒曰舅言吾來即下吾乃來若下速下引見父皇否則吾往矣錦台什曰姑勿往吾先令親臣阿爾塔什往見上察言觀色而回吾乃下遂令阿爾塔什來見太祖諭責之曰離間諸舅與我為難致明人舉兵四十萬來非汝也耶念此宜誅汝事既往不汝咎耳汝還語貝勒與偕來阿爾塔什還勸錦台什不從曰聞吾子徳勒格爾被創在家召之來吾與相見乃下四貝勒召徳勒格爾至與相見徳勒格爾謂其父曰我等戰既不勝城又破今居此臺欲何為盍下臺生死聴之勸諌再四錦台什終不從四貝勒欲縳徳勒格爾徳勒格爾曰吾年三十六乃於今曰死耶殺之可也何縛焉四貝勒以其言奏太祖曰子勸父降而不從父之罪也父當誅勿殺其子遂引徳勒格爾見太祖太祖以所食賜四貝勒與同食諭曰此爾之兄也善遇之錦台什妻因其夫不下携幼子趨下錦台什引弓從者復環甲待我兵持斧斤毁其臺錦台什縱火焚屋宇盡燬我諸將謂錦台什已死令毁臺之兵退還火燎錦台什身自下為我兵所執縊殺之時諸貝勒圍西城招降不從㑹東城已破布揚古布爾杭古大懼使人來告願降以懐疑不敢出大貝勒曰始令汝降汝不從大兵至此豈舍汝去乎吾以汝為外兄弟愛而欲生之故令汝降若戰則汝等盡死于我之小卒手降則生矣果願降恐兄弟偕來或被殺盍令汝母先來汝母吾外姑也豈執婦人而殺之乎布揚古布爾杭古復使人來曰吾等降汝盍留盟言與吾等約汝歸吾仍居此城大貝勒怒曰何復為此言也既破東城豈力不能抜西城聴汝等居此而去乎速降則已否則父皇至必攻克爾城克城之後汝等駢首戮矣布揚古布爾杭古乃令其母來大貝勒以禮接見其母曰汝無盟言故吾二子懐疑而懼耳大貝勒乃以刀劃酒誓曰若汝等降而我殺之殃及我若我既誓而汝仍不降殃及汝等汝等不降破汝城必殺無赦酒飲其半分其半送布揚古布爾杭古飲之遂開門降大貝勒引布揚古見上布揚古復勒馬立大貝勒挽其轡曰爾殆非丈夫耶言既定又立此躊躇何為也乃來見布掦古跪不恭僅屈一膝不拜而起太祖親以金巵賜之酒不恭如初屈一膝偏向酒不竟飲沾唇而已又不拜而起太祖諭大貝勒曰引爾婦兄去囘彼西城是日太祖深念久之謂吾既不念舊惡欲留而豢養之貸其死子以生全未見有喜色仍仇怨且拜跪亦不少屈此人可豢飬耶是夜命縊殺之其弟布爾杭古以大貝勒故宥其死助葉赫防守之明逰擊馬時楠及兵一千盡殺之葉赫所屬各城俱降其官員及軍民皆弗罪父子兄弟夫婦親戚不令離散什物毫無所取徙其人而還悉予廩給並田廬器用無馬者千人並給以馬布爾杭古徳勒格爾及錦台什次子尼雅哈尋受爵職予世襲索勒和城索勒和國語解見奉天府山川卷城西五百五十五里週圍八十步門一那丹佛哷城那丹國語解見吉林山川卷佛哷圍底旗也城南二百六十里東西二面各四百步南北二面各三百步城外有重濠門四内有一小城四面各二百步東西二門輝發城城南三百七十里在吉林峯之上週圍二百步門一人有輝發峯城在輝發峯西北週圍四里南北各二門輝發河城在瀨河山坡上四面各二十步門一乾隆十九年皇上東廵過此有古登輝發故城再賦詩俱恭載御製輝發故城懐天章門事蹟謹稽實録輝發之先本姓伊克得哩黒龍江岸尼瑪察部人有星古禮者自黒龍江載木主遷於扎嚕居焉因呼倫國之噶揚阿圖謨圖二人居于璋地姓納喇欲附其姓殺七牛祭天改姓納喇是為輝發始祖生子備臣備臣生納靈阿納靈阿生拉哈都督拉哈都督生噶哈禪都督噶哈禪都督生齊訥根逹爾罕齊訥根逹爾罕生旺吉努招服附近諸部築城于輝發河邊扈爾竒山號輝發國時䝉古察哈爾國扎薩克圖圖們汗自將圍其城不克而還旺吉努卒孫拜音逹哩殺其叔七人自為貝勒癸巳年拜音逹哩為葉赫貝勒布齋等所誘四國合兵刦我瑚布察寨尋又九國合兵來侵太祖擊敗之古哷山拜音逹哩見布齋為我兵所殺驚懼逃歸乙未年太祖率兵攻其多壁城斬城守克充額蘇䝉額二人而還丁酉年遣使來乞盟既而拜音逹哩族衆叛歸葉赫其部下又欲叛拜音逹哩聞之以其臣七人之子來質乞援兵太祖發兵千人助之葉赫貝勒納林布禄搆拜音達哩曰爾若索還爾質子吾即反爾叛族拜音逹哩信之乃曰吾其中立于滿洲葉赫二國之間乎遂取囘所質七臣之子以己子與納林布禄為質而納林布禄竟不歸其叛族拜音逹哩遣其臣來告曰吾前者誤為納林布禄所誑今欲乞恩賜我婚太祖允之後拜音逹哩背約不娶太祖遣使謂曰汝昔助葉赫二次來侵我宥爾罪復許爾婚今背約不娶何也拜音逹哩納曰俟吾葉赫質子歸乃娶耳旋築城三層以自固後太祖復遣使謂曰爾質子既歸今將何如拜音逹哩以堅城足恃遂負約丁未年秋九月太祖率兵圍其城克之誅拜音逹哩及其子招降其衆乃班師旺吉努之孫通貴康喀勒等並授職世襲烏蘇城䝉古語烏蘇水也城南七里里週圍二里門濠莫考我太祖髙皇帝癸丑年征葉赫部撫降之詳見葉赫城注城南曰烏爾古辰路訥殷路北即古蘇完地佛多和城佛多和國語解見吉林山川卷城南八百四十里週圍一里我太祖髙皇帝癸巳年𠞰訥殷部長于此佛勒和城國語佛勒鎚子也城北三十三里週圍三里舊為佛索諾貝勒所居門一富勒哈城富勒哈國語解見夲天府山川卷城北五十里週圍八十步門一我太祖髙皇帝癸丑年征烏拉部撫降之烏拉城烏拉國語解見建盡沿革卷城北七十里混同江之東即遼時寜江州故址舊為布占㤗貝勒所居週圍十五里門四内有小城週圍二里東西二門城内有土臺髙八尺週圍一百步事蹟謹稽實録烏拉之先以呼倫為國號姓納喇其始祖名納齊布禄四傳至都勒喜生子二長克什訥都督次古對珠顔古對珠顔生泰蘭㤗蘭生布延布延收服附近諸部築城於烏拉河岸洪尼地國號烏拉衆稱為貝勒生二子長布罕次博克多布延卒子布罕繼之布罕卒子滿泰繼之癸巳年夏六月滿泰為葉赫貝勒等所誘合兵刦我瑚布察寨太祖率兵擊之而遁秋九月滿泰之弟布占泰隨葉赫哈逹貝勒等九國合兵来侵太祖擊之古哷山九國兵皆敗遁葉赫貝勒布齋為我兵所殺明日有卒擒一人至告曰吾獲一人将殺之彼大呼勿殺願自贖因縛之來太祖問曰爾何人也對曰烏拉貝勒滿泰之弟布占泰也恐見殺未敢明言生死惟命遂叩首太祖曰汝等九部㑹兵侵害無辜天厭汝等昨已擒斬布齋彼時獲爾亦必殺矣今既見汝何忍殺語曰生人之名勝於殺人與人之名勝於取人遂解其縛賜猞狸猻裘贍養之丙申年太祖遣大臣圖勒坤黄占博勒寛斐揚占送之歸時烏拉貝勒滿兵與其子往所屬蘇斡延錫蘭地並以滛人妻被殺及布占泰至滿泰之叔興尼雅欲殺之因我國衛送二大臣嚴為防䕶不能害興尼雅奔葉赫圖勒坤黄占等立布占泰為烏拉國主乃還布占泰遣使乞盟感上再生恩事如父以妺妻貝勒舒爾哈齊尋率三百人來謁太祖妻以舒爾哈齊之女賜敕書十道甲胄五十副禮遣之未㡬布占泰背盟以我國所屬瓦爾喀部之安楚拉庫訥河二路衆所推服之三人送葉赫貝勒納林布禄引其使招誘安楚拉庫訥河二路戊戍年太祖命貝勒禇英巴雅喇大臣費英東噶葢率兵一千征安楚拉庫路取屯寨二十餘盡招徠其人民賜禇英號洪巴圖魯巴雅喇號卓哩克圖丁未年春正月瓦爾喀部費優城長䇿穆特赫來朝告曰吾等因地方遥阻附烏拉烏拉貝勒布占泰遇吾等虐甚乞移家來附太祖命貝勒舒爾哈齊褚英代善大臣費英東侍衛扈爾漢率兵三千至費優城徙之時夜陰晦軍中大纛之上有光衆為異捫視無有復樹之光如初舒爾哈齊曰吾自幼從上征討所歴之地多矣未見此異其非吉兆耶欲還兵褚英代善曰或吉或凶兆已定吾等何所見而遽還將何以報命吾父邪遂决意前進至費優城盡收環城屯寨凡五百户今扈爾漢率兵三百䕶之先行布占泰發兵萬人邀諸路扈爾漢見之令五百户結寨山巔以兵百人衛之使人馳告後隊諸貝勒是夕烏拉兵萬人我國扈爾漢兵僅二百人各據山一面結營相持翼日烏拉以萬人攻我二百兵我國大將揚古利馳至先衆奮擊斬烏拉兵七人我兵止傷一人烏拉兵退渡河登山畏懼不敢前兩軍相向駐營日過午我國後隊諸貝勒兵悉至見烏拉兵衆褚英代善䇿馬而前諭衆曰吾父每有征伐無不摧堅䧟敵今雖未親履行間而我等奉命來此爾衆何憂昔布占泰來侵我國我國擒而縛之吾父宥其死復豢飬之歸主其國為時未久人猶是人魯從吾手而釋非有天幸得脱也今豈不能再縳之耶彼兵雖多我國荷天眷仗天威吾父威名夙著破敵兵必也衆軍士皆曰願効力遂渡河禇英代善各率兵五百分二路縁山奮擊烏拉兵大敗代善追及烏拉統兵貝勒博克多從馬上以手攫其胄而斬之時天氣晴明忽陰晦大雪寒洌被傷敵兵棄甲逃者僵仆甚衆是役也陣斬博克多及其子生擒貝勒常住與貝勒瑚哩佈斬三千級獲馬五千匹甲三千副師還太祖賜舒爾哈齊號逹爾漢巴圖魯以褚英遇大敵率先擊敗其衆賜號阿爾哈圖圖們以代善陣斬博克多又與兄弟並進敵賜號古英巴圖魯戊申年太祖命貝勒褚英阿敏率兵五千征烏拉國圍其伊罕山城克之斬千人獲甲三百俘其衆以歸時烏拉貝勒布占泰與科爾沁貝勒翁阿岱合兵出烏拉城二十里遥望我軍知不能敵遂相約而還布占㤗因失伊罕山城大懼始遣使修好乞盟執葉赫貝勒納林布禄屬下五千人送我使臣殺之尋又背盟侵我國所屬窩集部之瑚爾哈路者再壬子秋九月癸丑太祖率兵征之庚申太祖張黄葢鳴鉦鼓沿烏拉河而行布占泰率兵迎戰至河濱見我兵甲胄鮮明士馬精强軍勢甚盛烏拉兵人人惴恐無鬭志太祖遂沿河岸而下克其臨河五城又取金州城駐營其城在布占泰所居大城河岸之西距城西門二里許冬十月辛酉朔太祖以太牢告天祭纛駐兵三日布占泰晝則率兵出城相持河岸夜則入城休息諸貝勒請渡河擊之太祖曰毋作此浮面取水議也當為探原之論耳譬伐大木豈能遽摧必以斧斤斵而小之然後可折今以勢均力敵之大國欲一舉而取之能盡如吾願乎我且削其所屬外城獨留所居大城外城盡下則無僕何以為主無民何以為君乎遂率師毁其六城焚其廬舍糗糧移駐于富勒哈河渡口布占泰使人來告曰上乗怒興兵至此今上怒已息乞留一言而歸又親率其臣六人乗舟止河中跪而乞曰烏拉國即父皇之國也幸勿盡焚糗糧叩首哀籲不已太祖擐甲乗馬率貝勒大臣出衆軍前立馬河中水及馬腹諭責布占泰曰我昔擒汝於陣貸汝死贍養汝俾主烏拉國以女妻汝許汝盟誓者七汝藐忽天地屢背誓言再侵吾所屬瑚爾哈路欲奪吾所聘葉赫女又以鳴鏑射吾女吾以女歸汝異國義當尊為國妃何得陵暴至此我愛新覺羅由上天降生事事順天命循天理數世以來逺近欽服從不被辱于人汝即不知百世以前事豈十世以來之事亦不知耶若我女有過汝宜告我無故被辱他國且不受况我國乎古人云寧損其骨無損其名我非樂有此舉乃汝負恩悖亂是以聲罪致討耳布占㤗對曰此必有人離間俾吾父子不睦其語皆偽傳也布占㤗之臣拉布㤗從旁率爾進言曰上既因此而怒何不遣使來問太祖責拉布泰曰我部下豈少汝輩人耶尚謂辱吾女為誣奪吾所聘女為妄言乎凡事未實則湏問既實矣又何問焉此河無不氷之日吾兵無不再來之理汝口雖利能齒吾刃乎布占泰大懼止拉布泰勿言布占泰弟喀爾喀瑪請曰乞上寛賜一言而行太祖曰汝果無此事以汝子及大臣子為質始鑒汝誠不然吾不信也遂回營駐烏拉國五日還兵至烏拉河邉伊瑪呼山岡以木為城留兵千人守之癸丑年春春正月太祖聞布占泰以其子綽啟鼐及十七臣之子送葉赫為質復親率大兵往征之時布占泰期以正月丙子送其子質葉赫而我兵先一日至攻取烏拉遜扎塔城督兵進克郭多鄂摩二城翼日布占泰率兵三萬越富勒哈城列營時統軍貝勒大臣皆欲戰太祖止之曰征伐大國豈能使人遽無孑遺乎仍以前言申諭之貝勒代善阿敏大臣費英東額亦都安費掦古額駙何和哩侍衛扈爾漢及諸将皆奮然曰我士飽馬騰利在速戰所慮者布占泰不出耳今彼兵既出平原廣野可一鼓擒也太祖曰我仰荷天眷自用兵以來雖遇勁敵無不單騎突陣斬將搴旗今日之役我何難率爾等身先摶戰但恐貝勒諸大臣或致一二被傷實深惜之故欲計出萬全非有所懼而故緩也爾衆志既孚即可決戰因命取鎧胄被之貝勒大臣及諸將聞上言皆踴躍傳令軍士盡甲太祖遂定䇿諭軍士曰儻䝉天眷佑破敵衆即乗勢奪門克其城毋使復入於是我軍前進布占泰率兵三萬由富勒哈城而來令軍士步行列陣以侍兩軍距百步許我兵亦下馬步戰矢交發如雨呼聲動天太祖奮然挺身而入諸貝勒大臣率軍士鼓勇縱擊大敗烏拉兵十損其六七餘皆棄兵甲逃竄遂乗勢奪門太祖登西門樓城上悉樹我軍旗幟布占泰所率敗兵不滿百人急還城下見我軍旗幟大驚而奪復遇貝勒代善率精兵邀擊之布占泰勢不能敵遂遁又損兵過半餘皆潰走布占泰僅以身免投葉赫國而去我軍獲馬匹甲胄器械無算盡收撫其所屬城邑駐軍十日大賚有功将士烏拉敗兵來歸者悉還其妻子僕從編户萬家其餘俘獲分給衆軍乃班師布延之族裔及滿泰布占泰之子孫授官職者甚衆薩爾巴禪城國語薩爾巴禪盔簷也城北七十里週圍一里門一古城城北八十四里週圍一里門一又有二一在城西南五十里東西各八十步南北各一百步門四一在城西南五百餘里週圍八十步門一俗皆稱為古城不知何代所築錫蘭城錫蘭國語解見吉林山川卷城北八十七里週圍二里門一蘇斡延城蘇幹延國語解見奉天府山川卷城北一百十里週圍二里門一人混同江中蘇斡延島上有城週圍一里門一噶哈城噶哈國語解見吉林山川卷城北一百七十里週圍一里城東有法勒瑪哈達哈達國語解見京城卷伊蘭茂城伊蘭茂國語解俱見吉林山川卷城東南七里在伊蘭茂山上週圍一里餘東北二門城外東西南三面有郭週圍二里門一呼嚕城呼嚕國語解見吉林山川卷城西南五百里週圍二百四十步東西二門錫伯城錫伯國語解見吉林山川卷城西南五百餘里週圍一百二十步北二門邦塞城城西南五百餘里週圍八十步門一國城南曰巴延鄂城西曰珠嚕莽堪巴延語解見疆域形勝卷鄂珠嚕見吉林山川卷呼濟城呼濟國語解見吉林山川卷城西南五百十里週圍一百步門一以上諸城建自何代俱無考棟鄂城城西南五百二十里週圍九里東西六里南北三里門四舊為棟鄂部長魯克素居此所築事蹟謹稽實録初我國六祖寳實次子阿哈納往聘薩克逹路長巴斯翰之妺為妻巴斯翰謂阿哈納家貧不許旋以妻棟鄂部長克徹巴顔之子額勒吉後額勒吉往巴斯翰所還至阿布逹哩岡為額圖阿嚕部下九賊所殺克徹巴顔曰往者寜古塔阿哈納欲聘之女吾子娶之故被殺也哈逹萬汗遣人告克徹巴顔曰爾子乃額圖阿嚕部下九賊殺之我擒以與爾復爾仇爾歸附我克徹巴顔曰此必寜古塔人誑言耳何不以金帛饋哈逹執九賊與我我必倍償其金帛三祖索長阿聞其語潜遣人紿之曰爾子乃我部下人所殺爾以金帛與我我當為爾殺此仇人克徹巴顔曰哈逹萬汗言額圖阿嚕部下九賊殺吾子今云爾部下人殺吾子皆爾寜古塔人誑我也遂成仇怨引兵侵掠寜古塔東南二路諸貝勒㡬不能支與景祖議曰我等同祖所生分居十二處勢渙散當聚族而居其相保守既定議三祖索長阿次子烏泰不從曰一處何可居也將不為孳息畜産計乎今不必聚居借居於哈逹萬汗便哈逹萬汗烏㤗婦翁也於是借兵攻棟鄂部者再獲其數寨初寜古塔諸貝勒與哈逹萬汗互為婚媾聲勢相埒自借兵後乃示弱焉及太祖起兵討尼堪外蘭既攻克圖倫城長祖徳世庫二祖留闡三祖索長阿六祖寳實之子孫忌太祖英武同謀加害弗遂六祖寳實長子康嘉借兵哈逹萬汗以渾河部兆嘉城長理岱為嚮𨗳刦我瑚濟寨而去分所獲於中途太祖部將安掦古率十二人追及之奮勇突然衝入敗哈逹兵斬四十餘人盡獲所掠而還甲申年春正月太祖率兵征兆嘉城途遇大雪至噶哈嶺路險峻難登諸叔暨諸兄弟勸勿進兵太祖曰理岱我同姓兄弟乃自相戕害反為哈逹嚮𨗳豈可恕耶遂鑿山為磴軍士鱗次立以繩束其馬曵之踰嶺至兆嘉城下三祖索長阿第四子龍敦豫使人潛告理岱理岱鳴角集兵登城以待衆復請曰彼有備未易攻姑旋師太祖曰吾固知其有備而來何遽還耶遂督衆圍城攻克之擒理岱宥其死而贍飬之先是棟鄂部諸貝勒聞我國擊敗哈逹兵因集議曰昔寜古塔貝勒借哈逹兵攻我取我數寨今彼與哈逹國相仇吾等宜乗機攻之用蟒毒淬箭為攻具適其部内亂太祖聞之與衆計曰棟鄂部内亂宜往攻衆諌曰兵未可輕入其境幸而勝誠善倘有失奈何太祖曰俟彼加兵於我何如乗機先發衆乃曰善秋九月太祖率兵五百征之其貝勒阿海巴顔聚兵四百於所居齊吉逹城閉城以守我兵至圍攻其城縱火焚城樓及村中廬舍城遂䧟㑹大雪罷攻命衆先還留十二人以從伏濃烟中城内謂兵已退引衆出太祖邀擊之斬四人獲甲二副㑹完顔部之遜札沁廣衮來請曰翁鄂洛吾仇也曾為所縛乞以一旅助我破之太祖念既興兵至此宜乗此戡定一方遂率兵夜馳赴之遜札沁廣衮有兄子岱度墨爾根宻使人通於翁鄂洛城故豫知我軍至收其兵衆入城我軍亦縱火焚城樓及村中廬舍太祖乗屋巔射城中城中鄂爾果尼潛射太祖傷首貫胄太祖㧞箭見敵趨過即以所拔箭從烟突隙處迎射之貫其股應弦而踣太祖創流血至足猶鏖戰不已敵復有洛科者乗烟熖中潛發一矢中太祖項砉然有聲穿鎖子甲䕶項鏃捲如鈎拔之血肉迸落衆競趨而前欲登屋扶掖諭止之曰爾勿來恐為敵窺吾當徐下時項下血湧如注以一手捫創一手拄弓而下二人掖而行忽迷仆諸臣皆大驚相怨咎少甦裹創迷而復甦者數次甦輙飲水凡一晝夜血猶不止裹創厚寸餘至次日未時血始止於是棄垂下之城而還太祖創愈復率兵攻克翁鄂洛城獲鄂爾果尼及洛科諸臣請誅之太祖曰兩敵交鋒志在取勝彼為其主乃射我今為我用不又將為我射敵耶如此勇敢之人若臨陣死於鋒鏑猶將惜之奈何以射我故而殺之乎遂授鄂爾果尼洛科官各轄三百人諸臣皆頌上大度云戊子年夏四月太祖至洞城之野有乗馬佩弓矢過者太祖問左右曰誰也左右曰此棟鄂部人善射部中無出其右所稱善射紐翁錦是也太祖召之至指百步外栁命射之紐翁錦發五矢中其三上下相錯太祖發五矢皆中衆視之五矢所集僅五寸許鑿落塊木五矢始出共歎為神技云尋有棟鄂部長克徹巴顔之孫何和里率部衆來歸太祖以長女妻之授為一等大臣小石城城西南五百二十里在安巴和托峯下週圍八十步門一建自何代無考安巴國語解見奉天府山川卷和杞見吉林山川卷哈逹新城哈逹國語解見京城卷城西南五百三十里在伊徹峯上週圍一里初哈逹貝勒自開原界内遷城遷居於此故名又有哈逹石城在伊徹峯西週圍二百四十步門一相傳亦為哈逹貝勒時所築事蹟謹稽實録哈逹之先本呼倫國姓納喇其始祖名納齊布禄生尚延多爾和齊尚延多爾和齊生嘉瑪喀碩珠古嘉瑪喀碩珠古生綏屯綏屯生都勒喜都勒喜生克什訥都督克什訥都督生子二長徹徹穆次旺濟外蘭克什訥都督為族人巴岱逹爾罕所害徹徹穆之子萬奔錫伯部相近之綏哈城旺濟外蘭奔哈逹主其部後被害其子博勒寛沙津殺父仇至哈綏城迎兄萬至哈逹為部主萬攻取附近諸部逺者又招徠之其勢乃盛葉赫烏拉輝發及渾河部俱屬之遂稱為汗既而黷貨無厭民不堪命多叛投葉赫先附諸部亦皆携貳萬汗卒子瑚爾罕繼之甫八月卒弟康古嚕繼之尋亦卒弟䝉格布禄繼之癸巳年夏六月䝉格布禄為葉赫貝勒布齋等所誘合兵刦我瑚布察寨太祖率兵追之設伏於途少引兵亦略哈逹國富勒嘉齊寨其兵來太祖欲引敵至伏兵處令我兵前行獨殿後誘之俄而敵兵三人聫騎揮刀追逼又一人揮刀迎擊於前太祖念兵刃自後至猶可避自前至恐傷面目及手遂引弓射前至者其人在右發矢未便因囘身從馬項下射之中馬腹遂逸去其三人乗發矢時掩至太祖乗馬驚躍㡬墜賴右足據鞍得復乗遂射䝉格布禄馬仆地其從者易馬與乗之遁歸太祖率騎兵三人步卒二十人追擊斬十二人獲甲六副馬十八匹乃還秋九月䝉格布禄復為布齋等所誘九國合兵來侵太祖擊敗之古哷山䝉格布禄見布齋為我兵所殺驚懼逃歸丁酉年遣使來乞盟願復修前好戊戌年哈逹城北溪中流血己亥年䝉格布禄與葉赫搆兵力不能敵以三子來質乞援太祖命大臣費英東噶葢率兵二千助哈逹駐防其地葉赫貝勒納林布禄聞之搆明開原通事代為齎書誘䝉古布禄曰爾若執滿洲來援二將索還所質三子盡殺其兵二千我妻汝以所求之女修前好焉䝉格布禄惑其言約於開原城定議太祖聞之遂率兵征哈逹貝勒舒爾哈齊請為先鋒自試太祖令率兵一千為前隊既至敵兵出拒舒爾哈齊按兵不動告曰彼兵出矣太祖曰豈謂此城無兵而來耶遂督兵進擊時舒爾哈齊兵填擁於前太祖麾之使開路塞不能入乃沿城而行城上發矢石軍士多被傷者太祖督兵攻克其城太將揚古利生擒貝勒䝉格布禄馳告太祖命勿殺賜以所御貂帽及豹裘贍養之盡招服哈逹屬城器械財物無所取室家子女完聚如故悉編入户籍遷之以歸太祖以女妻䝉格布禄之子烏爾古岱明國遣使來言曰爾何故伐哈逹而取其國耶其復烏爾古岱國太祖從其言命烏爾古岱同公主率所部人民以歸後葉赫貝勒納林布禄糾䝉古兵數侵掠哈逹太祖遣使告於明曰吾令烏爾古岱還國今葉赫屢侵之奈何以吾所得之國為葉赫所據耶明人置弗答時哈逹飢國人乏食至明開原城乞糧不與各鬻妻子奴僕馬牛易粟食之太祖惻然曰此吾所撫之赤子也何忍聴彼流離遂仍收哈逹國人贍養之分𨽻各旗烏爾古岱之子及族人授官職者甚衆完顔城城西南五百四十里週圍一百歩事蹟謹稽實録嵗戊子秋九月太祖率兵夜過東星阿地天隕一星大如斗有光士馬皆驚太祖知為克敵之象遂進攻完顔城克之斬其城主岱圖墨爾根安圖爪爾根城國語安圖山陽也城西南五百四十餘里週圍一百二十步已圮西曰嘉穆瑚村西北接托摩和城北曰聶埒庫事蹟謹稽實録初太祖以同母妺妻噶哈善哈斯瑚三祖索長阿第四子龍敦搆太祖繼母之弟薩木占率族衆邀噶哈善哈斯瑚於路殺之太祖欲集衆收其骸骨諸族昆弟皆與龍敦同謀無一人往太祖率近侍數人行五祖寳朗阿次子楞徳恩止之曰諸族皆仇汝否則汝妺夫何以見殺宜勿往恐有害汝者太祖不聴披甲躍馬登城南横岡引弓疾馳復囘向城下太呼曰有害吾者速出聞者皆惴懼無敢出遂收其骸骨以歸賜所御冠履衣服歛而𦵏之太祖警悟軼倫臨機應變倉猝合度癸未年秋九月賊乗夜陰晦至上所居欲㧞柵潛入有犬名塘古哈四顧驚吠太祖持刀叱曰外至者誰也既至何不入爾不入我即出矣爾能攖我鋒耶因以刀柄擊忩復奮足撼忩為由忩而出之狀既而仍由户出賊乃遁有近侍巴海宿忩下被賊刺死甲申年夏四月太祖夜寢聞户外有聲披衣起佩刀持弓矢伏烟突旁伺之時陰晦無所見少頃賊逼烟突旁忽有電光照見遂以刀背擊之仆呼近侍洛翰縳之洛翰曰何必縛也宜殺之太祖曰若殺此賊其主必顯與我為難倘加兵於我我兵寡不敵衆乃徉詢曰爾非盜牛來耶賊以盜牛應洛翰又曰誑言也實欲害吾主殺之便太祖曰果盜牛也遂縱之去又一夕太祖將就寢忽心動遂起衷短甲外襲常衣佯如厠值昏黒中莫能辦熟視院門旁籬落缺處隱然有人如探伺者乃控弦以侍俄而賊逼遂射之賊郤身避中其衣驚遁追及之又射貫兩足仆地擊其首昏眩縳而撻之詢其名為伊索諸弟及近侍曰殺之固宜何撻焉太祖曰此非汝所知殺之適以啟釁若其主以兵攻我刦我儲蓄我糧匱則部下叛部下叛則我等孤立何以禦敵且我又何肯以殺人為他人藉口耶遂釋之是年六月太祖率兵四百征納木占薩木占納申萬濟翰以復噶哈善哈斯瑚之仇攻瑪爾墩寨其寨踞山之巔勢險峻乃設大牌三蔽矢石並列而進至隘路分其一前行其二繼之近寨丈許路愈隘分三牌相次而攻敵寨飛石擂木齊下前牌被摧軍退次牌下次牌又摧復退三牌下戰士並集牌不能蔽難仰攻太祖立寨下相去十餘步有㫁木長二尺餘隠其足發一矢中寨主納申面貫耳復射四人踣之敵兵遂郤太祖引兵遥圍其寨絶彼汲道攻至四日其夜令戰士跣足縁崖而上遂取瑪爾墩寨納申萬濟翰奔依界藩寨長巴穆尼乙酉年春二月太祖率甲士二十五步兵五略界藩寨寨内人豫為備無所獲而還薩爾滸佟嘉巴勒逹三城與界藩合兵四百追襲至界藩南太蘭岡之野納申巴穆尼突衝入我步兵中疾馳而前太祖見之單騎還擊納申刃已先及㫁太祖所執鞭太祖揮刀斷其臂墜馬死復射巴穆尼斃之敵衆逡巡郤立我甲士曰馬疲甚奈何太祖曰爾等下馬步行佯以弓弰拂雪為拾矢状徐引馬過嶺飲以鹽水飼以炒麵休息之予留此為緩敵計也於是我軍先行太祖駐馬納申屍旁其衆呼曰殺其人豈尚欲食其肉耶何不去聴我等收其骸骨太祖乃行顧其衆曰納申與我為難今得殺之即食其肉亦宜太祖念我軍行未逺率七人為伏悉露其胄而立納申部衆見之呼曰汝有伏我已知之矣且呼且郤太祖引兵徐還不遺一騎夏四月太祖率步騎五百征哲陳部值大水遣衆還留被棉甲者五十被鐵甲者三十共八十人略地而前有嘉哈地之人名蘇庫賚瑚者潛往告知托摩和章嘉巴勒逹薩爾滸界藩五城遂合兵以禦我巡哨官能古徳偵諸路兵集疾馳以告由他道突過弗遇太祖率兵遄行遥見敵兵八百餘陣界藩之渾河抵南山五祖寶朗阿之孫扎親桑古哩兩人見敵衆大懼解其甲與人太祖怒曰汝等平日自雄於兄弟鄉黨間今臨陣何懼敵衆反解甲與人耶乃親執纛先進近敵陣下馬驅馬囘率弟穆爾哈齊及近侍延布禄烏凌阿直前衝擊奮勇射郤敵衆斬二十餘人敵敗潰争渡渾河而遁太祖熱甚卸胄不及解甲以手斷其扣坐而休焉後隊兵將乃至皆曰宜乗勝追擊之太祖怒其遲至不應憇未移時復胄率兵渡河登岸與穆爾哈齊等躡敵後斬四十五級復追至吉林崖見敵兵十五人由旁徑來太祖去胄上纓隠身以待射先至者一人貫其脊而殪穆爾哈齊又射殪一人餘悉墜崖死太祖諭延布禄等曰今日之戰以四人而敗八百人之衆此天助我以勝之也秋九月太祖率兵攻克蘇克素䕶河部之安圖𤓰爾佳城斬其城主諾謨歡丙戍年夏五月攻克渾河部之貝琿寨秋七月攻哲陳部之托摩和寨遇雪雨旋師越數日太祖率兵往招撫之其衆俱降丁亥年夏六月攻克哲陳山寨擒寨主阿爾泰斬之圖倫城國語圖倫纛也城西南五百六十里週圍一里事蹟謹稽實録初蘇克素䕶河部圖倫城有尼堪外蘭者陰搆明寧逺伯李成梁引兵攻古哷城主阿泰及沙濟城主阿亥成梁授尼堪外蘭兵符率遼陽廣寜兵二路進成梁與遼陽副將分攻兩城尋克沙濟城殺阿亥復合兵攻古埒城阿泰之妻乃景祖長子禮敦之女景祖聞古哷城兵警恐女孫被䧟偕顯祖往救既至見成梁兵方接戰令顯祖俟於城外獨入城欲携女孫歸阿泰不從顯祖俟良久亦入城探之古哷城守禦甚堅成梁攻之不能克因責尼堪外蘭起釁敗軍之罪尼堪外蘭懼至城大呼紿城中士卒殺阿泰以降成梁盡誘城中人出而屠之尼堪外蘭復搆明兵害景祖顯祖我太祖聞之大慟旋勃然震怒諭明邊吏曰我祖父何故被害汝等乃我不共戴天之仇矣明遣使謝曰非有意也誤耳乃歸二祖喪太祖謂使臣曰害我祖父者尼堪外蘭所搆也必執以與我乃已明使不從且欲助之尼堪外蘭旋又迫太祖往附太祖曰爾吾父部下人也搆明兵害吾祖父恨不能手刃汝豈反從汝偷生人能百嵗不死乎自是恨益深適蘇克素䕶河部薩爾滸城主諾宻納之兄卦喇為尼堪外蘭所譖明撫順所守吏責治之諾宻納與同部嘉穆瑚寨主噶哈善哈斯瑚沾河寨主常舒及弟揚舒俱忿恚相議曰與其倚賴此等人何如投附聰睿貝勒也議定遂來通欵太祖椎牛祭天與之盟遣還太祖日夜思復讐以顯祖遺甲十三副謀伐尼堪外蘭嵗癸未明神宗十一年也太祖年二十五夏五月起兵征尼堪外蘭期諾宻納以兵自薩爾滸城來㑹諾宻納背盟不至太祖自率兵往攻尼堪外蘭於圖倫城尼堪外蘭豫知之携妻子遁嘉班太祖攻克圖倫城而還越兩月太祖復率兵征嘉班諾宻納與其弟鼐喀逹先遣人往告之尼堪外蘭遂奔撫順所迤東河口臺我軍躡其後是夜尼堪外蘭乗間遁太祖旋師諭侍臣曰若非諾宻納鼐喀逹往告之尼堪外蘭早成擒矣㑹諾宻納鼐喀逹遣人來言曰渾河部之杭嘉及扎庫穆二路勿往侵佟嘉及巴勒逹二城我仇也可取其地畀我否則不容爾兵由我邉界行也太祖聞其言怒噶哈善啥斯瑚與常舒揚舒亦忿甚曰不先破薩爾滸城吾等皆附諾宻納矣太祖遂定計陽與合兵往攻巴勒逹城諭令率兵先戰諾宻納不從太祖曰爾以兵仗與我我即先戰諾宻納信焉遂以兵仗授我軍太祖既得兵仗遂執諾宻納鼐喀逹斬之尼堪外蘭自嘉班奔遁後携其子及近屬兄弟數人逃于鄂勒勸地築城居之丙午年秋七月太祖復率兵往征時城外有四十餘人欲避兵挾弓矢走前行一人戴氊笠被青棉甲太祖望見疑即尼堪外蘭奮身往追為四十人所環逼衆矢交發太祖身中三十餘創貫胸及肩猶鏖戰不已射殪八人斬一人餘皆竄遁遂攻克鄂勒歡城索尼堪外蘭弗獲斬城内漢人十九又執中矢者六人深入其矢使傳諭明之邉吏執送尼堪外蘭否即興兵征明明邉吏遣人復曰尼堪外蘭既歸我未便執送自來殺之可也太祖命齋薩率四十人往尼堪外蘭聞我兵至欲登臺避匿明人不容登臺去其梯齋薩遂斬尼堪外蘭取其首來獻古哷埒城西南五百五十里週圍八十步門濠莫考其南即古埒野地接湯圖營事蹟謹稽實録癸巳年秋九月葉赫貝勒布齋納林布禄哈逹貝勒䝉格布禄烏拉貝勒滿泰之弟布占泰輝發貝勒拜音逹哩嫩江䝉古科爾沁貝勒翁阿岱莽古斯明安錫伯部卦勒察部及長白山所屬珠舍哩部長裕楞額訥殷部長藪穏色克什九國合兵分三路來侵太祖命烏哩堪由東路往偵烏哩堪行百里許度嶺羣鴉競噪若阻其行者欲還鴉乃散再行鴉復噪飛鳴撲面㡬不能前烏哩堪異之馳歸以告太祖命由扎喀路向渾河部偵之烏哩堪復馳往見敵兵營渾河北岸方夜爨火宻如星欲俟飯畢乗夜度沙濟嶺而來烏哩堪偵實奔告時夜已過半太祖曰日者聞葉赫兵來今果然我軍昏夜出恐驚國人傳語諸將期旦日啟行遂就寢甚酣妃富察氏呼上覺謂曰九國兵來攻何反酣寢耶豈方寸亂耶抑懼之耶太祖曰人有所懼雖寢不成寐吾果懼安能酣寢前聞葉赫兵三路來侵因無期時以為念既至吾心定矣吾若有負于葉赫天必厭之安得不懼今我順天命守疆土彼不我悦糾九國之兵以戕害無咎之人知天必不佑也安寢如故及旦太祖率諸貝勒大臣詣堂子再拜祝曰皇天后土上下神祗某與葉赫本無釁端守境安居彼來搆怨糾合兵衆侵陵無辜天其鑒之又拜祝曰願敵人垂首我軍奮掦人不遺鞭馬無顛躓惟祈黙佑助我戎行祝畢遂引兵至托克索渡口誡軍士曰盡解爾蔽手去爾䕶項或項臂傷亦惟天命不然身先拘縶難以奮擊我兵輕便破敵必矣衆皆如上命行至扎喀之野扎喀城鼐䕶繖坦二人來告曰敵兵辰時已攻城不克退攻赫濟赫城敵兵甚衆奈何衆聞之色變有朗塔哩者後至呼曰貝勒安在我兵㡬何言訖遂登山望之還告曰若以敵兵為多我兵亦豈少耶我國之人驍勇敢戰必破敵兵如不勝我甘軍法衆心乃定太祖使人往偵諭曰敵若還軍乗夜擊之否則旦日接戰時敵兵運糧芻立營壘偵者以告太祖遂駐軍是夕葉赫營有一人來降者言葉赫兵萬人哈逹烏拉兵萬人䝉古科爾沁及錫伯卦勒察兵萬人我兵聞之復色變太祖曰爾等無憂吾必不疲爾力俾爾苦戰惟壁于險隘誘之使來若來我兵迎擊之否則四面列陣以步軍徐進彼部長甚多兵皆烏合勢将觀望不前其争先戰者皆必其貝勒我以逸待勞傷其貝勒一二人彼衆自潰我兵雖少奮力一戰固可必勝耳遂於旦日進兵初葉赫兵攻赫濟赫城不克及是復攻太祖至古哷城對赫濟赫城據險結陣命大臣額亦都率兵百人挑戰葉赫兵見之罷攻城引兵來戰我兵迎擊敗之斬九人敵稍郤葉赫貝勒布齋錦台什及科爾沁貝勒翁阿岱莽古斯明安復并力合戰布齋先衆突前所乗馬觸木而踣我兵名烏坦者趨而前踞其身刺殺之敵兵遂亂哈逹貝勒䝉格布禄輝發貝勒拜音逹哩等皆膽落潰奔科兩沁貝勒明安馬被䧟遂棄鞍裸身乗驏馬走太祖縱兵掩擊積尸滿溝壑追奔至哈逹國柴河寨之南時已暮結繩截路邀殺敗兵甚衆是役也斬級四千獲馬三千匹鎧胄千副以整以暇而破九部三萬之衆軍威大震逺邇懾服冬十月太祖遣兵征珠舍哩部獲其部長裕楞額閏十一月命大臣額亦都安費揚古噶葢率兵千人征訥殷部攻克佛多和山寨斬其部長藪穏色克什明年科爾沁貝勒明安遣使通好自是䝉古諸部長通使不絶巴勒逹城巴勒逹國語解見奉天府山川卷城西南六百里已圮西即古哲陳部地東南接佟嘉城事蹟謹稽實録嵗丁亥秋八月太祖遣巴圖魯額亦都率兵征巴勒逹城既至渾河水漲不能涉令以繩聫軍士魚貫而度先率精鋭數人乗夜攻巴爾勒逹城樹梯而上城中人迎拒額亦都跨城堞而戰身中五十創猶死戰不退城中人皆潰遂克其城太祖復自率兵攻洞城克之降其城主扎海以還兆嘉城城西南六百餘里接代興京界週圍一里建置年無考事蹟謹稽實録歲己丑春正月太祖率兵征兆嘉城伏兵城下城主寜固沁遣兵百人出戰我伏兵不即擊引弓射之敵兵突衝上前四面環繞太祖獨立百人中手刃九人擊敗其衆悉潰走圍城四日將破之我兵遂弛備分取所俘獲聚而譁太祖解甲授侍臣鼐䕶被之諭曰我兵喧譁恐致争奪爾往禁之鼐䕶既往喧益甚太祖又以棉甲授侍臣巴爾泰被之諭曰敵將遁速取吾甲巴爾㤗往因喧嘩未息不即來忽敵兵十人出遁太祖族弟旺善為敵兵撲仆地踞其身欲刺太祖未及甲奮身直前發矢中敵兵額應弦而踣援旺善起衆兵乃至攻克其城斬城主寜固沁而還齊吉逹城城西南七百五十里週圍一百步我太祖髙皇帝甲申年擊敗揀鄂部兵於此伊罕山城伊罕國語解見吉林山川卷城東北三十里在伊罕山上週圍一里門一我太祖髙皇帝戊中年征烏拉部撫降之鄂謨城鄂謨國語解見黑龍江山川卷城東北三十里週圍二里門一哈勒費延城哈勒費延國語解見吉林山川卷城東北混同江中哈勒費延島上週圍二里門一代以上諸城建置年無考吉林境内諸堡鎮北堡城西五百十里週圍一里門一我太祖髙皇帝辛酉年征明撫降之今設汛焉博爾濟堡城北八十里週圍百步門一二十家堡城北一百十里週圍一里門一阿蘭堡國語阿蘭樺皮也城東南一百三十里週圍一里寜古塔城在吉林東南五百四十餘里瑚爾哈河北岸植松木為墻中實以土髙二丈餘週圍二里半東西南三門城外邉牆週圍十里門四南瀕瑚爾哈河本朝康熙五年自舊城遷此將軍巴海監造十五年將軍移駐吉林設副都統鎮守雍正五年置泰寜縣治於此七年裁泰寜縣仍歸副都統専鎮舊寜古塔城城西北五十里海蘭河南石城髙一丈餘週圍一里東西二門城外邉墻國初週圍五里餘門四巴圖魯監造今設汛焉時一等子武巴海寜古塔境内歴代舊有城址古城城西二十五里週圍一里餘東西二門俗名西古城又有二一在城東南五百八十五里費雅城北週圍五里南四門西三門東北各二門内有子城週圍一里南三里東西各一門一在城東北六百里混同江南岸週圍三里東西二門俗皆稱為古城不知何代建築穆當阿城穆當阿國語解見吉林山川卷城西三十里週圍一里半南北二門沙蘭城城西八十里舊覺羅城城南邉墻内南北各二十步東西各三十步噶斯哈城噶斯哈國語解見吉林山川卷城南二十里週圍一里半門一薩勒瑚城城北四十五里海蘭河南岸週圍一百步門一英愛城城東南五百八十里週圍一里東南二門富爾丹城富爾丹國語解見吉林山川卷城東南六百五十里週圍三里門四其東北又一小城週圍二里南西北三門俗亦稱富爾丹城富勒堅城富堅城國語解見黒龍江山川卷城東南六百七十里週圍七十步門一佛訥赫城國語佛訥赫火茸也城西南五十餘里我太祖丁未年遣貝勒巴雅喇等征取之古大城城西南六十里瑚爾哈河南岸即金時上京㑹寜府故址一名火茸舊城週圍三十里四面七門内城週圍五里東西各一門城内有宫殿基址城外有石佛一座詳見古蹟郡縣注寥晦城城西南金史太祖攻寜江州師次寥晦城方輿紀要寥晦城在故㑹寜府城西北相距數里今城圮無考克音城城東北五十餘里瑚爾哈河北岸海蘭河南岸週圍三里餘門一大河城即安巴畢喇城城東北三百五十里瑚爾哈河北岸週圍六里門四五國城城東北六百餘里大金國志天㑹八年宋二帝自韓州如五國城明一統志自此而東分為五國故名其建置年代俱不詳載今松花江黑龍江合流處有土城基相傳即五國城遺址詳見古蹟卷斡里城國語斡里幻術也城東北九百里混同江之南週圍三里西南二門海邊古城城東北三千餘里在混同江東南入海處城外有元時石碑地逺莫考其詳哈圖城城西北五十里海蘭河南週圍二里東西二門布爾哈圖城布爾哈圖國語解見奉天府山川卷城西北五十二里週圍一里東西二門舊薩爾滸城薩爾滸國語解見奉天府山川卷城西北八十里基址無考事蹟謹稽實録嵗癸未明神宗十一年也太祖年二十五夏五月壬午翔起兵征尼堪外蘭期薩爾滸城主諾宻納以兵來㑹諾宻納背盟尼堪外蘭遁於嘉班秋八月庚戌朔復征之諾宻納及弟鼐喀逹陰遣人告尼堪外蘭又復遁去太祖遂定計誅諾宻納取其城尋其衆復修城以叛太祖復以四人破五城之衆八百人寜古塔境内諸堡覺羅堡城東三里瑚爾哈河北岸週圍五十八步門一又有一在城東北四里瑚爾哈河北岸週圍五十六步門一都林谷堡都林國語解見吉川山川卷城西二百十里瀕都林谷河週圍六十步門一海蘭河屯海蘭國語解見建置沿革表卷城西北六十里海蘭河北岸週圍三里門四皇上東以上諸堡皆副都統駐防分汛地乾隆十九年巡過此有御製海蘭河屯詩恭載天章門白都訥城在吉林西北五百二十五里舊名納爾渾又名新城本朝康熙三十二年建築週圍七里池深九尺廣七尺門四三十三年移吉林副都統鎮守於此雍正五年於境内增設長寜縣乾隆元年奉裁仍歸副都統専鎮白都訥境内歴代舊有城址舊白都訥城城東二十五里週圍里許已圮其建置年代無考唐王河古城古城城東南四里阿勒楚喀河西岸週圍四里内有子城門濠莫考相傳為即金時肇州城遺址詳見古蹟郡縣注三姓城在吉林東北九百三十六里週圍五里髙七尺池深七尺廣八尺本朝康熙五十四年建築置佐領協領防禦管轄雍正五年增設副都統鎮守三姓境内歴代舊有城址西古城城西一百二十里瑚爾哈河西岸又有二一在城南六十里瑚爾哈河東岸一在城北二里俗皆稱古城和敦城城東北一里我太祖髙皇帝甲辰年攻克葉赫部撫降之阿勒楚喀城在吉林東北六百里舊城週圍二里南北二門本朝雍正三年設副都統協領等駐防七年改建新城週圍三里髙一丈三尺池深八尺廣一丈阿勒楚喀境内歴代舊有城址翁鄂洛城國語翁鄂洛河灣也城南四里内有子城週圍里許尚餘宫殿舊址不知何代太祖髙皇所築俗稱為古城西為安楚拉庫路我帝戊戌年攻取之渾春城池城在吉林東南一千一百里渾春河東岸南與朝鮮接界皆庫雅拉等所居週圍一里門四不知何代建築本朝康熙五十三年重修置佐領協領防禦管轄渾春境内歴代舊有城址扎庫塔城國語扎庫塔各八數之謂也西一百二十里週圍一里事蹟謹稽實録嵗丁未夏五月太祖命貝勒巴雅喇大臣額亦都費英東侍衛扈爾漢率兵千人往征東海窩集部取赫濟赫鄂摩和索囉佛訥赫三路屯寨俘二千人而還己酉年冬十二月命扈爾漢率兵千人征窩集部之瑚葉路取之收二千户而還賜扈爾漢甲胄馬匹號為逹爾漢嗣有歸附我國之窩集部綏芬路長圖楞為窩集部之雅蘭路人所掠庚戍年冬十一月命額亦都率兵千人征雅蘭路額亦都先往窩集部之那木都魯綏芬寜古塔尼瑪察四路招其路長康果禮喀克都哩昻古明安圖烏魯喀僧額尼喀哩瑭松阿葉克舒等令其携家口前行旋師至雅蘭路遂擊取之俘萬餘人而還辛亥年秋七月命台吉阿巴泰大臣費英東安費揚古率兵千人征窩集部之烏勒固宸穆稜二路取之尋有窩集部之扎庫塔人來附太祖賜甲三十副遣之還其人以甲送黒龍江濱窩集部人被於樹以試射又貪烏拉國布疋受貝勒布占泰招撫冬十二月命額駙何和里同額亦都扈爾漢率兵二千往征扎庫塔城諭降弗從圍三日攻克其城斬首千餘俘二千餘人並招降環近各路收五百户令圖埒伸額哷伸二人衛之來歸甲寅年冬十一月太祖遣兵五百征窩集部之雅蘭西林二路收降民二百户俘千人而還乙夘年冬十一月太祖遣兵二千征窩集部東額赫庫稜先是額赫庫楞之人寄語我國曰人謂爾國驍勇可來與我等决一戰至是八旗兵分兩路進招之不服遂布陣鳴螺越壕三層毁其柵攻克其城陣斬八百人俘獲萬人收撫其居民編户口五百乃班師沙濟城城南二十五里週圍一里餘門一費優城費優國語解見吉林山川卷城北二十里週圍三里西南各二門東北各一門我太祖髙皇帝丁未年收撫瓦爾喀部於此逹都城逹都國語解見吉林山川卷城東南七十里週圍一里愛丹城城西北二百五十里週圍一里以上諸城建置年代俱無考打牲烏拉城在吉林北七十里週圍八里門四本朝康熙四十二年因烏拉舊城有水患於城東改建新城設總管協領等官駐防欽定盛京通志卷
