body:
  text: 欽定四庫全書欽定盛京通志卷十九壇廟天壇儀制地壇儀制太廟儀制堂子祀典欽定四庫全書欽定盛京通志卷十九壇廟臣等謹案禮莫隆於郊社義莫大於禘嘗我太宗文皇帝神武既昭典儀爰舉建郊丘營太廟躬親秩祀告類升香嘉壇恭祝之文清朝鬯彛之奉燦然明備我皇上敬天法祖昭事寅䖍廵軒四蒞特飭所司於紫壇閟寢重加修建三成之制五供之儀宏規彌肅記曰仁人饗帝孝子饗親惟大徳之至聖乃克臻此臣等忝列奉璋肅瞻鴻制謹志壇廟第五欽定四庫全書欽定盛京通志巻十九壇廟天壇在徳盛門外南五里建圜丘舊制三成每層圓面􅉍加環砌上成九重周圓一丈八尺二成七重周圓三丈六尺三成五重周圓五丈四尺俱高三尺圍墻週一百十三丈南一門東西北門各一第一成恭祀昊天上帝位南嚮列聖位東西嚮第二成以大明夜明星辰雲雨風雷從祀位各東西嚮崇徳元年夏四月太宗文皇帝以得元傳國玉璽受諸王大臣恭上尊號乃躬親告祭肇祀天於南郊其儀蒼璧一帛十有二犢一登一簠二簋二籩豆各十有二尊一爵三鑪一鐙六燔牛一玉帛實於篚牲載於俎尊實酒疏布羃勺具設樂於壇下分左右懸禮制大備十一月冬至太宗躬率諸王貝勒文武羣臣齋戒三日祀天扵圜丘告興師致討朝鮮之由俱恭載録實順治十三年定制凡盛京壇内有應修之處俱著盛京工部隨時查估修理乾隆四十三年上詣盛京奉㫖重修四十五年十月修竣四十八年秋九月上詣盛京有重修壇廟恭紀詩四首謹案恭載御製詩天章門地壇在内治門外東三里建方澤舊制二成四週以方坎蓄水毎層方面逓加墁砌上成建方六丈髙二尺下成建方八丈髙二尺四寸圍墻週一百三十三丈八尺北一門南東西門各一第一成恭祀皇地祗位北嚮列聖東西嚮第二成以五嶽五鎮四瀆列祖山陵配祀位東西嚮乾隆四十三年奉㫖重修四十八年六月修竣太廟初在撫近門外大殿五楹後廡六楹前殿三楹大門三楹東西角門二楹週圍廣三十五大袤四十丈國初尊祀列祖神御崇德元年始定制四孟時饗並毎月薦新每歳聖誕及清明孟秋望日歳暮忌辰均太廟致祭殿中寶位以昭穆序並設床榻衾枕楎椸帷幔如生事儀太宗文皇帝初得元玉璽受尊號乃躬祀列祖於太廟謹稽来歸其實録天聰九年春察哈爾國宰桑等率衆子額哲尚率所遺人衆留託哩圖太宗命貝勒多爾衮等招撫之遂降並於額哲母妃處得元傳國璽其文乃漢篆制誥之寶四字二交龍為紐自元順帝擕入沙漠後失去越二百餘年有牧羊山麓者見羊不食草但以蹄掘地發之得璽以歸元裔博碩克圖汗後為林丹汗所得至是諸貝勒擕歸以獻衆皆稱賀太宗焚香告諸貝勒大臣以天受之先是太宗功徳隆盛屢請上尊號䝉古貝勒等復再三陳請乃太宗固辭不允至是偕外藩郊於天聰十年夏四月祭告廟受仁聖皇帝尊號建國號曰寛温大清以是年為崇徳元年考祭儀定祭品牛一羊一豕一簠二簋二籩十有二豆十有二鑪一鐙二各帛一登一鉶一尊一玉爵三金匙一金箸二帛共篚牲共爼尊實酒疏布羃勺具設樂部於階前分左右懸祭日陳法駕鹵簿順治十三年定制凡遇歳時應行修理之處着盛京工部董其事乾隆四十三年上詣盛京命移建太廟於大清門之東即舊景佑宫址南北袤十一丈一尺五寸東西廣十丈三尺五寸正殿五楹東西配廡各三楹東西耳房各三楹正門三楹東西門各一凡需用琉璃瓦油餙顔料及罘罳所用銅絲皆盛京工部董其事仍欽𣲖大臣監視落成四十五年六月奉㫖太廟尊藏冊寶應選和闐良玉另鐫一律以彰符命所有太廟原藏冊寶十六分恭送盛京太廟尊藏四十八年秋八月特命皇子親王賫送盛京太廟敬謹尊藏太祖高皇帝尊謚玉冊玉寶一分孝慈髙皇后尊謚玉冊玉寶一分太宗文皇帝尊謚玉冊玉寶一分孝端文皇后尊謚玉冊玉寶一分孝莊文皇后尊謚玉冊玉寶一分世祖章皇帝尊謚玉冊玉寶一分孝惠章皇后尊謚玉冊玉寶一分孝康章皇后尊謚玉冊玉寶一分聖祖仁皇帝尊謚玉冊玉寶一分孝誠仁皇后尊謚玉冊玉寶一分孝昭仁皇后尊謚玉冊玉寶一分孝懿仁皇后尊謚玉冊玉寶一分孝恭仁皇后尊謚玉冊玉寶一分世宗憲皇帝尊謚玉冊玉寶一分孝敬憲皇后尊謚玉冊玉寶一分孝聖憲皇后尊謚玉冊玉寶一分堂子在城東内治門外國初祀天神之所國俗最重祭神祭天舊有朝祭夕祭背燈祭諸儀注正月三日每月朔日俱於堂子亭式殿内致祭設司俎司香司祝等員供醴酒進時食上香獻酒時俱奏三絃琵琶鳴拍板贊歌鄂囉羅誦祝辭神歌凡叩禱行禮分胙俱如又于毎月朔日祭堂子東南隅尚錫神亭供酒設食陳紙帛歌祝辭俱如儀以上祭儀祝辭俱恭載欽定滿洲祭典又每歳十二月二十六日恭請神位供于堂子屆期命十六人舁二神輿進清寧宫門外滿洲司俎二人恭請朝祭夕祭神位各安奉輿内前引仗四對羊角鐙二對司俎官二員掌儀官一員侍衛十員導引至堂子殿内安奉朝祭神位于東夕祭神位于西輿前各設案一毎日上香二次至正月初二日請回清寧宫安奉原位凡朝祭夕祭有神歌禱辭背燈祭有祈請辭俱恭載欽定滿洲祭典又四月初八浴佛日亦于堂子殿中懸神幔致祭如前儀又毎歳春秋二季于堂子立神杆大祭祭之次日祭天又每月有祭天之禮凡殿内供香案陳器皿設鐙懸幔以及請神輿悉如前儀並有飲福受胙各儀注俱恭載典滿洲祭欽定又每歳正殿神位所懸紙帛月終積貯以囊盛之于除夕送赴堂子同所懸凈紙神杆同焚又有樹柳枝求福之祭祭畢亦以柳枝送堂子于除夕同焚又馬神之祭亦于堂子内設餻醴以祭國俗祭禮有懸掛神幔之儀乾隆八年皇上駕詣盛京曾懸神幔設神位以祭四十三年奉㫖重修堂子殿宇式煥丹輪益昭妥侑云臣等謹案堂子之建乃我國家昭假天神鉅典伏讀乾隆十二年命重修滿洲祭典諭㫖仰見至誠感神儀式舊章之盛意謹于堂子後附注祭儀至如時薦之文祭器之圖已詳欽定滿洲祭神祭天典禮一書兹不更贅
