body:
  text: 國朝人物十三鑲黄旗漢軍正黄旗漢軍欽定四庫全書欽定盛京通志卷七十七國朝人物十三鑲黄旗漢軍范文程𨽻鑲黄旗漢軍少頴敏沉毅讀書通大義初居瀋陽為明諸生天命三年來歸太祖厚遇之日見親信恭帷幄天聪三年從太祖征明入大安口下遵化進薄燕京明年還軍克永平灤州諸城文程在軍中時預宻畫五年攻圍大􅓸河城諭降明將祖大夀七年援明將孔有徳來歸是時初設都統廷議首推文程太宗曰朕特一軍職耳朕方資文程為心膂其别議之尋以文程為秘書院大學士詔諭皆出其手文程每陳進取之策太宗轍稱善入對必漏下數十刻始出或未及食息復奉召率以為常順治元年流賊李自成䧟燕京明亡其將吳三桂來乞師討賊文程力賛進兵且言自古未有嗜殺而得天下者國家誠欲統一區夏非乂安百姓不可傳檄示軍民悉令安堵如故大軍所至人心帖然迨入燕京凡建立規模多所裁定訂冊籍舉佚遺除明季重賦事無巨細應機立辦中原既定請申行鄉㑹試以致人材請興屯田以佐國用發保甲以杜亂萌事多施行文程嘗言天下治安惟在得人欲得人惟在惜才庶官中有一𤯝不掩者為湔除㧞擢之人益感激効用故所奏舉莫不稱職先後以功晉爵至一等子賜號巴克什厯議政大臣充太宗實録縂裁官加少保兼太子太保因病乞休特加太傅兼太子太保聴解任調攝賜以藥餌圖其像藏之内府康熈五年卒聖祖再遣大臣致奠立碑墓道諡曰文肅五十二年御書元輔髙風四字顔其祠佟圖賚一名盛年𨽻鑲黄旗漢軍先世居開原遷於撫順我太祖克撫順其父養正挈族來歸以征遼陽功授三等輕車都尉世職尋駐鎮江城城守中軍陳良䇿叛降明將毛文龍養正被害長子豐年亦從死圖賚以次子襲世職天聰五年從圍大􅇒河破監軍恭政張春援兵以功晉二等輕車都尉崇徳三年授兵部右叅政五年從圍錦州復白官兒屯䑓六年復從圍錦州取金塔口三臺七年攻松山城明將以騎兵奪我巨礟擊敗之又敗其歩卒於山口分兵克塔山杏山諸䑓乘勝下其二城論功晉一等輕車都尉擢都統八年從取前屯衛中後所二城加一雲騎尉順治元年偕都統巴哈納石廷柱招降山東四府七州三十二縣移師太原招降九府二十七州一百四十一縣二年從豫親王多鐸平定河南進征江南㧞揚州敗明舟師於揚子江遂從貝勒博洛下浙江攻克嘉興進爵二等男五年授定南將軍與都統劉之源討明桂王朱由榔於湖南時由榔將馬進忠等分據衡湘辰永乗勝䧟寳慶圖賚擊之復其城六年鄭親王濟爾哈朗以大軍至圖賚别將兵趋衡州所向皆㨗陣斬偽總兵陶養用破偽伯胡一清七營于城南連破之望公嶺山塔口一清竄全州又破其六營既下州城還師駐衡州遣將敗敵于石皷洞斬其將二人八年凱旋得恩賞尋授禮部侍郎復調都統晋爵至三等子予世襲十三年引疾乞休加太子太保致仕十五年卒賜祭塟贈少保兼太子太保諡勤襄康熈十六年聖祖追尊孝康皇太后推恩所生特贈圖賚一等公以其子國網襲改𨽻滿洲雍正元年追封養正一等公諡曰忠烈祀昭忠祠與圖賚並加贈太師明年勅建專祠以祀圖賚賜額曰功宗元祀郎廷佐𨽻鑲黄旗漢軍先世居廣寕父熙載為明諸生天命七年征廣寕熙載率遼河西四堡兵民來歸授偹禦尋予三等輕車都尉世職廷佐其次子也崇徳中以官學生授内院筆帖式順治二年官國史院侍讀三年從肅親王豪格平四川六年從英親王阿濟格平大同誅叛鎮姜瓖是年遷秘書院學士十一年擢江西巡撫江西自明末洊遭兵亂逋賦鉅萬廷佐再疏請蠲緩以蘇民困土賊洪國柱繆我章等剽掠饒州廣信間遣將勦平之十二年擢江南江西總督校閲江南賦籍積逋至四十餘萬曰此非盡民困不能輸也必有官吏侵蝕之而詭稱民逋者民困可矜官吏之弊不可不革覆覈之果盡得侵蝕狀而其弊相沿已乆有司每視其所急以新舊賦互相抵餙愈紏紛不可釐治又令甲夲任徴賦未完者皆予降調去官屢更代吏益因以為奸以故逋賦日積廷佐乃籍之為三曰官侵曰吏蝕曰民逋專責右布政使分别督催而以新賦責左布政使鈞稽其収納俾不得相抵餙並疏請征賦未完應降調者令戴罪㽞任催徴以課實效於是宿弊頓為之革江南故無備用船大軍經行皆取估舶以濟商賈頗觀望不前廷佐請視江西發帑造船備用江南之有備用船自廷佐始也十六年廵閱江海以海賊鄭成功方冦浙江沿海郡邑一揚帆即達江南而江南汎兵单弱水師未習舟楫未具請撥隣省勁兵以重海防部議以隣省無可撥者寢其事不行已而成功竟䧟鎮江襲𤓰洲犯江寕江寕兵少不足禦㑹副都統噶楚哈等自貴州旋師沿江而下廷佐與駐防總管喀喀穆邀入城共擊賊挫其前鋒獲舟二十餘偽印二成功旋率衆大至屯于岳廟山連營八十有三艨艟蔽江廷佐等登陴固守及所檄援兵俱集遂與諸將定議以騎兵繞山後攻其背以歩卒開神䇿門攻其前以舟師斷其歸路而令副將梁化鳯夜穴儀鳯門出銜枚襲偽總統余新營新就執成功已氣奪比旦前後兵並起夾擊陣擒偽提督甘輝偽總兵張禄郭良玉縱火焚賊艘五百餘成功遁入海㨗聞下詔深褒奨之聖祖即位分設江南江西總督二以廷佐専督江南康熙四年仍兼督江西七年以疾觧任十三年逆藩耿精忠據福建叛特遣廷佐為福建縂督廷佐受命發憤矢志殱賊上言臣孫娶于耿氏臣與精忠有連然臣誓不與賊俱生願力疾前驅縳精忠歸献闕下聖祖嘉之賜鞍焉甲胄以寵其行廷佐至浙江賊已盡䧟福建不得進乃從康親王傑書駐金華以禦賊十五年卒於軍賜祭𦵏如典禮祀江西名宦祠丁文盛廣寜人初為明諸生天命六年來歸𨽻鑲黄旗漢軍崇徳三年任兵部啓心郎順治元年授登萊兵偹道二年擢山東廵撫濰縣賊張廣犯萊州遣將擊敗之於三埠又敗之紅山廣奔平度追及於徐里疃射殪之賊平文盛莅東省凡三年當兵燹後村落多􅇕乃専事安輯請蠲牙税雜税請肅郵政以莭存經費市馬不得派累閭閻請清理刑獄請核臨清東昌平山諸衛兵虗額請裁虗額以重軍實皆下所司議行於是明季弊政釐革殆盡㑹荏平髙唐禹城武城新城諸邑為土賊所擾文盛請發禁旅勦之給事中林起龍御史金元楨交章責文盛不能弭賊部議當革職世祖特寛之降授河南按察使六年遷福建布政使七年卒於官劉之源𨽻鑲黄旗漢軍天聰中官叅領崇徳中擢都統從圍錦州毁松山臺堡下塔山杏山二城攻拔中後所前屯衛屢以功晋一等輕車都尉世職順治元年大軍定燕京偕都統李國翰勦平畿南餘賊尋偕都統葉臣勦偽伯陳永福於太原克其城别將兵徇汾州平陽斬賊四千餘山西悉平二年從順承郡王勒克徳渾勦賊湖廣殱其黨於應山偽縂兵馬進忠降復叛偕都統金礪敗之武昌奪其艘六十餘復追敗之湖泊進忠屡敗衂與賊渠袁宗第等先後降於明大學士何騰蛟並授偽縂兵官分據湖廣諸郡邑五年以之源為定南將軍從鄭親王濟爾哈朗征之六年進攻湘潭騰蛟勒兵三隊出戰擊之潰克其城生擒騰蛟乗夜進勦進忠平明薄其營拔之遂克寳􅂟連破其南山坡九營陣斬縂兵馬有志胡進玉等進忠僅以身免乗勝擊宗第於洪江敗偽縂兵王強于便水驛斬偽副將三人計級七百有竒前後叙功並遇恩詔晋世職至一等男兼一雲騎尉八年偕都統金礪駐防杭州時偽大學士張肯堂偽侯阮進張名振等擁明魯王朱以海踞舟山之源與縂督陳錦縂兵田雄㑹師由寕波出定海闗進列戰艦以拒敗之横水洋生擒進楊帆抵舟山薄螺頭門肯堂集城中兵六千堅守十餘日我兵以雲梯破其城肯堂及偽尚書李向中吴鍾峦偽侍郎朱永佑將軍劉世鄖左都督張名楊等皆死之名振擁魯王遁三盤島轉走沙埕之源遣縂兵馬進寳等追敗之名振遂航海去乃與陳錦金礪奏設水陸兵三千分中左右三營駐守舟山以副將領之屹然為懸海重鎮叙功晋三等子世襲罔替十六年授鎮海大將軍移駐鎮江既至以閩賊鄭成功方縱掠江海間而京口為東南輓輸孔道巡哨之法不具非所以重江防乃請練水師修戰艦飭火器募舵工慎分廵嚴㑹哨百廢具舉賊乃不敢犯明年獲成功所遣諜者乃得蘓松提督馬逢知與成功交通狀入告逢知伏誅康熙三年上疏請老召還京仍任都統四年復乞休加太子太保致任八年内大臣鰲拜獲罪之源父子坐黨附當斬聖祖特原之之源尋卒二十年追復其官並予三等子爵子光襲胡有陞錦州人隸鑲黄旗漢軍崇徳四年圍錦州有陞持道人崔應時書來約偕五十人以城降明將覺之盡害其衆因授有陞三等副都統八年從征明敗明兵於渾河又從克前屯衛中後所順治元年論功擢二等副都統五年以縂兵出守南贑值逆鎮金聲桓叛同偽建武侯王徳仁來攻贑州有陞與廵撫劉武元竭力拒守閱五月糧盡士疲有陞拊循有素人無叛志尋王師大集急攻南昌聲桓北走有陞率諸將追擊大敗之是年九月廣東叛賊李成棟犯贑有陞復大破之累加至一等進秩太子太保康熙六年致仕贑人思其徳崇祀名宦趙廷臣鉄嶺人𨽻鑲黄旗漢軍明季居山海闗性至孝父歿三年獨居不入内室舉明經順治二年知江南之山陽縣時屡經兵火民多流散廷臣均徭緩賦民以安集丁亥嵗饑廷臣損金糴粟計口賑之老弱者復按季周給多所全活土賊劉二虎與鄖㓂王二虎攻山陽廷臣晝夜固守城頼以全其餘竊彂山㓂諭以大義多受撫乂嘗率騎偵賊為所傷扶創歸益嚴守禦曰吾為國守於身何有山賊王希榮乆據鎮安執掠縣令拘寨下臺司檄廷臣往撫即单騎至賊營宣布威徳諭以禍福希營遂降廷臣因攜前令歸臺司咸器重之尋陞江寕同知民間有趙佛之稱十年大學士洪承疇經畧湖廣薦廷臣清幹素著十一年授湖南巡道兵民皆喜曰是趙佛來矣時軍需旁午廷臣辦治有方事濟而民不擾遇刑獄加意平反㕔事但聞脱械聲行路為之感泣尤勵清操嵗時餽献不敢至其門十五年巡撫貴州時王師甫定黔下車日廷臣延見父老博採旁咨盡得民疾苦狀凡所條禁洞燭幽隐定賦額興學校禁貪横嚴騷擾種種寔政殘黎如出湯火晋雲貴縂督兵燹荒歉之餘調劑兵民甚有恩惠加兵部尚書太子少保康熙元年調浙閩總督去之日士民擁道攀號者萬人在浙逾年勦撫浙東海洋餘㓂斬賊帥張煌言寕台温諸境遂安賊平恤軍愛民疏請復二十四監鼓鑄泉貨遂通廷臣性不喜繁侈每行部不過數騎竟有不知其至者後以勞卒于官賜祭葬謚清献郎永清廣寕人𨽻鑲黄旗漢軍順治六年知山西渾源州時叛鎮姜瓖初平永清招集流亡詳請豁免逋賦萬餘両十年知江西贑州府贑自丙戌城破復連嵗用兵閩廣民多轉徙永清勤招徠嚴約束復業者日衆大軍之討李定國郝尚九也道經贑飼馬以行永清預度城南演武塲為營柵芻糧畢備而自往萬安迎大帥陳説郡當新定不宜騷動之故帥感其言下令不許一兵入城瑞金石城被㓂害最甚為民營室廬瘞胔骼歳洊饑發粟往賑贑諸生王曰旦為盗所引不勝刑誣服永清亷其枉出之又雪興國民廖安民之獄在官四年贑人立祠祀之後厯山東按察使湖南布政使湖廣開藩南省自永清始也時干戈初靖永清招來撫育民得安堵永寳諸郡溪流悍急歳漕為艱力請改折湘衡以南舊食粤鹽灘險道逺商民交病申請改食淮鹽至今稱便後擢山東廵撫士民追維遺愛建專祠撫臣趙申喬為記長子廷樞任粤東臬司有清望次子廷極厯任漕運縂督卒諡温勤蕭起元𨽻鑲黄旗漢軍順治元年以貢生從入闗承辦軍機事務多著勞績時畿輔初定授直𨽻大名守所至撫綏有方尋以僉都御史巡撫浙江一意撫戢與民休息杭嘉諸郡縉紳世僕不甘制於舊主其主有衰落者諸僕借通海謀叛刼制之逼令開除出户少不從則控之臺司逮捕其主株連甚衆起元亷得其情執干名犯分律置其僕於重典人心稱快時八旗駐防兵留鎮者與民雜處日乆頗有齟齬起元於城西隅築城以居俾兵民判然不相驚擾十一年縁事降調旋卒起元在浙江十年功徳甚多士民思之康熙元年請祀浙江名宦祠靳輔祖籍遼陽𨽻鑲黄旗漢軍順治九年授國史院編修康熙九年屢擢内閣學士授安徽巡撫十三年逆藩吴三桂耿精忠等反分㓂江西輔擒斬歙縣賊宗鑣等加兵部尚書銜十六年授河道總督是時河流横决清口運道皆淤輔受事後斟酌事宜相度形勢興建堤埧廣疏引渠排衆議而不撓竭精勤以自効大挑山清髙寳四州縣運河詳審两淮全局陳經理河工事宜八疏復請開中河三百餘里令漕艘由仲家莊牐而上即入中河避一百八十里波濤湍悍之險勞積茂著三十一年卒賜祭葬諡文襄四十六年加贈太子太保予騎都尉世職輔治河十七年經理無不確當既老病劇猶疏陳两河善後之䇿及請豁開河築隄廢田之粮沿淮軍民感誦治績不衰建詞河干著有治河方畧十二卷雍正十二年崇祀賢良祠傅大受𨽻鑲黄旗漢軍世居遼東崇徳六年聚衆於十三站時我師方圍錦州尚未掘壕一卒逃奔敵所大受執殺之并來報敵兵將犯駱駝山因遣兵往擊盡殱之授佐領世職順治二年從征江南攻克揚州又随征浙江湖州賊黄蜚率衆來犯三敗之十三年從征舟山敗偽縂制陳六御等之衆於海上以功累加世職至一等輕車都尉兼一雲騎尉王繼文奉天人𨽻鑲黄旗漢軍順治元年授𢎞文院編修十八年分廵江西饒九南道時遣部員清丈蘆州頗作威福繼文日單騎走烈日中隂為調劑多所寛减民大感悦康熙十四年任雲南布政使賛理粮餉二十年大軍三路討吴三桂歩騎數十萬米芻闕供議欲取食民間繼文白廵撫伊闕言於都統頼塔及固山貝子章㤗等曰現粮可支三日如三日後米芻不繼請正繼文軍法乃急遣員賚銀分市隣邑未三日米芻飛至後廵撫伊闕卒遺疏薦遂撫滇賊平後招徠流民以漸復業尋擢雲貴縂督惠政尤多卒贈兵部尚書祀名宦長子用霖任粤西臬司以亷明著董應魁奉天人𨽻鑲黄旗漢軍初任良鄉令以賢能課最厯任湖南寳􅂟守山東驛鹽道福建按察使廣西布政使皆有治行順治十八年廵撫廣東下車之日問疾苦懲積弊招携懐來民大安之時粤屢遭兵燹瘡痍未復值靖南王耿繼荗移鎮閩省督糧甚急百姓騷動應魁慨然曰吾不忍諉罪於下請身任其咎遂左降部民懐其徳立祠以祀郎廷相奉天人廷佐弟也𨽻鑲黄旗漢軍順治十五年以郎中随征偽晉王李定國有籌畫大帥多用其言以軍功加優叙康熙三年官四川布政使綏集流移給廬舍耕具營廨舍建學校兵火之餘百廢具興民不知擾尋擢河南廵撫逺近攀留者遮道號泣十五年任福建總督時閩南初定餘孽尚熾廷相勦撫互用出竒制勝旬月之間沿海諸郡㓂盗次第悉平又逆藩吴三桂遣偽將軍韓大任等由江右入㓂廷相遣官詳諭利害大任感泣輸誠閩境帖然丁思孔文盛子𨽻鑲黄旗漢軍順治壬辰進士初任𢎞文院庻吉士内國史院侍讀康熈八年授直𨽻分巡道出納平允吏胥不能為奸大軍内征供億填溢思孔措辦有方毫不擾民十四年擢江南按察使旋陞布政使督臣于成龍疏薦二十二年擢偏沅廵撫修嶽麓書院成二十七年湖廣裁兵夏逢龍因裁缺候補作亂副將傅爾學等應之叛踞武昌時思孔由河南巡撫調撫湖北籌餉充裕分兵勦擒賊渠授首擢湖廣縂𨽻三十三年調雲貴縂督卒於官賜祭葬如例祀江南湖廣名宦髙承爵鐵嶺人𨽻鑲黄旗漢軍祖尚義順治元年從入闗著有軍功子五承爵其第四子也康熙初由廕生授河南淇縣令屢擢至揚州知府以治行超擢江蘇按察使三十二年晉福建布政使蒞任三日即按之人丈時盱眙泗州等州縣河流泛溢修築隄防全活無算三十九年再任值嵗歉承爵損俸施粥皖人獲濟徴収錢糧革除扛耗奸胥歛跡尤加意學校振起人文四十年乞休還京卒祀安慶名宦范承勲文程子𨽻鑲黄旗漢軍由廕生授工部員外郎屢遷監察御史擢内閣學士康熙二十四年廵撫廣西時軍興之後餘糧數十萬部議全省折徴承勲酌徴半折半之法因地制宜民大便之二十五年任雲貴縂督滇黔經吴三桂亂後庶事草創承勲至整飭營伍酌除重賦安輯邉隅盗息民寕又損俸修建學宫置禮樂器聘名士纂修通志凡所規畫動中機宜二十七年尋甸左恊營卒作亂省城弁兵欲應之約三更舉事承勲諜知其情命司更止打二鼓賊聞曉鐘始知事洩比曙叛黨咸就擒左協叛衆知事不成遁走交水承勲檄兵合擊盡誅倡亂者三十三年擢都察院左都御史承勲督滇十載屢勘大獄消兵變起瘡痍佈置周宻巖鞏固離滇之日两省軍民環籲攀㽞極邉土司奔走千里泣拜載塗尋授两江縂督四十三年以病乞休五十三年卒賜祭葬祀滇黔两江名宦祠髙其位鐵嶺人𨽻鑲黄旗漢軍父天爵於耿精忠之亂殉節不屈死見忠節傳其位以䕃官佐領康熙十三年委署軍營恭領從靖㓂將軍順承郡王勒爾錦出師襄陽征逆藩吴三桂命其位率二十騎覘虚實適賊將王惠率衆二萬人趨襄陽猝遇於土地領其位飛騎馳報而率所部出不意衝突之賊驚潰且斫且馳至南漳越濠而呼入城守禦衣上血跡糢糊刀刄盡缺賊人圍南漳以城守守有備不能克解去又叛賊譚洪率舟師三萬向鄖陽其位以三百人扼楊溪舖賊蠭至其位踞崖射賊矢無虚發相持七十日糧盡煮馬鞍以食誓必死㑹副都統李麟隆擊破賊乃全師歸其位每戰先登前後給功牌十二嗣屢遷至湖廣提督調江南提督兼攝縂督事雍正元年晉大學士太子太傅兼禮部尚書五年卒賜祭葬諡文恪入祀賢良祠髙其倬鐡嶺人𨽻鑲黄旗漢軍康熙甲戌進士由翰林屢擢至内閣學士奉使勘打箭爐疆界瓦厮讋服及還圖其地形以進康熙五十九年擢廣西巡撫旋授雲貴縂督勦平中甸及仲家苗叛黨威望大著畨境乂安兵民樂業雍正初調閩浙縂督甫抵浙聞閩省嵗祲即奏請截江浙漕米二十萬由海運平糶賑濟復奏請發帑採買廣儲偫禁囤積民不病飢性明恕政舉大綱不矜苛細遇屬員有恩禮其清節尤著一時七年調两江縂督旋晉工部尚書轉户部尚書乾隆三年卒諡文良佟國正撫順人𨽻鑲黄旗漢軍順治初由州牧累擢至監司康熙十四年擢江西廵撫時吳三桂反提督嚴自明等從逆率賊逼南康國正率將士破其營十七斬首萬餘明年招撫賊張元仁等降其衆十七年偽縂兵頼榮盤踞江廣間九鄉地方出沒為冦國正撫降之賊將韓大任等竄走萬安敗之鸕鷀灘諸䖏多斬獲以功累加至兵部尚書國正潔已率屬禮賢下士賞罸必信摘奸如神勸農桑恤閭閻每有調發不驚蔀屋撫民之流離者分置附郭選其丁壯暫令随征難民皆得安堵十八年致仕尋卒崇祀江西名宦詞梁應元遼東人𨽻鑲黄旗漢軍順治六年知江南池州府為政恒視民所急首茸學宫振㧞寒畯復以次修舉廢墜百度俱舉遷𨽻大名道去民為立祠王之佐𨽻鑲黄旗漢軍世居廣寕康熙初任寕化令時海氣未靖二十年王師十萬駐漳州日餉十斛上游飛輓𣲖役民夫之佐念民疲差重設法調劑随時補救以蘇民困㑹有黄機者受吳三桂偽劄脅其鄉黨從逆楊地一鄉不從遂圍而屠之之佐請兵㑹勦時大軍與海相持難以驟移之佐力請於督撫調三鎮兵㑹勦值同安告急督撫有難意之佐言不可驕賊以致民人麋爛聲涙交迸督撫鍳其誠許之之佐遂部率鄉兵躬為嚮導蹙賊壘分攻之賊盡棄其衆越贑石入江西投誠江西撫臣納之發符還寕化之佐堅不奉檄昌言於大吏曰閩賊即江賊也若閩賊入江即當宥死江賊入浙又應偷生王法將誰加乎如謂法外宥過以招不廷則自江納之即自江用之今名寄江籍而身返閩巢閩之文武何顔臨之乎大吏是其言遂搗其巢穴以兵截洞口絶其歸路賊遂氣沮黨類星散之佐戮力行間每領兵數千旦夕廵視營壘聨客師為指臂市井肅若無人後以勞得寒疾卒軍民罷市巷哭者三日崇祀本縣名宦祠佟國楨奉天人𨽻鑲黄旗漢軍順治中知江南之無為州瀕江田廬恃壩悍蔽三壩將圮國楨自鮑家橋至周思溝築堤四千丈有竒名四壩後三壩傾而田廬卒無恙闔境居民無不欣躍其居官儉約恒以清節自勵一時翕然稱為良吏于宗堯廣寕人𨽻鑲黄旗漢軍康熙七年年十九以䕃補常熟令勇於為治興利剔弊雖老吏勿能及邑素苦於漕宗堯視事三月盡除其害三年卒於官邑為罷市男女巷哭醵金治其䘮負版者皆投一錢柩將歸百姓遮道㽞之葬虞山南麓題其阡曰萬民㽞葬邑人瞿式鼎捨宅為祠在慧曰寺西趙良壁開原人𨽻鑲黄旗漢軍康熙八年知山西徐溝縣邑當孔道民苦供億良壁送迎餽獻胥絶不以絲毫累民莅政五年寛嚴並濟以清源盗案罣誤去邑民為立生祠以祀許宏勲遼陽人𨽻鑲黄旗漢軍康熙十三年知浙之紹興府耿精忠叛於閩諸暨新城嵊縣三邑奸民嘯聚圍攻郡城宏勲乗夜率兵出斬其渠魁餘悉撫諭散遣之郡境乂安二十五年任按察使持法剛正無所屈撓二十七年楚北兵譁奸人張麻子等思乗機為變期以三鼓竊發宏勲偵得其謀亟白之縂督戒譙樓鼓徹夜無三撾宻捕亂首十數人無得脱者比明已斬首轅門兵民帖然人服其智盧燦海城人𨽻鑲黄旗漢軍康熙中任浙之龍游縣時浙東盗賊充斥燦勦撫並施羣匪歛迹四境獲寕在任八年愛士勸農厯著善政卒於官祀名宦朴士秀奉天人𨽻鑲黄旗漢軍康熙四十年知河南確山縣聼訟明决無留牒革除火耗及一切厲民陋規創建義學督課生徒士民咸頌其徳張綏逺奉天人𨽻鑲黄旗漢軍祖必科見忠節傳康熙四十一年綏逺知廣西思安府嵗歉損資賑濟疾疫設醫局療治之又令家人遍厯郊野有暴露之棺無主者即為掩埋其有主勸令速葬郡治半屬土司廣建義學延師訓導由是夷俗漸知禮義憬然嚮化正黄旗漢軍吴景道廣寕人𨽻正黄旗漢軍太宗時以諸生考擢吏部啟心郎都察院理事官疏劾刑部理事官郎位受賕不法狀鞫實黜郎位為民順治二年授河南布政使尋擢巡撫河北初定河南五府餘㓂未靖景道檄縂兵髙第等勦宗養氣於寳豊陳蛟於新野黄景運於商城並捕斬之四年勛陽賊黄廣㤗犯浙川遣縂兵張應祥等擊郤之五年遣都司朱國强等勦羅山賊張其倫破其鷄籠山寨執其倫伏誅是年山東賊范慎行踞黄河北岸剽剠開封歸徳諸屬邑復檄髙第勦之賊敗走長垣蘭陽退據曹縣乃簡精騎分道出胙城東明張左右翼合覆其巢殱其衆數千遂縳慎行梟諸市以功加兵部右侍郎七年晉尚書八年陕西商州賊何柴山犯盧氏遣張應祥撲滅之境内悉安十年以老疾致仕特思加一級䕃子入監十三年卒年七十有五賜祭葬贈太子太保諡懿僖祀河南名宦雷興遼陽人𨽻正黄旗漢軍太祖定遼東興以諸生選直文選太宗設科取士興中式舉人授秘書院副理事官崇徳元年特試内三院學士舉人生員興名列二等得恩賚尋任都察院理事官順治元年擢天津廵撫時土賊李聨芳張成軒嘯聚滄州南皮間興偕縂兵婁光先督師進勦聨芳等走遁窮追至海口遏其旁軼賊投水死者大半餘悉縳之以歸遂斬其渠散遣脅從者歸農賊平因疏請設戰船於大沽海口以備海防從之二年遷陕西廵撫陕地當流賊􅅰亂後城郭空虚户口凋耗榛莽塞原野興招流氓闢蕪田拊循綏輯與民相休養闗中乃稍實世祖聞而嘉之屢賜冠服裘馬以旌吏治三年流賊孫守法等掠興安叛鎮賀珍掠漢中興移潼闗兵三百駐商州以扼守法檄漢羗道胡全才同城守以禦珍㑹肅親王豪格西征張獻忠道出陜西擊走珍守法亦遁去興以隴州為河西咽喉西安藩蔽山險林深易於藪盗臨洮鞏昌於西番為隣並請設兵分屯要害下所司議行四年以疾致仕十年起授河南巡撫未至任卒賜祭葬如例贈兵部右侍郎廕一子入監祀陕西名宦祠王來任奉天人𨽻正黄旗漢軍天聪八年漢書舉人崇徳元年授工部啟心郎屢官至大理寺少卿康熙元年以副都御史撫治鄖陽四年巡撫廣東時粤中屢經冦盗軍民未安來任抵任撫集流亡諮詢疾苦復疏陳六大害力請禁革平反積案囹圄一空常微服逰市閭察有司淑匿兵厮横暴嚴捕重懲邉疆綏靖嗣卒於宦祀名宦金維城𨽻正黄旗漢軍總兵金玉和子也崇徳元年大軍征錦州維城以恭領督饋餫五年以副都統從圍錦州明兵突圍出戰擊郤之先後攻克其臺十八屢敗松山杏山援兵七年錦州下移師攻克塔山杏山城以功授雲騎尉世職兼任兵部叅政駐防錦州八年從政天平克中後所前屯衛二城晉騎都尉順治元年定燕京改六部恭政曰侍郎維城仍任兵部侍郎五年從鄭親王濟爾哈郎征明桂王朱由榔於湖廣六年攻克湘潭趨寳慶敗其縂兵馬進忠王進才袁宗第等追勦至武岡沅州靖州俘斬無算七年凱旋得恩賚累加世職至一等輕車都尉十年坐失察屬吏受賕免官降世職為三等十五年卒長子世需襲次子世礪康熈間屢立戰功十八年勦海賊劉國軒於漳州陣沒贈雲騎尉入祀昭忠祠李恒忠𨽻正黄旗漢軍事太宗為侍衛賜名宜哈納初任佐領尋進恭領崇徳八年從攻中後所前屯衛二城予雲騎尉世職順治元年偕都統葉臣征山西攻克太原汾州及文水城三年從征四川敗流賊楊薦兵於馬湖五年擢副都統六年偕都統巴顔駐師西安屢敗流賊孫可望劉文炳康薦宗等殱其衆十一年明桂王朱由榔遣其將李定國犯廣東偕靖南將軍珠瑪喇往禦之敗定國於新㑹晉世職一等輕車都尉康熙十三年第三子儀祖襲戴都𨽻正黄旗漢軍本姓李名獻祖思忠姪也初任佐領天聪二年圍錦州以巨礟克臺堡有功崇徳六年從圍錦州又攻㧞塔山杏山附近各䑓敗明兵於長安嶺八年從克中後所前屯衛二佐領順治元年随征太原克其城十一月随南征破流賊滅福王平定河南江南克武岡山寨及揚州嘉興江隂三城論功最九年克成都降偽王劉文秀等累加世職至三等男馬汝龍𨽻正黄旗漢軍襲魁父應備禦職天聪二年從征明圍錦州克屯䑓及塔山杏山城俱有功崇徳七年随取前屯衛中後所順治元年以恭領兼刑部理事官擊流賊于潼闗二年克武岡山寨揚州等處獲敵船於揚子江敗偽縂兵黄蜚之衆進克江隂論功加佐領六年從征逆鎮姜瓖取渾源州等五城十四年以副都統駐防福建入為刑部侍郎累加世職一等輕車都尉康熙十六年卒賜祭葬張尚寕逺州人𨽻正黄旗漢軍太祖定遼來歸崇徳三年任户部啟心郎以稱職列優叙順治十二年擢福建右布政使時海氛甚熾陷漳州泉豐以南震動大軍進勦資糧供頓日費數十萬錢尚督餉無匱監造巨礟攻具往來海上親冒矢石備厯險阻卒復漳州遷左僉都御史巡撫甘肅卒於官閩人思之祀名宦祠張國用世居廣寕𨽻正黄旗漢軍順治五年貢士康熙十四年任河南浙川縣循良正直勤於撫字㑹逆藩吳三桂之亂供應軍需不累百姓去任後士民感頌祀名宦祠李䕃祖鐡嶺人𨽻正黄旗漢軍父思忠招集鐡領等處户口來歸以軍功授子爵䕃子與兄顯祖皆以功名著順治五年由廕生授户部郎累官左僉都御史十一年授直𨽻山東河南縂督加兵部尚書疏請豁被灾州縣秋糧安集流民及直𨽻頻海設汎安營稽查海船出入事宜皆議行時真定西山乆為流冦擾據䕃祖諭井徑道副使陳安國入賊巢撫之渠賊髙鼎涕泣就撫卒為勇將三年晉太子太保縂督湖廣軍務值大軍進勦滇黔䕃祖區畫有方兵民欣躍在任四年以疾告歸卒賜祭葬祀直𨽻山東河南湖廣名宦紀國相開原人𨽻正黄旗漢軍順治元年知河南輝縣當流冦破殘之後百姓凋瘵邑境荒凉國相修治城隍招撫流散勸開墾給耕具通商賈設學校與民更生甚著能績及卒祀本邑名宦線縉廣寕人𨽻正黄旗漢軍順治二年守山東曹州時定鼎之初餘冦流毒未冺縉治尚簡昜勸開荒地嵗不下數百頃無力之家助以牛耕民始得耕嚴飭保甲諭令守望相助後土賊竊發隣境杌而曹獨獲安調守河南汝寕時值亂後郡無太守者數年初下車城中居民不滿數十家縉省刑薄賦與民更始有安堵之樂累遷司道並有能聲四年擢偏沅廵撫五年偽貴溪王朱常滮等勾連苖賊分冦沅州縉同線安國等㑹兵進勦攻下永寕猶常山及諸賊渠斬之在任三年縁事落職尋卒曹人思其功徳崇祀名宦張所志奉天人𨽻正黄旗漢軍順治十七年廵按四川時土廣人稀道路榛莽所志招輯流移各令安業疏陳収拾全川事宜章數上多見採納康熙十二年任山西驛糧道以亷介為屬吏倡及䕶藩篆令自封投櫃地方便之後陞福建按察使遇寃獄立為昭雪時用兵海上所志督造船艦䟎運軍需不辭勞瘁以功擢江西布政使大有政聲朱思義義州人𨽻正黄旗漢軍順治元年任浙江廵道僉事時浙江初定將驕卒縱思義莅官風裁卓立嚴懲告訐之風兵皆戢歛民得安堵後卒於官人皆惜之祀浙江名宦張𢎞猷奉天人𨽻正黄旗漢軍順治中知湖廣長沙有肆應才雖事起倉卒處以鎮静臂畫咸中不為撓奪當軍興時公務旁午一切簿書皆手自裁定為政嚴明而不苛民皆稱之劉國寕奉天人𨽻正黄旗漢軍順治中知湖廣黄岡縣邑當水陸要衝徴發接踵國寕長于肆應事集而民不擾縣多火患預投撲滅諸具有警輙身先往救遂不成灾政尚寛簡民俱戴徳卒祀名宦李輝祖恒忠長子𨽻正黄旗漢軍康熈十三年擢郎中十九年遷貴州按察使二十一年授四川布政使川省經吳三桂亂後田多荒蕪輝勸民開墾生聚日盛按畝征賦釐奸除弊民以為便嵗貢蠟料棧道險阻民多以為病輝祖力請於廵撫奏罷之三十四年授河南廵撫尋擢湖廣縂督卒祀四川名宦李興祖𨽻正黄旗漢軍宜哈納子輝祖弟也初任直𨽻慶雲令康熙二十四年擢山東兖州捕盗同知地為山東江南两省扼要時土冦李二和尚餘孽尚不靖興祖蒞任曉諭居民能擒賊者賞能自新者即免罪不一年餘黨盡除在任三年多方廵察恩威並濟两省所屬人民悉遵禮讓奸宄衰息迨攝篆沂州清亷惠愛咸頌仁明尋擢直𨽻河間守累官江西布政使順天府丞卒兖人思其徳崇祀名宦李鈵䕃祖子𨽻正黄旗漢軍由刑部郎中屢擢至兵部侍郎康熙三十五年聖主親征噶爾丹與左都御史于成龍等督運中路軍糧出古北口奎素沙深䧟轂令士卒伐栁枝横藉沙面車得前進至克魯倫河復命轉饟赴西大路將軍費揚古軍凱旋叙功加四級三十七年授山東廵撫尋以疾辭未赴調安徽巡撫莅任後戢兵安民緩征息訟立義學義倉又造江船以拯溺修橋以利渉雖履任未乆而遺愛甚多四十二年卒於山東賑所楊廷耀遼東人𨽻正黄旗漢軍康熙初任粤之梧州通判土賊唐三變等屢敗官餉四出剽掠廷耀捕斬其渠盗患遂息分𣙜梧闗税刋定税貨則例按往來船户人給一紙吏役乃不敢苛索署容縣事偽晉王李定國餘黨竄踞大榮山連結猺獞為冦廷耀以計擒斬之賊黨四散逺近寕帖時稱能吏王育賢奉天人𨽻正黄旗漢軍康熙中任福建興泉道海冦圍泉州育賢日夜為戰守具與士卒登陴守禦不解甲者十餘年日徒跣築垣躬操㨧揷聞援師將至單騎自臨衢巷徧慰父老民皆感激流涕尋以勞瘁卒泉人設本主於崇陽樓祀之常光裕奉天人𨽻正黄旗漢軍康熈中知湖南靖州地當逆藩吳三桂擾攘之後光裕招集流離靖方撫字民不失業三十四年擢知泉州府為政安静聼㫁詳明為晉江縣民黄姓力正主僕名分闔郡稱快其他摘奸發伏申寃理枉率多類此李鐸鐵嶺人𨽻正黄旗漢軍康熙中知浙之紹興府㑹餘姚大水漂溺民人廬舍鐸與知縣康如漣煮糜以賑編筏以居又念就食妨業復按各縣鄉里民籍人給米四斗㓜者半之製絮衣與寒者全活無算在任四載始終不名一錢閻璋廣寕人𨽻正黄旗漢軍康熈中知湖廣靖州州境利弊璋革重耗禁𣲖累創義學勸課農桑民漸樂業土冦吳旦先犯境身先䧟陣擊斬無算冦遁去復追殱之合治懐其徳劉有成奉天人𨽻正黄旗漢軍康熙三十年任山東夀光縣精敏長於吏治邑民素刁悍健訟又好藉勢侮貧弱有成以嚴明馭之境内肅然時單騎行村墅勸農桑以卓異擢同知去民建祠祀之馬雲從遼陽人𨽻正黄旗漢軍康熙三十四年知四川達州州境向苦瘠薄雲從時勸告民以裕生重農之計值嵗祲民鮮粒食雲從籌策告糴四境頼以全活州人感其恩立祠以祀欽定盛京通志卷七十七
