body:
  text: 方伎漢北魏遼金元國朝欽定四庫全書欽定盛京通志卷九十一方伎臣等謹案司馬遷作扁鵲倉公日者龜策諸傳以述方伎史家沿以為例而志地理者因之遼之方伎自漢殷馗以下十有三人至其生平别有表見藝術雖精仍列諸人物不以方伎概焉謹志方伎第三十欽定四庫全書欽定盛京通志卷九十一方伎漢殷馗遼東人精天文桓帝時有黄星見於楚宋之分馗言後五十嵗當有真人起於梁沛間其鋒不可當及魏武破袁紹冀州諸郡多舉城降正五十年而大業以成實應此占焉南北朝魏晁崇字子業襄平人家世史官善天文術數先事慕容垂後為魏道武所獲拜大史令詔崇造渾天儀天興五年月暈左角崇奏占為角蟲灾道武既克姚平於柴壁命諸軍焚車而反牛果大疫是嵗麋鹿亦多死閔宗遼東人善占侯髙颺時居東裔生孝文昭皇后幼時恒夢在堂内立而日光自牕中照之灼灼而熱避之不得如是數夕以白父其颺颺以問宗宗曰此奇徴也日者君人之徳帝王之象光照女身必有恩命及之避猶照者主上來求女不獲已也此女必將被帝命誕育人君後果入掖庭生世宗遼蕭達魯太和宫分人素精於醫人有疾觀其形色即知病原所在由是世為醫官其孫呼都克尤精於騎射達魯䝉古語觧見名宦卷原作敵魯呼都今克䝉古語觧見黑龍江山川卷原作胡篤俱譯改耶律達勒達字海蘭善馳射尤神於醫視人疾若隔紗覩物莫不見太祖患心痛問之對曰膏肓有淤血如彈丸非藥所及必針而後愈從之嘔出淤血遂愈達勒達觧見建置沿革卷原作迭里特海蘭觧見建置沿革卷原作海鄰今俱譯改耶律達魯精醫能察形色即知病原雖不診侯有十全功官至節度使樞宻耶律色珍妻有沈疴達魯視之曰胸有畜熱非藥石所及當以意療聒使狂以泄其毒則可於是大擊鉦皷於前果狂怒呌罵力竭而愈其治法類如此達魯解見前註原作敵魯色珍觧見人物卷原作斜軫今俱譯改呼拉布善卜嘗為耶律庶成卜曰官至林牙因妻獲罪後庶成官至林牙果為妻呼都克所誣奪官使吐蕃十二年清寧間始歸仍為林牙悉知所占國語呼拉布令其呼喚也原作胡吕不今譯改耶律伊伯格勒幼好學尤精堪輿卜筮不樂仕進每為人擇塟地有卜𦵏地者曰後三日有牛乘人逐牛過者即啟土至期果有一人負乳犢引㹀牛而過其人曰所謂牛乘人者此也遂啟土既塟吉凶盡如其言嘗為失鷹者占曰在汝家東北三十里濼西榆上求之果得䝉古語布伯格勒保佑也原作乙不哥今譯改耶律鈕斡哩字海陵六院部族人風神爽秀工於畫重熙間累遷同知㸃檢司事鈕斡哩善畫嘗冩聖宗真以獻召拜同知南院宣徽事使宋賀正冩宋主容以歸清寧間復使宋宋主賜宴瓶花隔面未得其真陛辭僅一視及境以像示餞者駭其神妙鈕斡哩國語觧見吉林山川卷原作褭履今譯改謹案舊志以耶律托色善畫列入方伎今考遼史本傳托色屢敗宋兵功業懋著未可僅以方伎該者舊志特據其繪宋人戰仆狀一節列入方伎未為允恊今移入本志人物卷而仍附識其善繪事於卷金穆延薩克達臨潢路人襲穆昆攻宋屢立戰功形不過中人而拳勇善鬬所用槍長二丈軍中號為長槍副統又工用手箭箭長不盈握每用百數散置鎧中遇敵抽箭以鞭揮之或以指鉗取飛擲數矢齊發無不中敵以為神其箭皆以智創雖子弟亦不能傳其法穆延薩克達穆延八旗姓國語薩克達老也原作抹撚史扢塔今譯改王曼慶一作萬慶字禧伯庭筠子仕至行省左司郎中號澹㳺善墨竹樹石絶佳亦能山水謹案金史志布薩忠義精古算法宗雄蹻㨗善射稱絶伎赫舍哩良弼善占侯以日色之旦暮色赤占髙麗夏國之難有奇騐皆可謂神乎伎術獨擅神明之用者然考金史三人本傳皆位兼將相事業功名為一代偉人未可僅以方伎該之故悉載入本志人物門而備識其藝術於卷元持嘉君實女真人善畫竹學劉自然頗有意趣見畫史會要持嘉入旗姓原作赤盞今譯改持嘉希曾肅慎貴族讀書善繪事工墨菊筆間有新意尤精於皷琴國朝墨爾根綽爾濟䝉古人精醫術國初天命年間率先歸附時有正白旗先鋒鄂碩與敵戰中流矢命在須臾間綽爾濟為拔鏃傅以藥遂愈又都統武拜交戰時身被三十餘矢已昬絶綽爾濟令剖白駝腹置拜其中遂甦又黄冠苖君稷之徒有屈臂不得信者綽爾濟令先以熱鑊熏蒸然後用斧椎其骨揉之有聲即愈其餘所效多不可舉時以比華陀云欽定盛京通志卷九十一
