body:
  text: 歴朝人物四金金源部屬諸人欽定四庫全書欽定盛京通志卷六十一厯朝人物四金金源部屬諸人罕都完顔部人事四君出入四十年征伐之際遇敵則先戰廣廷大議多用其謀世祖嘗曰吾有罕都則何事不成肅宗時委任冠于近僚穆宗嗣位凡圖遼事皆専委之康宗以為父叔舊人先加敬禮多所補益天會十五年贈代國公明昌五年贈開府儀同三司謚忠敏配享世祖廟庭罕都解見人物卷二原作歡都今譯改錫黙阿里穆宗時從碩碩歡與高麗戰一日之間三破重敵遼人數萬攻貝勒和索哩城阿里率百餘人救之令軍士裂衣多為旗幟出山谷間遼兵望見遁去阿里自結髮從軍大小數十戰每戰皆㨗尤習舟楫江淮用兵無役不從人以水星目之為德哷勒部節度使天德初致仕加特進封王阿里性忠直多智畧兄弟相友愛家故饒足以已明安及財物盡與其弟弟不肯受逃避歲餘阿里終與之卒謚智敏錫黙八旗姓國語阿里承當也原作斜卯阿里碩碩歡攅凑也原作石適歡和索哩耳穢也原作忽沙里德哷勒解見人物卷二原作迭里今俱譯改羅索完顔部人太祖克寧江州羅索進兵咸州克之太祖趨達嚕噶城遼耶律鄂爾多以二十餘萬衆來拒羅索與尼楚赫縱兵衝其中堅凡九䧟陣皆力戰而出及取黄龍府命羅索為萬户守之夏人救遼至天德濟水為陣羅索使人報斡魯隨分軍為二迭出迭入進退轉戰三十里過宜水斡魯軍亦至合擊敗之後破朔州復襲遼主於伊都谷獲之賜鐵劵取西京又屢敗宋師天會八年卒贈金源郡王配享太宗廟庭謚莊義羅索國語解見選舉卷原作婁室鄂爾多解見奉天府山川卷原作訛里朶伊都解見人物卷三原作余睹今俱譯改托卜嘉遼陽人家世仕遼收國二年為東京奚民穆昆兼同知東京留守事取中西兩京𨽻吳王棟摩軍遼軍二十萬來戰吳王使托卜嘉守營托卜嘉堅請戰或謂之曰戰危事獨苦請何也托卜嘉曰大夫不得一決勝負尚何為茍臨戰不㨗雖死猶生也吳王聞而壯之乃遣出戰遂有功天會四年從擊宋兵克河間棟摩怒其不降縱軍大掠托卜嘉諫止之已掠者官為贖還除河間尹累遷揚州都統經畧淮海高郵之間以功拜右丞相天德四年請老為東京留守貞元三年拜太傅領三省事累封漢國王卒贈太師謚傑忠托卜嘉解見人物卷三原作塔不也今譯改完顔希尹本名古紳罕都子從太祖征伐屢有功金人初無文字太祖命希尹撰本國字希尹因契丹字制度依倣漢人楷字合本國語制金國字天輔三年字書成太祖大悦命頒行之後熙宗亦制金國字與希尹所制俱行希尹所撰為金國大字熙宗所撰為小字宗翰襲遼主於五院司希尹為前驅所將纔八騎與遼兵戰一日三敗之遼主遁去西京遂降及大舉伐宋以功賜鐵劵熙宗時為相封陳國王以䜛死後知其無罪封邢國公天徳三年追封豫王大定中諡貞憲國語古紳三十數也原作谷神今譯改伊喇鄂爾多系出遼五院司天會三年伐宋𨽻軍中遇戰輒先登以功補尚書省令史皇統二年同知昭德軍節度使以亷陞孟州防禦使正隆間轉同知北京留守會遊古河闌子山等明安契丹謀亂方發兵討之别遣鄂爾多押軍南下至松山縣為賊黨講格所執且欲推為盟主要以契約鄂爾多怒曰我豈從汝反寧殺我契約不可得也賊知不可屈乃困辱之以計脱還改北京路轉運使再遷利涉軍節度使先是有農人避賊入保郡城以錢寄隣家賊平索之隣人諱不與訴於縣以無契騐却之乃訴于州鄂爾多陽怒械繫之捕其隣人闗以三木詰之曰汝隣已坐刦殺人指汝同盜隣人懼自陳其欺錢之隙乃責歸所隱錢而釋之郡人駭服鄂爾多國語解見前注原作幹里朶講格原作江哥今俱譯改伊喇成其先遼横帳人沉勇有謀天㑹問𨽻達蘭為行軍明安戰于楚泗之間以所部先登功最嗣率師從宗弼伐宋攻濠州每戰輒先登多所摧破宗弼再取河南成以功除威州刺史用亷擢知延安尹大定二年以亷在優等改河中尹遷北京留守封任國公國語達蘭堤岸也原作撻懶今譯改阿勒錦彦忠哈斯罕人性孝友好學通吏事天會七年為會寜少尹進同知㑹寧府事入為吏禮部侍郎海陵凡有所疑常使裁決彦忠據法以對間有不合則召讓之彦忠執奏如前終無阿屈大定四年為刑部尚書詔規措北邊艱食户口及秦州臨潢接境度宜安置堡戍七駐兵萬三千芻糧之用就經畫之還朝未及入對卒贈榮禄太夫命有司致祭國語阿勒錦名譽也原作阿勒根哈斯罕國語解見關郵卷原作曷連館今俱譯改烏雅富魯海蘭路人膂力超絶能挽强射至二百七十步外與兄呼沙呼俱以勇健𨽻棟摩帳下攻黄龍府力戰有功從宗弼自淮西渡江取江寧循海道隳明州而歸天眷二年授鎮國上將軍皇統六年授世襲穆昆延安尹賜尚衣封豳國公致仕大定二年至中都上謁除東京留守時年七十三世宗召見謂之曰卿宿將乆練兵事年雖老精神不衰因命到官旬月一視事進階開府儀同三司嗣卒烏雅八旗姓富魯解見城池進舉卷原作烏延蒲魯國語呼沙呼梟也原作鶻沙虎今俱譯改𤓰爾佳沃哩布額圖琿河人智勇過人初𨽻羅索帳下救烏楞古於威州敗遼兵於雅勒呼城及拔廣寧攻臨潢取中京累破遼軍睿宗伐宋富平之役沃哩布先登賞以金器名馬累官布塔布部族節度使致仕封芮國公沃哩布雖老勇健不少衰大定初劇賊嘯聚出特布關率鄉里年少逆擊之賊黨遂潰卒時年一百有五歲沃里布國語解見名宦卷原作吾里補國語額圖琿强壯也原作暗土渾烏楞古臍也原作斡魯古雅勒呼肉槽也原作押魯虎布塔布使漁獵也原作孛特本特布裴載也原作特鄙今俱譯改溫特赫富拉塔隆州人魁梧美髯有謀畧以智勇聞太祖定燕至居庸復有賊冦拉門華道富拉塔整隊先登賊識其旗幟望風奔潰皇統元年從宗弼伐宋屢破敵衆大定三年授泰寧軍節度使卒十九年以功廕其子為武功將軍温特赫八旗姓國語富拉塔爛眼邊也原作温迪罕蒲里特拉門解見奉天府山川卷華院也原作臘門華今俱譯改耶律恕字忠厚遼横帳秦王之族也謹愿喜讀書長于謀畧從宗翰伐宋恕𨽻前鋒取和尚原特為睿宗所知薩里千辟署陜西叅政委以軍務遷尚書左司郎中海陵為平章政事謂恕曰君亦有黨乎恕正色曰窮則獨善其身達則兼善天下不以其道得之非恕之志也何黨之有及為叅知政事以疾求解為興中尹封廣平郡王布薩歡塔扶餘路人身長七尺勇健善騎射天眷二年歡塔領十六騎敗宋軍七百餘以功遷利涉軍節度使改咸平尹世宗即位以為廣寧尹與圖克坦克寧敗斡罕于長濼改臨潢尹賊平改海蘭路兵馬都總管致仕世宗思其功復召拜利涉軍節度使卒歡塔厯一十七官未嘗為佐貳性沈厚有識雖未嘗學問明于聽斷故所至有治聲云布薩八旗姓國語歡塔荒山也原作僕散渾坦扶餘地名原作蒲與斡罕國語解見名宦卷原作窩斡今俱譯改延扎們都隆州巴爾嘉山人長身美髯天眷初叛將定國軍節度使李世輔邀完顔杲至私署以獻甲為名遂以兵刦杲去們都突出以告完顔達蘭同率兵追及首出與戰杲由是得脱以功遷明威將軍齊國初廢諸路反覆不一授們都牌劄令徃撫定們都多張甲兵從者安之違者討之帖然無復叛者大定初從平秦隴以功授慶陽尹兼本路兵馬都總管卒於官們都性忠厚謹慤安置營壁尤能慎宻有敵忽來雖矢石至前號令士卒如平時由是人益安附而功易成焉延扎八旗姓蒙古語們都問安也原作顔盞門都國語巴爾嘉收也原作帕里千今俱譯改烏雅普霞努率賔路錫馨河人身長有力多智畧天眷時襲父明安穆昆天德初授陳州防禦使貞元元年授昌武軍節度使以善撫綏再任海陵南征為神策都總管破濟州號令士卒無害居民民感其惠為立祠以祭鳥雅普霞努原作鳥延蒲轄奴國語錫馨房簷也原作星顯今俱譯改烏庫哩薩哈海蘭路人睿宗為右副元帥時聞薩哈勇畧選充章京從伐宋先登破敵大定六年授洺州防禦使世宗謂曰卿昔事睿宗積勞宣力今典名邦所以報也歴臨潢尹所至躬行儉約政先寛簡邊庭寧謐人民獲安召為簽書樞宻事卒烏庫哩八旗姓薩哈國語解見吉林山川卷原作烏古論三合章京解見奉天府山川卷原作扎也今俱譯改圖克坦喀齊喀上京速蘇海水人貎魁偉多膂力一經聞見終身不忘皇統二年為隴州防禦使屢敗宋兵遷延安尹時關陜以西百姓罹兵革多失業喀齊喀守之以静民多安集大定二年為陜西路統軍使轉右都監宋人䧟臨洮鞏秦等一十六郡喀齊喀盡復之九年入為平章政事奏陳睿宗收復陜西數事上嘉納之藏諸秘府封定國公明年卒賜賻甚優泰和元年配享世宗廟庭圖克坦八旗姓索倫語喀齊喀小犬也原作徒单合喜今俱譯改芬徹上京宻齊顯河人徙屯天德初為元帥府章京使于四方稱職按事能得其實皇統間除同知開逺軍節度斥堠嚴整邊境無事厯博索路兵馬都總管西北路招討使芬徹性亷潔忠直臨事能斷凡被任使無不稱云芬徹原作蒲查國語宻齊顯淺也原作梅堅博索􅀦語解見名宦卷原作婆速今俱已譯改布薩忠義上京博羅科河人喜談兵有雄畧年十六領本穆昆兵從宗翰定陜西復從宗弼攻取夀廬等州皇統四年除博州防禦一夕隂晦囚徒謀為反獄將吏皆惶懼忠義但使守吏撾鼓鳴角囚徒以為天且曉不敢出及考滿郡民詣闕請留詔從之世宗即位拜尚書右丞契丹伊喇斡罕僭號討平之以功封沂國公大定五年和議定世宗勞之曰宋國請和偃兵息民皆卿力也拜左丞相兼都元帥明年卒上親臨輟朝奠祭諡武莊忠義一生動必由禮義謙以接下敬禮儒士與人極和易善御將士能得其死力及為宰輔知無不言二十一年世宗思其功勒碑墓道泰和元年配享世宗廟庭國語博羅科净潔也原作拔盧古今譯改烏雅扎拉普霞努子也率賔路錫馨河人後改𨽻海蘭路勇果無敵正隆六年伐宋諸明安穆昆皆行州縣無備契丹𤓰里䧟韓州圍信州逺近震駭扎拉道出咸平遂率本部亟還信州與戰敗之已而賊復整兵攻城扎拉下巨木壓之殺賊甚衆乃解去扎拉左右持鐵簡重數十斤人號為鐵簡萬户追𤓰里于韓州東八里許以鐵簡揮擊無不僵仆賊大敗遂走東京咸平隆州民復帖然世宗即位扎拉率兵數敗斡罕斡罕募人刺之偽護衛阿卜薩身長有力奮大刀自後斫扎拉扎拉以簡背擊阿卜薩折其右臂與赫舍哩志寧軍合擊賊大敗之斡罕平以為宿直將軍遷興中尹博索路總管高麗憚其威名凡以事至博索者望見而跪之扎拉貞慤寡言居平極和易及臨戰奮勇見者無不辟易二十五年為興平軍節度使卒于官扎拉國語解見關郵卷原作查刺普霞努原作蒲轄奴錫馨語解見前注原作星顯國語爪里關廂也原作括里阿卜薩解見名宦卷原作阿不沙今俱譯改赫舍哩志寧上京和坦明安人沈毅有大畧海陵時契丹薩巴反詔志寧與白彦敬討之方至北京而海陵伐宋已渡淮聞世宗有異志乃隂結㑹寧尹完顔富色里利涉軍節度使通吉義將攻之而世宗已即位遣使來招彦敬志寧殺其使者九人力屈乃降世宗以為忠于所事授志寧臨海軍節度使擊幹罕有功遂以志寧代右副元帥完顔黙音斡罕既擒餘黨皆平入朝為右副元帥宋人䧟宿州志寧力戰走其將李世輔遂復取之並取旴眙濠廬和滁等州和議亦由是成大定九年拜右丞相十一年代宗叙北征還遣使迎勞賜弓矢及玉吐鶻封廣平郡王明年有疾中使㸔問日三四軰賜金丹詔曰此藥未嘗以賜人也使者至已卒世宗親臨其喪哭之哀動左右葬事祠堂皆從官給諡武定明昌中配享世宗廟庭䝉古語和坦城也原作胡塔薩巴解見人物巻原作撒八國語富色里鯖魚也原作蒲賚通吉八旗姓原作獨吉黙音隊伍也原作謀行今俱譯改赫舍哩良弼本名洛索輝發川人先是天㑹中選女直學生送京師希尹一見許為國器年十四為北京教授學徒常二百人時人為之語曰前有古紳後有洛索天德中拜尚書右丞海陵伐宋良弼諌不聽詔良弼與將軍圖克坦貞撫定上京遼右世宗即位斡罕敗于陷泉入奚中詔良弼往北京招撫奚契丹封宋國公拜左丞相兼修國史良弼為相既久練達朝政上所詢訪盡誠開奏薦舉人材常若不及號為賢相明昌中配享世宗廟庭輝發原作曰怕今譯改伊喇道其先伊蘇部人後徙咸平為人寛厚有大志以篤孝著通女直契丹漢字海陵伐宋為都督府長史海陵死師還無紀律掠淮南百姓苦之有男女二百餘人願與道為奴道擕至淮俟諸軍濟乃悉遣還嗣為户部郎安撫山東招諭盜賊事平還京師遷翰林直學士世宗曰道清亷有斡濟宜翰林文雅之職尋歴官西北路招討使到官諸部依故事皆獻駞馬道並却之進尚書右丞乞致仕世宗曰卿孝于親忠于朕通習法令政事雖踰六十心力未衰未可退也後改咸平尹封莘國公上曰咸平卿故郷地凉事少老者所宜又傳諭曰咸平自斡罕亂後民業未復聽卿歸里所以安輯一境也明年辛是歲上幸上京道過咸平遣使致祭伊蘇與伊遜同解見人物卷二原作乃室今譯改富珠哩阿老罕隆州伯勒格山人貞元二年布薩忠義討平斡罕阿老罕招集散亡復業者數萬人累遷至侍御史上嘗以阿老罕問赫舍哩良弼對曰有幹材持心忠正出言不阿後為西南路招討使有司督本路明安人户所貸官粟阿老罕乞俟豐年從之改陜西路統軍使所至稱治政績顯著召拜叅知政事富珠哩八旗姓蒙古語阿老罕英秀也原作孛术魯阿魯罕國語伯勒革米粒也原作琶离葛今俱譯改富察鼎夀上京和碩河人欽懷皇后父也鼎夀世聨貴戚不以富貴驕人為外戚之冠而賦性沉厚有明鑒長于吏事厯蠡州刺史濬州防禦使皆有惠政百姓刻石紀之改河間尹號令必行豪右屏跡郡内大治卒于官和碩國語解見關郵巻原作遏連今譯改富察世傑哈斯罕鄂都河人徙遼陽多力善射海陵時為䕶衛知世傑勇力隂使有所誅鋤許以賞世傑曰臣誓不以非道害物雖死不敢奉詔海陵愛其勇亦不之罪調兵徃海蘭路籍數獨少海陵詰之對曰海蘭地接高麗今若多籍其丁即有緩急何以為備海陵喜曰他人用心不汝及也世傑從伐宋擐甲佩刀腰箭百隻持搶躍馬徃來軍中敵人以為神將從討平契丹有功累遷亳州防禦使卒世傑少貧疏財尚氣毎敗敵衆必戒殺掠平居非忠孝不言親賢樂善甚獲當世之譽哈斯罕語解見前注䝉古語鄂都鳥翅翎也原作遏速館斡篤今譯改實古納亦名仲羅索第三子通女直契丹漢字斡魯愛其才遇事輒問之應對如響天德初攝其兄和尼濟州萬户部内稱治累遷西南路招討使政尚忠信決獄公平藩部不敢冦邊召為左副都㸃檢宿衛嚴謹無事有規矩後來者守其法莫能易也世宗嘗曰實古納入直朕寢益安後終北京留守實古納原作石古乃和尼原作活女解見人物巻三今俱譯改完顔守道本名實訥埒以祖古紳功擢應奉翰林文字厯獻祁濵薊四州刺史世宗幸中都過薊父老遮道請留再任歴左諫議大夫世宗録扈從將士之勞欲行賞賚而帑藏空竭議貸民財守道曰人罹虐政方喜更生而徵歛遽出如羣望何寧出宫中所有母取于民遂從其言右副元帥黙音將兵討賊不即擊守道力言于朝詔遣布薩忠義赫舍哩志寧徃代之東方以平累遷尚書左丞嘗從獵近郊有虎傷獵夫帝欲親射之叩馬極諌乃止位至尚書左丞相乞致仕世宗曰以卿先朝勲臣之後特委重任自秉政以來効竭忠勤今引年求退未得者成人可以代卿者以是難從耳大定二十六年復懇求致仕上親賜巵酒明昌四年卒謚簡靖蒙古語實訥埒新年也原作習尼列今譯改完顔守貞古紳之孫貞元二年襲穆昆世宗愛其剛直累遷同知西京留守事治有善狀明昌初拜叅知政事章宗新立頗鋭於治嘗問漢宣綜核名實之道守貞誦樞機周宻品式詳備以對問行之何如貞曰在陛下勵精無倦耳守貞每論政事持正不阿以夏旱引咎罷知東平府路鐸上書論守貞賢可復用遂召入為平章政事守貞讀書通法律明習國朝故事金有國七十年禮樂刑政多因遼宋舊制章宗即位更定修正為一代法其儀式條約多守貞裁訂故明昌之世號稱清明又喜推轂善類朝廷正人多所薦引凡有大議及顧問皆傅經以對天下推重之出知濟南府卒謚曰肅唐古德溫上京刷河人善射皇統間從宗弼南征突戰有功累遷定逺大將軍臨海軍節度使大定初封道國公四年為勸農使出為西京留守賜犀弓玉帶尋召入為太子太傅唐古德温原作唐括德温刷河國語刷林也原作率河今俱譯改𤓰爾佳清臣瑚爾哈路罕都人也姿狀雄偉善騎射襲明安大定元年以功授昭武大將軍從赫舍哩志寧平斡罕餘黨遷鎮國上將軍明昌二年封芮國公三年從志寧復取宿州四年遷右丞相時有以八陣圖獻者上以問宰臣清臣對曰本朝行兵惟用竒正二軍臨敵制變以正為竒以竒為正故無徃不克古兵書皆定法難以應變也識者以為名言瑚爾哈䝉古語解見吉林山川巻原作胡里改罕都元作桓篤今俱譯改𤓰爾佳扎拉隆州實霞庫河人狀貎魁梧善女直契丹書大定二年從伐宋下德順州以功授殿前右衛將軍有疾丞相赫舍哩良弼視之曰此人國器也他人有疾吾未嘗徃也九年出為東北路招討使兼徳昌軍節度使到官治有勤績邊境以安斷獄公平道不拾遺遷臨潢尹兼本路兵馬都總管蕃部畏服改西路招討使卒扎拉性忠實内明敏每論大事超越倫軰太師完顔朂嘗曰扎拉不學而知方之古人如此才鮮矣扎拉語解見前注原作查剌圖語實霞庫門樞也原作失撒尚今俱譯改沃哷忠本名宋浦葢州人習女直契丹字厯兵部樞宻院尚書省令史轉大理寺知法遷右三部司正練達邊事嘗奉使北歸致馬四千餘匹詔褒之大定中為監察御史章宗時累官武寧軍節度使性敦慤通法律以直自守不交權貴時譽歸之沃哷八旗姓原作斡勒今譯改鈕祜禄額特埒葢州明安人大定七年授吏部主事遷河南路統軍使宗敘言宋人欲起兵釁求入見世宗遣額特埒詰之無狀還報稱㫖遷刑部尚書叅知政事世宗嘗曰擇材最難如額特埒所舉者頗稱朕意委提控代州阜通監進尚書右丞兼樞宻副使為上京留守還朝拜平章政事封芮國公卒諡成肅性溫厚藴藉在相位十餘年甚見寵遇鈕祜禄八旗姓䝉古語額特埒享受也原作粘割斡特剌今譯改烏庫哩元忠本名額哩頁其先上京特卜庫人世宗在潛邸以長女妻之大定十八年拜右丞相上欲甓上京城元忠諫止駕東幸乆之未還元忠奏曰鑾輿駐此已閲歳倉儲日少市賈日騰禁衛暨諸局署多逃者有司捕寘諸法恐傷陛下仁愛世宗嘉納之出為北京留守後左丞張汝弼奏事世宗惡其阿順嘗謂左右曰卿等每事依違不肯進言如烏庫哩元忠為相剛直敢言義不顧身誠可尚也䝉古語額哩頁花斑也原作訛里也國語特卜庫胎胞也原作獨拔古今俱譯改圖克坦鎰上京路明安人幼頴悟絶倫通女直契丹字及漢字該習經史大定九年詔策女直進士問以求賢為治之道鎰居首除中都路教授遷國子監助教累遷翰林待制兼右司員外郎獻光武中興賦世宗大悦曰不設此科安得此人章宗即位拜叅知政事進平章政事封濟國公所奏多切時弊一日章宗問漢高帝光武優劣鎰曰光武再造漢業在位三十年無沉湎冐色之事高祖惑戚姬卒至于亂由是言之光武優章宗黙然鎰葢以元妃李氏擅寵過甚故微諌也大安初封濮國公充遼東安撫副使三年改上京留守㑹河堡之敗中都戒嚴鎰急選兵二萬入衛朝廷嘉之徵拜尚書右丞相及呼沙呼難作鎰傷足在告呼沙呼詣鑑問疾鎰勸之迎立宣宗至寧貞祐之際轉敗為功惟鎰是賴宣宗即位進拜左丞相封廣平郡王卒諡明敏方正學問該貫嘗言文章雖巧拙不同要以仁義道徳為本乃著學之急道之要二篇有𢎞道集六卷𤓰爾佳衡原名阿爾布色咸平人大定十三年創設女直進士衡舉第四人補東平府教授明昌二年拜叅知政事四年詔諭之曰卿忠實公方審其事則執而不回見其非則去而能果度其事勢有若權衡可賜名衡胥持國言區種法衡曰若茍有利古已行之且用功多而所種少恐致荒廢土田無益勞民也承安二年出為上京留守規畫北邊修完封界四年就拜平章政事封英國公諡貞獻阿爾布色䝉古語阿爾花紋也里作阿里不山今譯改費摩亨字仲通其先世居遼海天輔間徙居臨潢大定間亨充奉職世宗謂曰聞爾業進士其勿忘為學也二十八年擢第上嘉之升為奉御亨性謹宻出入宫禁數讜論忠言多所禆益未嘗顯示于人一日上問以上古為治之道亨奏陛下欲興唐虞之治要在進賢退不肖信賞罰薄徵斂而已章宗即位擢監察御史内侍梁道喇驕横亨劾奏之先是大名府豪猾縱肆亨同知府事宣明約東境内肅然承安中遷中都西京等路按察使時世襲家豪奪民田亨檢其實悉還正之泰和五年改安武軍節度使歲大雪民多凍餒捐俸賑恤又勸僚屬大姓其濟之轉河東北路按察使卒贈嘉議大夫費摩原作裴滿蒙古語道喇下也原作道兒今俱譯改尼瑪哈鑑隆州人大定中第進士調隆安教授擢近侍局直長世宗器其材改太子侍丞遷應奉翰林文字世宗嘗謂宰臣曰鑑嘗近侍朕知其正直幹治及為東宫侍丞保䕶太孫禮節言動猶有國俗純厚舊風朕甚嘉之明昌五年拜叅知政事卒諡文肅尼瑪哈解見選舉巻原作尼龎古今譯改富察哲魯字文叔東京路幹爾達畢喇明安人為人重厚寡言笑大定中第進士累遷北京臨潢按察副使改順義軍節度使西京人李安兄弟争財府縣不能决哲魯不問㑹釋奠孔子廟乃引安兄弟與諸生列坐㑹酒陳説古之友悌數事安兄弟感悟誓不復争禁游食簡兵衛盜息獄空大定二年知慶陽夏人犯邊哲魯擊走之至寧元年知平凉府夏人復來攻哲魯招潰卒為禦守計乃退貞祐二年改東京留守致仕及卒取奏稿盡焚之哲魯語解見選舉巻原作鄭留國語幹爾遼乎泗水也畢喇見吉林山川巻原作幹底必剌今俱譯改完顔安國字正臣其先占籍上京世有戰功安國沉雅有謀尤善騎射明昌元年大石部有乞修歲貢者詔安國徃使時北凖布迫近塞垣隣部邀安國俱行討安國以未奉詔為辭或以危言怵之安國曰大丈夫豈以生死易節暴骨邊庭不猶愈于病死牖下乎衆壯其言而止六年𤓰爾佳清臣出兵以安國為先鋒都統適臨潢泰州屬部叛安國先討定之以功遷東路招討使承安元年大鹽濼之戰安國功最既而右丞相襄總大軍遣安國追敵僉言糧道難繼安國曰人得一羊可食十餘日請驅羊以襲之遂追薄敵降其部長進封道國公安國在軍旅十五年號令嚴明善伺敵人虚實周知山川險易戰必身先士卒故所向輒克諸部入貢安國每戒諭之聞者皆震悚悦服國語凖布捉撕也原作阻䪁今譯改溫特赫達字子達葢州安春明安人性敦厚寡言笑初舉進士廷試搜閲官易達藐小謂之曰汝欲求作官耶達曰取人以才學不以年貎衆皆異之明昌五年中第遷監察御史轉太常少卿攝侍御史上疏言遼東興王之地當専守以繫一方之心又言宰相繫天下輕重不宜權攝時宰相高琪高汝礪惡其言俄充陜州行樞宻院叅議官仕終户部尚書温特赫原作温迪罕今譯改完顔閭山葢州明安人明昌進士累官沁南軍節度使入為工部尚書興定中詔陜西行省伐宋閭山㕘議諸軍破宋兵于吳寨谷改知平涼府又屢有軍功召為吏部尚書時選戸部官率舉桑孔之術應詔閭山曰民勞極矣復用此輩將何以堪識者韙之布薩揆本名臨喜武莊公忠義子以戰功遷西北路副招討陞西南路招討復出禦邊時邊政久弛揆㳂徼築壘營栅相望烽堠相應邊人得安耕牧章宗手詔褒諭累拜平章政事封濟國公泰和六年宋人來侵揆為右副元帥遣將禦之敵悉遁出境復詔揆總大軍南伐江表震恐次下蔡遇疾卒上遣使迎喪葬祭皆官給諡武肅揆體剛内和與物無忤臨民有恵政為將時軍門鎮靜賞罰必行所至因糧于敵無饋運之勞未嘗輕士卒而與之同甘苦人亦樂為用南征北伐為一代名將完顔伯嘉字輔之北京路額爾衮畢喇明安人明昌二年進士興定初官御史中丞宣宗憂旱伯嘉奏曰日者君象旱者人君自用亢極之應且爕和隂陽宰相之職不宜歸罪有司嗣行尚書省元師府于河中廷議欲棄河東徙民以實陜西伯嘉切諫乃止伯嘉純直不能與時低昂嘗曰生為男子當益國澤民其他不可學也元光二年權㕘知政事行尚書省于河中率陜西精鋭與平陽公共復河東尋卒國語額爾衮一紀之紀也原作訛魯古畢喇原作單剌今俱譯改䝉古綱本名和羅噶咸平府明安人承安五年進士累官知東平府事拜右副元帥權㕘知政事尚書省興定二年詔以綱忠貞為國保完城邑進官二階賜金帶重幣時益都張林據險為亂綱遣右監軍王庭玉討擒之後改兼靖難軍節度使行省邳州綱御下嚴信賞罰必當卒為經略使禄格所害和囉噶見建置沿革巻原作胡里綱禄格原作六哥今俱譯改耶律辨材尚書履之子楚材之兄家義州天資倜儻軀幹雄偉以志節自負為中京兵馬副都指揮使宣宗問軍政利弊辨材言將相多非真才遂忤權貴出為許州兵馬鈐轄按耶律履己載本志文學耶律楚材見元人物完顔綱字正甫初為奉御明昌中詔與曹佛哩計事佛哩每謂屬羌青伊克願内屬及綱部署陜西召佛哩子布希傳箭羌中青伊克籍其境土人民詣綱内屬遂以青伊克為叠州副都總管綱以功遷拱衛直都指揮使泰和六年宋吳曦叛附于金七年宋安丙殺曦遂䧟散關綱遣兵潛自昆谷西山養馬澗入四面攻之復取散關八年與宋和綱罷兵還京師至寧元年呼沙呼入中都遷衛紹玉于衛邸並殺綱貞祐四年綱子安和權復州刺史上書訟父寃畧曰先臣綱在章宗時招懷西羌青伊克等十八部族取宋五州吳曦以全蜀歸朝呼沙呼無故見殺奪其官爵詔以綱本良將追復尚書左丞國語佛哩擊也原作佛留布希旗姓原作普賢青伊克䝉古語青誠也伊克大也原作青宜可今俱譯改完顔弼本名達希布葢州明安人積功加平南盪江將軍貞祐初驛召弼赴中都時弼為雲内州防禦雲内已被兵弼善馬槊與數騎突出由太原出澤潞㑹有詔除定武軍節度使㝷為元帥左都監駐真定弼請明賞罰招勇敢結堡塞嚴防禦及勸遷都南京阻長淮拒大河扼潼闗以自固宣宗將遷汴弼兼河北西路都總管三年改知山東西路宣撫副使招撫劉二祖餘黨孫邦佐張汝楫其後邦佐屢立戰功元光末累官山東西路兵馬都總管充宣差招撫使元兵圍東平弼百計應戰乆之乃解圍去賜詔奬勵弼尋卒弼生平喜讀書閒暇引儒士雅歌投壺以為常所辟士皆立方面功治東平愛民省費軍民帖然有古良將風國語達希布令復也原作達吉不今譯改布薩安貞揆之子貞祐二年為山東路統軍安撫使時楊安既攻刼州縣潛號改元天順䧟登萊沂宻等州欲取益都安貞連破之又破劉二祖郝定等遂平山東及伐宋屢有功嘗曰三世為將道家所忌自忠義揆至安貞為將三世後果為執政所忌誣殺之欽定盛京通志卷六十一
