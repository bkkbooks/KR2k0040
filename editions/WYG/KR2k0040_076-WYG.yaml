body:
  text: 國朝人物八鑲白旗滿洲欽定四庫全書欽定盛京通志卷七十二國朝人物八鑲白旗滿州吉思哈姓烏蘇世居瓦爾喀豐佳屯初臣于烏拉見其貝勒不足事與弟吉普喀達歸我太祖並任為佐領𨽻滿洲正白旗既而改𨽻鑲白旗天命四年吉思哈從征明有功授三等輕車都尉世職六年以叅領將兵圍遼陽城先登天聰八年晉世職二等輕車都尉偕叅領武巴海征東海瑚爾哈部俘獲男婦一千五百有奇輜重無算九年偕副都統巴齊蘭等征黒龍江收丁壯二千以歸晉一等輕車都尉崇徳元年太宗親征朝鮮聞明兵潛入鹻場遣吉思哈率兵躡其後擊走之二年大軍攻克朝鮮國都命吉思哈偕侍衛尼堪等分兵征瓦爾喀遇平壤兵二萬於道設伏夾擊之斬其巡撫于陣殱數千人悉降其餘衆進兵瓦爾喀大捷累遷至吏部叅政三年卒初吉思哈之授世職也吉普喀達亦以戰功同授為三等輕車都尉天命六年任叅領從攻奉集堡明總兵李秉誠來援擊敗之吉普喀達追擊至城濠中礟卒天聰八年贈二等輕車都尉揚善姓𤓰爾佳𨽻鑲白旗滿洲費英東從子也太祖時以其祖索爾和歸附功授揚善為騎都尉予世襲太宗即位列十六大臣天聰元年任䕶軍統領三年從征明敗其將馬世龍兵五年戰大凌河陷陣被二創戰益力六年征察哈爾其部人竄入沙河堡揚善往收之俘獲甚衆晉世職為三等輕車都尉崇徳元年從征大同有功尋授議政大臣順治元年睿親王多爾衮攝政與肅親王豪格不相能都統和洛㑹遂搆其間訐揚善黨肅親王相與私詆睿親王謀作亂獄成削肅親王爵揚善論斬未幾肅親王以入關功復爵及平蜀歸和洛輝復傾陷王王以幽卒而揚善長繫如故八年世祖親政察揚善無罪出之獄復其世職於是肅親王之事盡白和洛㑹以磔死揚善弟伊遜納都瑚皆知名伊遜揚善第三弟也早從征伐屢有功任為叅領太宗即位與揚善並列理事大臣天聰三年從攻遵化先登礟傷其臂創甚太宗親勞之授世職為三等輕車都尉尋擢兵部承政七年兼䕶軍統領崇徳元年明兵犯海州往擊卻之四年兼副都統工部承政薩穆什喀將左翼兵征索倫伊遜為副攻克烏庫爾城戰於鐸陳索倫援兵大至與叅領薩弼圖設伏敗之陣斬七十人八年卒順治十二年追諡襄壯納都瑚揚善第八弟也初事太宗為䕶軍叅領順治元年從入闗擊破流賊李自成自成奔陜西是年冬廷議分二軍𠞰賊一軍出河南搗其前以豫親王多鐸將之一軍出土黙特鄂爾多斯自榆林攻其後以英親王阿濟格將之納都瑚𨽻豫親王軍屢敗賊潼關明年進克西安自成走湖廣捷聞詔英親王以所部逐賊而命豫親王移師征福王由崧納都瑚遂從定江南三年復從豫親王追騰吉思西渡圖拉河土謝圖汗及碩雷汗以衆拒戰連敗之斬獲無算五年從討江西叛鎮金聲桓蹙之南昌聲桓赴水死納都瑚積官至副都御史副都統先後敘功並遇恩詔晉爵一等男予世襲已而卒於官尼堪姓納喇𨽻鑲白旗滿洲姓好儒雅通習䝉古漢文賜號巴克什以諭降科爾沁功授騎都尉世職天命六年將兵徇瑚爾哈部收五百餘户以還天聰初擢一等侍衛從征大同錦州皆有功九年從貝勒岳託守歸化城獲喀爾喀諜者訊得其通明狀益嚴偵備敵咸憚之崇徳初從岳託征瓦爾喀部道於朝鮮將出㑹寜朝鮮兵拒戰於吉木海尼堪設伏敗之降其哈忙城進攻瓦爾喀多所俘獲遂頒赦詔於䝉古諸部因理其獄訟莫不折服歸擢理藩院右叅政五年考滿晉世職三等輕車都尉順治二年從定河南自南陽趨歸徳招降州一縣五洊晉一等輕車都尉從追騰吉思擊敗喀爾喀援兵于圖拉河西斬馘無算論功晉三等子未幾卒哈寧阿姓富察𨽻鑲白旗滿洲嵗丁未隨其父阿爾圖山率衆來歸即任為佐領從征雅蘭諸部所向皆捷天聰二年授䕶軍統領三年從征明薄燕京戰廣渠門外以功授騎都尉世職五年從攻大凌河八年畧大同並有功崇徳二年擢議政大臣從攻皮島克之三年縁事免官尋復起為䕶軍統領六年從圍錦州戰松山多所斬馘八年征瑚爾哈部俘獲無算得恩賚順治元年從入闗逐流賊李自成破之真定二年論功授三等輕車都尉世職從英親王阿濟格西𠞰流賊連敗之綏徳延安時自成為豫親王多鐸所敗竄走湖廣英親王移師追之哈寧阿從擊之武昌又蹴之承天浮江而南又殱之富池口三年從討流賊張獻忠於四川屢率偏師破賊積功至一等輕車都尉予世襲尋卒葉赫珠瑪喇姓畢魯𨽻鑲白旗滿洲先世居葉赫及葉赫既滅遂率衆來歸任為佐領有瓦爾喀珠瑪喇者與同名乃冠以葉赫為别天聰三年從入大安口連破明兵於遵化進薄燕京明武經畧滿桂總兵黑雲龍等引兵拒戰敗之永定門外東略張家灣焚其舟還克永平攻昌黎以功授騎都尉世職五年從圍大凌河城明監軍叅政張春來援分兵摧其前後隊六年從征察哈爾擒斬其台吉布顔圖俘其衆以歸七年從攻旅順樹雲梯傅於城城上矢石雨下步軍統領巴奇蘭號于軍曰孰敢先登者珠瑪喇大呼曰我登城矣遂超躍而登巴奇蘭從之城守者殊死格鬬珠瑪喇身被數創揮刀益前卒拔其城太宗嘉之賜以巵酒崇徳六年從征朝鮮旋師擊開平並多斬獲三年任兵部理事官從圍錦州攻廣寧明兵分屯大凌河城北依山結砦與城中相犄角珠瑪喇徇下之六年復從圍錦州八年征瑚爾哈部招降户口甚衆順治元年從定燕京擢副都統再擢兵部侍郎二年駐防杭州擊走明大學士馬士英明將方國安以舟師來犯大破之錢塘江三年從征福建明唐王朱聿鍵就擒五年從征江西叛鎮金聲桓收復府一縣五洊加世職至二等輕車都尉八年擢吏部尚書屢晉三等男十一年以都統為靖南將軍進征廣東時明桂王朱由榔竊據安隆其將李定國寇陷廣東諸郡邑勢張甚比珠瑪喇至解新㑹圍追敗定國於興業再敗之横州盡復南寧髙州雷州亷州諸府以功晉三等子十五年致仕康熙元年卒諡襄毅齊爾格申世居寧古塔以地為氏太祖時隨其兄納林率丁壯百餘來歸𨽻鑲白旗滿洲初任佐領鎮守達卜遜木城明人攻耀州率所部往援敗之淤泥河還駐平山㑹鹽徒千人㰕舟海濱欲謀為明應乘夜襲而殪之明錦州將來犯齊爾格申引兵迎戰面被創戰益力明將大敗去天聰六年修葢州城遷人户以實之遂從副都統石國柱等移兵駐其地八年授騎都尉世職時明邊將數誘我降人齊爾格申嘗沿海偵緝有七人將竄歸明明人自海道來迎舟已發齊爾格申涉水追之射殪二人遂躍入其舟生擒明備禦一及邏卒十三人尋率兵扼北新渡口詗知明人潛入島伐木舟五十餘泊島岸設伏伺其歸截擊之獲二十餘人二人者既登舟張帆度不能追遥呼曰我行矣誰敢追逐我者齊爾格申拏小舟應聲猝至擒其一斬其一崇徳元年從征明薄大同戰城下再敗明兵還師過延慶州俘人户牲畜以還順治七年加一雲騎尉屢進爵至三等男康熙十二年卒賜祭𦵏如例弟多尼喀崇徳八年從征明山東攻萊陽以勇稱授佐領世職早卒察哈喇姓果羅絡初𨽻鑲黄旗滿洲後改𨽻鑲白旗父常舒為沾河寨長太祖時率衆來歸授為佐領既卒察哈喇代其任太宗即位進理事大臣天聰三年從取遵化薄燕京明年正月還取永平灤州大軍既東歸以貝勒阿敏守永平都統納穆泰守灤州察哈喇守遵化五月明兵陷灤州納穆泰走永平阿敏令察哈喇撤兵俱歸㑹明兵已逼遵化乃率所部突圍出全師以還五年從都統楞額禮徇南海島次海濱明人渡海來犯督兵力禦之别遣人沈其舟敵敗至渡所不得舟我兵自後奮擊溺水死者過半九年從貝勒多鐸攻錦州以兵四百先驅遇明兵三千於大凌河西列陣相持已而大軍繼至明兵皆驚潰追斬無算逾年卒于富拉克塔代為佐領兼都察院理事官崇徳八年進工部叅政兼參領順治元年擢副都統再擢都統從入關擊敗流賊李自成追至望都連破之敘功授騎都尉世職是年冬從豫親王多鐸𠞰自成師抵潼關賊將劉宗敏據山而陣富拉克塔以礟擊潰之賊犯我䝉古營復督兵殱賊無算明年陜西底定移師征江南偕都統阿山瑪喇希先驅自泗州渡淮進克揚州三年從貝勒博洛征浙江攻克處州乘勝征福建下分水關趨泉州連敗明兵招撫州一縣三凱旋加一雲騎尉五年肅親王豪格誤舉佐領吉賽為䕶軍統領富拉克塔坐扶同列奏解都察院任尋從大將軍譚泰討江西叛鎮金聲桓敗賊九江截其運道進攻南昌富拉克塔督河船二千薄城合長圍以困之明年賊平乃班師富拉克塔道卒先是遇恩詔晉世職為三等輕車都尉七年追敘江西戰功晉一等輕車都尉舜松古姓納喇世居葉赫天命四年來歸𨽻滿洲鑲白旗屢從征伐崇徳元年互市殺虎口往徵敖漢奈曼扎嚕特烏拉特諸部兵征明並有勞績三年授理藩院副理事官詣歸化城導厄魯特部長墨爾根岱青來歸順治元年任佐領從都統葉臣𠞰偽伯陳永福於太原以巨礟轟其城城圮永福突圍出舜松古以䝉古兵縱擊之斬獲無算又獲賊將馬驥於黄河獲舟十有五二年從都統已哈納圍延安賊悉衆拒戰力破之尋率八旗兵躡賊獲自成孥三年蘇尼特部騰吉思等叛奔喀爾喀舜松古從擊之鄂克特山斬其台吉茂海遂循圖拉河而西喀爾喀土謝圖汗以步騎二萬來拒舜松古敗其騎兵追逐三十餘里四年敘功予雲騎尉世職五年駐防太原敗涇陽賊李陽斬陽以徇又敗賊王享明於交城是時叛鎮姜瓖據大同瓖黨劉遷擁衆萬餘犯代州舜松古馳赴代偕遊擊髙國勝登陴守賊以雲梯薄城下鈎致其梯九賊皆顛遂縋城擊斬之馘三百級賊益衆來穴城城上發矢石斃賊無算賊遂走繁峙六年賊復來犯潛結奸人為内應陷外郛舜松古力卻之嬰内城守十餘日端重親王博洛督兵赴援擊敗賊斬其渠郭芳遷遁乃還駐太原四月瓖黨十餘萬自清源來犯舜松古與巡撫祝世昌遣兵禦之徐溝㑹端重親王兵至擊賊晉祠賊大潰去八年累擢副都統三遇恩詔晉世職為二等輕車都尉九年流賊張獻忠餘黨孫可望等附于明桂王朱由榔寇掠湖南舜松古從敬謹親王尼堪𠞰之大戰衡州王殁於陣師還降世職為騎都尉兼一雲騎尉十六年致仕康熙十四年卒賜祭𦵏如典禮棟阿賚姓蒙郭𨽻鑲白旗滿洲事太宗為䕶軍叅領天聰八年從征錦州破明兵於南岡崇徳三年從入牆子嶺敗明總督吳阿衡兵六年圍錦州明總督洪承疇以兵十三萬來援軍於松山北岡棟阿賚屢破之八年從征瑚爾哈部從攻寧逺中前所屯衛並有功順治元年從入關追擊流賊以功加騎都尉世職三年從征湖廣敗賊荆州四年駐防杭州破孝豐柏山賊時海寇鄭彩縱掠閩南遂督右翼兵往征之大破之同安進克建寧分定諸郡邑屢加一等輕車都尉世職七年卒鄂屯姓富察𨽻鑲白旗滿洲初任佐領天聰五年從副都統蒙阿圖征瓦爾喀進師額赫庫楞及額勒岳索降其部衆崇徳元年授騎都尉世職三年任户部理事官六年大軍圍錦州明總督洪承疇率兵赴援營松山西北岡犯我兩紅旗及鑲藍旗營鄂屯率所屬三十五人扼山巔力戰卒卻之順治元年從入闗擊敗流賊李自成騎兵再敗之望都三年以協領駐防江寧𠞰賊巢縣復其城六年偕提督張大猷𠞰賊六安陣斬其渠張福寰先後敘功並遇恩詔晉世職至一等輕車都尉九年海賊鄭成功據海澄平南將軍金礪請增兵㑹𠞰部檄江寧駐防兵二百助之鄂屯乃與理事官額赫哩烏庫哩將之以行比抵海澄賊悉衆十餘萬逆戰火器競發勢鋭甚鄂屯麾所部縱擊呼聲震天人皆一當百賊衆敗走遂連破其營賊毁橋以拒鄂屯偕烏庫哩等策馬徑涉大軍隨之畢渡薄其城攻毀百餘丈賊殊死禦未下移兵平賊寨數十降其黨數千敘功加一雲騎尉十三年成功屢為我兵所敗遁歸兩島其將黄梧乃以海澄降十六年鄂屯以老致仕康熙十五年卒額色赫姓富察𨽻鑲白旗滿洲初事太宗為䕶軍校屢從征討天聰初任兵部理事官崇徳中擢秘書院學士額色赫明敏習事奉職恪謹大軍先後平黒龍江克錦州下山東諸郡額色赫出宣諭入奏捷往來軍中厯著勞勩方錦州之未下也明總督洪承疇合八旗兵來援軍松山乳峰山而列七營於兩山間環以長濠為持久計額色赫往勞師遂覘其軍歸言明兵甚衆壁壘甚固然以十三萬兵仰給轉餫于關内必不能持久請濟師以困之乘其粮匱欲遁而縱兵截擊可一舉殱也太宗深然之乃統師親征卒擒承疇及明將祖大夀以錦州降額色赫往撫其衆偕大夀來歸順治元年從入關定燕京二年敘功授騎都尉世職四年加一雲騎尉五年遷刑部啓心郎八年擢國史院大學士修太宗實録充總裁官列議政大臣屢遇恩詔晉世職至一等輕車都尉十二年加少保兼太子太保纂輯太祖太宗聖訓充總裁官十五年改保和殿大學士十六年洊加少師兼太子太師十八年卒賜祭𦵏諡文恪聖祖即位念額色赫宣力有年擢其子塞色赫為秘書院學士而以其孫常明襲世職雍正中入祀賢良祠覺羅巴哈納𨽻鑲白旗滿洲年十七從征伐有功天聰八年授騎都尉世職九年任為佐領崇徳三年授刑部理事官明年擢刑部叅政尋兼副都統七年以勘獄不當革世職任副都統如故順治元年進都統將兵徇霸州滄州徳州臨清皆下之移師㑹都統葉臣軍平定山西招降明總督李化熙等自汾州趨平陽大破賊于西山寨俘斬甚多降偽副將三人進抵黑龍關降明守備三人所降卒凡六千餘人以功授三等輕車都尉世職三年從肅親王豪格𠞰流賊張獻忠于四川分兵平遵義夔州茂州斬偽官數百人降甲士數千獲馬驘輜重無算餘寇悉平五年追論討獻忠時核軍功不實又肅親王誤舉佐領吉賽為䕶軍統領不阻止之坐降世職為騎都尉尋遷户部尚書八年世祖親政詢以民間疾苦具言磚厰沿明舊制採辦臨清滋為民累且言通州轉粟京師莫如陸運便顧由通惠河舟運大通橋橋距通州石壩地勢髙四丈流沙易淤旋濬旋塞嵗縻工費不貲宜革並諭所司革之尋兼都統坐給餉不均罷官革世職明年起授兵部尚書十一年分賑畿輔還報稱㫖未幾晉太子太保十二年加少傅兼太子太傅授𢎞文院大學士十五年改中和殿大學士十八年復設内三院授為秘書院大學士康熙五年卒贈少師兼太子太師賜祭𦵏諡敏壯弟普爾朋巴朗俱以入關擊流寇著績辰布禄姓果羅絡𨽻鑲白旗滿洲初任佐領兼工部理事官崇徳三年從睿親王多爾衮征明南下山東攻克信陽縣城順治三年從擊叛鎮賀珍於漢中敗走之進𠞰流賊張獻忠偕叅領達素鄂謨克圖錫卜臣等屢挫賊卒殪獻忠兩遇恩詔予騎都尉世職十一年海賊鄭成功遣其黨陳六御等犯浙江陷舟山辰布禄從大軍𠞰之敗六御等於衡水洋遂復舟山敘功晉世職為三等輕車都尉十七年卒徹克姓𤓰爾佳𨽻鑲白旗滿洲天聰八年征明徹克以佐領從入大同趨懷逺薄左衛城設伏敗明將曹文詔騎兵略地越代州至五臺山還遇明將祖大弼兵擊敗之崇徳三年授户部副理事官六年從鄭親王濟爾哈朗圍錦州破明總督洪承疇步卒三營順治元年從入關五年擢户部侍郎從英親王阿濟爾征大同叛將姜瓖分兵援太原𠞰瓖黨劉遷萬鍊八年改都察院叅政尋擢户部尚書九年列議政大臣十年授二等輕車都尉世職十二年擢秘書院大學士十三年以練于國計復任户部尚書累加少師兼太子太師十七年偕安南將軍洛託總兵𠞰海賊鄭成㓛聖祖即位詔還京遷吏部尚書康熙元年復授祕書院大學士六年以疾致仕十年卒賜祭𦵏諡文端覺羅果科𨽻鑲白旗滿洲事太宗為䕶軍叅領崇徳六年從圍錦州分兵扼杏山明兵自寧逺來援擊敗之追至連山斬級三十獲馬三十二七年偕統領努山略地寧逺遇明兵於中後所擊之潰八年復偕努山偵界嶺口明將以步騎邀戰斬其將馘三百有奇順治元年從入關擊敗流賊李自成追至望都二年從英親王阿濟格西𠞰自成克綏徳自成兄子錦踞延安數引兵拒戰果科三戰三捷㑹豫親王多鐸已破西安自成走湖廣遂移師追之至安陸獲其船八十三年從肅親王豪格𠞰流賊張獻忠過漢中擊走叛鎮賀珍獻忠自西充逆戰殪之于陣與統領希爾根搜斬其餘黨悉平之五年改前鋒叅領從鄭親王濟爾哈朗征明桂王朱由榔時由榔據廣西其大學士何騰蛟踞湖南之湘潭我兵薄城下騰蛟分兵禦三門果科與叅領瑚沙敗其城西兵奪門入騰蛟就擒乘勝趨衡州戰于城北三十里大捷敗偽總兵陶養用于石橋拔其寨又敗偽伯胡一清軍逐北至全州尋還京授刑部理事官敘功並遇恩詔晉世職至騎都尉兼一雲騎尉十一年擢工部左侍郎十三年乾清宫成加尚書銜十五年壇廟工成晉二等輕車都尉十七年擢工部尚書十八年卒後輔政大臣鼇拜追論工部繕京師通州諸倉浮給磚直議削果科階降世職為雲騎尉聖祖親政復之錫卜臣姓𤓰爾佳𨽻鑲白旗滿洲費英東從孫也崇徳三年從征明至通州敗明太監髙起潛兵五年圍錦州敗其杏山援兵六年復圍錦州明總督洪承疇以馬步兵十三萬自寧逺來援錫卜臣破其步卒三營追擊其騎兵于連山斬獲無算順治元年從擊李自成敗賊將唐通于一片石尋𠞰自成於陜西追擊於安陸毁其舟敗叛將賀珍於漢中殪張獻忠於四川討叛將姜瓖於大同擊其黨劉遷於代州五年之間屢以戰功晉世職至二等輕車都尉自前鋒侍衛積官至䕶軍叅領十一年擢統領十二年與都統卓洛等駐防荆州時獻忠遺孽孫可望降於明桂王朱由榔擁衆據辰州其黨分陷湖南郡邑十三年錫卜臣往𠞰之進兵澧州常徳賊棄城遁追破之瀘溪遂復辰州十六年海賊鄭成功犯江寧錫卜臣偕安南將軍明安達哩自荆州赴援破偽都督楊文英等於揚子江康熙九年擢都統十二年加太子少傅十三年四川巡撫羅森提督鄭蛟鱗總兵譚宏吳之茂等叛應逆藩吳三桂聖祖命錫卜臣為鎮西將軍駐守陜西是年各與都統赫業等𠞰賊保寧軍蟠龍山失利引還漢中㑹陜西提督王輔臣叛於寧𦍑賊黨分踞棧道漢中餫道遂阻明年退駐西安十九年還京追論蟠龍山之役坐免官革世職興鼐姓納喇𨽻鑲白旗滿洲天聰中授騎都尉世職崇徳元年從英親王阿濟格征明攻順義縣先登克其城三年任工部理事官順治元年從征李自成於陜西大敗之延安二年追𠞰自成於武昌躡擊之富池口移軍江南擊敗明總兵黄蜚於池州三年蘇尼特部騰吉思等叛奔喀爾喀從豫親王多鐸追之西渡圖拉河喀爾喀汗土謝圖遣兵迭出邀戰大敗之七年擢工部侍郎先後敘功復遇恩詔晉世職至一等輕車都尉兼一雲騎尉康熙三年卒索歡姓𤓰爾佳𨽻鑲白旗滿洲初任佐領兼前鋒叅領崇徳三年偵事義州擒明游徼兵八人歸四年從征錦州分兵略杏山獲牲畜無算五年六年兩圍錦州屢敗明兵于松山杏山復偕叅領瑚哩布攻破其山巔寨七年從貝勒阿巴泰下薊州敗明總督范志完兵戰于三河明兵赴援者踵至力擊之潰八年從征寧逺明守將以千騎拒戰復分兵擾我牧羣皆敗之以功授雲騎尉世職順治元年從入闗敗賊將唐通于一片石尋從豫親王多鐸剿賊渠李自成師至陜州乘夜先驅襲破賊將張有曾營于靈寶先後敘功並遇恩詔晉世職至一等輕車都尉六年擢䕶軍統領從巽親王滿達海討叛鎮姜瓖别將兵圍平遥下其城七年任吏部侍郎八年改副都統十五年擢都統十六年偕内大臣達素𠞰海賊鄭成功于福建明年師次厦門以不習水戰久無功康熙元年罷任奪世職尋卒赫勒姓𤓰爾佳𨽻鑲白旗滿洲崇徳三年以驍騎校從入青山口越燕京攻獻縣先登克其城六年任佐領七年從貝勒阿巴泰征明自薊州南下山東屢戰皆捷順治元年豫親王多鐸追𠞰流賊李自成破潼闗二年移師平河南江南赫勒並在事有功尋從貝勒博洛征浙江散敵于嘉興四年敘功予雲騎尉職世襲罔替遇恩詔晉騎都尉尋卒次子噶思特康熙中屢著軍功以忠節著達克薩喀姓賽宻勒𨽻鑲白旗滿洲初為䕶軍校崇徳中從征錦州寧逺有功擢侍衛順治六年從討叛鎮姜瓖以巨礟毀渾源州城遂乘所毁先登克之十五年從信郡王多尼討明桂王朱由榔自湖南入貴州明將李定國白文選祁三省竇名望等分扼險隘大軍抵永寧州三省擁衆萬餘自雞公背迎戰敗之乘勝追擊至畢節蹙之響水河橋斬級多進攻七星闗敗文選兵十六年大軍克雲南由榔走永昌達克薩哈將兵先驅進𠞰至普淜挫其軍生擒十一人再敗文選于玉龍關遂渡潞江而南既踰磨盤山定國以伏卒邀截我後軍達克薩喀聞之返軍力戰㑹將軍卓布泰引八隊兵來援定國乃大敗去乘勝攻名望營破其木柵擒斬名望由榔走緬甸十八年緬人執由榔以獻師旋敘功予騎都尉世職康熙十年授䕶軍叅領改前鋒叅領十三年從信郡王鄂扎征察哈爾布爾尼師至達嚕布爾尼伏兵山谷突出犯我師達克薩喀以前鋒擊敗其中權布爾尼收合潰衆踞山岡列火器以拒達克薩喀麾所部登岡大呼奮擊賊潰遁敘功晉世職至三等輕車都尉二十年擢副都統二十二年以年老致仕二十四年卒賜祭𦵏伊成格哈寧阿弟也天命八年從征扎魯特超衆擊敵有功天聰六年從攻大同率衆前行遇敵擊之斬級十餘時我軍往收察哈爾遺民伊成格為偵探前哨殱敵復敗明兵於平魯衛崇徳元年從征朝鮮攻長山嶺大破之三年征明追敵至豐潤多斬馘又擊敗明太監髙起潛等軍順治初授雲騎尉世職尼滿吉普喀達次子也崇徳七年從征明圍錦州明松山兵欲劫我巨礟擊敗之順治元年入闗追敗流寇于慶都敘功加一等叅領族人名達爾布崇徳八年從征明至山東攻昌邑先衆躍入克其城賜號巴圖魯授佐領世職順治元年入關從破流寇有功累加世職至一等輕車都尉錫賴富拉克塔族弟也崇徳三年從征明山東入邊敗其臺頭營馬軍又駐守宻雲以為聲援屢出竒兵制勝順治元年從入關擊流賊有功累加二等輕車都尉世職古魯𨽻鑲白旗滿洲父圖爾齊葉爾登本䝉古察哈爾貝子率衆來歸授三等副將世職天聰八年卒古魯其長子也初授佐領世職崇徳元年古魯從征明遇明巡撫袁應泰兵擊敗之又從征克錫克騰有功六年圍錦州擊敗松山兵八年隨征明山東同擊敗明八總兵軍順治元年隨入闗破流賊累加三等子以病乞休安泰鄂屯從弟也初任王府二等䕶衛太宗親統六師征朝鮮及明大同山東錦州松山等處俱在行間每戰輒奮勇直前順治元年入闗擊敗流賊偽總兵唐通又追敗之安肅慶都師至潼闗四戰皆捷連破賊營二年從征江南浙江攻克湖州等處三年征四川賊渠張獻忠等九戰俱克捷五年征湖廣於沅靖等州六敗賊渠一隻虎等授世職騎都尉官副都統鄂穆克圖姓𤓰爾佳𨽻鑲白旗滿洲父多鼐太祖時來歸己亥年復征哈達奮勇擊敵被創賚以白鏹尋授三等遊擊世職天命十一年擢置十六大臣之列天聰六年卒鄂穆克圖襲職仍任佐領隨征朝鮮喀爾喀及大同等處並在行間有功又從征寧逺並圍義州俱以力戰被創攻保安奮勇先登積功加一等叅領世職崇徳三年擢禮部叅政六年復授䝉古都統遜達禮姓魯布哩𨽻鑲白旗滿洲崇徳三年隨征明山東攻濟南先登克之賜號巴圖魯授一等叅領世職順治初累加二等男尋擢䕶軍統領康熙二年流賊餘孽郝摇旗等竄伏鄖陽襄陽山中猖獗梗化奉命往勦三年奏捷賊渠授首十二年加太子少傅十四年卒賜祭𦵏立碑如典禮諡果壯拜都哈𨽻鑲白旗滿洲崇徳八年從征明攻商河先登七年加騎都尉世職又同旗有納穆泰烏濟赫天聰九年征薩哈連烏拉有功累加二等輕車都尉世職多格蘇哩𨽻鑲白旗滿洲崇徳三年從征明攻南皮先登賜號巴圖魯授佐領累加二等輕車都尉世職子彰庫襲其族人彰山從征錦州屢立戰功亦加二等輕車都尉世職夀艮𨽻鑲白旗滿洲其父以罪正法後夀艮奉命往探輝發情形至輝發誑言我父無辜被殺故來歸輝發貝勒信之告以我等欲投往烏拉爾宜速來尋又至烏拉亦如所云烏拉貝勒亦信之遂與言收降輝發事比歸備奏其事始知輝發有叛志丁未太祖討輝發夀艮從征攻克彰儀門並以計固守山城論功授三等副都統世職崇徳五年卒順治初追敘功績加騎都尉兼一雲騎尉雅爾納姓西林覺羅𨽻鑲白旗滿洲國初來歸授備禦世職值明兵侵我格格沙漢地追敗之擢遊擊天命八年從克遼東諸城有功加二等叅領順治初累遇恩詔加三等男充什哈姓伊爾庫勒𨽻鑲白旗滿洲太祖時來歸授備禦及從攻明寧逺奮勇進擊一目被創又攻錦州足亦被創授遊擊世職天聰八年縁事降世職為佐領順治初三遇恩詔加二等輕車都尉哈珠姓富察𨽻鑲白旗滿洲太祖時同其兄哲爾吉納來歸天聰八年授三等叅領世職九年從征黒龍江有功加二等叅領崇徳三年征明擊敗明太監髙起潛軍將出邊又敗太平寨兵五年從征烏扎拉俘獲甚衆六月凱旋太宗命於五里外設宴迎之順治元年隨入關追流賊至慶都五月隨定山西攻太原城内兵出犯四敗其衆尋至潼闗破流賊第二營又往偵賊蹤迎擊敗之三年敘功加授一等叅領世職七年恩詔加一等輕車都尉兼一雲騎尉拜珠哈姓扎庫塔𨽻鑲白旗滿洲太祖時偕其弟烏爾布哩來歸從征瓦爾喀有斬馘及招撫功界藩之役超衆陷陣及攻克遼東並在行間有功授三等叅領其族人曰特特齊崇徳八年從征明敗明兵于渾河岸出邊復敗明兵於牆子嶺攻山東寧海州先登授佐領順治初入闗擊流賊復有功加二等輕車都尉世職扈彌碩姓伊爾根覺羅𨽻鑲白旗滿洲初隨我太祖征遼東開原即有功及崇徳時從攻大凌河杏山松山錦州義州厯著戰績順治元年隨入闗追流賊至慶都敗之二年敘功授佐領世職嗣三遇恩詔加二等輕車都尉十一年以其勤勞素著加授一等輕車都尉康熙四年加兼一雲騎尉甘珠翰姓索綽羅𨽻鑲白旗滿洲天聰二年從征明錦州連敗明杏山松山錦州軍崇徳三年隨征山東敗徳州及安肅兵六年圍錦州松山兵來奪我巨礟擊卻之順治三年從下江南分守蘇州與偽帥黄斐等戰五戰皆捷一目被創傷四年授佐領世職七年加三等輕車都尉世職錫爾度姓寧古塔𨽻鑲白旗滿洲天聰三年擊賊於蘆道有功是年隨征明至燕京遇滿桂黑雲龍等四總兵來援力戰有功授世職為佐領尋擢叅領又從征義州錦州遵化並在行間陷陣衝鋒凡六被創崇徳七年復從征錦州以病卒於官多貝姓索勒多𨽻鑲白旗滿洲天聰六年從征察哈爾旋入明邊明兵出拒擊敗之崇徳三年隨征明敗明太監馮永忠軍順治元年隨入闗擊流賊有功累遇恩詔加二等輕車都尉鄂彌納姓伊爾庫勒𨽻鑲白旗滿洲初以辦事有幹才授備禦世職天聰八年從征阿庫哩尼滿等部効力行間崇徳元年隨征明攻順義克其城論功加授三等叅領世職順治初恩詔加一等輕車都尉兼一雲騎尉基布舒𨽻鑲白旗滿洲天聰八年征額赫庫倫及額勒岳索額赫庫楞額勒岳索僧庫勒額赫庫楞並為嚮導有功加佐領世職崇徳三年卒碩圖姓富察𨽻鑲白旗滿洲天聰九年隨征瑚爾哈部有功順治元年從入關論功加優敘兼任工部副理事官十三年督造乾清宫等殿成加授一等輕車都尉世職烏魯哈姓寧古塔𨽻鑲白旗滿洲崇徳元年守牛莊襲明水師于遼河勝之三年任户部副理事官八年從征明屢擊敗其軍並攻克萊陽順治初遇恩詔加二等輕車都尉拜庫達姓納喇𨽻鑲白旗滿洲崇徳元年從征明攻容城先登克之順治七年恩詔授三等輕車都尉十一年隨征浙江舟山屢敗賊兵又擊偽總兵李順獲其戰艦十四年加授二等輕車都尉桓達理姓舒舒覺羅𨽻鑲白旗滿洲崇徳三年從征明攻博野先登遂下其城五年圍錦州擊敗杏山松山兵七年圍錦州松山兵來犯敗之又隨敗明經略洪承疇三營軍順治元年隨入關追流寇至慶都敗之復從南征擊賊於潼闗六戰皆捷二年至江寧浙江屢立戰功偽帥黄斐自湖州來犯擊敗之又敗之長樂宜興并殱太之衆聞嘉興松江兵叛率師往擊皆敗之加授佐領嗣三遇恩詔加二等輕車都尉縁事降世職為騎都尉十一年隨征浙江舟山連敗偽總兵陳六御等十四年加授三等輕車都尉世職和托姓伊爾庫勒𨽻鑲白旗滿洲崇徳三年從征明攻文安先登克之賜號巴圖魯順治初三遇恩詔加二等輕車都尉同旗有徳休姓伊爾根覺羅亦以崇徳三年征明至山東攻恩縣先登以功累加授三等輕車都尉科啓納姓伊爾庫勒𨽻鑲白旗滿洲崇徳三年隨征明文安以第二人登克之順治初三遇恩詔加三等輕車都尉以老乞休惠美𨽻鑲白旗滿洲崇徳三年隨征明山東攻齊河奮勇先登克其城順治元年從入闗擊賊有功授佐領世職彰泰姓納拉𨽻鑲白旗滿洲崇徳三年隨征明攻獻縣先登克之順治七年三遇恩詔加三等輕車都尉烏達禪姓趙佳𨽻鑲白旗滿洲崇徳三年隨征明攻直𨽻任邱奮勇登城遂克之至山東攻濟陽以第一人先登克其城賜號巴圖魯授佐領順治初三遇恩詔由騎都尉加一雲騎尉子莽伊圖平定廣西為名臣傅喀𨽻鑲白旗滿洲崇徳六年隨圍錦州武英郡王阿濟格遣之來奏捷恩賜鏹七年隨征明自黄崖口入邊圍錦州連敗明總兵白騰蛟白廣恩軍順治四年隨征流賊有功五年從征江西叛鎮金聲桓破賊于南康康熙十七年從征逆藩吳三桂至廣東韶州連敗偽將馬寶吳世琮范齊韓詹仰等軍十九年從征雲南二十年奪石門次黄草壩乘勝進抵雲南省城俱在事有功二十五年授騎都尉賴達哈𨽻鑲白旗滿洲世居瑚克沙哈里以地為姓國初從征綳博果爾効力行間崇徳七年從圍錦州以步戰衝入明營擊敗敵衆八年隨征山東攻兖州以第二人登賜號巴圖魯授叅領順治初累遇恩詔加三等男康熙十七年卒賜祭𦵏如典禮薩魯姓烏蘇𨽻鑲白旗滿洲崇徳七年從圍錦州擊松山兵有功又連破明經畧洪承疇三營軍嗣遇明總兵吳三桂軍擊却其衆順治元年隨入闗敗賊於慶都二年授佐領世職三年從擊破流賊賀珍復敗流賊一隻虎于商州攻西平先登克之論功嗣累遇恩詔加一等輕車都尉世職鼐格姓他塔拉𨽻鑲白旗滿洲崇徳七年隨征明圍錦州擊明經畧洪承疇軍有功時松山兵遁出衝入御營擊卻之八年從攻明攻臨清奮勇先登克其城賜號巴圖魯授佐領順治七年遇恩詔加三等輕車都尉世職十六年從征貴州凱旋至江寧破海賊鄭成功於鎮江𤓰洲敘功加二等庚格姓固倫覺羅𨽻鑲白旗滿洲崇徳七年從征明圍錦州明松山兵夜犯我汛地庚格擊敗其衆順治元年隨入闗擊流賊於慶都四年任刑部理事官授佐領世職嗣累遇恩詔加二等輕車都尉弟圖希海崇徳八年從征明擊敗三總兵軍至山東青州復敗其採樵兵回軍至渾河岸復敗明兵授騎都尉世職邁思哈姓趙佳𨽻鑲白旗滿洲崇徳八年隨征明至山東攻齊東首先登城克之順治初累遇恩詔加騎都尉兼一雲騎尉瓦星阿姓富察𨽻鑲白旗滿洲崇徳八年隨征明山東攻諸城以第二人登克之順治元年隨南征至潼關設伏擊賊衝入賊營二年至江南攻常熟首登克其城嗣累遇恩詔加二等輕車都尉世職同旗有武興格姓伊爾根覺羅崇徳八年從征明攻寧海州先登克之論功順治初加三等輕車都尉阿布岱姓𤓰爾佳𨽻鑲白旗滿洲崇徳八年隨征明攻昌邑縣以第二人先登克其城順治初累遇恩詔加三等輕車都尉世職阿爾哈姓伊爾庫勒𨽻鑲白旗滿洲崇徳八年隨征明攻陽信先衆登城克之順治初追録其功加三等輕車都尉欽定盛京通志卷七十二
