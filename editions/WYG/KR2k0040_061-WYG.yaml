body:
  text: 名宦五國朝欽定四庫全書欽定盛京通志卷五十七名宦五國朝烏庫禮姓扎庫塔滿洲鑲白旗人年十六即効力戎行入關破流賊李自成屢著戰功順治十五年授盛京總管賜鞍馬聖祖仁皇帝康熈元年改總管為將軍仍以烏庫禮任之是年疏陳所屬兵丁宜定更番直役之例以均勞逸詔如所請先是盛京設户禮工三部侍郎等官而兵民獄訟悉𨽻其事於總管未設刑部至是烏庫禮請增設疏下廷議始設刑部侍郎以下等員四年四月以疾卒於任烏庫禮居官清慎時初設将軍辦理奉天旗民事宜俱有條理旗民俱稱其名巴海姓𤓰爾佳滿洲鑲藍旗人沙爾瑚達長子也初任佐領順治十四年授秘書院侍讀學士十六年襲父一等男爵世祖章皇帝諭吏部曰寧古塔係邊疆要地沙爾瑚達駐防年乆甚得人心今已病故其子巴海素著勤慎堪代其父授為寧古塔總管十七年俄羅斯犯邊境巴海同副都統尼哈哩等率兵至黑龍江松花江交會處偵賊在費雅喀西境即疾趨使犬部界分布舟師潛伏江隈賊船踵至合擊之賊敗郤棄船登岸竄走巴海督兵追戰斬六十餘級溺水死者甚衆獲其船及鎗礟軍器因招降費雅喀百二十餘户叙功加一雲騎尉康熙元年改總管為將軍仍以巴海任之十年聖祖詣盛京召巴海問寧古塔及瓦爾喀瑚爾哈人民風俗諭曰朕向聞爾賢能今益知爾矣費雅喀赫哲雖服然其性暴戾當廣布教化多方訓迪俄羅斯雖云投誠當加意防禦訓練士馬整備器械毋墮狡計爾膺邊方重任尚其黽勉以報朕知遇之恩初邊境蒙古有墨爾哲勒氏者累世輸貢至是巴海招之其長扎努喀布克托等願率衆内移巴海請安輯于寧古塔附近地設佐領四十以扎努喀布克托及諸族屬任之分轄其衆號為新滿洲十三年冬巴海率諸佐領入覲頒賚有差聖祖特賜巴海黑狐裘貂朝衣各一襲十七年諭奬巴海暨副都統安珠瑚實心任事撫輯新滿洲户咸令得所各予一等輕車都尉兼一雲騎尉世職二十一年巴海疏言巡緝採葠官兵宜分别所獲多寡定奬賞之例聖祖諭部曰盗採者緝獲視所獲多寡議叙甚為允當其非葠而孑身採捕他物者毋得妄拘並詳議著為令時聖祖幸吉林旋蹕諭巴海以吉林兵丁勞苦宜加憐憫命除捕鷹取魚諸徭役俾勤耕種二十二年以奏報田禾歉收分數不實經部臣議以革世職聖祖諭曰巴海遷移新滿洲不可謂無功應仍令襲三等輕車都尉世職惟罷其将軍任三十五年卒賜祭葬如例巴海父子俱鎮守吉林寧古塔綏輯有方深得民心薩布蘇姓富察滿洲鑲黄旗人順治初年由驍騎校擢協領皆在吉林康熈十六年四月聖祖仁皇帝以長白山為本朝肇迹發祥宜崇秩祀勅遣内大臣覺羅武穆納侍衛費雅什塞䕶禮索鼐前往瞻視至吉林欲選曾往者導引弗可得寧古塔将軍巴海令薩布蘇率兵二百攜糧三月以隨循温徳亨河陸行七日至札倫果河復乗舟由斡穆呼河逆流二日至佛多和河順流一日抵額音陸路為林所阻翼日薩布蘇率兵伐木開路行三十餘里陟山巔升樹而望又行數里登高峯望之遣人還告武穆納等望見片片白光即長白山計相距止百餘里矣武穆納等後一日至復開路行一日詰朝又行雲霧塞徑恍惚有鶴鳴六七聲尋聲疾走因得鹿蹊密林叢翳進至山麓跪誦勅旨畢雲霧忽開有路可登半山石砌若平臺五峰環拱南一峯稍下如門山水左流有松花江右流為大小額音河中潭不流者周三十餘里由潭邊陟山五十餘丈香樹紛郁黄花燦爛徧地積雪即向所望見片片白光也薩布蘇曰此地人跡罕到不宜乆留遂叩拜而返有羣鹿自山奔墜時竚立視者七人鹿適仆其七薩布納謂武穆蘓曰此山靈所贈也令從者縶之以行不數十步囬首瞻望已雲霧漫山矣仍由額音行十五日乃還吉林武穆納等還奏十七年擢薩布蘓寧古塔副都統二十一年將討俄羅斯遣薩布蘓往視水陸路徑是年建木城于黑龍江呼瑪爾二處調寧古塔兵一千五名往造戰船運礟具以薩布蘓同将軍巴海統之二十二年薩布蘓與巴海奏言黑龍江呼瑪爾距雅克薩城尚逺若駐兵兩處則勢分道阻且過雅克薩有尼布楚等城羅刹倘水陸運糧增兵救援更難為計宜乗其積貯未備速行征勦一俟造船畢度七月初旬能抵雅克薩即統兵直薄城下疏入聖祖諭曰寧古塔兵未諳行軍紀律将軍與副都統又不能齊心巴海可留守吉林薩布蘓同寧古塔副都統瓦禮祐領兵前往俟抵彼相度形勢奏請酌行尋允王大臣等議額蘇哩在黒龍江呼瑪爾之間可以藏船且有田隴舊跡宜建木城令薩布蘓瓦禮祜統兵駐守十月以薩布蘓為黑龍江将軍十一月疏言前自羅刹来歸之宜畨鄂噶番錫圗頒三人効力勤勞宜與新投誠之吉禮固哩鄂佛那西等酌給官職以示鼓勵得㫖授宜番驍騎校餘授七品官其新投誠之鄂佛那西等賜裘帽令馳驛赴薩布蘓軍前酌遣招撫二十三年二月疏報宜番等抵羅刹界招撫二十一人以歸二十四年五月薩布蘓等軍于雅克薩城南集戰船於城東南列紅衣礟于城北夾攻之先積柴城下為焚城狀城中大驚其頭目額哩克舍窮蹙乞降先是薩布蘓等屢奉聖祖恩諭行軍不可多行殺戮至是與朋春等宣上恩徳額哩克舍垂涕稽顙謝引六百餘人徙去我軍毁雅克薩城捷聞聖祖諭議政王大臣曰大兵迅速征行破四十年盤踞之羅刹於數日之間今雅克薩城雖已克取防禦决不可疎應于何地駐兵彈壓其速議具奏尋允所議以副都統温岱那秦駐守黑龍江薩布蘓移駐墨爾根建城防禦二十五年正月薩布蘓奏偵知羅刹復至雅克薩築城盤踞請于氷消時督修戰艦相機進勦聖祖諭曰羅刹復築雅克薩城若不速行撲滅勢必積糧堅守圗之不易其令薩布蘓暫停墨爾根處兵遷移家口速修船艦統寧古塔等處兵赴勦其黑龍江城酌留奉天兵守之八月薩布蘓奏言臣等圍雅克薩城已三面掘壕築壘壕外置木樁鹿角分汛防禦城西對江另設一軍于未流澌時泊船東西兩岸令堵截尼布楚援兵至流澌時即藏船上流之港内以資守禦九月俄羅斯察罕汗遣使上疏納欵乞撤雅克薩之圍聖祖諭以别遣使来議地界命薩布蘓撤圍城兵列艦結營二十八年四月俄羅斯使臣費耀多囉等至尼布楚與内大臣索額圗等定議令俄羅斯自毁雅克薩城徙其人去以吉爾巴齊河北岸為彼界立碑垂示久逺二十九年薩布蘓以前此索倫總管安珠瑚等所種官田二千餘晌分給墨爾根兵丁屯種三十一年同寧古塔将軍佟寳奏建齊齊哈爾城及白都訥木城以科爾沁所進獻之錫伯卦勒察達瑚哩壯丁萬四千有竒分駐二城編佐領𨽻上三旗並設防守尉防禦等官先是有黙爾哲勒屯長扎努喀布克托請内附因于墨爾根編四十佐領號為新滿洲三十四年薩布蘓奏于墨爾根兩翼各設一學設助教選新滿洲及錫伯索倫達瑚哩每佐領下幼童一名教習書義是為黑龍江建學之始薩布蘓為将軍在任年乆經理地方事務諳練明敏深得軍民之心其平定羅刹及建興黑龍江學時稱其有文武幹濟之才沃内姓性佳滿洲正黄旗人順治三年隨端重親王博洛征明屢立戰功授一等輕車都尉世職康熙十二年擢盛京将軍撫兵恤民繕治城郭並奏設各城防禦得㫖允行沃内在任數年訓練士卒嚴整有節制十四年察哈爾布爾尼叛聖祖命沃内同寧古塔将軍巴海固守邊界境内晏然安珠瑚姓􅆶爾佳滿洲正黄旗人先世居蘇完父阿喇穆任佐領順治元年隨睿親王多爾衮至山海闗擊流賊李自成力戰陣亡恩加雲騎尉世職尋令安珠瑚襲隨征湖南山東及舟山海賊屢立戰功康熈六年擢寧古塔副都統十年増設吉林烏拉副都統調安珠瑚任之時安珠瑚與寧古塔將軍巴海奏遷松花江新滿洲扎努喀布克托等各姓户口於所屬境内編四十佐領令扎努喀等分轄其衆十七年聖祖諭巴海暨安珠瑚實心任事撫輯新滿洲户口咸令得所下部議叙旋擢盛京将軍十九年疏請裁金州巡檢改為金州營設守備千總等官以招徕民户五百餘丁選兵百分習騎射標鎗鳥鎗又請于沿邊展界二十餘里設柵隘口移兵防守疏並下部議行二十一年聖祖詣盛京巡行邊地見立界處枯骨多暴露者諭安珠瑚徧察瘞之二十二年以疾乞休安珠瑚任将軍時繕城郭興屯田招来逺人興利除弊皆有成效至今旗民追念其徳感佩不已張尚賢遼東人順治十一年知遼陽府事時國初新設有司地方遼濶多招来流徙之民尚賢拊循有道一二年中遂致殷富後陞奉天府尹凡新設州縣皆遵尚賢教令户口日増民人樂業去官後遼人為立祠于城西嵗時祀之王國安葢平人康熙二十八年任奉天府尹廉静不擾三十七年再任晉兵部左侍郎卒入名宦先是國安撫浙省整飭漕務清理𣙜税革陋規建隄閘具有條制杭城兵民雜處營債素為重累國安捐金代償焚劵息争浙人徳之亦祠名宦王克寛漢軍正白旂人少聰穎兼通滿漢文字國初授尚陽堡四品官凡以罪徙者皆𨽻焉克寛除科𣲖濟貧苦一時流移之人咸得其所及奉天建郡縣流徙俱赦為民克寛改授佐領尤善其職常命子國卿建養生堂安置孤貧施粥及棺木及僱乳嫗育嬰孩凡受生全之恵者不可殫述徐廷璽漢軍正白旗人康熙三十四年任奉天府丞次年擢任府尹有幹濟才抑奸暴扶善良振興禮讓旗民大和至今稱良吏者猶不忘徐府尹云吕履恒河南新安人進士康熙五十年任奉天府府丞奉天兩府科歲考例以府丞代其事履恒簡拔寒素接引後學考道論文無倦意一時士子鼓舞奮興文風大振刻有留都文萃内多觀風月課賞識之作至今傳誦不衰梁世勲陜西三原人康熙時為奉天治中時有防禦兵借住民房之議世勲視屋大小均給之又編為保伍調置有法民賴以安范時崇漢軍鑲黄旗人忠貞公承謨子也康熙二十三年任遼陽州知州寛簡愛民凡徵收錢糧並無火耗時議撥民屯田民多遷徙時崇以本境地屯種有餘請不他徙以故遼陽州民得安生業後陞浙閩總督有惠政閩人思之從祀道山忠貞公祠又劉貞胡祚逺陳學海先後任遼陽俱有徳政百姓奉牌祀本州城隍廟劉文亮漢軍鑲黄旗人順治十五年襲父承義佐領仍駐錦州招民十八年設府州縣康熙元年以孔允檜知錦縣事邑人以文亮父子乆蒞兹土並有恵澤不忍他属凡訟獄者猶奔控于文亮曰非劉青天不能决府尹徐繼煒以聞奉㫖以文亮帶佐領銜兼知錦縣而調孔允檜于開原文亮莅任招民入籍為之度邑居給牛種課勤惰而勸相之縣境多旗莊侵占地文亮正其畛界為民立印冊預杜侵奪故無兼併之患又設義學延師以教文風自此始振有上駟院總管因緝逃盜妄繫邊民數百入關文亮聞之兼程追及之於永平與争是非繫者乃歸至今父老猶能道其事欽定盛京通志卷五十七
