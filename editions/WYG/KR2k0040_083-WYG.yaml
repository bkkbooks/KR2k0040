body:
  text: 國朝人物十五鑲白旗漢軍鑲紅旗漢軍欽定四庫全書欽定盛京通志卷七十九國朝人物十五鑲白旗漢軍王元忠𨽻鑲白旗漢軍原守鳯凰城堡天命六年鎮江中軍叛降毛文龍元忠獨來歸授佐領世職後明降将内有與明通謀者元忠發其謀擒斬之又追殺逃叛生擒哨卒二次天聰八年以戰功授㕘領加世職二等順治七年九年兩遇恩詔加世職三等男尚好仁奉天人𨽻鑲白旗漢軍崇徳五年我軍圍錦州好仁擊松山明兵敗其衆七年復圍錦州功居一等尋管佐領事八年従征明中後所前屯衛皆有功順治初加世職三等輕車都尉官浙江温州鎮搃兵卒祭𦵏如禮吕應學奉天人𨽻鑲白旗漢軍父國寳隨耿仲明航海歸誠應學於崇徳六年授二等副都統世職八年從征明攻中後所前屯衛督巨礟克之順治元年􅀙入闗六年從征廣東斬偽縂兵楊杰周齊王啟科等大㨗敗偽伯馬飬麟之衆於靈山擊偽晉王李定國兵于髙明新㑹連敗其黨十四年叙功授三等子髙國相廣寧人𨽻鑲白旗漢軍父中選明乞休逰擊天聰八年國相隨父來歸初任佐領崇徳八年從克中後所前屯衛順治元年隨入闗二年西征至陜西克延安追流冦至湖廣並有功六年隨征山西叛鎮姜瓖克大同朔汾等處累加世職一等輕車都尉十二年征海賊鄭成功有功十六年駐防京口康熙十三年呉三桂等叛隨征江南徽州等處賊冦屢有功又破呉三桂叛衆於武崗州楓木嶺等處十九年任杭州副都統致仕卒賜祭𦵏馮有功奉天人𨽻鑲白旗漢軍官佐領身厯戎行崇徳八年􅀙征明中後所前屯衛克之順治元年隨平山西追敗流賊于湖廣武昌獲戰船七年九年兩遇恩詔加三等輕車都尉世職子國相康熙中従征厄魯特噶爾丹有功官至都統雍正十年入祀賢良祠朱延禧奉天人𨽻鑲白旗漢軍父世勲天命七年來歸延禧授輕車都尉世職順治元年隨入闗同征叛鎮姜瓖克復澤潞等處叙功累加至三等男十一年隨征廣東偽晉王李定國擢副都統十六年駐防福建康熙中卒賜祭𦵏如典禮蒋國柱奉天人𨽻鑲白旗漢軍順治四年授都察院啟心郎十一年擢工部右侍郎十三年調户部左侍郎十八年以副都御史廵撫山東自明季重斂之餘糧有包荒役有雜派國柱一切奏除之民困以蘇康熙三年調浙江巡撫疏陳浙江寧台温諸郡荒田招墾起科事宜及分别蠲免被水田畝額賦俱有經畫悉心民瘼茂著勤勞卒于官賜祭𦵏如例白秉貞錦州人𨽻鑲白旗漢軍順治四年任湖廣黄州府同知㫁事明決一郡質訟之事咸願歸之東山盜起搃督羅綉錦委秉貞率民兵攻之秉貞詳請勦撫兼施凡四閲月四十八砦悉定康熙六年累陞直𨽻河南山東搃督所至多惠政卒祀湖廣名宦朱昌祚遼東人𨽻鑲白旗漢軍順治十八年授浙江廵撫㑹浙東西災旱昌祚捐金煑粥以活饑民時海氛未靖並疏請酌撥荒田令瀕海居民遷移内地者開墾康熙三年擢福建總督尋以憂去四年起復總督直𨽻山東河南等三省昌祚秉性忠耿端已率屬嚴飭将士兵民戢和遇事執法無所偏徇輔臣鰲拜以鑲黄旗正白旗分地瘠薄遣部臣㑹同督撫重易善地他旗多不樂從民地被圏咸泣訴失業昌祚上疏極陳其弊鰲拜怒坐以撓法罪立絞死旗民哀之八年聖祖追復原官予祭𦵏諡勤愍王宗聖奉天人𨽻正白旗漢軍順治中知江南之舒城令詳慎明决吏不敢欺而獄無枉縦案無積滯邑當兵燹後安輯流亡恵威並著吏民咸深感戴卒祀本邑名宦王國㤗葢平人𨽻鑲白旗漢軍康熙十二年為福建福州府同知值逆藩耿精忠潜蓄異謀國泰偵知其陰事每達於總督范承謨有先事預防之智後佐郡泉州與民休息遷本省驛傳道㑹耿精忠甫平海氛尚熾軍興旁午辦應夫船親自給價毫不擾民未幾泉州告警自請召募壮勇得數千人授以衣糧甲仗身先士卒奮呼擊賊賊遂大潰泉州圍觧叙功増秩擢安徽按察使閩人思之祀名宦祠蒋毓英奉天人𨽻鑲白旗漢軍初任浙江温州府同知時海氛未靖大軍駐衢征勦毓英悉心籌畫輸運糧餉仍加意撫綏嚴行保甲闔郡帖然康熙二十二年初平䑓湾調毓英為知府毓英履任躬厯郊原披斬荆棘經界三縣封域相土定賦罷不急之役安撫畨夷招集哀鴻䑓地遂為樂土二十九年擢江西按察使時江湖多盗剽刼商旅毓英檄令各州縣查明船户編立字號各給用印腰牌飭令未晩停泊守汎兵目以五船為一伍十船為一甲輪流支更守宿天明放行由是羣盗屏迹其讞獄必以情常親理囹圄寒冬酌給棉衣尋擢浙江布政使将赴任衆囚聞之感泣數日後卒四十六年入祀䑓湾江西名宦李徳耀奉天人𨽻鑲白旗漢軍康熙四年知四川大邑縣自處節儉為政簡約嘗单騎遍閲郊原度地開渠導水俾民田悉資灌溉闔邑獲豐登之利蜀地故多先賢祠墓公暇尤加意葺修古蹟不至湮沒民思其恵乆而不忘五十年入祀名宦白登明盖平人𨽻鑲白旗漢軍知江南太倉州立衙蠧地棍賭博奸滛四禁犯者必置之法境内肅然奸民某通㓂事覺總督檄州捕之某䄂出一状某某皆其黨凡州中巨室富家無或遺登明知其誣笑曰若欲生乎死乎對曰欲生登明曰若非冦何知某某皆冦黨以若状上死無赦矣某感悟遂燬其状登明代為申辨州之大姓皆獲免公暇試諸生以地方利弊纖悉畢陳故摘發無不中鄰邑有寃抑者訴諸上官願下州為理州田阜髙常賴灌溉自劉河堙塞苦潦登明乃先濬朱涇後及劉河凡六十里州及崑嘉二邑咸賴其利白允明登明仲弟以選貢得官慨然曰國家肇基東土從入闗者多以武功翼運今天下雖大定然西南尚有逋冦依託明藩竊㩀雲貴侵擾川湖兩廣兵革不息正志士効命之秋也乃習韜鈐精武事順治十二年以薦授雲騎尉十六年随擊偽都督楊文英等於揚子江口大㨗康熙十三年逆藩呉三桂等叛海冦亦乗機窺伺江南以将軍王之鼎薦屢擢都督僉事守崇明二十五年三藩平改駐防廣東叅領卒祀江南名宦白啟明登明季弟康熙二十一年知粤之慶逺府時初經兵燹田畆蒿萊啟明竭力撫循收贖男婦之被掠者勸民墾闢設義倉以濟貧乏給牛種以資耕植境内饒裕復以時修舉廢墜建學宫葺城垣皆捐俸成之嗣以循卓遷擢去五十七年入祀粤西名宦董守義奉天人𨽻鑲白旗漢軍康熙中知江南舒城縣有幹濟才當逆藩呉三桂耿精忠之亂大軍往來繹絡舟車芻糗應時而辦閭閻安堵秋毫不擾康熙二十三年擢任四川達州牧在任期年有兇人手賊叔母詭以盗殺訴於州守義亷得實情立摘其奸遂引伏寘諸法州人以為神卒祀達州名宦佟國瓏奉天人𨽻鑲白旗漢軍康熙五十一年任山西澤州守政尚寛和與民相安凡州縣營建無不修舉在任八載輿衆􅂬洽其始莅任踰年以罣誤去州民攀留合詞上請復得留任及卒入祀名宦胡國佐遼陽人𨽻鑲白旗漢軍知河南歸徳府值嵗荒設法賑濟全活至數十萬人民懐其徳其所立救荒諸政皆有經濟卒祀河南名宦鑲紅旗漢軍金礪遼東人𨽻鑲紅旗漢軍太祖天命七年來歸授三等男天聰五年為兵部承政太宗幸演武塲閲兵礪與㕘領石國柱金玉和髙鴻中等並以訓練有方賜鞍馬尋調户部承政八年晉二等男崇徳二年以大軍征明皮島礪所部水師觀望不進革世職五年授吏部㕘政尋擢都統八年隨鄭親王濟爾哈朗攻明前屯衛中後所二城以礟攻克之論功授三等輕車都尉世職順治元年隨入闗安撫天津亂民尋同都統葉臣招撫山西賊黨陳永福踞太原礪攻克其城晋二等輕車都尉三年隨順承郡王勒克徳渾征湖廣偽總兵馬進忠降而復叛礪擊敗之武昌奪其戰艦六十時明桂王朱由榔聚屯湖南礪同平南王孔有徳等征之四年礪等斬偽伯黄朝宣於衡州進兵長沙斬縂兵楊國棟於牛皮灘晉世職一等輕車都尉六年授平南将軍鎮守浙江明魯王朱以海踞舟山礪進克其城並擒其偽蕩湖侯阮進九年海賊鄭森犯漳州礪由長泰進營漳州城北分兵萬松闗以牽制之賊來攻七戰皆㨗叙功又兩遇恩詔晉爵一等男加一雲騎尉十一年授川陕總督十三年乞休加太子太保康熙元年卒賜祭𦵏如例趙國祚漢軍鑲紅旗人父一鶴太祖時来歸天聰八年授三等輕車都尉世職國祚其次子也崇徳四年以佐領屯田義州八年偕䕶軍統領阿爾津征黒龍江師還得恩賚從鄭親王濟爾哈朗攻克前屯衛中後所二城順治元年授雲騎尉世職尋陞叅領従豫親王多鐸南征取揚州従貝勒博洛移師定浙江師還克江隂晉騎都尉八年授户部理事官擢副都統再擢都統屢遇恩詔晉世職至二等輕車都尉十二年授平南将軍駐防浙江十五年任浙江總督十六年海賊鄭成功犯温州樂清諸縣國祚以兵禦之獲其船九十餘賊退入舟山明年成功冦江南陷鎮江犯江寧大軍擊敗之儀鳯門外乃遁入海追論疎防奪嵗俸十八年遷山東總督再遷山西康熙元年罷還京十三年逆藩呉三桂反起為江西提督駐九江以遏賊衝會逆藩耿精忠叛應三桂遣其黨䧟廣信撫州建昌國祚移駐南昌偕将軍希爾根哈勒哈齊分道勦賊擊敗偽都督易明逐北七十餘里遂復撫州昜明復引賊萬餘來犯又擊敗之殱賊四千有竒十四年大軍下福建精忠窮蹙降國祚遂専勦三桂十五年􅀙安親王兵樂進兵湖南駐長沙屢戰却三桂兵十八年南抵寳慶破賊紫陽河再破其将呉國貴兵二萬于雙井堡國貴中礟死蹙其潰衆於武岡州復州城前國祚以力戰被創尋創發乞休乃還京二十七年卒年八十賜祭𦵏諡敏壮姪璉亦屢著有戰功卒諡襄勤柯汝極遼陽人𨽻鑲紅旗漢軍天命六年克遼陽有降人欲乘間叛汝極發其謀復擒獲間諜十四人擢恭領授三等輕車都尉世職順治初厯官禮部叅政鑲紅旗漢軍副都統累加世職至一等四年以副都統駐防杭州七年卒於官無子以從子永蓁為嗣襲職永蓁累官户部侍郎擢漢軍都統是時閩冦鄭成功假明桂王由榔年號竊發海上遣偽伯阮思偽總制陳六御偽總兵胡自慶等犯浙江之舟山䧟之十三年永蓁偕将軍伊勒徳以水師出蛟門擊賊衡水洋賊舟郤復前永蓁躍入其舟斬自慶餘賊轉帆遁追及之並斬思六御等遂定舟山以功賜爵三等男康熙元年偕将軍濟什哈勦山東賊于七於岠嵎山賊乘夜犯永蓁营射殪百二十餘人于七竄入海十年授京口将軍尋罷十三年起山東提督二十四年卒柯永盛汝極􅀙子也崇徳六年任佐領從圍錦州攻克晾馬山臺及杏山塔山城七年偕副都統馬光輝監鑄神威礟八年􅀙取前屯衛中後所二城叙功授騎都尉世職順治元年任刑部理事官大軍初定山東授膠州總兵官既至鎮勦昌樂土賊秦尚行等平之流賊李自成禆将趙應元詭就侍郎王鰲永招撫入青州害鰲永踞城作亂永盛聞變偕副都統和托李率泰馳赴青州駐兵城外輕騎入城計縳應元斬之復率兵圍髙宻擒斬偽元帥張輿二年濰縣土賊張廣降而復叛擁其衆數千突犯萊州永盛遣逰擊楊遇明擊敗之廣中鏃死餘賊悉平三年移鎮江寧㑹勦江西叛賊南贛廵撫苖胙土以江西諸郡叛服不常請留永盛駐其地遂改南贛總兵官四年正月湖廣興國州土賊柯抱冲陳珩玊等犯武昌殺同知張夢白冦掠江西武寧永盛遣将分勦連破賊砦抱冲珩玉並就擒斬時明桂王朱由榔㨿湖廣石城寧都雩都瑞金長寧安逺諸邑叛應之倚山結寨四出刦掠永盛遣副將劉伯禄徐啟仁叅将董大用逰擊孔國治等先後勦平之八月擢湖廣提督五年江西總兵金聲桓叛興國孝感雲夢黄安麻城蘄州土賊乘間蠢動永盛移兵扼要隘分遣叅将鄔乘鸞逰擊張國忠等搜勦賊塞以次奏㨗十年流賊張獻忠遺黨李定國孫可望等附于由榔迎由榔至安隆冦䧟廣西出沒湖南我大将軍貝勒屯齊進師衡州永盛督兵繼其後䇿應援勦屢敗賊晉世職為三等輕車都尉十八年改山西提督康熙三年加左都督七年加太子少保八年以老致仕十四年卒賜祭塟如例子鍵襲從弟永華屢積有軍功永昇于康熙中殉難湖北羅繡錦奉天人𨽻鑲紅旗漢軍天聰五年始設六部繡錦由諸生授工部啟心郎八年命禮部試滿洲漢人通文義者為舉人繡錦與選賜衣一襲尋授國史院學士纂修太祖實録成得恩賚崇徳七年兼任佐領順治元年擢河南巡撫流賊李自成黨時冦掠衛輝懐慶間原武新鄉諸邑復土賊蠭起繡錦請發八旗勁旅剿之㑹豫親王多鐸統師征陕西道出河南諸賊驚懼乞降或望風遁去二年擢湖廣四川總督時湖南郡邑為明大學士何騰蛟等所據自成遣其黨一隻虎劉二虎者復冦擾湖北繡錦至荆州檄兵防勦屢奏㨗遣副将唐國臣總兵楊文富等分道討天門土賊于八百洲擒其渠胡公緒毁其巢四年恭順王孔有徳督兵征湖南下長沙衡州寳慶辰州諸府繡錦議設鎮協駐守從之先是鄖陽搃兵王光恩與鄖㐮道李之網以贓私互訐下撫按㑹核光恩罪寔逮下吏其弟光泰遂踞鄖陽叛提督孫定遼戰殁世祖遣侍郎喀喀穆督師進勦繡錦以兵㑹之復鄖陽光泰遁四川五年喀喀穆将班師而江西搃兵金聲桓叛于南昌遣其黨犯九江武昌自成遣黨郝摇旗馬進忠降於騰蛟連䧟常徳武岡辰州沅州湖南北騷動繡錦乞留喀喀穆駐荆州分遣搃兵徐勇馬蛟麟等防守要隘屢敗賊已而鄭親王濟爾哈朗統師征湖南以次復所䧟郡邑繡錦疏言湖南叛服不常恐大軍凱旋餘孽復跳梁煽誘請分寘諸降人于腹地世祖嘉納其言九年卒于官六十有三賜祭𦵏贈兵部尚書勒石紀功廕一子入監劉武元錦州人𨽻鑲紅旗漢軍㓜習韜畧天聪五年來歸崇徳初授刑部叅政順治九年從入闗改任叅領授三等輕車都尉世職三年廵撫南贛時禆将二十餘人皆桀驁武元申明令甲嚴輯部伍殘黎漸次安集四年勦平瑞金石城興國龍南寧都上猶等土賊擒斬偽都督葉南芝等五年提督金聲桓副将王得仁據南昌叛攻圍贛州武元與搃兵胡有陞堅守數月民無叛志㑹援兵至得仁中創聲桓撤圍退走武元出竒師襲其後敗之於太湖港時叛鎮李成棟自廣東擁衆來攻武元宻遣将出其不意擊之斬首萬計成棟遂潰分遣諸将擊諸郡餘賊皆平之叙功賜豐貂冠服鞍馬等物六年勦成棟餘黨於瑞金雩都崇義等縣進敗賊於梅嶺七年分兵殱寕都賊彭順慶大庾賊羅榮等叙功加太子太保兵部尚書三遇恩詔晉世職一等輕車都尉加一雲騎尉十一年卒賜祭𦵏諡明靖贈少保長子瀇襲李棲鳯廣寧人𨽻鑲紅旗漢軍為諸生時即以天下為已任天聰時任内院副理事官崇徳元年考察各官棲鳯列二等順治二年補山東東昌道旋調湖廣荆南道三年授湖廣布政使旋任安徽廵撫勦休寧楘源二縣土賊及宿松賊趙正等平之六年以僉都御史撫粤與平南王尚可喜靖南王耿繼茂先定南韶二郡揚㠶直下遂定雷亷等䖏八年敗李定國于龍頂岡殱馘無筭棲鳯撫粤八年杜請託絶饋遺省刑薄歛勞來安集粤民頼之十五年加兵部尚書代李率泰總兵兩粤擒朱由榔偽将陳竒策等定太平思恩等府宣尉烏蠻土司及交趾諸部悉讋服來貢十七年加太子少保十八年設廣東西兩總督棲鳯改廣東尋予告歸卒於家粤人思之祀名宦賜祭𦵏如例馬鳴珮𨽻鑲紅旗漢軍其先山東蓬萊人後占籍遼陽及大軍克遼陽遂𨽻旗籍鳴珮年十七以文學受知太宗官工部啟心郎崇徳八年以考滿稱職加世職順治元年擢山西冀南道時潞汾流冦號一隻虎者最黠桀冦岢嵐鳴珮設伏以計擒之羣冦駭散尋調湖廣下湖南道五溪諸蠻畏威懐惠考績報最八年遷户部右侍郎尋任倉塲總督十一年出為宣大總督調任兩江時伏莽尚多鳴珮加意勦撫㧞梁化鳯於偏禆中疏荐其有大将才令統水師禦海賊於崇明後果大㨗十二年賊陳其綸遥應海冦嘯聚大柏山勦平之威名益著又為檄示海冦諸渠帥開陳禍福偽縂督張銘鎮偽縂兵顧忠等相繼降是年疏留梁化鳯守崇明尋朝廷擢化鳯松江提督十五年海冦猝䧟鎮江𤓰洲攻江寧化鳯提兵至與城中兵夾攻之大殱其衆人咸思鳴珮知人之明尋以疾卒江南人思其徳崇祀名宦祠祝世昌遼東人𨽻鑲紅旗漢軍初授逰擊天聪五年従征大凌河六年太宗幸演武場閲兵以世昌訓練有方加恩賞順治五年授山西廵撫時叛鎮姜瓖作亂郡縣騷動世昌力請殄滅凡理餉數十萬民不見擾事平又請豁逋賦七百萬石省徭十餘萬丁七年卒於官詔贈兵部右侍郎賜祭𦵏謚僖靖方世昌之没也百姓巷哭後廵撫劉宏遇博採輿論謂死忠死事其義一也並請祀忠烈祠今改祀名宦李翔鳯𨽻鑲紅旗漢軍初名起鳯幼通書史太宗時直内秘書院賜名翔鳯順治元年隨入闗定燕京授山東濟南道撫綏有方時流賊趙應元窃據青州所至蹂􅏳翔鳯以計擒之復青州得上賞二年擢江西巡撫時偽廵撫盧某等尚據南昌等五府翔鳯至悉行𠞰除濵江餘冦亦皆蕩平尋卒贈兵部右侍郎祀江西名宦祠李茂芳遼東人𨽻鑲紅旗漢軍初以職管丁壮善於撫輯天聰九年考察特加錄叙崇徳五年􅀙圍錦州擊敗明松山兵七年復圍錦州攻吕翁山臺克之兼敗其援兵復擊杏山西臺敵兵及塔山兵皆論功一等授佐領世職任户部理事官累加世職一等輕車都尉子顯孝康熙中從征福建殁于王事楊茂勲遼陽人𨽻鑲紅旗漢軍父麒祥驍勇多力太宗時來歸任都統屢從征討有功茂勲于順治七年授太僕寺理事官十四年陞吏部右侍郎十七年授湖廣廵撫十八年擢貴州搃督遣兵𠞰平金筑土司王應兆等及定畨都匀各苖寨康熙五年授河道總督堵塞黄河烟墩决口議叙加太子少保七年堵築桃源黄家嘴决口十五年授鄖陽廵撫𠞰叛鎮譚宏楊來嘉等多斬馘十八年調四川縂督仍駐鄖陽時呉三桂偽搃督王公良率偽将軍王鳯岐劉之衛等據䕫州十九年茂勲統兵由椘江峡路逆流而上破巫山帆風直進不二日扺䕫城兵刄未交羣賊宵遁旋以哈占為川陕縂督茂勲管四川提督事隨大軍進征雲南賊平還京三十二年卒王登聫奉天人𨽻鑲紅旗漢軍順治六年知河南鄭州廵撫呉景道薦其有徳有材擢山東濟南道十七年授保定廵撫十八年裁順天廵撫以登聫兼理其事登聫撫保定時以海宇初定伏莾尚多官吏艱於捕緝共相容隠請嚴縱盗之法重窩主之律厚捕首之賞由是盗賊得息尋以圏換旗地事擾民宻疏請令各安舊業忤輔臣鰲拜意與摠督朱昌祚同論死時論哀之八年追復原官賜祭𦵏諡慤愍祀直𨽻名宦于成龍奉天人𨽻鑲紅旗漢軍康熙初知江寧府時總督永寧于成龍剛正清介於屬吏少許可獨奨成龍才由通州牧題守江寕興利除弊知無不為是時徐州有奸民某走京師以左道惑衆上告事下制府檄江寧鎮江兩府㑹鞫成龍力白寃状制府疑故縦詰責甚厲成龍持之愈力奸民卒坐誣又瀕江蘆洲多為豪强隠佔成龍以有課而無洲者為坍江立予豁除有洲而無課者為欺隠陞課而薄其罰人皆服其平允二十五年廵撫直𨽻政治嚴明貴近有犯必䋲以法事有不便於民者悉除之任邱縣水荒地數千頃民産已去尚徴其糧至是奏請悉行豁免遷河南總兵去三十七年復以總督管直𨽻廵撫事民聞其來無不􅂬踴尋又調河南總督去成龍所至有聲與前永寕于成龍並著人稱大小于公以别之韓昌先遼東人𨽻鑲紅旗漢軍順治初任浙之蕭山令蒞事明敏政寛刑簡立理甲均當法使徭役均而詭寄之弊絶至今踵行之昌先卒於官蕭山民建祠祀之王國棟鐡嶺人𨽻鑲紅旗漢軍順治七年知山西沁州時叛鎮姜瓖亂後州境荒蕪國棟勘得無主荒地及没水地若干請題免逋賦七千餘兩而荒地以次墾闢賦仍無缺公私便之仍随事講求以利民為急務招徠安集民困始蘇卒祀名宦熊維傑鉄嶺人𨽻鑲紅旗漢軍順治八年為浙江按察使性峭直不苟言笑然善於撫民其為政簡而周剛而不刻時滿洲兵初移駐或有不遵約束出擾民者有司不敢問維傑出有來訴者必立馬更為之申理兵不敢復擾民望見其前麾輒相慶賀蘇宏謨遼陽人𨽻鑲紅旗漢軍順治中任長沙府同知時湖南甫定兵民雜䖏互相猜忌宏謨加意撫戢遇事示以坦白兵不敢肆縱民咸安其業政理人和擢貴州糧驛道值滇省大軍凱旋供億紛繁宏謨㳺刄有餘毫無支詘先是差役有以人代馬謂之夾馬夫派累閭閻民甚苦之宏謨悉為革除民力以甦卒祀貴州名宦徐鳯鳴奉天人𨽻鑲紅旗漢軍順治八年知江西進賢縣壬辰冬土㓂來犯城鳯鳴率衆與戰矢集其面氣益奮手殺數十人賊懼引去十一年改知河南郏縣招集河朔流民給牛種墾荒田創立鴻宅保以居之躬修亷㓗聼訟明允邑人歌誦不衰擢廣東儋州牧去郟民思其徳康熙五十年入祀名宦佟國璽撫順人𨽻鑲紅旗漢軍知河南輝縣以崇學校􅂆農桑為務有貧民不能開墾者給以牛種勸令復業邑遭水患五閘衝决國璽親督修築使水歸故道稲田之利復興趙世安奉天人𨽻鑲紅旗漢軍康熙二十七年任福建興化同知嚴毅有幹畧釐剔政蠧無微不燭尤嚴禁賭慱凡樗蒱之戯有犯必懲其輕者罸鍰入公為修木蘭陂之用事集工成吏民咸深畏愛王登魁廣寜人𨽻鑲紅旗漢軍康熙二十八年知河南汝州值秦晉嵗飢疫癘盛行飛蝗蔽天饑民流入中州登魁率衆捕蝗開倉賑貸全活甚衆先是魯山賊王二等倡亂掲竿嘯聚登魁率民兵殱其渠餘黨悉平三十一年運楚米賑關中運員經理不善所至騷動登魁措置有方民無擾累其聼訟果敏胥吏不敢稍有欺隐嗣以薦舉去部民遮道攀留沒後猶思其澤四十九年入祀河南名宦張至隆奉天人𨽻鑲紅旗漢軍康熙三十二年知粤之肇慶府郡當牂牁下流嵗三四月西流暴漲豐樂長圍一决其害更甚至隆蒞任親駕小舟相度經營躬先負土日夜督率築堤鞏固而水患頓息黄江厰税胥吏多奸蠧横索至隆悉裁抑之商民立碑記焉崔懋遼陽人𨽻鑲紅旗漢軍康熙中知直𨽻新城縣時水旱頻仍民多逋迯懋力請蠲赦懇荒捐給牛種召募耕種民皆樂其故業又值小清河泛溢頗為邑患懋修築堤堰經理貲費毫不取之民間復修濬孝婦河以利民田居職十二年政簡刑清老㓜咸徳之尋擢冀州牧卒祀名宦武宏祖奉天人𨽻鑲紅旗漢軍康熙三十一年知河南歸徳府屬邑催科多陋規相沿貽患閭閻宏祖之任悉為革除嚴禁牙帖胥吏苛取税銀痛䋲以法境治清肅吏畏民懐卒祀歸徳名宦李國亮海城人𨽻鑲紅旗漢軍康熙三十五年由河南布政使陞任廵撫首務教化建修書院延名宿以訓課士子嚴飭武備禁除一切陋規河工夫役栁梢俱出官辦不以累民時稱賢大吏云欽定盛京通志卷七十九
