front:
  text: 欽定四庫全書欽定盛京通志卷八十七
  hash: sha256:2b9de548713295bfec44675f1768631b6e60e7ea24c398047a88ab86b1682edb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0040_WYG_091-1a, image: WYG0502/WYG0502-0764a.png}
body:
  text: 孝義三國魏晉遼金元明國朝欽定四庫全書欽定盛京通志卷八十七孝義臣等謹案聖王教孝以重倫明義以訓俗是以表厥宅里樹之風聲盛京風俗醇厚聲教所先前史孝義著聞若魏之王簡遼之耶律安圖其可謂敦行不怠慕義無窮者歟金元迄明代有可稱我朝崇起教化扶植綱常其孝義著稱者可以光前可以勸後謹志孝義第二十六欽定四庫全書欽定盛京通志卷八十七孝義三國魏王簡元莬郡髙顯縣民也吏民叛令長熙為賊所殺簡負熙䘮星夜行致本州魏正元二年詔以簡忠節可嘉特拜為忠節都尉以旌殊行晉李信襄平人父敏避公孫度將家屬浮於海不知所終信出塞徧求不得越二十年不娶欲行䘮制服則疑父尚存遂欲終不聘娶燕國徐邈責之曰不孝莫大於無後可終身不娶乎乃娶妻生子屏逺房帷常如居䘮之禮悲鬱數年而卒子宣伯生不識父母及長蔬食哀戚恒如居三年之䘮以父祖皆不知存殁設木主事之詳見本志人物卷按三國志公孫度傳裴松之註云敏將家屬入海而復與子相失未詳其故或舊史有誤姑存之以志闕疑遼耶律安圖父迪里因建言立東丹王被誅安圖自㓜若成人居父䘮哀毁過禮見者傷之太宗屢加慰諭嘗曰此兒必為令器既長寡言笑重然諾動遵繩矩事母至孝以父死非罪未𦵏不預宴樂世宗在藩邸尤加憐恤太宗崩諸將欲立世宗以魯呼及夀安在朝猶豫未决時安圖直宿衛世宗宻召問計安圖曰大王聰安寛恕人皇王之嫡長先帝雖有夀安天下屬意多在大王今若不斷後悔無及安圖乃與北院大王斡南院大王吼等定計整軍召諸將奉世宗即位以安圖為腹心總知宿衛是嵗和于潢河横渡太后問安圖曰吾與汝有何隙安圖以父死為對太后黙然安圖國語解見吉林城池卷原作安摶魯呼解見人物卷原作李胡迪里解見名宦卷原作迭里今俱譯改又按耶律斡耶律吼俱詳本志人物卷耶律淵臨潢長夀人任奉聖州礬山監淵課耕稼勞來有方在軍十有五年與士卒同甘苦未嘗妄笞一人比休致親已殁即于縣西卜地以𦵏因家礬山哭必盡哀祭必盡敬一時士民皆化之張寳錦州人四世同居道宗嘉之令其子為三班祗候金耶律安禮系出約尼氏㓜孤事母以孝聞天眷初從元帥于山西遭母䘮冒大暑挽柩行千里餘哀毁骨立天徳間歴工部尚書被詔鞫韓王亨獄白無反狀海陵怒再遣李老僧殺亨於獄海陵將伐宋安禮宻諫忤海陵意罷為南京留守安禮嘗從帥府再伐宋寳貨人口一無所取時議賢之約尼解見人物卷原作遥輦今譯改盧亨嗣字繼祖臨潢人彦倫之孫也初由祖廕得官以課最遷至定逺大將軍莒州刺史與弟亨益盡友愛之道大定十六年父璣為同知宣徽院當廕子亨嗣以讓弟弟早卒子兟兟㓜稚乃悉以舊業田宅奴畜與之翟巽貴徳州人章宗明昌元年詔賜絹十匹以旌其孝行舒穆嚕元字希明懿州路人七嵗䘮父號泣不食者數日年十三居母䘮如成人嘗為撃鞠戲馬踣歎曰生無兄弟而數乗此險適有不測奈何由是終身不復為之補樞宻院尚書省譯史遷監察御史同知淄川軍州事歴知濟南府卒生平寡言笑尚節儉居官自守不交權要人以是稱之舒穆嚕八旗姓原作石抹今譯改趙仁榮忠愍公炳之子炳為郭琮郭叔雲所害詳見人物卷趙炳傳事發琮叔雲皆伏誅命籍其家以付仁榮仁榮曰父為所害不共戴天之讐且所蓄之物皆取于民何忍受之帝乃别賜鈔二萬二千五百緡使治䘮具仁榮後仕至中書平章政事完顔鼎一名色埒黙字國器完顔彜之從兄也年二十以善戰知名貞祐中彜為元兵所虜母留豐州鼎事之甚謹彜在北大帥甚愛之嵗餘托以省母乞還大帥以卒監之至豐鼎乃與彜刧殺監卒奉彜母南奔既而失馬載以鹿車兄弟共挽南渡河宣宗竒之鼎以世官授都統未幾行夀泗元帥府事以彜自隨軍中事彜皆得預鼎病軍中李大和與方城鎮防軍葛宜翁相毆訴於彜彜知宜翁事不直量笞之宜翁死其妻訟之官彜久繋獄鼎入朝哀宗怪其瘦問卿寜以方城獄未决故耶吾今赦之矣未幾鼎卒上聞使馳赦彜曰有司奏汝以私忿殺人汝兄死失吾一名將今以汝兄故曲法赦汝他日汝奮發立功名始知我不妄赦矣彛後卒為良將死于難色埒黙國語解見忠節卷原作斜烈今譯改劉慶祐錦州人有孝行明昌三年詔賜慶祐絹粟旌門閭復其身謹按金史如完顔蘇埒史稱其居䘮廬墓至孝昭然因其死節已載入忠節門是卷不更臚載謹附識其孝行于卷元舒穆嚕昌齡興中人性至孝以廬墓特旌舒穆嚕八旗姓原作石抹今譯改張洪範北京人親䘮廬墓三年詔旌之郭全遼陽人㓜䘮母哀戚如成人及壯父廷玉又卒倚廬三載啜粥面墨事繼母唐古氏孝繼母生四子皆㓜全躬耕奉養四子既長娶婦各求分析全不能止凡田廬器物皆取朽敝者奉繼母甘㫖無乏唐古氏卒全年六十餘哀毁廬墓詔旌其門孫秀實大寜人性剛毅喜周人急里中王仲和常託秀實貸富人鈔二千貧不能償逃去數年其親思之成疾秀實日饋米薪存問又為代償取劵還其親後命奴訪仲和使歸父子歡聚聞者莫不嗟嘆又有貸秀實鈔多至數千不能償者盡以劵還之事聞詔旌焉劉廷讓大寜人至順初北方兵起遇亂挈家走避山中有㓜弟方乳母王氏置于懐賊追急廷讓棄其子一手抱㓜弟一手扶母疾驅得免事聞旌之髙守質瀋陽人事親篤孝詔旌其門明尚忠義州人百户劉雄部軍景泰中敵入犯邊雄率忠力戰雄馬中箭死忠以已馬授之雄潰圍出忠亦幸得免人稱其義烈為難蘭英葢州軍人也成化九年隨總兵歐信出塞追敵敵因風縱火軍潰信馬中箭死英以馬授信信乃得出而英遂遇害巡撫李貢作碑表其義劉鼎遼陽人初喪生母嫡母姚氏撫之成化中任鴻臚序班姚氏殁鼎在京師聞訃奔至葬所悲哀廬墓負土築墳事聞旌表李用廣寜人生員𢎞治間母張氏卒既葬廬於墓側晨昏哭奠事聞旌之邵義鐵嶺人未婚父母皆亡義廬墓三年鄉人憫其孝勸之娶妻親迎畢不入房室復廬墓三年劉定遼陽人父玉任正千户以疾卒定悲哀廬墓事聞旌表吳裕廣寜衛人少孤母王氏教育之比長遊庠貢於禮部㑹母疾衣不解帶藥必先嘗母卒裕哀毁慘悴既殯廬於墓朝夕哭泣三年如一日後裕仕至和州判官年八十餘卒於家紀刺漢廣寜衛人五嵗䘮母及長父聰病篤思肉乃割股煎湯以進父遂愈六載乃故廬墓三年撫臣書孝行扁以旌其門史璠廣寜衛人天性和平樂聴善言母病朝夕侍立病篤益勤苦夜不就枕及母卒行古䘮禮倚廬中門絶酒肉逺帷薄三年不出給事中賀欽作倚廬記表之文淵葢州衛人居父母喪哀毁盡禮先後廬墓六年仕至陳州知州髙陵吕柟銘其墓李光祖遼陽人父敏以學行稱正徳間敏以疾卒光祖三日不食哀毁踰節比𦵏廬墓三年程錤廣寜衛人太學生母病日侍湯藥夜不解衣母轉病痢錤聞醫者言糞甘滑者不治錤嘗之果甘悲號幾死母旋卒值鄰家失火風急勢迫錤撫棺號曰萬一不虞與母俱焚耳忽焉風反火滅人以為孝感所致姜節金州衛人父早亡正徳間母周氏病節日夕拜禱因獨宿戒酒肉宻刲股和􅅅奉母食之遂愈至九十餘無恙宫守禮寜逺衛人生員性端謹好古守禮父思問病衣不解帶藥必親嘗及卒廬墓三年有白雀來巢於墓上事繼母尤謹朝夕率妻拜問繼母初欲改適感其孝遂止與鄉人飲守禮在坐少長莫敢諠譁其風動流俗如此嘉靖間守臣上其事詔旌其門朱國禎廣寜衛人父殁居䘮盡禮力營葬事治墳塋松楸鬰然皆手植也結廬墓側朝夕哭奠如初比終制羸瘠而死妻劉氏艾年守志撫孤成立同時節孝並稱葉洪廣寜衛人㓜孤依母度日嘉靖間母病思食肉麫餅不能辦乃傭于人得麫一升又苦無肉遂刲股肉以進母病即愈趙堂廣寜人父母先後俱病甚堂刲股進食病咸愈王斌開原衛人母聞氏久病無方可療斌向土神廟祈祝乃割肋取肝一片煎湯以進母食之病即愈斌亦無恙周顯時葢州衛人父愛㓜子臨終以三千金私與之及卒顯時廬墓三年終身篤友于之誼若勿知予金事者後官至總兵李慶錦州人官百戸四世百口同居慶年百餘嵗人咸重其齒徳同郡張寳亦四世同居一時義之國朝繆鴻業海城人親殁廬墓知縣王沛恂嘉其孝書忠孝節義四大字於學宫之壁而以鴻業廬墓事註孝字下以奬之鐵範金字式之承徳縣人性至孝母疾篤範金親侍湯藥衣不解帶一夕母忽昏絶範金以暮夜難于延醫遂割腕肉以進母立甦丁丑範金成進士選庶常授翰林院檢討尋擢江南學政未至卒祁祖西正白旗人素有孝行母殁廬墓三年康熙五十二年旌表王瓚奉天人事親孝乾隆六年旌表欽定盛京通志卷八十七
