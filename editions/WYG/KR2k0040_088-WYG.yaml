body:
  text: 忠節三國朝鑲黄旗滿洲正黄旗滿洲正白旗滿洲正紅旗滿洲欽定四庫全書欽定盛京通志卷八十四忠節三國朝鑲黄旗滿洲納爾察姓鈕祜禄𨽻鑲黄旗滿洲以軍功授騎都尉世職在十六章京之列戊申嵗從征烏拉攻伊罕阿林城先登擢副都統尋攻沙嶺以不待集師奮勇䧟陣殁䘏贈輕車都尉順治十二年追諡端莊覺羅拜山𨽻鑲黄旗滿洲景祖第五弟包朗阿之曽孫也天命六年從征明攻瀋陽斬其驍將號秃尼狼者明兵自城悉衆來戰復斬一副將降其衆既克遼陽授三等輕車都尉世職天聰元年從攻錦州不下環守之復移師往攻寧逺錦州兵潛出躡我軍後拜山與佐領巴布爭先還擊奮力鏖戰殁於陣太宗親臨其喪酧酒哭之賜人户牲畜贈三等男子顧納岱襲爵崇徳三年從征明敗明兵於山海闗追奔至豐潤又敗之時我軍有出取芻束者為敵所乘顧納岱馳往奮擊援衆以歸至山東攻博平克之晉爵一等男順治元年以䕶軍統領隨睿親王多爾衮入山海闗擊敗流賊李自成兵十月復隨豫親王多鐸追流賊至陜州克潼闗破西安叙功加一雲騎尉從下江南趨浙西戰於嘉興三戰三捷從征騰吉思敗喀爾喀兵晉子爵世職五年從討江西叛鎮金聲桓至九江大破之進攻南昌中礟殁於陣恩䘏一等子命其子莫洛渾襲莫洛渾厯官一等侍衛順治十七年授㕘領從安南將軍達素討海冦鄭成功攻厦門力戰没康熙二年聖祖念拜山顧納岱皆陣亡莫洛渾又以戰殁嘉其世篤忠貞特贈莫洛渾三等伯立碑墓道諡剛勇圗魯什姓伊爾根覺羅𨽻鑲黄旗滿洲以世職管牛录事天聰三年從征明攻大安口圗魯什先至城下力戰克其城大軍進薄明燕京營西南隅復令與副將阿山覘明師時明經略滿桂督黑雲龍麻登雲孫祖夀諸鎮兵營永定門外環營結栅列礟數重以拒圗魯什偵其兵囂請乗夜進戰太宗從之遂以精騎四面蹙桂營斬桂及祖夀於陣縛雲龍登雲以歸五年八月從攻大凌河城九月薄錦州明兵備㕘政張春監總兵呉襄宋偉軍來援距大凌河十五里而陣鋒既交火器競發聲震天地大凌河城中聞礟聲潛縋城出欲渡河合春軍圗魯什分兵擊走之復馳還擊襄軍襄遁春不能軍是夕春收潰衆再戰兩軍相持戰方酣圗魯什麾兩纛突騎蹂春軍大破之偉亦遁俘春及㕘將以下三十三人超擢前鋒統領加三等男八年從征察哈爾至歸化城收其降人一千二百户還師入大同拔得勝堡畧宣府懷逺設伏於左衛城擊敗明總兵曹文詔㑹明總兵祖大弼赴救圗魯什馳單騎擊其軍飛矢中腹力戰不休我兵繼至大弼敗去圗魯什以創重卒于軍初圗魯什以戰勝功賜號碩翁科羅巴圗魯至是陣亡贈三等子世職順治十二年追諡忠宣超哈爾額亦都第十三子也少從征伐屢以功授騎都尉世職天聰元年偕佐領納海巴雅彰屯齎詔赴明邊界徧諭喜峯口滿家口董家口諸將吏還遇戍卒邀戰擒斬百餘人進䕶軍㕘領崇徳元年從武英郡王阿濟格征明抵明燕京城北奪取其巨礟明兵來拒轉戰至盧溝橋連敗之二年擢議政大臣太宗諭曰嘉爾一心事主用擢爾以旌忠爾勉之其益抒誠佐國政三年授禮部㕘政從睿親王多爾衮入青山口會師􅃰州分兵攻任邱穴地墮其城趨趙北口明兵陣於河之南毀橋梁以阻我師超哈爾乃自河西出間道襲其後大破之遂畧山東克濟南明年春旋師敗敵于太平寨五年轉兵部六年從鄭親王濟爾哈朗圍錦州城中兵出戰擊敗之追入其郛力戰殁于陣年四十有一太宗軫悼曰朕本欲擢超哈爾為一等大臣不意陣亡遣大臣迎櫬入城賜白金六百一十兩晉世職為二等輕車都尉以其長子格赫禮襲順治十二年追諡果壯視一品大臣例立碑墓道其第四兄阿罕岱第五兄阿達海第七兄謨海俱以從征陣亡訥爾特姓瑪佳𨽻鑲黄旗滿洲雅希禪次子也兄恭衮襲父職為輕車都尉尋因獲罪降騎都尉太宗念雅希禪功别授訥爾特為輕車都尉訥爾特初從征明戰勝小凌河由大同入邊攻克小石城既襲職從攻錦州屢敗明兵于松山杏山崇徳中任刑部㕘政兼副都統時左右兩翼㑹兵攻松山城城垂破明兵欲潰圍出訥爾特與䕶軍都統領鰲拜趨塔山南截其歸路至夜明潰卒走塔山遂邀擊之潰卒竄據山巔訥爾特率衆仰攻之大敗走我兵乘勝追躡至海濱溺水死者無算復從征明進軍渾河築梁以濟明將以兵拒于南岸訥爾特擊走之又敗其援兵于三河南我軍下山東將所部兵攻克武定州城師旋將出邊明兵劫我巨礟訥爾特與都統凖塔還擊之破其步卒二營凱旋賜白金五百兩從鄭親王濟爾哈朗攻寧逺明總兵呉三桂以衆來禦力戰殁于陣時年三十有八訥爾時凡弟三人皆先後死事恭衮厯刑部副理事官從征索倫陣亡蓋崇徳四年季弟拉都渾襲恭衮職從攻錦州奮身䧟陣死葢崇徳六年後二年訥爾特復戰殁於寧逺五年之間相繼以忠烈著我太宗甚軫䘏之加贈訥爾特三等輕車都尉以其子訥新襲拉都渾一雲騎尉以其子鄂爾弼襲而恭衮以不待集師輕身嘗敵故不議䘏云多頗囉費英東之孫索海子也崇徳中任佐領順治元年從入闗破流賊論功授騎都尉世職累加一等輕車都尉任䝉古副都統從信郡王多尼征明桂王由榔于雲南由榔奔永昌偽晉王李定國設伏磨盤山山距潞江二十里崖谷峭險林箐蒙宻徑迴曲僅容騎我兵長驅過潞江偵其謀遂入山發火器擊伏卒驚竄相蹂藉死者填塞崖谷定國敗走銅壁闗而多頗囉前驅䧟陣殁喪歸賜祭葬子多禪襲職路什姓納喇𨽻鑲黄旗滿洲崇徳七年從征明至山東兖州先登克其城賜號巴圗魯順治元年以㕘領入闗擊敗流賊李自成再敗之望都二年從英親王阿濟格西𠞰自成扼綏徳以斷其歸路自成兄子錦據延安圍其城七戰皆㨗遂克之錦遁去時自成為豫親王多鐸所敗棄西安南走商州竄入湖廣英親王督兵躡其後至武昌偽侯劉宗敏等率衆拒戰路什與前鋒統領蘇拜擊敗之并俘自成妻孥明年從肅親王豪格西征擊叛將賀珍于漢中攻克鷄頭闗追敗之楚湖遂入四川誅獻忠分兵𠞰其餘黨俘斬甚衆十五年從信郡王多尼進兵貴州討明桂王朱由榔破其將羅大順于黔西州前後遇恩詔及以功叙晉爵至二等男康熙十七年𠞰逆瀋吳三桂率所部兵扼岳陽湖之九馬嘴賊舟猝來犯力戰死之贈一等男兼一雲騎尉子布納海襲巴希姓富察𨽻鑲黄旗滿洲世居訥殷天聰元年以備禦隨我軍攻錦州城中兵出戰我兵迎擊之復驅入城巴希與遊擊覺羅拜山不待我師至衝入敵陣遂戰没八年贈二等㕘領同旗名巴圗姓𤓰爾佳世居哈達隨征寧逺時陣亡贈佐領覺羅阿賴景祖曽孫也天聰八年從征明擊薊州步兵奮勇深入陣亡贈佐領世職葉中額姓瓜爾佳𨽻鑲黄旗滿洲世居訥殷國初來歸隨征烏拉戰没其孫哈什庫亦以䕶軍從征陣亡贈七品官昻錦𨽻鑲黄旗滿洲天聰八年隨征大同攻王家莊城先登有功崇徳元年同征瓦爾喀部落多俘獲尋管義州官田獲糧甚多又同副都統阿拉善設伏擊敗明寧逺兵順治元年隨豫親王多鐸南征破流賊平定河南俱有功我軍進攻潼闗有賊自山上來犯奮力迎擊中箭陣亡三年贈佐領同旗名旦岱世居葉赫屢以戰功授佐領從擊明經畧洪承疇軍陣亡贈㕘領世職烏爾格𨽻鑲黄旗滿洲圗爾格子也崇徳二年隨征皮島率舟師渡海先登因後無應援遂力戰殁贈佐領世職瑚宻什姓佟佳𨽻鑲黄旗滿洲崇徳三年隨武英郡王阿濟格征明設伏燕京擊敗明騎兵五百戰通州遵化保定皆有功五年隨睿親王多爾衮圍錦州左翼兵遇敵瑚密什身先士卒擊敗敵兵又敗杏山騎兵生擒九人屢著功績順治元年隨入闗擊敗賊將唐通兵於一片石又追賊至安肅慶都斬馘甚多每出兵瑚密什輒為前哨叙功加佐領世職三年南征同鄂碩前驅至江南之句容屢敗敵兵又隨貝勒博洛進征浙江至杭州擊明大學士馬士英軍至錢塘江擊總兵方國安中鎗殁贈二等㕘領世職巴林姓𤓰爾佳𨽻鑲黄旗滿洲世居索尼崇徳三年從貝勒岳託征明以雲梯攻深州先登陣亡四年贈佐領世職托紐姓富察𨽻鑲黄旗滿洲父辛泰天聰時屢立軍功授佐領托紐襲職崇徳三年隨征明入邊敗明兵至渾河為橋以渡復擊敵有功及出邊復敗明兵之來追者順治元年從入闗擊流賊中巨礟殁二年加贈如例烏庫𨽻鑲黄旗滿洲世居寧古塔以地為姓祖僧格國初來歸父聶紐克崇徳時從征杏山錦州皆有功烏庫於順治初隨征浙江舟山敗偽伯阮思等之衆十二年隨征福建海賊鄭成功攻厦門賊船六百餘排列城堡嶴烏庫率水師奮勇前擊逼厦門岸中傷殁贈三等輕車都尉從弟多博叔色鈕克子也襲職管佐領康煕十三年逆藩耿精忠反犯江西多博隨征至撫州鍾家嶺遇賊萬餘拒敵多博奮勇進戰中礟陣亡贈加一雲騎尉哈爾罕姓佟佳𨽻鑲黄旗滿洲世居嘉哈崇徳六年隨征明圍錦州松山兵來犯刼我巨礟哈爾罕擊敗之順治元年隨入闗破流賊二年追賊至陜西延安率甲士四十人守南山有賊來犯駐守兵敗因同正白旗敖賓力戰不退受傷而殁三年贈佐領世職同旗有古朗阿順治三年從征四川流賊張獻忠陣亡贈雲騎尉正黄旗滿洲赫臣姓伊爾根覺羅先世居瓦爾喀太祖時率族屬來歸授職為佐領𨽻正黄旗滿洲從征烏拉有功奉使葉赫抗節不屈被害太祖既滅葉赫索得害赫臣者授其子克宜福俾手刃之以祭台弼善姓札庫塔𨽻正黄旗滿洲努山第二兄也初監遊牧天命三年從征明攻撫順瑪哈丹村四年攻界藩皆有功及攻珊延哈達豐濟堡俱轉戰得優等功我兵遇明兵於喀爾圗滸衆皆退台弼善獨冒矢石直前進取平樂堡以第二人登天聰三年隨征明與明經畧袁崇煥兵遇力戰陣亡贈佐領喀喇𨽻正黄旗滿洲屢從征戰有功官佐領尋賜號巴圗魯在十扎爾固齊之列及征葉赫叙功授副將與明總兵劉綎戰於阿布達哩岡身被七創勝之卒以傷没順治時追諡恭襄子扎福尼阿福尼皆有戰功崇徳六年阿福尼以首先衝陣破明洪承疇軍得懋賞尋亦以傷卒松阿哩姓興佳𨽻正黄旗滿洲國初從征扎庫塔哈屯中傷沒追贈如例子鄂能崇徳時從攻明松山錦州及山東屢立戰功順治中鎮守奉天滿達理姓納喇𨽻正黄旗滿洲官佐領從攻遼陽力戰殁於陣巴雅爾圗姓民覺羅𨽻正黄旗滿洲世居葉赫初以戰功授遊擊天命十一年從攻寧逺陣亡以其子阿賽著有軍功贈三等男爵那葢姓𤓰爾佳𨽻正黄旗滿洲世居蘇完官備禦天命十年隨攻旅順口奮力登城陣亡加贈遊擊康熙二年追叙軍功加三等男爵覺羅阿克善𨽻正黄旗滿洲景祖兄索長阿三世孫也天聰時即在行間宣力崇徳六年以㕘領隨我軍征錦州敗明總兵呉三桂兵及松山杏山援軍又連敗明經畧洪承疇兵授雲騎尉世職八年鄭親王濟爾哈朗征明寧逺分兵攻前屯衛阿克善先登克其城晉騎都尉順治元年隨睿親王多爾衮入山海闗擊敗流賊李自成叙功加一雲騎尉七年擢正黄旗滿洲副都統兼工部侍郎十一年隨征湖廣敗賊於湘潭常徳龍陽十三年貝子濟度征海賊鄭成功阿克善率本旗兵從至烏龍江以水險難渡乃潛取道山間徑趨福州偵知賊船三百餘尚泊烏龍江阿克善自由水路約星鼐等陸路合擊追至江口斬偽都督總兵等俘獲甚衆明年賊犯羅源縣我駐防兵被圍阿克善率兵赴援遇賊力戰陣亡十六年三月特加恩䘏晉三等輕車都尉世職子塞克森襲彰屯姓瑪佳𨽻正黄旗滿洲世居薩哈官佐領天聰元年從征朝鮮崇徳七年從攻錦州皆有功順治元年從攻前屯衛中傷而亡加贈二等㕘領額爾希根𨽻正黄旗滿洲以功授備禦天聰二年從克錦州擢遊擊三年從征明燕京至薊州遇明兵力戰陣亡贈雲騎尉達蘭𨽻正黄旗滿洲天聰三年從征明攻永平遵化皆先登崇徳元年從征朝鮮乘夜以雲梯襲南漢山城奮勇前進殁於陣二年論平朝鮮功加贈佐領世職固三姓哲爾徳𨽻正黄旗滿洲世居烏拉官佐領天聰三年從征明擊􅃰州援兵敗之崇徳元年征朝鮮殁於陣贈佐領瓦爾哈姓薩克達𨽻正黄旗滿洲世居瑚爾哈天聰五年隨征大凌河陣亡授雲騎尉蘇爾修姓那木都魯𨽻正黄旗滿洲世居綏芬官佐領從征烏拉受傷至天聰九年卒弟阿爾修襲職崇徳四年叙功加一雲騎尉是年從征薩哈連烏拉陣亡加世職三等㕘領瓦音布𨽻正黄旗滿洲崇徳元年從征朝鮮取義州以第二人登城克之六年從攻明經畧洪承疇軍執纛䧟陣被傷殁贈雲騎尉編珠𨽻正黄旗滿洲崇徳初從征明山東有功授雲騎尉順治二年駐防東昌因擊土賊陣亡贈騎都尉舒寧額姓扎庫塔𨽻正黄旗滿洲努山族弟也初管佐領事崇徳二年從征明攻灤城先登明軍門盧象昇率兵來戰舒寧額獨衝入陣遂戰没崇徳五年贈佐領世職族弟祜紐賜號巴圗魯以軍功授佐領順治三年征山東土冦戰殁于平邑贈加一雲騎尉阿喇穆姓𤓰爾佳𨽻正黄旗滿洲世居蘇完安珠瑚父也任佐領以招降阿舒墨爾根人衆有功又從大軍戰于珊延哈達松山察哈爾寧逺等處身被重傷三十餘處得功牌賞賚最多順治元年入闗追𠞰流冦力戰陣亡贈雲騎尉賽弼圗姓𤓰爾佳𨽻正黄旗滿洲世居三姓父禪禇于崇徳四年從征薩哈連烏拉力戰身中九鎗卒破之論功授佐領世職賽弼圗每從征奮勇争先遍身鎗痕竟以傷發卒豐達禮𨽻正黄旗滿洲崇徳四年隨征索倫力戰陣亡覺羅碩爾昆𨽻正黄旗滿洲世居葉赫崇徳七年隨征明圍錦州城中兵忽出衝陣碩爾昆被傷而殁贈雲騎尉費揚珠𨽻正黄旗滿洲世居寧古塔以地為姓崇徳三年從征明至山東攻夏津以第二人先登順治初駐防東昌進𠞰土賊中鎗殁加授佐領世職和圗姓圗什哩𨽻正黄旗滿洲世居黑龍江崇徳三年從征明攻山東滕縣陣亡追贈佐領孫積善於康熙十六年從𠞰逆藩呉三桂戰殁於四川保寧傅察姓鈕祜禄𨽻正黄旗滿洲世居吉林崇徳三年從征明攻山東滕縣首先登城因後無繼者遂墜堞而殁追贈佐領瓦延住姓寧古塔𨽻正黄旗滿洲世居瑚爾哈崇徳三年從征明山東有功順治初駐防東昌因擊土賊殁於陣贈騎都尉鄂兑姓納喇𨽻正黄旗滿洲世居哈達滿達爾漢之姪瑪福塔次子也初從征瓦爾喀多俘獲後同征額勒岳索額赫庫楞亦有功授佐領世職崇徳六年圍錦州松山明經畧洪承疇援兵駐於山下鄂兑率兵進戰陣歿從弟曰阿哈丹滿達爾漢長子也亦以出征陣殁贈各如例費揚古𨽻正黄旗滿洲崇徳時從征明錦州及攻山東皆在事有功順治十一年從征廣東至電白賊將馬雄等來犯費揚古率衆力戰䧟陣殁贈雲騎尉阿什譚姓瑪佳𨽻正黄旗滿洲崇徳七年攻錦州奮勇䧟陣八年攻明前屯衛以紅衣礟擊其城阿什譚於城闕處先登被傷而殁贈佐領特庫音姓𤓰爾佳世居蘇完崇徳八年從征明燕京以雲梯攻新安縣先登殁贈佐領烏珠克圗姓吉哩𨽻正黄旗滿洲世居沾泥崇徳八年從征明至山東以雲梯攻泗水奮勇先登殁於城上贈佐領又同旗能格姓赫舍哩順治六年隨征大同叛鎮姜瓖殁於陣贈雲騎尉又有格布額姓扎庫塔世居哈哩村從征至烏札拉孔果力戰陣亡贈如例特穆徳格𨽻正黄旗滿洲國初以其部屬來歸崇徳七年從征明錦州執降明之蒙古戮於城外有訥木奇者乗馬衝入睿親王多爾衮營特穆徳格迎而擒之兩相抱持被刺身死又同旗烏海天聰三年從征明攻遵化越衆先登陣亡又有覺羅拉達天聰三年從征明燕京遇薊州步兵力戰殁於陣甄特姓民覺羅𨽻正黄旗滿洲世居長白山崇徳五年從征明以火礟擊松山城將䧟㑹日暮罷攻明守將金國鳯連夜以繩繫木覆土塞之比明城復完固我師進攻不能入甄特挺身奮登殁於城上追贈佐領邁圗姓納喇𨽻正黄旗滿洲崇徳時以啟心郎從征明攻錦州陣亡乂有石賽姓𤓰爾佳以攻秀巖城陣亡贈佐領貴三姓哲爾徳𨽻正黄旗滿洲世居烏拉國初從征索爾和陣亡贈三等㕘領同時陣亡者都敏姓民覺羅世居棟鄂贈備禦世職又同旗有覺羅巴雅爾圗世居琿春初管佐領崇徳二年從征朝鮮旋往皮島率兩舟師渡海與敵戰因後隊兵退無援獨率衆登岸力戰遂殁於陣贈遊擊又有阿鈕以佐領駐防寧古塔因朝鮮叛率衆往攻中鎗陣殁索寧姓他塔拉𨽻正黄旗滿洲其先係察哈爾䝉古從恩格徳禮來歸崇徳八年從征明至山東攻萊蕪首先登城克之賜號巴圗魯尋以圍大同攻渾源州中礟殁贈三等子爵子巴圗於康熙十七年從征逆藩呉三桂戰殁於洞庭濟山努山第四弟也初任佐領崇徳六年從圍錦州破明經畧洪承疇軍蒙賜鏹順治元年從豫親王多鐸破流賊平定河南至潼闗有賊自山來犯擊敗之回軍時殿後賊復犯我軍者三皆敗之又同李率泰等招撫二州五縣二年從貝勒博洛征浙江至杭州招撫府州縣凡九尋擢副都統駐防蘇州時賊黄蜚等約城内賊夾擊我師濟山同武巴海進擊四戰俱敗之後敵復大至中礟殁於陣加贈騎都尉兼一雲騎尉宜爾格徳努山族子也任佐領崇徳五年太宗命薩穆什喀等往征瑚爾哈部宜爾格徳率九十人助之克鐸陳阿薩津二城有斬馘順治元年擢工部理事官五年從征江西叛鎮金聲桓時賊以七萬衆來拒宜爾格徳同我師奮擊破之賊復連犯我汛地俱擊却之至信豐縣敗賊兵二萬於山嶺論功屢遇恩詔加一等輕車都尉兼一雲騎尉十二年從征偽秦王孫可望於岔路口擊賊陣亡贈三等男那爾泰姓烏魯𨽻正黄旗滿洲世居葉赫布恕庫父也自幼從征天聰崇徳間屢立戰功順治六年征大同叛鎮姜瓖戰没時其二子噶達渾那什庫亦在行間並奮鬭殁正白旗滿洲達音布姓他塔拉𨽻正白旗滿洲世居扎庫穆天命三年來歸我太祖四征不庭所至輒為前哨殺敵無算前後積戰功加世職至三等總兵官天命八年有䝉古喀爾喀扎嚕特部昻安貝勒執我使者送葉赫被殺太祖怒命貝勒阿巴泰等統兵征之達音布從行庚辰乘夜疾馳明日平明渡遼河縱兵急進達音布率精鋭五十人先至額爾格勒知為昻安所屬遂畧地而前馳百餘里進攻昻安攜妻子引牛車而遁時㕘將雅希禪博爾晉引三十餘騎下馬伺之達音布亦引十餘騎以俟昻安直衝達音布達音布與戰擊敗之復出衆前引滿將射昻安從者乗發矢時執小鎗迎刺達音布中口墮馬創甚死焉錫罕隸正白旗滿洲世居棟鄂以地為氏父倫布以所部四百人歸太祖賜名魯克素錫罕其長子也授世職為騎都尉天命七年蒙古貝勒卓哩克圗部人有叛逃者錫罕追及之殲焉天聰元年從大貝勒阿敏征朝鮮進攻三塔率八十人先驅遇敵戰殁太宗深惜之晉世職二等輕車都尉子鄂碩見人物錫爾泰錫罕弟也初任佐領在十六章京之列以戰績授遊擊世職天命六年從征明取瀋陽明總兵陳䇿統兵三萬營於黄山聞我兵進攻瀋陽遂渡渾河來援太祖即遣右翼四旗兵進戰久之不退復令後軍往助錫爾泰與焉擊射衝突而入明兵敗走追至渾河陣斬總兵陳䇿等而錫爾泰同布哈郎格等以先登力戰亦殁焉其長子拉都於崇徳五年七年兩從圍錦州皆有功寧逺之役往窺敵塹陣亡其弟巴都順治元年隨入闗先登敗流賊又敗之慶都叙績累加授㕘領世職五年從征福建戰殁於羅源贈一等輕車都尉又一雲騎尉巴都哩𨽻正白旗滿洲世居佟佳以地為氏天命元年同伊弟䝉阿圗來歸授總兵世職巴都哩有才能屢立戰功十年從攻明旅順口克敵有功天聰三年從征明攻遵化先登太宗親以金巵賜酒七年任禮部承政八年隨征明畧錦州還征科爾沁七月甲戌太宗在大同貝勒阿巴泰等遣使奏言我兵攻王家莊城時禮部承政巴篤哩督衆力戰攻城被創不退中箭而亡時太宗方飲聞之即罷飲曰此舊臣也効力多年為之泣下贈副都統順治十三年世祖追念開國功臣賜諡敏壯立碑墓道拜姓佟佳𨽻正白旗滿洲屢以軍功任副都統兼禮部承政會同索海征瓦蘭喀路我師失利拜與譚布力戰敗之師還索海曰此譚布與拜兩虎將之力也太宗乃加賞二人順治二年從豫親王多鐸平定河南江南並在行間有功六年攻大同叛鎮姜瓖陣亡加騎都尉世職新泰姓覺爾察𨽻正白旗滿洲父阿巴泰歸我太祖任佐領因擊巴雅拉部圗勒申受傷而卒新泰其長子也屢從征伐積軍功至遊擊厯任䕶軍統領天命十一年攻寧逺力戰陣亡順治元年加贈男爵葉陳姓舒穆嚕𨽻正白旗滿洲世居珠舍哩國初來歸太祖遇之甚厚以妹妻之稱為額駙從征哈達時奮勇力戰陣亡贈㕘將弟葉錫亦於珠舍哩之戰被創而殁錫佛𨽻正白旗滿洲任㕘領天命六年隨征明攻瀋陽於正藍旗所轄汛守遇敵力戰陣亡授備禦世職又同旗屯泰征明至山東奮勇跳城中傷殁卓爾糾姓托和羅𨽻正白旗滿洲世居瑚爾哈天聰三年從征明燕京往運草束遇敵力戰陣亡子圗那屢著戰功晉職輕車都尉順治十六年從征偽晉王李定國力戰陣殁贈一等輕車都尉瑚碩布姓佟佳𨽻正白旗滿洲達爾漢第五子也初襲職為騎都尉天聰五年從征大凌河陣亡加贈雲騎尉羅洛科𨽻正白旗滿洲隨攻沙嶺有功授佐領崇徳二年因征皮島殁於陣同旗有佐領翁克天聰六年從征明錦州力戰陣亡又有佐領覺羅阿特達征寧古塔陣亡其子錫拉圗亦官㕘領崇徳二年在皮島戰殁又有弼雅達亦以佐領從征朝鮮陣殁音達呼齊𨽻正白旗滿洲早從征伐屢立戰功天聰三年從征明攻遵化奮勇登城中傷而殁贈佐領又同旗多理善天聰三年從征明由大同入邊攻堡陣殁贈佐領世職又有琿達善天聰三年從征明至薊州遇敵陣亡又有喀爾哈那天聰八年隨征明山西至大同力戰陣亡麥色姓那木都魯𨽻正白旗滿洲康果禮次子也世為綏芬屯長天聰時以章京從征塔山陣亡希福𨽻正白旗滿洲官㕘領天聰間屢有軍功崇徳七年從克錦州任左翼帥防守山城敵來犯射退之敵又攻我正藍旗汛地往助擊之及再戰遂殁於陣贈輕車都尉瑚什布𨽻正白旗滿洲天聰八年從征明圍大同攻克闗廂復奮勇進攻中火礟而殁加贈騎都尉珠三姓李佳𨽻正白旗滿洲世居札庫穆初任佐領屢著軍功崇徳二年從攻皮島首先乘舟渡海迎敵我後軍失援登岸戰殁加贈至輕車都尉弟努三從攻大同戰没於五臺又我軍攻皮島時同旗陣没者曰拜台珠覺羅雍貴𨽻正白旗滿洲崇徳三年從征明擊通州兵敗之五年圍錦州擊敗松山杏山兵七年擊敗明經畧洪承疇軍八年進攻前屯衛先登殁贈佐領羅多理姓佟佳𨽻正白旗滿洲世居扎庫穆崇徳五年從征明圍錦州七年擊松山兵皆有功順治初從平陜西江南福建屢戰皆捷六年從征叛鎮姜瓖圍大同中創而殁贈騎都尉又同旗瑚通格姓奇塔拉世居長白山崇徳八年從征明山東攻臨清先登環堞而戰没于陣贈佐領特坤達音布第三子也國初屢從征伐有功累官一等侍衛崇徳七年從征明圍錦州攻明經畧洪承疇第三營軍力戰陣亡贈佐領世職甘塔哈𨽻正白旗滿洲崇徳中屢著軍功順治五年隨征山東曹縣土宼攻城時中火礟殁贈雲騎尉子噶思海亦以從𠞰逆藩呉三桂戰没于永興格布庫姓民覺羅𨽻正白旗滿洲崇徳時即宣力戎行順治元年入闗擊流賊追至慶都殲之授佐領三年隨𠞰流賊張獻忠于四川㑹正藍旗兵被賊所困往援中箭殁于陣贈騎都尉子衛赫亦以𠞰逆藩呉三桂戰没于湖廣之彛陵斡泰姓𤓰爾佳𨽻正白旗滿洲崇徳時即在行間効力順治二年追流賊至揚子江遇賊船先登擒之被重創五年征山東土賊陣亡贈雲騎尉又同旗岱納姓巴雅爾屢從征伐有功順治二年南征攻楊州奮勇先登中傷殁贈佐領嘉隆阿姓𤓰爾佳𨽻正白旗滿洲世居松花江兄曰噶布拉崇徳時從攻明山東屢有戰績加授佐領嘉隆阿初征黑龍江即有功順治二年擊流賊于延安以殿後身中十二鎗力戰陣殁贈世職三等輕車都尉哈爾巴姓民覺羅𨽻正白旗滿洲崇徳時即屢從征伐順治元年從入闗五年從征南將軍譚泰征江西叛鎮金聲桓以雲梯攻九江先登賜號巴圗魯屢加授一等輕車都尉十一年從征福建海賊鄭成功賊兵十餘萬來奪我巨礟哈爾巴隨我師擊敗之又連敗其衆旋攻海澄縣中鎗殁贈一等輕車都尉同旗舍格以征𠞰逆藩呉三桂戰没于江西吉安鄂爾布𨽻正白旗滿洲崇徳七年隨征明錦州有功順治十六年在福建厦門遇海賊鄭成功兵力戰陣亡贈雲騎尉達爾布姓烏札拉𨽻正白旗滿洲世居黑龍江崇徳間早從征討屢立軍功擢㕘領順治九年敬謹親王尼堪戰没于衡州達爾布力戰中礟殁正紅旗滿洲烏爾昆𨽻正紅旗滿洲以備禦從太祖克遼瀋有功授遊擊世職後駐防海州稱職加授二等㕘將天聰三年攻薊州被創卒其孫科魁順治中從征湖廣浙江屢立戰功色勒布姓烏扎拉𨽻正紅旗滿洲父薩鈕于太祖時來歸色勒布其次子也崇徳二年襲職順治元年從入闗擊流冦于潼闗屢敗其衆二年從征江南攻江隂中巨礟殁贈三等㕘領其兄之子曰莫羅渾初襲父赫頁諾佐領職順治時平定杭州紹興及福建廣東皆有功加世職二等輕車都尉康熙十七年進攻海澄殁于陣岳樂順𨽻正紅旗滿洲天聰七年以㕘領從攻明旅順口奮勇先登力戰陣亡屢贈二等輕車都尉世職輝山𨽻正紅旗滿洲崇徳三年任兵部理事官六年隨征明圍松山順治元年隨追流冦至潼闗三戰三敗之師旋殿後被創殁于軍贈雲騎尉布達理𨽻正紅旗滿洲崇徳三年征明敗敵于邊外六年從擊明經畧洪承疇軍敗之順治元年從入闗追流冦師抵潼闗屢敗賊衆五年隨征江西叛鎮金聲桓敗賊于湖口其黨以七萬衆來薄我營中箭殁于陣贈世職騎都尉烏納哈賴𨽻正紅旗滿洲崇徳五年從征明圍錦州困松山乘夜刦敵敗明兵于寧逺二年隨征至江南屢有戰功以攻江隂中礟殁贈世職三等㕘領伊明阿𨽻正紅旗滿洲崇徳三年隨征明攻松山城中傷殁于城下同旗覺羅蘭泰崇徳六年復征明圍錦州在松山力戰陣亡額貝𨽻正紅旗滿洲崇徳六年從征明圍錦州擊敗松山兵七年從征寧逺有斬獲八年隨征明攻薊州及濠中礟殁贈佐領世職貴穆臣𨽻正紅旗滿洲崇徳八年從征明至山東攻郯城先登殁贈佐領世職阿納海姓佟佳𨽻正紅旗滿洲岱松阿子也崇徳時効力行間襲佐領世職管㕘領事順治元年隨南征流冦三年隨征四川皆有功十八年隨征山東賊渠喬玉季於連山賊乘夜劫我營奮力拒敵身中三十二創殁于陣加世職三等輕車都尉石賴𨽻正紅旗滿洲崇徳時即在行間宣力順治元年十一月從南征平定河南江南二年征浙江攻嘉興先登有功再攻崑山中火礟殁䘏贈如例同旗達魯哈順治元年從入闗征流冦累有戰功二年至江南攻江隂中礟陣亡贈雲騎尉世職留哈𨽻正紅旗滿洲順治元年從入闗追𠞰流賊至涿州松蘿店陣亡贈佐領世職同旗鄂哈順治元年從入闗擊流賊力戰陣亡康熙二十年追贈䕶軍㕘領又有巴揚阿順治三年從征四川流冦張獻忠陣没莫洛姓阿顔覺羅𨽻正紅旗滿洲世居長白山順治初任刑部理事官康熙六年擢都察院左副都御史七年擢山西陜西總督有惠政九年陞刑部尚書十二年逆藩呉三桂反十三年正月大軍由陜西進征以莫洛為經畧駐西安尋加武英殿大學士莫洛駐兵寧羌州南教塲會提督王輔臣叛猝攻莫洛營莫洛親率兵併力射却之既而輔臣身自督戰衆遂復攻礟矢齊發莫洛中鎗死所部官員筆帖式等死者甚衆賜祭葬諡忠愍欽定盛京通志卷八十四
