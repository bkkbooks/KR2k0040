body:
  text: 古蹟四奉天吉林黒龍江境内明衛所地面考欽定四庫全書欽定盛京通志卷一百三古蹟奉天吉林黑龍江境内明衛所地面考謹案明時邊境其東北盡於開原鐵嶺永樂初仿唐羈縻州之制設立各衛空名而明實錄明㑹典諸書遂載至四百五十有八衛雖案年臚叙類皆支離附㑹毫無足據不特明之疆土本無此廣逺即其所置各衛大抵傳聞約畧好為誇大其辭以炫耀一時耳㳟閲實錄天命三年我太祖初舉伐明諭降撫順城按今撫順在承徳縣東八十里明人於此設闗其邊境止此已可概見且如清河靉陽寛甸諸堡皆近接鹻厰鳯凰等城而東海之窩集部長白山之納殷路明人未嘗稍涉其境又何能越寧古塔黒龍江而悉置衛所程站耶乃當時載筆者強為臆説妄事鋪張所謂扣槃之見徒為識者嗤鄙至其對音舛訛不可枚舉爰博考山川疆域依義譯改並於各衛下分條加案詳晰糾正而明實錄諸書之不足傳信益因之可見焉窩集衛窩集國語解見吉林山川卷舊訛兀者今譯改明實録永樂元年部長錫揚哈舒什哈進馬置窩集衛以錫揚哈為指揮舒什哈為指揮同知案漢魏之沃沮元之烏者吾者明之兀者其部族不一而地甚廣袤以音與地求之葢即窩集也國初名東海窩集部所屬有瑚爾哈赫濟赫寜古塔等路並詳城池卷窩集左衛明實録永樂二年置以部長托克托和為指揮同知窩集右衛明實録永樂二年置以部長諾海為指揮同知窩集後衛明實録永樂二年置以部長徹伯爾為指揮同知畢哩衛明實録永樂三年置錫勒們衛錫勒們國語解見吉林山川卷有二舊訛失里緜又有二一訛失里木一訛細木今並譯改明實錄永樂三年置九年以部人哈陞格為指揮使案吉林城西南八百九千餘里有錫勒們河此衛與下哈勒琿衛同置地亦相近哈勒琿衛哈勒琿國語解見吉林山川卷舊訛虎爾文又有一訛阿兒温今並譯改明實録永樂三年置以部人綽爾布鼐額爾吉納等為指揮等官案吉林城西南九百里有地名哈勒琿穆敦有哈勒琿河即温水河也薩里衛䝉古語薩里地弩也舊訛撒力又有二訛撒里今並譯改明實録永樂三年置以巴萌等處部人茂義等為指揮僉事在案寜古塔域東北六百五十里有巴蘭窩集混同江北又吉林有巴蘭河巴蘭屯又有薩里屯當即是也並詳山川卷齊巴噶衛䝉古語齊巴噶棗也有二舊訛赤不罕又訛赤卜罕今並譯改明實録永樂三年䝉古部人實爾哈岱爾来朝置衛以實爾哈岱爾為指揮屯河衛屯國語解見吉林山川卷明實録永樂三年置案屯河在寜古塔東北詳見山川卷安河衛安國語解見黒龍江山川卷明實錄永樂三年置案安河在呼倫布雨爾北七百十里詳見山川卷摩琳衛摩琳國語解見吉林山川卷舊訛毛隣元史作木隣今譯改明實錄永樂三年置案摩琳山摩琳河俱在吉林東北解見山川卷堅河衛明實録永樂三年置糾案輿地志無此河名惟墨爾根城西有河音與相近又寧古塔城東四里有珊延河亦有作商堅河或山明人誤截稱一字耳珊延國語解見吉林川卷右城衞明實録永樂三年置以部長哈清阿為指揮喀穆河衛舊訛古賁今譯改明實録永樂四年置案喀穆河在呼倫布雨爾北三百四十里塔山衛明實録永樂四年置以部長達拉齊為指揮案塔山在開原城東二十五里明時北闗所在又布爾徳庫蘇巴爾罕山上有塔山皆葉赫國地明時又嘗以衛都督授哈達部主葢哈達強時葉赫嘗屬之耳塔山衛按之當係葉赫之塔山額音楚衛額音楚國語解見闗郵卷舊訛兀也吾今譯改明實録永樂四年二月置以部長多羅為指揮站案自吉林至寧古塔路程九十里至額赫茂九十里至額爾楚站額赫茂國語解見吉林山川卷嘉河衛明實録永樂四年嘉河等處人進馬因置嘉河等三衛案嘉哈河在吉林西南嘉河或即其地耳哈宻衛案哈宻在西部不應遼瀋之東有此地名明實録稱永樂四年因嘉河人進馬與嘉河衛同置其訛舛寳不可詰音又案嘉哈河毗連之地有哈實瑪畢喇或因有緩急致誤亦未可定今姑仍原文並附糾其誤温都衛舊訛斡灘今譯改明實録永樂四年與嘉河同置原作斡灘又訛斡難乃元始興之地即今鄂掄河與嘉河逺不相渉考音興京西一百五十里有赫圖河亦名温都河轉而訛為斡灘耳達喜穆魯衛達喜穆魯國語解見吉林山川卷舊訛達魯木今譯改明實録永樂四年置為葉赫國地部長祝孔額嘗授達喜穆魯衛都督僉事即明時所稱北闗也我太祖於乙未年滅之為考葉赫相近惟達喜穆魯山南為瞻河北葉赫傳聞不審誤倒其音耳蘇完河衛舊訛蘇温今譯改明實録永樂四年二月置考太祖國初有蘇完部我地在吉林惟無此河名或古今異戊子年來歸其故稱也阿蘇江衛明實録永樂四年二月置率賔江衛舊訛速平又倒訛為速江平今並譯改案率賔今渤海府名金史地理志有蘇濵水亦作恤品明一統志作恤品河在建州東南千餘里河已無考以音求之即率賔也弋今聞原東南一百九十餘里有碩賔河與率賔音亦相近疑明人不知碩賔之即為恤品而悞傳在逺地耳碩賔河詳見山川卷吉河衛明實録永樂四年三月置以部人速魯棟阿為指揮考東北河名之有吉字者甚多此未知所屬雙城衛明實録永樂四年七月因温托琿等處部人吉里納入朝置雙城等五衛諸人因市易而来並非部長不必同為一部也薩喇衛薩喇國語解見吉林山川卷有二舊訛撒剌兒又訛失剌今並譯改明實録永樂四年七月置及案薩喇河薩喇站俱在寧古塔西不百里並見山川閻郵卷尼瑪蘭衛尼瑪蘭國語解見奉天府山川卷舊訛亦馬剌今譯改明實録永樂四年七月置考尼瑪蘭河源出納魯窩集西流入蘇子河詳見山川卷圖倫衛圖倫國語觧見吉林城池卷舊訛脱倫今譯改明實録永樂四年七月置案圖倫太祖國初為蘇克素䕶河部地有圖倫城我癸未年攻克之詳見城池卷巴延衛巴延國語解見疆城形勝卷舊訛卜顏今譯改明實録永樂四年七月置案吉林烏拉有巴延阿林巴延畢喇巴延鄂謨巴延站地名不一明時衛名未詳何屬烏拉衛烏拉國語解見建置沿革卷舊訛兀蘭又有二訛兀剌今並譯改明實録永樂四年八月烏拉等處部人竒爾鼐紐爾等來朝置烏拉伊爾托漠費森四衛案太祖國初烏拉圖城在吉林城北七十里泯同江東我癸丑年平其國詳見城池卷伊爾庫魯衛舊訛亦兒古里今譯改東案伊爾庫魯噶珊在寧古塔北托摩河衛托摩國語解見黒龍江山川卷有二舊訛脱木又有一訛嗒木今並譯改案托摩河在黑龍江東北三百七十里見山川卷費森衛有二舊訛福三人訛弗山今並譯改與烏拉衛同置案費森屯在寜古塔東北塞珠倫衛塞珠倫國語解見吉林山川卷有三一訛扎木哈一訛撒只剌明㑹典又訛撒竹籃今並譯改明實録永樂四年八月置以部人鼐爾布哈為指揮五年正月又置塞珠倫河衛九案塞珠倫河在吉林城東南百九十五里詳見山川卷肥河衛明實録永樂四年九月置以圖河錫勒們山等處人為指揮等官案圖河在寧古塔北穆陳河之西錫拉們山在阿勒楚喀城西二百餘里皆無所謂肥河若以圖河之人官於他部更無是理地在邉外數千里明人又安能號令及之其誤葢無從致詰矣穆陳衛穆陳國語解見吉林山川卷舊訛宻陳今譯改明實録永樂四年十月與布爾堪衛同置以部人照齊布哈等為指揮塔案穆陳河在吉林城東南三百十里又寧古城西七十里亦有穆陳河詳見山川卷布爾堪衛舊訛卜剌罕今譯改與穆陳衛同置里案布爾堪河在吉林城南四百七十詳見山川卷扎敦衛舊訛扎童今譯改明實録永樂四年十一月置以部人揚珠布哈等為指揮案齊齊哈爾西六百八十里有扎敦昂阿薩爾滸衛薩爾滸國語解見奉天府山川卷舊訛撒兒忽今譯改明實録永樂四年十一太祖於癸月置考薩爾滸城屬蘇克素䕶河部我未年攻克之詳見城池卷哈達河衛哈達國語解見京城卷舊訛罕荅今譯改明實録永樂四年十一月置案哈國初達河在吉林城西南六百里有哈達國我太祖於己亥年滅之詳見山川卷穆勒肯山衛舊訛木魯漠今譯改明實録永樂四年十二月烏拉等處部人和索哩成格竒納等來朝置衛於搜里之地烏拉等訛吾蘭披里舊訛掃隣今並譯改案穆勒肯河在今吉林東北一千八百里與搜里河相近並無穆勒肯山疑當時以地名傳誤耳窩集前衛舊訛兀者今譯改明實録永樂四年置伊罕河衛伊罕國語解見吉林山川卷舊訛亦罕今譯改明實録永樂四年置案伊罕河在吉林城東北二十五里詳見山川卷拉林河衛拉林國語解見建置沿革卷舊訛納連今譯改明實録永樂四年置案拉林河在吉林城東北二百二十五里詳見山川卷穆楞河衛穆楞䝉古語解見疆域形勝卷舊訛麥蘭又有二一訛木蘭一訛木郎今並譯改明實録永樂四年置五年正月又以部人納尼為指揮案穆楞河在寜古塔城東四百里太祖國初穆楞路屬東海窩集部我於辛亥年征取之並詳山川卷鄂倫衛鄂倫衛語觧見吉林山川卷舊訛斡蘭今譯改明實録永樂四年置六年二月又置沃楞河衛五案鄂倫河在寧古塔城東二千十八里詳見山川卷瑪延山衛瑪延國語解見疆域形勝卷舊訛馬英今譯改明實録永樂四年置案瑪延達巴罕在吉林城南一百餘里圖哷哩山衛圖埒哩國語解見黒龍江山川卷舊訛土魯宇今譯改明實録永樂四年置江案圖哷哩山在黒龍城東詳見山川卷穆克圖哩山衛穆克圖哩國語解見吉林山川卷有二舊訛木塔里又訛沒脱倫今並譯改明實録永樂四年置哩案穆克圖哩山在寧古塔東與烏蘇江相近特林山衛舊訛朶林今譯改明實録永樂四年置案特林窩集在寧古塔境内詳見山川卷雅魯河衛雅魯國語解見黒龍江山川卷舊訛哈里今譯改明實録永樂四年置案雅魯河在齊齊哈爾城東詳見山川卷齊努渾河衛齊努渾國語解見吉林山川卷舊訛喜樂温有三一訛喜剌烏一訛城討温明會典又訛喜速温今並譯改明實録永樂五年五月置齊努渾等十二衛以部人閻成阿等為指揮等官十二月以部人迪陞格為指揮案齊努渾河在吉林城西南五十里詳見山川卷穆霞河衛舊訛木陽又有一訛木興今並譯改明實録永樂五年正月置案穆霞河在吉林境與閻們江相近詳見山川卷海蘭城衛海蘭國語解見建置沿革卷有三舊訛哈蘭又訛哈郎今並譯改明實録永樂五年正月置蘭案海蘭城在寜古塔城北六十里海河北岸詳見城池卷枯凌河衛舊訛可令个譯改明實録永樂五年正月置案枯凌河即大陵河古道今土人猶有枯凌河之稱與老邊河相近烏登河衛烏登國語解見黒龍江山川卷有二舊訛兀的又訛文東今並譯改明實録永樂五年正月置一案烏登河在墨爾根城東南百五十里阿布河衛阿布圖語解見來天府山川卷有二舊訛阿波今譯改明實録永樂五年正月置境案阿布河在寧古塔内詳見山川卷伊穆河衛舊訛依木又有一訛野木今並譯改明實録永樂五年正月二月分置案伊穆河在呼倫布雨爾北詳見山川卷伊努山衛伊努國語解見吉林山川卷有二舊訛亦文今譯改明實録永樂五年正月置案案伊努山在吉林東南一百七十里詳見山川卷阿濟衛有二舊訛阿資又訛阿者今並譯改明實録永樂五年正月置案吉林將軍所轄地名有阿濟莊珠倫河衛珠倫國語解見吉林山川卷有二舊訛甫里又訛弗力今並譯改明實録永樂五年正月置百案珠倫河在寧古塔城東南六餘里詳見山川卷都爾弼衛有二舊訛朶兒必今訛朶兒平今並譯