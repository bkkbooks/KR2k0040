俱詳戴職官卷盛京内務府所牧馬羣凢例用官馬以時選送京師恩賞官兵銀兩附載乾隆元年奉㫖發銀二十萬兩滋息遇官兵吉凶事件以作賞項八年復發銀二十萬兩二十三年將滋息銀兩裁汰所有兵丁賞項改於官項内支領驍騎校吉事賞銀十兩領催前鋒等吉事賞銀八兩馬兵吉事賞銀六兩步兵及匠役吉事賞銀四兩乾隆三十九年奉恩㫖駐防孀婦孤子毎遇吉事俱准賞銀三兩已前曽食餉銀之兵役其子孫現係閑散吉事俱准賞銀二兩凡凶事賞項銀數皆倍之奉天吉林黒龍江各屬俱同欽定盛京通志卷五十二
