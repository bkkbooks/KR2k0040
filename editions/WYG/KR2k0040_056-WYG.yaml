  text: 兵防二吉林將軍所屬員額兵額黑龍江將軍所屬員額兵額各屬戰船盛京牧政附載恩賞官兵銀兩附載欽定四庫全書欽定盛京通志卷五十二兵防二吉林將軍所屬吉林駐防康熈十五年設將軍一員副都統一員原設協領八員佐領十一員驍騎校十一員防禦八員康熈十年將移來庫雅拉人等編設佐領十二員驍騎校十二員十三年添設防禦十五員水師營四品五品官各二員十六年將伊徹人等編設佐領二十六員驍騎校二十六員添設水師營六品官二員二十九年添設佐領七員防禦十四員驍騎校七員三十一年添設佐領六員驍騎校六員並將喀勒喀巴勒瑚人等編設佐領八員驍騎校八員三十八年添設佐領一員驍騎校一員雍正十一年添設鳥鎗營叅領一員佐領八員驍騎校八員乾隆三十年將巴勒瑚錫伯人等編設䝉古協領一員世襲騎都尉八員雲騎尉三十一員恩騎尉三員屬下領滿洲兵二千五百六十三名錫伯兵六十七名巴勒瑚兵三百五十名漢軍兵一百二十名鳥鎗營兵六百七十四名共兵三千七百七十四名其餘所設主事筆帖式等員俱詳載職官卷寧古塔駐防康熈十五年設副都統一員協領二員佐領十二員原設八員康熈三十八年乾隆二十五年兩次共增設四員防禦十二員驍騎校十二員原俱設五員康熈五十二年各増設三員乾隆三十年各増設四員堂左右司筆帖式四員倉筆帖式二員倉官一員教習官二員世襲騎都尉三員雲騎十九員恩騎尉一員屬下領滿洲兵一千四百名白都訥駐防康熈三十一年設副都統一員協領二員佐領十員康熈五十二年増設防禦八員驍騎校十員䝉古佐領二員驍騎校二員康熈四十六年増設辦理䝉古事務委署主事一員乾隆二十六年裁白都訥巡檢改設此員例由京補放堂左右司筆帖式四員倉筆帖式二員繙譯筆帖式二員内䝉古一員教習官二員醫官一員世襲騎都尉一員雲騎尉七員屬下領滿洲兵一千名三姓駐防康熈五十三年設副都統一員協領二員佐領十五員防禦八員雍正十年増設驍騎校十五員佐領驍騎校原俱設四員雍正十年各増設十六員共二十一年移駐拉林各五員倉官一員倉筆帖式二員原設委署協領一員乾隆元年裁改設倉筆帖式二員堂左右司筆帖式四員教習官二員世襲騎都尉三員雲騎尉八員屬下領滿洲兵一千五百二十名阿勒楚喀駐防雍正四年設副都統一員乾隆二十一年増設協領一員佐領七員防禦一員驍騎校六員倉官一員倉筆帖式二員堂左右司筆帖式四員教習官一員世襲雲騎尉二員屬下領滿洲兵四百六名拉林駐防乾隆九年設原設副都統一員乾隆三十四年裁後歸阿勒楚喀副都統兼轄協領一員佐領六員防禦五員驍騎校七員倉官一員倉筆帖式二員筆帖式二員教習官一員世襲騎都尉一員雲騎尉三員屬下領滿洲兵四百六名打牲烏拉駐防初國設總管一員協領二員佐領八員防禦四員驍騎校十一員原設七員乾隆二十四年増設四員倉官一員乾隆二十七年増設筆帖式六員世襲雲騎尉四員屬下領滿洲兵七百名八旗壯丁三千一百二名伊屯駐防雍正五年設佐領二員防禦二員驍騎校四員屬下領滿洲兵二百名鄂摩和索羅駐防佐領一員防禦一員驍騎校一員屬下領滿洲兵一百二十名巴延鄂佛羅邉門在吉林北二百十里以下城國語觧䝉古語觧已見山川池各卷者不另注伊屯邉門在吉林西北一百九十里克爾素邉門在吉林西北四百六十里布爾圗庫蘇巴爾罕邉門在吉林西北五百六十八里以上四邉門毎門各設滿洲防禦一員筆帖式一員兵二十名壯丁共一百五十名黒龍江將軍所属齊齊哈爾駐防康熈三十三年設將軍一員康熈三十八年移駐副都統一員協領八員佐領十六員康熙二十八年増設漢軍佐領二員三十年將逹呼爾人等編設佐領十六員三十一年増設漢軍佐領二員三十三年增設巴勒瑚佐領四員防禦八員驍騎校四十員火器營恭領一員管理驛站六品官二員官莊七品官一員世襲輕車都尉兼雲騎尉一員輕車都尉三員騎都尉兼一雲騎尉一員騎都尉六員雲騎尉六員恩騎尉二員屬下領滿洲馬兵二千九十名領催一百六十名前鋒十名驛站領催二十八名屯領催三名鳥鎗匠三名弓匠二十四名鐵匠三十二名鞍匠二十名水師營康熙二十三年設總管一員四品官二員六品官二員管理造船四品官一員五品官一員六品官一員筆帖式二員屬下設領催八名水手二百六十八名造船領催八名水手三百名墨爾根駐防康熈二十三年設副都統一員協領四員索倫達呼爾佐領十五員漢軍佐領二員雍正五年設防禦八員驍騎校十七員筆帖式四員倉官一員倉筆帖式二員管理官莊七品官一員管理臺站官一員随印筆帖式一員十臺筆帖式十員世襲輕車都尉一員騎都尉兼一雲騎尉一員騎都尉二員雲騎尉八員屬下領滿洲馬兵八百五十六名領催六十八名前鋒四十名屯領催一名鳥鎗匠一名弓匠鐵匠各十五名水師營原設四品官一員乾隆三十六年將軍增海奏裁歸本城協領兼管屬下設領催一名水手四十三名墨龍江駐防康熈二十三年設副都統一員協領四員佐領十六員索倫達呼爾佐領八員漢軍佐領二員防禦八員驍騎校二十六員筆帖式四員倉官一員倉筆帖式二員管理官莊七品官一員世襲騎都尉二員雲騎尉二員恩騎尉一員屬下領滿洲馬兵一千二百九名耕種公田馬兵一百三十五名養育兵一百三十五名乾隆三十六年増設領催一百四名前鋒四十名屯領催四名鳥鎗匠二名弓匠十六名鐵匠二十四名鞍匠二名水師營總管四品官一員五品官二員六品官二員屬下設領催八名水手四百十九名