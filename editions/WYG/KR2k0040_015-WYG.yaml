body:
  text: 欽定四庫全書欽定盛京通志卷十一天章二皇上聖製三陵祭文祭文碑文欽定四庫全書欽定盛京通志卷十一天章二皇上聖製三陵祭文祭永陵文乾隆八年仰惟皇祖瑞啟靈源肇基王迹高山荒作垂景福於無疆積徳累仁裕鴻圖於有永凡我國家萬䙫休明之寶祚皆賴皇祖百年締造之宏規肆是𦕈躬誕膺遺緒睠懐園寢時切瞻依兹循躬祀之彛章肅舉明禋之鉅典峯迴長白念堂構以欽承龍䕶鼎湖撫桮棬而􅅥息伏祈慈鑒尚賜居歆祭永陵文乾隆十九年仰維皇祖光啟鴻圖肇基帝業開先啓後詒謀衍萬禩之休道積慶長申錫耀重光之運顯承丕煥繼述遐昌世徳綦隆發祥彌永洪規締造念祖宗創業之維艱篤祐承庥知子孫守成之不易乃者肅修祀事展禮橋山當星紀之初周值明禋之再舉松楸在望瞻閟殿以興思俎豆維馨佇鼎湖而延企伏祈慈鑒尚賜居歆祭永陵文乾隆四十三年丕圖肇啟高山崇康作之基積悃期申閟殿切遹追之慕際重熈於奕葉報本彌殷緬再莅於昔年撫𠂻猶歉欽惟列祖詒謀有秩佑緒無疆保世樂天逖矣作求之徳錫光篤慶昭哉對越之嚴昔皇祖三詣靈岑致慤而孝思不匱暨藐躬再修殷薦撫時而僾見如親憶展謁以迄今卄四載感深霜露凜承庥於永世億萬年業溯邠岐當時之弧矢毋忘仰遺弓而肅若此日之松雲在望奠禋卣以悽然於戯思積累之維艱纘緒恒勤惕勵幸監觀之孔邇升馨藉達忱誠伏冀聖慈俯垂歆格祭永陵文乾隆四十八年丕圖聿建億齡承佑啟之恩殷薦虔申􅉍嵗積遹追之慕欽惟列祖樂天保世篤祐凝庥迹肇始基復舊邦于一旅業興繼治擴茂緒於三傳高山之敬仰奚窮翼詒載徳明命之光膺有截宣哲垂猷瞻横甸之逶迤溯朔而感同過澗䕃神榆之盤鬱升東而瑞嫓扶桑肅修四謁之儀藉展五年之悃於戯國殷憂而啟聖艱難開必先之模天全付以有家積累􅃡其勤之始尚祈昭鑒俯賜居歆祭福陵文乾隆八年仰惟皇祖仁孝性成智勇天錫盡鯨鯢於朔漠撻伐用張訖聲教於海隅版圖式廊經營締造致千百國歸懐恐後之悃忱積徳累仁啟億萬年悠久無疆之寶祚𦕈躬纘緒念切維新肅舉明禋用申微悃松楸露列望弓劎以增悲榱桷雲開撫几筵而生慕伏祈慈鑒尚賜居歆祭福陵文乾隆十九年仰維皇祖智勇天授仁孝性成膺聖武之姿值經綸之㑹威張撻伐元功垂大統之基道著柔能景命肇維新之運天心克享神器攸歸鴻績冠乎古今聲靈動乎天地藐躬纘緒念切瞻依敬詣橋陵用申祀典隆儀再舉稔櫛風沐雨之勤勞王氣周環瞻虎踞龍蟠之勝勢肅几筵而愾慕望松檟以凝思伏祈慈鑒尚賜居歆祭福陵文乾隆四十三年蘿圖世衍肇基敬溯夫兩京松巘雲封載謁倐逾乎二紀攄纘承之積企藉馨薦以申虔欽惟太祖高皇帝聖武開天英明啟運十三甲始征棟鄂揚義問以常昭二十萬迅掃明師憺神威而無敵分旗拓土遂成徂定之勲製字同文誕受維新之命燕詒罔極鴻構何勤思創業之多艱披實録而惕𠂻倍凜荷垂庥之有裕跂橋陵而結戀彌殷自癸甲疊舉精禋展拜每隨泣下緬遼瀋寔遺光宅慕思更與時深爰將肹蠁之忱用達夙宵之悃於戯隆恩永怙瞻天柱而倍覺穹崇祖武欽繩撫京邑而長懐締造伏祈慈鑒尚賜居歆祭福陵文乾隆四十八年膺符啟宇奮百戰以勤貽奠斚抒忱望三霄而言結欽惟太祖高皇帝神明肇運聖武開天十三甲威憺無前指顧風雲之合五十載徂維求定躬親旄鉞之麾稽實録以摛毫書事則洪規莫罄繪豐功于載斾披圖而舊蹟長新精禋自癸以重申四至還逢紀癸光宅法乾而出震億年彌慎朝乾思宗器之宜陳冊寶敬分藏鎬邑緬帝基之垂裕馨香用虔達軒臺於戲占雲氣於東方統視殷周為倍正紹天庥於右序福偕遼瀋以俱長尚冀恩慈俯垂鑒享祭昭陵文乾隆八年仰維皇祖世徳作求用中建極訏謨炳曜鍾奕䙫之嘉祥大烈光昭啟方來之景運揆文奮武億萬年之寶祚申錫無疆􅈬日瞻雲千百國之人心歸懐恐後載考彛章肇隆躬祀珠丘在望瞻松檟以興哀原廟如新展衣冠而永慕伏祈慈鑒尚賜居歆祭昭陵文乾隆十九年仰維皇祖聖徳開天神靈繼體鴻基式廊經綸彌宇宙之間大烈光昭禮樂備皇王之則内修文教外奮武威億萬年之寶祚宏開千百國之來歸恐後天人恊應中外傾心肆是藐躬誕膺遺緒明禋再舉正逢星紀之周豐鎬重經彌切枌榆之感珠丘伊邇思冠劎以興懐寢廟常新肅几筵而景慕伏祈慈鑒尚賜居歆祭昭陵文乾隆四十三年丕圖敬紹艱難思啟宇之年夙悃長縈􅌉薄企鍾靈之壤惟吉蠲之是享庶陟降之非遥欽惟太宗文皇帝創業詒謀乘時繼志東都式廊席前勲而瑞璽初膺南漢徂征揚我武而堅氷徑度既大畏小懐之悉恊肅凜冠裳爰王謨帝典之攸昭申嚴法守緬昔者杏松轉戰摧枯之烈猶新閲藐躬癸甲升禋追達之誠倍篤山曕隆業鬰葱連十里城闉路指興京愾慕又兩週嵗紀儀載循乎仲序感益切於肇基於戯弓劎如臨定鑒卧碑之勒訓几筵在望還憑雕俎以攄忱伏冀恩慈俯垂歆格祭昭陵文乾隆四十八年山瞻隆業鬰蔥培王氣之原世戴詒謀􅆄蠁致孝思之感欽惟太宗文皇帝創垂裕後繼述乘時北收䝉古之全疆東服朝鮮之故壤掃杏松之堅壘睿略如神擴凌錦之提封赫聲倍震撫軒弓於實勝宣威遵騎射之精啓堯服於長寧由舊謹衣冠之製屬重鐫夫冊寶陪京式永尊藏肅四展夫松楸禋卣藉申僾愾於戯勒訓詞于後嗣卧碑將萬葉為昭追戰蹟于當年立仗則二龍在御庶幾鬷格饗是忱誠祭文祭長白山神文乾隆八年維神天作崇高地鍾靈秀巍峩有象自著神竒寥廓無垠獨涵清淑緬發祥之所自知延祚以無疆朕纘受丕基撫臨寰宇每切懸氷之懼時深水木之思兹當御極八年聿展謁陵鉅典維庶徵之協應爰羣祀之交修特遣耑官用昭殷薦神其黙鑒來格來歆祭遼太祖文乾隆八年朕君臨九有睠念前猷凡歴代之陵園必勤䕶視况遼陽之墟里尤切懐思故每發徳音常行昭告即暫焉駐蹕亦肅明禋今兹御極之八年聿舉謁陵之鉅典維遼太祖奮迹燕雲垂聲朔漠想英明之有素知靈爽之常存典册時披前徽具在山陵入望遺跡依然特遣耑官用申肅薦修一時之俎豆賁異世之松楸神其鑒兹格思無斁祭克勤郡王文乾隆八年粤維體國必資屏翰酬庸首自親賢惟王為王室之英材作天家之良佐遵循廟算奉揚國威屢彰克敵之功聿著經邦之略朕面懐祖徳追念舊勲稽往牒而可徵汗青紀績布長筵以展祀圭瓚流馨靈克有知尚其鑒格祭功臣揚古利文乾隆八年維國家之肇造資豪傑之景從每覽簡編嘗深慨想惟爾功臣揚古利經邦元老翼運英姿出總兵戎入叅帷幄能忘身而為國寔資孝以作忠託肺腑之至親建旗常之偉績朕纘承大業親謁祖陵既申覲光揚烈之懐並舉崇徳報功之典用頒祭醊式布几筵儼壯氣以如生緬成勞之未泯凡兹優渥尚克歆承祭功臣額亦都文乾隆八年我太祖功被蒼垠徳尊黄幄溯自發祥之始實資開國之勲維爾功臣額亦都戰輒冠軍心惟報國摧枯拉朽則目無堅城啓宇開疆而胸餘勝算奮志風雲之表馳聲日月之旁鐘鼎泐銘偉績已標於曩日几筵布告鴻恩再沛於斯時垂史冊以長存想徽猷而未逺靈其歆響悉此褒榮祭功臣費英東文乾隆八年朕眷懐勲舊篤念賢勞維爾功臣費英東盡力先朝宣威外閫性成鯁亮術裕韜鈐經文緯武之兼資附鳯攀鱗而奮迹夙號萬人之敵聿彰九伐之勲兹因六御親巡特此一樽致奠追維祖烈爰思佐命之功逺想英風式勵效忠之志爾靈不昧尚克來歆祭長白山神文乾隆十九年維神極天比峻鎮地無疆象著巍峩表神竒於瑞應勢雄寥廊秉清淑於扶輿鍾王氣之鬰葱休徵畢集奠坤維而鞏固厚徳彌貞緬帝業之肇基荷山靈之篤慶朕纘承丕緒臨撫寰區念凝命之無窮溯發祥之有自肇稱殷禮時已越乎十年載考彛章禮更行於兹歲恭展謁陵之鉅典兼修望秩之隆儀躬薦明禋用申祗敬惟冀根蟠靈壤冠五岳而畢集庥嘉彩煥鴻圖亘萬年而永安磐石神其黙鑒來格來歆祭北鎮醫巫閭山文乾隆十九年維神封自虞廷屹為北鎮建遼陽之屏障厚徳常貞鍾渤海之靈竒祥符丕著緬肇基之王迹懐天作之神功朕纉述鴻圖撫臨區宇望高山而仰止景慕維殷修吉禮以告虔彛章再舉恭展謁陵之鉅典重稽秩祀之隆儀惟靈貺之祗承得庶徵之協應敬承芬苾䖍薦牲醪神其式臨黙為昭格祭遼太祖文乾隆十九年朕君臨寰宇睠念前王紀功徳於曩編每深景慕考謨猷於故里載契光型既遺烈之為昭宜明禋之特舉兹以重循彛典爰啟吉行祗謁舊京興懐徃代惟遼太祖燕雲創業朔漠騰聲闢土開疆一代之英明首出宣威佈惠千秋之靈爽常存特布牲醪用申肅薦䖍陳俎豆期明徳之維馨光賁琬琰儼鴻規之在望神其鑒格歆此苾芬祭賢王祠文乾隆十九年朕惟風雲翊運明徳首建懿親鐘鼎銘勲宗功聿推元祀綸綍致專祠之禮念篤前勞烝嘗隆備物之儀事踰恒典惟王等忠貞素植果毅性成屏翰初分遂作長城之寄桐圭既剖克宣專閫之威或握竒運籌勝决千里或披堅執銳勇冠三軍靖苞蘖於中原掃氛霾於四野用能匡扶締搆翼賛經綸嘉績懋乎先朝聲稱著乎來許朕載巡舊里言考遺謨櫜矢戢干鞏億載太平之業櫛風沐雨緬當年百戰之勤矧在宗傑之壯猷寔切予𠂻之景慕遹觀曼碩用布苾芬於戯帶礪河山展親與酧庸並重旂常日月後先偕疏附同垂松桷有梴式煥維新之象桂樽既飭彌深由舊之懐靈其有知尚克歆格祭遼太祖文乾隆四十三年朕撫馭寰區興懐徃迹備參稽於史牒偉略為昭勤保䕶於陵原明禋岡斁矧遼陽之故壤尤豐邑之初基惟帝創業東方宣威中土聲騰木葉十六州胥𨽻版圖瑞應金鈴二百祀茂延統緒緬英明於在昔知靈爽之常存兹以恭謁橋山心儀垣寢遺徽式仰松楸增異代之光潔薦斯陳芬苾肅專官之典神其鑒只冀克歆予祭北鎮醫巫閭山文乾隆四十三年上陵典鉅兩修告祭於司存秩祀躬親始愜展忱於仰止式隆規而致敬駐清蹕以升馨惟神雄峙冀方靈鍾尾野六重掩抱千尋埓恒嶽之尊三水飛流百里俯滄溟之邇接鬱葱於長白王氣扶輿奠純固於東丹雲峯拱極昔嵗塗循紫塞嵯峨逺跂層椒今兹路出嚴闗肅穆先瞻邃宇冀欽承夫靈貺聿增方望之儀緬靜鎮於神皋特舉庪懸之典神其昭格鑒是苾芬祭長白山文乾隆四十三年維神安土常敦極天比峻闥門俯注鴨江實濬靈源布庫東蟠鵲果宏昭瑞應仰坤維之式奠悠乆無疆緬王迹之肇基誕興有自朕寅承統緒永憶艱難撫兹磐石之模敢忘作山之烈儀隆望祀曾展敬於重臨慕切深禋已淹時於二紀爰卜清秋之吉載抒盥薦之忱祗告靈岑聿循令典惟冀貞符丕煥並五嶽以延祥景祚遐昌亘億齡而翊運神其黙鑒尚克來歆祭松花江神廟文乾隆四十三年恬波永賴障東分鴨緑之支王氣攸鍾拱北衛龍興之脈作廟聿彰夫輪奐展誠宜薦以馨香惟神秉徳靈長導源峻極承闥門而奔注二𣲖交馳遶邊部以朝宗百泉逺滙緬創垂之駿烈安瀾慶億萬斯年覘縈抱於巖城淨練亘三千餘里既乆稽乎秩祀爰特飭夫鳩工棟宇鼎新式妥憑依之宅几筵升侑遥通盻蠁之忱神其黙協滋生宏昭順應崇儀肇舉益符川至以凝符景運綿延常並山高而致享庶兹歆格勿替䖍禋祭渾河神廟文乾隆四十三年濬源納魯靈長溯白嶽之神衍泒英莪迤演永丹邱之脈衛陪都而帶繞式懋垂庥作新廟以翬飛宜隆肇祀惟神績施東土祥著西流鞏護萬年合大梁而滙注縈迴千里達句驪以朝宗仰偉伐於初基勤思渉渭覽恬波於舊國澤緬詒豐朕展謁橋陵䖍崇邃宇值落成而告備爰秩祀以升馨典洽懐柔冀休嘉之黙荷誠昭妥侑期肸蠁之潛孚尚克歆承鑒兹芬苾祭巨流河神廟文乾隆四十三年雙源逺引恬波徵効順之符四望增修肇祀肅薦馨之典啟潤既彰夫勝蹟展誠宜飭夫專祠惟神稟徳靈長施功溥洽衍脈自鄧村以北𣲖合西來通支當鐵嶺之南績宏東注奠安流於沃壤彌覘襟帶之雄資利渉於名津共慶舟梁之便念庥徵之顯著爰美報之䖍申用鳩將作之司秪崇棟宇特舉維親之祀恪奉几筵神其肸蠁時通滋生普被攬璇題之煥采式鑒懐柔眷雕爼之升香丕昭孚佑庶其歆格勿替精禋祭遼太祖文乾隆四十八年惟帝制勝中原肇基東土奮琱戈而創業八部威揚誌金箭以恢疆五京勢鞏仰英靈其如在知神武所由興朕四謁橋山載懐陵邑緬規模於締造史牒詳臚景功徳之昭垂苾芬永祀爰循舊典遣告明禋鑒此潔蠲神其歆格祭北鎮醫巫閭山文乾隆四十八年惟神位鎮冀方功齊恒嶽緬肇封之典望著虞廷叅列宿之精祥鍾尾野永作巖闗之障勢拱幽燕長資靜鎮之庥基凝東北溯昔三申盥薦曾抒仰止於明禋越兹四度經臨復展升馨于邃宇神其右饗庶克來馨祭長白山文乾隆四十八年惟神徳秉安敦功參峻極坤維式奠靈長疏鴨綠之原王迹肇基純固䕶龍興之脈溯作山之餘烈效順無疆隆望祀以垂庥黙欽有相憶昨鑾經三駕典飭司存迨今瞬閲五秋忱殷仰止明禋申薦尚克歆承祭渾河神廟文乾隆四十八年惟神澤著西流功施東土合大梁以滙注靈長千里而遥達句驪而朝宗襟帶兩京之外覽恬波于卜澗溯偉伐于胥原昨以展謁橋山因之虔崇邃宇明禋告備曾紀蹟于穹碑清蹕載臨爰升馨於雕俎用申昭告尚克鑒歆祭巨流河神廟文乾隆四十八年惟神徳秉靈長澤施溥洽到海而㑹同千里有委有原入邊而濬發雙流屢分屢合曩以蹕途莅止飭啟專祠兹因鑾輅經臨載陳芳薦惟冀嫓流泉於豳土清晏常昭培逺脈於珠丘基圖式鞏庶其歆格勿替精禋祭太子河神文乾隆四十八年惟神派分葦峪潤接驪河瞻薩穆以尋源自斡羅而通道兹以陪京展謁蹕路經臨式懐孚佑之靈宜肅明禋之薦溯昔楯車薄伐波臣助囊土之功洎乎綿甲前驅鬭士賈奪橋之勇震先聲於虎驛閘湧銀濤渡勁旅於龍驤濠翻雪浪曩日金城鞏建尚虚秩祀之文即今雕俎虔申特重專員之典庶歆芬苾俯答休嘉碑文渾河神廟碑文渾河神廟者乾隆四十三年勅有司之所崇建也英峩北繞納魯西流縈迴千里之遥演迤三陵之側長源作帶梁河異𣲖以同瀾靈脈扶輿遼澤滙趨而赴壑抱龍興之初地衆水雲從翊鳯舞之陪都恬波鏡淨溯昔造邦撻伐瀕河則諸部先除洎夫作邑經營乘溜則羣材勝用入夜而聨魚陳爰申巴勒達之誅征明而渡龍驤遂奏瀋陽城之捷朕展巡邠土敬謁橋山緬詒燕於宗功黙欽有相飭升馨于蹕路乃詔司空鳩工象闕之東翬翥􅉇霄之上北泉嫓美胥原之流澤孔長兩載落成卜澗之垂庥有裕鐫之翠琰煥以丹綸由地中行益鞏諸萬萬禩如川方至用弼我丕丕基巨流河神廟碑文雙源濬發東西溯達𣲖之連山汊㑹同内外綜全遼之勝廣滋涵于奥壤禮洽無文宏利渉於鳴鸞祜昭有秩惟巨流之演漾襟京邑之浩穣象儷天津靈䟽地脈左通白嶽克爾素北繞以同趨右接潢河科爾沁南來而並軌屢分屢合入邊之支絡可尋有委有源到海而朝宗是戢安市襄平之故績注釋雖疎句驪枸栁之殊稱波瀾莫二我國家龍飛出震燕翼詒豐太宗文皇帝創築開城控洪波而屹鎮聖祖仁皇帝肇興海運資通漕以將輸朕三謁珠丘再過鏡涘緬百年之澄晏祖澤長欽鞏億禩之基圖鴻功斯溥粤以乾隆戊戌秋勅建新祠逮庚子冬司工告竣俯臨浩瀚高挹崚嶒擇爽塏以裁基飾棟梴而妥祀當日師行枕席靡唐宗薪土之勞今兹渡穩舟梁兼鎬邑田疇之利帝鄉賽報歳時之肸蠁潜孚王氣扶輿輔甸之靈長永䕶欽定盛京通志卷十一
