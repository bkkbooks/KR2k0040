body:
  text: 國朝人物三宗室貝勒子公欽定四庫全書欽定盛京通志巻六十七國朝人物三宗室貝勒貝子公誠毅貝勒穆爾哈齊顯祖宣皇帝第二子也性驍勇每遇戰攻輙冐矢石先登䧟陣賜號誠毅嵗乙酉夏四月隨太祖率歩騎五百人征哲陳部值大水遣衆還留八十人前畧地有嘉哈人潛告哲陳部主於是託摩河章嘉巴勒逹薩爾滸界藩五城俱集衆以待我兵既深入見敵衆之驟合也頗有戒心惟穆爾哈齊及近侍延布禄烏凌阿隨太祖直前奮擊射死二十餘人敗其衆敵奔界藩争渡渾河而遁時熱甚太祖少憇起追之穆爾哈齊隨太祖至吉林岡見敗兵五十餘人望山奔竄太祖恐為敵所見去盔纓隠身待之射其前至一人貫脊而殪穆爾哈齊復射殪一人餘悉墜崖死太祖曰今日之役以四人而敗八百衆天助我也天命五年九月以疾卒太祖親往奠之順治十年五月追封多羅貝勒諡勇壯子務逹海以軍功封貝子篤義貝勒巴雅喇顯祖宣皇帝第五子也戊戌年正月太祖命與臺吉禇英征安楚拉庫路有功賜號篤義丁未年四月復奉命征東海窝集部取赫濟赫等三路俘二千人歸天命九年二月卒順治十年五月追封多羅貝勒諡剛果廣畧貝勒禇英太祖髙皇帝第一子也太祖嘗命征安楚拉庫路取屯寨二十餘賜號洪巴圖魯授貝勒丁未年正月同貝勒舒爾哈齊代善率兵往徙東海瓦爾哈部盡收屯寨五百户令侍衛扈爾漢衛之先行烏拉布占泰以衆邀諸路翼日禇英與代善至䇿馬哲衆曰上每有征伐無不以少敵衆今雖未親厯行間我等奉命來等耳爾衆士毋畏昔擒布占泰宥之歸俾主其地為時不乆背恩如故今豈遂不能縳之邪衆士咸奮遂與代善各率兵五百夾擊之敵大敗死者相枕藉於道太祖嘉其勇復賜號廣畧戊申三月征烏拉克其城嵗乙夘閏八月卒安平貝勒杜度禇英第一子也天命六年二月從攻明奉集堡有功封貝勒天聰元年正月從征朝鮮克義州等城師逼平壤其王李倧乞和大貝勒阿敏欲弗許杜度力持不可卒定盟還三年十一月從征至燕京畧通州克張家灣還軍薊州遇明援兵杜度䧟陣殱之傷足尋聞石門驛馬蘭峪等十一城俱叛馳至遵化叛者復歸明兵犯遵化擊却之獲駝馬以千計七年五月明叛帥孔有徳耿仲明來降杜度逆之於鎮江岸追兵不敢近遂䕶歸八年五月駐防海州崇徳元年四月封安平貝勒十二月從征朝鮮䕶輜重後行二年正月將抵臨津江前二日聞氷觧不可渡一夕天大雨雪寒甚氷復凝遂徑渡以狀聞太宗喜曰嘉祥薦至皆天意也嗣與睿親王多爾衮取江華島敗朝鮮水師克其島城三年六月從楊武大將軍岳託由墻子嶺入明境岳託薨於軍遂代將與多爾衮㑹畧山東諸地十六戰皆㨗四年四月凱旋賜馬二駝一銀五千兩八月命掌禮部事九月與阿濟格畧明寕錦地五年六月築城屯田義州嗣聞眀經畧洪承疇率四總兵營於杏山城外杜度偕諸貝勒掩殺至其城壕乃還仍伏兵於寕逺路截明運道獲其米千石復偵知敵騎保松山馳廹之三戰三㨗敵兵遁走六年八月太宗還盛京獨留杜度圍錦州七年六月薨於軍賜祭𦵏雍正二年立碑墓道旌其功貝勒博洛阿巴秦第三子也天聰九年五月大軍由山西伐明愽洛奉命從貝勒多鐸率兵駐寧逺錦州界以為聲援且畧地有功崇徳元年封固山貝子二年四月命議政三年十月太宗親率大軍由義州伐明命從多鐸率䕶軍出寕逺錦州之間將過中後所猝遇明總兵祖大夀兵襲我師後䕶軍統領喀寕阿等且戰且退慱洛麾兵擊却之五年五月随濟爾哈朗等迎䝉古多羅特降人於五里臺擊敗錦州松山杏山兵師還賜良馬一六年八月太宗親征洪承疇於錦州明總兵八員來犯我前鋒軍從阿濟格逐之至塔山盡獲其筆架山積粟我太宗既敗承疇兵明八總兵潛師遁􅀶洛截擊之復同多鐸設伏以待明總兵吳三桂王樸率衆奔髙橋伏起前後夾擊敗之三桂樸僅以身免七年九月同貝子尼堪等駐防錦州順治元年四月隨多爾衮入山海闗破流賊十月晋封多羅貝勒十一月從多鐸南征二年正月破流賊於潼闗四月定河南並有功賜弓一六月多鐸己定南京令􅀶洛等引兵擊明潞王朱常淓於杭州東渡錢塘江潞王窮蹙降浙東西郡縣皆下十月叙功賜金二百兩銀五千兩鞍馬一時明福王朱由崧己滅而唐王朱聿釗復僭號於閩魯王朱以海稱監國於紹興自浙以南尚未歸化三年二月世祖命為征南大將軍往平浙閩五月師扺杭州敵營於錢塘江東岸綿亘二百里我軍無舟楫不得渡忽江沙瀑漲水淺可渉遂䇿馬徑渡敵大驚偽國公方國安盡棄戰艦奔還紹興携魯王走臺州尋入海八月克金華衢州擒斬明蜀王朱盛澧等全浙平分兵由衢州廣信二道趨福建遣圖頼等擊敗偽閣部黄鳴駿兵於仙霞闗遂破浦城攻克建寕延平時明唐王朱聿釗遁走汀州襲㧞其城斬之撫定興化漳泉等府克福州前後破敵二十餘陣降偽總兵以下官一百三十餘員馬歩兵六萬有竒福建平四年二月進師廣東克潮惠等州時聿釗弟聿鐭復僭號廣州遣署兩廣總督佟養甲等率師進勦斬聿鐭廣州平四月班師晉封多羅郡王賜號端重五年大同總兵姜瓖叛代州被困與碩塞往援觧代州圍六年三月敗大同援兵及姜瓖兵擊斬殆盡特晉和碩親王四月賊䧟汾州命為定西大將軍統兵討之五月克復清源交城等五城六月賊圍平陽遣副都統譚布擊敗之賊渡黄河遁七月賊圍絳州遣副都統羅碩等往勦斬二千餘級遂進攻孝義㧞其城又敗賊於夀陽平遥遼州榆社等處九月同滿逹海協攻汾州克之斬偽廵撫姜建勲等盡復所䧟州縣全晉底定八年三月命掌户部事九年三月薨諡曰定十六年十月濟爾哈朗等追議慱洛嘗謟事多爾衮追降多羅貝勒奪諡及碑貝勒杜爾祜杜度第一子也初封輔國公崇徳六年八月太宗圍松山大敗明兵命諸將士截殺明兵之宵遁者杜爾祜在事有功七年從大軍圍錦州六月襲封鎮國公順治元年十一月隨豫親王多鐸南征有功賜金五十兩餘二千兩六月六年隨鄭親王濟爾哈朗平定廣西七年四月凱旋賜銀六百兩八年二月晉封多羅貝勒命議政十二年二月卒諡慤厚貝勒喀爾楚渾岳託第三子也順治元年四月隨睿親王多爾衮定燕京敗流冦李自成于山海闗又追敗其兵于慶都二年二月封鎮國公三年正月隨肅親王豪格西征五月同貝子滿逹海率兵進勦流賊于陜西降偽叅將石國璽等偽官五十二人賊首髙如礪遁守三台山進師圍之豪格用降將周徳昌為内應破平之遂從征四川俱有功六年正月同敬謹親王尼堪討大同叛鎮姜瓖至太原府賊兵由寕武闗迎戰敗之進圍寕武賊乗夜犯我鑲黄鑲紅兩旗營擊走之取右衛城連戰皆㨗是年十月晉封多羅貝勒尋攝理藩院事九年八月卒諡顯榮康熙二十七年聖祖立碑旌之貝子務逹海穆爾哈齊第四子也崇徳元年八月隨睿親王多爾衮伐明攻沙河南和及臨洺闗魏縣並有功三年八月隨岳託伐明敗明兵於開平獲馬五十餘匹同和洛輝等連敗沙河三河兵又敗明兵於渾河岸至趙州復敗之進攻山東克臨清安邱臨淄還軍宻雲俘二千餘人四年八月論功封三等輔國将軍順治元年四月隨多爾衮定燕京尋追流賊至延安城中兵乗夜出拒奮擊破之十月隨豫親王多鐸南征我兵破賊第二營於潼闗賊遁務逹海率兵躡其後斬偽總兵一員二年二月叙定燕京功晉二等輔國將軍三年五月隨多鐸北征蘇尼特部騰吉思克之并敗土謝圖汗及碩雷汗援兵四年六月晉一等輔國将軍九月復晉三等鎮國將軍五年三月率兵駐防漢中六年四月同巴布泰率師往大同代阿濟格討叛鎮姜瓖七年五月命議政八年三月晉固山貝子十一年十二月隨鄭親王子濟度討福建海冦鄭成功中途疾甚命還京卒諡襄敏貝子滿逹海嗣襲代善親王爵改號曰巽代善第七子也天聰二年從大兵圍明錦州邀明杏山軍餉於海上盡取以還崇徳五年九月復從圍錦州擊敗杏山援兵又以礟擊破松山騎隊六年五月封輔國公八月從肅親王豪格駐防松山以本旗兵擊敗敵衆明經畧洪承疇統兵來援從大軍破其三隊承疇兵復來犯力拒之人馬俱被創豪格往援於陣曰爾馬傷矣此有黄馬宜速易之比易馬而敵衆大至鼓勇復擊之殿後而還明縂兵吳三桂依山結營自固領兵往毁其營十一月從多鐸畧寕逺七年從濟爾哈朗伐明俱有功八年八月掌都察院事順治元年四月從多爾衮入山海闗擊破流賊二年勦逐流賊於陜西扼黄河渡克沿邉三城及延安府又追賊至湖廣屡敗之十月晉封固山貝子三年正月從靖逺大將軍豪格征四川破流冦張献忠先令搜勦漢中賊圍髙如礪等於三台山降之川冦悉平六年七月授征西大將軍與兄謙郡王瓦克逹征大同叛鎮姜瓖八月克朔州馬邑降寕武偽縂兵劉偉偽道趙夢龍等九月克汾州府斬偽廵撫姜建勲偽布政使劉秉業十月復平遥太谷兩縣時潞安賊分兵拒沁州又圍遼州遣貝勒拜音圖統領索渾馳赴沁州賊聞風遁遂㧞之趨潞安府偽道胡國鼎來戰擊斬其衆又遣鎮國公漢岱統領希爾根赴遼州擊賊大破之屯留襄垣榆社武鄉皆降是月召還京尋掌吏部事九年二月薨賜祭𦵏如禮諡曰簡立碑紀功十六年十月追謟媚多爾衮奪諡及碑貝子博和託阿巴泰第二子也初封輔國公崇徳元年十二月隨多鐸征朝鮮圍其都城朝鮮王棄國遁守南漢山城進圍之時有瓦爾喀在朝鮮者凡二百户皆來降朝鮮廵撫副將各率兵援南漢山城􅀶和託同尼堪等破走之旋守諸要隘迎擊朝鮮兵五百人㡬盡又有援兵將入南漢山城城中兵亦出應同勞薩武拜等分擊均大敗之自是朝鮮王聲援俱絶太宗統大將軍親征朝鮮遂降三年九月多爾衮伐明自董家口東入畧燕京西六府逹山西界四年三月師還賜銀二千兩六年三月圍錦州同多爾衮駐杏山七年七月代父阿巴泰戍錦州八年六月隨父阿巴泰伐明分路踏邉㑹師於延慶州九月畧保定至安州師還賜銀三千兩十月與輔國公芬古更畨駐防錦州順治元年四月隨睿親王多爾衮入山海闗破流賊有功十月晉封固山貝子五年九月卒諡温良貝子穆爾祜杜度第二子也天聰九年五月大軍由山西入明邉命隨多鐸率偏師駐寕逺錦州之間以制明兵之援山西者仍畧地獲馬二百匹攻克一臺封輔國公順治元年十一月随多鐸西征破流賊李自成於潼闗身先䧟陣拔兩營我前鋒兵從近山設伏有賊自山後來襲穆爾祜又連敗其衆賊遁走二年二月封三等鎮國将軍三年正月晋一等鎮國將軍五月随多鐸北征騰吉思敗之并擊破土謝圖汗及碩雷汗援兵復封輔國公六年正月大同縂兵姜瓖叛奉命同敬謹親王尼堪等率兵討之敗賊於寕武闗并破左衛兵十月封固山貝子卒貝子特爾祜杜度第三子也崇徳四年八月封輔國公六年随大兵圍明錦州連戰於松山杏山間有功順治元年四月隨多爾衮入山海闗破流賊追至慶都又敗之十一月隨多鐸南征敗流賊于潼闗封輔國公十月厯叙随征功賜金五十兩銀二千兩六年十月封固山貝子十五年二月卒諡恪僖鎮國公阿拜太祖髙皇帝第三子也天命十年與弟塔拜巴布泰統兵征瑚爾哈部俘其衆以還太祖迎勞而宴之授備禦陞三等副將崇徳三年五月任吏部承政尋封鎮國將軍復率兵往錦州南乳峯山駐防順治四年晉二等鎮國將軍五年卒追封鎮國公諡勤敏塔拜以征瑚爾哈功授逰擊世職累封三等輔國將軍卒順治間追封輔國公諡慤厚鎮國公巴布泰太祖髙皇帝第九子也天命十年十月同兄阿拜塔拜征東海北路瑚爾哈部有功十一年八月初設十六大臣命理正黄旗事天聰四年五月罷職八年四月授三等副将順治元年四月從多爾衮定燕京同都統譚泰用步戰擊敗流冦追至慶都復連敗之二年二月晉一等奉國将軍三年征湖廣叛冦有功四年九月晉三等輔國将軍尋封輔國公六年四月同務逹海率兵征大同叛鎮姜瓖八年三月晉封鎮國公十二年正月卒諡恪僖鎮國公屯齊顯祖宣皇帝曾孫贈貝勒圖倫第二子也崇徳元年五月随阿濟格率師伐明有功四年五月隨濟爾哈朗畧明錦州松杏等處九戰九勝時屯齊被創功最於賞格外加賜銀百兩八月封輔國公六年三月隨濟爾哈朗攻明塔山十月随多爾衮圍明錦州順治元年十月封固山貝子隨多鐸破流冦平陜西定河南並有功二年四月賜圓補紗衣一襲五月從多鐸下江寕明福王朱由崧遁走太平與尼堪等率兵追之至蕪湖就擒十月凱旋賜金百兩銀五千兩鞍馬一三年正月随豪格西征五月同尼堪破流賊賀珍觧漢中圍時二隻虎孫守法䧟興安進師至漢隂賊遁去遂復興安五年四月命為平西大将軍同漢岱率兵討陜西叛囬平之九月攝鑲藍旗事十二月同瓦克逹往就阿濟格軍駐防大同六年十月晋封多羅貝勒九年七月随定逺大将軍尼堪征明桂王朱由榔於湖南十一月尼堪戰沒遂代為定逺大將軍督師進勦十年六月進攻偽安西王李定國於永州至則定國己度龍虎闗遁去遂進師寳􅂟至周家坡遇偽将軍馮㕠禮白文選馬進忠等率衆四萬據山扼險以抗我師㑹日暮天雨列陣相拒是夜偽秦王孫可望自寳􅂟以兵來合衆號十萬屯齊分兵縱擊大破之師還追論尼堪戰沒坐罪削爵十二年八月叙功復授鎮國公品級旋封鎮國公康熙二年六月卒輔國公芬古顯祖宣皇帝孫舒爾哈齊第八子也天聰五年八月随太宗伐明抵大凌河令諸将士分門而軍芬古率本旗兵圍南城之西浚壕築塹㫁明兵出入採汲俱絶時太宗聞阿濟格敗明兵於松山將幸其營甫行大凌河城内兵突出來犯芬古等率師夾擊大敗之九月令軍士偽為援兵自錦州至者以誘城内兵距城十里礟聲不絶厮卒執旗幟向錦州馳騁城内縂兵祖大夀望見之以為果援兵也統衆出至西南隅攻軍臺芬古等率兵迎擊大夀敗入城閉門不敢出七年六月詔問諸貝勒大臣用兵宜何先芬古奏言我軍蓄鋭已乆其勢可用宜即進明邉毁其城堡戮力進取何憂事之無成八年五月大軍征察哈爾芬古領前隊六月率師進明邉獨石口七月攻克長安嶺殺其城守備入保安州謁太宗於應州城九年五月大軍伐明别營於寕逺錦州之間制明援兵以多鐸為帥芬古從崇徳元年五月伐明入長城是年冬從征朝鮮俱有功封固山貝子四年五月坐取外藩䝉古銀罪削爵八月復封輔國公六年八月大軍圍松山明兵夜遁芬古率所部追擊大破之七年十月随阿巴泰伐明至黄崖口芬古與譚㤗等兩路夾攻邉口遂克其城八年十月駐防錦州十二月卒子尚善襲封輔國公尚善從征河南江南雲貴湖廣屡著戰功晋封多羅貝勒順治十年五月贈如其爵諡請定輔國公瑪瞻代善第六子也天聰元年大兵畧明山西邉郡命随多鐸率兵入寕逺錦州界牽制明兵使不得援山西崇徳元年封輔國公随阿濟格等伐明克十二城而還三年随岳託伐明由北京至山東所向皆㨗尋卒於軍欽定盛京通志巻六十七
