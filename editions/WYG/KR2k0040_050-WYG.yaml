body:
  text: 官署奉天将軍所屬各城公署吉林将軍所屬各城公署黒龍江将軍所屬各城公署欽定四庫全書欽定盛京通志卷四十六官署二奉天將軍所屬各城興京城守公署在城内敎場在城外遼陽州城守公署在城内倉在城内大街南康熈三十二年建二十間雍正六年七年城守觀音保捐建二十四間敎場在城外盖平城守公署在城内街東倉在城内二十間康熈三十二年建乾隆四十二年増建十間敎場在東門外牛莊城守公署在城内倉在城内二十間雍正十一年建乾隆三十年増建三十間敎場在城外開原城守公署在城東隅倉在城内二十五間康熈二十一年建二十間乾隆三十年増建五間敎場在城外熊岳副都統公署在城内大街東城守公署在城内倉十間雍正十一年建乾隆三十年増建十間敎場在城外復州城守公署在城内東街倉在城内西北隅十六間雍正十二年建十間乾隆四十二年増修六間敎場在南門外寜海即金州城守公署在城南東街倉在城内西北隅十五間康熈四十四年旂人捐建五間乾隆三十年増建十間敎場在城外東北二里岫巖城城守公署在城内東街倉在舊城内正東二十一間康熈四十四年旂人捐建七間五十三年増建七間雍正元年又増建七間敎場在城外鳯凰城城守公署在城内倉在城内東北隅二十四間康熈四十年建十間乾隆三十年増建十四間敎場在城外錦州副都統公署在北門路東倉在城東北隅康熈三十二年建城守公署在城東南大街路北倉在城内東北隅六十五間康熈三十一年建二十間雍正二年増建四十五間敎場東門外路南義州城守公署在城内倉在城内東北隅二十五間乾隆六年建敎場在城外寜逺州佐領公署在城内倉二十間在城西北隅雍正五年建中前所佐領公署在城内中後所佐領公署在城内廣寜協領公署南門西街路北倉在城内西北三十間乾隆六年建敎場小南門外路東吉林將軍所屬各城吉林将軍公署大堂五間後堂七間户兵刑工四司房共十八間㸔守銀庫印庫房三間巡更房四間各營辦事房共五間檔房三間前鋒房三間燒荒營虎鎗營房五間八旂聴事房十間土地祠一間儀門一座大門三間康熈十五年建住房六十四間乾隆三十年重修乾隆十九御書天年奉頒額匾恭懸大堂江鎖鑰皇上東巡有林将軍署詩恭載御製駐蹕吉天章門倉康熈二十八年于城西沿江建二十間三十九年増建二十間四十三年官兵于城北隅捐修六十間雍正六年修義倉二十四間八年又修義倉二十四間現今存太平倉六十間永寧倉六十四間共一百二十四間又義倉一百零三間庫銀庫印庫各二間康熈十五年建軍器庫二間棉甲庫三間鳥鎗庫一間雍正十年建演武㕔五間在北門外康熈四十九年官兵捐建監獄十五間在署内御史公署十五間雍正六年設副都統公署共四十二間鼓樓三間祭器樓二間貯物房八間庫火藥庫三間顔料庫三十間龍船房十九間鷹房六間黑牛房六間八旂弓匠房十六間鐡匠房十七間理事同知公署共一十八間原係永吉州知州公署乾隆十二年裁永吉州改為同知公署巡檢公署共八間原係吏目公署乾隆十二年裁吏目改為巡檢公署監獄六間税房三間官参局二十七間原係理事通判公署乾隆二十七年裁通判改為官参局火藥局六間乾隆四十四年建官房二百八間乾隆三十年八旂官兵捐建八旂堆房共二十三間寜古塔副都統公署大堂五間二堂五間左右司房各四間前鋒營及虎鎗營房共六間儀門三間大門三間内宅住房三十七間倉康熈三十五年建三十五間四十八年増建三十九間雍正五年増建義倉十間現實存官倉四十間義倉三十二間庫印庫一間銀庫三間貂皮庫三間雍正四年建演武㕔五間監獄五間鼓樓三間貯物房八間官参局二十二間乾隆二十八年建八旂弓匠鐡匠房六間火藥庫一間税房一間鷹房三間白都訥副都統公署大堂五間二堂五間左右司房各三間住房二十五間儀門一座大門五間前鋒燒荒營虎鎗營房共六間八旂辦事房六間土地祠一間康熈三十二年建倉城東南隅康熈三十二年建十間五十六年建十間雍正六年建十間義倉十六間雍正五年官兵捐建六間十年官兵捐建十間現實存廣積倉三十間義倉二十六間庫在公署内銀庫印庫各二間康熈三十二年官兵捐建監獄三間在署右演武㕔三間鼓樓二間貯物房四間税房二間八旂弓匠鐡匠房共六間火藥庫二間辦理䝉古事務委署主事公署共十六間原係巡檢公署乾隆二十六年裁巡檢改為主事公署三姓副都統公署大堂五間二堂五間左右司房各三間八旂辦事房八間前鋒營及虎鎗營房共八間檔子房三間内宅住房二十二間儀門一座大門五間雍正十年建倉城東南隅康熈三十二年官兵捐建三十間雍正六年建義倉四間十二年捐建十六間現今存永豐倉六十間義倉二十間庫銀庫二間印庫一間雍正六年官兵捐建乾隆四十一年重修増建一間以偹存貯棉甲監獄三間演武㕔三間鼓樓二間貯物房三間税房三間鷹房五間阿勒楚喀副都統公署大堂五間儀門一座左右司房各三間前鋒房三間八旂辦事房四間内宅住房三十六間大門三間雍正六年建倉原建一百二十間乾隆三十二年奉裁六十間雍正六年旂兵捐建義倉五間乾隆十二年増建五間三十二年増建十間三十九年奉裁七間現實存官倉六十間義倉十三間庫銀庫印庫各二間監獄十間演武㕔三間鼓樓一間貯物房三間税房三間琿春協領公署大堂五間大門一間辦事房三間檔子房三間康熈五十三年建義倉五間雍正六年官兵捐建乾隆三十二年増建十間庫一間演武㕔三間打牲烏拉御史公署二所在城東門内總管公署大堂五間二堂五間檔子房三間八旂辦事房十間倉新城南門外共八十三間康熈四十六年建現今存五十間銀庫一間貯魚房三間貯蜂蜜房三間拉林協領公署大堂五間二堂五間左右司房各三間辦事房八間原係副都統公署乾隆三十四年裁副都統改為協領公署原有内宅住房三十六間今裁倉原建一百二十間乾隆三十年奉裁六十間又旂兵原建義倉三間乾隆三十二年増建三間三十七年増建七間演武㕔三間棉甲庫二間鼓樓五間貯物房三間税房二間黒龍江將軍所屬各城齊齊哈爾将軍公署在城内康熈三十八年設大堂五間後堂五間堂司房三間戸刑兵工四司房各三間㸔守銀庫房各三間檔子房三間倉司房二間内宅住房二十四間廂房五間儀門三間大門七間倉貯米倉二十間在署内大堂東貯榖倉一百九十六間在城外西南半里乾隆年間叠次増減現實存備倉二百九十五間公倉七十五間庫銀庫三間印庫二間在大堂東貯船上應用器物庫房共二十五間在城西南九里監獄六間演武㕔三間在城外軍器樓六間在大堂西鳥鎗樓二間礟局十五間在東門内貯無敵大將軍礟房三間貯神威将軍礟房六間貯子母礟房六間火藥局三間鉛子􅐨麻房五間鐡匠房五間在東門内弓匠房五間在東門内貯貢物房三間貯麵房三間覊候所在西門内税課司一間在南門外御史公署在城内東南共九間雍正元年設乾隆十二年裁副都統公署共十六間墨爾根副都統公署在城内康熈二十九年設為将軍公署四十九年改為墨爾根副都統公署大堂五間堂司房一間户刑兵工四司房各三間倉司二間檔子房二間内宅住房十六間儀門一間大門三間倉康熈三十五年初建貯米倉十五間左署内貯穀倉一百八十六間在南門外半里乾隆年間叠次増減現今存備用倉二百三十四間公倉一百五間庫銀庫二間印庫二間在署内貯船上應用器物庫六間在北門外演武㕔三間左城南半里税課司一間在南門外軍器樓在署内礟局五間城内東北火藥局三間在城東二里黒龍江副都統公署在城内原係将軍公署康熈三十九年将軍移駐墨爾根改為副都統公署大堂五間堂司房二間户刑兵工四司房各二間檔子房一間倉房二間内宅住房十六間儀門五間大門三間倉貯米倉十五間在署内貯谷倉二百十三間在城南二里現今存偹倉四百二十三間公倉八十間庫銀庫印庫各一間演武㕔三間在城西北軍器礟房十間在署内鳥鎗房二間火藥局三間雍正十一年重建鉛子􅐨麻房三間税課司一間在北門外呼倫布雨爾總管公署大堂五間左右司房各四間大門三間軍器房二十六間鳥鎗房二間火藥房三間鉛子􅐨麻房三間呼蘭城守尉公署大堂五間二堂五間左右司房各三間㸔守銀庫房二間儀門一間大門三間倉乾隆六年以後陸續建盖共三百九十間銀庫二間軍器房二間布特哈總管公署共七間軍器樓三間火藥房一間博爾多副總管公署共七間欽定盛京通志卷四十六
