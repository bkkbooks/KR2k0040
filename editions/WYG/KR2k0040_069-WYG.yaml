body:
  text: 國朝人物一宗室諸王欽定四庫全書欽定盛京通志卷六十五國朝人物一宗室諸王武功郡王禮敦景祖翼皇帝第一子也初肇祖原皇帝於蘓克素䕶河部之呼蘭哈達擒斬讐人開基赫圖阿拉地三傳興祖直皇帝有子六分築六城環衛而居並稱寧古塔貝勒第四子為景祖翼皇帝居赫圖阿拉城禮敦為顯祖宣皇帝之兄生而英勇當六城並建時近地部落中有額色納者生九子俱强悍又有嘉瑚者生七子俱輕捷多力嘗身披重鎧連躍九牛二族恃其强侵陵諸路禮敦從景祖率諸貝勒往征盡滅之收服五嶺東蘓克素䕶河西二百里内諸部由此國益強盛以禮敦戰功居最號曰巴圖魯其後諸族人或嗜利召外侮或搆兵釀内憂太祖髙皇帝備嘗艱險討誅尼堪外蘭乃得國中帖服而禮敦時已早沒追溯翼運功宗莫出其右子貝和齊克承先志敬事太祖太祖建都遼陽後進征廣寧命貝和齊與宗室鐸弼等統兵留守遼陽嗣命貝和齊等奉移祖陵於東京城之陽魯山禮敦祔葬陵旁太祖文皇帝天聰時以貝和齊長子色勒為正藍旗都統崇徳元年四月追封禮敦為武功郡王配饗太廟世祖章皇帝順治四年七月録武功郡王孫席賚等均授佐領以色勒有軍功所得騎都尉晉一等男十五年九月敬移東京祖陵於興京奉安永陵禮敦亦遷祔永陵旁聖祖仁皇帝康熙二十一年三十七年親詣興京恭謁永陵命大臣詣武功郡王墓酧酒五十六年八月念武功郡王後裔未有顯秩特擢其第三世孫侍衛吉禮為㪚秩大臣並命予世襲乾隆十九年九月皇上駕詣盛京詔以盛京為龍興重地國初諸王功烈懋著宜建祠以酬舊勲而示來許命曰賢王祠春秋致祭以武功郡王入祠原奉載綸諭㫖恭音門四十三年正月復奉諭㫖命史臣立傳以徵信詳慧哲郡王傳先是乾隆八年十九年迨四十三年四十八年上謁永陵皆命大臣酹酒於墓慧哲郡王額爾衮景祖翼皇帝第二子顯祖宣皇帝之兄當太祖髙皇帝未誅尼堪外蘭時覺爾察城阿哈和洛城和洛噶善城尼瑪蘭城章嘉城五城諸族人或嗜利搆兵額爾衮則智慮周達視不善若凂已故得永保令名云卒後無嗣世祖章皇帝順治十年五月追封多羅郡王諡曰慧哲十一年三月配饗太廟與武功郡王禮敦宣獻郡王齋堪通達郡王雅爾哈齊並列東廡乾隆十九年九月入祀盛京賢王祠四十三年正月上諭國史館諸臣曰通達郡王係顯祖之子武功慧哲宣獻三郡王係景祖之子當時雖身預配饗第以宗支而論已在覺羅之列是以宗室王公表傳内未經入傳但思宗室傳既限於支派國史傳又以屬在宗潢令此四王無所附麗亦覺欠缺著交國史館查明四王事實補為立傳列於國史諸大臣傳之前即或當時紀載簡少其功績無由稽核無妨不拘詳畧各立一傳以徵信焉宣獻郡王齋堪景祖翼皇帝三子顯祖宣皇帝之兄當太祖髙皇帝未誅尼堪外蘭時族人有嗜利搆兵者齋堪弗與為伍惟善是務著望老成卒後無嗣世祖章皇帝順治十年五月追封齋堪多羅郡王諡曰宣獻十一年三月配饗太廟與武功郡王禮敦慧哲郡王額爾衮通達郡王雅爾哈齊並列東廡乾隆十九年九月入祀盛京賢王祠四十三年正月命史臣立傳以徴信互詳武功郡王慧哲郡王傳通達郡王雅爾哈齊顯祖宣皇帝第四子與太祖髙皇帝及追封親王舒爾哈齊俱為宣皇后所生舒爾哈齊事蹟見其子鄭親王濟爾哈朗傳雅爾哈齊無嗣其卒年及事蹟舊史不著世祖章皇帝順治十年五月追封多羅郡王諡曰通達十一年三月配饗太廟與武功郡王禮敦慧哲郡王額爾衮宣獻郡王齋堪並列東廡乾隆十九年九月入祀盛京賢王祠詳武功郡王傳四十三年正月命史臣立傳以徴信詳慧哲郡王傳禮親王代善太祖髙皇帝第二子也賦性忠果英勇過人從征哈達輝發葉赫等國論功授貝勒瓦爾喀費優城人苦烏拉國布占泰之虐乞移家歸附丁未歲太祖命與貝勒舒爾哈齊褚英等率兵往徙之乗夜隂晦行見大纛之上有光衆以為異取視無有復樹之光如初舒爾哈齊疑之欲回兵代善曰或吉或凶兆已定吾等何所見而遽還耶遂决意進兵盡収環城屯寨五百户令侍衛扈爾漢䕶之先行布占泰邀諸路不得進次日諸貝勒至代善及褚英各率兵五百分路夾擊大敗之代善從馬上攫貝勒博克多胄而斬之並斬其子生擒貝勒瑚哩佈及常住父子時天大雪敵敗走僵仆斬獲無算太祖嘉其功賜名古英巴圖魯癸丑年正月太祖征布占泰代善從時烏拉三萬人越冨爾哈城而軍諸貝勒大臣皆願戰太祖猶未欲加兵將遣使申諭代善進曰我士飽馬騰利在速戰所慮者布占泰不出耳今彼兵既出平原曠野可一鼓擒也舍此不戰厲兵秣馬將何為耶太祖曰我用兵以來無不身先搏戰但恐貝勒諸大臣㦯致有一二被傷實深惜之爾衆志既孚即可决戰因命進兵代善隨太祖親突陣大敗其兵遂克其城布占泰遁走僅以身免天命元年太祖即帝位授大貝勒四人以代善為首三年四月從太祖伐明㑹天雨欲還軍代善曰因明不道是以興師既臨其境若遽還師將復修和好乎抑相仇怨乎軍行逺地誰能諱之天雖隂雨吾軍皆有禦雨之具且天降此兩以懈明邊將之心是雨利於我不利於彼也太祖善其言遂進兵下撫順等城及堡寨五百餘處大軍已出闗明廣寧總兵張承廕等來追時太宗為四貝勒與代善率兵迎擊之盡殱其衆四年正月命往守扎喀闗二月命大發兵四路來侵太祖率師親征代善先行遂過扎喀闗集兵以待太宗以祀事後至謂界藩山築城夫役宜急防衛代善遂同督兵赴界藩山斬敵衆百人復敗明總兵杜松等於薩爾滸山又明總兵馬林營尚間崖潘宗顔營斐芬山互為犄角太祖命步兵接戰方傳諭敵兵自西突至代善呼曰兵已進矣即怒馬迎戰直入其陣遂敗敵兵明總兵劉綎由寛甸路來侵太宗督兵登岡從上衝擊代善率左翼兵自西夾攻之敵衆披靡劉綎等没于陣八月從伐葉赫代善諭降其西城葉赫平六年三月大軍取明瀋陽明總兵李秉誠以兵來援太宗擊破之代善及貝勒岳託共逐四十里斬馘甚衆十一年八月太祖上賓代善在諸子最長而我太宗功徳隆茂衆望尤屬代善遂與子岳託薩哈璘等作議書言紹承大統必得聖君始能戡亂致治以成一統自顧徳薄願共推戴四貝勒嗣位入朝遍示諸貝勒大臣等衆皆喜太宗辭讓再三代善言益懇切衆議亦堅太宗乃從之天總元年五月率兵攻明錦州圍其城三年十一月從太宗伐明逼燕京敗明應援總兵滿桂等兵殱戮甚衆五年八月我師圍明大凌河城明兵來援敗之生擒監軍張春等春不屈太宗怒欲誅之代善進曰我前此所獲無不収養且此人既以死忠為貴奈何殺之以遂其志乎太宗恱遂赦春崇徳元年四月大封功臣晉代善為和碩兄禮親王十二月從太宗征朝鮮受其降以歸三年二月太宗征喀爾喀同鄭親王濟爾哈朗等留守並監築遼陽都爾弼城八年八月太宗上賓世祖章皇帝嗣位郡王阿達禮及貝子碩託謀立睿親王多爾衮代善發其謀俱伏誅碩託為代善第二子阿達禮則其孫也順治元年朝元旦世祖命上殿毋拜以優異之五年十月薨子滿達海襲是年新定諸王葬費親王例給銀五千世祖以代善功徳懋著特賜萬兩立碑紀功康熙十年五月追諡曰烈復立碑以表於墓乾隆四十三年正月上諭廷臣以禮親王誠心推戴勤勞王室懋著壯猷克昭駿烈其後改封為康親王親賢世胄竟改初封嘉號何以垂詒奕禩示酬庸追本之義宜仍復原稱封號並配享太廟原奉載綸諭音恭音門代善子岳託薩哈璘瓦克達滿達海瑪瞻俱著勲名各有傳鄭親王濟爾哈朗舒爾哈齊第六子也舒爾哈齊顯祖宣皇帝第三子初授貝勒以收瓦爾喀部敗烏拉之衆積功賜號達爾漢巴圖魯辛亥年八月薨順治十年五月追封和碩親王諡曰莊濟爾哈朗幼育於太祖宫中號和碩貝勒天命十一年正月從代善征䝉古五部有功天聰元年四月同貝勒岳託等伐朝鮮及明皮島帥毛文龍大軍薄義州克之遂㧞城安州定州搗毛文龍所居鐵山直逼朝鮮平壤城朝鮮遣使來請和議未决阿敏有異志欲屯種以居因令直趨王京岳託與濟爾哈朗議濟爾哈朗曰兵不可深入聞去此三十里有平山城者可駐兵以待和議之成遂引軍駐平山朝鮮王李倧遣使至議嵗貢許之遂定盟振旅歸五月從太宗伐明攻寧逺城與明總兵滿桂兵遇力戰被創氣彌奮大敗其衆二年五月討䝉古固特搭布囊斬之收其部三年九月同岳託等率兵往畧明錦州寧逺焚其積聚而還十月太宗親統大軍伐明命同岳託攻大安口毁其水門乗夜進城明馬蘭營叅將率兵來援我前鋒軍擊走之比明見明援兵立營山上濟爾哈朗先縱兵往敗其衆追至馬蘭營既而岳託復敗遵化州援兵自辰迄已五戰皆㨗馬蘭等三營俱下引兵趨石門殱明援兵扵道十二月同貝勒阿巴泰等率兵往通州焚其船遂攻張家灣克之四年正月誅叛將劉興祚于山海闗井擒其弟興賢以獻以兵駐永平招降灤州遷安等處三月以貝勒阿敏代之還五年七月初設六部命理刑部事八月從攻大凌河率本旗兵為後應與代善等克臺堡守之十一月截塔山以東邊海隘口有俘獲七年三月命築岫巖城以兵駐守五月與杜度等往迎明降將孔有徳耿仲明扵江上獲明及朝鮮降人以歸八年五月太宗征察哈爾留守盛京十年四月改元崇徳晉封和碩鄭親王十二月太宗征朝鮮復留守三年十月大軍伐明以本旗兵自前屯衛㑹大兵扵中後所克模龍闗及五里堡屯臺四年五月往畧明錦州松山與明兵遇九戰九敗之俘獲甚衆六年三月同阿濟格多鐸等克錦州㨗聞太宗大恱令八門擊鼓召衆扵篤恭殿宣㨗五月又敗明經畧洪承疇兵六萬扵松山北岡八月洪承疇等率兵十三萬來援錦州太宗親統大軍征之命留守九月復從圍錦州十二月承疇以兵六千夜犯正紅正黄兩旗營濟爾哈朗令軍各依汛地沿濠射之敵敗去㑹松山城門閉不得入盡降其衆錦州被圍一年糧盡援絶㑹洪承疇被擒祖大夀乃以城降遂議取寧逺之策四月同多爾衮等率兵攻塔山克之進攻杏山城中懼開門降七年七月賜鞍馬一蟒縀百八年八月世祖章皇帝嗣位以濟爾哈朗與多爾衮輔理國政九月率兵攻寧逺㧞其城並克前屯衛斬總兵李輔明等乘勝取中前所順治元年十月晉封信義輔政叔王賜金千兩銀萬兩縀千疋五年三月貝子屯齊等訐告兩旗大臣謀立豪格濟爾哈朗知而不舉議罪降多羅郡王閏四月復爵九月命為定逺大將軍討湖廣流賊李錦等道出山東勦平曹縣土寇六年八月祗長沙敗賊於湘潭收復府州縣六十餘城擒斬偽王以下文武官以百計湖南貴州悉平七年正月振旅還四月賜金二百兩銀二萬兩嗣以與多爾衮不合罷輔政九年二月晉封叔和碩鄭親王十二年二月上疏言政事大畧言無蔽言路無弛武備恤滿洲官兵疾苦立史官起居注世祖嘉其言五月病劇車駕臨問間有遺言乎泣對曰臣受三朝深恩未能仰荅不勝感痛惟願以取雲貴滅朱由榔統一四海為念且滿洲甚少而能破流冦取京都者應加撫恤世祖垂涕曰天何故不令朕叔長年耶言已大慟詔畫工往圖其像留宫中及薨輟朝七日賜祭葬所給銀兩視定例倍之十四年立碑紀功稱忠冠當時功昭後世云康熙十年六月追諡曰獻乾隆四十三年上諭廷臣以鄭親王後改封簡親王親藩世胄改易原封不足以昭彰闡宗勛襲慶承家之至意著仍稱原封號並配享太廟子濟度扵順治十一年二月授定逺大將軍以平海冦鄭成功有功襲封親王後薨諡曰純饒餘親王阿巴泰太祖髙皇帝第七子也初以戰功封台吉辛亥年秋七月與費英東等率兵征東海窩集部克其二路天命四年六月隨伐明克撫順八年四月太祖命與諸台吉往討喀爾喀扎嚕特部昂安以其執我使送葉赫故昂安傷我前鋒統領岱穆布阿巴泰大怒陣斬昂安父子並從者俘其孥以還以功晉封貝勒天聰元年五月太宗伐明與貝勒杜度居守二年五月命與岳託等率兵墮明錦州城三年十月太宗親統師伐明次老河命與貝勒阿濟格率兵攻龍井闗克之又擊斬明三屯營哨卒抵漢兒莊㑹貝勒多爾衮等降明守將李豐等十二月與濟爾哈朗等率兵略通州焚其船攻張家灣克之復與大貝勒代善等率䕶軍往畧薊州破山海闗援兵五千餘人四年正月克永平與濟爾哈朗鎮守永平三月同薩哈璘援灤州明兵退乃還是年初設六部命理工部事七年六月詔問貝勒大臣用兵宜先伐何國阿巴泰言宜選精兵襲明邊墻則闗門可得大軍屯扵邉外擇諸貝勒將兵分路馳入若獲可用之人送至大寨俾遣入内地則消息愈通錦州無足過慮我兵既入是天時已至令祖大夀入山海闗便可與我兵相㑹合也八月同薩哈璘豪格等畧明山海闗俘獲無算崇徳元年四月叙功封為饒餘貝勒六月伐明分兵三路入會於延慶州九月畧保定至安州凡克十二城敗明兵五十六陣凱旋太宗親往迎之十二月太宗親征朝鮮命駐防噶海城三年二月太宗親征喀爾喀令留守盛京併監築遼陽等城五月修治盛京至遼河大路與多爾衮董其役九月伐明自董家口入守將棄城遁四年四月師還賜馬二匹銀五千兩九月畧明錦州寧逺五年六月與多爾衮等於義州築城屯田七月刈錦州城西禾敗錦州兵與杜度截明運糧兵獲其米千石牲畜百餘而還十二月同多爾衮豪格杜度率兵往代濟爾哈朗等圍錦州六年六月擊敗闗内援兵於松山七年三月同濟爾哈朗等攻杏山以礮擊墮其城降之十月特授奉命大將軍率師伐明直抵兖州府俘魯王朱以􅉽下樂陵等處自濟以東州縣望風降附八年六月班師賜銀萬兩是月又令與諸貝勒分道伐明會師延慶州順治元年四月世祖念開國宗勛晉封多羅饒餘郡王二年正月命為總統率官兵代豪格勦土賊於山東二月遣凖塔等擊賊於徐州賊衆奔潰赴河死者無算三年三月薨諡曰敏尋以子岳樂晉封親王贈如其爵岳樂平江西取湖南勦滅逆藩呉三桂有懋功詳國史傳欽定盛京通志巻六十五
