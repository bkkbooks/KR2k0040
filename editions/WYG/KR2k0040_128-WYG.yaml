body:
  text: 國朝藝文十詩五七言律二欽定四庫全書欽定盛京通志巻一百二十四國朝藝文十詩五七言律二恭和御製吉林土風雜詠十二首甲戌錢陳羣威呼刳來一木自為經絶似蜻蜓著水輕魚鼓雙鬐真欲逝蛇添兩足更能行溪間未覺伊鴉響烟際曽無欵乃聲記得春巡江介路槳人飛渡碧波生呼蘭村村矮竈依擔外縷縷晨炊出孔均幾段栁􅒎邊塞景萬家烟火太平人縱飛雨㸃飄難濕偶指鞭絲數復頻要識馳驅門外客羡他黔突是閒身法喇扒犁幾㸃雪中過澤腹堅時利濟多且喜輕䭾同薄笨任他綵鷁自嵯峨如龕小坐移真便似榻能牽穏不蹉但設茶鐺煨榾柮撚鬚覔句更如何斐蘭纂組由來始一絲童孩嬉戲莫忘之六材徧地能攀取三笴隨宜便改為此日箕裘傳國俗他年弧矢屬家兒聖朝利用威天下小醜真成何所施賽斐功能代箸孰為之古制皆然今亦宜共飯何曽勞澤手嘗羮即此可觀頤出筒乳滴凝雲七候火珠流翻雪匙或恐須他供旰食少陵吟罷冷淘時額林兩版居然著數厨無多筐篋亦堪俱取材未解用無用貯物寧論觚不觚䑕走夜深聲未靜塵封嵗久色㣲烏衰齡擬學吉林俗便置茶經與畫圖施函天質真成材不材虚中蔵器用何恢料量家具添醯甕欵洽朋儕指酒醅自是欂櫨無棄置不須鐵竹更周迴瓦盆留到兒孫大對此應知要善培拉哈茸茸草覆制如綯安堵家家版築勞擣蜃無須煩赤叐刈麻聊用取堅牢摱施貍蠱誰能入向塞寒風􅄼更遭豳館至今仍舊俗短垣比屋及肩髙霞綳以糠為肉以膏塗㧞取麻中照夜需豈必松蘇源明事藜劉向事方代蠟真成茗酪互為奴結雲粲粲光微碧照字熒熒紙不烏東壁餘輝如可合田家燈火本無殊割山韌似桑根漚作箋不須魚網用方便信州翠篠應輸穉逸少蘭亭尚遜堅新様叠畨誇後勁佳名挂漏笑前賢簾紋掲處題天筆恢簡文房要共傳羅丹鹿腕磨光玉可稱畧箋小技所由興衆中投骨聊為樂四色成梟快不勝擊擲相呼施瑩石取携逐隊蹴堅氷兒童俗學軍中戲未許都盧有獨能周斐樺木生來用在皮瓦檐垣牖亦皆為肯同白子惟供燭不似楸枰但列棋匠氏取輕隨所適弓人用薄此猶宜宸章足補冬官記土物洪纎盡得知恭和御製行圍即事元韻甲戌彭啓豐鷹出遼東盧出韓秋原獮狩合圍看乍經谷口霜凝樹前轉峯頭日上竿羣鹿踉蹌迎箭疾野麋儦俟踏泥乾獻禽祗奉慈寧膳衛士從公盡早餐深林密箐屢盤迴闗外蕃王扈從來五色雞冠摇羽幟六飛駿足㨗鈴鋂黄榆不斷周陆合白雁初横秀嶺開虹采蜺旌誰撰賦光瞻宸􅇨倚雲裁封巒紆譎淡鴉青列列裒裒現衆形虎豹牙鬚驚石弩貙膢角距脱山庭天垂罕畢成星象塞茁葭蓬効地靈用洽羣歡數軍實三驅按節志和寧恭和御製輝發故城元韻甲戌彭啟豐跨時岡原氣象雄龍興大業肇闗東背盟適築鯨鯢觀掃蘖親擐甲胄躬落日城垣留斷梗秋風金鐵想臨戎對揚神武恢前烈草昧驅除佑帝𠂻恭和御製恭謁永陵元韻甲戌彭啟豐生民禋祀配天同奕葉貽休裕鎬豐追王禮儀隆一本靈山封號峻三公紫雲松柏蘢葱外丹馭衣冠想像中䟦履不辭程路逺星霜十載厪宸𠂻恭和御製恭謁福陵元韻甲戌彭啟豐柱峯嶻嶭聳亭亭拱衛雲從䕶百靈詄蕩天門開廣宇邐迤玉案鎖層扄真人一旅収區夏王氣千秋曜日星戡亂求寧昌後福撫時重奠露珠零恭和御製恭謁昭陵元韻甲戌彭啟豐丕承髙廟烈光昭蕩掃妖氛邁往朝睿畧臨闗磨片石天戈出塞㨗崇朝羣山鳳舞松環翠太室龍蟠霞建標破陣更看雙石馬西風立仗望非遥恭和御製祭北鎮醫巫閭山元韻甲戌彭啟豐朔方峙鎮日星昭祀典明䖍擇吉朝掩抱六重凌海嶽混濛干載接虞姚芙蓉片片留巖洞華葢垂垂拱薊遼禪草不須芝檢秘鱗洲風雨自均調恭和御製薩爾滸元韻甲戌金徳瑛鴻溝分界近山間十萬憑陵一旅艱天授赤符先定宛師臨白馬遂殱顔紅腥染地痕猶在鐵甲乗髙勢莫攀今日一鞭從下指清秋秀朶㸃人寰恭和御製恭謁永陵元韻甲戌金徳瑛追崇祀禮古今同仁徳相承啟豫豐玉葉一傳開宇宙宗潢分𣲖列王公萬山舞鳳屏前後千里來龍脈正中䖍謁不辭勤䟦渉十年霜露厪宸𠂻恭和御製恭謁福陵元韻甲戌金徳瑛巍巍聖徳載碑亭百世無祧髙廟靈永夜鬼神司禁籞千峯龍象壯門扃天戈一指清遼海大義終伸炳日星正統到今餘澤逺橋山瞻拜涕俱零恭和御製恭謁昭陵元韻甲戌金徳瑛如日方升大烈昭指揮形勢壓前朝燕齊師到無堅壘松杏俘歸只詰朝石馬風雲森仗衛龍衣佛火䕶封標版章式廓符髙帝曕望陵園亦未遥聖駕東巡盛京恭謁祖陵大禮慶成詩甲戌鄭虎文東望陪京瑞靄連肅將祀典帝心䖍舊除輦路三千里重展橋山十二年長白雲開龍虎躍渾河鏡凈日星懸依然豐鎬遺謀在親奉慈宫下九天鑾輿初動駐離宫欵塞降王累譯通赤子肯遺聲教外穹廬胥入版圖中望雲傾日三朝久測水占風萬國同黙數共球懷祖徳升馨應合告豐功馳道風清薦早凉六龍環衛大安旁寢門共仰三朝禮帳殿親承萬壽觴駐蹕山川舒藻繡迎鑾士女話耕桑遥瞻王氣慈顔喜舊識榆枌幸瀋陽永懷弓劍感秋霜茂典重修率舊章陟降神靈通僾愾肅雍禮樂偹鏘洋視奩獻服貽徽逺翼子貽孫衍慶長鯉供河龍芝出桂憑將愛慤致嘉祥犀衣煙聚胃星敷立表鳴鐃縱獵徒吉叶周畋駢六校仁均商網用三驅秋郊農隙嫻軍禮天策兵威曜上都從邁畨夷衆君長一時稽首效嵩呼唐謡夏諺答尊親記取遼陽第二巡陵邑他年還望幸天家無事不宜民九重雨露隨鑾馭四海冠裳㑹紫宸作賦未能慚侍從含毫空想屬車塵恭和御製盛京土風雜詠十二首元韻戊戌王杰威呼政成利濟及杠梁頊槳軒舟制度詳物原頊顓作槳軒轅作舟數斛纔容同小艇幾人恰受比輕航取携到處誇便㨗往返安然迪吉康陶宗儀詩往返迪吉康窽木遺風猶可遡淮南子古人見窽木浮而知為舟載歌汎汎逐波揚呼蘭突黔新故不須遷簷際參差列柱然豐樂情形觀㸑火太平景象騐吹煙覆筐過雨飄難濕増竈連雲竪更堅低拂鞭絲頻指數騰騰如縷復如緜正字通㽋或曰䜌猶圞也取圜完相連之字今竈突烟囱員瓦如竹筒不拆開者是也故俗名之曰㽋法喇澤腹堅時歩歩隨柁牀坐穏任推移雪中覔句騎驢似郊外看書挂角宜且喜裝囊無負戴底愁登渉有欹危補將四載偕橇梮史記夏本紀泥行乗撬注音蹺前漢書溝洫志禹治水山行則梮聖主常深履薄思斐蘭豐岐接壤足丁男孤矢餘威技夙諳七􅆬取材榆栁在三分為羽雉雞堪須知士使辭惟託那及童嬉性所躭轉恨挽强充宿衛干城罝兎佐雄談賽斐曲七傳餐功代箸曽無刻飾素風存儀禮有司徹注䟽匕謂匕柄有刻飾者白抄雲子偏流滑紅挹桃花可勸餐雅稱一瓢資泂酌常充四脯飽黎元秋成省識含哺樂滿甕香生碌碡村額林日色經檐照柍桭文選甘泉賦日月經于抰振注柍於兩切安排家具雜然陳木􅎆見前漢韓信傳器悉雕為樸藎篋見唐元稹詩衣惟故易新枕儿不傳循婦子内則父母舅姑之枕儿不傳注謂移也膳修有閣擬官人内則丈夫七十而有閣注以板為之庋食物也閭閻用物徴蔵富比戸如斯俗自淳施函移根漠野不知年虚受能容本自然跡謝雕剜呈孔竅歐陽修詩茍非神聖親手跡不然孔竅誰雕剜工辭聚僂協規旋荘子達生篇聚僂之中則為之註曲而可以聚物曰聚僂畚筥之類是也小槽夜滴憑開釀豐霤晨喧穏注泉比似陳倉窪作臼幾行獵碣幾多篇拉哈縮版分來幾堵墻草莖麻䕸綴青黄雅言苫葢仍須釋爾雅釋器白葢謂之苫玉篇謂之草覆屋風詠茅綯豈不蘉故里垣墉真見聖後漢書李固傳見堯於墻兹得借翠華東幸兆姓歡迎道左瞻覲墻間因用其語新宫家室夙宜王登馮悉繫遷岐業儉俗留貽肯暫忘霞綳乾資蓬梗潤塗膏午夜青熒民事勞佐讀燃糠師此儉燃糠夜讀見南史顧歡傳成堆燒蠟笑他豪宋㓂凖事藜光豈羡閣中向蓮炬徙誇院裏綯以金蓮炬送歸院見唐書令狐綯傳結就非煙看郁郁卿雲歌調願重􅋵豁山任教名榖復名麻苧絮誰知亦咀華竹膜雲藍還遜巧梅堯臣詩斜封一幅竹膜紙段成式造雲藍紙麥光氷翼敢稱嘉方輿勝覽歙績溪界地名龍鬚出嘉紙有麥光氷翼諸日三韓繡錯容留様五彩毫揮莫門奢試掲簾紋堅似革流傳千載尚矜嗟羅丹堯年擊壤老翁戲今日羅丹婦孺需偃仰分明心不競贏輸計較手恒殊何須棊局彈巾角張華博物志曹丕善彈棊能用手巾角那用骰盆判雉盧宋林希逸竹溪集浮生寵辱渾間事勝負真如射㩉魚注㩉音塌骰采之名倘許千金輕一擲比他駿骨畧同乎周斐堅且多皮宜作室雒常相似並希聞晉書肅填氏傳有樹名雒常若中國有聖帝則其木生皮可衣縱饒風雨能漂瓦借作虹霓與帶棼班固西都賦虹霓迥帶於棼稽北牖除貍灰更灑周官赤叐氏以􅁅灑毒之凡隙屋除其貍蟲南榮攻蠧草添熏剪氏掌除蠧物以莽草熏之梓材未必能差勝騐取今文及古文恭和御製盛京土産雜詠十二首元韻戊戌王杰五榖榖興榖興而章明見國語衍沃慶咸宜嘉種惟聞詠恒音亘之户户龡豳迓田祖村村擊豕賽農師繞明含露堪標目繞明豆含露麥見王嘉拾遺記䟽穖長秱可預期得時之稻踈穖得時之禾長秱見吕氏春秋採冠聖朝符瑞志三巡尚食久嘗其東珠闥門周八十太祖實録長白山之上有潭曰闥門里源深流廣鴨渌混同愛滹三江出焉愛滹江東流入東海上溯璿源逺混同江與鴨渌愛滹三江源出長白山之闥門見京賦御製盛注南粤徒勞録異聞杜光庭録異記火星之精墜於南海為大珠其地為珠池珠厓珠産摩尼多徑寸江通愛滹自三分珍逾海厎擎珊出業比河邊採玉勤想像燭龍銜耀日龍門禹鑿記云云王嘉拾遺記禹鑿龍門至一空巖幽暗不可復行有獸如豕銜夜明之珠其光如燭人葠神臯有草亦名神段氏翁形本軼倫見張讀宣室志黄潤有鬚方獨勝本草遼東參黄潤有鬚俗名黄参獨勝紫團無價亦常珍本草生潞州太行山上謂之紫團参何曽芝术堪為伍唐書元澹傳参术芝桂以防疾疢倘遇靁桐定辨真靁桐是别見宋書謝靈運傳注謂靁公桐君寄語名山採藥者得依福壤即仙人松花玉分派多應自鴨江産來緑玉色無龎敷文應運常騰采奮武當年此受降壓倒紅絲硯譜以青州紅絲石為第一然乃下品特存古物見宋蘇易簡硯譜名第一唐李石續博物志硯譜載天下硯四十餘品以青州紅絲硯為第一刪除黄絡美稱雙端硯譜石有黄臕胞絡鑿之方見硯材所謂子石歙硯亦然拜恩欲誚温公陋淄硯徒傳海岱邦宋熙寧中尚淄硯温公修資治通鑑神宗擇其尤者賜之當時有韞玉黑玉等名見聞見後録貂靡豪柔毳語寧詳靡豪柔毳見謝莊謝賜貂裘表獻自榮區倍覺良周官司裘仲秋獻良裘皮蝡後漢書鮮卑傳貂豽鼲子皮毛柔蝡天下以為名䘮無如慶雲紫劉勰新論紫貂為裘鬰若慶雲品髙尚類吉光黄十洲記天漢三年西國王獻吉光裘色黄葢神馬之類已嗤烏納貪眠穏皮日休詩烏納裘中一覺眠自註出王筠集更笑鸘裘貰酒甞故事挹婁添小賦肯教江總擅詞章後漢書挹婁國出好貂今所謂邑婁貂是也江總華貂賦貴華貂于挹婁鹿伊尼載玉乗佳氣地異頤磨聚作窠圖經蜀郡頤磨山有平地百餘步諸山之鹿一日聚號曰鹿市鳴野正逢秋罷獮此次命暫東巡圍特停行獻鮮仍掌氏稱羅漆原漫擬儦儦賦文囿應輸濯濯多要向停鑾昭瑞應瑞應圖曰王者孝則白鹿見明恵及下則見承先聖法則白鹿來况承聖製定前訛月令上以南苑所育塵于冬至解角始辨麋角解為塵角解御製鹿角解説訂二戴之遺經垂萬年之軌憲熊羆舂山曽見赤熊羆穆天子傳舂山百獸所聚爰有赤熊羆瑞獸也突出深業並見之占獵兆惟欣得佐和丸留與善教兒捕容蔵内一人卧人欲捕者一人卧其蔵内餘伴執仗𨼆在崖側熊輙共舁出人不致傷損傍人仍得騁其矛見異苑逐困羣中五犬支宋陳師道熊説以五犬逐一羆羆長于用大犬長於用小受制于犬者遇非其敵困於羣也欲試佽飛徒手格儀鎗隊裏逞雄竒堪達漢釋鹿從知有力詫他懸肉馬纓然佩雖韘也材偏中角則觷之爾雅角謂之觷注治樸之名工使鎸彄向烏嘷瞻吐月射經出弓弰為懷中吐月控將鷺羽王褒突厥寺碑鷺羽射鵰之箭佐凌烟通天不讓文犀理孕秀含章肯自捐海東青漁陽漠北與荆窠漁陽白漠北白荆窠白並鷹名見酉陽雜俎刷羽東溟又見他認取白花畨部獲遼史蕭奕昔努傳監障海東青鶻獲白花者十三進來青骹遼史部族表興宗熏熙二十一年六月遣使詣五國等四部捕海東青鶻弋人羅甘峻山青骹鷹見舊唐書懿宗紀霜拳玉爪姿何俊絶海摩天力較多化作珴珂章物采尋常爵雉得如麽本草集解海東青即青鵰入海化為珬作馬勒謂之珂鱏鰉魚鱠飛價重東華市生在龍江性恰馴名等秦王原貢錯金史地理志會寧府蔵貢秦王魚大定十二年詔罷之種分淵洞豈常鱗王嘉拾遺記瀛洲東有淵洞有魚長千丈鼻端有角噴水為五色雲翻騰彀弩兼圍網擺脱叉竿與釣緡未待春來供薦鮪早將水畜問􅘋人松子見説松山千嵗松龍牙玉角採常逢羣芳譜新羅使者携松子來有龍牙子王角子味如脱粟嘗來子廣志千嵗松子色黄白味似粟可食形似浮屠望去重俗名松蔀為松塔以其層數多而相隔尺許如擔葢也見西河詩話應候綴條多璀璨得天受氣獨淳濃堅香試問稚川子知是招威未逸蹤黄山俞獻卿見松樹有大實抛石撃落一枚甚堅而香或云抱朴子所謂招威食之可仙見江鄰幾雜志温普譯得嘉名天錫與不教霜果擅東南曽非温桲香堪和蜀人切温桲納衆香燒之不減龍涎見張世南㳺宦紀聞便列崑崙味帶甘山海經甘樝列于崑崙酸笑山樝傖父饋栁宗元詩傖父饋酸樝甜疑崖􅁡苑禽含太平廣記崖蜜櫻桃也輕紅萬顆春無際靈種多經聖澤覃聖駕四詣盛京恭謁祖陵禮成恭紀癸夘和珅仙莊諏吉駕言東虞典時巡紀嵗同天作髙山長近日地雄遼海邁歌風橋陵弓劍尋源逺枌社山河慶澤豐色喜南陽諸父老白頭扶杖屢呼嵩嵗自昭陽洎著雍陪都三度翠華逢祠官珪幣増逾恪芮鞫恩膏沛更濃丹雘鳩工懷嶽瀆金錢給帑鞏垣墉殷殷望幸輿悰切鶴跂鳬趨幾輩從闗城記堠隻還雙白阜逶迤瞰緑江五度星回驂月駟九秋霜肅擁霓幢健行不息符龍徳長發其祥溯駿龎浹嵗綸音宣逷邇早覘佳氣滿紅樁興桓亭館納凉宜智水仁山暑晷移駐輦預籌行輦日孟秋還展仲秋期祗防急漲星郵阻未覺安程日馭遲量谷馬駝徐整蠻属車九九荷恩私王言重巽布郊圻由舊成模永勿違儘有周廬森拱衛不教行殿峙崔巍松雲待譜朱絃奏絲粟寧煩白板扉宵旰經營勤櫛沐萬年家法凜幾微敂闗屬國奉鑾輿萬部櫜鞬列啟胠久見賮琛通捺鉢競看芾舄侍爻閭享王率土恢無外威徳如天鬯有餘九服盡抒葵藿向太平王㑹輳車書平泉紆軫啟清塗風物川原入睿謨居憶施函及周斐行憑法喇與威呼霞綳照夜同然炬帕格占時勝佩符薩爾滸山瞻聖績當年撻伐緬軒孤泰元富媪典原齊縮鬯燔柴聖敬躋特繕壇圻依福壤直從璽冊迓洪禔六宗賅洽隆文秩萬葉靈承故事稽鄭重思文歌克配在天肸蠁契真倪啟運巃嵸秀嶂排星榆如葢䕃堯階一人禄壽偕無量四祖憑依鑒孔皆質傍丹丘真得地珍侔朱果記投懷枝枝葉葉真符拜永䕶神皋騐氣佳一峯天柱切雲開髙廟神靈格享來億萬丕基同奠席十三勍甲想登臺艱難大業誠悠矣愾僾淵𠂻益懋哉形勝三闗遺烈在斐芬碑字泐蒼苔大白權竒小白馴摇鞭籋日捲紅塵當年佐命隨靈鵲此日圖形侣瑞麟績駕唐宗開寳祚典超漢代展精禋千山秀色青如許一曲蒲梢竚降神蔥山蒲海現祥雲琬琰新鐫趩􅞚文實必循名釐重器宜而兼稱補前聞為尊典寳蔵宗祏特遣親支薦苾芬更睹閟宫移景祐從知告孝聖心殷萬世人宗數仞垣肇基鄭重闢橋門後先䋲武真同揆矩度從心自弗諼在昔金聲宣大號至今璧沼瀹靈源鼓鐘振處歌於樂豐鎬由來善教存四庫書成列大觀特從過澗溯波瀾彩涵濉渙騰昭灼𣲖别淄澠障渺漫三院崇文端有自十年蕆事未為難巍峩傑閣臨開宴天禄何須語漢官醫巫閭鎮屹雄闗俯瞰層椒紫翠環祠殿鮮新増舄奕闥門依舊送潺湲錦城滄海憑陵外碧髻青螺縹渺間佑啟由來資巨岳落成望秩額題顔北溟方位渺雲烟特飭鳩工煥彩堧勢控歸墟環紫甸象符建斗拱珠躔遼渾縈帶靈交滙渤澥朝宗脈逺延尺咫恩光霄漢接連簃金碧並申䖍展親録舊玉音昭六等崇封爵並邀帶礪從今垂億禩旂常自昔冠羣僚姓兼同異交成泰食配烝嘗永勿祧親駐華旃親賜酹一時感激遍金貂金湯新築亘峯􅉾十八城連逺近郊形俯川原兼斥堠制殊復穴鞏桑苞地靈葱鬰森千堞天險崢嶸冠二崤更發水衡修叠道輪蹄南朔往來交琱弧躬挽甲躬韜彞器摩挲詎憚勞綃帳求衣頻側席葛燈披讀幾焚膏降原黙對神功懋覩物彌欽儉徳髙百戰山河餘慕切親提三尺翦蓬蒿鵷行肅穆聴鳴珂崇政祥開紫殿峩雲日瞻來欣地近絲綸捧處拜恩多十亭二木期無𨼆萬國千官頌有那喜起更看歌世徳林林曲􅎽遍鑾坡如雲秋稼溢篝車玉􅋴經臨眷物華未有灑除勤里巷頻仍蠲減到桑麻千箱儲後豐年屢四鬴量來解澤加總為開基崇力穡豳風圖畫掞天葩振振袀服效戎行楚楚青衿迓道旁景福一時歌既飽作人千古仰為章分頒大府兼金重拜捧天家束帛將文治武功臻極盛丕揚謨烈纉重光衢歌雜遝和蕭笙聮襼扶鳩迓翠旌喜祝三多綿後甲歡承十賚譜由庚盈箱白粲醲膏溥出笥文縑燠日晴樂利養恬承祖徳無疆壽宇慶芸生金戺銀鋪列畫扃舊宫遺制法清寧鳳凰樓北仙雲紫山海闗東御氣青午夜一輪清禁月中天雙闕上垣星周原考室規模大五日心依赫濯靈卿霄晨露似珠凝睿藻聮翩玉字登雷雨經綸昭有序星雲糺縵瑞同稱直同監夏貽謀逺詎比横汾韻事矜四度朝陵成四帙覲光萬禩勅欽承閲射前期選最優營門三耦對正侯風傳舊俗存桓﨣訓示先型騐􅏫柔往嵗天弧威朔漠常年大獮試髙秋充庖禽獸分甘逮侍從均叨宴賜稠三椏五葉矗如林氣韞精含嵗月深匝地霜華晨哨鹿掀天雪浪夜登鱏壤贏五沃尤宜榖産甲中邦合貢琳采得松花江上五帝鴻墨海好摹臨江華窵佃渺天南祝嘏承筐達匭函晉日康侯情欵欵需雲愷宴澤醰醰久知島澨恩光洽更捧奎章瑞彩含曽是神謨親厎定三田渡口偃霜鐔重城羽仗迾森嚴朔月旋鑣吉日占東望寢園仍奠斚北瞻湯殿乍迴幨雲霞煥處楓宸迥􅖽秸輸餘蔀屋霑好值六花天告稔正逢乙夜省銅籖頻年禁近賚崇銜兩度陪遊扈鳳縿宻勿多慚襄黼黻賡颺還許和雲咸恭惟仁孝馨香達敬識神人上下諴清廟歌成同拜手萬年嘉頌仰披函欽定盛京通志卷一百二十四
