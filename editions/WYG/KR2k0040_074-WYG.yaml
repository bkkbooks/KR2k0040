body:
  text: 國朝人物六正白旗滿洲欽定四庫全書欽定盛京通志卷七十國朝人物六正白旗滿洲扈爾漢姓佟佳𨽻正白旗滿洲世居雅爾古寨太祖時從其父扈喇虎率所部來歸恩遇之賜姓覺羅尋授一等大臣居五大臣之列費優城長䇿穆時赫苦烏拉侵暴願以户口歸於我扈爾漢從貝勒舒爾哈齊往遷之將兵三百衛所遷五百户先行烏拉以萬人邀諸路乃分兵駐山巔防守諸户口躬與揚古利率二百人直薄烏拉兵力戰竟日敵稍卻我後兵繼至大破之嵗丁未從貝勒巴雅喇征東海窩集部嵗己酉徇瑚葉路盡降其部落收二千户而還太祖嘉之賜號達爾漢嵗辛亥偕何和里征瑚爾哈路攻克扎庫塔城嵗癸丑從征烏拉並有功天命元年偕安費揚古征東海薩哈連部至烏勒間河刳舟二百水陸並進取河南北三十六寨師扺黑龍江㑹氷結以草藉馬蹄蹴氷而渡渡畢氷輒解衆皆驚喜為神助遂取江北十一寨招降使犬諾囉錫拉忻諸部而還四年明兵分四路來侵從戰薩爾滸尚間崖覆其二路兵明總兵劉綎復由寛甸口進棟鄂路扈爾漢以兵千人伏山隘摧其前鋒與大軍夾擊綎于阿布達哩岡綎倉猝不及陣殱其兵五萬人綎戰死明年從攻瀋陽擊敗明總兵賀世賢軍洊晉爵至三等子八年卒年四十八太祖親臨哭之以其子琿塔襲薩穆什喀姓佟佳𨽻正白旗滿洲扈爾漢第三弟也少從征伐積功授三等輕車都尉世職天命中征棟奎以十二人斬百級獲礟五十三牲畜千計功最太宗即位列十六大臣天聰四年從攻灤州明兵出城戰射卻之遂乘勝拔其城七年從攻旅順口率其弟雅賚與步軍統領巴奇蘭聨舟進明兵拒戰于厓被創復裹創戰城下益厲大軍繼至破之凱旋太宗勞于郊親酌金巵以賜加一等輕車都尉八年任叅領副巴奇蘭征瑚爾哈部降之加三等男進步軍統領崇徳元年從入長城分兵攻容城縣先登二年授議政大臣從攻皮島督前鋒先濟鴨緑紅與都統阿山葉臣等攻克之斬其守將沈世奎晉二等子任工部承政四年偕刑部承政索海分統左右翼兵征索倫部攻克烏庫爾城移軍攻鐸陳城未下城中兵結别部阿薩津為援合衆拒戰乃設伏要隘引敵前夾擊之斬七十人師還烏魯蘇酋博穆博爾以兵邀於路奪我正藍旗輜重索海戰敗之薩穆什哈不㑹戰且爭功坐削世職七年彼攻錦州列寨柵以圍之明將悉衆來犯執鋭甚薩穆什喀力戰三敗之錦州既克復授騎都尉世職八年以疾卒子洛什於崇徳中從征朝鮮及明錦州杏山屢著戰功後襲職雅賚姓佟佳𨽻正白旗滿洲扈爾漢第七弟也太祖時征烏拉畧地朝鮮攻遼東征察哈爾俱有功天聰三年以兵徇海島遇胡故將毛文龍部衆斬六十人毁其船尋偕額駙揚古利追捕雅爾古復遇文龍部衆斬九十六人擒其千總三人以歸從大軍征明薄燕京城明督師袁崇煥來援犯我䕶軍營城中兵亦出應雅賚力戰卻之五年從圍大凌河城戰輒捷七年攻旅順口與其兄薩穆什喀駕輕舸先濟明將黄龍陳兵于岸雅賚躍登岸大呼突入陣奮擊之龍不能軍斂兵至城下再戰雅賚身被創戰愈力大敗之卒拔其城論功授騎都尉世職崇徳二年授議政大臣六年從圍錦州戰松山七年冬從入薊州下山東以功加一雲騎尉順治元年從睿親王多爾衮破李自成于山海闗定燕京二年復從豫親王多鐸破賊潼關平定河南江南屢晉一等男兼一雲騎尉八年擢户部尚書以同官巴哈納給餉不均坐狥隠論罪罰贖尋罷康熙三年卒賜祭𦵏如例子花色襲康果禮先世居那木都魯以地為氏嵗庚戌大軍征東海窩集部康果禮以綏芬屯長與其弟喀克都哩等率所部來歸授爵三等子俾轄其部人為佐領𨽻滿洲正白旗尋以貝勒穆爾哈齊女妻之封和碩額駙天命三年大軍取撫順克撫安三岔等十一堡進取鴉鶻闗破清河城康果禮並在事有功六年從克瀋陽先登太宗即位列十六大臣擢䕶軍統領天聰元年從大貝勒阿敏征朝鮮有功分賜所俘獲三年從入紅山口下遵化薄燕京明薊遼督師袁崇煥錦州總兵祖大夀率兵二萬赴援屯廣渠門外康果禮擊敗之未至城濠而返坐奪爵五年卒子色琥徳承並為佐領邁色為䕶軍叅領從戰塔山殁於陣第四子賚塔别有傳喀克都哩和碩額駙康果禮之弟也初授爵為三等子太宗即位任都統天聰元年從征朝鮮有功三年太宗親統大軍征明攻遵化城喀克都哩督所部卒薩木哈圗先登城遂拔太宗親酌金巵勞之賚予甚厚晉爵二等子賜號噶思哈巴圗魯言其勇敢善戰疾如飛鳥也明年大軍克永平明兵潰走昌黎遂遣敖漢巴林扎嚕特諸部兵攻其城不克乃命喀克都哩往助之先是叙遵化功薩木哈圗授騎都尉世職賜號巴圖魯且諭喀克都哩曰拔一堅城易得勇一士難如薩木哈圖者宜共愛惜之嗣後攻戰戒其無復為軍鋒至是攻昌黎薩木哈圖復樹雲梯將登太宗亟命止之五年五月喀克都哩偕都統楞額哩往攻南海島徵戰艦于朝鮮未至師次海濱明兵屢邀戰並擊敗之八月從圍大凌河城分兵攻其城東北城中食盡明總兵祖大夀降乃班師六年從征察哈爾有俘獲七年太宗集諸貝勒大臣詢以征明及朝鮮察哈爾宜何先喀克都哩請先征明以承天眷協人情太宗甚嘉納之八年卒蘇納姓納喇先世居葉赫太祖時棄其族人來歸尚主為額駙任佐領𨽻滿洲正白旗天命十年進叅領從征有㓛擢副都統天聰元年從攻錦州以勁旅扼塔山西擊敗明兵二千三年春率八十人徇察哈爾降其户二千比降者瞷我兵少謀叛歸明乃殱其桀驁者俘其渠二及八千餘口以還未幾察哈爾降人復有叛歸明者率兵四百追躡之所擒獲甚衆五年授䕶軍統領擢兵部承政從圍大凌河城城中兵出拒戰擊敗之復敗其錦州援兵敘功授騎都尉世職八年考滿晉三等輕車都尉九年正月坐匿所部丁壯不報奪世職七月任都統崇徳元年從武英郡王阿濟格征明攻克鵰鶚長安諸堡及昌平容城等州縣五十六戰皆捷是年冬從征朝鮮擊敗寧邊城援兵擒其將于陣三年有訐都統阿山子塞赫臨陣退縮者引蘇納證之及鞫訊不實遂罷都統仍任佐領如故順治五年卒于蘇克薩哈以功授三等輕車都尉世祖念蘇納舊勞追復其世職令蘇克薩哈併襲為三等男䝉阿圖𨽻正白旗滿洲先世居佟佳以地為氏天命初與其兄巴都哩率所部來歸分轄其部人為佐領巴都哩厯官禮部承政天聰八年從攻靈邱之王家莊堡中流矢卒别見忠節傳䝉阿圖洊擢副都統列十六大臣天聰三年從入紅山口擊明總兵趙率教于遵化覆其軍尋征瓦爾喀大捷明年凱旋俘獲三千有奇太宗親勞之郊授世職為三等輕車都尉任工部承政八年考滿晉世職為二等崇徳三年卒子翁克襲英俄爾岱姓他塔拉世居扎庫穆太祖時從其祖岱圖庫哈哩來歸授佐領𨽻滿洲正白旗天命四年從征開原有䝉古人阿布爾者降明為開原將素驍勇為軍鋒英俄爾岱馳斬之於陣六年從克瀋陽遼陽屢晉二等輕車都尉天聰三年從克遵化五年授户部承政七年使朝鮮以義責其王李倧倧懾服上書報謝八年晉一等輕車都尉考滿晉三等男崇徳元年再使朝鮮還遇明皮島兵擊走之已而從征朝鮮克其國都圍倧于南漢山城與參政瑪福塔賫敕諭降悰尋授都統六年從睿親王多爾衮圍錦州及松山城並有功八年考滿晉三等子順治元年從入關破流賊李自成改户部尚書二年超授三等公四年復以考滿晉二等公五年卒年五十三子伊圖襲武拜姓𤓰爾佳𨽻正白旗滿洲父烏哩堪事太祖為前鋒統領摧鋒陷陣屢建戰功武拜其長子也自幼從征伐輒奮勇先登太祖愛其才每戒其母輕敵太祖嘗獵於郊遥見一巨熊突出有䇿馬從之者熊疾走嶺馬畏熊不進遂下馬奔逐熊將及發一矢殪之墮嶺下衆皆望而驚異太祖曰此非武拜不能使人覘之果武拜也初任佐領從滅葉赫下遼東破敵南夀山以功授騎都尉世職天聰中畧地錦州從征察哈爾部還軍過大同擊敗明總兵曹文詔大軍攻錦州將四百人為前鋒破明將祖大夀於大凌河斬副將以下五百人師旋設伏敗其追兵加三等輕車都尉世職崇徳元年從征朝鮮二年與十六大臣之列任前鋒統領三年從征明以八十人敗明兵於紅山口五年畧地中後所沿海而徇俘獲多遷副都統七年復從征明越燕京南下山東加世職二等順治元年從入闗破流賊李自成追至望都加世職一等授内大臣三年從追勝吉思復征宣化並有功屢晉爵至二等伯八年羅什博爾惠以諂附睿親王獲罪武拜坐其黨奪爵十五年世祖念武拜功復爵以一等子予世襲康熙四年卒諡果壯子郎談襲季弟蘇拜亦以驍勇知名年十五從太祖征䝉古有功授侍衛兼任佐領天聰九年從征察哈爾降林丹汗子額哲遂移師征明攻代州明兵自崞縣馳救破走之崇徳元年從征朝鮮敗敵桃山村三年授䕶軍叅領從貝勒岳託入牆子嶺越燕京敗明太監馮永盛軍五年從圍錦州松山杏山二城兵先後來援並戰却之尋偕都統圖爾格以兵三百設伏烏馨河口襲擊明兵千人多所俘獲六年復圍錦州以功予騎都尉世職加一雲騎尉七年從征至山東屢戰皆捷攻克樂安昌邑二縣先登八年凱旋晉世職為三等輕車都尉順治元年從定燕京是年冬英親王阿濟格西𠞰流賊李自成蘇拜以所部從取道土黙特鄂爾多斯鑿黄河氷濟師明年春抵榆林進攻延安連破賊時豫親王多鐸自河南入潼闗已下西安自成走湖廣遂移兵追之大敗之安陸斬獲無算三年從肅親王豪格𠞰流賊張獻忠敗賊將髙汝礪於三寨山進擊獻忠於西充殪之五年還京授䕶軍統領洊晉爵至一等子加一雲騎尉八年與兄武拜坐羅什博爾惠黨罷官並奪爵九年起為副都統十三年擢内大臣十五年世祖念其戰功復爵一等男予世襲康熙三年卒諡勤僖子昻安巴襲阿什達爾罕姓納喇葉赫貝勒錦台什族子也太祖滅葉赫阿什達爾罕率屬來歸授佐領𨽻滿洲正白旗天命六年從攻奉集堡進攻遼陽先登克其城論功授一等輕車都尉太宗嗣位命典外藩齎勅諭䝉古諸部天聰七年頒律于䝉古八年徵兵科爾沁㑹大軍於宣府左衛征察哈爾其汗林丹走死阿什達爾罕與前鋒統領武拜等招其台吉塞稜等來降尋大會䝉古於崇古爾申畫牧地平治其獄訟還報稱㫖九年從貝勒多爾衮等往察哈爾諭降林丹汗子額哲旋兵畧宣府大同多所俘獲崇徳元年授都察院承政偕大學士希福頒律察哈爾喀爾喀科爾沁諸部既還從征朝鮮其國王李倧遁走南漢山城豫親王多鐸率師圍之其援兵萬八千集城下分樹二柵而别以五千兵營山麓互為犄角二柵兵方出戰阿什達爾罕與貝子碩託麾精騎競擊之大破其軍遂乘鋭攻拔山麓營餘衆皆潰明年正月李倧降論功晉三等男世襲旋充正使頒赦詔于科爾沁巴林扎嚕特喀喇沁土黙特阿嚕諸部復平治其獄訟三年五月以前理科爾沁獄坐徇庇論黜七年起復故官六年大軍圍松山明總兵曹變蛟乘夜犯御營諸大臣皆馳赴以死禦敵阿什達爾罕不至乃勒歸旗明年覈從征松山功罪罷之降世職為騎都尉以疾卒年六十三以其子錫達哩襲景固勒岱姓扎庫塔初居瑚爾哈部烏拉招之降不從大軍征東海窩集部景固勒岱徒步詣軍前乞降遂從征瑚爾哈部攻取烏勒固宸路斬獲甚衆尋挈其孥及所屬三十户來歸𨽻滿洲正白旗任佐領天命三年從征明至鴉鶻闗攻克清河堡擢叅領復從大軍取瀋陽遼陽天聰八年征瓦爾喀部招降屯長芬達里及屯户五百餘俘阿庫哩尼滿部千餘人以還崇徳二年從武英郡王阿濟格攻皮島克之積功授一等輕車都尉世職屢晉二等男順治十一年卒賜祭𦵏諡忠直從弟崇阿天聰八年以佐領從征大同戰回雁堡我兵三人陷于陣崇阿奪勇援出之崇徳元年從征朝鮮破敵桃山村六年從鄭親王濟爾哈朗圍錦州䝉古人諾木齊武巴什等居州之外郛來約降為明將所覺以兵防之我軍往援既克其郛明兵猶巷戰崇阿擊斬甚衆七年從貝勒阿巴泰征明敗明將馬科于渾河南下山東克夀光縣城順治元年從豫親王多鐸躡擊李自成於潼闗二年移師南下從貝勒博洽平浙江攻㧞湖州進取福建擊敗明唐王朱聿鍵于福寧于騎都尉世職五年從將軍譚泰討江西叛鎮金聲桓敗其黨王得仁于南昌是年冬廣東叛鎮李成棟犯贛州以應聲桓崇阿率兵往援㑹巡撫劉武元總兵胡有陞等夾擊之成棟大敗單騎遁走六年破成棟兵二萬于南康進圍信豐克之成棟溺水死凱旋先後敘功並遇恩詔加世職至一等輕車都尉康熙十八年致仕子采住襲譚拜姓他塔喇𨽻正白旗滿洲父阿敦官都統嘗從攻撫順招降明遊擊李永芳譚拜初任佐領天聰五年圍大凌河城明總兵祖大夀遣兵百餘突圍出譚拜追斬三十餘人獲馬二十有四八年予騎都尉世職兼任叅領九年從征察哈爾還軍入上方堡徇代州忻州崇徳元年從征明敗敵燕京城北轉戰盧溝橋二年畧地清河三年入牆子嶺薄豐潤縣城擊敗明太監馮永盛兵四年破明兵于錦州城南並有功加一雲騎尉五年授兵部叅政六年兼任副都統七年冬復從征明下山東克利津縣八年春師旅明總兵趙光抃范志完總兵吳三桂白廣恩等迭出邀戰譚拜戰輒捷晉世職為三等輕車都尉順治元年從入闗定燕京三年擢兵部尚書從征流賊張獻忠過陜西擊敗叛鎮賀珍于雞頭關進兵四川屢挫賊渡涪江敗其渠袁韜四年遷吏部尚書先後叙功並遇恩詔晉爵至二等男七年卒子瑪爾賽襲鄂碩姓棟鄂𨽻正白旗滿洲父錫罕從征朝鮮陷陣殁見忠節傳鄂碩襲世職為三等輕車都尉天聰八年從攻前屯衛又以兵迓察哈爾降人來歸授佐領九年從攻朔州戰平魯衛崇徳元年偵事冷口二年市於土黙特率將士往為衛並有功三年從入青山口擊敗明太監髙起潛兵四年畧寧逺五年六年從圍錦州者再復畧寧逺遇明兵六百騎大破之七年從入界嶺口敗明總督范志完兵於豐潤又擊卻之宻雲遂越燕京趨山東師旋明總兵吳三桂以步騎邀戰鄂碩戰輒捷順治元年從入闗追流賊至陜州賊負山為寨以拒攻拔之二年陜西既定移兵下江南鄂碩以前鋒抵睢寧俘斬甚衆從征蘇州明巡撫楊文驄以舟師迎戰敗之趣杭州敗明魯王朱以海兵攻湖州克其城屢以功晉爵二等男六年洊擢副都統從征明桂王朱由榔于湖南廣西師還得恩賚八年授前鋒統領十三年進内大臣加三等子復以皇貴妃父晉封三等伯十四年卒贈侯賜祭𦵏諡剛毅以其子費揚古襲卓洛姓佟佳𨽻正白旗滿洲禮部承政巴都哩第三子也天聰八年襲爵為三等男兼任佐領崇徳中從征明下山東畧地錦州復從大軍圍之屢戰松山並有功授刑部叅政順治元年從入闗擊敗流賊李自成二年擢副都統三年從征湖廣敗賊荆州時賊黨多降於明桂王朱由榔由榔勢逆張其將王進才等分踞湖南諸郡邑四年卓洛㑹恭順王孔有徳軍進𠞰自岳州趨長沙進才遁追擊敗之偽總兵徐松節拒戰又敗之以舟師還戰天心湖復敗偽總兵楊國棟遂入祁陽進攻武岡擊敗偽國公劉承允于夕陽橋承允降由榔走廣西五年師旋六年擢禮部尚書列議政大臣七年改左都御史八年兼都統遷吏部尚書九年以靖南將軍征廣東未定州縣十三年再征湖廣𠞰偽秦王孫可望於辰州可望焚舟遁卓洛渡江攻發其伏躡擊至瀘溪屢戰輒捷十四年可望降由榔竄雲南十五年大軍分黔蜀粤西三路規取雲南卓洛從信郡王多尼出黔陽十六年會師攻雲南下之乘勝克永昌騰越由榔奔緬甸偽晉王李定國走孟艮尋煽元江土司那嵩倡叛往擊之磨隴口敗其黨馬秉忠孫應斗馬忠君進師搗元江克其城那嵩自焚死十八年緬人執由榔以獻雲南平康熙元年還京累遷爵至二等伯予世襲七年卒予祭葬諡忠襄以其孫赫特襲阿濟格尼堪姓他塔喇𨽻正白旗滿洲父達音布事太祖為前鋒佐領天命八年征扎嚕特部殁于陣别見忠節傳達音布既殁長子阿哈尼堪襲職為三等輕車都尉尋卒無嗣天聰八年追録勲臣阿濟格尼堪遂以次子襲其父職任叅領從征察哈爾擊走其汗林丹遂移軍入大同破明兵于崞縣師還偵敵山海闗多斬獲崇徳元年從征朝鮮遇明寧逺兵于道擊敗之三年從貝勒岳託征明越燕京敗總兵侯拱極軍獲其印四年擢䕶軍統領從肅親王豪格攻錦州六年從鄭親王濟爾哈朗再攻錦州屢設伏敗其援兵進擊明兵于杏山麾纛蹂其營明兵大潰有䝉古人諾木齊者故降于明居錦州之東闗願獻闗為内應明總兵祖大夀覺之防守嚴未得發阿濟格尼堪遂乘夜薄闗先登克其郛援諾木齊等以出尋兩戰松山皆捷晉一等輕車都尉是年八月明總督洪承疇以八鎮兵援錦州我軍營松杏二山之間截其餉道明總兵吳三桂唐通等潛遁阿濟格尼堪偕䕶軍統領鰲拜等追擊之三桂通僅以身免八年分兵攻中前所擊走明總兵黄色拔其城加一雲騎尉順治元年四月從入闗追敗流賊李自成于望都晉爵一等男十月從豫親王多鐸𠞰自成取道河南渡孟津薄潼闗賊將劉方亮等于關外浚重濠據險列營以拒阿濟格尼堪偕䕶軍統領圖賴等連破其二營乘勝越重濠冒矢石先登賊衆驚潰大軍遂入關二年進攻西安自成竄湖廣乃征明福王朱由崧於江南下淮安趨揚州攻克其城獲戰艦二百餘渡江破南京躡由崧於蕪湖敗其舟師捷聞晉爵三等子三年從貝勒博洛定浙閩攻克金華衢州破仙霞關下建寧延平明唐王朱聿鍵遁走汀州追擊至城下率精鋭先登擒斬聿鍵偽總兵姜正希以衆二萬赴援大破之斬殺過半明年凱旋晉爵一等子予世襲五年進都統六年以叅贊大臣偕鄭親王征湖廣時明桂王朱由榔遣其大學士何騰蛟總兵王進才馬進忠等據湖南郡邑師抵長沙阿濟格尼堪先驅至湘潭破北門入騰蛟就擒殱其潰衆于湘鄉遂趨寶慶距城七十里進才進忠引兵拒戰我軍分步騎為八隊更番迭擊直薄城東門進才等潛遁去追𠞰之沅州靖州進定全州七年正月班師晉爵三等伯列議政大臣四月卒予祭葬諡勇敏子宜里布襲薩弼圖姓他塔喇𨽻正白旗滿洲先世居札庫穆父沙津當太祖時來歸授佐領薩弼圖其長子也沙津卒代為佐領天聰八年以勞績予騎都尉世職尋兼任叅領崇徳四年從承政薩穆什喀索海征索倫部攻克烏庫爾雅克薩城俘丁壯百餘進攻鐸陳城未下其别部阿薩津來援偕副都統伊遜設伏掩擊之斬七十人五年凱旋加一雲騎尉尋從圍錦州刈其禾明兵自城西北隅出戰火器競發勢鋭甚薩弼圖麾衆突陣呼聲振天地明兵披靡反走逐北至城濠而還移軍扼松山駱駝山截擊明援兵屢敗之六年再圍錦州跨濠架木橋逼其城而營城中出樵採者輒為所擒斬明兵投火欲焚橋擊之遁既而步騎坌集將犯我營門薩弼圖斬其先進者二人明兵遂潰時明總督洪承疇以兵十三萬救錦州軍於松山遣兵擊我巨礟薩弼圖擊卻之復乘勝破其步卒三營以功晉世職為三等輕車都尉擢副都統七年從貝勒阿巴泰入界嶺口擊敗明總兵馬科於渾河轉戰至山東攻克平度州城順治元年從入闗定燕京偕都統葉臣巴哈納𠞰撫山西圍賊將陳永福于太原下其城以兵徇旁近府州縣既平往㑹英親王阿濟格師于延安協討流賊李錦七戰皆捷敘功復遇恩詔晉爵至二等男尋以年老致仕十八年卒賜祭葬如例子果里襲瓦爾喀珠瑪拉姓那木都魯𨽻正白旗滿洲世居瓦爾喀部少事太宗以材勇稱天聰八年授騎都尉世職時有同名珠瑪拉者乃冠故所居部名以别之崇徳二年從征額赫庫楞諸路多俘獲四年從征明攻克故城縣先登復擊敗其㳺兵擒禆將一尋從征索倫部設伏大敗其衆加授三等輕車都尉世職六年從圍錦州力戰松山被礟傷幾殆防守錦州諸山砦明兵來犯擊斬甚衆以功晉世職為二等任吏部理事官考滿再晉世職為一等順治元年入關破流賊李自成三年從征流賊張獻忠於四川六年從討叛鎮姜瓖先後敘功並遇恩詔晉爵一等男十年卒於官弟伊瑪喇襲碩詹姓富察正白旗滿洲父舒穆禄事太祖為佐領既卒碩詹代其任尋兼叅領天聰五年畧城城斬游徼兵三人擒六人以歸八年予騎都尉世職崇徳元年從征朝鮮分兵攻克江華島加一雲騎尉三年兼任刑部理事官八月從貝勒岳託入牆子嶺越燕京而南至山東攻克禹城平陰先登明年春旋師明兵襲我後擊却之敘功晉三等輕車都尉尋擢户部叅政五年大軍將征錦州徴水師于朝鮮還報稱㫖及從圍錦州明兵夜刼我駱駝山營碩詹聞警趨援斬馘過半七年兼任副都統順治元年後入關擊敗流賊李自成既定燕京改户部侍郎從豫親王多鐸𠞰自成于陜西明年破賊潼關進取西安移兵定河南遂下江南五年從鄭親王濟爾哈朗征湖南時湖南諸郡縣為明桂王朱由榔所據六年偕都統佟圖賴等進兵湘潭薄衡州屢戰皆捷下其城七年凱旋先後敘功並遇恩詔晉爵一等男九年以疾罷康熙二年卒年六十有四賜祭葬諡明敏以其孫達色法色分襲世職為二等輕車都尉星訥姓覺羅爾察𨽻正白旗滿洲初為二等侍衛兼佐領從擊䝉古兵於塔山北射殪其渠天璁七年偕叅領素爾東阿駐守遼河尋偵軍事于察哈爾猝遇敵擊敗之其部有東多爾濟塔蘇爾海者倚山為寨星訥躍躋其巔直前搏戰敵大驚棄寨遁去八年從大軍征察哈爾分道出哈瑪爾嶺降其部人鄂勒哲圖及林丹汗西奔土黙特移師畧大同明將自龍門逆戰大破之崇徳三年偕承政葉克舒征黑龍江功最四年洊擢副都統兼議政大臣六年授工部叅政從圍錦州明總督洪承疇以兵十三萬赴援屯松山北岡先登破其壁壘屢戰皆捷七年敗明總兵吳三桂白廣恩於髙樓八年擢工部承政順治元年從入關以步卒擊走流賊是年改工部尚書三年西征張獻忠進師西安分兵𠞰賊於邠州秦州會肅親王豪格兵于四川遂滅獻忠凱旋晉太子少師六年從討大同叛鎮姜瓖圍其城瓖簡驍勇蒙盾突圍出擊却之再戰城下殱其勁兵殆盡累晉至二等男八年英親王阿濟格謀干政星訥𨽻王麾下不舉劾坐奪爵九年起為工部尚書十年致仕十四年復予一等輕車都尉世職兼一雲騎尉康熙十三年卒賜祭𦵏孫巴勒達襲錫圖庫姓烏扎拉𨽻正白旗滿洲初任佐領兼前鋒叅領天聰中從大軍取永平偵敵大凌河尋圍其城擊敗錦州援兵徇宣府大同畧地錫爾哈錫伯圖克長城徇代州朔州崇徳中偵敵寧逺中後所及山海闗東設伏前屯衛具有勞績逮葉雷叛於多博科煽其部人盜科爾沁諸部馬挈妻孥以遁錫圍庫㑹寧古塔副都統烏巴海督兵躡之追及于温鐸葉雷潛遁乃盡斬其部人俘其妻孥獲其所盜馬蹤跡葉雷于山中射殪之敘功爵以一等男征索倫敗之甘河擒其酋博穆博果爾及其弟布固徳敘功晉三等子順治初以前鋒統領從𠞰李自成敗賊將唐通于一片石入山海闗敗自成于肅安進兵山西取太原又敗賊于汾州絳州敘功晉二等子自成退踞陜西大軍由潼關綏徳分道進討錫圖庫以兵㑹𠞰于延安自成遁湖廣擊之安陸逐北至荆州殱賊無算復從肅親王豪格殄張獻忠于四川敘功晉一等子時湖南郡邑為明桂王朱由榔所據乃從鄭親王濟爾哈朗南征抵長沙率兵先渡江攻湘潭破西門執其大學士何騰蛟遂定湘潭進克永興斬其總兵官尹舉智社貞明等尋偕諸將下寶慶全州明新興伯焦璉等分三路拒戰擊卻之移兵攻克永安闗定道州凱旋賜白金三百八年内大臣武拜等訐英親王阿濟格欲謀亂錫圖布坐預謀當斬除爵準塔扈爾漢第四子也天聰八年授騎都尉世職崇徳二年從攻皮島久不下準塔與鰲拜誓于主將曰志不强力不果氣不鋭者不下此城準塔鰲拜丈夫也請旦而克之爭先冒矢石拔其城特爵以三等男命曰巴圖魯擢都統七年駐防錦州順治元年從入關破流賊于真定以左翼兵定山東明福王朱由崧遣兵屯徐州擊走之尋攻宿遷破清河遂下廬州鳯陽偽官降者百餘人獲戰艦馬駝器械無算敘功晉三等子予世襲從征四川下夔州遵義俘斬甚衆復征陜西破賊黨武大定等川陜悉平四年凱旋卒五年追論戰功晉一等子無子以弟阿喇宻襲十二年追諡襄毅庫哩姓喜塔喇𨽻正白旗滿洲初任叅領崇徳六年圍錦州庫哩統朝鮮兵以從克其郛斬八百餘級復敗松山北崖軍明將糾科爾沁兵突犯我師庫哩麾衆力戰礟傷其手不少卻卒破之再戰松山多斬獲功最七年擢户部叅政順治三年以户部侍郎督淮安漕四年鹽城土寇周文山以八百餘人夜襲淮安突入其廨庫哩率標兵數十人禦之使僕婢傳箭助戰人皆一當百達旦賊敗去追斬八十餘級時偽益王朱隆武襲據廟灣城乘間將窺淮安庫哩設伏車家橋賊舟至伏發擊斬及溺死者無􅈫復簡精鋭疾趨廟灣賊望風逺竄以次𠞰劉莊場諸賊悉平之尋召還京七年以病致仕累加世職至一等輕車都尉兼一雲騎尉未㡬卒賜祭𦵏諡僖恪子耀泰襲伯勒赫圖姓納喇𨽻正白旗滿洲初由前鋒校授兵部副理事官崇徳中從睿親王多爾衮圍錦州戰松山杏山間分兵畧寧逺並有功擢前鋒叅領順治元年從討李自成擊敗賊將唐通於一片石既定燕京追賊安肅望都並多斬獲復從豫親王多鐸蹙自成于潼闗二年移師下江南狥蘇州擊走明廵撫楊文驄獲其船二十餘從貝勒博洛下杭州擊敗明大學士馬士英兵别將兵狥湖州以雲梯克其城三年進師金華戰㨗八歩嶺遂分道征明唐王朱聿鍵于福建平之五年從鄭親王濟爾哈朗征湖南時自成餘黨王進才馬進忠袁宗第等降于明大學士何騰蛟分踞寳慶武岡諸州郡六年伯勒赫圖率所部兵破湘潭執騰蛟乗勝薄寳慶克其東門進忠引兵來援擊敗之進忠跳河走僅以身免㝷下武岡沅州屢敗進才宗第兵進定全州七年凱旋得恩賚八年從都統阿喇善𠞰山東土寇搗其巢于沂州蒼山斬賊渠劉遜張齊搜捕旁近諸山悉馘其渠九年改䕶軍叅領先後敘功並三遇恩詔洊晉一等輕車都尉世職十三年進前鋒統領十五年大軍分三道討明桂王朱由榔于雲南伯勒赫圖𨽻信郡王多尼軍進兵貴州偽將劉正國迎戰安莊衛偕䕶軍統領布伊錫哩擊敗之追斬正國於響水橋遂濟盤江會兵克雲南城十六年進攻玉龍闗偽鞏昌王白文選敗遁斬獲無算長驅下永昌渡潞江二十里抵磨盤山偽晉王李定國設伏山谷我前鋒既深入伏起伯勒赫圖下馬據石立連矢殪賊三人賊却將軍卓布泰以精鋭繼進發火器競擊之賊大漬偽伯竇名望糾漬衆扼隘口列柵以拒伯勒赫圖率兵破其柵斬名望遂取騰越州由榔定國文選皆分竄去追逐踰南甸而還及信郡王班師伯勒赫圖偕都統卓洛留駐雲南定國復自孟艮謀入犯約降將髙應鳯為内應以由榔印劄誘元江土司那嵩倡叛伯勒赫圖等聞亂馳擊賊于磨隴口進圍元江拔其城那嵩自焚死斬應鳯于軍十八年從將軍愛星阿𠞰由榔于緬甸㑹師木邦聞文選屯錫箔江濱伯勒赫圖簡精騎先發比至文選已毁橋遁遂結筏以濟㑹緬人請獻由榔乃以前鋒百人往蘭鳩江濱取之以歸康熙元年還京敘功晉一等男六年輔政大臣蘇克薩哈為鰲拜所搆陷坐族誅伯勒赫圖其族弟也竟以株連死八年聖祖親政察其柱追復原官及一等男爵以其子伯爾肯襲十年其子訴陳平雲南功前為鰲拜所抑未予優敘得㫖下部議晉爵三等子賜祭𦵏諡忠勇賚塔和碩額駙康果禮第四子也崇徳六年從圍錦州擊松山杏山援兵有斬獲明年冬從征明攻克新城髙陽霸州夀光博興皆先登身中五創授前鋒侍衛順治元年從討流賊李自成敗賊將唐通于一片石追擊自成至安肅望都授䕶軍叅領從豫親王多鐸蹴賊潼關明年下江南攻克揚州取江寧追敗明福王朱由崧於蕪湖三年從征明唐王朱聿鍵于福建克汀州五年從征明桂王朱由榔于湖南六年師至衡州戰青草橋再戰州之南山進師祁陽戰大忠橋王公嶺屢戰道州全州皆捷十一年由榔將李定國犯廣東從都統珠瑪喇擊走之遂解新㑹圍追敗定國於興業横州累功晉三等男十三年擢䕶軍統領十六年海賊鄭成功犯江寧偕安南將軍達素往𠞰比至賊已遁入海明年進𠞰成功於厦門以不習水戰久無功康熙元年撤師還京坐奪職二年起署前鋒統領從征流賊李來亨於茅麓山有功復授䕶軍統領八年擢都統十三年逆藩耿精忠叛應吳三桂自福建犯浙江命康親王傑書為大將軍討之以賚塔為平南將軍贊其軍務遣將連敗賊金華復義烏諸暨二城進兵衢州大小十餘戰斬馘無算賊將馬九玉遁入閩乘勝破仙霞闗進拔浦城建陽建寧㑹師延平精忠窮蹙迎降葢十五年十月也先是成功于錦乘精忠亂盡陷漳州泉州興化諸府叛鎮劉進忠復以潮州附錦勢甚熾及是精忠既平遂以明年正月統大軍𠞰錦連破其二十六營復興化漳州泉州錦走兩島移師潮州進忠降賚塔留駐其地又明年錦遣其黨劉國軒陷平和長泰海澄漳平同安惠安遂犯泉州勢復振賚塔以所部兵㑹總督姚啓聖破賊蜈蚣山覆其七營斬七千餘級復長泰分兵復漳平平和諸縣再破賊萬松關十八年賊將吳淑何佑犯長泰擊敗之迎擊國軒于江東橋逐北至太平寨前後斬三千餘級十九年復海澄進征松㠘偽將軍陳昌率衆降錦走臺灣厦門金門相繼定賚塔還軍廣東而三桂子世璠尚據雲南乃佩平南大將軍印與貝子彰泰分道討世璠賚塔自廣西泗城西隆進抵石門坎地距安籠三十里峭壁通一綫賊將何繼祖擁衆數萬營其上自謂扼天險二十年元旦賚塔度賊無備勒軍為二一軍蟻附上直攻其前一軍縁厓出間道擊其後賊倉猝不能禦遂奪隘口克安籠所城賊復據黄草壩驅象而陣賚塔督兵戰竟日鼓勇奮擊象反走我軍乘之破其營二十二俘賊一千有奇進收曲靖分兵取霑益馬龍嵩明會彰泰軍薄雲南陣斬賊將胡國柄劉圮龍世璠自殺其黨線緎開城降雲南平聖祖勞於盧溝橋西二十里外行抱見禮二十三年卒予祭葬加祭二次諡襄毅二十五年追封一等男以其于費葉楞襲雍正五年進封一等公以其孫博爾屯襲八年入祀賢良祠九年加公號曰褒績真柱肯姓扎思瑚哩𨽻正白旗滿洲國初來歸天命元年隨征薩哈連烏拉部在行間有功天聰八年授佐領世職崇徳五年從征明圍錦州擊敗杏山松山兵六年復圍錦州松山兵來犯刼我巨礟復擊敗之八年從征明擊敗明兵於界嶺口順治元年隨入關擊破流賊二年敘功加世職二等叅領嗣晉三等男覺羅色勒景祖曾孫武功郡王禮敦孫也𨽻正白旗滿洲天聰十年隨定朝鮮進取江華島敵兵截河盡收其船隻色勒率右翼兵徑渡遂取其島以功授佐領世職尋以色勒係武功郡王孫特恩超加一等男順治初恩詔加至二等子子額爾徳崇徳時從圍錦州等處亦以軍功著阿布岱𨽻正白旗滿洲世居葉赫國初來歸授備禦世職管佐領事在十六大臣之列從太祖破開河烏拉等處有功天命四年征遼東廣寧天聰七年擊察哈爾十年征朝鮮並在行間厯有戰績錫達理阿什達爾罕長于也初任佐領天聰三年隨征明燕京至三河有俘獲五年攻大凌河城内兵出戰擊敗之六年隨征明入邊至大同擒其哨卒及征察哈爾敗其伏兵七年襲父佐領世職崇徳元年從征朝鮮破其兵於桃山村三年隨征明敗明兵於燕京五年隨圍錦州設伏擊敗明兵順治四年任理藩院侍郎仍管佐領事累晉世職一等輕車都尉加太子少保康熙三年卒賜䘏如典禮瑪克圖康果禮姪也𨽻正白旗滿洲父曰昻武事太祖在十六章京之列天命四年從征葉赫先登以功授叅將世職早卒瑪克圖襲尚宗室公達爾察女崇徳元年隨征朝鮮進攻平壤一躍而登䝉恩賚並加世職三等㕘領尋卒書裘姓格濟勒𨽻正白旗滿洲早從征伐崇徳四年隨征薩哈連烏拉有功九年授佐領世職尋卒以姪伊巴罕襲職順治時加世職二等輕車都尉從征雲南及緬甸等處屢有勲績滿都䕶𨽻正白旗滿洲天命四年從征明取撫順攻連島灣寨堡先登克之又從克鐵嶺天聰九年隨征阿庫哩尼滿効力行間崇徳六年從征明圍錦州擊敗松山兵八年征薩哈連烏拉擊敗之順治元年從入關敗流寇屢遇恩詔加一等輕車都尉世職同旗有猷徳赫以從征西林部及遼東皆有㓛授二等叅將有伊爾鼐以從征明山東濟南有功都爾晉以從征明皮島有功俱授騎都尉雅布哈姓巴雅拉𨽻正白旗滿洲國初來歸太祖嘉其慕義授為備禦崇徳五年隨圍錦州擊杏山及松山兵俱敗之八年從征明燕京過渾河連擊敗明兵至山東攻齊東先登拔其城順治間累遇恩詔加三等輕車都尉世職噶爾珠𨽻正白旗滿洲初從征阿庫哩効力行間及明兵侵我輝發地噶爾珠奮勇擊敗之復從征瑚葉部有功天聰九年隨征阿庫哩尼滿等處攻其部落順治初加三等輕車都尉世職尼罕𨽻正白旗滿洲天聰三年隨征明攻永平先登克其城八年從征烏拉撫降六村尋往卓甕城擊敗敵兵敘功賜號巴圖魯授三等叅領世職噶布拉姓扎庫塔𨽻正白旗滿洲初從征薩哈連烏拉以軍功授佐領世職崇徳四年復從征薩哈連烏拉以病卒於軍其從孫達穆圖崇徳八年征明入邊屢立戰功尋至山東攻平度州先登克之順治初入闗從征山西陜西皆有功加世職一等輕車都尉兼一雲騎尉克徹尼姓庫雅拉𨽻正白旗滿洲國初來歸導我兵收服漠北遣往額赫庫楞安揷其户口而回及再往適三處村人不服攻克之以功授備禦世職又以嚮導從征奇勒及阿庫哩尼滿等部加以職三等叅領嗣以追獲阿達海加一等叅領子額格什諾崇徳八年從征明宻雲及山東新城皆有功順治初併其父世職加一等男隨蓀𨽻正白旗滿洲崇徳三年從征明山東過任邱克之四年敘功加佐領世職子和爾博崇徳六年從圍錦州有功順治初加世職一等輕車都尉圖爾賽𨽻正白旗滿洲國初隨征明至遮嶺口前驅遇敵擊敗之順治元年從入闗破賊將唐通於一片石追至安肅斬馘甚衆復追至慶都大敗之二年録其功績瑚什納𨽻正白旗滿洲天聰四年從征明攻鵰鶚城奮勇先登克之崇徳三年從征明遇燕京至通州河岸遇敵敗之又連敗明太監髙起潛等軍進攻南宫先登克其城五年隨征明圍錦州刈其禾城内明兵出䕶首先衝八敵陣直抵城壕又連敗明杏山松山錦州兵以功加佐領世職任兵部理事官八年從征明寧逺敵兵出戰敗之順治元年從入闗𠞰流寇時賊守黄河渡口以兵擊破之二年至陜西連敗賊復追破其潼闗二營至九公山又敗之五年考滿稱職累遇恩詔加一等輕車都尉又一雲騎尉世職布庫姓民覺羅𨽻正白旗滿洲其父胡宻碩事太祖時有嘉哈瑚什者謀逆遣其黨持鴆藥來獻瑚宻碩探知飛馬馳奏謀乃敗天聰八年追録其功授佐領世職布庫襲職崇徳三年征明從攻任邱克其城順治初遇恩詔加三等輕車都尉都達海姓托和羅𨽻正白旗滿洲初任䕶軍校崇徳三年隨征明至山東攻濟陽克之順治元年隨南征追破流賊于潼闗二年隨征浙江至杭州連破偽兵於餘杭平湖等處三年從破喀爾喀土謝圖汗及碩雷汗兵四年録其勲加優敘布當齊理姓納喇𨽻正白旗滿洲初任叅領崇徳徳三年從征明過燕京出邊明兵來犯奮擊敗之五年隨圉錦州擊杏山兵六年圍錦州破松山兵皆先登陷陣八年隨攻明至三河擊明兵于渾河岸順治元年隨破流賊于潼關先登克其關門二年至揚州攻城克之三年敘功授佐領世職嘉努喀𨽻正白旗滿洲崇徳三年從征明攻寧津以第二人先登克之順治初累遇恩詔加三等輕車都尉同旗有尼堪姓扎思瑚哩崇徳三年從征明攻武邑有功順治十五年從征偽晉王李定國屢奏捷尋卒於軍康熙七年敘功加贈三等輕車都尉賽達𨽻正白旗滿洲崇徳三年隨征明至山東敗明兵於青山石六年從圍錦州破明經畧洪承疇軍順治元年隨擊敗流賊於山海關及平山西攻太原並著功績二年追破流賊于鳯翔三年録功加優敘同旗有三徳布崇徳三年從征明山東攻夏津先登賜號巴圖魯授佐領順治初加一雲騎尉堪泰𨽻正白旗滿洲崇徳四年從征薩哈連烏拉設伏社城外斬馘甚衆五年從征明圍錦州破其衆松山兵來援又破之併敗其杏山兵六年復圍錦州擊敗松山兵八年隨征明敗敵于渾河岸順治元年從入關破流賊於慶都累遇恩詔加二等輕車都尉卓訥𨽻正白旗滿洲崇徳五年從征明於塔山北攻克四臺隨圍錦州擊敗杏山兵六年再圍錦州擊破松山兵又破明經畧洪承疇三營步兵八年隨征明連敗敵于宻雲等處至山東膠州又敗明兵進攻樂安先登克其城順治元年隨入闗二年加世職佐領累遇恩詔加二等輕車都尉棟鄂樂𨽻正白旗滿洲初隨征杏山松山皆有功順治初從徇山東福建郡縣厯著戰績授騎都尉加一雲騎尉三遇恩詔加一等輕車都尉察罕𨽻正白旗滿洲崇徳五年隨征明圍錦州城内兵出擊敗之又破明杏山兵六年圍錦州與明松山兵合戰奮擊有功復破明經畧洪承疇三營軍八年從征明攻寧逺設伏於烏蘭哈達明兵來追擊敗之順治四年授雲騎尉三遇恩詔加三等輕車都尉十八年從征山東土寇于七敗賊將劉思舉等之衆復破之東嶺山大寨嶺康熙三年敘功加授二等輕車都尉台玕𨽻正白旗滿洲崇徳五年隨征明圍錦州刈其禾城内兵出援敗之又連敗其杏山松山軍六年圍錦州合擊明松山敗其衆八月破明經畧洪承疇三營步兵八年隨征寧逺擊敗明騎兵順治元年從入關追流賊至慶都大敗之以功授佐領世職及隨征陜西連破賊于潼關二年追執明福王于蕪湖督巨礟攻常熟克其城三年論功加優敘覺羅瑭古善𨽻正白旗滿洲崇徳六年隨圍錦州敗明松山軍順治元年從入關以功授佐領世職五年加一雲騎尉累遇恩詔加一等輕車都尉世職同旗有達爾罕崇徳七年從圍松山有功順治初加二等輕車都尉世職阿玉璽𨽻正白旗滿洲崇徳六年從圍錦州破明經畧洪承疇援軍順治二年駐防江寜連敗賊衆五年從征江西叛鎮金聲桓四戰皆捷累遇恩詔加世職二等輕車都尉後縁事降三等穆福姓佟佳𨽻正白旗滿洲崇徳八年隨征明率衆圍中前所乘夜據其城順治元年從入關追流賊至慶都敗之復敗賊于真定從征山西至懷慶遇賊追敗之黄河岸而還北至太原絳州連敗賊衆獲其戰艦二年隨征陜西湖廣敗賊于西安承天等處三年敘功授佐領世職五年從征江西叛鎮金聲桓連破之九江南昌尋至建昌招服南豐等縣累遇恩詔加一等輕車都尉世職薩克察姓錫塔拉𨽻正白旗滿洲崇徳八年隨征明至山東攻夀光先登克其城賜號巴圖魯授佐領世職順治元年從入闗積軍功三遇恩詔加一等輕車都尉同旗有和爾特崇徳八年從征明至山東攻平度州先登亦賜號巴圖魯順治初累以軍功加三等輕車都尉欽定盛京通志卷七十
