body:
  text: 選舉四國朝武進士武舉人山東衛學中式武舉人附載欽定四庫全書欽定盛京通志卷五十選舉四國朝武進士中額附入順天省並無定額康熙己未科趙聨璧錦縣人厯官逰擊康熙丁丑科鐡鴻緒承徳縣人厯官池州營逰擊康熙庚辰科王人聞海城縣人康熙癸巳恩科趙廷文錦縣人官杭州衛守偹康熙戊戌科李景泌海城縣人楊巖錦縣人官宣化府守偹雍正甲辰科鐡景祐承徳縣人厯官澧州營叅將張復發錦縣人厯官鄜州都司雍正丁未科趙頗義州人乾隆丁巳恩科周丹錦縣人武舉人定額三名内康熙乙夘庚午兩科舊志失載今無稽考康熙丙午科艾天竒遼陽州人楊國雄遼陽州人李霖鐵嶺縣人康熙己酉科鄭𢎞儒遼陽州人馬直樂錦縣人郭郛錦縣人康熙壬子科張世鐡嶺縣人王佳裔錦縣人吕從政遼陽州人康熙戊午科唐朝璽葢平縣人趙聨璧錦縣人見進士劉萬鵬錦縣人康熙辛酉科鐡承謨承徳縣人趙銘寜逺州人許大成錦縣人康熙甲子科王人聞海城縣人見進士杜繼牧寜逺州人劉澤潤錦縣人康熙丁夘科錢之章承徳縣人鐡鴻緒承徳縣人見進士方呈榮錦縣人康熙癸酉科陳芝臺錦縣人趙有官錦縣人許髙昇錦縣人康熙丙子科田彧錦縣人樊永寜錦縣人王金式鐡嶺縣人康熙己夘科左超鐡嶺縣人孫士鶚錦縣人趙思温寜逺州人康熙壬午科倪廷標鐡嶺縣人趙廷文錦縣人見進士胡瑛廣寜縣人康熙乙酉科陳韶善錦縣人熊之占鐵嶺縣人賈聨㨗錦縣人官延山所千總康熙戊子科孫登瀛錦縣人張開基寜逺州人官洮州衛守偹宋錦承徳縣人康熙辛夘科賈聨第錦縣人陳元錕錦縣人羅振威廣寜縣人康熙癸巳恩科薛景奕錦縣人才柱才錦縣人王天禧錦縣人康熙甲午科李景泌海城縣人見進士趙之儒錦縣人吕養志寜逺州人康熙丁酉科劉裔昌錦縣人周紹麟承徳縣人楊巖錦縣人見進士康熙庚子科王國生海城縣人聶得秀錦縣人劉鑑錦縣人雍正癸夘恩科鐡景祐承徳縣人見進士方中興錦縣人張復發錦縣人見進士雍正甲辰科戴亮承徳縣人馬興輝寜逺州人鮑文魁寜逺州人雍正丙午科劉士泰錦縣人趙頗義州人孟廷玉鐡嶺縣人雍正己酉科蔡聞逺承徳縣人官淮安千總張廷試錦縣人李朝相錦逺州人雍正壬子科丁建義承徳縣人鐡景隆寗份雍正乙夘科魯璽錦縣人聶惟中錦縣人劉寅之錦縣人乾隆丙辰恩科周丹錦縣人寗廷琰寜逺州人官山東臨清衛千總唐相玉鐡嶺縣人乾隆戊午科夏顯承徳縣人夏文耀鐡嶺縣人呉寛海城縣人乾隆辛酉科王佩錦縣人戴廷璋承徳縣人王徳寛寜逺州州人乾隆甲子科王天寵錦縣人張鵬錦縣人孫進功乾隆丁夘科劉預發錦縣人張輔世錦縣人王者師寜逺州人乾隆庚午科趙元龍錦縣人李光祖承徳縣人錢蔚寜古塔人乾隆壬申恩科趙鎮陳起鵾寜古塔人栁􅄎寜古塔人乾隆癸酉科潘見龍寜逺州人徐瑾承徳縣人官廬州衛千總霍永耀承徳縣人乾隆丙子科楊鐸年寜逺州人官東昌衛千總金起鵬錦縣人趙尚徳承徳縣人乾隆己夘科魏雲錦縣人郭自煜寜逺州人李蘭廣寜縣人乾隆庚辰恩科趙佩錦縣人劉永毅遼陽州人單維倫義州人乾隆壬午科鐡朝臣承徳縣人劉文雄義州人李茂寜逺州人乾隆乙酉科徐廷名承徳縣人艾永標義州人魯廷選承徳縣人乾隆戊子科嚴廷良趙夢龍魏廷實乾隆庚寅恩科傅訓義州人周廷桂承徳縣人曹君美承徳縣人乾隆辛夘科艾名標義州人王嘉謨承徳縣人周昇承徳縣人乾隆甲午科王振宇義州人劉玳義州人周昇義州人乾隆丁酉科馮國榮承徳縣人馮廷樑海城縣人曹銓錦縣人乾隆己亥恩科湯維新海城縣人馮國士承徳縣人曹鏞錦縣人乾隆庚子科岳裕義州人金克配遼陽州人曹鳳翔錦縣人乾隆癸夘科金克明遼陽州人崔栢齡義州義人艾鶴齡義州人附山東衛學中式武舉人姓氏康熙己酉科單宗孔復州人康熙乙夘科趙士元復州人康熙戊午科鮑士標復州人康熙丁夘科李褒寜海縣人康熙甲午科趙文烒復州人欽定盛京通志卷五十
