body:
  text: 乾隆八年癸亥御製古今各體詩乾隆十七年壬申御製長白山瑞樹歌欽定四庫全書欽定盛京通志卷十二天章三皇上聖製詩乾隆八年癸亥七月初八日因往盛京叩謁祖陵恭奉皇太后始發圓明園作虞采綏旌次第排金風湊爽滿天佳王途于邁髙秋淨帳殿承歡愛日諧望裏關東多王氣行經塞北暢清懷綿綿寶穡秋成近觸撥吾悰詎有涯躬詣盛京雖命省騶從而經過州縣豈盡免力役之勞因詔免今年田租以示如傷之意省耕省斂古所聞哲后禮不廢時巡矧兹上陵實舊制有其舉之敢弗因盛京佳氣東來紫騑騑六御今伊始山圍冀野遍桑麻峰標木葉經迤邐今年北鄙若雨暘沿途攬轡禾黍香雖云比户足衣食怨咨民瘼刻豈忘千乘萬騎邁宇縣錢鏄將痔民情忭豈無力役勞閭閻中心徘徨不能宴朝廷德詔應時下蠲租逮彼千村社匪欲小補㤝斯民皇祖當年煦嫗者八月朔日作形勝行行攬年芳厯厯收關山連北塞雲物近中秋輻輳來諸部逶迤駕六虬近光陪後乘輸悃導前斿覩此瞻依切寧豫德澤流鴻猷思祖業燕翼逮孫謀更喜隨慈輦無妨視膳羞筵開親捧爵津渡手扶輈丙夜封章覽良辰藻思抽詞臣隨豹尾壯士擁旄頭人帶秋陽色衣霑湛露浮鄗京佳氣繞指日謁珠丘至克爾素河奉天官兵來接馬蹄漸盡諸藩地人語饒聞故土音誰道西賔異東主可知往古遜來今滄溟浩渺源流逺長白巃嵸霧靄深此日干城爭扈蹕百年休飬厪豫心駐蹕吉林境望叩長白山吉林真吉林長白鬱嶔岑作鎮曽聞古鍾祥亦匪今邠岐經處逺雲霧望中深天作心常憶明禋志倍欽九月朔日作千峰萬葉碧雲浮早是風光逼九秋白水黑山多王氣三韓百濟舊神州橫汾遊豫非同漢宴鎬安舒却比周故國耆民羣望幸肯教恩澤尚遲留秋搜雜紀詩五首嵗長九月有青蕪共道常年似此無盛京早寒今嵗過閏猶暖誠異事也霧斂馬頭山逼面霜凝谷口樹粘鬚射熊何慮先升木待兔焉勞更守株赳赳羽林羣命中詼談却笑紀昌弧長白遙看數點青雞翹五色韻旗鈴騰驤八駿來天廄環拱羣峰據地靈黃艷鵝兒新剪褶緑輝孔雀側拖翎朝家武備千秋獨太僕空傳效展軨峯標木葉鬱崔嵬水漲松花淨沱洄萬騎雲屯隨豹尾三秋風景異龍堆周詩底用誇麋友晉賦無勞藉雉媒更剪銀檠吟七字屬車賡和有鄒枚連雲風影自婆娑雨後新看矗黛螺黃幄背風依樹障朱旄靣日出巖阿合圍麋鹿愁飛羽出隊狐狸駭獵猧薄暮旌門鐃吹奏海青雲裏捉天鵝曲名旌門鼓吹常奏此虎韔騂弓越徑秋平岡草淺騁驊騮雁行狗監牽絲鞚馬上鷹師臂繡韝風漾鈴聲金替戾雪開峰面玉雕鎪批麻丙夜斟民事詎為從禽暫解憂今年奉天各縣有收喜而有作遍野黃雲尚作堆翠華行處鮮汙萊東瀍西澗歌農慶猶想當年即有邰重陽日侍皇太后宴野卉臨風弄綺鮮何須金盞與金錢福凝東海增芝算酒進南山作菊筵圓蓋無心常煦嫗廣原縱目正芊綿長承慈訓銘心所用九時乘倍體乾登髙何用上層樓峰頂低臨萬樹頭令節恰欣歸沛里當年曾此俯齊州青螺曉靄迎仙蹕赤羽金颸獵緑斿最愜稱觴無限意憑將山海為添籌射虎行鬱蔥萬木森虧蔽豁開大澤天無際朝嵐忽捲崿峯煙樹色山光鬪蒼翠初來沛里拜橋山便途較獵遵先制雁行兩翼圍密合貔旅八旗各標幟秦平久經息兵革進退號令習軍事日未移時肩已倦他他饒獲麋麅類乍見白額出林叢鼻頭出火人思刺期門佽飛驟驊騮驅之草淺平川地四圍重排雪鋒鎗負嵎空憶難回避唐弓夏箭出櫜鞬命中已決耽耽眥詎與漢將思爭勇厯艱祖訓期無愧耳食書生未目覩橫議涉險鮮防備我笑羽林備過多一發於莬却先斃對月思唐太宗遼城望月事即用其韻隴得復望蜀徴去尚存碣誰能效舜階繽紛干羽綴今月猶古月千秋何盈缺壯志想當年萋萋煙草結情因寥宇寄光向疏林滅秋獮秋獮因農隙講事古今同由來武備重况在邠與豐我來拜鼎湖便途閲軍容桓桓佽飛士一一皆驍雄負嵎手赤虎失林足蒼熊雁落夏服箭月滿烏號弓奚誇雲夢澤不數長楊宫霜點廣原白日射灌木紅辨别三等殺頒賜萬夫充維此鷹揚侣當年佑戰攻止戈今宴安敢忘走馬風望葉赫舊墟敬惟我太祖髙皇帝以十三戎甲奮迹於此復讐服衆遂成王業謹賦其事以示來許寒盟由彼義何甘甲士當時祇十三自是天心歆日角幾曽虎旅藉犀函折衝底用稱韓信決䇿無須聽耿弇創業艱辛千古獨垂衣敢恃面臨南花園英莪門外獵場中有芍藥二叢雖過花時而柯葉猶森欎可觀蓋百年外物也土人因名其地曰花園經過吟覽因以命題繁柯泫露華蟠根託山隈我來非花時尚想臨風開逈異京洛種豈作溱洧才森然二古叢不知何年栽疑是彼女夷愛此髙崔嵬玉手擷雲錦移之自蓬萊野人亦珍重時時膏壤培護以朱木欄奚懼狼與豺乃知天地化頗賴人成裁荏苒憶韶華俯仰弄條枚只宜鋪玉箋安用命金罍入英莪門霓旌搖曵曉曦明故國人人喜氣迎三月關山征轡逺而今屈指到興京區分只用栁條邉堪作金湯鞏萬年不似秦皇關竟海空留遺迹障幽燕山程野驛日侵尋澗水瀍桑入眺臨南去盛京知不逺鳯凰樓閣五雲深興京姬室于豳日炎劉起沛時一人方締造四海遂為基皇澗猶然在臯門尚可思屏藩堪示固宫室不言卑往者爭雄際同歸出衆姿秋風經故國膏雨遍新陂父老迎鸞馭材官衛羽旗初來尤切切欲去更遲遲言念皇圖纘端維厚德垂凛乎同御朽告我後人知謁顯佑宫翠華臨故里琳宇謁仙宫疊嶂排雲上遙岑列柱崇升馨昭聖敬垂貺仰圓穹廓我邠岐業貽兹鎬洛功有星皆拱北無水不朝東繩武顒然念祈天惕若𠂻式瞻當太乙俯眺攬龎鴻渺渺承堂構乾乾倍省躬薩爾滸太祖髙皇帝以五百人破明數十萬衆實王業之基也鐵背山頭殱杜松手麾黃鉞振軍鋒於今四海無征戰留得艱難締造蹤恭謁永陵追王傳前籍遺庥逮後昆髙山瞻彼作德水溯兹源疆理興家室星辰衛廟垣幾多瓜瓞感揮淚灑寒原恭謁福陵草昧起英雄維皇乃眷東風雲龍虎會日月海天中帝業千年鞏山陵萬古崇永維無競烈繼序矢深衷恭謁昭陵早是天歆漢何曾鹿逐秦百年經五世一壘豈三旬太室蒸嘗永元宫松柏新紹庭懷積悃展拜此時申謁陵禮畢車駕入盛京得七言排律十四韻羣山萬壑總朝東王氣為龍鎮鬱蔥白水夀邱名不減作豐遷鎬事應同當時提劍安黔首此日垂衣逮藐躬延佇關山千里外每懷瞻拜八年中商颸送爽清馳道疊嶂排青列逺空上將隨車金䍡􅝹名王執轡玉璁瓏行宫視膳邀慈豫故國旋輿仰祖功只為上陵思馬鬛豈緣校獵賦車攻六飛因幸興王里百辟咸朝慶善宫訝許稱觴來故老不教警蹕駭新豐葛燈綃帳猶餘儉執承酌匏許獻衷華曜景中鸞扇動若非煙裏鴨香融孕虞育夏天心眷篤祜依京帝謂通萬䙫皇清綿寶祚扶桑初日海門紅謁景佑宫松隂屏息叩金除廟貌虔瞻色相如天與人歸神自佑春風秋月殿常虛龍蛇瀖濩蟠橫壁雲霧煙煴寫倒蕖我久無心陳罪福祈年還慶旐維旟賜奉天將軍額洛圖留都開幕府撫鎮更旬宣古重維桑地今成秉禮㕓扈陪依豹尾晉謁領鵷聨大樹甘棠並芳聲莫讓前御崇政殿碧海曈曨曉日升金猊風靜瑞煙騰元孫黼扆兹重御列祖威靈實式憑六世繼繩惟敬畏百年含煦彼黎蒸守成開創何難易只有憂勤與日增閲武久放華山馬重觀遼海兵由來稱子弟坐可靖鯢鯨萬隊風從虎三軍旭耀旌威聲振地堮壯氣指天棖此日雖無戰當年亦有征金甌方主鬯惕若凜持盈乾隆八年秋朕奉皇太后恭謁祖陵還至盛京受朝錫宴夫漢髙過沛而歌大風情至斯動直已陳德况豫小子覲揚光烈能無言之不足而長言之哉爰作世德舞辭十章章八句粵昔造清匪人伊天天女降思長白闥門叶是生我祖我弗敢名叶乃繼乃承逮我元孫叶章一元孫纍葉維祖之思我西云來我心東依歷兹故土仰溯始謀叶皇澗過澗締此丕基二章於赫太祖肇命興京哈達輝發數渝厥盟如龍田見有虎風生戎甲十三王業已興三章爰度爰遷拓此瀋陽方城周池太室明堂不寧不靈匪居匪康事異放桀何心底商四章丕承太宗允揚前烈倬彼松山明戈耀雪以寡敵衆杵漂流血惜無故老為余詳説五章余來故邦瞻仰橋山慰我追思夢寐之間崇政清寧載啓南軒華而不侈鞏哉孔安六章維我祖宗欽天敬神執豕酌匏咸秩無文帷幔再張樽爼重陳弗渝弗替遵我先民七章先民宅兹載色載笑今我來思聖日俯照爵我周親藎臣並召亦有嘉賔歡言同樂叶章八懿兹東土允惟天府土厚水深周原膴膴南陽父老於是道古有登其歌有升其舞九章我歌既奏我舞亦陳故家遺俗曷敢弗因渾灝淳休被於無垠勿替引之告我後人十章酹克勤郡王園寢開國承家日于藩夾輔資一時扶王業四海定丕基懿德書金匱佳城奠玉巵銀潢天共逺百世篤宗支酹功臣額亦都墓坐享八紘泰寧忘百戰功佐周曾有望興漢不徒馮金簡香生緑椒漿玉瀉紅藎臣陪祀事式紹乃家風實勝寺得禾周名書獲鼎漢紀年是寺稱實勝其事猶可傳明兵十三萬水陸數道連志曽期破釡言已侈投鞭弱婦實懷懼壯士難奪堅文祖處以暇旋命彭與韓坦然逸待勞乃在松山間破竹迎刃解誰能抗師顔諸路一時敗困獸遇秋畋從此威天下燕京數往還創寺肇錫名用以示弗諼我來步上方晶陽空宇懸百年父老希所聞乃傳言文廟我太宗文皇帝初定大業即尊儒重道釋奠孔子以四子配並立文館譯書史於翔鳯閣實肇國家萬年有道之長也辟雍時尚屬鞬櫜過魯空傳祀太牢更步故宫翔鳳閣彬彬羣彥想分曹開國佐運勛臣武勛王揚古利直義公費英東𢎞毅公額亦都墓在二陵之間松楸相望猶見當日君臣相得之概感而賦此呼池麥飯共艱辛想像當年魚水親何必大風思猛士林林扈蹕有宗臣望千山我聞古來稱奧區必有名山為作鎮况兹遼陽實天府羲經已兆帝出震長白巫閭衆所瞻千山亦復髙千仭設在晉郊魯甸間太華泰岱應齊峻我來譙邑攬形勝南望巑岏映清潤朝嵐夕靄儼相接巒光峰態如堪引龍泉祖樾久聞名靈迹相傳半疑信何時長嘯眺滄海據盛京通志千山香巖寺中有仙人臺俯瞰滄海如布几席云千仭岡頭衣始振遼陽懷古唐宗戰壘久成空管邴曾聞度海東只有千年華表鶴時看來往白雲中示盛京留守諸臣宅洛名惟舊遷邠地豈新維屏思保障體國在安民業擬苞桑固風期豐芑淳入疆懷有慶述職慰時巡朝鮮陪臣來接遼左陪京鞏澗瀍維藩作翰逮朝鮮來賔詎是豫誠格奉朔遐思祖化宣訝許迎鑾膽虎衛還教千宴接鵷聨德綏武靖文皇業萬億斯年護海堧長寧寺蘭若靜朝暉苔侵碑篆古泠泠水到階落落松當户龍鱗儼欲張虬枝自撑拄譙邑多古迹愛此琳宫宇依稀梵唄聲仿佛天花雨意香參即離靜室坐久許適然獲長寧頓忘安心所恭瞻太祖髙皇帝所貽甲胄武庫三曾器龍樓十襲緹千年過合甲七屬鄙函犀仰烈誠天授思艱敢志攜雄關為近户安恃一丸泥恭瞻太宗文皇帝所御弧矢青莖如古直觪角到今堅不禁秋霜感遐思寶月懸比和經手御似訓作心傳撻伐前猷在居歆總賴天昭陵石馬歌在昔穆王八駿追雲霞耄荒忘返天之涯太乙況漢天馬來樂府曾聞産渥窪勤勞血汗事何有雌黃徒惹詩人口不如漢文却受千里駒吉行五十符陽九周家岐渭始勤農我朝三韓奮迹實彎弓由來受命雖有異艱難創業多齊蹤太宗馬上得天下房駟星輝天錫嘏叶大白小白協安吉故老云一名昭陵前石馬一名大白小白蓋文皇帝所御也里乘文皇帝體豐而鎧重乘小白日行百大白祇能行五十里至今立仗昭陵貽石馬遐思我祖如唐宗陵園廟號先後同汗趨嘗傳杜甫句闡揚光烈千秋隆六御今年來故里貞觀遺迹餘荒壘唐壘在廣寧縣城東南相傳唐太宗征高麗駐兵之所文皇曾亦討寒盟謹按朝鮮昭陵神功聖德碑云天聰二年以毁盟討之拔其都載飛舸於車凌江華島李倧自縳請為臣釋之還并歸其俘獲乘此雙龍渡浿水文綏武服為藩屏萬年正朔奉永清不似李唐東征悔失計仆碑重建思魏徴大政殿臯門聳百尋朵殿鬱森沉國政聞周度大君想知臨十亭猶列翼一德盡同心文治誠輝古武功尚烈今用兹貽億葉詎止惜分隂作室西南户紹庭志倍欽故宫詠燭火傳薪豈盡漏響夜方深照得當年夕艱難締造心暮遼天散暮霞宫樹已棲鴉幾靜思民瘼心怡長道芽圖書探祕藴鐘鼎玩清嘉古月照今客新詩詠舊家人言歸沛里市語似京華不異前秋夕消間一瀹茶登鳳凰樓百尺髙臨萬景紛貯歌藏舞陋齊雲漫言此日供詩料却憶當年望國氛締造常思祖業艱千秋百二鞏河山於今試上髙樓望遼水依然襟帶間示盛京奉祀諸宗室明禋歆一脈奏假訓昭垂水木思源本蒸嘗奉豆彛離家汝莫念盛京奉始自祀諸宗室係乾隆元年京命來者故云與祭我猶虧試想百年始澗瀍還在兹再題實勝寺故老今何在祗園此尚存藉尋禽敵烈總為戴天恩臨汝心毋二蠢兹氣已吞戎衣寰海定武器再三捫是寺恭藏人舉太祖髙皇帝所御甲胄數之而弗能勝有太宗文皇帝所貽弓壯士弗能開長四尺餘皇祖聖祖仁皇帝亦曾留寶劍云繼序思皇祖貽庥逮耳孫綿綿瓜有瓞億載永蟠根敬觀太宗所御鹿角椅天然鹿角椅合拱不傾欹製朴身常泰形端道可思奢懲珊枕伴儉似葛燈遺却憶艱難際曾無偃息時故宫侍皇太后宴關山瑞擁大安輿禕翟祥凝慶善居海旭騰輝紅㲩天漿介祉玉芙蕖雲依雉尾開雙扇星拱辰垣俯九墟愛日豈忘沐雨際弼基還厪肆筵餘賜父老酺父老居豐沛久蒙煦嫗恩百年今宴安同為太平人雖無見知者尚有聞傳言錫宴思皇祖在此大清門今我來故家匪為騁遊巡三爵循古典炮兔亦烹豚白金以級頒百戲良具陳酌酒賜爾飲爾醉我亦欣還念爾先民曾同百戰勛故宫覽章奏黃扉章奏至秉燭覽移時為敕幾康故難辭往復披有秋方慰意望雪更尋思却想艱辛日紛紛羽檄馳再登鳳凰樓馬上逢重九登髙已有詩今朝陟髙閣仍是季秋時把菊作佳節鋪箋掞好辭泬寥天宇寬襟帶河山披依稀雞犬聲掩映桑麻枝廣陌嘶驕騎朱樓颭酒旗譙邑既云冨何加曰教之寄語彼京兆莫視傳舍為雨塞山幾度雪霏霏沛里重吟細雨飛麥隴早欣占歲好人言羣道帶陽歸盛京往年早寒九月已有積雪今年則甚暖立冬以後尚雨人咸以為竒云間窗近挹寒芳潤髙閣遙聞晝漏稀更喜留都方駐蹕沾泥無慮四驄騑清寧宫館豳迹輝古宅洛業思前苞茂如松竹清寧象地天雙騫排鳳扇上簟耀龍筵乃寢占佳夢明禋重吉蠲國朝禮重祭一神必於正寢兹旋故宫執豕薦醑遵舊制弗敢廢也休和晴旭麗淡蕩惠風旋惕若承堂構丕基永萬年聞鐘聲屈曲宫墻上玉蟾譙樓鐘點聽傳嚴吟殘此夕穿松漏訝似當時響砌籖却看星躔依斗極尚聞人語閙閭閻去年詩思重尋得良夜方長篆裊簾十月朔日宴宗室羣臣於故宫曈曨海旭麗銀鋪宴擬橫汾湛露濡舞馬不須誇紫燕煎沉常自裊金鳬有椒共慶如兹盛無酒何妨謂我沽更喜皇州頒嵗朔小陽春律正昭蘇恭奉皇太后迥鑾車駕發盛京得詩四首金烏占在尾玉律變初寒别緒留興慶歸輿奉大安卿雲常五色王氣鎮三寒更值登場候崇墉夾道看西賔今作主東主却成賔去去燕京路依依沛里人地靈常育瑞風伯已清塵會復如唐后武功詠再巡荏苒翠華移祥風左右吹千官陪警蹕萬姓仰威儀御道如弦直名山入畫竒二陵佳氣繞步馬動留思歷歷度康莊熙熙麗小陽因憐時序改始覺客途長惜别人心切懷歸馬足忙皇都言至日亞嵗納千祥雪中過永安橋明禋應時修征轡凌晨發豹尾去沛里龍鑣指京闕滕六欲效靈元冥正司莭初飄瀝瀝霰旋零綏綏雪途景已堪適憑輿趣尤别瓊瑶入眺吟川原供攬結不殊書室中推窗玩清絶行行過永安鏡影含光潔平林久秃兀乍喜千葩纈曠觀既詄蕩逸興復鬱勃灑然銀色界倣佛蘆溝月前題再詠咿喔聲寒茅店雞石橋東畔瀋城西素凝遙嶂皆成畫翠剩孤松最合題三白叶心方喜慰二陵回首重低迷導斿儘教行行止未惜瑶田碎馬蹄積素迷離晃旭欲生煙得得驕驄傲錦韀不道雪餘度遼野却如日暖厯藍田萬峯屏展皆藏碧千林花纈全皴白恍似羅天會玉真瓊瑶踏遍虬顔迹逶迤周道傍村莊玉砌銀鋪十里強贏得輕輿吟素景漫愁風冷切征裳飬息牧閲馬坰場亘瀋野芻牧接遼濆飬息良駒盛調間衆圉分三千突騋牝五色耀卿雲驟似波鋪地看如錦疊文無邪思古訓斯作喜今羣敢忘驅馳際用兹佐六軍渡句驪河句驪舊遼水千載帶遼陽古客曽何在今人引興長蒹葭餘敗質汀嶼何蒼茫飲練雙長虹橫卧水中央幾個無心鷗衝波任翺翔戰勛尋堞壘世態驚滄桑惟此東流水今古無間忙積素漫兩岸流澌聲琅琅誰能呼舴艋捕彼鯉與魴近樹銀為飾逺山玉作裝憑輿愁峭寒披裘且倣徨常時禁體詩苦吟讀書堂奚如眺覽餘萬景箇中藏度遼水鏡影照龍旃橋山展謁旋寧同貞觀后撠挶為開邊回程漫賦二首一千五百里十月初冬時呵凍人驚冷思歸馬覺遲行程遙莫慮程遙乃日近宿頓近頻移頓移則到速詎是從羣願東山舊有詩初來嫌路逺謂是馬蹄忙歸去怨程近誰憐駝鼻瘍駝牽鼻以行人情堪體驗物理動參商始識無為貴行將論達莊廣寧道中囷鹿髙堆富有秋村農稍為展眉頭小陽春旭烘華罕長女風光獵綵斿素積鱗塍真勝玉青含麥壠正如油何當豳里連京洛三白酬豫望嵗眸過廣寧望醫巫閭山恭依皇祖聖祖仁皇帝元韻海旭凝螺黛罡風削玉芙靈竒經覽乍聖迹躡尋重過客羣停轡仙人逈矗峰是山有仙人巖桃花洞聖水盆北鎮廟諸竒勝徒思山側徑未撫寺前松萬古為幽鎮千秋􅘦舜封崇功標地紀秩祀偶天宗嶻嶭疑騫鳯巉峘突逴龍盈眸欣積素步馬遲婁胸閭陽驛望十三山當前誰展十三屏古縣荒涼考奉陵出金史百戰堠臺烽火熄山青雲白自層層哈密進瓜至敬遣諴親王和親王賫供二陵感而有賦碧玉嘉實當冬熟珀色瓊瓤甘且馥花門𠢐面不敢私厥包纍纍盛筠簏山中匹馬豈愁疲年年方物來京師上供寢廟頒百殿匪同飛騎求離支翠華今嵗詣故里橋山蔥鬱近尺咫馳來包貢正鮮腴陵園敬薦惟時矣因思豆粥蕪蔞艱祗今聲教訖婁蘭坐享玉食賴祖澤持盈保泰恆乾乾大凌河金根迤邐過初度大凌河戰迹當年烈憂懷此日多守成知不易開創事如何駉牧今銷燧名駒蒸寢訛大凌河乃當年用武之地今為牧場矣錦州道中得詩二首山村行盡復河干佳景分明緩轡觀靉靅雲容頻釀雪迷茫峰熊正生寒已欣積素平鋪玉更望遙空碎剪䊵屈指為期三百六祈年心得幾時寬風沙礙眼手頻摩憑軾還聽勞者歌只為關山須閲歷頓教時序暗經過遼西界是遼東界錦州廣寧等處皆遼西地統言之則謂之遼東急水河歸慢水河急水河發源五指山髙流與慢水河通建州諸水合流為一者也千古青山愁不染抹雲幾點列青螺小凌河頽垣敗壘動經過防禦當年事若何上將生降中左所監軍坐擁小凌河明末各路用兵皆有內監監軍若輩擁強兵以自衛驅殘疾使當戰僨事率由此一時成敗滄桑易千古興亡感慨多幾許英雄淘洗盡濤聲依舊送回波松山烽銷堠戍間萬古此松山羽衛經過處頻思創業艱雪後過杏山岝崿羣峰玉筍攢翠微佳色入憑觀踈林蔽芾迷歸鳥猶帶當年戰氣寒聨鶱銀鳯自飛來獨峙朝陽霽景開古戍黃蕪嘶馬去題詩遙寄白雲隈每逢咏雪興偏豪況對嶤峰積翠髙此日蕭間供白戰曩時辛苦憶黃旄聞京師於十月初四日得雪喜而有作六出先時嘉是月七日方交小雪莭占年喜未涯同時真是異是日駐蹕廣寧道中離京千有餘里而普霑三白之瑞誠天恩之浩蕩也千里詎為遐積素行行看新寒旋旋加遙思上林苑無樹不生花吕翁山所過連山塔山皆我太宗文皇帝用武之地而吕翁山則生擒洪承疇處也蓋有明末季驟加遼餉至八百餘萬竭天下之力奉東北一隅未收片甲之用而兵食兩詘人民離畔我太祖髙皇帝一舉薩爾滸而遼左之業成太宗文皇帝再舉吕翁山而關西之勢定今因叩謁祖陵親詣其地思經營草昧之艱難爰恭紀其事以示來許俾念祖宗得天下之不易益勵守成之志亦以舉其殷鑒明之鹿亡其必有所以失之之故也連山相接塔山峰溝壕壁塹凡幾重以守則固以戰勝將以勇氣吞遼東增募戍卒號百萬重臣經略操鐵券朝拜恩命暮縲紲舉棋不定曾無算監軍意氣壯且豪凌駕朝士如兒曹綿山亘海排鐵騎謂當唾手成勳勞太宗從容處以暇精兵已伏杏山下金支五色雲上蟠明卒望見魂驚怕奔走禦侮多英賢投石超距衆間間君臣一德功乃建人心既單必格天彼志離兮我志合如枯易摧朽是拉不數唐帝美良川祗今戰氣猶森颯陸血漂杵海尸浮乘潮雁鶩隨波鷗一時破竹十三萬傷我十人厮卒儔清流關側擒皇甫煌煌大業開疆土河山帶礪酬勛庸於鑠雲龍與風虎乃知皇天惟德親桓桓謨烈告後人從來守成事不易殷鑒應思鹿失秦交則為泰塞則否九重宴安豈宜恃不見吕翁山畔上將降猶設椒漿奠忠鬼寧逺道中作朝暾晃文軒峰色罨平楚行行破冷煙溪村復山墅湯池尚溫滑首山亦嶇峿城中梵剎夥豐碑何林樹摩挲認蝌蚪往迹猶堪覩勝國此雄鎮建牙開幕府借彼梵王力保此遼東土民怨曾不知佞佛嗟何補薑女祠山海關外數里薑女祠在焉祠前土邱為薑女墳望夫石在其側俗傳薑女為杞梁妻始皇時因哭其夫而崩長城今山西潞空直𨽻古北口並此處皆有薑女祠考杞梁之事見於左傳孟子非始皇時人可知即列女傳載有崩城之説亦無長城實據也然其莭義有可尚者故題以詩並識其梗概焉凄風秃樹吼斜陽尚作悲聲弔國殤千古無心誇節義一身有死為綱常由來此日稱薑女盡道當年哭杞梁長見秉彛公懿好訛傳是處也何妨山海關恭依皇祖聖祖仁皇帝元韻取豫嚴扃鑰思蒙拓海邉耕桑三輔接形勝兩京連羽衛初冬度期門曉漏傳橋山瞻此日龍步想當年列巘餘晴雪遙林散曙煙迎眸渾似畫撫序正為權事異九封谷心期舟濟川拳拳思在德大訓更昭然在德誠非昜臨風更慨然皇祖詩句也登澄海樓望海之作轣轆金軒展祀旋偶臨傑閣眺奫潫漫言此後難為水試望當前不辨天秦帝關存終失鹿漢皇舟阻未成仙擬徴坎部留吟句只恐雕龍讓廣川再題澄海樓壁我有一勺水瀉為東滄溟無今亦無古不減亦不盈臘雪難為白秋旻羞共青百川歸茹納習坎惟心亨却笑祖龍癡鞭石求蓬灜誰能忘天倪與汝共濯清澄海樓聨句乾隆八年十月十六日自盛京蕆事還京道入榆關登澄海樓望海雪霽千峰波明萬頃天容海色洵屬竒觀時張照梁詩正侍從因與聨句凡字畫涉水部者概不用仿歐陽修咏雪禁體也御製康回昔憑怒使地東南傾太始本無始常盈是不盈雙丸出其裏元氣鼓為營島嶼藐拳石臣張照御製軒樓敞繡薨巃疑貝闕仿佛見瑶京鞭石橋終斷噓煙市乍更星槎何處轉鼇柱若為擎邈矣端倪豁臣梁詩正御製雄哉氣象峥禹功思四載秦業剩孤城萬壑朝宗此纎珠茹納并由來無寸土亘古只空明直上到天險臣張照御製橫陳據地振目迷光皛浩耳駭聲砰轟精衛填難盡長虹駕可成三壺逺縈帶重嶴銷飛鯨賦羡木華博臣梁詩正御製吟推玉局英平鋪歷劫雪喜遇初冬晴望嘆曽聞若來遊誰逐蜻內光含煜煜隂火涼熒熒絶域隨風達臣張照御製方諸應月呈坎重不失信天一乃居貞比樂韶觀止如山聖景行空傳香象踏謬執窄蠡評有以謙能受臣梁詩正御製虛將白自生苞乾恢度量吐日煥晶瑩永奠寰區宴仙鄉底問程夷齊廟盧龍孤竹城夷齊廟在焉史稱夷齊恥食周粟餓死首陽詩云采苓采苓首陽之巔疏謂在河南蒲坂而莊子則曰首陽山在岐山西北曹大家云在隴西元和郡國志謂首陽山在河南偃師説文又謂在遼西則是首陽凡五各有證據而其為夷齊餓死之處則一也將孰之從惟遼史所載營州鄰海軍下刺史本商孤竹國今之盧龍即遼營州地也爾雅所舉孤竹北户注謂孤竹在北周時幅員不廣其以此處為極北固宜然則説文所謂首陽山在遼西者此為近之殆以詩在唐風而叩馬而諫當武王伐紂之時由是岐隴蒲偃皆附會其説耳夫夷齊清風在天下何處非首陽豈爭疆域乎冕旒而墨胎以祀者尤非其志因係以詩而考其説如此軒冕泥塗是本腸肯容儒雅汚冠裳薇苓依舊西山岵頑懦羞登夫子堂只謂心慚蹤異武敢將口實罪歸湯豈爭隴右還蒲左天下清風盡首陽恭奉皇太后祇謁盛京祖陵禮成回鑾途次紀事用平聲韻豫宅維皇乃眷東二陵佳氣日蘢蔥靈長世次更昭穆太室蒸嘗愾僾同襟帶山河百二重始基王業此為宗厚如長白千秋奠博似滄溟萬物容珠軒環繞混同江𨽻旗捕貂採珠者謂之珠軒此外乃使犬使鹿諸部聲教朝鮮文物邦見説漢皇誇力並齊民割盡只從厖正是秋霖作勢時巧雲捲盡雨千絲七月八日啓行已告廟矣乃自初三日霖雨不止將改禡行而初七日忽爾開霽至今經月總遇晴和士卒免泥淖之苦孰非天恩浩蕩耶黍華稻秀郊原濶都喜金風次第吹途經塞北草初肥好試今秋第一圍日暮旌門觀獻獲龍坰雁磧淡煙霏氊屋紗窗四面疏山容罨畫正秋初題詩何必芭蕉緑楓葉紅通亦可書佽飛警蹕萬人趨御路騰驤汗血駒敬仰列朝遺烈在于田猶識舊規模曉景霜華點嫩荑青山落月欲沉西白盧醅熟傾渾脫翠釡酥香糝杏泥親扶慈輦寸心諧視膳長承色笑佳諸部名王將婦子呼嵩道左覲思齋木葉峰邉江水回陪京人望六龍來降原陟巘髙皇始寶籙千秋自此開升平詎敢忘艱辛肇造維清受命新指點松山咨史氏同驚文祖果天人松山乃疇十太宗文皇帝破明洪承三萬軍之處也髙山天作古來聞度室遷居事亦紛欲問當時遺老盡百年休養富耕耘聖祖三臨鄗上村如弦馳道至今存金魚鑰啓雙龍闕鐵嶺山看萬馬屯翠華棽麗隱鳴鑾故國人爭夾道看歌想大風千載調恩施時雨萬民歡至盛京肆赦頒恩一遵皇祖之制弗敢違也質明祗肅謁橋山不禁汍瀾涕淚澘草昧幾多勞締造坐教清宴御瀛寰侍臣珥筆屬車邉賡和詩郵詠有年不是汾隂求錫羡無須含諷賦甘泉緬想戎衣烽燧銷金甌萬祀九瀛朝折衝赳赳嫖姚霍指示堂堂主吏蕭憑弔英賢仰泰交椒盤親酌奠荒郊藎臣念祖心應切佐我推車彚拔茅父老歡言執豕牢肯教此日靳恩膏鳳凰樓畔巍巍閣猶有當年車甲韜賔客追陪諸部多行行霓彩照遼河雲門曲奏催銀管寶勒鈴懸過紫駝漢廷豐沛不須誇中外而今共一家瀋水乍看金寫月燕臺旋歷玉為花崇政清寧儼御床曾孫纍葉仰重光葛燈土壁猶餘儉開創艱難刻敢忘自昔周詩詠鎬京臯門重見拂龍旌誰云東主西賔别歸故鄉來弗送迎澄海樓髙據地靈憑欄縱目俯滄溟大欽島與秋雲並只剩如螺一點青樂府曾聞奏上陵南陽鼎業此龍興日臨黃道晶陽麗風動金鑾玉宇澄禮成回輦愜來遊山海逶迤玉露浮􅕗穗多遺秋麥緑吟鞭輒為一停留九重宫殿宴居深詎悉民間疾苦心百日周行五千里蒼穹對越倍生欽長途羽騎久驂驔牧圉籌量易再三是役恐途長馬疲因命扈駕官兵皆三易其騎關外槲林全緑隕關中楓葉始紅酣行宫間揭却寒簾老菊經霜紫玉􅊏一路詩題天賜與白雲蒼岫口重占許多行色染征衫望輦都人喜氣咸周覽山川識天險皇圗固豈恃崤函詩乾隆十七年壬申瑞樹歌長白之山天所作隆崇案衍鄰嵎峓衆水之源會其極中産萬物兩儀神秀鍾於兹萬木偨池鬱爭長問年皆在循蜚疏仡時以上厥有瑞樹為之伯如星拱北羣所瞻仰栖靈祗命圖以來真神竒畢歆河本鴨緑支船不能進易威呼溯流而上乃至西埒墨勒溪威呼又不能進捨舟陸行一由旬斯見瑞樹臨厜㕒近樹無凡草金光蔚敷披聳身三丈五尺餘叶七分去二其合圍上分十有二大枝莖葉輪囷各異姿其種有八若列眉松檜白楊遮勒穆期紫樺白樺密克特木及白榆叶自頂至根合十餘丈峥參差靈芝九本三秀滋是皆紀實非虛詞乃信神壤天所祕未許塵世尋常窺大椿徒傳八千嵗較此奚啻父視兒特一瑞樹真足陵駕前古史所垂宜乎長白之山開我國家萬年有道無疆基欽定盛京通志卷十二
