body:
  text: 欽定四庫全書欽定盛京通志卷三聖製三世祖章皇帝御製文詔碑文祭文欽定四庫全書欽定盛京通志卷三聖製三世祖章皇帝御製文詔入關定鼎登極恩詔順治元年皇帝詔曰我國受天眷佑肇造東土烈祖邁圖鴻緒皇考彌廓前猷遂舉舊邦誕膺新命逮朕嗣服雖在冲齡締念紹庭永綏厥位頃緣賊氛洊熾極祻明朝是用託重親賢救民塗炭乃方馳金鼓旋奏澄清既解倒懸非富天下而王公列辟文武羣臣暨軍民耆老合詞勸進懇切再三乃於今年十月初一日祇告天地宗廟社稷即皇帝位仍建有天下之號曰大清定鼎燕京紀元順治緬維峻命不易創業尤艱况當改革之初更屬變通之會爰乃酌今凖古揆天時人事之宜庶幾吏習民安彰祖功宗德之大所有合行條例臚列如左郊天配祖詔順治五年皇帝詔曰大一統之業禮莫重於配天通孝思之誠情莫切於尊祖謹於順治五年十一月朔八日冬至恭祀天於南郊奉太祖承天廣運聖德神功肇紀立極仁孝武皇帝配饗即於是日推本孝思追尊太祖以上四世髙祖澤王為肇祖原皇帝髙祖妣為原皇后曾祖慶王為興祖直皇帝曾祖妣為直皇后祖昌王為景祖翼皇帝祖妣為翼皇后考福王為顯祖宣皇帝妣為宣皇后典禮綦隆覃恩宜廣特大赦天下以慰官民應行事宜條列於後奉太祖太宗配饗詔順治十四年皇帝詔曰自古帝王禋祀天地必崇奉祖宗侑饗所以昭功德申孝敬甚巨典也恭惟太祖武皇帝智勇懋昭肇開駿業太宗文皇帝寬仁覃播繼廓鴻圖厚德豐功俱垂萬世並宜配饗以盡尊崇朕仰承天眷纘嗣先猷南郊祈榖奉太祖武皇帝配祀典禮已先舉行兹復昭告天地宗廟社稷率諸王貝勒羣臣於順治十四年三月初六日如冬至祈榖儀恭祀上帝奉太宗文皇帝同配於初九日如夏至儀恭祀皇地祇奉太祖武皇帝太宗文皇帝並配式舉宏章宜頒湛惠碑文肇祖原皇帝碑文粵稽書稱觀德詩詠發祥莫不由本支而溯厥初生祇享假以垂夫來葉既隆報本之典亦昭受命之符洪惟我肇祖原皇帝暨原皇后德合天地功配隂陽似后稷聿始周模同帝嚳肇開唐業啓迪列祖雄圖衍百祀家傳默祐冲人大統懋九圍帝業顧瞻陵廟彌嚴祗敬之心鐫勒碑銘益篤靈承之慶卜年卜世光華宣著千秋以祀以禋繼述遐昌奕代昭垂有永申錫無疆興祖直皇帝碑文稽承家之遐慶溯開國之鴻圖積德纍仁發祥有自肇基垂統錫祉無疆洪惟我興祖直皇帝暨直皇后誕樹厥德聿宣乃武雖大勳未集而經綸已建當草昧初開而謨烈允光令緒昭垂皇圖式啓逮豫冲人承兹丕緒涖九土之率從合萬邦之愛戴陵原重建洽篤祜之歡心廟貌鼎新彰開天之盛烈永錫遐祚萬祀承庥景祖翼皇帝碑文粵稽祖德攸崇爰啓承家之緒宗功有永益隆篤祐之恩蓋追盛業以溯開天宜紀鴻勳以昭受命既彰發祥之有自更申錫福之無疆洪惟我景祖翼皇帝暨翼皇后宏謨大烈厚澤深仁雖未集耆定之勳而丕宣有象實始建經綸之業而式廓用光令緒丕昭已見六州歸命皇圖肇造先占率土傾心原廟重新弓劍衣冠皆起羮牆之慕山陵永奠子孫臣庶咸䝉佑啓之仁爰勒豐功作本支之百世載揚休烈錫嘉祉於千秋繼述遐昌昭垂不替顯祖宣皇帝碑蓋聞天肇一代之運必著開先啓後之勳聖垂百世之模必有積德纍仁之實丕基方建締造惟勤大業式宏駿龎宜勒用申報本之典益彰受命之符洪惟我顯祖宣皇帝暨宣皇后文謨丕顯武烈載揚星流華渚已秉赤日之祥電繞辰樞更兆神龍之瑞雖皇猷肇啓大勳未遍於寰區而帝緒昭垂聖德實留於奕祀橋山載闢百千載無斁明禋原廟重新億萬年用鐫令烈承庥有永佑祚無疆興京顯佑宮碑文自古帝王統御天下必以仁義為本尤懋恭肅而崇祀明神蓋期國祚熙昌俾兆民無不康寧之故欽惟神莫大於昊天而事莫隆於開創䖍恪之志益當加倍尋常惟兹興京所建顯佑宫始於締造之初昭事上帝之所其關甚重運祚靈長神實啓之臣民瞻仰神實迪之是以國家膺圖御籙固我太祖髙皇帝太宗文皇帝開駿業而肇鴻基本仁義而施政教所致然荷兹天眷者豈非誠敬萬靈懷柔河嶽之故歟是以天無所不在事天之心即無時不謹稽王業所自始地擅神臯遡祖德所潛通歆居上帝朕夙夜寅恭冀登上理眷念受命發祥之地益深欽天率祖之思已命所司繕整維新春秋禋祀載表功德樹豐碑以傳不朽於戲艱難不昧常懷對越之誠丹雘丕章永保岡陵之固後之子孫臣庶其無忘朕敬事之意焉盛京景祐宮碑文自古帝王之興莫不首隆祀典凡有功德於民者皆為建壇宇而通肸蠁蓋神既佑民以福國則國必崇祀以報神此廟貌之所由隆也我太祖太宗手定大業拯斯民於塗炭膺景祚之綿長雖積功纍仁所致而百神之靈實式憑之大清門東三官殿尤神靈顯赫而及民功德為最著者考之道書三官廟之神有天地水府之别國家當干戈擾攘之際急圖康阜使時和年豐室廬相慶則天官賜福主之其或貫索未空金氣猶沴使斯民秉德格非逺刑罰而登仁夀則地官赦罪主之又或大軍之致凶年大荒之致竒疫滌其眚災而消其害氣則水官解厄主之然則使民康寧而因以默佑我邦家孰非神之賜也歟嗚呼發祥重地永藉呵護之靈凡我生民咸䝉乂安之福爰命勒石用表神功以垂不朽云莊親王舒爾哈齊碑順治十一年惟國家褒顯宗英推崇皇族生頒榮秩歿豫追封所以篤本支昭親愛也爾達爾漢巴圖魯舒爾哈齊乃太祖髙皇帝胞弟朕之叔祖系序既尊天潢孔切更生賢胄克奏膚功宜用追崇以彰祖德兹特加封爾為莊親王列在藩屏聿展貽孫之義光施泉壤允敷敦睦之仁勒諸貞珉永垂不朽𢎞毅公額亦都碑順治十一年帝王得人共圖大業治定之日必昭其功於天下後世以志不忘洪惟我祖宗創業艱難一時鷹揚之佐遘㑹風雲號稱濟濟成蹟具在藏於冊府額亦都者奮跡戎行戰功久著從征哈達烏拉葉赫暨攻圖倫襲塞克濟率衆先登敵無堅壁至取巴勒達城奮軀登堞矢貫其身連於堞上以刀斷之猶能入城其鷙猛有過人者少年歸命身經百戰屢被重創遍體瘡痍如收赫錫赫瑚爾哈雅蘭諸部又能以少擊衆俘獲甚多開拓疆土厥績懋焉太祖嘉與勳庸賜以婚媾及其殁也先皇復加追序髙爵崇祀軫恤甚備國有若臣可謂忠勇忘身有始有卒者矣用勒貞石以示表章嵗月逾逺嘉績彌彰於以褒勸有功庶幾宣力國家者聞之而有感焉忠義公圖爾格碑順治十一年國家肇造鴻業櫛風沭雨宣力效忠繄虎臣是賴故生膺寵錫歿與表揚公侯干城渥以典禮所以傳其豐功偉績至今而不衰也故忠義公圖爾格義勇無敵忠藎不渝曩從太祖屢著戰功翼佐太宗戰山左扼關門逐錦杏身被重創灑血疾趨惟爾庸特下青齊克名城殲渠魁先後登殿力保御幄惟爾庸方期爾共享太平股肱是寄而爾早侍皇考於九天矣朕惟追憶前勞悼念無已雖恩恤屢加朕心猶歉特允禮臣請勒石銘勳昭垂百世於戲忠貞世篤賞延於後其所謂文武為憲者耶爾英爽昭著服兹寵休垂示後人庶識朕報功之典永永罔替云果壯公超哈爾碑順治十四年朕惟國家開創大業必有英賢佐命建立鴻勳生固顯秩崇階振威德於天下歿亦榮名美諡傳盛烈於後昆此録故舊之深情勸忠臣之巨典也緬惟我太祖太宗時舊臣推誠宣力矢志服勤貞心亮節屹然不磨朕豈能已於追念也哉爾超哈爾原係護軍統領任禮兵二部侍郎以辦事有能授騎都尉後往董家口送諭帖遇敵哨兵殺之二次征明都城時擊敗敵哨生擒䝉古二人都城北遇敵兵及盧溝橋步兵領護軍纛擊敗之初次過明都城往征山東時遇馮太監兵率本參領兵擊敗之指揮攻克任邱縣遇趙北口守河橋步兵領本旗兵步戰擊敗之又遇郝總鎮兵率本參領兵步戰擊敗之出邊之時遇太平寨馬步兵遵指揮擊敗之爾乃能益勵忠誠封疆攸賴及三次圍錦州時城內兵出戰在關廂爾遇敵鋒捐軀報國可謂始終盡瘁者矣今追述往事軫念前勳效力致勇死於原野諡曰果壯以垂不朽特命勒諸貞珉以光泉壤用昭朕故舊不遺之至意云爾端壯公納爾察碑順治十四年朕惟國家開創大業必有英賢佐命建立鴻勳生固顯秩崇階振威德於天下殁亦榮名美諡傳盛烈於後昆此録故舊之深恩勸忠臣之巨典也𬗟惟我太祖太宗時舊臣推誠宣力矢志服勤貞心亮節屹然不磨朕豈能已於追念也哉爾納爾察原係騎都尉因攻伊罕山城先登取之後征明時進三等輕車都尉爾乃益勵忠誠封疆攸賴同十六大臣效力行間勤勞茂著後攻沙嶺城時爾禦敵衝鋒捐軀報國可謂始終盡瘁者矣今追述往事軫念前勳守禮執義死於原野諡曰端壯以垂不朽特命勒諸貞珉光及泉壤用昭朕故舊不遺之至意云爾僖順公巴拜碑順治十四年朕惟國家開創大業必有英賢佐命建立鴻勳生固顯秩崇階振威德於天下歿亦榮名美諡傳盛烈於後昆此録故舊之深恩勸忠臣之巨典緬惟我太祖太宗時舊臣推誠宣力矢志服勤貞心亮節屹然不磨朕豈能巳於追念也哉爾巴拜原係䝉古喀爾喀貝子能識時運倡率部屬首先投順因以郡主下配授三等子爾能益勵忠誠稱乃厥職今追述往事軫念前徽小心恭慎和比於理諡曰僖順以垂不朽特命勒諸貞珉光及泉壤用昭朕故舊不遺之至意云爾二等子都統佟養性碑順治十四年稽古建業驅策羣力不吝爵賞以勸有功昭示於後用傳不朽所以勵忠藎甚備也爾佟養性原係明撫順城人能識時運誠心來歸故賜女為額駙授為三等男克遼東後升為二等子爾能益勵忠誠稱乃厥職為漢軍都統率領鳥鎗效有勤勞是真始終盡瘁克襄王室者矣今追述往事軫念前勳勒諸貞珉光及泉壤國典臣忠庶幾昭垂無斁哉直義公費英東碑順治十六年國家締造鴻圖奬豫勞勩厥有常典至隆備也况始事之臣櫛風沐雨功載盟府者乎爾費英東忠赤有謀沉雄善斷當太祖髙皇帝時首先歸命漸陟崇班始力擒兌沁巴顔兩征佛訥赫地方度取撫順皆能奮勇先進出竒制勝額齊克貝勒矯制移城爾獨能抗直不回大義凛凛攻葉赫志在必克進無返顧卒下其城前後數十載劻勷大業遐暢天威摧陷之勳實多嘉賴雖積勞殞身休烈未泯先皇受命之初追念厥功特崇顯爵配享廟庭而表章尚闕因樹兹貞石昭示將來生建壯猷歿膺寵錫榮哀有赫式慰永懷庶使宣力國家者聞之有感云祭文祭告長白山文朕惟國家受命凝庥則山川百神罔不協瑞矧溯興王之迹推翊運之祥尤宜肇舉明禋誕加顯號蓋自天作高山形於歌頌其來舊矣惟神秀結東陲澤均厚載濬發三江之派廣延千里之區極敷雲泄雨之竒宏濟物利民之用神山異蹟莫有與京仰緬列聖龍興實基此地殊珍萃於盛世寶厯奠於萬年爰念靈符應申昭報朕兹博採彝章折衷禮制特封為長白山之神載諸祀典神其益彰英爽丕贊昌期尚歆時享於春秋永奠鴻禧於宗社專官告祭惟神鑒知欽定盛京通志卷三
