body:
  text: 忠節二元明欽定四庫全書欽定盛京通志卷八十三忠節二元石天應字瑞之興中永徳人善騎射豪爽不覊頗知讀書穆呼哩南征承制授天應興中府尹俾從征臨機應變捷出如神旗用純黑人目之曰黑軍大小二百餘戰身先士卒後從穆呼哩征陜右攻葭州抜之因説穆呼哩以勁兵留守葭蘆分兵四出悉定葭綏之地以功遷兵馬都元帥移軍河中金軍潛師由中條來攻天應命驍將呉澤設伏澤嗜酒醉卧金軍由間道抵城下遂入城天應飲血力戰死初天應死事時弟天禹子佐中伺敵少懈倒抽其斧反砍之突城而出趨穆呼哩行營求得䝉古軍數千回與敵戰敗之穆呼哩嘉其勇奏授金符行元帥穆呼哩原作木華黎今譯改劉徳仁遼東川州人為律州節度使丙戍金將伊喇副樞攻絳州悉力守禦城䧟不屈死之伊喇八旗姓原作移剌今譯改耶律特黙契丹人元初授帥府監軍與其子天祐從元帥史天倪畧趙州等縣及邢洺磁相懐孟等路有功穆呼哩承制授特黙真定路安撫使洺州元帥進降澤潞復有功遷河北西路安撫使兼澤潞元帥府事嵗壬午致仕居真定子天祐襲職乙酉金降將武仙據真定叛殺守將史天倪特黙父子踰城而出將以聞遇天倪弟天澤於滿城合蒙古諸軍南與賊戰遂走武仙復真定朝廷以天澤襲兄爵而以天祐鎮趙州明年武仙復犯真定天澤潛師出藁城特黙與妻舒穆嚕氏及家孥在真定者皆陷焉武仙遣特黙僕劉攬爾持書誘天祐言能以趙州降當活汝父母特黙密令攬爾語天祐曰忠孝難兩全汝能固守不失國家大計我視刀鋸甘如蜜矣天祐痛哭承命馳至藁城以賊書示史天澤天澤曰汝能遵父命忠誠許國功不在王陵下天祐乃趨還趙璧率衆殊死戰武仙怒盡殺特黙家一十八人戰於欒城等處武仙兵屢挫叛將張林啓闗納賊天祐倉皇巷戰手殺數十人斬闗復出收散卒圍城丁亥賊棄城走追至藁城與天澤兵夾擊殺叛將張林加洺州征行元帥趙州安撫使天祐以傷憊致仕卒特黙語解見名宧卷二原作忒末舒穆嚕八旗姓原作石抹攬爾原作攬兒今俱譯改李伯温義州人守賢之孫彀之子也行平陽元帥府事鎮青龍堡知平陽已陷弟守忠被執選驍勇拒守久之金人盡鋭來攻李成開水門導之入伯温登堞樓謂左右曰吾兄弟受方面之寄今不幸失利誓以死報國吾弟已被執我不可再辱汝等宜自逃生士卒皆猶豫不忍去伯温拔劍先殺其家屬投之井中自以刃植柱刺心死後金兵登樓見伯温抱柱面色如生共稱為烈士李伯通彀之次子嵗甲戍錦州張致叛國王穆呼哩命擊之大戰城北伯通死之李守忠義州人官至河東南路兵馬都元帥兼知平陽府事壬午冬平陽公胡景山以青龍堡降嘗從攻益都北還軍將彭智孫乘間據義州叛守忠聞之長驅抵其城下力戰復之丁亥夏四月金赫舍哩真襲平陽守忠援權國王阿勒楚爾于洪洞會於高梁師潰平陽遂䧟金人執守忠至汴誘以高爵使降守忠不屈罵之語惡金人怒置鐵籠中火炙死赫舍哩八旗姓原作紇石烈蒙古語阿勒楚爾手巾也原作按察兒今俱譯改按元史李伯温傳言弟守忠被執又云子守正自幼嘗質于穆呼哩又云守正裹瘡戰殁以其兄守忠代之夫守忠既為守正之凡則不得為伯温之弟矣史傳有誤特附辨焉存疑以俟考李守正伯温子為平陽守活俘虜甚衆以功授河東南路兵馬都元帥嵗庚寅上黨晉陽合兵攻汾州城將䧟守正赴援衆寡不敵别遣老弱百人曳柴揚塵多張旗幟敵懼遂解去汾人迎犒者道不絶且泣謝曰幸公完是州徳甚大願奉是州以從闗中兵屯吉州酋領楊鐵鎗以數千人叛守正出兵擒之希禪據隰州守正往擊之中矢傷足及歸瘡甚會金將完顔哈達攻平陽守正裹瘡戰殁大帥乃以其兄守忠代之哈達解見京城卷原作合達國語希禪清淡也原作軒成今俱譯改蕭拜珠契丹舒穆嚕氏為平州右族嘗從成宗北征厯官知中山府事武宗時拜御史中丞仁宗即位進中書右丞平章政事時特們徳爾再入相恃勢貪虐拜珠每牽制之御史中丞多爾濟時復糾正其罪遂罷相仁宗崩特們徳爾假太后㫖收拜珠及多爾濟皆殺之並籍其家是日風沙晦暝道路以目㑹天災求言平章張珪告丞相拜珠曰蕭揚等寃獄宜急昭雪丞相以聞詔贈拜珠薊國公諡忠愍拜珠原作拜住特們徳爾即特穆爾䝉古語鐵也原作鐵木迭兒多爾濟䝉古語金剛也原作楊朶兒只今俱譯改攸哈喇巴圗其先渤海人初名興格金末避地大寧元兵至出保高州富庶寨射獵以食屢奪元營孳畜又射死追者穆呼哩率兵收寨寨破奔高州力屈始歸元穆呼哩曰此壯士也留之為吾用𨽻麾下從攻通州造攻具州將懼出寶貨以降穆呼哩命興格恣取之興格獨取良馬三賞兵士穆呼哩以其功聞太祖賜名哈喇巴圗後從穆呼哩畧地燕南以功授河東北路兵馬都元帥鎮太原修城池繕甲兵招降屬邑市肆不改嘗微服夜出聞民間語曰吾屬父母子女相失矣死者不可復生生者無以為贖奈何明日下令軍中凡俘獲有親者聽贖無貲者官為贖之民得完聚者衆庚辰二月破金西風寨又破隰川辛未三月哈喇巴圗引甲騎十餘人救夀陽至王胡莊道三交大戰金兵遁五月金趙權府帥兵三萬圍太原哈喇巴圗將三十騎出西門令騎曳柴揚塵宣言曰我兵三萬至矣金兵俱潰去癸未大敗金師于太谷縣設伏于險又敗之甲申十月抜陵井寨乙酉二月降清泉寨酋長王殻降石家昂亦降丁亥五月奸人夜獻太原於武仙仙引兵大至諸將呼哈喇巴圗出哈喇巴圗曰我棄太原何面目見主上與國王乎誓與此城同存亡遂出力鬭殁於陣長子蒙古岱嗣守太原哈喇蒙古語解見黑龍江山川卷巴圗解見疆域形勝卷原作哈剌抜都興格原作興哥蒙古岱蒙古語蒙古銀也岱有也原作忙兀臺今俱譯改高元長女直人襲父總管職嘗從世祖渡江攻鄂還鎮隨州移鎮季陽至元十年從攻樊城先登十一年復率兵渡江屢敗宋孫虎臣夏貴兵奪其戰艦鎧仗及攻常州復先登積功至懐逺大將軍二十三年從征交趾襲其世子于海之三义口與敵軍合戰中毒矢陣亡明趙傾葵廣寧衛人嘉靖中為薊鎮㕘將三十四年冦犯馬蘭峪傾葵往禦與指揮禇文明等俱力戰死贈都督同知諡忠壯趙允植遼陽人崇禎二年任盧龍教諭品行端方勤於訓士凡有啓迪必以忠孝行誼為先嵗庚午王師破盧龍允植與妻欽氏並殉難其女亦殉難死本朝乾隆四十一年賜趙允植祀忠義祠王世泰遼東人崇禎時知内邱縣六年冦掠西山與弟世寧禦之豹子口俱戰死本朝乾隆四十一年賜諡烈愍萬代芳遼東人知延長縣崇禎八年流賊攻城代芳晝夜悉力堅守城破死之妻劉氏妾梁氏俱從死本朝乾隆四十一年賜諡節愍王元㑹蓋州衛人知鄖西縣崇禎十二年賊渠張獻忠掠湖廣諸郡縣夜襲鄖西城破為賊所殺本朝乾隆四十一年賜諡節愍李孔効一作孔效遼陽舉人崇禎十二年知竹溪縣明年八月張獻忠李自成等十三營圍城孔効百計以禦總兵左良玉擁兵不救防兵内應城䧟孔効持刃伏短垣間伺賊過輒突出奮殺力盡被執大罵不屈而死本朝乾隆四十一年賜諡節愍門迎恩遼東人官南陽主簿崇禎十四年冦䧟郡城與知府顔日愉訓導楊氣開同時殉節時稱三忠本朝乾隆四十一年賜門迎恩入祀忠義祠呉良能蓋州衛人崇禎時知滕縣十五年王師至滕縣城將破良能盡殺家屬拜辭其母單騎犯陣死本朝乾隆四十一年賜諡忠烈劉士璟一作燝復州衛人知沐陽縣有彊幹才崇禎十五年王師下濟南遂直趨淮徐圍其城士璟竭力捍城城破死之本朝乾隆四十一年賜諡節愍高應詔遼東人以指揮同知分防水冶鎮流賊東下應詔率兵連戰破之賊復大舉入冦應詔復拒之於倪村孤軍援絶遂戰死水冶卒全賊退民求得其屍瘞鎮之東源本朝乾隆四十一年賜諡烈愍徐廷試遼東人知郟縣崇禎十六年隨督師孫傳庭討賊有功授職甫莅任三日羣賊蟻聚攻城城䧟死之本朝乾隆四十一年賜諡節愍應時盛遼陽人起家小校至都督僉事任山西撫標中軍副總兵慷慨仗義都御史中丞蔡懋徳深倚之甲申春闖逆犯太原時盛誓衆死守賊招之不降城破中丞蔡懋徳拔刀欲自刎為麾下所奪時盛請下城巷戰遂扶懋徳上馬時盛持矛突殺數十人至炭市口賊衆充斥時盛呼曰且擁公出西門懋徳不行下馬據地坐時盛已出城還顧不見懋徳復砍門入曰公不負朝廷中軍焉敢負公請與公俱死遂同入三立書院懋徳就縊未絶時盛釋甲加諸肩乃絶再拜訖抽弓絃自勒死本朝乾隆四十一年賜諡忠烈周遇吉錦州衛人少有勇力好射生後入行伍戰輒先登積功至前鋒營副將崇禎十年從討賊河南戰光山固始皆大捷後復討破胡可受於浙川降其全部出師襄陽遇吉守槐樹闗張獻忠遂不敢犯嗣復與諸將大破羅汝才於豐邑坪與黄得功破賊鳯陽屢加太子少保左都督十五年代許定國為山西總兵官汰老弱繕甲仗練勇敢一軍特精十六年十二月李自成西䧟全陜將犯山西遇吉分兵扼河上流以下流蒲坂屬巡撫蔡懋徳而請濟師於朝十七年二月太原陷懋徳死之賊遂陷忻州圍代州平陽守將説遇吉降遇吉立斬之憑城固守潛出兵奮擊殺賊無算㑹食盡援絶退保寧武賊踵至大呼曰五日不降且屠城遇吉四面發大礟殺賊萬人火藥盡外圍轉急於是設伏城内出弱卒誘賊入城亟下閘殺數千人賊用礟攻城城圯復完者再傷其四驍將自成懼欲退賊將獻計曰我衆百倍於彼但用十攻一畨進靡不勝矣自成從之前隊死後復繼賊死亡如麻而官軍力亦盡城陷遇吉巷戰馬蹶徒步跳蕩手格殺數十人身被矢如蝟竟為賊執大罵不屈賊懸之高竿叢射殺之復臠其肉城中士民感遇吉忠義咸呼噪巷戰殺賊不可計而兵民亦死亡畧盡遇吉死京師遂不守賊每語人曰他鎮復有一周總兵吾安得至此當遇吉死時其夫人劉氏素勇健率婦女數十人據山巔公廨登屋射賊殺百人賊縱火焚之闔門皆死于難本朝乾隆四十一年奉㫖予諡明季殉節諸臣以遇吉孤軍乘城百戰不屈驍勇蓋代義烈冠時賜専諡曰忠武彭士宏錦州人後徙家江西廬陵知南宫縣崇禎十七年流賊攻南宫城陷士宏被執罵賊不屈遂為所殺本朝乾隆四十一年賜諡節愍呉遵遼陽人渠國公成八世孫襲爵清平侯甲申三月闖賊李自成陷燕京遵殉節死本朝乾隆四十一年賜諡節愍李尊祖鐵嶺衛人襲封寧逺伯崇禎十年闖賊陷都城尊祖遇賊於西直門力闘不屈死於難本朝乾隆四十一年賜諡節愍劉肇基字鼎維遼東人嗣世職指揮僉事初隸山海總兵官尤世威麾下崇禎七年援宣府又從征中原流賊皆有功進遊擊戍雒南蘭草川明年與祖寛大破賊汝州斬首千餘屢遷遼東副總兵十二年冬薊遼總督洪承疇請用為署總兵官分練寧逺諸營卒尋擢肇基都督僉事任之明年三月錦州有警承疇命三桂偕肇基赴松山為聲援三桂困松杏間肇基救出之七月與曹變蛟等戰黄土臺及松山杏山九月復戰杏山十七年春加都督同知提督南京大教塲及福王立史可法督師淮揚肇基請從征屢加左都督太子太保可法議分布諸將奏薦李成棟賀大成王之綱李本身胡茂楨等為總兵官成棟鎮徐州大成鎮揚州之綱鎮開封本身茂禎隸高傑麾下為前鋒而令肇基駐高家集李棲鳯駐睢寧以防河並令張天禄駐𤓰州十一月肇基等以可法命謀取宿遷初八日渡河復其城越數日王師圍邳州軍城北肇基等軍城南相持半月我軍引還順治二年三月王師南下抵揚州可法檄諸將赴援獨肇基自白洋河趨赴高郵不見妻子既入城請乘我軍未集背城一戰可法持重肇基乃分守北門發砲傷圍者已而城破率所部四百人巷戰格殺數百人力不支一軍皆没本朝乾隆四十一年賜諡忠烈莊子固字憲伯遼東人年十三殺人亡命後從軍有功積官至㕘將嘗從山西總兵許定國救開封軍半道譟歸定國獲罪子固輯餘衆得免議後可法出鎮用為副總兵俾興屯於徐州歸徳間子固募壯士七百人以赤心報國為號聞揚州被圍率衆馳救三日而至城將破欲擁可法出城遇王師力戰死本朝乾隆四十一年賜諡烈愍曲從直遼東人官揚州府同知王師下江南圍揚州從直與其子守東門城陷不屈被殺本朝乾隆四十一年賜諡烈愍黄得功號虎山開原衛籍其先自合肥徙家焉早孤少負奇氣膽畧過人時邊事起得功持刀雜行伍中出斬首二級由是𨽻經畧為親軍累功至遊擊崇禎九年進副總兵分管京衛營十一年以禁軍從總督熊燦擊賊于舞陽鏖戰光固間功最八月又從擊賊馬光玉于淅川之呉村王家寨大破之詔加太子太師署總兵銜十四年以總兵䕶鳯陽泗州陵駐定逺張獻忠攻桐城得功與劉良佐合兵擊之賊敗遁追斬賊將馬武王興國得功箭傷面愈自奮轉戰十餘日所殺傷獨多十七年封靖南伯福王立江南進封侯旋命為四鎮明年得功移鎮廬州復命移鎮太平一意𠞰流賊論破左夣庚功加柱國時王師已渡江知福王奔分兵攻太平得功方收兵屯蕪湖福王潛入其營得功驚泣曰陛下死守京城臣等猶可盡力奈何倉卒至此王曰非卿無可仗者得功泣曰願效死得功戰荻港傷臂幾墮以帛絡臂督麾下八總兵前迎戰忽飛矢中其喉偏左得功知不可為擲刀拾所抜箭刺喉死其妻聞之亦自經得功忠義出天性聞以國事相規誡者輒屈已改不旋踵其軍行紀律嚴下無敢犯所至人感其徳本朝乾隆四十一年奉㫖予諡明季殉節諸臣以得功材昭武勁性懋樸忠衛主殞身克明大義賜専諡曰忠桓欽定盛京通志卷八十三
