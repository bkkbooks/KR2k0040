body:
  text: 風俗奉天各屬吉林各屬黑龍江各屬風俗總載風俗附識欽定四庫全書欽定盛京通志卷一百五風俗臣等謹按施于上為風成于下為俗我朝基迹大東太祖髙皇帝躬擷衣以教儉親射栁以訓武至于太宗文皇帝之世設館崇文彬彬乎禮樂之化焉伏讀御製土風諸詠追沕穆之初嘉淳朴之尚俾舊德先疇率由勿墜留都之地比戶可封書曰協和萬邦黎民於變時雍詩序所謂風自近以及逺豈不信歟謹志風俗第三十五欽定四庫全書欽定盛京通志卷一百五風俗奉天府各屬興京性情徑朴不事文飾射獵尤􅈺承德縣舊俗性朴實氣剛健習禮樂尚詩書今士習醇良民風朴茂近都邑者尤見衣冠文物之盛遼陽州舊俗勇敢善騎射淳朴力農今農知務本士尚橫經海城縣舊俗性剛好獵質多文少今謹身率教守法奉公蓋平縣舊俗氣質勇健勤於耕藝今男務耕耘女勤紡績文風既振曠土日開開原縣舊俗賦性質實務農習射今里有仁風户聞弦誦鐵嶺縣舊俗風氣剛果習尚敦龎今彌崇節儉知敦禮讓復州東海遺風頗習禮讓寧海縣利擅魚鹽俗勤耕織岫巖城旗民淳朴男務耕耘女勤績紡文風漸振曠土益開鳳凰城地近東陲民氣淳朴通商貿易㕓井富殷錦州府各屬錦縣舊俗士多慷慨重氣節弦誦成風今人文蔚起民俗懋淳寧逺州舊俗賦性質直亦習文藝今務農力作尚信義重詩書廣寧縣舊俗渾朴敦本而不逐末今士勵亷隅民安勤儉義州氣剛性朴騎射素􅈺吉林各屬吉林精騎射重誠信雅好詩書有質有文寧古塔性直朴善畋獵不務紛華敦尚信義白都訥人貴朴誠羣精騎射習俗簡略三姓諳水性喜畋獵阿勒楚喀勤耕作􅈺圍獵琿春儉朴相尚畋獵擅長黑龍江各屬齊齊哈爾性質朴好射獵兼習禮讓務農敦夲而不逐末墨爾根民性徑質務農之餘熟􅈺騎射黑龍江風氣醇古人朴厚好騎射呼倫布雨爾人徑勇性質直耕藝日勤漸成幹止風俗總載箕子教民以禮義田蠶織作犯禁八條民不相盜無門户之閉婦子貞信可貴哉仁賢之化也前漢書地理志昔箕子避地朝鮮始其國俗未有聞也及施八條之教使人知禁遂乃邑無淫盜門不夜扄回頑薄之俗就寬略之法行數千百年以柔謹為風有若箕子之省簡文條而用信義得聖賢作法之原矣後漢書舊風純直其祭天地敬親戚尊耆老接賓客信朋友禮意欵曲皆出自然金史俗無市井以射獵為業元史地理志性剛果善騎射元一統志人性淳實務農桑習文禮明一統志風肫實氣剛健習禮讓敦詩書奉天府志人多慷慨尚氣節有墨胎氏之遺風錦州府志性質朴果决好耕植之餘勤於騎射弋獵兼習禮讓務農敦本一統志黑龍江風俗勤儉畏法長於騎射通志風俗附載夫餘善射其人彊勇謹厚以弓矢刀矛為兵後漢書夫餘以臘月祭天大㑹連日飲食歌舞名曰迎鼓有軍事亦祭天後漢書天及春秋謹按滿洲國俗有每月祭列纛祭大祭之禮又出師凱旋有天之禮與此相合夫餘食飲用俎豆㑹同拜爵洗爵揖讓升降後漢書挹婁衆雖少而多勇力又善射發能入人目弓長四尺力如弩矢用楛長一尺八寸青石為鏃後漢書謹按肅慎楛矢國語孔子家語皆稱長尺有咫者乃指石鏃而言自後漢書以下乃皆云矢長一尺八寸夫以四尺之弓而矢僅尺餘恐無是理挹婁人似夫餘而言語各異後漢書馬韓其人壯勇知田蠶不貴金寶錦罽辰韓知蠶桑嫁娶以禮行者讓路辨辰人皆長大而刑法嚴峻後漢書馬韓常以五月田竟祭鬼神晝夜㑹聚歌舞輒數十人相隨踏地為節十月農功畢亦如之後漢書神之禮有謹按滿洲祀三弦琵琶鳴拍板司俎人等拊掌朝祭夕祭奏以和夕祭則司祝束腰鈴執手鼓前後盤旋蹡步凡朝夕祭皆有歌祝之辭又國朝舊俗喜起舞宴樂每用之謂之瑪克紳後漢書所記考之三國志晉書所載略同雖未必盡合其禮意則相似也又按滿洲舊俗田苗長時有祭田苗神之禮至秋收後又有場院之祭馬韓布袍革履辨辰衣服潔清後漢書辰韓各國為邦弓為􅋃賊為冦行酒為行觴相别為徒有似秦語辨辰與辰韓言語有異後漢書三韓諸國邑各以一人主祭天神號為天君又立蘇塗建大木以懸鈴鼓事鬼神後漢書謹按滿洲祭祀典禮家各設立司祝與此所云以一人主祭者相合建大木之儀又與滿洲立神杆為索杆祭祀之儀相合滿洲語稱祭祀有神鈴及腰摩與蘇塗音亦相近又滿洲神杆惟夕鈴手鼓等與此所云鈴鼓亦合但並不懸於梁祭儀有大小鈴七枚繫於樺木桿梢懸於架之西與史所載有不同耳東沃沮人性質直彊勇便持矛步戰後漢書濊能步戰作矛長三丈或數人共持之後漢書濊常用十月祭天晝夜飲酒歌舞名之為舞天後漢書濊人不相盜無門户之閉婦人貞信飲食邊豆少嗜欲俗重山川各有部界知種麻養蠶作綿布候星宿豫知年歲豐約後漢書夫餘衣尚白白布大𬒮袍袴屨革踏出國則尚繒繡錦罽大人加狐狸狖白黑貂之裘以金銀飾冒三國志夫餘有宫室倉庫牢獄作城柵皆員三國志馬韓其俗好衣幘下户朝謁皆假衣幘自服印綬衣幘千有餘人以瓔珠為財寶或以綴衣為飾衣布袍足履革蹻踏辨辰衣服潔清三國志馬韓其人性强勇辨韓便步戰兵仗與馬韓同三國志馬韓其民土著種植知蠶桑作綿布辨辰曉蠶桑作縑布嫁娶以禮男女有别行者相逢皆讓路法特嚴峻有瑟其形似筑彈之有音曲三國志東沃沮飲食居處衣服有禮節濊人性願慤少嗜欲有亷恥三國志肅慎氏夏則巢居冬則穴處無井竈作瓦鬲受四五升以食無鹽鐵燒木作灰灌取汁而食之晋書謹按南北朝史稱鹽凝於木皮之上又有鹽池而金時率賔以東食海鹽㑹寧瑚爾哈等路食肇州鹽則肅慎地未嘗無鹽或所言凝於樹上之鹽亦須煎煉乃成耳肅慎氏一名挹婁有石弩皮骨之甲檀弓三尺五寸楛矢長尺有咫晋書肅慎以言語為約野處而不相犯晋書夫餘俗出使乃衣錦罽馬韓貴瓔珠用以綴衣布袍履革蹻晋書馬韓性勇善用弓楯矛櫓雖有攻戰而貴相屈服辨韓其風俗類馬韓其兵器亦與之同晋書新羅甲兵同於中國選人壯健者悉入軍烽戍邏俱有屯管部伍風俗刑政與百濟同每八月十五日設樂令官人射賞以馬布北史勿吉勝兵數千多驍武黑水部尤徑矢皆石鏃人皆善射以射獵為業北史百濟之秀異者解屬文能吏事又知醫藥蓍龜與相術陰陽五行法有鼓角箜篌箏竽箎笛之樂北史百濟書籍有五經子史舊唐書渤海靺鞨有文字及書記太和七年遣學生三人請赴上都學問先遣學生三人事業稍成請歸本國許之舊唐書黑水靺鞨人徑健善步戰射獵新唐書新羅好祭山神重元每以其日拜神唐㑹要辨辰與辰韓風俗相似祠祭鬼神有異施竈皆在户西文獻通考神亦間隨謹按滿洲祭祀各姓徵有不同夕祭所奉之竈土俗山川而異至各盡敬以溯本源則一也為祭杞烹飪所用必在祀神室之中間屋內而開户近東故以為在户西耳渤海知書契習識古今制度號為東海盛國又獻通考女真俗勇善射能為鹿鳴以呼羣鹿而射之文獻通考謹按今哨鹿之制以木為哨具又象鹿之首戴之使鹿不疑惟精於獵者能之詳見御製哨鹿賦女真部族皆處山林有屋居廬舍門皆於山墻下闢之耕鑿與渤海人同無出租稅契丹國志女真人無定居行以牛負物遇雨則張韋為屋契丹國志女真其人朴勇每出戰皆被重札精於騎射從古以來無盜賊詞訟之事契丹國志粟末靺鞨後為渤海傳十餘世有文字禮樂官府制度金史女真人不得學南人裝束金史輿服志黑水舊俗隨水草以居遷徙不常獻祖乃耕墾樹藝治築室有棟宇之制舊無書契無約束昭祖稍條教為治部落寖强初諸部各有信牌穆宗用太祖議擅置牌號者置於法自是號今乃一民聽不疑矣自景祖以來一切治以本部法令金蓋盛於此金史世紀金因遼俗以重五中元重九日行拜天之禮重五於鞫埸中元於內殿重九於都城外其制刳木為盤如舟狀赤為質畫雲鶴文為架髙五六尺置盤其上薦食物其中聚宗族拜之金史金世宗大定十三年三月乙卯上謂宰臣曰朕時常見女真風俗迄今不忘今之燕飲音樂皆習漢風蓋以備禮也非朕心所好東宫不知女真風俗第以朕故猶尚存之恐異時一變此風欲一至㑹寧使子孫得見舊俗四月乙亥上御睿思殿命歌者歌女真詞顧謂皇太子及諸王曰朕思先朝所行之事未嘗暫忘故時聽此詞亦欲令汝輩知之汝輩自幼惟習漢人風俗不知女真純實之風至於文字語言或不通曉是忘本也汝輩當體朕意至於子孫亦當遵朕教也十六年正月上與宰執論古今興廢事曰女真舊風最為純直雖不知書然其祭天地敬親戚尊耆老接賔客信朋友禮意欵曲皆出自然其善與書所載無異汝輩習學之舊風不可忘也二十三年八月繹經所進所譯易書論語孟子老子揚子文中子及新唐書上謂宰臣曰朕所以令譯五經者正欲女真人知仁義道德所在耳令頒行之二十五年四月上謂羣臣曰上京風物朕自樂之每奏還都輒自感愴祖宗舊邦不忍舍去又慰宗室戚屬曰大平嵗久汝等皆奢縱往往貧乏朕甚憐之當務儉約無忘祖先艱難金史金世宗謂大臣曰國初風俗淳儉居家惟布衣非大㑹賔客未嘗輒烹羊豕二十七年禁女真人不得改稱漢姓及學南人衣裝有犯者抵罪金史金世宗謂宰臣曰㑹寧乃國家興旺之地自海陵遷都女真人寖忘舊風非長久之計甚欲一至會寧使子孫見舊俗庶幾效習之二十二年敕西北路招討司勒明安穆昆官督部人習武偹二十六年又謂右丞相原王曰爾嘗讀太祖實録乎太祖征瑪展襲之至泥淖馬不能進太祖捨馬而步罕都射中瑪展遂擒之創業之難如此可不思乎又謂宰臣曰西南西北兩路招討司地隘明安人戶無處圍獵不能嫻習騎射委各明安穆昆官依時教練金史都瑪展國語解見吉林山川卷原作麻産罕解見人物卷原作歡都今並譯改節序則元曰拜曰相慶重五則射栁祭天大金國志金俗好衣白自滅遼臣宋漸有文飾至於衣服尚如舊俗貴賤以布之粗細為别富人春夏多以貯絲綿紬為衫裳亦間用細布冬以貂鼠青鼠狐貉皮或羔皮為裘或作紵絲紬絹秋冬亦衣羊皮或獐鹿為衫袴襪皆以皮大金國志女真部其居多依山谷聨木為柵或覆以板與樺皮如墻壁亦以木為之冬極寒屋才髙數尺獨開東南一扉扉既掩復以草綢繆之穿土為牀煴火其下而寢食起居其上道路無行店行者息於民家主人具飲食而納之其市無錢以物博昜無工匠屋舍車帳往往自能為之大金國志金人舊俗炙股烹䔕音蒲膊肉也以餘肉和菜搗臼中糜爛而進率以為常凡宰羊但食其肉貴人享重客間兼皮以進曰全羊松漠記聞金人舊俗多指腹為婚姻既長雖貴賤殊隔亦不可渝壻納幣皆先期拜門戚屬偕行以酒饌往少者十餘車多至十倍飲客佳酒則以金銀斻貯其次以瓦斻列於前以百數賔退則分餉焉先以烏金銀杯酌飲貧者以木酒三行進大軟脂小軟脂如寒具次進蜜羔人各一盤曰茶食宴罷富者瀹建茗留客啜之婦家無大小坐於炕上壻黨羅拜其下謂之男下女禮畢牽馬百匹少者十匹陳於前婦翁選子姓之别馬者視之好則留不好則退留者不過十二三女家亦視其數而厚薄之一馬則報衣一襲壻皆親迎既成婚留於婦家三年然後以婦歸婦氏以奴婢數十戶牛羊數十羣每羣九牝一牡以資遣之大金國志渤海俗每嵗時聚㑹作樂先命善歌舞者數輩前行士女相隨更相唱和回旋宛轉號曰踏鎚所居屋皆就山牆開門王曽行程録金景祖始教人燒炭煉鐡刳木為器制造舟車建屋宇神麓記開元路有狗車木馬輕捷之便木馬形如彈弓長四尺濶五寸一左一右繫於兩足激而行之雪中氷上可及奔馬狗車以木為之其制輕簡形如船長一丈濶二尺許以數狗拽之二者止可於氷上雪中行之元一統志黑龍江一夫力作數口仰食而有餘而炊飪浣汲舂磑之事婦女並習勤苦故居人置奴婢價嘗十倍於中土奴婢多者為富以其能致富也龍沙紀略索倫人以射獵為生挽弓皆踰十石嘗自縳於樹射熊虎洞身曵之而歸尤善躡蹤人馬有亡失蹤之即得越數百里而知蹤之離合且能辨其曰次亦異能也龍沙略紀除夕懸弓矢門杙間相傳我太祖皇帝曽於除夕克强敵帝業由此以成諸屬國艷頌之遂沿為俗龍沙紀略逹呼哩索倫語音與䝉古稍異間雜漢語當是元代軍民府之遺索倫逹呼哩諸部涵沐我朝化澤頗以材武表見龍沙紀略秋盡俄羅斯來互市或百人或六七十人一官統之宿江之西居氊幕植二旗於門衣冠皆織罽為之昜縑布烟草薑椒糖餳諸物龍沙紀略江冰始獵婦女皆勇决善射龍沙紀略欽定盛京通志卷一百五
