body:
  text: 乾隆四十三年戊戌御製古今各體詩卷上欽定四庫全書欽定盛京通志卷十四天章皇上聖製詩乾隆四十三年戊戍追復睿親王封號并復其宗嗣襲封予謚配享詩以誌事有序稽宗盟之軼事展親兼以褒功覈方䇿之遺聞申枉因而繼絶睿親王者屬本懿藩分居執政勤勞王室棐忱洵同姓之良綏定燕京偉績更諸王之冠顧以任隆見嫉亦或氣盛招尤履霜之釁潛積於多年戴盆之寃頓興於既逝折斂衣為左證理知所必不然肆羅織以深文獄甚於莫須有徒以衆怨之搆成貝錦而執作爰書尚非親政之年矯綸綍而竟從重典繄予恭披實録鑒王實有大勲當危疑推戴之時拒羣議而匡扶冲主迨戡亂肅清之際迎聖駕而肇建丕基且誡比列之謟諛朂以尊君親上復斥同懷之愆戾加以義正詞嚴厯歴具存班班可考𬗟其誠藎皎如白日青天嘉乃壯猷允矣信今傳後使果有不軌之志未嘗無可乘之機乃貞心既矢於寢興豈逆跡轉萌於泉壤無端而暴其罪狀每惻於中如是而坐以叛名宜昭其屈念疇昔非由親决弗嫌成案之翻為國家特叙成勞惟協公評之當用是復其王爵仍教世襲茅封並為録彼宗支咸使列於玉牒葺園寢而春秋祀享配太室而殿廡筵班補列傳以連篇準易名之一字推祖宗之恩意辨誣足勝金縢勉子姓以欽承守緒奚煩鐵劵爰成四韻并引長言流言恐懼似周公公則生前王已終睿親王之寃獄與周公之被流言相似然公之受謗在生前故恐懼可以有待王則遭誣於身後故是非無以自明然予恭閲實録為之昭雪較諸感風雷而發金縢者似尤光明正大耳無倖位心真是睿有開基業孰齊忠謚増一字非私惠論定千秋付衆同配食襲封推祖澤睦親惇叙朂宗功命仍稱禮鄭豫肅諸親王及克勤郡王原封爵號並予配享詩以誌事有序溯維城於王室同扶有永之鴻圖考列爵於宗盟各著非常之偉閥事在本朝為極盛蹟皆前古所罕聞每以繹尋實録之文因有追叙成勞之典粤稽禮邸實惟讓王四路分殱薩爾滸助揚神武連營並克山海闗奮厲師貞翊聖明而特表藎誠誅逆惡而不徇私義至鄭王屬居近派䝉太祖育自宫中初定平壤之盟旋鼓寧逺之勇遵化歸化頻建豐庸松山杏山疊施勝算剪强藩而成一統識裕先幾膺攝政而䟽千言監陳前憲若夫論功之最惟豫尤超㓜統偏師荷嘉名之肇錫獨抒長䇿舉大勢以全規洎入燕京遂專閫節破潼闗而追流冦狂魄尋僵平疆介以定中原游魂自滅又如肅武親王之百戰稱雄而秦地恢城蜀疆殪賊勳尤崇也他若克勤郡王之屢征奏㨗而降納朝鮮計圖明塞畧更優焉是為同姓之股肱名皆炳著並昭當年之耳目人所艷稱乃日久而舊號俱更雖世及而遺風幾冺爰命復原封之字俾同竹帛以常新並教列配享之廂咸侑馨香而弗替餘凡類似悉予詳求念櫛風沐雨之勞使徴獻者知功宗之不朽比礪山帶河之永期襲次者懐祖烈以毋忘用紀長謌並疏小引貝勒讓帝如汝陽為最太祖大事禮親王於諸子中長而功徳隆茂衆望皆屬能太宗禮親王因作議書言紹承大統必得聖君始勘亂致治以成一統自顧徳薄願共推戴四貝勒嗣位入朝遍示諸貝勒大臣衆皆喜之太宗辭讓再三王意益懇切乃従薩爾滸戰我武揚薩爾滸之戰禮親王同薩爾太宗隨事太祖土功詳見向所作滸山書推戴冲主出丹誠叶不私子孫徳尤彰王之世祖嗣位時禮親子碩託孫阿逹禮曽孫謀立睿親王禮親王發其謀並誅之云宫中育養子姪行其名曰濟爾哈朗叶祖鄭親王為於宫太親姪㓜育中號和碩貝勒戰功多矣難數詳同攝政亦抒謀臧滅吳三桂見早强鄭親王病劇恩未世祖臨問泣對曰臣受三朝深能仰答不勝感痛惟願以取雲貴滅吳三桂統一四海為念之先世祖為之大慟逆藩日後之謀果不出王見也㓜領偏師建蹟昂褒䝉聖嘉賜美名叶宗豫親王㓜統偏師輒有功呼爾太嘉之賜號額爾克楚直入潼闗賊奔商旅師平定江南疆功莫大焉䇿允良王之戰功甚多難以縷舉至其破潼闗逐闖賊及平定江南尤其功之最著者也整兵直入肅親王陣斬巨冦張獻忠叶悉平内地讋諸羗肅親王射殪張獻忠並削除羣賊平定陜西禮親王子智獨長克勤郡王為禮親王長子有勇謀濟以悃愫復勇往叶盟定朝鮮勣克襄克勤郡王嘗同大貝勒阿敏及鄭親王征朝鮮克四城諭朝鮮王李倧降時阿敏懷異志欲直趨朝鮮王京倧挈孥奔遣其臣進昌君求和衆議許之阿敏不允克勤郡王宻與鄭親王議駐師平山城遣使往諭倧報命願嵗貢方物遂許其降既盟告阿敏阿敏以未與盟仍縦兵大掠勸之不聴復令倧弟李覺與阿敏盟乃班師恨未得與定北京叶克勤郡王於崇徳三年以疾薨於軍太宗聞而痛哭加以恩禮故未及與入闗定燕京也是皆巨擘輝天潢與復舊號並配享叶其未及者付考詳並教一一稽宗盟叶貝其餘宗室諸王勒等有功績顯著其封爵後經降奪者並命宗人府查奏雪寃彰善示後蘉祖宗恩澤予衍慶本支百世奕禩昌恭題盛京吉林黑龍江等處標注戰蹟輿圖六韻有序盛京吉林處乃我祖宗肇迹興王之所而皇輿全圖所繪向未賅備因敬稽實録事蹟命將軍𢎞晌等詳考道理形勢按圖増補且勅大學士舒赫徳阿桂等董所司拓為大圖於聖武豐功標注地名之右恭紀太祖太宗親征及遣諸王貝勒等征討者為地凡一百四十有四圖既成將以壽之棗梨垂示久逺緬維我國家自長白發祥以至奄有遼瀋鴻業經營規模大備而我太祖太宗戰勝攻取開創艱難皆有山川疆域可考迄今按圖展對益可想見當年景命所貽前勞所啟用是恭賦成什誌不敢忘即以是詩録之幀首我世世子孫遵覽斯圖其尚欽承敬畏以鞏億萬載丕丕基而于余所以述祖徳而垂後昆者庸可忽乎哉龍興東海佑承天創業時仔二帝肩因以輿圖考當日注之戰蹟示千年祖功並茂徳貽後宗徳還兼功繼前心膂折衝同禦侮躬親執鋭更披堅凡經一百四十處廼致九州萬國全享此泰平守噐者可忘先器弛勤䖍東巡盛京叩謁祖陵是日啟蹕得詩八韻有序山成鼎峙億萬年天作基祥命憶巽申廿四載地暌致慤曩以慈駕之途艱逺渉遂爾藐躬之儀闕續脩兹猶禫祭之未臨惟此精禋之可舉廼涓吉日復謁祖陵三至斯循敢曰事能繩武長言不足遹惟志切覲光於時夏閏已過秋初甫半月明萬里􅌂宵中對以揚輝露白前朝若春至履之増怵指巖闗而先度道維舊而路則新睠陪都以再經昔為入而今則出撫閭閻之繁庶恩與頻施緬開創之艱難詠宜三復由程肇始即事成章憶曽甲戍别陪京迴望依依不盡情祇慮髙年勤䟦渉泣思因慈聖母慈愛凡巡幸處必欲同行後壽漸髙不宜逺渉凡陸程稍久者即不敢扶侍至今安輿故盛京之行自甲戌後越廿四年未舉故教逺路罷巡行而今愴無復瞻顧爰此攄其久眷誠吉禮槩因居服罷尚在二十七月之内惟因追逺展摹恭謁罷之祖陵於凡行獵閲兵及盛京筵宴等事一切明禋惟是展䖍呈縈懷二紀瞻神壤撰日三秋啟翠旌自是兩都孰東道幸兹萬寳閲西成仍宣緹騎戒蹂躪更與烟村免賦征厯厯敬看開創蹟守成責重凛虧盈山海闗三依皇祖原韻陪京來往路底藉此為邊大將四城築接築四城皆徐達所建經臣列戍連熊廷弼守此時列戍猶存操戈室未已廷弼駐山海闗經畧軍務而王化貞為巡撫廷弼主守化貞主戰朝議右化貞者詆廷弼廷弼憤上言經撫不和恃有言官言官交攻恃有樞部樞部佐鬬恃有閣臣臣今無望矣時事艱危而操戈同室廣寧之棄我兵追逐化貞二百里如入無人之境所謂設險者安在益以信成功天心助順師克在和我國家以同心協力開創而明季門户攻訐足鑒萬世可曉然於在徳之義矣設險地空傳天佑開今業祖功仰昔年庶哉孶户口久矣靖烽烟須識養而教慢論經與權三番臨古塞一瞬逝波川惟是亹繩武景思益惕然出山海闗作並山臨海守原固遼矣長城那守齊重鎮徒防永平左大軍早過順天西明設重鎮守扼山海闗以防我兵而我大軍每従古北喜峯諸口入邊明兵曽莫能禦即如天聰三年我京袁太宗親統六師征明駐營土城闗進圍燕崇煥祖大壽始自闗外倉猝赴援也彼非設險况失徳明自神宗以後朝臣惟門户紛争百姓以科斂愁怨紀綱凌替自速滅亡徳之不務雖設險何益而我太宗恤衆愛民上下同心共成能攴鴻業實為一家天之所佑固非彼失徳者之所今則中外陪京且在關外山海之險不過僅存闗名耳我以同心自受禔今日兩京為坦路小哉何用説丸泥姜女祠叢祠舊築海山邊善哭偏因姜女傳金鑄應嫌范蠡譎墨胎可比伯夷賢五金皆可鑄像今自西藏所貢梵銅佛像雖周時所鑄然漢明帝時佛法始入中國則中國之鑄像以越為最古矣此祠中泥塑姜女俗謂之増胎又謂之墨胎若木像則謂之減胎又謂之香胎不獨伯夷之為墨胎氏也向年題玉泉山呂祖洞詩有墨胎古洞閲時年之句未注明因並誌之蕭風枯樹哀弦冩明月清波古鏡懸路便一臨縁節義訂訛意已具前篇杞梁事見左傳其謂為秦始皇時者未免傳疑附㑹前癸亥作已訂其譌惟因節義可尚故經臨一再題句云寧逺道中作歌在明為闗外爾時其意欲寧逺奈其寧之不得道詎祗失逺且失近叶在今亦闗外坦坦蕩蕩行往返即云内外已贅辭那更逺近較末本近實為本逺實末寧已為先寧彼晩其明先自未寧已上下否隔車轅僨叶我祖戎衣定天下百年教養武早偃兩都時邁此亨衢村村富庶耕鑿稳新疆乃更籌久安倍萬斯載慮勤懇寧逺祖氏石坊叠舊作韻二首翠華迤邐度秋朝祖氏石坊復見遥雖是貳臣背明國却成世族事清朝昨明國史館以明臣降附本朝者列為貳臣傳并視其厯著勛績忠於我朝如洪承籌等為甲編其進退無據不齒於人如錢謙益軰為乙編以示褒貶若祖大壽雖由明總兵來降有負勝國然在本朝則功績茂著其子孫並為世臣正宜列之甲編者也崇煥遭縲入獄朝率兵獨跳去而遥弗追弗罪仍為守足識陵夷笑勝朝祖大壽聞我軍進薄燕京同袁崇煥入援及我太宗用計明帝不察竟磔崇煥於市大壽驚懼率兵徑歸其叛跡已著而明帝聞之既不追回又不加罪大壽亦仍為明守錦州且既已納欵我朝及縱歸復懐觀望反覆無常直待勢窮援絶始决計來降其故仍不可解而明人委邊事於叛臣明政之陵夷即此可見矣仍駐沙河所仍駐沙河所氊廬頗耐居不期逢蹢白亦欲順情輿連日隂雨道路泥濘八月初一日午間駐沙河所雨尚未止雖傍晩西北風起天已暢晴而扈従人衆行李車䭾多有未能至者因於初二仍駐一日以順衆情暢對秋雲捲知將濘道除幾閒消底事四庫校全書四庫全書應行呈覧者命隨閣章間二日逓進十本氊廬幾暇頗得披校遣興杏山晩眺恭依皇祖原韻夕陽欲與逺山平曠野風吹牧馬聲駐早人閒多靜趣當年殊異此征明經吕翁山作我太宗皇帝擒洪承疇處也見皇祖詩中而通志訛為吕洪山兹經過其處命更正之爾時武烈已見於全題詩中松山杏山之作特以洪承疇被擒於此復以其事詠之衮衣經畧屢更人足識君無定見真莫怪生降背厥義要知能養在乎仁既降太宗每得降人皆厚撫之使各得其所洪承疇送至盛京即授顯秩推誠待之故感而思報明亡縁自生多議國史應為列貳臣洪承疇在明代身膺閫寄一旦力屈俘降厯躋顯要律以有死無貳之義故不能為之諱然其後宣力東南頗樹勞伐雖不克終於勝國實能効忠於本朝豈可與錢謙益軰之進退無據不齒於人者漫無區别因命國史館總裁於貳臣傳分為甲乙二編俾優者瑕瑜不掩劣者斧鉞凜然以示傳信而彰公道然亦其間具優劣更教甲乙等差陳錦州道上恭依皇祖詩韻久困城方下當年跡窈㝠天聰五年八月掘壕太宗統兵圍大凌河築壘為久困計九月明兵四萬自錦州來援乗風太宗與諸貝勒率騎兵進擊敵却走㑹大風敵縱火勢甚熾將逼我營天忽雨反風遂大破之生擒監軍道張春等十月大凌河中糧絶明總兵祖大夀因舉城降夜至志與御營輸欵尋縦大壽還錦州大壽既歸復萌叛我兵相拒太宗復遣鄭親王濟爾哈朗等統軍更番圍困錦州至崇徳七年三月明援兵盡絶城内糧盡饑民相食祖大壽戰守計窮又聞松山已失乃率衆官詣軍門降遂克錦州兹百餘年昇平户口滋息欲問其事則遺老盡矣驛鋪坦蕩道山展畫圖屏五字瑶編什一時翠蹕停無非厪守器樂利驗郊坰過錦州詠祖大壽事伐大木應先去枝従征太祖親征烏拉時嘗木豈諭之諸貝勒曰譬伐大能遽摧必以斧斤斵而小之然後可折今以勢均力敵之大國欲一舉而取之能盡滅乎乃率師毁其所屬六城逾三月而滅五拉枝伐太宗敬守諭而太祖聖訓於征明一事亦有剪樹之叅政祖可法等以爲去其手足不如攻心遽就太宗不従盖深知明國雖已積弱而大勢尚未滅亡意若留以有待所能大聖人卓識誠非衆人仰窺也燕京垂得更班師天聰三年䕶軍太宗親統大軍征明薄燕京縦令率諸貝勒及環城闗進兵距闗廂二里者入城乃自土城闗進兵距闗廂二里而營我軍既圍困燕京諸貝勒大臣俱請攻城太宗曰攻城固可必得倘堅城之下失我一二良將勁卒即得百城亦不足喜遂止弗攻尋經海子而南且獵且行隨克良鄉固安至房山祭金太祖世宗陵還次燕京營於城西南隅擊破明四總兵守拒之栅斬滿桂孫祖壽及副將以下三十餘人生擒墨雲龍麻登雲乃遣巴克什達海與明議和遂班師勤王巡撫旋遭絏同事總戎自返旗戎軍既至燕京明寧逺巡撫袁崇煥錦州總兵祖大壽赴援營於京城東南隅立柵堅守所獲太宗往視即還因耳語授計副將髙鴻中等於明兩太監前故作云今日撤兵乃意袁上計頃見敵有二人來見楊太上語良久而去巡撫有宻約事可立就矣監佯臥竊開其言旋縦之歸以所聞告明帝遂磔袁崇煥於市我太宗行軍用計所謂兵不厭詐乃明帝一聞逃歸内䜿之言不加審察遽誅勤王之人愚亦甚矣我縱用兵不厭詐彼誠中去聲計太云癡守城援絶方降順意欲何為難恃知祖大壽因袁崇煥被誅驚懼率師而返是有叛志也乃明竟置之不問而大壽亦仍為明拒守錦州其故殆不可解然大壽自降順縱歸而後猶屢懷觀望反覆無定直至食盡援絶始誠心出降更不知其初意欲何為也錦州道中書事更戍圖攻地當時剋取難昔大軍攻錦州時更番圍困經一載餘錦州援盡糧絶且我兵已克松山擒洪承疇等祖大壽戰守計窮乃率衆官詣軍門降遂克錦州終焉降師範何有頼呼韓喀爾沁為明時朶顔三衛有桑噶商者同祖大壽曽守此城事已登青史名猶籍錦官兩京久耆定一例蜀民安錦州之名與蜀中錦官城相倣昨者兩金川狼狽為奸蠶食鄰境而金川逆酋索諾木尤狡惡乆必吞併諸土司侵及内地則全蜀之民皆不能安枕所係甚鉅且兩酋負恩抗命罪在不赦乃命將簡八旂勁旅并調陜甘滇黔緑營士卒厚集兵力五年而討平之俘渠誅磔並以其地設鎮安營一洗逆番惡俗為蜀民永除後患䝉古王公等來接詩以誌事札薩屏藩列䕶邊蹕途來覲踵相連久䝉培養都知禮漸重耕桑亦曰賢自出山海闗以後各札薩克䝉古部落不逺數百里來迎蹕路如喀喇沁科爾沁奈曼巴林阿嚕科爾沁翁牛特喀爾喀土默特札嚕特諸王公台吉等分日迎鑾嘉其誠而有禮且各部落近已漸習内地耕作不復專事畜牧亦可見國家教養之澤至為廣逺也弗宴弗圍胥命返獻駝獻馬各抒䖍此次幸盛京因在二十七月之内不筵宴亦不行圍䝉古王公等至行在即賜茶并各賜縀匹有差概行遣回有以駝馬獻者並却之其中或難以盡却者則酌量留之視其數賚以大縀用示厚往薄來之意笑談指顧多孫行去聲白髪那辭是長上聲年觀大凌河養息牧唐時養馬稱最盛四十萬匹杜詩詠馬多地狹苦難容募民供秣勞難應我朝養馬無須多上都即元之上都鹽澤䝉古語達布遜諾爾漢語譯之為鹽澤非新定回域之古鹽澤也大凌河即此養息牧處二十餘萬孶野牧幾曽芻菽煩摧科此處牧政實稍異夏逐水草冬則餧供以内府之莊頭何有追呼累民事今來閲馬河之濵按隊分色萬錦陳華陽歸後無征戰易給扈蹕利衆人哈薩克馬來服皁新疆用以資騰飽一家萬里合東西白傅那歌隂山道大凌河詠事明守大凌河盡悉其精鋭堅城與深壕步步進攻備明兵佔據大凌河為得尺進尺之計將以逼瀋陽文皇謂得此餘易取次第顧彼防禦嚴因為困圍計離城度五里築墻掘塹邃周立我軍營庚癸呼難逓時攻其外堡降者踵相繼來援截錦州戰勝常奪幟援絶城中窘糧盡人相食叶大壽乃出降誑出錦州避大軍圍大凌河掘壕築壘為久困計明兵自錦州來援將太宗率騎兵進擊敵却走㑹大風敵乗風縦火逼我陣天忽雨反風遂大破之既而大凌河城中糧盡飢民相食大壽遂舉城降夜至御營輸欵大壽偽獻奪錦州計遂縦大壽還大壽既歸錦州復萌叛志方當攻堡時聖諭實録記明示諸大臣勇者勿重勩彼其損軀效可一莫再試以此衆愈奮争前敵王愾大徳曰好生仁以行勇智向者嘗用兵賞罸期明晰出衆巴圖魯佳名亦時賜將士太宗在軍中者每憫之先登効命勵賜以巴圖魯之號且再令諭諸大臣以此等忘軀勇之人宜加䕶惜勿首先登城致或傷損法仁心仁言體惜備至衆益感奮争効實萬世所宜守近年平定西域及攻𠞰金川士卒中多有超衆得功者亦每錫巴圖魯號以旌之而被旌之人愈思圖報凡遇攻戰仍復先往以此屢著竒勛者固多而傷損者亦頗不免雖加以優恤而念之常切矜憐茲恭閲實録倍覺祖訓之當守而孫臣實未見及於此雖此後不願復有用兵之事然兵不可一日不備則此意亦不宜忘因命軍機大臣恭述聖謨擬書諭㫖以誌永久且以貽示子孫其人以被旌勇往無不至頗有死綏者矜憐念弗置設如我祖諭安得有其事憬然悔失籌未習兵所致先見邀天佑孫臣服且媿敬成長言誌且以告後嗣過大凌河恭依皇祖原韻屈指三經此處過上陵本異大風歌剏成在守非不易嘗作創業守成難易説云唐岑文本以為創撥亂之業其功既難守已成之基其道不易余以為不然盖創業固難矣然以守成較之但可謂之不易而守成則實難耳創業之主其難可謂至矣然綱紀制度未嘗不可留俟後人守成者茍無以光前烈啟後圖斯懔然有不終畝之憂是創業者未竟之難亦守成者分内之事也是非安不忘危存不忘亡鮮有不盛滿中之者以此思難則所以持難者可知矣故予獨以難責夫守成者非敢忘創業者之難正以慰創業者之初心耳兹瞻言舊蹟緬懷括前締造艱難因櫽説以及之繼顯曰承愧已多牧馬自來稱坰野大凌河有牧塲每嵗字肓馬羣極為蕃盛觀魚何必備凌河百年遺老消磨盡豐京皇祖詩有云老將還能説曽記前途自倒戈今距即舊日兒童曽就瞻雲皇祖臨幸時幾及百年日者亦鮮有其人矣故事無能問鍜戈廣寧道中長亭復短亭古縣此重經憑海負山處衛中扼外形一家非所論廣寜縣志稱其形勢負閭山憑渤海據勝青營扼衝中外盖猶沿勝國舊聞今則中外一家廣寧已為陪都屬邑又何防扼之可言乎九伐亦云停寰宇今滋廣胥為籌永寧望醫巫閭山再依皇祖原韻迎輿罨秀氣不異把芙蓉得得行行近蔥蔥鬱鬱重猶嫌數里路原識幾層峯豈是虚摹境即當真撫松幽州千刼鎮古廟萬年封肅拜申淵悃明禋遵六宗未瞻闕闢鳳已覺氣為龍一望紛吾慕繼繩敢懈胸祭北鎮醫巫閭山向因旋蹕祀今以進途禋癸亥甲戌皆由邊外至盛京歸途始經柴北鎮致祭今年出山海闗而行先經是山因即申望之禮鎮地奠千刼佐天福萬民本無為已禱饒有致心寅前度祈辭在甲戌祭山有歲歲顒祈風兩調之句即勒碑其處依然如昔申詠醫巫閭山四景翠雲屏廟西峙立翠雲屏凝盼誰能擬色形一石丈餘大方廣見錦州府志補天兩字出何經上泐明張學顔書補天石三字道隱谷聞道深山足隱淪與居木石桂松隣誰知潛志樂飢者原是􅑷身逐鹿人石渠寳笈藏有東丹逐鹿圖聖水盆列崖垂落水如簾隔斷塵氛靜且恬多有朝鮮人泐句箕疇文化至今漸崖間多泐朝鮮人詩盖朝鮮為箕子所封至今猶重文教曠觀亭山堂此日已為亭眼底平陵碧海渟應是遼王貯書處志稱遼王托雲愛山之竒秀於極項築堂曰望海購書數萬卷貯之今亭想即其處按遼王托雲即東丹王也至今秀色蓄眸青觀音閣即景鎮廟更西北禮成一問蹊縦觀連海濶直上與天齊不盡竒和詭誰知端與倪無煩重徴古七景閲前題甲戌經此曽作遊醫巫閭山遍厯諸勝五言排律三十韻注中有聖水盆蝌蚪碑桃花洞呂公岩道隱谷雲巢松曠觀亭等七景今泐石崖間詰屈歴雲闗精藍逈巘間漫兹悟空色較昔異容顔胎石松多痩依岩鶴自閒天成同入路崖口入處大似天成寺松石間意三載别盤山盤山未到者已三年矣命查覈盛京所屬應修城垣發帑繕治詩以誌事斷垣敗壘動經過州縣城闉毁亦多征伐昔年故有是觀瞻今日可聼他葺頺興廢原闗政發帑雇工非起科出山海闗以來所經州縣城郭多有頺陁者盖我朝以盛京為陪都闗外皆成内地故向來未議修葺然畿輔及各省城垣並官為修理况盛京根本之地而郵程往來觀瞻所係豈宜置之不問因命軍機大臣會同將軍𢎞晌查議擇其最要者發帑以次興修並簡大臣同将軍府尹董其成每處各派専員偕地方官經理工作以期鞏固垂久且國家凡有興作無不發帑雇工従無加征科歛之事是修城非但為崇墉觀美而所在丁壯皆受值以贍身家尢得均沾實惠誠一舉而兩善也創守由來殊主客思量及此懼如何駐早吉行五十里駐早衆情娛書史隨時有驛函緐政無身惟勞以逸心與靜而俱氊室支忩詠芸齋定豈殊疊道盛京以西向多沮洳其近瀋陽者自太祖命修疊道百二十里太宗復建永安橋以便行旅至今賴之而廣寧之栁河溝當夏月隂雨尚患泥濘丙申嵗承徳錦縣寧逺廣寧四屬商民捐貲築治疊道中間多架木彴以通汙潦今過其地居然坦途雖時已八月且晴霽旬餘固可安行無阻而修道成梁王政所尚矧近市之人能知大義分所有以利人淳風亦足嘉也因紀以詩瀋陽疊道接廣寧沮洳年深或重去聲渟畚挶成梁衆情切車駝遵路仲秋經攻之足識民風古除也猶慙王政型大勝南陽諸父老不求逭賦急公聴昔漢光武幸南陽賜復南頓田租一嵗父老前叩頭言願賜復十年光武曰天下重器常恐不任安敢逺期十嵗乎吏民又言曰陛下實惜之何言謙也光武大笑復増一嵗兹余三莅盛京前兩次俱已蠲租一年今嵗奉天田賦既輸值普蠲復將降㫖免明年正供是賜復兩歲並不待父老之請其捐貲治道之商人並令覆實優奬之渡句驪河雙流合一稱句驪向驪河亦名遼河源出邊外有二其一自西北來者逺不可考其一自東來者出長白山西北諸窩集中西北流繞鄧子村西南折合而為一經鐵嶺縣北入雙峽口西南分為二曰内遼河外遼河繞縣之西南合而為一此河左右即遼東遼西所由分以河左右分遼之東西夏霖每致成淖泥歴經修築成坦途唐太宗征髙麗軍行阻淖布土作橋乃濟盖近河百餘里内遇雨即泥淖難行自康熈五十八年雍正六年相繼修築以來漸成坦途矣當年戰伐此渡師而今上陵仍渡茲艱難昇平各異時設無彼者安有斯造舟為梁翠蹕移安用布土勞衆為公孫淵司馬懿叶往事何必道古提老邊迤邐老邊近風情入故鄉戰征縦圖進根本亦須防帝業非容易王民願阜康貢鮮來野鹿悲咽祗先嘗前兩次詣盛京有以麅鹿獻者必先奉舉筯聖母甘㫖今次有進鮮者惟為余充膳不勝哽然盛京奉祀諸宗室來接詩以誌事天潢來奉祀制定自初年盛京奉年始祀諸宗室於乾隆元自京城移至歆享脉猶近本支派永綿已看孳少壮却喜習周旋有爵非封建元明弊總捐封建不可行於後世余每切論之本朝宗室凡親王郡王皆在京襲爵承恩止予封號而不分茅土既得安享世封且不致分藩滋事一革元明敝政家法垂貽實為盡善云䇿騎䇿騎頻經近逺郵田功歴歴驗登秋深耕易耨農無惰下隰高原歲有收未解閭閻辛苦况可恒輿輦逸安謀敬思汗馬當年景昔我堅守太祖親統兵攻瀋陽明守將賀世賢等乗城我軍營城東七里明兵於城外掘濠樹柵環列鎗礟以拒我軍繞城掩擊連敗之明兵七萬皆潰陣斬賀世賢等明總兵陳䇿復統衆二萬渡渾河來援復有太祖分兵衝擊追至渾河盡溺水死而渾河南步兵萬餘結營列楯又明總兵李秉誠等亦率騎兵三萬營於白塔鋪躡襲我偵探之兵擊太祖欲自往擊太宗請行率䕶軍百騎進李秉誠等皆敗遁又偕大貝勒代善等追擊四十里斬三千餘級太祖亦盡殱渾河南步卒遂㧞瀋陽此實我敢因太祖之逸太宗汗馬艱卒之地兹䇿騎經過今日不追念前勞乎玉勒金鞍已自羞朝鮮陪臣來請安因而有作有㫖斯番非宴鎬朝鮮不必使臣來起居敬問實勤矣屏翰誠攄得許哉今年至盛京以尚在二十七月之内不舉行筵宴預勅朝鮮母庸遣使朝賀既而朝鮮國王具咨禮部以小邦感戴中朝心殷葵向願遣陪臣至盛京請安情辭誠懇因許之禮減於兹益為感癸亥甲戍兩次幸盛京朝鮮並修朝貢之禮兹因免其入貢故欲藉請安以申感悃恭順實可嘉尚賚頒視昔弗因裁頒賜國王及陪臣品物並照前兩次之例厚給其使齎歸為明忠即忠乎我朝鮮初奉明正朔不肯臣㐲本朝楊鎬四路出兵之役朝鮮尚出兵相助忽大太宗統衆進𠞰戰於冨察之野朝鮮競發火器風揚沙烟塵反撲敵營我軍乗之大勝殱其兵二萬朝鮮元帥姜功烈懼而來降後雖通貢禮而仍懷兩端崇徳二年不太宗親總六師往征國王李倧雖屢乞降猶逡巡敢出及我軍克江華島獲其王妃王子官屬李倧乃率羣臣獻明國所給勅印於漢江岸築壇其太宗親臨厚加撫慰諭以一心盡忠且遣歸國並其妃及子遣之李倧感悦於三田渡立碑以紀恩徳嗣是世篤忠純永受我朝恩眷云奕葉承恩國永培題薩爾滸十二韻已撰長文識每恭讀子兄太祖實録至薩爾滸之戰父弟同心合力未嘗不流涕動心思我曽作祖之勤勞感紀之上蒼之眷佑書事長篇以仍吟近體宣重經用武地深感命時天薩爾滸列陣明帝遣經畧楊鎬等統兵二十萬號稱四十萬分四路來攻興京我西南兩路偵卒馳告西來太祖曰明兵使我先見南路者誘我而南也其者必大兵即統衆趨撫順往拒時明將杜松營薩爾滸山復引兵圍吉林崖仰攻我兵吉林崖據顛兵至太宗大貝勒代善及扈爾漢欲駐兵隱僻地卒之大宗曰正宜耀兵列陣明示敵人壯我夫役士胆令併力以戰豈可置僻地耶額亦都以邀擊太宗之言為然乃對明兵營列陣而待别設伏明兵追至界藩渡江與築城夫役合據界藩之吉林崖夾攻旗撥四壓擊騎纔千明兵攻吉林崖者約二萬人與薩爾滸軍遥為聲勢相助太宗與衆貝勒及諸將議增兵千人往吉林崖俾登山馳下衝擊而以右四翼旗兵夾攻之太祖太祖至問破敵䇿一太宗具以前議對命分右翼四旗之二與左四旗先破薩爾滸山再令右二旗兵遥望明兵俟我兵由吉林崖馳下衝擊時并力以戰合力衝其要移時破彼堅我合兵進攻薩爾滸山明兵駐營列陣發鎗礟我兵仰射之奮力衝擊不移時破其營壘死者相枕籍縦横恣馳突隴種盡劉䖍雁鶩蔽河下鯨鯢封陸填我遣助吉林崖之兵自山馳下衝擊右二旗兵渡河直前夾擊明兵短刃相接我兵縦横馳突無不一當百遂大破其衆明總兵杜松王宣趙夢麟等皆没於陣横屍蔽山野血流成渠士卒死者蔽渾河而下如雁鶩焉斐芬斫營速尚間去聲奪壕連明總兵馬林兵營於尚間崖濬壕三重嚴斤堠鳴金鼓自衛又潘宗顔一軍營於斐芬山太祖集兵馳往令我兵之半下馬仰攻宗顔兵約萬人以楯遮蔽連發火器我兵突入摧其楯遂破之宗顔全軍盡没太宗又破明兵於斡琿鄂謨游擊龔念遂李希泌皆戰死其營尚間崖者凡四萬衆太祖馳往趣令我軍先據山顛向下摶擊衆兵方欲登山而馬林營内之兵與壕外兵合太祖曰是將與我戰也我兵且勿登山宜下馬步戰我兵下馬者方四五十人明兵已自西突至大貝勒代善即怒馬迎戰直入其陣二貝勒阿敏三貝勒莽古爾㤗與衆台吉等各鼓勇奮進遂敗明兵我六旗兵見之不及列陣人自為戰前後弗相待縦馬飛馳直逼明營明兵發鳥鎗巨礟我兵衝突縦擊飛矢利刃所向無前明兵不能支大敗遁走我兵乗勝追擊明副將麻岩及大小將士皆陣没馬林僅以身免尚間崖下河水為之盡赤我卒差為後明兵避不前成城衆志合創業一人權以此先聲赫允惟隆佑専數朝平四路明總兵劉綎由南路出寛甸經棟鄂所過悉遭焚掠將逼興京太宗與大貝勒三貝勒引兵往禦時綎所率精鋭二萬分其半欲趨阿布達哩岡布陣我兵與之遇太宗即率右翼兵往先引精騎三十超出衆軍前自山馳下奮擊後軍隨至衝突而入大貝勒亦率左翼兵自西夾攻明兵太潰及陣太宗乃縦兵追擊殱其兩營兵萬餘綎倉卒不力戰死太宗復督兵攻明海盖道康應乾明兵與朝鮮兵合競發火噐忽大風揚沙烟塵反撲敵營昏冥晝晦我軍乗之飛矢而集其兵二萬人盡殱焉應乾遁去明遊擊喬一琦逃於朝鮮營中懼為所擒獻自縊死朝鮮帥姜功烈等遂詣軍門降是役也五日之間盡破明四路兵其宿將猛士暴骸骨於外士卒死者不啻十餘萬我兵以少擊衆所至克㨗僅損二百人實邀矣上天佑助於是我國聲威益震逺邇大武耀千年薩爾滸再題國語薩爾滸漢語木厨謂太祖興大東初用武之地殊勲屢敬詠守成每勵志人和功爰定更天時地利宇宙以來有鴻濛所位置藉兹紀神威萬刼藏金匱過三闗因成長句紀事憶昔興京定始基三闗層設禦明師天閶自有虎豹守第一闗名雅爾哈即漢語豹也地險還應雕鶚底第二闗名代岷即漢語雕也札喀度兵衆志合第三闗名札喀即漢語邊也界藩䕶役聖謨竒明經畧楊鎬等分兵四路來侵勒興京領兵太祖率貝勒大臣等統兵以禦大貝代善先往撫順迎敵過札喀闗與達爾漢侍衛扈爾漢集兵以待太宗以祀事後至謂大貝勒曰界藩山上我築城夫役在焉倘明之將帥奮力攻之䧟夫役奈何宜急進以安夫役心大貝勒稱善即率軍士趨太蘭岡對明兵列陣而待餘見前薩爾滸詩注中爾時上下同心亹剏業規模奕世垂恭謁永陵肇運興基土景膺顯命初溯源一脈近宅兆萬年餘山檿攘猶憶神榆䕃越舒寳鼎永陵内榆一前生瑞株輪困盤鬱圓覆曰萬年景祚向曽尊城匡實北我大清神樹為賦敬紀之春秋閲廿四自甲戍瞻謁四年祖陵距今二十矣彈指頃相如謁顯佑宫歴歴丹梯拾遥遥碧殿深升薌由振古錫羡匪斯今胥宇周原膴侯興上帝臨太平兹久矣益勵守成欽景佑宫瞻拜六韻花宫向平楚松栢百餘年指月何曽悟心香且展䖍屏營為去聲祈歲惕息念承乾景佑非今矣䕶呵自古然小其衣錦喻殊彼邁邦篇舊里緬先澤惟懷奕葉傳興京疊癸亥舊作五言十韻閲年廿四久拜祖仲秋時定鼎緬初剏契龜溯始基四攻分路入我帝遣太祖已未嵗二月明楊鎬等統兵二十萬號四十萬來攻左翼中路以杜松等督兵六萬由渾河出撫順闗右翼中路以李如栢等督兵六萬由清河出雅鶻闗左翼北路以馬林等督兵四萬由開原合葉赫兵出三岔口右翼南路以劉綎等督兵四萬合朝鮮兵出寛甸口期並趨我興京一戰啟神思雄奮子兮弟志同尊與卑搴旄多上勇决䇿自英姿明將身膏斧敗軍血染陂薩爾滸吉林崖斐芬尚間崖等處之㨗已見前詩注中時南路劉綎等之兵復近逼二興京率兵太祖命扈爾漢率千人往禦復命貝勒三千繼之大貝勒三貝勒亦相繼行將趨太宗請同行因亦馳往而劉綎所率精鋭二萬登阿布達哩岡自太宗率右翼兵往先引精兵三十人超出衆軍前山馳下奮擊戰甚酣後軍隨至並力衝突大貝勒亦自山之西夾攻應乾太宗縦兵奮擊殱其兩營兵萬人劉綎戰死康尋亦遁去經畧楊鎬聞三路兵敗大驚急檄總兵李如栢等回軍復為我兵擊殺四十人明兵奪路而逃相蹂踐死者復千餘是役也明以傾國之兵雲集遼瀋五日之間悉為我軍誅滅死者不啻十餘萬我軍邀天佑助以少擊衆僅損二百人自古克敵制勝未有若斯之神者也朝鮮降合栅初朝鮮兵與康應乾合營於富察之野其兵被紙甲胄以栁條為之火器層列火噐太宗既破劉綎遂督兵攻之明兵朝鮮兵競發忽大風驟作走石揚沙烟塵反撲敵營昏㝠晝晦我軍乗之飛矢雨集其兵二萬人殱焉明遊擊喬一琦奔朝鮮營衆貝勒慗兵逐一琦遂攻朝鮮其都元帥姜功烈懼請執一琦以降一琦自縊死姜功烈遂率衆降葉赫懼旋旗先是葉赫貝勒錦台什布揚古欲助明與潘宗顔合甫至開原中固城聞明兵敗大驚而遁豳野安斯固瀋陽取不遲艱辛伊古獨締構至今垂書事述實録屢讀之不太祖實録於薩爾滸之戰益信之衆天命脊佑爽且其時地之里未盈數千兵弗滿數萬而肱心親冐矢石授方畧以開同兄弟子姪之衆率股膂之臣用集鴻勲萬年丕緒每披讀及此木嘗不起敬起慕起悲曽恭依臣庶實録叙述書事一篇以示我大清億萬年子孫期共勉以無㤀艱難祖宗開創之云期均薄海知赫圖阿拉横甸襟興京赫圖阿拉在尚興京之南乃我拉即祖宗發祥地今土城遺蹟存國語赫圖阿漢語横甸也皇澗過澗似當年斯館豳王業實基此興京城郭存横甸餘荒址至於創盛京居然豐鎬矣遐想我朝初頗類周家始彼實獨重農我亦重耒耜而兼武偹修故致威無比農以養我民武以侵彼鄙後且屢欲和而彼弗甘耳初天征太祖以七大恨告戰明復讐薩爾滸之破明四路兵二十萬衆聲威大振明之國勢遂蹙而太宗復親統軍薄明燕京圍而弗取議和還繼又破明兵十三萬於松山尋復克錦州圖寧逺明國懼而求和太宗許之而明人書詞不實朝太宗乃陳述求和天道及我盛徳并斥其不實之故師稱直為壯是用邀天諟締搆誠艱哉敬因告孫子再題赫圖阿拉阿拉即云甸赫圖乃訓横赫圖阿拉以漢語譯之即為横甸在興京南我舊四祖時居也曩時似豳地其北即興京移瀋非走馬遷居以就城貝勒太祖既得遼陽集諸臣議曰天既眷我授以遼陽將遷居此城耶抑仍還我國耶衆俱以還國對太祖曰國之所重在土地人民今還師則遼陽一城敵且復入據守舍已得之疆土而還後必又煩征討非計之得也且此地乃明及朝鮮䝉古接壤要區城於天既與我即宜居之衆皆曰善遂定遷都乃築遼陽城東五里太子河邊剏建宫室遷居之名曰東京居三年復遷都瀋陽規模益大定矣儉勤與仁武大聖善經營迴鑾過三闗再詠三闗興京西設險天錫久然當我祖際言創不言守明兵傾國來迎出攻而取明經畧楊鎬率兵二十萬號稱四十萬分四路來侵開興京一由渾河出撫順一由清河出鴉鶻闗一由原出三坌口一出寛甸口我西南兩路偵卒並來告其由太祖曰來者使我先見南路有兵者乃誘我也撫順來者必大兵乃兵來親率貝勒大臣統兵往禦偵卒又以清河路有告大貝勒代善曰清河路仄兵難驟至宜前往撫順以逆敵遂率衆過札喀闗集兵以待於薩太宗亦至因畫䇿先趨界藩擊敗明兵復敗之爾滸尚間崖諸處五日之間殱明兵十餘萬斬其宿將十餘人詳見薩爾滸書事篇斬將與搴旗紛彼敗以走乃知禦敵法貴奪不貴受如明之盛時其邊非不九能入復能出彼何曽掣肘然在今言今守實在九有恭謁福陵歩是山川内瞻如霄漢邊祕靈原自古錫聖盖由天俎豆萬千載松楸二百年永思開創烈守業凛仔肩恭謁昭陵一源緬髙祖五葉逮元孫徳勝唐宗逺我與唐太宗文皇帝廟號及親歴昭陵尊稱適太宗同然唐太宗惟戰陣尚不愧開創之業若其事由逆取巳逺遜我朝得天下之正且釁起家庭致貽慙徳雖貞觀多善政其失亦不能掩豈若我國家更非列聖相承能比燕詒裕後家法之美善唐太宗所方萬一哉訓垂金帝尊以其太宗嘗稱金世宗為聲名顯著之賢君奮圖法祖勤求治理惟恐子孫仍效漢俗屢以無忘祖宗為訓衣冠語言悉遵舊制時習騎射以修武功允宜效法因命文臣宣金世宗夲紀知法申諭諸王貝勒大臣俾萬世咸守聖謨垂示實深逺矣惟懷安萬姓者撫太宗應運之以徳逆興愛育羣黎輯寧諸國順威之以兵征服朝鮮混一䝉古羣臣再三請上尊號乃三萬即皇帝位於瀋陽建國號曰大清復破明兵十於松山尋克錦州定寧逺初且天聰規模益大然亦惟征明諭和以安百姓太宗親統大軍師薄燕京唾手可得慮振太宗躬莅城邊閲視以攻城恐失良將勁卒為旅而還盖深知天命攸歸留以有待非衆大聖人經畫誠人所能窺測也不屑取中原積悃申瞻拜繼繩心默存昭陵石馬歌用舊作趙霖畫唐太宗六馬圖歌韻當年石馬後世詔永示艱難意深妙翁仲之間立兩龍曹霸丹青遜曲肖爾時西伐常興師臥榻豈容鼾睡為况有大恨不共戴凛然明告千秋垂害誓太祖以乃以景祖恨告顯祖皆為明所不共戴七大天征明志太宗嗣統善繼議征先以大恨未雪屢討瀋陽遼陽取次第矢在弦上奚容置太祖丕顯太宗承本以仁而行以義建都稱帝徠逺人得遼太祖既瀋遂諸定議遷都瀋陽制度畧備至羣臣太宗天聰十年貝勒大臣及䝉古漢人文武以太宗承鮮混天眷佑應運而興愛育羣黎輯寧諸國征服朝一䝉古更獲玉壐以昭符瑞請上尊號乃祭告大清天地崇徳太廟築壇恢宏即皇帝位建國號曰改元規模日漸遂肇萬載丕基矣松山之戰仍躬親立破明兵十三萬指揮計授諸藎臣兵貴乘機更貴斷鼻衂力前神弗亂格攻太宗遣睿親王多爾衮肅親王豪寧逺明總督洪承疇集援兵十三萬於松山二王以敵兵甚衆奏適患太宗聞之即衂親統六師往討啟行時鼻衂因行急益甚三日方止諸王貝勒請徐行至將太宗諭曰行軍制勝利在神速恐敵人聞朕親潜遁若不逃破之如縦犬逐獸易於拾取惜無翼可飛豈宜遲緩乃畫夜疾馳六日而扺松山太宗環松山而營敵兵來犯擊敗之追至塔山而還奪其積粟濬濠斷杏山松山路太宗度明兵必遁分遣諸王大臣設伏截擊凡十餘處睿算預授機宜明兵果皆奔竄所出之路悉如掩擊窮追殱殪明兵計五萬三千餘赴海死者甚衆浮屍漂蕩多如雁鶩我太宗神謀勇畧制勝出竒指揮間破明兵十三萬如摧枯拉朽云二馬御聖安吉行出險曽無銜橛難唐宗六馬陵道間受傷痕迹想血殷豈如二馬靡少害是誠全勝得之難千秋小白與大白較彼唐駿増光色獨予景仰緬昔年未能躬睹滋太息欽定盛京通志卷十四
