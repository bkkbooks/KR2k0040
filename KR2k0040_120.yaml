body:
  text: 國朝藝文二賦欽定四庫全書欽定盛京通志卷一百十六國朝藝文二賦聖駕東巡恭紀八賦有序甲戍曹秀先往在乾隆八年秋天子東巡狩奉皇太后慈駕祀列祖陵禮明樂備恩賚下行於今一紀考之典章重舉盛事情深文明廷臣濡毫以宣我皇上功德於禮宜之臣厠班西垣舊職太史之時之地之事之法雖弇陋願效嘏詞謹拜手稽首以揚言分為八賦義總一篇齊心滌慮仰塵御覽第一賦臣秀先曰熱河有避暑山莊係聖祖時締構我皇上沖齡扈蹕於此逮登大寶有事秋狩間憩息焉今者東巡大典自夏涉秋先期駐輦緬維先烈景企何窮臣因進法祖賦為第一懿東土之時邁兮恭本第十御製詩初集八卷憶十年而踰期本第三十八卷屇炎帝之司令兮本第十五卷曰仲夏其飭儀本第十六卷諏吉日以前征兮本第二十七卷日初長而赫曦本第八卷自清河而導路兮本第六卷望密雲之崇陴本第六卷陟天門以嶙峋兮本第六卷緬灤陽之渺瀰本第六卷越荔徑以駐蹕兮本第十六卷翳玉館其在兹本第十六卷昔趨陪於聖祖兮本第六卷孫臣獨蒙夫寵施本第十三卷維兹山莊曰避暑兮本第七卷擅勝境之祕竒本第四十三卷蓋至聖經始於兹兮本第四十三卷於奠乎萬年之基本第四十三卷卓危峯之名磬兮本第四十三卷橫側嶺以蹲獅本第四十三卷流熱河鍾坎秀兮本第四十三卷像天險而城是規本第四十三卷既就山以營傑閣兮本第四十三卷旋引水而作神池本第四十三卷製猶尊於土砌兮本第四十三卷巧不尚於雕栭本第四十三卷良儉德之斯稱兮本第四十三卷曾不奢之是為本第四十三卷標之景以三十六兮本第七卷雅製見於聲詩本第四十三卷粵若獅子之名園兮本第七卷自皇考之丕遺本第七卷直山莊之北向兮本第七卷傍巖嶺之厜㕒本第二十八卷我皇夙趨庭於是兮本第十六卷植階梧之離披本第七卷聽萬壑之松風兮本第七卷思焚膏之罔疲本第十六卷撫杯棬以寄慨兮本第七卷驚日月其莫追本第七卷勵紹庭之初志兮本第四卷增羮牆之愾思本第一卷又况夫治遡於熙皥兮本第九卷懷孫謀之厥貽本第十七卷稽祖德之不刋兮本第六卷沛解澤其永垂本第六卷訪白頭之父老兮本第六卷説停輦於往時本第六卷矧恩勤之終古兮本第二十四卷念慈惠於含飴本第六卷誕巡幸以憩故宫兮本第六卷即花鳥亦相窺本第六卷怵纘緒之大艱兮本第六卷厪承家以肩仔本第六卷言離宫之停歇兮本第七卷眺芝徑與雲隄本第七卷暑不到以清涼兮本第七卷延董風之逺吹本第七卷愛方長於夏日兮本第九卷撫虞琴以和熙本第七卷夜秉燭以批黃兮本第十六卷知不廢夫疇咨本第十六卷矢逺志於萬千秋兮本第七卷瞻軒榭之璇題本第七卷接鴈塞之寥廓兮本第七卷俯龍沙之逶迤本第七卷傲人間於蓬瀛兮本第七卷惕長慮於安危本第四十三卷綏福履於萬祀兮本第四十三卷寄守道于四夷本第五卷美哉乎觀天察地以通德而類情兮嫓崇治于庖犧臣秀先勺第二賦臣秀先曰凖噶爾介在西北隅亦蠢爾族也又不自靖有內亂所部解體今輝特台吉阿睦爾撒納率其衆挈孥來者數萬人請內附為臣僕天子許之宴賜於行在如禮於戲測海占風來王恐後兹且如魚歸水而樂也此天朝之仁義引之臣因進柔逺賦為第二日駐輦于熱河兮恭本第十御製詩初集六卷候遄駕于六龍本第十五卷廓四海以為家兮本第十七卷亘奉朔之來同本第十八卷固有星其拱北兮本第十八卷亦何水而弗東本第十八卷隆御世之鴻猷兮本第一卷展幅員其廣通本第十四卷或聞啼于嬰兒兮本第一卷作父母者惟亶聰本第一卷何物凖噶爾潛處巢穴兮本第三十七卷曽蠢動以興戎本第二十八卷聳仁祖之聲靈赫赫兮本第四卷用殱負嵎之魁雄本第十七卷遞嵗紀以方物貢兮本第六卷混咸賔于外中本第六卷未待二師之闢地兮本第六卷築受降之城墉本第六卷厥部落實散處兮本第十七卷仰天朝兮如圓穹本第十八卷宛馬尚來於萬里兮本第三十七卷間定逺之勛庸本第十卷夫何酋奴之慘毒兮本第三十一卷魑魅魍魎怪哉蟲本第三十一卷匪形端而表正兮本第九卷衆積憤氣以告訩本第三十一卷彼自政綱之掃地兮本第四卷絶域無由息戰攻本第十五卷吾且欲繕守禦以備患兮本第十五卷搴旗幟之重重本第二十一卷道必宅中而敉外兮本第十五卷豈文德而忘武功本第二卷即犁庭掃穴以無難兮本第三十八卷淨欃槍而剪元凶本第四卷卓然智燭之四照兮本第四卷僉與仰夫重瞳本第四卷則有酋衆忽揚塵兮本第三十一卷喧人馬以連蹤本第十六卷殆若失林之鷹鳥兮本第十六卷將籋雲以脫樊龍本第十六卷又為翦翅之悲鴈兮本第二十六卷悵煙波而困窮本第二十六卷户口數萬如鱗集兮本第四十三卷增悶憂以歎飄蓬本第三十一卷重譯而聽嶰谷吹兮本第四卷拜閶闔之長風本第四卷願出溝壑之危兮本第九卷登袵席以覆容本第九卷詎鯨鯢之能逞兮本第十八卷得持一丸於泥封本第十八卷恭遇聖仁之丕冒兮本第九卷起枯蘇稿憐愚衷本第二十三卷鑒彼傾心以效順兮本第十七卷藉嘉時之遭逢本第二十五卷肆闓澤其普降兮本第二十六卷詔頌十行而恩濃本第二十六卷無須自縳訴迫急兮本第十八卷開帷幔於離宫本第七卷咏王庚之便便兮本第二十六卷普來王于球共本第二十四卷殷三接之晉兮本第二十二卷聨堂陛于延洪本第二十七卷厚德坱圠實無埌兮本第二十六卷藹一室而春融本第一卷詎天驕煩控禦兮本第二十七卷咸稽首以呼嵩本第十九卷念我聖祖揚威烈兮本第三十六卷視此類如蠛蠓本第五卷喀爾喀備名藩兮本第二十八卷夙費氣于折衝本第十七卷今此歸化而而仰流兮本第二十七卷向廣川而噞喁本第四十卷快延頸而舉踵兮本第四十三卷扶攜白叟以偕黃童本第十一卷暗時明而愚時智兮本第二十二卷見五色雲之護六驄本第十八卷永永逰牧被國恩兮本第十七卷宴湛露詩于椅桐本第二十九卷彼不義者安逭生兮如補遂之遇神農臣秀先句第三賦臣秀先曰蒙古諸部落在京師西北各口外密邇長城燕晉秦趙以為屏蔽上世與中華勢如相敵自我國家定鼎後麕至臣服今法駕東巡取道塞上諸王台吉備侍從列跪迎道左既畏威且懷德也臣因進閲邊賦為第三眄東土以發軔兮恭本第四御製詩初集十二卷相西南風於館軒本第四十二卷遵古北口以四望兮本第六卷絢霓旌之繽翻本第三卷維祝融實收夫後隊兮本第三卷素籟用𨗳夫龍旙本第三卷何玉關之天塹兮本第五卷逮傅羅之河屯本第六卷朗一川之秋日兮本第六卷涉厯乎沈家之村本第二十七卷儔趨承于萬里兮本第六卷騰賢王以咸賓本第二十七卷於維蒙古之君長兮本第六卷分部落之殷繁本第十七卷曰家四十有八兮本第十六卷叢色目于有元本第七卷稽厥類於呼韓兮本第七卷誕用啓夫後昆本第十八卷自漢唐千載間兮本第十二卷近户為患于北門本第十八卷豈伊忍自外歸化兮本第十七卷不會車書以奉一尊本第二十三卷上世失德昧綢繆兮本第十四卷沿明季以甌脫同論本第四十四卷曰若稽古聖祖撫八陲兮本第四十三卷百年禮樂以永敦本第十二卷吹鄒律之春風兮本第十二卷調六幕而常溫本第十五卷萬方皆赤子愛兮本第十六卷於沙塞亦思存本第四十三卷諸蒙古爭臣服兮本第四十二卷致恭順罔不駿奔本第四十三卷間以痘瘍為懼兮本第四十三卷盼聖賢之俯親本第四十三卷所由行宫駐熱河兮本第十六卷集蒙古之來源源本第十六卷聖人踐阼鳴歸昌兮本第二十九卷納谷蠡為林樊本第四十三卷聯一家于中外兮本第十六卷厠班列于鷺鵷本第三卷嵗朝與于燕賚兮本第四十三卷習駒騠之飛鶱本第二十八卷逮時巡經葆塞兮本第十六卷肆覲以集夫遊藩本第十六卷願入千牛之衛兮本第十六卷翔躍萬馬于秋原本第十六卷納方物以充庭兮本第十六卷寬禮數於歡言本第十六卷肆翠華復涖止兮本第十八卷欣葵傾而負暄本第三十四卷毳幕韋韝若星拱兮本第十七卷晉桐官于山樽本第四十三卷綴羊酥以膏粥兮本第十七卷輸芹效忱之闐喧本第十六卷羣逶迤以擁六蚪兮本第二十七卷逮東鞮之樊垣本第二十八卷多倫諾爾鎮未逺兮本第三十八卷緬磧程之蜿蜿本第十六卷姻盟維科爾沁兮本第十六卷輯圭永沿夫子孫本第二十九卷旋遊上都鹽海之故區兮本第六卷省坰牧之孕蕃本第四十三卷色分披于錦段兮木第四十三卷相驒駱與􅷫騵本第四十三卷變爛雲于一谷兮本第二十八卷驚雷電之掀翻本第二十八卷詎奚官可得知兮本第二十八卷簇氊裘而手捫本第二十七卷名駒恣于肥壤兮本第十六卷飭武事以屬櫜鞬本第十七卷永永無蚩尤旗兮垂裳握鏡者軒轅臣秀先句第四賦臣秀先曰古者於農隙以講武事戒晏安習勞勩柔血氣鼓勇力以是立太平取止戈義也文命後車宣泐石鼓東都西土典傳於今我朝以弧矢服天下垂為家法維皇上實凛承之屆兹東巡便道關塞合圍狩獵神武昭昭臣因進秋獮賦為第四指東國以于役兮恭本第十禦製詩初集六卷序金􅒫其初調本第四十二卷氣颯爽而催征轡兮本第六卷秋吟萬竅以翏翏本第三卷雲簇簇以屯喬岡兮本第二卷霧悠悠而籠長旓本第二卷屇農務之將停兮本第二卷佇鳴騶以招邀本第二卷虞人建幟以前驅兮本第四卷偕儀衛之森翹本第四卷將依古以重乃田兮本第二十七卷詎此樂之遊遨本第四卷羅萬幕以止頓兮本第十七卷敞嚴邊之迢迢本第六卷藩王眩目於塞上兮本第六卷樂秋搜之逮今朝本第十七卷擴文囿於王庭兮本第六卷企列朝之規條本第十九卷呼健兒之桓﨣兮本第六卷聨車騎之驃姚本第六卷輝乎鵝黃之翦褶兮本第十七卷翎孔雀以騰驍本第十七卷積羽林軍之十二兮本第九卷練穿楊之技超本第九卷轟轟乎五校以分馳兮本第十六卷逞三驅而揚鑣本第十六卷脫錦韝之飢鷹兮本第十六卷洞發蹤于猲獢本第十七卷谷列罞以為機兮本第二十七卷林張罟以相招本第二十七卷豈有黃羆之恃雄健兮本第四十三卷抑赤豹亦制夫怒跳本第四十三卷蒼熊失林就顛躓兮本第十七卷白額促命而哀虓本第十七卷驚起爰爰之兔兮本第十七卷駭狐狸不得遁逃本第十七卷見若百獸走戰驚兮本第十八卷見若毛氄之飛飄本第三十卷不雉媒其空勞兮本第十七卷射鴈行以落林臯本第十七卷試合圍於平原兮本第四卷驟驊騮於山椒本第十六卷銛鋒之雄若霹靂兮本第二十七卷火燎陸渾而山燒本第十七卷灑血毛於秋野兮本第二十七卷曲旌門而歌鐃本第十七卷維君王止輦戒禽荒兮本第二卷匪臣東方其足褒本第四卷少焉溯伊松之河兮本第六卷又邇夫敖漢之郊本第十七卷命習網以有事兮本第十三卷暇觀漁于波濤本第六卷有鱨鯊與丙穴鯉兮本第四十三卷取鰱鱅以充庖本第十七卷駕鵝鴈鴨驚飛鳴兮本第六卷蘆岸雲煙紛相交本第六卷想魚樂於濠濮間兮本第四十三卷理釣綸以水樵本第九卷識忘筌而有餘清兮本第九卷憶漁歌也風瀟瀟本第七卷懿乎至人用心可得言兮本第四卷勵宵旰以勤勞本第四卷咏車攻於玉塞兮本第二十七卷何雲瞢之寬遼本第二十七卷虎圈豹房無更築兮本第四十三卷山之翁媪爭來朝本第十六卷全鹿