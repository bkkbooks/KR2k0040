若木兮三萬里暮承湛露越靈椿之八千年嵗紀閼逢鑾輿涖止溯荒作於岐山實肇基于白水周家豐畢之原漢室枌榆之祀聳神樹以中立罩珠宫而敷榮似羽節葳蕤詔鸞鳳使為驂駕儼金支容裔想靈爽於兹式憑爰抒天藻為錫嘉名豈止配封山而隆桑梓抑將昭萬祀而冠寰瀛微臣敬賦兼系以詩曰維兹靈兆聖所居天皇命植天上榆斗司喉舌衆宿趨畢星灑潤箕星噓富媪受栽析木區端正妥帖色弗渝娑羅扶桑參兩隅松楸栝柏前後臚護紫薇垣中一株可為玉輅運軸樞可為華蓋披流蘇列聖涉降心怡愈靈旗閃倐光有無陵前再遇舜目矑秋氣瑟瑟吹扶踈蒼翠更茂八年初千枝干霄萬葉舒卜世卜年數其如椎祥肖質垂册書寶墨兼傳神樹圖聖駕東巡再謁三陵賦甲戊紀昀臣聞祭不欲數所以深致其尊嚴祭不欲疏所以時通其親愛祖功宗德必申報以精禋春禘秋嘗皆合符於天道聖人制禮其義詳矣至於柏城山殿閟千嵗之金鐙儀馬靈衣護萬年之玉匣銜珠仙鳥精爽長存繞鼎天龍英風如昨姬宗受籙初傳祭畢之文漢氏修儀屢奏上陵之曲凡以神軒殷薦撫弓劍而不忘靈殿瞻依拜衣冠而申慕緣情制禮在古人未有常期因事告虔惟聖主協其天則欽惟皇帝陛下純心薦祚至孝通神肅肅雍雍已延禧於清廟元元本本更作頌於高山燕及皇天揚駿聲以昭德格於藝祖告巡狩以明虔昔於癸亥之年親移六御曽以仲秋之吉恭謁三陵播前烈而有光飲太和以示慶禮行樂達共浴龎鴻愛著慤存彌懷對越但以神宫靜謐非時不敢輕臨雲闕森嚴無事不容數告洎今閼逢御氣嵗陽回十幹之初閹茂司辰星紀際一周之候本天舉事將奏鼓以思成率祖攸行用翕河而裒對克昌厥後緬懷豳館遺基時邁其邦復履壽邱舊邑精符有感織女星明州絡所經真人氣應昊天其子三靈叶大順之符先祖是皇百福答孔明之祀且夫帝王之孝在遍合其歡心昭格之原在克揚其大烈昔者帝出乎震天符彰元鳥之祥人始於寅王氣兆蒼龍之野百靈受職降斗宿於黃神三尺親提耀炎精於赤帝金支結蓋開天而位正中央玉弩垂芒闢地而威行東北挹婁勿吉全收三蘖遺墟韎􅞘句驪盡𨽻二南舊域元狐受籙當年屢奮干戈白鹿呈圖今日莫非臣僕自熱河取道吉林纘舊服也燕犀冀馬天下稱雄火帝雲師先皇教戰歌豳風之于貉公子為裘畋渭水之非熊文王卜獵舞昭七德未忘開國威靈詩詠四黃不廢乘時講肄豺方祭獸弓矢斯張鳩始為鷹罻羅可設非惟以充乾豆備享祀于神明實亦克詰戎兵用親揚夫光烈合圍十九繩祖武也若乃黃祇孕氣肇王迹於靈臯青帝含精闢奧區於吉土天地長男之位鬱嵂居尊山河兩戒之交蜿蜒衆勢華胥神母實感虹生申甫名臣亦緣嵩降流泉相度迹追築室之初喬嶽懷柔體頌時巡之日望秩長白溯王業所由興也至於書䘖木鳳號渙明堂竿揭金雞星空貫索引年尚齒示孝弟而涵柔賜爵蠲租宜民人而嘉樂根荄暢遂蕃釐宣德産之精風雨和甘滲漉達桐生之氣歌傳沛邑兒童俱奏三侯酒置南陽父老齊呼萬嵗非所謂孝子不匱永錫爾類者耶况乎廟中境外仁孝同源神主民依天人合契流通一氣將含識以知歸格被萬方自敷天之丕應虞廷饗保王母貫其玉環周道尊親越裳獻其白雉帝車東指兩都之輦道方通天馬西徠萬里之流沙已被正似鳴球來格感獸舞以徴祥亦如大糦是承載龍旗而恐後又所謂孝治天下不遺小國之臣者矣夫周書作訓禹迹方行商頌登歌湯孫奏假思文后稷推祖德於陳常明昭有周播王權於式序莫不形容美盛震耀古今臣幸際聖朝備員翰苑西崑載筆本緣文字蒙恩東壁觀書惟以詠歌為職其敢不竭其膚末揚我休明謹拜手稽首而獻賦曰伊世德之作求卜靈長之受祜襲氣母以斟元奠柔祗而拓宇推開基之有自周詠生民緬降福之無強商歌烈祖二京並建鴻都永峙於東西九廟常尊世室不遷夫文武道光玉劵既垂統於來兹神閟珠邱宜薦馨於終古衍蒼牙之慶帝系綿延彰紫氣之符聖人作睹攝提合雒大揚五葉天聲夔鼓龍旗克纘百年靈緒溯基豐邑曽殷禮之肇稱報本橋陵乃鴻儀之再舉爾其炎帝司天赤騮載駕羲和練日朱鳥方中驗六宿之鉤陳瑶樞指北占四羅之天目玉輅巡東瑞節先行早戒期於舊國安輿虔奉暫消夏於離宫蓋昭德示和未舉明禋之盛而問安視膳已彰聖孝之崇則有司𨽻戒途土方樹舍萬騎䟃𧽼七騶整暇玉皇絳節雙龍夾轂以回翔金母雲軿三鳥扶輪以上下望行殿之崔嵬見旃裘之奔迓厥契底貢爭看西旅之來我馬既同適飭東都之駕若以荒逺之潛孚而昭本源之至化也於是津通柝木地涉豳都躔分箕尾星帶龜魚井鉞參旗序坎宫以東轉軫收房臨丑位以斜趨經過毳幕氊城重拜雙雙之豹尾漸至白山黑水新瞻九九之龍車大獮治兵時維八月陳師鞠旅王用三驅貔虎熊羆赫矣聲靈之震疊風雲蛇鳥依然開創之規模夫其兩廣舒張六花竒正立萬馬而不嘶列八門而聽令象祖宗之俟天休命也陳分鳥翼圍合魚麗方總干以山立俄鳴鏑以風馳象祖宗之應運興師也弧直星狼芒摧天狗批蒼兕之千斤捩竒鶬之九首象祖宗之滌蕩九有也三品既登五豵斯取爰解網以示恩咸止歌以有序象祖宗之永清大定修文偃武也别有犀手成羣鯨波無際禮陳大獵橐楊栁以登鮮頌奏多魚取鰷鱨以供祭忽來忽往黿鼉若駕其橋梁一縱一橫鵝鸛宛成其陳勢聚跋浪之雄才角凌波之精鋭儼然見泛鴨緑蹙覺華而兩平東裔也爾其臨産弩之長江環采珠之巨澤睇龍戰之大荒緬鷹揚之舊迹依稀水滸亶父營居髣佛夕陽公劉卜宅穆懷祖烈紆清蹕於吉林遙答神休薦嘉筵於長白是蓋創業所由發祥斯在蟠地脈以尊嚴聳神峯而碨礧惟聖帝之將興閟靈區以相待嶞山有頌等於望秩燔柴祀事初行亦似先河後海乃發肅慎乃向遼陽周原膴膴殷土芒芒抵東北以回鑾翠旌容裔指西南以移蹕玉軑鏗鏘鴻雁聲多下千林之黃葉鯉魚風起落九月之丹霜翠柏青松忽遙瞻夫靈殿華旗芝蓋乃逺涉夫崇岡守以熊羆浮五雲於空濶望如龍虎接一氣於青蒼是鼎湖之所在而烏號之所藏也天子於是召宗伯命太常陳廣牡列大房以妥以侑或肆或將奉鬱金以裸地􅌊蕭火以求陽薦兩敦而親盥格四聖於同堂推始祖所自生則義通於禘當季秋而有事則禮近於嘗洞洞屬屬穆穆皇皇蓋溯帝嚳之淵源重來告潔因追宗周之謨烈以次升香繼謁福陵載瞻天柱肇承帝寶戰榆罔而興師怒奮天弧翦崇侯而整旅白旄黃鉞當年屢震軒威玉戚朱干今日猶陳武舞睪然太祖之指揮率土也昭陵肅穆隆業嵯峨虎賁三千傳孟津之作誓降蕃十四憶貞觀之揮戈灃水攸同澤在都人士女昆臺既去功存天地山河穆然太宗之勳業不磨也斯時也祖義本仁化神氣盛萬國合歡一人有慶禮成福備已符百順之名孝享吉蠲允協九如之詠蓋列祖經綸草昧貽此珠囊而皇帝提挈天綱握其金鏡思前烈於丕承感遺模於執競愾聞僾見意蠲潔以常通崇德報功情纒綿而莫竟秋霜春露永懷十載之誠玉瓉黃流乃致一朝之敬由其馨香之昭事仁孝純深所以典禮之重光後先輝映是知奮武揆文不遺藩裔觀民設教逺歷山川出紫塞之嚴關荒綏五百紆青羌之巨野道路三千木葉峯頭共瞻玉斧松花江上亦拜華旃固由宜天子之聲明朔南俱暨實則推祖宗之仁愛中外無偏至於肜庭啓丹詔傳天膏沛愷澤綿肆夏一歌王風胥洽由庚既奏和氣畢宣祝保定者答鹿鳴之什式燕樂者咏魚藻之萹型仁讓者眉壽介公堂之酒蒙樂利者曽孫守原隰之田培本支於百世頌天子於萬年又孰非推恩之所必及廣愛之有由然夫岡陵三壽祀先致祝於作朋河嶽百神洽禮歸原於允保孝孫有慶集主祭之嘉祥上帝居歆荷配天之靈造詠徂賫於皇王知受釐於祖考不煩不怠萬福來同是繼是承一人有道雖蔡雍一議未足測其精微光武三巡不能較其多少又何論元都洛北金莖碧瓦之尊崇法駕河東甲帳珠簾之祈禱乃作頌曰寢廟迎神圓壇配食四氣薦和九成象德如見如聞既匡既敕矧伊遺弓閟兹靈域精爽斯慿瞻依何極於皇聖祖孝思維則三賁鑾輿巡於舊國受福穰穰時萬時億皇帝奉先有嚴有翼松柏親瞻車徒再飭載執鸞刀載升黍稷有穆其容有愴其色神保是饗馨香不忒湛恩旁推祥和充塞侯甸要荒東西南北四海來祭各以其職渺彼氐羌亦歸銜勒慕我王道無反無側唐莇歌謡渾邪屏息抱蜀不言未戰已克化馳若神孰窺孰測孝治既昭萬里自得臣作頌聲匪夸匪飾樂石精鏐億年不泐聖駕四詣盛京恭謁祖陵禮成恭賦癸卯金士松歲昭陽單閼天子穆穆雍雍備皇儀之肅習展孝思之篤恭撫鴻圖於熙洽感燕及於皓穹仰高山之天作佳哉鬱鬱而蔥蔥憶初覲于大淵獻而紀三謁于著雍經四載之踈詣輒輾轉于宸衷故特練辰卜日而時邁于東惟月仲商南吕應律乃建辰旒馳星蹕麗錫鋄驤驪驈葩瑵蜿蜒闒戟轇輵振龍輈之和鸞衛虎賁以戴鶡自塞苑而從東咸沛艾而倏忽隱隱轔轔超紆譎之砰磷兮若雷轟而電掣總總撙撙凌高衍之嵱嵷兮若鳥𦐄而魚頡夫其飛梁橫跨迤邐廣堙葺綺闉而增煥環山澤而洪紛巨流浺瀜而涾湤平頂嶱嵑而峮嶙渾河㶀㵧而波潗巫閭嶻􅙙而峯皴蒙叢兮雲參孕星而結瑞瀲􅗷兮璇源拾月而貢珍號稱天府則水陸之族萃焉蔚為德産則樹藝之種陳焉嘉果則樝梨榛栗之倫紛披而駢列名材則檀櫚松檜之屑森挺而輪囷繄神臯之曼衍徴茂育於無垠乃先達乎興京凜兆基于列祖運淳化以充周統奧區而涵煦觀萬國兮環拱騰五緯兮畢聚按禹甸之畇畇與周原之膴膴孰如我聖朝之肇域而正方畫疆而拓土迄今式單厚之洪模猶藴扶輿而篤祜乃謁永陵元氣蔚蒸藴濛鴻而開運啓聖緒于雲仍乃謁福陵光爚崚增竪聲靈于天柱闢謨烈以顯承乃謁昭陵瑞藹祥凝迪蓄釐于隆業保圖籙之受膺我皇上殷懷燕翼景緬龍興望橋山之奕奕思劍舄而兢兢際禮交而樂應通純德以薦升念珍符之握闡猗歟聖祖之相繩既駐六飛于留都恆敞入門而詄蕩錯㕓市以相輑擁林巒以為障雉堞環羅兮勢屹層岡鳳闕巍峩兮輝騫蓬閬左文德而右武功兮經緯宏敷而交暢東關雎而西麟趾兮禔福覃綏而春盎引丹穴之神禽兮起高樓而憑望清寧翕泰于法宫兮大政當陽而南嚮蓋雕楹刻桷之弗施玉磶文㮰之弗尚惟茅􅗔松棟之長新皆列聖艱難之所創臨實枚之寢廟嚴對越而齊莊承龍旗兮煜煜設猛虡兮趪趪擊鐘鏞兮振振叶磬管兮鏘鏘豐特齍兮既齊而既稷潔鼎鼐兮或肆而或將工祝申辭而儼恪庶司奔走而躋蹌惟天子愛慤兼致鬷假孔彰奉璆册以登晉安閟宫而焜煌以介萬年之景祚聿徴純嘏于壽臧維時普至孝以彌綸典更修于琮壁􅉔圜丘方澤以明禋循瘞繒燔柴而不忒臨灝溔之滄溟滌苾芬而神格滙混同鴨緑愛滹之三江漙馨香于瀎潏饗褒鄂之舊勳表忠貞之偉績更遣祀乎遼陵奠遺規于封植九重􅌈穆而有虔百靈懷柔而罔隔惟盛德之感孚定保康于宗祐於是御黼座垂衮衣錫燕飲歌魚麗雉扇雲移兮暉耀鵲罏風揚兮煙霏奏鈞天兮響諧玉律浥湛露兮恩飫瓊巵百爾拜賡兮儀聨丹陛九族惇敘兮歡浹彤墀虞廷之繡絺采絢堯厨之蒲萐華滋瞻天顔之溫霽平泰階而疊晉繁禧伊彼朝鮮之列藩夙奉璿衡于表正羅鶼鰈以來王涉梯航而效命帝嘉海域之輸誠大賚使臣以酬敬擎寶墨而琳琅並共球而暐映仁渥地維道函天鏡玉燭呈華瑶樞持柄屆月竁日際以寵綏疇不荷鴻慈于睿聖自鑾輿之就道及信宿乎陪京照天章于雲漢編賦詠而裒盈殫述邠岐之締造暇吟閭井之阜成鶴禁宣毫而炳煥龍文雕琰而晶瑩羅縹緗於傑閣標文溯之嘉名插藝籖而璀璨鬱蘭橑而崢嶸仿天祿石渠而倍富啓羣玉委宛而增榮凡文命之纘乎神聖文思之被乎寰瀛胥見我皇上潤色夫鴻業俾奕祀蹈詠夫升平若夫綸綍之頻頒咸頌恩膏之深穊豁租賦兮比户盈寧安耕鑿兮羣謳樂利下禹車兮肆眚帷寬開湯網兮協中布治覩貔虎之桓桓兮詔特褒其射騎覩芹藻之彬彬兮詔特優其鼓肄覩鳩杖鶴髮之趨迎兮詔引年以廣賜覩扈輦之千官與赴工之百吏詔晉秩而加糈均各奬其勞勩彚臣民抃舞之容巨典益臻乎茂懿禮既成于大備指京邑而言旋逺周廬而雯靄張羽蓋而曦延聖人日躋兮以敬行健兮惟乾向東陵而祇謁愈告慎于仔肩於緝熙以繼序每不忘而不愆攄覲揚之積悃喜錫類而慶延聨還清禁而蠲潔用告成事子奉先爰正朝以受賀蹌百辟而覲堯天臣沐生成於高厚獲叨禁近而備員親見皇猷之紹衣恭逢彛典之純全佇慰江鄉之翹望謹覘海屋之籌綿敢敬敷擊壤之意而綴陳上陵之篇欽定盛京通志卷一百十六
