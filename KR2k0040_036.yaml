body:
  text: 城池四黑龍江齊齊哈爾墨爾根黑龍江呼倫布雨爾呼蘭博爾多布特哈欽定四庫全書欽定盛京通志卷三十二城池四黑龍江齊齊哈爾城在奉天府東北一千八百餘里亦曰奇察哈哩内城植松木為牆中實以土高一丈八尺週圍一千三十步門四城外有郭用土㘺包砌週圍十里東南北各一門西二門環城有重濠廣一丈五尺本嫩江南宿伯克依莊地本朝康熈三十年副都統瑪布岱監築三十八年移黑龍江將軍駐此乾隆四十五年奉㫖重修齊齊哈爾境内厯代舊有城址鄂吉岱城城東三百餘里週圍一里我太祖高皇帝甲辰年征葉赫部撫降之古城城東二千餘里瀕額爾伯克依河其東即寜古塔界克伊特城䝉古語克伊特寺也城西五十餘里我太祖髙皇帝甲辰年征葉赫部撫降之安城西曰瑚拉爾吉屯剛安屯國語剛剛也郭多城國語郭多魚躍也城西七十里週圍一里我太祖高皇帝癸丑年征烏拉部撫降之有城西曰哈彌雅台屯䝉古語哈彌雅台干涉者也勒布圖爾城城東南六十里鄂城南曰察罕鄂謨西南曰温托琿謨北曰烏裕爾鄂謨察罕䝉古語解見奉天府山川卷鄂謨國語解温托琿䝉古語觧俱見黑龍江山川卷鄂勒歡城鄂勒歡國語解見吉林山川卷城西南三十餘里週圍二里尼堪外蘭所築我太祖高皇帝癸未年征尼堪外蘭撫降之解城東曰梅楞屯西曰巴爾齊喀屯梅楞國語見吉林山川卷綽勒城䝉古語綽勒物沉水中冒出之謂城西南一百五十餘里喀布齊賚城城東三百餘里納延城䝉古語納延八十之數也城東北三百六十里週圍六百步阿齊蘭城䝉古語阿齊蘭孝也城西百諸百里圍一里瀕濟秦河岸以上城建置年代俱無考墨爾根城在齊齊哈爾北四百三十五里内城植松木為牆中實以土高一丈八尺週圍一千三十步門四四隅皆有角樓城外有郭土砌週圍十里東西南各一門北二門本朝康熈二十五年奉天副都統寶鼎監築二十九年移黑龍江將軍駐此三十八年將軍移駐齊齊哈爾四十九年設副都統等官駐防乾隆八年奉㫖重修黑龍江城在齊齊哈爾東北八百餘里内城植松木為牆中實以土高一丈八尺週圍一千三十步門四西南北三面植木為郭南一門西北各二門東面臨江週圍十里木朝康熈二十三年將軍薩布蘇監築設將軍副都統鎮守後將軍移駐墨爾根裁副都統雍正八年復設副都統鎮守乾隆八年奉㫖重修愛琿城城北十二里週圍九百四十步門五本朝康熙二十二年修築此城設將軍鎮守焉後裁仍設兵駐防黑龍江境内厯代舊有城址濟噶蘇城䝉古語濟噶蘇魚也城東五十餘里珊城西曰鍾斜鄂謨塔珊鄂謨鍾斜塔鄂謨國語解俱見黑龍江山川卷徹赫特城城東六十里徳勒徳尼城城東南百餘里又城西曰徳文蘇蘇北曰富魯蘇蘇北曰阿克抵蘇蘇蘇蘇國語解見黑龍江山川卷國語富魯優長也奇塔特城䝉古語奇塔特漢人也城東北週圍六十步衆安城城西北二十餘里畢城西曰額尼音畢爾罕東曰烏克薩哩爾罕又東即薩哈達太祖高皇部故地我征薩哈連部取其十一寨其事蹟謹詳帝丙辰年山川卷國語額尼音牝也䝉古語烏克樹本也薩哩馬股皮也額蘇哩城城西北八十餘里按城北即額蘇哩畢爾罕庫稜畢爾罕額蘇哩八旗姓庫稜畢爾罕國語解見吉林山川卷洞城城西北九十餘里週圍二里我太祖高皇帝戊子年征楝鄂部撫降之事蹟謹詳載吉林城池卷楝鄂城注穆嚕蘇蘇城穆嚕國語解見吉林山川卷蘇蘇國語解黑龍江山川卷城西北一百黑卦城東北曰疎勒屯果布噶爾城城西北一百餘里烏魯蘇城烏魯蘇䝉古語觧見黑龍江山川卷城西北三百里在烏魯蘇河北岸週圍二百三十步曰城北即庫爾喀故地西烏魯蘇河灣呼瑪爾城城西北三百二十餘里城南曰固思河口鐸陳城城西北九百里阿薩津城城西北九百里烏庫勒城城西北一千三百餘里多錦城城西北一千三百餘里城西即拉哩拉地雅克薩城雅克薩國語解見吉林山川卷城西北一千三百餘里城東即提威河灣尼布楚城城西北二千餘里無以上諸城建置年代皆考呼倫布雨爾在齊齊哈爾城西北七百六十里雍正十年設統領以副都統銜管理統領事並添設總管等員分兵防禦駐劄處在伊伯河西岸扎克丹地方呼蘭在齊齊哈爾城東南八百十七里週圍三里雍正十二年設城守尉駐防乾隆八年新設有站博爾多在齊齊哈爾城東北二百七十餘里雍正十年設副總管等員分兵防禦駐劄處在訥黙爾河地方布特哈在齊齊哈爾城北一百六十里雍正六年増設總管等員分兵防禦駐劄處在尼勒濟地方以上四處俱無城郭但現設兵駐防與奉天之熊岳牛莊吉林之白都訥阿勒楚喀同為分防重地例得備志臣等謹考錦縣西北有徒河城為虞舜時故蹟蓋遼東西之建有城郭實昉於此嗣後名城見史志者漢有襄平居就新昌遼隊平郭無慮望平險凟房縣諸城公孫度時有北豐城慕容廆時有大棘城大棘在今義州西北北豐在承徳縣西北襄平在遼陽州北居就在州西南新昌在海城縣東遼隊在縣西平郭在蓋平縣南無慮即廣寜縣治望平在縣東北房與險凟在縣東南其遺址蓋猶可考唐太宗平高麗自遼以東置州四十有二如蓋州安市州舊書並云無城而新書則稱有之參考地志蓋平縣境有蓋州故城遼志謂即高麗蓋牟城李世勣拔之以為蓋州者也縣東北有安市故城通志謂薛仁貴白衣登城即此則舊書無城之説殆未可信而今寜海縣東有大黑山城者全遼志指為唐張亮舟師所襲之沙卑城通志又謂沙卑在海城縣境則不特史未可信而志亦滋疑矣渤海大氏設五京十五府六十二州其城淢之制史志尤闕畧未詳洎遼金建為三京所置州邑如樂郊奉集章義遼濵遼陽巖州海州析木耀州歸州秀巖永康化成銀州咸平挹婁信州貴徳開州來逺諸故城俱在今奉天府界内鍾秀閭陽川州故城具在今錦州府界内寜江故城在吉林北肇州故城在白都訥南會寜五國故城在寜古塔西南按之圖記燦然有徴元城邑悉仍遼金之舊明洪武永樂中設二十五衛城安樂自在二州城至金河完水之間僅以都司遙領之而無城也敬惟我太祖高皇帝創業經營始自赫圖阿拉國語解見京城卷繼迺締搆興京規畫遼瀋當時所築薩爾滸國語解見奉天府山川卷界藩東京諸城益仰見櫛風沐雨遡澗陟原之鴻績太宗文皇帝神武布昭善繼善述黑水以北罔不臣服今謹稽兩朝謨烈凡夫親御桴鼓以及命帥奏功者百四十有四攻克東北諸部族之有城郭者曰烏拉部之伊罕山城國語解見吉林山川卷遜扎塔城國語遜扎塔每五數之謂郭多城國語解見本卷前鄂謨城國語解見黑龍江山川卷富勒哈城國語解見奉天府山川卷哈達部之新舊城輝發部之扈爾奇山城多璧城費優城多璧費優國語解俱見吉林山川卷葉赫部之璋城䝉古語璋性情也阿齊蘭城䝉古語解見本卷前烏蘇城䝉古語解見吉林城池卷吉當阿城雅哈城國語解見吉林山川卷克爾素城國語解見疆域形勝卷和敦城喀布齊賚城鄂吉岱城克伊特城䝉古語解見本卷前東西二城蘇克素䕶河之圖倫城國語解見吉林域地卷薩爾滸城國語解見奉天府山川卷安圖𤓰爾佳城安圖國語解見吉林城池卷鄂勒歡城國語解見吉林山川卷嘉穆瑚城古哷城沙濟城渾河部之巴勒達城國語解見奉天府山川卷兆嘉城杭嘉城扎庫穆城佟嘉城完顔部之完顔城棟鄂部之齊吉達城翁鄂洛城國語解見吉林山川卷哲陳部國語哲陳邊疆也之托摩和城國語托摩和樓止也章嘉城訥殷部之佛多和城國語解見吉林山川卷烏勒固宸部之佛訥赫城國語解見吉林城池卷扎庫塔城國語解見吉林城池卷烏庫勒部之烏庫爾城其無城郭而有屯寨木城者曰蘇克素䕶河部之瑪爾墩寨沾河寨渾河部之貝琿寨國語貝琿土也哲陳部寨珠舍哩部寨鴨緑部寨阿庫哩尼滿國語解見吉林山川卷部寨烏爾格辰部寨綏芬路國語解見吉林山川卷雅蘭路瑚葉路雅蘭瑚葉國語俱解見吉林山川卷各屯寨額爾吉尼部寨額赫庫稜國語解俱見吉林山川卷部寨諾羅瑚罕部寨烏勒固宸部寨之赫濟赫國語解見吉林山川卷屯鄂摩和索羅屯尼瑪察路穆稜路䝉古語解見疆域形勝卷西林路國語解見吉林山川卷瑚爾哈䝉古語解見吉林山川卷部寨之烏扎拉路綽庫禪鼐吉勒部寨庫爾喀部寨之拉里禪鐸陳阿薩津多錦卦拉爾額蘇哩額爾圖國語額爾圖倚仗也諸路黑龍江之噶爾達蘇部薩哈連國語解見奉天府山川卷部凡部三十有四是也而部落之以城寨内附者則有蘇完雅爾古瓦爾喀之費優瑚爾哈之格先里錫爾馨納堪泰托和洛努雅喇黙爾庫勒赫聶瑪爾哲賴科爾佛科爾庫薩喇哩松阿哩之拜雅喇黑龍江之格博爾寨布奇赫赫岱克音烏魯蘇䝉古語解見黑龍江山川卷裕爾根海倫國語解見黑龍江山川卷固濃寜昆都倫烏蘭國語解見吉林山川卷精格哩國語精格哩小釘也瑚琿泰䝉古語瑚琿泰酒釅之謂使犬部之蓋青窩集部之那木都嚕凡部二十八是也又東北邊部落以次入貢者自寜古塔東北行四百餘里在瑚爾哈松花江兩岸者曰鼐爾䝉古語鼐爾和氣也曰格伊克勒曰瑚什哈哩皆編甲入户又自寜古塔東行千餘里在烏蘇哩江兩岸者曰穆稜䝉古語解見疆域形勝卷東二百餘里在尼滿河源者曰奇雅喀喇國語解見錦州府山川卷又自寜古塔東北行千五百里在松花黑龍江兩岸者曰赫錦喀喇又東北行四五百里在烏蘇哩松花黑龍三江滙流左右者曰額登喀喇國語額登殘缺也又東北行七八百里曰費雅喀自寕古塔東北行三千里曰奇勒爾東濵大海又東邊部落入貢者曰庫雅喇其地在圖們江北岸與朝鮮之慶逺相對去寜古塔五百里而使鹿部又在使犬諸部之外一時畏威懐徳來享來王幅員有截式廊日增誠亘古未有之盛事逮我世祖章皇帝定鼎燕京陪都並啟崇墉巍峙固若金湯聖祖仁皇帝復增建墨爾根黑龍江齊齊哈爾城置官鎮守自大興安嶺以外皆我闥户傳曰聖人有金城是用卜世靈長而大一統之規模也臣等編輯城池門以次成卷爰博徴厯代名城之見史志者與夫我國家維垣伊匹之詒謀臚載叅稽詳識之如右欽定盛京通志卷三十二
