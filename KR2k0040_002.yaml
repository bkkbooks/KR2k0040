body:
  text: 謹奏臣等奉敕重修盛京通志恭呈欽定繕寫告成謹奉表上進者伏以璇圖出震自東基式廓之模松牖秉乾從朔緬厥初之緒景發祥於先葉永懷締構艱難臚紀實於陪京備見謡風淳古千盤陵寢天成虎踞之形一統山河地是龍興之舊諏時巡而稽典敬展珠邱訂前志以勒書輝騰壁府纘承事巨搜輯體嚴竊惟周官始載職方班史詳登地理洎夫厯代並有專編顧華渚丹陵未顯孕竒之跡豳居邰室僅傳胥宇之文仰松柏於殷山景亳則圖經莫考指枌榆於炎社沛豐則紀述靡聞唐家託系仙聃徒著兩京之號宋氏􅑴源天水空稱九域之書寰宇記不列典章方輿志但箋沿革遍稽曩籍罕徵省山與宅之規欣遇右文特闡拓土開基之烈欽惟皇帝陛下德參燾載治浹登咸廣怙冒於九瀛聖人物覩毖幾康如一日天子古稀疆索恢紘無間於東西南朔圖書統滙全甄乎甲乙丙丁聿追祖宗櫛沐之勞如親風雨爰補志乘編摩之闕重煥丹青惟兹遼瀋之造邦伊昔幽營之分壤皋區神奧環滄海以為池鍾育靈長屹白山而作鎮潭湧鴨江之緑萬年慶澤方流日華鵲果之朱三姓竒徵早定太祖膺配天之景命運蓋世之神謨十三甲奮自崇朝九部沙蟲盡化草萬人破才五日重關風鶴遙傳江路天寒結氷橋而徑度河壕地險逾鐵嶺以長驅啓惎作京千里控建瓴之勢雍容議政十亭頒懸魏之章太宗誕育英靈纂承統緒受降幡於海島立石銘恩平戰壘於松山摧枯制勝克錦城而遂收寧逺匪惟燮伐申威獲玉璽而用告郊臺允協昭華進籙六曹三院績熙揆奮以交資北伐南徠勳集畏懷之並附列聖規橅建樹肇大業而開先熙朝典則貽留嗣鴻猷而率舊焜煌億䙫耀遹駿之貞符肅穆三陵萃鬱葱之佳氣幹聳神榆之蔭運啓神功峯髙天柱之標業隆天作嘶風石馬騰驤二白猶酣向月雕弧藏弆百鈞獨重聖祖三臨展謁橋山抒霜露之誠我皇四舉升馨遼海想風雲之盛紅樁層設萬靈拱衛森嚴粉堞重修千雉周遭鞏固若乃崇壇翼峙太室鼎新文武分功德之坊清寧肅神祇之祀篤恭大政殿廷鸞鳳齊鶱衍慶頤和宫掖睢麟嫓美剎奉衣冠之古刑式紹庭閣儲典册之珍義符溯澗尊藏瑑玉升祕檢而彩映留都彚寫歌風溢綈囊而昭垂奕葉松花江上戰蹟披圖蘇子河邊歡聲捧詔膴原利往威呼偕法喇咸宜蔀屋寧居周斐與額林共穩㸐霞綳而照讀無煩鑿壁之明綴拉哈以施工奚啻索綯之儉人文蔚起化成握槧英髦王氣盤紆地憶麾戈茂烈際聲靈之熙洽資記載之詳賅前此已具成書尚多簡略今兹重遵申命尤慎參稽蓋紬金匱於五朝識偉伐豐功之有自傃翠華於四蒞欣湛恩曠典之頻加指示發䝉正訛謬而懸同日月闡揚繩武制聲歌而韻叶韶韺惟載筆胥奉聖裁斯裒編克成善本臣等學荒括地才謝研京沗依禁近之班時親睿訓幸預扈隨之列備覩鴻儀因故帙以折衷擴新篇為考索三十七門之按部例以倍而加詳一百丗卷之分函數惟贏而更審聖製文增寶録允矣大經大法之遺天章體次綸音蒸哉丕顯丕承之慕澗瀍舊卜特敡駿烈於無前郊廟新釐具飭隆文於有秩紀創興之宫闕儼對堯階志僾見於寢園恍依軒鼎星土井疆之縷載刋正方隅山川城郭之條分鋪張撻伐繼關郵而有津渡遵道悉就蕩平排戶籍而及賦征諴民均臻樂利官隸雲師之掌廨宇列眉士觀璧水之光科名題額軍容增制重邊方戊己之留屯官績傳徽兼勝國甲申之錫諡人物表龍蒸之彥並採遼金祭祠尊鳳罕之臨廣羅山海忠孝旁托女史隱流類綜仙經風俗呈圖家盡敦龎之習珍腴著産壤皆清淑之滋疏往迹而援古證今語糾夸大附瑣聞而傳疑示信說佐瓌奇逺擷文苑之華近第詞臣之頌凡此支分派别總歸綱舉目張謹按候以課程暄寒屢易勉增華於踵事體例從新巨細禀承箋素分披乙夜後先告蕆汗青再構辰年伏願頒惠藝林垂芬書庫篤蒼牙之慶祚綿於陟降舟瑶光赤玉之編瑞衍夫雲礽瓜瓞燕貽益懋無忘二南七月之詩彪炳長懸詎止通邑大都之布臣等無任瞻天仰聖激切屏營之至謹奉表恭進以聞
