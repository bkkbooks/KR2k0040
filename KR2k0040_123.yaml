body:
  text: 國朝藝文五雅欽定四庫全書欽定盛京通志卷一百十九國朝藝文五雅聖駕東巡盛京恭謁祖陵大禮慶成雅有序癸亥劉綸皇上御極之八載敬天尊祖誠民格神治具畢張大化翔洽仰惟列聖東土肇基陟降在庭之近俯念陪京父老延頸舉踵喁喁望幸之誠乃以七月上旬敕禮臣備法駕恭謁永陵福陵昭陵甚盛典也臣謹按詩誦發祥書陳觀德自昔豐功駿烈莫不推本前徽如軒轅橋山顓頊附禺伊耆榖林重華珠邱並足集慶垂光用存景慕至考上陵之禮詳於炎漢之年蓋以原廟衣冠寢園弓劍先王所為創業垂統嗣世所由僾見愾聞皆於是乎在我朝受符上帝聖人首出卜年卜世奕葉重光逮我太祖太宗篤祜凝庥鴻圖式擴梯航所届悉主悉臣𬗟維遼海神臯實鍾王氣建邦啓宇墨食於兹固已嫓豳岐而軼豐沛世祖定鼎自燕留都並峙髙山天作流澤孔長瞻望龍興隩區松柏丸丸寶城奕奕億萬祀昭格明禋之感是繼是承聖祖在御時巡躬親展謁隆儀疊舉所為志敬節具者備載史書皇上世德作求肇稱殷禮諏辰夙事有翼有䖍供奉皇太后行則侍輦居則問安敬愛兼摯翠華所過秋宇澄霽川原彌望百昌成遂自從官以及候吏逺近歡趨乃至諸藩後先幅輳周廬星拱蹌蹌濟濟咸帣韝鞠􅎽而進萬壽之觴也古稱枌榆樂土詎足倫比惟時聖衷淵穆按册披圖於礪山帶河昄章胥集見規模之閎逺焉於櫛風沐雨勝蹟依然見締造之艱難焉於民物淳龎軍實整繕見古風之可愛而本根之益固焉惟天惟祖宗眷念子孫臣庶畀以生成皇上一體天祖之心治之是以升香瘞璧而肸蠁通舞德歌功而精誠洽祀事既蕆垂裳當寧受羣臣朝渙汗特頒小大稽首所以行一人之慶所以合萬國之歡循古制也崇家法也昭錫類也示懷柔也皇皇哉大孝至仁備矣臣濫竽詞館夙效編摩伏覩史針金匱之藏先猷炳煥有踰往牒兹復以職司輿僕恭遇和鑾清蹕道左跪迎屬在工寮並得陳詩紀盛竊未敢以弇陋自解謹獻其辭曰我皇踐阼纘列祖之德有典有則是崇是式見於郊廟祗祗翼翼永言孝思維丹陵是即一章天降大寶命眷時瀋陽篤生髙后肇造厥邦闥門潭潭導我三江奄有九有耆定下土方二章天戈麾矣禆王撫矣間間禁旅陳樽爼矣嶪嶪寢成縣簨虡矣繼繼繩繩百神是主矣三章皇綱帝紘歸我聖神四十有八部面內咸賔暨使犬使鹿冠帶侁侁帝曰欽哉維創守道均四章裸室兮露垂齊房兮芝茁於昭兮仁皇茂典兮是秩馳道兮筵開鎮山兮笏立笏立兮崔嵬凝景命兮延洪哉五章嵗建亥兮星在栁皇繩武兮澤單厚揚德旌兮啓文囿詣璇宫兮奉聖母迎鳩杖兮拜馬首稱上瑞兮皇則有原田每每兮長禾被畝六章皇帝至止封樹來雲煌煌像設愾乎如有聞載羅鞸琫載具典墳先是列上命史館恭繕祖實録尊藏盛京丕顯我下武繼序我思文七章九功歌七德舞蠲剛日荐清醑閟殿峩峩三光牖戶俄朵之城謨惠之野叶酹從龍兮訖分虎蕭薌絪緼兮皇受祜及我嘉師兮亦其福汝八章祠官告備乃慰乃宣曰敦本茂實維聖所先訓練以時既精既研考牧以時既蕃既便以迪我四民服髙曽之傳九章沐日浴月環滄瀛兮乾經坤絡開上京兮井廬櫛比周原砥平兮弋山漁澤厥壤可耕兮德産精兮萬寶成兮十章赫赫兮王居洋洋兮聖謨上賅兮雅頌下括兮京都繪天賦海兮睿藻抒維洛宅有誥兮維邠原有圖十一章遂開明堂聖人當陽賜酺一日賜爵一級爾祿爾糈皇則豫之爾絲爾粟皇則復之及爾耆耉曰饋之酭之及爾圜嘉曰省之宥之列祖之光維我皇之慶叶時萬時億承天之况叶章十二聖駕東巡盛京恭謁祖陵大禮慶成雅有序癸亥汪由敦臣聞奉先思孝必隆報本之忱懷永圖艱必宏述祖之典是以景員松柏藻歌商楹髙山漆沮騰軌姬籙闡祚由其卜昌釐風以之歸厚於皇聖清俔天錫羡拓迹開統重光緝熙若水降祥之地繞樞電而湛星虹橋山閟兆之都擁熊羆而䕃雲物瑶臺􅑬嵼外大國之幅􅊷皇澗瀠洄篤公劉之締構珍符欲集宇􅨚構其氤氲運㑹將開山川鬱其磅礴神臯奧區福地昌衢創古迄今靡得侔焉巍巍三陵天設地成左遼右瀋盛京建焉九鼎既奠是為陪都狹沛里而陋譙鄉掩媯虛而轥邰室津名析木天街分箕尾之躔嶺號輝山土宇擴幽營之趾削成長白抗終南太華之峯沆瀣混同滙溫洛榮河之氣俗泰華胥風厚豳野形勝天府華實上腴赫矣壯乎斯太紫之殊庭坤靈之寶域也若其重軒雙闕之麗參塗九市之殷千廬八屯之周百躔萬雉之密粲乎隱隱與京師同制洵足以奉陵邑而固皇基隆上都而觀萬國者乎我皇上燕天嗣構敬日凝圖襲恩纍愛之化成稽古憲章之烈盛協氣之所翔逰淳化之所甄治文明之所震耀聲教之所布濩淪深格髙暢垓泝埏景鑠鴻祐殊徽茂祉穰穰簡簡磑磑即即百年膺慶鍾明備之期七世恢基考祖宗之德固以道藹配京勳昭紹庭矣猶以象耕靈隧展軨之路方遙龍鼎幽宫升香之禮未舉蒼蒼畢隴鬱鬱春郊永言弓劍之遺有積露霜之慘昔我皇祖躬勤三巡有恪執事上以崇本報功答列聖在天陟降左右之眷下以覲嶽省方知民風土族王業艱難之自斯乃國家舊章神聖逺謨不可闕也嵗在昭陽月旅夷則登榖告期載嘗佇典皇上乃奉皇太后發軔紫宫清埃遼左黃麾紫蓋出霄甸而馭風雷赤芾金貂扈烟途而序鵷鷺靜帷宫於緑野仍勤問膳之儀肅帳殿於黃圖尚展含飴之樂桑麻彧彧夾輦路而鋪芬黍稷與與委珍阡而縟錦若乃取材講事順時令而耀威神舉柴收禽贊梁鄒而登爼器諒軌物之所經豈遊娛之為壯于是風馳霧集長驅虎踞之鄉天旋靈遊直指龍飛之宅桑梓依然枌榆在望晬容有穆孝享用蠲洞屬幽喻肅雍顯詔官職有序駿奔秉德黃彛玉豆告嘉栗於靈阿金支秀華接神斿於詄蕩蒼雲布地豐融享右之符蕭光燭天暗藹淵祥之貺于斯時也穆穆焉皇皇焉愛慤咸致僾愾若接騰漢典於視奩跨唐規於獻服者矣既而存問髙年採訪謡俗酬褒鄂之陪塋遍方望之羣祀御總章布綸綍中陽白水仍沾賜復之歡羽琌釣臺共飫愷樂之燕所以承靈億而擁休嘉隆孝熙而示慈惠也爾乃七騶厲飾肅禁旅而習威儀三表鳴鐃稽政典而明坐作軍容以禮成大閲以義舉因斯以讋泰武於遐外憺威稜於藩維震叠之用斯宏柔懷之經彌逺然後振旅神都回麾雲嶠千旌鳳轉翊大輅而前驅萬騎龍趣遵康衢而復路邦基有維岱之安鼎業有如岡之福懿爍之蹟猗歟偉哉且夫追逺率祖配天綏嘏鴻慶也時邁車功觀風㑹同茂典也大禮大樂神人允若治本也乃文乃武威福率土化權也用能經綸萬樞雍動八表道凝克紹垂衣馳玉檢之功義極如存指掌謐珠囊之運比時巡於往事則汾射韜芬第嘉頌於從臣則卷阿避德臣沐浴元化叨塵近侍雖未獲參扈清蹕而竊幸遭逢盛典逺希生民皇矣思文清廟之作雍容揄揚降慕長卿孟堅退之子厚之篇鏗鍧炳耀輒採古義勉課末音謹為雅詩十五章上獻詩曰昊天有成命集我皇清爰降帝女錫朱果以茹篤生藝祖肇是受新瓜瓞衍緒長白導源運啓髙山鬱鬱永陵峻極於天一章赫赫太祖勃興東土甲士十三我仇是殱既殄我仇我戎孔修羣凶沸騰王師濯征殪厥戎首方域以寧九姓摧止五部歸止覆育列國帝號徽止二章天祚大邦遼水之陽既溥既長考卜維皇曰時曰止于瀋之涘宅是盛京萬年攸始三章明綱既隳四路集師皇奮其武天戈一麾五日三捷大皇清之業誕受四國巍巍福陵垂裕萬葉四章太宗嗣服仁濡義肅平壤漠漠朝鮮臣伏杏山矗矗明師載覆如飈斯馳至于青兖匪利天下弗劉弗翦五章武功既殫文明矞皇乃創國書乃秩典章八纛央央百僚蹌蹌使鹿使犬重譯來王於昭昭陵長發其祥保又斯無疆六章皇矣世祖統一九區式眷舊京肇啓帝圖景亳生商豐鎬造周元戎禁旅卿尹府僚以衛山林以固皇都七章越我聖祖六飛三臨用展孝誠翼翼以興大朝酆宫恩滂景從亦越我世宗來覲於東三后在天肸蠁昭明不顯不靈佑啓我後人八章皇帝御宇于兹八年于郊于廟對越有䖍惟烈祖之緒時豫仔肩聿追厥先敢曰逺而皇祖有明憲豫敢緩而肅奉慈御龍婉婉而至德要道崇化本而九章鸞旗晨發旭日杲杲山祇嶽靈徯望翠葆載飭我旅戢我徒圉分部徐驅母躪我稷黍十章爰厯古塞爰駐山莊追維祖烈攄慕天章鑾輅東指藩服之履來迓來衛來庀儲偫帝顧曰嘻毋汝勞只匍伏固請奔走趨俟十一章狩於平郊選徒不囂麀鹿儦儦有熊斯趫有虎斯嘷天弧一發猛獸在庖諸蕃震愕相顧告語聞諸我先曰聖祖神武永世追慕今皇天威宛聖祖重覩儀式刑祖宗之德莫敢不服揚祖宗之功莫不率從十二章言循三江言涉重岡自東征西三陵相望旖旎雲旗煜爚神光綏豫孝孫歆是孝享言建功宗言遍羣神我皇蒸哉十三章言次盛京路寢奕奕羣后肆朝㑹同有繹式宴式賚湛露滋液施及陪二遊泳皇澤十四章禮告備矣德施槩矣遄言還蹕敬我事矣于廟告至拜烈祖明賜經塗屢千經時纍月雷動雲行靡戒靡蹶若艾若稚扶携走謁亶列祖之詒繹時孝思於萬斯年介我純熙於萬斯年鞏我丕基十五章聖駕東巡盛京恭謁祖陵大禮慶成雅有序癸亥萬承蒼臣聞聖人之德無以加於孝宗廟之禮所以祀其先夫孝暨之而塞乎天地溥之而橫乎四海惟聖人而在天子之位者氣盛而化神情深而文明為能極其量焉因心致愛由近逹逺中庸不曰祀其祖而曰祀其先明不可以世數限也漢儒議祀禮者皆謂藏魄於墓迎精於廟故宗祧之制特詳而陵寢之儀不著臣竊疑之夫聖王之於其先也無所不用其敬雖一裳衣一器皿猶必世世奉之况形體之所在乎史記稱武王九年上祭於畢斯即謁陵之明證楚茨諸詩言成王之能奉祭也有曰潔爾牛羊以往蒸嘗古者廟在王宫之左不當言往意即祀文武於社中而經傳未明言之耳漢髙帝有天下於先世所居之國若秦晉梁荆皆設祠祀官長陵特建原廟至明帝永平二年幸長安祠髙廟遂有事於十一陵三年奉光烈太后祠章陵自時厥後兹禮遂顯蔡雍以為天子事亡如存用心周密其禮雖煩而不可省者是也我朝肇基東極奄有萬邦聖德神功彪炳宇宙邠岐之境三陵在焉世祖章皇帝定鼎燕都駕發盛京恭申祭告聖祖仁皇帝在位六十餘年三謁祖陵禮儀大備親製碑頌光勒貞珉世宗憲皇帝昔在藩邸奉命代祀列祖來􅖍報本追逺奕世孔䖍我皇上纘承洪緒祗肅明禋禮樂蔚興治化翔洽緬思先烈夙夜無心爰以八年之秋戒百官具鸞輅恭奉皇太后而往謁焉於是兆庶歡騰神靈悅豫微雲斂翳天髙日晶從者溢途瞻者夾路以興京開運山直盛京東北水源木本先後有倫乃由熱河取道邊塞覽其風土耀我聲靈䝉古諸藩趨迎立侍昔也用武之地今則豫逰之郊所過山川如在户牖九月乙未至於永陵升自東階九三奠王公陪位百爾駿奔翼日丙申大祀志潔儀豐苾苾芬芬神保是格工祝致告福祿來崇壬寅恭祀福陵癸卯恭祀昭陵行禮如初致慤彌著僾乎愾然若有見聞乃蒞盛京啓清寧之宫升崇政之殿宴王大臣及諸藩君長延問宗室耆舊慶賜遂行湛恩汪濊黃髮之叟白屋之氓莫不欣喜相謂我儕生長留都幸得見太平天子不圖禮文之盛德意之周至於如此也皇上思開創之艱難樂民物之殷阜歡留信宿賦詠盈編眷念萬幾星言回蹕于是祗告列祖循山海關經永平以至京師謁太廟而告成事焉是行也往返四千餘里皇上誠敬積中忘其勞勩侍奉聖母起居以時每日御行幄聽政如常車駕所經省方觀民勸農講武有司無供億之煩而民胥受澤蓋聖天子一舉事而萬善咸備焉猗歟盛哉臣備員史館侍直講幃恭遇盛典焜煌宜有紀述伏讀周雅皇矣生民諸詩皆因所祭而歌其先祖勳德其於孝孫有慶尤三致意焉臣竊取斯義撰古雅十章恭呈睿覽蠡測管窺未罄萬一第欲敷陳其事云爾辭曰上帝鑒觀四方孰德發揚積厚流長將全畀所覆俾億萬世有常我肇祖克當之興祖荒之景祖康之至於顯祖彌熾而昌則踵其祥則衍其慶佑啓無疆一章天眷佑我清太祖蹶厥生仁武且明恢拓八紘躪愛渾城鏖九國之兵明將來犯衆四十七萬一鼓殱之四路烟散遂都盛京皇猷炳煥建官定制萬世為憲二章於赫太宗至誠至仁敷教以文任官惟賢西柔䝉古東奠朝鮮明政不綱興師於燕燕城垂克帝命勿棘并冀兖青所向無敵神武不殺於哉帝德三章順治初載盜入明籞帝命師旅救民水火誅其盜首明之遺老率彼士女前歌後舞迎我世祖作神人主億萬斯年六合同宇二祖積用有成上帝則寧四章維清受命世有聖人皇帝仁孝聖祖之孫聖祖之孫世宗之子奉時辰牡明粢清醴至於東海以享以祀列聖在天實歆且喜五章誕我祀孔誠有碩其牲或剝或烹黍稷斯馨匪黍稷之馨維德克明穆穆在上濟濟在下精意周普􅖍於列祖報以純嘏萬年受祜六章帝出乎震受天景命聖祖製頌斯言攸定三才奠位聖以繼聖我皇承序乾道中正維二祖之德綿於無極維二祖之功昭於無窮七章巍巍盛京昔二祖攸宅宫殿覺覺城墉嶽嶽百禮既洽于宴于樂鐘鼓爰作獻酬交錯維此臣工威儀有恪維彼兆人胥受渥澤八章帝顧陪都民風淳朴地大物豐亦孔之樂郊祀届期駕言還歸小大稽首載瞻載依帝謂汝民守髙曽之遺庶績咸熙翠華數來九章大禮既成告於太廟肅奉明禋維皇祖是效乃御正殿德音播告錫類施仁視民興孝四海歡欣羣工舞蹈於萬斯年典章焜耀十章欽定盛京通志卷一百十九
