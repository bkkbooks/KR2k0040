body:
  text: 古蹟五奉天府境内宫殿官署名勝古蹟承徳縣遼陽州海城縣葢平縣開原縣鐵嶺縣復州寧海縣錦州府境内宫殿官署名勝古蹟錦縣寧遠州廣寧縣義州吉林境内宫殿官署名勝古蹟吉林寧古塔黑龍江境内宫殿官署名勝古蹟呼倫布雨爾欽定四庫全書欽定盛京通志卷一百四古蹟五奉天府境内宫殿官署名勝諸古蹟承徳縣安撫髙麗軍民總管府在城内東南隅元史地理志初平遼東髙麗國麟州神騎都領洪福源率西京都䕶龜州四十餘城來降各立鎮守司設官以撫其民後髙麗復叛洪福源引衆來歸授髙麗軍民萬戸徙降民散居遼陽瀋州初創城郭置司存僑治遼陽故城中統二年改為安撫髙麗軍民總管府及髙麗舉國内附又以質子淳為安撫髙麗軍民總管分領二千餘户理瀋陽元貞二年併兩司為安撫髙麗軍民總管府仍治遼陽故城又瀋陽等處怯恰千戸所元至治元年置舊址無考廢瀋陽中衛署在奉天府城内明洪武二十年置今廢又撫順千戸所在撫順城蒲河千戸所在蒲河城並明洪武中置俱廢遼陽州安東都䕶府舊唐書地理志總章元年李勣平髙麗初置安東都䕶府于平壌城上元三年徙遼東郡故城儀鳯二年又徙於新城聖厯元年更名安東都督府神龍元年復都䕶名開元二年徒于平州天寶二載又徙於遼西故郡城至徳後廢按新唐書志唐髙宗平髙麗置都督府九新城遼城哥勿衛樂舍利居素越喜去旦建安也州四十二縣百為置安東都䕶府以統之州縣之名唐史未詳所可知者南蘇葢牟代邵倉巖磨米積利黎山延津木底安市諸北識利拂湼拜漢十四州而已元明置安撫髙麗軍民總管府亦分十四州新城遼城哥勿建安南蘇木底葢牟代那倉巖磨米積利黎山延津安市與唐府州大槩相同而以髙麗人領其職則亦非復遼東境内矣遼東京宫殿遼史地理志神冊四年葺遼東故城天顯三年升為南京城名天福髙三丈重樓櫓幅􅊷三十里八門東曰迎陽東南曰韶陽南曰龍原西南曰顯徳西曰大順西北曰大遼北曰懐逺東北曰安逺宫城在城東隅髙三丈南為三門壮以樓觀四隅有角樓相去各二里宫牆北有譲國皇帝御容殿大内建二殿不置宮嬪惟以内省使副判官守之末年廢遼東丹王宫在城東北隅元一統志東丹王故宫在遼陽路按本路圖冊在府之東北有譲國皇帝御容殿有大東丹國新建南京碑銘今無可考南北市遼史地理志于都城分南北市中為看樓朝集南市夕集北市街西有金徳寺鐵旛竿皆在焉金宫殿在遼陽州城北金史地理志皇統四年立東京新宫寢殿曰保寜宴殿曰嘉㑹前後正門曰天華曰乾貞又建案廟有孝寧宫七年建御容殿華表柱在遼陽州城内相傳丁令威化鶴所集明一統志在都司城内鼓樓東舊有石柱今湮没有道觀久廢為倉丁令威詳見本志仙釋按華表仙莊為遼陽八景之一其二曰龍王晚渡相傳東門外太子河岸舊有龍王廟夜間常有老翁操舟濟人並不取利月中有見其狀貌者頗與龍神相似其三曰神燈孤照城内西街昔時人毎夜分見有明燈或一或二𨼆現不常其四曰白塔晚晴西門外廣祐寺舊有白塔塔間夕輝掩映照人其五曰松柏琴聲西門外西㑹寺舊有古松一株老榦中空内又生柏樹一株每遇微風松柏相激其聲若琴其六曰靈嶺寶山南門外旂纛廟故址有石阜一處相傳昔時每遇風起其阜石自能卓立今已無驗其七曰首山樵唱城西南十五里首山昔曽有仙人樵採于山夜聞歌聲曲終不見其八曰玉洞懸珠城東三十里有駱駝洞石洞中圓石如碗虛懸若珠因名為遼陽八景遼海亭在遼陽州城内金髙士談詩殘雪樓臺山向背夕陽城郭水東西張解詩晴光摇碧海逺色帶滄洲今故址無考蝎臺在遼陽州城内明一統志在古東京城東北隅金大定中修城役夫毁臺取土及半得石函啟之中有塊石圓滑天成摇撼作聲破之二大蝎尾梢相鈎見風即死今臺址無存景遷堂明一統志在都司城内元權遼陽府事洪革建革有志于學慕慈母三遷之教故名山東周正為記釣魚臺在遼陽州南三十里相傳為渤海游觀之處仙人臺在遼陽州千山香巖寺相傳為仙人對奕之所登者俯瞰滄海如在几席之下唐紀功石在遼陽州駐蹕山新唐書高麗傳太宗破髙麗間破陣狀勒石紀功雪菴塔元僧雪菴殁葬舍利塔在千山香巖寺一塔若二石臼相合内注水四時不竭旁孔可入手探得圓石然不能出也遼陽等處行中書省元史地理志至元二十四年立今廢又遼陽等處怯恰千户所至治二年置今廢址無考廢都司署明洪武四年置定遼都衛八年改遼東都指揮使司在城内今廢定遼中衛明洪武十七年置在城内定遼左衛定遼右衛定遼前衛以上三衛俱明洪武四年置為千戸所十年陞為衛在城内今並廢定遼後衛明洪武四年初置衛治于得利嬴城八年改移城内今亦廢東寧衛明洪武十九年置轄六千戸所亦在城内今廢址無存廢行太僕寺明洪武十三年建在都司治西南今廢廢苑馬寺明永樂五年建在都司治西今廢廢自在州署明永樂七年置初在開原城内後徙都司城内今廢海城縣煉丹臺相傳仙人白仲理煉神丹之處在城西二十里四臺子洗馬澗相傳唐尉遲㳟洗馬於此即城南八里河搠㦸泉相傳唐薛仁貴搠㦸於此泉水湧岀在城西南二十五里管公屯相傳管寧依公孫度時寓此在城西北五十五里新臺子葢蘇屯唐高麗葢蘇文所居故名在城西北三十里耿家莊鄧家臺建置年月未詳遼澤新唐書髙麗傳李勣圍遼東城帝次遼澤詔瘞隋將士露骼廢海州衛署明洪武元年置今廢在縣城南葢平縣元菟亭漢王莽置年月無考廢葢州衛署元延祐五年置葢州等處怯怡千户所明洪武九年廢所置葢州衛在城内北隅今並廢開原縣黄龍塞唐書契丹傳逃之潢水之南黄龍之北遼史地理志上京北帶潢水南控黄龍慕容皝登之南望栁城北齊髙寶寧據以拒隋並其處也唐時置黄龍戌今謂之黄龍岡去城北三十里花露臺有二一在縣南四十里一三十里相傳邑中有姻家以華麗相尚各築一臺自矜建置之年無考麗案漢時遼東有華麗縣所謂花露臺疑即華縣遺址露麗音相似遂致訛誤而後人益加附㑹不詳其本耳廢三萬衛署明洪武二十二年置在城内今廢明一統志渤海為上京龍泉府金改上京㑹寧府時按渤海上京在吉林烏拉界内開原在渤海為扶餘府金㑹寧府在今吉林烏拉之東明時衛治以雅克薩山為界明一統志誤廢遼海衛署在開原縣城内故三萬衛治東北明洪武二十一年置初治牛家莊二十六年徙治于此廢安樂州署明永樂七年置在城内今廢又開原等處怯恰千户所元至治元年置今並廢鐵嶺縣漢牧師官鐄嶺本襄平縣地於此置牧官唐王營在帽峯山東南地平如掌相傳唐征髙麗安營於此廢鐵嶺衛署明初置鐵嶺衛於今縣城東五百里洪武二十六年徙今城内今廢又懿路千户所在城南六十里懿路城内明洪武二十九年調鐵嶺左右二千戸所於懿路城永樂八年調中千戸所於懿路城又范河千戸所在城西南三十里明正統年設中左千戸所今廢復州永寧監在復州北明永樂五年設遼東苑馬寺七年建永寜監城置監於此全遼志明初遼東設監六曰畀平新昌遼河長平安市永寧苑二十四曰甘泉安山河陰古城夾河龍臺耀州駝山黄山沙河馬鞍石城平川新安廣安平山南豐高平長川名山復州龍潭清河深河後俱廢維存永寧一監清河深河復州名山四苑廢復州衛署明洪武十四年置在城内今廢寧海縣即金州哈斯罕闗今在寧海縣南十八里元至元二十六年分京師應役新附軍一千人屯田哈斯罕闗東荒地即指此改哈斯罕明安原作合斯罕猛安今譯並詳郡縣注鴻臚井唐鴻臚卿崔忻所鑿在旅順口黄山之麓刻字於石上旅順古井南近海井中有鐵索懸樹上不詳所始廢金州衛署明置在城東北隅又中右千戸所明置今俱廢錦州府境内宫殿官署名勝諸古蹟錦縣即古孤竹國令氏亭舊志稱孤竹國有孤竹城令支城令氏亭建置何代無考和龍宫在錦州西十六國春秋慕容皝作龍城時有二龍合在一山交首嬉翔皝見之大悦改所築宫曰和龍宫白雀園十六國春秋慕容盛時有異雀素身緑首棲翔東園因改其園曰白雀以表其瑞甘露殿十六國春秋慕容皝築龍城慕容熙復於龍城建甘露殿及景雲山逍遥宫連房數百觀閣相交鑿渠引水為曲光海清涼池五栁戌唐時所設在營州南梳妝樓在城西北三十里了八石相傳遼蕭太后建山上九石柱猶存花兒樓在城東北四十里所建未詳漢西部都尉治舊志稱古山戎國為漢西部都尉治廢廣寧中屯衛署在城内明洪武二十四年改州置衛初治東闗驛二十五年移置於此又廣寧左屯衛在府治西亦洪武二十四年置各領五千戸所今俱廢廢廣寧右屯衛署在錦縣東南七十里俗訛為牛頭衛本元閭陽縣之臨海郷明洪武二十六年置廣寧右屯衛於十三山堡明年移此葺公主塞故址以為衛治永樂中築城周四里有竒門三又廢大凌河千戸所在城東四十里廢松山千戸所在城南十八里廢塔山千户所在城西南六十里俱明宣徳三年置今廢寧逺州長壍相傳即秦時長城故址又有髙麗長城新唐書太宗使長孫卿毁京觀髙麗王建武懼乃築長城起扶餘西南屬之海望夫臺相傳姜女望夫處桃花島金史地理志興城𨽻錦州有桃花島今在州城南海上明初海運泊船處廢寧逺衛署在寧逺州城内明宣徳三年置全遼志衛與古瑞州錦州接境本廣寧前屯中屯二衛地永樂初大寧淪没而虹螺山始入外境於是利州之墟荆條之陽戎馬馳驅歳相抄掠總兵巫凱都御史包懐徳上狀乃割二州之地於曺莊湯池之北建衛治賜名寧逺統五千户所又於城東五十里别置中左千戸所於城西南三十里小沙河别置中右千户所又廢前屯衛在城西南三十里廢中前千戸所在城西南一百六十五里廢中後千戸所在城西南八十里今俱廢廣寧縣明遼王府在廣寜城内西北隅明洪武二十五年封遼王於此永樂初徙封荆州府久廢二按寜獻王太祖第十七子洪武二十四年封又年就國大寧右義州之地在喜峯口外今遼宫府遺址又在廣寜城中未詳何時移此紫䝉戌紫䝉晋慕容氏始興之地唐時十北二戌之一屬幽州都督府今廣寜縣邉唐壘明一統志在城南三十二里唐太宗駐兵之地誓臺在城東三十里相傳唐太宗誓師所築長按唐書髙麗傳太宗大享士幽州之南使孫無忌誓師而廣寧乃營州也則誓師不應在此覽秀亭在醫巫閭山西麓其地髙爽可以登覽山河之秀故名障鷹臺在閭山西南第一峯望海堂遼東丹王耶律倍所築倍好讀書購書數萬卷築堂閭山之頂額其堂曰望海遺址尚存遼人皇王影殿遼世宗建在閭山之東南遼史地理志大同元年世宗親䕶人皇王靈駕歸自汴京以人皇王愛醫巫閭山水奇秀因葬焉中作影殿制度極其宏麗今已無存凝神殿在廣寧縣遼史地理志乾州奉景宗乾陵有凝神殿又置奉陵縣括諸落帳戸助營山陵今廢無考鎮東堂在州城内鼔樓西明巡橅王翺建廣寧路總管府元史地理志初立廣寧行帥府事後遷治臨潢立總管府至元六年降為東京路總管府屬郡十五年復分為路行摠管府事廢廣寧中衛署在城内又有左衛右衛俱洪武二十七年置初治大凌河永樂元年徙治於此後皆廢義州遼中京宫殿遼史地理志聖宗常過七金山土河之濱南望雲氣有郛郭樓闕之狀因議建都擇良工於燕薊董役二歳郛郭宫掖樓閣府庫市肆廊廡擬神都之制統和二十五年號曰中京府曰大定皇城中有祖廟景宗承天皇后御容殿城池湫濕多鑿井泄之人以為便大同驛以待宋使朝天館待新羅使來賔館待夏使金海陵貞元初改遼中京置北京釣魚臺在北門外明一統志給事中賀餘築鮮卑故庭三國志魏武帝征遼東涉其地松陘舊志營州西北百里有松陘金甸遼時其地生金遼史地理志本唐清山縣境置金源縣按唐金源縣應在喀喇沁右翼界三座塔在城西南一百五十里建置之年無考廢義州衛署在城内明洪武二十二年置今廢吉林境内宫殿官署名勝諸古蹟吉林古越喜地得勝陀即額特赫噶珊金太祖誓師之地國語額特赫勝也噶珊國語解見吉林山川卷原作忽土皚葛蠻今譯改芍藥池在城西南四百餘里有芍藥一本脊暮花開爛漫相傳乃國初時舊植花池甃磚依稀可辨寧古塔金上京宫殿大金國志國初城郭散居呼曰皇帝察國相寨太子莊後昇曰㑹寜府建為上京其遼之上京改作北京城邑宫室無異中原州縣廨宇制度草創又云皇統六年春三月上以上京㑹寧舊内太狹役五路工匠撤而新之規模悉倣汴京乾元殿金史地理志天㑹三年建天眷元年更名皇極殿慶元宫金史地理志天㑹十三年建殿曰辰居門曰景暉天眷元年安太祖以下御容為原廟金史本紀熙宗天眷元年八月以京師為上上京府曰㑹寧舊上京為北京十一月以康宗以畫像工畢奠獻于乾元殿十二月新宫成二年九月初居新宫立太祖原廟於慶元宫皇統三年初立太廟社稷朝殿金史地理志天眷元年建殿曰敷徳門曰延光寢殿曰宵衣書殿曰稽古又有明徳宫明徳殿熙宗嘗享太宗御容于此太后所居也涼殿金史地理志皇統二年構門曰延福樓曰五雲殿曰重明東廡南殿曰東華次曰廣仁西廡南殿曰西清次曰明義重明後東殿曰龍壽西殿曰奎文時令殿及其門曰奉元又有泰和殿武徳殿薰風殿天開殿金史地理志其行宫有天開殿約羅春水之地也有混同江行宫又太廟社稷皇統三年建正隆二年毁剌䝉古語約羅皁鵰也原作爻今譯改天元殿金史地理志原廟天眷元年以春亭名天元殿安太祖大宗徽宗及諸后御容春亭者太祖所嘗御之所也天眷二年作原廟皇統七年改原廟乾文殿曰世徳正隆二年毁大定五年復建太祖廟興聖宫金史地理志徳宗所居也天徳元年名曰興徳宫後更名永祚宫睿宗所居也光興宫世宗所居也正隆二年命吏部郎中蕭彦良盡毁宫殿宗廟大族邸第及儲慶寺平其址耕墾之大定二十一年復修宫殿建城隍廟二十三年以甓束其城皇武殿金世宗打毬校射之所金史本紀大定二十五年上在㑹寧府謂羣臣曰上京風物朕自樂之祖宗舊邦不忍捨去後數日宴宗室于皇武殿曰朕尋常不飲酒今日甚欲沉醉此樂亦不易得也宗室故老以次起舞進酒上曰吾來數月未有一人歌本曲者吾為汝等歌之命宗室子弟皆坐殿上聴朕自歌其辭羣臣宗戚皆稱萬戚雲錦亭又有臨漪亭並金世宗建為籠鷹之所金史地理志在阿勒楚喀水側正隆時海陵盡沒宫廟平其址大定二十一年世宗復修之阿勤楚喀原作按出虎今譯改並詳古蹟二注翠微宫北盟㑹編矩古貝勒寨第三十九程至館去上京尚十里餘翌日馬行可五七里一望平原曠野又一二里云近闕去繖葢復北百餘步有阜宿圍繞髙文餘皇城也至門就龍臺下馬行入宿圍朝見即捧國書自山棚東入左曰桃源洞右曰紫極洞中作大牌題曰翠微宫髙五七尺以五綵間結山石及仙佛龍象之形殿七間甚壯額曰乾元殿階髙四尺許階前作壇方數丈名龍墀烏舍寨許亢宋奉使行程録自黄龍府東行二百十里至古烏舍寨寨枕混同江湄寨前髙岸有栁樹沿路設行人幕次于下金國太師李靖所居靖累使宋朝此排中頓飲食精細時當仲夏藉樹䕃俯長江槃薄少頃殊忘鞍馬之勞八角井在舊宫東北石甃八角井欄猶存常有光自井出掘之得鉄砧二枚古鏡二圓雍正四年井中淘得鋹牌一面鐫人姓名功績歐孝子里在寧古塔城東舊志明監生歐某家有妖狐為患有善治者燻死數狐老狐益引黨類作祟已魅殺臧獲十餘人復聲言將殺歐某之母屢至危殆歐某割股以進俄聞狐語曰此人割股孝親天已増其母十年矣遂去不復為患後十年母以壽終廢軍民萬戸府元史地理志海蘭等路設軍民萬戸府五今俱廢無考䝉古屯田萬戸府元史地理志在肇州今無考黒龍江境内宫殿名勝古蹟呼倫布雨爾龍眉宫遼史地理志太祖取天梯博囉等三山之勢于葦甸射金齪箭以識之謂之龍眉宫神冊三年城之名曰皇都天顯十三年更名上京府曰臨潢按遼金皆有五京金三京在奉天錦州境而遼為東京中京以上京逺在徼外故前志不及或并未能詳其處所然考遼史志云臨潢府本漢西安平之地故屬遼東郡而唐地理志云營州北四百里至湟水湟水即潢水宋薛映所記自中京北行凡三百七十里渡潢水則與唐書同又行凡二百三十里至臨潢河則六百里耳合之今日地圖則開原廣寜之北及白都訥之西北境並契丹故城而上京臨潢府當在今呼倫布雨爾車臣汗之間遼志所謂淶流河自西北南流繞京三面則今烏爾繖河也志有大神淀興國恵民等湖及凉淀則今呼倫池布雨爾池者是也淶水流入曲江則入於松花口也所云潢水則自布雨爾池流出之奎河也其穆固圖爾山則昔之木葉山也木葉山近接潢水今穆固圖爾山亦切傍奎河而計其道里去開原邊外北境視唐書薛映所記亦不殊逺然則遼之上京臨潢府固可按籍而得而且宜為志遼東者所必及也故特著於此並為詳証焉開皇殿遼史地理志天顯元年平渤海歸乃展郛郭建宮室名以天贊起三大殿曰開皇安徳五鑾又于内城東南隅建天雄寺奉安烈考宣簡皇帝遺像是嵗太祖崩應天皇后于義節寺斷腕寘太祖陵即寺建斷腕樓𣗳碑焉太宗援立晉遣宰相馮道劉煦等持節其鹵薄法服至此冊上大宗及應天皇后尊號太宗詔蕃部並依漢制御開皇殿闢承天門受禮因改皇都為上京其北謂之皇城周廣順中胡嶠記曰上京西樓有邑屋市肆交易無錢而用布有綾錦諸工作宦者翰林伎術教坊角觝儒僧尼道士中國人并汾幽薊為多宋大中祥符九年薛映記曰上京者中京正北八千里至松山館七十里至崇信館九十里至廣寜館五十里至姚家寨館五十里至咸寧館三十里度潢水石橋旁有饒州唐于契丹嘗置饒樂今渤海人居之五十里保和館度黒水河七十里宣化館五十里長泰館館西二十里有佛舍民居即祖州又四十里至臨潢府自過崇信館乃契丹舊境其南奚地也入西門門曰金徳内有臨潢館子城東門曰順陽北行至景福門又至承天門内有昭徳宣政二殿與氊廬皆東向臨潢西北二百餘里號凉淀在饅頭山南避暑之處多豐草掘地丈餘即有堅冰西樓遼史地理志祖州天成軍太祖秋獵多於此始置西樓後因建城幅員九里門東曰望京南曰大夏西曰液山北曰興國西北隅有内城殿曰兩明内南門曰興聖東樓遼史地理志龍化州興國軍舊稱龍庭太祖于此建東樓天祐元年増修東城制度頗壯麗為春時行帳所駐又永州永昌軍太祖于此建南樓乾亨三年置州冬月牙帳多駐此按五代史遼太祖建有北樓且諸樓道里與遼史志所載逺近不同今舊志既不稱有北樓而三樓又近接一處姑存之以俟闗疑陵墓附奉天府各屬本朝多羅武功郡王禮敦墓在京興永陵左每歳清明除夕附祭事盛京内部内務府司其多羅恪恭貝勒塔察芬古墓在京興永陵右每嵗清明除夕附祭事盛京禮部内務府司其克勒郡王岳託墓在承徳縣南五里白塔西乾隆八年四十三年四十八年俱有御製酹克勤郡王園寢詩㳟載天章門額亦都墓在承徳縣東十五里乾隆八年有御製酹功臣額亦都墓詩四十三年四十八年有御製賜奠額亦都墓詩俱恭載天章門費英東墓在承徳縣北五里乾隆八年有二御製開國佐運勲臣揚古利費英東額亦都墓在陵之間松楸相望猶見當日君臣相得之槩感而賦詩十九年有題句詩四十三年四御製過功臣費英東揚古利等墓御製賜十八年有墓詩俱恭載奠費英東天章門揚古利墓在承徳縣北十一里乾隆四十三年四十八年俱有御製賜奠功臣揚古利墓詩㳟載天章門圖爾格墓在承徳縣城東十五里超哈爾墓在承徳縣城東十五里徹克墓在承徳縣城東拉古峪巴拜墓在承徳縣城東七十里魯克什墓在承徳縣城東一百二十里錫罕墓在承徳縣城東古石溝覺羅色勒墓在承徳縣城西五里安費揚古墓在承徳縣西十里藍家屯鄂謨克圖墓在永徳縣城西十五里舒賽墓在地徳縣城西十五里西喇布墓在承徳縣小南闗外和碩圖墓在承徳縣城南五十里何和里墓在承徳縣城南六十里阿蘭珠墓在承徳縣城南八十里光山屯明安墓在承徳縣城北五里伊遜墓在承徳縣城北五里圖魯什墓在承徳縣城北栁條河側衛齊墓在承徳縣城北十里楞額禮墓在承徳縣城北十里納爾察墓在承徳縣城北十里瓦窑子達珠瑚墓在承徳縣城北十里二臺子伊爾登墓在承徳縣城北十里毛鎮屯逹海墓在承徳縣城東南五里博爾晉墓在承徳縣城西南十里雅希禪墓在承徳縣城東北十里曽家屯安達立墓在承徳縣城西北十里遜達哩墓在承徳縣城西北十里莊親王舒爾哈齊墓在遼陽州東京城東北五里頴毅親王薩哈璘墓在遼陽州太子河南平頂山下勇壯貝勒穆爾哈齊墓在遼陽州東北百二十里響山安平貝勒杜度墓在遼陽州東北百二十里響山達爾察墓在遼陽州東京城北孔有徳墓在遼陽州東南十里朋春墓在遼陽州東北八十里尚可喜墓在海城縣東南十里耿仲明墓在葢平縣連陰峪錦州府秦姜女墳在寧逺州老軍屯遼遼太祖陵本在木葉山今有司於廣寧望祭景宗陵在廣寜醫巫閭山顯陵在廣寧縣醫巫閭山即遼太祖長子人皇王耶律倍墓世宗時諡讓國皇帝尊為顯陵乾陵在廣寧縣醫巫閭山遼景宗葬此豫王墓在廣寧縣醫巫閭山遼天祚帝入金降封豫王葬乾陵旁平王墓遼人皇王子隆先封平王葬醫巫閭山之道𨼆谷以上諸陵墓今皆湮金懐節皇后墓在廣寜縣醫巫閭山甄妃墓在廣寧縣醫巫閭山元穆呼哩墓明一統志在廣寧左屯衛東北二十里按舊志載墓有揭奚斯撰碑可據遼志以為穆呼哩孫巴圖魯墓非是俱穆呼哩原作木華黎巴圖魯原作霸突魯今譯改並詳人物巻王珣墓在義州西四十里王榮祖墓在義州南四十里明楊惟藩墓在寧逺州前屯衛宫守禮墓在寧逺州前屯衛楊照墓在寧逺州前屯衛賀欽墓在廣寜縣醫巫閭山光明谷本朝尹泰墓在錦州東北二十里尹繼善墓在錦州東北二十里吉林金輝陵永陵定陵喬陵皆金先世尊為陵者在寧古塔境羅索墓在林城西二百里博屯山有金元邵王廟殘碑彷彿可辨羅索原作娄室今譯改並詳人物巻完顔希尹墓金章宗時以其始造國書因為立廟上京歳祀之墓在寧古塔境内海古勒城古墓舊志在寧古塔境内本金上京之地順治初阜塚忽䧟地宫中多殉葬之物考金史金太祖初葬於海古勒城西其後王公貴人多葬其地惜名誌無可辨耳古賢者墓在三姓地碑鐫古賢者墓不能詳何人黒龍江唐大賀氏勒得王墓在黒龍江境内今舊址無考謹案舊志載復州東十里有髙麗王子東明墓前屯衛北有古李王墓前屯衛北有大王墓鐵嶺東北椵木嶺有金侍郎墓年代名字俱無可考應悉從刪而仍附識於卷末欽定盛京通志卷一百四
