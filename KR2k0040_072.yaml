body:
  text: 國朝人物四鑲黃旗滿洲欽定四庫全書欽定盛京通志卷六十八國朝人物四鑲黃旗滿洲費英東姓瓜爾佳𨽻鑲黃旗滿洲先世為蘇完部長太祖初從其父索爾和率所部來歸授一等大臣尚主其姊壻巴沁顔有逆志費英東擒而誅之臣從征瓦爾喀部取噶家路殺其部長阿球又偕貝勒禇英取楚安拉庫路破屯寨二十有竒悉降其村落嵗丁未費優苦烏拉侵暴請內附乃與貝勒舒爾哈齊等往視其戶口勒軍為前後隊衛之歸烏拉兵萬人扼我前軍於路相持未下費英東以後軍至大敗之是年五月嵗辛亥七月兩討東海窩集部攻克其五路嵗癸丑從征烏拉拔其城尋命與何和里額亦都扈爾漢安費揚古為五大臣佐理國事天命三年大軍伐明取撫順明總兵官張承廕以萬騎來援據隂而陳甫交鋒火器競發費英東所乘馬忽驚逸諸軍為之却費英東䇿馬大呼麾諸軍直入大破之太祖拊髀歎曰此真萬人敵也四年二月明經略楊鎬統四路兵來犯以總兵杜松馬林李如柏劉綎林崖松先至駐軍薩爾滸山巔而自引兵趨吉林崖費英東率所部破其山巔軍死者相枕籍松亦戰殁吉林崖已而林綎兩路兵皆覆如柏自呼蘭遁歸是役也殱明精鋭殆盡八月從攻葉赫城守者飛石投火太祖命之退對曰勢垂克不可退也竟拔其城費英東驍果善射從征三十餘年身先士卒摧堅陷陳當其鋒者莫不披靡性忠直遇事敢言奬善黜惡無所撓避殫智畢力以佐成大業論功授三等子世襲五年卒年五十七太祖聞之哀慟親臨其喪天聰元年追封直義公配享太廟順治十六年追録佐命功第一晉三等公世襲康熙三十七年聖祖東巡親酬其墓御製碑文以表厥勳雍正九年加封號曰信勇乾隆八年十九年四十三年四十八年上詣盛京俱親酬其墓有御製賜奠詩恭載章門天復諭閣臣以費英東為開國功臣之冠世襲公爵祇三等未足昭酬庸茂典特晉封一等公額亦都姓鈕姑祿𨽻鑲黃旗滿洲先世居長白山幼時父母為仇所害鄰人匿之得免年十三手刃其仇避走嘉穆瑚村依於其姑居數嵗太祖過其地額亦都識為真主辭姑從行嵗癸未從討尼堪外蘭於圖論城先登又襲取塞克濟城又别將兵攻取舒爾格布占城額亦都性忠誠勇敢善戰能以少擊衆所向克捷嵗丁亥督兵攻巴勒達城至渾河河漲不能涉以繩聫軍士魚貫而渡夜率鋭卒登其城城守者猝驚起殊死以拒額亦都跨堞戰飛矢貫股著于堞揮刀斷矢戰益力被五十餘創不退卒拔之還太祖勞于郊賜號巴圖魯薩古齊入冦率數人擊走之遂潛躡其後乘夜奪門入克其城進攻尼瑪蘭城章嘉城索爾瑚村皆下之功最貝渾巴顔謀叛附哈逹往討之誅其父子五人以徇嵗癸未葉赫合九國兵來犯大軍陳古哷山額亦都以百騎挑戰擊斬其九人敵却大軍乘之九國兵皆潰訥殷者九國之一也其渠藪穩色克什既敗歸復聚七寨之衆據佛多和山額亦都以兵千人攻克之斬藪穩色克什嵗丁未貝勒巴雅喇征東海窩集部額亦都偕費英東以從攻克赫濟赫鄂謨輝蘇魯佛納托克索三路嵗庚戌以兵徇那木都魯綏芬寧古塔尼瑪察四路撫定之降其長康果禮等十九人師旋遂取雅蘭路俘獲以萬計嵗辛亥偕額駙何和里征瑚爾哈路克扎庫塔城天命四年禦明兵于界藩先後戰吉林崖薩爾滸山尚間崖阿布逹哩岡皆大捷明總兵杜松王宣趙夢麟劉綎殁於陳馬林僅以身免額亦都自從征尼堪外蘭以來以次平哈達輝發烏拉葉赫並為軍鋒用兵垂四十餘年未嘗挫衄每克敵受賜輒分結有功士卒不以自私太祖眷其忠勇初妻以宗女後以和碩公主降焉積官一等內大臣爵一等子六年卒年六十太祖臨其喪哭之慟祭葬如禮天聰元年追封𢎞毅公配享太廟順治中建碑墓道以旌其功康熙七年特爵其子遏必隆為一等公三十七年聖祖東巡親酹其墓乾隆八年十九年四十三年四十八年上詣盛京俱親酹其墓有御製賜奠詩恭載章門天雅希禪𨽻鑲黃旗滿洲先世居瑪佳以地為氏父尼瑪禪以五十餘戶歸我太祖任佐領雅希禪自其父時以戰功授騎都尉世職與理事十大臣之列天命四年如喀爾喀涖盟還奏稱旨界藩之戰超伍先進復擊明總兵馬林于尚間崖破其中堅晉二等輕車都尉太祖既取遼陽敘功晉三等男七年戰沙嶺被創引郤降一等輕車都尉八年從征扎嚕特破其寨追斬其貝勒昻安俘其孥以歸功最得上賞未幾卒年五十有一順治十二年追諡敏果子三長恭衮次納爾特次拉都渾俱見忠節傳衛齊信勇公費英東第九弟也天命十年偕侍衛博爾晉以兵二千征瑚爾哈部收獲五百戶有功並追其父索爾和首先歸附功授騎都尉世職天聰三年從征明略地至遵化屢戰輒捷論功晉三等輕車都尉太宗統大軍出征嘗令衛齊留守盛京任八門提督九年卒以第六子穆里瑪襲職順治中世祖以衛齊厯事兩朝忠誠素著賜諡端勤視一等大臣例立碑墓道武善姓伊爾根覺羅𨽻鑲黃旗滿洲先世居呼訥赫父噶蓋來歸我太祖為理事大臣武善其長子也初任佐領尋兼參領天命九年明總兵毛文龍遣兵渡鴨緑江耕屯島上武善與副都統楞禮將千人往襲之中道獲諜者詢知明兵夜宿朝鮮義州西岸比旦乃渡江入島遂乘夜潛行伏山隩平明度明兵己渡疾馳至島明將士悉驚潰追斬及墮水死者無算焚其積聚而還既而文龍部將復入島肆焚掠武善偕護軍參領滿都禮擊之盡奪其所掠斬逰擊一備禦一千總二太宗即位進列十六大臣天聰八年略錦州有功授三等輕車都尉世職崇德元年戶部承政馬福塔使朝鮮偵知明逰兵潛入鹻場以告太宗命武善偕吏部參政濟什哈率兵擊走之三年扎薩克圖將犯歸化城武善與副都統武巴海從大軍往𠞰比至扎薩克圖遁去師遂還會武巴海厮卒盜餫事覺武善坐徇隱論罷併革世職八年起工部恭政順治元年卒弟卜善隨兄在戎行亦以軍功著車爾格𢎞毅公額亦都第三子也自幼從軍屢有功授騎都尉世職晉三第輕車都尉征東海瓦爾喀部大捷凱旋太祖親出郊宴勞之又念其父勳晉爵三等子太宗即位設八大臣理政事車爾格與焉天聰元年從大貝勒阿敏征朝鮮其王李倧懾服納貢二年從貝勒阿巴泰略錦州松山多所俘獲五年授刑部承政尋遷兵部七年偕刑部承政索海偵敵錦州斬七人擒十人以歸明廣鹿島副將尚可喜遣吏納欵率將士往受其降崇德二年從武英郡王阿濟格攻皮島以違節制論罷并削世職三年起授工部參政五年推戶部承政八年復授騎都尉世職世祖定鼎燕京恩詔加一雲騎尉順治二年卒子法固逹襲職圖爾格𢎞毅公額亦都第八子也自少從征積功授一等輕車都尉世職太宗即位任都統列十六大臣又以父勳晉爵三等子天聰三年從攻遵化克其城四年與都統納穆泰留守灤州明兵備恭政張春合總兵馬世襲合祖大夀尤世祿吳世勉楊麟王承恩諸鎮兵來攻發巨炮燬城樓圖爾格等悉力禦之度不支潰圍走永平偕貝勒阿敏東歸坐罷官并削世職五年五月從圍錦州以兵扼松山截其外援尋授吏部承政八月從圍大凌河城軍於城東北城中兵突犯我炮臺圖爾格不及騎徒步擊走之十月略地錦州有功九年從貝勒多爾衮征察哈爾降林丹汗子額哲遂勒兵三隊略山西自平魯衛入毁寧武關攻代州乘勝至欣口遇伏敗之追至崞縣殱其衆還經平魯衛大同諸鎮兵邀戰大破之敘功授一等男崇德元年復任都統從武英郡王阿濟格征明攻克昌平州雄縣並先登五年復圍錦州取其禾連破松山杏山兵偕都統葉克舒以兵三百伏烏馨河口擊明兵千餘方接戰葉克舒馬躓圖爾格援之出復突入奮擊凡六合圍悉摧陷之身被二十三創猶殿後力戰衛所俘而還晉爵三等子授內大臣六年戰松山明兵敗奔塔山邀擊之斬馘甚衆明總兵曺變蛟以乳峯山兵夜襲兩黃旗汛突犯御營時諸將猝未集軍中大驚圖爾格奮呼發矢連殪二人諸將亦至變蛟乃遁七年從貝勒阿巴泰征明自蘇州南抵山東凡三十九捷下九十四城俘明魯王朱以海及樂陵陽信安邱滋陽諸王以歸八年録功晉三等公圖爾忠勇有父風才略過人戮力行間勳伐最著順治二年卒年五十以其次子科普索襲九年追諡忠義配享太廟立碑墓道雍正九年加封號曰果毅長子烏爾格崇德初戰沒于皮島别贈佐領世職伊爾登𢎞毅公額亦都第十子也幼侍宫中太祖撫之長以侍衛屢從征討天命初築界藩及薩爾滸城有勞績賜蟒服纍功晉三等男太宗即位列十六大臣天聰三年率兵𠞰獐子島有俘獲從貝勒阿巴泰分兵攻龍井關奪水門入斬明將易愛王遵臣復會大軍攻遵化明山海關總兵趙率教馳援覆其軍遂薄燕京克永平灤州遷安諸城師旋晉爵一等男擢都統五年攻大凌河城率所部圍其東南深溝堅壘以困之卒墮其城而還七年從貝勒嶽託取旅順口俘獲無算八年從貝阿巴泰分兵入龍門會大軍於宣府進攻靈邱保安皆有功崇德元年與都統篇古等相詆訐坐罷官并削男爵三年起護軍統領四年略地錦州以三十人敗明兵千人從攻松山杏山城以四十人挑戰大破明總兵祖大夀軍尋列議政大臣兼內大臣六年從鄭親王濟爾哈朗攻錦州明總督洪承疇統兵十三萬來援軍松山西北岡悉衆犯鑲藍旗汛圍之數重伊爾登躍馬突入圍縱橫馳擊身中數創不少郤所乘馬死易之三戰益力明兵凡四合圍悉破之太宗嘉其勇復爵以三等男豫襲八次尋設伏髙橋殱明兵之敗奔塔山者時太宗親統軍駐松山明將曺變蛟集潰卒乘夜犯御營伊爾登與內大臣鍚翰等奮擊之變蛟遁得恩賚順治元年纍加二等伯世襲罔替十三年以老致仕世祖念其為宣力老臣命乘騎入朝並圖其像二一貯內庫一藏于其家康熙二年卒賜祭葬如典禮諡曰忠直從孫噶杜襲爵三十七年遣官祭其墓伊勒慎姓費摩𨽻鑲黃旗滿洲先世居薩齊庫烏拉陷薩齊庫伊勒慎自拔來歸其族遂為烏拉所害太祖憐之授世職為騎都尉尋從征明戰沙嶺屢以功加二等輕車都尉天聰五年統兵鎮海州時明邊將窺伺瀋陽屢縱士卒入遼河採捕誘我降人伊勒慎既之鎮嚴偵緝設巡哨先後斬明逰兵及所獲舟艦器械無算七年從征旅順口多所斬馘敘功加一等輕車都尉崇德元年晉三等男會明將造巨艦百餘橫截遼河將犯海州伊勒慎沿河列寨設伏執其諜者明將知防禦嚴望風引遁乃不敢復犯四年偕刑部承政索海征瓦爾喀部陳擒噶凌河暨其黨二百餘人既而俘囚有逸者及烏拉與博穆博果爾以衆邀于路索海大破之伊勒慎不合擊博穆博果爾得遁去坐奪官并削其爵八年復起鎮海州順治元年移駐牛莊二年卒年六十有九古爾布什姓博爾濟吉特蒙古喀爾喀台吉也天命六年率所屬來歸授爵三等子𨽻滿洲鑲黃旗任佐領尚公主為額駙賜號青卓里克圖天聰中圍大凌河城崇德初征朝鮮及攻皮島古爾布什並在軍中三年任兵部參政六年從圍錦州擊敗寧逺援兵明年再圍錦州明兵犯我濠塹戰郤之順治元年從入關擊敗流賊李自成屢晉爵至一等子豫世襲十八年卒賜祭葬諡敏襄子色楞襲長子鄂齊爾順治初從大軍南征亦著有軍功覺羅色埒𨽻鑲黃旗滿洲武功郡王禮埻之孫也初任佐領列十六大臣尋進列八大臣任都統天聰五年圍大凌河城率所部攻城南八年從征明進兵獨石口戰長安嶺攻赤城並有功九月緣事降都副統崇德元年征朝鮮國王李倧遁入南漢山城而寄其妻子于江華島明年色埒以右翼兵渡海政島朝鮮人列艦截海道飛矢雨集色埒駕輕舸冒矢越其前躍登岸破守島兵獲倧妻子倧知妻子被俘遂降凱旋論功授騎都尉世職三年兼任吏部參政順治元年擢內大臣四年屢晉爵至二等子八年擢領侍衛內大臣十四年卒賜祭葬諡勤慤子額爾德崇德中以佐領從圍錦州擊敗明兵于渾河岸復敗之三河順治元年從入關追擊李自成於望都欽功授騎都尉世職尋授參領兼戶部理事官遷侍郎晉世職至二等輕車都尉坐司𣙜郎官虧帑誤援恩詔議免論罷并降世職為騎都尉己而復起為副都統襲其父二等子爵康熙十年卒子拉瑚塔襲鄂齊爾桑姓博爾濟吉特父巴克為扎嚕特部長太宗即位征扎嚕特以巴克父子來歸𨽻滿洲鑲黃旗授鄂齊爾桑為佐領尋從征棟奎有斬獲天聰三年從戰蘇州大捷五年從圍大凌河城擊敗錦州援兵積功授三等輕車都尉八年從攻大同與額駙多爾濟將中軍明總兵曺文詔拒戰大破之文詔素驍勇為明名將及敗明人益氣懾崇德中擢內大臣順治二年晉爵三等男五年卒子楚祿襲索海信勇公費英東第六子也天聰中官刑部承政崇德四年與工部承政薩穆什喀分道征索論部索海督右翼兵襲破卦拉爾屯俘斬三百有竒薩穆什喀督左翼兵攻下雅克薩城旋攻鐸陳城未下而還烏拉與博穆博果爾謀襲我左翼兵後索海偵知之設伏截其輜重生擒四百人乘勝馳擊博穆博果爾營大破之是役也自烏蘇哩屯以西額爾圖屯以東先後俘獲七千有竒牛羊駝馬無算凱旋太宗親勞于郊敘功授二等輕車都尉世職從圍錦州以兵四百遏松山援兵遇逰兵三百于小凌河邀擊之斬九十餘級又從攻松山城克之尋以干禁陳優戲奪職順治二年署副都統從征西川卒于軍子多頗羅别見忠節傳武賴信勇公費英東從子也天聰四年略地大凌河俘獲甚衆八年任佐領九年擢都統崇德元年從武英郡王阿濟格等征明抵遵化明兵自三屯營來拒盡殱之朝鮮之役從豫親王多鐸擊敗其援兵復以雲梯攻城守陴者懾竄盡收其輜重牲畜以歸三年從貝勒嶽託征明至山東連下郡縣尋復破明太監馮永盛總兵侯拱極軍還師過董家口明兵沿山列營扼我歸路邀劫我輜重連戰敗之乘勝略地克取其城二敘功授騎都尉世職五年從睿親王多爾衮屯義州道出錦州刈其田禾明將以兵爭拒追擊至城濠遂進兵松山敗其步卒七年從貝勒阿巴泰征明戰渾河敗其兵千餘明年旋軍至螺山明總督趙光汴合八鎮兵邀戰列火器而陳武賴與都統鰲拜奮勇突入斬其大將八鎮兵盡潰將出邊邊將以兵犯鑲藍旗擊郤之整軍以出順治元年從入關破流賊李自成屢加世職至二等輕車都尉七年進爵二等男以老致仕尋卒年六十有四賜諡康毅勒石紀功子固德襲爵教德𢎞毅公額亦都第十一子也幼隨太祖效力戎行天命十年管佐領事太宗時授參領旋遷戶部參政崇德元年從征朝鮮敗朝鮮兵於套山村五年從征明圍錦州敗松山兵順治元年從入關擊敗流賊以功授佐領世職七年三遇恩詔加世職二等輕車都尉其第十五弟曰索渾以從征察哈爾松山錦州等處軍功亦授佐領世職官議政大臣遏必隆𢎞毅公額亦都第十六子也天聰中官侍衛崇德六年從圍松山城明總兵曺變蛟屢突圍欲出連擊敗之夜半變蛟集敗兵突犯御營遏必隆與大臣錫翰等力戰射殪十餘人變蛟負創遁論功得恩賞七年從征明克薊州進兵山東攻夏津先登論功豫騎都尉世職順治二年從征李自成兄子錦於武昌拔鐵關論功晉二等輕車都尉五年兄子科普索訏其與白旗諸王有隙設兵護門事奪世職八年世祖既親政遏必隆訟削職寃詔復之明年科普索獲罪以其所襲圖爾格之二等公令遏必隆併襲為一等公尋任議政大臣擢領侍衛內大臣洊加少傅兼太子太保十八年受遣詔與索尼蘇克薩哈鰲拜為輔政大臣康熙六年聖祖親政加恩輔臣特賜爵一等公而以前所襲公爵授其長子法喀明年加太師又明年屢乞罷輔政許之先是輔政時索尼老病鰲拜専政與蘇克薩哈不相能遏必隆頗依違其間及鰲拜欲以正白旗莊田改𨽻鑲黃旗而别籍民田給正白旗詔遣大學士蘇納海會總兵朱昌祚巡撫王登聫往勘皆稱不便忤鰲拜意遂矯旨殺蘇納海會昌祚登聫復誣蘇克薩哈怨望蓄異志必置諸法且族之遏必隆皆不能爭八年鰲拜獲罪遏必隆以黨惡論死聖祖念其黨鰲拜無迹宥之祗除其公爵削所加太師銜九年聖祖以其為顧命大臣且勳臣子前愆止因循瞻顧可貰命復其公爵宿衛內廷十二年卒賜祭葬諡恪僖瑚沙姓鈕姑祿𨽻鑲黃旗滿洲父納爾察事太祖為副都統戰殁于沙嶺别見忠節傳瑚沙其次子也初任佐領天聰六年與前鋒參領圖什偵敵大同遇明兵四百彎弓馳射之皆被之靡遁去略地至崞縣多所俘獲崇德三年從貝勒嶽託征明以八騎先驅遇明兵三百突出摶戰擊郤之遂越燕京趨山東破明將黃集太監髙起潛軍逐北數十里擢前鋒恭領六年從圍錦州轉戰松山杏山屢有功八年貝勒阿巴泰旋軍界嶺口偕前鋒統領帑山往迎之縱擊明兵之躡我後者所俘獲無算順治元年從征李自成敗賊將唐通于一片石追擊自成至於望都破之尋偕都統葉臣征山西破賊將白輝于汾州二年從英親王阿濟格征陜西攻克綏德延安二城追𠞰自成至湖廣敗賊將邵章于陸安獲其船窮追至九江口九宫山搜捕賊黨斬級二千有竒三年從肅親王豪格𠞰張獻忠過漢中擊敗叛將賀珍兵獻忠自西充迎戰殱其衆於鳯凰坡獻忠殪焉六年從鄭親王濟爾哈朗征明桂王朱由榔時由榔據廣西其大學士何騰蛟等分踞湖南諸郡縣我兵既克長沙遂渡江圍騰蛟於湘潭騰蛟遣兵分三門出戰瑚沙破其西門兵城拔生擒騰蛟于是衡州寶慶永州辰州皆以次平先後敘功復遇恩詔晉爵至二等男九年進副都統十一年兼工部侍郎明年擢都統列議政大臣十五年從信郡王多尼征由榔於雲南十六年進兵永昌下其城由榔奔緬甸十七年凱旋以永昌初下不戢軍士降三等男康熙三年卒賜祭葬分世職為三以第五子瑚弼圖襲一等輕車都尉次子碩伯海襲騎都尉辰泰𢎞毅公額亦都之孫戶部承政車爾格長子也初以護軍參領從攻錦州遇寧逺援兵超伍直入斬其執纛者搴纛以麾於陳明兵遂亂大敗之天總三年從圍燕京軍德勝門外分兵薄明督師袁崇煥營有斬獲五年從攻大凌河城明監軍政張春率衆來援設伏擒其偵卒復與大軍共擊之殱其衆崇德元年從征朝鮮與副都統薩穆什喀乘夜襲破黃州守將營三年從睿親王多爾衮征明敗明兵于豐潤尋攻明太監馮永盛總兵侯拱極營皆拔之又以護軍三十敗明總兵祖大夀軍俘其步騎百有竒五年六年從圍錦州並有功屢加世職至三等輕車都尉七年從圍松山城明兵夜出城犯蒙古正黃旗汛戰卻之從貝勒阿巴泰征明敗其將馬科于渾河築梁以濟明總督范志完以兵來犯擊走之長驅至山東攻克東阿汶上寧陽三城晉二等輕車都尉順治元年從入關破走流賊李自成明年晉一等輕車都尉四年授禮部侍郎從征湖廣敗流賊一隻虎于荆州尋奉命為靖南將軍偕副都統棟阿賴征福建連獲賊渠曺大鎬張耀星克同安平和五年大破賊渠鄭彩彩遁入海復長樂連江擒偽總兵顧世臣等十二人于興化斬之以次克復郡縣全閩底定六年授護軍參領七年論平閩功晉二等男擢刑部尚書八年二月遷吏部三月授國史院大學士七月坐誤增恩詔赦條論罷降世職為一等輕車都尉九年起禮部尚書充會試主考官尋授都統晉二等子十年授寧南靖冦大將軍督兵征湖廣是時流賊張獻忠餘黨劉文秀降于明桂王朱由榔受偽封為南安王十二年文秀遣其黨盧明臣馮雙禮以衆六萬樓櫓一千有竒分犯嶽州武昌而自引精鋭萬餘列艦攻常德辰泰設伏隘口斷其歸路令恭領呼尼雅羅和以兵嘗賊别遣參領蘇拜希福麾舟師並進三戰三捷賊既郤復前轉戰至隘口伏盡發縱火焚其艦賊大敗又分兵破賊德山下逐北至龍陽賊收敗卒二千返閗我兵奮擊賊潰走明臣赴水死雙禮被創遁文秀竄貴州降偽將四十餘人兵三千有竒敘功晉一等子兼一雲騎尉未幾以疾卒于軍明年凱旋世祖諭從征諸臣曰大將軍辰泰南征蕩冦卒于戎行朕甚傷悼因揮涕命酒以勞諸臣復諭學士麻勒吉等曰若大將軍振旋還京朕當親酌酒勞之不意中道棄捐不復相見爾等其持此一觴奠大將軍靈次以抒朕懷諸臣及左右侍從無不感涕賜祭葬如典禮諡忠襄以其子尼滿襲爵哈什屯姓富察𨽻鑲黃旗滿洲先世居沙濟祖旺吉努率族屬來歸太祖授佐領哈什屯其長孫也天聰時官侍衛擢任禮部參政崇德二年與佐領喀愷等分道征瓦爾喀俘獲甚衆三年招降明總兵沈志祥于石城島六年大軍圍松山城明總兵曺變蛟乘夜犯御營哈什屯先衆捍禦腕中創力戰不少郤順治元年擢內大臣纍加世職至一等輕車都尉兼一雲騎尉尋列議政大臣會睿親王多爾衮有疾哈什屯偕貝子錫翰等往視睿親王曰豫有疾上宜臨視又曰爾曺母以子言上聞既駕臨視之睿親王罪大臣等達令擅奏降哈什屯世職為騎都尉八年世祖親政鑒哈什屯無罪復其所降職兩遇恩詔晉爵一等男初睿親王輔政大臣鞏阿岱和落輝楞僧吉等多諂附之哈什屯獨持正不阿肅親王豪格為睿親王所搆卒于嶽鞏阿岱和落輝欲殺其幼子富綬哈什屯與內大臣巴哈力爭之議乃寢及睿親王卒楞僧吉盛稱王功績於上前並及兩黃旗大臣謀立肅親王事詔下法司鞫訊盡得其阿諛誣陷狀尋與鞏阿岱以朋比伏誅而和落輝亦以黨附睿親王為大臣蘇克薩哈所劾磔死于是肅親王之事乃白遂封富綬為顯親王其始終執詞不撓以證此獄者哈什屯及巴哈二人也十二年以奉職恪勤加太子太保明年以年老致仕康熙二年卒年六十有六賜祭葬諡恪僖子米思翰襲爵乾隆元年入祀賢良祠十三年册諡孝賢皇后推恩先世追封哈什屯一等公十四年曽孫大學士忠勇公傳恆經略四川成功凱旋賜建宗祠春秋致祭以奬忠勳祀自哈什屯始阿喇善姓博爾濟吉特先世居扎嚕特太宗時隨其祖喀喇巴拜來歸𨽻鑲黃旗尋授護軍參領崇德二年列議政大臣八年擢副都統從攻寧逺克前屯衛中後所二城順治元年兼任刑部侍郎從入關擊走李自成二年從英親王阿濟格西𠞰自成敗賊綏德州攻克延安賊南竄湖廣進躡之七戰皆捷三年從肅親王豪格𠞰張獻忠道出陜西擊敗叛將賀珍於漢中時偽副將武大定踞秦州三寨山阿喇善以兵六百由僻徑陟山巔出賊不意奪其壘斬級無算進擊獻忠於西充大敗其衆獻忠滅分兵克遵義𠞰餘賊平之六年從英親王討大同叛將薑瓖攻復渾源州及大同左衛二城七年擢刑部尚書兼都統尋追諭克左衛時不以登城將士名啓王罷尚書任八年奉命𠞰山東土賊破賊巢于沂州之蒼山斬賊首劉遜張齊及其黨百餘搜捕旁近山寨斬賊王家臣王家盛張榮魏在斯等三百餘級俘獲甚衆纍論功晉爵至一等男兼一雲騎尉九年兼佐左都御史尋以恭贊大臣從敬謹親王尼堪征湖南擊賊衡州至殁於陳坐失援罪革世職十二年卒賜祭葬如例巴山姓瓜爾佳𨽻鑲黃旗滿洲天聰中以佐領戰大凌河復從征察哈爾崇德元年以恭領從征朝鮮並有功三年從入墻子嶺薄燕京超山東擊敗明太監馮永盛兵還攻巨鹿先登克其城五年偕承政索海征瑚爾哈部攻克卦拉爾屯順治元年從入關敗流賊李自成進工部侍郎二年以副都統鎮守江寧三年擢總管時江北諸賊依山為冦欲犯江寧結城中姦人為內應巴山詗得之捕斬其黨三十人未幾偽樂安王朱誼石紏衆二萬餘分三路來犯敗之再破之攝山斬其渠賊大潰竄去四年明故參政候洞曽子元瀞遣其黨謝堯文賫明魯王朱以海偽敕招我大學士洪承疇為邏卒所獲巴山以聞於朝世祖察其反間慰諭承疇而以巴山能折亂萌甚嘉奬之六年會總督馬國柱𠞰賊六安陳斬其渠張福寰江北諸賊俱以次平九年還京屢以敘功復兩遇恩詔晉爵至二等男康熙十二年卒賜祭葬如例以其子舒恕襲逹素姓章佳𨽻鑲黃旗滿洲天聰五年以護軍校從圍大凌河城明兵備參政張春率兵四萬由小凌河來援達素與同官鰲拜擊郤之長山積官護軍參領崇德中從圍錦州者再從征寧逺討瑚爾哈部攻克博和哩城招降能吉勒屯及大噶勒達蘇屯並有功順治元年從入關擊敗李自成尋偕都統巴哈納平定山西二年從英親王阿濟格𠞰自成于湖廣攻克安陸武昌三年擊走叛將賀珍于漢中殄張獻忠于四川六年從征大同叛將薑瓖敗賊右衛巳而賊大至逹素奮前博擊飛矢及其喉兩手足悉被創遂墮馬軍校欲負以退達素叱曰死則死耳何避為復裹創麾衆力戰賊敗郤屢論功晉一等輕車都尉九年獻忠餘黨孫可望李定國等冦湖南廣西逹素從敬謹親王尼堪征之敗賊衡州全州斬馘四千餘復興安灌陽二城是年十一月敬謹親王歿于陳將佐俱獲罪逹素以功免議十一年擢護軍統領十三年擢內大臣十六年海賊鄭成功陷鎮江犯江寧世祖命達素為安南將軍偕都統索歡護軍統領賚塔等往𠞰比至賊已敗遁入海逹素請進𠞰成功于厦門乃統所部兵由浙江赴福建十八年聖祖仁皇帝即位詔令撤師還京康熙八年鰲拜獲罪逺素夙與鰲拜善坐黜罷尋復世職八年卒以其子達禧襲阿哈尼堪姓富察𨽻鑲黃旗滿洲初任佐領略寧逺敗明兵千人崇德二年從征朝鮮取江華島五年偕承政薩穆什喀索海征瑚爾哈部攻克雅克薩城還軍敗烏拉及博穆博果爾兵六千並有功任禮部參政授騎都尉世職六年從鄭親王濟爾哈朗圍錦州屢戰松山皆捷順治元年從入關擊敗流賊李自成偕都統阿山由蒲州濟河協𠞰二年以兵會豫親王多鐸下江南攻克揚州常熟二城三年復從豫親王追擊騰吉思于額克特山俘獲無算積功晉世職至一等輕車都尉四年擢兵部尚書六年從鄭親王征湖廣偕都統劉之源分兵超寶慶擊敗賊王進才馬進忠遂克其城乘勝擊賊馬有志于南山坡破其九營又擊賊袁宗第于洪江破其十營大軍入沅州留阿哈尼堪駐守賊王強來犯遣將破之沅水斬七百餘級馘其渠三人七年師旋遷禮部尚書疊遇思詔晉爵至一等男八年卒子噶爾哈圖襲布克沙姓瓜爾佳𨽻鑲黃旗滿洲天聰時以護軍校軍防牛莊崇德二年從征皮島先登得優賚旋授護軍參領五年從圍錦州戰杏山松山皆有功豫雲騎尉世職六年復圍錦州明總督洪承疇自松山來援戰郤之復破其三營步卒七年從貝勒阿巴泰征明擊敗明總兵馬科於渾河岸其别將以三千餘人拒守渡口又擊敗之遂趨山東略萊州攻克蒙隂沂州二城八年五月凱旋賚銀幣晉世職為騎都尉順治二年從英親王阿濟格征流賊李自成於陜西取道邊塞進兵榆林屢敗賊於綏德延安自成走湖廣復擊之安陸武昌逐賊至九江口會奉詔班師過池州明總兵黃蜚以舟師拒戰擊走之三年騰吉思叛將喀爾喀從豫親王多鐸追之搜捕布爾噶圖山斬二千有餘級擊敗土謝圖汗碩雷汗援兵八年擢副都統兼戶部侍郎九年以疾罷先後敘功並三遇恩詔洊晉一等輕車都尉十四年卒長子哈楚罕襲卓布泰衛齊次子也崇德四年以佐領從征瑚爾哈部斬級五千旋師擊博穆博果爾於道俘六十有竒敘功授騎都尉尋進恭領從錦州者再屢敗明兵於松山杏山七年從征明至青州戰輒捷明年旋師過螺山擊破明八鎮兵斬其大將張登科和應薦順治初征黑龍江攻克圖呼爾禪城西𠞰李自成克西安追擊自成於湖廣殱其衆移師下江南浙江平定松江杭州諸郡卓布泰皆在軍有功從征明唐王朱聿鍵於福建聿鍵走汀州卓布泰以偏師趨福州克其城復從征明桂王朱由榔於湖南戰湘潭馘其將陶養用敗其軍於衡州道州靖州屢論功晉二等男豫世襲厯官至內大臣兼都統是時由榔竄雲南其將李定國白文選李成爵等分踞黔西廷議由廣西湖南四川三道會討而以卓布泰為征南將軍進兵廣西自都勻薄盤江明兵悉沉船退守山隘乃潛取所沈船於下流十里中夜濟師大破成爵於梁瑞津進攻雙河口定國列三十營結象陳拒戰卓布泰分兵三隊張左右翼掩擊之再戰皆捷追斬四十餘里間道由普安抵羅平州會楚蜀兩路兵攻克雲南由榔奔永昌時順治十六年春正月也二月趨鎮南州破文選於玊龍關渡瀾滄江取永昌由榔奔騰越我兵窮追過潞江定國謀以卒六千伏磨盤山會明中書盧佳生來降以定國謀告乃分兵八隊發火器擊其伏驚竄墮崖死者無算定國敗走銅壁關遂乘勝騰越州由榔奔緬甸卓布泰追逐至孟村而還明年凱旋命內大臣迎勞之尋以勘將士功罪不實黜爵康熙三年復之八年以弟鰲拜獲罪又坐黜聖祖念其征雲南功仍豫二等男世襲十七年卒賜祭葬諡武襄子增夀襲巴哈衛齊第四子也崇德中以一等侍衛與議政二十四大臣之列順治元年從入山海關授騎都尉世職時睿親王多爾衮攝政都統談泰許內大臣索尼詆誹睿親王并托其細故法司鞫訊辭連巴哈議當黜詔貰之從肅親王豪格征陜西四川晉一等輕車都尉八年世祖親政命為議政大臣晉爵至一等男初肅親王為睿親王所搆卒於獄尚書鞏阿岱議殺其子富綬巴哈與內大臣哈什屯持不可乃止鞏阿岱及其弟鍚翰侍衛楞增吉遂毁巴哈于睿親王後鞏阿岱等以朋比伏誅而巴哈恪職受恩眷屢加少傅兼太子太傅授領侍衛內大臣康熙六年以其子訥爾都尚公主封和碩額駙八年其兄鰲拜獲罪同父兄弟並論斬聖祖念巴哈宣力年久貸之尋卒喀喀穆姓隡哈勒察𨽻鑲黃旗滿洲崇德中任吏部理事官從征瑚爾哈部擊斬二百人生擒索倫兵一百三十以歸順治元年從入關敘功授一雲騎尉世職纍官吏部侍郎晉世職為輕車都尉尋奉命征王光泰於鄖陽光泰兄光恩初從張獻忠為盜後歸明鎮鄖陽大軍定湖廣光恩迎降俾領鎮如故至是以罪逮繫光泰遂據鄖陽叛自稱明鎮武伯結叛將賀珍武大定等為援提督孫定遼戰殁大軍進討光泰遁喀喀穆追擊之房縣斬級千紓光泰竄四川會叛將金聲桓自江西窺湖廣喀喀穆乃留駐荆州比還京兼任副都統晉爵三等男九年討鄂爾多斯部之多爾濟自寧夏出水驛口繞賀蘭山後覆其巢斬多爾濟俘獲以萬計是年五月授鎮守江寧總管十年命為靖南將軍𠞰叛將郝尚久于潮州復其城尚久投井死徇旁近州縣悉平還駐江寧十六年海賊鄭成功陷鎮江瓜洲犯江寧賊衆號十萬戈船蔽江蟻屯八十三營薄于城下喀喀穆與總督郎廷佐提督管效忠登陴固守檄蘇松鎮總兵梁化鳳馳援化鳳既至陳於儀鳳門效忠出鍾阜門夾擊陳擒其渠賊氣奪喀喀穆開神䇿門率精鋭搗其中堅賊大潰成功收潰衆遁入江我水師復截擊之焚其船五百餘尋賊溺死者甚衆追議鎮江瓜州失陷罪世祖念其功置不問康熙元年改江寧將軍七年卒子拉揚呵襲巴賽武賴兄子也初任佐領崇德五年從征明改杏山駐烏馨河明總兵祖大夀以精兵六百來犯巴賽奮擊之六月進圍錦州復敗其杏山兵七年圍錦州克其外郛明松山兵夜遁先趨塔山南海岸邀戰乘夜擊之天明明兵據立山上復擊敗之溺水死者無算我軍圍松山掘壕困之明松山步兵來犯我汛地偕參政吉思哈迎戰連敗之順治二年授佐領世職七年九年兩遇恩詔纍加世職三等輕車都尉弟喀薩順治初入關復隨追流賊于武昌偕參領達素擊敗賊將劉浩于江口取其船並獲其戰馬三年從征四川攻三寨山于山腰迎擊賊將郤國士等奪其門據之復連敗賊渠張獻忠之衆十一年從征廣東敗李定國之兵于山峪十三年敘功授世職騎都尉蒙伊圖𨽻鑲黃旗滿洲崇德三年從征明敗明兵于河西務進攻山東濰縣射守陴者殪之克其城從圍錦州進敗明錦州杏山松山援軍六年復圍錦州擊明松山兵敗之七年從破明經略洪承疇三營步兵順治元年入關隨擊流賊追至慶都二年敘功加佐領世職嗣纍加世職至一等輕車都尉綽克託姓博爾濟吉特𨽻鑲黃旗滿洲世居錫拉初事太宗授二等侍衛崇德六年隨征錦州以軍功擢一等侍衛順治元年從入關任內大臣理藩院侍郎議政大臣髙赫德姓烏扎拉𨽻鑲黃旗滿洲世居薩哈爾崇德八年從征明山東攻武定奮勇先登克其城賜號巴圖魯授佐領世職順治元年入關擊流冦以步戰敗賊論功加三等參領四年卒弟壯吉達襲其族弟曰什弼倫崇德八年從征明至山東攻蒙隂先登加優敘噶爾哈圖阿哈尼堪長子也初任參領崇德二年從征朝鮮有功從征明攻克深州五年圍錦州擊敗明杏山塔山兵又明松山兵夜遁追至南海岸大破其衆七年圍松山敵夜犯我營擊却之八年從征明敗敵于通州又敗明渾河駐守兵連破其營至山東攻蒙隂沂水皆先登順治時加三等輕車都尉世職素爾東阿姓富察𨽻鑲黃旗滿洲初居額音訥殷七村人叛附葉赫素爾東阿征之被創復其衆回據佛多和城太祖癸巳年素爾東阿以兵克其城盡殱其衆得優賚戊申從征烏拉癸丑從征葉赫皆有功賚銀布又從征扎庫塔身被九創從攻撫順首先陷陳敘功授三等參領查齊巴姓舒穆嚕𨽻鑲黃旗滿洲國初來歸屢從征伐以勇著太祖戊申年從征烏拉天命六年從征明克遼陽瀋陽敘功授逰擊世職年七十致仕衮布姓博爾濟吉特𨽻鑲黃旗滿洲天聰元年從征寧逺有功又從征扎嚕特部有俘獲授三等參領達賴古爾布什弟也同兄來歸授備禦世職崇德五年從征明攻錦州擊寧逺木城兵以步戰衝入其陳克之論功加三等參領世職翁阿岱姓富蔡𨽻鑲黃旗滿洲從征遼陽寧逺皆有功天聰三年從征明敗明兵于灤州五年從征大寧河中後所皆有功崇德六年從圍錦州纍戰皆捷明松山兵來犯復擊敗之敘功授佐領和托諾姓烏勒固宸初從征阿庫哩尼滿有功天聰八年從征明至大同攻沙城克之敘功授佐領世職當愷姓納喇𨽻鑲黃旗滿洲天聰三年從征明至燕京擊明袁崇煥軍勝之崇德六年從征明錦州進攻松山皆力戰被重創賚白鏹六年遇敵於阿爾沙蘭及歸化城皆力戰有功得優敘瑪爾和納姓那木都魯𨽻鑲黃旗滿洲天聰五年從征大凌河擊明監軍道張春前營破之時我軍後營為明兵所阻不能進瑪爾和納執毒首先衝入大軍繼進遂敗明兵八年敘功授佐領世職什勤姓逹佳隸鑲黃旗滿洲初任佐領天聰八年從征大同擊明哨騎敗之出邊時又以步戰敗明兵崇德六年從圍錦州擊敗明經略洪承疇軍克其關廂順治元年從入關破流賊有功纍加三等輕車都尉世職古訥禪姓伊爾根覺羅𨽻鑲黃旗滿洲天聰九年從征明大同攻石城先登賜號巴圖魯授佐領世職順治元年從入關以步戰擊敗流賊二年從定河南江南浙江在行間有功三年敘功加三等參領子顧八代康熙時為名臣囊古齊姓翁伊哩𨽻鑲黃旗滿洲崇德二年從征瓦爾喀有功三年從征明至山東攻武定州以第三人登論功得優敘拜和賴𨽻鑲黃旗滿洲崇德三年從征明數戰皆捷駐主董家口與明兵相拒七晝夜敵不敢犯四年論功得優敘桑賽𨽻鑲黃旗滿洲初任佐領崇德三年從征明入邊擊敗明八總兵之衆又屢戰有功順治元年入關追賊至陜西之延安殱其衆于城壕二年敗賊于九江獲其戰艦敘功纍加世職至二等輕車都尉康熙三年隨征湖廣十五年從征貴州皆在事有功加一等輕車都尉法特哈姓冨察𨽻鑲黃旗滿洲初任佐領崇德三年從征明敗明兵於豐潤七年隨圍錦州擊松山馬兵先進克敵復敗明兵於寧逺順治元年從入關明年追流賊至江南池州大捷獲其戰艦加世職至三等輕車都尉拉古𨽻鑲黃旗滿洲崇德五年隨圍松山有戰功順治元年入關追流賊至慶都大敗之授佐領世職巴爾度禪𨽻鑲黃旗滿洲初從征即有功崇德五年從征明圍錦州以步戰擊敵柵步兵營克之八年從征明至山東攻兖州以第一人先登賜號巴圖魯論功授一等參領世職扈夀姓托和羅𨽻鑲黃旗滿洲崇德八年從征明入邊攻長沙首先登賜號巴圖魯授佐領世職順治元年入關擊流賊有功從攻山西太原斬其偽帥克其城敘功加一等雲騎尉阿爾錫哩姓嶽諾托𨽻鑲黃旗滿洲崇德八年從征明至山東攻汶上以第二人登後厯敘功績授三等輕車都尉是年同旗有喀喀齊攻克東阿阿爾泰薩壁圖攻克沂水星克禮攻克平鄉蒙和岱攻克博平敘功皆優敘球蘭𨽻鑲黃旗滿洲崇德八年從征明山東進攻兖州以第七人登又攻克寧陽順治元年從定河南敗敗潼關第一營從定江南攻揚州以第三人登駐防滄州平土賊馬長五等從勦山西叛鎮薑瓖攻渾源中炮傷手纍加世職至二等輕車都尉莾什𨽻鑲黃旗滿洲初任佐領崇德八年從征明山東攻東河以第三人登是年又從征薩哈連烏拉有俘獲順治元年從征流賊敗賊于陜西綏德三年從𠞰四川流賊張獻忠等有功授雲騎尉世職和木索科𨽻鑲黃旗滿洲初任工部理事官崇德時從征松阿哩烏拉及征明山東皆有俘獲功從圍錦州攻松山奮勇却敵順治元年追賊之延安駐師南山谷賊乘夜來犯擊卻之並破其第一營又敗之九公山從𠞰江西叛鎮金聲桓王得仁纍戰皆捷加一等輕車都尉世職兼一雲騎尉欽定盛京通志卷六十八
