body:
  text: 國朝藝文六詩一樂府樂章四言古體五言古體欽定四庫全書欽定盛京通志卷一百二十國朝藝文六詩一樂府㳟進聖駕東廵上陵樂府有序甲戌劉綸臣綸言臣聞頌以美盛徳之形容尚已若其宣金石被管絃可以對揚閎庥臚聲纂實則樂府為近伏惟皇帝陛下孝治顯融涵浹區㝢自郊兆宗祊奉先神御寅承饗祀必謹必時尤以典重上陵嵗大淵獻乗輿躬親展事霜降露濡聿周星紀清𠂻弗懈益䖍廼以今年仲夏祗奉慈寧發軔畿甸㑹西戎襁屬内面即熱河行在受之凡名王侍子材官介士罔不擁塗聚觀告語懽喜既道藩部遵吉林衺延黄龍逕抵元菟獮狩邉門之外順天行儲乾豆遂撰辰夙戒晋格乎三陵壹凖八年定制而宸儀邃穆僾愾之忱有加焉所過升柴肸蠁嶽鎮景從還詣留都班朝酺讌給復宥𤯝錫福咸暨懿鑠哉文教武功和衆勤民風聲之樹如彼率祖尊親受釐集福元㑹之隆若此顧臣輇薄得塵陪扈預駿奔仰覩聖上淵沖黙運於両京淳龎舊俗細而一名一物皆毋忘桑梓敬共之意至夫列祖張皇六師川原勝蹟壁壘猶存輙弭節披吟遲廽不忍遽去所以著守成之難益以懷創業之不易長言諄復用永廸此丕丕基而達孝之歸孰大乎是嘗考安世歌曰大孝備矣休徳昭清又曰大矣孝熙四極爰轃斯之謂備斯之謂無不轃也鑾回蕆成百執胥効賡載臣竊仿近古樂府仍其譜調有合者都為十章請上太師宣樂職焉第一章盛典載修良辰恊吉初發京師也當練時日練時日開天閶大安輿豫且康霱雲載珥羲輪黄朱明旉與前驅旌纛長禾黍萐蒲扇龢熏蓂莢滋甘澍鼓腹于于堯樽在衢顧屬車蠲所過租第二章駐蹕山莊賜來降杜爾伯特台吉䇿凌等宴六官具列萬國交懽也當石留石留狼荒蒼蒼涼涼西崦䟽屬不得睹日月光蟻封蝸角毋胥戕率所部言瞻聖明被以冠裳哺以糗粻天度兼覆宜來慶第三章行圍塞垣别部邏卒輻凑聖武昭軍儲繕也當艾如張刈蘭以為防張莽䍚之野一綫桞條邉逺勢豆人而寸馬田獲三膘貫左隼盧猋馳飛走雨下上日射黄熊彀唐弓膨脝草楦駞偃峯倚盾鼻丹毫濃樞府進牘催郵筒第四章謁祭以時彛章允洽道隆光裕茀禄永膺也當上陵帝上永陵四祖兹式慿嘉樹馚翠葆萬葉珍符凝帝上福陵髙廟龍湖興永懷十三甲神器開咸登帝上昭陵文皇宏顯承小白蹀躞大白騫騰垓埏疆索時乘隆儀一再舉法守詒雲礽第五章望秩神仙懷柔徧也當巫山髙巫山髙鎮北紘重關鎻鑰左界相搪撑越若脈延祖氣長白先儲精初上之吉林升温徳亨齋房三盥調六莖龍江似帶鴨水如纓青蠃髻失雲中君雪峯了了一霎開秋旻第六章兩京徳産之富甲於天下上采覽古風型方訓俗義深逺也當邕熙邕熙時樂莫樂煌煌京雒冠葢自相索貂紉貴者裘葠劚仙人葯窩集木通天烏拉魚縱壑蜯孕珠胎還應魄帝曰咨先民儉徳尚克知康鐙堪夜作樺屋好晨炊枌榆鷄犬紛來思樂莫樂邕熙時第七章龍興肇迹祖烈長存燮伐所經風雲増勝周原諮度溯開基勤纉服也當聖人出聖人出開鴻濛三城九姓始造攻夜郎敢自大幕南各各王庭空鐵嶺西凌河東號稱百萬軍聲雄試問將者誰唶唶祖與洪天戈一以指京觀皆沙蟲彼哉過沛歌大風何如松杏間陣雲髣髴驅豐隆第八章御盛京崇政殿推恩行慶申載錫頌重光也當朱鷺朱鷺飾鼓崇牙樹羽豐宫樂帝臨八荒通牖戸頒政十亭前納言二木下儀䍿阿閣三重階大弓貝胄東西序羣公蹈舞彤墀清圖王㑹傳之父老嗛嗛前致辭陛下萬萬嵗星廻於次念我旦旦期重來第九章祠官遣酹祀事咸脩崇懿親逮勲佐也當元雲際㑹乗元雲名世當五百英姿翊軒造侑食儕旦奭麗牲石闕髙縣奠醊羣靈後先膚寸為霖霈然矧廼銀潢派連詔爾仲叔季弟㓜子童孫聼朕言本支奕葉惟象賢第十章旋蹕受朝禮成偹告一人有慶萬彚䝉庥也當務成玉鸞鏘華旂颺務成愷澤何滂洋展采錯事進秩酬班行迎門笑語三輔蠲輸將雞竿孑孑圜扉枯萎蘇其萌至人推孝思伊古無與尚太史簪筆紀實自五月天中暨十月小陽大禮既備登登皇皇哉聖駕四詣盛京㳟謁祖陵禮成㳟進樂府有序癸夘陸錫熊臣聞樂府之作所以述宣功徳體視賦頌尤鏗鍧炳燿足以震盪耳目漢代有重來上陵二曲為上陵食舉樂府重來辭不傳上陵則惟侈言神怪不稱臚聲纂實之義臣竊陋焉伏見我皇上睿聖嗣服道隆守剏丕冒無外永維祖宗肇邦受命佑啟我家袛袚對越三率彜典東謁閟寢蒸蒸之思夙夜滋䖍廼以今嵗仲秋時廵京瀋展事三陵慕忱齊格肸蠁昭融還莅舊都章式旉備達孝所暨萬禧畢從跨周轢虞無所與讓至於億神諴民綏遐勤紀經文緯武所以崇天聲垂軌物有加於昔者尚數十事舄奕版䇿不可殫記回蹕禮成卿士庶尹百執事胥効賡頌臣愚誠不足𣙜扢萬一而㳟逢嘉㑹毣毣之私不敢以輇薄自解輙指事件繫仿古樂府譜調别題篇目編為十二章詞淺義直庶令籥工轅童皆得諷吟有以發揚聖天子盛徳庥光傳示無極臣誠懽誠忭拜手稽首謹上聖節受釐山莊發軔良辰恊吉順天行也為壽星明第一壽星明掞熉黄紛嘉况臨瑶閶東鶼西鰈咸㑹稽首上皇帝千萬嵗熙沆碭詹秋期結霱雲砰華芝前驅八神大丙奉騑惠廸吉天門開招摇指東之畿肅肅四面歡傒來蹕路經藩部莅邉門所過鞠􅎽奉觴歡心允洽也為栁邉青第二栁邉青青以紆嵉嵉窣堵波路轉興中墟和龍左令支右别部保塞各各安鄽闍昔甌脫今禾黍翠葆容與韠紱俠塗齊負弩采椽不斵搆行宇擁篲清塵職守土積蘇衣都曇鼓筵開詐馬旌門拜舞陛下萬年中外主三陵謁祭備物升馨光孝思循彛典也為髙山作第三髙山作基庥祥天祚徳九州享淵穆穆聖重光廸孝熈寅蒸嘗予有慕眷舊邦鞏穀林龍蜚鴹扆長白襟三江帝來覿芬蕭薌越閥茂溯尚章嵗不居懷秋霜四展祀昭皇誠容有睟僾若望榆之樹馚幄張石馬馳嘶靈風陳廣牡臨齋房舞八溢鏗琄鳴神在天感洋洋承放􅜜歆嘉觴祜孝孫慶無疆五朝册寳奉藏盛京太廟對敭鴻庥昭無極也為章神烈第四章我神烈於昭于天揚徽熙號玉檢瑶編練吉日格新廟千祇翊從鸞斿前導芝栭霞栱盤龍琅函琱几當中赤文緑字光熊熊奕世侑徳饗功日月照耀垂無窮御盛京崇政殿受朝遂錫愷宴大和㑹也為聖當陽第五聖人當陽崇政朝百辟仗衛傱傱顒卬劍舄堯階采茨重阿閣徳羽集十亭岧嵽法㑹陳凾宫吐角龢八音沛父老南陽親在鎬愷樂宣皇仁朝鮮國王遣使起居賜詩嘉寵文軌大同也為平壤朝第六平壤束幣朝天謁者引鄉爻閭前使者嗛嗛致辭臣祘拜表丹墀帝嘉守禮庸作歌榑桑東被光華多慶尚全羅鯨波漭蕩沾朝恩咨爾世世奉職修東藩盛京鼎建文溯閣分庋四庫全書義符過澗經籍道光也為水之瀾第七水之瀾導崑崙聖之文繹羲軒圖書甲乙丙丁淵源津薈桄三層淮南浙之西波溉褒幍榮豳居臚編秘閣妥三萬六千星摘顆長思守槴以環列太乙吹藜而來下文舘崇儒遡册府文皇文思帝稽古東壁揚輝慶繩武勅繕治奉天屬城蕆工臨視壯觀瞻固封守也為屹金郛第八萬雉屹金郛煌煌衛京雒賦丈給水衡鳴鼛喜偕作鐵為壁湯為池丹譙粉堞蕩蕩開通馗帝臨省厥成重臣履視咨周行思難圖易民咸寧不見永安橋長虹倚叠道祖澤千春儷穹顥王迹肇基興懷祖烈川原諮攬即事摛吟命皇子彚録函藏闡先猷式明訓也為漢昭回第九漢昭回天為章震耀金石諧宫商經過懷聖蹟松杏山河長壁壘屯風雲旗旗尚飛揚思王業王業多艱難詩以言志造化廻斡歸毫端守成慎永圖䝉庥憬貽安三復豳風篇欽哉永寳以弗諼咸秩山川崇建祠宇上下神祗咸受職也為萬靈趨第十拱玉鑾萬靈趨視公侯般徐徐句驪東梁相灌輸納嚕皓旰流英峩鼎祠墠神之榆周流常羊横泰河遼東復遼西突兀醫巫閭絡以大瀛升香絪豫通虛無和風甘雨溟不波登髙樓臨碣石萬里青銅㸃颿黒行慶推恩澤覃豐鎬宏錫類也為湛露滋第十一湛露滋萬物各遂生復租稅吏不呼門九年儲無待三年耕旗莊差次貸減囷粟滿盈校官歌鹿鳴弟子增員逰膠庠咸禮讓無所爭雞竿孑孑視罪輕重弛其刑存問髙年束帛異粻守吏賜爵一級暨從官下有司書姓名聖徳普福如天葆樸含淳同樂太平鑾廻蕆成格廟班朝鉅典矞皇天庥滋至也為慶蕃釐第十二蕃釐來成慶馮馮昌瑞祗薦百福同帝車廻杓臨紫宫秉鬯太室孚天衷㣲垣端正開明堂華鐘鏘洋宣八風卿烟入吕曦曈曨皇哉孝治格祖宗延洪純筭曼崋嵩光被四海登熙邕樂章長白山望祭樂章甲戌汪由敦迎神天作髙山兮麗扶桑鍾王氣兮應期昌廵豐沛兮來望躬禋祀兮䖍將初獻飶黄流兮進初觴緬仙源兮心遫莊靄佳氣兮欝葱葱兮來格兮惠無疆亞獻朱果兮實蕃靈淵兮津長清寫兮再獻綿祚兮純常終獻長薦兮玉饌三酌兮瓊漿思王迹兮彌欽永緝熙兮敢㤀徹饌松花水兮湯湯鴨緑波兮泱泱神飫兮錫釐如川至兮莫量送神祀事兮孔臧昭格兮永明邁周岐兮越殷土萬有千嵗兮長發其祥四言古體聖孝光昭詩有序癸亥徳齡大哉我皇上之以孝治天下也孝徳之著於政教者無一事不下愜於民隱孝思之展於祭享者無一念不上格乎天心是以郊社宗廟之祀既已竭誠盡敬昭應特著近甸陵寢嵗必躬奉皇太后㳟詣展視以申思慕之情至於列祖山陵在東土者道里悠逺戒飭既備乃於乾隆八年秋七月卜吉上陵特命道由塞上以避禾黍在畝兼振旅大狩以講武事是時秋霖正盛比大駕將發廟告之日天朗雲開羽衛啟塗常逢澄霽扈從之官下至輿臺圉牧莫不踴躍歡欣外藩䝉古仰見聖主神武上天靈佑咸鼓舞震讋輸誠效順惟謹時邁所届皇上怡怡愉愉祇奉皇太后起居慈懷豫悦彌慶康寧暨至園寢肅恭將事具禮有素列祖格饗惟懌大典既成中外忭慶以為典禮之行天心民志恊應若此皆皇上大孝至誠之所感召曠古以來實為僅見珥筆之士無不詠歌盛事傳之無極臣職忝卿貳兼同大學士臣陳世倌教習庶吉士分宜率先歌頌上徳謹獻四言詩一篇計一百韻言雖不文然事皆紀實用述聖孝之隆昭示四海焉恭惟我皇大孝備矣提虞挈周超邁曩軌孝以纘承篤懷靡已孝以慎修敬用五事孝以率由庶績咸底惟時惟康夙夜顧諟有截政敷無垠化被萬邦恊和一本推暨陶匏繭栗式用㤗畤對越惟䖍報本返始於穆清廟禮官既庀鬷假無言苾芬秬秠赫赫列祖雲蒸龍起肇業開基不堦尺咫率育疆界無有彼此大統既集鎬由豐徙武功載揚文徳永矢有奕山陵環畿凝靄嵗奉慈寧敬恭展視景彼留都髙山天峙橋山榖林欝葱佳只聖祖繹思逺薦簠簋福祉既膺慶覃海涘巨典煌煌光于國史我皇繼述以綱以紀孝思維則心源一揆永言不忘大禮維履慈㫖尤殷思齊任姒道逺維勤既經既理乾隆八年維嵗在癸爰筮吉日肇修禋祀其時孟秋日次鶉尾霖雨時行以汎以灑皇帝乾乾有䖍勿怠届日告廟雲開雨止乗輿起行周道如砥清暘溥照林木曜綺天心之格至誠之恃志氣交應恊于宫徵扈從讙謳蒸黎忭頍帝念中疆被畝糜芑屬車紆路邉塞迤邐白草猶青暄霽千里爰廵爰狩以閲武士七萃千旗星流電駛手格游騏足蹵生兕雨血風毛谿谷填委皇帝神武箭不虚指上殺中心乾豆是以旃裘萬帳爭隨鞭弭或貢其􅋙或獻其雉搏心戢志奉觴拜跪罔不震叠媚于天子燕賞有渥以莫不敉帝奉慈輿周覽遐睇翕河喬嶽有康志體行宫帳殿定省甘㫖慈顔載忻聖情彌喜長白醫閭嵯峨㟴􅕲環以鴨緑混同江水諸陵宅焉萬神攸棐九月吉日以次襄禮祠官備物瑶爵玊几于豆于登用潔􅎵瀡凝承世徳馨香澄醍文母純純敬薦脯醢孝思允展以介蕃祉皇帝齋戒主兹鬯匕僾然愾然仰榱俯戺石馬欲驤玉衣常玭覲光揚烈洋洋如在緬昔先臣艱難共濟嘉彼三勲躬賜奠醴次者遣祭報厥功偉篤舊之恩古未有此巍巍盛京日晶霞蔚御崇政殿以覲休采詄蕩門開小大拜稽宴錫需雲仁敦行葦廼閲師徒鐲鐃表壘廼犒廼賚觀騰鉾鎧九天作解書銜鳳嘴闓澤周流勤施表裏海宇霜澄闗門氣紫廼旋鑾輅告至祖禰皇帝之徳惟孝永依大禮之成畢具諸美曰雨曰暘上符帝載被于四海懷畏惟倍不匱之徴天人合啟聖躬凝之翼翼亹亹兢惕有加徳業彌暐浸潤羣生淪浹肌髓載稽瑞牒朱草薿薿徳至山陵斯拱而俟皇天永眷寵錫層累天子萬年元元夀齒大有屢書萬億及秭臣齡作歌不辭巴俚敬宣聖孝以播遐邇五言古體扈從遊千山恭紀康熙戊寅髙士竒霏雨凌芳晨輕隂散林薄修坂被青苕窮崖吐紅藥流泉既觱沸詭石亦齦齶㣲㣲仙梵聲三五列蘭若憇足愜幽賞晩烟張翠幙松欹雲欲堕海静潮初落緬想平生懷願言遵邱壑矧兹塵外鑣俯仰欣有託扈從出山海闗三首康熙戊寅孫在豐少年重遊俠投筆論三邉居常不思越行亦不戀燕長歌出塞行而廢郊坰篇於兹奉清蹕駕言從甘泉城窟飲馬來千里出燕然豁焉盪胸臆浩浩平沙天天地一翕闢乾坤開混茫草昧起休運經綸度大荒皇哉東京邑奕奕豐沛鄉坐擁北沙漠俯臨南溟滄枌榆髙社日楊桞生春光沃野千萬里可以事農桑廣莫麗神州樂土以無疆雲霞海色曙翠華正臨闗羲和執轡來光彩依龍顔海若為屏息三呼響萬山悠悠巻旌斾飛揚青海灣小儒慎馳驟駸駸豹尾間恭和御製松子元韻乾隆甲戌劉綸虛濤起天半離立槮長松古貎又古心灝氣含清空有如全真子鮐耉顔彌童層臺粲玉粒胎息香霧重仙人善吐納休糧此山中緗核厭碧柰素菂嗤金蓉忽夢十八公采珍當見逢翊旦聞和鑾持獻林衡同璚田種青精透甲輸芬濃願壽西王母丹梯擷凌風連臂難教猱探頷空呼龍白苓與赤瑿竟付樵蘇公詔下禁伐樹曠然為發䝉母俾後凋質乃隨陽木攻敬唯至教宣靈産資元功恭和御製松子元韻甲戌汪由敦北産薦嘉秩最數榛與松松子實尤勝不比榛多空諺云十榛九空向聞學仙術久餌顔如童泛茗秘瓷清飣盤玉顆重欲識採擷處今見窩集中鬱鬱復森森連林冠芙蓉青鱗纈綘塔往往枝間逢外介而内腴軟美安可同金粉滲花細琥珀流脂濃一掇纍纍實為想謖謖風不知㡬千嵗蟄此百尺龍疑從支離叟便訪榖城翁即看珠彩湛尚有香雲䝉棟梁藴瓌材樵蘇逺難攻落實全其天保䕶依神功聖駕四詣盛京恭謁祖陵禮成恭紀癸夘梁國治天命我聖清創業開太平履武發周跡元鳥溯商生朱果錫厥祥沐浴日月英起布庫哩山遷鄂多理城建號曰滿洲昭融命有成中興我肇祖王迹拓興京邈矣天皇紀纉服敬繼承經綸草昧艱圖度懷前寧一乾坤鑒無私於穆運不已峩峩長白山浩浩三江水震維木徳仁王氣東方紫開運萬億年鍾靈毓繁祉帝曰省其山作對岐封始明政既不獲有赫臨天視上帝乃耆之式廓増疆理肇域彼四方乃眷宅維此二髙皇十三甲大烈揚神武始征自圖倫棟鄂隨克取天表赫神人聰睿讋䝉古煌煌誓師狥告皇天后土肅將天之威一戰薩爾滸藩部既輯集遼瀋亦綏撫韙兹戡定勲穆矣神民主鳯舞復龍飛佳哉鬱天柱三洪惟我太宗新命集自天杏山大凌河神師帝阪泉北綏靖藩部南服懷朝鮮日闢國百里桓撥緬山川遵飬惟永圖觀政明郊旋文儀既郁穆武義方昭宣羣臣上尊號三讓格郊禋隆業開無疆欽兹石馬篇四大君御六合時則有佐命王貝勒貝子大臣議國政艱難不二心際㑹於斯盛勠力我皇家襄贊惟求定則莫我敢攖越有忠良勁烈烈何桓桓堂堂復正正山髙而水清當年百戰靖酹爵想前勞百爾其敬聴五考卜始遼陽吉實盛京最髙墉昔肇基樂只貽保艾居維四方極控馭恢無外千山為屏藩衆水為襟帶八門何將將宅中以圖大洪規度憶年誥治民和㑹耕戰畜牧時田漁亦攸賴受小國大國九有啟清㤗六宫庭紹聞衣在上於昭赫雙闕功徳崇天門大清奕樓殿鬱岧嶤十亭張翼翼踐位敬所尊壇圻與廟祏丹艧兹必勤堂構欽念昔洪惟締造初謀謨决籌䇿呼吸帝謂聞肸蠁天神格綿邈睇山河森沉仰松栢七維皇肇建官文武資並用恊和中外心整馭軍民衆三院六部分兩翼八旗共涉川利舟楫搆厦扶梁棟世祖定燕京風虎雲龍從留都置將軍董正羣僚統綣言豐沛鄉敬此邠岐重烝哉伊濯勲作矣髙山頌八燕都初定鼎日靖綏萬邦展謁時未暇天庥駿鴻龎聖祖纉三后明堂洞軒窓三征噶爾丹受喀爾喀降四十有九旗年年迓旗幢歌風動遼海還顧望三江聲名溢寰宇鼉鼓鯨鐘撞曰若稽古帝孝徳疇能雙九昔在我世宗祗承自藩服膺命覲三陵升禋薦寅肅憂勤十三年精一凝遐福駿惠篤吾皇四勤通清穆聲教訖荒裔馨香懿芬馥洋溢昭徳聞顒昂式金玉上縡景旭升孝奏天儀淑匏酌燕來宗𤓰緜自陶復十聖人嗣大寳曰惟天惟祖惟天凛難諶惟祖思繼序全付所覆幬外大國疆宇若四衛拉特哈薩克回部皇古所不賔今悉臣悉主以此燕皇天橋山告即叙洋洋開國模欽哉仰作覩山海宴清寧戰蹟雄圖譜十一稽拜謁隆恩對越神天格鼎湖弓劍存原廟衣冠宅皇帝穆然思僾愾通㣲漠艱難百戰勞陟降三霄隔目想兮思成精誠感曩昔蒼梧歘來雲洞若天閶闢視聴無形聲烟煴通奕奕赫矣照臨茲瑞靄如山積十二豐宫告慶成禮樂陳前殿百僚贊皇儀九陛羅嘉讌詔書十行下予復蠲租徧頒賚錫爵級夀愷龍光燕王公内外臣廣額翹英彦以及旗民兵舊京府州縣捧金穀帛賜拜舞歡雷忭題榜到朝鮮海外人歸羡十三守器重留貽萬䙫雲仍朂皇威萬里揚徳産和闐玉芝璽篆鏤丹璿圖字縈緑金繩瑶檢秘寳訓崇謨録隆禮義所生本盛斯文郁世徳配於天煌煌孝熙告盛禮賚綏成延洪荷茀禄彛典欽五朝禴禘宗軒頊十四扶輿鍾靈秀淳風追太上沕穆隆古初徳産神臯王天為不愛道地為興寳藏太祖昔論都訓辭衷至當華實得上腴控御聲靈壯山田澤河漁靈草珍嘉貺隂陽和㑹交氣味芳甘養舊徳服先疇藹矣皇風暢十五築城始興京乃宅遼瀋陽臨闗帶山海千里仡相望摧垣復隳壘我武昔維揚今者久承平百四十載强言言十八城襟帶我東方發帑百卅萬崇墉間女牆環以山面面表以海泱泱六合兹一家在徳凛無忘十六四廵用作歌創業陳艱難駿烈肇鴻濛宗功想﨣桓風起復雲飛長言以詠歎無侮亦無拂以臨乃以觀昔製全韻詩萬象羅豪端皇旅兮嘽嘽如飛兮如翰義正分商那事實於周般聲音與政通聖海遊文瀾十七江河行紀地日月行經天文章實經世載道行亦然文皇啓三館聖作有開先曰經史子集是惟四庫全網羅百年後三萬六千編弆之以四閣成之逾十年排籖别部居揷架鳳樓連陪都遡過澗一本訓昭宣十八大禮既告備旋軫發盛京先河而後海秩祭懷百靈嵯峨醫巫閭滈汗北澥瀛臣忝屬車末鬷假瞻寅清自春爰及秋展謁徧山陵孝理惟緝熙迄用昭有成仰惟神聖徳純粹鏡至精可以形雅頌動容而發聲十九后稷實文祖宗祀配皇穹家法示守成羮墻慕何窮歸格奉先殿昭明告有融子孫及臣庶來賀㑹羣工初日照旌斾和樂韶韺同淵淵聆天聲穆穆展帝容艱哉思克艱顧諟在宸衷欽明文思安萬古日常中二十聖駕四詣盛京恭謁祖陵禮成恭紀癸邜戴衢亨嵗癸夘仲秋皇帝啓清蹕仙莊戒首塗陪都指雙斾緬惟著雍年三展龍興地茲焉謁珠邱修禋典循四五載闡上儀皇皇著成例是月天氣清九闗肅霜霽朱鳥延神旃蒼龍䕶雲駟出震東表臨履坤北維暨璇樞鬱珍符聖人合天瑞粤興京肇基帝作邦作對神臯卜遼瀋分野軼圖載景昔周造豐陋彼漢興泗仙溟鳯麟接繡嶺龍虎衛中峙啓運山扶輿氣蟠際天柱冠日紅隆業翼雲翠崇阜開穹窿靈源瀉溶㵝鴨緑展澄波松花漾晴黛滙為滄海流三江集一派戸牖亘八荒通日􅙡月竁我烈祖神宗大徳受命致佑啓迨文孫景祚無疆嗣慶緒下武成駿業思文契肅肅瞻三陵巘原發蔚寶城列焜煌神樹敷藻繪周環柏殿重曲遶松岡邃赩如雲鬱蓊隱若虹暎蔽石馬嘶靈風仙仗排幽隧寢園弓劍遺原廟衣冠閟奕奕璋組珍燦燦球刀器萬靈永䕶持藏之古珠寺皇帝曰祇哉周潔馨香治祠官辨祠儀祝史陳祝事珪瓉秬鹵釐騂剛白牡備磬筦和神聴籩豆樂神嗜三獻洞屬承百辟鏘洋侍萃假告有䖍觀孚惕若思一氣通昊穹升薌上京至氤氲繞嘉壇載奠清寧位巍然太室崇坤戸乾維配彤暉朝羃甍寶霧晝凝砌皇家茅土風太樸昭有自曼碩古所云曾何侈塗塈翼我九廟儀眷念蘿圖繫皇帝曰欽哉册寶昭符制瓊版披秘緘鴻文煥前製鏤以璆琭姿盤以螭蛇字襲以九華錦藉以六采􅖯榮光蔭星輝竒彩錯霞緻廼命天室宗佐以司空使丹祊偹敬登諏吉奉金匱東來納紫宫璀璨琳扄祕奕葉珍守傳垂光曷有既皇帝曰懋哉崇政政乃蒞上座黼扆陳中逵諫木置大開王㑹圖羣牧朝次第華纓朱綬駢一一輝雲系南端麟族振左墄鸞儀值霞漿八琅璈諸部霑慈惠底貢羅林鶼稱賔集冠鯷朝鮮職外藩修䖍介陪貳占香逺來賀敬奉琛與幣折風紗幘昂廣袖朝衫曳肆覲趨彤墀舞蹈攄葵志有詔嘉乃王纁組元黄施垂訓庸作歌寵以天文賜捧歸東海壖萬文奎光麗賡歌逮外臣乃效颺言義化矣九服覃心乎一人載方今文軌隆兩儀極經緯函玉太霄九囊珠酉山二傑閣標崔巍溯淵源津逮三萬六千册琳琅曡庋寘諸天羣宿羅大海衆鱗比圖籍冠古今雲章仰光被騫藻虯鸞紛振響鐘鐄儷往蹟敷覲揚來兹切昭示天書鶴禁承寶帙慎排次皇帝曰烝哉迪我前光企薩爾滸之戰耆定元功始當時揮天戈一躍十萬騎連營大纛張落日清笳吹梯衝相鉤連破竹挾全勢衮衮褒鄂徒登壇建魁帥赫若雲雷轟盪若山岳銳四部收鋋矛三路覆甲鎧舊壘懸蒼崕古戍積遥靄至今望闗門英風颯干代磨厓大書碑淋漓壯元氣羲畫凌青旻永鎮横雲塞皇帝曰溥哉褆福大介賚懷柔先百神喬翕周頌誌維朔方作鎮長白鍾靈最屹彼醫巫閭鉅屏矗幽薊遼河抱渾梁沆漭鴻波漬湛海浮神光髣髴雲旗翳霛静畢除雰牲沈玉􅔑祭爰修報功典茅社遺榮賁亦有佐命勛沾芳玉醇酹茂氣恢皇輿盤桑釐宸計金城十八區交縈澗瀍㑹營隍豐靖宜和顧頒官費羅羅版籍陳什伍列輔司劭農發蠲符常科貸租税鳩杖讙交騰雞竿赦並肆有秩横舍生挾策翹㑺乂以類宏三升以次勞七萃匪惟斥邏嚴考牧勉思肄遂循大射儀營門仰躬試敬守家法垂毋忘弧矢利盛澤周春翔駕言返星轡陟降循原陵嘉氛颺靉霼齋房福草駢鬯室神芝綴還告奉先殿慶成紹鴻懿受釐介以繁繼序昌而熾入賀聯鴛行華光動紳佩小臣道南邦徧聴驩聲沸天子勤六廵抃首龍綸沛望幸慶洽寰作求徳延世景命孚上蒼曼夀祝無艾頌揚萬斯年洪惟古稀帝欽定盛京通志巻一百二十
