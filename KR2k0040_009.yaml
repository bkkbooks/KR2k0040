body:
  text: 欽定四庫全書欽定盛京通志卷五聖製五聖祖仁皇帝御製詩文碑頌祭文記詩欽定四庫全書欽定盛京通志卷五聖製五聖祖仁皇帝御製詩文碑頌福陵神功聖德碑文惟天眷祐下民綏靖方域篤生我皇曾祖太祖髙皇帝肇興東土奮師一旅式闢皇圖大武布昭深仁洋溢用造我國家萬億年丕丕基駿德鴻功於爍顯懿駕軼亘古豫小子纂承洪緒既奉冊寶崇上尊諡載緝徽猷炳垂方䇿惟陵寢宜有功德之碑敬述大略永勒貞珉叙曰太祖承天廣運聖德神功肇紀立極仁孝睿武𢎞文定業髙皇帝姓愛新覺羅氏諱先世發祥長白山之陽禎符神貺歷著休徴至皇始祖肇祖原皇帝式廓舊業寢熾寢昌又五傳至顯祖宣皇帝世濟其勤流長積厚景運懋集神器攸歸誕啓我太祖髙皇帝顯祖之長子也宣皇后娠十有三月乃生龍顔鳯目豐頥大耳天表玉立舉止非常少不飲酒嬉戲稱為聰明貝勒及長騎射絶倫雄略蓋世用兵無敵而又至誠御物大度容人先是有望氣者言滿洲將生聖人統一諸國至是滿洲長白山及東海呼倫諸部落爭相雄長癸未春蘇克素護河部圖倫城有尼堪外蘭者陰搆明軍首逞大難於我時太祖二十有五泣血誓師枕干問罪以遺甲十三副攻尼堪外蘭克圖倫城復攻之於嘉班誅諾密納鼐喀達取薩爾滸城時異已猜忌包藏禍心伺間竊發天威所攝罔弗獸驚鳥散遂俘兆嘉城長理岱取瑪爾敦平定棟鄂哲陳渾河等部丙戍秋擒斬尼堪外蘭於鄂勒歡城戎首服辜先聲震叠環璄諸國相繼削平既而葉赫哈達烏拉輝發科爾沁國錫伯卦勒察珠舍哩訥殷路九姓之國合兵三萬人分道來侵偵者夜告太祖皇帝安寢達旦蓐食濟師殱其渠首餘部皆潰斬級四千獲馬三千匹鎧甲千副羣方讋服乃增築城墉修飭法制創制國書開金銀礦鐵冶所産蠙珠織皮通厥貿易財用殷阜肇立軍制師律精嚴國勢日盛丙午冬䝉古五部落尊太祖為神武皇帝嵗時朝貢絡繹相望而哈達輝發烏拉數渝盟先後征討悉定其地每當軍行輒見五色雲亘天祥光四塞立奏巨功逺邇翕然益四旗為八設固山梅勒甲喇牛彔額真遞相統轄命佐領下各出牛種屯田積穀貯倉置理政聼訟大臣緩刑慎獄野無剽竊路鮮拾遺國中大治帝業已成貝勒大臣集議勸進丙辰之春正月恭上尊號曰覆育列國英明皇帝建元天命時年五十有八越二年定䇿征明明政久弛棄絶和好援我仇讐蕩搖我邊陲於是誓告有衆類帝禡旗而行遂入撫順降臺堡五十所繼下清河明大舉稱兵㑹於瀋陽號四十七萬張左右翼左翼以杜松王宣趙孟麟張銓由渾河出撫順關馬林麻岩潘宗顔由開河合葉赫兵出三坌口右翼以李如柏賀世賢閻鳴泰由清河出鴉鶻關劉綎康應乾合朝鮮兵出寬甸口向棟鄂四路來侵太祖皇帝分精騎奮擊大破其衆五日而悉殱之城界藩取開原破鐵嶺滅葉赫五年克遼陽瀋陽定議建都始築東京尋取廣寧拔撫順十年遷都瀋陽由是東漸海西迄遼南及朝鮮北暨嫩江烏龍江以至使犬諾壘諸路罔不臣服太祖皇帝神武天錫决幾制勝變化若神每戰輒單騎深入裹創斬馘神色不動善駕馭材雄推心置腹撫納降附棄捐忿隙恆豫擢用法所當坐雖親昵罔所私攻拔城邑嚴禁軍士安輯居民是以羣䇿競奮率土思歸御極以後拓地開疆日不暇給而躬勤於聼覽留神於載籍修德納諌親賢逺奸建二木於門俾下情欲達者書之以進尚寬大崇節儉睦宗親厚風俗重農桑賑窮乏垂示典訓蕩平正直允為萬世法程猗歟盛哉天命十一年八月庚戍崩聖夀六十有八在位十有一年天聰三年二月己亥葬福陵天柱山崇德元年四月上尊諡承天廣運聖德神功肇紀立極仁孝武皇帝廟號太祖康熙元年四月加上今諡嗚呼有明德裒海宇板蕩之時生民顛隮之㑹我太祖皇帝應運蹶生手提天戈披榛辟萊櫛風沐雨掃邉陬如破竹定遼左若建瓴戡亂求寧非富天下功極於配天道隆於昌後歷稽曩代創業垂統之君未有邁此締造憂勤經綸宏逺者也瞻赫濯之如新撫承平之永賴歌思光烈曷罄名言謹拜手稽首而作頌曰天造大邦勃興東極長白山髙苞符開闢􅜈鳥生商履武誕稷奕葉炳靈肇基王迹太祖龍飛旋乾轉坤齊徽炎昊比烈羲軒時惟草昧陟巘降原一成奮起雷動雲屯蠢爾仇方敢作牙蘖赫斯一怒恭行天罰寢甲枕鞍神勇迅發巨憝授首戎心式遏竒謀倜儻逺略深沉內搆者挫外訌者擒單師十百摧破强鄰九邦潰糜四路掃塵擕二則誅歸誠則撫義問宣昭仁恩施普大畏小懷實揚我武來庭來王日闢疆土疆土既闢厯數在躬膺圖受籙響應景從三才協軌百靈潛通指揮蕩滌振落發䝉覘敵烏集濟師氷泮夾日貫月卿雲糾縵不義是征功成惟斷秉銊稱干帝心厭亂環山負海風靡雲披朱旗疾捲汗馬爭馳後我思恫歌舞迎師紀元頒朔建䇿開基爰立軍營森羅鵝鸛步伐止齊井牧相扞爰建國都屹峙屏翰扼吭拊背皇居攸煥爰命分職朂哉臣鄰爰慎折獄恤哉祥刑爰達民隱鞀鐸重陳爰置國書科斗是新訏謨孔彰風規渾噩禹誓湯征千秋繼作聲靈覃敷東西南朔大統乃膺新命乃廓既詒既翼如鎬如豐九圍是式萬國來同卜年卜世惟太祖功巍巍蕩蕩昭恪蒼穹右享郊壇敷時思繹炳耀圖書輝煌球璧景瞻福陵神邱是若百川縈朝羣山拱掖葱蘢王氣松楸鬱蒼玉衣永鎮弓劍長藏億載顧慕春露秋霜樹兹穹碑錫嘏無疆福陵頌并序惟上帝鑒觀下民誕畀神聖俾立君極以開闢草昧垂統億祀非甚盛德曷克應天順人而締造鴻業焉我太祖髙皇帝聰明睿知本為性生英武勇略逈不世出故能躬著戎衣手提尺劍而疆宇日拓丕受景命顯庸東國騰威區夏雖太王之居岐剪商文王之江漢歸化未足方斯赫濯也豫小子仰荷列聖丕基統御萬國昄章式廓隆古圖籍所莫覯矣然上跡聖祖當日一成一旅櫛風沐雨斬刈荆棘張彼撻伐順者綏之逆者殄之統一羣部建元正位國始立焉既乃鞠旅徂征遐邇讋服悉臣悉氓遂定鼎遼土而王業愈光顯矣於戲盛哉惟天生聖惟聖奉天我太祖創業之艱如彼而垂統之逺如此豈非天實授之而克荷厥休者哉豫小子景仰謨烈奚敢忘紹述焉爰作頌曰於昭太祖誕膺景命允文允武體協仁聖天罰恭行赫然割正啓疆東海聿懷兆姓戰罔弗克威略如神德罔弗冒桀驁咸臣受籙踐阼帝厯鼎新建官立制王路丕遵爰誓六師濯征明國以少擊衆羣醜胥殛長驅鐵嶺墮彼扼塞茫茫遼藩𨽻我版域㑹極歸極乃建皇都大統肇跡炳垂帝謨在昔湯文蹶起一隅先聖後聖同軌合符皇哉龍興山川孔固寢園崔嵬風雲盤互玉衣鐵甲百神衛護仰頌先猷萬年錫祚昭陵神功聖德碑文天以神器畀我國家洪惟皇祖太宗文皇帝智勇神聖光昭太祖髙皇帝丕緒帝紘皇綱是廓是恢幹不庭方搆造鴻業垂裕皇考世祖章皇帝大一統之基貽億萬䙫無疆之休維豫小子纘承聖緒念陵寢宜有功德之碑敬勒貞珉昭示無極叙曰太宗應天興國𢎞德彰武寬溫仁聖睿孝隆道顯功文皇帝諱太祖承天廣運聖德神功肇紀立極仁孝睿武𢎞文定業高皇帝第四子也母孝慈昭憲敬順慶顯成天輔聖高皇后生而神靈徇齊明敏龍行虎步顔如渥丹嚴寒不栗舉止非常太祖皇帝特鍾愛焉既長英武豁達孝弟恭敬慈愛和順秉心寬宏好觀書史一有聞見終身不忘沉機果斷羣望攸屬天命十一年八月太祖皇帝升遐諸貝勒大臣咸推我皇祖才德冠世宜纘承帝業以九月朔嗣登大位建元天聰時年三十五踐阼之後愛養人民撫綏中外崇儉務本修政任賢仁聲義問無逺弗届除慝討二用整六師乃擊䝉古執一十四貝勒奏凱八纛下乃征朝鮮克義州進拔漢山城入安州抵平壤朝鮮王李倧遁江華島遺其弟覺來行成遂盡反所收地與盟而還乃征察哈爾翦多羅特部落編俘獲為氓乃伐明自遵化臨北京略良鄉斬其將滿桂孫祖夀擒其將黑雲龍麻登雲還拔永平乃拔大凌河降其將士於是孔有德耿仲明等航海來歸乃征黑龍江瓦爾哈下之察哈爾舉國來附獲歷代帝王傳國之寶天聰九年冬羣臣勸進尊號皇祖辭讓冉三明年四月表上尊號曰寬溫仁聖皇帝建國號大清改元崇德告於皇天后土追王列祖上太祖髙皇帝髙皇后尊諡羣臣咸上表賀乃錫宴肆赦是年朝鮮毁盟討之拔其都載飛舸於車凌江華島李倧自縳請為臣釋之還并歸其俘獲朝鮮感服勒石南漢以銘勳德遂帥水師渡海克皮島既而大出師遣將毁關入分左右翼由涿州略地至山西界復自寧清渡河破濟南克城四十有九降者八與明兵五十七戰皆捷六年圍錦州入其郛洪承疇以兵來援皇祖陳師於松山杏山之間明兵號十三萬望見皇祖張黃蓋往來指揮皆懼謀夜遁我師分道爭擊連大破之擒承疇降祖大夀錦州松山杏山塔山悉下又命將入關破兖州東抵寧海克城八十有八降者六陳敗明兵者三十九於是天戈所措罔不率俾黃河之源青海之濵使犬役鹿之國來賓恐後野駝奇獸黑狐紫貂重譯來獻聲教之逺功烈之盛古未有也嗚呼惟我皇祖克配天心誕膺景命聰明睿知神武不殺懷柔以德燮伐以威大勳用集大猷是程無有內外乃罔不即叙親九族正百官修明典章誕敷政教隆郊丘廟祀之儀定頒厯朝㑹之禮辨鹵簿旗章服御之制聲名文物炳然宏備釋奠孔子以四子配立文館譯書史於翔鳯閣俾儒臣記注得失開科目取士諭臣下盡言無隱論功封兄弟子姪為諸王貝勒外藩䝉古亦論功封爵有差優禮降臣寄以心膂賞罰詳明斷獄平允綱舉目張仁至義盡至於審制度定律令斥邪術禁喪祭踰禮者務農桑廣漁獵以豐民食皆可為萬世法凡勤勞國事者賜豫必優渥召近臣入宫日至冉三講論政事以賓禮遇之諸國新附之人入見必詢其姓名世系慰勞如舊識天語藹然以故雖至難馴者無不悅服如薩哈爾察卦勒察瓦爾喀瑚爾哈諸國素不及禮亦貢獻稱臣其貝勒大臣至俱恩遇之如子弟故其部落降者相繼嘗念中原生民塗炭欲與民和好惟務修德不樂觀兵屢貽書明邉帥曰朕意在講和不忍無辜赤子慘罹鋒鏑明之君臣置若罔聞致煩天討每出師必諭諸將授以兵律嘗曰明之土地人民天以與我是民即我民也故師行雖嚴寒不入屯堡士卒死傷弔問不遺每戰勝攻取符瑞駢集必曰上天眷佑惕然祇懼克敵告於廟蓋敬天尊祖勤民若是其至豐功厚澤與天地等有國史所不能盡書者矣以崇德八年八月庚午崩聖夀五十有二在位十有七年九月壬子葬昭陵隆業山嗚呼八音遏密萬國感痛實惟至德深仁為生民主以宏我國家之大寶命愾僾見聞陟降庭止謹述盛概拜手稽首而系之以頌曰於赫皇祖纘太祖之緒誕敷乃文孔奮厥武整我師干拓我疆土東奠朝鮮西讋䝉古二則獲之服則釋之降則憐之賢則臣之有言遜志則必遏之有言逆耳則必納之治分六曹職統三院筆簪史臣書譯文館與神為謀以古為鑑制禮明刑儀章是憲一人有慶肇域四方四方來王自天降祥和鸞鏘鏘旗旐央央聿昭茂祉焞耀章光乾符效珍坤儀開奧既協靈圖誕升顯號濟濟師師羣工舞蹈厯數攸歸謳歌前導乃禋乃祀於廟於郊乃燕乃射於野於朝乃赦乃宥於犴於牢乃漁乃獵於狩於苖乃命紫宫清寧正中麟趾在右關雎在東崇政篤恭翔鳯飛龍文德武功以綏萬邦松山之陰杏山之下戰士連營崇墉百堵取彼元戎繫之以組肅將天威救民水火屹屹榆關王旅所征而幽而并而冀而青而兖而徐克其百城涉河踰濟及于東溟時乘以乾帝出乎震罔有遐邇民莫不信或獻其琛或輸其賮河源海壖協靈效順有典有則貽萬子孫言為邱墳績嫓農軒佑我皇考大啓幅員允皇祖之德皇祖之勳瞻仰昭陵在盛京之北雲霞所棲松柏所植有穹者碑昭宣世德茀祿來崇時萬時億昭陵頌并序國家垂厯服無疆之休類必有神聖開天肇興王業又必有神聖繼體式廓鴻基故能經綸宇宙積功纍仁保世滋大我太宗文皇帝挺濬哲之資藴欽明之德紹膺寶位纘前謨而光顯之外奮威武內修文教百度具舉臣民胥悅於是南征則墮巖關繞明都耀兵燕趙鞫旅齊魯投鞭渤海飲馬黃河六師安行莫我敢遏東征則誅二綏服朝鮮納欵列為屏藩西征則三十五部厥角歸命貢賮奉朔蓋其允塞之猷桓撥之略赫濯於覆載間矣乃若惇九族惠元元郊圻以飭爵秩以班賞善宥過優禮勳舊求賢之思若渴崇儒之化丕隆雖古帝德廣運曷以加焉當是時義問炳耀仁風翔洽一統之規已裕矣猶畫境息民俟天休命於戲皇哉盛哉昔殷祥長發而湯受之周室本支百世而文啓之我皇祖詎有遜美豫小子嗣承丕緒撫安海㝢以𢎞億萬䙫之業紹述祖德敬揚先烈乃作頌曰猗歟皇祖克配彼天光被四表仁汜八埏既受共球神人攸主至治洋洋𢎞謨訏訏桓哉七萃撻彼南疆匪疚匪棘兆人是匡徂征朝鮮爰渡鴨緑聲其携二綏其臣屬西荒千帳慕義同歸鐘鼓始振稽顙莫違至化覃敷函夏率育天錫大寶景命有僕曰崇儒雅曰叙彛倫五章五用式迪俊民法度孔昭典常聿正嫓美唐虞惟后克聖建中錫極貽我後昆皇皇大烈億祀彌尊肅望山陵光華燀赫永言垂裕敬承靡斁北鎮廟碑文醫巫閭屹峙東北為幽州巨鎮昔虞帝封十有二山此其一也穹崇磅礴靈瑞所鍾實護王氣以壯鴻圖與嶽瀆諸神並垂祀典朕省方問俗嘗過其境望其佳氣鬱鬱葱葱上插霄漢下瞰蓬瀛懸瀑飛流喬松盤蔚知其所以保障而凝休者蓋有素矣向錫匾額式展褒崇而廟貌未隆無以昭顯特勑修造遣専官以恪乃事凡所需給皆頒自內府始於康熙四十五年七月訖於本年十一月不四月而告厥成功焉規制宏備輪奐維新紺宇琳宫照耀山谷於時臣民瞻仰罔不欣悅而府尹臣奏請謂宜光文翰勒諸貞珉朕御極以來勤恤民隱祗奉天庥敬共神明罔敢稍斁維此鎮之奕奕為神京之翊輔嘉符凝集靈爽式慿神其永贊雍熙益𢎞福祐錫蕃昌於庶類固丕祚於萬年用慰朕精䖍之至意爰樹穹碑書重修嵗月以示來兹忠直公伊爾登碑康熙六年稽古建業驅䇿羣力不吝爵賞以待有功故生勤寵錫殁與表揚干城心腹有傳不朽所以勵忠蓋甚備也爾二等伯內大臣加一級伊爾登賦姿義勇制行忠直蚤涖戎行才猷素著其征北京圍錦州等處或越衆先入或設伏出竒以少勝衆屢敗敵兵克副任使優奬膚功歷事纍朝公忠允𢡟於其沒也朕深悼焉特賜諡曰忠直勒諸貞珉光及泉壤國典臣誼庶其昭垂無斁哉多羅勇壯貝勒穆爾哈齊碑康熙十年自古帝王承天撫世篤念宗親故生則賜以榮封殁則彰以令德典至渥也爾青巴圖魯穆爾哈齊係宣皇帝之子秉性安詳居心愷悌已進封為多羅勇壯貝勒奄逝既久豐碑未樹朕念切本支復隆表著之恩爰稽成憲勒之貞珉用傳不朽庶昭朕敦族之心永為藩屏之懿典云爾剛毅輔國公達爾察碑康熙十年自古帝王創業垂統以貽萬世凡屬宗支皆膺顯號以重懿親也爾達爾察係諡勇壯青巴圖魯穆爾哈齊之子性行純良才猷敏練已封為剛毅輔國公奄逝既久豐碑未樹朕篤念宗親爰稽成憲勒之貞珉用垂不朽庶昭朕敦睦之懷云爾頴親王薩哈璘碑康熙十一年自古帝王創業垂統必懋建本支以作藩屏故生隆顯爵歿錫豐碑親親賢賢典甚重也爾薩哈璘貝勒負姿忠亮中外所推膚功屢建甲胄躬擐努力行間職司邦禮盡心典則益著寅清洵百代所當瞻仰者也擬封多羅郡王忽然長逝太宗文皇帝眷爾勳勞追封為和碩頴親王以示隆眷於康熙二年特賜恤典敕建豐碑朕今追念爾前勳加諡曰毅重勒貞珉用傳不朽以示敦睦懿親之意云爾開國佐運勳臣武勳王揚古利直義公費英東𢎞毅公額亦都碑康熙三十九年朕惟國家創建丕基開無疆之景運既篤生神聖英武之君以剪除亂逆啓闢疆宇勘定諸邦一統之盛肇於東土其時則有一德一心之佐殫忠戮力經營四方以翊鴻猷而成大業蓋天實挺生異才鍾山嶽之靈挾風霆之氣真誠不二勇毅無倫名髙百戰之勳位超五等之爵垂聲竹帛配食廟庭以與國家共承休祉子孫世衍其澤是豈偶然者哉當我列祖之隆興也一時人材蔚起猛士如雲戰將如雨以藝勇稱以功名顯者不可勝數而功冠諸臣為一代元勳則有開國佐運忠勇王揚古利直義公費英東𢎞毅公額亦都尤為傑出焉朕嘗恭覽列祖實録考三臣行事折衝行間則戰以勝攻必克平居則矢忠直贊謀畫豐功偉績至今焜耀簡編未嘗不𬗟想英風興懷往蹟昔人創造艱難枕戈擐甲櫛風沭雨之勞恆流連往復不能去於懷也嵗在戊寅朕巡行舊京展祀陵寢追維祖宗功德隆盛并及當時佐命之臣邱隴所在皆遣官致祭而於三臣之墓特親至奠醊以示優崇仍復専官祭享蓋功在社稷以死勤王古人原有明禋之典朕篤勳庸用申異數併為文勒諸貞石以昭示於無窮焉祭文祭遼太祖文康熙二十一年自古帝王受天顯命繼道統而新治統聖賢代起先後一揆成功盛德炳如日星朕誕膺眷祐臨制萬方掃滅凶殘廓清區宇告功古后殷禮肇稱敬遣専官代將牲帛爰修禋祀之誠用展景行之志仰企明靈尚其鑒享祭長白山文康熙三十五年維神天作鍾祥地靈啓運肇基王迹誕錫鴻休朕勤恤民依永期殷阜邇年以來郡縣水旱間告年穀歉登蚤夜孜孜深切軫念用是専官秩祀為民祈福冀雨暘之時若庶稼穡之屢豐惟神鑒焉祭告北鎮醫巫閭山文康熙四十二年維神功障遼陽勢連渤海靈威丕赫作鎮北方朕祗承休命統馭寰區夙夜勤勞殫思上理歷兹四十餘載今者適届五旬海宇升平民生樂業見輿情之愛戴沛下土之恩膏特遣専官䖍申秩祀尚慿靈貺益錫蕃禧佑我國家共登仁夀神其鑒焉記御製創興盛京海運記康熙三十六年傳曰補乏薦饑道也朕孜孜圖治冀臻上理一夫不獲若納諸隍是以平時謹財用廣委積一遇凶荒則蠲租已責之外開廩發賑設糜平糶靡政弗舉惟是東北地勢曠莽陸挽維艱遼左暨朔漠諸郡尤屬險逺計惟航海轉粟事半功倍規畫於中者非一日矣癸酉冬盛京榖不登民艱於食乃發山東濱海郡縣常平倉米二萬石由登州運至三坌河海運之役自兹始明年二月親幸天津訪海道自大沽口達三坌較便三月命部員董厥事截留山東漕米二萬石用商船三十連檣出津門海若效順三晝夜即抵三坌因建倉遼陽開化城諸處儲峙之又分舟運至盛京米價頓减饑困以蘇朕念盛京根本重地積貯多則民食永足乃於丙子春復截留山東漕米五萬石運至三坌河如故其秋諭截留次年漕米六萬石遣部臣偕督撫造新船二十加運二萬石既又諭增造船十來嵗可運至十二萬石猶慮運船少也明年春諭福建將軍督撫勸導商船泛海貿易至則給以運直所齎貨物止徴正稅一時商賈靡不踴躍趨事海舶大集於是截留河南山東漕米共二十萬石用天津浙閩船前後轉運以達盛京共數十萬有竒適烏拉告饑遂以所運粟分輸伊屯河士卒數萬咸賴生全而是時大兵方進剿逆冦噶爾丹需糧孔亟用以頒給軍需不匱其年冬盛京陵寢各屬兵民及科爾沁諸屬國窮户人等咸以疾苦聞復發盛京存貯米賑之其所濟之逺如此因命來嵗仍自大沽故道用天津船運山東河南漕米六萬石以備軍民之需而商船至是亦弗用矣是役也挽數十萬之粟經數千里之遙帆檣一集倉庾俱滿無踰關度嶺之勞絶車載牛牽之苦波委水輸禾囷自轉賑陪京而人民胥樂給軍需而庚癸不呼內以撫綏藩部外以摧滅强冦皆由肇舉海運一法斷自朕衷屢試而效故自侯甸以至要荒均受其賜夫舉一事而有濟於一方者古人尚不敢忘况若兹之費省利大功神惠博使不載其始末垂示簡册將良法美意久而漸失後何所考用是援筆而紀其實云詩聖祖仁皇帝東巡古今體詩康熙二十一年東巡二首并序八年征剿喜見承平𬗟想祖宗功德禮宜躬謁陵廟以告成功爰於二年十五日命駕東巡是日天氣晴和微風動斾從者溢路觀者夾途顧瞻逺邇莫不歡躍賦詩二首昆池不習戰寰宇已銷兵鴻業承匪易膚功久乃成威靈昭祖德展謁慰羣情迢遞關山路寧辭千里行其二順動因時豫東風引翠旗鳴鸞萬騎出執事百僚隨日暖草初茁烟輕栁未絲春風無限好應有上陵詩山海關并序連山據海地固金湯明時倚為險要設重鎮以守之我朝定鼎燕京垂四十年關門不閉既非設險還慚恃德偶賦數言聊以紀事重關稱第一扼險倚雄邉地勢長城接天空滄海連戍歌終嵗苦插羽不時傳作鎮隆三輔征輸困百年笳寒龍塞月甲冷雉樓烟厯數歸王極綱維秉化權漫勞嚴鎖鑰空自結山川在德誠非易臨風更慨然䝉恬所築長城萬里經營到海涯紛紛調發逐浮誇當時用盡生民力天下何曽屬爾家姜女祠朝朝海上望夫還留得荒祠半仞山多少征人埋白骨獨將大節說紅顔曉過寧逺孤城臨巨野舊烈憶西征破壘荆榛滿村雞向曉鳴行殿夜覽奏章飛遞傳來奏牘多旌門莫問夜如何銀燈毳幕春寒重恐是隂陽尚失和吕翁山是聖祖太宗文皇帝擒洪承疇處旌旗直捲陳雲沉濠塹遺踪尚可尋十萬健兒皆解甲一時大帥此成擒民情效順當年事王業艱難聖祖心遂使關西如破竹至今戰氣晝隂森松山鳴笳伐鼓速兵機百勝謀成夜合圍月黑風髙神鬼泣金戈白馬識天威杏山晚眺野日荒荒蔓草平孤村雞犬寂無聲山中獵罷殘陽晚時見髙原夜燒明憩小凌河河水流不息晝夜去涓涓昔為爭戰地今是豫遊年駐馬孤岑外移舟古岸前殘陽下新栁約略見春妍錦州道上野徑臨官驛炊烟出杳冥地連榆塞紫山列錦屏青城郭知何處旌旄只暫停版圖歸大業堠火罷林坰駐蹕大凌河歸騎雲屯向晚過升平笳吹動鐃歌光搖幕火繁星燦影暗旗風野霧多兵氣已消沙右所軍聲猶壯大凌河豐京老將還能說曾記前途自倒戈途次逢寒食何處來春風淡蕩開晴旭不見杏花紅才逢桞梢緑十三山迤邐峯連大道間憑空青削十三山敵樓人散堠臺廢終日茸茸草色閒過廣寧望醫巫閭山名山插霄漢朵朵青芙蓉連亘數十里隱見千百重迢遙不可及黛色堆竒峯窈窕復岝崿鬱鬱多蒼松中有桃花洞杳靄常雲封萬古鎮幽州秩祀同岱宗盼望生引領瞻顧停六龍何時一登覽蕩滌疏心胸渡句驪河野岸春蕪發青葱一色齊皇輿連近逺地軸别東西日送霓旌影風催駿馬蹄山河綿帶礪回首重低迷過永安橋口占夾路飛塵宿雨消十年曾此駐龍鑣春風城闕知非逺幾處輕寒變桞條盛京遣使請太皇太后皇太后起居夜書奏疏畢偶成雲山遙隔萬安宫定省心懸午夜中孺慕經時書不盡微誠憑仗與東風三月初六日告祭福陵恭述十韻瑞靄鍾靈闕晴烟繞閟宫萬山皆拱北百水盡洄東夭矯盤峯秀紆回磴道通俯看環衆象遙睇極髙崇松柏丸丸直岡巒靣靣同恢𢎞思祖烈建樹本神功戰術無前略謨謀啓後衷揮蛇曾握劍定鼎有遺弓展禮威儀整申誠爼豆豐車書叨繼統藐爾愧微躬初八日告祭昭陵恭述十二韻盛德兼三代威名定四方文謨真顯赫武烈實飛揚包并收羣國虛謙集衆長網羅來俊彥締造闢洪荒卜世周垂厯開基漢啓疆靈山佳氣逈寢廟瑞雲張曠逺臨平陸幽深逼上蒼汗嘗趨石馬歌欲奏芝房洱海銷兵戰炎陬絶叛狂功成昭默佑告祀肅誠將微念通層構含情望兩廂千官遵大典進退盡鏘鏘盛京舊宫雙懸鳯闕隱金鋪想見龍飛握瑞符殿列丹霄崇大政宫開紫極接神區君臣際㑹風雲日版籍留存山海圖堂構有懷追往事土階儉朴示規模告祀禮成宴諸臣於舊宫閶闔門開玉座春金支遍插綺筵新鏗鏘劍珮千官集曼衍魚龍百戲陳功定舞干歌靖亂恩留過沛樂同民大風猛士何煩憶仗下班聨絳灌臣三月十一日雪中詣永陵告祭峯巒疊疊水層層王氣氤氲護永陵蟠伏諸山成虎踞飛鶱衆壑佐龍騰雲封草木橋園古雪擁松楸輦路升一自遷岐基盛業深思遺緒愧難承薩爾滸并序太祖高皇帝嘗駐師於此以五百人破明四路兵數十萬衆殱杜松於鐵背山遂有遼東實帝業之所由基也城成龍躍聳重霄黃鉞麾時早定遼鐵背山一名斡琿鄂謨前酣戰罷橫行萬里迅飛颷春搜講武乘時令戈殳訓甲兵雲梢催後騎天罼引前旌華甸軍容整新林羽衛行岐陽嚴示禮莫使廢春耕栁條邊望月雨過高天霽晚虹關山迢遞月明中春風寂寂吹楊栁搖曵寒光度逺空望祀長白山名山鍾靈秀二水發真源翠靄籠天窟紅雲擁地根千秋佳兆啓一代典儀尊翹首瞻晴昊岧嶤逼帝閽松花江放船歌松花江江水清夜來雨過春濤生浪水叠錦繡縠明綵帆晝鷁隨風輕簫韶小奏中流鳴蒼巖翠壁兩岸橫浮雲耀日何晶晶乘流直下蛟龍驚連檣接艦屯江城貔貅健甲皆鋭精旌旄映水翻朱纓我來問俗非觀兵松花江江水清浩浩瀚瀚衝波行雲霞萬里開澄泓江中雨望烟雨連江勢最竒漫天霧黑影迷離掀翻波浪三千尺疑是蛟龍出沒時輕葉赫廢城斷壘生新草空城尚野花翠華今日幸谷口動鳴笳鐵嶺雨餘塞草自緑日出山花更紅轍迹神州近逺驥鳴廣陌西東雜詠古戍行來日落孤村坐對月明漠漠龍沙千里桓桓虎衛三更巡幸遼陽肅將軒駕向遼陽暖日晴薰百草芳照野山川皆動色掀天旌斾自生光林間蒼蘚侵人徑城上新花綴女墻欲問襄平舊郛郭千年華表鶴飛翔駐蹕遼陽夜深對月用唐太宗遼城望月詩原韻夜氣澄炎景清光度海碣流雲漸稀朗繁星粲如綴蟾殿魄初明氷輪影未缺懷古聽行漏素心良藴結曠然望九霄妖氛盡殄滅廣祐寺禪宫多嵗月瑞塔積風烟翡翠苔碑暗珠璣寶相傳馴簷來紫鴿湧地出青蓮微雨輕埃洗兹晨興獨偏寺創於唐特中有自來佛像入千山曉入千山路烟光織翠蘿﨑􅋂緣石磴宛轉厯巖阿樹杪朱旗出藤隂玊勒過物華看亦好景色愛清和祖樾寺青山橫古寺羽斾陟層巔地僻茅堂小橋危石徑穿夏條含嫩葉春色發餘妍寂寞空林午時聞鐘磬傳龍泉寺狹徑才容騎香臺欲起龍懸崖千仞落斷碣百年封泉細通幽壑庭深暗古松臨髙一騁望積翠靄重重聖祖仁皇帝東巡古今體詩康熙三十七年入烏拉境蒼山岌業路綿延野燒荒原起夕烟幾㸃寒鴉宿枯樹半灣流水傍行㫋松花江網魚最多頒賜從臣松花江水深千尺捩柁移舟網親擲溜洄水急浪花翻一手提綱任所適須臾收處激頽波兩岸奔趨人絡繹小魚沉網大魚躍紫鬛銀鱗萬千百更有巨尾壓船頭載以牛車輪欲折水寒氷結味益佳逺笑江南誇魴鯽遍令頒賜扈從臣幕下傳薪遞烹炙天下才俊散四方網羅咸使登巖廊爾等觸物思比託捕魚勿謂情之常泛松花江源分長白波流迅支合烏江水勢雄木落霜空天氣肅旌旄過處映飛虹閲窩集并序古松林數十里䕃翳無際非亭午夜分不見日月松林黯黯數十里罕境偏為麋鹿遊雨雪飄蕭難到地啼烏野草自春秋駐蹕烏拉之船厰憶壬戍春夏巡行此地每五日一奏請聖祖母太皇太后安今不可得矣書志慨慕曾問慈寧草奏箋夜張銀燭大江邉重來往事俄追憶轉眼光隂十七年烏拉山間古木灌莽澤潦遍野即黃龍府之地也今人未暇詳考賦詩二首層岡翳薈亂高低駿馬迎風不住嘶磧裏草深行潦濶遲回應惜錦障泥其二路轉山環雜古柯覆茅苫舍傍坡陀疆隅湮沒遼金界虎穴鷹巢處處多行圍所經輝發葉赫哈達諸地皆我祖宗之所開并遺跡存焉賦詩二首鐵馬金戈百戰時戎衣辛苦首開基榻邉鼾睡聲先定始布中原一著棋其二垣墉遺跡尚山坳略地平城闢土茅蕩滌塵沙真不易仰思遺烈駐雲旓興京靄靄興王地風雲莫可攀瀠洄千曲水盤疊百重山瞻拜陵園肅凝思大業艱蘢葱松柏茂瑞鳥滿林間駐蹕奉天府四海為家日鳴鑾過舊京新豐安可並若水事堪并城市風猶古絃歌化漸行巍巍城闕在往嵗幾經營渡遼河雪霽寒光已合氷雁行飛處曉天澄初冬欲盡歸程疾回首烟光望二陵廣寧道中漠漠寒雲色戍樓終日閒饑烏號曉月路出十三山所過松山杏山大凌河皆聖祖用武之地有述松杏山頭野草黃朔風凄緊下前岡雲屯虎旅新行在地著龍興古戰場壁壘尋來餘氣色田疇耕處拾刀鎗恢𢎞聖緒存遺跡東海洋洋祖德長賜寧古塔將軍巴海并序鎮守寧古塔等處將軍巴海豐沛舊臣疆場重寄宣威布德招徠逺人朕甚嘉焉爰賜篇章以旌乃績夙簡威名將略雄高牙坐鎮海雲東旌麾到處銷兵氣壁壘開時壯武功盡使版圖歸化日逺教邉徼被皇風酬勳世錫丹書重勉爾長思報國忠欽定盛京通志卷五
