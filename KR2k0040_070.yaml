body:
  text: 國朝人物二宗室諸王欽定四庫全書欽定盛京通志巻六十六國朝人物二宗室親王睿親王多爾衮太祖髙皇帝第十四子也生而聰慧多智謀畧絶人天聰二年三月與弟多鐸從太宗征察哈爾大捷振旅還瀋陽於途中大宴羣臣以多爾衮初從征即有功喜甚特賜號墨爾根岱青貝勒三年九月從伐明逼燕京擊敗明袁崇煥祖大夀援兵二萬五年八月隨太宗攻克大凌河是年初設六部命掌吏部事六年五月畧明歸化城黄河一帶降其民七年六月多爾衮陳伐明之策曰宜乘春時整士卒待我耕種既畢彼穀將熟入邊直逼燕京截其援兵殘燬屯堡因糧於敵為乆駐計可坐而待其斃也八年五月從太宗伐明分道入邊畧朔州至五臺山而還九年六月獻伐明所獲山西俘並所收察哈爾全部崇德元年四月以功封和碩睿親王八月伐明率右翼兵由錦州入十二月從征朝鮮别從容甸路取昌州敗敵衆克江華島三年二月監築遼陽都爾弼城七月更定各衙門官制十月授奉命大將軍與岳託分道伐明分兵八道長驅北京迤西千里將卒皆潰畧地至山西界復東趨臨清破濟南克城四十餘十七戰皆捷賜馬五匹銀二萬兩六年六月代濟爾哈朗圍錦州敗其援兵八月明經畧洪承疇以兵十三萬來援軍容甚盛太宗聞之親統大軍渡遼河疾馳六日至七家堡多爾衮請進軍駐松杏之間太宗從之明松山諸將見黄幄羽葆軍逼山而營大懼謀夜遁多爾衮率兵趨塔山大路横擊之潰兵沿山至海死者相枕藉明總兵呉三桂等單騎奔入杏山乃率兵還七年三月復與濟爾哈朗圍錦州明總兵祖大夀力竭以城降四月又破塔山杏山關門以東盡入版圖八年八月世祖章皇帝即位代善等集諸貝勒大臣議以多爾衮與濟爾哈朗同輔政先是阿達禮等謀立多爾衮多爾衮與代善發其謀誅之順治元年四月將大舉南征世祖御篤恭殿賜多爾衮大將軍勅印加殊禮錫以御用纛葢時流賊李自成已破燕京明山海關總兵呉三桂遣其將郭雲龍等致書請兵多爾衮以書報之曰我國向欲與明修好屢為致書明之君臣不計國家喪亂軍民塗炭曽無一言相答是以整師三入葢示意於明欲其君臣勢屈而通好也若今日則不復出此惟有底定中原與民休息而已今聞崇禎帝滅於流賊不勝髮指用率仁義之師沈舟破釡誓不返旌期必滅賊出民水火伯遣使致書深為喜悦夫伯思報主恩與流賊不共戴天誠忠臣之義也伯雖向守遼東與我為敵今勿因前故尚復懐疑昔管仲射桓公中鈎桓公用為仲父以成霸業伯若率衆來歸必封以故土晉為藩王國讐可報身家可保世世子孫長享富貴當如河山之永也師次連山三桂復請速進兵多爾衮得書率兵夜馳踰寧逺次沙河距山海關十里三桂報賊已出邊立寨柵多爾衮隨命諸王等率精兵迎擊之敗賊將唐通於一片石師至山海關三桂開關親出迎多爾衮謂三桂曰爾歸營令爾兵繫白布為識恐與賊混致誤殺也使之先驅遂入關時李自成所率賊二十餘萬皆乆厯戰陣殊剽悍恃其衆陣於關内自北山亘海我兵少對賊布陣不能横及海岸多爾衮集諸王貝勒大臣謂曰流賊横行乆獷且衆不可輕擊也吾觀其陣大相去逺首尾不能顧可鱗次集我兵對賊陣尾伺其氣衰突擊之必勝努力破此則大業成矣勿越伍躁進違節制陣既列令三桂居右翼之末先悉其衆搏戰賊力鬭圍開復合戰良乆我兵從三桂陣右突出衝賊中堅萬馬騰躍飛矢雨墮天大風沙石飛走擊賊如雹自成方登髙岡觀戰知為我兵膽俱落急策馬下岡走我兵無不一當百追奔四十里賊衆大潰自相踐踏僵尸遍野溝水盡赤自成奔還京師乃以馬步兵一萬𨽻三桂追賊向北京多爾衮與諸將誓曰此行志在滅賊救民以安天下勿殺無辜掠財物焚廬舍不如約者罪五月整兵入燕京以帝禮𦵏崇禎帝發喪三日遣武英郡王阿濟格等分道追自成連破之自成走西安燕京附近各城俱納欵畿輔肅清山東山西以次悉定乃定議迎世祖都燕京時明南京諸臣擁立福王朱由崧稱帝號其大學士史可法督師揚州多爾衮欲招之使降令南來副將韓拱薇等賫書致可法曰予向在瀋陽即知燕京物望咸推司馬後入關破賊得與都人士相接識介弟於清班曽託其手勒平安拳致衷緒未審以何時得達比聞道路紛紛多謂金陵有自立者夫君父之讐不共戴天春秋之義有賊未討則故君不得書葬新君不得書即位所以防亂臣賊子法至嚴也闖賊李自成稱兵犯闕手毒君親中國臣民不聞加遺一矢平西王呉三桂介在東陲獨效包胥之哭朝廷感其忠義念累世之宿好棄近日之小嫌爰整貔貅驅除狗䑕入京之日首崇懐宗帝后諡號卜𦵏山陵悉如典禮親郡王將軍以下一仍故封不加改削勲戚文武諸臣咸在朝列恩禮有加耕市不驚秋毫無擾方擬秋髙氣爽遣將西征傳檄江南聫兵河朔陳師鞠旅戮力同心報乃君國之仇彰我朝廷之德豈意南州諸君子茍安旦夕弗審事機聊慕虛名頓忘實害予甚惑之國家之撫定燕都乃得之於闖賊非取之於明朝也賊毁明朝之廟主辱及先人我國家不憚征繕之勞悉索敝賦代為雪恥孝子仁人當如何感恩圖報兹乃乘逆寇稽誅王師暫息遂欲雄據江南坐享漁人之利揆諸情理豈可謂平將以為天塹不能飛渡投鞭不足斷流耶夫闖賊但為明朝祟耳未嘗得罪於我國家也徒以薄海同仇特伸大義今若擁號稱尊便是天有二日儼為勍敵予將簡西行之鋭轉斾東征且擬釋彼重誅命為前導夫以中華全力受制潢池而欲以江左一隅兼支大國勝負之數無待蓍龜矣予聞君子之愛人也以德細人則以姑息諸君子果識時知命篤念故主厚愛賢王宜勸令削號歸藩永綏福祿朝廷當待以虞賔統承禮物帶礪山河位在諸王侯上庶不負朝廷伸義討賊興滅繼絶之初心至南州羣彥翩然來儀則爾公爾侯列爵分土有平西之典例在惟執事實圖利之輓近士大夫好髙樹名義而不顧國家之急每有大事輒同築舍昔宋人議論未定兵己渡河可為殷鑒先生領袖名流主持至計必能深惟終始寧忍隨俗浮沈取舍從違應早審定兵行在即可西可東南國安危在此一舉願諸君子同以討賊為心毋貪一身瞬息之榮而重故國無窮之禍為亂臣賊子所笑予實有厚望焉記有之惟善人能受盡言敬布腹心佇聞明教江天在望延跂為勞書不宣意可法遣人報書曰南中向接好音法隨遣使問訊呉大將軍未敢遽通左右非委隆誼於草莽也誠以大夫無私交春秋之義今倥偬之際忽捧琬琰之章真不啻從天而降也循讀再三殷殷致意若以逆賊尚稽天討煩貴國憂法且感且泣敬為貴國一詳陳之我大行皇帝敬天法祖勤政愛民真堯舜之主也以庸臣誤國致有三月十九日之事法待罪南樞救援無及師次淮上凶問遂來地坼天崩山枯海泣嗟乎人孰無君雖肆法于市朝以為泄泄者之戒亦奚足謝先皇帝于地下哉爾時南中臣民哀痛如喪考妣無不拊膺切齒欲悉東南之甲立翦兇仇而二三老臣謂國破君亡宗社為重相與迎立今上以繫中外之心今上非他神宗之孫光宗猶子而大行皇帝之兄也名正言順天與人歸五月朔日駕臨南都萬姓夾道歡呼聲聞數里羣臣勸進今上悲不自勝讓再讓三僅允監國迨民臣伏闕屢請始以十五日正位南都從前鳳集河清瑞應非一即告廟之日紫雲如葢祝文升霄萬目共瞻欣傳盛事大江湧出柟梓數十萬章助修宫殿豈非天意也哉越數日遂命法視師江北刻日西征忽傳我大將呉三桂借兵貴國破走逆成為我先皇帝后發喪成禮掃清宫闕撫輯羣黎且罷薙髪之令示不忘本朝此等舉動振古鑠今凡為大明臣子無不長跽北向頂禮加額豈但如明諭所云感恩圖報己乎謹於八月薄治筐篚遣使犒師亟欲請命鴻裁連兵西討是以王師既發復次江淮乃辱明誨引春秋大義來相詰責善哉乎推言之然此文為列國君薨世子應立有賊未討不忍死其君者立説耳若夫天下共主身殉社稷青宫皇子慘變非常而猶拘牽不即位之文坐昧大一統之義中原鼎沸倉卒出師將何以維縶人心號召忠義紫陽綱目踵事春秋其間特書如莽移漢鼎光武中興丕廢山陽昭烈踐祚懐愍亡國晉元嗣基徽欽䝉塵宋髙纘統是皆于國讐未剪之日亟正位號綱目未嘗斥為自立率以正統與之甚至如元宗幸蜀太子即位靈武議者訾之亦未嘗不許以行權幸其光復舊物也本朝傳世十六正統相承自治冠帶之族繼絶存亡仁恩遐被貴國昔在先朝夙膺封號載在盟府寧不聞乎今痛心本朝之難驅除亂逆可謂大義復著于春秋矣昔契丹和宋止嵗輸以金繒回紇助唐原不利其土地况貴國篤念世好兵以義動萬代瞻仰在此一舉若乃乘我䝉難棄好崇讐規此幅員為徳不卒是以義始而以利終為賊人所竊笑也貴國豈其然往先帝軫念潢池不忍盡戮𠞰撫並用貽誤至今今上天縱英明刻刻以復仇為念廟堂之上和衷體國介胄之士飲泣枕戈忠義民兵願為國死竊以為天亡逆闖當不越于斯時矣語曰樹德務滋除惡務盡今逆成未服天誅諜知捲土西秦方圖報復此不獨本朝不共戴天之憾抑亦貴國除惡未盡之憂伏乞堅同讐之誼全始終之德合師進討問罪秦中共梟逆賊之頭以洩敷天之憤則貴國義問炤燿千秋本朝圖報惟力是視從此兩國世通盟好傳之無窮不亦休乎至於牛耳之盟則本朝使臣久己在道不日抵燕奉盤盂從事矣法北望陵廟無涕可揮身陷大戮罪應萬死所以不即從先帝于地下者實為社稷之故傳曰竭股肱之力繼之以忠貞法處今日鞠躬致命克盡臣節所以報也惟殿下實昭鑒之多爾衮接書知可法不能屈遂定議下江南九月世祖車駕至京師加封多爾衮為叔父攝政王是年冬遣豫親王多鐸南征江南英親王阿濟格西征逆闖十二月河南平二年陜西湖廣及江南平又遣貝勒博洛平浙江福建肅親王豪格平四川於是天下羣盜皆盡五年十二月大同總兵姜瓖叛六年二月多爾衮征之㑹有言喀爾喀將犯邊者乃遣别將討瓖自出張家口擊喀爾喀七年十二月師還至喀喇城薨世祖率王貝勒大臣等迎其喪於東直門外八年二月蘇克薩哈等首告多爾衮薨時其侍女烏爾庫尼將殉呼近侍羅什博爾惠等告以多爾衮曽製八團龍補黄袍等衣屬令潛置棺内羅什等如言以殮又多爾衮欲於永平圏房率衆移駐與和洛㑹等宻議己定特以出獵稽遲未行事聞經王大臣等定議追削王爵並黜宗室乾隆四十三年正月上諭廷臣曰睿親王首先統衆入關定國開基厥功最懋顧以誣告謀逆經諸王定罪除封其時我世祖章皇帝尚在冲齡未嘗親政也朕每覽實録見王之立心行事實能篤忠藎感厚恩深明君臣大義為史冊所罕覯乃令王之身後乆抱不白之寃於泉壤心甚憫焉假令當時王之逆跡稍有左驗削除之罪果出我世祖聖裁朕亦寧敢復翻成案乃實由宵小奸謀搆成寃獄而王之政績載在實録皆有大功而無叛跡又豈可不為之昭雪著加恩復還睿親王封號追諡曰忠補入玉牒補繼襲封照親王園寢制度修其塋墓仍令太常寺春秋致祭並配享太廟原奉載綸諭㫖恭音門豫親王多鐸太祖髙皇帝第十五子也初授貝勒天聰二年三月與兄多爾衮從太宗往征察哈爾多羅特部大捷太宗喜語諸貝勒曰兩幼弟初領偏師輒有功宜賜美名於是號多鐸為額爾克楚瑚爾五年九月太宗親率軍擊明錦州多鐸從以二百人敗錦州兵七千於城下又敗明兵於大凌河七年六月詔問羣臣伐明與朝鮮察哈爾宜何先多鐸言宜伐明直入長城圖乆長之計先其大者則其餘自滅且隨我所求而自至矣八年七月太宗親伐明多鐸從同貝勒阿濟格等率兵入龍門㑹大軍於宣府遂入邊擊敗明兵畧保安州克之戮其守將往㑹太宗於應州城獻俘八月同多爾衮等畧朔州隨攻大同敗明兵於城南太宗以明國必調寧逺錦州兵往山西救援命多鐸為帥率精兵入明廣寧以遲其救援先遣石廷柱阿山等趨錦州㑹錦州總兵祖大夀遣副將劉應選等率兵來拒遇於大凌河西阿山等以兵寡馳告多鐸疾馳敗劉應選所部兵俘獲無算凱旋獻俘太宗迎勞五里外以多鐸初專閫外能出奇取勝嘉奨之賜良馬五甲五崇德元年四月晉封和碩豫親王兼理禮部事十二月從太宗征朝鮮累戰皆有功遂降朝鮮四年八月兼理兵部事十一月同貝勒豪格畧錦州寧逺斬總兵金國鳳等五年三月奉命為左翼總統與濟爾哈朗往修義州城駐師屯田六年三月代多爾衮圍錦州松山繞錦州城立營浚濠為乆駐計城中惶恐守門䝉古諾木齊武巴什縋書約降祖大夀知有異志欲以計擒之諾木齊等即執兵拒外城䝉古亦執兵助既接戰聲聞關外多鐸與濟爾哈朗至城下援之關内䝉古縋援兵入與明兵戰於城上明兵敗大兵遂入關徙其民義州捷奏至太宗大悦四月復敗明杏山松山援兵八月明經畧洪承疇以八總兵十三萬衆來援錦州太宗親統大軍往征之疾馳六日環松山而營明兵宵遁遣貝子博洛等追擊之並簡精兵付多鐸令設伏遂夾擊總兵呉三桂等兵敗之尋又奉命圍松山城内夜出兵來犯擊敗之斬首千餘級十二月承疇自松山率兵夜出來犯多鐸令沿濠射之悉敗去城中益困七年二月松山副將夏承德宻遣約降為内應以其子舒出質夜半諸將士舉梯登城城遂克生擒承疇及巡撫邱民仰等七月敘功晉封多羅豫郡王八年四月疏言當今之勢宜暫息兵以農務為急衣食豐足舉國慶豫再有舉行未晩也順治元年四月從多爾衮入關破流賊定燕京十月晉封和碩豫親王時明福王朱由崧自立於南京稱大號遣兵扼淮徐為割據計而李自成尚據陜右多鐸奉命為定國大將軍率師南征二年由河南進兵克陜州趨潼關凡三敗李自成之衆斬獲無算賊守將皆望風降附復戰於潼關大軍奮勇衝擊呼聲動天地縱横掩殺漫山彌野自成精鋭畧盡遁至西安不復能成軍拒守多鐸師渡潼關濠口斬偽將馬世堯師至西安自成奔商州南走湖廣追之不及二月捷聞世祖以流寇既竄西安平定關中撫綏事宜付英親王阿濟格等命多鐸率大軍由河南趨淮揚討江南之稱號自立者四月渡淮趨揚州招諭守揚閣部史可法等降不從攻克其城獲可法等斬之五月師至南京文武官數百員馬步兵二十三萬有奇皆迎降南京平追擒福王于蕪湖捷聞世祖嘉悦遣侍臣赴軍中慰勞焉多鐸復遣兵敗馬士英之衆降潞王朱常淓江浙悉定七月詔以貝勒勒克德渾為平南大將軍代多鐸還十月凱旋世祖御殿以多鐸統軍以來功最大晉封和碩德豫親王賜黑狐帽貂朝衣及玲瓏鞍馬金五千兩銀五萬兩三年五月蘇尼特部騰吉思等叛奔喀爾喀詔以多鐸為揚威大將軍往征七月多鐸等至營噶爾察克山聞騰吉思在衮噶魯台星夜疾進三日追及於額克特山獲其妻子及牲畜喀爾喀土謝圖汗以兵二萬邀大軍於扎濟布喇克之地多鐸擊敗之追逐三十餘里次日碩雷汗復率兵三萬至又擊敗之追逐二十餘里十月凱旋世祖出安定門迎勞四年七月御太和殿冊封為輔政叔德豫親王賜金千兩銀萬兩鞍馬二冊文稱定鼎中原以來所建功勲卓越等倫云六年三月薨七年三月命立碑紀功九年三月鄭親王濟爾哈朗等㑹議多鐸係多爾衮同母弟應削王爵世祖念其勲勞止追降郡王康熙十年五月追諡曰通乾隆四十三年上諭廷臣曰豫親王從睿親王入關肅清京輦即率師西平流寇南定江浙實為開國諸王戰功之最乃以睿親王誣獄株連降其親王之爵後又改封信郡王以王之勛績超邁等倫自應世胙原封以彰殊眷著仍追復親王還號為豫一體配享太廟多鐸子多尼征故明桂王朱由榔於雲南敗李定國白文選之衆所向克捷襲封郡王順治十八年薨諡宣和肅親王豪格太宗文皇帝第一子也生而英毅多智畧從征䝉古諸部功最著授貝勒天命十一年四月隨大貝勒代善征䝉古五部有功天聰元年五月太宗伐明豪格往衛塔山糧運遇明兵二萬以八十人擊敗之三年十一月大軍進逼北京大貝勒莽古爾泰率諸貝勒大臣迎擊明督師袁崇煥錦州總兵祖大夀援兵于廣渠門外敵以重兵設伏于右莽古爾泰令諸貝勒擊其右豪格如命衝敵右敗其伏餘貝勒由中路乘之敵遂潰四年正月與岳託還守瀋陽五年七月太宗西征命與貝勒杜度等居守六年五月太宗征察哈爾遂伐明豪格從同濟爾哈朗畧歸化城等處有功六月晉封和碩貝勒七年六月詔問用兵宜何先豪格言錦州寧逺攻之無益宜用更番法分兵兩路一從寧逺入一從舊路入夾攻山海關不然進攻通州乆駐其地往偵流賊情形彼方分師捍禦我伺其懈擊之事可圖也命與阿巴泰等畧明山海關有功八年七月伐明分兵四路入太宗親統大軍由宣府趨朔州豪格率揚古利毁邊墻入大軍遂由上方堡分道進旋同貝勒多爾衮畧朔州及五臺山而還復從攻大同擊明援兵走之九年二月命與多爾衮岳託薩哈璘為元帥統兵一萬往收察哈爾師至錫喇珠爾格遇察哈爾汗妃及台吉索諾木等以千五百户降遂抵託哩圖託哩圖者額哲所駐地也㑹天大霧乘其無備遣額哲母蘇泰太后之弟南楮等先往見額哲母諭以奉㫖招撫意額哲母命額哲率衆迎諸貝勒入遂定盟次日率所部降額哲以古玉璽獻文曰制命之寶元順帝奔應昌時所失後林丹汗得之者也師還畧明山西邊郡敗其兵崇德元年四月晉封和碩肅親王兼攝户部尋坐黨岳託降爵解部任二年正月從征朝鮮敗安州黄州兵於寧邊城下復敗安州帥於陶山三年十月伐明畧地至曹州復敗明兵於滹沱河所至克捷以功復原封五年六月同多爾衮等屯田義州六年三月同多爾衮圍錦州以多爾衮輕違詔㫖豪格亦坐罪降郡王八月太宗聞洪承疇兵來援親統大軍自盛京疾馳抵松山遣大學士剛林諭二王先駐髙橋二王馳奏奉㫖屯髙橋倘敵兵為我所迫錦州松山兵内外夾攻協力死戰而欲自髙橋來援勢難速至不如請大軍暫駐松杏之間太宗可其奏尋同多爾衮還守盛京十月復命從圍松山七年二月松山副將夏承德宻遣人請降太宗許之用為内應時豪格同貝勒等率兩翼兵梯城南先登遂克松山擒承疇等四月同濟爾哈朗攻塔山克之七月敘功復原封順治元年以語侵多爾衮為人訐告坐言詞悖妄削爵世祖既定鼎燕京大封諸王念豪格從定中原有功仍復原封是年冬山東土寇竊發奉命往征遂定濟寧破滿家洞賊渠土寇悉平二年正月命阿巴泰代豪格還三年正月命為靖逺大將軍西征斬流寇石二等盡復所陷州縣陜西平十一月整兵入蜀至南部偵知賊首張獻忠據西充縣隨統大兵進抵西充獻忠來拒麾兵奮擊射殪獻忠于陣復分兵搜𠞰餘賊盡擒偽王以下文武官四年復𠞰餘賊破賊營一百三十餘處蜀寇悉平五年二月凱旋世祖御太和殿宴勞之尋為多爾衮所搆陷下獄卒七年世祖親政念其枉復封和碩肅親王立碑表之十三年追諡武乾隆四十三年上諭廷臣曰以肅親王後襲封改號曰顯著仍復原稱封號並配享太廟原封成親王追封克勤郡王岳託太祖髙皇帝孫禮親王代善第一子也有謀勇授台吉天命六年二月大兵畧明奉集堡將旋有厮養卒指言明兵所在岳託同諸台吉追擊之摩其壘而還三月攻明瀋陽城我師追敗明總兵李秉誠等援兵于白塔舖岳託㑹兵同逐北四十里十一年八月太祖髙皇帝上賔岳託與弟薩哈璘以太宗文皇帝有聖徳宻議推戴告其父代善曰國不可一日無君邦家大事宜早定䇿四貝勒才德冠世深契先帝聖心衆皆悦服當速繼大位代善曰此吾夙心也遂夜作議書翼日以書徧示諸貝勒大臣于朝遂定議奉太宗嗣位十月同弟薩哈璘貝勒豪格隨父代善征䝉古五部有功是嵗封貝勒天聰元年正月率兵征朝鮮攻義州定州漢山三城克之渡嘉山江克安州至平壤朝鮮王李倧遣其臣進昌君求和阿敏有異志不允岳託知不可止策馬還營與濟爾哈朗宻議駐師平山許之和阿敏以未與議縱兵大掠復令朝鮮王弟李覺與阿敏盟乃旋五月從太宗伐明圍寧逺有功二年五月率兵畧明邊墮錦州杏山髙橋三城毁十三站以東墩臺二十一處乃引還三年九月同諸貝勒畧明錦州寧逺境焚其積聚十月太宗伐明師次喀喇沁之青城代善莽古爾泰見上請班師退太宗意不懌岳託同諸貝勒見告之故因力贊進兵至午夜議定遂同濟爾哈朗攻大安口毁水門入乘夜敗馬蘭營援兵于城下比明遵化援兵來營于山之林木間顧謂濟爾哈朗曰吾當獨往取之遂馳擊大破之五戰皆捷馬蘭營馬蘭口大安營三城皆相繼降四年正月與豪格還守瀋陽五年七月攻明大凌河太宗親統大軍自白土場趨廣寧岳託率兵二萬别由義州進八月㑹大軍于大凌河圍其城祖大夀請降以子可法質見諸貝勒時岳託反覆開導之揖可法乘馬去大夀遂以其城降翼日命同諸貝勒統兵四千偽作漢裝偕大夀作潰奔狀夜襲錦州㑹大霧乃止是夜錦州聞礟聲謂大凌河守兵潰圍出分路來迎遇我師敗之是年初設六部命攝兵部事六年正月岳託疏請漢人之歸順者宜各予以室家之樂善為撫養毋致一夫失所以廣招徠庶人心景附大業可成太宗嘉納之七年二月詔問用兵復疏言時不可失事宜勇斷山海關通州燕京當先圖其一以立基是月攻旅順口克之師還賜宴於郊太宗親酌金巵賜之酒崇德元年正月晉封和碩成親王旋以徇庇莽古爾泰碩託且欲離間濟爾哈朗豪格論死太宗特寛之降多羅貝勒罷兵部任二年復以驕蹇論罪再䝉恩寛宥三年十一月命為揚威大將軍貝勒杜度副之統右翼兵與左翼奉命大將軍睿親王多爾衮分道伐明岳託兵至墻子嶺毁邊墻入宻雲總督呉阿衡以兵六千入保墻子嶺堡外立三寨為犄角我師攻其寨拔之復連敗明兵獲敵卒知堡堅且有重兵不易拔嶺東西髙處有間道可越于是分兵兩路攻其前以牽敵師潛以兩路從間道入克臺十有一處所向皆捷尋以疾薨于軍四年三月多爾衮捷奏至太宗覽奏無岳託名驚問知病卒慟哭乆之令且勿使禮親王知為輟飲食者三日四月喪還駕至沙嶺設幄遙奠還御崇政殿命王以下及諸大臣往奠詔封為多羅克勤郡王賜馬五駝二銀二萬兩子羅洛輝襲封貝勒康熙二十七年聖祖為立碑以紀其功乾隆八年十九年四十三年四十八年上詣盛京俱酹其墓又四十三年正月上諭廷臣曰克勤郡王後改稱平郡王著一體復還原稱封號並配享太廟頴親王薩哈璘太祖髙皇帝孫頴親王代善第三子也天資聰敏通滿漢䝉古文義屢從征伐所向有功天命十一年封貝勒八月太祖髙皇帝上賔薩哈璘與兄岳託宻議擁戴太宗告其父大貝勒代善遂定議十月隨父代善北征喀爾喀扎嚕特部斬獲甚衆天聰元年五月太宗親伐明與兄岳託貝勒豪格率精騎為先鋒大兵進圍寧逺敗明總兵滿桂兵追至城下諸貝勒繼至分兵𠞰殺敵衆是役也薩哈璘被創戰彌厲三年十月大軍次喀喇沁之青城代善等宻議班師太宗不懌薩哈璘與兄岳託及諸貝勒進見勸决計進取十一月從太宗伐明逼北京同諸貝勒擊敗明袁崇煥祖大夀援兵又南畧通州焚其船克張家灣還攻克香河縣敗敵三河進克永平府五年七月初設六部命理禮部事是月太宗親率大軍伐明與貝勒杜度豪格留守七年六月詔問用兵何先薩哈璘言當寛朝鮮拒察哈爾而專征明并陳方畧是年八月同貝勒阿巴泰往畧明山海關八年二月同貝勒多爾衮往迎明降將尚可喜攻廣鹿長山二島俘獲不可勝計六月隨父代善畧明山西邊進兵大同敗代州兵九年二月同貝勒多爾衮岳託豪格等統兵往收察哈爾途遇察哈爾汗妃及台吉等率其屬來降遂盡收額哲全部還師畧明山西邊地諸州縣皆降附縱兵出入無敢當者凱旋太宗親率諸貝勒大臣往迎之先是諸貝勒大臣以逺人歸附國勢日隆合詞請太宗進稱尊號太宗却之至是復請太宗仍不允薩哈璘乃令内院大臣希福等奏曰臣等屢次陳請未䝉皇上俞允夙夜悚惶罔知所措伏思皇上不受尊號其咎實在諸貝勒不能殫竭忠誠為乆大之圖徒勸上早正大號是以皇上不肯輕受今諸貝勒誓圖改行竭忠輔國皇上宜受尊號太宗善之曰貝勒薩哈璘為朕深謀欲善承皇考開創之基開陳及此實獲我心爾身任禮部當主之諸貝勒果誓圖改行尊號之受與不受朕當再思翼日薩哈璘集諸貝勒於朝各書誓詞以奏太宗以内外諸貝勒勸進之誠難以固讓而朝鮮通好之國應與共議因命使往朝鮮薩哈璘乃與諸貝勒遣人偕使臣同往告以内外勸進之誠并陳示各國來附兵力强盛之實崇德元年正月有疾太宗臨視再三四月議功擬封多羅郡王五月薨薩哈璘明達政體通知古今掌故禮部典文制度多所裁酌太宗深嘉之及薨太宗悲悼不巳輟朝三日祭時慟哭三奠追封和碩頴親王六月太宗在翔鳳閣夢人請曰頴親王乞賜牛一如是者再寤以問内院大臣希福等皆未知所謂後閲㑹典凡親王薨初祭例賜一牛始大異之以聞太宗即命禮部致祭賜以太牢康熙十年追諡曰毅敬謹親王尼堪太祖髙皇帝孫廣畧貝勒褚英第三子也從征屢有功天聰九年五月大兵伐明入山西邊境隨貝勒多鐸率偏師入寧錦界以牽明兵之援山西者尋封固山貝子崇徳元年十二月隨豫親王多鐸征朝鮮其王棄國遁追至南漢山城圍之復屢敗其援兵朝鮮遂服師還命議政四年三月伐明率四旂兵環守塔山連山七年九月克錦州以尼堪代博和託等駐防順治元年四月隨睿親王多爾衮破流賊於山海關尋復破賊於慶都縣十月晉封多羅貝勒十二月隨多鐸南征三敗流賊李自成於潼關二年正月大破賊將劉方亮之衆三月分兵趨歸德定河南四月進征江南五月克南京明福王朱由崧遁太平復走蕪湖將以舟渡江尼堪追之截江口敗黄得功於江上得功中流矢死盡奪其舟偽總兵田雄等縛其王由崧以降又攻江隂克之初大兵渡江世祖馳賜尼堪良弓一至是凱旋賜金銀鞍馬三年正月隨肅親王豪格西征分兵破流賊賀珍於漢中入蜀滅流賊張獻忠四年八月分兵與貝子滿達海等進𠞰遵義夔州等處斬偽王以下千餘員俘獲無算川寇悉平五年九月晉封多羅敬謹郡王六年正月命為定西大將軍討大同叛鎮姜瓖屢破賊衆斬偽巡撫姜輝等三月晉封和碩敬謹親王四月由左衛往圍大同賊勢窘偽總兵揚振威等斬瓖並其兄琳弟有光以其首來降遂入城安撫其民振旅還八年張獻忠餘孽侵擾湖南九年七月命尼堪為定逺大將軍統兵征湖南貴州世祖親送至南苑尋聞賊己入廣西陷桂林八月勅尼堪母往貴州仍從湖南取寶慶十一月抵湘潭賊首馬進忠等遁遂進師衡州去衡山縣三十里前鋒遇賊哨卒敗之即於其夜兼程進未明抵衡州大兵方列陣賊衆四萬餘猝至尼堪麾首隊進擊大破之追北二十餘里方首隊兵擊賊時林内賊伏發城内賊復出應之師欲退尼堪曰我兵擊賊無退者我為宗室不斬除逆寇何面目歸乎遂奮勇直入賊環之數重尼堪率諸將士縱横衝擊矢盡拔刀力戰沒於陣十年十月喪還京世祖命親王以下郊迎䘏典優厚諡曰莊謙郡王瓦克達代善第四子也天聰元年五月隨太宗伐明軍至寧逺總兵滿桂率衆拒大敗之追至寧逺城下殱其卒時瓦克達以力戰被創崇德五年十二月從多爾衮攻錦州見兵有出樵者即率十餘八擊斬之七年大軍三圍錦州列巨礟城北明經畧洪承疇率騎兵來奪力戰却之㑹天雨敵復來戰又敗之復進擊承疇三營步兵時軍將費雅思哈失馬與之累騎而出喀寧阿墮馬創甚敵兵圍之數重復直入其陣挈之以歸順治元年四月從多爾衮入山海關定燕京旋破流賊李自成又追奔至慶都縣敗之二年流賊自西安南走荆襄隨阿濟格率師往𠞰比至賊衆千餘方乘船揚帆遁同鰲拜巴圖魯提精卒登岸叢射之賊被射及溺水死者不可勝計悉取其船以濟大軍敘功封三等鎮國將軍三年五月以蘇尼特部騰吉思等叛奔喀爾喀從多鐸往討降其族又擊土謝圖汗碩雷汗兵俱敗之四年三月晉封鎮國公五年十一月戍守大同甫至適總兵姜瓖叛陷朔州寧武等處滿達海率兵往討瓦克達從六年復朔州等處是年冬滿達海回京以瓦克達為征西大將軍七年二月平潞安平陽澤州降其衆先是明大學士李建泰巳納欵至是復與姜瓖合據太平縣我師至圍其城别遣游騎斷其餉道越二十餘日詣軍門降瓦克達英勇素著所至皆不戰自潰且馭軍整肅剿撫兼施由是平陽所屬州縣悉定八年二月晉封多羅謙郡王三月命理工部事九年八月薨初山西遭姜瓖之亂瓦克達駐平陽戢軍安民平陽民徳之薨後建祠致祭榜曰多羅王廟康熙十年五月追諡襄衍禧郡王羅洛渾太祖髙皇帝曽孫岳託第二子也崇德四年九月襲封多羅貝勒五年五月有䝉古多羅特部蘇班岱阿巴爾岱初降于明至是宻來約降奉命同鄭親王濟爾哈朗率師往徙之夜過錦州至杏山令蘇班岱阿巴爾岱各挈其孥與其牲畜以行比明錦州松山杏山合兵七千來截我師于杏山城外我師佯退數里敵譟而前反兵縱擊羅洛渾同濟爾哈朗皆親自搏戰大破之追殺至城下復分兵攻其城西二營拔之師還賜御厩馬一九月同濟爾哈朗督師圍錦州代多爾衮豪格還六年三月親率右翼兵設伏敗明援兵于南山西岡六月多爾衮豪格來更代將受代合兵擊敗明山海關援兵追及松山城而還八月從太宗親征明克松山有功順治元年十月以從定燕京破流寇有功晉封衍禧郡王三年正月同豪格平蜀尋卒賜䘏如禮諡曰介欽定盛京通志巻六十六
