  text: 欽定四庫全書欽定盛京通志卷四十七
  hash: sha256:01a56890f62e602dd60f7c6f1dd297118cb43213bf85fcb30d5604dfb9061a3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0040_WYG_051-1a, image: WYG0502/WYG0502-0153a.png}
body:
  text: 選舉一歷代徵辟遼金元明進士明舉人明貢生明武科欽定盛京通志卷四十七欽定四庫全書欽定盛京通志卷四十七選舉臣等謹案遼左前代選舉漢晉以上史傳所載不數人至有唐始制貢舉髙麗新羅諸國咸遣子弟入太學史稱有成進士歸者然姓名爵系缺如金初特設進士科元時分左右榜以蒙古色目為左榜迄於前明科試𨽻北京姓名列於太學國家文治誕敷我太宗文皇帝設科取士百餘年來涵濡樂育士之登賢書擢髙第者濟濟至若貢明經於太學䇿韜略於武科彚征叶吉作人斯盛臣等詳稽歷代制科並排次本朝甲乙科諸姓氏謹志選舉第二十欽定四庫全書欽定盛京通志卷四十七選舉一徵辟漢公孫度襄平人舉有道科晉李胤襄平人舉孝亷南北朝竇向遼東人舉秀才科金齊文乙廣寧人明昌中舉德行才能謹案前志載明畢恭賀士咨二人考之明史二人係都御史疏薦與古特加徵召又舉某科者有别且本志已載入人物門此卷徵辟條下應刪進士遼耶律富魯重熙中登第官牌印郎君譯國語富魯優長也原作蒲魯今改姚景行廣寧人重熙五年登第官至翰林學士樞密副使參知政事卒諡文憲封栁城郡王馬人望廣寧人咸雍中登第官至樞密使卒諡文獻太公鼎遼陽人咸雍十年登第官至南京副留守李石遼陽人乾統十年登第第一仕金至太師封金源郡王耶律達實天慶五年登第大唐古特語達實吉祥也原作石今譯改田灝興中人天慶八年登第仕金至刑部尚書金張浩遼陽渤海人天會八年賜進士及第官至太師卒諡文康楊伯淵臨潢府人天會十四年賜進士第官至轉運使張用直臨潢府人天眷二年賜進士及第官至太常卿楊伯雄臨潢府人皇統二年登第官至河中尹卒諡莊獻髙德基渤海人皇統二年登第官至户部尚書楊伯仁臨潢府人伯雄之弟皇統九年登第官至諫議大夫兼太常卿劉瑋咸平府人熙宗特賜進士及第官至尚書右丞鄭子聃大定府人天德二年登第正隆二年同進士雜試復中第一官至吏部侍郎鄧儼懿州人天德二年登第官至户部尚書張汝霖遼陽人浩之子貞元二年賜進士第官至禮部尚書參知政事封芮國公卒諡文襄張汝弼遼陽人正隆二年登第官至尚書右丞伊喇履契丹人東丹王之裔大定三年賜進士及第官至尚書右丞卒諡文獻伊喇八旗姓原作移刺今譯改圖克坦鎰上京人大定十三年設女真進士科鎰舉第一官至左丞相封廣平郡王圖克坦八旗姓原作徒單今譯改李獻可遼陽人石之子大定十年登第官至山東提刑使瓜爾佳衡女真人大定十三年登第官至平章政事封英國公卒諡貞獻瓜爾佳八旗姓原作夾谷今譯改尼瑪哈鑑隆州人大定十三年登第官至參知政事卒諡文肅尼瑪哈八旗姓國語魚也原作尼龎古今譯改孫德淵興中州人大定十六年登第官至工部尚書孟奎遼陽人大定二十一年登第官至按察轉運使鄂屯忠孝懿州人大定二十二年登第官至參知政事國語鄂屯槽盆也原作奧屯今譯改瓜爾佳守中咸平人大定二十二年登第官至節度使瓜爾佳見前富察哲魯東京路人大定二十二年登第官至東京留守富察八旗姓國語哲魯鱒魚也原作蒲察鄭留今譯改完顏匡大定二十五年登第官至尚書令封申王烏庫哩仲溫蓋州人大定二十五年登第官至鎮西軍節度使卒諡忠毅烏庫哩八旗姓原作烏古論今譯改烏雅恩徹亨隆安府人大定二十八年登第官至汾陽軍節度使烏雅八旗姓國語恩徹亨能幹也原作兀顏訛出虎今譯改穆延盡忠上京人大定二十八年登第官至平章政事封申國公穆延八旗姓原作抹撚今譯改費摩亨臨潢人大定二十八年登第官至河東南北路按察使費摩八旗姓原作裴滿今譯改髙守約遼陽人大定二十八年登第官至刺史卒贈崇義軍節度使諡忠敬王維翰利州人大定二十八年登第官至參知政事完顏宇西南路明安人大定二十八年登第官至安化軍節度使完顏閭山蓋州人明昌二年登第官至吏部尚書完顏伯嘉北京人明昌二年登第官至吏部尚書瓜爾佳錫爾格上京人明昌五年登第官至定海軍節度使瓜爾佳見前國語錫爾格絲也原作夾谷石里哥今譯改李英遼陽人明昌五年登第官至御史中丞卒諡剛貞完顏伊爾必斯海蘭路人明昌五年登第官至參知政事蒙古語伊爾必斯豹也原作阿里不孫海蘭見建置沿革卷原作曷懶今俱譯改赫舍哩呼實默上京人明昌五年登第官至御史大夫兼大司農赫舍哩八旗姓國語呼實默經年之經也原作紇石烈胡失門今譯改持嘉烏紳上京人明昌五年登策論進士第官至尚書右丞持嘉八旗姓國語烏紳田地也原作赤盞尉欣今譯改溫特赫達蓋州人明昌五年登第官至集慶軍節度使溫特赫八旗姓國語達頭目也原作溫迪罕達今譯改烏克遜仲端承安二年登策論進士第官至翰林學士承旨國語烏克遜宗室也原作烏古孫今譯改費摩思忠承安二年登第費摩見前納塔謀嘉上京人承安五年特賜同進士出身官至翰林侍講學士兼兵部侍郎納塔八旗姓原作納坦今譯改蒙古綱咸平府人承安五年登第官至參知政事舒穆嚕世績咸平府人承安五年登詞賦經義南科進士第官至禮部尚書舒穆嚕八旗姓原作石抹今譯改完顏仲德海蘭路人泰和三年登第官至尚書右丞兼樞密副使海蘭見前富察羅索安春水人泰和三年登第官至孟州防禦使富察見前國語羅索極濕難耕地也原作蒲察婁室安春原作按出虎今譯改髙憲渤海人泰和三年登第官至博州防禦判官完顏蘇哷至寧元年登策論進士第官至金安軍節度使國語蘇哷聰明也原作素蘭今譯改冀禹錫利州人至寧元年登第魏璠遼東人貞祐三年登第官至尚書令史舒穆嚕嵩咸平府人世績之子興定二年登經義進士第官翰林應奉舒穆嚕見前髙衎渤海人年二十六登第官至吏部尚書以下科分未詳持嘉師直來州人登進士第持嘉見前曹勇義廣寧人登進士第官至宣政殿大學士卒諡文莊贈定國公完顏納紳登策論進士第官至參知政事改國語納紳馬熊也原作奴申今譯瓜爾佳實倫隆安人以武舉登第官至節度使原瓜爾佳見前國語實倫猞猁猻也作古里甲石倫今譯改圖們呼圖克們登策論進士第官至臨洮府總管圖們八旗姓國語萬數也呼圖克們蒙古語呼圖福也們是也原作陀滿胡土門今譯改費摩阿固岱女真人登進士第官至御史大夫原費摩見前蒙古語阿固岱寬敞也作裴滿阿虎帶今譯改完顏珠赫女真人登進士第官至户部尚書國語珠赫氷也原作珠顆今譯改劉仲尹蓋州人登進士第官至都水監丞龎鑄遼東人少登第官至翰林待制劉光謙瀋陽人登進士第官至少司農髙德裔遼東人登進士第官至轉運使實保齊頁卜肯女真人登進士第司實保齊頁卜肯蒙古語實保齊禽人也國語頁卜肯俊麗也原作昔保赤也不干今譯改謹案遼金進士見諸正史者凡六十有九人又案舊志金時進士載有赫舍哩德考金史赫舍哩德係真定路人金時真定路即今直隸正定府不得混入奉天因考輿地以正其誤元謹案元時進士分左右榜以蒙古色目為左榜史稱讀書力學之士取青紫如拾芥而舊志祇載皇慶三年會試遼陽省取中選者蒙古五人色目二人漢進士二人蓋據元史選舉志所載標注於篇並未著其姓氏至若延祐至治泰定天厯元統間登第人數則俱無可考正史既無明文姑從闕疑明正統乙丑科髙閏蓋州人官至刑部郎中正統戊辰科陳鑑蓋州人賜一甲二名及第官至翰林院學士禮部侍郎金統律瀋陽人官翰林院檢討天順丁丑科周正廣寧衛人官至雲南左布政顧能定遼前衛人官至户部員外天順庚辰科邱霽定遼右衛人官刑部主事天順甲申科髙岡遼東義州衛人官禮部主事邵奎遼東金州衛人胡深遼東人官至監察御史謹案春明夢餘録載天順癸未正科因南省火災故以明年甲申會試遂稱是科為甲申成化丙戌科賀欽廣寧後屯衛人官至户科給事中畢用定遼前衛人官至懷慶知府王輔廣寧左屯衛人官刑部主事成化己丑科雷升三萬衛人官至河南鹽運使李恭定遼左衛人官至太僕寺丞成化壬辰科陳壽寧逺衛人官至都御史刑部尚書吳哲廣寧衛人官至御史成化乙未科陳珍義州衛人官至按察副使佟珍定遼中衛人官至福建布政使孔斌廣寧中屯衛人官無錫知縣文貴廣寧左屯衛人官至兵部侍郎吳珍廣寧右衛人官至御史成化戊戌科郭宗遼海衛人官刑部主事魯義定遼右衛人官金壇知縣成化甲辰科陳琳廣寧衛人官屯留知縣范政廣寧後屯衛人官至長史成化丁未科李珍廣寧中屯衛人官徽州府推官𢎞治癸丑科潘輔廣寧衛人官永清知縣𢎞治丙辰科王春廣寧左屯衛人官至翰林院檢討孫磐定遼中衛人官至按察司僉事寧杲海州衛人官至都御史𢎞治己未科張文錦廣寧左屯衛人官至副都御史崔哲定遼右衛人官至御史𢎞治壬戌科王鍇定遼中衛人官至按察司僉事王鉉定遼左中衛人官户部主事𢎞治乙丑科張翰廣寧後屯衛人張經瀋陽中衛人官至御史正德戊辰科馮裕廣寧左衛人官至按察司副使正德辛未科髙文豸定遼中衛人傅鑰廣寧左衛人官至按察司副使正德甲戌科徐景嵩定遼中衛人官至按察司副使王道中廣寧衛人官至大理寺少卿正德丁丑科范鏓瀋陽中衛人官至四川左參政魯綸定遼右衛人官至江西按察使正德辛巳科佟應龍定遼中衛人官至鳯翔府知府謹案明史正德庚辰二月會試取張治等三百五十人因前一年已卯八月武宗南巡至十六年辛巳還京師是年三月世宗入繼大統五月補行殿試賜庚辰科中式舉人楊維聰等三百五十人進士及第出身有差故志稱是科為辛巳嘉靖癸未科劉悌定遼右衛人官至工部郎中嘉靖己丑科安永清廣寧衛人官工部主事嘉靖戊戌科馮惟重廣寧左衛人齊宗道廣寧右衛人徐文亨定遼後衛人嘉靖甲辰科馬汝驥金州衛人萬善定遼中衛人嘉靖庚戌科張雲霖廣寧左屯衛人錢之選鐵嶺衛人嘉靖癸丑科呼為卿定遼左衛人江奎廣寧中屯衛人嘉靖己未科夏永廣寧前屯衛人嘉靖壬戌科黃學海廣寧左屯衛人何文維定遼後衛人隆慶戊辰科馮子履廣寧右屯衛人萬厯丁丑科馮琦廣寧左屯衛人萬厯癸未科蕭汝芳鐵嶺衛人萬厯壬辰科李景登廣寧左屯衛人官至漢中知府萬厯乙未科葉世英廣寧左屯衛人劉國縉復州衛人萬厯癸丑科楊若梓瀋陽右衛人洪敷教東寧衛人萬厯丙辰科佟卜年定遼中衛人官河間知府天啓壬戌科陳民情遼東人官至山海兵部分司史洪謨廣寧中屯衛人崇禎戊辰科張國臣廣寧左屯衛人崇禎辛未科劉士璉復州衛人崇禎壬午科張祺蓋州人官遷安知縣傅濬廣寧衛人蕭時彥鐵嶺衛人舉人明謹案明時遼東科舉原附山東嘉靖十三年因應試者渡海時遇風濤改附順天是科中九人萬厯三十七年定額五人今稽明史選舉志明一統志直隸山東通志科分俱無可考姑從舊志附載各姓氏爵里於甲科之後文廣廣寧衛人張升定遼中衛人張鉞義州衛人丁鐄海州衛人官泌陽知縣李深定遼中衛人官沭陽知縣孫達定遼中衛人潘銓定遼中衛人官贊皇知縣陸本正廣寧衛人官蕭縣知縣袁壽定遼中衛人陳昻定遼中衛人官寧晉知縣孫義定遼中衛人劉玠義州衛人陳盤三萬衛人朱全定遼中衛人韋恭定遼衛人耿福定遼衛人程鎡廣寧衛人官至懷慶通判翟達定遼衛人崔鑑定遼衛人官鳯陽府教授王鐸定遼衛人官至揚州知府王安定遼衛人