body:
  text: 國朝藝文三頌欽定四庫全書欽定盛京通志卷一百十七國朝藝文三頌聖駕東巡盛京恭謁祖陵大禮慶成頌有序乾隆癸亥鄂爾㤗皇帝御極之八載嵗在癸亥月紀孟秋諏吉日飭乗輿奉皇太后東幸盛京展謁祖陵禮也先時雨師灑道浹旬優渥従官侍臣虎賁羽林七萃八校之士畢䍐旄頭鉤陳壁壘千乘萬騎之衆夙装以俟比大駕行雲開天霽和飈拂旗皇帝曰惟天惟祖宗佑予一人耿耿祉哉迺循畿甸出北口扺熱河遂巡省外藩諸部度白狼踰烏桓橋潢水徑龍沙諸部君長名王下洎且渠當户千百為羣治道供張奉迎厥角行負弩矢前驅居環黄幄宿衛奉觴上夀進膳獻琛賜賚所加舞蹈呼嵩之聲殷地徹天聞乎數千里之外皇帝曰於我祖宗盛徳大業至矣哉自祁姚化所弗暨漢唐威所未讋我疆我索一尉一候謐如也迺入栁邉迺沿混同瞻長白之峻極度納緑之蜿蜒谷邃山髙水深土厚扶輿鬱積王氣攸鍾神臯奥區上應柝木形勢龍蟠虎踞掲八荒而包六合我太祖太宗櫛沐風雨規矩乾坤披荆棘刈豺狼畫井里蒐軍實所為創業垂統作則萬世者山川城邑悉載赫聲濯靈土俗儉勤室居朴素有陶唐氏遺風焉皇帝周覧遐觀喟然動容曰此我朝景亳邠岐也猗那濬哲之頌生民𤓰瓞之歌欽念哉齋心凝神愾聞僾見廼以九月丙申有事于永陵越六日壬寅有事于福陵翼日癸邜有事于昭陵祠官掌儀太常奉引皇帝穆穆躬執玉瓉酌秬鬯以灌顯相辟公翼翼陪列庶司百職蹡蹡濟濟咸駿奔走執豆籩窮天産與陸珍縁博施而備物揚燎斯光炳玉燭升香遂瑞蔚慶雲乘龍在天髣髴肸蠁九獻具舉百禮是洽廼御崇政之殿清寜之宫以朝以宴遂下詔書頒中外湛恩鴻龎愷澤汪濊留都皤皤黄髪之老扶杖而觀撃壤歌衢異口同辭賛嘆曰盛哉乎斯世自聖祖東廵以還又數十年而載睹屬車之清塵也皇帝曰予一人承丕丕基覲揚祖宗耿光大烈惟祀與戎國之大事可勿毖廼修祀典神示羣望暨功宗元祀書太常者若廟若祠若墓牲幣酒醴咸秩無文廼纉武功教大閲申以三驅勒以八陣如山如川有嚴有翼廼整旌斾鳴和鸞度遼河循山海熈熈融融肅肅雍雍以旋乎紫徴之宫告至太廟葢自有簡䇿可紀以來未有祀事光顯合萬國之懽心極兩間之悦豫如今日者也臣以奉命留京不獲與于扈従際此大禮慶成繁禧總至天章燦爛日星為昭臣不敢以弇陋不文黯無紀述臣惟上天眷佑我大清聖聖相繼累洽重熈薄海内外罔勿率俾自肇造以迄于兹百二十有餘載矣積厚基崇謨烈既超邁徃古皇帝以大孝鴻仁作求成孚尤非自古守文之君所能及即今恭謁陵寢至誠至敬上明下察無所不通徃來兩京時踰三月之乆天晴日煦氣藹如春和風舒徐榮光煜爚醴泉膏露隨地滋涌天心之感格恊應既如此其昭彰臣工景従士馬踴躍父老欣欣望幸屬國喁喁傾心自輦轂以至海澨山陬飲和食徳若遊華胥人情之愛戴悦服又如此其廣逺然則致治隆盛固已駕商戊軼周成追羲軒嫓顓昊彼漢代侈言明章過沛幸宛曽何足以比擬萬一乎哉孝經有言聖人之徳無以加于孝大學有言為人君止于仁大雅有言繩其祖武於萬斯年受天之祐皇帝孝通神明仁被草木太和洋溢萬福攸同臣敬以卜我大清億萬年無疆之休也謹稽首頓首而獻頌曰天作髙山曰維長白三江濬源地軸之脊天眷大清此維與宅殷土周原是墾是闢廼疆迺場建邦有奕天命太祖載斾秉鉞既掃輝發爰拔哈達烏拉斯滅葉赫斯伐莫我敢遏聿造帝業蕩蕩遼瀋峩峩宫闕允文太宗武烈是承東征北討莫我敢膺松杏麾戈如日泮氷詒謀宏逺大猷允升京邑相望曰盛曰興赫矣一統普幬八埏駿徳鴻功三后在天皇帝纉緒昭格有䖍曰維舊京山陵在焉駕言徂東王道平平迺謁永陵開運蔥蔥迺謁福陵天柱嶐嶐迺謁昭陵隆業崇崇武庫之劍橋山之弓於穆清廟有侐閟宫蕭合羶薌清尊大房以格以享綏我思成叶工祝致告祀事孔明叶天錫皇帝萬夀無疆時雨時暘豐年穰穰迺坐明堂以臨下土禮儀既備恩澤周溥内自州郡外及蕃部黄童白叟式歌且舞曰皇帝孝光紹列祖至諴感神自天佑之川祗岳靈助我孝思皇帝所居景福維祺自秋徂冬周徧兩畿麗日和風春臺是躋春臺是躋普天胥樂順徳之孚覃被廣博東鰈西鶼南交北漠式化従風入息出作曰孝曰仁福禄攸酢皇帝之孝萬邦是式皇帝之仁四海秉徳皇帝之福與天無極咸五登三嘉瑞畢集卜祚綿綿時萬時億聖駕東巡盛京恭謁祖陵大禮慶成頌有序癸亥史貽直臣聞物本乎天人本乎祖故孝子之事親也致愛則存致慤則著而聖王之御宇也以義率祖以仁率親其在廟也有日祭有月祭有時享有嵗祫其祭於陵寢也近者或閲嵗一舉逺者或間世一行至於朔望莭序上食之禮則掌之祠官引而近之親親之誼也書缺有間矣若天漢唐諸君謁陵上食諸儀載在史編可考而知也前代諸儒泥於章句不能縁情制儀以垂於後或是古非今或穿鑿傅㑹名為聚訟無所取材洪惟我朝鍾祥長白源逺流長列祖列宗積徳累仁經营締造暨乎世祖受天明命遂朝六合撫綏萬邦中外一家繼繼承承於今百年懿休乎史册所書未之有也伏見我皇上臨御以來敷政寜人無時不以敬天法祖為心無日不以紹聞衣徳為念善繼善述丕顯丕承邇者恭謁園陵特修祀事鼎湖弓劍厪僾聞愾見之思原廟衣冠動春露秋霜之慕追惟世徳仰溯先猷用以見累朝創業之艱難列聖貽謀之光大萃萬國之歡心以肅雝顯相至孝也霈敷天之膏澤以覃及中外至仁也周覧盡桑麻難犬之俗有以知邠岐之勤儉王業所由興享王及氊裘毳服之倫有以知鎬洛之聲靈皇威所由被以視夫揚雄之誇羽獵相如之賦上林安足以方斯駿烈嫓此鴻休也哉臣承乏銓衡兼司秋部不獲躬隨鹵簿厠奉璋虎拜之列葵藿之愛無由自展不揆菲陋爰拜首稽首而獻頌曰癸亥之秋七月初吉皇帝時巡六龍扈蹕豈曰豫游大禮是秩巍巍瀋遼日華雲霱長發其祥有邰家室鑾輿未發零雨其濛屬車既駕皎日麗空油油縉雲習習祥風塞垣迢遞塞草丰茸先天弗違帝眷皇躬於爍列祖肇基俄朶天錫嘉符鵲銜靈果惟天降命敢不負荷北倚長白南控遼左豈不懐安四方徯我洪惟太祖積徳累仁清雖舊邦其命維新躬擐甲胄漠北無塵時維中原既否且屯帝曰念哉吾矜其民太宗嗣服輿圖式廓崇政當陽髙山荒作旗列八方雲屯萬幕其時中原愈削以弱帝曰時哉惟徳勝虐肆我世祖壹著戎衣矢無亡鏃天命有歸聖祖受之夀考維祺世宗纉緒海㝢惟熙亦越我皇百禄是宜伊誰之為列祖之貽我皇大孝孝思維則東望鼎湖聿懐祖徳桮棬既陳膋膟既勅春露秋霜豈惟怵惕繩其祖武庶幾不忒自朝至昃不遑暇食興京翼翼閶闔岧嶤乃陳法駕乃集百僚乃設九賔乃奏雲韶中外一家莫不來朝傾誠仰化豐毳輕貂歌風比舜就日如堯在昔聖祖三謁園陵我皇法之是遵是承念兹神器業業兢兢京邑相望王業所興列聖在天靈爽式憑桑麻被畝禾稼盈塍億萬斯年大猷允升中天之盛喜起賡歌際兹景福是曰太和林無伏莽海不揚波在廷獻頌雲委肩摩㣲臣䝉眷九列婆娑豈不抽思非才則那彤墀拜手但媿卷阿聖駕東巡盛京恭謁祖陵大禮慶成頌有序癸亥裘曰脩乾隆紀元之八年上侍皇太后自京師出古北口詣興都謁我列祖陵寢猗歟盛哉斯誠鉅典粤維我皇帝陛下臨御海宇凡所施設為萬世矩念尊祖敬宗帝者首事夙夜東顧懔乎不敢康兹奉皇太后㫖諏吉啟行肅將祀事遵聖祖遺軌承世宗憲皇帝志也三陵翼然神其攸宅上迺升壇薦馨以次告祭備儀備物弗懈益䖍灌鬯既畢褒功勸忠旁逮於從龍之佐維時諸外藩王子部落駢集踵至臣民億萬萬皆跽瞻聖容同增感慕禮成駕興霓旌翠麾日華雲燦鱗次闗徼之上蜿蜒邐迤駐清蹕於東都上益周覧從容景與神㑹穆然遐思睪乎髙矚我祖宗經营締造之跡咸在心目御正殿受朝錫昇平之嘉讌恩綸載馳中外和㑹迴鑾道山海闗旋京師是行也逾秋渉冬風日清朗上召問耆老諮訪土俗輦路所經普賜膏澤在行之人均荷恵賚農樂於野師㤀其勞往還數千里如在户闥臣仰維我朝起自東土肇造區夏發祥之始實同邠岐自永清大定以來又百年於此薄海内外都為一家聖聖相承依古無匹皇帝臨一統車書之㑹當百年禮樂之期揚烈覲光合萬國之懽心以事我皇祖典盛禮崇神人胥慶是宜播之賦詠傳於無窮臣頃者既歌詩以獻又竊以固陋之詞不足揚扢聖徳伏惟皇帝陛下述作協於隂陽動靜侔乎天地與詩書雅頌所稱美同符合節臣謹掇輯五經成語為頌十六章陳之黼座文章報國臣何敢云顧濡筆屬詞誠懽誠忭臣亦且自慶其遭逢焉頌曰帝徳廣運繩其祖武至治馨香承天之祐禮樂明備惟帝時舉以致其禋祀俾緝熙純嘏念兹皇祖乃疆乃理東至於海邦畿千里肇十有二州罔不率俾繼自今文子文孫介以繁祉皇建其有極萬國咸寜纂乃祖服與時偕行霜露既降可以升山陵旂十有二旒錫鸞和鈴時乘六龍亦右文母視寒暖之節悉率左右徽柔懿恭徳音是茂内平外成克開厥後奠髙山大川建無窮之基路寢孔碩神所憑依至於寢門外如將見之有孚顒若永言孝思誕我祀如何直哉惟清薦用玉豆雕篹潔粢豐盛既備乃奏簫韶九成用能協於上下以為禮之大經帝省其山駿極于天原田每每王道平平盛徳大業有開必先美哉泱泱乎君子萬年禮行于祖廟濟濟翔翔侯甸男邦采衛具飭衣裳辨色始入觀國之光載篤其慶俾爾熾而昌雲上于天零露泥泥燕以示慈恵飲酒樂愷乃命有司大賚于四海崇徳報功貴親而尚齒渙汙其大號慶賜遂行百辟卿士公侯干城行爵出禄以莫不增省囹圄止獄訟刑期于無刑帝光天之下受小球大球四夷咸賔匪紹匪遊皆再拜稽首以承天庥民大和㑹如川之流乃武乃文克䔍前烈嵗云秋矣習射御角力三驅之餘以數軍實展也大成天威不違顔咫尺帝庸作歌吐詞為經對越在天遹駿有聲文物以紀之與日月合其明丕顯哉丕承哉永底烝民之生祭則受福入而振旅其道大光昭兹來許以化成天下有秩斯祐煦嫗覆育萬物爰得我所山川出雲雨雪霏霏兆於南郊自天天祐之聖人至徳而風雨節寒暑時冬大有年大君之宜順氣成象福禄來為繼序思不㤀聖敬日躋乃賡載歌無疆之詞天子當陽上帝是依聖駕東巡盛京恭謁祖陵大禮慶成頌有序癸亥王太岳臣竊惟禘礿之義同於聖揆山原之儀疎於曩作妥帖蔵魄嘉愉降靈焉矣然錫圭授啟魚雅而下璿階刻璧稽堯泮渙而臨雒氾升中柴望則膋焫張皇展義來蘇則邱陵津逮天衢地輔森景柏之丸丸星畢雲捎曠原荼之膴膴雖邁邦有赫而造禰無勤非以率見克配裒敷來孝疏接下武之祺恢通周監之軌至迺桐闈闢曙飲酎計寮繐幰披寒薦鞠禁媛簫鐃猋發憇鄠杜而夷猶廐府雲闐拜陽平而局縮葢春華賁縟殊非下鳯之煇澥棗騰鱻劇爽凔鸞之實皆不足以比附丕朝永世之經依約我后䔍恵之畧伏惟皇帝陛下升熙握樞受丕出震纉列聖之釐成造千齡之樂闓純蕰經地艮趾飲其凝承光道馭天神鱗協其控送進反百代之度絫黍而詧黄鍾紆餘後昆之謨中尊而待衢酌荒臣庶妾洞閎闥以瞻賢戚楙親徹夤埏而並樹禹金在鑄往無谿麓之迷舜璧衆蠲求有水火之贍譬之桑林一注慘濕驟均簡珠肆縣元白各暎抑揚萬龡協于八飌之鳴經緯千流洪於四溟之滙皇乎夐哉可以躞蹀軒庖之塲欱吐姚姒之響者矣顧迺挈器維沖凝旒若慕游神旁用銜慮孤竦曰余不敢遐譚紹衣博騖荒古也含醇履素咸中遂􅛱懿維我祖厥有成締降在孠人式卑鴻阯瞻念朽索緬言荷薪皇天后土置余跼踳之躬髙山大川環以饑溺之抱憢憢翹翹栗栗如也洎夫堯閏三題姫朔八授黄裳朝委素徽大調謳歈之歸莫辭盂帶之契已詧恭已何象但有晝日之紆百昌遂登亦覺元造之樂宸儀外睟淵思内邈擥茂緒之所垂嘅靈風于既衍睠兹淪化豈非宗祏之靈迓其純錫彌儼庭止之陟且夫軒鼚萬品之用基藻末以揚芳衡從五緯之文澡璇源而啟瑩是故少典作而髙辛昌窮蟬衍而重華兆嵞山祖頊元王勤商牒鋪觀左符若合國家膺五百之景休乘四七之前㑹華胥神母初定祥于俔天白水真人即叶靈于啖月肇祖首出三聖紹興太祖太宗丕承丕顯荃宰寄矣馨業綏矣方夫截所裁基規員展域惜澹人鬼之謀從容戈馬之烈素鱗未躍連山之歕海重波丹翨初投接地之垂雲五葉麾斥八極淑清日月之光犇走千靈豁達風雷之氣既而大龜告契光宅斯皇疈肪玉而召鷹揚漂雨珠而錫粒食蝥弧卓地掲蛇虎以羣翎圖契開天進魚龍而合負五禮六樂聲光銜燭之門厚利龎仁根蒂文衢之䕃然後齊景若華之顛重規穹幕之表襲正陽而號四履廓墋黷而迴六幽砥屬烝徒共揖羣辟三千長邁鏗鍧不戰之征八百如歸汗澷不期之㑹葢以畼元春之茂施受偃草之羣順迄我世祖一戎衣而有之吁其久也然則設都來辟勤懐旅楹胥宇生民必邍自土良繇禮不㤀本樂樂自生仁祖六十年之三駕憲考十三祀之匪康規勢雖判在􅈤罔殊矣故曰麗正之運戴抱而輪重運掌之紀事述而志繼夫進可以接降原陟巘之逺䠱退可以協嶞嶽翕河之邇猶比于在廟而憑依為親舉之間嵗而大禮不瀆斯宣喆之所憴憴孝理之所亟亟故迺進禮官按恒式太卜諏吉冏伯選徒使者先駈名物式序天子揚鑾太紫之庭指斾中黄之宅皇皇三陵具禮容而明祀事盖在昭陽次嵗而邠風授衣芒乎鑠哉夫其靈鼉迅發珥象威夷梯畢䍐以髙摩駟虬螭而遐運辰旒乍舉九霄之列缺千撝祫輅方驩十地之靊隆一簇葳㽔豹尾覘景附于樊山蠼畧雞翹應雄鳴于陳寳醇流鬯溉涷未灑而埃蠲協氣羯英漢無章而景湛鉤躔轉衛帷宫敞無外之家羲御襄征帳殿肅嚮明之理魚䀪鳥頡秩宿序于三階岳運川迴走雲駢于七萃斯則陽開隂閉不窮操軑之靈鼻㱃頭蜚莫極扶輪之旅爾迺戾舊都攬荒作百雉巋然千畇如舊桑麻㥯㥯出湛濊之精神雞犬依依共熙怡之血氣繞雲髫于若綬謌咢迎釐進霜耉于修幡嗟咨送韙於是齊祓孔䖍質明皆作容衛肆具幽宫静嘉三祗奉引八神左右盥奉溪后之盤香擲祝融之燄觩鱗次傾皇澗之温波泔澹珠隳合甫田之仁粒金支晃夜緝魚火于重幽玉豆馨晨匹樵蒸于大昊宏排詄蕩納合體之馨香大聳熛訛下靡争之鬷假夤儀選而鴛鸖䟴穆羽調而龜麟舞用能襲鴻明于翔拱接雲氣于西徂混江錯綺載思樂以浺瀠白岳撑霄疊禎氛而嵂崒羽綴解華樹輟祝嘏既偹彛憲載張坐明堂而渙祥綸緝伍符而建蕭鉞十倫緝化大澤下于煇胞三表徴規都肄敶其荼火鳯銜七色散蒼陸之陽暅魚麗千屯按元娥之隂籙露蕭鬱鬱罄一草一木之驩日羽芒芒縂九地九天之烈閬風寫慶簸太液而波頽大介揚稜指欃槍而氣讋南陽之賚既博司馬之儀既閑五材並用盛徳貞金木之符六位時乗妙有體陽秋之搃抑又所以式撻武而鞏皇維籍臚歡而甄靈貺于斯時也番禺䛴椒塗舞月竁納光日際屬爌横汾頌義荐麟玉以鐫芳撃筑歌風協龍鈴而布􅞗矣然後方神轉轂岳將送旌迴塗乎蕩平憇襟乎仁夀殊徽自擾驂澤馬以揚鑣神運不勞夾山輿而結轍珍叢瑰族不加于域大之靈璧月華星匪震于乾元之色至仁簡簡宫府小大具僚進止之常至樂夷夷婦子倉箱里閭宴衎之事所謂神規齊俗妙宰宅虗錘鑪萬有而無憂磐石億祀而莫紀然後知反本敦憲不云云之封烈照重芬厥由翼翼之顯夫揄揚上徳以昭聲寔于崇今綜纂見聞以永繩表于遐葉此臣下之義不可損之情臣誠薄劣生長于懋俗蹈舞于懿則意者廣曜所被翰豪之纎采皆攎恵凱所宣柯杪之零音並扇忘其戅愚輒有儗議庶幾堯衢之風比于美芹之愫裒列丹藻狀乾坤而末由欽挹淵崇顧涓塵而滋恧臣不任區區吟咏之極敢昧死再拜而獻頌曰地無歇流天無孑曜聖人之生緜煇衍浩皇矣上帝駿恵有清我皇時保念祖兢兢九極疏扃萬域砥道穴蟄淵游諧津罄照于化既豐在工載熙我皇南面綏珮迎釐天之無為七曜旋螘淳理楙經五季展義周邦時邁厥考維天曾我列祖莫造莫䖍於皇我祖造邦東瀛黄鉉下奠紫寓髙清道扇風芳氣馳雷霍人去載胥天推式廓積祥之阯㸌㸌陪都蒼精下緯玉電撝樞寳胄緜千蘿圖闡萬惟此烈光重規沓憲我皇念祖恪止瑄薌神祐時饗既夀永昌大舄朱弓天函地襲念此孔修心焉如攝伐鼓既坎和鸞既鶬鈎膺翼翼夙駕洋洋霛杲烜䆋協風珥御帝邁舊邦百靈相語灝瀚龍趨緜嶽鳯翼神眷佳闉宅斯無極我皇戾止有愾其心席芳眠履問晷凝襟羲和振鑣廣輪肅穆芬樹僊僊金房彧彧梯霄架栱控極排櫋祥熏裂燠藹照麾寒衝牙軫轕列羽飄蕭籠姫辨禮跨媯鏗㲈牲牡既省鬯瓉元滌享薦一人息屏百辟都荔遂芳芳以明徳輯賮同琛迺荐嘉璧浚照璚源夤蔚璇條龍光時荷孠服斯昭皇之對越慄矣䕫䕫洞幽屬顯日耀雲綏􅞗兮我䎹色兮我覩匪上斯旁匪堂斯武神之宴娭聲薌北迓陳寳球圖繽綸來下霛斿乍神去夷猶元璣遺耀垂貺靈脩烝哉皇孝蔚矣懋儀本天旉造罄地攽釐乾冒有端坤受有域我皇䔍祐孰究以極桓桓虎旅作屏舊京三樞宴謐八表聲靈墨齒闐庭黄支契軌撢澥思航占飌知頍震鱗題朔般足巡坰攝提從紀玉燭文明海截丹繩日隮翠籙有清兆祠同斯景福聖駕東巡重謁祖陵禮成恭頌有序甲戌曹秀先臣嘗讀詩至周頌如清廟烈文天作我將思文諸什以為崇祀樂歌恢皇懿爍者至矣若時邁十五句般之七句所有鋪叙夫震疊裒時功徳可信可傳照人耳目獨惜其各為一事美非合并而詩人尚侈稱之如彼要以兼賅統㑹盛美咸臻固未有逾於我朝者也伏維我皇上御極之八年率由聖祖仁皇帝舊章恭奉皇太后慈駕東巡祗謁三陵孝思不匱恩自天施逮今十有二年甲戍之秋重舉盛典顧念臣昔嵗家居未獲載筆鬱結在心如此夫禮制章明乆益弗怠所謂堯舜之君于身親見之者已臣又嘗繹周頌之文論述先世未始逺稽唐虞稱引夏商也今欲揚扢我朝崇理而援据邠岐舊事因襲陳言臣所弗敢竊不自揣謹撰清頌一篇以獻莫髙維天莫厚維地天顧在東地靈孔異維震之位億萬斯年付聖人所治其一沃衍乎遼疆廣袤乎瀋陽長白者山混同者江相厥舊宇我天子之邦自上下下亶臣萬方其二於赫皇清天所祚只天祚我清神所助只於維乎烈祖爰居爰處佑啟太祖式顯太宗誕興王于東其三列祖在天亦孔之靈矣列祖之靈矣惟徳之馨矣昭昭世祖萬邦臣矣丕惟我聖祖光啟世宗垂裕無垠矣其四於維聖祖東巡及三賁然涖止瞻望天山三陵峙其間雲與為衣星與為班䖍言往謁敬思其艱祀事孔􅈺萬福斯頒其五穆穆天子孝徳是常癸亥有秋遄巡彼東方祇奉聖母和鸞鏘鏘䖍祀列祖曰秋而嘗於戲列祖不忘其六曰十有二載皇篤孝思載奉聖母載揚龍旂于禮乎是儀于樂乎是詩丹陵謁祀載受福釐我皇祇肅聖母孔怡其七載展祖庥施于子孫祇敬於明神孔綏福履自昔我故里懽言涖止聖人親親公族合齒式飲式食永介繁祉其八昔也徂東澤自天下今也徂東仁覃九府東土有衆謂天子私我我臺也是春我屋也是夏其九時邁東土懿徳時静濟濟藩輔肆覲乎朝請逮彼箕子國珪璧是秉告我列祖承徳惟省於戯興京之景矣盛京之永矣其十欽定盛京通志卷一百十七
