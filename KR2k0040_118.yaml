body:
  text: 歷朝藝文六銘贊碑祭文墓志銘欽定四庫全書欽定盛京通志卷一百十四歷朝藝文六銘大鳥銘隋虞綽嵗在壬申四月丙子皇帝底定海碣班師振旅龍駕南轅鸞旗西邁行宫次於栁城縣之臨海頓焉山川明秀實仙都也旌門外設欵跨重阜帳殿周施降望大壑息清蹕下輕輿警百靈綏萬福踐素砂步碧沚同軒皇之襄野邁漢宗于河上想汾射以開襟望蓬瀛而載佇窅然齊肅藐屬殊庭兼以聖德遐宣息别風與淮雨休符潛感表重潤於夷波璧日曬光卿雲舒彩六合開朗十洲澄鏡少選之間倏焉靈感忽有祥禽皎同鶴鷺出自霄漢翻然直下髙逾一丈長乃盈尋靡霜暉於羽翮激丹華於觜距鸞翔鳯峙鵲起鴻騫或蹶或啄載飛載止徘徊馴擾咫尺乘輿不藉揮琴非因拊石樂我君德是用來儀斯固類仙人之騏驥冠羽族之宗長西王青烏東海赤鴈豈可同年而語哉竊以銘基華嶽事乖靈異紀迹鄒山義非盡美猶方册不泯遺文可觀况盛德成功若斯懿爍懷真味道如此感通不鐫名山安用銘異臣拜手稽首敢勒銘云來蘇興怨帝自東征言復禹績乃御軒營六師薄伐三韓肅清龔行天罰赫赫明明文德上暢靈武外薄車徒不擾苛慝靡作凱歌載路成功允鑠反斾還軒遵林並壑停輿海澨駐蹕巖址窅想遐凝藐屬千里金臺銀闕雲浮嶽峙有感斯應靈禽效祉飛來清漢俱集華泉好音玉響皓質冰鮮狎仁馴德習習翩翩絶迹無泯於萬斯年曾公祠銘明盧瓊維帝御極柔逺能邇一夫不獲痌瘝是似蠢兹遼人不戢自焚公憫冥頑任禍於身敷奏祈宥脅從罔究帝曰俞哉銑拜稽首渠魁以殱衆戚以祐保兹東土如翼如覆帝曰都哉陟兹功懋銑拜稽首天子萬夀農不昜業市不昜肆以生以育維公之賜維岡有柏維麓有砥繩之鑿之維公之祠公惟信宿留公之似我其夙夜罔不敬止匪我思之子子孫孫匪民思之既浹且淪匪公之惠惟帝之仁遼其奠安於萬斯春贊進雙白鷹贊唐蘇頲開元乙卯嵗東彛君長自肅慎扶餘貢白鷹一雙其一重三斤有四兩其一重三斤有二兩皆皓如練色斑若彩章積雪全映飛花碎點所謂金氣之英瑶光之精髙髻偉臆長距秀頸奮發而鋭堅剛則厲摩天絶海電擊飈逝觀其行時令順秋殺指麾應捷顧盼餘雄當落雕之賞蔑讐鷂之敵實希代之尤也皇上祇膺聖圖欽若王道方寶賢重榖尊儒養艾後宫撤綺繡前殿焚珠玉與王侯卿士朝夕論思異無所貴輕衛公之好鶴竒無所珍同漢王之却馬畋豈務於馳騁獵以存乎搜狩未嘗合圍掩羣載羽灑血乃強不攫而猛不噬矣然以萬方入貢懷其來也三年重譯嘉其至也故仁為之心有仁則勇威為之力有威則重况此鳥猛過於衆重倍於凡禮於君則勸忠祭於祖則立敬壯其體則用武綷其翼則成文彼寵而服之鶡也能果榮而戴之蟬也能潔矧乎職命司寇師維尚父聞針刺姦擇善為吏蓋選士之是式匪從禽之足云此所以備於圖而警在位也微臣奉制敢稱贊曰鷹之大者精明竦峻徑而橫絶雄則逺振錦文素綵珠聨玉潤往乃奮威將軍所徇鷹之次者勇鋭光芒截海而至乘風載揚絡以紅聯文其綵章下鞲必中惟吏之良碑安東都護魏哲神道碑唐楊炯經天緯地之帝求制禮作樂之才撥亂反正之君資拔山超海之力繼韶夏而崇號諡非無陳戰之風披皇圖而稽文武或用干戈之道故能彌綸宗廟彈壓山川包四海以為家一六合而光宅是以二十八宿懸列將而察休徴三十五星聚天軍而赫符彩吕望垂竿於渭溪道峻匡周張良授履於圯橋功崇佐漢乃有心如鐵石氣若風雲洛讖書名河圖祕象青絲雷燭歷大塊以三休碧羽霜淒倚渾天而一息岑彭許允征南鎮北之名馮異王昌大樹中軍之號杜太行而泥函谷猛氣無前戮封豖而斬長鯨雄圖不測元戎十乘驅衛霍於前矛甲士三千列孫吳於後殿秋風白露執金鼓而齊六軍泰山黃河析銅符而光百代建廟堂之策為社稷之臣孰能與於此乎在我真將軍矣公諱哲字知人巨鹿曲陽人也七代祖靖非前秦征北大將軍鎮北地上郡其後子孫因居於寧州襄樂縣開國承家之始誕姓命氏之源大名發於本支當塗峻於層構三辰鬱鬱天街分畢昴之都九野茫茫地險裂山河之境丞相以萬機論道匡大運而震威嚴尚書以八座當官贊金行而標領袖文昭武穆方駕齊驅公子王孫朱輪華轂大鵬垂翰馭風伯而指南溟天馬騰姿按雲師而集東道祖唐隋天水郡丞河陽都尉瑶林瓊樹擢標格以千尋圓折方流委波濤而萬頃雄飛有望豈惟京兆之丞隂德不愆何直丹陽之尉父寶皇朝通議大夫總管府司參軍事東家孔子至德生於上天南國申侯明靈誕於中嶽居朝翊贊道先王之法言公府弼諧對上天之休命若夫聖人作而萬物覩元首明而庶事康日月粲其光華山川鬱其雲雨則有英靈間出丹陵諧白鳯之祥符瑞挺生黑帝感蒼龍之傑隨珠一寸魏后揚眉和璧千金秦王動色顔生殆庶聞於竹馬之年揚子參元發自銅車之嵗建晴峯而直上疏筆海以橫流雕墻則百堵皆興峻宇則千門並列可大可久無忘簡昜之途為子為臣率由忠孝之境郭林宗之披霧豈敢名言孔文舉之欽風每相推薦若乃五材並用誰能去兵七德兼施止戈為武出師於九天之上暗合兵書取暌於十日之前懸符射法固以文武之道揄揚滿於城中將相之才籍甚聞於海內貞觀十五年起家補國子博士喬林掃日驚白鳯於詞條壁水澄天駭雕龍於義壑班超慷慨常懷萬里之心季路平生每負三軍之氣十六年敕授左翊衛北門長上祿賜同京官仍令為飛騎等講禮鄧司徒之舊事馬上讀書祭征虜之前聞營中習禮宫花如錦還臨拜將之壇槐葉成帷復對聞軍之市自皇天眷命大帝應期運璇衡而制八方調玉燭而臨四極元莵白狼之野來奉衣簪蟠桃析木之鄉尚迷聲教太宗文皇帝操斗極把勾陳因百姓之心問三韓之罪勝殘去殺上馮宗廟之威禁暴戢姦下藉熊羆之用公丹心白刃本自輕生六郡三河由來重氣烏江討逆剖項籍於五侯鹿野懲姦礫蚩尤於四豖二十年詔除遊擊將軍右武侯信義府右果毅都尉長上如故顯慶二年以內憂解職痛深吳隱哀極顔丁蹐厚地以崩魂訴髙天而泣血紫泥垂煥頻降璽書墨縗臨戎遂從金革三年詔除左衛清宫府左果毅都尉尋圍谷府折衝都尉並長上如故又以應詔舉對策甲科遷左騎衛郎將於時長榆歷歷烽火猶驚髙栁依依邊風尚急關山夜月遂為弧矢之秋西北浮雲翻作穹廬之景四年詔公為鐵勒道行軍總管陳兵玉塞按節金微學長山之蛇擬麗譙之鸛鐘鼓嘈囃上聞於天旌旗繽紛下蟠於地伏尸百萬因瀚海而藏舟闢地數千即燕山而築觀武臣雄略氣懾西零神將宏圖威加北翟麟德元年詔遷左驍騎中郎將尋檢校右監門左武衛將軍本官如故昔者封禪陟云亭之後七十二君圗書出河洛以還三千餘嵗振兵釋旅方崇薦帝之儀道洽功成必致禋天之禮粵以皇家闢統之五十年今上開基之十七載登封告禪玉牒金繩建顯號而施尊名揚英聲而騰茂實華夷輯睦皆承萬嵗之恩朝野歡娛咸奉千年之慶乾封元年詔加明威將軍本官如故大風遺孽叛換青邱小水殘魂憑陵碧海率百官於文祖尚興彭蠡之師會萬國於塗山猶有防風之戮是嵗也詔公為遼東行軍總管軍營對日兵氣橫天開玉堂而按部坐金城而勒陳闕鞏之甲犀兕七重艅艎之船舳艫千里駕鼉梁於聖海秦皇息鞭石之威泛鰲釣於仙洲愚叟罷移山之力然後風行電卷斬將屠城塞丹浦之遙源伐黑林之奧本王孫公子名霑皂隸之臣深谷泰山境入樵漁之囿二年詔加上柱國仍檢校安東都護道之以德齊之以刑威振六官風揚五部兵戈載戢無勞尉候之虞桴鼓希聞寧有穿窬之盜仰太陽而晞湛露方預四朝臨遊水而急寒風俄悲一去齊孟嘗之下淚髙榭曲池魯司寇之悲歌頺山壞木長安杳杳還符日近之言京兆悠悠竟絶天髙之問紫關出入判自無期繡服回還竟知何日總章二年三月十六日遘疾薨於府第春秋五十有四嗚呼哀哉詔贈左監門將軍禮也惟公被服忠孝周旋禮樂仁者見之謂之仁智者見之謂之智研幾册府金縢玉版之書索隱兵鈐元女黃公之法每建輿推轂三令五申躬擐甲胄親當矢石軍井未建如臨盜水之源軍竈未炊似對嗟來之食由是南馳北走東討西征擲之無旁按之無下載筐宫裏遙登上將之壇飛星閣邊獨列中軍之位雖龍泉匿字薰歇光沉而麟閣飛名天長地久夫人扶風氏隋濠州刺史圓之孫也五松春豔牽少女之祥風八桂秋雲降仙娥之寶魄謝家之子歌栁絮而知慙劉氏之妻頌椒花而自恥三周按禮無虧內則之風四德揚蕤載闡中閨之訓宿盤龍於月鏡早沒鸞牀矯飛翼於霞棲先沉鳯穴珠星璧月終陪季子之階金鼎銀樽竟列齊侯之寢以貞觀十五年終於某所越咸亨元年某月日袝於某原長子瓜州司倉擇木次子右衛親衛元封等門傳萬石庭列雙珠花蕚爭榮芝蘭藹秀天經地義欽承避席之談日就月將虔奉趨庭之教變槐檀而瀝膽木石悲酸代霜露以崩心幽明感動葬之以禮祭之以時生人之本盡矣死生之義備矣孝子之事親終矣於是門生故吏共緝家聲才子文人思傳盛德庶使藺相如之壯氣歷千載而猶存隨武子之餘風盡九原而可作其詞曰文王受命畢公餘慶玉樹聨芳金枝疊映三分並列七雄齊競建國承家重熙纍盛功宣蹈舞德流歌詠河洛垂文山川吐雲驪珠育照虹玉呈文直立孤聳天然不羣棲遲膠孰悅懌邱墳恥為儒者自許將軍伊祁不懌軒轅討逆陳擁遼河兵鎮碣石班超投翰揚雄執戟弓合三才刀長四尺爰清尉候載澄疆場得人者昌失人者亡皇心俾乂帝曰明敡幽桂含馥滋蘭吐芳承天待詔觀國賔王茂實斯逺英聲克彰鵬池渺漫雞山禍亂出閫辭家夷凶靜難金微瓦解玉亭氷泮扈駕天門陪祠日觀萬邦胥悅千齡啓旦斗骨危城占蹄舉兵丸山霧塞渤海波驚帝赫斯怒王師有征虔劉北類戡翦東明遵以文軌宣其德刑太微上將文昌貴相非熊非羆令聞令望寵踰軍幕榮參武帳本謂來朝何期返葬原野蕭瑟風煙悽愴天道如何吞恨者多松風夜響薤露晨歌秋月如練春雲似羅榮華滅後寒暑經過青鳥邱壟白馬山河蘭英碑辭明李貢蘭英蓋川軍也成化初調廣寧操偹九年春隨總兵歐拒敵於小黑山敵因風縱火軍潰歐馬中箭死兵圍益急英曰主將三軍司命歐公危如大衆何乃以所乘馬授歐英遇害越今三十二年矣豫行憲至蓋聞其事而哀之乃刻石於墓而系以辭曰王朝之制兮邊守為嚴逺人窺伺兮匪月伊年移師還禦兮將卒鼓行主將馬踣兮貫矢於膺耳目溷亂兮旌旗失位山川崩沸兮雷霆為潰何此心之耿耿兮持本初而不背等死生於鴻毛兮特昭彰乎大義維將士之司命兮國體係夫重輕或纎芥之摧辱兮曽何用乎微生我骨可斷兮溝壑是橫我血可塗兮原野是腥獨主將之不可死兮遑鑒豫之衷情期將卒之兩全兮信倉皇之所難矧鋒鏑之在前兮不可從容而盤桓惟委馬以奉主兮冀縱轡而生還豈厮役之受恩兮欲圖報而難殫慨羊斟之御主兮抽夙昔之恨端乃戀戀於杯羹兮竟致主於相殘顧倉猝之所處兮在恩義為兼盡人孰無死兮要能處之得其正重國事於邱山兮匪私情之是徇孰謂厮役之瑣兮保兹忠誠之至性自歸骨於荒原兮已三紀其有餘神飄飄而長征兮飲沆瀣而康娛俯永世而一息兮伴貞烈以為徒嗟恩膏之未及兮在世道為何如周崇死難兮有門關以及孤漢寵死事兮紛印綬之纍纍覽往事以隕涕兮對幽墳而忸怩托貞珉以系辭兮慰忠魂於些微祭文弔國殤文唐張説北伐兮東弧邈遼陽兮孤竹偏師兮覆衆在崇山兮峽谷露芃芃兮蔓草風蓁蓁兮拱木見馬血兮夜然聞殤魂兮雨哭君王按金鼓而氣憤撫珠鈴而淚滋橫萬里兮抽恨弔羣山以寫悲懟凶將兮我辱悼勇夫之𬒳纍彼殷鑒兮未逺何後來兮不追對死地兮出陳臨傷門兮用師軍奪帥兮虹蝕壘車脫輻兮火焚旗有欒黶兮愎矣無范宣兮愧之命窮追兮短兵錯膚迎刃兮血染鍔旋殘潰兮棄組練山猶號兮谷猶戰殪原野兮奈何違君親兮不見於戲何天命之奄忽俾仁義之禮兵為蠻夷之俘骨鬷大校之飛將問吾營之徑卒吾見出兮不歸竟名存兮身殁祭古墓文明賀欽維年月日户科給事中賀欽遣園丁朱紀以隻雞杯酒之奠昭告於前朝古墓主人之靈今嵗之夏園丁作廬掘土築墻石棺以見奈何愚夫蔽而不告埋骨别所取棺入城貨人為槽用飼畜産自恨無德化及家衆乃致園丁為此不仁知之後時改過遲暮謹以遺骨復歸故器深埋堅築志以封土期以久逺更無他虞世俗衰薄殘忍成風石棺飼畜比比皆爾曽念古人骨棄何所我亦人耳忍復用兹安得仁人在位行政各使遺骸得歸故藏德薄力微痛惻而已謹遣園丁酌酒謝過不亡者存鑒此誠意尚享墓志銘醫閭先生墓志銘明潘辰播愚始聞醫閭先生之訃既為位哭之已而厥嗣鄉進士士咨奉先生髙第弟子外甥胡深所撰狀請愚銘其墓愚與先生道義相契垂五十年非燕遊一朝之好可論不能以不文辭按狀先生諱欽字克恭姓賀氏其先浙之定海人𨽻遼東廣寧後屯衛官籍考孟員甫妣郭氏以正統丁巳三月十一日生先生於官邸幼挺岐嶷長標恂淑總角從鄉先生習舉子業心不自滿曰為學止於是耶及聞先儒所謂以誠敬為入門踐履為實地諸語因省曰作聖之功端在於此弱冠以詩經魁山東鄉薦兩躓春闈咸即日歸省或諷之以取捷徑則曰親老在堂定省不可久曠吾烏知其他成化丙戍登羅倫榜進士丁亥春擢户科給事中謂家人曰古人事一職豈肯茍然為是職尤不可以苟為者遂書鄙夫可與事君章於壁上以自警戊子春亢旱與給事中胡智董旻各上章極諫先生言修德彌災當以實心行實政庶天意可回今朝廷所行未免徒務虛文不報先生復以言官曠職召災自劾求退雖不得請而去志決矣其年冬即告病歸杜門不出専以進修為務初在科時聞廣東陳白沙先生為有道之士修刺謁之一見契合遂相與講明治心修身及經綸大務終嵗弗輟至是懸其小像於靜室時率諸子焚香拜之儼如神明大聚古聖賢典籍於中矻矻然窮日與夜而翻閲之必求造乎其極而後已有來學者則謝之曰學者君子之為已教者聖賢之餘事自治不贍何暇及人久之於性命道德之藴天理民物之彜經世之要道為學之大法所得益深始內屨焉而其為教一以躬行實踐為主文章政事次之磨礲淬厲成其器業故及門者咸知有為己之學學在有用而不惑於他岐矣雖不出户庭而達官貴人間風仰德者莫不躬拜牀下得其緒餘而惠及生人者恆多𢎞治改元大學士劉公吉首薦先生才堪大用及除陜西參議撫治商雒等處兼分守漢中府地方錫之璽書假以便宜懇辭不就乃陳四事一曰資真儒以講聖學二曰薦賢才以輔治道三曰遵祖訓以處內官四曰興禮樂以化天下數十萬言極其愷切皆人人所不敢道者使得見於行事天下可幾而理矣處家篤恩義正倫理厚姻戚睦鄉黨救災恤患重本抑末冠婚喪祭一遵古禮不根之言纎毫不入其耳子姓能言與行者必薰陶之以孝弟之義僮僕與人相接者不問其曲直必撻以記之鄉俗溺於異端凡喪葬者皆作佛事啖酒肉肆為奢僭而不顧其於奉先事親之禮背戾尤甚先生以身範之日改月化漸入佳境仍舊習者百無二三焉性酷愛山林每時和景明必攜門人子姓登髙涉逺徜徉嘯咏而歸充然獨有所得為學雖不務詩文然應酬之際信口流出一皆藹然仁義之言大有關于名教故得其片紙隻字者莫不寶之正德初年錦義二城激變巨室鮮不為其所撓獨相約不敢犯於先生之族雅量汪濊喜愠不形惟愛君憂國之念老而彌篤每聞朝廷用一善人行一善政輒喜而不寐如有愆違則疾首蹙額不能安也庚午十二月四日以疾終于正寢壽七十有四配席氏本城官家女有賢行與先生同德比義相賔友少先生三嵗先四日而卒生男四長即士咨次士誾士謨士詔皆積學待聘女一適本城都指揮史文孫男十一世雍世和世泰世平世清世寧世安餘幼孫女八長適錦州都指揮梁臣次適本城馬都指揮冡子倫次適指揮劉渭餘俱幼以次年二月十五日合葬于閭山之光明谷中先生少讀書於此山之西因以醫閭山人自號人遂稱為之閭山先生云於戲以先生之迹言之其學雖未大明于天下而能名于一家與一鄉先生之道雖未大行于天下而能行于一家與一鄉先生之德雖未大被于天下而能化其一鄉一郡之強暴以先生之功論之則其學之醇其道之正其德之粹其節之髙其名之稱表表昻昻所以風勵天下垂範後世者固無窮也豈曰行於一家化於一鄉被于一時一世而已耶是不可以銘乎銘曰允矣先生偉哉男子力到功深逢源達委時行則行時止則止諌則忘身隱則樂已不愧不怍盡善盡美表今風後寧有窮己我作斯銘用補國史欽定盛京通志卷一百十四
