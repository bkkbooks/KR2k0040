body:
  text: 厯朝藝文二詩樂府五言古七言古五言律七言律五言排律五言絶句七言絶句欽定四庫全書欽定盛京通志卷一百十厯朝藝文二詩樂府辭鼓吹曲屠栁城篇三國魏繆襲屠栁城功誠難度越隴塞路漫漫北踰岡平但聞悲風正酸踏頓授首遂登白狼山神武讋海外永無北顧患鼓吹曲征遼東篇晉傅元征遼東敵失據威靈邁日月公孫既授首羣逆破膽威震怖朔北響應海表景附武功赫赫德雲布髙句驪曲北北朝王褒蕭蕭易水生波燕趙佳人自多傾杯覆碗漼漼垂手奮袖婆娑不惜黃金散盡只畏白日蹉跎和紀遼東篇隋王胄遼東浿水事龔行俯拾信神兵欲知振凱旅歸樂為聽凱歌聲十乘元戎才渡遼扶濊已氷消詎似百萬臨江水按轡空回鑣五言古遼西作唐崔皓燕郊方嵗晚殘雪凍邊城四月青草合遼陽春水生夷人正牧馬漢將自徴兵露重寶刀濕沙虛金鼓鳴寒衣著已盡春衫誰與成寄語洛陽使為傳邊塞情漉酒圖在遼東作金龎鑄我愛陶淵明愛酒不愛官彈琴但寓意把酒聊開顔自得酒中趣豈問頭上冠誰作漉酒圖清風起毫端露電出形似神情想髙間大似揮絃時目送飛鴻難袖中有東籬開卷見南山嗟豫因塵土青鬢時時斑折腰尚未免敢謂善閉關望望孤雲翔徒羡飛鳥還歸田未有日掩卷空長歎送周山人之遼東元揭徯斯物變風已暄庭虛雪猶在每與君子違偏驚嵗年改名山先夢到靈藥隨方采明日望行人靈槎隔遼海次韻黃華和同年九日詩元耶律楚材西風殘日秋有客嗟幽獨偶爾得香醪凄然憶霜菊世態屢變遷人生多反覆十年一夢中猶未黃粱熟由祖越過龍泉明程啓元一徑何盤曲東西亦委蛇危巖嵌蘭若疲馬安能馳豈不憚峻險薄言恣探竒清泉濯長纓聊與性命期雅有杯中物可以樂我私七言古田器之燕子圖井序金龎鑄器之自敘云明昌丙辰豫從軍塞外野舍荒涼難以狀言春末有雙燕來巢此屋土人不之識屢欲捕之豫曲為全護此燕晝出夜歸豫必開户待之忽一日飛止坐隅都無驚畏巧語移時不去豫始悟明日秋社此鳥當歸殆留别語也因作一詩贈之云幾年塞外厯﨑危誰謂烏衣此亦飛朝向蘆陂知有為莫投茅舍重相依君憐我處頻迎語我憶君時不掩扉明日西風悲鼓角君應先去我何歸此詩以細字寫之為蠟丸繫之燕足上明年四月豫受代歸又八年泰和甲子任潞州觀察判官四月十二日偶坐廨舍之含翠堂忽雙燕至一飛簷户間一上硯屏豫諦視之繫足蠟丸故在乃知此鳥蓋往年贈詩者也因請同年龎君才卿畫為圖求諸公賦詩田君才略燕雲客少年纍有安邊䇿悔從筆硯取功名直要橫馳沙漠北塞垣春雪白皚皚東風未放元隂開烏衣之國定何許一雙燕子能飛來三年驛舍安西道眼底鶯花無夢到忽見低飛入短簷此身似向邯鄲道君居東海我中原相逢乃在穹廬前天涯流落俱為客感時念逺空澘然長安何限髙髙閣晝夜風間開翠幕底事猜嫌不往依甘從此地風沙惡土人嗜肉無人心一生弋獵誇從禽有巢幸穩勿浪出汝身未必輕千金朝來暮去益狎昵物我相忘情意一但怪重裘積漸添元是西風催社日須知音巧惟鷾鴯忽來坐隅如告辭我方流寓未歸得為君忍賦傷心詩詩成自述聊為戲繫足封之亦無意燕已歸飛我未歸刁斗聲中忽驚嵗旄頭夜落妖氛收嫖姚獻凱歸神州玉關早喜班超入北海不聞蘇武留君才經世寧終枉幕府須賢來上黨别後歸期兩及瓜人間秋燕十來往沈沈官舍紅芳稀葛衣燕居淡忘機忽聞巧語入簷户大似相識來相依一飛簷外窺庭樹一上屏山驚不去解足分明得帛書真是當年留别句天生萬物禽最微固耶偶耶吾不知古道益逺交情漓朝恩暮怨雲遷移當時握手悲别離一旦富貴棄如遺聞豫燕歌應自疑慎無示之嗔我譏雪谷曉裝圖金龎鑄溪流咽咽山昏昏前山後山同一雲天公談笑玉雪噴散為花蕊白紛紛詩翁瘦馬之何許忍凍吟詩太清苦老奴寒縮私自語作奴莫比詩奴苦木僵石老鳥不飛山路益深詩益竒老奴忍笑憐翁癡不知嗜好乃爾為楊侯胸中富邱壑醉裏筆端驅雪落因何不把此詩翁畫向草堂深處著覺華島并引金王寂豫自少時即聞遼東覺華島為人間佳絶處凡道經海上未嘗不駐鞍極望久不能去第簡書有期不得一到為恨大定乙未之秋仲月十有四日豫自白霫審讞寃獄歸投宿龍宫下院謀諸老宿期一往焉老宿曰今秋風徑厲波浪洶湧雖柁工篙師往來其間亦不免縮頸汗背當俟隆冬氷合如履平地然後可著鞭耳豫竟不聽明日登舟行未幾風濤掀簸舟人為之變色於是收帆弭楫維石於北渡豫歎曰此而不濟則命也乃割牲釃酒投是詩以禱之遂復鼓枻以進已而風停浪靜天水湛然極目萬里恍然如坐大圓鏡中指顧之間巳登彼岸舟僧大德謂余曰正直動山鬼詩句起蟄龍者信不誣矣豫笑曰如二公者千古仰之如泰山北斗豈庸人末士所可擬哉是必憐其勤而報以誠也不然則劉昆所謂反風滅火蝗不入境者皆偶然耳雖然此一段竒境亦不可不紀也宫庭湖神感且通往來送客能分風廣德王祠禱輒應重樓翠阜浮霜空我行擬上覺華島香火遍走青蓮宫中流未濟成齟齬船頭西向旗腳東雲奔霧湧白浪捲一葉掀舞洪濤中平生行止類如此慿仗願有信與忠嘗聞主海尊位置顧豈變化難為功指呼蛟蜃掃隂翳天水萬里磨青銅解維轉柁飽帆腹雙槳不舉追驚鴻兹逰政要償素願勿使坐歎詩人窮投文再拜􅅹微懇為我寄語白龍翁留題覺華島龍宫寺金王寂傳聞三山駕空虛珠宫貝闕神仙都茫茫弱水限舟楫人迹不到如有無平生點檢江山好我有龍宫覺華島何年經創作者誰興聖帝師孤竹老老人絶俗棲金沙嵗久喜捨來天家懸崖架壑置佛屋突兀殿閣凌煙霞一作明明霞乃知造物開神異故壓袛園布金地四顧鯨波翼寶巖玻璃環擁青螺髻我生自厭薰羶腥坐覺兩掖生清泠夜涼海月耿不寐幾欲舉手捫天星明朝收帆落塵土一夢回頭散風雨向令坡老此經行想不願為天竺主醫巫閭山金蔡圭幽州鎮山髙且雄倚天萬仞蟠天東祖龍驅之不肯去至今鞭血餘殷紅奔岸暗谷生雲樹蕭寺門橫入山路誰道營邱筆有神只得峯巒兩三處我方萬里來天涯陂陀繚繞間風沙直教眼界臻明秀好是嵐光日夕佳封龍山邊生處樂此山之間亦不惡他年南北兩生涯不妨世有揚州鶴金太子允恭墨竹元劉因黑龍江頭氣鬱蔥武元射龍江水中江聲怒號久不㵼破墨揮灑餘神功天人與竹皆真龍墨竹以來凡馬空人間只有墨君堂何曽夢到瓊華宫瑶光樓前月如練倒影自有河山雄金源大定始全盛時以漢文當世宗興陵為父昌明子樂事孰與東宫同文采不隨焦土盡風節直與幽蘭叢百年圖籍有蕭相一代英雄誰蔡公䇿書紛紛少顔色空山夜哭遺山翁我亦飄零感白髮哀歌對此吟雙蓬秋聲蕭蕭來晚風極目海角天無窮題王學士熊嶽圖元元好問洗參池水甜於蜜玉堂仙翁髮如漆膝前文度更風流盡捲風流入詩筆長松手種欲摩天海嶽樓空落照邊古來説有遼東鶴仙語星星誰為傳五百年間異人出却將錦繡裹山川五言律送郭少府入遼唐韓翊邊烽警榆塞俠客渡桑乾栁葉開金鏑桃花耀玉鞍滿月臨弓影連星入劍端莫學燕丹客空歌易水寒渡遼金劉著身隔遼東渡心懷冀北群會歸蘇屬國却憶范將軍風陳橫秋雁雷聲吼夜蚊方言莫相笑唐梵本殊分喜夏金龎鑄小著不足畏深居如退藏青奴初薦枕黃嬭亦升堂鳥語竹隂密雨聲荷葉香晚涼無一事步履到西堂廣寧懷古明劉成德衰草間仙洞青雲冷誓臺輿圖連朔野雞犬靜塵埃水自荒沙出山從故國來戍樓鐘報曉笳鼓遞相催逰中會寺二首明龔用卿寺逺山僧少叢林草徑深懸崖盤石磴古殿度雲岑枝密回流合巖幽向日隂欲將金印挂瀟灑定禪心蛇山盤古折線路繞千尋萬里風雲壯諸天嵗月深花香浮塔院霞影落邱岑杳杳鐘聲動遙峯擁碧林溫泉明徐景嵩萬古溫泉水百年幾度逰炎流從地發暖氣欲天浮風過亭臺爽山環景物幽自憐多病客不是濯纓儔七言律渡混同江金蔡松年十年八喚清江渡江水江花笑我勞老境歸心質孤月倦逰陳迹付驚濤兩都絡繹波神肅六合清明斗極髙湖海小臣尸厚祿夢尋煙雨一魚魛晚登遼海亭金髙士談登臨酒面灑清風竟日慿欄興未窮殘雪樓臺山向背夕陽城郭水西東客情到處身如寄别恨他時夢可通自歎不如華表鶴故鄉嘗在白雲中李仲佐遼東之豪士也初識於大元帥席上怪其議論英發坐客盡傾至於通練世務商較人物雖博學老儒或有所不及僕喜其為人臨分以二詩贈行且將以為定交之券也金王寂夤緣樽爼接雍容一洗從來芥蒂胸笑我殘年方射鼠喜君巨手學屠龍聞名素重千金諾識面尤輕萬户封指日乘槎吾已矣與君林下會相逢客路逢君蓋少傾歡然相與話平生心胸皂白人倫鑒齒頰吹噓月旦評雞黍後期雖有信參商輕别得無情從今把酒須東望千里關山共月明自東營來廣寧道出牽馬嶺去路幾半里松檜鬱然桃李間發問之云利器梁侯之先塋也其櫬尚附淺土遂命酒哭奠而去公初待我以國士雖晚意少疏而恩禮未易忘也金王寂九仞終虧一簣功想知銜憤泣幽宫死生怒臂屈伸頃得失奕碁翻覆中只有松杉全晚節不隨桃李嫁春風門生故吏知多少誰致生芻奠此翁再過墳下金王寂毁譽譊譊息蓋棺百年春夢大槐安功名倒挽九牛尾富貴真成一鼠肝故國鶯花人事改空山風雨夜臺寒平生我亦心如鐡醉眼西州淚不乾渡遼舟中小酌金王寂佳會清歡取次成逸羣髙論極崢嶸掀鬚巳判玉山倒蘸甲不辭金碗傾落日櫬雲魚尾赤斜風捲水縠紋生豫愁江上分飛後千里關河月共明和非熊韻元耶律楚材藹藹英聲鎮北州非熊人物本風流時逢佳客開青眼久領元戎尚黑頭巳發豐城神劔出休嗟暗室夜光投驅兵經略開中了題遍長安舊酒樓和薛伯通韻元耶律楚材滴滴秋光溢逺山穹廬寥落酒瓶乾詩章平淡思居易禪理縱橫憶道安不忍西風霜葉脫難禁秋雨菊花殘閭山舊隱天涯逺夢裡思歸夢亦難和伊喇子春見寄元耶律楚材邂逅沙城識子初天山風雪醉吟餘文章光熖君堪羡節操儀刑我不如麯蘖鄉中前進士風波堆裏老中書他年歸去無相棄同到閭山舊隱居寄景賢元耶律楚材人間聚散忘悲歡何以林泉遁世間十載殘軀逰瀚海積年歸夢繞閭山空嵓猿鶴招豫往滿架琴書伴我還多謝龍岡憐老隱新詩酬酢路無慳和沖霄韻元耶律楚材星星華髮鏡中驚好賦歸歟接淅行重位寧貪髙一品故園無憚逺千程晴天花絡春山色落日松和秋水聲無恙閭峰三百寺遨逰吟嘯老餘生思親二首元耶律楚材老母琴書老自娛吾山側近結蘧閭鬢邊尚結避兵髮篋內猶存教子書幼稚已能學土梗老兒猶未憶鱸魚誰知萬里思歸夢夜夜隨風到故居昔年不肯卧茅廬贏得飄蕭兩鬢疏醉裏不知身似蝶夢中不覺我為魚故園屈指八千里老母行年六十餘何日挂冠辭富貴少林佳處卜新居和武善夫韻元耶律楚材老子年來酷愛間不堪白髮映蒼顔十年興廢悲歌裏半世干戈寤寐間北闕欲辭新鳳閣東州元有舊閭山熊經鳥引聊終嵗嵓下疏松正好攀宿大安有懷明吳希孟竒石蒼松世界分千山虎豹散狼羣洞前黑白萬林雨壇上浮沉一篆藝鐘盡漏隨莊室蝶心依神會柏臺雲清樽舊約逾三月何日參軍細論文讀書明賀欽清晨起坐小茅堂萬事無關一炷香展卷細觀前聖奧馳名敢學世人狂也知老病年光促爭奈詩書意味長但願桑榆粗有得肯隨流俗嘆斜陽和瀋陽守愚邱先生韻明賀欽聲利沉疴幸已瘳煙霞痼疾豈須憂非關遁世矜髙節自是匡時乏逺猷鎖闥兩年空竊祿雲山十載免包羞管寧本是遼東客不願重過五鳳樓古澄丁聲逺來訪賦一律見遺因和明賀欽太學陳東天下知抗章不怕忤當時折腰彭澤成何事回首閭山有所思軒外孤松全晚節宅邊五栁散春絲歸來還是忘機客傳語沙鷗莫浪疑再和瀋陽守愚邱先生韻明賀欽白雲堆裏得安身名利無干逺世塵靜把簡編窺往哲每將菽水奉慈親江山秀麗詩懷壯窗户清幽琴調新幸有此般間快樂任他人醉五陵春過蓋州明馬文升煙霧新消海國邊荒園寒水與雲連山光杳靄飛鳬外秋色參差落雁前田野歡呼瞻使節公庭空寂長苔錢從容事畢還朝日韶舞聲中覲九天望京樓明郭登庸雨洗沙場兵氣收天涯秋暮獨登樓四方煙井聽雞犬百里晴郊散馬牛斷壠黃雲依古戍孤城斜日射寒流滄溟寂寞魚龍伏回首西南望帝州祖越寺明徐文華雲煙回合水潺湲路轉陂陀百折還上界鐘聲霄漢杳前山塔影夕陽間松濤漲壑千巖響花雨浮空滿地斑坐久虛堂疑誤入恍然身世出人寰五言排律博索道中書事金閻長吉此地先經戰人生苦未聊泉源疏地胍田壟上山腰敗石平危徑枯柴補短橋曉煙明逺㸑暮雪點歸樵履滑心頻悸梯危欲頓消解鞍空倒卧無夢訖清宵和張敏之詩七十韻并序元耶律楚材敏之學士逺寄新詩七十韻捧讀之餘續貂以尾聊資一笑壯年多轗軻晚節歎行藏故國頺綱穢新朝明德香雄材能預算大略固難量迭出神兵速無前我武揚本圖服叛逆何止剪譸張西討窮沙磧東征過樂浪彗侵天壘壁光動太微鋩整整車徒盛鱗鱗旗鼓望天皇深責重賢帥廟謀臧江左將禽楚河陽已滅商英雄皆入彀強禦敢跳梁採訪軒車閙司農官吏忙輕徭常力足薄賦不財傷勳業超秦漢規模邁帝王流言無管蔡竒計有平良增葺新文物耕耘古戰場蛟龍方奮迅雕鶚得翺翔偶遇風雲會爭依日月光永酬千古恥一怒四夷攘虎帳十年夢龍庭幾度霜迎降初請命出郭逺相將久敵真宜死寬恩何敢當赦書民有幸歌詠壽無疆扶杖聽黃詔稱觴進白狼散財竭庫藏拔將出戎行殷絶仁猶在周傾道不忘來朝燕郡內入覲大都旁戎服貂裘𬗋星軺俊馬蒼中春辭北望初夏過西涼瀚海洶而湧隂山倣且徨間雲迷去路疏雨潤行裝出處空興歎風光自斷腸典刑陳故事利病上封章天下援深溺中州冀小康流離承喪亂籌䇿要優長痼疾如神附遊魂笑鬼倀仁施能骨肉靈藥起膏肓避禍宜緘口當言肯括囊遭讒心欲剖涉苦膽先嘗北漠絶窮域西隅抵大洋詩書猶不廢忠信未能忘氊補連腮帳繩穿朽腳牀郊行長野興人靜若禪房回鶻交逰熟崑崙事迹詳風煙多黯黯雲水兩茫茫災變垂乾象妖氛翳太陽髯龍三島去玉葉一枝芳明主初登極愚臣敢進狂九疇從帝錫五事合天常大樂陳金石朝衣具冕裳降升分上下進退有低昻拓境時方急郊天且未遑應兵無血刃降虜自壺漿按堵無更肆因資不餽糧宸心尊德義聖世濟柔剛恩澤函諸夏威稜震八荒勢連西域重天助北方強舉我陪三省求賢原闕三字錦衣捐毳褐肉食棄糟粳隱逸求新仕流亡集故鄉百官欣戴舜萬國願歸唐耕釣生咸遂工商樂未央會將封泰嶽行看建明堂每嘆才雕篆長慙學面牆君恩豫久負賢路我深妨覆餗恆憂懼持盈是恐惶故山松徑碧舊隱菊花黃太守方遺舄初平正牧羊厚顔居此位若已納於隍吟嘯須歸去香山老侍郎懷古一百韻寄張敏之元耶律楚材興亡千古事勝負百枰碁感恨空興嘆悲吟乃賦詩三皇崇道德五帝重仁慈禮廢三王謝權興五伯漓焚書嫌孔孟峻法用髙斯政出人思亂身亡國亦隨阿房修象魏徐福覓靈芝偶語真虛禁長城信謾為只知秦失鹿不覺楚亡騅法約三章日恩垂四百期漢興學校啓文作典章施黯武疲中夏窮兵攘四夷嗣君恩稍失劉氏德難衰新室雖興難真人已御基魏吳將奮起靈獻自荒嬉賊子權移漢姦臣塢築郿三朝如峙鼎四海若棼絲才奉三陽主已生四馬師仲謀服孟德葛亮倍曹丕唯晉方承統平吳混八維有初終鮮克居治亂誰思蟬鬢充蘭掖羊車繞竹枝孫謀無逺慮神器委癡兒國事歸椒室民飢詢肉糜為人昧菽麥聞蟇問官私衛瓘嘗幾諌何曽已預知五湖雲擾攘六代電奔馳川谷流腥血郊原厭積尸天光分耀日地理列瓜時厯數當歸李驅除暫􅖍隋西陲開鄯善東鄙討髙麗鸞駕如江國龍舟泛汴漪錦帆遮水面粉浪汚河湄府藏金錢積生靈氣力疲妖氛天下起章奏禁中欺海內空龍戰河東有鳳姿元戎展鷹犬頡利助熊羆奉表遵朝命尊王建義旗經營於盜手禪讓託君辭豪哲歸吾彀要荒入我羈太宗真令主貞觀有皇規正美開元治俄成天寶悲曲江還故里林甫領台司裂土封三國纒頭愛八姨霓裳猶未罷鼙鼓恨來遲逆冦臨丹闕君王拾翠眉兩京賊黨滅方鎮重權移朱李元堪嘆石劉亦可嗤九州重搆亂五代薦荒飢遼宋分南北翁孫講禮儀宣和風侈靡教主德庸卑背約絶鄰好興師借冦資懸知喪唇齒何事撤籓籬失地人皆怨蒙塵悔可追遼家遵漢制孔教祖宣尼煥若文章備康哉政事熙朝廷嚴衮冕郊廟奏塤箎校獵嫻馳射行營習正竒南州走玉帛諸國愛鞭笞天祚驕人上朝鮮叛海涯未終三百祀不免一朝危鴨緑金朝起桑乾玉璽遺後遼興大石西域統龜兹萬里威聲震百年名教垂武元平宋地殷禮雜宗姬治國崇文事掄才尚賦詞邦昌君洛汭劉豫立青淄大定民興詠明昌物適宜日中須景昃月滿必光虧肘腋獨夫難邱墟七廟隳北朝天輔佑南國俗瘡痍天子潛巡狩宗臣嚴守陴山西盡荆枳河朔半豺貍食盡謀安出兵羸力不支長圍重數匝久困再周期太液生秋草姑蘇逰野麋忠臣全節死餘衆入降麾文獻生三子東丹第八枝虛名如畫餅遺業學為箕自笑蓬垂鬢誰憐雪滿髭撫膺長感慨搔首幾嗟咨車蓋知何處衣冠問阿誰自天明下詔知我素通蓍發軔裝琴劍登車執䇿綏窮廬或白黑驛騎半黃駓肥臠白如瓠瓊漿甘似飴天山連北府瀚海逹西伊天馬窮崖澥神兵過月氏感恩承聖敕寄住到尋愚春色多紅樹秋波總緑陂不須賖酒飲隨分有驢騎畎畝棲禾粟圜林足果梨舂粳光燦玉煮飯滑流匙聖祖方輕舉明君應樂推龍庭陳大禮原廟顯明粢萬國朝金佩千官列玉墀求賢為輔弼舉我忝丞疑才德真為慊顛危不解持願從麋鹿性豈戀鳳凰池投老誰為伴黃山有敏之五言絶句過錦州明孫承宗錦水波初靜髙軒向此過似聞城郭是東去竟何如下香巖明程啓元危途長側足髙處更回頭行路難如此何時卧故邱題扉上釣魚圖明賀欽倚杖看閭山垂綸釣陵水山頭宿霧開水面清風起自警明賀欽戰兢防失足頃刻莫馳心勿謂人誰見當知帝汝臨為學不謹獨到底是空言猩猩與鸚鵡孤負昊天恩七言絶句平州中和館後草亭遼李晏藤花滿地香仍在松影拂雲寒未收山鳥似嫌逰客到一聲啼破小亭幽集句題廣寧勝覽亭金李遹簷前無數好峯巒醉眼詩腸氷雪寒不識閭山真面目請君來此憑闌干宿錦州廣濟寺僧房卧屏一幅畫一綸巾羽服隱几胡牀命短童汲水澆花若有所待者相望一翁棕帽涼衫倚杖於溪橋之上意其眷戀風景而緩其行也乃賦首首金王寂垂栁隂隂晝日長野人無事自清涼袛應冷笑黃塵裏為米癡兒有底忙溪橋泉石想佳哉欲去遲遲首重回不道西莊間處士胡牀虛左待君來渡遼金王寂我家河朔望咸平飛鳥猶須半月程盡道遼陽天樣逺渡遼何况更東行閭山金蔡圭西風絶境撫孤松千里川原四望通但怪林稍看鳥背不知身到碧雲中寄大尹邵文明明賀欽長官辭縣賦歸來獨愛幽花手自栽何日一樽同嘯傲東籬飽看帶霜開欽定盛京通志卷一百十
