body:
  text: 國朝藝文十五奏疏欽定四庫全書欽定盛京通志卷一百二十九國朝藝文十五疏敬陳奉天邊地情形疏順治丁亥張尚賢盛京形勢自興京至山海關東西千餘里開原至金州南北亦千餘里又有河東河西之分以外而言東北起開原由西南至黃泥窪牛莊乃明季昔日邊防自牛莊由三岔河南至蓋州復州金州旅順轉而東至紅嘴歸復黃骨島鳯凰城鎮江鴨緑江口皆明季昔日海防此河東邊海之大略也河西自山海關以東至中前所前屯衛後所沙河寧逺連山塔山杏山松山錦州大凌河北面皆邊南面皆海所謂一條邊耳獨廣寧一城南至閭陽驛十三山站右屯衛海口相去百餘里北至我朝新插之邊相去數十里東至盤山驛髙平沙嶺以至三岔河之馬圈此河西邊海之大略也合河東河西之邊海以觀之黃沙滿目一望荒涼倘有姦究暴發海冦突至猝難捍禦此外患之可慮者以內而言河東城堡雖多皆成荒土獨奉天遼陽海城三處稍成府縣之規而遼海兩處仍無城池如蓋州鳳凰城金州不過數百人鐵嶺撫順唯有流徒諸人不能耕種又無生聚隻身者逃去大半略有家口者僅老死此地實無益於地方此河東腹裏之大略也河西城堡更多人民希少獨寧逺錦州廣寧人民湊集僅有佐領一貟不知於地方如何料理此河西腹裏之大略也合河東河西腹裏以觀之荒城廢堡敗瓦頽垣沃野千里有土無人全無可恃此內憂之甚者臣朝夕思維欲弭外患必當籌畫隄防欲消內憂必當充實根本務宜設卡添兵屯田廣儲以圗久逺之策永陵工程告竣疏雍正庚戌平郡王福彭臣等奉旨敕交福建總督髙其倬奏摺內開欽遵聖旨恭瞻永陵形勢其龍與長白分幹勢由納緑起祖髙冠羣山秀出天表備尊雄穎麗之觀光景耀日極逶迤頓跌之妙氣槩驚人蘇子洪河當前繞抱渾河巨浸在後瀠環千里大會之山作朝作護萬仞北辰之巘鎮水鎮垣更有欽異者寶城之內嘉樹挺出玉砌之旁靈根蟠結狀若旋龍堅同磐石所有陵所殿闕營建規模詳細瞻視俱屬妥合惟前面左邊廂房五間應行補蓋右邊相配始為勻稱陵西小河一道夏日水長漫上行路俱繞右手山腳而行宜修一小堤攔水護路再將此路修理微髙俾夏月可以通行其山腳繞行之路禁止行走方為妥協等因具奏奉旨命臣等敬謹辦理欽此臣等遵於五月二十四日照欽天監選擇吉日吉時敬謹動土隨恭詣祖陵目覩夏秋水長情形誠有如髙其倬所奏應築護路攔水小堤并將此路修令微髙俾夏月水長之時資其攔護往來得以通行不致繞踐山腳實為妥協再添蓋廂房重加丹艧兩相勻稱更覺整肅隨將料估應築石堤石橋攔水壩並填墊道路丈尺添蓋右邊廂房修飾左邊廂房等項需用物料匠夫工價銀兩數目繕摺請旨準行在案今照原估建築石堤若干丈堤中建修通水三洞石橋一座攔水壩一道長若干丈修墊河邊道路長若干丈髙若干尺添蓋右邊廂房五間修飾左邊廂房五間以上各工俱經告竣共計用銀若干兩此項銀已在領到福陵堤工銀兩內動用修造其用過銀兩修造清册併將所修式欵敬謹繪圖恭呈御覽欽惟我皇上大德大孝至聖至誠篤本溯源時時切橋山之望推恩錫類念念廣親愛之仁茲以祖陵工程關係重大特命臣等敬謹修理臣聞命之下彌深悚懼仰賴聖訓諄諄多方指示敢不竭誠率屬務圖修理堅固以仰副皇上至孝至誠鄭重祖陵之至意臣於抵工之日會同將軍臣那蘇圖仰遵聖諭宣布皇仁敬率在工人貟潔誠辦理凡物料工價俱按實數發給一時父老歡騰已徵羣心之愛戴工商輻輳更沐膏澤之殷流熙熙而來攘攘而往欣看喜色而爭先約之閣閣椓之槖槖遙聽歡聲而恐後方謂經始之勿亟載觀大工之告成蓋由睿慮精詳事事斟酌於美善可傳可法實係聖恩浩蕩念念淪浹於肌髓必信必從此我皇上誠孝之極至所以格天人通上下洵為千古未有之一人而非臣等所能仰贊其髙深者也臣等於工程告竣之日恭瞻祖陵有輔有翼煥然天表之巍巍如砥如矢坦如王道之蕩蕩不惟規模鴻整亦且結搆精嚴究氣局之宏深既竒祕而清晰瞻形勢之廣大復博厚而髙明八極入於照臨具涵蓋八表之象萬國供其驅䇿有包羅萬象之規允為諸吉之並鍾洵稱萬善之全備且喜工竣次日大雪即降銀花映寶城千百年之嘉樹愈榮而愈潤珠光籠玉砌億萬嵗之靈根彌固而彌長幸際盛世之昌明共慶豐年於有象益徵天心之眷佑永綿寶算於無疆矣福陵工程告竣疏雍正庚戊平郡王福彭滿漢文武大臣等敬議奏福建總督髙其倬等疏稱欽遵聖旨恭瞻福陵形勢其龍與永陵共祖同源分宗抽幹發自長嶺之西行於渾河之北順水而來張潮而結始聳萬仞之峯獨超羣嶺繼聨百尺之阜迥異平巒綿亘則虹轉雲舒昂頓則龍翔鳳舉逺極諸邊無峯不拱內際巨海無水不收蓋天地眷佑極精微廣大之全功故山谷鍾靈育文武聖神之遐福允屬上格之龍實為最善之地惟前而水法稍更故道水由夏日溢口而流弓抱之勢微覺外張必須修建石堤順導河流俾循故道則水抱砂圓益增吉慶等因具奏奉旨特命臣等敬謹定議臣等公同敬謹確議應如髙其倬等所奏將左畔水法復遵故道將原日河身淤淺之處挑濬寬深應修石工即行修理仰祈皇上欽點大臣一貟並敕下工部遴選才能官二貟督率前往料估建造使水法仍遵故道石工永致堅凝等因具奏奉旨命臣前往會同奉天將軍那蘇圖敬謹督理欽此臣面奉上諭福陵前面河身應填之處令臣等敬謹詳酌臣遵旨即帶領欽天監博士劉育圻敬謹相視據稱陵前河窪之處最宜培墊方為宏敞等語復命髙其倬議定填河取土方向並挑挖引河導令山溝小水五道會流環抱繞過陵前歸入大河於地法合宜等因具奏一併交與臣等敬謹辦理臣隨赴工所恭照欽天監選擇吉日吉時於雍正八年五月二十四日動土謹將工程需用物料匠夫工價等項行文工部取到部例敬謹遵照詳核所有料估各項銀兩數目陸續繕摺請旨準行欽遵在案今敬謹查得所築迎水順水石堤長若干丈攔水壩一道長若干丈又挑引河一道長若干丈左右引水小溝二道共長若干丈其填河工程遵照原議將原河兩岸髙下不平之處均徹平坦各處土坎修成漫坡填墊河身運用挖河取出之土並河崖邊及十里外之土若干方俱經填墊妥適以上各工原料估銀若干而今實用過銀若干兩未用銀若干兩今備造清册併將所修式款敬謹繪圖恭呈御覽欽惟我皇上大孝性成至誠天授善繼善述克紹皇祖之心傳丕顯丕承宏開萬代之謨烈光華被四表惟精惟一彌深宵旰之勤牯冒遍萬方曰寬曰仁益懋中和之治雖聖主不言祥瑞而皇極必有休徵雲慶河清悉皆聖德之洋溢靈芝蓍草益彰積纍之宏深茲以祖陵發祥之地風水攸關聖人報本之思疇咨倍切特命臣等敬謹修理臣赴工之時面領訓諭祖陵工程關係重大汝往欽承辦理勿省工勿惜費董率在工人貟各宜潔誠襄事罔不祗肅惟時工程堅固人心豫悅其無負敬祖愛民之至意欽此臣膺茲重任彌切悚惶及抵工所會同將軍臣那蘇圖仰體聖懷廣宣德意敬率在工人貟矢誠矢慎敬謹修理一時在工人貟靡不人人思奮竭力攢辦凡一應物料工價俱按實數給發是以萬姓歡騰咸若子來之趨事千廛雲集倍覺市利之充盈踴躍以赴皇工罔不欣欣而相告絡繹以沾聖澤悉皆蕩蕩而難名臣等興工伊始伏念工程浩大恆恐怠緩以稽時及督理經營悉遵指示周詳竊幸功成於不日此皆我皇上一人之大孝人人莫不興孝合天下之孝以同襄尊親之大典皇上一人之至誠人人莫不抒誠合天下之誠以共慰敬祖之深衷此誠聖帝明王千古未有之一人非臣等所能仰贊於萬一者也臣等於工程告竣之日恭瞻祖陵水循故道依然璧合而珠圓隄慶安瀾儼如龍蟠而鱗集障溢流而環抱方知萬派之朝宗引羣瀆而歸源更見千條之共貫為髙為下載觀奠安之均平有齒有唇永保岡陵於無替瞻案山之拱向千官整肅以來朝仰明堂之恢宏萬馬騰驤而侍衛合宇宙清寧之氣萃聚特鍾壇山川靈秀之竒包羅萬象固已廣大悉備更覺悠久無疆且幸工成次日即降大雪瑞皚應時羣識天顔之有喜豐年兆象預徵嘉穀之頻登遐邇歡呼同聲而歌萬年之頌天人慶幸稽首而上大有之書從此千百年景運宏昌快覩金甌之鞏固億萬世鴻圖永久愈卜寶籙之綿長矣請禁福陵風水禁地後諸小道車輛私行繞走議乾隆丙辰莊親王允祿據多羅淳郡王等奏福陵後小道有關風水請禁止外來車輛私行繞走等因一摺奉旨總理事務王大臣議奏欽此臣等伏查雍正元年十二月內平郡王面奉世宗憲皇帝諭旨福陵紅門前大路與寶城甚近車馬俱由山根左畔行走有關風水著行文奉天將軍府尹嗣後於渾河東南西南無關風水之處設立船隻以便行人車馬擺渡紅門前大路及山根左畔嚴行禁走欽此欽遵隨經該府尹等設立渡船具題在案今據淳郡王等奏稱渾河東南西南原各設渡船兩隻以濟往來今石廟興隆店二處渡口現有車馬擺渡惟因陵後來龍原有地名水泉長嶺一帶向係村民出入之小道與兩處渡口路徑相通且較之前路稍近亦有車輛竟從陵後往來者正係陵後龍身應令該管官兵嚴行禁約其往來車馬行人俱令由前定之兩處渡口行走至陵後小道除該地村民仍聽其出入自便外如再有外來車輛私行者不時查禁等語應如淳郡王等所奏令奉天將軍嚴行禁約其往來車馬行人俱令由前定之兩處渡口行走至陵後小道除該地村民仍聽出入外如再有外來車輛私行繞走者即令該管官兵嚴拿懲治至所奏原設水手嚴禁勒索並於冬初春初搭蓋橋梁以免留滯之處亦應照所奏交該府尹並盛京工部料理福陵前隄工議乾隆丙辰莊親王允祿據多羅淳郡王等奏稱福陵隄工前經臣等帶同洪文瀾等悉心相度酌修土隄開寬引河培墊中心包鑲石岸逐一料估造册繪圖等因具奏嗣於本年三月二十九日接準部咨總理王大臣等議覆謹案圖內洪文瀾等標出改修之處雖據淳郡王會同那蘇圖等奏稱誠為至善等語但祖陵工程關係重大必須慎重妥酌期於萬全方於風水工程兩有禆益查雍正八年修理陵工原係髙其倬前往相度今髙其倬已奉旨來京請俟髙其倬到日將所奏圖摺令伊閲看或應照淳郡王等所奏修理或其中應有酌量更改之處臣等再會同定議具奏等因奉旨是依議欽此欽遵今於四月十四日又接準部咨總理王大臣等議覆髙其倬到京將淳郡王等所奏圖摺與伊閲看并詳悉詢問議得上年淳郡王等奏請於頭隄上流之雞心灘開深溝三道本年淳郡王等照洪文瀾所看議停今據髙其倬議稱雞心灘應仍其自然不宜開動南岸亦與此相同不宜疏鑿等語應照所議雞心灘停其挑挖大河南岸停其開寬又上年淳郡王等奏三隄外加築攔水壩一道本年又奏應照原估加築計長六十丈又上年淳郡王等奏請於頭隄之下建築石壩外砌攔水壩本年又議改築土隄長一百六十丈照攔水壩式樣密立排樁中實以土隄東再加土壩斜長三十一丈以護隄頭其隄頭背後應用排樁一路用土鑲墊長二百八十一丈一尺九寸今髙其倬議稱決口若建石隄雖禦水有力恐其勢過強挑水南沖有損南岸應建土隄外加排樁護掃既可捍禦北面又不致有損南砂並應於雨多水大之時加意防護仍令嵗修是為合宜其舊設隄背後外加樁掃防貼內應用土填培等語查上年決口原係從前髙其倬所看無庸修建石工之土岡今髙其倬所議決口建築土隄外加排樁護掃各工與淳郡王等本年所奏相符應照淳郡王等所奏修理其將來如何防護嵗修之處臣福彭從前修工時曾將嵗修防護奏明交該將軍等料理應令淳郡王等於工竣時查照臣福彭原奏交該將軍會同工部嵗修防護又上年淳郡王等原奏開濬引河南岸止寬五丈本年議開寬六十丈又奏五皮石岸之南地勢低窪而引河北岸有天然土岡欲於東西兩邊包砌石䃗岸共長三百丈緊接天然土岡以防坍洗下面填墊水窪長三百丈上面鑲墊一律平髙長三百八十一丈以補內堂今據髙其倬議將虎皮石岸前所沖水坑亦應用土填平兩旁包砌石岸俱宜低不宜髙應比虎皮石墻低二尺五寸上面仍宜用土蓋培成天然小按之形其引河南岸洪文瀾議開六十丈亦為過寬原議開寬五丈亦覺少窄今酌議向南開寬十二丈作為月牙之形向內弓抱其土培作北面圓唇詳酌形勢應如洪文瀾所議修培但所開不宜太寬所培務宜圓靜其水沖溝流之處俱宜培平如舊等語髙其倬所議開濬引河墊填水坑包砌石岸與淳郡王等所奏相同惟是所開引河髙其倬議開寬十二丈應令淳郡王等俱照髙其倬所議另行酌估修理至於淳郡王所奏接築土隄鑲填隄後以及培墊低窪之處俱用挑挖引河之土所有馬關橋之土不宜取動引河頭之汀不宜填墊等項與髙其倬所議相合俱應照所奏行酌改工程應令另行估計核實造册具奏等因奉旨是依議欽此欽遵各知照前來臣等謹查福陵水法原係髙其倬於雍正七年定議建築兹因衝刷興修雖派有洪文瀾等數貟先後相度深恐識見參差未能畫一今又經原議之髙其倬再三斟酌臣等接準部咨細繹廷議所有酌量更改之處自應另行估計但查洪文瀾等議修各工臣等料估錢糧三十八萬五千七百餘兩內因建築決口頭隄背後以及石䃗岸培墊等處共長九百一十三丈一尺九寸在在需土鑲填共計需用土十八萬五千八百六十方估計填墊挑挖車運價銀三十四萬一千二百十兩六錢其餘磚石灰樁匠夫雜料僅估銀四萬四千五百六十七兩七錢四分零因土方十居其九彼時議將引河開寬六十丈即以挑挖引河之土運為各處之需業經臣等前摺聲明在案今查應行修建各處髙其倬與洪文瀾等所議俱屬相符惟將石䃗岸比虎皮石墻酌低二尺五寸引河止開十二丈雖各有應減物料錢糧而土方需用尚多今河開十二丈則少開河四十八丈即少得土四十八丈矣且髙其倬議稱用土培作北面圓唇又云所培務宜圓淨則前估䃗岸必須纎毫妥合方為盡善臣等公同親往敬謹相度查得前估石䃗岸原比虎皮石墻低二尺今照髙其倬議再低五寸但查上面培補一律平髙誠恐中間存積雨水自應南北略分髙低北頭低二尺五寸者南頭即應低三尺五寸則唇固圓而雨水亦不致存積再洪文瀾原議西邊露明流水山溝一道讓在石䃗岸外今照髙其倬議欲圓淨則此處不無缺凹應如砌石幫上下鋪墁石板作為暗溝俾水由內泄則東西一望整齊而觀瞻倍肅惟是原估需用土十八萬五千八百六十方除石䃗岸內減用土五萬一千一百二十六方七釐尚需用土十三萬四千七百三十三方九分三釐今引河十二丈內僅可得土三萬五千四百八十七方八分四釐實少土九萬九千二百四十六方九釐查引河南岸儘有土岡在洪文瀾原議河心淤積之土可以愈開愈寬得與大河相通髙其倬則議中間一砂內關小灘外攔大河最為得力若馬關橋之土不宜取動勢必於橋外極西逺處取土運送到工計程十里內外運價浩繁惟有引河南岸所積淤土數處與中砂相去尚逺若酌量地勢接聨分别道路里數可以均撤平坦即能得土九萬九千餘方隨交與郎中那禪等核實料估計土方填墊挑挖車運價銀二十三萬六千五百四十八兩二錢五分二釐磚石灰樁匠夫雜料銀五萬一千零七兩五錢四分四釐六毫二共銀二十八萬七千五百五十五兩七錢九分六釐六毫臣等覆核無異伏思陵前地土關係綦重今需用土方雖經臣等酌議數處但可否取用有無關礙非經熟悉風水之貟斟酌指定未可擅動理合繪圖敬將取土各處貼簽備造黃册進呈御覽仰懇皇上敕下原勘風水各貟按圖定議如議無關礙臣等謹俟部文到日遵照辦理再查原估決口需用排樁石囤頭隄背後需用排樁實土今髙其倬有外加護掃防貼之議查掃箇需用葦束不如石囤之能經久臣等應請仍照原估修理又臣等前摺奏明原估決口河身衝刷舊壩以及西南決溜隄中土岡各處俱無庸填墊修補今查此內西南決溜因引河開寬十六丈則決溜自可無虞今既指開十二丈則衝決溜口仍應堵築臣等謹合詞具奏伏乞皇上睿鑒施行再臣等於四月初一日動土今因接準部咨現在先築決口次第興修合併陳明等因奉旨總理事務王大臣議奏欽此臣等謹議得淳郡王等奏稱福陵應行修建各處工程髙其倬與洪文瀾等所議俱屬相同惟洪文瀾原議流水山溝一道若照髙其倬務宜圓淨之議不無缺凹應如砌石幫上下鋪墁石板作為暗溝再土方需用十三萬四千七百有餘今所開引河十二丈內止可得土三萬五千四百餘方尚少土九萬九千餘方雖經臣等酌議數處取用但有無關礙風水非經熟悉之貟斟酌指定未敢擅動等語臣等隨傳問洪文瀾管志寧據洪文瀾稱謹敬詳慎河工奏摺并圖樣將修理明堂平整之餘土平墊北面之圓唇實屬可行但工程關係重大不敢據圖即定現在管志寧前往盛京可以親赴工所詳酌修培至於內堂出水之處今議用石鋪墁作為暗溝於風水有關應照原議修理等語管志寧與洪文瀾同查福陵工程關係重大應否取土之處尤宜詳慎應令管志寧到盛京日斟酌詳慎至內堂出水之處洪文瀾既稱不便用石鋪墁亦應交與管志寧一併定議又稱原估決口需用排樁石囤頭隄背後需用排樁實土今髙其倬有外加護掃防貼之議查掃過需用葦束不如石囤經久請仍照原估修理等語查葦束自不如石囤之經久應如所奏仍照原估修理又稱原估決口河身衝刷舊壩以及西南決溜隄中土岡各處俱無庸填墊修補在案今引河既止開十二丈所有衝決溜口仍應堵築等語查引河開止十二丈則衝決溜口自應堵築應悉照所奏辦理伏候睿裁清釐奉天流民以培風俗議乾隆戊辰傅恆臣等伏思奉天乃滿洲根本之地向來風俗淳厚後因他省民人聚集衆多逰手無業之徒雜處其中敗壞生計漸染澆漓是以定議清查該臣等會議得辦理奉天流民一案於乾隆五年經大學士等定議具奏奉旨令情願入籍者準其入籍不願入籍者定限十年令其陸續回籍等因欽遵在案又臣等前曾將詢問過蘇昌永興等辦理奉天各處流民事宜並現在將軍阿蘭泰將次到京容臣等再會同定議等因奏聞亦在案茲據將軍臣阿蘭泰稱現在數年以來分作五項辦理其商賈工匠及單身傭工五項之人為旗民所資藉勢難禁阻原係準其居住其在奉天年久置有産業者遵奉恩旨豫限十年現在入籍者已萬餘户未入籍者亦屬無幾至遊手無業不安本分者即行驅逐數年來已逐去六千餘人自願回籍者不在此數臣等查該處流民現屆十年期滿所有商賈等項民人原許居住外其置有産業未經入籍者雖稱已屬無幾但現今屆期已滿十年其不願入籍而未經飭令回籍者未便觀望遷延應令地方官將伊等情願入籍確查實數速行辦理如有應行量豫展限之處聲明請旨此外有無遊手無業未經驅逐之人亦著確查辦理無致含糊朦混至嗣後內地流民若再偷越出口則將來辦理必致周章自應仍照原議嚴行稽查所有奉天沿海一帶應令旗民地方官多派兵役稽查並行文閩廣江浙山東五省督撫嚴查商船不得夾帶間人再山海關喜峯口等處及九處邊門俱令守邊章京沿邊州縣嚴行禁阻庶此後流民可以杜絶其源而旗人皆知敦本務業毋致稍染澆漓之習於地方風俗人心均有禆益再據永興稱寧古塔及船厰地方所有商賈工匠傭工人等約三四萬不等多係直隸河南山東山西各省之人已經入籍交納丁銀者四千二百八十六丁有地納糧者僅四百三十七户今應令逐細嚴查有地者令其納糧無地情願入籍者令其納丁又查寧古塔地方因泰寧縣裁汰之後該縣糧地俱按等次分賞寧古塔官兵以致流民多藉旗田之名額外開墾荒地以圖存身而旗人亦希圖地租巧為護庇但八旗官兵向有原分地數應查明原額留與官兵並查如有原分地畝不敷養贍者令該副都統酌量留給外其下剩餘地並分賞裁汰地俱查明撤出仍著原佃之人承種徵租使各安生業等語查寧古塔船厰等處流民除遊手無業之人照例驅逐外至於有業可守未免戀土難遷如果情願入籍自宜分别納糧納丁隨宜安插但查口外餘地該處官兵多於原分地畝之外招集流民開懇荒地以致流民多借旗田之名希圖存身而旗人亦希冀廣取租利巧為護庇應交與新任將軍等徹底清釐除官兵向有原分地畝仍聽官兵自行經營外其泰寧縣裁汰糧地及一切餘剩荒地官兵招佃收租者俱查明撤出令原佃承種納租歸公則餘地悉登公册流傭亦按籍可稽應交與新任將軍核實辦理以上事宜臣等與將軍臣阿蘭泰會議意見相同如蒙俞允應請敕交該部行令該將軍遵照施行遵旨會查奉天各屬應修城垣議乾隆戊戌于敏中本月初八日欽奉諭旨盛京為本朝王迹肇基之地朕恭謁祖陵道出山海關經過各處城垣多有坍塌殊不足以壯觀瞻而資捍衛著軍機大臣會同將軍𢎞晌查明何處最為緊要應行修築妥議具奏候朕發帑興工并派貟稽查督辦欽此臣等伏查奉天各屬惟盛京城垣每年立有嵗修章程現在崇墉完固毋庸修葺外其餘各屬城垣俱久未繕治實多傾圮其必應修築者共有一十八處但各城同時鳩工興作工匠既恐不敷稽察亦難周到臣等公同酌議請就應修各城分為三次修葺先將駐有官兵之錦州府熊兵鳳凰城並大路經行之寧逺州廣寧縣遼陽州六處較為緊要者為第一次次將中前所中後所巨流河義州鐵嶺縣開原縣六處為第二次又次將撫順海城縣岫巖廳蓋州復州金州六處為第三次其餘屯衛堡驛雖舊有城垣而地方僻小無關緊要者均無庸修葺並請簡派督辦大貟隨時往來稽查并遴派熟諳工程之貟每處一人會同將軍臣𢎞晌及府尹督率各屬估計工料奏明請帑擇日興工仍各預行度地開窑燒造磚料務期厚實堅緻足資鞏固所有臣等遵旨會同酌議緣由謹繪圖繕摺具奏伏祈睿鑒請定三陵青樁四至地界議乾隆戊戌和珅臣等恭隨聖駕展謁三陵俱當經奉旨派往陵寢周圍敬謹查勘紅樁內外一切情形臣等於紅樁外附近地方查出舊有墳冢數處均經請旨交奉天將軍飭令各本家速即遷移並嚴禁嗣後毋許再行營葬及添安柵木改移紅樁俱蒙俞旨允行在案臣等向聞東陵西陵凡距紅樁數十里之外尚有青樁此外方非禁地茲查盛京三陵雖地勢廣狹不同而規制宜從畫一必須酌定章程方可永逺遵行不致復滋流弊應請將三陵周圍就各地勢酌定里數亦仍照東西兩陵規制量增青樁一層此外方許採樵耕牧及行走葬厝青樁以內概行禁止如有違犯各該管官辨即行嚴查從重治罪惟各處地面廣狹臣等未能詳悉周知無從酌定道里數目應請敕交奉天將軍會同府尹等敬謹查明酌定四至里數詳晰定議請旨遵行欽定盛京通志卷一百二十九
