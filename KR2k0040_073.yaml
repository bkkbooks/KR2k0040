body:
  text: 國朝人物五正黄旗滿洲欽定四庫全書欽定盛京通志卷六十九國朝人物五正黄旗滿洲揚古利姓舒穆禄𨽻正黄旗滿洲父郎柱為庫爾喀部長倡其部人翊戴我太祖遣揚古利入侍尋郎柱為部人所害其妻孥㓜子來歸及庫爾喀舉部内屬揚古利偵其部人之殺父者手刃之時年甫十四太祖深異之日見信任乃尚主焉征輝發多璧城阻水不得進揚古利亂流而濟衆從之遂抵其城多所俘獲取訥殷部及珠舍哩安楚拉庫路皆有功從征哈達擒其酋䝉格布禄以歸嵗丁未遷費優城戸口偕侍衛扈爾漢率兵為前導烏拉以萬人邀諸路我兵止二百相顧未發揚古利曰吾儕嘗謂死于疾寧死于敵此非臨敵時乎矛突入斬七人敵稍却我後部兵繼至併力奮擊大破之再征輝發狥赫錫赫穆稜路每為軍鋒嵗戊申從攻烏拉金州城克之嵗癸丑從攻烏拉青河城敵殊死抵禦勢鋭甚太祖恤諸將士傳箭令少退揚古利獨麾衆薄城疾攻拔之嵗己未明總兵杜松馬林先後來犯從擊松於界藩覆其軍以力戰被創進擊林於尚間崖太祖誡被創者勿更戰揚古利堅請行裹創奮擊大破之天命六年取瀋陽皆先登功最太祖嘉其績命位次八貝勒下爵以一等子予世襲十年明總兵毛文龍遣兵犯耀州乘夜襲官屯寨擊殱之天聰三年從征明薄燕京城敗明武經略滿桂軍于城北師還略通州火其船再敗其兵于薊州四年略錦州義州七年略山海闗具有斬馘八年晉超品一等公世襲罔替從攻大同宣府拔靈邱崇徳元年偕武英郡王阿濟格征明入喜峰口下昌平等十二城五十八戰皆㨗俘獲以萬計二年從征朝鮮抵南漢擊走其全羅忠清兩道援兵追及山嶺猝中鳥鎗傷重卒年六十有六揚古利自弱冠從軍大小百餘戰功績懋著而持身敬慎厯事兩朝恩遇殊絶殁之日太宗慟哭之親視其含歛比塟復臨奠醊為置守塜追封武勲王以其子塔瞻襲公爵順治中配享太廟康熙三十七年聖祖東巡親酹其墓三十九年御製碑文紀其功雍正九年加封號曰英誠乾隆八年十九年四十三年四十八年上詣盛京俱親酹其墓有御製賜奠詩􅚿載章門天楞額禮武勲王揚古利仲弟也自少從征伐授騎都尉世職累晉一等男任副都統天命九年明將毛文龍遣兵由朝鮮義州城西渡鴨緑江入島中屯田楞額禮偕副都統武善襲之斬五百餘級縱火焚其積聚太宗即位列十六大臣尋擢都統為八大臣偕㕘領阿山以六百人略喀爾喀巴林地擒其貝勒十四人俘獲甚衆以功晉三等子天聰元年從大貝勒阿敏征朝鮮攻克義州城晉一等子三年文龍自雙島移軍鐵山為朝鮮援楞額禮以精兵夜擣之斬馘無算文龍遁走東江五年五月偕都統喀克都禮征南海島八月從圍大凌河城並有功七年從貝勒岳託攻旅順口屢敗其將黄龍遂下之八年卒太祖親臨其喪明年巡幸盛京北山道經其墓奠而哭之順治十二年追諡武襄子穆成格襲納穆泰武勲王揚古利第三弟也少事太祖累官至副都統太宗即位擢都統與八大臣之列天聰元年從征朝鮮以功得恩賞三年從攻遵化克之四年大軍凱旋以貝勒阿敏留守永平以納穆泰與都統圖爾格駐防灤州明兵備㕘政張春合祖大壽馬世龍諸鎮兵來攻悉力禦之乞援永平未至明兵發巨礟轟城城燬遂突圍走永平從阿敏東歸論罪當死特恩原之禠其職五年偵緝至明邊界斬其哨卒攻拔其臺堡還遇我逃人于道馘其六餘悉執之歸尋覘事大凌河有俘獲並得明諜者張士粹詭降狀誅之遂復官為兵部承政授三等輕車都尉世職是年偕圖爾格略錦州松山八年從入上方堡狥朔州抵大同攻王家莊先登九年從睿親王多爾衮征察哈爾降林舟汗子額哲遂自應州略山西還軍過平魯衛城城中兵出戰擊破之追斬百餘人㑹大同鎮將合寧逺錦州援兵三千來拒復擊破之逐北至城濠死者相枕籍叙功加三等男未㡬卒子阿哈連襲額爾徳尼姓納喇𨽻正黄旗滿洲性慧敏盡通䝉古漢文以文學事太祖賜號巴克什毎從征䝉古諸部傳宣詔令諭降其部衆著有勞績天命三年從取撫順明總兵張承廕自廣寧馳援額爾徳尼偕諸將擊敗之斬承廕叙功授男爵初奉命偕理事大臣噶盖創製國書後哈達貝勒盛格布禄以謀逆伏誅噶盖坐其黨死額爾徳尼遂獨任之既成頒行國中國書傳布自此始額爾徳尼既卒太宗復命儒臣達海庫爾禪等述其義而増益之順治十一年與達海庫爾禪並追諡文成子薩哈連官至鑾儀衛冠軍使賜姓赫舍里希福姓赫舍里世居都英額再遷哈達太祖既滅哈達從其兄碩色來歸以通䝉古漢文遂専任文館賜號巴克什後𨽻滿洲正黄旗天聰二年征察哈爾令往徵科爾沁兵㑹冦騎充斥土謝圖台吉奥巴止無行希福曰死則死耳君命安得辭後卒徵其兵來㑹叙功授騎都尉世職三年從征明薄燕京復從功大凌河城並有功晉三等輕車都尉崇徳元年改文館為内三院授𢎞文院大學士晉世職二等三年與大學士范文程請更定官制從之希福雖以文學居内院然常奉使察哈爾喀科爾沁諸部頒法律平獄訟宣上徳意時或詣軍營相度形勢規畫機宜毎還報命未嘗不稱善順治元年譯遼金元三史成得優賚時部院大臣毎旦㑹食於堂漸華侈希福嘗語同官范文程謂我軰儒臣非勲臣比安可厚自奉養乃偕白睿親王王然之希福退述其事于譚布譚布兄譚泰素與希福有隙遂訐其妄播王言詆諆大臣坐奪官八年世祖親政察其枉再授𢎞文院大學士九年修太宗實錄充總裁官屢晉三等子世襲尋卒年六十有四贈太保諡文簡以長子竒塔特襲康熙元年以希福事我太宗勤勞最著更錄其次子師顔保為内院學士明安姓博爾濟吉特初為䝉古烏嚕特部貝勒天命七年率所屬人户來歸爵以三等子𨽻滿洲正黄旗天聰三年偕都統武訥格等征察哈爾降其部人二千户五年從圍大凌河城屢敗明總兵祖大壽後大壽力絀來降明安得恩賚順治初三遇恩詔晉爵至二等伯十一年卒子四長昂洪次多爾濟次綽爾濟次朗素明安卒時昂洪多爾濟皆前卒綽爾濟已襲多爾濟爵為三等子乃以朗素襲其父爵雍正中追封明安一等侯予世襲加號恭誠以朗素之孫瑪蘭泰襲昂洪初授職為三等輕車都尉天命十一年從征巴林部及扎嚕特部天聰五年從征大凌河功最特進三等男賜號達爾和碩齊七年卒子鄂齊爾襲多爾濟初以騎都尉尚郡主為額駙天命中征扎嚕特棟奎克什騰諸部天聰元年征朝鮮皆在軍中並有功五年授刑部承政八年征大同多爾濟將中軍擊敗明總兵曹文詔追至城下崇徳二年進内大臣預議政四年從鄭親王濟爾哈朗略錦州陣斬三人六年偕内大臣錫翰設伏高橋敗明兵之自杏山遁者躡擊至塔山斬獲甚衆晉爵一等男順治二年晉三等子五年卒恩格徳爾姓博爾濟吉特世居錫拉穆倫太祖高皇帝創業時喀䝉古自分五部争相雄長恩格徳爾為巴岳特部台吉嵗乙巳來朝獻馬二十明年率五部使臣獻駝馬奉表尊我太祖為神武皇帝自是朝貢無間天命二年尚貝勒舒爾哈齊女為額駙九年請率所部來歸遣大貝勒代善等以兵䕶至遼陽賜爵三等子𨽻正黄旗滿洲天聰三年偕都統武訥格等征察哈爾招降二千户明年春大軍克永平恩格徳爾狥其旁近邑遇明步卒三百將戰忽突騎三千自玉田出恩格徳爾佯引卻敵稍前疑有伏還走因追襲其後獲馬百崇徳元年卒以其第四子額爾克岱青襲順治十二年追諡端順雍正七年追封三等公加號順義弟莽古爾岱崇徳中從攻錦州杏山俱著有功績順治初入闗擊流冦有功累加世職至一等子希爾根姓覺爾察𨽻正黄旗滿洲以䕶衛事太宗于藩邸天命十一年從征巴林部部長囊努克挾數騎遁希爾根追及之馬蹶易馬突前擊走其從騎自是屢從征討有功授騎都尉世職崇徳元年大軍征明分克昌平寶坻順義宻雲東安文安定興安肅容城安州雄縣諸城明太監高起潛督兵拒戰擊敗之擒其總兵巢丕昌師還獨以軍殿叙功超授一等輕車都尉二年從克皮島五年從圍錦州敗松山援兵七年從入黄崖口進圍薊州明總兵白騰蛟馳救大破之順治二年加一雲騎尉是年從英親王阿濟格討李自成自綏徳進圍延安敗其將一隻虎㑹豫親王多鐸軍已破西安自成奔湖廣遂移師追勦至安陸武昌賊集艦五百餘將沿江東下希爾根馳至江濵盡獲之凱旋晉爵三等男三年從肅親王豪格討張獻忠與䕶軍統領阿爾津蘇拜擊敗賊黨高汝礪武大定兵進擊獻忠于西充别趨涪州𠞰賊袁韜俘斬無算師還坐與阿爾津蘇拜争功降世職為三等輕車都尉六年從巽親王滿達海討大同叛鎮姜瓖分兵圍太谷克其城進克大同及長子縣渾源州朔州徇永寧州潞安府皆下之又偕都統漢岱攻復遼州山西平論功復遇恩詔晉爵至二等男九年擢䕶軍統領十年列内大臣晉一等男康熙十二年加太子太保十三年逆藩耿精忠叛應吳三桂遣其黨犯江西乃授希爾根為定南將軍以討之師次南昌賊已陷廣信建昌撫州希爾根督兵復撫州偽將軍陳昇乘間犯贛州遣副都統斡都海㕘將色勒擊敗之十四年復建昌時賊黨分據餘干浮梁樂平諸邑督師殄其衆方規取廣信未復十五年三桂自湖南犯吉安陷之希爾根馳赴吉安圍之數月明年賊遁去還軍駐南昌尋以年老召還京十八年卒賜祭𦵏以其孫尚世泰襲敦拜姓富察𨽻正黄旗滿洲父綳科理事太祖為佐領綳科理卒遂以敦拜代之天命中從征寧逺有功天聰八年授騎都尉世職崇徳五年擢䕶軍統領從圍錦州六年復圍錦州戰松山八年駐防錦州順治元年入闗追敗流賊論功加世職為一等輕車都尉從擊流賊陜州屢戰皆㨗移師下江南追獲明福王朱由崧於蕪湖三年從征福建平之進世職二等五年討江西叛鎮金聲桓先驅抵九江破其兵三千進薄臨江下其城盡降其屬邑六年𠞰撫河間土冦七年遇恩詔加世職為三等男十一年征廣東擊走偽晉王李定國克復廉雷諸郡十三年叙功加一等子尋乞休特加太子太保致仕十四年起為都統鎮守盛京十七年卒諡襄莊索尼姓赫舍里𨽻正黄旗滿洲大學士希福從子也太祖時授一等侍衛屢從征討哈達犯界藩城擊敗之從征棟奎䝉古援兵雲集立二寨為犄角索尼攻拔其一寨餘衆悉降天聰元年從攻錦州偵軍事于寧逺並有功二年太宗親征察哈爾徵兵外藩科爾沁遲久不至遣索尼飭責之乃以兵來㑹土謝圖台吉奥巴遂入朝妻以貝勒舒爾哈齊孫女既而奥巴屢背約私與明通時復徵兵不至索尼賚璽書申飭曉以大義奥巴泥首悔罪三年從征明至燕京明薊遼督師袁崇煥赴援列營城東南肅親王豪格迎戰敵圍之數重矢石雨下索尼躍馬突入陣左右馳擊遂援肅親王以出明年諭降榛子鎮沙河驛人户拔永平登城周麾黄旗以撫其衆五年擢吏部啟心郎從圍大凌河明兵自錦州赴援索尼持短兵步戰敗之明年從征察哈爾還師入明邊界略大同取阜臺寨八年授騎都尉世職崇徳八年考績超授三等男順治二年晉二等子以子爵尊不宜復列郎官乃解啟心郎任時英親王阿濟格獲罪王方與都統譚泰等𠞰賊湖廣詔列其罪狀令譚泰宣示軍中譚泰匿不以示索尼劾之譚泰坐削公爵銜索尼因訐其盜内庫琴及秣馬庫院捕魚禁門橋下事索尼遂罷廢明年䕶軍統領圖頼劾譚泰争功怨望詞連索尼初大軍分道𠞰李自成于西安譚泰所出道迂險後至無功及移師下江南譚泰慮不得與語於圖頼頗怏怏圖頼遺書索尼屬以譚泰語達睿親王賚書者私發之恐譚泰得罪沉之河至是圖頼復論前事逮訊賚書者詭云已達諸大臣坐索尼黨庇罪當斬王親鞫之索尼曰吾發譚泰匿詔㫖罪顧匿圖頼書以庇之乎王悟窮訊賚書者事得白尋復授二等子五年貝子屯齊訐索尼與圖頼等嘗謀立肅親王論死從末減遣守昭陵八年世祖親政鑒索尼枉召還京復其爵累晉一等伯擢内大臣兼議政大臣十八年遺詔以索尼與大臣蘇克薩哈遏必隆鰲拜輔政蘇克薩哈與鰲拜争事成隙索尼惡之年已老矣且有疾康熙六年屢請聖祖親政乃俞其請特賜爵一等公與前所授一等伯並世襲是年七月卒賜祭𦵏有加禮諡文忠以第五子心裕襲一等伯第六子法保襲一等公長子噶布拉仕至領侍衛内大臣十三年聖祖因孝誠仁皇后推恩所生授為一等公譚布姓舒穆禄𨽻正黄旗滿洲揚古利從弟也天聰五年以䕶軍㕘領從圍大凌河城斷其樵採復擊敗錦州援兵崇徳二年列議政大臣四年十一月從征索倫部取道瑚爾哈部攻克雅克薩城索倫部長博穆博果爾迎戰擊卻之擢副都統六年圍錦州明總兵祖大壽遣步卒突圍譚布擊敗之明總督洪承疇軍松山以援錦州譚布與兄譚泰擊破其步卒三營屢挫其騎兵之犯右翼營者八年從鄭親王濟爾哈朗攻寜逺順治元年從入山海闗並有功二年從饒餘郡王阿巴泰鎮守山東𠞰平滿家洞賊進征徐州連敗明兵獲船五百餘巨礟五十有七時豫親王多鐸統師自河南出泗州渡河趨揚州下江寧而明總兵劉澤清尚踞淮安譚布偕都統準塔率兵至清江浦擊走澤清遂定淮安招降旁近城邑分兵定如皋通州三年從肅親王豪格討張獻忠屢擊敗之六年從端重親王博洛討大同叛將姜瓖瓖潛結賊黨為援犄北山以逼我軍自率其衆出城來犯譚布先破其援兵還擊瓖於城下斬殪甚衆又分兵殱其黨于太平平陽汾州屢叙功復遇恩詔晉爵至一等男八年擢工部尚書尋其兄譚泰以罪伏誅遂罷任降三等男康熙四年卒子喀岱襲圖頼姓𤓰爾佳信勇公費英東第七子也初𨽻鑲黄旗後改𨽻正黄旗天聰二年從征明薄燕京以功授騎都尉世職四年從大貝勒阿敏留守永平明兵備㕘政張春合馬世龍諸鎮兵圍都統圖爾格等于灤州圖頼馳救之比至圖爾格等已突圍出遂擊卻其追騎從大貝勒撤師出邊以十六人殿返擊明兵之躡我後者殱之尋授三等輕車都尉略大同攻拔靈邱及小石城從圍大凌河城軍兩黄旗間以衛樵採六年大軍破走察哈爾移師征明次布里渡圖頼狥沙河堡降之七年從取旅順口九年任䕶軍統領從入廣寜偕都統阿山趨錦州明總兵祖大壽遣將合松山兵拒戰兵甫接敵不能支輒潰走俘獲無算叙功加恩賚崇徳二年授議政大臣明年從貝勒岳託征明先驅踰牆子嶺攻克十一臺進兵山東屢敗明兵還軍敗明閣部劉宇亮于通州晉爵三等男六年從圍錦州擊敗杏山援兵戰東闗援降人諾木齊以歸復破松山騎兵拔塔山杏山城加一等男八年攻拔中後所及前屯衛晉三等子順治元年從征流賊李自成破賊將唐通于一片石既入闗破自成兵追敗之望都超授三等公從豫親王多鐸帥師下河南先自孟津濟撫定瀕河十五堡睢州總兵許定國等皆望風降進薄潼闗賊將劉宗閔沿山列陣以拒圖頼以騎兵百四十人進戰盡殪之連敗賊將劉方亮等遂破潼闗平陜西移兵下江南攻克揚州執明閣部史可法斬之追福王朱由崧于蕪湖擊敗其將黄得功兵得功中流矢死師旋進爵一等公三年任都統從貝勒博洛征浙閩進兵杭州時明魯王朱以海據紹興其總兵方國安等營錢塘江東岸江廣十餘里圖頼率將士從上流䇿馬渡縱擊國安軍盡潰擁魯王遁走台州圖頼進抜金華衢州諸城擊敗明閣部黄鳴駿于仙霞闗攻克浦城追明唐王朱聿鍵于汀州斬聿鍵盡降其衆閩海悉平回軍次金華病卒年四十七子輝塞襲圖頼勇而善謀能以寡覆衆屢立竒功未嘗挫衂世祖親政追念其功諡昭勲配享太廟賜文勒石雍正九年加封號曰雄勇伊爾徳武勲王揚古利從子也天聰三年從略錦州寧逺復㑹大軍入邊薄燕京敗山海闗援兵於薊州師還奪隘而出五年從圍大凌河城城中兵突圍出戰與都統和碩圖等合師夾擊追奔至濠而還明監軍㕘政張春以兵來援陣于長山有一騎挽弓直犯御營伊爾徳馳斬之功最授騎都尉世職尋擢䕶軍統領崇徳五年五月從圍錦州戰城下秉纛為軍鋒大敗明兵七月以兵屯松山明人縱牧于野乃設伏烏馨河口盡驅其牲畜殿而歸擊明兵之襲我後者斬獲無算特晉爵三等男七年復圍錦州又以功晉一等男順治元年駐防錦州二年加一雲騎尉從豫親王多鐸南征分兵至南陽歸徳招撫甚衆至揚州獲戰艦百有竒遂渡江破南京追明福王朱由崧于蕪湖敗其將黄得功軍晉一等子六年偕都統譚泰征江西叛鎮金聲桓平之進𠞰廣東叛鎮李成棟於信豐拔其城成棟夜遁馬蹶溺水死别將兵狥撫州建昌破偽將揚竒盛兵還軍𠞰保定土冦殱之晉一等子八年擢都統明年晉一等伯兼一雲騎尉從敬謹親王尼堪征湖南破賊衡州王追賊遇伏殁于陣坐罷并奪爵十三年起為寧海大將軍𠞰冦舟山先是明魯王朱以海走依鄭成功于金門成功忌之乘其將赴南澳沉之海詭以颶風敗舟解於以海諸將諸將乃不讎成功反為所用遂合衆犯舟山肆掠大嵐山浙東大擾及是大軍既抵浙遣將趨斗門擊大嵐山賊斬其渠王長樹毛光祚沈爾序盡殱其衆而身率舟師抵定海分三路並發賊渠陳六御阮思等擁戰艦二百迎戰望江口合擊之追至衡水洋賊却復前燃火毬將擲我舟忽反風自焚賊大亂我軍乘之躍入其艦斬六御思等遂定舟山十四年凱旋命貝勒等勞之郊復其世爵晉一等侯兼一雲騎尉十五年從信郡王多尼征明桂王朱由榔于雲南進兵貴陽乘勝濟盤江屢戰皆㨗克雲南十六年克永昌由榔奔緬甸十八年卒於軍年五十六賜祭𦵏諡襄敏子陀和齊早卒孫巴渾岱襲滿達爾漢姓納喇𨽻正黄旗滿洲先世居哈達父雅呼率十八戸歸我太祖為佐領列理事十大臣既老致仕滿達爾漢代父任佐領事從征瑚爾哈部招降五百餘户天聰五年兩使朝鮮責其越邊界藪逋逃諸罪其王李倧懾服入貢八年從征明至大同分兵克四堡一臺又攻王家莊拔其城叙功授騎都尉世職積官至禮部承政崇徳二年從武英郡王阿濟格攻克皮島賜白金裘馬順治初累加二等輕車都尉世職尋卒賜祭𦵏諡敬敏立碑墓道以其子阿海丹襲瑪福塔禮部承政滿達爾漢之弟也初任佐領天聰五年授户部㕘政八年使朝鮮責其王李倧違約助明之罪倧引咎報謝已而道出鐵山遇明游兵俘斬六人馘一人縱之還俾誡邊吏戢下毋啟釁以重得罪勞大師聲討邊人憚之擢户部承政崇徳元年復使朝鮮明皮島兵邀於路盡擊走之尋以互市赴朝鮮義州中道獲明哨卒知游兵潛入鹻塲以告遂命吏部承政濟什哈等擊走之太宗將親征朝鮮先遣瑪福塔偕前鋒統領勞薩等將兵三百為賈人裝疾馳至其國都守將覺之以衆拒戰我兵擊殱其衆倧懼詭遣人勞於郊以緩之遂遁南漢山城明年正月大軍進圍南漢瑪福塔再入城道之納欵倧乃具表稱臣率羣僚詣行在降倧以金餽瑪福塔辭不受四月從攻皮島自北隅督戰破之十月與同官英俄爾岱賫勅封倧為朝鮮國王四年復與刑部㕘政巴哈納往封倧妻趙氏為王妃瑪福塔屢使朝鮮能知大體具為陳上恩徳朝鮮人感而作頌樹碑三田以垂不朽五年卒努山姓扎庫塔𨽻正黄旗滿洲先世居鄂里父塔克都歸我太祖為佐領努山其次子也少從征伐輒先驅覘敵有斬䕶授前鋒㕘領天聰八年從征大同擒哨卒以獻崇徳元年偵泠口多所俘獲三年從入邊敗明總督吳阿衡於牆子嶺追擊其潰卒獲馬數十及軍械火器無算既越燕京而南搜其伏兵五百擊走之明太監高起潛以兵躡我後乃設伏道側以少卒挑起潛戰引至伏所並起夾擊斬獲甚衆是夜起潛集潰卒襲我前鋒營努山大破之追至㑹通河溺死者無算遂自涿州略地抵山東克濟南並有功六年偵董家口及喜峰口有斬獲從圍錦州戰松山杏山皆㨗擢前鋒統領時武英郡王阿濟格軍於杏山明將自寧逺潛兵來襲適遇努山於道皆驚走努山追敗之連山斬級三十獲馬三十二七年略寧逺敗其援兵巳而城守兵背城出戰與前鋒統領武拜擊破之生擒二十三人是年晉二等輕車都尉順治元年從豫親王多鐸追𠞰李自成於陜州賊據山而陣將集衆反鬬努山由間道拔其營賊遂潰入潼闗二年移師定河南下揚州進克南京追明福王朱由崧於蕪湖其將田雄等執之降三年從貝勒博洛征浙江明總兵方國安列營錢塘江東岸江廣不可涉忽沙暴漲努山䇿馬自上流濟國安驚以為神衆大潰進征福建斬偽巡撫楊廷清李暄芬馳七晝夜追及明唐王朱聿鍵于汀州下其城遂擒聿鍵明桂王朱由榔據廣西其大學士何騰蛟總兵王進才馬進忠袁宗第等分踞湖南郡邑五年從鄭親王濟爾哈朗征之六年拔長沙努山簡精鋭趨湘潭與都統阿濟格尼堪破北門入騰蛟就擒復從尚書阿哈尼堪等狥寶慶距城七十里進才進忠引衆來拒努山令軍士舍騎而戰戰輒㨗直薄城東山進才等潛遁追𠞰至武罔連破其十餘營分克沅州靖州進定全州擒斬偽閣部楊鰲及副將以下四十餘人七年晉爵二等男世襲十三年擢内大臣十五年卒賜祭𦵏立碑墓道子托岱襲舒里琿姓棟鄂𨽻正黄旗滿洲先世居瓦爾喀祖喀喇太祖時率族來歸授佐領天命四年擊明總兵劉綎於阿布達哩岡身被七創後以創發卒父扎福尼從征灤州及瑚爾哈部並有功加一雲騎尉崇徳八年卒舒里琿初為䕶軍校天聰五年從圍大凌河城明將挾䝉古兵出戰擊卻之及父卒遂襲其職順治二年從英親王阿濟格𠞰流賊于延安七戰皆㨗李自成遁湖廣追躡至安陸獲其戰艦三年騰吉思叛歸喀爾喀從豫親王多鐸追之斬獲無算復擊敗土謝圖汗碩雷汗兵師還授佐領六年從端重親王博洛討大同叛鎮姜瓖其黨姜建勲以衆拒戰破之十一年擢䕶軍㕘領十五年再擢副都統從信郡王多尼征雲南敗偽侯李成蛟於凉水井追至雙河口又敗偽晉王李定國兵凱旋晉爵三等男十八年八月卒子穆里琿襲舒里琿之弟洛多歡尤驍果善戰天聰七年從攻旅順口克其城崇徳六年從圍錦州敗明總督洪承疇兵七年從攻順徳先登賜號巴圖魯累加世職至一等輕車都尉兼一雲騎尉順治十七年卒以其弟崆古圖襲克宜福姓伊爾根覺羅𨽻正黄旗滿洲父赫臣使于葉赫抗節死見忠節傳克宜福初任佐領選為捉生將天聰四年從克永平有俘獲八年予騎都尉世職崇徳三年授吏部副理事官六年從鄭親王濟爾哈朗攻錦州其東闗有䝉古諾木齊者潜約降為内應為明將所覺圍之急克宜福突入圍援以出并衛其眷屬來歸得恩賚順治二年授福陵總管兩遇恩詔晉世職三等輕車都尉尋卒以其子喀齊蘭襲賚圖庫姓延扎世居葉赫父安達哩太祖時來歸予騎都尉世職𨽻滿洲正黄旗屢從太宗征伐積功至三等輕車都尉及太宗升遐安達哩號呼累日以殉世祖特予三等男世爵以賚圖庫襲賚圖庫初任侍衛天聰五年從圍大凌河城分兵略錦州敗明兵五千餘復敗監軍㕘政張春援兵崇徳元年從征朝鮮三年從征明至通州長驅抵山東濟南轉戰臨清並有功六年從攻松山城明總督洪承疇引兵十餘萬拒戰擊敗之其將曹變蛟乘夜突犯御營賚圖庫奮力捍禦手斬一人尋從鄭親王濟爾哈朗敗明杏山兵又設伏高橋截擊其潰卒斬二人射殪五人擒二人順治元年從入闗擊敗李自成叙功並遇恩詔晉爵至一等子九年列議政大臣擢内大臣兼佐領康熙十二年加太子少保二十二年卒賜祭𦵏孫錫喇襲斐雅斯哈姓富察𨽻正黄旗滿洲初任䕶軍校天聰六年征察哈爾分兵略大同至朔州城中兵出戰擊敗之崇徳三年以䕶軍㕘領從征明入牆子嶺戰宻雲敗其步卒五年大軍圍錦州明兵自松山杏山來援屢敗之六年復圍錦州又敗其松山援兵順治元年從入闗敗李自成于望都是年冬從英親王阿濟格西𠞰自成明年春次榆林賊乘夜襲我營擊走之窮追自成至武昌屢戰皆㨗復以舟師大敗之富池口三年從肅親王豪格𠞰張獻忠過陜西破賊黨胡敬徳于三水破叛將賀珍于雞頭闗進師西充多斬獲六年總兵姜瓖據大同叛分踞左衞陷汾州窺太原斐雅斯哈先後率䕶軍𠞰賊所至克㨗賊勢蹙其黨楊振威斬瓖首降十三年擢䕶軍統領列議政大臣尋率兵赴湖南駐防時獻忠餘黨孫可望踞辰州斐雅斯哈自澧州常徳進剿賊棄城遁躡擊至瀘溪殱賊甚衆十八年從定西將軍愛星阿窮追明桂王朱由榔於緬甸緬人執由榔以獻康熙元年凱旋前後遇恩詔屢以功叙晉爵至三等男十一年卒賜祭𦵏諡僖恪子蘇丹襲額森姓烏雅𨽻正黄旗滿洲初任尚膳正洊擢至内大臣崇徳元年從征朝鮮朝鮮遣人致書於明額森見而射殪之明年偕揚古利大破朝鮮兵揚古利傷於賊㑹有賊往來山顛下窺我軍或曰此即傷揚古利者額森遂逐之斬其首以獻三年從征明攻濟南大同俱有功授騎都尉世職雍正元年追封一等公坤姓那木都魯𨽻正黄旗滿洲天聰中洊擢一等侍衛崇徳六年太宗親率師圍松山城明總兵曹變蛟乘夜犯御營坤獨扼營門力戰卻敵賜號巴圖魯賚白金四百兩授一等輕車都尉世職順治二年晉爵一等男十一年以署都統征廣東時流賊張獻忠餘黨李定國降於明桂王朱由榔自廣西犯廣東陷高州及陽春陽江恩平諸邑進薄新㑹踞城左山峪而營坤與諸軍合擊之定國敗走逐北至横州江岸斬賊無算叙功加一雲騎尉十五年擢内大臣康熙十二年加太子太保明年授振武將軍駐防汝寧㑹陜西提督王輔臣叛應逆藩吳三桂由寧𦍑進踞秦州詔坤移兵赴西安先是大將軍棟鄂討三桂進師保寧及聞輔臣叛還駐西安令將軍錫卜臣等扼漢中遏輔臣兵不得南通蜀未㡬輔臣糾其黨軼鳳縣毁偏橋阻我饟運復截踞棧道斷漢中聲援詔趣坤援漢中坤次寶雞不能進乃罷坤將軍以内大臣留軍供調遣尋偕將軍佛尼勒連敗賊復禮縣清水伏𦍑西和等城而漢中阻餫巳五閲月錫卜臣以食匱引還西安時十四年七月也十七年詔趣大軍規復漢中以坤與副都統馬一豹等守潼闗十八年以年老召還京二十二年追論漢中逗遛狀乃免官降世職為一等輕車都尉二十四年起授散秩大臣二十五年卒賜祭𦵏如例孫顯圖襲剛林姓𤓰爾佳初𨽻正藍旗滿洲為筆帖式主譯漢文天聰八年以漢文中式舉人命直文館崇徳元年授國史館大學士與范文程希福等㕘議政事疏請重定部院承政以下各為五等又請定考取生員舉人之例時太宗文皇帝四征不庭疆宇日闢剛林屢奉命詣軍前宣布威徳咸稱上㫖積勞授騎都尉世職八年郡王阿達禮謀逆伏誅剛林𨽻其旗下以先事舉發免罪改𨽻正黄旗供職如故順治三年四年兩充㑹試主考官五年預機務晉爵三等男賜號巴克什六年恭纂太宗文皇帝實錄充總裁官再充㑹試主考官是年請令六科錄批答章疏月送史館編緝以備纂修國史八年請購明天啟四年至七年實録及崇禎一朝事蹟博訪野史家乘以備纂修明史皆報可尋坐睿親王多爾衮黨以死濟什喀姓富察𨽻正黄旗滿洲都統敦拜仲弟也初任佐領崇徳四年擢䕶軍統領五年從征錦州遇松山兵邀戰擊卻之尋偕副都統錫特庫征索倫部擒其部長博穆博果爾以歸六年復圍錦州屢敗其援兵七年授副都統八年兼工部㕘政順治元年從入闗追敗流賊于望都叙功授騎都尉世職二年從貝勒博洛下浙江駐守杭州明大學士馬士英踞嚴州糾衆二萬餘來犯濟什哈督兵禦之五戰皆㨗尋還京任工部侍郎四年加一雲騎尉五年從靖南將軍辰㤗𠞰海賊鄭彩于福建連破賊衆復長樂連江同安平和諸縣以功晉二等輕車都尉七年遷刑部旋擢尚書晉爵三等男九年兼都統列議政大臣十年膠州總兵海時行叛往㑹山東總督馬光輝兵𠞰之時行窮蹙降伏誅移兵鎮守湖南十一年召還十五年大軍分三路𠞰明桂王朱由榔于雲南征南將軍卓布泰自廣西入濟什哈以所部兵助之遂進次都匀連敗偽晉王李定國兵㑹湖南四川兩路師攻克雲南由榔奔緬甸十七年以勘定從征將士功罪不實降世職為一等輕車都尉十八年山東土冦于七糾黨據棲霞岠嵎山出掠郡邑濟什哈以靖東將軍率兵圍其山寨斬賊無算于七竄入海賊平康熙元年五月班師八月卒賜祭𦵏如例子阿嚕襲六十年阿嚕為其父請諡追諡勇壯遜達哩姓嚕布哩𨽻正黄旗滿洲以驍騎校從征伐輒奮勇争先中創不少卻屢加恩賚崇徳三年從睿親王多爾衮征明入青山口越燕京轉戰至山東攻克濟南府城明年凱旋論先登功第一賜號巴圖魯予二等輕車都尉世職兼管佐領順治七年授兵部理事官八年遷䕶軍㕘領三遇恩詔晉爵至二等男十二年擢副都統十六年遷䕶軍統領先是流賊李自成竄死其餘孽郝摇旗袁宗第降于明大學士何騰蛟騰蛟死摇旗宗第復與其黨劉二虎李來亨竄匿歸州興山間康熙二年以都統穆哩瑪圖海為將軍㑹陜西四川兵合𠞰遜達哩以䕶軍從直抵茅麓山破其巢二虎來亨自經死摇旗宗第就擒餘賊悉平乃班師十二年加太子少傅十四年七十有三賜祭𦵏諡果壯子杭書襲改𨽻鑲白旗諾穆齊瑪福塔長子也𨽻正黄旗滿洲天聰元年從征朝鮮義州以第二人登賚白鏹尋從征廣寕有俘獲五年隨太宗親征大凌河擊敗明監軍道張春軍崇徳三年從征山東擊敗明吳三桂軍明兵乘夜來犯復敗之四年授佐領世職順治初累加世職一等輕車都尉兼一雲騎尉和穆克圖瑪福塔第四子也天聰九年奉使賫書至明喜峰口等處邊界及還斬哨卒百餘人順治二年授佐領世職屢遇恩詔加二等輕車都尉十一年因督牧有年勤勞懋著加世職二等男烏納瑪福塔第七子也崇徳三年隨征明攻定州先登賜號巴圖魯八年授佐領世職順治初屢遇恩詔加二等輕車都尉五年冬山西逆鎮姜瓖叛烏納敗賊於寧武復擊敗之左衛城以功加一等輕車都尉兼一雲騎尉䝉古爾岱額駙恩格徳爾弟也天命九年隨其兄來歸崇徳六年太宗征明駐師錦州杏山等處䝉古爾岱俱在事有功授三等子世職順治元年隨入闗擊流冦以功加世職至二等子屢遇恩詔加一等伯子曼珠習禮初任遊擊天聰二年太宗親統大軍西征察哈爾曼珠習禮率兵略地以所俘獲獻賜名達爾漢巴圖魯崇徳三年任吏部右㕘政六年隨征明圍錦州松山明經略洪承疇兵來援我軍失利以罪削職順治二年追叙舊臣功績起為佐領七年恩詔仍給予加一雲騎尉根特𨽻正黄旗滿洲父曰達雅里崇徳三年從征明攻直𨽻深州先登克之賜號巴圖魯四年授佐領世職順治七年九年三遇恩詔加一等輕車都尉根特早從征戰屢立功績崇徳八年從征明至山東攻泗水以第二人登又攻直𨽻定州克其城亦賜號巴圖魯論功授佐領世職順治元年任刑部理事官叠遇恩詔加世職一等輕車都尉仕副都統五年從𠞰江西叛鎮金聲桓平南昌六郡六年從征大同叛鎮姜瓖克㨗于蒲州平陽康熙十三年逆藩耿精忠叛奉命移駐南昌相機進𠞰旋因廣東潮州總兵劉進忠叛復命速赴廣東並授平冦將軍八月卒於軍卦拉姓民覺羅𨽻正黄旗滿洲崇徳六年從圍錦州擊敗明松山兵於濠邊明經略洪承疇率兵來犯我營者三四俱擊敗之時睿親王多爾衮命卦拉率大營衛卒以守敵人無一敢犯者旋以兵巡哨多俘獲越日破其臺盡殱其衆復擊破監軍道張春兵身被三創及至札爾都遇敵率五人追至娘娘宫巡視海岸我軍僅千人敵倅至衆皆欲進卦拉請少休乃俟夜驟進以一當十敵不及備多溺死水進師昌平明兵乘夜來犯擊敗之及攻城登雲梯者皆被傷退卦拉獨超衆前進奮勇而登卒克之我軍圍大同卦拉奉太宗命一躍而登七年征明攻黄厓口克之順治初從征山西四川屢有功卦拉身經行陣身被二十餘創劍嗣叠遇恩詔加世職二等輕車都尉官副都統卒圖爾伯申姓布爾察𨽻正黄旗滿洲崇徳八年從征明至山東攻泗水以第一人登賜號巴圖魯授佐領世職順治七年九年三遇恩詔加二等輕車都尉累任至杭州將軍致仕卒賜祭𦵏如典禮諡敏果達理善姓那木都魯𨽻正黄旗滿洲崇徳三年從征山東攻濟南先登克之賜號巴圖魯授三等㕘領世職六年圍錦州明經略洪承疇兵刼我巨礟率兵擊敗之又敗其馬軍者二順治元年從征山西克其城凱旋移駐杭州連敗明偽大學士馬士英等兵五年從征江西叛鎮金聲桓敗其七萬衆嗣遇恩詔加世職三等輕車都尉以老乞休康熙十四年擢副都統從征陜西叛鎮王輔臣扶病力戰還營卒進世職二等男諡勇烈昂昆都稜姓博爾濟錦𨽻正黄旗滿洲夲察哈爾貝子率衆來歸授三等副將世職天聰三年從征明至燕京擊明軍門盧象昇兵破之又敗敵于通州六年圍錦州敗明迎戰兵三隊嗣入邊至通州復敗明兵師還卒舒書姓納喇𨽻正黄旗滿洲以屢從征伐有功累任副都統崇徳二年太宗命率兵分道征瓦爾喀有俘獲八年從征明寕逺等處復有功賚銀幣順治初從定浙江舟山叙功加世職三等輕車都尉雅穆哈納𨽻正黄旗滿洲崇徳五年從征明圍錦州擊杏山援軍直衝敵陣八年從征明入邊屢敗明兵攻冀州以第二人登賜號巴圖魯順治初授世職二等輕車都尉圖拉姓舒穆嚕𨽻正黄旗滿洲崇徳七年從征山東攻泗水傷目身被三創又攻高宻新泰等縣俱有功順治二年從定江南七年授主事叠遇恩詔加世職騎都尉十二年陞郎中從征浙江舟山敗偽總制陳六御等舟師三萬手足悉被重傷以功加一雲騎尉十八年擊破土賊于鰲山康熙元年擢大理寺少卿七年任杭州將軍十三年以病卒額勒格爾珠爾𨽻正黄旗滿洲崇徳二年隨征明敵兵犯我汎地擊敗之六年復圍錦州擊敗松山及錦州城内接應兵七年征松山掘壕為長圍明經略洪承疇以騎兵來犯又擊敗之順治元年隨入闗破流冦以功授佐領世職嗣遇恩詔加一雲騎尉弟喀蘭圖官理藩院尚書卒諡壯敏敦達禮𨽻正黄旗滿洲崇徳三年從征明攻定興先登六年太宗親征圍松山敦達禮扈從敵中有介馬前驅者射殪之賚人户順治十一年從征湖廣廣東俱有功加世職三等輕車都尉布顔𨽻正黄旗滿洲本䝉古人初任佐領天命時從征棟奎又從征赫濟赫屯首先陷陣有功及從圍明錦州俘獲甚衆天聰十年叙功加世職三等㕘領崇徳三年從征明北京擊盧溝橋兵搴纛斬之五年從攻錦州擒斬盈壕六年復隨征錦州克其郛擊明經略洪承疇兵敗之是年加世職二等㕘領順治二年追叙舊勲加一等㕘領世職蘇拉岱𨽻正黄旗滿洲生而勇敢天命六年從征遼陽七年取廣寧及攻北山寨首先衝入敵陣並以歩戰敗囊努克天聰四年攻永平同二十四人先登克其城崇徳六年圍錦州明兵出穆魯河疾馳衝入敵陣擊敗之明兵犯我壕塹復當先擊走之又於塔山附近堵截敵軍俘斬甚衆順治元年從入闗擊流冦論功累遇恩詔加三等輕車都尉世職同旗有扎宜薩太祖時以四十人略明邊有功癸丑授備禦世職覺羅喀愷𨽻正黄旗滿洲天命七年從征廣寧途遇明兵争先擊敗之天聰八年論功授佐領世職崇徳二年太宗命往征瓦爾喀部多斬獲明年擢户部理事官三年從征明克定興至涿州遇明太監高起潜兵擊敗其衆六年隨征錦州敗松山騎兵順治元年從入闗追流冦有功加世職一等㕘領嗣屢遇恩詔加二等男屯起𨽻正黄旗滿洲初任頭等侍衛太宗選壯士八人屯起與焉我師初圍松山屯起率兵前驅破敵天聰四年從征明克永平身多被傷賚銀幣馬駝崇徳五年圍錦州與庫楞兵戰介馬突陣餘軍繼之敵敗走又擊杏山兵敗之進攻松山被重創方展視傷痕見敵兵闌入奮起擊敗之又兩破明兵于杏山師旋明兵躡我後屯起為殿敵不敢近六年太宗親統兵破錦州師還明兵復來追躡屯起設伏俟過半突擊之明兵大潰順治六年隨征大同叛鎮姜瓖敗賊於靈邱又敗賊於左衛者再惇泰姓馬佳𨽻正黄旗滿洲天聰五年從攻明大凌河於錦州附近駐兵以牽制之明兵來犯惇泰當先衝陣敗之崇徳八年從征明至山東費縣先登克其城賜號巴圖魯授佐領世職順治七年遇恩詔加一雲騎尉嘉隆阿姓錫克特哩𨽻正黄旗滿洲天聰八年授佐領世職崇徳二年從征明北京擊盧溝橋兵敗之四年從征薩哈連烏拉五年從征錦州七年從征松阿哩江部屢戰有功順治元年隨入闗追破流賊於慶都二年叙功累遇恩詔加世職一等輕車都尉又一雲騎尉和碩兑姓𤓰爾佳𨽻正黄旗滿洲崇徳三年從征明山東攻寧津先登克其城八年從攻順徳復奮勇先登授佐領世職順治初從征福建敗賊於侯闗屢以軍功加一等輕車都尉世職蘇巴泰姓𤓰爾佳𨽻正黄旗滿洲崇徳三年從征明至山東攻濟南克之賜號巴圖魯四年授佐領世職六年從征明圍錦州累戰有功順治初累加一等輕車都尉又一雲騎尉世職鄂貝姓瑪佳𨽻正黄旗滿洲初任佐領崇徳三年從征明戰青山口越衆前驅斬其騎兵及至山東復擊明兵敗之五年從圍明錦州擊敗明松山援兵又敗其杏山兵順治元年隨南征二年下江寧分兵狥崑山前驅擊敗明兵偽總兵王斐等來犯常州屢敗之宜興陽湖界尋卒于軍十三年追録其勲晉世職莽吉圖姓馬嘉𨽻正黄旗滿洲初任䕶軍校崇徳三年隨征明至山東攻寧津登城克之六年從圍錦州攻明經略洪承疇三營步兵率先衝入敗其衆順治元年隨入闗破流賊又追敗之潼闗四戰皆㨗明年平定江南等處俱在行間有功屢遇恩詔加三等輕車都尉十四年擢副都統駐防江寧卒於任富喀𨽻正黄旗滿洲早從征伐累官兵部㕘政崇徳七年從征明我師由黄崖口入長城取邊闗明總兵白騰蛟奔桃林因選將士攻薊州富喀與焉圍其城大敗之順治元年從入闗屢敗賊又隨定江南奏㨗於五恵村三年隨征騰吉思破土謝圖汗等兵有功屢遇恩詔加三等輕車都尉世職尋擢駐防江寧副都統卒於任伊古哩姓馬佳𨽻正黄旗滿洲崇徳三年從征明攻趙州先登克之賜號巴圖魯授佐領世職圖球姓延札𨽻正黄旗滿洲初隨征雅蘭西林路斬獲甚衆復從征綏芬等處取黒河島有功崇徳三年叙功順治七年三遇恩詔加三等輕車都尉世職達拉宻姓𤓰爾佳𨽻正黄旗滿洲崇徳三年從征明明兵夜犯我前鋒營擊敗之進攻博野奮勇先登克其城四年叙功順治元年隨入闗擊流冦復復有功累遇恩詔加二等輕車都尉世職和敏姓賚布𨽻正黄旗滿洲崇徳三年從征明攻博野下之又攻拔膠州順治初叙功累加三等輕車都尉世職禪楚姓𤓰爾佳𨽻正黄旗滿洲崇徳四年隨征薩哈連烏拉力戰身被九創仍大破之五年論功授佐領世職順治初累遇恩詔加二等輕車都尉翁什庫姓寧古塔𨽻正黄旗滿洲崇徳四年從征薩哈連烏拉擊敵兵於珊延村力戰有功八年從征明至山東攻滕縣先登克之賜號巴圖魯授佐領順治初三遇恩詔加二等輕車都尉世職禪玉姓薩克達𨽻正黄旗滿洲崇徳四年隨征黒龍江破敵有功授佐領世職尼克什哈𨽻正黄旗滿洲崇徳五年征明圍錦州擊敗杏山馬兵奮勇突陣破其衆及擊杏山歩軍先諸軍直入手被重傷七年圍錦州有松山兵來奪我巨礟率兵敗之尋擊敗明經略洪承疇軍順治初累遇恩詔加二等輕車都尉世職薩哈連姓旌額禮𨽻正黄旗滿洲崇徳六年從圍錦州擊明軍門洪承疇軍力戰有功順治元年從入闗擊敗流賊二年議叙授佐領世職同旗有那齊哈亦以崇徳六年從圍錦州擊松山兵屢立戰功順治二年擊流賊一隻虎於荆州復有功加騎都尉世職遜古勒岱𨽻正黄旗滿洲崇徳七年從征明圍錦州敗敵有功順治元年從入闗追敗流冦於慶都三年議叙授佐領世職伍達納𨽻正黄旗滿洲崇徳七年從征明至薊州敗明總兵白騰蛟兵順治十一年從征浙江舟山有功授雲騎尉穆納昆𨽻正黄旗滿洲崇徳八年從征明攻冀州以第二人登城克之順治元年從入闗擊敗流賊加佐領世職綽艮𨽻正黄旗滿洲崇徳八年從征明由山東至江南攻沭陽克之還師直𨽻攻順徳亦克之賜號巴圖魯是年叙功授佐領世職順治元年隨入闗及南征平定河南敗流冦於潼闗三年隨擊土謝圖汗兵五年從征江西叛鎮金聲桓並在行間有功十五年議叙加一雲騎尉科爾堪姓烏雅拉𨽻正黄旗滿洲崇徳八年從征明由山東至江南攻沭陽先登克之賜號巴圖魯授佐領世職治元年從入闗追流冦至慶都大敗之二年論功累遇恩詔加二等輕車都尉圖猷姓延札𨽻正黄旗滿洲從征雅蘭西林綏芬等處皆有功順治初加三等輕車都尉世職羅琦姓瑪佳𨽻正黄旗滿洲崇徳八年從征明山東以攻濟南功加優叙同旗有海音布於是年從攻薊州以第三人登賜號巴圖魯又同旗有雅穆布亦以攻薊州先登俱授二等輕車都尉世職又同旗有烏爾佳齊於崇徳三年從攻榺縣以第二人登授㕘領又同旗有杭舒攻欒城先登愛珠攻鹽城先登俱論功加世職覺羅雅賚𨽻正黄旗滿洲從征黒龍江部有功天聰九年加優叙順治初授二等輕車都尉又同旗有禪徹國初以從征烏拉身被九創授備禦世職赫黙哩以從征阿庫爾尼滿有功授二等輕車都尉世職又同旗有扎易薩國初以四十人往略明邊攻臺斬敵有功授備禦世職欽定盛京通志卷六十九
