body:
  text: 敕諭二欽定四庫全書欽定盛京通志卷九綸音二皇上聖製敕諭二諭內閣乾隆二十一年正月初三日據署黑龍江將軍綽爾多奏齊齊哈爾黑龍江墨爾根呼蘭等處八旗水師營驛站官莊人等各年未完糧石并本年借給口糧共十五萬五千餘石請分年完交等語齊齊哈爾等處連年被災歉收兵力自多拮據兼之調派隨征甚為出力朕心深切軫念著將齊齊哈爾黑龍江墨爾根呼蘭等處節年未完借欠糧石并本年借給口糧十五萬五千餘石俱加恩免其完納以示優恤該部遵諭行諭宗人府等衙門乾隆二十五年五月十四日玉牒告成例應一分送盛京恭貯但恭送之時例應揀派侍衛等前引後護肅清街道敬謹捧持而行方昭誠敬從前並未著為定例且十年一次舉行恐日久不無疏懈大典攸關理宜嚴肅著交宗人府禮部大學士領侍衛內大臣詳悉妥議具奏嗣後毋得草率從事諭內閣乾隆二十七年十二月十一日盛京向例將軍管轄旗人奉天府府尹管理民人原無統轄嗣因盛京係滿洲根本之地所有州縣官員皆已定為滿缺凡有應行查拿私參人等經將軍派委官兵前往其地方各官理宜會同查緝乃盛京地方拒捕毆差之事甚多而地方官竟視同膜外鄉長保甲並不協力擒捕此皆因將軍府尹不相關涉各分畛域之所致是以各屬員等亦存旗民分管意見並不和𠂻辦理於地方事務甚無禆益不可不為變通在府尹為全省大吏雖不便為將軍屬員亦當令其聽將軍節制庶旗民事務歸一一切辦理不致參差嗣後奉天府府尹著聽將軍節制遇有應行查拿人犯該地方州縣官即同將軍差委之人協力查拿如仍有拒捕毆差以及脫逃等事即將該地方官交部一併治罪諭內閣乾隆三十年十一月初七日向來奉天府尹事務令盛京將軍兼轄今思將軍與府尹所屬旗民事件各有専司若令將軍節制於公務未免牽掣莫若照京城侍郎兼管順天府尹之例於盛京五部侍郎內派出一員管理永著為令於體制更為畫一現在奉天府尹事務即著雅德兼管諭户部乾隆三十一年三月初四日户部議覆侍郎英廉奏請丈出盛京旗民餘地準令無地兵丁聞散人等認買一摺原為旗人生計起見但此等無地人户貧富不齊其有餘者買産必多而無力之家未必能一律承買恐於伊等資計仍無實濟因念該處冬圍兵丁一切鞍馬之資不無拮據若將此項餘地內酌派徴租每年賞備資裝於該兵等殊有禆益其應撥用若干及所餘地畝尚多或可一體徴租存貯動撥或聽旗人認買毋致有名無實之處新柱現在出差盛京著會同該將軍府尹等確勘該地實在情形妥協定議具奏諭內閣乾隆三十一年九月初十日向來奉天糧石充裕準令直𨽻山東毗連省分就近販運本年夏間經將軍社圖肯奏該處雨水稀少或恐市集昂貴曾諭令該督撫將商販暫行停止今奉天續經普得雨澤仍可一律豐收將來糧石自必充足且現在東省歲收稍歉直𨽻又因鄰省運販糧價亦未免稍增商人等如欲往奉省糴運者尚於事理無礙設該處米價或昂往來販買必無餘利勢將不禁自止若竟槩行示禁恐不肖官吏轉得藉端紛擾且射利商人保無私行偷販更易滋弊至少米處所民食稍有不敷方且加恩賑濟廣為籌畫若得該商等自為販運流通俾資接濟於閭閻食用尤為有益所有直𨽻山東二省商民販買奉天米石之處仍著毋庸禁止諭內閣乾隆三十七年正月初五日本年輪蠲奉天等省地丁銀兩其米豆一項例不在應蠲之內但念奉天省地丁錢糧向來銀糧並納其額徴米豆即屬任土正供自當普豫加恩俾得共樂盈寧益兆倉箱之慶著將奉錦二府乾隆三十七年應徵米豆一體蠲免以廣惠澤該部即遵諭行諭內閣乾隆三十七年十二月二十六日將軍增海等具奏盛京各佐領下所有馬甲多寡不等請裁馬甲添設步甲其餘剩錢糧并隨缺地畝入於正項報銷一摺經軍機大臣會同該部覆準具奏所辦非是盛京額設馬甲并隨缺地畝皆為養贍該處滿洲而設今年久生齒日繁若將伊等應得分例裁汰入官於伊等生計殊屬無益如現在京中八旗户口繁盛生計不無拮據經朕特沛恩施另賞鰥寡孤獨錢糧以資生理其派往西安涼州莊浪寧夏兵丁俱照所派之額在京挑補又添兵缺甚多每年多費帑金不下數萬並無吝惜國家一切用度固應節儉然亦止宜酌減無益糜費並查核不肖人員使不得從中侵蝕至於正項應支之處豈可節省盛京滿洲皆朕臣僕人丁日盛不敷養育尚宜酌量添給豈有轉將伊等現在應得分例裁汰之理今各佐領下馬甲額缺不均固宜均勻辦理但此項裁缺錢糧地畝亦宜斟酌養贍多人或添設步甲或作為養育兵俾衆人均沾實惠不宜如此辦理著將此項裁汰之馬甲三百十六名錢糧交增海等或添設步甲或添設養育兵惟期普被恩施辦理具奏其隨缺地三千一百六十晌如何使衆人均有禆益之處並著增海等定議具奏將此通諭中外示朕體恤滿洲至意諭內閣乾隆三十八年正月初五日上年各直省秋成普慶豐收即奉天各屬亦臻大有始和之布毋庸更沛恩膏惟念盛京各城旗人節欠餘地租銀自乾隆三十一年至三十七年計六萬餘兩原係該旗人等節年拖欠值此年豐力裕自應踴躍輸將苐積欠一時並徴恐不免稍形拮據著加恩分作六年帶徴俾完公更得從容而生計益滋饒裕以副朕體恤嘉惠至意該部即遵諭行諭户部乾隆三十九年十一月初七日户部奏駁盛京岫巖城旗倉糧價減少一摺若僅交該侍郎將軍府尹等查辦難免彼此回護仍不能得其底裏著派侍郎高朴馳驛前往會同盛京户部及該將軍等徹底根查據實覆奏諭户部乾隆三十九年十二月初五日據高朴等覆奏查辦岫巖旗倉出糶減價過多一案所有各兵等希圖緣由現已特降諭旨交該將軍另行查辨此案率請減糶之城守尉富健著交部嚴加議處其盛京户部堂司各官並著交部分别察議諭都察院乾隆四十年十月十六日向例派員巡察盛京黑龍江吉林三處由都察院衙門奏派科道但三年請派巡察之例尚覺太近嗣後著於五年奏派一次不必再行請旨著為令此次盛京等處巡察著於丁酉年奏派諭軍機大臣乾隆四十年十二月初二日軍機大臣議覆盛京侍郎兼管府尹富察善奏請更議保甲一摺已降旨依議行矣奉省旗人與民人錯處原無界址之分自應給豫門牌編入保甲以防姦匪潛蹤所有該處旗員並應會同地方官一體稽查彈壓富察善所奏自屬正辦乃德風從前竟未籌辦及此是必因與𢎞晌不合竟將應辦公事有意膜視實屬任私誤公甚為錯謬德風著傳旨嚴行申飭諭兵部乾隆四十一年二月初一日前因盛京駐防各員習氣不堪不可不加整飭是以特降諭旨將伊等停其議敘嗣後如果能改悔再豫紀録昨據𢎞晌等奏稱現在各官湔除舊習實心奮勉可否照盛京五部及奉天府州縣之例一體準其加級紀録等語駐防各員既能痛改惡習差務均無貽誤著加恩準其一體議敘諭內閣乾隆四十一年六月十八日盛京吉林等處乃我祖宗肇迹興王之所前因皇輿全圖刋載地名不能賅備命於實録內恭查詳列清單將原圖并交將軍𢎞晌等查明添補嗣據𢎞晌等按其道里形勢將所開地名添繪成圖呈覽已交輿圖處將舊圖增改刋刻但舊圖方幅有限詳載地名字體已小不能復列事迹於豳岐之締造尚不足以示昭垂緬維列祖天作基祥鴻業經營規模大備如我太祖太宗大破明師於薩爾滸山及凡戰勝攻取之地開創艱難皆有山川疆域可考自宜節舉大要分注圖中俾我世世子孫按圖瞻仰並得曉然於景命所貽前勞所啓益切欽承敬畏以鞏億萬載丕丕基詒謀垂裕之道無有大於此者著將盛京等處地方另行展拓繪為大圖一幅溯自長白發祥以至奄有遼瀋建國遷都暨神武戡定各事迹並為標目兼清漢字分注圖中俾皆瞭如指掌以備觀省而示久逺即交大學士舒赫德協辦大學士尚書公阿桂尚書英廉督率所司敬謹辦理其如何核計里數展圖若干足敷標識之處著令西洋人悉心測算並即飭工繪樣呈進俟閲定即夀諸棗梨用昭世德鴻圖之盛凛遵毋忽諭內閣乾隆四十一年八月初一日向來奉天所屬州縣原係滿漢人員兼用嗣因府尹蘇昌等於辦理流民案內奏稱奉天各州縣凡詞訟等事關涉旗民者俱會同旗員審理往往意見參差致難完結若將旗員銓選較為畫一等語經軍機大臣議覆允行今思奉天地方旗人居處者多旗員在彼不無沾涉親故遇有審理事件恐不免心存偏徇即有拘謹之人聽斷時過避嫌疑亦不得謂之公當且恐緣事被劾之員接任仍係旗員或遇應查事件不無瞻顧情面輾轉滋弊地方公務必致積久廢弛殊非整飭吏治之道嗣後奉天各州縣缺出著照各省仍以滿洲漢人通行補用惟是奉天地方兼管旗民較為繁劇初任之員恐難辦理裕如所有各州縣缺出應交該部於候補人員揀選引見候朕簡員補授其作何酌量兼用滿漢人員之處著該部詳悉定議具奏諭內閣乾隆四十二年八月十九日頃閲金史世紀云金世祖居完顔部其地有白山黑水白山即長白山黑水即黑龍江本朝肇興東土山川鍾育與大金正同又史稱金之先出靺鞨部古肅慎地我朝肇興時舊稱滿珠所屬曰珠申後改稱滿珠而漢字相沿訛為滿洲其實即古肅慎為珠申之轉音更足徴疆域之相同矣又後漢書三韓傳謂辰韓人兒生欲令頭扁押之以石夫兒初墮地豈堪以石押頭其説甚悖於理國朝舊俗兒生數日置臥具令兒仰寢其中久而腦骨自平頭形似扁斯乃習而自然無足為異辰韓或亦類是范蔚宗不得其故曲為之解甚矣其妄也若夫三韓命名苐列辰韓馬韓辨韓而不詳其義意當時三國必有三汗各統其一史家不知汗為君長之稱遂以音同誤譯而庸鄙者甚至訛韓為族姓尤不足當一噱向曾有三韓訂謬之作惜未令人盡讀之而共喻耳若唐時所稱雞林應即今吉林之訛而新羅百濟諸國亦皆其附近之地顧昔人無能考證者致明季狂誕之徒尋摘字句肆為詆毁此如桀犬之吠毋庸深較而舛誤之甚者則不可以不辨若夫東夷之説因地得名如孟子稱舜東夷之人文王西夷之人此無可諱亦不必諱至於尊崇本朝者謂雖與大金俱在東方而非其同部則所見殊小我朝得姓曰愛新覺羅氏國語謂金曰愛新可為金源同派之證蓋我朝在大金時未嘗非完顔氏之服屬猶之完顔氏在今日皆為我朝之臣僕普天率土統於一尊理固如斯也譬之漢唐宋明之相代豈皆非其勝朝之臣僕乎又有云我祖宗時曾受明龍虎將軍封號亦無足異我朝初起時明國尚未削弱因欲與我修好借此以結兩國之歡我朝因不妨為樂天保世之計逮我國聲威日振明之綱紀日隳且彼妄信讒言潛謀戕害於是我太祖赫然振怒以七大恨告天興師報復薩爾滸松山杏山諸戰大敗明兵明人欲與我求和斥而不許彼尚安能輕侮我朝乎且漢高乃秦之亭長唐祖乃隋之列公宋為周之近臣明為元之百姓或攘或侵不復顧惜名義若我朝乃明之與國當闖賊擾亂明社既移之後吳三桂迎迓王師入關為之報仇殺賊然後我世祖章皇帝定鼎燕京統一寰宇是得天下之堂堂正正孰有如我本朝者乎至若我國家誕膺天眷朱果發祥亦如商之元鳥降生周之高禖履武紀以為受命之符要之仍係大金部族且天女所浴之布勒瑚里地即在長白山原不外白山黑水之境也又金世紀稱唐時靺鞨有渤海王傳十餘世有文字禮樂是金之先即有字而本朝國書則自太祖時命額爾德尼巴克什等遵製通行或金初之字其後因式微散佚遂爾失傳至我朝復為創造未可知也他如建州之沿革滿洲之始基與夫古今地名同異並當詳加稽考勒為一書垂示天下萬世著派大學士阿桂于敏中侍郎和珅董誥悉心撿核分條編輯以次呈覽候朕親加釐定用昭傳信而闢羣惑並將此通諭知之諭內閣乾隆四十二年九月二十日盛京乃我朝定都創業之地永陵福陵昭陵巍然在望皇祖聖祖仁皇帝御極六十一年曾經三次展謁孝思追逺常切欽承朕自乾隆八年及十九年恭謁祖陵以來迄今已二十餘年遙企橋山每深依戀常時恭閲太祖太宗實録敬惟開創艱難佑啓萬年統緒兹際重熙纍洽之庥溯念前勞輒不禁愀然淚下而松雲蔥鬱向惟再蒞瞻仰心甚歉焉朕現在精力如前尚堪逺涉擬於明歲秋間前詣盛京恭謁祖陵以申積悃所有蹕路往來俱由內地出山海關而行於置頓安營較為妥便尚在二十七月之內途次不行圍至盛京不升殿不筵宴朝鮮國毋庸遣使朝賀其扎薩克蒙古王公等亦毋庸朝覲至啓鑾日期屆時再降諭旨將此通諭知之諭內閣乾隆四十三年正月初十日睦親彰善王政宜先繼絶昭屈聖經所重朕自臨御以來間日恭閲列祖列宗實録一册因得備知祖宗創業艱難及爾時懿親藎臣勤勞佐命底定中原偉伐殊功實為從古所未有而當時策勛賜爵榮號崇封所以酬答者本從優厚逮其後或有及身緣事旋被降削者或有子孫承襲更易封號者迄今平情凖理不為之溯述闡揚追復舊恩於心實有所未愜因念睿親王多爾衮當開國時首先統衆入關掃蕩賊氛肅清宫禁分遣諸王追殱流冦撫定疆陲一切創制規模皆所經畫尋即奉迎世祖車駕入都定國開基以成一統之業厥功最著顧以攝政有年威福不無専擅諸王大臣未免畏而忌之遂致殁後為蘇克薩哈等所搆授欵於其屬人首告誣以謀逆經諸王定罪除封其時我世祖章皇帝實尚在沖齡未嘗親政也夫睿王果萌異志則方兵權在握何事不可為且吳三桂之所迎勝國舊臣之所奉止知有攝政王耳其勢更無難號召即我滿洲大臣心存忠篤者自必不肯順從然彼誠圖為不軌無難潛鋤異已以逞逆謀乃不於彼時因利乘便直至身沒以斂服僭用明黃龍衮指為覬覦之證有是情理乎况英親王阿濟格其同母兄也於追捕流賊回京時誆報李自成身死且不候旨班師睿王即遣員斥責其非並免王公等往迎之禮又因阿濟格出征時脅令巡撫李鑑釋免逮問道員及擅至鄂爾多斯土默特取馬令議其罪降為郡王平日辦理政務秉公持正若此是果有叛志無叛志乎又實録載睿王集諸王貝勒貝子公大臣等遣人傳諭曰今觀諸王貝勒大臣但知諂媚於豫未見有尊崇皇上者豫豈能容此昔太宗升􅜯嗣君未立英王豫王跪請豫即尊位豫曰爾等若此言豫當自刎誓死不從遂奉皇上纘承大統似此危疑之時以豫為君豫尚不可今乃不敬皇上而媚豫豫何能容自今以後有盡忠皇上者豫用之愛之其不盡忠不敬事皇上者雖媚豫豫不爾宥也且云太宗恩育豫躬所以特異於諸子弟者蓋深信諸子之成立惟豫能成立之每覽實録至此未嘗不為之墮淚則王之立心行事實能篤忠藎感厚恩深明君臣大義尤為史册所罕覯使王彼時如宋太宗之處心積慮則豈肯復以死固辭而不為邪説搖惑耶乃令王之身後久抱不白之寃於泉壤心甚憫焉􅖍令當時王之逆迹稍有左驗削除之罪果出於我世祖聖裁朕亦寧敢復翻成案乃實由宵小姦謀搆成寃獄而王之政績載在實録者皆有大功而無叛逆之迹又豈可不為之昭雪乎昨於乾隆三十八年因其塋域久荒特敕量為繕葺並準其近支以時祭掃然以王之生平盡心王室尚不足以慰彼成勞朕以為應加恩復還睿親王封號追諡曰忠補入玉牒並令補繼襲封照親王園寢制度修其塋墓仍令太常寺春秋致祭其原傳尚有未經詳敘者並交國史館恭照實録所載敬謹輯録添補宗室王公功績傳用昭彰闡宗勛至意又如豫親王多鐸從睿親王入關肅清京輦即率師西平流冦南定江浙實為開國諸王戰功之最乃以睿親王之誣獄株連降其親王之爵其後又改封信郡王雖至今承襲罔替但以王之勛績超邁等倫自應世胙原封以彰殊眷豈可以風影微眚輒加貶易乎朕以為應復其原封又諸王中披堅執鋭拓土開疆共成一統之業者如禮親王代善後改封康親王鄭親王濟爾哈朗後改封簡親王肅親王豪格後改封顯親王克勤郡王嶽託後改封平郡王當時俱茂著壯猷克昭駿烈載在宗盟今其子孫所襲均非始封之名外人不知妄疑宗藩當國家締造時有大勳勞而後裔均不得長延帶礪似為闕典即其本支承家襲慶以去祖漸逺幾忘其先世錫封之由弗克顧名奮效所係於宗室子孫者甚重况功臣世封內如揚古利之英誠公費英東之信勇公額亦都之果毅公俱以本號相傳其子孫承襲者各能溯勛閥以宣偉績不失故家喬木之遺今以親賢世胄竟改其初封嘉號何以垂詒奕祀示酬庸追本之義乎朕以為應復其原號著交軍機大臣會同宗人府悉心妥議具奏其餘宗室諸王貝勒等如有顯著功績其封爵後經降奪者除本人身罹重愆自不當復邀優典若係承襲之子孫獲咎議處者僅當斥其本身而不當追貶其祖宗世爵方為平允亦著一併會查議奏再配享太廟諸王僅有通達武功慧哲宣獻四郡王其太祖太宗世祖時戮力行間櫛風沐雨之親藩如向所舉數人皆未之及蓋由當時議禮諸王各懷私意遂爾沒其勛伐不得同侑馨香豈足以彰公道所有睿親王禮親王鄭親王豫親王肅親王克勤郡王俱著補置牌位配享太廟用以妥功宗而昭渥典至通達郡王係顯祖之子武功慧哲宣獻三郡王係景祖之子當時雖身與配享苐以宗支而論已在覺羅之例是以宗室王公表傳內未經列傳但思宗室傳既限於支派國史傳又以屬在宗潢令此四王無所附麗亦覺欠缺著併交國史館查明四王事實補為立傳列於國史諸大臣傳之前即或當時紀載簡少功績無由稽核無妨不拘詳略各立一傳以徴信實諭內閣乾隆四十三年正月初十日信勇公費英東當我朝創業時首先率所部來歸繼從太祖征勦諸部屢挫明兵厥功最大實與揚古利額亦都同為開國勳臣之冠自應並錫上公用彰渥報乃揚古利原封一等公額亦都僅得二等公經朕晉封一等而費英東子孫所襲尚係三等公爵不足以昭酬庸懋典著加恩晉封為一等公俾元勳世胄永膺茂賞至向來后族承恩世爵俱係一等公此等特因椒房至戚恩澤加封其與佐命功臣櫛風沐雨拓土開疆者實難並論况宗室王公之以近支恩封者尚以世次遞降而外戚轉得以崇封延世未免過優著將所有承恩公爵俱改為三等公世襲罔替著為令諭禮部乾隆四十三年二月初九日朕於今秋恭謁祖陵因至盛京時不升殿不筵宴曾降旨令朝鮮國毋庸遣使朝賀今據禮部奏該國王以舉國臣民瞻依倍切欲仍照往例遣陪臣祗候陳請轉奏情詞懇切恭順可嘉著準其遣人至盛京請安毋庸進貢不必差遣多人亦不賜筵宴也該部咨該國王知之諭內閣乾隆四十三年七月二十日朕此次前往盛京恭謁祖陵所有經過直𨽻奉天州縣地方著加恩蠲免本年應徴地丁錢糧十分之三該部即遵諭行諭內閣乾隆四十三年七月二十二日此次詣盛京恭謁祖陵經過地方所有沿途辦差緑營兵丁著查明賞給一月錢糧以昭恩賚諭內閣乾隆四十三年八月初二日海為衆水朝宗最昭靈應乃各處海神咸有廟祀惟北海自山海關至盛京一帶向未専建廟宇以隆禋祀尚屬闕典朕此次前詣盛京恭謁祖陵蹕途循海而行瞻望甚近宜先申虔祭以迓靈庥著該部於濱海地方擇地望祭派莊親王永瑺行禮所有應行事宜各該衙門即速照例備辦並著總督周元理於山海關澄海樓相近處所度地建立北海神廟即行繪圖呈覽候朕降旨發帑興工俾廟貌崇閎以妥神佑諭內閣乾隆四十三年八月初八日盛京為本朝王迹肇基之地朕恭謁祖陵道出山海關經過各處城垣多有坍塌殊不足以壯觀瞻而資捍衛著軍機大臣會同將軍𢎞晌查明何處最為緊要應行修築妥議具奏候朕發帑興工并派員稽查督辦諭內閣乾隆四十三年八月十四日遼河雙源遙引合而為巨流河襟帶神臯恬波涵潤實為陪都境內大川朕恭謁祖陵蹕路所經舟梁利涉緬念河神之功甚溥顧該處向無祠祀典尚闕焉著邁拉遜德成會同將軍府尹於勘估城工之便在瀕河高阜處所度地計工奏聞請帑専建河神廟以昭妥侑諭內閣乾隆四十三年八月二十二日朕自乾隆十九年再蒞盛京迄今二十四年矣遼瀋為我朝鴻業肇基之地風俗敦龎人心淳厚緬惟祖澤留貽食舊德而服先疇者久而彌篤比户恬熙之象時繫於懷兹由山海關至陪京恭謁祖陵時當秋穫豐登蹕路所經村村殷阜而老幼歡迎扶携恐後尤見忠愛悃忱嘉慰之餘恩施宜渥啓鑾日業經降旨免所過地方錢糧十分之三著再加恩將奉天所屬府州縣乾隆四十四年地丁正項錢糧通行蠲免俾我留都士庶連年不事輸將益享盈寧之福該部即遵諭行諭內閣乾隆四十三年八月二十四日盛京等處俗厚風淳獄訟衰息惟因五方雜處良莠不齊其無知而蹈法網者亦復不免朕恭謁祖陵禮成行慶業經疊沛恩膏並宜式措祥刑益敷愷澤所有奉天吉林黑龍江等處軍民人等除十惡死罪及秋審情實各犯外其餘已結未結一應死罪俱著減等發落軍流以下悉豫寬免用昭肆眚施惠至意諭內閣乾隆四十三年八月二十四日朕恭謁祖陵禮成現降旨將奉天所屬府州縣乾隆四十四年地丁正項錢糧通行蠲免所有各莊頭及旗地應納糧石草束等項自應一體加恩以敷渥澤著將盛京户部各莊頭本年應交倉糧一萬餘石免其交納所有各處匠役應需口糧著於舊存倉糧內撥給其盛京興京遼陽牛莊蓋平熊嶽復州金州岫巖鳳凰城開原錦州寧逺廣寧義州等十五處旗地本年應納米豆草束亦著免徴一半俾旗莊均沾嘉惠該部即遵諭行諭內閣乾隆四十三年八月二十四日盛京為本朝根本重地兵丁皆知恪守舊風嫻騎射以裕武備現亦校閲分别賞賚其讀書之士亦漸摩文化蒸蒸日盛堪與畿甸比隆朕鑾輅所臨青襟獻詩趨迓絃誦彬彬具見膠庠樂育自宜一體加恩用彰作人盛典著將盛京滿合二號及奉天所屬各學科考廣額一次其向取六名以上者增額三名四五名者增額二名二三名者增額一名該府丞其悉心校録甄拔殊尤副朕嘉惠士林至意諭內閣乾隆四十三年八月二十五日向來鑾輅時巡每優賜高年粟帛以昭行慶况盛京諸處乃祖宗德澤培貽纍洽重熙引恬引養尤徴仁壽之庥兹蹕路經行多有年踰耄耋龎眉皓首扶杖歡迎者宜沛恩膏以彰盛美所有奉天等處旗民男婦及官兵母妻七十以上者各給布一匹米五斗八十以上者絹一匹米一石九十以上者倍之百歲者加賞大緞一匹彭緞一匹用示優老引年至意諭內閣乾隆四十三年八月二十五日向凡巡幸所至一應經行橋道俱令報部核銷以寓體恤官民之意惟盛京一帶止計橋梁不計道路未為畫一且非所以廣惠也所有此次自山海關以外至興京往來道路並著加恩照關內之例一體報銷諭內閣乾隆四十三年八月二十五日朝鮮列在外藩世篤忠貞謹守侯度乾隆八年及十九年臨幸盛京朝鮮並修朝貢之禮本年以尚在二十七月之內停止宴禮曾預敕朝鮮毋庸遣使朝賀而該國王情殷感戴遣陪臣賫表修貢迎駕請安藉抒忱悃恭順可嘉著照上兩次之例加恩賞賚并御書扁額以賜用昭優眷其陪臣亦著一併照例加賞諭軍機大臣乾隆四十三年九月初二日朕此次詣盛京恭謁祖陵蹕路出山海關而行憑覽關城形勢屹然雄鎮明季於此置大員設重兵拒守以防我朝而大軍每從沿邊諸隘口直入如踐無人之境可見險固不足恃也然以當時盛京而論有此關控扼其中內外氣脈不能貫注即由他路入邊而彼終得撓我之後所以天聰三年太宗文皇帝親統大軍征明進圍燕京仍復釋之而去聖謀深逺未嘗不籌慮及此逮後攻克永平灤州遵化皆留將督兵駐守或欲藉以為內外夾攻山海關之策乃代鎮之貝勒阿敏乖張怯懦竟棄已得之各城而歸太宗憤甚數其罪而責之雖貸其死以全親親之誼遂不復躬總六師入邊亦深以山海關中隔為難也洎乎闖賊陷闕明社遂墟吳三桂乃開關迎請王師為之復仇戡亂於是我睿親王即率徑旅入關一戰而殱賊衆追逐李自成至京城而遁克集大勳恭奉我世祖章皇帝定鼎燕京統一寰宇用奠我萬世丕丕基夫同此山海關也前則屢圖之而不得其機後則直入焉而無所於阻蓋上天眷佑我國家誠非意計所能預及而所謂在德不在險者於此益見迄今追思更不禁感鴻貺而凛景命矣且自出關後途中所經城郭則寧逺錦州廣寧等處山川則松山杏山大凌河薩爾滸尚間崖渾河等處悉我太祖太宗艱辛百戰之地歷歷在目溯自興京肇迹遼瀋遷都業基於勤而謀成於斷皆世世子孫所當深念者朕自臨御以來每間日恭閲列祖實録一册周而復始於創業垂統之迹敬識之弗敢忘前此癸亥甲戌再臨陪都展謁陵寢所歷川原形勝因見徴聞並為詩篇以紀而薩爾滸一戰破明四路之兵二十餘萬逺近承風震讋尤為締造鴻規向曾親製書事長篇昭示來許昨為全韻詩於太祖太宗大烈耿光咸志述成什端委畢該洪纎具備實足以垂法守非僅託為吟咏而已兹戊戌秋三蒞斯土境之履者益以習迹之著者益以晰其或地名今昔傳訛介於疑似顯晦間者復周諏而深考之乃得曉然於心而無所惑夫以朕之景仰前型勤懇若是必三至乃得曉然於心凡我子子孫孫紹登大統者可不體朕志以為志眷懷遼瀋舊疆再三周歷蘄於祖宗遺緒身親而目覩哉至於朕叩謁永陵福陵昭陵每至必淚隨聲湧瞻戀不忍去此非可以強致也夫太宗為朕之高祖而自太祖以上至肇祖雖遞推遞逺然追溯水源木本一脈相承則固甚親而甚近且奕䙫之升平景運皆昔日艱難開創之所留貽永言思之豈能不痛理也亦情也我後世子孫誠能遵朕此旨處尊位而常緬前勞覽當年原巘而興思拜舊里松楸而感愴自必凛然於天眷之何以久膺憬然於先澤之何以善繼知守成之難兢兢業業永保勿墜則我大清纍洽重熙之盛洵可綿延於億萬斯年矣非然者或輕視故都而憚於逺涉或偶詣祖陵視同延攬古迹而漠不動心是則忘本而泯良設有其人即為國家之不幸實不願我後嗣之若此也子若孫可不恪奉朕訓而知警懼乎歷代事迹湮逺姑不具論即如勝國洪武草昧初開未嘗不得之艱苦而中葉以後罔念厥祖若正德之荒淫蕩佚恬不為怪嘉靖萬厯天啓之昏庸逸樂阿柄下移以致權臣姦宦相繼而擅威福亂政害良此數君惟知蒙業而安於國是懵然罔覺雖未及身而喪不數傳而馴至滅亡使有能奮然振興追念洪武之舊圖勵精求治未必不可挽回於末造而宴安鴆毒終於不可救藥自覆厥宗殷鑒甚近尤足為炯戒耳或我子孫尚知遵朕此旨欲蒞陪京而其時無識之臣工妄以為人主當端處法宫綜理庶政不宜輕出關外此即我朝之亂臣賊子當律以悖命之罪誅之毋赦蓋盛京為根本重地發祥所自後世不可不躬親閲歷昔我皇祖曽三舉斯典朕今亦三次矣如升殿祀神閲射行賞之類仍循成例而於三陵之察紅樁移近居及葺盛京舊有壇廟以至沿途之繕城垣檢核各庫諸事則皆前兩巡所未及而今悉舉而行之益可見臨幸之有益矣十數年後朕躬若尚如今日之康強仍當再修上陵之禮然尚須有待嗣後每閲三年即派皇子二三人恭謁祖陵每次於秋冬間啓行途間既不煩修治橋道之勞而傔從無多更可不預安營頓俾之歷覽舊京風土自皆惕然動念感天佑而仰祖功無負朕諄切垂訓之意欽承毋忽將此通諭中外並録一通交上書房存記其三年一次簡派皇子之事屆期著軍機大臣請旨諭內閣乾隆四十三年九月初二日渾河發源遙逺自東北來入英峩邊門西流幾及千里會遼入海縈護三陵滋演萬年靈脈而長川襟帶兼衛陪都厥功甚溥自宜虔崇廟祀以答神庥著交邁拉遜德成會同將軍府尹於盛京城東度地鳩工奏聞請帑興建河神廟以昭妥侑諭內閣乾隆四十三年九月十八日前已降旨於山海關之澄海樓旁建立北海神廟兹稽考祀典北海向於河南濟源縣望祭河南地屬中州且非濵海固於事理未協嗣經改於吉林東門外望祭雖屬北境然距海尚逺亦非所宜所有春秋秩祀及遇告祭典禮自應恭移於此以叶方位至吉林之松花江導源長白襟帶神臯為本朝發祥之地綿演億萬載景祚靈長厥功甚巨自宜虔崇廟祀用迓神庥已諭令吉林將軍福康安於吉林城外濱江處所度地鳩工興建松花江神廟其一切祀事即照從前望祭北海之制著禮部載入會典遵行諭內閣乾隆四十三年十一月十二日本年輪蠲奉天等省地丁銀兩又因臨幸盛京降旨加恩將奉天所屬乾隆四十四年地丁正項錢糧通行蠲免其米豆一項例不在應蠲之內但念奉天省地丁向係銀糧並納其額徴米石即屬任土正供自當普豫加恩著將乾隆四十三年四十四年該省應徴米豆一體免徴俾得均沾渥澤該部即遵諭行諭刑部乾隆四十四年七月二十二日盛京吉林均係國家根本之地境壤毗連盛京旗人潛往吉林種地謀生本無關礙並非旗逃可比從前𢎞晌奏請解回治罪之處所辦原屬過當伊等皆滿洲世僕盛京吉林有何區别其正身旗人六户即著入於吉林當差毋庸解回盛京辦理餘依議諭軍機大臣乾隆四十五年六月二十四日朕惟歷代寶璽所以展禮神祗式彰符命我國家承天眷佑自太祖太宗創業盛京肇膺大寶逮我世祖正位凝命奄有萬方我聖祖六十一年篤祜延庥深仁淪浹我皇考世宗勵精圖治繼序前徽罔不欽崇天道勤恤民隱夙夜勤求治理不敢康寧用克協於天心俾中外蒙和一之休臣庶享升平之福暨於朕躬嗣服兢兢業業祈天永命恆切於懷惟是太廟尊藏列朝寶册金繩玉檢靈爽式憑然以次第鐫造未免玉質大小長短不能一律荷天之休承列祖列宗之餘慶平伊犁定回部和闐良玉歲有恆貢用是特命有司選良工卜吉日敬造列朝寶册一律從同以奉太室念今年為朕七旬萬壽自古帝王受天純佑錫福延洪實無有過於朕者朕用是益不敢不敬天益不敢不勤民惟有朝乾夕惕思日孜孜以敬迓億萬年無疆之寶命所有換出太廟尊藏列朝寶册敬諏吉日簡派皇子恭送盛京太廟尊藏以昭祖宗功德之盛於萬代嗣後凡有舉行寶册事皆以是為例必為二分一奉太廟一送盛京朕之此意欲我子孫世世知天命之難諶敬天勤民永存無疆之恤以保無疆之休可將此旨恭録二通一存上書房一存內閣敬承無斁欽哉特諭諭內閣乾隆四十五年十二月二十五日所擬盛京新建巨流河渾河河神廟名神牌匾額俱著用單內首擬字樣至建廟神牌匾額均係褒崇神祀沿用敕賜二字未協敬謹之義嗣後遇有建廟封神等事擬請欽定者廟名著寫敕建其神牌匾額俱著寫敕封字樣諭户部乾隆四十六年十一月初一日户部議覆索諾穆策凌等奏查大流民私墾地畝仿照山東科則定賦一摺自應如此辦理流民私墾地畝於該處滿洲生計大有妨礙是以照內地賦則酌增以杜流民占種之弊且撤出地畝並可令滿洲耕種不特於旗人生計有益並可習種地之勞不忘舊俗原非為加賦起見至吉林與奉天接壤地糧自應畫一今據户部查奏吉林所定額賦又係照直𨽻辦理與奉天查照山東科則者互異是和隆武専似為言利起見殊非均平賦額加惠旗人之意所有吉林地畝錢糧應收賦則著將户部原摺交和隆武會同索諾穆策凌詳悉熟籌酌中畫一定額妥議具奏諭內閣乾隆四十八年三月初五日朕於五月二十四日啓鑾至熱河駐蹕避暑山莊七月十一日即由熱河至盛京興京恭謁祖陵所有應行典禮著各該衙門照例敬謹預備諭內閣乾隆四十八年六月十三日前經降旨於七月十一日自熱河啓鑾前詣盛京恭謁祖陵第念今年節候較遲是日正屆立秋尚在三伏之內雨水方多天氣炎熱於扈從人員行李一切及駝馬俱多未便著改期於八月十六日啓蹕前往回鑾時進山海關祗謁東陵後即由白澗煙郊進宫諭禮部乾隆四十八年六月十三日此次盛京恭送册寶之怡親王等著於八月十二日由京起程九月初二日到常家屯會同前往諭禮部工部乾隆四十八年六月二十二日此次盛京恭送册寶著派工部侍郎汪承霈前往諭吏部兵部乾隆四十八年七月二十六日此次恭謁祖陵駐蹕盛京所有盛京吉林黑龍江等處應行引見及大計卓異軍政文武官員著交行在吏兵二部就近在盛京帶領引見諭諸皇子乾隆四十八年七月二十六日盛京為王迹肇基之地朕御極以來敬惟祖宗開創艱難佑啓萬年統緒於癸亥甲戌戊戌暨今癸卯四詣盛京恭謁祖陵以申積悃所歷川原形勝因見徴聞並為詩以識而於太祖太宗締造鴻規耿光大烈恭紀成篇實足以垂法守非僅託於吟詠所有四詣盛京御製詩著皇子等分年按次各録一分裝成四卷彚貯一匣以昭覲揚垂裕之至意諭禮部乾隆四十八年八月初六日朝鮮列在外藩勤修職貢最為恭順今以朕臨幸盛京遣陪臣賫表修貢迎駕請安並祝萬夀藉抒忱悃甚屬可嘉屆時當加恩賞賚以示優眷著禮部堂官傳諭知之諭內閣乾隆四十八年八月十六日朕由熱河前往盛京恭謁祖陵所有經過直𨽻奉天各州縣著蠲免本年地丁錢糧十分之五該部即遵諭行諭禮部乾隆四十八年八月十八日此次朕往盛京遼陽太子河著一併遣官致祭諭禮部乾隆四十八年九月初五日朝鮮列在東藩忠貞世篤歷屆臨幸盛京並修朝貢之禮此次朕恭謁祖陵原定期在盛京過萬夀該國王情殷感戴奉表修貢於七月間即先遣陪臣在盛京祗候迎駕請安恭祝萬夀著照例加賞並賜御製詩一章用昭優眷所有陪臣及隨從人等守候日久著照上次加賞之例再行加倍賞賜以示朕柔惠逺人有加無已之至意諭內閣乾隆四十八年九月初七日朕自乾隆四十三年臨幸盛京迄今五年我朝根本之地風俗淳厚逈非他省可比緬維祖澤留貽至令勿替兹由熱河取道九關臺四蒞陪京恭謁祖陵蹕路所經老扶幼挈就瞻恐後尤見愛戴悃忱嘉慰之餘恩施宜渥著加恩將奉天所屬府州縣乾隆四十九年地丁正項錢糧通行豁免俾於留都士庶益享盈寧之福該部即遵諭行諭內閣乾隆四十八年九月十一日朕恭謁祖陵禮成現降旨將奉天所屬府州縣乾隆四十九年地丁正項錢糧通行豁免所有各莊頭及旗地應納糧石草束等項自應一體加恩以敷渥澤著將盛京戶部各莊頭本年應交倉糧一萬餘石免其交納所有各處匠役應需口糧著於舊存倉糧內撥給其盛京興京遼陽牛莊蓋平熊嶽復州金州岫巖鳳凰城開原錦州寧逺廣州義州等十五處旗地本年應納米豆草束亦著免徴一半俾旗莊均沾嘉惠該部即遵諭行諭內閣乾隆四十八年九月十一日盛京等處俗厚風淳獄訟衰息惟因五方雜處良莠不齊其無知而蹈法網者亦復不免朕恭謁祖陵禮成行慶業經疊沛恩膏並宜式措祥刑益敷愷澤所有奉天吉林黑龍江等處軍民人等除十惡死罪及秋審情實各犯外其餘已結未結一應死罪俱著減等發落軍流以下悉豫寬免用昭肆眚施惠至意諭內閣乾隆四十八年九月十七日盛京為我朝根本重地兵丁皆知恪守舊風嫻騎射以裕武備現亦校閲分别賞賚其讀書之士亦漸摩文化蒸蒸日盛堪與畿甸比隆朕鑾輅所臨青襟獻詩趨迓絃誦彬彬具見膠庠樂育自宜一體加恩用彰作人盛典著將盛京滿合二號及奉天所屬各學歲考廣額一次其向來取進六名以上者增額三名四五名者增額二名二三名者增額一名該府丞其悉心校録甄拔殊尤副朕嘉惠士林至意諭內閣乾隆四十八年九月十七日向來鑾輅時巡每優賜高年粟帛以昭行慶况盛京諸處乃祖宗德澤培貽纍洽重熙引恬引養尤徴仁夀之庥兹蹕路經行多有年踰耄耋龎眉皓首扶杖歡迎者宜沛恩膏以彰盛美所有奉天等處旗民男婦官兵母妻七十以上者各給布一匹米五斗八十以上者給絹一匹米一石九十以上者倍之百歲者加賞大緞一匹彭緞一匹用示優老引年至意諭吏部兵部乾隆四十八年九月十八日朕恭謁祖陵禮成所有隨駕之王公俱著紀録一次文武大臣官員俱著各加一級諭吏部兵部乾隆四十八年九月十八日朕詣盛京恭謁祖陵所有直𨽻奉天等處辦差文武官員俱著加恩各加一級其現有降級之案者準以所加之級抵銷諭內閣乾隆四十八年九月十九日朕於十月十七日回鑾十八日告祭奉先殿在前殿行禮所有祭文交翰林院另行敬謹撰擬諭內閣乾隆四十八年九月二十六日朕回鑾後於十月二十日升殿受賀所有應行謝恩人員即著一體謝恩欽定盛京通志卷九
