body:
  text: 國朝藝文四頌欽定四庫全書欽定盛京通志卷一百十八國朝藝文四頌聖駕再幸盛京恭謁祖陵恭頌謹序甲戍梁國治臣聞昔受圖於翠媯錫玉於延喜明王者升福肇祉假天顯命之符也越有周文武誕集大統丕景光烈至於成王洋溢雅頌推本太王王季上溯公劉后稷陳沮漆豳渭皇澗過澗岐陽豐鎬之迹涉降荒度疆理捄築修平攘剔之勤升歌告廟以施孫子以昭來許洪惟我朝繼周室之隆軌紹千祀之遺緒奥自太祖肇造圅夏開乾闢坤榮鏡乎宇􅨚威憺乎雷霆殷烈祖之洪熙宅遼瀋而作京及我太宗内矢文徳外暢武威協運承統張網緝維當此之隆籌畫若神明將卒如雲雨式廓疆圍萬國景附是以我世祖因天人之符遂來蘇之望包舉六合亘被八荒使水火納於袵席闇昧爥於光明也我聖祖繼之祇祇繩繩仰則天經俯協地紀翔巽風於南箕浹兊澤乎離畢乃睠祖烈展慕乎山陵盖六十一年三用享焉越我世宗䖍思廣運辰居建極遹自藩服膺命陟薦而靖惟疇典十三載而不遑我皇上聖徳純孝纘膺丕基乾隆八年秋躬詣盛京齋肅致敬告覲山陵望長白徧羣神懿豐融洽壬林皇帝穆乎精凝於肸蠁之宇淵乎氣接於穆清之庭綜栝山海彈悉圖經芔歙地寳雕錯天榮剖纎析奥搆響研形披發聾瞶振耀流聲掞天藻而作賦盖古今莫之與京也且夫聖人之徳無以加於孝記曰大孝不匱言備物博施也王者撫萬國度四方施法天明日月所照齒髪之屬莫不砥礪今析木之次北冥之壖候尉藩籬衛我陪京盖川嶽靈祇儲符獻珍庶幾雲日之光景焉我皇於是推天時順斗極稽禮經綀吉日以十九年五月甲申恭奉慈寧乘安輿發京師開閶闔駟飛龍礚鼉鼓鏗鯨鐘翠盖郅偈玉鑾冷瓏太常招摇鳴鳶雄虹嚴簿星列羽騎雲從陵山耀野掣電超風殷動天地焱焱隆隆梁灤杠潞聿臻乎避暑之宫爾乃越近寨啟北垠千閫洞達萬幕聨屯翬軒罩景飛陛流雲凌扶摇之雄風鑒渟洪之清津霽澈宵崿曠朗蒼雯丹壁翠巘華錯英紛天子曰欽哉惟皇祖鴻駿懿鑠和壹中外陟降斯宇予其敢不肆靖迓天之申命越孟秋初吉日次鶉尾爰詔卒徒程勇奮枝乃發中闗徑巖阯踰迴日之梁掲羊膓之水鑚磨鋋擁韊矢控湛衛執象弭前驅霧合後騎雲靡影躡飈流光格電駛其校獵也則獫鷹􅑷百獸羣駭顛踣駓騃精散瑰解齀林石蹶榛叢猭嬰鏑走罹曈摶麏兔掎麋狨斑摧虓虎脰絶懸熊膏侵土碧血染輪紅口囓飛鍔足跋霜鋒或穿髀拉蔵於莽䍚之廣野或形僵景僨於嶄嵓之髙峯其訓練也則地軸移屯天星按部握機連衡覆霓壓堵右牝左牡先偏後伍舒翼張箕方金圓土叱咤動風雲闗哮震貔虎熻若激圓曜而門㸌哧若㧞五岳而扞拒聾耳則霹靂倒迴駭野則山靈氣沮盖帝王所以纘遐烈耀神武也且天地者萬物之祖王者天地通氣故以經紀不忒神明烈序峩峩長白峻極無際倒景重溟嘘吸元氣雲雨之司祥暉靉霼北則頊𡨕䟽流三江滂湃控引島夷萬里襟帶雪散天琛珠懐月氣千有億年恬波無沸非夫功至徳洽曷能受命將事者乎然後皇帝端思要道嘿然儲精仁覃萬彚禮洎萬靈光洽上下資侔神明郁郁穆穆迎釐太清目極乎無見耳接乎無聲於赫孔熯陳犧荐牲伊洋洋而升歆若陟降之在庭乃覲永陵元始開運天閫地門日月衛捍晫乎辰極之昭而星躔布列劃乎鴻濛之剖而清寧基奠嵗周紀而肆祀惻屏營乎閟殿乃薦福陵函毓胚渾欝律天柱神靈攸尊彈壓海岳含元欲歕萬國日出扶桑朝暾燕於皇天永思所存乃格昭陵卜惟隆業芒芒肇域鍾祥億葉二儀氣交陰陽開闔龍睇虎嘯轡御六合伊大聖之基命凛心源於榘法於爍盛羙洵乎鬷假思成對越在天之靈者也爾乃徘徊弭節言莅陪都乾運立極坤靈啟圖峥榮列雉赫奕千櫨寫極上穹巍乎天居昔在烈祖來同車書我皇再至永維顯謨闢正殿以受朝擁環衛之周廬儼飛龍與翔鳯晃日麗而霞舒乃申舊章渙大號増爵秩之賜下蠲復之詔頒賜守土之人吏存問舊都之耆耄輕省嬰絏之罪人優飫逺徠之享勞使萬里同氣中外同教我皇於是恭奉皇太后延釐挹祥頌南山之夀晉萬年之觴擗厨莆進瑶漿華實選腴陸海傾蔵千鍾萬品羅陳芬芳備韶舞之羽佾奏鈞天之宫商覿麟皇之儀舞發風雲之浩倡張讌飲乎豐沛命故老乎南陽天人氣洽苐禄滂洋庻䝉被歡娱無疆繄聖孝之不匱極天地乎等量皇帝方淵懿䔍恭敬凝天庥惟精惟一協和剛柔志存乎宵旰心營乎方州秉乾健之揚厲凛衣袽於敬修惟後嗣之克艱厪顯承乎詒謀思登假於三五庶永言夫作求如是故保佑申錫而福禄遒也又奚崇耀軒禹侈韙成周者哉臣叨侍講帷職司譔輯伏覩大典隆盛頌揚之音充盈天地不勝歡躍忭舞伏作頌一篇凢八章拜手稽首敬獻闕下其詞曰維帝赫臨肇寧萬方我皇祖徳類遹章天慶帝賜東土往受延昌開極經紀告承明貺萬國奔走沐日月光闢地廣大寵荷上蒼一章震方東陽天地氣貴不咸醫閭雲霞晻霨欝哉山陵龍婉鳯翽聖人䔍生為天地嗣奄宅四海莫不保治徳澤洪奕述天地事二章昔聖祖嗣服曰予明命攸屬率惟彛型往荐寅肅孝章天儀睠慕精矚龍衣黼黻羽旄芬郁芒芒山海曰予一人攸域孝熙丕純綏萬年禄三章肆我皇克受是劼是究肅若假典既饗來又孝徳殷盛光大休祐輯若萬國莫不被覆赫赫烈烈于獀于狩文武維皇徳威惟后四章申命于皇天載纘祖功夙夜懐畏予惟冲冲髙下穹窿江海鴻洞日兮月兮怵感予中天地開闢寵禄殷豐予兹日業業格休皇穹五章浩浩聖徳昭彰顯光龍旂大輅肅陳明堂皇帝布恵洪延萬祥休氣盈溢物各豫昌三階景明徳義炳煌願嗣福裕亘天地長六章翼翼盛京皇化純茂維世徳格被自我敷佑灝灝太古乾坤基構鞏億萬年祝文母夀大矣孝徳亶洽寰宙甘醴在庭麟皇在囿七章天祚我聖皇茀禄有常邦國用昌民用和良天子曰於惟繼序弗忘肆昊天顯命予列祖耿光一人克敬萬邦之慶於惟緝熙永廸懿祥八章聖駕再幸盛京展謁祖陵恭頌謹序甲戌劉星煒臣聞八音出震斗車指天首之星五色榮河金籙懸帝垂之室溯自鳯分元扈襄城秘蘭葉之圖龍馭璿䑓石鈕駐雲螭之駕姚墟嗣服纂靈慶於丹陵蒼籙升壇衍貞苻於翠渚髙邱襲祉名都立七相之華大予登歌殷薦嫓三雍之盛用以合歡寰甸丕顯文謨日月銜珠光啟龍興之宅蕙蘭成路祇迎天步之區至如轍迹方開絶徼則銀麞入貢車書欲逺流沙之澤馬先鳴輯玉瑞於塗山防風納賮席羅圖於涿水濁野請庭天乙四征鮫盾來於東面雒鈴作邑雉翬羾自南人揆厥所元於斯為盛欽惟皇上乾維御宇鼎位凝休三筴長垂永䙫絢蜼裳之采萬靈自總環瀛肅䕫鼓之聲乘木徳以司方津覃蟻垤肅金行而省歛澤漙鶼林鴻寳九疇衢室發天文之秘雞渾七曜金徒候日昃之勤岱頂嵩申獻祥書於鏐檢吳歙越唱遍謠頌於朱垠洪惟神女降祥大東卜宅真人建業朔易開基綃帳葛燈陶穴本堯門之舊璇宫銀洞祠壇閟軒鼎之遺載啓文孫誕膺成命循上陵之懿典摛賦海之鴻章豳館玉瑤常陳皇覽蕃方僸佅更佇帝臨爰於鳯紀之周星再見鸞軨之動地若榴似火迎葆衛以舒紅蒲萐成茵列旌門而映碧灤魚入饌清宵侍天母之筵塞馬傳書乙夜省臣工之奏時維六月駕幸山莊瞻翠琬而光闡聖圖撫丹楹而𨗳揚祖烈赫曦歊景不臨清景之宫仙掌修莖自泫招凉之館錘峰轉靄披爽籟於南端獅嶺蹲崖摘明星於北户萬壑松濤之聴户罨陰雲四山乳脉之懸時移火樹沿堤芝逕蘭華自綴於文㮰曲水荷英珠菂紛披於鏤檻平沙列幕雲屯朱汗三千夹鏡重湖屏列青芙十二軫祁寒於板屋坐燭螟巢勤布政於瑤階躬釐鵷序綸連聖藻丹青壯寰宇之觀嘡㗳天歌宫徴發川原之響維時夙沙𠢐面煎鞏披忱春雨自零戀燠之禽先集秋霜逺擊懐寒之馬知歸矧夫鳴鏑之驅除焚巢潰卵遂乃欵闗而慴伏食黮懐音引領虞干不便露犬紈牛之貢投身湯網自厭焦頭頳尾之勞降書已達於帝閽亭障遥傳於邉候天垂解澤甦魚鳥於滄溟日擁需雲静蜩螗於莞簟霞漿玉醴與沆瀣而俱傾鳯管龍絲雜鐃歌而並奏班璜授賞文身資章甫之華昨土論功折箠拜真王之貴燈宵燕集煥綵樹於長離綺席賡吟綴華璫而合璧洗兵戎於瀚海簫勺同文徴尉候於流沙昌弧奉籙律移無射令轉蓐收乘萬物之權輿展初秋之法駕鈎陳清蹕山祇夙戒於非煙俞竒前驅行幄先成於匪日披星結軫辰斿指析木之躔向夜傳餐月駟薄搖光之舎名王負弩捍牧圉於陰山迾卒周廬掘鈎鈴於乙帳文驪赭白攻駒苜蓿之園挏酒黄羊式燕琉璃之醆平疇草淺正驊騮逸足之塲玉宇凉髙肅鷹隼凌霄之嗣㑹烝徒而表貉列缺騰鞭周嶻嶭以展軨豐隆夾轂騂弓手御扼狡獸於崇岡黄矢親調殪剛䖝於邃谷螭騰虬踴聲傳天馬之嘶虎攫麟超雷動王師之氣羮陳舜甑驍媒辨由鹿之音瑞兆姬璜釣渚叶射熊之夢數大庖於吉日獲必疊雙校簡力於長揚吞其八九京薪爓朗獠徒識荼火之容阹網昈分彀騎習鸛鵞之陣觀風皇澗入豐蔀而其咨駐罕周原考前經而于邁爰諏良日載莅吉林碧栁遙看北戒合元都比景白山凝睇東封與日觀同尊熙景祐之裁基祥徴帝武瞻溥原之式廓户近神樞襟百濟之雄封納三韓之王氣森㽔木葉承御輦而敷茵澹沲松花漾宸斿而滑笏長庚届節氊廬騰萬嵗之呼韶齒迎鑾金版紀十年之聚肅鳴騶於砥道栖畝同雲詔省嵗於茨椽廣塲比櫛霓旌沛艾經枌社以周遊鼇紀環維謁珠邱而將事瞻言榱角申老感于履霜省識陵園竚神遊於在巘重旃曲葢黼幄森陳朱草華平橋山夙植奠椒漿於銀甕竹葦流膏颺槱燎於蕭光毛炰列鼎冠華秉翟總干陳大武之容嚴鼓鏗鐘緼瑟和咸英之奏犛牛服軛歸遹駿於前寧鄗黍奉盛告屢豐於十稔鞸琫客刀之飾舄奕如新檉椐伐木之塲青蒼逾昔緹箱累襲啟組練於犀函筍席捐雕樹崇牙於鹿角儃徊左序卿雲糺縵之章眷顧靈衣韎韋帶裳之舊紀威弧於參伐幹合蘭筋䇿大白於駟房形鎸石馬岧嶤樓觀鳯皇接翼於慈輿掩靄方壺鮫鱷恬波於聖籙桐圭作瑞奉璋先麟趾之英毳幕來賓飲福列燕毛之次秀眉紺髮斟緑螘而酌懸匏玉藻瓊敷絢丹縢而摛寶篆恩孚棘土張疎網於秋荼頌溢畆邱静催租於夜柝儆顧碞於鳸紀績嫓朱宣均挟纊於雁臣歡騰凊籞慶霄禔福薶柴而禮百神昧景垂庥茀草而脩遼祀入新豐之闤闠鷄犬知歸同在鎬之燕遊魚龍不去然後斑文轉駕鏤象回鏕萬雉當闗鐵嶺之戈鋋動色雙虹夾道凌河之簫鼓無譁宅太紫以停旒淵涓齊量御訾黄而載斾月螖由庚般裔來遊沐融臯而澍渥昭晻旁逹歆協氣之棣通臣未奉屬車幸依仙仗暌居南紀瞻北極而先傾陋比夏蟲聴春鯨而率舞陳詩清廟敢云小相非能結想卷阿敬附矢音之末謹拜手稽首而獻頌曰帝薦蕃釐天垂寳命朱果開祥丹陵啟聖八部龕夷三階篤慶道契銅渾功叅金鏡其一周邠考室漢沛歌風重櫩秘䃭寢殿藏弓巍連峒嶺儉合蒿宫髙山荒度豐水攸同其二叡祉膺圖華旃曜彩巡洛禮河導江觀海風舉時龢天行道在吏礪平端民懐幸覬其三言稽往牒曰止陪京瑤緘考懿珠典昭清節蓂旋易嵗籥載更禮隆報本契合感生其四澗户延熏霞莊澹暑蘭茞池䑓松篁棟宇景福裁基渠搜即叙治洽前文光施下武其五道遊星指阹櫓雲垂景員廣漠朔野逶迤言瞻複廟載啟瑞闈邠岐方駕鄠杜同規其六禹蹟四遊羲壇六位懐柔孔延禮樂明備葩瑵葳㽔庶旄棽麗用配於京永錫爾類其七景炎於鑠文軌漙將鎸芳玉鉉襲慶珠囊金船起陸歊鼎升香大矣孝熙承天之况其八聖駕四詣盛京祇謁祖陵禮成恭頌謹序癸夘周煌皇上御極之四十有八年秋八月乙亥自灤陽啟塗前謁二京有事於三陵溯自乾隆八年十九年四十三年至是凡四勤展謁盛典隆禮次第有加解澤渙號遐邇周浹惟時鑾輅由承徳府平泉州至烏里雅蘇臺城復自建昌縣朝陽縣至爾沁土黙特界袤延千有餘里皆非前巡所經攬上塞之沃饒循老邉之寧謐觀穫省穡則殷阜徧于村氓閲射行圍則恪恭徴于藩服臣嘗伏讀諭㫖有云境之履者益以習蹟之著者益以晰此在三巡已然今復閲虞巡之五載矣而蹕路之悦來與旗民之熙皡又有百年必世遹際其隆不啻愈乆而愈彰者用是形於詩歌見諸紀載彛章大備謨訓同彰盖即茂典之踵行舊制之沿襲而大聖人至誠之徳純孝之思亹亹惓惓勤勤懇懇與天健同其不息率祖考邁其攸行誠有非詞臣墨卿之所能贊擬萬一者矣洪惟國慶洊臻天庥滋至恭遇年逾古稀之聖主重巡地當全盛之留都臣伏見列朝寶冊於去嵗七月鐫造告成孟冬時享薦于太廟此次奉累葉之留貽蔵邠岐之世室而宗廟之嚴至矣奉天十八處城工越五稔尅三限以次修繕告成金湯式鞏富庶駢闐而封疆之固至矣人文以久道化成典籍為賔興先務我皇上以四庫書第二分繕寫蕆事申命廷臣自京齎持弆置文溯閣耀瀛海之奎章宏鎬京之治化而士勸于雍矣遼水渾河松花北海為大東巨川全遼演潤我皇上命建神祠並崇廟貌衍靈長之國脉昭肸蠁于明禋而神揚其職矣至于倉庫之檢核經三巡釐剔之餘而吏治官方胥歸澄叙睿作之宏深綜四巡編録之後而纉繩佑啟實裕燕貽凡若此者臣謹就見聞所及類次為頌共得九章直已陳徳紀實摛辭不文是恧臣煌拜首稽首上言天眷我清祚流自東天錫我皇既夀而隆瞻望山陵叶王氣蔥籠霜悽露惕聳誠翹心叶川以時増山以時崇惟古稀天子載陟載登叶繁祉聖躬遑憚時乘叶曰前光允廸曰祖武是繩叶一章十六句惟昔聖祖乆道長世綺甲一週丹陵三至念神臯循行戰地篇什留題碑頌親製覲光揚烈繼志述事肆赦頒恩東巡有成例紹祖惟我皇迺陪京四涖仲秋練時昭陽紀嵗二章十六句有侐太室于京斯依於昭列聖陟降在兹保佑自天綿瑞産嘏葱嶺岧嶤崑源涾湤玉既羾廷珍無遺野是斵是鎸爰畀能者寳冊爛然瑞輝阿那薦廟孔宜藏京斯可前期啟行什襲苞裹匪今曷承匪聖曷荷以介景物以侑以妥三章二十二句於鑠二京輦道纚屬州邑雲屯如輻凑轂我皇前巡命興功築趨則子來任以衆役叶曽不五稔金湯在目抱隰縈原被山帶谷萬雉斯飛層譙斯矗閜而啟門呀而濬壑叶鑾輿來觀受天百禄四章十八句秘閣逮矣層櫨絢矣東人之文富教胥勸矣壁奎粲矣天漢爛矣東人之文化成是幸矣化成治隆叶首宇京叶矣以夀以昌以昭以鴻叶風以同叶矣欲以從叶矣是訓是行叶近天子之光矣五章十六句巨流瀰瀰溯源遼水襟帶日畿津梁地紀湯湯渾河流入英峩興京門名灌輸沃野演漾恬波松花粟末繡江活活衍祚靈長同源于闥闥門長白山潭名河之廣矣江之永叶矣滙于大瀛鴻慶遐鬯瀆靈争趨谷王陽侯禮咸秩矣徧懐柔矣六章二十句我廩既髙我庾既富叶東入含哺惟天子賜我府不竭叶我庫惟實叶東人飲氷慎爾官守叶自天降康始自京國我東屢豐我皇來省穡百僚師師不懈于位我東時叙我皇來課吏七章十六句聖有謨訓嘉言孔彰昭兹來許東壁之光帝庸作歌以雅以南叶來游來歌韶濩之音五載紀成禮三載踵成事至孝垂典常曰皇子是使大業俾無極大猷俾無斁至孝蔚篇章曰皇子是則八章十六句全遼左右車書咸輳懐徳日新造邦由舊或覲于建或迓于道叶或陪于位或從于狩媚兹一人傒于我后札薩逰藩戚畹勲胄暨樂浪陬小大稽首祝聖人富祝聖人夀周復時巡鳴鑾來又九章十八句聖駕四詣盛京恭謁祖陵禮成恭頌謹序癸夘梁敦書皇上御宇之四十八年秋八月諏吉啟鑾東莅陪京四謁三陵懿爍乎純乆凝釐典洽禮備禕矣懋哉臣嘗考周京祭畢為山陵禋祀權輿厥後上陵之曲宣勰樂府漢幸南頓朝原陵章陵唐過晉陽舊宫間修故事惟是視奩上食賜復賜酺章儀未備若夫繁祉重熙繩悠乆而益融介景惇華秩祐克申錫於無疆者史冊稀聞鴻惟聖清肇祥朱果慶演滿珠樹基震旦遂建都于瀋陽其地嶽峙海蟠俗龎物阜轢邰軼邠握春柄以光先區寓用昭四極㑹歸鴻謩盛業裕翼綿長我皇上純孝光敷羮墻申慕曩自乾隆入年十九年四十三年展謁靈原覲揚光烈之盛心洞洞屬屬著於詩篇臚於綸誥儀文粲備謨訓同符繄天下臣民咸所覩仰矣臣惟易曰天地之道恒乆而不已也得天者乆照則天者乆道化成嘉祥之致儀度之隆閲乆而以時畢集聖天子纘繩祖武式煥前猷敬天勤民宵衣旰食四十年孜孜如一日閎休偉績臣請舉其最著者猗若徳威逺被則月雪山如在户闥二萬餘里延廓版圖覃敷文徳則皇極敷言燭霄麗漢榮鏡藝苑薈萃羣言掇其琳瑯儲為四庫集今古之大成展義時巡則中嵩東岱南及江淮籌河觀海為蒼生計鞏固之安欣逢夀宇恬熙孚惠錫福蔵富於屢豐全蠲正賦者三普免漕糧者再前後給復億秭京坻不可勝計懿夫千載罕遭之昌㑹惟大聖人䔍念貽謀茂敦繼述樹丕丕基於億萬年迺復永懐締造祗舉四謁原陵之禮肅將祀事有睟其容敬奉芝檢金函尊蔵閟宫溯本崇文庋貯寳閣維時川瀆懐柔明禋祠宇霞堞雉墉告蕆功者十八所爰舉舊章沃醰㴻備行錫宴賜爵優老育士肄射蠲租宥𤯝諸政典臚歡雷動仰惟對越之誠弗懈滋恭闈澤之敷有加靡已烝哉聖人之徳無以加於孝乎斯其為乆道化成純亦不已者乎臣世受國恩屢荷簡擢官禁近貳南臺雖自媿弇鄙不文而飽見飫聞願附於堯衢之歌諺謹擬頌十二章荷呈乙覽臣誠懽誠喜拜手稽首而獻頌曰聖皇凝命乆廸前勲孝熙純嘏四展橋山敬觀弓劒締肇艱難五雲松柏靈祐永安右一章章八句於顯盛京於侐太廟塪室烟煴璿除汛埽達嚮刮楹䖍奉冊寶式薦苾芬以饗以保右二章章八句長白碗蜒三江環之松花混同滙于天地滋演崑脉垂永永基睿思孝格百神受釐右三章章八句三館儲文文思攸繹溯澗迤東維東有壁東壁之光傑閣煌煌右四章章六句神臯沃野環拱東畿析木經絡上應尾箕層譙峻堞丹碧其輝我皇四舉東巡之儀繕功告蕆星閲五移上腴福壤徳産精㣲右五章章十句崇政建中皇儀帝容六飛東狩百國率從䝉古朝鮮鞠􅛏輸忠承恩荷賜肅肅雍雍右六章章八句畇畇禹甸咸則三壤繡鱗列罫膏澤濡飬帝有恩言裕留豐穣蠲厥正供裕我四鬴旗民熙熙式歌且舞右七章章八句黄髮皤皤承豫飲和迎鑾道左宸念孔嘉賜之粟帛優養期頤敦龎之俗皡皡春熙率先惇善奔走偕來右八章章十句瑶精珠彩地毓其珍紅芽普盤侯爼侯薪菁莪一育文教茂興多士摘藻言物行恒僉拜恩命譽髦額増右九章章十句思樂伊教荇藻馨只淑問克允惟愚矜只鳥報春還三宥澤渥仁徳好生和調王燭右十章章八句七萃雲屯環衛列營龍興勁旅世效干城雕弓既彀羽族如樹角藝選能叠雙連注精鏐雪敷拜叨異數右十一章章十句古稀天子行健日强兮紹聞衣徳佑啟靈長兮皇穹昭假景運俾昌兮禮成百福福祉瀼瀼兮右十二章章八句欽定盛京通志卷一百十八
