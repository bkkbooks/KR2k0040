  text: 欽定四庫全書欽定盛京通志卷二十五
  hash: sha256:1bb4e0a1105a3dfc19921978a319277de073c291e752b308752f1a22216e57cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0040_WYG_029-1a, image: WYG0501/WYG0501-0406a.png}
body:
  text: 山川一奉天府各屬興京承德縣遼陽州海城縣盖平縣開原縣鐵嶺縣復州寧海縣岫巖城鳯凰城欽定四庫全書欽定盛京通志卷二十五山川臣等謹案古者帝王建國必有名山大川以為之望淮南記六水遼居其一周官十有二州山鎮東北曰醫巫閭金史稱白山黒水神皋奥壤實我國家所以發祥受命者也臣等恭考山川疆域序列前後其間如松杏諸山太子河懿路蒲河皆我太祖太宗締造經營爕伐用張之地謹稽實録詳注事蹟於篇並附古山川考於後志山川第十一欽定四庫全書欽定盛京通志卷二十五山川一奉天府各屬興京啟運山城西北十里永陵在焉自長白山西麓一幹綿亘層折至此重巒環拱衆水朝宗萬世鴻基實肇于此乾隆八年十九年四十三年四十八年俱有永御製謁十九年有陵詩又啟御製恭瞻均恭載運山作歌天章門薩爾滸山國語薩爾滸木橱也城西一百二十里明神宗十一年我太祖大破明師于此注乾隆四十八年敬鎸戰蹟謹詳薩爾滸城御製薩爾滸書事勒石山上東舍利山國語舍利泉也城西一百七十里舎利河發源于此又四里為西舍利山煙筒山城西南五里哈爾薩山國語哈爾薩密鼠也城西南二十一里哈爾薩河發源于此東為哈爾薩臺接十頂山又南曰葦子谷村石煙筒山城西南七十一里車山城西南八十里札庫穆河布爾哈圖河發源于此髙麗城山城西南一百二十五里青龍洞山城西南一百三十里鳩鳴臺山城四南二百里哈穆嘉山國語哈穆嘉黄蒿也又芩也城西南二百五里嘉拉庫山國語嘉拉庫隔斷板也城西北三十里嘉拉庫河發源于此原作甲里庫今譯改雅爾哈山國語雅爾哈豹也城西北五十里代岷山國語代岷鵰也城西北五十三里原作逹敏今譯改札喀山國語扎喀邊也城西北六十里烏林山國語烏林財帛也城西北七十五里大黑山城西北八十里阿爾丹山䝉古語阿爾丹有花紋也城西北九十里幽葫蘆東山城西北九十里尖頂山城西北九十里灘舟山城西北九十五里八王溝山城西北一百里阿濟格尼雅勒瑪山國語阿濟格小也尼雅勒瑪人也城西北一百里安巴尼雅勒瑪山國語安巴大也城西一百里原作諳巴今譯改蓮花山城西北一百里相近一峯名來鹿山安巴尼雅勒瑪西山國語解見本卷前城西北一百十里幽葫蘆山城西北一百二十里鐵背山城西北一百二十里其西為界藩山上有界藩二城迤南為吉林崖我太祖髙皇帝乙酉年擊敗哲陳渾河諸部兵于此又天命四年以兵五百人破明四路兵數十萬衆殱杜戰蹟謹詳松于鐵背山即此于薩爾滸城注下山之北即古杬家路有髙麗營營盤莊虎頭山城西北一百二十里音和羅山國語音獸徑和羅谷也城西北一百二十里其東有音和羅東山舒勒山城西北一百四十里北有幹穆瑚村西接蓮花套哈勒罕嶺國語哈勒罕犁也城西一百十三里原作哈爾漢今譯改挫草嶺城北二十五里飛牛嶺城北五十里托和倫嶺國語托和倫鍚也城西南五十六里托和倫河索爾和河發源于此望藍嶺城西南一百十五里西襄河發源于此兩嶺城西南一百三十里八盤嶺城西南一百九十八里赫圖河發源于此瑪呼嶺國語瑪呼鬼臉也城西南一百八十里清河瑪哈丹河發源于此頼花嶺城西北六十里十八道嶺城西北一百三十里峰巒起伏綿亘有十八層故名理嘉峯城西北四里亦稱李家哈達土人訛為里吉雅哈達今譯改哈達國語解見京城卷費延勒庫峯國語費延勒庫無保也城西南一百九十五里舊稱飛野勒庫哈達今譯改櫃子峯城西北五十里其南曰太爾岡我太祖髙皇帝乙酉年擊敗渾河步兵于此瑪庫峯城西北七十里希卜蘇峯國語希卜蘇峯蜜也城西北九十里呼勒峯國語呼勒斛也城西北九十里勒富峯勒富國語解見疆域形勝卷城西北一百十里堂子岡城西一百十七里岡之西為覺羅察阿拉呼蘭哈達羅里小羅里都喀岡固禄山國語阿拉岡也羅里樹枝下垂也都喀門也固禄樸質也呼蘭哈達解見京城卷望城岡城西南一百七十五里托克托谷國語托克托定也城西北八十里原作通同谷今譯改烏勒間谷國語烏勒間豬也城西北八十里原作烏爾吉延今譯改曹子峪城西南一百七十七里曹子河發源于此板長峪城西南一百九十五里松樹䃳子城西南三十六里岡臺溝城北一里小張七溝城西北九十里圖克善坡國語圖克善牛犢也城西一百十里亦稱圖克善梅佛赫國語梅佛赫坡也德勒石城西一百五十里亦稱德勒沃赫䝉古語沃赫石也扎庫穆河城西一百十三里源出車山入赫圖河布爾噶圖河䝉古語布爾噶圖有叢栁處也城西一百二十里源出車山西北流入渾河赫圖河國語赫圖横也城西一百五十里源出八盤嶺西北流入渾河亦作温都河薩爾滸河薩爾滸國語解見本卷前城西一百二十餘里西接舎哩衛曹子峪河城西一百七十里源出曹于峪入赫圖河舍利河舍利國語解見本卷前城西一百七十里源出舎利山入赫圖河流入渾河嘉哈河嘉哈國語詳見京城卷城南十六里源出分水嶺入邉門西流入蘇子河蘇子河城北半里源出呼倫嶺國語名蘇克素䕶河流經尼瑪蘭及與章京瑪嘉哈當阿拉啟運山之發等諸河㑹即為蘇子河逸索勒和等河北折南西注受哈爾薩河理嘉河經黒門穆竒水手堡又北經界藩西南入渾河河之南曰訥圖村拉門莊又南曰棟興阿李家地大屯理嘉河城東南三里源出邉外分水嶺入邉㑹蘇子河錦密森河國語錦靛花也密森大甕也城東十五里源出分水嶺西入蘇子河索勒和河國語索勒和朝鮮也城西南三里源出托和羅嶺入蘇子河哈爾薩河哈爾薩國語解見本卷前城西南十一里源出哈爾薩山入索勒和河托和倫河托和倫國語解見本卷前城西南五十八里源出托和倫嶺入太子河西襄河城西南八十六里源出望藍嶺入托和倫河費葉稜烏河國語費藥稜烏樹雞也城西南一百里源出邊外三股泉山入太子河小峽河城西南一百二十里源出分水嶺入太子河青龍洞河又名水洞城西南一百四十里源出青龍洞山俗名哈達洞河西南流入太子河清河城西南一百四十五里源出瑪呼嶺入太子河我太祖癸巳年破葉赫哈達等九部兵於此什按清河之南支流曰石河又南曰哈瑪河鹻厰河城西南一百五十里源出分水嶺入太子河瑪哈丹河瑪哈丹䝉古語解見疆域形勝卷城西南一百九十里源出瑪呼嶺入小峽河金口峪河城西南一百九十里源出金口峪入瑪哈丹河由小峽河流入渾河哈當阿河國語哈當阿有山峰也城東北二十五里源出吉林納嚕窩集西入遼河㑹蘇子河瑪嘉河城東北三十里源出納嚕窩集西入興京邊㑹蘇子河章京河國語章京司員也城東北三十五里源出納嚕窩集入蘇子河亦作阿津又西為夾河窩集尼瑪蘭河國語尼瑪蘭桑樹也城東北三十五里源出納嚕窩集西流入蘇子河納嚕河城東北八十五里源出納嚕窩集流入安巴尼雅勒瑪山即為渾河嘉拉庫河嘉拉庫國語解見本卷前城西北五里源出嘉拉庫山流入蘇子河拉發河城西北十里源出嘉拉庫山挫草嶺流入蘇子河承徳縣天柱山城東二十里福陵在焉近則渾河環於前輝山興隆嶺峙於從逺則發源長白俯臨滄海洵王氣所鍾也順治十六年天柱從祀封山曰方澤隆業山城西北十里昭陵在焉自城東北疊巘層巒至此而寛平宏敞有包羅萬象統御八荒之勢遼水右迴渾河左遶輪囷隆業與蔥鬰永固丕基順治十六年封山曰啟運山同從祀天柱山方澤銅喇叭臺山城東八十里相近有棋盤山西為噶布拉村李雲屯烏勒閣村村之北有扎穆峪二泉屯汪明屯間國語噶布拉饞也扎穆茨蘼花也烏勒國語解見前注鐃鈸山城東八十五里鶯落山城東九十里嘉班山城東一百十里東即嘉班城扎克丹山國語扎克丹栢樹也城東一百十五里德庫山城東一百二十里四臺山城東一百二十里斡爾達山城東一百二十二里前山城山城東一百二十三里長山城西一百里二臺子山城北十里團山城東南十五里麥子山城東南二十五里黄山城東南三十里孤頭山城東南三十五里古塔山城東南四十里山上有城週圍二里半東南一門塔一座架板山城東南四十六里小尖山城東南五十里雙臺子山城東南五十二里東山口山城東南五十三里紅寶石山城東南五十五里岡大山城東南六十里煙籠山城東南六十里歪頭山城東南六十里上有城週圍一百九十五步東南一門上有鬬帝廟舊址香爐山城東南六十五里蒲河發源於此簸箕山城東南六十五里馬兒山城東南六十五里髙素屯山城東南六十五里高素屯河發源於此相近有黑背山塔兒峪三塊石山城東南六十七里䃳子寺山城東南七十二里望女兒山城東南七十三里前山臺山城東南七十七里嚮山城東南八十里金牛兒山城東南八十一里老虎臺山城東南八十八里駱駝山城東南九十四里大寧臺山城東南一百十里有泉流出為大寜臺河康寧臺山城東南一百十二里大𤓰寨山城東南一百三十里閻王山城東南一百三十二里山城寨山城東南一百六十里輝山城東北四十里層巒叠嶂為諸山之冠山出白土河以代灰俗亦名灰山水田山城東北五十里馬官橋河發源於此石碑山城東北八十里塔灣山城西北十五里相近有珠兒山十方寺山城西北九十里八角嶺城東八十里寒塔嶺城北六十里盤頭嶺城東南五十五里龍鬚嶺城東南七十里小孩兒嶺城東南八十里拉古峪河發源於此漢兒嶺城東南九十里王千户嶺城東南九十二里沙河發源於此偏嶺城東南一百三十里大髙臺嶺城東南一百三十五里伊爾登河發源於此小高臺嶺城東南一百四十里偏古道嶺城東南一百四十里花嶺城東南一百五十里林莊河發源於此興隆嶺城東北三十里在天柱山後蘭家峪城東南六十里老堂峪城東南六十五里北塔舖河發源於此郝家峪城東南一百四十里小峽河發源於此金口峪城東南一百四十里馬官橋河城東十五里源出水田山流入渾河撫順河城東八十里南曰撫順河口臺其西支流曰二道河北為二道房身東為徳固村又東南為阿津屯也䝉古語徳固弟遼河城西一百里國語曰老哈即古句驪河也一作枸柳河謂是枸河栁河合流之處今名巨流河國語曰珠爾呼珠源岀邊外有二其一自西北來者逺不可考其一自東來者亦出長白山西北諸窩集中為克爾素等河合而北流出邊西北繞鄧子村又西南折與自西北來之一河合而為一遂西南流自開原縣明安貝勒屯東十里入邊流經鐵嶺縣城北清河自東來㑹入雙峽口西南分為二曰内邊河外遼河遶縣之西南合而為一至開原城為巨流又分流復南滙經海城縣之西與太子河㑹謂之三㲼河入海此河左右即遼東遼西所由分又遼河橋遇而泥淖難行康熙五十八年雍正六年叠次興修遂成坦途乾隆八年有御製渡句驪河渡遼水詩十九年有年有御製過句驪河詩四十三年四十八御製渡句驪詩俱恭載月奉天章門又四十三年八㫖於瀕河高阜處所專建河神廟並御製碑文以記落成年月事蹟謹稽實録崇德三年五月十一日太宗命修盛京城至遼河大岸寛十丈髙三尺兩旁掘濠五里河城南五里西為永安橋東曰萬泉河科音佛渾河城南十里一名小遼水國語曰瑚努和明一統志渾河源出塞外西南流至瀋陽衛合沙河又西南流至都司城西北入太子河今按渾河源出長白長納嚕窩集名曰納嚕河西流入興京英莪邊門㑹噶桑阿河為渾河又西南經又有界内有碩賓