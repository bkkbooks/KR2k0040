body:
  text: 職官四錦州府知府以下各員厯任姓氏錦縣屬各員厯任姓氏寧逺州屬各員厯任姓氏廣寧縣屬各員厯任姓氏義州屬各員厯任姓氏吉林吉林屬各員厯任姓氏欽定四庫全書欽定盛京通志卷四十二職官四錦州府順治四年置佐領駐錦州劉成義領之十五年子文亮襲職康熙三年設州縣知府宋之鉉浙江奉化人拔貢康熙四年任劉源溥直𨽻清苑人舉人康熙十四年任孫成順天大興人舉人康熙十九年任陶琨浙江會稽人康熙二十七年任金世揚漢軍正黃旗人廕生康熙三十七年任顧大位漢軍正白旗人官生康熙四十年任唐之夔順天密雲人嵗貢康熙五十年任馬鍾華山西介休人嵗貢康熙五十八年任李大受福建福清人嵗貢康熙五十九年任王以觀漢軍正白旗人嵗貢雍正二年任潘尚仁浙江烏程人雍正四年任高紱漢軍正黃旗人雍正五年任色超滿洲正黃旗人雍正六年任傅賚滿洲鑲白旗人副榜雍正十一年任張景蒼漢軍鑲藍旗人乾隆三年任金文淳浙江錢塘人進士乾隆八年任富起滿洲鑲藍旗人舉人乾隆十三年任富察善滿洲鑲黃旗人乾隆二十四年任阿敏滿洲正藍旗人舉人乾隆三十二年任永敏蒙古鑲黃旗人舉人乾隆三十六年任兆坊滿洲正藍旗人乾隆三十八年任阿敏滿洲正藍旗人乾隆四十一年再任兆坊滿洲正藍旗人乾隆四十三年再任富森布滿洲鑲黃旗人乾隆四十九年任附通判雍正十一年裁乾隆二年復設二十八年復裁宣紹中河南息縣人副榜康熙三年任張顯斌浙江鄞縣人康熙六年任黃荃福建同安人康熙九年任喬嵩裔河南登封人拔貢康熙十二年任朱夢熊直𨽻薊州人康熙十九年任金一燧浙江諸暨人康熙三十二年任侯居簡漢軍正白旗人康熙三十二年任龔眉望江南武進人康熙三十八年任劉汝貞漢軍鑲黃旗人康熙五十年任祖應時漢軍正黃旗人康熙五十年任梁索柱包衣正黃旗人康熙六十一年任以毛瀚漢軍正黃旗人雍正二年任後移駐義州圖善滿洲正白旗人乾隆二年任福長滿洲正黃旗人乾隆三年任德爾得滿洲鑲白旗人人隆十二年任賦泰滿洲正藍旗人乾隆二十年任佛全滿洲正黃旗人乾隆二十六年任二十八年移駐興京教授張珵直𨽻順天薊州人嵗貢康熙四年任李元發順天大興人舉人康熙十一年任張蕣直𨽻南和人舉人康熙二十一年任張友黃順天大興人舉人康熙三十二年任蔣玠人順天大興人嵗貢康熙四十六年任何來似直𨽻雄縣人舉人康熙四十九年任閻九疇直𨽻南樂人進士康熙五十五年任黃之裳直𨽻元城人舉人康熙五十八年任戴允恭順天大興人進士康熙六十年任蔡焞直𨽻保定人進士乾隆四年任馮禾直𨽻滄州人舉人乾隆十九年任楊聆直𨽻靈夀人拔貢乾隆二十六年任張聫芳直𨽻安州人進士乾隆三十一年任趙瓖順天通州人進士乾隆三十六年任魏泰直𨽻天津人舉人乾隆四十五年任魏廷臯直𨽻柏鄉人進士乾隆四十八年任經歷陶美浙江會稽人康熙三年任陳鼎新浙江山隂人康熙七年任王繼茂順天大興人康熙十一年任侯懋功山西河曲人康熙十七年任繆廷鼐浙江山隂人康熙二十一年任趙昌柱順天宛平人康熙四十四年任董燦順天大興人康熙五十三年任陸士雲湖廣天門人舉人雍正元年任李嶪湖廣黃岡人舉人乾隆二年任梁祖益山西曲沃人乾隆四年任趙爾銘直𨽻景州人乾隆十年任潘琮湖北江夏人乾隆二十一年任姚泰廣東平逺人乾乾三十二年任章維垣順天宛平人乾隆四十一年任錦縣知縣孔允檜山東曲阜人舉人康熙元年任劉文亮奉天遼陽人廕生康熙三年任陳遇辰浙江海鹽人副榜康熙五年任郭茂泰陜西涇陽人進士康熙六年任蔡啓新順天大興人康熙九年任王奕曽奉天遼陽人康熙十七年任劉惠宗陜西渭南人舉人康熙二十一年任彭長齡福建南平人舉人康熙二十三年任李得泌江南旴𣅿人嵗貢康熙二十九年任卜鼎浙江嘉善人嵗貢康熙三十三年任李拱乾奉天人監生康熙三十五年任裘奏江西寧州人拔貢康熙三十八年任冷又煦湖廣黃陂人舉人康熙四十八年任周廷槐福建武平人進士康熙五十二年任婁起鎬浙江會稽人康熙五十九年任王孟承江南長洲人嵗貢雍正三年任呂曰宫陜西咸寧人雍正四年任彭迪忱湖廣漢陽人舉人雍正四年任王謨山西陽曲人舉人雍正五年任崇倫永江南池州人貢生乾隆元年任顔紹怡順天大興人舉人乾隆二年任榮大成湖廣零陵人貢生乾隆三年任高清彥湖北黃梅人例監乾隆六年任蔡長濋福建漳浦人貢生乾隆七年任黃開泰福建閩縣人例監乾隆十年任富昌滿洲正藍旗人舉人乾隆十一年任徐寅順天大興人舉人乾隆十八年任巴德滿洲鑲白旗人舉人乾隆十九年任班第滿洲正白旗人乾隆二十八年任瑺貴蒙古鑲白旗人進士乾隆三十年任明秀滿洲正白旗人舉人乾隆三十二年任那淳滿洲鑲紅旗人進士乾隆三十三年任穆和藺滿洲正黃旗人舉人乾隆三十四年任圖爾炳阿滿洲正黃旗人舉人乾隆三十七年任覺羅阿精阿滿洲正藍旗人乾隆三十八年任明德滿洲鑲紅旗人舉人乾隆四十一年任雅爾善蒙古鑲黃旗人舉人乾隆四十二年任永錫滿洲正黃旗人舉人乾隆四十三年任李廷揚直𨽻新城人舉人乾隆四十八年任附教諭己裁龔爾美順天宛平人舉人康熙二十三年任霍儀世直𨽻清苑人舉人康熙二十六年任劉引孫直𨽻滄州人舉人康熙三十一年任嚴鵠承德人舉人康熙三十七年任王顓直𨽻趙州人解元康熙四十三年任馬咸厚直𨽻東光人舉人康熙五十三年任時雨直𨽻贊皇人舉人康熙五十八年任鐵如金順天大興人舉人乾隆二年任伍錦順天通