body:
  text: 國朝人物十一鑲藍旗滿洲欽定四庫全書欽定盛京通志卷七十五國朝人物十一鑲藍旗滿洲安費揚古姓覺爾察𨽻鑲藍旗滿洲世居瑚濟寨父完布祿以朴忠事我太祖安費揚古克繼父志自弱冠從征癸未年以兵取薩爾滸城殱其衆甲申年從征兆嘉城瑪爾墩寨皆親冒矢石為軍鋒丁亥年征討哲陳部攻拔洞城尋攻杭嘉章嘉尼瑪蘭赫徹穆等城及香潭寨並在事有功癸巳年從略哈達富勒嘉齊寨師旋太祖躬勒兵以殿有敵騎躡我後太祖還射之殪其前一騎後數騎乘間來犯安費揚古盡斬之復同額亦都等圍訥殷部佛多和山寨攻下之己亥年從攻哈達城先登辛亥年從征東海窩集部破其二路從征烏拉擊達拉穆台吉兵摧其陳奮勇登城樹大纛于上大軍繼至遂滅烏拉天命元年七月偕扈爾漢征薩哈連部至烏勒間河取河南北諸寨八月師次黑龍江江水常以九月始氷是時中流忽結氷若浮梁約廣六十步安費揚古曰此天佑我國也䇿騎先涉衆從之遂取江北十一寨三年從大軍下撫順明總兵張承廕等赴援分營為三安費揚古擊其左營大破之遂乘勝取三岔口諸堡四年從破明經略楊鎬兵滅葉赫六年隨取瀋陽遼陽皆著績安費揚古性貞亮有勇略與額亦都等俱為開國功臣之首太祖嘉其鷙勇擢一等大臣佐理國事賜號碩翁科羅巴圖魯七年卒年六十有四子阿達爾岱見忠節傳達爾岱初授雲騎尉嗣因追叙安費揚古功晉職一等輕車都尉順治十六年追諡敏壯康熙五十二年聖祖念安費揚古為開國勳臣復賜三等輕車都尉世職令其裔孫明岱分襲舒賽姓薩克達𨽻鑲藍旗滿洲生而勇敢天命四年從大軍敗明總兵馬林等於尚間崖尋隨征哈達又征瓦爾喀什皆有功每攻城太祖愛其勇戒勿先登舒賽益奮勉輒衣綿甲奮身直前先後攻克十六城加二等輕車都尉世職晉爵至三等男太宗即位擢置十六大臣之列天聰元年從征朝鮮凱旋率師駐防義州八年從貝勒濟爾哈朗留守盛京崇德六年以疾卒順治十二年追諡壯敏立碑墓道子西蘭隨入關追討流賊李自成由陜州克潼關三戰皆捷又從征江南福建皆有功孫錫特庫從征明前屯衛及敗李自成於延安追𠞰至安陸並著有戰功武巴海姓瓜爾佳𨽻鑲藍旗滿洲世居烏拉天命初從征尼堪外蘭有功授佐領天聰元年從征朝鮮以二次登城功受賞從征錦州明兵來犯武巴海殿後力戰敵騎遁走五年同䝉阿圖征瓦爾喀降其部衆凱旋太宗郊迎宴勞六年征察哈爾及明旅順口皆破敵紀功復將兵征烏扎喇俘獲甚多七年往征瑚爾哈部及瓦爾喀部皆降其屯部奏膚功九年從貝勒嶽託駐歸化城追獲䝉古逃人崇德元年喀穆尼罕部葉雷等叛去武巴海率兵追之數十日無所見遇宿雁三射其一鴈負矢而飛墮往取之見賊營遺火躡其蹤追及之葉雷遁入山武巴海發矢射之葉雷將注矢有狐起於前觸葉雷弓弓墜遂殪葉雷并誅其黨太宗嘉其功超晉三等子賜衣服僕馬莊田四年卒喀三姓納喇𨽻鑲藍旗滿洲先世居葉赫蘇完天命四年來歸太祖察其才官以佐領六年從取瀋陽遼陽以功授三等輕車都尉世職九年明總兵毛文龍遣兵來犯額駙康果禮與喀三率所部往援斬守備二殱其衆天聰六年從征察哈爾偕前鋒統領勞薩先驅林丹汗驚遁八年晉爵三等男以目疾請解職乃以其子納海代為佐領順治二年世祖念喀三舊勞晉爵一等男三遇恩詔晉二等子十二年卒賜祭葬立碑墓道諡曰敏壯納海既任佐領旋授前鋒參領從征大同與同官錫特庫等敗明兵於陽和斬級二百獲馬六十餘還軍宣府設伏擒其逰騎天聰九年大軍復征大同偵軍事於上都城與參領鄂謨克圖等齎書至明境諭喜峯口迤西諸邉將及還遇其哨卒俘斬百餘人崇德二年與錫特庫至廣寧擒錦州哨卒十二斬其九俘其一縱二人還俾齎書諭明總兵祖大夀四年從攻松山城祖大夀遣兵赴援自寧逺乘舟趨杏山將入城納海自後薄斬五十人獲甲四十及舟一尋略杏山錦州獲牲畜無算五年大軍圍錦州納海擊斬其築臺者四十人刈草者四十二人敗其騎兵三百狥小凌河斬大夀所遣䝉古十七人自錦州至者六年明總督洪承疇集援兵於松山太宗親統師圍之承疇分兵犯前鋒汛納海擊郤之既而明兵自杏山走塔山納海率衆邀擊追至筆架山斬級四百搴纛六生擒二十八人獲馬二百餘七年錦州下叙功豫雲騎尉世職是年冬署前鋒統領從貝勒阿巴泰入黃崖口趨薊州擊敗明將白騰蛟白廣恩兵遂下山東順治中三遇恩詔晉世職至三等輕車都尉及喀三卒應襲二等子併襲為二等伯十七年卒弟納沁襲沙爾瑚達姓瓜爾佳𨽻鑲藍旗滿洲世居瑚爾哈太祖時從其父桂勒赫來歸天命十年從征瓦爾喀部以功授騎都尉世職天聰元年從攻錦州纍戰皆捷三年大軍征明入紅山口拔遵化州抵北京沙爾瑚達敗其郛外兵嗣數率遊騎入明邉往來錦州松山杏山之間俘獲甚多大凌河之捷也明總兵祖大夀降請歸錦州為內應既而背其言八年我太宗遣大臣略地至錦州且遺書大夀恐不能達召沙爾瑚達授以方略令襲取守烽堠卒付之敕書如無所獲即懸於十三站山坡沙爾瑚達輕騎往未遇敵懸書而歸九年征黑龍江部及赴錦州偵軍事還皆獻俘獲崇德元年從征朝鮮敗敵於南漢山城三年以兵護我往土默特貿易之衆於歸化城敗明兵於紅山口四年率前鋒兵趨義州入寧逺北界設伏誘敵擒其樵採者以歸七年討瑚爾哈部招降喀爾喀木等十屯俘獲無算奏捷受上賞順治元年征庫爾喀部及黑龍江多斬馘復追擊流賊李自成於潼關二年隨攻取江寧杭州所在力戰論功晉一等輕車都尉駐守東昌𠞰平土賊五年討叛鎮金聲桓有功六年𠞰平河間流寇加世職三等男纍遇恩詔加至一等男七年駐防寧古塔十五年擊敗俄羅斯兵俘其渠卒十六年卒於鎮追贈太子太保諡襄壯立碑如例子巴海襲固三泰姓納喇葉赫部長錦台什之族人也太祖時來歸𨽻滿洲鑲藍旗任佐領尚公主為固倫額駙從大軍攻廣寧單騎先陷陳身被數創戰愈力太宗御極擢都統天聰元年從征朝鮮三年從克遵化明年取永平灤州並有功五年以不能鈐束士卒罷都統任専管佐領事順治元年卒子明阿圖以佐領從入山海關殿一軍纍官副都統加世職至三等輕車都尉八年卒瑚什布亦錦台什之族人也太祖時來歸𨽻滿洲鑲藍旗初為佐領尋任侍衛兼參領天聰二年從征通古索爾和部身中七創戰益力斬其將一叙功授騎都尉世職八年略大同擊敗明將祖大弼軍進攻萬全左衛復敗明將曹文詔軍九年擢都統崇德元年從征明越燕京攻克大興旋師出邉亡部卒十人部議奪世職罷都統任復為佐領如故三年授理藩院副理事官順治四年復騎都尉世職三遇恩詔晉世職至二等輕車都尉卒藍拜姓佟佳𨽻鑲藍旗滿洲由佐領任護軍參領天聰八年略錦州多俘獲崇德四年隨征索倫部設伏敗其衆拔雅克薩城六年復從圍錦州戰松山有功任兵部參政又破洪承疇三營兵調禮部參政順治元年入關擊破流賊叙功加世職三等輕車都尉三年從征湖南克嶽州進兵長沙復桂陽進拔沅州屢著戰功擢都統晉世職二等八年以都統兼工部尚書轉刑部九年征廣東未定州縣晉二等男十年鎮守湖南賊黨孫可望等不敢犯十三年加太子太保致仕康熙四年卒錫特庫姓佟佳𨽻鑲藍旗滿洲父努延事太祖為佐領及卒以錫特庫代之天聰中擢前鋒參領馳援耀州郤明兵㑹明總兵祖大夀修築大凌河城大軍往攻之明兵出挑戰錫特庫以所部兵進擊至城濠舍騎而戰甚力尋擊寧逺援兵戰方酣一卒墜馬錫特庫掖之出前後屢偵軍事略地至錫爾哈錫伯圖地多斬獲是時濟農為明兵導往詗之錫拉穆倫河以二十人殱濟農百人從大貝勒代善略大同自陽和轉戰天城衛北趨左衛城設伏赤城宣府為大軍援以功加三等輕車都尉從貝勒多爾衮入平魯衛斬其偵卒與參領布延覘敵錦州又與前鋒統領勞薩躡明兵於冷口皆有功崇德三年從貝勒嶽託進軍墻子嶺密雲兵突摶戰擊敗之獲巨炮二十餘復敗明總督吳阿衡兵攻真定追逐明兵至㑹通河三戰三捷四年偕前鋒參領沙爾瑚達略錦州界六年從鄭親王濟爾哈朗圍錦州明兵自杏山馳救乃設伏隘口而督前鋒兵誘戰佯北以致明兵大敗之戰松山破其二軍明總督洪承疇遁入城躡擊至濠而返復圍錦州承疇以軍十三萬赴援偕前鋒八參領迎戰明總兵王朴等敗走塔山又走杏山錫特庫縱橫馳擊窮追至筆架山斬四百餘級獲馬二百四十餘大纛六七年克松山城率前鋒兵駐塔山擊敗寧逺兵從貝勒阿巴泰入長城復擊敗寧逺援兵以功晉二等輕車都尉旋合左右翼兵自界嶺口毁邉墻入明薊州總兵白騰蛟率步馳赴桃林關聞我師將攻薊州急還軍合馬蘭峪總兵白廣恩拒戰錫特庫麾衆奮擊陳擒參將一斬逰擊三獲馬六百餘尋授前鋒統領順治元年從入關破賊將唐通于一片石未幾奉命往助都統葉臣軍平定山西抵絳州渡河沉賊船連敗賊於汾州平陽降賊康元勳於西山寨二年移兵逐李自成至湖廣之安陸斬四百餘級獲其戰艦以功晉一等輕車都尉三年騰吉思叛歸喀爾喀從豫親王多鐸往追之至圖拉河西土謝圖汗碩雷汗以所部邀戰擊敗之逐北數十里斬獲無算以功加一雲騎尉屢晉爵至一等男康熙五年卒年七十賜祭葬子塞爾固德襲巴都哩姓沁佳𨽻鑲藍旗滿洲少從征伐屢有功以佐領兼任參領天聰八年大軍征察哈爾巴都哩為導招降宰桑四人移軍略大同下其旁近城堡以歸尋擢護軍統領崇德元年從征朝鮮别將兵圍南漢山城屢戰皆捷卒下之三年從睿親王多爾衮征明自密雲東北毁邉墻入越燕京趨山東克濟南府明年春旋軍出青山口明將以兵襲我後巴都哩戰郤之六年授兵部參政尋兼副都統八年偕副都統鄂羅塞臣征黑龍江招降圖呼爾禪等城順治元年五月師旋世祖遣侍郎明安達哩迎勞之叙功授雲騎尉世職十一月擢都統未幾卒無子以從弟杭嘉襲根特姓瓜爾佳世居尼瑪察父尼努太祖時率衆來歸官以佐領𨽻鑲藍旗滿洲天聰中授騎都尉世職從征瑚爾哈有功加一雲騎尉師旋卒於軍根特襲職尋任刑部理事官順治元年以署前鋒參領從入關討流賊李自成敗賊將唐通於一片石追𠞰自成至望都復偕前鋒參領阿爾布尼平馬塍口土賊二年叙功晉世職三等輕車都尉四年授協領駐防西安王光泰叛於鄖陽侍郎喀喀穆率禁旅征之根特以西安駐防兵㑹𠞰破賊黨甄以鍾於房縣還兵敗賊方國成於谷口六年總兵姜瓖據大同叛其黨虞允白璋張萬全等陷平陽蒲州及臨晉猗氏河津諸邑根特從總督孟喬芳渡河𠞰賊復蒲州臨津河津進兵平陽白璋以步騎六千迎戰榮河大破之斬二千餘級逐賊至黃河乘其將濟薄之溺水死者無算遂斬白璋殱其潰衆於孫吉鎮移師趨猗氏僞監軍衛登芳依山結寨與萬全為掎角根特分兵擊斬萬全移兵轉戰生擒登芳陳斬僞將王國興等三十人復𠞰賊聞喜僞都督郭中傑於候馬驛追奔三十里斬獲無算還駐西安九年還京授參領三遇恩詔晉世職一等輕車都尉兼一雲騎尉十年僞秦王孫可望與其黨馮雙禮白文選馬進忠等踞武岡寶慶從貝勒屯齊征之自永州趨寶慶賊衆十餘萬扼險而陳我軍進戰方酣根特以驍騎橫擊之賊大敗再敗之武岡賊皆潰去十一年海賊鄭成功遣其黨阮思陳六御陷舟山從大將軍伊勒德𠞰敗之衡水洋斬思六御復舟山十二年晉爵三等男十四年再晉一等十五年擢副都統康熙十六年進都統列議政大臣二十三年以老病致仕三十二年卒賜祭葬諡襄壯子格圖肯襲達爾岱安費揚古第六子也天聰五年從征明大凌河守臧家堡臺遇敵兵擊敗之崇德元年太宗親征朝鮮我䝉古兵往納馬山牧馬敵兵橫截來戰奮擊敗之尋率兵步進破其二營三年隨征明至燕京擊敵有功六年我師圍錦州有松山兵來犯擊却之敵復冒雨來侵我汛地力戰敗其軍嗣錦州城中兵復突出奮勇接戰并敗其採樵步兵八年敗明兵於寧逺積功並襲世職至一等輕車都尉第七弟敦兑于順治初入關破賊屢著戰功都爾德安費揚古之孫也父阿爾岱以功授騎都尉世職天聰五年從征大凌河殁於陳恤贈三等輕車都尉見忠節傳都爾德襲職順治元年任刑部理事官從定燕京豫親王多鐸西征流賊李自成都爾德署護軍統領以從進兵陜州攻拔其山巔營設伏潼關屢戰皆捷斬賊無算明年大破賊將劉方亮遂定西安尋從大軍下江南破明兵於揚州城北獲戰艦百餘既克南京明福王朱由嵩奔蕪湖截擊之江口其將田雄等縳由嵩以降三年從端重親王博洛平浙江進征福建與前鋒參領拜音岱狥建寧延平二府皆下之明唐王朱聿鍵走汀州偕護軍統領阿濟格尼堪攻其城擒聿鍵俘其官屬遂定汀州時明桂王朱由榔竊據湖南分置僞將為十三鎮五年九月鄭親王濟爾哈朗統師討之都爾德以所部從屢戰皆捷六年大軍既下沅州僞將王強復引兵來犯偕尚書阿哈尼堪擊破之斬僞副將三人殱其衆獲馬數千七年凱旋授護軍統領八年擢為議政大臣先後叙功並兩遇恩詔晉爵至一等男康熙三年卒賜祭葬諡忠襄子錫布襲遜塔亦安費揚古之孫也崇德中為戶部副理事官貝勒嶽託帥右翼兵征明遜塔以署參領從道由墻子嶺擊敗明總督吳阿衡遂越燕京略山東師還將出青山口敵躡我後戰郤之敵侵我喀喇沁營移兵赴援敵潰走六年明總督洪承疇集兵援錦州列營松山遜塔連破其三營承疇兵冒雨犯我右翼營復戰郤之順治元年以參領從入關擊破流賊李自成三年隨肅親王豪格𠞰張獻忠於四川過漢中擊敗叛鎮賀珍進兵西充連挫賊遂殪獻忠五年凱旋兼任刑部理事官尋駐防淮安六年莒州賊曹良臣掠海州知州張懋勳州同李士麟遇害遜塔偕參領烏達齊赴援賊遁歸馬鬐山進兵搗其巢盡殱之移師殄羽山牟山餘賊尋以戶部侍郎銜理兩淮鹽政駐揚州七年改督漕運移駐淮安八年還京授副都統十三年擢工部尚書十七年應詔自陳罷尚書専任都統是時明桂王朱由榔竄緬甸其將李定國白文選等分踞孟艮木邦謀入犯永昌普洱元江乃與定西將軍愛星阿等率禁旅𠞰之明年㑹師木邦定國文選等皆遁大軍趨緬甸緬人執朱由榔來獻白文選降乃班師積功晉爵一等男兼一雲騎尉世襲罔替康熙四年卒賜祭葬諡忠襄錫納海姓瑚爾哈𨽻鑲藍旗滿洲世居新達謨父康喀賚太祖初率族來歸任佐領事太宗時為理事大臣厯官副都統錫納海初從睿親王多爾袞征察哈爾招降林丹汗子額哲以還尋選為王府護衛崇德三年從睿親王征明越燕京下山東五年從鄭親王濟爾哈朗圍錦州以勞授二等護衛㑹父卒遂代為佐領六年復從鄭親王圍錦州克其郛明總督洪承疇以兵十三萬來援錫納海偵事杏山擊敗其遊騎擒一人歸已而設伏松山北以前鋒致明兵夾擊之大捷順治元年從入關擊敗流賊李自成二十餘萬賊竄走錫納海追擊之望都多斬馘二年以功授雲騎尉世職遷二等侍衛六年從鄭親王平湖南凱旋兼任刑部郎中尋授一等侍衛兩遇恩詔晉世職至三等輕車都尉十七年擢副都統康熙二年偕靖西將軍穆里瑪征流賊郝搖旗李來亨等於鄖襄三年㑹陜西湖廣四川三省兵𠞰平之搖旗授首來亨遁走茅麓山自焚死乃還十年以病致仕十二年卒年五十有七賜祭葬以孫道福色襲巴特瑪姓博爾濟吉特𨽻鑲藍旗滿洲天命四年同族人來歸時年尚幼天聰二年以叙歸誠功始授逰擊太宗諭曰爾在䝉古地方擇地而居今雖在大貝勒屬下然朝夕侍朕左右朕必加恩賚也五年隨征明攻大凌河六年從征察哈爾國並有功崇德元年任都察院理事官纍擢䝉古都統隨太宗征朝鮮命同談泰等往攻其京城克之三年隨征明攻密雲先登叙功賚金銀駝馬五年隨征明圍錦州設伏松山大敗敵兵是夜敵兵來犯我營復擊敗之身受重傷猶力戰不懈六年擊明經略洪承疇軍在事有功並隨圍錦州七年錦州降駐防錦州八年隨征明至山東大敗明兵攻孫河棗强克之俘獲甚衆順治元年隨入關擊流賊僞總兵唐通軍敗之復追破賊於慶都縣叙功賚金銀纍加一等男世職後緣事降一等輕車都尉兼一雲騎尉博思喜巴特瑪從弟也幼隨父古英和額齊來歸及長效力行間崇德三年襲職副都統順治元年隨入關擊流賊李自成有功三年隨豫親王多鐸追騰吉思擊土謝圖汗兵力戰敗之又與碩雷汗兵遇復大破其衆四年叙功並三遇恩詔授一等男世職達爾珠𨽻鑲藍旗滿洲早嵗效力戎行崇德二年隨征明攻靈夀奮勇先登克之論功纍加三等輕車都尉世職布雅哩墨爾根𨽻鑲藍旗滿洲天命九年來歸以招撫沙布圖功授備禦天聰九年從征黑龍江俘獲甚衆叙功加授世職為佐領崇德三年卒額爾特姓伊拉哩𨽻鑲藍旗滿洲國初來歸天聰五年從征大凌河擊敵有功凡攻城輒先登太宗嘉其勇順治初三遇恩詔加三等輕車都尉十四年卒宜喇哈𨽻鑲藍旗滿洲早事戎行天聰六年隨征明至大同攻長安嶺以第二人登城順治初三遇恩詔加三等輕車都尉阿雅塔𨽻鑲藍旗滿洲天聰六年隨征明至大同攻長安嶺以第三人先登順治元年隨入關擊流賊有功二年從征湖廣流賊一隻虎五敗賊衆四年授佐領世職托敏姓穆爾禪𨽻鑲藍旗滿洲國初來歸尋從征阿庫哩尼滿有功授備禦世職天聰九年隨征瓦爾喀部俘獲甚衆是年又從征黑龍江以功加三等參領世職同旗有英格諾亦以征黑龍江功授佐領博竒姓舒舒覺羅𨽻鑲藍旗滿洲世居長白山崇德三年隨征明至山東攻濟南以第五人登克其城賜號巴圖魯四年授佐領世職六年隨圍明錦州擊敗松山兵乘其夜遁復擊敗之順治元年隨南征三敗流賊于潼關二年攻泗州有功尋攻揚州克其城追明福王朱由嵩于蕪湖敗明總兵黃得功之衆並在事有功三年從追騰吉思大破土謝圖汗等之兵七年遇恩詔加二等輕車都尉世職邁什克𨽻鑲藍旗滿洲崇德三年隨征明攻墻子嶺城奮勇先登順治初三遇恩詔加三等輕車都尉世職什圖姓舒穆嚕𨽻鑲藍旗滿洲崇德三年隨征明攻豐縣先登克之賜號巴圖魯授佐領世職順治元年隨入關擊流賊有功七年加三等輕車都尉十二年卒阿延達姓赫舍哩𨽻鑲藍旗滿洲崇德三年隨征大同攻長安城以第三人登順治元年從入關擊敗流賊二年破流冦一隻虎于湖廣尋叙功纍遇恩詔加三等輕車都尉哈爾哈濟姓瓜爾佳𨽻鑲藍旗滿洲崇德五年從征明圍錦州明兵夜犯我營大敗之順治初三遇恩詔加三等輕車都尉覺羅頁穆濟𨽻鑲藍旗滿洲景祖三世孫也初以軍功得世職尋緣事革崇德三年隨征明至山東攻靈夀先登克之四年論功加優叙成武爾岱姓佟佳𨽻鑲藍旗滿洲崇德六年從征明圍錦州敵兵據山迎戰奮擊敗之明經略洪承疇軍犯我右翼又力戰却之順治元年隨入關衝鋒先入賊陳復追賊至慶都大殪其衆二年叙功授佐領世職郎什姓馬佳𨽻鑲藍旗滿洲初以軍功授佐領世職崇德八年隨征黑龍江有俘獲又從征珊延哈達以奮勇衝陳口目被傷順治二年叙功加二等參領世職珠成額姓趙佳𨽻鑲藍旗滿洲崇德八年隨征明攻祁州奮勇先登拔之賜號巴圖魯授佐領世職順治元年隨入關擊流賊有功嗣遇恩詔加一等輕車都尉同旗有岱蘇蘭亦以崇德八年從征明至山東攻曹州拔之賜號巴圖魯授佐領順治初加一等輕車都尉恩什特𨽻鑲藍旗滿洲崇德八年從征明攻菏澤奮勇先登拔其城賜號巴圖魯授佐領世職順治元年隨入關擊流賊有功又隨征山西攻太原大敗賊衆論功嗣遇恩詔加一等輕車都尉同旗有德祿亦以崇德八年隨征明至山東攻平隂奮勇先登拔之賜號巴圖魯授佐領世職南泰姓佟佳𨽻鑲藍旗滿洲崇德八年隨征明攻定州先登因無繼者被敵所傷力戰不稍却竟克其城死而復蘇録其功順治初纍遇恩詔加三等輕車都尉世職同旗有阿爾卓於崇德八年從征明至山東攻定陶以第一人登嗣加世職騎都尉又同旗有蘇班於崇德八年隨征明至山東攻平隂以第二人登叙功順治初遇恩詔加三等輕車都尉世職欽定盛京通志卷七十五
