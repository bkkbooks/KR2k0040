body:
  text: 國朝藝文十詩六五言排律欽定四庫全書欽定盛京通志卷一百二十五國朝藝文十一詩六五言排律福陵陪祀恭紀康熙壬戌張玉書大漠龍興日邉庭虎步辰白山浮王氣黑水渡真人一旅璇圖廓千秋景運臻宅都森拱衛卜域湧嶙峋拜手瞻丹馭攀髯憶紫宸禡旗師應律籌幄動如神塞北收俄頃河東定浹旬射鴽遼海岸獵兕嫩江漘駿馬諸藩贄編珠絶島珍莠鋤張聖武嘉植仰皇仁考契文初炳耕桑詔屢申英雄來草澤廟社闢荆榛綿蕝儀追古豳風俗舊淳地寒銀磧雪人燠翠華春肇迹垂鴻永開基翼燕新衣冠藏石隧弓劍䕶霜筠殷享祠官肅成功祝史陳雙峰窺日月虚殿拱麒麟盖代規模濶敷天翊戴均痛餘趨磴下想像屬車塵昭陵陪祀恭紀康熙壬戌張玉書玉厯歸真主禎符際盛期丕承高廟烈式廓太平基仙馭追應杳神遊儼在兹山河垂睿畧日月仰天儀開國經綸宻當陽雨露滋聲華陳羽衞儉徳總茅茨獻納龍墀引圖書鳯閣披愛賢通燕笑拊卒問瘡痍訓切投醪事恩深挾纊時兩勤南漢駕頻趣北庭師水劃熊津闊山迴雁磧竒旌門羅貢賮毳幕擁降旗環島收唇齒縁邊戍虎羆雕弓臨塞勁鐵馬度遼馳指顧中原計艱難締造規令模傳寳籙遺範鏤豐碑先帝羮牆慕今皇陟降思薦馨浮酎醴展苾溢松脂芝草周垣茁春陰匝殿移五雲回望渺霑灑有餘悲封祀長白山恭紀康熙丙辰吳兆騫配極神山峻脩封帝命崇金函新建嶽玉檢此升中咸秩遵虞典昌期答漢功星軺瞻二使雲燎視三公戴斗原承北苞祗獨峙東千年今值泰萬嵗昔開嵩地接興龍近天開翥鳯雄嵯峨分氣象􅌄窱闢鴻濛五畤儀還陋三祠禮自同宗禋通肸蠁展寀契昭融圭璧陳緹帟騂駒豁錦幪日華遥合扇雲氣迥成宫列嶂􅨙瓊雪雙流亘玉虹壯哉符寳勢赫矣麗璇穹仙靄凝嚴紫髙霞鏡野紅何須傳縱雉已見永垂鴻芝术祥侔岱枌榆祀比豐紫壇三望徧絳節百祌通運喜逢文命書慙獻所忠聖皇長有道靈秩慶無窮恭和御製告祭福陵禮成元韻康熙壬戌髙士竒遥峯開碧甸疊嶂擁珠宫祀典千秋右巡行二月東迴瞻蒼靄合俯瞰曲流通地是排雲上天因列柱崇干戈今載戢玉帛舊來同式廓豳岐業長貽鎬洛功薦馨昭聖武執鬯展宸衷兩序陳宏璧諸藩撫大弓壇壝當太乙草樹邁新豐仰答開基逺勤勞有睿功恭和御製過廣寧望醫巫閭山恭依皇祖聖祖仁皇帝元韻乾隆癸亥鄂爾泰羣山皆拱北霄漢挿芙蓉羽蓋摩天降旌麾燿彩重乍披青玉案宛近紫雲峯依約巖垂瀑迢遥寺偃松仙真應望幸名蹟待登封鎮亞三公禮豳崇萬壑宗吐吞作霖雨來徃䕶飛龍侍從齊舒眼靈竒想豁胸恭和御製過廣寧望醫巫閭山恭依皇祖聖祖仁皇帝元韻癸亥張廷玉百里停金轡孤烟欽玉蓉林巒纔一靣邱壑已千重迴憶臨滄海懸知隔亂峰輕澌岩際瀑晴雪洞門松丹竈青泥熟金函碧蘚封逺迷安羡迹長配岱恒宗未得随千里遥思駐六龍雲霞瞻睿藻靈趣發心胸恭和御製過廣寧望醫巫閭山恭依皇祖聖祖仁皇帝元韻癸亥梁詩正髙標臨溟渤秀色蔚芙蓉列鎮聲靈壯陪京拱抱重三畨紆聖蹕五字紀仙峯近引天邊伏遥看雪裏松翠雲屏尚展白玊磴新封鉅典崇禋祀神區識仰宗賡吟遲錦騎題額耀驪龍曩迹増追慕寧徒豁逺胸聖駕東巡盛京恭謁祖陵大禮慶成詩癸亥胡寳瑔展謁心繩祖精禋孝格天殷祥從啟後周祚溯開先寳命三才合瓊源一氣連辨方符出震配極協基乾式廓由仁累維新在徳延流虹將毓聖長白預徴仙武履吞朱果星臨貫紫躔篤生風表異乗運日華懸丕構初桓撥羣雄盡伏跧十三摧勁甲百萬却飛鋋拓土聲威壯瞻原本實堅舟瑶勤相度襟帶勢洄沿再卜今遼瀋千秋古澗瀍亶聰能纉緒列聖念稽田大統兼函夏神都乃定燕經營光宙合撫御跨嵩滇久道甄長固重熙㦸改煎我皇懷肇迹繼志重仔肩松柏瞻依切羮牆對越專先期詢帝典諏日應虞璿清廟申䖍告隆儀考實詮爰移雉尾扇逺颺魚鬚旃奉侍慈寧慶馳行福履駢霱雲隨羽葆香靄䕶珠軿雨霽塵氛淨風和景物妍潔齋心翼翼定省意􅚳􅚳北口千盤拱南天一線縁嚴闗通虎氣髙塞靖狼煙行殿依層嶂離宫仰舊椽憑軒先澤迥染翰睿情牽不為巡遊至非因逸興遄覲揚時愓若陟降每兢然大獮徴徒盛修戎振旅闐雙鞬攅靺鞈萬騎接連錢陳整花團槊場寛柳拂韉秦成爭執㦸許少逞銜弦絡野馳偏挺罘山逐更翾將藏仍觸蹶欲縱又聨猭扼猛僵生兕追奔挫巨狿青骹騰白鵲素練攫蒼鸇自覺皆闗輻何曽待步鋗叠雙穿繡羽羣友散腥涎月滿乘飛接星流帶走搴共驚天智勇齊慶日充填甫草詩徒侈長楊賦苦研何如勤講武不比樂遊畋祖制宜常守遺風莫暫捐諸畨羣引領候駕幾佪儃永念懷柔徳均歸統馭權壺漿看簇簇芻糗効惓惓厥角還輸馬雕題亦獻豜晨車循水曲夜帳結山巔咸戴天家澤俱稱衆部賢名王邀眷遇國戚重姻聨鰜鰈同胞與梯杭總幅􅊷昔無私覆載今豈薄虚孱盡在生成内寧令雨露偏凡兹皆世徳長以固雄邊聲教訖如此恩威詎偶焉御題標勝地睿藻賁懸泉雷若山陽殷蚪疑水窟眠巖腰梳靉靆石齒濾潺湲喜氣匀寒燠時光賴節宣草青秋露潤林絢晚霞褰輦路郊原濕沙程讓陌阡天和駢玉穗嵗稔獲霜秈處處吹豳樂家家鼓腹便昇平思締造恬養本鈞甄到此皆疆理行來異毳氊寒門随擊轂遼水復牽船櫛沐聞堯腊風塵記禹胼遥晞形駊騀顒企氣蜿蜒景彼松楸茂從兹𤓰瓞綿千峯朝啓運四祖慶光前肸蠁陳登豆翹襟潔儿筵先河尊自岀卜洛溯營遷峻業垂無極鴻基永不騫矗如雲鬱蓊亘若霓連蜷既仰龍東䕶還欽鳯北翩金銀隆地軸星宿耀河壖文祖方昭格神宗復吉蠲柏城藏劍舄琳璧奉杯棬書謂材宜艧詩聞桷有梴瑶光騰釦砌瑞色擁珠櫋鰲戴三山柱螭盤四寳磚祠官嚴辨省宗伯戒愉綖執事鴛鸞肅陳牲繭栗卷觀孚咸有秩萃假泃無愆履位昭中正凝神表滌湔洪歆誠已達介福徳加䖍僾愾通心結形聲㝠意筌炳膋蕭燿燿灌鬱鬯涓涓禮畢華芝動風行翠䍐旋餘香烟幕䍥夾道樹蔥芊雉堞分樓櫓蜂房富市㕓莊馗平似砥列隧密於緶象闕規模舊皋門體制全即看霞繚繞並映日炎燀圭地黄輿正儀天紫盖圓一尊聨海甸萬類統垓埏舜簋惟和土堯題喜不枅衣裳猶仆襲圖訓尚連編示儉捐紈綺垂型却玊磌依依欽手澤聖聖共心傳閶闔迎晨啟旌旗拂曙鮮早朝銀箭仗待漏赤墀鞭忭舞聞宣詔嵩呼敬上箋維城劍珮列陛肅貂蟬鍚類蠲千庾流恩注百川絹頒仁共煦竿植過容悛枌社洵霑被雲臺最繫攣厥初爭附鳯應運翊鳴鳶銘鼎推同體援旍念控咽三勲親奠斚諸佐使加籩鎮岳横青壁靈源滙碧漣惟神將璧帛承命薦牲牷迺令熊羆會旋觀組練挻軍容齊郅武偈節集鮮扁後距成山立前茅擬水漩電馳戈閃閃雷動鼓鼘鼘莫訝輈能挾兼誇札盡穿鸛鵝風欲卷茶火錦初纒慶勞鐃聲奏呼騰凱唱還於焉開大酺是用宴華顛豐沛興歌日邠岐望幸年駢羅肴盡蕙照燿燭皆蓮眷顧容酬酢言情任笑嘕後人猶食舊先志並垂憐所遇咸欣躍無誰更結情餐和春以嫗交讓性寧顓耕鑿安淳樸漸摩異巧儇培深徵皡皡化洽近蹎蹎但覺心恒習都縁目久檽深叢繁果實沃壤秀禾弮蘇子靈槎接松花寳石濺三椏珍玉茁萬顆璨珠蠙是水成甘醴其材悉杞楩射熊馳躡影釀鹿䕶長鬈肪截摛冠雉銀翻秀項鯿土饒嘉産錯人厚古風扇自昔能時保奚煩慮月朘無名誠蕩蕩有道信平平逖聴常翹首騰歡幾曲拳文濤􅉼渤澥筆露漬蘭荃賦就瞻羲書歌成叶舜絃惟馨光典䇿至治握樞鍵用述前謨大兼窺聖徳淵盤杅期日儆金鑑願心鐫紹衣符三五綿長紀萬千回鑾咸有慶敬獻上陵篇恭和御製興京疊癸亥舊作韻元韻甲戌劉綸聖代興王地神山啓運時東來初望氣西顧益恢基卜宅邠原頌成都媯汭思金湯紓浚築海岳効崇卑脈衍蟠龍勝材儲附鳯姿丹邱凌日觀紫闕俯雲陂沐雨懷陶穴歌風竚羽旗文孫容有恪藝祖格寧遲儉徳茅茨著淳鄉桑梓垂兩京抒御藻古意溯源知恭和御製興京疊癸亥舊作韻元韻甲戊戌汪由敦龍興最初地鸞御再經時奕世承昌運依京肇帝基居岐始廬旅載亳已謳思正喜周原膴何嫌夏室卑風雲開大業天日緬神姿樓櫓餘層巘郊原指近陂流泉環井里喬木映旌旗為憶前題舊重看閲嵗遲鴻篇百言疊駿烈萬年垂翹望丹陵迥貽謀聖鑒知恭和御製謁顯佑宫疊舊作元韻甲戌汪由敦地迥枌榆社天臨紫極宫翠㣲佳氣鬱綘闕慶雲崇靈祝昭丕祉精誠格上穹肇基凝鼎命禁籞秩豐功霜柏層霄上扶桑渤海東再巡光盛典祇謁厪淵衷章叶星雲倬圖開駿業鴻永惟承啟佑篤祜仰皇躬恭和御製興京疊癸亥舊作韻元韻戊戌和珅城是東都舊來當八月時居岐天與宅胥宇命初基撫迹増餘慕徴圖契聖思比文百里王異舜有鰥卑地擅山川秀人兼義勇姿風聲傳戍壘鶴唳遍岡陂火返擒三帥營開列八旗威靈方赫濯荒度豈稽遲典勒名山貯功成大漢垂無須警木鐸五字示周知恭和御製題薩爾滸十二韻元韻戊戌梁國治我武惟揚日恭聞帝謂宣永懷攻戰蹟如凛鑒臨天詞炳詩謨誥勲傳散望顛神謀竒合正鬬士一當千料敵先知彼乘瑕遂據堅御師貞以律載斾秉維䖍陳馬親揮指軍書謝委填會朝戎事定四路奏功連用命彰勞伐同心邁古前山河雄極望掌握運歸權赫濯聲靈在精禋對越專賡題薩爾滸于萬賀斯年恭和御製至興京疊癸亥舊作韻元韻戊戌梁國治自我興京造於昭帝命時三闗乗敵勢一戰肇王基貔虎驚雄陳韜鈐運寳思遂開疆域逺不厭土茨卑天與神明胄人多颯爽姿登山看壁壘擐甲陟陵陂奪彼援軍氣搴其大將旗功成五日速純養幾年遲鼎祚山河鞏奎文日月垂前光揚後聖家法仰真知恭和御製題薩爾滸十二韻元韻戊戌謝墉神武木厨奮大文金匱宣孫謀勤述祖帝業創開天在昔王師振彼昏國勢顛若林卄餘萬如虎一當千頓見旌麾靡全摧櫓楯堅堂堂布竒正黙黙凛紏䖍礟火因風反輿尸滿谷填羣山飛騎合四境捷書連疆里新増舊勲勞後迪前紹衣綿景命銘鼎紀威權從識坤維奠端由廟畧專賡歌三有宅篤祜萬斯年恭和御製興京疊癸亥舊作韻元韻戊戌謝墉草昧亨屯地龍飛出震時鑒觀承帝眷肇造拓邦基魁柄移衰祚戎衣啟繹思允荒豳館即克儉禹宫卑上國風雲㑹中天日月姿靈鍾徒太嶺業展界藩陂振旅恢三畧規方列四旗昄章孔之厚武戒久而遲式廓輿圖鞏丕承統緒垂紹聞兼創守崇領仰生知恭和御製題薩爾滸十二韻元韻戊戌錢汝誠鴻業初基造神功駿烈宣經綸開自聖智勇鍚由天勝算原無敵先機已據顛時西路偵卒遥見火光馳報南路偵卒又以明兵逼境告太祖謂西來者必大兵其使我先見南路有兵者誘我兵而南也果如神算殷師空億萬周旅止三千壘築金城固山圍鐵背堅成謀兵士勁界藩防衛築城夫役之兵伏薩爾滸谷口伺杜松等兵過將半尼撃之并力役夫䖍杜松兵攻吉朴崖我兵四百人率衆夫役下擊之一戰而斬明兵百人騎隊從綿翼時近乘興京城之兵乘善馬者先至駑馬者後至皆足應敵軍聲已震填攻心拉朽昜太祖命先攻薩爾滸所駐兵可謂攻心之要策斫陳折渠連太宗議増兵千人往吉林崖相助大破其衆明總兵杜松等皆没于陳傷鳥俱驚落薩爾滸之兵既破其馬林潘宗顔劉綎李如柏諸軍遂相繼破滅聨雞詎奮前葉赫之助明者聞而驚遁朝鮮之助明者執明兵而降親賢皆一徳鈐畧仰中權以直王師壯維膺帝眷専蹕途欽戰績書事溯當年恭和御製興京疊癸亥舊作韻元韻戊戌錢汝誠命世生真主乗乾肅奉時經營勞締搆草昧此開基伐密歸神算遷岐啟聖思先是葉赫等九部合兵來侵太祖率兵禦之以次誅滅降服于是䝉古諸部長皆通使不絶遂建都興京我圖方烈烈明室已卑卑尚遣沙蟲旅遑知龍鳯姿太祖疆宇日闢勢莫敢遏明季已屬末造乃猶命經畧楊鎬等統二十萬衆分四路侵我興京是不知天生無敵于天下也聖人五朝齊下壘一騎未臨陂時五日之内破明兵于薩爾滸吉林崖斐芬山尚間崖阿布達哩岡富察之野諸處之兵無一人能近興京城塹者勇氣聲先鼓軍容色變旗闢疆威更逺養晦迹非遲土物神皋沃茅茨儉徳垂川原懷式廓宣示萬方和聖駕四詣盛京恭謁祖陵禮成恭紀上下平聲韻三十首癸卯董誥佑命申天眷寅承仰聖躬萬年洪祜篤列祖顯謨崇肇域歌于亳詒謀紀作豐展巡儀疊舉繩武典攸同締構艱難績重華啟迪功永言追逺義敷繹道彌隆其一孝告陵園展方春濡露濃迎薰休彀騎上塞駐飛龍撰日秋華爽中天月彩重鏘鑾駢七萃聨幕卓千峯沙蹟涵泉脈楓巖繪黛容鋪芬禾黍秀蹕路省良農其二述職紛藩衛天家烈駿厖勤拳供偫備稽首角麾幢蕃帳周廬萬和門列纛雙先驅鞬矢引來覲珮聲瑽虎落連遥塞龍沙控舊邦鬱蔥佳氣近納緑指蒼江其三王氣舂陵聚髙山世徳貽遹追鴻號晉式廓永圖垂豳雅興甿業邰封肇帝基璇源靈漢導榆蔭瑞雲彌一脈豐融蠁三霄僾氣思盥誠孚夙夜鬷假萃洪釐其四沛里紆宸矚橋山擁瑞霏維新開寳構大定仰戎衣宅鎬規千禩升陑式九圍麾旄彰武烈弧矢景軒威羆虎重巒䕶雲霞萬載輝升歆陳稷黍四度寫瞻依其五耆定光湯烈昭陵繼創初畏懷蕃部悃推戴讓王書徳已同幬載仁寧利剪除鼎龍弓影在石馬汗趨餘瑞籙通真宰黄圖撫廣輿珠邱申對越洞屬聖心如其六禮成明備慶黄幄涖陪都鱗集名王侍鳬歡子姓趨曙華騰羽葆祥靄覩枌榆嶽嶽垣墉制將將皋應模那居欽儉徳經始宅鴻圖光恊清寧撰璇宫握瑞符其七荒外夫餘國賢藩奉介圭星辰天拱北玉帛海東齎鍚宴屏翰重承恩拜舞齊慶霄敷雨露寳篆燭虹霓旭上槫桑近雲連島服低丸都通鴨緑萬禩祝洪禔其八郊坰壇位設崇徳玉輿䡨珪幣千靈享鐘鏞六變諧中都初定鼎大禮溯燔柴右序欽先典前巡厪聖懷紫垣三列陛瑶級八重階並煥元堂制祈天福孔皆其九原廟豐京左前規詠實枚三元祠改卜九室宇重開䖍斵歌松桷勤修飭梓材膺圖欽陟降登瑞慶昭回巍煥文章紀玢璘禮樂該五朝升冊寳揚覲仰烝哉其十故宫殷禮樂毖祀奠溪蘋牢執歌風古烝浮數典淳吉蠲蘭醑酌嘉薦黼筵陳餘餕頒胥逮蕃釐受更新三秋承大糦册載溯初巡東望頤和殿蒸蒸孝慕申其十一神皋宜五穀繡隴蔚芬蒀畝沃雙岐瑞家饒四鬴殷髙秋巡翠輦多稼刈黄雲額逭除田賦膏流洽社枌引年扶杖祝肆眚下車聞嵗嵗徯來幸無疆頌聖君其十二詰戎光烈仰弧矢典宜敦義等三田寓材因五射掄先期遴衛士申閲御旌門魚貫程精藝鴛聨拜渥恩肄勤思罔斁纉武道攸存鈕勘風仍古前徽誌弗諼其十三櫛沐懷前武經綸締造難宗祧貽矢胄房序肅衣冠麟采増輝暎龍文永䕶蟠式憑天穆穆瞻企烈桓桓䖍秉仍湯鉞垂華擬舜干洪思恭儉徳神御萬年安其十四登閎恢聖業齋額繼思賢永念前光迪深維法守艱謨欽離照示閣仰曙霞攀圖録重熙際聲靈萬古間瓊源流祉慶寳牒送巡環式煥留都制祥輝天作山其十五延閣宏文闢名循過澗傳三江探玉海五緯聚箕躔于邁鸞旂蒞觀成壁曜聨劍光騰碧漢珠彩耀深淵衢獻諸生賦黌増博士員作人歌棫樸嘉蔭檻雲連其十六綳梗膏仍注霞蒸燭綘霄故宫留土俗乙覽佐秋宵籠葛燈同示敷蓮炬漫燒光輝瞻帝里淳樸溯先朝垂訓穹碑泐成模守器昭化裁欽椅製聖念凛牆堯其十七展采都畿奉釐工祖制包拱垣環左輔冊命尹東郊責重宗城寄情聨泰陛交嘉孚恩有慶廉法聖親教舊徳欽宜守奢風戒勿淆懋哉良翰職統率彚征茅其十八姬籙稱周召唐宗數鄂褒酬庸封號炳紀績史宬髙日月攀鱗志風雲汗馬勞享陪清廟位奠酹故塋醪申錫承前志優霑慶盛遭欽思嘉運翊勁力刈蓬蒿其十九不咸修望秩江海典仍羅薶疈春官祀懷柔時邁歌靈源徵佑貺仙蹕仰經過侑幣歆名瀆函香薦古河鴻文䖍肸蠁翬羽視巍峩北鎮新祠廟升禋瑞靄多其二十風土邠岐舊天章仰正葩省山邦作對溯澗物惟嘉載纉于狐貉其繩立室家源流臚美富志乗繪豐華基本開忠厚規仍酌儉奢南都平子賦康麗澷陳誇其二十一鍚慶神人洽敷恩中外滂郁華迴日御瑞靄䕶雲驤輿向羅葵悃天心眷梓鄉遐瞻闗虎踞迺望氣龍翔詄蕩亨衢逺淳龎厚澤長星街百廿里坦坦賦周行其二十二萬載厨峯地軒皇赫濯聲一戎馳勁旅四路殪明兵電擊封填蟻雷砰觀築鯨咸劉攻牧野伊淢奠豐京欽念天惟鑒丕昭日永清蹕塗紆聖慕景仰武功成其二十二勝國藩籬捍當時重廣寧盾矛持議左門户聴言熒前鑒中奎翰先聲仰震霆崇墉嚴討伐滍水讋威靈六合今無險三韓舊作屏山川松杏色周覽慰烟炯其二十四上都鹽澤地廿載牧羣増息養仍坰野蕃滋數大凌間田非稷黍屬籍異監丞雲廐紛羅列秋原自飽騰更畨歸轡易閑衛羽林乗天育稱唐代鋪張詎足徴其二十五雲䍐前時蒞金墉飭普修承平非險設保聚為民謀材庀司空備錢頒少府優八城新堞煥五載大工周虹亘遥環堄霞輝近燭樓蒼蒼祥靄裏萬雉控神州其二十六雄闗稱險阨西北擁﨑􅋂逺念欃槍埽恭承函㝢臨夏殷規監昔神武績垂今衮鉞懸金鑑丸泥俯玉岑廣輪重塞扼裒對一心欽澄海舒宸眺梯航永奉琛其二十七丹陵東向慕葱蔚慶雲含申緬文思被遥維武烈戡露霜遲兩載紫翠拱千嵐執饌唐儀展齊祠漢典探蕃祺欽備五大禮仰雍三嵗徧精禋洽寰區孝治覃其二十八歸格膺鴻慶神軒肅仰瞻愛朝三殿啓騰賀萬方僉臚典勲華鬯庸歌雅頌兼迴環珠叠韻先後玉排籖祗遹長言紀靈承億載占四巡欽繕册垂裕意深嚴其二十九達孝髙前牒馨香感至誠光儀輝典册符瑞陋泥緘曼壽申天鍚昭明仰帝監扈巡隨豹尾儤直荷氷銜式覩宏章備祗慙賦筆凡擊轅寧儷雅大樂企韶咸其三十欽定盛京通志巻一百二十五
