body:
  text: 列女一唐遼金元明欽定四庫全書欽定盛京通志卷九十三列女臣等謹案班固稱遼東之俗女子貞信自古載籍闕如有唐以前傳者絶少遼金代興耶律完顔諸族志節凛然炳於彤史我國家敦崇風化坊表楔旌之典特有加隆百餘年來八旗氏族以節著者咸足型方式俗伏讀御製姜女祠望夫石諸篇仰見聖人彰闡德教風示義烈之至意夫表潛徽而揚芳􅍇劉向所以傳也爰考其卓著者為備詳行事次亦臚次姓氏於篇謹志列女苐三十二欽定四庫全書欽定盛京通志卷九十三列女唐李謹行妻劉氏靺鞨人有勇略髙宗時謹行擊髙麗於發盧河西破之劉氏留伐努城賊攻之劉擐甲勒兵以守賊引去以功封燕國夫人遼邢簡妻陳氏營州人甫笄涉通經義凡覽詞賦輒能誦尤好吟詠時以女秀才名之年二十歸簡孝事舅姑閨門和睦生六子親教以經二子抱璞抱質皆以賢能致位宰相及陳氏卒贈魯國夫人刻石以表其行論者謂貞靜柔順婦道母儀始終無歉云耶律氏太師舒嚕之妹小字常格操行修潔自誓不嫁能詩文不茍作讀通厯見前人得失悉能品藻咸雍間作文述時政上善之耶律伊遜求其詩常格遺以回文伊遜知其諷已銜之大康三年伊遜誣廢太子時常格兄舒嚕謫鎮州常格與俱常布衣蔬食人問曰何自苦若此對曰皇儲無罪遭廢我輩豈可美食安寢年七十卒於家舒嚕國語解見名宦卷原作適嚕常格原作常哥伊遜蒙改古語解見人物卷原作乙辛今俱譯耶律努妻蕭氏小字伊遜國舅駙馬都尉托斯和女歸努以孝謹聞初努與樞密使伊遜有隙被誣奪爵流烏古部帝以伊遜公主女欲使絶婚伊遜曰陛下天地之恩然夫婦之義生死以之臨難頓乖綱常禽獸何異幸陛下哀憐與努俱行妾死無恨帝從之夀隆初帝嘉其節召舉家還保大中伊遜在臨漢謂諸子曰吾度盧彥倫必叛汝輩速避我當死之賊至遇害耶律努原作耶律奴伊遜原作意辛䝉古語托斯和屯莊也原作陶蘇幹今俱譯改耶律珠展妻蕭氏小字額哩頁國舅博勒之女年十八歸珠展未幾珠展卒既葬謂所親曰夫婦之道如陰陽表裏無陽則陰不能立無表則裏無所附妾夫早嵗登朝有才不夀天禍妾身復何倚恃死者可見則相從地下不可見當與俱逝遂自刃而卒䝉古語珠展厚也原作禾者額哩頁䝉古語解見人物卷原作訛里博勒原作孛堇今俱譯改耶律中妻蕭氏小字綏蘭韓國惠王四世孫及笄歸中天慶中為賊所執蕭置刃於履誓不受汙至夜賊遁得免久之帝召中為五院都監中謂妻曰吾本無宦情今不能免當以死報國汝能從我乎綏蘭對曰謹奉教及金兵狥嶺西中守節死綏蘭躍馬突至中所自殺綏蘭國語解見忠節卷原作挼蘭今譯改韓慶民妻某氏未詳慶民為宜州節度使金人陷宜州慶民不屈死之以其妻配將士不從遂自殺金世宗讀太宗實録見慶民夫婦事歎曰如此節操可謂難矣金阿林妻薩勒扎金源郡王尼楚赫之妹也天輔六年黃龍府叛卒攻抄旁近部族時阿林從軍薩勒扎集附近男女五百人築栅為保守計賊千餘來攻栅薩勒扎裹氊為甲裂裳為旗男授甲女鼓譟自仗劍督戰三日賊去皇統二年論功封金源郡夫人大定間以其孫藥師為穆昆阿林國語解見吉林山川卷原作阿鄰薩勒扎岐路也原作沙里質尼楚改赫國語解見人物卷原作銀术可今俱譯李寶信妻王氏寶信為義豐縣令時張覺以平州叛王氏陷賊中賊欲逼室之憤罵不從賊支解之大定十二年贈貞烈縣君李英妻張氏英初為監察御史在中都張氏居濰州貞祐元年元兵取濰州入其家張氏盡以所有財物與之既而令張氏上馬張曰我盡以財物與汝猶不見贖耶答曰汝品官妻當復為夫人張曰我死則為李氏鬼頓坐不起遂見殺諡莊潔王維翰妻姚氏維翰大定府人貞祐初維翰節度定海為元兵所執不降死之妻姚氏亦不屈死諡貞潔爪爾佳胡山妻阿爾展宗室承充之女胡山為瑚爾哈明安亡時有衆千餘興定元年承充為上京元帥上京行省太平執承充應布希萬努阿爾展治廢壘修器械積芻糧以自守萬努使人招之不從乃射承充書入城阿爾展碎之曰此詐也萬努兵急攻之阿爾展衣男子服與其子富德督衆力戰殺數百人生擒十餘人萬努乃解去後復遣將擊萬努兵獲其將十人詔封郡公夫人子富德論功遷賞爪爾佳胡山原作夾谷胡山阿爾展阿爾䝉古語解見人物卷四展象也原作阿魯真瑚爾哈見山川卷原作胡里政布希萬努見人物卷原作蒲鮮萬努國語富德送也原作蒲帶今俱譯改薩哈連妻通吉氏平章政事察雅遷嘉努之女自幼動有禮法及適薩哈連閨門肅若薩哈連為中京留守元兵圍之疽發背不能軍通吉氏度城必破謂夫曰公以宗室受國厚恩不幸病不能戰禦設城不守當率精鋭奪門而出擕一子走京師不能則戰而死猶可報國幸無以我為慮薩哈連出巡城通吉氏乃取資貨散之家人戒女使曰我死則扶至榻上以衾覆面四圍舉火焚之無使兵見吾面言訖閉門遂自經薩哈連從外至家人告以夫人之死薩哈連撫榻曰夫人不辱我我肯辱朝廷乎因命焚之年三十有六薩哈連解見山川卷原作撒合輦通吉八旗姓原作獨吉遷嘉努原作千家奴今俱譯改完顔長樂妻富察氏字明秀鄜州帥納紳之女適長樂哀宗遷歸德將行以長樂為總領將兵扈從將行屬富察氏曰無他言夫人慎毋辱此身明秀曰君苐致身事主無以妾為念妾必不辱一子在幼出妻柴氏所生也明秀撫育如己出崔立之變驅從官妻子於省中俱親閲之富察氏以幼子付婢僕且與之金幣親具衣棺祭物與訣曰崔立不道强人妻女兵在城下吾何所逃惟一死不負吾夫耳汝等善養幼子遂自縊時年二十七富察八旗姓原作蒲察納紳國語解見選舉卷原作訥申今俱譯改圖們呼圖克們妻烏庫哩氏伯祥之妹適臨洮總管圖們呼圖克們伯祥朝貴中聲譽藉甚圖們呼圖克們死王事崔立之變衣冠家婦女多見汚氏謂家人曰吾夫不辱朝廷我敢辱我兄及我夫乎即自縊一婢從死於側圖們八旗姓原作陀滿呼圖克們原作胡土門䝉古語解見選舉烏庫哩八旗姓原作烏古倫今俱譯改參政完顔蘇哷妻亡其姓氏崔立之變謂所親曰吾夫有天下重名吾肯陷身以辱夫乎今日一死固當但不可離吾家而死即自縊於室蘇呼原作素蘭今譯改完顔莽格妻溫特赫氏莽格以功世襲穆昆兼奉御崔立之變莽格義不受辱與妻訣妻曰君能為國死我不能為君死乎一婢曰主死婢將安歸是日夫婦以一繩同縊婢從之莽格原作忙哥溫特赫八旗姓原作溫特罕今譯改完顔珠爾妻尹氏珠爾系出蕭王天興二年珠爾從哀宗為南面元帥戰死黃陵岡氏聞取家資焚之遂自縊珠爾解見忠節卷原作豬兒今譯改完顔仲德妻族氏未詳崔立之變毁容服擕妾及二子自汴走蔡蔡被圍丁勇皆乘城拒守妻謂仲德曰事勢若此丈夫能為國出力婦人獨不能邪率諸命婦自為一軍親運矢石於城下城中婦女爭出繼之城破仲德妻自盡元耶律琉格妻約囉氏太祖時人推琉格為遼王後納欵琉格卒約囉氏入奏會帝征西域皇太弟承制以約囉氏佩虎符權領其衆者七年丙戍帝還約囉氏擕次子善格特爾格永安及從子托多爾孫收國努見帝於河西帝慰勞甚至約囉氏奏琉格既死官民乏主其長子色辰扈從有年願以次子善格代之使歸襲爵帝曰色辰從朕征西域已積功為巴圖魯不可遣當令善格襲父爵約囉氏拜且泣曰色辰者前妻所出嫡子宜立善格者婢子所出若立之是私己而蔑天倫也竊以為不可帝賢之允其請竝給驛騎遣其季子永安送約囉氏東歸恩賚有加琉格原作留哥約囉國語響箭也原作姚里善格原作善哥特爾格䝉古語解見忠節卷原作鐡哥托多爾䝉古語內也原作塔塔兒收國努原作收國奴色辰聰明也原作薛闍今俱譯改蕭某妻趙氏大寧人年二十夫蕭病劇謂趙曰我死汝少當奈何趙曰脫有不諱妾不獨生遂命匠製巨棺夫歿即自縊家人同棺葬焉時大寧夫死殉節者有趙脽妻安氏陳恭妻張氏武夀妻劉氏宋敬先妻謝氏稱五烈婦並事聞被旌李君進妻王氏遼陽人大德八年君進卒將發引親鄰咸㑹王氏謂衆曰夫婦同穴義也吾得從良人逝足矣因撫棺慟哭嘔血升餘死與夫連柩而葬送者數百人莫不灑泣趙洙妻許氏集賢大學士許有任姪女也至正十九年紅巾賊陷遼陽洙為儒學提舉避亂資善寺以罵賊死許氏不知也賊甘言誘許氏願指示金銀之處氏大言曰吾詩書冠冕故家不幸遇難但知守節而已他皆不知也賊以刃䝱之色不變已而知其夫死因痛哭仆地罵不絶口且曰吾母居武昌死於賊吾女兄弟亦死於賊今吾夫又死使我得報汝當醢汝矣遂遇害寺僧見氏死狀哀其貞烈賊退與洙合葬之李馬兒妻袁氏瑞州人至正二十二年李病沒袁氏年十九誓不再嫁孝養舅姑有王成者挾勢欲娶之袁氏曰吾聞烈女不更二夫遂往夫墓痛哭縊死樹下文宗信妾白氏宗信為遼陽行省丞病篤語之曰汝年方二十我死將奈何白氏應曰妾身草芥賴夫子以存活萬一不諱妾不獨生宗信死逮殮氏盡出箱篋分給親戚白氏沐浴别主母自縊以殉親戚義之與夫同葬明髙門五節婦劉氏光州固始人夫髙希鳳江寧人戍遼東為亂軍所掠拒而不服軍怒斷其腕劉抱腕且哭罵不絶口遂被殺希鳳弟藥師努妻李氏早寡因亂擕子姪避難始終保全後歸江寧守夫墓誓不再適希鳳季弟巴延布哈為讐家所殺妻郭氏即自縊於馬櫪希鳳從子塔實廷為父讐訟陷而死妻金氏姑邢氏俱自縊一門五節事聞旌表藥師努原作藥師奴巴延䝉古語解見疆域形勝卷布哈䝉古語解見名宦卷原作伯顔卜花塔實廷回語石堆山子也原作塔失丁今俱譯改劉智才妻閔氏六安州人智才任大寧翼萬户卒閔氏無子撫妾子如己出緣夫屬軍籍戍金州傭絍供衣食尤能以禮自防事聞旌之裴貴妻劉氏名志貞建州人三萬衛鎮撫劉呼喇圖女也幼聰慧授孝經列女傳等書咸成誦年十六適貴事舅姑以孝聞貴有疾劉潛刲股以進弗效貴謂劉曰吾危矣汝幼善事後人劉泣曰奈何以犬豕畜妾當誓天效死安用生為遂入𨼆室自縊越二日貴始卒有司上其事詔旌之䝉古語呼喇圖有雨之謂原作忽魯秃今譯改趙忠妻及女失其姓字忠任廣寧右衛指揮僉事守鎮靜堡正統間敵圍堡忠乘城拒戰有訛言城陷者忠妻女皆自縊事聞賜金為忠妻女營葬旌其門耿秩妻張氏秩戰死平頂山張氏年十九痛欲自盡姑與母勸之曰汝不二志節也何以捨父母與姑乎張氏遵命守節至四十年詔旌之藉氏金州軍餘之妻夫死守志四十餘年金州總旗張俊妻徐氏夫死守節三十餘年錢海妻許氏夫故守節清白自矢終身如一事聞旌表蕭士清妻丁氏金州人奉姑至孝士清疾飲食俱廢乃祝天願以身代及士清歿丁氏悲痛自縊正統間旌其門金州指揮張頃妻朱氏夫死無子朱氏孀居侍姑孝養備至事聞旌表年八十六而終賀升妻楊氏名妙真浙江鄞縣人隨父原道戍廣寧妙真年十八適廣寧後屯衛總旗賀升事舅姑以孝聞升隨征歿於山海關氏往扶柩歸葬子祥甫三嵗撫育成立孀居四十九年成化間旌表髙原昌妻張氏遼陽人原昌素疾娶未逾月病篤母慰氏曰善視湯藥莫辭勞苦汝年少無出自有名門擇配氏泣曰夫死不嫁禮也何出此言原昌卒氏哭纍日自縊事聞旌表邵倫妻張氏遼陽人倫故張氏自縊與夫同葬焉劉晏妻朱氏義州人夫死寡居𢎞治間遇亂軍將驅之行朱氏誓死仆地賊怒刃其吭而死陸淳妻鄧氏開原人淳死鄧氏年十九哀毁不食殮畢自縊葬之日無不隕涕董欽妻劉氏遼陽人夫故劉氏撫尸痛哭自縊死巫氏瀋陽衛農家婦正德十年五月夫在田耕耘氏獨行饋餉遇强暴持刀挾氏欲汚之氏堅執不從遂為所殺死後手中猶握血漬破衣一片巡撫立碑表其墓生員侯爵妻汪氏廣寧人中屯衛總旗汪勝女年十八歸爵夫死家甚貧汪氏賣奩以供殯葬翁姑相繼卒復經營喪葬如禮守節終身正德間旌其門王清妻曹氏廣寧人清病卒遺腹六月生男父母欲奪其志曹氏以死自誓親黨憚之不敢言卒撫孤成立家業復興熊宗義妻塢氏宗義為廣寧中屯衛軍餘嘉靖四年敵侵雙堡宗義被殺挾氏上馬自墜於地者再三併殺之莊大全妻白氏義州衛人年十八適大全生子未一嵗大全死求娶者甚多氏度不能免遂自縊與夫同葬生員徐文中妻王氏定遼後衛人嘉靖中為寇所執强挾上馬屢投地大罵不從遂斷其手斫身數刃而去氏一息尚存見文中曰我名節無玷死無憾矣遂瞑目蔡遇春妻陳氏瀋陽人遇春死即欲自縊以殉以年饑未葬子幼無依而止越三年卜葬抱子痛哭先一日縊死竟與夫合葬鄭貞女廣寧人指揮鄭雄之女幼敏慧勤女紅年及笄納遼陽孫棣聘未幾棣故女聞訃縞素哭奠誓不更適練衣杜門至親罕見其面既三年父母以棣未奠雁將受他聘女聞而流涕輒不食終日父母知不可奪遂成其志年未及老容瘁齒落卒之前一日羣鶴飛翔屋上嘉靖十八年旌其門顧澄妻楊氏鐡嶺人澄故遺腹三月産一男楊氏誓不二適甘貧撫孤卒年七十九李通妻程氏海城人通為海州衛千户生子芳甫三嵗通卒程氏甘貧守節育芳成立襲通千户之職後戍邊戰死芳妻陳氏年尚幼守志事姑通弟正與文皆早亡正妻宋氏文妻陳氏俱守志不移一門四節芳垂彤管髙琰妻潘氏蓋州人琰故無子潘年十九以紡織自養守節三十五年嘉靖間旌表趙澐妻于氏三萬衛人年二十餘澐故于氏自縊櫬旁髙鳳妻蘇氏髙龍妻羅氏妯娌也鳳戍開原病故蘇氏扶襯歸葬撫教二子守節五十四載卒年八十有三鳳弟龍娶羅氏龍故遺腹四月生一男羅氏守志撫孤人稱一門雙節韓連妻吕氏遼陽人夫有疾吕氏知不起遂先夫自縊兩柩同葬王福妻臧氏廣寧人夫卒臧氏守節自誓事姑髙氏以孝聞居數載邑人聞其賢欲娶之知氏不可奪乃謀氏兄私納其聘臧氏向姑泣曰妾以姑缺養故未忍與夫同死今不得侍姑矣夜遂自縊一統志作蓋平衛人馬汝麟妻寧氏遼陽人夫故寧氏痛哭自縊臧鉞妻孫氏廣寧人夫死教子臧仲學舉於鄉守節二十五年官表其閭指揮朱國楨妻劉氏寧逺中前所人楨官指揮性至孝以父沒哀毁死時劉氏尚少守志撫孤卒至成立年逾八旬而神明不衰一門節孝並著周遇吉妻劉氏錦州衛人遇吉任山西總兵時流賊李自成犯寧武關城破遇吉力戰死劉氏素勇健聞難率婦女數十人據山巔公廨登屋射賊殺賊無算賊不敢逼縱火焚之闔家遇害按周遇吉已詳見本志忠節謹按舊志列女首列孟姜及趙苞母孟姜苞母俱非遼東人不應載入是以志內斷自唐始至若金之完顔諸族以節烈稱者彰彰可考舊志以金後南徙汴梁概從刪汰未免闕略兹備録於卷欽定盛京通志卷九十三
