body:
  text: 國朝人物十六正藍旗漢軍鑲藍旗漢軍欽定四庫全書欽定盛京通志卷八十國朝人物十六正藍旗漢軍佟養性𨽻正藍旗漢軍世居撫順為商販以資雄一方養性有識量能役服其鄉人天命初密輸欵于我為明所覺置之獄潛出來歸妻以宗女賜號西屋裏額駙六年從克遼陽爵二等子時漢人歸附者日衆以養性充總兵官統之天聰五年太宗命督造紅衣炮鐫日天佑助威大將軍養性掌焉八月從攻大凌河以炮克一臺又從拒明總兵吳襄等援師于小凌河擊敗之復以炮克子章臺燬諸烽堠自大凌河至廣寧六年太宗閲兵演武場養性率所轄漢軍環甲試炮嘉其軍容整肅賜優賚有加尋卒順治十三年追諡勤惠佟養量奉天人𨽻正藍旗漢軍初為佐領升山東總兵官都督僉事順治六年任宣大總督駐陽和時薑瓖初平骸骨遍野斂而葬之又建報忠祠祀一時死事諸人衛所屯田部議照內地起科養量言邊地沙磧種遲霜早加以兵凶荒殘愈甚若援例起科勢必聞風俱潰疏上報可雲中人至今感之卒祀山西名宦佟岱𨽻正藍旗漢軍父佟三事太祖為副都統佟岱其第三子也初任佐領崇德三年授吏部副理事官尋兼參領六年從圍錦州城中兵出戰擊敗之追至城壕而還明兵夜襲我營與副都統金維城麾衆力戰明兵乃遁七年從鄭親王濟爾哈朗攻克塔山杏山旁近諸臺堡是年擢漢軍都統八年從鄭親王攻寧逺拔前屯衛及中後所三城敘功授騎都尉世職順治元年偕都統葉臣𠞰賊將陳永福於太原以炮克其城二年從英親王阿濟格西𠞰李自成敗賊於延安逐北至湖廣獲其船於富池口英親王既班師與降將金聲桓留駐九江分遣兵徇南康南昌建昌撫州袁州諸府請宥所俘故明諸王朱慈等詔從之特命慈等朝闕下不以俘禮三年還京授兵部左侍郎時明桂王由榔據武岡州分置偽官踞湖南諸郡邑是年秋命恭順王孔有德征之岱以所部兵從下湘潭趨瀘口以舟師破偽伯王朝宣於燕子窩追擒之進克寶慶夜發兵攻武岡焚其木城敗偽國公劉承允於夕陽橋遂克武岡由榔遁廣西五年凱旋六年從睿親王多爾衮討大同叛鎮薑瓖敗賊傅家嶺又與都統左夢庚連敗賊復渾源州及左衛朔州汾州太谷諸城先後敘功並三遇恩詔晉世職至一等輕車都尉兼一雲騎尉纍遷戶部吏部侍郎十一年擢閩浙總督十二年海賊鄭成功陷舟山十三年復陷台州詔佟岱解任還京佟岱不即行且上疏自敘𠞰撫功上責其冒功戀祿以李率泰代岱俾核其事具報率泰以佟岱駐杭州不一至海濱貽誤封疆入奏遂降世職為三等輕車都尉康熙二年卒劉宏遇遼東人𨽻正藍旗漢軍天命七年與其弟奇遇來歸崇德初授內院副理事官順治元年為工部理事官二年由山西朔州道擢陜西布政使四年考績稱最擢安徽巡撫𠞰賊渠王二甫等及英山霍山潛山諸賊皆平之七年授山西巡撫時薑瓖初平村聚多蹂躪逋賦巨萬宏遇疏請得豁免又恤諸死事家建忠烈祠祀之九年旱飢遣使分賑全活甚衆汾流侵會城築隄障之既去民懷其德建祠祀焉今祀山西名宦李率泰𨽻正藍旗漢軍父永芳初為明撫順遊擊天命三年以城降纍晉爵至三等子率泰初名延齡年十二入侍內廷太祖賜以今名比長以宗女妻之太宗征察哈爾朝鮮及圍錦州率泰俱從崇德八年從征至山東有勞績洊擢副都統順治元年授刑部參政既定官制改侍郎從入關破流賊李自成招撫天津平山東滿家洞賊功最二年從豫親王多鐸破流賊於潼關移師南下克揚州薄南京分兵徇定蘇州松江諸郡邑攻克江隂三年從貝勒博洛平浙江福建敘功授世職為二等輕車都尉考滿兼一雲騎尉五年海賊鄭彩犯福州漳州泉州諸郡詔率泰與靖南將軍辰泰往𠞰先後擒斬賊渠曽慶顧世臣等俘其衆數萬連復長樂連江興化彩引潰衆竄入海江西賊郭天才乘間自杉關掠福州聞率泰偵備嚴夜焚洪山橋以遁閩地冦患稍息巡按御史周世科虐刑攫賄率泰疏劾之斬世科發贓私巨萬民皆感泣六年從討大同叛鎮薑瓖下保德州擒斬賊黨牛化麟等八年遷吏部侍郎授𢎞文院大學士六年坐與同官辰泰誤增恩詔赦條罷任降世職為騎都尉九年特旨晉三等男十年以大學士洪承疇薦擢為兩廣總督時兩廣方有李定國之患定國者流賊張獻忠遺黨獻忠死降于明桂王朱由榔奉由榔據安隆盡陷粵西郡縣土賊廖篤增等應之勢張甚十一年率泰至粵遣兵殄篤增于玉版巢十二年定國來犯新會諸縣率泰督兵禦之敗其將高文盛會靖南將軍珠瑪喇率禁旅至合兵夾擊大破之新會城下乘勝復高州雷州諸郡所至軫恤民賴以安十三年加太子太保調閩浙總督時彩已前死其族弟成功者偽國公芝龍子也大軍平福建時芝龍束身歸命而成功竄金門招集亡命嘯聚海濱數犯福建浙江廣東諸郡縣至是時出剽掠往來海上無常率泰既蒞任請增設水師三千增置唬哨船數百為戰禦計請以撫佐𠞰翦其羽黨並言成功父芝龍不宜徙寧古塔恐其地近海或因間遁歸閩為患滋大聖祖悉是其言以前破李定國功晉一等男考滿加太保率泰以次招撫賊黨陳德容唐邦杰林翀葉祿等所降不下數萬而賊勢顧未衰十五年成功犯溫州府平陽瑞安俱陷浙東告警率泰請調江寧駐防兵助𠞰賊退泊舟山是年詔分置浙江總督以都統趙國祚任之俾駐溫州而以率泰專督福建駐福州未幾賊踞南安嶺窺福州賊黨陳斌降復叛率千餘人據羅星塔為成功援率泰馳檄會師焚其巨船千餘賊遁走斌孤窮乞降誅之福州城南十六年坐訊屬吏獄不竟奪爵任總督如故康熙初率泰以漳州為全閩門戶復請增設水師二千尋會靖南王耿繼茂擊走定海小埕諸賊又會提督馬得功擊走萬安所賊楊宣是年成功竄死臺灣孽子錦稱偽世子拒命其黨已稍離於是率泰招降林俊奇陳輝何義魏明等三百餘人兵二千有奇而閩地山賊復起遂統建寧延平邵武三路兵進𠞰縛其渠王鐵佛山賊平已而錦與其黨周全斌擁衆內犯分遣總兵王進功參將折光秋夾擊之自率舟師偕繼茂搗厦門取浯嶼金門二島錦全斌大敗去遂𠞰滅寧化山賊降偽總兵林國梁進兵八尺門降偽將軍翁求多夜半渡海拔銅山縱火焚賊巢斬首三千三百餘級俘偽侯黃廷等以下三萬餘人錦僅以數十艘遁入臺灣論功加秩正一品蓋三年五月事也九月遣兵𠞰南山鎮海佛潭橋餘賊十月遣兵𠞰茶子畬山賊俘斬無算八閩內地悉平五年卒于官恤贈兵部尚書賜祭葬諡忠襄明年追贈一等男子正宗襲李延夀一名剛阿泰額駙李永芳第三子也少負將才早嵗從征平定南方郡縣以功加都督順治五年任宣府總兵時大同叛鎮薑瓖作亂雲中千里響應人心搖動而五臺受圍尤急延夀伺知賊穴在竇村聲言代州養馬刻期進兵即從峨口出賊不意夜抵竇村自據真武廟遣勇士數人馳馬耀甲於街賊衆驚潰乃縱兵圍𠞰賊黨聞之解五臺圍延夀分兵𠞰捕且招撫安民有黠賊據曹巖寨拒守寨高數百丈四面陡絶延夀督兵環圍之斷其上下途徑夜半絙綴援手而登直造寨門鳴鼓奮攻賊驚潰俱墜崖死遂入邑城曉諭四鄉俾各還本業延夀居官二載旌别淑慝優禮士庶亂後勸墾荒田給牛具人人有更生之慶卒崇祀山西名宦巴顔李永芳第五子也天聰八年襲父爵為三等子崇德六年任參領從征科爾沁有功大軍圍錦州明總督洪承疇以兵十三萬來援駐松山城下巴顔從擊之大破其軍七年擢都統八年九月從鄭親王濟爾哈朗拔中後所前屯衛二城順治元年晉二等子偕都統石廷柱𠞰土冦于昌平尋偕都統葉臣徇直𨽻饒陽河南懷慶山西澤州潞安諸郡邑皆下之二年帥左翼兵與右翼都統李國翰會大將軍和洛會于陜西進𠞰四川三年流冦孫守法賀珍等犯西安巴顔與和洛會夾擊之殲其衆殆盡珍等收餘燼列陳山巔巴顔登山奮擊賊驚竄追敗之濠泗河搜𠞰黑水峪斬守法降其衆二千進勦流冦二隻虎于商州斬萬餘級復偕副將王平等擊延安諸路賊敗之張果老崖攻克其巢馘其渠獲馬騾無算五年晉一等子從討大同叛鎮薑瓖明年攻復渾源州及大同左衛朔州汾州太谷諸郡縣巴顔每臨城輒督左翼兵發巨炮攻之所向皆克八年晉爵至一等伯九年卒年三十有三賜祭葬如例子釋迦保襲爵亦以功名著李日芃遼東人太宗時以生員入內院理事賜人五戶𨽻正藍旗漢軍順治元年授永平府知府三年遷霸州兵備道授䇿州牧張儒秀諭降土賊李振宇等數百人尋擢左僉都御史四年以右副都御史任操江明年降將金聲桓據南昌叛陷九江江左告警日芃督兵扼小孤山磨盤洲檄同知趙廷臣參將汪義遊擊袁誠等迎擊之敗賊于彭澤賊不敢南犯六年裁安徽巡撫命日芃攝其事桐城潛山太湖三縣皆阻山有余尚鑑者以擁立明宗室朱統錡為名糾聲桓餘黨踞山為巢結寨二十餘勢張甚日芃遣副將梁大用等攻克皖澗寨斷其水道分兵四面蹴之連拔飛旗桃園等寨斬統錡尚鑑三縣悉平十年𠞰徽州赤嶺賊斬其渠張惟良十一年偽安西侯張名振犯鎮江瓜州截劫漕艘日芃于鎮江城外檀家洲植樁編筏環以鐵索列炮大江南北岸南岸自鎮江玉圌山北岸自瓜州至三江口並築新堤架木橋以通巡徼分遣哨船更番防禦名振屢為哨卒所敗乃遁入海日芃以勞績纍加兵部尚書太子太保十二年卒諡忠敏李時芳𨽻正藍旗漢軍天聰四年從征有功崇德七年隨圍錦州明兵來犯以二十人禦之復擊吕翁山兵敗之七年隨克塔山杏山遷佐領八年復克中後所前屯衛有功順治元年隨平山西克太原等府還授戶部理事官三年隨破流冦賀珍等於西安珍奔武功復追敗之又同破流冦于商州還授都察院理事官五年隨征山東土冦復曹州纍加世職至三等輕車都尉十年隨平湖南敗偽秦王孫可望於坌路口擢駐防鎮江參領康熙七年授福建興化等處總兵官十一年乞休卒劉仲金𨽻正藍旗漢軍崇德五年隨圍錦州擊敗松山杏山兵復追敵至錦州城敗之六年從擊明吕翁山兵有功七年隨拔塔山杏山八年隨征黑龍江部多俘獲得優賞復隨克中後所前屯衛順治元年加佐領世職任戶部理事官尋隨征山西流冦獲其戰艦五年考滿稱職擢兵部左侍郎六年隨討叛鎮薑瓖于大同復渾源汾州等處七年擢山東臨清等處總兵敘功加世職二等輕車都尉兼一雲騎尉十年調福建右路總兵尋卒張朝璘𨽻正藍旗漢軍父士彥明廣寧守備為巡撫王化貞中軍化貞遁入關士彥來降授三等輕車都尉朝璘襲職崇德七年以佐領從攻登州八年從克中後所前屯衛二城晉世職為二等任兵部理事官順治二年從豫親王多鐸下江南攻克揚州城駐防蘇州擊敗明總兵黃蜚等軍蜚復擁千艘來犯朝璘以舟師迎戰春申浦大敗之四年從恭順王孔有德征明桂王朱由榔于武岡乘夜疾進遇明將曹志建軍擲火毬焚其營志建軍潰復敗偽國公劉承允于夕陽橋承允乃以武岡降由榔走靖州朝璘轉戰黔陽破偽伯張先壁所部五營進克沅州六年從睿親王多爾衮討叛鎮薑瓖於大同復渾源左衛及朔州汾州太谷等城厯官副都統晉爵至一等男纍遷户部侍郎尋奉命巡撫江西時南昌瑞州二府經金聲桓之亂戶口凋耗田多荒落巡按御史笪重光請蠲賦興氓下朝璘議具言二府荒田六十餘萬畝自召墾以來新氓雲集成熟者四十萬未墾者尚二十餘萬若一概徵科必將以荒田之賦飛寄熟田新氓若賦重勢且委之他徙則不特荒者終荒漸至熟者亦荒應如重光言蠲之便得旨報可十五年加兵部尚書十八年擢江西總督康熙二年右布政使王庭請減南昌府屬賦額復下朝璘議朝璘博考江西諸府縣志知南昌袁瑞三府橫徵之弊自陳友諒始友諒以武寧乃其鄉縣故縣賦獨如宋元舊額而他皆倍之明沿其弊未革前撫臣蔡士英按臣吳贊元欲革其弊而是時府縣新定舊志散亡僅據右布政使莊應會所得故牘奏減袁瑞二府賦額未反南昌今庭請減之誠恤民至計疏入遂減六縣一州嵗徵銀十九萬五千餘兩米十四萬九千餘石民甚德之四年裁江西總督乃還京五年復出為福建總督六年以老疾致仕越十餘年卒子聖鐸襲職佟國印𨽻正藍旗漢軍養正從孫也父恆年從養正守鎮江城天命六年中軍陳良䇿叛降明養正恆年皆被執不屈死國印襲職為騎都尉崇德三年授工部副理事官六年圍錦州偕都統石廷柱擊敗吕翁山步卒復從圍明總督洪承疇於松山明兵有逸入髙橋南山臺者攻克殲之七年以炮擊杏山塔山城並下之遷工部理事官從入黃崖口屢敗明兵克邊臺七又敗明牆子嶺守兵八年從攻寧逺克中後所城進前屯衛國印以巨炮擊其城返火傷其頷創甚攻益力卒克之順治元年從入關敘功晉二等輕車都尉三年擢工部右侍郎六年任都察院參政前後論功復三遇恩詔晉爵至三等男十二年以疾致仕康熙十一年卒賜祭葬如例子世德襲世德于康熙時征叛鎮王輔臣于平涼五戰皆捷亦屢著有軍功陳錦錦州人𨽻正藍旗漢軍天聰五年來歸授騎都尉順治元年由內院副理事官授登萊巡撫值州土賊楊威秦尚行結連明總兵劉澤清聚衆為亂錦遣兵進𠞰擒威等斬以徇二年賊渠張廣焚掠掖濰諸邑錦遣兵擊敗之廣復聚衆冦平度州萊州錦分檄登萊諸將授計設伏進擊追賊至徐疃伏發射殪廣盡殲其衆尋擢操江總督與招撫大學士洪承疇並駐江寧誅城中叛黨擊偽瑞昌王朱誼氻敗之尋調浙閩總督𠞰海賊鄭成功破其將軍寨五年六年屢敗海賊鄭彩之衆復福清等二十餘縣七年疏陳進𠞰舟山機宜明年由定關進兵敗賊于璜洋擒偽侯阮進等攻舟山破之九年與海冦鄭成功戰江東橋失利次同安夜宿帳中為賊所刺卒追贈兵部尚書賜祭葬如例佟學文𨽻正藍旗漢軍初任佐領崇德五年太宗親征明錦州學文率兵奮勇攻其城東北諸臺堡皆克之七年隨克中後所前屯衛有功順治八年任本旗參領九年纍加世職三等輕車都尉十一年擢直𨽻宣化等處總兵尋卒佟國器奉天人𨽻正藍旗漢軍順治二年任嘉湖兵備道𠞰撫浙西餘冦撫集瘡痍進浙江按察使時浙江初定叛獄繁多國器平情讞鞫釋枉矜疑全活無算八年任福建布政使十年擢本省巡撫閩自明季戶口散失吏胥那移作姦里民大困國器履畝受糧積困乃蘇至征剿海冦飛芻挽粟刻期猝辦又纍疏陳請撥給淮浙鹽餉協濟軍食簡選將士剿殺賊首劉希亮等招撫安插山冦悉平閩人至今頌其功十二年巡撫南贛劇賊曽拱辰據興國之梅窖坑剽掠吉贛二郡國器遣將討平之長寧黃鄉賊楊興再叛據大帽山國器殲其渠魁招安餘衆又平寧化白扇坑三村黃素禾諸盜由是江廣閩楚之賊略盡先是贛州漕米輸南昌而贛鎮兵食又自南昌撥運舟行灘險人病轉輸國器疏留贛漕以給鎮兵即以南昌饋贛之米抵漕兵民兩便時重兵宿贛日久議興屯田佐軍食國器曰政責因地制宜屯於贛無益遂罷之調撫兩浙熟悉瀕海情形招降偽都督廖明旗𠞰海賊阮六等海疆寧謐卒祀江西浙江名宦佟國鼐奉天人𨽻正藍旗漢軍順治三年隨大軍入閩平定全省遂任巡撫招流亡安反側逺近懷服四年海冦鄭彩等犯福州國鼐率衆擊敗之賊遁去戊子嵗飢土賊糾衆圍城時大軍進討兩廣留守不滿千人國鼐伏兵近郊擒斬渠魁王細君等又令副將王進田勝等𠞰捕餘冦閩南諸境以安時巡按周世科專用酷刑每一獄常延蔓數十家國鼐濟以寬仁多所全活閩人歸心焉卒祀名宦陳維新遼陽人𨽻正藍旗漢軍順治四年任昌平兵備道時渤海盜起株連州境維新力為昭雪民賴保全尋擢浙江右布政使州民為立生祠十年巡撫廣西偽晉王李定國犯桂林維新悉力拒守賊驅象衝小西門入維新亟令將士投木石塞門奪其象賊復穴城西地道實硝黃其中欲轟城維新令掘城內深丈餘戒兵士持火箭併囊土伺穿穴將近即射箭入穴藥發城崩賊多壓死囊土者出土急築須臾成城賊氣沮悉遁去事平念粵境屢罹兵火請蠲十年及十一年租賦以蘇民困民甚德之卒祀廣西名宦田升龍奉天人𨽻正藍旗漢軍順治十四年巡按廣西疏陳粵民窮困狀凡鹽埠營債諸弊立請革除旗辨有強占民産并奪子女者力為禁止又請改省城舊藩邸為貢院國朝粵西賓興自此始張朝珍廣寧人𨽻正藍旗漢軍初任工部啓心郎順治十八年巡撫安徽凡所陳奏皆切中利弊康熙十二年任湖北巡撫時大軍進𠞰滇黔軍務旁午朝珍不遑寢食造戰船以練水師建浮橋以渡兵馬運糧抵蜀不派民夫嵗飢捐賑全活甚衆在楚數年招流亡安舊業絶餽遺禁火耗政有實惠嗣以勞瘁卒於官祀湖廣名宦佟鳯彩遼陽人𨽻正藍旗漢軍順治初由香河知縣屢擢至江西布政使十七年巡撫四川疏請修復都江大堰民田普被其利康熙六年調黔疏言驛站鋪兵及徵糧各事宜俱報可十一年巡撫河南兼理河道疏請修築河工人夫盡出官雇不費民力得旨允行時逆藩吳三桂叛豫省為進𠞰通衢鳯彩於軍行供需遄迅無滯力請罷民間協濟挽輸草豆之役民甚德之十六年卒于官賜祭葬諡勤僖祀河南貴州名宦張鳯儀錦州人𨽻正藍旗漢軍初知江西廣信府當兵燹之後實心撫循大軍入閩取道廣信籌畫供應不以煩民順治四年分巡嶺北叛鎮金聲桓圍贛與巡撫劉武元總兵胡有升竭力守禦城中糧匱諸將或言老弱徒糜軍食不若殺之并食固守鳯儀正色曰諸君欲反耶凡守土以為民也王者之師攻城猶不敢妄殺况守城而屠我民乎武元是其言未幾援至一郡獲全李成龍奉天人𨽻正藍旗漢軍初任涿州知州厯任直𨽻巡道勤于理事聽斷案牘不留再宿鳩工治河勻派里甲民無怨言而事集擢山東布政使安慶巡撫湖廣總督皆有惠政致仕卒祀直𨽻名宦張朝瑞廣寧人𨽻正藍旗漢軍順治五年知河南登封令年少英毅洞悉民隱邑經兵燹土曠民稀招徠流亡多方勸墾凋殘頓蘇以循能擢御史巡按湖北瀕行父老追送百餘里蒞楚後清節益著屬吏皆敬憚之梁繼祖𨽻正藍旗漢軍世居義州康熙元年知五臺縣以敦教化厚風俗為務姦宄革面豪強屏肅巉巗匿盜之數悉皆解散廣立義學貧乏皆教育其中建養濟院存活窮獨鰥寡惠政以次舉行擢江南六安牧再遷平陽守卒五臺士民思其德崇祀名宦喻成龍奉天人𨽻正藍旗漢軍康熙二十六年知江西臨江府時漕米解戶多纍率至破産成龍令悉領於官百姓便之尤鼓舞士林振興學校購經籍數千卷置尊經閣以授學者生平所表章忠孝節義為多佟國弼奉天人𨽻正藍旗漢軍康熙三十九年知江南徐州值嵗飢力請蠲賑出常平倉麥貸飢民明年又飢國弼代為償之河北數遭水患乃築子堰數十里嵗得有秋卒後徐民懷之祀名宦張聖佐遼陽人𨽻正藍旗漢軍康熙四十三年任四川松茂道先是打箭爐蠻作亂官兵進𠞰誅戮數千人積骸盈野聖佐巡邊至其地悉取枯骨埋之居官尤多惠政以愛民為首務後擢至河南巡撫松潘人思其德崇祀四川名宦鑲藍旗漢軍申朝紀遼東人𨽻鑲藍旗漢軍天聰八年任刑部啓心郎崇德元年賜諸臣人戶牲畜準其績之上下第為四等朝紀得優賜順治元年授河南河北道駐懷慶流賊二萬餘來犯殪其渠乘白馬者賊黨悉竄去二年擢江南布政使再擢山西巡撫懲明季驛遞之弊乃請裕經費杜監支毋計糧養馬毋按畝役夫勒石申禁以祛民纍又請定賦役全書俾有司不得私徵苛斂並下部議行時陽城土賊王希堯賈國昌等寧鄉逆民楊春暢等先後以左道倡亂悉捕誅之汾州叛卒李本清任自興據永寧銅柱寨四出剽掠督兵破其寨擒本清自興置諸法部內以寧擢宣大山西總督五年卒于官祀山西名宦劉光弼遼陽人𨽻鑲藍旗漢軍天聰五年任耀州城守尉從圍大凌河城攻克其旁近三臺明監軍參議張春總兵吳襄等來援陳斬其禆將崇德五年任參領從圍錦州攻克吕翁山諸臺屢敗松山杏山援兵錦州既下復以炮攻克塔山杏山兩城及附近臺堡七年擢副都統八年從攻寧逺取前屯衛中後所二城順治元年從入關擊敗流賊李自成偕都統葉臣等征山西攻克太原三年隨端重親王博洛征浙江拔金華進定福建五年授禮部侍郎隨大將軍談泰討江西叛鎮金聲桓復南昌遂留署江西提督事六年平廣昌賊招降偽官三十餘人旋豫實授是時境內賊蜂起多稱明偽官負山為冦時出劫掠光弼遣其部將張自盛洪國玉追勦于湖東大敗之偽總兵董明魁郭承旻等率衆降論功並遇恩詔晉世職至一等輕車都尉十六年以老疾致仕康熙十二年卒賜祭葬如例子顯保襲尚可喜遼東人初為明廣鹿島副將航海來歸授總兵官從征宣化代州俘獲甚衆崇德元年封智順王明年從克皮島七年請以所部𨽻漢軍遂為漢軍鑲藍旗人八年從克中後所前屯衛二城順治元年從入關追擊流賊李自成至望都斬其將谷可成尋從英親王阿濟格道塞上自榆林趨綏德追𠞰自成凡子錦于延安會豫親王多鐸已破潼關定西安可喜遂與英親王追𠞰自成於湖北别將兵徇下鄖陽荆州襄陽諸郡降偽將王光恩苖時化等復合大軍連敗賊東下九江自成走死九宫山乃班師還鎮海城自成死錦與其黨郝搖旗王進才等擁衆數十萬走長沙常德降于明桂王朱由榔分據湖南郡邑三年可喜偕恭順王孔有德懷順王耿仲明往征之連敗錦進才于嶽州長沙進取桂陽擊走搖旗於道州分兵克衡州寶慶武岡諸州郡湖南底定五年凱旋會提督李成棟以廣東叛附由榔六年成棟敗死信豐而由榔諸偽官猶分據廣東諸郡乃改封可喜平南王統師征之進克南雄斬其將楊傑等三十餘人七年克韶州清逺降其將蘇利吳六奇師次廣州成棟子元允與偽總督杜永和偽國公陳邦傅偽伯馬寶等屢以衆拒戰並擊敗之復以問招降偽總兵郝尚久黃應傑於潮州惠州於是廣州勢漸孤而州城三面阻水守者於城外密布炮臺引水繞之三匝猝不可攻又其地炎蒸多雨弓矢解膠久相持未下可喜乃檄江西諸路兵會𠞰既至潛遣人夜決炮臺下水令軍士藉薪徑渡奪炮臺以炮擊城西北隅城圯軍士畢登斬守將范承恩城中兵皆潰追殺潰衆至海濱溺死無算元允竄肇慶永和等竄瓊州奏捷得旨嘉奬八年遣總兵許爾顯徐成功攻克肇慶羅定高雷諸州郡永和亦以瓊州降廣東悉平而流賊張獻忠遣其黨李定國據滇黔以附由榔冦掠廣西九年連陷桂林梧州南康平樂潯州橫州東犯化州吳川可喜遣兵赴援定國引去十一年定國復東犯高州雷州廉州薄肇慶可喜統兵至三水聞定國轉攻新會密授計將士設伏沿江要隘自率精鋭攻定國營定國敗遁伏兵起擊之斬馘過半又遣副都統畢里克圗等追𠞰至橫州所陷郡邑悉復可喜遂留守廣東廣東冦亂初定而土賊間作遙結閩賊鄭成功為沿海郡邑患可喜檄兵𠞰賊渠鄧耀于海康𠞰蕭國隆洪彪周祥等于恩平開平陽春陽江耀走交趾國隆投水死彪祥等悉就擒斬之蓋順治十七年事也聖祖即位詔遷治海民于內地番禺蛋戶周玉者自稱恢粵將軍煽沿海民為亂所至焚掠可喜遣兵擒之康熙三年總兵蘇利以碣石叛躬率兵迎戰海豐陳斬利復碣石衛城十二年疏請歸老遼東方下所司議適逆藩吳三桂以雲南叛詔留鎮如故三桂以逆書誘可喜可喜執其使送京師十三年逆藩耿精忠以福建叛廣西將軍孫延齡以桂林叛可喜獲延齡檄有三藩並變語乃上疏自白並請發師協𠞰詔慰諭之命江西兵助可喜殲賊尋潮州總兵劉進忠叛附精忠可喜令次子之孝討之十四年加封可喜親王授之孝平南大將軍是時簡親王喇布統師出江西為三桂精忠所阻未得達粵粵東土賊乘間竊發可喜檄兵𠞰之屢捷進忠亦屢敗求援精忠不能應乃以潮州附成功子錦錦遣賊萬餘助戰勢猖甚叛鎮祖澤清復踞髙州引其黨連陷雷州廉州及德慶開建電白諸邑可喜連章告急詔趣簡親王速進兵迄未得達明年可喜以冦氛方熾不即撲滅積憂成疾日益篤而三桂驅賊逼肇慶誘其長子之信從逆可喜卧疾弗能制憤甚自縊左右救之蘇遂不起及疾革曰我死必返葬海城魂魄有知猶可給役先帝左右遂服太宗所賜衣而卒年七十有三明年之信悔罪自歸迎大軍入粵敕議可喜恤典諡曰敬二十年之孝奉其喪歸葬海城聖祖以可喜忠誠無二遣內大臣往祭立碑墓道李國翰𨽻鑲藍旗漢軍副將繼學子也襲父三等男世職任侍衛賜號墨爾根天聰三年攻永平有斬獲五年克大凌河九年以善撫降者加二等男世職崇德三年任刑部理事官入邊敗吳三桂軍克濟南還破獲鹿四年進副都統五年圍錦州六年戰松山塔山並在事有功敘功加一等男世職擢都統八年克前屯衛及中後所加世職三等子順治元年入關擊敗流賊李自成國翰進征山西略饒陽與賊帥掃地王遇一戰斬之進援汾陽太原山西既平進征湖廣敗賊于武昌二年征四川破叛鎮賀珍之衆又敗流冦于延安滅流賊張獻忠於西充駐防漢中敘功加一等子世職六年率兵征階州進克蒲城𠞰冝川清澗餘冦更著勇略七年拔府谷九年詔加世職二等伯進征四川破賊合州拔重慶降劉文琇克嘉定州川境略平遂鎮保寧擊斬賊帥王復臣等十年以功進封三等侯十五年進攻遵義破李定國軍遂克開州招四川土司諸酋咸遵約法十七年卒于軍贈太子太保諡敏壯雍正三年入祀賢良祠並命于侯爵三次襲滿時仍襲三等伯乾隆十五年加伯號曰懋烈子桑額海爾圗俱知名巴泰姓金氏𨽻鑲藍旗漢軍天聰五年任二等侍衛從圍大凌河城明兵自錦州趨授侍衛尼雅漢迎戰中創墮馬巴泰馳入陳援之出六年從征大同多斬馘崇德九年從戰沙河楊村三屯營並有功六年從攻錦州敗明總督洪承疇軍比斂兵還營巴泰為殿敵自後躡之將及巴泰還戰面中流矢戰益力揮刃斬其驍將一敵乃卻太宗嘉其善戰授雲騎尉世職尋擢一等侍衛順治二年晉世職為騎都尉尋遇恩詔加一雲騎尉以不阿睿親王削世職世祖親政復之晉二等輕車都尉十五年進散秩大臣遷內大臣康熙三年擢國史院大學士晉爵三等男六年充纂修世祖實録總裁官時鰲拜輔政惡巴泰不附已既搆陷同官蘇克薩哈集衆定讞慮巴泰異議屏不與聞七年以疾解職八年鰲拜獲罪起祕書院大學士仍充實録總裁官九年改中和殿大學士兼吏部尚書晉爵一等子十一年實録成加太子太傅十六年七月以老致仕賜以所御冠服十九年復起為都統二十三年固請解職命以內大臣與朝請二十九年卒賜祭葬諡文恪子蘇赫襲朱延慶𨽻鑲藍旗漢軍繼父任參領延慶兼通滿漢文在文館辦事天聰八年十二月太宗詔羣臣各抒所見延慶疏陳時政並薦陳極新申朝紀太宗可其奏皆擢用之順治二年平定江南授兩淮鹽法道尋轉浙江嘉湖道時浙省兵燹之餘草澤尚多伏莽延慶招徠撫循多惠政五年擢江西巡撫疏革加派免羡餘絶株連招集流亡修造漕艘七年卒浙江人思其德崇祀名宦幼子萬夀仕至廣西梧州守有政聲高鳴鐘𨽻鑲藍旗漢軍初任佐領崇德三年隨征明有功八年從攻克明前屯衛中後所順治元年隨平山西克太原復擊敗流賊餘兵三年從征湖廣五年從征大同叛鎮薑瓖皆有戰功纍加世職二等輕車都尉官江南提督子永運于康熙十三年以從征逆藩吳三桂戰沒于長沙周召南遼陽人𨽻鑲藍旗漢軍順治八年知山西汾州府時寇亂初定一以招徠綏輯為務而武斷舞文為民害者懲治不少貸下令屬邑徭賦有當均當豁者悉申請慈祥愷悌屬謁憲司為民請命民甚德之張學聖奉天人𨽻鑲藍旗漢軍順治中知江南徽州府與徽寧道張文衡總兵張天祿皆輯兵愛民深得人心後皆遷擢去時有挽不住三張弓之謠今祀徽州名宦馬之先奉天人𨽻鑲藍旗漢軍順治九年以右副都御史巡撫陜西治尚簡靜不事紛更十四年晉兵部尚書總制三邊之先練邊事開屯田訓士伍皆有法卒於官秦民為罷市賜祭葬諡勤僖陜人思其德請祀名宦王業興奉天人𨽻鑲藍旗漢軍順治中知江南廬州府勤敏節儉頗著清操值海氛肆逆逼境業興率家丁及營卒登陴捍禦屢挫賊鋒州得無事在郡十三年勸課農桑減省刑獄民咸德之李天浴奉天人𨽻鑲藍旗漢軍厯官郎中順治六年詔廷臣條陳規取滇黔事宜天浴力主三路進兵後果如所䇿奏功康熙七年任雲南巡撫廉明勤慎屬吏凛然無犯法者時吳三桂奏請徙滇民天浴力疏止之尋以父憂去起為山東巡撫卒於官許嗣興開原人𨽻鑲藍旗漢軍康熙十一年知山西蒲州操守廉潔葺廟學復河中書院嚴立課程文風蔚起徵收錢糧勸諭有法豪猾為民害者密加防緝重法究懲羣匪斂迹閭閻晏如時有檄民運糧西安之役嗣興請寬民力運至陜界而止十三年逆藩吳三桂反川陜煽亂大軍所過居民震動蒲尤衝衢嗣興彈壓安輯客兵過境者無敢肆民賴以安纍擢湖廣按察使遇事執法不撓有長夀寺妖僧石濂者以邪術傾動一時又交通安南國王得其餽贈僣侈踰分嗣興惡其惑衆因事拘訊重杖遣戍士論快之嗣擢福建巡撫卒後蒲人思之不諼雍正元年祀本州名宦寧維邦奉天人𨽻鑲藍旗漢軍康熙二十一年授江西德化知縣行次潛山聞征滇回師將過九江維邦疾馳赴任軍士有射殺人者走匿舟中維邦廉得之請置於法徇諸通市自是過者皆肅然秋毫無犯先是征糧責成里長姦滑乘機侵蝕弊端日滋維邦勒碑永禁民困始蘇欽定盛京通志卷八十
