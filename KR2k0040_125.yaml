body:
  text: 國朝藝文七詩二七言古體欽定四庫全書欽定盛京通志卷一百二十一國朝藝文七詩二七言古體松山恭紀康熙壬戌張玉書古戍春深曉飛霰馬首雲低擁征傳松杏山經百戰餘舊聞厯厯眼中見坡陀隱伏雉堞頽層巒拔地何崔嵬彎弓帶甲十三萬曽此空弮委塵埃紅羅山頭歸路絶青海嶂邊戰流血角聲入雲錦水枯湘纍迎降氣嗚咽脫囚釋縛居上筵豐貂翠幕鵲印懸南冠稽首紛雨泣効死誓日旌門前開天神武渺衆慮四海英雄歸駕馭衮衮將相圖丹青奕奕驊騮競騫翥於今亭堠生蓬蕭平蕪沙軟狐兎驕往事浸尋四十載共驅耕犢來春樵想像山城仗黄鉞虎帳經營幾歲月萬年形勝收雄闗千里邊雲接溟渤朝陵兩度輦路平百靈跂翼隨行旌經過鐵馬金戈地時作瀟瀟風雨聲薩爾滸恭紀康熙壬戌張玉書長河百折徑鬱盤遥山夾岸飛沙寒山隈河畔野火出落落茅舍依林端舍旁老叟辭樸蓛戰塲指㸃猶在目荒城入野生青燐夾路於今埋白鏃當年敵騎明鉤膺梯衝雜㳫雲氣騰四部軍來躒塞草千尋甲度蹂層冰左師結陳稱王杜吉林山頭横萬弩睿謀策勝須攻瑖轍亂旋看散如雨崖邊逐北黄雲愁戰骨摠入渾河流周麾一呼三路覆鼓聲再竭孤軍收就中上將綎居首援亡矢絶真束手耳食猶傳劒槊名輿屍竟等螻蟈朽乃知天戈所向同摧枯迅掃萬騎風雷驅自此闗門拓土宇中原指顧歸乾符廢壘茫茫棲白鶻沙場脈脈照新月遥岑木葉春隂高匝地英風吹未歇杏山紀事康熙戊寅塞爾赫杏山山上石屼􅝝杏山山下水㵳泬山前山後沙土赤疑是當年覆軍血惜昔將軍未上馬羽檄交馳遍天下衆號十萬出闗來遮日旌旗滿原野畫鼓三通不交戰觱篥聲中軌先亂二千鐵騎儼丈人大箭長弓一當萬霜摧敗葉草偃風血流染海波濤紅馬前不誅長平卒祗今竹帛褒元功吁嗟推轂竟何補俘將解溥拜真主有人東望尚招魂衣冠哭葬燕山土松山紀事康熙戊寅塞爾赫錦州城南多㟪􅕲路入坡隴低復起行行曠望見廣原一掌平開渾如砥東南突屼聳高阜行人指說松山是松山之上一松無風過濤聲清入耳此山得名不記年半土半石形迤邐漢魏北燕遼金元有明至今一彈指人民城郭凡幾更此山依舊蒼然峙我來山下訪舊事當年戰壘無遺址緬想崇徳五六年神兵禦敵渡遼水彎弧洞鐵氣如虹俯視將軍埒羊豕千騎轉戰杏山前路隔松山十八里戰鼓驚天海浪翻百萬覆軍强半死凱旋牧馬瀋水陽天助龍飛良有以今日田園古戰場萬縷炊烟墟落裏沈吟懷古向秋風殘照松山凝暮紫聖駕巡行東國展謁祖陵恭紀乾隆癸亥裘曰修混同鴨緑從西來入雲長白高崔嵬千年王氣此間聚鬱葱一望誠佳哉我皇法祖懷遺烈宴坐深宫戒無逸上陵舊制古所稱霓旌翠斾凌秋發當時烈祖真天人指揮六合驅烟塵受符上帝主中夏得國最正古莫倫經營締造詒孫子繼統還思開國始守成創業無易難業業兢兢一而已我皇念此永不忘櫛風沐雨敢暇康寢園松栢紛在望親奉玉食承蒸嘗仁皇御宇六十載兩謁珠邱涉山海昔年父老能指陳馳道如弦至今在石門鐵嶺凡幾重地靈蜿蜒神所鍾朝霞逺照松花水旭影迴依木葉峯宛然聖祖經行處又向昇平開輦路川原草木盡忻懽承恩一一迎天步高山天作語可徴扶輿磅礴帝業興龍盤虎踞何繚繞鸞翔鳳翥皆飛騰風雲吐吞瞰赤縣岡巒重叠環丹陵齊州坐看似眉列紫氛萬里祥光凝我朝根本推東國形家共識真人宅天門九扇高幢幢向背隂陽侔翕闢武功文徳仰璇題左右兩坊名建中崇政殿名標銀額東西瀍洛未足竒直過周年書八百河山表裏四望同從容周覽愜睿衷諮詢故老流闓恵憑弔往蹟欽英風邠岐遺俗頌樂土沛豐高會歌舊宫維時天清玉宇淨滿輪皓月秋方中爰有名王謹稽首四十八部分左右咸襲冠帶通威儀殿頭拜舞身行酒我皇萬歲福禄昌臣守藩籬効奔走天顏一笑手引巵更進慈闈前上夀羽林十二拱御營三千組練耀日明時清未可弛武備習勞肄射還分棚躬擐介胄臨晨出自總戎兵越塞行山中早已得狐兎草間不敢潛鼯鼪聖主能文復能武共道雄姿似皇祖七校齊瞻上將旗三驅肅聴軍門鼓移時罷獵解長圍鐵衣靜處無風雨壯士垂鞭相和歌昇平雅樂仍堪譜兩京並建道匪賒而今中外共一家東西南朔極海宇版圖逺訖天之涯師旅更奏迎鑾曲告廟歸時忻飲福郊塍繡錯雪初飛為兆豐亨成百榖上天眷顧錫萬年持盈保㤗猶乾乾祖宗徳澤在億兆深入肺腑如銘鐫不識不知帝則順一遊一豫皇仁宣宸心黙契垂裳化臣軄勤思補衮篇聖駕東巡盛京恭謁祖陵大禮慶成詩栢梁體一百韻癸亥于敏中皇帝仁孝苞虞唐御宇八載大化翔重熙累洽樂時康憲天出治敷宏綱湛恩汪濊愷澤洋聲教四訖暨要荒西至虞淵東扶桑北極祝栗南越裳陸讋水慄通梯航神人和洽治馨香百年禮樂際光昌紹庭繼序思不忘緬維聖祖孝治彰丹陵三至奉蒸嘗我皇繩武由舊章乃東巡狩用孝饗叶孟秋七月歲昭陽吉日維戊辰維良天行星陳法駕張龍輈華轙下繫閭鸞聲噦噦鈴鉠鉠前驅天畢後太常招摇右建左欃槍鉤陳華葢居中央八神警蹕殷軍裝虎賁魚麗相頡頏清塵肅墜爰啓行聖人孝養徳莫量金根祗奉承懽慶郊原雨過風微涼詔發内府除道梁民力不役農無妨西成將告田既臧禾麻黍稷菽稻粱錦甽錯繡雲塍黄乗輿周覽慰所望塞垣萬仞鞏金湯時平不用修邊防布徳示禮列九疆龍堆沙磧馳康莊穹廬之長㫋裘羌樹頜蛾伏羅道傍就瞻雲日稱聖皇四十八部如堵牆金錢錫予億萬强爰整旌斾􅊩陪京叶高山周宅殷土芒長白盤鬱鍾興王混同鴨緑流湯湯天貽朱果遡發祥積徳累葉撫萬方橋山鼎峙弓劒藏巍然啓運瞻崇岡天柱隆業倚穹蒼肇禋大祀升蕭薌粢盛豐潔鬱鬯芳鼐鼎及鼒徂牛羊工祝致告薦琮璜睠懷祖澤感露霜精意合漠思彷徨天子穆穆誠敬將百辟卿士職趨蹌禮成受嘏福禄穰繄昔望散實劻勷開國元祀惇功宗叶舊勞追念酬椒漿山川望秩咸孔明叶王在在鎬開明堂遂御崇政臨巖廊既備乃奏聲喤喤世徳新樂同咸英叶曈曨旭日奉御牀羣臣上夀稱兕觥叶式燕且喜歌承筐朝鮮職貢冠佩蹡蓼蕭露湛清瀼瀼詔書五色銜鳳凰酬庸紀績加宗潢惟百執事從贊襄賜爵一級恩徳􅗈大賚禁衛兼軍廂園陵守䕶勞勩償存問耆老資衣糧蠲租肆𤯝慶胥匡載簡車馬神武揚七萃八校騰龍驤羽獵何必誇長楊念兹遼瀋惟帝鄉製作鉅賦輝琳瑯邠岐王業述精詳神臯靈物探微茫睿思泉湧富縹緗研京鍊都奚足當小臣珥筆謹拜颺詠神聖徳紀珠囊猗歟聖主覲耿光令聞令望如珪璋自朝日昃永不遑於億萬歲庸天貺叶卜年卜世基靈長聖駕東巡盛京恭謁祖陵大禮慶成詩癸亥金甡維清緝熙宣重光帝握金鏡開珠囊文謨武烈崇覲揚紹聞繼序無時忘七朝觀徳嚴蒸嘗鼎湖龍氣隨軒黄厥初生民徴發祥坤輿靈脈蟠東方高山天作横大荒氣攝遼海恢全疆作豐遷鎬王業昌留都近接珠邱旁千秋弓劒橋山藏遹追來孝惟皇王感物増思懷秋霜睠言舊里沛與豐乗輿親奉慈寧宫厯吉日兮以東行薦新承糦豐年穰嘉禾委積連坻京郊原初築圃為場如弦馳道遥相望千乗萬騎龍騰驤鸞旗翠葢風低昂疎林掩映丹青裝登臨引興摛奎章行圍縱獠歲有常三田秋獮禮固當雲羅天畢紛舒張白羽㨗發攢飛蝱霜蹄撇烈殷雷硠百禽㥄遽走且僵他他藉藉阬谷量三驅弭節母胥戕擇取上殺除面傷用儲乾豆烹羶薌威弧照野狼收芒絶幕萬里皆康莊淵旋雲被臨神鄉佳哉王氣鬱葱葱都廣之野務隅陽神靈陟降憑元堂肇稱殷禮行升香延帷接枑羅斗匡季秋之月日在房晨瞻鳥注垂中央朱霞盪海明摶桑金蜩列侍齊冠裳駿奔祗奉湯孫將清酤既載調和羮九州珍錯陳縱横歆馨顧徳神來饗澄心凝思亶佪徨几筵如在餘悽愴洪鑪盪滌提天綱河山風雨勞斧斨靈旗石馬爭飛颺松楸萬古瞻龍興緬仰祖徳何靈長念兹繩武敢不蘉禮儀告備旋天墉高臨崇政啓南端羣工蹈舞前稱慶玉巵初進萬年觴雲天徳施蕭露瀼錫宴親舊隆異粻鯢齒鮐背駢趨蹌醉酒飽徳詠太平皇懽既浹陳縹緗闡揚光烈窮形容盛京一賦垂琳瑯世徳舞奏音鏘洋三侯裁足羣兒倡慶成大禮絲綸降恩覃中外熙春暘文徳既昭武節彰選徒大閱傳牙璋颷駴雲迅俄方攘天行星陳高頡䀪敦營七萃環武剛黄龍大牙常處中申嚴號令昭戎經虎拜曰召鷹揚姜武夫併是干城良教達禁成節制嚴如飛如翰如漢江洗兵蚤已挽銀潢藏險於順威靡亢元莬真畨暨樂浪東震日域咸稽顙保塞屬國兹益恭事畢功宏澤沛滂逶迤仙仗周迴翔山川望秩酬靈貺歸格祖禰循寳城闗輔絡繹馳騎迎翠華至喜鈴鉠鉠景雲麗色開天閶先問起居朝壽康遂升前殿臨濟將雕輦止蹕還東廂聲明文物増輝煌昔始往矣菊未英今來照水收虹梁征途回逺時節更師無疲露情徜徉先期規畫罔不臧日月垂照無逺障睿謀神運非贊襄曠典具舉殊安詳瑶圖萬葉流芬芳聖徳廣大彌穹蒼敬宗尊祖凝羮牆展親錫類榮宗祊發揚孝治光昭明春温秋肅恩威雙聲靈赫濯踰溟滄坐見九譯來梯航堯仁舜孝孚萬邦小臣何幸親虞唐恭和御製栁條邊元韻甲戌劉綸舄奕黄圖肇遼海海山襟帶真無外一綫縁邊折栁條版鍤不煩人力憊四十八部屏藩多𤓰期戍卒尠經過徑如設枑圍設蕞循牆恭謹當如何吉行五十日記里伊屯英峩奚翅蓰逺勢兼聞控句麗在徳不在險明矣諏辰軷舍爰自東元莬古郡遥相通郁蔥佳氣攬前斾新豐雞犬將毋同絶域梯航况時有巖疆不藉金湯守敲鐙齊吟出塞篇鞭絲青度闗門栁恭和御製松花江捕魚元韻甲戌劉綸山圍水獵皆壯觀松花淨緑開江烟䱷師豈習獸臣伎勢如赤馬操呉船凡鱗𤨏碎那足校倚舷抛擲紛鯉鰱須臾網定义亦止大波突起何軒軒巨魚充貢送河伯餘者婢媵更僕難吞鈎掣纜俟力盡任公蹲海或庶焉譬如軼材一獲雋風毛雨血空繽繙歸來鄉夢落淞泖鳴榔夜聴扁舟寒恭和御製採珠行元韻甲戌劉綸天地沆瀣清奫淪光㴠璣斗潛效珍從來至寳恥魚目肻隨蜃蛤霾荒村吉林地踞海壖勝龍宫蛟室難具論一江瀠洄作璇折分形滿月珠胎真御檻臨流試一採映山黄㡌朝曦新健丁縁索快深探松醪恩意歡沾脣取玉無多石去璞揀金幾許砂披銀老蚌出川媚乍獻殻積頑礦皆枯皴因知象罔葢踰道勤求赤水庸辭辛聖文璀璨照百琲敢持瓦礫希圓神恭和御製窩集行元韻甲戌劉綸一髪無崇岡一掌無大陸美哉洵吉林得地皆灌木木生太古閱世頻有若鼻祖見耳孫號為窩集鉅細别兹山絶特尤離羣傍厓誰闢土囊口巨靈前驅五丁後宻䕃翩疑鸞鵠停樛枝痩似蛟虵走爾時霜氣渲紅青倪黄小稿無能名又如擁塗萬斿纛靈威䕶輦良可徴清音上度迦陵鳥遥光下發岱輿草脫葉羅疎訝雨花馬頭亂㸃人爭道虗翠沾衣不知處薝葡優曇本無樹兩丸日月東復西溟濛一炁惟仙霧春秋八千孰推此衆香國擬無遮比不材木植何有鄉大海微漚能著幾就中松塔多離竒巍巍七級知誰為盡斫根柯求粟粒落實棄材奚取斯出山共詫鬚眉清袖中謖謖天風聲佳境耳食苦難寫齷齪空慚拾橡行恭和御製栁條邊元韻甲戌汪由敦闗左帶江襟溟海王迹聲靈訖無外郊圻申畫示藩維休飬承平息勞憊邉門縈繞栁條多疎如列柵眉纔過蒸土鑿山恐未固立木所禦能幾何自北而東幾千里九邊雄要什且蓰重門擊柝豈其然聖有金城斯是矣鸞旗行秋指大東伊屯詄蕩吉林通林開陸海見窝集源溯星潢接混同笑