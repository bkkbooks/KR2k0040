今來見馬松楸間血汗淋漓石上殷二馬久巳化龍去令人慨慕思艱難自古傳聞照夜白何如二馬生顔色髣髴兩龍天上行來往風雲在瞬息恭和御製昭陵石馬歌用舊作趙霖畫唐太宗六馬圖歌韻元韻戊戌梁國治曹霸畫馬昔奉詔引以杜甫詩雙妙丹青那比刻琢工皮毛肉骨筯惟肖昭陵石馬夫何師乃貌大白小白為霜空電影已飛掣風鬃霧鬛猶今垂二馬空羣經品第天厩兩龍左右置千朝芻豆飽䝉恩萬里風沙輕赴義當年控御出驚人旗鼓刀槍毎戰親歸來洗刷仍全體百戰百勝猶純臣二馬功高理可斷壁壘交攢心不亂心如此石轉如風可以濟時兼出難試躋唐宗六馬間書圖毎毎愁斑殷安貞踰險頌無繹二馬遇主誠艱難陵前鑿石雙雙白同力同心復同色千秋屹立生氣存齒長無煩嗟荀息恭和御製觀大凌河養息牧元韻戊戌謝墉房星夜朗天閑盛西極夐超漢時詠徳至山陵澤馬來見孝經援神契徳勤水土駃騠應見瑞應圖自餘羣驥良且多蕭蕭聲滿湯湯河既佶既同亦既阜毛色骨相齊分科驪黄牝牡非有異牧圉供職謹飼餧神臯沃衍聴嘶風太平何有疆場事秋郊排立遵河濱騤騤並堪圖畫陳千乗萬騎齊足力更畨三物掌校人教駣攻駒馴櫪皁豐草甘泉恣夙飽唐代東封安足云吉日車攻歸有道恭和御製昭陵石馬歌用舊作趙霖畫唐太宗六馬圖歌韻元韻戊戌謝墉乗龍御天天所詔神駒佐命特超妙鏤石寫形駝象間凛然生氣儼然肖古者軒帝紀雲師熊羆貔貅教戰為飛黄服皁征不譓鼎湖仙去龍髯垂文皇名馬定以第太乙况詎渥洼置與帝一心成大功生則効忠死殉義陵前排仗宛如人屹立相向兩相親輝發葉赫今安在此馬足愧攜貳臣我皇拓疆神獨斷運籌削定準回亂哈薩克馬供吉行斑如緬昔平屯難敬溯天聰崇徳間躬親百戰汗血殷馬上得豈馬上治取之甚易守之難恭述復班師太宗垂得燕京諭語姬周弔伐旗揮白偉哉天驥同名色瞻仰松楸紹武功華山之陽大蕃息恭和御製觀大凌河養息牧元韻戊戌錢汝誠周詩牧馬坰野盛三千騋牝風人詠漢求天馬遣貳師絶域何曽善者應漢使至大宛求良馬多匿其善者不肻與貞觀七十萬最多分坊析監還瀕河唐張萬歲為太僕置八坊於岐豳涇寧間分四十八監後復析八監於河西豐曠之地少陵止云四十萬竟與兵制相殊科唐兵制稱自貞觀至麟徳四十年間馬七十萬六千匹而杜甫天育驃騎歌云當時四十萬匹馬張公嘆其材盡下較史志所載已少三十萬矣我朝牧政特超異上都監澤善飼餧即看大凌廣牧場敬緬當年開創事房星下燭瀋野濱雲屯錦錯以類陳各隨孶乳自馴擾轡勒無藉司圉人縑絹空嗤回鶻皁唐以縑絹數十匹易一馬徒受回鶻之欺今則市哈薩克馬毎匹約不過三四金較内地馬價㢘數倍為亘古所未有募耕芻牧何能飽唐募民耕以供飼馬芻秣常不足載賡樂府試呈材宛駒早見從東道恭和御製渡句驪河元韻戊戌錢汝誠遼東之東高句驪後漢書高句驪在遼東之東大遼之水近在陪京西句驪河在注盛京城西一百里水經作大遼水長虹宛宛不踏泥向之沮洳今莊逵緬昔叠道利行師承平一再築在兹太祖初定瀋陽命修除叠道自瀋陽至廣寧一百二十里平坦如砥師旅出入便之叠道外仍多葑泥康熙雍正間繼加修築遂成坦道六龍展謁秋清時潭澄潦盡仍如斯甲戌九月河詩御製渡句驪有潦盡寒潭碧水澄句張軍其南潛北移典午何事詭譎為貞觀之治七徳懿叶東征之役安足提恭和御製昭陵石馬歌用舊作趙霖畫唐太宗六馬圖歌韻元韻戊戌錢汝誠時乗御龍天錫詔特降房星生二妙英風矯矯駿骨張表闕麒麟貌能肖石工斵石勝畫師天閑萬匹能爾為即今對立風雲際屹然相向雄姿垂層霄立仗自次第一心成功此位置東馳高麗為布仁崇徳元年統師太宗親征朝鮮克江華島獲其王妃王子國王李倧乞降太宗宥其前罪倧乃於三田渡立碑以紀徳馬恩西伐燕京與宣義馬中殊遇依天人左之右之奉御親或五十里或百里日行百太宗體豐鎧重御小白里御大白日行五十里策功應亞諸勲臣六馬圖開誇畫斷片石長安已零亂汗趨空訝說神靈龍起猶聞遭蹇難何如兩白在行間霜蹄飛踏流沫殷驍騰百戰久無敵聮翩雙俊尤為難山長白兮石亦白萬古凡馬無顔色松山一戰放馬還松山之戰破明兵十三萬我而朝萬年丕基皆定於此自是後養時晦太宗意不在即取明遵葢征討之日較少矣牧馬於今自生息聖駕四謁祖陵禮成恭紀盛京篇有序癸夘彭元瑞皇帝東巡於盛京恭謁三陵葢上儀於是四舉矣是舉也上以宣列祖之重光下以萃萬國之壹志示理大物博明備之典應久道成化㬅羡之期求之古道實維希矣夫宅鎬遹成燕翼涉渭及祀豕匏皇矣八章恢戰功豳風七月臚民俗東都之會同苗狩時周之喬嶽翕河皆追頌舊京用事巡嵗然而武祭畢陌僅見汲書康朝鄷宫獨紀魯傳厥典有間其詩闕如自四始義遥七言代作揚扢介乎古律鋪敘宣於長言雖無雅頌詩人能賦之材幸逢典謨古帝未有之盛敢播金石庶附壤衢迺作盛京篇其詞曰日月開皇極風雲肇丕基纘緒擴駿烈展謁昭鴻儀駿烈鴻儀隆萬古作邦作對以篤祜乾苞坤絡拱陪都祖徳宗功造天府慶基俄朶里祥源闥門潭白山千仞峻黑水萬派涵四塔環向共三闗控制兼不勞東澗西瀍卜毋縱龍蟠虎踞談興京滋大東京建遼陽甫定瀋陽奠羣臣謀國紛一一神祖定都超萬萬西壓明畿掌上螺南帶高麗井中波北征䝉古不旬日畏威懷徳服者多有山可樵木可室宣獸於原漁於河椅桐梓漆衛揆日鰷鱨鰋鱧周作歌神臯隩區物豐殖天道地寳人㑹和從兹會極歸有極億萬斯年規帝室三殿當陽南北嚮十亭議政左右翼大政殿開宵旰勤崇謨閣逈典章集武有七徳實勝標政聴五聲諫木立興朝之制鉅典輝聖人之心儉徳依土堦茅茨淮南美萬户千門方朔譏班固練都說夸侈張衡研京語依韋保塞限他邦晉陽祗舊宅金陵飛燕入沛上逐鹿得惟有周家鎬與豐文謨武烈事差同畢竟舊侯非敵國未能義取由武功三代而來論都者耿光大烈疇比崇累代興王之地若宋之保塞陵寢入于大金固不足言唐之晉陽僅為上府明之金陵非起事之地俄即罹兵漢之豐沛則齊民無寸土且後不為京惟周豐鎬為文武攸宅與我明朝差類但以商諸侯征誅得天下非如我與為敵國終以義取即論盛京實三代以來陪都所莫並皇哉定鼎隆赫矣留都建五雲隔珠邱四孟饗原殿聖御閱六旬躬詣肅三薦文孫光前猷盛事荅天眷昭陽臨初冊載週著雍舉後五年遒爰涓大丙和鑾駕申命太常吉日諏陵令汎掃潔禮官誓戒修檀宻闗前縣興桓塞外州巻阿留避暑清蹕啓高秋漸入栁條邊行臨松花水舊社近枌榆帝鄉敬桑梓嵗豐賽斐足梁麥兒大鈕勘善弧矢拉哈泥草乗屋亟額林庋楣制器始雪中法喇知牛健江上威呼得魚美松實作塔七寳裝蓡形成人五葉起葱葱鬱鬱何佳哉翹首三陵王氣開九捧凝神陪劒佩三升告侑列尊罍水木有源通志氣羮墻如慕感栽培二萬輿圖今式擴十三戎甲昔初來明堂實政頒巡狩大號渙嵗租賜以全莊糧蠲其半冠帶襲周盟雲天需鎬宴輦前嘉頒賚宫帛仗外老民錫官絹圜扉草滿拜雞竿黌舍芹香廣鶚薦兵固執挺糧有差官以清塵爵無算班分䝉古御筵張額捧句驪宸筆絢禮行顯祐景祐親望於遼河渾河徧北海北鎮新奉祠功王功臣優遣奠恩誼布而濩諭詞周且篤示儉思擷衣申訓戒改服鹿角制椅存手澤霞綳觀書因舊俗家風長在使士射國語毋忘為官朂君舉必書皆大端事豫則立由幾先圜壇九奏南郊妥方澤三成夏祭䖍清寧宫祀神如在徳盛門移廟孔安冊玉寶璆尊黼凡戰圖潢牒貯瑶編出帑逾百萬修城凡十八役不聞鼓鼛民咸樂畚鍤隳垣剗堞溯功成山高水清久太平地當馳道屹壯觀天與勝勢環神京高閣成新搆文館宏前躅東都邁麗則西京軼天禄溯從一水淵源津藏將四庫三萬六侍臣排帙堆豁山天子披書秉糠燭我皇文教被無涯又成四集萬首詩朝鮮使者能賡韻敖漢先生解屬辭方看攬轡已篇成考文訂古聖人情天雲上下澄海句遼水東西枸栁程姜女祠稽杞梁妄夷齊廟辨墨胎精罪功局定熊廷弼門户戒申王化貞戰壘可綱褒諡顯石坊大夀貳臣驚羣仰聖言大洪惟祖徳宣後所過前所松山接杏山雨中降將出闗外勝兵還風雷舊說龍方戰雲日今瞻馬既閑吟來用誌前勲集到此方知王業艱於鑠王師薩爾滸天威所及殱劉杜鳥蛇涿鹿儷軒轅虎豹昆陽陋光武高文典冊垂無極大字碑版照終古黻冕禹徳逺戎衣周緒鴻三成開滿月二白立嘶風高皇劒莫匹昭陵馬不同設衣陳器斯為孝創業守成各有道如見經綸櫛沐心敬為子孫臣庶告已週廣甸巡言旋巖闗路東陵謁孝孫奉先格藝祖前殿大朝㑹羣臣賀拜舞鑾啓方過萬壽節蹕迴正及小春月五千里路鼓車記六十日程郵籖列天顔有喜増晬盎庶政必親勤批荅古稀天子真無疆維乾之健兊以說情深而文明禮備且樂宣臣幸際昌會敬賦盛京篇欽定盛京通志卷一百二十一
