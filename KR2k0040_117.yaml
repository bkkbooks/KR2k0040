body:
  text: 厯朝藝文五記欽定四庫全書欽定盛京通志巻一百十三厯朝藝文五記遼右書院記明賀欽𢎞治癸丑秋南燕繡衣樊公按治東土以教育人材為首務乃選河東西諸生之優等者庠各有差建遼左遼右二書院分處之讀書其中以相切磨延學行老成師儒主之復命官典薪米供億之費院額之扁廵撫都憲河南張公九雲之所署也樊公臨古宜枉顧病夫請為遼右書院記欲成諸生而久斯院辭以迂鄙不足辱命繼而托分守叅戎金䑓王公彦箴懇求不己乃為一言夫古今之道一而古今之學不能一葢古之學者將以明此道而體于身足乎已而及乎物非若今之學者務誦讀工組織要聲光徼利禄而已此義利正邪之分而治道汚隆生民休戚之所係焉者予不能茍同流俗謹取紫陽文公之教於白鹿者躬勉以訓子弟暨館下之生時人不迂濶之者鮮矣今樊公之記斯院乃不我迂而惓惓是托公其有意於法古乎則亦遵文公之規而已葢其所示立教之目為學之叙修身處事接物之要炳然具在至所謂誠明两進敬義偕立其丁寜之意愈益深切諸生由是以進髙乃志正乃學實乃功以祛習俗趨利之鄙陋吾知徳成而才富體立而用行進足以匡吾君而澤吾民退足以化其鄉而善其俗夫然後古聖賢垂教之意可以不悖朝廷育才之心可以無負而樊公之建斯院與夫聳㬰而成之者亦皆有光于無窮矣嗟夫此固諸生之所以成而斯院之所以久者與書曰事不師古以克永世匪説攸聞故敢以是為諸生勸敢以是為将來告樊公名祉字介福丁未進士是役也提調者參戎王公銘督工則都閫魯公勲云史氏倚廬記明賀欽史氏祖山東東昌聊城人今為古宜金紫巨家君名璠字公玉昭信校尉百戸公諱鑌之三子也生而剛明自好雅重鄉里雖處廛市而衣冠言動簡飭不少慢浮薄者或誚之曰乃亦士夫態耶君惟自信而己既而遣其仲子册從病夫逰病夫教人不能專事口語文辭以取青紫必首以文公小學使人讀而躬行之迂之者恒多史公乃能于其家亦取小學學焉誚之者亦甚而君子自信益篤𢎞治五年仲冬母安人劉以夀終哀毁如禮乃于中門之外縳數椽為倚廬居焉絶肉酒逺帷薄且未嘗一造親故之側以終䘮制又常以其自制居第讓其季焉是其行誼今之士夫毎每難之矧流俗之浮薄者耶嗟乎禮教之壊久矣滔滔者固無足言而仁人孝子之間出者復徃徃舍神靈而守塜墓孝有餘而學不足守先王中制者希矣故記史君之行于其廬以世其子若孫且以告吾之鄉人北鎮廟記明賀欽舜即位分冀醫無閭之地為幽州于時分州十二各封一山以為一州之鎮醫無閭山即幽州之鎮也按書傳及職方氏俱作無後變無為巫考之廣寜志云山在城西五里廟在山南今驗地里城西五里無山又云清安寺即觀音閣在閭山内去城十二里今閣入山僅二里許則是山距城十里與今地里歩數正合而志云五里者傳冩之訛也今廟在山之陽去山五里四分里之一距城三里四分里之三唐開元中封山神為廣寜公金加封為王元以閭山宻近邦畿大徳間加封貞徳字嵗祀與嶽凟同元季值兵燹止遺正殿三間我太祖髙皇帝洪武二十三年於寢田之南建瓦屋三間左右司各一間别于廟東建宰牲亭神庫神厨各三間繚以垣墻春秋命有司致祭太宗文皇帝永樂十九年特勅所司撤其舊而創搆前殿五間中殿三間後殿七間殿前又搆御香殿五間以貯朝廷之䧏香通為一臺髙丈餘周鑿白石為欄後殿前左右各建殿五間前殿前東西各建左右司十一間又建神馬門及外垣磚甃朱門通二層入門以漸而髙就地勢為之也厯嵗滋久鴛瓦日脱椽木漸朽簷宇傾垂梁棟欹斜毎遇滛雨浸及神座先是守臣以邉事旁午不暇及此成化戊戍鎮守太監韋朗自開元遷此到任三日謁廟觀之惕然不寜謂前廵撫陳公鉞總戎侯公謙曰吾輩奉命守是方為神人所依今一方山鎮之神廟壊弗安則鎮守之臣豈得自安乎是當急為修茸也二公是之于是命官董其事鳩工市材凡殿宇及左右司門牆朽腐者撤而易之傾斜者扶而正之損者修之葺之廢者營之補之又得監鎗監丞洪義縂儲即中金廸協守叅將崔勝咸加賛襄之力材用不取所司工力不勞軍士經始于是年秋九月落成于成化癸邜夏四月廟貎煥然一新告成之日太監與總戎請予紀其事以垂於後用是記之大望海寺記明王佐墖山為寜逺屬城去城西南八里許松山在焉寺居山之陽東望大海極目千里溪谷縈紆土地沃衍實勝境也兵燹之餘汩沒於斷蓬枯草間者非一日而遺址尚在景㤗改元之初有僧印静者飛錫至此徘徊瞻眺目睹而心悦之遂結草為廬坐卧三載一夕忽夢神人呼之引至平曠地指小古井云内有古物師凌晨汲之果得銅鐘一枚題曰至正十四年四月吉日松山大望海寺住持興善其列名餘僧仍不下百人始知望海寺古刹也墖山指揮李君榮白副將東寜伯焦公即具木石命工重建佛殿廣設僧堂命印靜為住持以率僧衆事甫畢而師圓寂矣不數年舊業多圮其徒義聰重新之外立觀音閣拙地復得鐃鈸螺磬十餘事題曰㤗和四年三月吉日敕賜松山法華禪寺住持如賢此葢文宗時物意者兹寺舊名法華而曰大望海者乎元間所更乎無碑記冄考傳疑可也指揮楊君宗白叅將盛公銘命致政百户羅漢義官王政董匠事毁者飾之缺者増之傍立鐘鼓樓閣廡其左右二門其前繚以四垣鼎鼎然東北一鉅麗觀也又命石王沈賢礱石為碑記其事以垂不朽始於景泰初元而成於𢎞治九載以世而計則二以嵗而計則四十有七以匠石工費而計不下數千百緍成之不易如此謀雖成於印静而業實創於焦公事雖畢於義聰而功實成於盛公也嗣義聰之後者當思前人剏業之甚難後人守成之不易哉普陀寺觀音閣記明文貴錦成而北有巨山壁立千尋葱蒨如繪中凾一洞深廣可半畆許洞西丈餘懸崖下垂而内空若穹廬然洞下左側則泉一泓甘冽可飲真洞天福地也昔人於此曾造置尺許石佛百餘故謂之石堂道院正統初鎮守太監王彦嘉兹勝概屬備禦都指揮李鎮等庀材鳩工大啟招提之境於洞中上範菩薩羅漢具番漢老少像於崖下木鏤千手千眼觀音被以渾金貯以傑搆山頭樓閣參差山下河流縈繞婆娑草樹幾於紫色琅玕厯亂山禽或似雪衣鸚鵡客有逰南海普陀落伽者以為似之因名普陀寺而鄉人悉以觀音寺稱焉寺内古松數株冬雪覆之青白可愛石堂松雪為錦州八景之一者此也成化己丑庚寅間余恒此下帷至乙未南宫弋獲厯任中外者四十八年嘉靖改元春予告旋里暇日復徃訪焉見崢嶸者傾隤輝煌者剥落大非當年比矣感嘆之餘因誦劉夢得冄逰元都觀絶句主僧福堅聞之曰種桃道士故在請為劉郎芟去免葵燕麥重栽桃千樹何如余曰甚善渠遂謀之檀那金鳯閻鉞欣然倡輸恊力營辦適本城指揮寜逺偹禦亦施送椽檩各百餘事工甫就緒而福堅圓寂矣頼舊住持戒昇與弟子福縁踵其蹟黽勉同心仍向城㕓鄰堡勸助口食人工就山中燒造甎瓦為岩下大士創閣一座明一暗三重檐轉角壁砌圬墁一出閻鉞之手規制雖不甚宏而間架翬飛塗飾藻麗非尋常可擬也肇工於嘉靖乙酉之夏竣事於戊子之秋金鳯邀上舍李翥之謁余求記余以頭白歸來值此輪奐一新乃匡山讀書處致足樂也故作其建寺改名之由及造閣嵗月始終俾刻之石以示來逰者逰千山記明程啟克千山遼陽城南六十里秀峯疊嶂綿亘數百里東引甌脱南抱遼陽嶻嶪蓊鬱時有佳氣如海蜃然嘉靖丁亥予戍撫順丙申遷葢州道出遼陽乃與同志徐劉二子逰焉出南門過八里莊石門釣魚臺䑓葢屯戍舊址也東北有温泉瑩潔可鑑南折入山數里抵祖越寺路頗峻稍憇於寺之禪堂乃登萬佛閣閣在半山縁崖旋轉越飛梁而入凭欄四望天風泠然因宿於寺時戊子日也循東山望螺峰附太極石人巖澗髙不滿丈深倍之廣半俯看萬佛閣在下方矣前有亭曰一覧亭一覧亭迤西而北入龍泉寺晡時徃香巖亂溪而東巖壑窈窕僧房半出雲間扶扙登之明晨己丑寺僧設齋乃行憇大樹下人境空寂翛然有遺世之想東峰危險徐劉二子浮白引滿其間適有吹笳者聲振林樾聞之愀然由此至大安自東而北自龍泉至此約二十餘里陡絶汚䧟懸崖怪石後先相倚撫孤山看深壑竒花異卉錯雜如繡行復數里隍堂中開諸山羅列髙爽清曠視三寺為最西峰空洞倚天徐子題曰通明天是夕有雨意翼日庚寅晴霽登中峰顧瞻京國逺聎荒徼山海混茫無際東有羅漢洞髙寒襲人又數息至雙井一在樹下一在亂石間泉甚甘冽又數息抵僊人䑓峭壁斷崖北隅以木梯登望之股栗健者匍匐而上有石枰九僊環奕焉自仙人䑓尋中㑹寺入溪穿石荆棘塞路不可杖徑僅容雙趾以疋布縳脚使人從後挽之扶籐側足盤跚而歩危甚劉子先之徐子與予相去數武摘山花以詩贈余余亦倚聲和之跌坐石上一老進麥餅值饑食之厭問其姓氏笑而不答乃至寺自大安山行㡬二十里困憊坐僧房久之起視山岡而浮屠相向爭聳乃自中㑹返祖越從者病取道右橋宿南村農家回望諸峰如在天上矣兹山之勝宏潤秀麗磅礴盤結不可殫述使在中州當與五嶽等僻在東隅髙人逰士罕至焉物理之幸不幸何如也昔桞州山水以子厚顯予之劣陋弗克傳其勝姑撮其大概如此釣魚䑓祠記凡有功於人者祀報之義也醫閭先生教化鄉閭者四十年異端之教不行焉鄉人為祠祀之不謂義乎先生姓賀諱欽字克恭家醫巫閭山因號焉天性髙明幼學即有志於古及見性理羣書朝夕玩索而有得乃益自信古聖經書本教躬行不可徒自從説己也乃益厭俗學舉進士為給事思盡厥職有犯無隠成化戊子春京師災乃上䟽大畧謂應天以實不以文不報遂自劾又不報乃告病歸築室圃中取古聖賢書以漸幽討非弔䘮問疾不出如是者數年大有所得乃教鄉人鄉人故事重佛老及諸不經之神先生乃製祀外神文俾祀而悉焚之上下翕然從之無梗焉者於是趨門牆者日益衆學者始至必詢其奉先祀事父兄之節茍簡則亟命改之曰學者學何事也而可緩於是耶毎謂朱子白鹿洞規為經書機要小學書為日用凖則自修教人一本於是故異端之説無自以入而義州之俗獨美𢎞治初以大學士劉吉薦除陜西叅議賜璽書假以便宜㑹母病不果行乃條陳四事一曰資真儒以講聖學二曰薦賢才以輔治道三曰遵祖訓以處内官四曰興禮樂以化天下皆世切要鑿鑿可行䟽未上而母疾不起遣子上之且辭新職許之而寢其言識者有遺憾焉先生好山水毎景物熈明輙携親友逰釣凌溪之滸徜徉竟日殁後五年鄉人思先生者相謂曰吾人之不為物老惑者先生之功也吾人幸見先生而被其教也先生徃矣恐久而忘之吾不忍於吾之身而忘先生也吾子孫不幸不及見先生而不䝉其教也先生徃矣恐久而不知之吾不忍吾之子孫不知先生也凌溪先生逰樂所也盍為祠嵗時祀之使吾人接之於目思之於心則先生之教猶在也使吾子孫接之於目思之於心則先生之教亦不敢違也嗚呼先生之功亦大以逺乎哉嘗聞先生學出白沙白沙者廣南陳公甫也史謂陳公甫作詩好竒時人多宗之予生也晩不及登白沙之堂知其人也使白沙而止於作詩好竒也則作詩好竒為信而先生不作詩好竒所造乃其自得使白沙而不止於作詩好竒也則作詩好竒為誣而先生不作詩好竒所造乃為善學因併及之逰醫巫閭山記明周祚嘉靖九年九月給事周子按遼東事至醫閭山之地適侍御謝子以觀風至地官㓂子以督餉至周子曰宿羡醫巫閭之羙請觀之謝子冦子曰盍觀乎以三子似宜觀也乃盟是月二十二日遂至觀音閣觀音閣者醫巫閭之勝也嵓岫萬狀盡出天上三子登且觀飲酒而樂周子曰觀而樂矣有感乎謝子曰吾觀其山之穴㟏焉岈焉崎焉嶔焉空空焉洞洞焉其風氣所出乎㓂子曰吾觀其山之土穹如窿如墳如營如熇熇如焞焞如其物類由産乎周子曰吾觀其山之形隩爾窒爾嶄爾嶻爾崒嵂爾兀結爾開而磅礴爾聚而輸菌爾其封守攸藉乎感止於是耶謝子曰吾觀而風氣俗所攸寓矣吾知其理而已矣㓂子曰吾觀而物類財所自生矣吾知其用而已矣周子曰吾觀而封守國所自設矣吾知其防而已矣吾三子是觀葢不多乎夫逰觀外蹟也而所感各有道焉則觀其可矣乎内外者道也消息者亦道也知所理則知所亂知所用則知所缺知所防則知所失是亦不可懼矣乎時同逰監軍王公總鎮劉公起而言曰三子之言近道矣非徒觀也是宜書周子歸因書為逰醫巫閭山記修廣寜左中屯衛學記明江奎衛治西北有廟學自正統元年廵撫李公濬始也公上䟽請建衛學詔許之於是錦州衛都指揮李真創建焉成化己亥指揮白欽増修之乙巳户部郎中毛君㤗飭繪聖賢四配十哲像厥後廢修無常嘉靖庚寅大學士張公璁奏正祀典撤塑像易木主更爵號改為至聖先師千古之非悉革迨今廟學駸廢圮矣己丑廵按李公輔謁廟命亟修之檄僉憲董君世彦議不果董陞任李公亦復命去丙寅廵撫魏公學曽至鎮守王公治道又言之廵按李公淑和來試士僉憲何君􅯆奉檄議修委指揮周之畢董其事發庫銀四十餘两市材鳩工計估不敷議增八十餘两乃搆正殿五楹作翼道周圍石欄凡二十餘丈東西廡各五楹㦸門一楹櫺星門樓三楹㦸門之東曰名宦祠西曰鄉賢祠各五楹明倫堂五楹两齊房十楹堂後敬一亭三楹堂左啟聖祠三楹官舍號房咸秩於理先是櫺星門近逼居民樹屏一靣乃令分守參将前守備錦州趙君完易民舍基地南北約五丈餘東西倍之始鑿泮池一區磚橋一座中建石坊外聨石欄又於通衢之東去四十歩西去二十歩各建坊東之扁曰道冠古今西之扁曰德配天地壯偉華麗視昔加倍是役也經始於嘉靖丙寅冬訖事於隆慶己巳秋凡用材以株計則一千有三百石條以尺計則二千有二十甎瓦以片計則五十萬有三千灰以石計則一千有五十鐡以觔計則四百有十餼廩以斛計則二百有六夫役出之丁壯車輛出之屯堡而周子之畢綜理經畫實勞瘁焉然是學之修也而豈徒哉俾諸生睹廟學而修業者非六經無所用心非孝弟無所造就也故曰堯舜之道孝弟而已矣賀醫閭先生嘗以白鹿洞規教人而士知學之宗者其亦有聞風而興起者乎石塘曾公生祠記明盧瓊君子之道有三正志定畧仁及衆也書曰艱大考翼不可征定亂難也而况倉卒之變乎維忠以正志耳又曰倚乃身迂乃心安民難也而况逺邇一致乎維智以定畧耳又曰式敷民徳永肩一心民懐難也而况久思乎維仁以及衆耳三者有一焉皆足以樹勲建名而况兼之乎此遼之人所以生祀曾公也公代建兹土遼陽戍卒以撫臣革之貞厲窮兇者蝟集為亂登陴閉門渙無統紀公時自南衛聞變單騎入城諭之福禍衆心以定葢示包荒用慿河緩窮追之噬散吠聲之黨焉耳乃上䟽曰羣兇干紀保無他志願寛斧鉞以開其悔制曰可既而廣寜撫順相繼以逞公宻布而隂偵之無測識者三城首惡同日而俘葢釋壯頄受濡愠將欲刑故宥過始終無咎焉耳復上䟽曰倡為亂畧止此數夫願宥其餘以安反側制曰可夫以數百里之亂起於一旦聲色不動而東顧之憂以舒非忠以正之乎先是羽檄旁午朝議咸咈或謂此而不討恐釀藩鎮之亂公曰否非淮西澤潞比也或謂遣使招安且覘競絿公曰否非淳化西州比也以是鋒鏑之禍息而疆境頼以全活者不啻千萬計供億之費省而公私頼以不困者亦不啻千萬計以東人震驚仰望之私談笑而揮之使背帖於席非智以定畧乎寜遼之咽喉東西絡繹晝夜不息茍舉措一失受禍比他衛尤劇征討則有毁體裂肢逃山逾海之患遣使則有負曵鞭撻鬻産市嬰之憂今耕而食者曰公食之也織而衣者曰公衣之也父指其子祖指其孫曰公活之也非仁以及衆乎其師生父老相率而籲於守偹陸繼宗備禦袁東暘鳩木礱石立祠於學宫之西偏貌公之像而徵文於瓊或問曰生祠古與曰古也禮也義也公憫無辜之民横罹斮斫不計生死禍福以身任之力請於朝而得免議受公之恩非直欲旦暮見公之容而又使欲其子若孫皆知所自禮以義起古之道也昔文潞公澤及天下洛人生祀於資聖院張文定弭盗一方蜀人圖像於益遼之禍起於倉卒深淺成敗不可測而文定自外入又得伸縮自由公視之大難也而公才望日隆安知不為潞公乎公諱銑揚州人石塘其號也楊將軍祠記明許國夫人客於天地間不免一死而無古今貴賤賢不肖罔不難之死固人之所難而亦有處之甚易者葢義之在人心尤有重於其死故也記曰士死制大夫死衆封疆之臣則死封疆夫制也衆也封疆也三者義之所在也義而死焉雖死不猶生乎故御極作人者崇激勸之典載筆勵世者侈揚扢之辭徒為其捐生畢命能人之所難能哉葢將以植天常立臣極慰烈士之忠魂而振頺俗之正氣焉耳遼左逰擊將軍楊公維藩以嘉靖四十四年守鎮武戰死嗚呼公其死制者耶死衆者耶死封疆者耶廵撫張公西銘廵按李公輔交章上其事贈廕賜𦵏外仍立祠以祀嗟夫皇恩優渥聖謨廣運寜非所以淑人心扶世教而以大義風天下乎葢嘗論之将為死官戰為死事是故顯功重爵非死莫致髙名勇略非死莫能成仁取義非死莫遂致死而生則掇將印博侯封固榮也致死而死則享廟食光簡䇿亦榮也生死皆榮而人顧恇怯退懦區區以保全首領為念而卒至於僨事者抑獨何哉公倜儻英發不拘小節而於義之所在則奮然赫然浩不可屈方戰殁時士卒有以圖後效為勸者厲聲叱之公之視死生為何如者公之姪總戎公死事於前而公復以逰擊死事於後予於是知公以忠義世其家舊矣今廟貌血食生氣凛然公雖死猶不死也彼區區全首領者蜉蝣爾獨不死哉予忝史館方且大書偉節為公不朽而於國家作人礪世之典又烏可無述故為書其麗牲之碑以應公之參戎君爕之請後賢過公祠下倘有誦吾語而式者乎錦州關帝廟記明繆天成後漢前將軍闗公當漢歩既蹶之秋人思逐鹿公慨然有復興大志邂逅中山靖王之裔遂與涿人張飛約為兄弟誓同生死共事昭烈卒成鼎足中道而殂後人欽公祀以為神至宋大觀中追封武安王廟號義勇迄今數百年普天率土建廟貌以奉香火不啻千百計為文以頌厥功膾炙人口亦不啻千萬言奚俟愚後學小子喋喋穪述哉雖然公之大忠大勇炳如日星人皆仰之矣抑知乃公之大智成之乎嘗獻帝暗弱天下𤓰分功名之士誰不擇强盛者事之曺操挾天下令諸侯鍜甲礪刄雄據中原孫權席父兄累世之資跨長江天塹之險奄有江左如紹術軰亦皆割地稱雄互相虎視公視之直如狐䑕耳昭烈身不階尺土萍寄於小沛星散於徐州敗新野走當陽依江夏天下無投足之地公獨患難相從心如金石當事以成敗論者方爭噱其愚而公之智則有莫大於此者葢昭烈不得與羣雄較者一羣雄不得與昭烈較者二帶甲控弦誇强賈勇昭烈固不與羣雄埒矣然而昭烈天潢的𣲖統緒所歸應天順人名正言順彼竊據土宇睥睨神器者以臣抗君以逆犯順將孰與昭烈較且昭烈鼓仁鬯義開誠布公聨屬人心深固根本而操之奸權之褊紹無斷而寡謀術剛復而自用又孰與昭烈較哉惟公獨秉大智蚤見及此故舍强盛就孤獨逐草竊扶正統爵禄不能縻冶麗不能感金幣不能留危難不能奪其操死亡不能回其志幸而掃除僭偽廓清海宇闢乾坤於冄造揭日月以重光以綿漢家如蒂如髪之祀其心固盡而為漢之功臣即不幸而厯數有定景命難諶帝業蔑期捐軀報主獲與漢九廟君臣同逰於地下其心亦盡而不失為漢之純臣然則公之智何其卓乎向使智不及此失身吳魏縱樹有鴻功偉伐亦與夏侯惇周瑜軰伍耳烏能厯千百世為人敬仰如斯耶嗚呼公之智在生前已嚴正偽之辨公之智在後世必明戰守之宜我遼海為神京左臂大小武公非公之忠勇無所矜式逺近屬國非公之威靈無以震攝况錦尤邉境要衝乎故卜城西勝地襟山帶水築廟妥公以為一方保障起於成化大於𢎞治兩新於萬厯前後凡四舉矣今衛人遊擊王公汲倡謀髙公真繼之教諭張君志廸庠生紀君大學山右客陳君舜等皆捐資以助應更新者更之應仍舊者仍之門樓二楹則所增建也一時廊廡森嚴墻垣繚繞丹青與山色齊輝鈴鐸共河聲相荅跂如翼如巍然煥然視昔葢改觀哉興工於萬厯乙酉仲春竣事於辛亥孟秋故記欽定盛京通志卷一百十三
