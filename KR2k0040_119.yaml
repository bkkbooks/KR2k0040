body:
  text: 國朝藝文一賦欽定四庫全書欽定盛京通志卷一百十五國朝藝文臣等謹案古昔聖王孝熙丕純功德隆駿則雅頌之音作是以成周之盛推本太王王季文王上溯公劉后稷升歌告廟為法為經兩漢之隆奏御千有餘篇抑其亞也我朝列祖肇造區夏文德武功超邁前古我聖祖三詣盛京恭謁橋陵我皇上四蒞陪都肅將禋祀水言配命世德作求大典慶成頌揚之音洋溢乎天地兹録其形容盛德庶幾萬一者為十二卷以昭來許謹志國朝藝文第三十九欽定四庫全書欽定盛京通志卷一百十五國朝藝文一賦朝陵賦康熙壬戌孫在豐皇帝御極之二十一載聲教浹乎遐陬威靈震於天宇而蕩滇黔之頑凶殄閩粵之狂豎鈇鉞既施典章具舉崇徽稱於兩宫洽歡心於九土爰溯締造之鴻基修山陵之禋旅進太卜而諏嘉辰兮詔宗伯而稽禮經戒豐隆以灑塗兮敕招搖使陳鉦閣道直漢以澄輝兮天駟挾䇿而耀精羽林羅列以雲布兮鉤陳炳蔚而霞蒸時則斗柄卯指望舒景盈草芊芊以向榮麥茁茁其擢英乃駕蒼龍鳴鸞鈴馳玉馱伏霓旌宗正陪乘親藩奉較掌舍設枑虞衡庀幄芻藁儲於司農太常陳其廣樂詞臣珥筆以隨鏕通侯巡徼而秉矟六卿之屬備官七萃之屯列幕焱焱煜煜披拂以轇轕兮翠蓋金枝之旖旎也總總總汨汨雷轟而電掣兮千乘萬騎之繁夥也啓閭闔而度郊圻兮道上谷之名區踰巉巗而經雄關兮循陽侯之所居靈龜負圖以獻瑞兮神龍蚴蟉而奉輿天吳躨跜以趨蹌兮燭隂熠耀以先驅爰抵豳岐以瞻荒作豐沛而聎枌榆其地形則連岡崔嵬峻嶺嵲屼廣岫四開平原中廓近擁巫閭巨鎮嶔岑巖髙洞深拓陽翕隂遙揖長白綿亘峭闢淵潭窈冥動植焜碧他若華表通明木葉紫荆蜿蜒環旋孕仙窟靈幽怪神竒不可殫形其水泉小則松花錦川鴛湖沓渚淤為淖泥瀠為浦溆大則襟帶鴨緑磅礴混同滄溟東滙衆水歸宗驚濤浴日駭浪浮空其灌所滋地力所聚則沃茂稻梁磽叢蓒芋果美榛松藥珍參附其鳥則駕鵝鸛鶴鴻鵠鶖鶬鵜鶘睨水而聯翩雕鶻挾飈而髙翔其獸則青鼠黃羊蛩蛩距虛獺麕貂狐野馬騊駼睹畜産之蕃滋洵山海之要都若夫洞闢八門周回百雉麗譙天開雉堞鱗次其內則陌通巷接階舍連墉蘭錡柄植乎廣衢象闕聳構乎雲中有臨崇政有翼篤恭閣開翔鳯時乘神龍關雎麟趾有侐其宫左宜文德右昭武功􅟝櫨錯列漢之星枌橑拖垂天之虹其外則岡阜蟠護鬱鬱蔥蔥山河繡柱風雨虯松仰陵園之在望識王氣之所鍾則有分陜之卿陪京之守聞翠華之蒞止競率屬而趨走又有髫齔之童皤皤之叟咸輟耕以望幸紛駢闐而恐後則見夫鵷班匐伏雉尾中開乾情顧矚而愈怡龍馭弭節而徘徊屯雲罕舒玉綏排金戺陟瑶階嘉樹葳蕤以紛披重闥溫清而邃俁端斧扆於辰居肅容衛於崇廡乃與臯伊之倫丙魏之侣斂精澄神齋心滌慮既吉蠲之允臧遂致覲於列祖建捎星之旃樹厯天之旗駕踰輝之神駿翳曲莖之華芝翕赫曶霍蠖略蕤綏卿贊采史誦詩宰割牲祝陳詞揚戡定之赫奕溯謨烈之燕貽玉帛陳神人暢薦馨香格靈貺鴛鷺駿奔以肅穆兮瑞靄氤氲而彌望進觩䚧之圭瓚和泔淡之秬鬯肸蠁旁融焄蒿在上槱燎熛灼於穹窿兮芬苾沛達乎漭沆既通誠而感幽兮知景福之攸降於是厯神州而巡邊陲乘陽氣而講春搜羃漫天之罼張竟野之罘罿罻接陂罦罠掩邱烈缺施鞭蚩尤挽鉤緑沉砥鋒天弧貫鍭騎躍房星之精車追造父之躅矢選夏服之簳刃淬昆吾之鍔凡藩落之所窒蹙罝羅之所絓幕義簇之所攙捔流鏑之所􅚹㩧飛無遁翮走無逸足乃因前禽而示服猛借格獸以示鋤凶捨翳薈之鷚麑縱巖藪之豜豵搜其吞噬之倫屠其牙爪之雄爰有勇踰五丁力若烏獲帶鮫函披兕革翋獷猤袒裼徒搏拉虎蹂貔屠狼蹴貘挫拗恕而遁潛改咆哮以踧踖遂俯首而革面率讋伏而就磔爾乃前網開飛羽停宋鵲止馳韓盧不驚設纚沉罾射蛟捉鯨鱨鯋既罶鰝蝦就罟鮪鯉斯陳鯤鯢勿拒衆兆云獲觴行賞舉酤醴㩼燔炮夥澍雨應時嘉禾斯播天子則勤思乎東作眷念乎萬幾乃返斾揚麾使虬縱螭赤汗追風叱撥爭蹄鐘砰雷􅐀回蒞郊畿勞五校賚九扈課農桑詢疾苦眚災肆赦湛恩斯溥臣鄰歡欣士女忭舞惟時小臣職忝濡毫才慚稽古熊館趨行豹尾隨伍馬載錫乎天間身長依乎輦路時瞻雲以咫光每就日而承煦逢巨典之矞皇沐深恩而振詡拜手稽首爰作頌曰於皇上天眷至德兮聖武神功昭萬國兮顯承纘述馨香格兮滂沛恩膏跂喙殖兮宣豫惟時式厥則兮垂衣端拱精寧一兮明良賡揚百憲飭兮萬齡夀昌永無極兮長白山賦并序康熙丙子吳兆騫長白山者蓋東方之喬嶽也晉臣袁宏有言曰東方萬物之所始山嶽神靈之所宅我國家肇基震域誕撫乾圖景厯萬年鴻規四表則兹山者所以昭應皇輿合祥帝室與有巢之石樓少典之軒臺同焜耀于方載者也皇上聖文臨御神武膺符慶洽人祗化隆海嶽仰欽祖德報禮神邱爰詔侍臣致崇禋秩牲璧儷於羣望懷柔及於百神瑞檢雲陳穹壇星麗煌煌乎聖世之盛儀埒虞柴而軼漢祀矣夫南山薦馨班固以小臣作頌西嶽展禮杜甫以布衣獻賦草莽微臣竊附斯義乃作賦曰猗兹山之峻極眇羣嶽而獨尊體青雕以出震標皓靈而爥坤揭龍荒而作鎮俯鵬溟以為門參二儀兮永峙表三成兮莫倫徒觀其大勢也則嶻嶭嶜崟穹窿嵣岟窈邈嶙􅯱壇漫莽䍚回漠漠以橫被崛嶢嶢而極上岠遼碣畷朔壖輢挹婁睨朝鮮亘喬基于千里造曽椒于九天赫兮無儔峭兮回拔嶺輪糾以爭互巖巋嶬而相􅒈峰千仭兮縞曜壁萬尋兮瓊潔鬱騁險兮橫氛訬負髙兮墆霓五結切洵東極之神隩詎西昆之可埒爾乃循覽四麓考其周綴爰有黑松巨林镺蔓黝邃羾天有極縈地靡際既貤坂而連延亦籠山而嶊嶉根欐佹以鱗羅葉緁獵而羽翳拏莖含飈以鬱蓊攢柯罥務而叢倚靄兮沈沈䨴兮黖黖歘隂火于空心蹙陽波于槎櫱叶羊至切乍頓道而欹卧忽推壑而側植叶直吏切信􅕀步之未迹知禹築之莫暨自山麓至半山皆黑松林亘三百餘里不見日月樹根相糾如網地皆深淖馬行七日乃畢于是黛凝復嶂煙暝虛嵐森梢陬互􅕜㙷嶄嵓景暗㫲兮罕曜途㳴兮增湍匝層隂於遙巘髳荒徑于修巒杳荒岡兮晝含暮倏寥窲兮夏凝寒其中乃有黑雕青鷂蒼鷹素鶻皎鵠碧迅鷣俊風騰猛腦霜披徑翮哢亍軥輖奮翰䎀或命儔于杪顛或接巢于枝格瞵金眸兮髙睇厲青鶻兮下擊緇采頳輝殊材異質喧聒相驚淰躍自鼓觜距以增響毻羽毛而成積極翔羣之詭錯咸沸卉而斯集若夫甝之儔昆駼之屬伏􅕝長嘯豪豨振亍麕麚昏髟於積岨熊彪瞲于叢木豺貘斷斷以猛噬豜豵驚透而紛逐般首徑角圜題從目昏嘷晨詬風馳雷䟮慓林振壑殷巖駴谷至乃青鼲黃鼬華貂文豽挺修豪之溫潤含雕采之煒烈豆目眻睒麥髯狎獵棲迹曽氷罥蹤盛雪竄木末而騰趠穴巖􅠈而競捷羌托體于寒陬疇效珍于華闕伊竒類之夥夠嗟難得而殫説爾乃林徑欲窮迒溪半隤轉千盤而漸髙出九折而逾礙紆蹇産竦􅡲㟋豁修渚響湍瀨縈濯龍之倉淵欱納鶯之雙沠殷雷地底倒景天外駭河流之凌薄劃巖坰而訇磕棧鬱盤于回溪路厜㕒于巉澗凝空兮誰涉崖踐虛兮儼對于是豁閕直裂嵽嵲如憑抗術阡于鳥際超軌躅于雲層邈半漢以上躋軼隆巔而究升周步山極肆目巖陘曠若砥原坦若廣庭纎條不竦殊榛罕莖寒蕪莾莾石道冥冥何􅡳崚外峙而唐壇內平山巔極平坦無樹木惟荒煙蔓草滿目縱橫而已爾乃羣巒結瑶以峻起千巖削玉以攢立頵砡含皓以埢垣􅠌坻繚素而叢襲簉五色以相煥綿百里而環羃類瑶臺之偃蹇宛瓊樹之崱屴石崖髙七十丈白如瓊玉四環山頂廣袤八十餘里仰重霄兮可捫撫下方兮無極互隂晴于膚寸攬星辰于盈尺伏岑嶅而返眺訝雷雨之下黑爰有千齡之氷太始之雪嵌空􅥥窞并凌庨岊六尺皚皚袤丈嶫嶫迎素秋而競飛涉朱炎而自冽嶰壑森凄以月鑒峐嶠炯晃而鏡徹乍消長于新故疇單究其融結紛銜耀兮逺映何吹律兮可熱從山趾至顛髙二百里其上氷雪叢積厯夏不消爾其混同之本鴨緑之源谺為神池以宅乎其間池在山之極頂縱餘五里橫八里北流至松花烏拉入黑龍為混同江南流至朝鮮為鴨緑江一統志云池廣八十里者訛也會瀾廣潒靈液淪漣振以曲崎之巉崒繚以襄岸之駢田含靚如拭積明若空乍風披以瀲灔倐霞蒸而潰渱鑿翠啓鱣湍之徑躡雲構鮫人之宫爾乃疏隘狹穴厱硿跳潛沫駭奔潨汩濆阿而􅘝瀑霅砅巖而澒溶徂南驟北趍浥聚谼淯靈源於千頃瀹神委于二江叶姑紅切若其嵁竇之所潛演穹廅之所澓激漼似碓投洞若機疾並騰傾而灑珠遂奔揚而綴璧羣流既泄四派乃馳瀺灂崇岑喧豗峻岐颯沓雨集潎冽煙霏挂流曽碧之表淪波空翠之隈倒銀潢而半瀉矯皓霓而回飛四月間池水及石罅凍泉先開其出之水凡四派穿白石崖而下挂流百丈聲若驚雷于是淡濘安翔蜿蟺四會溔溔混濤滮滮振瀨抑魚龍之餘怒集大坻而為滙㴸兮永指皛兮徐邁出乎松花之陬注乎烏龍之外四派之水至尼雅穆尼雅庫滙為一流以入于松花烏拉所以宣天綱之含布壯朔野之襟帶若考其瓌竒之所窟宅珍瑋之所景彰則夜珠流照于表波頳玉攄采于青岡人參抗莖於椵隂良楛挺笴于松陽人參生于椴樹之隂石崖外松林極目其間環生楛矢即肅慎氏矢也靈跂驂螭而容與羽人撫鶴而棲翔畢山經以撰異莫兹嶽之靈長相傳其上有仙靈往來擅射麋鹿者即雲霧迷徑至其出納望曦懷吐雲霧苞隂陽以靈祕通元漠而神護小衆山於堥敦渺七表于指顧嶇嶔則千匝未殫縹碧則萬重紛聚頓挺拔之地軸俯嵳峩之天柱故能上當辰曜仰禠帝居抗基卓犖翔勢扶輿踞蒼門而表神宅並青岱而闢仙閭赫彤雲之晝聚焯紫氣之晨敷孕造夏之玉字識臨代之寶符啓潛躍于聖祖臻景鑠于皇圖藏瑶牒兮可俟涌金精兮詎誣瑞我清兮億載永作固兮不渝聖駕東巡盛京恭謁祖陵大禮慶成賦謹序乾隆癸亥張鵬翀皇帝御極之八年秋七月皇太后鑾輿虔詣奉天展謁列祖陵寢逮及從龍諸勳戚一體酹奠禮成御崇政殿頒詔加恩用光祀典周巡藩落順時獮狩冬十月車駕還京師臣備員講官職司記注竊以我朝發祥長白創業東京中原定鼎以來丕顯丕承祖功宗德實式憑焉我皇上治洽重熙孝隆繼序兹行也繼世宗之志述聖祖之事煌煌乎國家之鴻儀巨典不可無述而志也不揣謭陋竊采成周雅頌之義廣漢代上陵之辭而為兹賦謹拜手稽首揚言曰猗與禕與我皇清之受天眷命而光宅四海也蓋積功纍仁久矣默孚于真宰值明祚之將衰猶玉步之未改既馨聞乎上下益懋敬而無怠宜其龍飛鳯翔蔚然照耀乎符采是知萬邦之翼戴維新列祖之詒謀斯在比有邰之肇興同后稷以無悔斯聖子神孫所繇瞻拜橋陵而永懷于億載也聖皇奉圖受玉率祖攸行孝思隆于下武濊澤洽乎羣生永思維艱既克肩乎宏巨陟降左右每仰瞻乎穆清單厥心而肆靖儼夙夜以儲精水千年而一色山萬嵗以同聲列祖之園陵在望一人之祗謁惟誠嵗在癸亥月躔庚申閶風應候蕭露零晨恭侍金輿喜映慈幃之色笑遙迎玉輦長銜聖主之恩綸萬乘啓行於北闕兆人歡躍乎東巡爾其原隰畇畇黍稷薿薿近郊則煙靄萬家逺障則晴巒千里城頭之曉月如弓塞上之晚霞若綺貔貅列帳擁星廬而刁斗森嚴虎落三嵕動金鐃而弓刀奮起時巡翠帽瞻雲日以就聖人藩服旃裘涉風沙而從天子舟惟玉以及瑶想當年之跋履峯明納嚕翻荼火之旌旗塞接銀潢壯星辰之壁壘雕弧射鹿駐輿而先獻慈寧玉醴浮觥率舞而同賡燕喜蓋桂輪將滿適當萬夀之辰而海屋重添正應九王之紀依聖母以承歡偕中宫而受祉是則祖宗之篤祜永綏陵寢之垂庥未已者矣旴衡列塞控馭九邊時孟冬之將屆聖駕乃蒞乎奉天王迹所肇興京在焉英峩之門屹若隆恩之殿巍然三百里內三陵蔥鬱而相連羣工於是駿奔走執豆籩萃萬國之歡心冠裳翕集煒五陵之佳氣鸞鳯相鮮寶劍玉衣緬英姿之颯爽金戈鐵馬挺壯氣以回旋灑落君臣至契信符乎魚水馨香俎豆精靈不隔乎重泉此聖主曠世之仁爰及苗裔而興朝無疆之恤有永萬年者也祀事孔明典禮備舉御玉殿以慶來章降絲綸而隆錫豫蠲租賜復惠深京邑蒸黎進秩酬庸榮被中朝簪組是皆繼述之大端舉運量于皇衷而率循乎聖祖于焉周覽風土徘徊舊基燕衎而勳戚咸集賜酺而邦人宴娛樂遍五行之舞歌闋三候之辭吾皇于是睪然而髙望穆然而深思緬葛燈之舊制撫茅土之階茨能不懼後人之增華而踵侈墜前王儉朴之留貽乎松山杏山過戰征之故壘髣佛乎躬擐甲胄櫛風沐雨而驅馳後之人其可忘創業之艱難守成之不易而隳茂世之洪規乎蓋駿命靡常天難諶斯自古聖王防險戒逸居安思危昭示來兹昔遼左之一隅聿興鼎業今金湯之萬里不限封圻雖曰既安矣既治矣能不終固之又固之此我聖皇所為凜若春氷不敢耽深宫之燕佚炯傳寶籙如聞夫列祖之嗟咨者也惟帝眷懷是咨是度長白峩峩髙山天作四郡既開三韓漸拓入編伍而旗分聽指揮乎部落望祀有秩懷柔是若靈爽肸蠁豐功懿爍雲雷屯險溯草昧之經綸日月光華粲隆平之禮樂是以陪京駐輦致觀風問俗之殷行殿捧觴偹愛日娛親之樂揚旌駊騀而劍舄流連弭節紛綸而威儀有恪誠足以荷靈貺之綏成稱裒對而無怍豈止眺山川之雄竒玩物産之饒沃海波滉漾呈徑寸之明珠地氣華滋劚三丫之上藥而已哉彼夫漢髙豐沛光武南陽太原啓聖上黨興王皆歸功于創建數疇昔而慨慷逮易世之多故每纒悲于霜露獨我朝之聖聖相授實逺邁乎漢唐吾皇嗣統之八載臨躍龍之舊鄉百年故基問遺老其既盡雲仍纍葉調玉燭以彌光豈非古今之僅事而聖代所獨彰者與矧吾皇之繩聖武而法乾行也卜嵗叶吉練時孔良百靈呵護十駿騰驤宜雨而雨宜暘而暘軔初發而清風披拂斾將回而瑞雪飄揚天人協應百福千祥猗與吾皇將何以敬天庥而答神貺乎漢家猛士守四方藎臣念祖扶周邦願吾皇帝勤側席無遺忘忠言苦口利用嘗伏蒲悃欵排天閶願吾皇帝咨交警無怠荒不矜不伐式夏王不邇不殖儀成湯憂叢脞敕幾康願吾皇日慎一日師虞唐丕休哉吾皇敬慎常若此燕皇天而昌厥後萬年景運有不昭融世德靈長哉小臣忝列赤墀之下綴青瑣之班未奉屬車之後如依玉殿之間昔聞玉帛初歸鑄九州而作鼎今見金甄永固羅四海以為關仿漢上陵羽衛未妨農扈法周巡狩攻車逮及禽頒願奉回鑾之曲徐看振旅而還映日成文敢次從臣之嘉頌掞天作賦惟循聖藻以回環載賡曰聖皇繼體大承乾兮仁風暢普膏露溥分開基奠鼎溯艱難兮橋陵在東鏘八鑾兮禮隆樂備鬱封巒兮永思追孝履霜寒兮勩勤纘武警遊盤兮六龍巡幸兆人歡兮荷氊被毳仰榮觀兮震威懷德拱堯壇兮萬年嗣服永奠安兮聖駕東巡盛京恭謁祖陵大禮慶成賦有序癸亥竇光鼐乾隆八年秋七月皇帝時巡於東祗謁三陵纘舊服也臣聞之孝經曰昔者明王以孝治天下故得萬國之歡心以事其先王王者家四海子萬姓民康物阜備腯咸有所謂馨香無讒慝也我朝肇基遼陽奄有區夏聖聖繼承肅將祀事皇上孝思惟則聿繩厥武奉皇太后而東肇禋迄用有成肹蠁周浹神人洽暢錫類推恩歡呼雷動仁孝之義備矣微臣窺天測海仰見萬一拜手稽首爰獻賦曰於皇時清祖宗濬哲欽明苞四葉之葳蕤殷二聖之先靈綿瓜瓞於東土復穴而靡寧荷帝耆以啓運規方輿而作京於是我世祖乃仗大順揚天聲掃畔援蕩欃槍敷皇極以創業拯蒼皓之頽綱欽若聖祖離明重宣裒對化洽緝熙心單覲耿光于烈聖識王業之開先溯鍾靈于遼瀋加崇樹于陵園薦明德以升馨推燕及于皇天仁風所被羣生靡然窮髮以北越裳以南陸讋水栗而來賔焉有不享其贄幣者六十一年亦越世宗奉藩底績駕言徂東祭告是飭洎乎踐祚康田功而無暇逸者十三年如一日惟我皇上纍熙洽于世業承顯懿于先德瞻堂構兮依然儼羮墻兮髣佛凜陟降以保明永夙夜而祇栗者蓋八年于兹矣于是肆覲羣僚廣沛綸音宗伯議禮天官協辰敕堪輿使護野兮屬方神以梁津戒飄風以清道兮召凍雨而灑塵然後建辰旒結翠蓋曳雲梢張霓斾飛九斿走七萃戢駍隱齊沛艾奉慈寧而御金較發皇輿而䇿天駟蕤綏蠖略灕呼襂纚焱焱煜煜魚頡而鳥𦐄兮雲軿華芝之旖旎也總總撙撙雷轟電掣兮千乘萬騎之雄詭也排閶闔而啓行兮挹雲山于縹眇陟髙衍之嵱嵷兮超紆譎之浩渺望舒夾轂而飛光兮羲和回鞭而流杲水后傳警而躨跜兮山靈稱蹕而窈窕白虎右踞而軒鬐兮青龍左旋而夭矯夔魖潛形于黮􅩙兮獝狂聞聲而蹶倒于是總六校用三驅橫干將仗錕鋙彎烏號發天弧妙更嬴踰蒲且捩雄虺掃封狐跨野馬蹍距虛格奔兕掃飛鼯闐雲羅震地廬淫淫裔裔轇轕轠轤指顧倐忽屬車充盈解罘開網振旅天行威讋荒徼稜憺王庭旃裘魋結之長稽首稱藩獻琛執贄來享王于塞下者蓋數萬以云然後躡邊月御溯風緣林薄翍蒙茸渡析木而羾箕尾兮駢結轡乎天東瞻髙山而履夷行兮緬荒作之神功爾乃長白崔嵬巫閭巃嵸欱噴鴨緑磅礴混同滙以天池之竒亘以地軸之靈蟠以螭龍之窟拏以虎豹之扄及乎煙雲卷舒揮霍出沒霅然陽開帥爾隂閉風雨之所和會日月之所旁魄雷霆之所鼓蕩星斗之所伾仡霞駮波沏蒙合霧集蔥蔥然鬱鬱然擁帝陵而孔固挾王氣以成霱於是大丙弭節六軍銜枚鵷班匐伏雉尾中開乾情顧矚而愈怡禮官奉御而徘徊屯虹旃于輦路排仙仗于瑶階重闥寥窲以節密茂樹蓊鬱而氣佳乃搜逑索偶序賢擇能相與澡心滌慮澄神斂精返聰明于蠖濩之室清徒驥于錙壇之宫靡薜荔以為席兮吸瓊芳之露英侔神明以為資兮契元符于杳冥乃詣永陵開運穹崇包孕元氣吐納鴻濛有邠館荒度之基焉乃詣福陵天柱翠沓跨躡百貊橫被六合有岐陽式廓之規焉乃詣昭陵閟宫雲竦隆業居尊蒲蓮星拱有豐垣攸同之治焉作求世德來許昭兹元祀惟稱百禮孔時麾葩瑵舉洪頤錯白茅班黃彛潔葅醢修明粢割五牲效三犧上卿贊采太史誦詩庶官獻幣六祝陳辭揚戡定之赫奕兮溯謨烈之燕詒天子穆穆以鬷假兮顯相駿奔而宗祈爾乃尚氣尚臭於隂於陽德産畢致神保是皇進觩䚧之圭瓚和泔淡之秬鬯嘉栗無違普淖斯饗苾芬旁融樵蒸焜上蕭薌升兮熛訛焄蒿感兮悽愴于是我皇上遊神于漠合氣于幽心存色授目想形留流水汩汩崇山矗矗禹甸畇畇周原膴膴此我烈祖之所開疆而拓土也築室翼翼四方之極軒黃熊墟祈帝陶邑此我烈祖之所正方而肇域也琬琰天球刀訓河圖斑陸上下光越璠璵此我烈祖之所闡珍而握符也黼純席几繪繡繽紛精曜華爥如生如存此我烈祖之所衣德而紹聞也環顧百僚濟濟蹌蹌東戣西劉左右奉璋此我烈祖之所譽髦而思皇也眷言萬姓林林總總耕水耨火助我粢盛此我烈祖之所惠懋而敉寧也精屬屬以往來思勿勿以微探耳返聽于閴寂兮忽愾乎其聞歎目收精于廣莫兮羌僾乎其有見洞廣開兮帝閽紛其乘兮白雲靈皇皇兮來歆吐瑞氣兮氤氲儐暗藹兮褊􅝆殷靈風兮沖天乘太清兮降監委繁祉兮如山於是皇儀暨孝思展羣歡洽式榖戩報地靈所自鍾遡天潢所由演懷柔神祗望秩山川諸侯三公所視惟虔槱燎熛煬上致髙煙碩麟含輝黃龍吐炎五精歆馨而碩德四靈效順而攸安乃􅊩盛京雲護日邊九市開場萬家起煙居靡近逺人無後先黃童奔走白叟往還士女頒斌衣冠聯翩莫不動容發聲引領駢肩詠盛德而獻讜言歌曰帝之來兮雲飛誕我祀兮聿歸望龍旗兮裶裶懷吾人兮兮覲德輝天顔咫尺兮其不違天子顧而嘻曰咨爾父老兮殷豫相望永言不忘兮惟梓與桑豫其夙夜兮恆勤思于平康乃鳴和鈴遵通衢敞華闕啓宸居有嚴崇政有翼篤恭左宜文德右昭武功關雎麟趾永奠清寧閣開翔鳯時乘御龍藹藹周親濟濟臣工趨丹陛而近日伏玉墀以呼嵩爾乃鼖鼓殷雷華鐘發鯨孤竹間奏空桑和鳴列八佾抗五聲盡六變齊九成韶武隱轔鈞天鏗鍧僸佅兜離并附雲英氣盛化神既和且平于是命膳夫開瓊筵御嘉珍窮芳鮮沛宫父老把酒極歡南陽故舊載笑載言于焉歌豳稼穡艱難躋堂稱觥萬夀祝焉于焉歌雅泉原庶繁酌匏執豕君宗頌焉當斯時也雲靉靆兮雨滂沛恩鴻溶兮澤汪濊綸綍頒兮車書會謳吟同兮雷聲礚哤聒乎寰中馺沓乎闕外羣臣醉德揖讓而退皇上觀衆庶之説豫覽福應之繁昌仰惟鴻烈雍容揄揚控天地以選義綜古今而成章萃人文以化成麗景緯而道光暢皇風于億載被金石而流長文德既昭武節是宣選徒大閲戎經申嚴赤羽日臨白羽月懸戈鋋星羅鎧甲霜寒次和樹表牙旗髙褰鷹揚陳鉦虎虓張弮浸淫蹴部陳勢蹥踡鵝鸛魚麗箕翼鮮扁變出竒正體合方圓山苞川流地吸天旋然後收軍會衆翼翼綿綿若電收風舉翕赫乎數百里之間時則黑精司正律中應鐘虹藏凍地日次尾中萬乘回薄千官扈從仰瞻雄關嶢屼巊溟俯臨滄海煙恬波平扶桑隱映炙轂上征巨靈贔屭冠山而興神龜翕忽負圖而迎返斾揚鑣還我神京假于太廟告厥成功臨軒穆穆問寢雍雍可不謂元德之盛而至治之隆乎而聖主猶昧旦丕顯夕惕朝乾飛聰馳明兼聽並觀撫兹兆庶祖宗之臣念兹釋兹衣食之源黃壤白墳何以奠之插雲渠雨何以勸之祈禠禳災何以先之流火授衣何以贍之惟小人之所依思無逸之所嘆審天聽之在卑知配命之維艱是以明德慎罰宥災除眚常畏民生之傷也取財用物賦政任役常懼民事之荒也匹夫匹婦不獲自盡若已納之于隍逮至陶甄無遺雍熙有象老有所終幼有所長窮有所歸廢有所養風協五日雨依一旬牧人夢魚桑女聽禽曽孫之醴洽祖農夫之鼓御神京師之錢貫朽太倉之粟因陳守閭閻者食粱肉為長吏者長子孫家滌瑕穢之俗人生亷恥之心上絶竒麗而不御下抱元化以含淳我皇上于是泊乎無為愷乎樂康譜虞絃于揮桐聽堯仁于擊壤講德于升平之圃登功于穆清之堂問道于崆洞之上考治于汾水之陽使君子小人奕世無疆賢賢親親樂樂利利咏歌前王于不忘者如水奔海如雲從龍如風偃草如網繫綱此真所謂我皇上合萬國之歡心以事先王也若夫登封太山降禪梁父徒篆功而紀瑞無關敬親與尊祖由今揆之亦猶棘林螢耀而與夫尋木龍燭也復安可以語哉臣添預載筆之末推本孝治奉揚仁聲敢附陳其事而美盛德之形容頌曰天作髙山啓王會兮列聖篤生信厥對兮光靈在天杳旭卉兮惟日再中司厥契兮聿追來孝承大糦兮民力普存融芬懿兮神其攸歆駢獻瑞兮仁恩滂洋渾中外兮垂衣端拱式則大兮明良賡揚熙帝載兮一人有慶兆民賴兮聖子神孫麗萬世兮欽定盛京通志卷一百十五
