body:
  text: 欽定四庫全書欽定盛京通志卷七聖製世宗憲皇帝御製詩文碑文祭文詩雍邸集欽定四庫全書欽定盛京通志卷七聖製世宗憲皇帝御製詩文碑文重修北鎮廟碑文雍正五年國家敬共明神虔修秩望嶽鎮海瀆之祠罔不祗肅醫巫閭山實為北鎮近接興京翊衛關輔曩者皇考御書匾額以展褒崇復遣官修飭廟貌御製碑文光昭奕代典至盛矣康熙五十九年朕奉皇考命恭謁祖陵於興京道經山麓躬詣展禮瞻仰祠廟蠲潔致禱因捐資庀工載加整葺嗣是雨暘時若禾黍有秋遼左黎元咸沾嘉貺洎朕臨御之初復遣專官董司營治棟宇榱桷丹雘一新雍正四年冬厥功告成朕惟兹山表自虞書載在周禮蓋自天地開闢以來靈秀之所萃聚越數千年神應彰顯而我祖宗發祥關左豐岐重地王氣所鍾惟神實為擁護永奠鴻基靈迹頻昭朕懷允愜敬共之念夙夜加虔神其𢎞敷蕃祉益顯豐功俾方輿之內四序順成百嘉鬯遂風雨慶其調和民物樂其康阜洪熙默贊嵗事豐穰慰兆庶依庇之心以稱朕愛育羣生肅奉靈祗之意式鐫琬琰用昭示於億萬斯年祭文祭告長白山文雍正元年維神天作崇髙地鍾靈異發祥有自延祚無疆朕纘受丕基新承景命竊念皇考膺圖以來百靈效順四海從風坐享升平六十餘載茲當嗣位之始宜隆祀享之儀特遣專官虔申昭告惟冀時和嵗稔物阜民安淳風遍洽乎寰區厚德長敷於率土尚其歆格鑒此精誠祭告北鎮廟文雍正八年維神名著禮經位均方嶽峙興京之重地擁衛畿東炳福國之明靈庇安遼左朕昔奉謁陵之命曽申詣廟之虔瞻望層楹遂捐資而營葺紹我寶位復發帑以增修煥丹雘其如新鐫青珉而紀事溯工程之肇啓閲嵗序之屢更十雨五風協休徵於泰運萬箱億庾占瑞應於豐年神貺昭彰朕心感慶遣専官以將事陳牲醴而薦馨所冀巒岫鬱蔥奠鴻基之鞏固郊原膴厚贊和氣以蕃昌惟爾明神尚其歆鑒祭大學士范文程墓文雍正十一年翊熙朝之泰運端重良臣稽册府之鴻猷宜崇元祀蓋成勞懋著生平之風概如存斯盛烈昭垂奕世之寵褒益篤載申綸綍式薦牲醪爾范文程器宇超羣才猷間代軍帷獻議贊一統之丕基文館陳謨佐萬年之鴻業任專樞密內外之經緯咸周位重台司夙夜之籌謀悉當於戲流芬竹帛卓然一代之完人樹範巖廊允矣千秋之茂典列豆籩於祠宇渥澤攸隆布筵几於里閭湛恩疊沛靈其不昧尚克歆承詩雍邸集冬日聖駕自塞外回鑾謁陵恭紀威德綏荒服乘輿按部回歡聲盈朔漠瑞靄被龍堆鞭拂霜花淨旗飄野吹開更遵豐沛路陵殿薦尊罍侍從興京謁陵二首承先崇報本橋道駐龍旗萬國梯航集敷天雨露隨精誠通寢殿肅穆奉宗彛敬仰松楸古昭森盛烈垂其二龍興基景命王氣結瑶岑不覩艱難迹安知啓佑心山河陵寢壯弓劍嵗時深盛典叨陪從威儀百爾欽陪京新豐傳舊里今睹濯龍池天地開神奧山河啓帝基金戈勞百戰玉葉衍千枝追逺皇情切趨從仰孝思登望海樓極目淡滄海涵泓無所從量包天地外色染古今容浪起思鯤化雲飛羡鶴蹤坐觀淵默裏萬𣲖自朝宗瞻仰盛京宫闕念祖宗創業艱難恭賦二十韻奉命趨遼海猗歟仰舊宫逶迤龍脈逺詄蕩鳯城雄念昔開洪造乘時建武功師征方自葛考卜重遷豐一劍風塵際三陲指顧中神威宣率土皇極協蒼穹式廓彌增壯維垣遂克崇八門連閫域雙闕竦高空曳珮千官列輸琛萬國同兵農咸定制禮樂漸移風爰及純熙介覃敷景厯融寰區欣奠鼎故里抱遺弓沛邑恩優渥舂陵望鬱蔥星躔爭拱北王氣本從東綿瓞鍾靈盛凝庥後裔蒙聖時殷孝享敕諭遣微躬肅覩興京勝恭承祀典隆丕基勞櫛沐奕葉荷帡幪松檟靈祗護簷楹肸蠁通祖宗光烈在明發惕愚衷曉度杏山曙色催樵牧山崖徑鬱盤霜凝鴉背白沙印馬蹄乾海氣籠朝旭林飈送早寒鳯城清漏隔遙憶寢門安望醫巫閭山翠黛滿雲封遙看北鎮雄壯觀侔五嶽峻秩比三公蔥鬱興王氣扶搖廣莫風勒銘維祖烈瞻仰萬年同渡句驪河遼水東西岸寒雲接渺茫平沙留雁迹堠火靖龍荒木落晴巒出冰堅雪練長經時踈定省望日陟高岡謁福陵恭頌一峯天柱象崑崙聖武開基百世尊廟貌輝煌藏劍舄塵氛蕩滌闢乾坤赤龍遐舉雲留影石馬宵趨汗漬痕赫濯聲靈通僾肅春秋霜露感長存謁昭陵恭頌鍾靈育秀氣佳哉宇宙從兹景運開帝統兼因文治廣聖基豈獨武功恢遼韓海水涵深澤松杏山高接上台虔肅奉觴恭拜畢五雲飛處久徘徊望海樓二首凌霄雄傑聳層樓碧海蒼茫逺望收混一乾坤雲水闊濯磨日月浪花浮百川輸委盈襟帶萬類涵濡任泳遊聞道此中覃帝澤幾曽汪濊有停流其二朱欄畫棟最高樓海色天容萬象收水底魚龍應變化天中雲雨每蒸浮無波不具全潮勢此日真成廣漢遊仙客釣鰲非我意憑軒惟是羡安流欽定盛京通志卷七
