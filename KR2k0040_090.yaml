body:
  text: 忠節五國朝鑲黃旗漢軍正黃旗漢軍正白旗漢軍正紅旗漢軍鑲白旗漢軍鑲紅旗漢軍正藍旗漢軍鑲藍旗漢軍奉天籍屬欽定四庫全書欽定盛京通志卷八十六忠節五國朝鑲黃旗漢軍高守官奉天人𨽻鑲黃旗漢軍原係鴨緑江鎮江守堡官天聰八年鎮江人叛執鎮守遊擊佟養正送明總兵毛文龍守官與焉遂遇害加贈佐領世職以其子髙題名襲順治七年九年三遇恩詔纍加二等輕車都尉同旗有崔應泰者原籍廣寧初任佐領崇德七年隨大軍征明錦州圍塔山城督紅衣炮攻之炮裂轟擊而沒恤贈如例管一舉奉天人𨽻鑲黃旗漢軍順治元年隨世祖入關授山西德勝路參將五年大同總兵姜瓖叛脅從不屈遇害其妻及長子致忠子婦孫女等十三口皆就戮幼子承業年未周乳母王氏撫抱以行逃免八年巡撫祝世昌上其事贈副將張必科𨽻鑲黃旗漢軍世居蓋平順治四年知直𨽻慶雲縣下車兩閲月宿弊盡革民荷更生時定鼎之初土賊告警每遇冦至即鳴鼓聚衆率步騎親逐之㑹上元夜賊聚飲郊外必科諜得其地率丁壯捕之縳三渠斬以徇其黨悉衆圍城必科善射殺賊無算守三晝夜賊黨內應者啓門納賊賊大至必科巷戰殺數人忽弦斷手傷擲弓於地曰命矣當尋一死所也挺戈下城賊環圍之亦不敢逼至一書齊舉火自焚蒞任六十五日耳事聞賜祭葬贈山東按察使僉事慶雲士民崇祀名宦祠子一魁以難廕知河間府亷得當日獻城賊詳請達於朝置重典一魁仕至河東鹽運使子綏逺别見本志人物傳范承謨瀋陽人𨽻鑲黃旗漢軍文程子也康熙七年巡撫浙江有惠政十一年擢福建總督十三年逆藩耿精忠反巡撫劉秉政為賊腹心欲脅承謨不屈遂囚之罵不絶口卒為所害詔贈兵部尚書加太子少保諡忠貞聖祖念承謨忠節親灑宸翰書碑勒石又以御書墨本鈐用御璽賜其家閩人又為建祠于道山之麓雍正七年入祀昭忠祠承謨忠孝性生友于敦篤居官剛正亷明寬厚愛人體恤民隱博學强記善屬詩文被幽時有䝉谷自序百苦吟武夷歌畫壁吟人多傳之高天爵鐡嶺人𨽻鑲白旗漢軍以子其位任大學士改𨽻鑲黃旗天爵慷慨重大義好讀書善騎射能挽强弓順治初任知縣以洪承疇薦知湖南長沙府尋除江西建昌府康熙十三年耿精忠反天爵以建不守則南昌必危出募丁壯固繕城垣躬擐甲胄與賊戰于東門萬年橋被執不屈死詔贈太僕寺卿諡忠烈入祀九忠祠雍正四年特加贈禮部尚書正黃旗漢軍金玉和奉天人𨽻正黃旗漢軍自幼從征諸路有功得授世職纍加至二等副將天聰五年擢禮部承政緣事革職六年復任參領隨太宗閲兵北演武場賚鞍馬七年升任副都統奉命往諭孔有德耿仲明等崇德六年大軍圍錦州玉和同副都統和濟格理敗敵步兵時明經略洪承疇所部兵遁入三臺玉和隨衆攻克殱之復攻克松山南山臺松山敵兵乘夜來犯以炮擊却之多斬馘復攻塔山破其城叙功授佐領世職七年攻中後所前屯衛破之加世職三等參領順治元年署懷慶總兵流賊圍濟源玉和往援殁於陳詔恤贈世職二等副都統其孫世礪康熙十八年征海賊劉國軒中矢貫胸殁贈雲騎尉尚安福奉天人𨽻正黃旗漢軍崇德三年隨貝勒杜度征明山東攻鄒縣以雲梯登城殁于陳贈佐領世職郭名望奉天人𨽻正黃旗漢軍崇德八年從征明中後所克其城順治元年從豫親王多鐸南征破揚州六月隨貝勒博洛征浙江克嘉興及崑山常熟江隂三縣以功授加一雲騎尉世職進攻金華同參領朱名登攻克之七年九年三遇恩詔加至三等輕車都尉尋以從征山西攻保德州中鎗殁加贈二等輕車都尉世職子汝龍于順治十六年從征福建至羅源擊賊殁于陳加贈世職一等輕車都尉祖應元奉天人𨽻正黃旗漢軍初任佐領崇德八年隨鄭親王濟爾哈朗征明攻中後所克之進取前屯衛復以炮克其甕城論功授佐領順治元年五月隨葉臣等平定山西克太原十一月隨豫親王多鐸平定河南進攻揚州中炮殁于陳贈佐領世職李向舜鐡嶺人𨽻正黃旗漢軍父獻針崇德時屢立戰功授世職二等參領向舜亦授參領順治元年從征江南攻揚州中炮殁其幼弟向日官遊擊康熙十四年從征湖廣省城被圍竭力捍守城陷罵賊不屈死特賜祭葬銀贈參將王自明𨽻正黃旗漢軍世居奉天初任佐領順治三年隨征陜西遇流賊孫守法率本旗騎兵擊敗其衆又賊帥賀珍擁衆列陳於山自明隨定西大將軍和洛㑹擊敗之五年山西逆鎮姜瓖叛隨巽親王滿達海攻汾州中炮殁於陳贈騎都尉張鴻猷𨽻正黃旗漢軍世居奉天初任守備隨豫親王多鐸南征平定河南江南攻揚州嘉興二府及江隂縣武岡寨四城俱克之順治五年逆鎮姜瓖叛于山西隨巽親王滿達海討之攻渾源州克其城進取左衛中鎗殁于陳贈騎都尉徐淳𨽻正黃旗漢軍世居遼東由貢生纍升山西岢嵐道順治五年逆鎮姜瓖叛淳捐軀殉節康熙元年特贈光祿寺少卿又同旗有成大業世居遼東纍任江西湖東道順治五年逆鎮金聲桓叛約大業共謀不從被執罵賊不絶聲遂被害八年贈如例李向禹鐡嶺人向舜弟也順治五年任陵川令姜瓖之亂禹妻王氏謂禹曰君職守土宜竭力報國勿以家為念禹出禦賊王氏與二女先自縊城破禹被執誘之降且怵以兵不屈死之其長兄向堯時任助馬路參將合門七十餘人俱盡節詔贈向禹光祿寺少卿向堯都督僉事祀本縣忠義祠劉應舉奉天人𨽻正黃旗漢軍初任佐領隨大軍征明攻右衛朔州克其城順治六年隨征逆鎮姜瓖攻汾州北關廂中炮殁于陳贈騎都尉加一雲騎尉朱國治撫順人𨽻正黃旗漢軍崇德時即入旗籍順治四年知固安令報最由州牧司道厯任巡撫康熙十二年逆藩吳三桂反被執使降國治罵賊不屈遂遇害二十年特恩加贈户部右侍郎祭葬如典禮雍正七年奉㫖入祀昭忠祀正白旗漢軍董廷元𨽻正白旗漢軍天命六年太祖始定瀋陽愛其勇力授寬甸備禦天聰五年從征大凌河六年從征察哈爾七年從征旅順口江華島並在行間有功崇德元年從征髙麗次年攻皮島所乘船被敵炮擊破廷元同家口俱殁於江太宗憐其效力有年特賜祭銀六百兩弟廷儒任大同守備善騎射有謀略總兵姜瓖謀逆誘廷儒至署微露其意曰公若助我則大事可成共享受富貴廷儒怒罵並拔所佩刀起賊衆羣持之遂被擒廷儒罵不絶聲賊剖心支解之併其子開國及眷口俱被害特贈昭武將軍賜祭葬又廷儒弟廷伯崇德五年從征明圍錦州同參領孫有光擊明松山杏山兵皆敗之七年圍錦州擊明吕翁山嘴兵敗之松山敵兵乘夜來犯擊却其衆進攻塔山杏山敘功列一等升授佐領八年從攻前屯衛中後所並克之順治元年授加一雲騎尉二年恩詔加佐領世職是年從豫親王多鐸南征平定河南五月克揚州六月擊平湖嘉善敵兵敗之又敗嘉興敵兵克其城至錢塘江有敵兵夜犯我營廷伯隨都統吳守進擊敗之六年從鄭親王濟爾哈朗征湖廣同副都統金維城領兵至馬河陳亡贈騎都尉加贈一雲騎尉七年九年兩遇恩詔加至二等輕車都尉世職罔替廷元兄弟三人並以死事著人稱為一門忠烈云滕應元奉天人𨽻正白旗漢軍官佐領天聰四年大軍伐明取永平復攻灤州應元轉戰而前陷陳殁詔加優恤豫騎都尉世職黃廷柏𨽻正白旗漢軍世居奉天授靈壁令涖任五月以才能調大興順治三年擢知山西汾州府五年大同總兵姜瓖叛明年四月僞副將姜建勳擁賊萬騎猝圍汾州攻陷城東門廷柏率壯士與賊鏖戰自晝至夜力屈被執罵不絶口遂遇害委尸於路子奠中年十三守父尸號泣汾人感其德具棺斂之既而奠中亦被賊執碎其首幸不死九月汾州事平喪還世祖特遣官諭祭追贈太僕寺卿康熙五十七年聖祖特命立祠死所嵗時奉祀雍正二年世宗御書成仁取義匾額恭懸祠中遲變龍𨽻正白旗漢軍世居奉天授國史館副理事官再遷至山西糧道順治三年任江西布政使五年金聲桓王得仁據城叛將兵圍署使人勸降變龍抗節不屈賊率兵入署執全家强之變龍罵詈不絶口賊怒遂割舌抉目并碎其尸其祖孫父子兄弟妻妾闔門十八口俱繫石沉之江心江右人莫不哀之康熙三十四年崇祀忠烈名宦滕天成𨽻正白旗漢軍承襲佐領康熙十五年征浙閩力戰海澄豬兒山死之恩豫恤廕入祀忠烈祠正紅旗漢軍孔有德遼東人𨽻正紅旗漢軍天聰六年來歸順治六年以定南王率兵平粵西遂留鎮桂林九年靖寶鎮將失守分遣赴援僞安西王李定國從間道突犯桂林麾下李養性孫龍程希孔俱戰殁有德知不守乃闔室舉火妃李氏以下並投繯拔劍自刎死賜諡武壯祭葬贈恤特加優厚祀昭忠祠夏時芳𨽻正紅旗漢軍世居奉天纍任陜西榆林定邊道順治六年二月叛鎮姜瓖率賊兵困城十九日城陷被執不屈罵賊遇害康熙元年八月追贈太僕寺卿恩賜全葬廕一子五品官王國泰𨽻正紅旗漢軍世居開原初任三等護衛康熙十三年八月隨經略莫洛由陜西進征逆藩吳三桂十二月至寧羌州提督王輔臣叛率兵來攻我營國泰同經略莫洛拒賊中鎗陳亡二十年追贈副將廕其子同旗冦萬平康熙十四年以章京隨征陜西遇王輔臣叛衆于娘娘廟力戰陳殁贈雲騎尉世職門可貴𨽻正紅旗漢軍世居錦州父世科崇德四年來歸授佐領後卒可貴襲職康熙十三年隨征逆藩耿精忠與賊戰於浙之花堡陳亡贈三等輕車都尉王國柱𨽻正紅旗漢軍世居開原初任五品官康熙十四年六月進征江西至石匣擊賊陳亡贈雲騎尉世職張廷輔𨽻正紅旗漢軍世居蓋平康熙十三年逆藩耿精忠以福建叛勾連海冦命廷輔往勦十六年三月抵福建聞海賊冦泉州廷輔往援擒賊帥陳爵于西門追至海壖斬首數千級賊又攻同安廷輔以百人敗其衆于三寶墟尋有賊衆萬餘圍長泰陳於天津寨廷輔三戰三捷併降其衆賊攻五都擒其驍將陳璽姚葵賊遂氣奪十七年六月擊僞將軍劉國軒于海澄中炮殁二十一年贈雲騎尉世職阿爾泰𨽻正紅旗漢軍郎賽子也纍官吏部郎中康熙三年擢湖廣辰常總兵七年調鎮浙江黃巖十三年逆藩耿精忠攻浙江阿爾泰擊敗之賊復益兵攻城阿爾泰出城接戰我守城參將武浩暗降賊為內應遂被擒僞帥曽養性百計誘降不從罵不絶口同總督范承謨俱死難賜祭葬諡忠武雍正七年入祀昭忠祠子紹烈與耿精忠賊衆戰于石塘嶺陳亡贈雲騎尉王之鼎𨽻正紅旗漢軍世居奉天康熙十八年以定海將軍充四川提督恢復全蜀十九年九月孽逆吳世璠猶踞貴陽復犯永寧之鼎提兵進援賊黨尤廷玉胡國柱等九僞將軍之衆圍之數匝三閲月糧盡援絶猶間率兵挑戰士氣奮勇至九月九日賊以火藥轟城城陷被執拔刀自刎未絶舁至貴陽賊黨夏國相等百方勸脅大罵不屈遂與總兵何成德等十二人同時遇害詔贈少保諡忠毅廕其子三等伯世襲立祠于貴陽南關之外御書忠節垂芳匾額以旌之雍正七年入祀昭忠祠陳先鳯𨽻正紅旗漢軍世居奉天任陜西遊擊康熙十八年從四川提督王之鼎征逆孽吳世璠十九年九月擊賊於貴陽陳亡二十年賜祭葬銀兩廕其子四品官鑲白旗漢軍王興國𨽻鑲白旗漢軍世居奉天任四川永寧道順治七年隨征流冦九年十月猝遇賊衆於華陽陳亡贈世職三等輕車都尉何世榮𨽻鑲白旗漢軍世居撫順任佐領康熙十三年隨征逆藩耿精忠十七年擊海寇僞將軍劉國軒於海澄世榮奮勇力戰殁於陳恩賜祭葬立碑如典禮贈雲騎尉世職同旗鄭國明亦世居奉天任驍騎校康熙十三年隨征湖廣十四年五月與賊戰于永興陳亡贈雲騎尉世職鑲紅旗漢軍楊致祥奉天人𨽻鑲紅旗漢軍崇德時官啓心郎順治五年知山西潞安府六年大同叛鎮姜瓖圍潞安孤城援絶致祥奮身率家丁迎戰死城遂陷賊圍府署搜親屬三十七人盡殺之郡人建祠以祀康熙元年聖祖追念死節之臣贈太僕寺卿同旗有孫定遼順治元年從入關屢立戰功三年以征勛陽山冦戰殁贈三等輕車都尉劉浩𨽻鑲紅旗漢軍世居錦州知廣西潯州府孫延齡反浩抗節不屈與子中樞中梁中柱中楫同日遇害特賜祭一壇追贈太僕寺卿吳萬福奉天人𨽻鑲紅旗漢軍崇德時授佐領康熙間任福寧總兵捍禦有方冦盜屏息十三年逆藩耿精忠叛萬福發兵拒戰死之闔家見害贈太子太保豫恩廕祀九忠祠馬雄鎮𨽻鑲紅旗漢軍世居奉天由廕生任廣西巡撫康熙十二年逆藩吳三桂反孫延齡叛應之雄鎮密檄提督馬雄㑹勦雄遷延不至因蠟疏具狀並遣子世濟世永間道入京乞師延齡詗知夜發兵圍署百計擁之脅降罵賊不屈闔門死者百餘人詔贈太子太保兵部尚書諡文毅雍正三年入祀昭忠祠乾隆十六年特豫恩騎尉世襲陳啓泰蓋平人𨽻鑲紅旗漢軍任福建巡海道駐漳南時山冦遍授僞劄啓泰嚴保甲以靖反側康熙十三年逆藩耿精忠叛啓泰密與海澄公黃梧拒守㑹梧病事不可支語妻劉氏曰惟有一死以報朝廷妻曰君為忠臣妾不能為烈婦乎遂及女先自縊婢妾三十餘口相繼死啓泰從容引僚屬入視皆相顧失色啓泰慷慨陳義無異平時具朝服再拜乃自盡詔贈工部侍郎諡忠毅雍正七年入祀忠烈祠乾隆十七年特豫恩騎尉世襲柯永升𨽻鑲紅旗漢軍柯汝極從子初授知府康熙十三年隨征逆藩吳三桂在湖廣辦理軍務有方授湖南糧儲道厯任江西按察使安徽布政使二十七年巡撫湖廣到任甫一月時湖廣各標因裁汰兵額遂羣推夏逢龍為首鼓噪作亂殺司道等官永升亦被執罵賊不屈遇害特加賜祭葬祀湖廣名宦祠祝表正𨽻鑲紅旗漢軍巡撫祝世昌族子也纍官刑部郎中康熙十二年冬逆藩吳三桂反十三年正月大軍由陜西湖廣兩路進勦以尚書莫洛經略陜西莫洛薦表正才遂隨行于二月抵寧羌叛鎮王輔臣作亂莫洛遇害輔臣執表正回略陽勸令從逆不為屈遂加幽禁十四年聖祖念輔臣曽呈首吳三桂逆書因遣伊子繼正往諭悔罪來歸輔臣讀敕留其子繼正即出表正於獄令賫疏自理委罪莫洛聖祖復命表正賫諭往撫多方開諭輔臣遲疑不决復拘繫之表正以理切責遂與家人劉福壽雙頂大桂並為所害李顯孝奉天人𨽻鑲紅旗漢軍父茂芳國初以管壯丁著茂績崇德五年七年隨征明錦州皆有功授佐領纍加世職至一等輕車都尉顯孝其次子也康熙十五年隨征逆藩耿精忠天寶寺蜈蚣山之役皆在事有功十七年海賊劉國軒犯海澄顯孝進戰陳亡贈加一雲騎尉正藍旗漢軍佟養甲撫順人𨽻正藍旗漢軍太宗時直內院理事順治二年以總兵官銜從貝勒博洛南征明年浙江福建平命養甲與李成棟率兵定廣東是時明桂王由榔據肇慶僭號永歷唐王聿鍵弟聿􅟽據廣州僭號紹武養甲偕成棟自漳州入惠潮平之亟趨廣州遂擒聿􅟽及周益遼諸王世子十三人又明年分兵取南雄韶州檄成棟進兵肇慶由榔竄梧州走桂林我兵乘勝下梧州追斬其大學士丁魁楚于岑溪遣總兵徐國棟等略定髙雷連瓊等州兩粵將次平而明主事陳邦彥覘大軍四出成棟方移師趨桂林養甲駐廣州兵力稍單遂糾甘竹灘盜余龍突犯廣州海盜馬元生等應之以數萬衆薄太平門養甲督民兵扼門外陳斬數百級賊稍却尋成棟自桂林還救賊皆遁去明尚書張家玉亦乘間陷東莞養甲偕成棟攻復之並狥三水新寧諸邑悉就勦撫明總兵李承志等以平欒潯州兵來歸即令招諭左右江諸路降之未幾邦彥約其大學士陳子壯以蛋户萬餘再犯廣州潜結指揮楊可觀為內應養甲伺其謀斬可觀擊敗子壯等于五羊驛又敗之禺珠洲順風縱火焚其舟數十斬馘無算子壯等皆就擒圍家玉于增城城破家玉赴水死粵東復平養甲力請進兵定粵西並請發禁旅討僞秦王孫可望等于滇黔時恭順王孔有德已奉命軍湖南防勦可望等乃詔滇黔大舉俟有德疏報再議而以兩粵専委養甲方養甲之自閩而粵也以巡撫署兩廣總督成棟以總兵署兩廣提督逮奏功兩人皆實授而成棟止轄廣東不兼兩廣成棟自負功多疑養甲抑已奏不以實又與養甲部將郝尚久爭功有隙遷怒養甲㑹降將金聲桓王德仁叛于江西犯贑州養甲趨成棟赴援成棟遂據南雄叛迎由榔至肇慶謀與聲桓合兵圍贑州養甲知之間使移贑州守將書俾嚴戒備為成棟所獲益恨之乃以兵四百人劫養甲擁至肇慶養甲大罵不屈成棟密使其黨張祥賊殺之時順治五年冬十一月也事聞贈太子少保廕一子入監豫祭葬入祀昭忠祠又同旗有佟國仕任井坪路參將佟養升奉㫖養馬大同俱于順治五年逆瓖之亂巷戰而死詔贈國仕副總兵養升入祀大同忠烈祠佟恆年撫順人𨽻正藍旗漢軍以領催隨叔父佟養正戍守鎮江天聰八年其屬下將辨謀叛執養正父子併恆年獻于明島帥毛文龍恆年與養正等並不屈死之贈佐領世職其族孫世功初任佐領康熙十五年隨將軍圖海討叛鎮王輔臣於陜西師次高長坡攻僞總兵李黃英營戰殁二十五年追贈雲騎尉佟圖占撫順人𨽻正藍旗漢軍父養澤以業商通誠本朝被繫自獄逃出遂來歸授三等參領天聰八年卒圖占授佐領崇德三年隨鄭親王濟爾哈朗等攻明寧逺次中後所以巨炮攻附近諸臺炮轟裂圖占殁於陳纍贈至一等輕車都尉馬如璧遼陽人𨽻正藍旗漢軍崇德五年以驍騎校從圍錦州明兵出城拒戰擊却之又擊敗松山杏山步騎兵進取松杏兩路臺堡六年再圍錦州攻克駱駝山寨明兵自十三站乘夜來襲如璧與參政碩詹陷陳殺敵甚力及明總督洪承疇以兵十三萬赴援軍於松山聨絡塔山諸臺堡為聲勢如璧與石廷柱等狥塔山路以巨炮攻下之七年擢佐領隨鄭親王濟爾哈朗等取塔山松山八年復從取中後所及前屯衛二城順治元年授騎都尉世職兼任佐領二年英親王阿濟格勦李自成于陜西如璧𨽻其軍躡賊至湖廣與參領劉仲錦等擊走僞總兵馬進忠於武昌六年從鄭親王濟爾哈朗征湖南時明桂王朱由榔據武岡自成遺黨李錦劉體純王進才皆附之分踞寶慶衡州如璧自嶽州趨長沙衡州屢戰皆捷復偕副都統金維城逐北靖州猝遇伏馬中流矢死以短兵步戰力竭殁於陳追贈三等輕車都尉同旗有鍾尚勇世居鐡嶺亦以四川馬湖之役陳亡贈雲騎尉陳一德奉天人𨽻正藍旗漢軍初任佐領崇德八年隨鄭親王濟爾哈朗等攻中後所及前屯衛皆督放巨炮有功順治元年授加一雲騎尉是年五月隨都統葉臣等往平山西圍太原以炮攻克其城二年隨豫親王多鐸等平河南江南攻武岡山寨中炮殁於陳贈騎都尉王之儀廣寧人𨽻正藍旗漢軍康熙四年知福州府耿精忠叛變起倉卒人人震懾之儀獨奮呼曰賊敢反耶語未絶刀㦸交下立斃子琅妻張氏亦皆自殺詔贈太僕寺卿入祀忠烈祠甘文焜奉天人𨽻正藍旗漢軍康熙八年任雲貴總督時吳三桂在滇嵗糜軍餉數百萬役重民困文焜悉與蠲免奏增驛遞夫價以給嵗運㑹內艱請假葬親還京召對面陳三桂不軌狀十二年五月回任十二月三桂反提督李本深以安順應之文焜以省城不可守殺其妾擕子國臣馳赴鎮逺思招集楚兵厄險隘使賊不北出時副將姜義先已從賊各營嚮應文焜知事不可為赴吉祥寺先縊其子北面再拜痛突自刎筆帖式武善雅度等皆死之詔贈文焜兵部尚書諡忠果又按察使李興元貴陽府同知楊應鶚皆遼東人守節不屈先後被害並賜恤廕如例鑲藍旗漢軍朱珊奉天人𨽻鑲藍旗漢軍父繼文天命六年大軍克遼陽即來歸以軍功官參將及請老珊襲職天聰五年隨征明大凌河戰殁張瑞午奉天人𨽻鑲藍旗漢軍總督張存仁弟存義之子也順治初厯任州牧擢知府康熙十三年遷福建邵武守逆藩耿精忠反分遣逆檄下狥各郡縣瑞午被執罵賊不屈死子六人同遇難賜祭葬贈太僕寺卿段應舉遼陽人𨽻鑲藍旗漢軍從征叛鎮姜瓖及進勦孫可望等於湖南皆有戰功康熙十五年進征逆藩耿精忠當克收福建全省時誓師戒殺秋毫無犯㑹十七年海賊鄭錦等併力犯海澄食盡援絶城陷自縊死恩豫輕車都尉世職雍正初入祀昭忠祠王應魁𨽻鑲藍旗漢軍世居錦州康熙中知江西南豐縣時耿精忠叛所在山冦響應應魁率家人與鎮兵分城而守鎮將失守城陷應魁自刎詔贈按察使僉事入祀忠烈祠奉天籍屬徐勇奉天人順治二年以總兵鎮黃州屢勦降九江湖北流冦旋移鎮長沙五年流冦犯安仁勇一鼓殱之是年冬賊黨一隻虎等率衆薄長沙勇勒兵與戰賊益衆乃嬰城堅守賊攻不下遁去尋調辰常總兵賊黨張光翠等犯辰州勇與參將張鵬等力戰城陷死之妻曹氏子祚泰闔門三十九人皆遇害詔加贈太子太傅賜祭葬進一等男諡忠節建祠江夏乾隆三十二年上念緑旗官辨致命疆場克昭義烈者於世職襲滿時特豫恩騎尉世襲罔替徐勇與焉郭之秀瀋陽人順治三年任福安知縣時冦盜方熾之秀竭力禦撫㑹明末餘冦聚衆焚掠督兵與戰為流矢所中死詔贈按察使僉事祀本縣忠義祠林中瑜遼陽人順治三年以副將鎮太平奉檄勦撫麻姑港口兩見膚功郡東小醜竊發中瑜領兵搗賊馬陷深塹死之詔贈副總兵祀忠烈祠董璘廣寧人知福建沙縣時縣境初闢民多流亡璘悉心撫字始有更生之樂順治四年土冦攻城糧乏待救不至死之詔贈按察使僉事祀本縣忠義祠甘體垣奉天人順治初知閩之海澄四年土賊攻城城破欲汚以僞命不受沉之水邑人建祠祀之詔贈按察使僉事祀本縣忠義祠李懋祖奉天人官湖廣郴桂兵備道僉事順治五年留署廣西巡撫駐永州明巡撫何騰蛟自全州引衆逼永州十一月城破懋祖及其子廷賡俱殉難詔贈光祿寺卿入祀忠烈祠王昌齡遼陽人官冀寧道順治五年大同總兵姜瓖叛昌齡轉餉軍中遇賊被害詔贈光祿寺卿又定襄令祝文光垣曲令李榮宗繁峙令崔尚質襄垣令佟學詩屯留令陳思忠以循良亷能著績皆遼東人俱于姜瓖之亂殉節而崔尚質闔門自焚死尤烈詔贈崔尚質光祿寺少卿祝文光等俱贈按察使僉事並賜入祠春秋致祭王來覲奉天人任河東分守道降霍州知州順治五年姜瓖叛以霍為南北孔道攻益力來覲督兵以守城陷血戰死祀忠烈祠贈太僕寺卿又長子令李允升賦黨夜冒官軍入城允升不屈被殺文水令曹之賢年少精敏長于斷獄悉力捍城城陷被害詔贈李允升曹之賢按察使僉事鄭鴻圖遼陽人任河東鹽運使同知甫蒞任值姜瓖叛登陴守禦力盡城陷死之詔贈河東鹽運使祀忠烈祠宋之玉奉天人順治初任大同兵備道駐朔州五年姜瓖叛密與通判楊逵知州王家珍謀靖內患既而變猝起謀不克遂手刃愛子以死家珍亦奉天人亦不屈死詔並賜祀忠烈祠恤廕如例金光祥奉天人順治五年任寧武兵備道僉事姜瓖之叛寧武兵應之光祥自縊死詔贈光祿寺卿祀忠烈祠錢法裕本浙人占籍遼東順治初知蒲州府姜瓖叛城陷被執不屈死詔贈布政使參議祀忠烈祠夏廷印廣寧人官神木觀察副使以清恪聞順治五年高有才之變慷慨赴難死於府谷時延綏總兵沈文華義州人亦為高有才所害詔贈沈文華提督夏廷印按察使並祀忠烈祠夏一統志作徐宋賢都奉天人順治五年知城武縣時逆冦李化鯨作亂賢都猝不及備先以甘言怠其謀化鯨遂攻曹縣賢都募死士夜薄其營化鯨覺還攻城武賢都力戰闔門二十八人皆被屠戮詔贈光祿寺少卿祀本縣忠義祠蔡廷棟廣寧人以拔貢任兖州府學訓導署張秋捕河通判以擒土冦丁惟嶽功升曹縣教諭李化鯨陷城棟力戰死之賜祀忠烈祠廕恤如例李絮飛奉天人順治五年為甘肅臨鞏道甫至任㑹回人米刺印叛殉節死蘭州同知趙翀學𨽻正白旗漢軍同時死難詔贈太僕寺卿祀忠烈祠朱衣助奉天人順治五年知深州時土冦未盡披堅執鋭為士卒先捍衛撫循士民德之厯任操江為海賊鄭成功兵所獲不屈而死詔贈太僕寺卿祀忠烈祠李文學奉天人順治六年知定陶縣時李化鯨餘黨邢可觀猶負固榆園文學蒞任三月遇賊於白塔坡挺身與戰身被數創而死詔贈光祿寺少卿祀本縣忠義祠文運亨奉天人順治初任永昌之新田令值猺賊犯城運亨率兵拒守賊衆大至城陷遂遇害詔豫祭葬祀忠烈祠吏民德之並祀本縣名宦祠吳國用奉天人順治六年知霍邱縣興革協宜山賊陳伯紹倡亂擁衆攻城㑹久雨城圮國用率兵巷戰揮刀躍馬殺賊七人力盡自刎詔贈按察使僉事祀本縣忠義祠塗郭奉天人任河南河北兵巡道順治六年冦陷隆平延及武安廓親率兵勦捕馬蹶陳亡詔贈光祿寺卿建祠以祀唐士傑奉天人順治中除南漳縣時土賊盤踞西山出沒無常士傑每挺身勦賊賊勢蜂擁力不能支遂自焚死祀本縣忠義祠贈廕如例王希舜遼陽人厯任分巡河西道寬簡愛民順治六年王永疆作亂攻陷延安榆林等十九州縣希舜不屈死之詔贈光祿寺卿祀忠烈祠徐大用奉天人厯任參議道分守萊州順治十年膠州總兵官海時行素驕蹇因調南征遂嗾兵為逆逼勒大用同入海不從遂被害祀忠烈祠廕恤如例劉登科奉天人知浙之黃巖縣順治十四年海冦陷城脅降不從遂縛投三江水中死士民哀之祀本縣忠義祠贈如例魏萬侯奉天人武進士任浙江溫州鎮左營遊擊康熙甲寅夏閩冦圍瑞安縣萬侯率師援擊至北湖嶺斬馘甚衆以後軍不至還保慈湖既而羣賊蜂集勢不能支力戰死之長子棟亦殁于軍詔贈副將入祀忠烈祠廖有功瀋陽人官福州千總康熙甲寅三月耿精忠㑹文武諸僚脅制府范承謨為亂有功不從大呼奮擊手刃十數賊躍馬至通衢逆兵追擊遂遇害祀忠烈祠廕恤如例范文英奉天人官江西饒州府同知時耿精忠叛以兵犯城文英與知府郭萬國同死於難祀忠烈祠廕恤如例李成功奉天人任潮州參將𨽻湖鎮劉進忠麾下康熙十三年耿精忠叛進忠密授僞職成功謀於于國璉共誅之機泄被執不屈死詔贈驃騎將軍祀忠烈祠于國璉奉天人授防禦職性忠勇與參將李成功謀誅叛鎮劉進忠事泄進忠擊璉璉射進忠中臂力戰三晝夜乃死祀忠烈祠廕恤如例王忠孝奉天人康熙十五年署廣東左翼鎮總兵進勦吳三桂于滇南衝鋒破敵身先士卒引兵深入陷陳死詔贈都督同知祀忠烈祠徐盛奉天人康熙十五年知廣安州談宏之亂為賊所縳不屈死詔贈四川布政使參議祀忠烈祠欽定盛京通志卷八十六
