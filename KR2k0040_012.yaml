  - {type: page-break, offset: 0, content: '', id: KR2k0040_WYG_012-1a, image: WYG0501/WYG0501-0107a.png}
body:
  text: 詔敕諭欽定四庫全書欽定盛京通志卷八綸音臣等謹按帝王報本明禋禮隆原廟史記所稱周武王九年上祭於畢上陵之禮實惟權輿欽惟我皇上寅紹前謨覲揚光烈御極以來以盛京為天作丕基錫類推恩尺一所頒湛澤汪濊復以八年十九年四十三年三謁丹陵升禋禔福盡慤盡誠蹕路經臨賜蠲賜復仁膏叠沛鳯綍宣傳莫不仰綸言之淵穆欣至教之覃敷洵乎大聖人善繼善承求寧求莫之深𠂻足以昭示來許垂裕萬年臣等謹裒集紀元以來所奉諭㫖為綸音門次列祖聖製後仰盛德之雍容欽聖謨之廣運大文炳蔚實與典誥並煥云謹志綸音第二欽定四庫全書欽定盛京通志卷八綸音一皇上聖製詔聖駕詣盛京恭謁祖陵禮成恩詔乾隆八年十二月奉天承運皇帝詔曰溯原報本彌深追逺之情陳瑞薦馨式重謁陵之典我朝定鼎中原統一方夏重熙纍洽海宇升平聲教覃敷民物康阜百年於茲緬惟聖聖相承肇基中土太祖髙皇帝太宗文皇帝誕膺景命式廓鴻圖遼海瀋陽實為龍興之地朕纘承大統夙夜孜孜念祖宗締構之艱難思列聖燕詒之綿永盛京舊地瞻望橋山敬考典章肅申思慕於乾隆八年秋恭奉皇太后祗謁永陵福陵昭陵大禮既成留都是蒞瞻神丘之葱欎仰祖德之靈長爰沛德音用頒湛惠於戲謨烈顯承隆億年之泰運恩膏沾被協萬國之歡心布告天下咸使聞知敕諭一諭總理事務王大臣雍正十三年八月二十七日據署盛京工部侍郎七克新奏稱本年六月十三日山水泛發漫溢福陵石堤臣親身前往敬謹驗看得石堤堅固無庸補修所有石堤前平地被水衝刷又引河壩西河崖衝開一假併石堤背後所築之工亦被水衝刷應請敬謹修理等語朕思福陵工程風水攸關甚為重大從前皇考特命平郡王前往㑹同該將軍等督率各員修理今所築土堤有衝刷之處或因從前修築時未曽妥協或當日辦事工員未曽悉照平郡王指授修理堅固或數年以來未曽嵗加修築善為防護數者均未可定今既被水衝刷即應敬謹修補以資鞏固著派王子一人及大臣一員帶善看風水之人前往相度形勢將應修工程㑹同該將軍及盛京工部即行料估敬謹督修并將從前經手熟練工員酌帶前往分委襄事再永陵堤工亦微有被水衝刷之處著派出之王大臣等一併查看敬謹修補諭總理事務王大臣雍正十三年十一月二十五日奉天陵寢每年祭祀典禮關係重大向例止遣侍郎行禮朕思世澤雖逺祖宗一脉相承必子孫䖍奉明禋而後精誠可格嗣後當於宗室中派公三人前往行祭祀禮其應即在奉天居住或應每年輪班派往之處著總理事務王大臣㑹同各旗王公等定議具奏諭總理事務王大臣乾隆元年正月二十八日朕恭謁祖陵敬瞻殿宇規模宏整妥侑攸昭惟是榱題丹艧多閲年所似應重加藻飾以肅觀瞻但陵寢關係重大宜詳稽典制敬謹酌議方可舉行朕思祖宗福祿綿長萬年垂裕山陵廟貌靈爽式憑為子孫者以時修葺庶足以展孝思如典制應行則追逺崇先誼當均切永陵福陵昭陵殿宇並應一體修繕著總理事務王大臣敬謹定議具奏諭總理事務王大臣乾隆元年九月十三日發給黑龍江寧古塔等處披甲為奴之犯原係叛逆及强盜减等者此等皆罪惡重大寬免其死發令為奴已屬法外之仁而伊等凶惡性成仍復犯法是以定有聽伊主打死勿問之例乃聞各處披甲人等竟有圖占該犯妻女不遂所欲因而斃其性命者情甚可惡且其中有曽為官職生監而亦受凌辱漫無區别情實堪憫著各該將軍等查明現在為奴人犯內有曽為官職及舉貢生監出身者一概免其為奴即於戍所另編入該旗該營令其出户當差並出示曉諭披甲人等俾其痛改舊習倘仍有圖占犯人妻女因而致斃其命者查出仍行照律治罪而為奴人犯亦不得揑詞挾制伊主嗣後法司定案除真正反叛及强盜免死减等人犯外其職官舉貢生監等有罪應發遣者不得加以為奴字樣如何分别定例之處該部詳議具奏諭總理事務王大臣乾隆元年十二月初七日朝鮮歸順我朝恪守藩封之職纍世恭謹向來八旗臺站官兵於每年二八月間擕帶貨物前往中江與朝鮮貿易朕思旗人等但有看守巡查之責原無暇貿易且亦不諳貿易之事逺人到邊恐致稽遲守候多有未便嗣後著內地商民與朝鮮國人貿易即令中江稅官實力稽查務須均平交易毋得勒掯滋擾以示朕加惠逺人之至意該部并將此傳諭朝鮮國王知之諭內閣乾隆三年八月二十五日今年直𨽻各州縣收成豐歉不一米價未免稍昂而奉天山東二處年嵗俱獲豐收從來鄰近省分必須商賈相通以豐濟歉則需穀者既得以糊口而糶榖者又藉以營生殊屬兩便之道但奉天山東俱屆海濱地方官吏因向有禁米出洋之例未肯任從民便用是特頒諭㫖奉天山東沿海地方商賈有願從內洋販米至直𨽻糶賣者文武大員毋得禁止但商賈米船放行之時該地方官給與印票仍行文知照直𨽻總督其沿途巡海官辨亦時加查驗毋令私出外洋米船既抵天津䣃米之後直𨽻地方官給與回照仍行文知照奉天山東兩省俾米穀流通以副朕軫恤民瘼一視同仁之意該部即行文奉天將軍府尹山東巡撫知之諭內閣乾隆三年九月十八日奉天所屬旗民交涉案件查向例由地方旗民官彙具案情申送刑部審擬但奉屬地方逺近不一應質人犯多屬牽連該部提審駁查往返道路擔延時日拖纍無辜弊端種種夫地方官身既親民駐劄本境平日習知人情臨時自易體訪若令㑹同就近旗民官承審定擬止將有罪人犯解部覆訊定案其一切牽連對質之人於審明之日即行省釋則人犯既免拖纍而案件亦得速結但府州縣逺近不一其餘地方旗民官如何㑹同審理可以定為成例永逺遵行之處著奉天將軍刑部侍郎府尹㑹同詳查定議具奏諭內閣乾隆四年九月初六日朕奉皇太后懿㫖欲叩謁祖陵以展誠切朕奏奉天路逺且俟一二年之後今年請先謁孝陵景陵行禮已䝉俞允其起程日期著欽天監選擇具奏一切應行事宜著各該管衙門先期備辦諭軍機大臣乾隆五年四月初十日據奉天府尹吳應枚奏稱奉天自開例捐監積穀以來報捐者寥寥無幾蓋緣直𨽻山東各省水陸俱通商販絡繹有榖之家俱各貪圖貴糶瞻望不前請照江西安徽二省奏准之例凡外省來瀋行商過客暫時流寓之輩並作宦之生俊人等皆許其照例報捐俾所積益多則所濟益廣似可無拘年限等語各省捐監積穀一事原以備民間之緩急先據福建巡撫王士任以本省捐穀無多請准行商過客及暫時流寓之輩一體報捐以資積貯朕降㫖允行續據江西巡撫嶽濬援例以請朕亦允行又據安徽巡撫陳大受援例奏請並添入作宦之生俊字樣朕因安徽等屬連嵗歉收從廣儲米穀起見且有福建江西為例故亦並照所請行是朕一時踈略處乃吳應枚遂援以為例具摺陳奏今細思之作宦之生俊在該地方一體報捐其中大有弊竇或多收民人穀石以填補子弟捐監之數或少交入倉穀石以致有虧捐欵之額或挪移常平社倉官穀以充捐項之用或礙上官情面代為騰挪而開虧空之端此皆事之所不免者此事若准行將來何者不援此例請行乎况奉天地方非江南等省可比行商過客亦屬無多有何益處且朕從前為閩省所降諭㫖原係一年期滿將外籍報捐之人停止今吳應枚摺內並未定有年限但稱俟缺額榖石捐足之日奏請停止是停捐遙遙無期矣從前之收榖原欲濟民之食今如此辦理是又巧開一捐納之途矣况吳應枚奏稱有榖之家貪圖貴糶此彼地情形也今又准作宦之生俊一體報捐則交官之穀愈多穀價豈不愈貴乎所奏甚屬錯繆其作宦生俊報捐之處不但奉天不可行即安徽亦不可行著該部即行文停止至於奉天地方應否准行商過客報捐著該部定議具奏諭內閣乾隆八年五月初一日朕恭奏皇太后前往奉天叩謁祖陵擇於七月初八日啓行一切應行事宜著各該衙門先期備辦諭內閣乾隆八年五月二十四日奉天乃我朝發祥之地歷朝實録俱應繕修滿漢文各一部送往尊藏俟現在皇史宬內閣藏本寫成後即著在館人員敬謹繕寫其送往儀注大學士㑹同禮部詳議具奏諭內閣乾隆八年七月十八日朕奉望太后前往盛京恭謁祖陵所有經過州縣不令絲毫擾纍但安營除道未免有資民力朕心軫念著直𨽻總督高斌奉天府尹霍備查明各該地方本年錢糧應徴數目請㫖蠲免以昭朕體恤閭閻之至意諭內務府乾隆八年九月二十四日朝鮮列在外藩世篤忠貞謹守侯度今因朕親詣盛京恭謁祖陵該國王遣陪臣齎表朝貢具見悃忱宜格外加恩以嘉恭順其應如何錫賚之處著內務府總管議奏所遣陪臣如何賞給亦著察例一併議奏諭禮部乾隆八年九月二十四日朝鮮使臣入貢係國王族人稱君者始召見其餘祗賜宴於禮部此定例也朕明日宴諸王大臣官員於崇政殿朝鮮使臣亦著與宴以外藩陪臣得厠朝臣之末係朕格外殊恩該部傳諭使臣知之諭內閣乾隆八年九月二十四日盛京户部莊頭每年交納糧石預備陵寢祭祀各項供應外其餘交收入倉以為撥給各處匠役口糧之用今朕恭謁祖陵親詣盛京軫念各莊頭終嵗勤苦輸將無誤著將乾隆八年分應交倉糧一萬餘石加恩寬免其各處匠役口糧著於舊存倉糧內撥給再各莊尚有乾隆七年分未完米豆草束俱著該部查明一併豁免以示朕優恤旗莊之至意諭奉天府尹霍備等乾隆八年九月二十八日盛京為王化始基之地自昔人心淳厚風俗敦龎甲於天下但旗民雜處恐無知之輩尚存畛域之見殊非一道同風之盛惟在該管大臣董率有方則兵民自知觀感府尹一官為各屬地方有司之統領其所職掌亦不甚繁凡有旗民交涉事件務須與將軍等和衷商確一秉虛公則諸務自能妥協倘先存一為旗一為民之見則意見參差辦理錯誤既失寅恭之義何以端人心而厚風俗乎此於根本重地甚有關係故特降㫖訓諭該府尹霍備等知之諭內閣乾隆八年十月初一日朕恭謁祖陵巡幸盛京所有奉天府屬錢糧及各莊頭糧石俱已豁免尚有盛京等處旗地未得沾恩著將盛京興京遼陽牛莊蓋平熊嶽復州金州岫巗鳯凰城開原錦州寧逺廣寧義州等十五處旗地應納本年米豆草束免徵一半其乾隆七年以前積缺與七年分因災緩徵之項俱著該部查明一併寬免再盛京尚維邦耿化祚名下壯丁應交本年丁米及上年緩徵米石亦著一例免其輸納俾旗民一體邀恩普沾惠澤該部即遵諭行諭內閣乾隆八年八月十七日奉天將軍額洛圖因朕恭謁祖陵經行口外恐扈從人衆沿途米糧不敷供給奏請巡幸之先禁止米糧入關今已回鑾自應開禁通商苐恐各處關口胥役人等仍或借端阻遏希兾勒索以致米糧一時不能流通著該將軍府尹等即速行文關口各員辨稽查胥役毋許借端阻遏并出示曉諭關外商民聽其運往關內各處販賣俾米糧流通民食充裕以副朕痌癏民瘼之至意諭內閣乾隆八年十二月二十日據盛京兵部侍郎春山奏稱盛京等處驛站每年大驛各出銀十六兩小驛各出銀八兩餽送侍郎盤費又出銀四百兩餽送正副監督此外逄節又有規禮其二十九驛驛丞一年所得俸銀三十餘兩又皆賂遺侍郎合計有一千餘兩凡此皆係驛丞自送因而驛丞有所恃以無恐將錢糧任意花費雖馬匹疲瘦短少侍郎與監督俱置不問等語餽送陋規原干例禁盛京陋習相沿料非一任若事窮究未免拖纍多人今姑寬其已往嗣後著行革除如有再蹈前轍者必從重治罪至於各省驛站或有此等情弊亦未可定向來設有巡察御史稽查今巡察既裁督撫更當留心查察使積習湔除驛務不致廢弛若日久弊生或經科道糾參或欽差大臣經過查出朕惟爾督撫是問該部即遵諭行諭兵部乾隆十一年七月二十一日莽牛哨添設官兵巡查一案前據部議應再令該將軍悉心妥酌續據達爾當阿奏稱令熊嶽副都統西爾們親往查看設泛之處與朝鮮實不相通無慮混雜滋擾且於內外俱屬有益經部覆准朕已允行茲據該國王陳奏前來以墾土設屯於伊國未便朕又敕交部議該部以毋庸議覆奏朕思我朝加恩朝鮮從來優渥今莽牛哨添設官兵巡查一事既經西爾們查明與該國界址無慮混雜滋擾且於內外俱屬有益而該國王又陳奏其不便情詞懇切究未知該地實在情形如何著兵部尚書班第馳驛前往率同西爾們將彼地情形詳加察勘如果設泛之處係中國界內與該國毫不相涉則設兵置汛以杜奸宄所以肅靜邉防自屬應行之事即該國王懇請亦不便准行若其地界或有犬牙相錯難免混淆之處亦即據實奏聞候朕另降諭㫖至從前議准達爾當阿所奏展邉墾土一案該國王既稱鳯凰城樹柵之外向留空地百餘里務使內外隔截以免人烟凑集混雜滋事之患此事尚屬可行著將鳯凰城展柵之處照該國王所請停止並令該部傳諭該國王知之諭內閣乾隆十一年八月二十六日朕普免天下錢糧奉天省本年係輪蠲之嵗各省定例止蠲地丁銀兩米豆不在應蠲之例但奉天省地丁錢糧向來銀糧並徵其額徴米豆即係正賦著將奉錦二府乾隆十一年應徵米豆一體蠲免該部即傳諭該府尹知之諭內閣乾隆十一年八月三十日從前奉天將軍達爾當阿具奏鳯凰城邊外莽牛哨設汛一案經部議覆准行續據朝鮮國王李吟奏稱與伊國不便朕降㫖命尚書班第前往查勘今據班第奏稱查勘得彼地在我朝界內與朝鮮國無涉雖與該國人等共涉一江若彼此不准越界各自約束所屬人等則不致滋擾永靖邉疆與伊國亦不無禆益此汛理宜安設等語由此觀之欲設汛之處在原定界址以內與朝鮮邉界無涉矣惟是該國王世戴國恩甚屬恭順若安設此汛彼國之無知小民倘有違禁者伊恐獲罪是以奏請其安設此汛之處雖有江灘分界兩岸不過一二里之遙相隔甚近如伊屬下人等不能遵奉該國王禁令以致該國王得罪朕心有所不忍著照該國王所請莽牛哨地方添設汛兵之處停止令該國王將伊所屬人等嚴加約束至於查拿內地偷越之人并應行呈報之處仍照原議實力奉行不必交部再議該部即傳諭該國王知之諭吏部乾隆十二年二月初二日據寧古塔將軍阿蘭泰奏稱永吉一州設在吉林烏拉係寧古塔將軍所轄地方該州向𨽻奉天府一應辦理旗民事務俱申報府尹轉咨不但稽延時日且於辦理事件多至掣肘請將永吉州改設理事同知屬寧古塔將軍管轄等語著照該將軍所請永吉州改設理事同知管理該州事務其作何裁改一應事宜交與該部定議具奏諭大學士等乾隆十二年三月十一日向來直𨽻有歉收地方需用米石彼此商販有將奉天米石由海道轉運內地者原屬應行之事至將奉天米石運往山東惟雍正八年議行一次此後間有歉收之年俱未舉行或因山東與直𨽻天津不同其海道遙逺逼近外洋恐有奸商透漏接濟奸匪之弊奉天上年有被水州縣即直𨽻天津等處運販亦停止今趙青藜奏請令山東小民往奉天採買海運其應否舉行之處著大學士㑹同該部詳悉定議速行具奏諭戶部乾隆十二年三月二十一日大學士等照例議駁固是向來海禁綦嚴原以防奸商透漏接濟奸匪之弊但東省上年被水地方目下賑借各項需用米石倘奉天可以通商販運而稽察嚴密不致偷越自於災地有益著行文詢問山東巡撫阿里衮奉天將軍達爾當阿是否可行奉天米石可以運往若干如何按數給照撥運東省如何驗照稽查俾商販流通不致透漏而奉天米價又不至於騰貴如果可行一面辦理一面奏聞此因東省偏灾一時權宜之事嗣後不得援以為例該部速行諭內閣乾隆十二年四月十七日盛京等處巡察官員昨已降㫖撤回令每屆三年該衙門將應否差員之處請㫖今思三年屆期一時差遣未必得如許賢員應分别年分陸續差遣方為妥協其巡察所至如彼處將軍以下倘有簠簋不飭政事失宜官兵擾纍及案件有無逾限皆該巡察等分內應查之事逰牧地方各有大員管理其是否實心任事挑補屬員有無屈抑并上駟院等衙門馬羣事務是否妥協亦應一一查察於差竣之日將所查該處三年內實蹟並地方現在情形逐一據實奏聞既可具悉該處吏治民情廣明目達聰之益而巡察人員之能否盡職即可定其殿最如此方於地方實有裨益而巡察不為虛設較之從前巡察人員但以注銷案件為事及差滿托拾無關緊要條奏塞責者不可同日而語矣其如何分年請㫖并定立巡察條欵著大學士九卿㑹同詳悉妥議具奏諭奉天將軍阿蘭泰等乾隆十五年八月二十四日奉天辦理流民一案前經降㫖從寬豫限十年令無資産者陸續回籍如已在奉省置有産業願編入奉籍者即准入籍今據將軍阿蘭泰等摺奏流民內竟有置有産業不願回籍而又不願編入奉籍者該將軍等請以附籍之名曲狥其意辦理甚為不合或因向來地方官辦理不善未經愷切曉示以致小民無知遲疑觀望耳著再加恩展限十年令該將軍並地方官等詳晰申明曉諭其在奉省本無産業者仍令陸續回籍外若在奉省置有産業何不即入奉籍既不欲回原籍而又不肯編入奉籍則是目無法紀怙惡不悛矣限期一滿定當嚴行治罪决不姑貸餘依議諭禮部乾隆十五年十月三十日禮部等衙門議奏十一月初四日恭奉列祖聖容實録玉牒送往盛京尊藏屆期朕恭詣拈香行禮所有應行儀注該衙門敬謹詳議以聞諭盛京五部乾隆十八年四月二十日盛京户刑工三部郎中八缺內著留户部一缺用本處人員其餘七缺並員外郎十六缺主事十七缺均以京員補用禮兵二部郎中四缺主事五缺均用本處人員員外郎八缺內著以京員補用兵部一缺其餘七缺留用本處人員諭內閣乾隆十九年五月初七日此次由熱河前往盛京恭謁祖陵所有經過直𨽻奉天州縣地方加恩蠲免本年應徵地丁錢糧十分之三著方觀承鄂保照例查辦該部即遵諭行諭內閣乾隆十九年八月初六日朕恭奉皇太后詣盛京恭謁祖陵道經吉林念此地為我朝肇基所自風俗淳朴官兵弓馬可觀尚能不忘舊習途次迎鑾者踴躍趨事具見尊君親上忱悃篤摯朕用嘉悅今車駕肇臨所有將軍大臣并官員兵丁人等應如何分别加恩賞賚著總理行營王大臣速議具奏諭內閣乾隆十九年九月初三日朕恭奉皇太后東巡展謁祖陵所有經過地方賜復蠲租一循彛典尤念今年奉天所屬州縣秋雨過多間被水潦雖高阜尚屬有秋但朕巡歷所經念茲貧民拮据益當加意惠鮮無令失所著該將軍府尹等查明被災地畝於恩㫖蠲免外應作何分别優恤之處即奏聞辦理諭內閣乾隆十九年九月十二日仰惟列祖創業東土光啓萬年景運山陵永峙福佑靈長我皇祖聖祖仁皇帝三詣陪京躬親展謁禮成行慶典冊昭垂朕寅紹丕基時深景慕緬自乾隆八年秋瞻仰橋山迄今已逾十載追逺之誠常如一日本年七月恭奉皇太后安輿由熱河啓鑾取道吉林巡歷遼瀋車駕所至兵民各安本業風俗淳朴輦路歡迎扶擕恐後具著忠愛悃忱仰見先澤留貽久而益𢡟朕心深用欽慰茲於九月初五等日謁祭三陵大禮告成宜敷愷澤其將奉天所屬府州縣乾隆十九年地丁正項錢糧通行蠲復經過地方前㫖所免十分之三及被水地畝應蠲錢糧仍於明年應徵額內補行豁除自山海關以外及寧古塔等處官吏軍民人等除十惡死罪外其餘已結未結一應死罪俱著減等發落軍流以下悉豫寬免凡我留都士庶尚其敬念根本重地益務敦龎毋忘先民矩矱共享升平之福永承樂利之休用稱朕加惠優恤至意諭內閣乾隆十九年九月十二日朕奉皇太后鑾輿由吉林前詣盛京恭謁祖陵所至地方多有年逾耄耋䇿杖歡迎者宜沛恩膏以彰盛典其奉天吉林所屬旗民男婦自年七十以上悉照從前恩詔之例分别賞賚用示朕引年優老至意諭內閣乾隆十九年九月十二日朝鮮國王李昑敬遣陪臣前詣盛京接駕賫表貢獻誠悃可嘉著照乾隆八年例加恩賞賚所遣陪臣一并照例加賞諭內閣乾隆十九年九月十三日朕奉皇太后鑾輿再詣盛京恭謁祖陵禮成奉天所屬府州縣乾隆十九年地丁正項錢糧已降㫖通行蠲復所有各莊頭及旗地應納糧石草束等項自應一體加恩以溥愷澤著將盛京戶部各莊頭本年應交倉糧一萬餘石概行蠲免盛京興京遼陽牛莊蓋州熊嶽復州金州岫巖鳯凰城開原錦州寧逺廣寧義州等十五處旗地本年應納米豆草束免徵一半其各壯丁應完本年丁米亦著免其輸納俾旗民均沾嘉惠用昭慶典諭內閣乾隆十九年九月十四日盛京為我朝龍興重地自定鼎以來設立五部侍郎及奉天尹丞等官分理庶政教養旗民責任綦重且距京師僅千有餘里方今天下一家即在漢人中猶不應稍存擇地之見况滿洲世僕豈可遂忘報本世臣本屬庸材粗通腐文徒以資深擢用至盛京禮部侍郎乃其詩稿中至有霜侵鬢朽嘆途窮之句幾自擬於蘇軾之謫黃州試思以彼其品其才與蘇軾執鞭將唾而箠之且卿二崇階有何途窮之嘆又云秋色招人懶上朝寅清重秩自宜夙夜靖共乃以疏懶鳴高其何以為庶寮表率又云半輪月色西沉夜應照長安爾我家獨不思盛京固我豐沛舊鄉耶世臣居心不可問如此則昨之革職發遣尚屬輕典夫縱情詩酒最為居官惡習以滿員而官盛京尚抑欎無聊形諸吟咏則從前漢人之以出關為畏途又不足怪矣此地風俗素淳甚恐為此輩所壞嗣後盛京各官當深以此為戒其有不思敬供厥職妄以詩酒陶情廢乃公事者朕必重治其罪可將此㫖各書一通懸之公署令觸目警心永垂炯鑒諭內閣乾隆十九年九月十八日朕由吉林至盛京周覽山川形勝敬稽實録所載仰見列祖締造艱難維時宗室諸王克奮忠勤功成百戰開國翊運之勳彪炳簡冊深切景念思盛京為龍興重地國初諸王功烈𢡟著如此並宜建祠以酬舊勳而示來許此地現有怡賢親王祠應將太廟配享之通達郡王武功郡王慧哲郡王宣獻郡王及禮烈親王饒餘親王鄭簡親王頴毅親王一併崇祠即命曰賢王祠令所司春秋致祭應行典禮該部詳議以聞祠內世祖憲皇帝碑亭可移於正中並鐫勒此㫖永昭我朝宗功元祀之巨典欽定盛京通志卷八
