body:
  text: 國朝人物十五鑲白旗漢軍鑲紅旗漢軍欽定四庫全書欽定盛京通志卷七十九國朝人物十五鑲白旗漢軍王元忠𨽻鑲白旗漢軍原守鳯凰城堡天命六年鎮江中軍叛降毛文龍元忠獨來歸授佐領世職後明降將內有與明通謀者元忠發其謀擒斬之又追殺逃叛生擒哨卒二次天聰八年以戰功授參領加世職二等順治七年九年兩遇恩詔加世職三等男尚好仁奉天人𨽻鑲白旗漢軍崇德五年我軍圍錦州好仁擊松山明兵敗其衆七年復圍錦州功居一等尋管佐領事八年從征明中後所前屯衛皆有功順治初加世職三等輕車都尉官浙江溫州鎮總兵卒祭葬如禮吕應學奉天人𨽻鑲白旗漢軍父國寶隨耿仲明航海歸誠應學於崇德六年授二等副都統世職八年從征明攻中後所前屯衛督巨炮克之順治元年從入關六年從征廣東斬偽總兵楊杰周齊王啓科等大捷敗偽伯馬飬麟之衆於靈山擊偽晉王李定國兵于髙明新會連敗其黨十四年敘功授三等子髙國相廣寧人𨽻鑲白旗漢軍父中選明乞休逰擊天聰八年國相隨父來歸初任佐領崇德八年從克中後所前屯衛順治元年隨入關二年西征至陜西克延安追流冦至湖廣並有功六年隨征山西叛鎮薑瓖克大同朔汾等處纍加世職一等輕車都尉十二年征海賊鄭成功有功十六年駐防京口康熙十三年吳三桂等叛隨征江南徽州等處賊冦屢有功又破吳三桂叛衆於武岡州楓木嶺等處十九年任杭州副都統致仕卒賜祭葬馮有功奉天人𨽻鑲白旗漢軍官佐領身厯戎行崇德八年從征明中後所前屯衛克之順治元年隨平山西追敗流賊于湖廣武昌獲戰船七年九年兩遇恩詔加三等輕車都尉世職子國相康熙中從征厄魯特噶爾丹有功官至都統雍正十年入祀賢良祠朱延禧奉天人𨽻鑲白旗漢軍父世勳天命七年來歸延禧授輕車都尉世職順治元年隨入關同征叛鎮薑瓖克復澤潞等處敘功纍加至三等男十一年隨征廣東偽晉王李定國擢副都統十六年駐防福建康熙中卒賜祭葬如典禮蔣國柱奉天人𨽻鑲白旗漢軍順治四年授都察院啓心郎十一年擢工部右侍郎十三年調户部左侍郎十八年以副都御史巡撫山東自明季重斂之餘糧有包荒役有雜派國柱一切奏除之民困以蘇康熙三年調浙江巡撫疏陳浙江寧台溫諸郡荒田招墾起科事宜及分别蠲免被水田畝額賦俱有經畫悉心民瘼茂著勤勞卒于官賜祭葬如例白秉貞錦州人𨽻鑲白旗漢軍順治四年任湖廣黃州府同知斷事明決一郡質訟之事咸願歸之東山盜起總督羅繡錦委秉貞率民兵攻之秉貞詳請勦撫兼施凡四閲月四十八寨悉定康熙六年纍升直𨽻河南山東總督所至多惠政卒祀湖廣名宦朱昌祚遼東人𨽻鑲白旗漢軍順治十八年授浙江巡撫會浙東西災旱昌祚捐金煮粥以活飢民時海氛未靖並疏請酌撥荒田令瀕海居民遷移內地者開墾康熙三年擢福建總督尋以憂去四年起復總督直𨽻山東河南等三省昌祚秉性忠耿端已率屬嚴飭將士兵民戢和遇事執法無所偏徇輔臣鰲拜以鑲黃旗正白旗分地瘠薄遣部臣會同督撫重易善地他旗多不樂從民地被圈咸泣訴失業昌祚上疏極陳其弊鰲拜怒坐以撓法罪立絞死旗民哀之八年聖祖追復原官豫祭葬諡勤愍王宗聖奉天人𨽻正白旗漢軍順治中知江南之舒城令詳慎明決吏不敢欺而獄無枉縱案無積滯邑當兵燹後安輯流亡惠威並著吏民咸深感戴卒祀本邑名宦王國泰蓋平人𨽻鑲白旗漢軍康熙十二年為福建福州府同知值逆藩耿精忠潛蓄異謀國泰偵知其陰事每達於總督范承謨有先事預防之智後佐郡泉州與民休息遷本省驛傳道會耿精忠甫平海氛尚熾軍興旁午辦應夫船親自給價毫不擾民未幾泉州告警自請召募壯勇得數千人授以衣糧甲仗身先士卒奮呼擊賊賊遂大潰泉州圍解敘功增秩擢安徽按察使閩人思之祀名宦祠蔣育英奉天人𨽻鑲白旗漢軍初任浙江溫州府同知時海氛未靖大軍駐衢征勦育英悉心籌畫輸運糧餉仍加意撫綏嚴行保甲闔郡帖然康熙二十二年初平臺灣調育英為知府育英履任躬厯郊原披斬荆棘經界三縣封域相土定賦罷不急之役安撫畨夷招集哀鴻臺地遂為樂土二十九年擢江西按察使時江湖多盜剽劫商旅育英檄令各州縣查明船户編立字號各給用印腰牌飭令未晚停泊守泛兵目以五船為一伍十船為一甲輪流支更守宿天明放行由是羣盜屏迹其讞獄必以情常親理囹圄寒冬酌給棉衣尋擢浙江布政使將赴任衆囚聞之感泣數日後卒四十六年入祀臺灣江西名宦李德耀奉天人𨽻鑲白旗漢軍康熙四年知四川大邑縣自處節儉為政簡約嘗單騎遍閲郊原度地開渠導水俾民田悉資灌溉闔邑獲豐登之利蜀地故多先賢祠墓公暇尤加意葺修古迹不至湮沒民思其惠久而不忘五十年入祀名宦白登明蓋平人𨽻鑲白旗漢軍知江南太倉州立衙蠧地棍賭博姦淫四禁犯者必置之法境內肅然姦民某通寇事覺總督檄州捕之某袖出一狀某某皆其黨凡州中巨室富家無或遺登明知其誣笑曰若欲生乎死乎對曰欲生登明曰若非冦何知某某皆冦黨以若狀上死無赦矣某感悟遂燬其狀登明代為申辨州之大姓皆獲免公暇試諸生以地方利弊纖悉畢陳故摘發無不中鄰邑有寃抑者訴諸上官願下州為理州田阜髙常賴灌溉自劉河堙塞苦潦登明乃先濬朱涇後及劉河凡六十里州及崑嘉二邑咸賴其利白允明登明仲弟以選貢得官慨然曰國家肇基東土從入關者多以武功翼運今天下雖大定然西南尚有逋冦依託明藩竊據雲貴侵擾川湖兩廣兵革不息正志士效命之秋也乃習韜鈐精武事順治十二年以薦授雲騎尉十六年隨擊偽都督楊文英等於揚子江口大捷康熙十三年逆藩吳三桂等叛海冦亦乘機窺伺江南以將軍王之鼎薦屢擢都督僉事守崇明二十五年三藩平改駐防廣東參領卒祀江南名宦白啓明登明季弟康熙二十一年知粵之慶逺府時初經兵燹田畝蒿萊啓明竭力撫循收贖男婦之被掠者勸民墾闢設義倉以濟貧乏給牛種以資耕植境內饒裕復以時修舉廢墜建學宫葺城垣皆捐俸成之嗣以循卓遷擢去五十七年入祀粵西名宦董守義奉天人𨽻鑲白旗漢軍康熙中知江南舒城縣有幹濟才當逆藩吳三桂耿精忠之亂大軍往來繹絡舟車芻糗應時而辦閭閻安堵秋毫不擾康熙二十三年擢任四川達州牧在任期年有凶人手賊叔母詭以盜殺訴於州守義亷得實情立摘其姦遂引伏置諸法州人以為神卒祀達州名宦佟國瓏奉天人𨽻鑲白旗漢軍康熙五十一年任山西澤州守政尚寬和與民相安凡州縣營建無不修舉在任八載輿衆歡洽其始蒞任踰年以罣誤去州民攀留合詞上請復得留任及卒入祀名宦胡國佐遼陽人𨽻鑲白旗漢軍知河南歸德府值嵗荒設法賑濟全活至數十萬人民懷其德其所立救荒諸政皆有經濟卒祀河南名宦鑲紅旗漢軍金礪遼東人𨽻鑲紅旗漢軍太祖天命七年來歸授三等男天聰五年為兵部承政太宗幸演武場閲兵礪與參領石國柱金玉和髙鴻中等並以訓練有方賜鞍馬尋調户部承政八年晉二等男崇德二年以大軍征明皮島礪所部水師觀望不進革世職五年授吏部參政尋擢都統八年隨鄭親王濟爾哈朗攻明前屯衛中後所二城以炮攻克之論功授三等輕車都尉世職順治元年隨入關安撫天津亂民尋同都統葉臣招撫山西賊黨陳永福踞太原礪攻克其城晉二等輕車都尉三年隨順承郡王勒克德渾征湖廣偽總兵馬進忠降而復叛礪擊敗之武昌奪其戰艦六十時明桂王朱由榔聚屯湖南礪同平南王孔有德等征之四年礪等斬偽伯黃朝宣於衡州進兵長沙斬總兵楊國棟於牛皮灘晉世職一等輕車都尉六年授平南將軍鎮守浙江明魯王朱以海踞舟山礪進克其城並擒其偽蕩湖侯阮進九年海賊鄭森犯漳州礪由長泰進營漳州城北分兵萬松關以牽制之賊來攻七戰皆捷敘功又兩遇恩詔晉爵一等男加一雲騎尉十一年授川陕總督十三年乞休加太子太保康熙元年卒賜祭葬如例趙國祚漢軍鑲紅旗人父一鶴太祖時來歸天聰八年授三等輕車都尉世職國祚其次子也崇德四年以佐領屯田義州八年偕護軍統領阿爾津征黑龍江師還得恩賚從鄭親王濟爾哈朗攻克前屯衛中後所二城順治元年授雲騎尉世職尋升參領從豫親王多鐸南征取揚州從貝勒博洛移師定浙江師還克江隂晉騎都尉八年授户部理事官擢副都統再擢都統屢遇恩詔晉世職至二等輕車都尉十二年授平南將軍駐防浙江十五年任浙江總督十六年海賊鄭成功犯溫州樂清諸縣國祚以兵禦之獲其船九十餘賊退入舟山明年成功冦江南陷鎮江犯江寧大軍擊敗之儀鳯門外乃遁入海追論疏防奪嵗俸十八年遷山東總督再遷山西康熙元年罷還京十三年逆藩吳三桂反起為江西提督駐九江以遏賊衝會逆藩耿精忠叛應三桂遣其黨陷廣信撫州建昌國祚移駐南昌偕將軍希爾根哈勒哈齊分道勦賊擊敗偽都督易明逐北七十餘里遂復撫州昜明復引賊萬餘來犯又擊敗之殱賊四千有竒十四年大軍下福建精忠窮蹙降國祚遂専勦三桂十五年從安親王兵樂進兵湖南駐長沙屢戰却三桂兵十八年南抵寶慶破賊紫陽河再破其將吳國貴兵二萬于雙井堡國貴中炮死蹙其潰衆於武岡州復州城前國祚以力戰被創尋創發乞休乃還京二十七年卒年八十賜祭葬諡敏壯姪璉亦屢著有戰功卒諡襄勤柯汝極遼陽人𨽻鑲紅旗漢軍天命六年克遼陽有降人欲乘間叛汝極發其謀復擒獲間諜十四人擢恭領授三等輕車都尉世職順治初厯官禮部參政鑲紅旗漢軍副都統纍加世職至一等四年以副都統駐防杭州七年卒於官無子以從子永蓁為嗣襲職永蓁纍官户部侍郎擢漢軍都統是時閩冦鄭成功假明桂王由榔年號竊發海上遣偽伯阮思偽總制陳六御偽總兵胡自慶等犯浙江之舟山陷之十三年永蓁偕將軍伊勒德以水師出蛟門擊賊衡水洋賊舟郤復前永蓁躍入其舟斬自慶餘賊轉帆遁追及之並斬思六御等遂定舟山以功賜爵三等男康熙元年偕將軍濟什哈勦山東賊于七於岠嵎山賊乘夜犯永蓁營射殪百二十餘人于七竄入海十年授京口將軍尋罷十三年起山東提督二十四年卒柯永盛汝極從子也崇德六年任佐領從圍錦州攻克晾馬山臺及杏山塔山城七年偕副都統馬光輝監鑄神威炮八年從取前屯衛中後所二城敘功授騎都尉世職順治元年任刑部理事官大軍初定山東授膠州總兵官既至鎮勦昌樂土賊秦尚行等平之流賊李自成禆將趙應元詭就侍郎王鰲永招撫入青州害鰲永踞城作亂永盛聞變偕副都統和托李率泰馳赴青州駐兵城外輕騎入城計縳應元斬之復率兵圍髙密擒斬偽元帥張輿二年濰縣土賊張廣降而復叛擁其衆數千突犯萊州永盛遣逰擊楊遇明擊敗之廣中鏃死餘賊悉平三年移鎮江寧會勦江西叛賊南贛巡撫苖胙土以江西諸郡叛服不常請留永盛駐其地遂改南贛總兵官四年正月湖廣興國州土賊柯抱沖陳珩玊等犯武昌殺同知張夢白冦掠江西武寧永盛遣將分勦連破賊寨抱沖珩玉並就擒斬時明桂王朱由榔據湖廣石城寧都雩都瑞金長寧安逺諸邑叛應之倚山結寨四出劫掠永盛遣副將劉伯祿徐啓仁參將董大用逰擊孔國治等先後勦平之八月擢湖廣提督五年江西總兵金聲桓叛興國孝感雲夢黃安麻城蘄州土賊乘間蠢動永盛移兵扼要隘分遣參將塢乘鸞逰擊張國忠等搜勦賊塞以次奏捷十年流賊張獻忠遺黨李定國孫可望等附于由榔迎由榔至安隆冦陷廣西出沒湖南我大將軍貝勒屯齊進師衡州永盛督兵繼其後䇿應援勦屢敗賊晉世職為三等輕車都尉十八年改山西提督康熙三年加左都督七年加太子少保八年以老致仕十四年卒賜祭葬如例子鍵襲從弟永華屢積有軍功永升于康熙中殉難湖北羅繡錦奉天人𨽻鑲紅旗漢軍天聰五年始設六部繡錦由諸生授工部啓心郎八年命禮部試滿洲漢人通文義者為舉人繡錦與選賜衣一襲尋授國史院學士纂修太祖實録成得恩賚崇德七年兼任佐領順治元年擢河南巡撫流賊李自成黨時冦掠衛輝懷慶間原武新鄉諸邑復土賊蜂起繡錦請發八旗徑旅剿之會豫親王多鐸統師征陕西道出河南諸賊驚懼乞降或望風遁去二年擢湖廣四川總督時湖南郡邑為明大學士何騰蛟等所據自成遣其黨一隻虎劉二虎者復冦擾湖北繡錦至荆州檄兵防勦屢奏捷遣副將唐國臣總兵楊文富等分道討天門土賊于八百洲擒其渠胡公緒毁其巢四年恭順王孔有德督兵征湖南下長沙衡州寶慶辰州諸府繡錦議設鎮協駐守從之先是鄖陽總兵王光恩與鄖襄道李之網以贓私互訐下撫按會核光恩罪實逮下吏其弟光泰遂踞鄖陽叛提督孫定遼戰殁世祖遣侍郎喀喀穆督師進勦繡錦以兵會之復鄖陽光泰遁四川五年喀喀穆將班師而江西總兵金聲桓叛于南昌遣其黨犯九江武昌自成遣黨郝搖旗馬進忠降於騰蛟連陷常德武岡辰州沅州湖南北騷動繡錦乞留喀喀穆駐荆州分遣總兵徐勇馬蛟麟等防守要隘屢敗賊已而鄭親王濟爾哈朗統師征湖南以次復所陷郡邑繡錦疏言湖南叛服不常恐大軍凱旋餘孽復跳梁煽誘請分置諸降人于腹地世祖嘉納其言九年卒于官六十有三賜祭葬贈兵部尚書勒石紀功廕一子入監劉武元錦州人𨽻鑲紅旗漢軍幼習韜略天聰五年來歸崇德初授刑部參政順治九年從入關改任參領授三等輕車都尉世職三年巡撫南贛時禆將二十餘人皆桀驁武元申明令甲嚴輯部伍殘黎漸次安集四年勦平瑞金石城興國龍南寧都上猶等土賊擒斬偽都督葉南芝等五年提督金聲桓副將王得仁據南昌叛攻圍贛州武元與總兵胡有升堅守數月民無叛志會援兵至得仁中創聲桓撤圍退走武元出竒師襲其後敗之於太湖港時叛鎮李成棟自廣東擁衆來攻武元密遣將出其不意擊之斬首萬計成棟遂潰分遣諸將擊諸郡餘賊皆平之敘功賜豐貂冠服鞍馬等物六年勦成棟餘黨於瑞金雩都崇義等縣進敗賊於梅嶺七年分兵殱寧都賊彭順慶大庾賊羅榮等敘功加太子太保兵部尚書三遇恩詔晉世職一等輕車都尉加一雲騎尉十一年卒賜祭葬諡明靖贈少保長子瀇襲李棲鳯廣寧人𨽻鑲紅旗漢軍為諸生時即以天下為已任天聰時任內院副理事官崇德元年考察各官棲鳯列二等順治二年補山東東昌道旋調湖廣荆南道三年授湖廣布政使旋任安徽巡撫勦休寧楘源二縣土賊及宿松賊趙正等平之六年以僉都御史撫粵與平南王尚可喜靖南王耿繼茂先定南韶二郡揚帆直下遂定雷亷等處八年敗李定國于龍頂岡殱馘無算棲鳯撫粵八年杜請託絶饋遺省刑薄斂勞來安集粵民賴之十五年加兵部尚書代李率泰總兵兩粵擒朱由榔偽將陳竒策等定太平思恩等府宣尉烏蠻土司及交趾諸部悉讋服來貢十七年加太子少保十八年設廣東西兩總督棲鳯改廣東尋豫告歸卒於家粵人思之祀名宦賜祭葬如例馬鳴珮𨽻鑲紅旗漢軍其先山東蓬萊人後占籍遼陽及大軍克遼陽遂𨽻旗籍鳴珮年十七以文學受知太宗官工部啓心郎崇德八年以考滿稱職加世職順治元年擢山西冀南道時潞汾流冦號一隻虎者最黠桀冦岢嵐鳴珮設伏以計擒之羣冦駭散尋調湖廣下湖南道五溪諸蠻畏威懷惠考績報最八年遷户部右侍郎尋任倉場總督十一年出為宣大總督調任兩江時伏莽尚多鳴珮加意勦撫拔梁化鳯於偏禆中疏荐其有大將才令統水師禦海賊於崇明後果大捷十二年賊陳其綸遙應海冦嘯聚大柏山勦平之威名益著又為檄示海冦諸渠帥開陳禍福偽總督張銘鎮偽總兵顧忠等相繼降是年疏留梁化鳯守崇明尋朝廷擢化鳯松江提督十五年海冦猝陷鎮江瓜洲攻江寧化鳯提兵至與城中兵夾攻之大殱其衆人咸思鳴珮知人之明尋以疾卒江南人思其德崇祀名宦祠祝世昌遼東人𨽻鑲紅旗漢軍初授逰擊天聰五年從征大凌河六年太宗幸演武場閲兵以世昌訓練有方加恩賞順治五年授山西巡撫時叛鎮薑瓖作亂郡縣騷動世昌力請殄滅凡理餉數十萬民不見擾事平又請豁逋賦七百萬石省徭十餘萬丁七年卒於官詔贈兵部右侍郎賜祭葬諡僖靖方世昌之沒也百姓巷哭後巡撫劉宏遇博採輿論謂死忠死事其義一也並請祀忠烈祠今改祀名宦李翔鳯𨽻鑲紅旗漢軍初名起鳯幼通書史太宗時直內祕書院賜名翔鳯順治元年隨入關定燕京授山東濟南道撫綏有方時流賊趙應元竊據青州所至蹂􅏳翔鳯以計擒之復青州得上賞二年擢江西巡撫時偽巡撫盧某等尚據南昌等五府翔鳯至悉行𠞰除濵江餘冦亦皆蕩平尋卒贈兵部右侍郎祀江西名宦祠李茂芳遼東人𨽻鑲紅旗漢軍初以職管丁壯善於撫輯天聰九年考察特加録敘崇德五年從圍錦州擊敗明松山兵七年復圍錦州攻吕翁山臺克之兼敗其援兵復擊杏山西臺敵兵及塔山兵皆論功一等授佐領世職任户部理事官纍加世職一等輕車都尉子顯孝康熙中從征福建殁于王事楊茂勳遼陽人𨽻鑲紅旗漢軍父麒祥驍勇多力太宗時來歸任都統屢從征討有功茂勳于順治七年授太僕寺理事官十四年升吏部右侍郎十七年授湖廣巡撫十八年擢貴州總督遣兵𠞰平金築土司王應兆等及定畨都勻各苖寨康熙五年授河道總督堵塞黃河煙墩決口議敘加太子少保七年堵築桃源黃家嘴決口十五年授鄖陽巡撫𠞰叛鎮談宏楊來嘉等多斬馘十八年調四川總督仍駐鄖陽時吳三桂偽總督王公良率偽將軍王鳯岐劉之衛等據夔州十九年茂勳統兵由椘江峽路逆流而上破巫山帆風直進不二日扺夔城兵刃未交羣賊宵遁旋以哈占為川陕總督茂勳管四川提督事隨大軍進征雲南賊平還京三十二年卒王登聫奉天人𨽻鑲紅旗漢軍順治六年知河南鄭州巡撫吳景道薦其有德有材擢山東濟南道十七年授保定巡撫十八年裁順天巡撫以登聫兼理其事登聫撫保定時以海宇初定伏莾尚多官吏艱於捕緝共相容隱請嚴縱盜之法重窩主之律厚捕首之賞由是盜賊得息尋以圈換旗地事擾民密疏請令各安舊業忤輔臣鰲拜意與總督朱昌祚同論死時論哀之八年追復原官賜祭葬諡慤愍祀直𨽻名宦于成龍奉天人𨽻鑲紅旗漢軍康熙初知江寧府時總督永寧于成龍剛正清介於屬吏少許可獨奬成龍才由通州牧題守江寧興利除弊知無不為是時徐州有姦民某走京師以左道惑衆上告事下制府檄江寧鎮江兩府會鞫成龍力白寃狀制府疑故縱詰責甚厲成龍持之愈力姦民卒坐誣又瀕江蘆洲多為豪強隱占成龍以有課而無洲者為坍江立豫豁除有洲而無課者為欺隱升課而薄其罰人皆服其平允二十五年巡撫直𨽻政治嚴明貴近有犯必繩以法事有不便於民者悉除之任邱縣水荒地數千頃民産已去尚徴其糧至是奏請悉行豁免遷河南總兵去三十七年復以總督管直𨽻巡撫事民聞其來無不歡踴尋又調河南總督去成龍所至有聲與前永寧于成龍並著人稱大小于公以别之韓昌先遼東人𨽻鑲紅旗漢軍順治初任浙之蕭山令蒞事明敏政寬刑簡立理甲均當法使徭役均而詭寄之弊絶至今踵行之昌先卒於官蕭山民建祠祀之王國棟鐡嶺人𨽻鑲紅旗漢軍順治七年知山西沁州時叛鎮薑瓖亂後州境荒蕪國棟勘得無主荒地及沒水地若干請題免逋賦七千餘兩而荒地以次墾闢賦仍無缺公私便之仍隨事講求以利民為急務招徠安集民困始蘇卒祀名宦熊維傑鐵嶺人𨽻鑲紅旗漢軍順治八年為浙江按察使性峭直不苟言笑然善於撫民其為政簡而周剛而不刻時滿洲兵初移駐或有不遵約束出擾民者有司不敢問維傑出有來訴者必立馬更為之申理兵不敢復擾民望見其前麾輒相慶賀蘇宏謨遼陽人𨽻鑲紅旗漢軍順治中任長沙府同知時湖南甫定兵民雜處互相猜忌宏謨加意撫戢遇事示以坦白兵不敢肆縱民咸安其業政理人和擢貴州糧驛道值滇省大軍凱旋供億紛繁宏謨遊刃有餘毫無支詘先是差役有以人代馬謂之夾馬夫派纍閭閻民甚苦之宏謨悉為革除民力以蘇卒祀貴州名宦徐鳯鳴奉天人𨽻鑲紅旗漢軍順治八年知江西進賢縣壬辰冬土寇來犯城鳯鳴率衆與戰矢集其面氣益奮手殺數十人賊懼引去十一年改知河南郟縣招集河朔流民給牛種墾荒田創立鴻宅保以居之躬修亷潔聼訟明允邑人歌誦不衰擢廣東儋州牧去郟民思其德康熙五十年入祀名宦佟國璽撫順人𨽻鑲紅旗漢軍知河南輝縣以崇學校勸農桑為務有貧民不能開墾者給以牛種勸令復業邑遭水患五閘衝決國璽親督修築使水歸故道稻田之利復興趙世安奉天人𨽻鑲紅旗漢軍康熙二十七年任福建興化同知嚴毅有幹略釐剔政蠧無微不燭尤嚴禁賭慱凡樗蒱之戲有犯必懲其輕者罰鍰入公為修木蘭陂之用事集工成吏民咸深畏愛王登魁廣寧人𨽻鑲紅旗漢軍康熙二十八年知河南汝州值秦晉嵗飢疫癘盛行飛蝗蔽天飢民流入中州登魁率衆捕蝗開倉賑貸全活甚衆先是魯山賊王二等倡亂揭竿嘯聚登魁率民兵殱其渠餘黨悉平三十一年運楚米賑關中運員經理不善所至騷動登魁措置有方民無擾纍其聼訟果敏胥吏不敢稍有欺隱嗣以薦舉去部民遮道攀留沒後猶思其澤四十九年入祀河南名宦張至隆奉天人𨽻鑲紅旗漢軍康熙三十二年知粵之肇慶府郡當牂牁下流嵗三四月西流暴漲豐樂長圍一決其害更甚至隆蒞任親駕小舟相度經營躬先負土日夜督率築堤鞏固而水患頓息黃江厰稅胥吏多姦蠧橫索至隆悉裁抑之商民立碑記焉崔懋遼陽人𨽻鑲紅旗漢軍康熙中知直𨽻新城縣時水旱頻仍民多逋逃懋力請蠲赦懇荒捐給牛種召募耕種民皆樂其故業又值小清河泛溢頗為邑患懋修築堤堰經理資費毫不取之民間復修濬孝婦河以利民田居職十二年政簡刑清老幼咸德之尋擢冀州牧卒祀名宦武宏祖奉天人𨽻鑲紅旗漢軍康熙三十一年知河南歸德府屬邑催科多陋規相沿貽患閭閻宏祖之任悉為革除嚴禁牙帖胥吏苛取稅銀痛繩以法境治清肅吏畏民懷卒祀歸德名宦李國亮海城人𨽻鑲紅旗漢軍康熙三十五年由河南布政使升任巡撫首務教化建修書院延名宿以訓課士子嚴飭武備禁除一切陋規河工夫役栁梢俱出官辦不以纍民時稱賢大吏云欽定盛京通志卷七十九
