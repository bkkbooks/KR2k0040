body:
  text: 列女本朝奉天府各屬錦州府各屬欽定四庫全書欽定盛京通志卷九十五列女三本朝奉天府各屬畢國棟妻趙氏承德縣人夫亡子方周嵗舅姑繼喪趙氏孀且貧撫孤成立守節五十餘載劉連登妻曹氏承德縣人夫亡時姑衰子稚曹氏苦志三十餘年趙進啓妻馮氏承德縣人夫亡遺孤僅八日家貧如洗馮氏忍饑寒事翁盡孝撫子完節旌表俱於雍正三年舉人吳濤妻李氏承德縣人年二十一夫亡家貧無子繼姪為嗣苦節三十餘年陳士偉妻劉氏承德縣人年逾二十夫亡堅意身殉父母諭以姑老子幼孝慈為大始勉從命及姑病嘗藥滌垢夜不就枕者逾月姑卒卜葬瓦溝山移夫柩附葬氏見夫棺仰天長號投身壙中曰姑沒子長吾今可以同穴矣二子文言正言倉皇號慟跪勸不已氏乃出自是卧病不復起尋卒鐵季祖妻姜氏承德縣人夫亡氏髧髦自勵嘗截髮毁面以白其志高起龍妻劉氏承德縣人夫亡氏青年守節艱苦萬狀矢志完貞旌表俱於乾隆四年周紹錦妻朱氏承德縣人氏氷霜茹苦守節堅貞以針指自給上事舅姑下撫藐孤孝慈兼著旌表乾隆十五年徐炯紀妻高氏承德縣人夫亡守節躬行女誡動有禮法時稱孝義兼全旌表乾隆十七年劉興祖妻關氏承德縣人夫早亡衰姑在堂氏雖哀戚盡禮而時以色笑慰其姑俾毋以暮年喪子傷其心姑卒以夀終教幼子必以禮節遂成通儒旌表乾隆二十二年貞女于氏陳興魁未婚妻承德縣人遙聞夫歿徒步于歸矢志柏舟誓死靡他孝事翁姑甘㫖承歡及翁姑卒祭葬以禮時人稱之旌表乾隆三十四年魏庭昭妻楊氏承德縣人夫亡氏侍翁姑至孝無子教繼嗣以詩書親自督課夜嘗篝燈朂其勤學卒業後遂成名旌表乾隆三十五年林益初妻袁氏承德縣人夫亡氏零丁辛苦氷蘗自甘守節五十年旌表乾隆三十六年吏員宣國棟妻孟氏承德縣人夫殁氏曰吾本貧家女雖日饜糟糠吾分也遂早作夜寐勤儉自食茹苦終身監生王介福妻宋氏承德縣人夫亡慟哭欲絶荼苦守志數十年未嘗見齒戚黨稱其賢旌表俱於乾隆三十八年佟國棟妻李氏承德縣人夫故氏心甘荼蓼嘗曰境不足以攖我我志不可奪也貧窶數十年勵節彌堅旌表乾隆四十年康泰妻楊氏遼陽州人年十八歸泰有康三乘夜逼汚不從見殺三伏法氏入祀節孝祠石函喻妻李氏遼陽州人甫及笄夫亡無子决意身殉或勸云上有舅姑忍使其無依乎乃誓志奉親苦節四十餘年旌表俱於康熙五十二年盧懋文妻王氏遼陽州人子甫周嵗夫亡家素貧氏紡績撫孤教之成立厯四十餘年備嘗艱苦王育民妻唐氏遼陽州人夫亡無子痛哭不食屢欲自盡因親族嚴守得不死家本孤寒氏晝夜紡績艱苦弗渝厯四十餘年以夀終談世榮妻王氏遼陽州人夫亡時二子皆幼氏苦志守節延師教讀俾俱成立旌表俱於雍正元年武生吕翕如妻林氏遼陽州人夫亡氏終身守節餐氷茹痛厯盡艱辛劉儒義妻溫氏遼陽州人年十九而嫠孝養孀姑苦節四十餘年旌表俱於雍正八年侯畿妻劉氏遼陽州人畿病氏焚香告天願身代及卒氏年甫十九恐戚族奪其志以死自誓孝事翁姑教育子姪守節四十三年張鳯陽妻趙氏遼陽州人夫死氏决意隨穴繼復慨然曰我死無人奉舅姑遂立志苦守厯五十年氷霜貞潔劉文善妻張氏遼陽州人文善病故氏年僅十八孝事翁姑教育孤子勤苦終身及翁姑終後祭葬皆以禮苦節厯四十四年旌表俱於乾隆四年劉國梁妻劉氏遼陽州人賦性淑純祭祀舅姑必誠必敬及夫故青年矢志白首全貞鄉里稱其賢王金妻劉氏遼陽州人夫故遺腹一女教以婦道茹苦孀居三十餘年堅心似石旌表俱於乾隆五年談珮妻馬氏遼陽州人氏素性孝事姑嫜及夫死守節撫孤厯四十二年鄰里皆稱其婦德母儀旌表乾隆八年郝士洪妻劉氏遼陽州人夫故孝事翁姑供奉無缺教子義方務勤儉以成家業守節三十四年旌表乾隆十六年劉元端妻陳氏遼陽州人夫亡守志已雖茹荼事舅姑甘㫖無缺及舅姑沒殯葬有禮苦節厯三十七年張文榮妻劉氏遼陽州人夫故矢志苦守事奉翁姑先意承志教子義方勤儉持家守節四十八年王世爵妻劉氏遼陽州人夫死屢欲身殉既而慨然曰幼子無依奈宗祀何遂撫孤茹苦守節垂五十五年王璽妻劉氏遼陽州人夫亡矢志氷霜自勵垂數十年而真操如一張義明妻王氏遼陽州人夫殁氏勵志守節茹苦四十五年王振基妻汪氏遼陽州人夫死氏力為營葬繼子以全宗嗣撫女教孫咸有禮法守節三十四年旌表俱於乾隆十七年洪訓妻趙氏遼陽州人夫故氏青年守志供養翁姑盡誠盡孝教育幼子卒成令名鄰里僉稱為賢旌表乾隆二十二年王龍章妻林氏遼陽州人夫亡家甚貧苦氏善事舅姑勤工績以供菽水教孩提之姪頗知愛敬旌表乾隆三十年陳樲妻段氏海城縣人嫠守三十五年鄉里重其節張仕妻章氏海城縣人夫亡無子繼嗣以延宗祀教育兼至守節五十二年章氏舊志作張氏旌表俱於雍正三年王際亨妻白氏海城縣人夫亡守節勤儉持家動必以禮肅然可範堅貞之操始終不二李之俊妻林氏海城縣人氏青年矢志厯盡氷霜以節夀終旌表俱於乾隆十六年袁鳯瑞妻王氏海城縣人夫亡矢志不二荼苦備嘗氷操愈勵完節終身旌表乾隆二十七年武生江漢英妻張氏蓋平縣人漢英病故遺子未周嵗氏事奉孀姑撫養弱息苦守四十七年孝慈無憾旌表雍正二年耿端妻王氏蓋平縣人夫亡守節上事舅姑下撫遺孤三十餘年如一日旌表乾隆四年韓勳妻趙氏蓋平縣人年十八夫死矢志守節事老撫幼三十餘年備極艱苦旌表乾隆十一年趙廷瑚妻田氏蓋平縣人夫亡一子甫五嵗翁姑年逾六旬氏克盡孝養教子成名苦節四十餘年貞女韓氏李天用未婚妻蓋平縣人天用卒氏隨母往弔遂不歸孝事翁姑克盡婦道撫養繼子至于成立苦節三十餘年旌表俱於乾隆二十七年傅華妻許氏開原縣人夫早卒無子撫姪傅珏成立珏後以拔貢入成均任浙江嵊縣令守節六十四年夀至八十三旌表雍正四年馬顯圖妻宋氏開原縣人夫亡無子守節四十餘年雖焭焭無依而志節皎然旌表雍正十三年趙世祿妻董氏開原縣人夫亡家貧姑年老氏以針黹謀甘㫖守志數十年張宏器妻王氏開原縣人夫故守節斷髮自矢之死不二崔從麟妻鄭氏開原縣人夫病籲天願以身代及卒誓死守節始終不渝旌表俱於乾隆十七年張雪兒妻唐氏鐵嶺縣人張病故氏奉舅姑育幼子曲盡孝慈後值荒歉有謀奪其志者氏即欲自盡奸謀遂息卒完名節張士玉妻王氏鐵嶺縣人年十六歸士玉三月而寡誓不更適奉孀姑十餘年生盡養死盡哀克全節孝李四妻孟氏鐵嶺縣人姑患蠱症氏親湯藥晨昏不息姑殁夫亦故又頻值荒歉遂有謀娶之者氏以死自誓羣議遂息張國良妻馬氏鐵嶺縣人夫沒子弱家貧無倚氏針黹度日守志不移旌表俱於雍正三年孫二妻馮氏鐵嶺縣人夫亡撫孤茹荼捋苦誓不二志鄧天榮妻秋氏鐵嶺縣人夫亡無嗣氏截髮毁容足不出户守志終身李廷棟妻劉氏鐵嶺縣人夫沒孤幼勤心撫育終身苦節鞏尚友妻張氏鐵嶺縣人早寡孝事翁姑撫養幼子勤儉持家族黨矜式鞏尚已妻李氏鐵嶺縣人夫亡徑節自矢紡績辛勤垂老愈力人共憐之旌表俱於雍正五年趙琦妻韓氏鐵嶺縣人氏性幽貞寡言笑夫故守節垂白不渝旌表乾隆四年吏員溫克勤妻楊氏鐵嶺縣人夫卒喪葬盡禮氷霜矢志素有儒風克守完節旌表乾隆八年王維煥妻張氏鐵嶺縣人夫殁氏勤針工易衣糧食貧守節操並氷霜常成龍妻王氏鐵嶺縣人青年守節每遇嵗時必哭祭其夫數十年無間逺近賢之周萬榮妻郝氏鐵嶺縣人夫殁哀毁骨立以死自誓食貧守志克全孝節陳亮妻鞏氏鐵嶺縣人辛勤荼苦鄰里重其貞操旌表俱於乾隆十六年崔富榮妻劉氏鐵嶺縣人夫亡守節糟糠自甘力勤操作嚴冬不稍息十指盡裂卒無怨色旌表乾隆一十二年烈女李二格李文美之女年甫十七值父母他出有陳機匠者厠遇求姦女守正不汚遂被害機匠伏法氏入祀節孝祠旌表乾隆四十年謝見性妻趙氏復州人見性病故氏年二十三矢志守節辟纑自給即至親亦不輕往來數十年如一日旌表乾隆五年烈婦劉氏桞國柱之妻復州人州民于得曉欲强汚之不從力拒被殺得曉伏法氏入祀節孝祠旌表乾隆二十三年烈婦于氏劉五之妻復州人因遲二圖奸威逼遂自縊遲二伏法氏入祀節孝祠旌表乾隆三十六年烈婦林氏李安之妻復州人州民于順行强逼之氏守正不汚卒至于死于順伏法氏入祀節孝祠旌表乾隆四十四年貞女林丫頭岫巖人未婚夫死矢志柏舟終身素服持齊戚黨罕見其面旌表乾隆四十年錦州府各屬王登雲妻郭氏錦縣人青年守嫠姑病紡績以備藥餌曲盡婦職茹苦食貧垂數十年李增榮妻楊氏錦縣人早嵗嫠居厯盡艱苦霜操不替以節終老趙宏仁妻郭氏錦縣人夫亡氏孝奉翁姑承歡順志教育稚子早嵗成立沙懷正妻王氏錦縣人夫亡守節三十餘年奉侍姑嫜教育孤子孝慈兼盡一統志沙作法張文福妻李氏錦縣人少年嫠處毁容明志坐卧一室足不出户韓世英妻王氏錦縣人少年寡居秉志貞潔能耐清貧垂老氷操彌堅李彬妻谷氏錦縣人性勤儉相夫有聲及夫亡守節終身蔣自貴妻邱氏錦縣人夫亡矢志動必循理白頭不改人稱其節袁擢妻姜氏錦縣人夫亡氏矢志不二盟心死守女工度日寒暑不輟旌表又錦俱於雍正三年夀至百嵗縣韓儒貴之妻敕賜增夀坊附志烈女改姐錦縣武舉才柱才之女年十七父他出豪鄰張八將强汚之女見傷不從得脫即自縊張八伏法改姐入祀節孝祠旌表雍正六年劉育琦妻趙氏錦縣人夫亡茹苦食貧孝奉孀姑教幼子列明經守節四十九年旌表雍正七年朱學誠妻王氏錦縣人孝事衰親夫亡撫養弱子人稱完節劉德鳯妻周氏錦縣人夫故每鬻叉鈿以養翁姑未嘗有吝色田玉妻陸氏錦縣人夫亡守節事垂白衰親先意承歡節孝兼著田弼妻胡氏錦縣人夫亡守嫠教子嚴於督課節凛氷霜教傳荻畫弼一統志作爽李天富妻王氏錦縣人夫亡葬祭如禮苦育孤兒以長以教卒至成立梁維恭妻安氏錦縣人夫亡氏家苦貧布衣糲食自樂綦縞田尚信妻杜氏錦縣人夫亡氏幼􅈺女則頗知大義足未嘗出户笑未嘗露齒人以為難傅芳明妻趙氏錦縣人氏青年守節躬勤井臼艱苦備嘗氷操愈勵楊爾第妻趙氏錦縣人夫亡矢志勤耕作以自贍課子嚴而有法垂四十年徑節不渝趙三妻劉氏錦縣人夫故孝事翁姑奉養無缺自甘荼苦處之晏如任玉秀妻才氏錦縣人氏幼年孀居誓志不移食貧守節紡織自勤張大妻劉氏錦縣人性嚴潔曉文義青年守志節凜氷霜翟廷秀妻劉氏錦縣人氏家無恆産甘貧守節紡絡之聲每至夜分秦宏業妻冷氏錦縣人夫亡氏翦髮誓天志不更適糠糗苦度徑節彌彰才瓚妻李氏錦縣人夫亡守節儉素成家貞志清操族黨敬之趙廷珍妻鄧氏錦縣人夫亡孝侍舅姑生養死葬罔辭勞瘁孟三强妻谷氏錦縣人夫亡氏操凛氷霜事親教子咸盡其道張汝㷆妻張氏錦縣人夫亡氏引刀􅍘髮立心匪石㷀㷀苦守至老彌貞閻殿魁妻齊氏錦縣人守節事親竭誠盡力克全孝養趙崇禮妻李氏錦縣人氏茹貧守志敬事舅姑力勤織紡艱苦經營終無二志高起雲妻安氏錦縣人夫死仰事俯育賴氏苦心經理得以存活人重其節畢九宫妻髙氏錦縣人夫亡孝養翁姑甘㫖無缺克盡婦道何保全妻宋氏錦縣人夫亡葬祭由禮盡鬻粧奩永甘素淡江起雲妻陳氏錦縣人居貧而寡勤儉持家親操井臼事舅