body:
  text: 名宦二忠節附遼金欽定四庫全書欽定盛京通志卷五十四名宦二忠節附遼耶律伊濟字伊德實幼豪爽不羣長通諸部語太祖經營之初多預軍謀天顯元年渤海平立耶律倍為東丹王以伊濟為中臺省右次相蒞事勤恪威信並行太宗即位上言渤海昔畏南朝阻險自衛居輝罕城先帝克之己歸版圖但去上京遼邈恐為後患梁水之地乃其故鄉又有木鐵鹽魚之饒冝徙居之選其徒以翼吾左突厥黨項室韋夾輔吾右可以坐制南邦混一天下帝嘉納之詔徙東丹國民於梁水時稱其善守蒙古語伊濟每部之部也原作羽之伊德實食物也原作寅底哂國語輝罕圍場也原作忽汗今俱譯改耶律隆先字團隱耶律倍之子博學能詩景宗即位封平王兼政事令留守東京薄賦稅省刑獄恤鰥寡數薦賢能之士後與統軍耶律舒嚕討髙麗有功卒葬醫巫閭山之道隱谷國語舒嚕珊瑚也原作室魯今譯改和勒博字實訥耶律吼之子穆宗初以平察克功授昭德軍節度使黃龍府軍將燕頗殺守臣以叛和勒博討之破賊於鴨緑江按昭德軍即今瀋陽國語和勒博謂聨絡也原作何魯不蒙古語實訥新也原作斜寧察克時也原作察割今俱譯改蕭巴雅爾字韓隱聖宗統和十五年加政事令遷東京留守開泰五年封東平王巴雅爾為政寬裕而善斷諸部畏愛民以殷富蒙古語巴雅爾喜也原作排押今譯改蕭栁字圖們多智能文膂力過人聖宗統和十七年南伐有功其父巴雅爾留守東京奏栁為四軍兵馬都指揮使明年為北女直詳衮政濟寬猛部民畏愛遷東路統軍使秩滿百姓願留復任許之後致仕卒耶律觀音努集栁所著詩千篇目曰嵗寒集圖們解見疆域形勝卷原作徒門索倫語詳衮理事官也原作詳穩觀音努原作觀音奴今俱譯改李夀英里貫未詳聖宗統和八年為嚴州刺史有惠政部民請留從之韓制心幽州安次人聖宗開泰中拜上京留守太平中歷中京留守數以不曲法不虐民不愛官自針嵗若不登奏免租賦民若被兵奏發廩賑寵居貴戚而不驕屢徙王位而不矜卒之日部民若哀父母韓德凝玉田人謙遜亷謹聖宗開泰中任崇義軍節度使移鎮廣德秩滿部民請留從之李可舉里貫未詳聖宗開泰初任中京留守推官治獄平允詔超遷之蕭孝穆小字和爾沁聖宗太平九年大延琳叛於東京以孝穆為都統致討孝穆去城四面各五里許築城堡圍之遂擒延琳以功授東京留守治遼陽為政寬簡撫納流徙民甚安之和爾沁唐古特語和爾蒙古人也沁大也原作胡獨厪今譯改劉晨言里貫未詳聖宗開泰元年任中京留守推官治獄明允詔超遷之耶律布庫字提隱初從伐髙麗有功纍遷上京客省副使聖宗太平二年城鴨緑江布庫守之有治迹五年遷東京統軍使蒞政嚴明諸部懾服大延琳叛以書結保州夏行美執其人送布庫布庫入據保州延琳氣阻東京平以功拜特哩衮國語布庫善朴人也原作蒲古蒙古語特哩改衮為首之稱原作惕隱今譯張傑里貫未詳官瀋州節度副使時東京錫里軍詳衮大延琳叛自號興遼國建元天慶傑聲言欲降以緩其師急修守禦之具延琳攻之不克詔以傑為瀋州節度使錫里軍詳衮原作舍利軍詳穩今譯改韓紹勛幽州安次人任東京户部使聖宗太平九年大延琳叛被執不屈賊鋸殺之忠節附劉伸字濟時宛平人興宗重熙中權中京副留守詔徙富民實春泰二州伸奏罷之歷崇義軍節度使政務簡淨民用不擾致烏鵲同巢之異拜參知政事遷上京留守王棠涿州新城人興宗重熙中鄉貢禮部廷試皆第一纍遷東京户部使道宗大康二年遼東飢民多死請賑恤從之蕭阿拉字額哩埒孝穆子道宗清寧中與蕭格同掌國政格諂諛不法阿拉爭之不得告歸除東京留守阿拉性忠果曉世務有經濟才因行色克色禮入朝陳時政得失蕭格以事中傷見殺忠節附阿拉解見京城卷原作阿剌國語額哩埒以時之謂原作阿里懶蕭格原作蕭革色克色原作瑟瑟今俱譯改耶律迪里字薩喇吼五世孫寬厚好學工文詞道宗清寧中為北面林牙承旨及重元作亂迪里赴援力戰授臨海軍節度使咸雍五年纍遷長寧宫使撿括户部司乾州錢帛逋負立出納經畫法公私便之大康中遷上京留守後致仕索倫語迪里頭也原作敵烈薩喇蒙古語解見黑龍江山川卷原作撒懶今譯改大公鼎渤海人先世籍遼陽率賔縣後家大定幼莊願長而好學第進士咸雍中為瀋州觀察判官時遼東淫雨傷稼北樞密院大發瀕河丁壯以完隄防有司承令峻急公鼎獨曰邊障甫寧大興工役非利國便民之道上疏乞罷朝廷從之役罷水亦不為災瀕河千里人莫不悅改良鄉令省徭役務農桑建孔子廟學部民服化遷大理卿多所平反天祚即位遷東京户部使時盜殺留守蕭保先始利其財因而倡亂民亦互生猜忌家自為鬭公鼎單騎行郡陳以禍福衆皆投兵拜曰是不我欺敢不聽命安輯如故獨捕首亂者誅之拜中京留守時盜賊充斥有遇公鼎於道者即叩馬乞自新公鼎給以符約俾還業聞者接踵而至不旬日境內清肅天祚聞之加賜保節功臣蕭烏納字特默六院部人魁偉簡重性忠直天祚在潛邸烏納數以直言忤旨及即位出為臨海軍節度使上言自蕭哈里亡入女直彼有輕朝廷之心宜益兵以備不虞不報天慶元年知黃龍府事改東北路統軍使復上言臣治與女直接境觀其所為志實非小宜先其未發圖之又不聽及金兵起人以為有先見之明尋授副元帥天祚以烏納先朝重臣有定䇿勳每延問政事奏對甚切上雖優容終不能用卒年七十烏納國語解見黑龍江山川卷原作兀納蒙古語特默駱駝也原作特免國語哈里斜也又有水寬甸處原作海里今俱譯改伊德濟蕭烏納之孫天慶初金兵來侵戰於寧江州伊德濟死之忠節附原蒙古語伊德濟巳食之謂作移敵蹇今譯改韓慶民里貫未詳任宜州節度使金棟摩下宜州拔槎丫山慶民死之其妻亦自殺忠節附桶國語棟摩茶也原作闍母今譯改金持嘉暉字仲明先居遼後家萊州體貌雄偉慷慨有志略太祖天輔六年從棟摩定興中府義錦等州破張覺及再伐宋功皆最留撫河間時居民被掠老幼存者無幾暉下令軍中聽贖還之及攻降濟州暉約束軍士秋毫無犯連敗宋軍遂至餘杭及還載資治通鑑板以歸纍功遷歸德軍節度使宗州即唐來州在今寧逺州境舊無學暉為營建學舍勸督生徒肄業者復其身人競趨之屬縣民家奴王夔者嘗業進士暉以錢五十萬贖之使卒其業夔後至顯官天德中封暉河南郡王拜平章政事卒諡武持嘉八旗姓原作赤盞今譯改程宷燕之析津人太祖天輔時授錦州安昌令潔已愛民興利除弊史稱其剛直耿介不諂權貴其沒也邑人祀之伯特德哩布奚五王族人也太宗天會初與其父來歸屢立戰功初授濵州刺史廉入優等纍遷崇義軍節度使德哩布為人孝謹為政簡靜不積財貨常曰俸祿已足養廉衣食之外何用蓄積凡調官行李止車一乘臧獲數人而已伯特德哩布國語伯特無能為之謂德哩布興起也原作伯德特離補今譯改髙昌福中都宛平人太宗天會十年登進士第三除同知東京留守事以治最遷山東西路轉運使工部尚書伊喇溫遼橫帳人從征有功熙宗時除同知東京都轉運使事世宗時歷崇義軍節度使移臨海軍州治近水秋雨水潦暴至城下城頗決百姓惶駭不知所為溫督役繕完之身臨不測無所避僚屬或止溫溫曰為政疵癘水泛溢為災守臣之罪當以身為百姓謝死不恨後移鎮武定旱且蝗溫刺指血灑酒中禱而酬之既而雨霑足有羣鳥啄蝗且盡人以為至誠之感伊喇八旗姓原作移剌今譯改李晏字致美澤州髙平人熙宗皇統六年進士任遼陽推官有政績歷遷御史中丞初錦州龍宫寺遼主撥賜户民俾輸稅于寺嵗久皆以為奴有欲訴者害之島中晏乃具奏在律僧不殺生况人命乎遼以良民為二稅此不可法今幸遇聖朝乞盡釋為良世宗納其言獲免者六百餘人髙松澄州析木人年十九從軍為佛寧多力善戰熙宗時從宗弼破汴京及和尚原纍官咸平府總管判官世宗即位充管押東京路渤海萬户兵部尚書克實謀反前同知延安尹李老僧欲得髙松共事遂往見松以言挑之曰有功舊人至今不得大官何也松曰我一縣令每念聖恩纍世不能報庸敢他望乎老僧遂不敢言克實等事遂敗後松從征斡罕以功遷咸平少尹官至崇義軍節度使佛寧原作蒲輦克實原作可喜國語斡罕馬蹄也原作窩幹今俱譯改伊喇子敬字同文遼五院人熙宗皇統間與修遼史除同知遼州事舊本廳自有占地嵗入數百貫子敬曰巳有公田何為更取民田竟不取及為興中尹子敬女自懿州來省謁中途遇盜剽行李且盡既而還之曰我輩初不知為府尹家也尹有德於民尚忍侵犯耶後子敬歷咸平廣寧尹致仕卒時家無餘財馬惠迪字吉甫漷隂人天德三年進士初調昌邑令察廉第一世宗大定中歷西京留守判官以治最擢同知崇義軍節度使廉能稱職遷御史中丞拜參知政事劉煥字德文中山人宋末兵起乏食煥尚幼煮粳供母而自飲其清者稍長就學寒擁糞火讀書不怠登天德元年進士調中都市令以廉遷北京警巡使捕二惡少杖之庭中戒之曰孝弟謹慎則為君子暴戾隱賊則為小人自今以後毋狃故習國有明罰吾不得私也由是衆皆畏服無敢犯者召為監察御史父老數百人或卧車下或挽靴鐙曰我欲留使君期年不可得也世宗大定中同知北京留守事時世宗幸上京所過州郡大發民夫治橋梁馳道以期恩賞煥所部惟平治端好而已上嘉其意遷遼東路轉運使盧孝儉宣德州人初登天眷進士官太原少尹世宗大定中用廉進官二階遷同知廣寧尹廣寧大飢民多流亡孝儉設法賑濟全活甚衆伊喇諳達遼橫帳人熙宗時纍官東京副留守參知政事嗣攝咸平路屯軍都統除武定軍節度使以招徠邊部功遷東北路招討使改臨潢尹卒諳達騎射絶倫善相馬諳逹國語解見吉林山川卷原作按答今譯改諾延溫都烏達阿卜薩水人通書史工為詩世宗時初授咸平尹改會寧尹北邊行軍都統時斡罕初定人心尚未安烏達為治寬簡多備禦謹斥堠邊境以寧改北京留守以廉察舉所至有能名無私過入拜參知政事諾延溫都烏達蒙古語諾延官長之稱溫都八旗姓國語烏達買也原作捋碗溫敦兀帶國語阿卜薩樺皮桶也原作阿補斯今俱譯改王賁字文孺其先自臨潢移貫宛平賁性孝友勤敏好學世宗時第進士調復州軍事判官亷靜有守不尚奔競政府推薦纍遷南京路按察使大懷貞字子正遼陽人皇統時纍官彰國安武軍節度使縣尉獲盜得一旗上圖亢宿詰之有叛狀株連幾萬人懷貞請誅首亂者餘俱釋之世宗大定時為興中尹錦州富民蕭鶴夀途中殺人匿府少尹家有司捕不得懷貞以計取之置於法遷彰德軍節度使張行信字信甫莒州日照人與兄行簡皆有名純正真率不事修飾世宗大定二十八年擢進士官銅山令有政聲章宗明昌元年以亷擢授監察御史兩登相位言無隱避及卒皆曰正人亡矣納塔謀嘉上京路音德爾明安人初習策論進士世宗大定二十六年補上京提刑書史以廉能著稱章宗承安五年特賜同進士出身調東京教授湯池主簿皆著治績宣宗貞祐初遷翰林待制充元帥府經歷時中都危急宣宗議遷都謀嘉諫不聼興定初上書諫伐宋降潁州刺史有守禦功召為翰林侍講學士同修國史納塔八旗姓原作納坦音德爾原作牙塔懶明安國語解見錦州山川卷原作猛安今譯改圖克坦繹上京阿勒楚喀逹哈人尚熙宗女瀋國公主歷宣德泰安淄州刺史世宗時改同知廣寧府事歷遷棣州防禦使所至以政績聞升臨海軍節度使圖克坦八旗姓原作徒單阿勒楚喀原作按出虎國語逹哈順從也原作逹阿今俱譯改楊雲翼字之美其先贊皇檀山人後家樂平天資頴異初學語輒畫地作字日誦數千言且精歷數章宗明昌五年登進士第一泰和元年纍官上京東京等路按察使司事有威望雲翼天性雅重自律甚嚴待人則寬國家之事知無不言嘗因事召見章宗咨以世務深重之大安元年翰林承旨張行簡薦其才召授提點司遷翰林侍講兼修國史承暉字維明內族好學淹貫經史章宗明昌時授東京咸平等路提刑副使改同知上京留守御史臺奏承暉為提刑豪猾屏息遷臨海軍節度使歷利涉遼海軍遷北京路提刑歷知咸平臨潢府為北京留守卒為名臣死於中都之難贈尚書令廣平郡王諡忠肅馮璧字叔獻真定路人幼頴悟不凡章宗承安二年進士由莒州軍事判官調遼濵主簿縣有和糴粟未給價者十萬斛散貯民居以富人掌之有腐敗則責償於民民殊苦之璧白漕司罷之民大悅纍遷同知集慶軍節度使致仕卒年七十有九裕爾伯特北京路庫本明安托囉山穆昆人以功擢海濵令廉能稱職章宗明昌六年除東北路招討使時北邊有警圍慶州伯特率本路兵往救敵解去承安元年授鎮寧軍節度使以六羣牧人叛改寧昌軍伯特為都統領步騎萬人至懿州奮擊大敗之二年糾軍千餘出沒剽掠錦懿間伯特追敗之復獲所掠悉還本户五年知廣寧府改東北路招討使捍邊有功三遷為崇義軍節度使伯特勇決善戰自幼以軍功顯任兵鎮十餘年所向克捷裕爾八旗姓伯特解見前原作瑶里孛迭國語庫本棉也原作窟白托囉國語解見黑龍江山川卷原作陀羅穆昆族也原作謀克今譯改伊喇富森東北路烏爾呼河明安人以蔭補吏纍功遷順義軍節度副使衛紹王大安初遷沃州刺史同知興中府事富森繕城浚濠百姓頗怨頃之兵果至攻北城富森戰于北使備西城薄暮賊果攻其西以有備乃解尋改廣寧府富森被牒往鄰郡賊來攻之富森子銅和尚率家奴與戰城賴以完富森歸悉放奴為良終不言其子之功未幾充遼東宣撫使嵗大飢出沿海倉粟先賑而後奏之優詔奬諭伊喇八旗姓國語富森孳生也原作移剌福僧國語烏爾呼偏也原作烏連苦今譯改完顔伊爾必斯海蘭路特克紳畢喇明安人章宗明昌五年登第宣宗貞祐初官御史中丞遼東路行尚書省事興定元年參知政事行尚書省元帥府於博索路寬厚愛人敏於吏事能治劇要時伯特呼圖有異志以兵戕殺伊爾必斯識者惜其用之未盡詔贈平章政事封芮國公伊爾必斯解見選舉卷原作阿里不孫海蘭見建置沿革卷原作曷懶特克紳畢喇國語特克紳整齊也畢喇河也原作泰申必刺博索山隂也原作婆速伯特見前呼圖鬼也原作伯德胡土今俱譯改李完字全道朔州馬邑人經童出身復登詞賦進士章宗明昌中同知廣寧府初遼濵人崔元入城飲酒不歸後得尸水中有司執同飲者訊之皆誣服提刑司疑其寃以獄畀完完廉得其賊乃舟師也遂免同飲者遷北京臨潢路提刑副使梁持勝字經甫河東絳州人章宗泰和六年登進士第纍遷咸平路宣撫使經歷官宣宗興定初宣撫使布希萬努有異志欲棄咸平徙海蘭路持勝力止之萬努怒杖之八十持勝走上京告行省太平是時太平已與萬努通謀口稱持勝忠而心實不然署持勝左右司員外郎既而太平受萬努命焚毁上京宗廟執元帥承充奪其軍持勝與提控咸平治中費摩薩布萬户韓公恕約殺太平復推承充行省事共伐萬努事泄俱被害詔贈持勝忠順大夫韓州刺史忠節附萬按布希費摩俱入旗姓布希努原作蒲鮮萬奴費摩薩布原作裴滿賽不國語薩布鞋也今俱譯改赫舍哩和勒端西安路和倫松科明安人宣宗貞祐二年為宣差副提控同知博索路兵馬都總管行府事三年布希萬努取咸平東京瀋澄諸州多從之萬努侵博索近境和勒端率兵擊却之九月萬努衆九千人出宜風及易池和勒端率兵與戰其衆潰去四年和勒端遣王汝弼由海道奏事宣宗嘉其功遷遼海軍節度使赫舍哩八旗姓國語和勒端煙墩也原作紇石烈桓端和倫松科國語和倫威也松科蹤迹也原作忽論宋割今俱譯改赫舍哩德字廣之真定路珊沁明安人明昌進士宣宗貞祐二年官肇州武興軍節度使時肇州圍急食且盡有糧三百船在鴨子河去州五里不能至德浚濠增陴築渠導濠水屬之河鑿陷馬穽伏甲其傍以拒守一日兵數接士殊死戰渠成船至城下食足圍解改遼東轉運使民遮道挽留乘夜乃得去國語珊沁塞也原作山春今譯改達魯楊照努金末時蒙古兵略地髙州拔惠和金源和衆龍山利建富庶等十五城降其北京留守音達琿進攻北京傍近諸寨樓子崖等二十餘寨皆降惟西乾河達魯五指山楊照努固守不下大小百餘戰照努死之達魯敗走復聚衆攻龍山以槊刺烏頁爾中胸墮馬復為史天祥所敗達魯力戰死之忠節附努蒙古語逹魯琵琶骨也原作答魯楊照原作楊趙奴音逹琿國語解見奉天府山川卷原作銀答匆蒙古語烏頁爾潦也原作鳥野兒今俱譯改沃哩布金末為興中府同知蒙古兵起穆呼哩遣人招降沃哩布斬其使謀拒守未幾吏民殺沃哩布舉城降國語沃哩布令留也原作兀里卜穆呼哩八旗姓國語凡物有稜角之謂原作木華黎今俱譯改傅霖玉田人第進士纍官至崇義軍節度副使行部臨潢沒於兵忠節附謹案舊志遼金名宦人物兩門往往混淆重覆今核其治遼有政迹者列入名宦門其或别有表見而不以治遼著者列入人物門以區别焉欽定盛京通志卷五十四
