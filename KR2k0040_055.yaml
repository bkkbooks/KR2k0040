body:
  text: 兵防一盛京兵制奉天將軍所属各駐防員額兵額奉天將軍所属各邊門員額兵額欽定四庫全書欽定盛京通志兵防臣等謹案遼左為古肅慎國士馬雄勁自唐置安東都䕶府統𨽻軍僚迨乎遼金五京鳩材十部分鎮兼設提轄招討諸司𨽻兵萬計元時則有乣軍契丹軍女直髙麗諸軍盖地當山海要衝所以簡軍實重鎮撫也我國家神武開基聲靈赫濯桓桓虎旅燮伐用張洎永清大定以後設鎮留都西自呼倫布雨爾北循興安嶺黑龍江而東南跨鴨緑地方五六千里各因形勢險要列屯置戍以控扼之兵防之制邁於往古我皇上覲光揚烈翠華臨蒞秋郊獮閲賞賚有加復命増設弁兵修繕甲仗誠以講武詰戎不可一日不備也臣等詳稽各属員額兵額及戰艦喀倫之属謹志兵防第二十一欽定四庫全書欽定盛京通志卷五十一兵防一盛京兵制洪惟我太祖髙皇帝以一旅滅葉赫九國之師復以勁旅五百破眀兵四十萬衆神武布昭亦由干城之士貔虎之材訓練精硏羣宣力以襄鴻伐懿考實録所載軍政如滿洲精卒每三百人立一牛彔五牛彔立一甲喇五甲喇立一固山凡八固山行軍時地廣則八固山並列地狭則合為一路當兵刄相接之際擊刺騎射各用所長威如雷霆勢如風發攻城野戰一鼓而勝用是削平諸郡撫有瀋遼於鑠王師規模若此其宏逺也我太宗文皇帝紹衣繼述撫降錦州寧逺等大小七十餘城䝉古察哈爾等部以次内附爰以漢軍䝉古分𨽻八旗迺有二十四旗之設自正副都統以下各有統轄列汛置營樞政益以詳備逮我世祖章皇帝入闗定鼎以盛京為留都設駐防昂邦章京給總管卬鎮守其地並設各城駐防聖祖仁皇帝康熈元年改總管為将軍十年墨爾哲勒氏屯長率衆来歸編為墨爾根四十佐領號新滿洲十五年以寧古塔将軍移駐吉林二十一年征𠞰羅刹始于黒龍江植木為城設将軍副都統轄之二十八年克雅克薩城設兵屯種三十一年建齊齊哈爾白都訥二城以科爾沁獻進之錫伯卦勒察達呼爾壮丁萬四千有竒分駐二城編佐領並添設各城守尉等官分撥旗兵防禦三十八年以黒龍江将軍移駐齊齊哈爾而水師火器諸營亦相繼設立于是駐防兵制靡不宏備矣奉天將軍所属将軍一員駐盛京城副都統一員協領共十一員佐領共六十六員驍騎校共三十五員防禦共三十四員筆帖式十一員外郎六員委官二十七員俱詳載職官卷世襲三等輕車都尉一員騎都尉兼一雲騎尉二員騎都尉九員雲騎尉九員恩騎尉二員屬下舊設步兵八百名乾隆三十八年増設三百八十八名現實步兵一千一百八十八名舊設馬兵六千四百二十四名乾隆六年移駐牛荘等處兵六百九十六名二十九年奉㫖移駐塔爾巴哈臺兵四百四名三十年増設三百二十名三十八年裁三百六十四名現實兵五千二百八十名門軍校八名庫軍校二十名順治十四年設看守御園領催一名兵九名看守皇寺兵八名鐵匠六十六名箭匠六十一名夜捕手三十八名俱康熈雍正年間陸續増設養育兵三百六十二名乾隆三十八年増設興京駐防天聰七年設城守尉一員防禦四員驍騎校四員筆帖式一員委官四員乾隆二十七年増設属下舊設滿洲兵四百九十四名䝉古兵六十七名漢軍兵三十四名實數兵五百九十五名乾隆二十九年移駐塔爾巴哈臺兵二十三名三十年増設足額鐵匠八名康熈三十二年設撫順駐防康熈二十九年設滿洲防禦一員漢軍防禦三員委官一員乾隆二十七年増設属下舊設兵一百四十名乾隆二十九年移駐塔爾巴哈臺兵十名現實兵數一百三十名鐵匠二名康熈二十九年設巨流河駐防康熈二十九年自山海闗移駐滿洲佐領一員漢軍佐領一員漢軍驍騎校二員委官五員乾隆二十七年設属下舊設滿洲兵二十九名漢軍兵一百十一名共兵一百四十名乾隆二十八年増設四十名四十三年奉㫖増設二十名現實兵數二百名鐵匠二名乾隆二十九年設遼陽駐防天聰六年設城守尉一員防禦八員乾隆二十九年移駐塔爾巴哈臺一員巴勒瑚佐領一員滿洲驍騎校八員乾隆二十九年移駐塔爾巴哈臺一員四十三年増設一員漢軍驍騎校一員筆帖式一員原設二員雍正七年裁一員倉官一員外郎二員委官一員乾隆二十七年増設属下舊設滿洲兵五百三十二名䝉古兵六十九名巴勒瑚䝉古兵五十五名共六百五十六名乾隆二十八年裁二百名分駐九路二十年移駐塔爾巴哈臺兵六十六名三十年増設五十九名現實兵數四百四十九名鐵匠九名康熈二十八年設八名三十一年増設一名海城駐防即牛莊駐防天命六年設防守尉掌印章京一員滿洲防禦三員原設二員乾隆五年由騎盛京移駐五員十三年裁四員改設驍校二十九年移駐塔爾巴哈臺一員漢軍防禦一員四品協領一員乾隆十三年増設驍騎校四員乾隆十三年増設筆帖式一員倉官一員委官一員乾隆二十七年増設属下舊設滿洲兵八十四名䝉古兵十名漢軍兵六十六名共兵一百六十名乾隆六年由盛京移駐兵二百四十名二十九年移駐塔爾巴哈臺兵二十三名現實兵數三百七十七名鐵匠二名天聰六年設盖平駐防天聰七年設原属奉天將軍乾隆十五年改歸熊岳副都統就近専轄防守尉掌印章京一員防禦三員原設二員乾隆五年由盛京移駐五員十三年裁四員改設驍騎校二十九年移駐塔爾巴哈臺一員四品協領一員滿洲驍騎校三員漢軍驍騎校一員俱乾隆十三年設筆帖式二員雍正七年裁一員倉官一員委官一員乾隆二十七年設世襲騎都尉一員雲騎尉二員属下舊設滿洲兵五十名漢軍兵九十七名䝉古兵十三名共兵一百六十名乾隆六年増設兵二百四十名二十九年移駐塔爾巴哈臺兵十