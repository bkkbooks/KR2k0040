body:
  text: 祠祀一奉天府各屬興京承德縣遼陽州海城縣蓋平縣開原縣鐵嶺縣復州寧海縣岫巖城鳯凰城欽定四庫全書欽定盛京通志卷九十七祠祀臣等謹按周禮醫巫閭為北鎮祀典肇興遼金冊封長白山神望隆秩禮我國家龍興東夏崇德報功自郊社上儀以及山川百神莫不來饗皇上巡軒所􅊩道河喬嶽昭格明禋聿新祠宇用答嘉貺式序懷柔所為頌也臣等既敬紀壇廟大祀恭覩盛典咸秩謹志祠祀第三十三欽定四庫全書欽定盛京通志卷九十七祠祀一奉天府各屬興京顯祐宫在城東北二里正殿三楹後殿三楹配殿六楹大門三楹賜道國初建崇德十七年置道士順治六年士布匹十五年賜名顯祐宫立碑康熙二十一年廟內道士嵗給衣布乾賜供器十六事定例元旦日貢獻御書碧隆十二年額恭懸正殿內三官殿乾隆十二年落保珍匾御書太有元範匾額又乾隆八年十九年四十三年四徴御製謁十八年俱有載顯祐宫詩恭天章門地藏寺在顯祐宫東地藏殿五楹大佛殿五楹配廡各三楹又左右殿各五楹韋䭾殿三楹國初大門三楹耳房三楹鐘鼓樓各一建天聰六年敕八旗撥僧居之嵗給衣帽康熙二十一年聖駕巡幸有碑記內大佛殿乾隆十二年有御書妙證三摩匾額地藏殿乾隆十二年有御書人天法炬匾額俱恭懸殿中奉天府恭詳壇壝諸制已壇廟卷承德縣社稷壇在天祐門外西南隅玉皇廟前雍正十一年增建乾隆六年添建大門三楹耳房三楹風雲雷雨山川壇在社稷壇前雍正十一年知縣蔡書升建先農壇在德盛門外東南隅澝水之南雍正五年建春秋以時致祭乾隆六年添建大門三楹耳房三楹重葺周圍牆坦又籍田即在祠前府縣各四畝九分厲壇在地載門外都城隍廟在城內大街鼓樓東路北舊瀋陽城隍廟也大殿五楹配廡各三楹耳房六楹大門三楹廟有元至正年碑及明洪武𢎞治萬厯年碑皆記重修年月國初建都後升為都城隍廟康祭熙元年重修有司以時致護都豐農龍王廟在撫近門內路北正殿三楹龍王殿一楹三官殿三楹大門三敕建楹耳房八楹雍正元年忠義孝弟祠在德盛門內路北正宇三楹耳房三楹大門一楹雍正九年建節孝祠在懷逺門外南偏正宇三楹耳房二楹大門一楹雍正九年建景祐宫舊在城內配大清門東今移建德盛門外正殿三楹廡各三楹大門三楹左右儀本朝門二楹耳房六楹後殿三楹崇德六年敕選道士在廟住持七年給人役圖地道士給衣糧順治九年奉旨重修十四年增道士置鐘磬立碑康熙十年駕幸廟中賜銀千兩二十一年駕再幸焉御書昭格二字匾額恭懸大殿並賜名景祐宮乾隆四十三年御書玉虛真宰匾額恭懸正殿又乾隆八年有御製謁景祐宮詩四十三年有御製景祐宮瞻拜六韻詩四十八年有舊作韻詩俱恭御製題景祐宮詩景祐宫瞻禮叠戊戍天章門載關帝廟有三一在地載門外城西北五里教場崇德八年敕建正殿三楹東西配廡各三楹大門三楹賜額口義高千古嵗時官給香燭順治九年敇封忠義神武關聖大帝雍正三年加封三代公爵曽隆祖光昭公祖裕昌公父成忠公春秋致祭乾御書靈十九年匾額恭懸正殿一在天祐門外大殿三護神京楹左右廡各三楹大門三楹一在城北二臺子大殿三楹耳房四楹大門三楹皆係名剎實勝寺在外攘門關外二里俗呼黃寺亦曰配皇寺大殿五楹左右經堂各三楹東西殿各三楹碑亭二座天王殿三楹鐘鼓樓二座山門三楹東西牌樓二座禪堂僧房三十四間我太宗文皇帝破明兵十三萬於松山達裏佛並恭藏敕建此寺前有下馬牌寺內供奉邁太祖甲胄弓矢乾隆八年太宗御書海月常輝匾額恭懸寺內有瞻御製實勝寺詩再題實勝寺詩恭太祖高皇帝所遺甲胄詩恭瞻年有太宗文皇帝所御弧矢詩十九御製實勝寺詩四十三年有御製恭瞻太祖皇帝甲胄作歌恭瞻勝寺詩四十八年有太宗皇帝所御弓矢詩實太御製恭瞻胄作歌恭瞻祖皇帝甲太宗皇帝所御弓矢詩實勝寺詩又寺內有瑪哈噶喇樓天聰九年元裔察哈爾林丹汗之母以白駝載瑪哈噶喇佛金像並金字喇嘛經傳國璽至此駝卧不起遂建此樓雍正四年奉旨重修長寧寺在外攘門外西北五里舊稱治十三年御花園順教賜為寺大殿三楹東西配殿各三楹碑亭一座山門三楹瓊經樓五楹禪堂僧房三十間乾隆十九年御書一有為宗匾額恭懸正殿又乾隆八年有心御製長寧寺詩十九年有御製長寧寺恭瞻太宗所貽冠服詩四十三年四十八年有御製長寧寺詩長寧寺恭瞻太宗所御冠服詩俱恭載天章門萬夀寺在外攘門外路北即慈慧寺俗呼該家庵大殿五楹東西配廡各三楹經樓五楹配房各三楹碑亭二座左右耳房六楹大門三楹鐘鼓樓三楹東西耳門各一楹康熙五十年敕建有書遼海慈雲匾額恭懸藏經樓聖祖御東塔永光寺在撫近門外五里大殿五楹碑亭二座天王殿三楹鐘鼓樓二座山門三楹寺東寶塔一座禪堂僧房二十四間乾隆八年有御書慈育羣靈匾額恭懸正殿西塔延夀寺在懷逺門外五里大殿五楹經堂三楹碑亭二座天王殿三楹鐘鼓樓二座寺西寶塔一座山門三楹晾經樓一楹禪堂僧房三十間乾隆八年有御書金粟祥光匾額恭懸正殿南塔廣慈寺在德盛門外五里大殿五楹碑亭二座天王殿三楹鐘鼓樓二座寺南寶塔一座山門三楹晾經樓三楹禪堂僧房三十六間乾隆八年有御書心空彼岸匾額恭懸正殿北塔法輪寺在地載門外三里大殿五楹碑亭二座東西配殿各三楹天王殿三楹鐘鼓樓二座寺北寶塔一座山門三楹晾經樓一楹禪堂僧房二十四間以上四寺俱敕建國初時相地法每寺建白塔一座云當一統相傳為用喇嘛御書異有大學士剛林碑乾隆八年有年有金鏡周圖匾額恭懸正殿四十三御