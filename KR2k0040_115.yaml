body:
  text: 歴朝藝文三奏議表疏䇿欽定四庫全書欽定盛京通志卷一百十一歴朝藝文三奏議伐髙句驪議後漢陳忠宫前桀逆光不能討死而擊之非義也宜遣弔問因責讓前罪赦不加誅取其後善表論公孫淵表三國魏夏侯獻公孫淵昔年敢違王命廢絶計貢者實挟兩端既恃阻險又怙孫權故敢跋扈恣睢海外宿舒親見賊權軍衆府庫知其弱少不足慿恃是以决計斬賊之使又髙句麗濊貊與淵為仇並為㓂鈔今外失吳援内有胡㓂心知國家能從陸道勢不得不懷惶懼之心因斯之時宜遣使示以禍福奉車都尉鬷𢎞武皇帝時始奉使命開通道路文皇帝即位欲通使命遣𢎞將妻子還歸鄉里賜其車牛絹百匹𢎞以受恩歸死國朝無有還意乞留妻子身奉使命公孫康遂稱臣妾以𢎞奉使稱意賜爵闗内侯𢎞性果烈乃心於國夙夜拳拳念自竭效冠族子孫少好學問博通書記多所闗涉口論速㨗辯而不俗附依典誥若出胸臆加仕本部常在人右彼方士人素所敬服若當遣使以為可使𢎞行𢎞乃自舊土習其國俗為説利害辯足以動其意明足以見其事才足以行文辭足以見信若其計從雖酈生之降齊王陸賈之説尉他亦無以逺過也欲進逺路不宜釋騏驥將已篤疾不宜廢扁鵲願察愚言也上孫權表三國魏公孫淵臣伏惟遭天地反易遇無妄之運王路末夷傾側擾攘自先人以來厯事漢魏階縁際㑹為國效節繼世享任得守藩表猶知符命未有攸歸每感厚恩頻辱顯使退念人臣交不越境是以固守所執拒違前使雖義無二信敢忘大恩陛下鎮撫長存小國前後裴校尉葛都尉等到奉被勅誡聖旨彌宻重紈累素幽明備著所以申示之事言提其耳臣晝則謳吟宵則發夢終身誦之志不知足季末凶荒乾坤否塞兵革未戢人民蕩析仰此天命將有眷顧私從一隅永瞻雲日今魏家不能採録忠善褒功臣之後乃令讒諂得行其志聴幽州刺史東萊太守誑誤之言猥興州兵圖害臣郡臣不負魏而魏絶之盖聞人臣有去就之分田饒適齊樂毅走趙以不得事主故保有道之君陳平耿况亦覩時變卒歸於漢勒名帝籍伏惟陛下徳不再出時不世遇是以慺慺懷慕自納望逺視險有如近易誠願神謨早定洪業奮六師之勢收河洛之地為聖代宗天下幸甚上魏帝第一表三國魏公孫淵臣前遣校尉宿舒郎中令孫綜甘言厚禮以誘吳賊幸賴天道福助大魏使此賊虜暗然迷惑違戾羣下不從衆諫承信臣言逺遣船使多將士卒來致封拜臣之所執得如本志雖憂罪釁私懷幸甚賊衆本號萬人舒綜伺察可七八千人到沓津偽使者張彌許宴與中郎將萬泰校尉裴潛將兵四百餘人齎文書命服什物下到臣郡泰潛别齎致遺貨物欲因市馬軍將賀達虞咨領餘衆在船所臣本欲須凉節乃取彌等而彌等人兵衆多見臣不便承受吳命意有猜疑懼其先作變態妄生即進兵圍取斬彌晏泰潛等首級其吏從兵衆皆士伍小人給使東西不得自由面縳乞降不忍誅殺輒聴納受徙充邊城别遣將韓起等率將三軍馳行至沓使領長史栁逺設賓主禮誘請達咨三軍潛伏以待其下又驅羣馬貨物欲與交市達咨懷疑不下使諸市買者五六百人下欲交市起等金鼓始震鋒矢亂發斬首三百餘級被創赴水沒溺者可二百餘人其散走山谷來歸降及藏竄飢餓死者不在數中得銀印銅印兵器資貨不可勝數謹遣西曹掾公孫珩奉送賊權所假臣節印綬符策九錫什物及彌等偽節印綬首級第二表三國魏公孫淵宿舒孫綜前到吳賊權問臣家内外小大舒綜對臣有三息修别屬亡弟權敢姦巧便擅拜命謹封送印綬符策臣雖無昔人洗耳之風慚為賊權汚損所加既行天誅猶有餘忿又自臣父康昔殺權使結為讐隙今乃譎欺遣使誘致令權傾心虚國竭禄逺命上卿寵授極位震動南土備盡禮數又權待舒綜契濶委曲君臣上下畢飲竭情而令四使見殺梟示萬里士衆流離屠戮津渚慚恥逺布痛辱彌天權之怨疾將刻肌骨若天衰其業使至喪隕權將内傷憤激而死若期運未訖將播毒螫必恐長虵來為㓂害徐州諸屯及城陽諸郡與相接近如有船衆後年向海門得其消息乞速告臣使得備預第三表三國魏公孫淵臣門户受恩實深實重自臣受攝即事以來連被榮寵殊特無量分當隕越竭力致死而臣狂愚意計迷闇不即禽賊以致見疑前章表所陳情趣事勢實但欲罷弊此賊使困自絶誠不敢背累世之恩附僭盗之虜也而後愛憎之人縁事加誣偽生節目卒令明聴疑於市虎移恩改愛興動威怒㡬至沈沒長為負忝幸賴慈恩猶垂三宥使得補過解除愆責如天威逺加不見假借早當糜碎辱先廢祀何縁自明建此㣲功臣既喜於事㨗得自申展悲於疇昔至此變故餘怖踴躍未敢便寧惟陛下既崇春日生全之仁除忿塞隙抑彌纎介推今亮往察臣本心長令抱戴銜分三泉第四表三國魏公孫淵臣被服光榮恩情未報而以罪釁自招譴怒分當即戮為衆社戒所以越典詭常偽通於呉誠自念窮迫報效未立而為天威督罰所加長恐奄忽不得自洗故敢自闕替廢於一年遣使誘吳知其必來權之求郡積有年嵗初無倡答一言之應今權得使來必不疑至此一舉果如所規上卿大衆翕赫豊盛財貨賂遺傾國極位到見禽取流離死亡千有餘人滅絶不反此誠暴猾賊之鋒推矜夸之巧昭示天下破損其業足以慚之矣臣之慺慺念效於國雖有非常之過亦有非常之功願陛下原其踰闕之愆采其毫毛之善使得國恩保全終始矣令官屬上魏帝表三國魏公孫淵大司馬長史臣郭昕㕘軍臣栁蒲等七百八十九人言奉被今年七月己夘詔書伏讀懇切精魄㪚越不知身命所當投措昕等伏自惟省螻蟻小醜器非時用遭值千載被受公孫淵祖考以來光明之徳惠澤沾渥滋潤榮華無尺寸之功有負乗之累遂䝉褒奬登名天府並以駑蹇附龍托驥紆青拖紫飛騰雲梯感恩惟報死不擇地臣等聞明君在上聴政采言人臣在下得無隐情是以因縁訴讓冒犯愬寃郡在藩表宻邇不覊乎昔三州轉輸費調以供賞賜嵗用累億虚耗中國然猶跋扈䖍劉邊陲烽火相望羽檄相逮城門晝閉路無行人州郡兵戈奔散覆沒淵祖父度初來臨郡承受荒殘開日月之光建神武之略聚烏合之民掃地為業威震耀於殊俗徳澤被於羣生遼土之不壞實度是賴孔子曰㣲管仲我其被髪左袵矣向不遭度則郡早為邱墟而民係於邊廷矣遺風餘愛永存不朽度既薨殂吏民感慕欣戴子康尊而奉之康踐統洪緒克壯徽猷文昭武烈邁徳種仁乃心京輦翼翼䖍恭佐國平亂效績紛紜功隆事大勲藏王府度康當值武皇帝休明之㑹合䇿明之計夾輔漢室降身委質卑已事魏匪處小厭大畏而服焉乃慕托髙風懐仰盛懿也武皇帝亦虛心接納待以不次功無巨細每不見忘又命之曰海北地土割以付君世世子孫實得有之皇天后土實聞徳音臣庶小大豫在下風奉以周旋不敢失墜淵生有蘭石之姿少含愷悌之訓允文允武忠惠且直生民欽仰莫弗懐愛淵纂戎祖考君臨萬民為國以禮淑化流行獨見先覩羅結遐方勤王之義視險如夷世載忠亮不隕厥名孫權慕義不逺萬里連年遣使欲自結援雖見絶殺不念舊怨纖纖往來求成恩好淵執節彌固不為利迴守志匪石確乎彌堅為懼丹心未見保明乃卑辭厚幣誘致權使梟截獻馘以示無二吳雖在逺水道通利舉帆便至無所隔限淵不顧敵仇之深念存人臣之節絶強吳之歡昭事魏之心靈祗明鑒普天咸聞陛下嘉美洪烈懿兹武功誕錫休命寵亞齊魯下及陪臣普受介福誠以天覆之恩當卒終始得竭股肱永保禄位不虞一旦横被殘酷惟育養之厚念積累之效悲思不遂痛切見棄舉國號咷拊膺泣血夫三軍所伐蠻夷戎狄驕逸不䖍於是致武不聞義國反受誅討盖聖王之制王服之域有不供職則修文徳而又不至然後征伐淵小心翼翼恪恭於位勤事奉上可謂勉矣盡忠竭節還被禍患小弁之作離騷之興皆由此也就或佞邪盗言孔甘猶當清覧憎而知善讒巧似直惑亂聖聴尚望文告使知所由若信有罪當垂三宥若不改寤計功減降當在八議而潛軍伺襲大兵奄至舞戈長驅衝擊遼土犬馬惡死况於人類吏民昧死挫辱王師淵雖寃枉方臨危殆猶恃聖恩悵然重奔冀必姦臣矯制妄肆威虐乃謂臣等曰漢安帝建光元年遼東屬國都尉龎奮受二月乙未詔書曰収幽州刺史馮焕元菟太守姚光推案無乙未詔書曰遣侍御史幽州牧考姦臣矯制者今刺史或儻謬承矯制乎臣等議以為刺史興兵摇動天下殆非矯制必是詔命淵乃俯仰歎息自傷無罪深惟土地所以養人竊慕古公杖策之岐乃欲投冠釋紱逝歸林麓臣等維持誓之以死屯守府門不聼所執而七營虎士五部蠻夷各懐素飽不謀同心奮臂大呼排門遁出近郊農民釋其耨鏄伐薪制挺改案為櫓奔馳赴難軍旅行成雖蹈湯火死不顧身淵雖見孤棄怨而不怒比遣勅軍勿得干犯及手書告語懇惻至誠而吏士凶悍不可解散期於畢命投死無悔淵懼吏士不從教令乃躬馳騖自往化解僅乃止之一飯之惠匹夫所死况淵累葉信結百姓恩著民心自先帝初興爰暨陛下榮淵累葉豐功懿徳策名褒揚辯著廊廟勝衣舉履誦詠明文以為口實埋而掘之古人所恥小白重耳衰世諸侯猶慕著信以隆霸業詩美文王作孚萬邦論語稱仲尼去食存信信之為徳固亦大矣今吳蜀共帝鼎足而居天下摇蕩無所統一臣等毎為陛下懼此危心淵據金城之固仗和睦之民國殷民強可以横行策名委質守死善道忠至義盡為九州表方今二敵闚𨵦未知孰定是之不戒而淵是害茹柔吐剛非王者之道也臣等雖鄙誠竊恥之若無天乎臣一郡吉凶尚未可知若云有天亦何懼焉臣等聞仕於家者二世則主之三世則君之臣等生於荒裔之土出於圭竇之中無大援於魏世隸於公孫氏報生與賜在於死力昔蒯通言直漢主赦其誅鄭詹辭順晉文原其死臣等頑愚不達大節茍執一介披露肝膽言逆龍鱗罪當萬死惟陛下恢崇撫育亮其控告使疏逺之臣永有保持勸進元帝表晉慕容廆臣聞天生蒸民樹之以君所以對越天地司牧黎元聖帝明王監其若此知天地不可以乏饗故屈其身以奉之知蒸黎不可以無主故不得已而臨之社稷時難則戚藩定其傾郊廟㦯替則宗哲纂其祀是以宏振遐風式固萬世三五以降靡不由之伏惟髙祖宣皇帝肇基景命世祖武皇帝遂造區夏三葉重光四聖繼軌惠澤侔於有虞卜世過於周氏自元康以來艱難繁興永嘉之際氛厲彌昏宸極失御登遐醜裔國家之危有若綴旒賴先后之徳宗廟之靈皇帝嗣建舊物克甄誕授欽明服膺聰哲玉質㓜彰金聲夙振冡宰攝其綱百辟輔其政四海想中興之美羣生懐來蘇之望不圖天不悔禍大災薦臻國未忘難㓂害尋興逆賊劉曜縱逸西都敢肆犬羊陵虐天邑臣奉表使還乃承西朝以去年十一月不守主上幽刼復沈敵庭神器流離再辱荒逆臣每覽史籍觀之前載厄運之極古今未有苟在食土之毛含血之類莫不叩心絶氣行號巷哭况臣等荷寵三世位厠鼎司聞問震惶精爽飛越且驚且惋五情無主舉哀朔垂上下泣血臣聞昏明迭用否泰相濟天命無改厯數有歸或多難以固邦國或殷憂以啓聖明是以齊有無知之禍而小白為五霸之長晉有驪姬之難而重耳以主諸侯之盟社稷靡安必將有以扶其危黔首㡬絶必將有以繼其緒伏惟陛下元徳通於神明聖姿合於兩儀應命世之期紹千載之運符瑞之表天人有徴中興之兆圖䜟垂典自京畿隕喪九服崩離天下囂然無所歸懐雖有夏之遘夷羿宗姬之離犬戎蔑以過之陛下撫征江左奄有舊吳柔服以徳伐叛以刑抗明威以攝不類仗大順以號宇内純化既敷則率土宅心義風既暢則遐方企踵百揆時叙於上四門穆穆於下昔少康之隆夏訓以為美談宣王中興周詩以為休詠况茂勲格於皇天清暉光於四海蒼生顒然莫不欣戴聲教所加願為臣妾者哉且宣皇之允惟有陛下億兆攸歸曾無與二天祚大晉必將有主主晉祀者非陛下而誰是以邇無異言逺無異望謳歌者無不吟誦徽猷獄訟者無不思於聖徳天地之際既交華夷之情允洽一角之獸連理之木以為休徴者盖有百數冠帯之倫要荒之衆不謀同辭者動以萬計是臣等敢考天地之心因函夏之趣昧死上尊號願陛下存舜禹至公之情狹由巢抗矯之節以社稷為務不以小行為先以黔首為憂不以克讓為事上慰宗廟乃顧之懐下釋普天傾首之勤則所謂生繁華於枯荑育豐肌於朽骨神人獲安無不幸甚臣聞尊位不可久虚萬㡬不可久曠虚之一日則尊位以殆曠之浹辰則萬㡬以亂方今踵百王之季當陽九之㑹狡㓂窺窬伺國瑕隙黎元波蕩無所繫心安可棄而不恤哉陛下雖欲逡巡其若宗廟何其若百姓何昔者惠公虜秦晉國震駭吕郤之謀欲立子圉外以絶敵人之志内以固闔境之情故曰喪君有君羣臣輯睦好我者勸惡我者懼前事之不忘後代之元龜也陛下明並日月無幽不燭深謀逺猷出自胸懷不勝犬馬憂國之情遲睹人神開泰之路是以陳其乃誠布之執事臣等忝於方任久在遐外不得陪列闕庭與睹盛禮踴躍之懷南望罔極上晉帝表晉慕容廆臣究觀前代之主若能親賢並建則政致昇平若親黨后族必有傾辱之禍是以周之申伯號稱賢舅以其身藩於外不握朝權降及秦昭足為令主委信二舅㡬至亂國逮於漢武推重田蚡萬機之要無不决之及蚡死後切齒追恨成帝闇弱不能自立内惑艶妻外恣五舅卒令王莽坐取帝位每覽斯事孰不痛惋設使舅氏賢若穰侯王鳯則但聞有二臣不聞有二主若其不才則有竇憲梁冀之禍凡此成敗亦既昭然茍能易軌可無覆墜陛下命世天挺當隆晉道而遭國多難殷憂備嬰追述往事至今焚灼迹其所由實因故司空亮居元舅之尊勢業之重執政裁下輕侮邊將故令蘇峻祖約不勝其忿遂至敗國至令太后發憤一旦升遐若社稷不靈人神無助豺狼之心當何一作可極邪前事不忘後事之表而中書監左將軍氷等内執樞機外擁上將昆弟並列人臣莫儔陛下深敦渭陽氷等自宜引領臣嘗謂世主若欲崇顯舅氏何不封以藩國豐盛其禄賜限其勢利使上無偏優下無私論如此榮辱何從而生噂􅊱何由而起往者唯亮一人宿有名望尚致世變况今居之者素無聞焉且人情易惑難以户告縱令陛下無私於彼天下之人誰謂不私乎臣與氷等名位殊班出處懸邈又國之戚昵理應降悦以適事㑹臣獨矯抗此言者上為陛下退為氷計疾茍容之臣坐鑒得失顛而不扶焉用彼相昔徐福陳霍氏之戒宣帝不從至令忠臣更為逆族良由察之不審防之無漸臣今所陳可謂防漸矣但恐陛下不明臣之忠不用臣之計事過之日更處焦爛之後耳昔王章劉向每上封事未嘗不指斥王氏故令二子或死或刑谷永張禹依回一作違不對故容身苟免取譏於世臣被髮殊俗位為上將惟憂夙夜罔知所報惟當外殄㓂讐内盡忠規陳力輸誠以答國恩臣若不言誰當言者為安平公賀破奚契丹表唐李商隐臣某言臣得本道進奏官某狀報某月日幽州節度使張仲武奏破奚北部落及諸山奚除舊奚王匿即所管外殺戮首領丁壯老㓜并殺獲牛羊焚燒車帳器械等計二十萬刺史以下面皮一百具耳二百隻奚車五百乗羊一萬口牛一千五百頭者天聲逺疊廟略遐宣白鹵獲於靈臺赤彛俘於燕路臣竊窺舊史逖聴前朝有天子憂邊清宵輟寐將軍出塞白首言歸至乃或勝或奔一彼一此竞困塞郊之柝那停絶漠之烽猶欲叙烈旂常告功祧廟用其暫勝謂曰難能况幽朔巨都全燕重地薦臻奚㓂猾亂華人田讓之䕶鮮卑莫能深入祭彤之軍遼水惟遣相攻近嵗以來為患滋甚是單于偵邏之路懷駒支漏泄之姦張仲武重感國恩習知邊事同三師而𨽻楚伴五餌以開戎乗其囂惰之時俄得剪除之便燕犀宻挂冀馬潛羈超距投石者動過千羣㦸首科頭者略踰萬計坎三鼓而河荒自郤聲六校而屋瓦皆飛自使鶚懼喪林兎忙迷穴無舟掬指有地僵屍未驚楚幕之烏前軍已蹙不唳淮山之鶴後隊仍窮遂分袁尚之頭顱乃裂蚩尤之肩髀穹廬落燼同甲揚灰山積雲屯大収其車乗角羸耳濕盡獲其牛羊栁水載澂桑河無事爰施言語入解皇威此皆皇帝陛下功格上元運膺下武授兹成算於彼當仁震肅九圍歌呼萬國昔艱難云始邊塵首起於盧龍今開㤗有期漢將先清於涿鹿人謀允若靈貺昭然固已上慶祖宗下光編䇿緑圖洪範競三古之殊猷玉檢金泥有百神之靈貺臣雖當防遏不介邊陲空增氣於懦夫實叨榮於下將日圍千里天葢九重奉一月之㨗書惟知忭蹈獻萬年之夀酒尚隔班行念風水於遐藩寄夢寐於宣室不勝望闕結戀之至疏請甄徭役禁請託疏南北朝髙謙之自正光以來邊城屢擾命將出師相繼於路若使軍帥必得其人賞勲不失其實則何賊不平何征不㨗也但諸守帥或非其才多遣親者妄稱入募唯遣奴客充數而已對㓂臨敵曾不彎弓則是王爵虚加征夫多闕賊虜何可殄除忠貞何以勸誡也且近習侍臣戚屬朝士請託官曺擅作威福如有清貞奉法不為回者咸共譖毁横受罪罰在朝顧望誰肯申聞蔽上擁下虧風壞俗使讒謟甘心忠讜息義且頻年以來多有徴發民不堪命動致流離苟保妻子竸逃王役不復顧其桑井憚此刑書正由還有必困之理歸無自安之路若聴歸其本業徭役微甄則還者必衆墾田開闢數年之後大獲課民今不務以理還之但欲嚴符切勒恐數年之後走者更多故有國有家者不患民不我歸唯患政之不立不恃敵不我攻唯恃吾不可侮此乃千載共遵百王一政且琴瑟不韻知音改弦更張騑驂未調善御執轡成組諺云迷而知反得道不逺伏願少垂覧察使朝章重舉軍威更振海内起維新之歌天下見復禹之績請復置廷尉司直疏南北朝髙恭之臣聞舜禹皋陶姦宄是託禹泣罪人堯心為念所以舉直錯枉事切曩賢明徳慎罰議存先典髙祖太和之初置廷尉司直論刑辟是非雖事非古始交濟時要所謂禮樂互興不相沿襲者矣臣忝當今任所思報效未忘寢興竊見御史出使悉受風聞雖時獲罪人亦不無枉濫何者得堯之罰不能不怨守令為政容有愛憎姦猾之徒恒思報惡多有妄造無名共相誣謗御史一經檢究恥於不成杖木之下以虚為實無罪不能自雪者豈可勝道哉臣雖愚短守不假器繡衣所指兾以清肅若仍更踵前失或傷善人則尸禄之責無所逃罪如臣鄙見請依太和故事還置司直十人名𨽻廷尉以五品選厯官有稱心平性正者為之御史若出糾劾即移廷尉令知人數廷尉遣司直與御史俱發所到州郡分居别館御史檢了移付司直司直覆問事訖與御史俱還中尉彈聞廷尉科按一如舊式庶使獄成罪定無復稽寛為惡取敗不得稱枉若御史司直糾劾失實悉依所斷獄罪之聴以所檢迭相糾發如二使阿曲有不盡理聽罪家詣門下通訴别加按檢如此則肺石之傍怨訟可息藂棘之下無受罪呑聲者矣請改鑄疏南北朝髙恭之四民之業錢貨為本救弊改鑄王政所先自頃以私鑄薄濫官司糾䋲挂網非一在市銅價八十一文得銅一斤私鑄薄錢斤餘二百既示之以深利又隨之以重刑罹罪者雖多姦鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆筴上貫便破置之水上殆欲不沉因循有漸科防不切朝廷失之彼復何罪昔漢文帝以五分錢小改鑄四銖至武帝復改三銖為半兩以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至賤五十有餘其中人功食料錫炭鉛砂縱復私營不能自潤直置無利自應息心况復嚴刑廣設也以臣測之必當錢貨永通公私獲允諫親征髙麗疏唐禇遂良臣請譬諸身兩京心腹也四境手足也殊裔絶域殆非支體所屬髙麗王陛下所立莫離支殺之討其逆夷其地固不可失但遣一二慎將付鋭兵十萬翔旝雲輣唾手可取昔侯君集李靖皆庸人爾猶能橛髙昌纓突厥陛下止發蹤指示得功歸聖明前日從陛下平天下虓士爪臣氣力未衰足可驅策惟陛下所使臣聞涉遼而左或水潦平地淖三尺帯方元莵海壤荒漫決非萬乗六師所宜行諫伐髙麗疏唐李君求臣聞心之痛者不能緩聲事之急者不能安言性之忠者不能隐情且食君之禄者死君之事今臣食陛下之禄其敢愛身乎臣聞司馬法曰國雖大好戰必亡天下雖安忘戰必危兵者凶器戰者危事故聖主明王重行之也憂人力之盡恐府庫之殫懼社稷之危生中國之患故古人云務廣徳者昌務廣地者亡昔秦始皇好戰不已至于失國是不愛其内而務其外故也漢武逺討朔方逮乎萬里廣拓南海分為八部終於户口减半國用空虚至於末年方垂哀痛之詔自悔其失髙麗者遐荒小醜潛藏山海之間得其人不足以彰聖化棄其地不足以損天威何至乎疲中國之民傾府庫之實使男子不得耕耘女子不得蠶織陛下為人父母不垂惻隐之心傾其有限之資貪其無用之地設令髙麗既滅即不得不發兵鎮守少發則兵威不足多發則入心不安是乃疲於轉戌萬姓無聊生也萬姓怨則天下敗矣天下既敗陛下何以自安故臣以為征之不如不征滅之不如不滅軍國機宜疏唐陳子昻臣聞天子義兵不可以怒發怒發則衆懼懼則人摇賊得其勢故昔者聖人守静以制亂持重以服姦大義常存人無疑懼臣伏見恩制免天下罪人及募諸色奴充兵討擊者是㨗急之計非天子之兵且比來刑獄久清罪人全少奴多怯弱非慣征行縱其募集未足可用况當今天下忠臣勇士萬分未用其一契丹小孽假命待誅何勞免罪贖奴損國大義且陛下富有四海一戰未勝遂即免罪募奴若更有他虞復何徴發臣恐此不可威示天下臣聞聖人制事必理未萌所以姦不敢謀賊不得起臣聞吐畨近日將兵圍𤓰洲數月即退或云此賊通使墨啜恐𤓰沙止遏故以此兵送之臣雖未信然惟國家比來勍敵在此兩畨至扵契丹小醜未足比類今國家為契丹大發河東道及六胡州綏延丹隰等州稽胡精兵悉赴營州而縁塞空虚靈夏獨立今水生河合草秋馬肥秦中北據隴右亦闗東隣黨凶羯姦謀覘知此隙驅其醜類大盗秦闗隴右馬羣是國所寳防備逺策良宜預圖不可竭塞上之兵使凶虜得計臣聞所養非所用所用非所養理家必弊在國必危故明君不畜無用之臣慈父不畜無益之子今朝廷五品三品受國寵榮天恩賞賜府庫虚耗食人之禄死人之事恩養聖朝甚矣厚矣及邊有小賊則云無人驅使又勞聖恩逺訪外人外人先無寵禄臨難又不肯殉節然則國之所養者縂無用之臣朝之所遺者乃有用之士今不収有用厚養無用欲令忠賢効力凶賊滅亡以臣愚見理不可得近者遼軍張元遇等喪律實由内外不同心宰相或賣國樹恩近臣或附勢私謁禄重者以拱黙為智任權者以傾巧為賢羣臣雷同以狥私為能媚妻保子以奉國為愚陛下又寛刑漏網不循名實遂令紀綱日廢姦宄滋多今國家苐一要者在稍寛兵期山南淮南去幽州四千里所司使十月上旬到計日行百里四十日方到即今水雨如此又徴符到彼未久當日辦發猶不及期况未辦發月日行不可百里違限者死國有常刑到不及期懼罪逃散為賊此更生一患縱倍程趁期亦恐不及若違不誅則軍不可統若違必誅則全衆皆怨况兵疲不堪用吳廣陳勝為盗由此即日江南淮南諸州租船數千艘已至鞏洛計有百餘萬斛所司使勒往幽州納充軍粮其船夫多是客户㳺手堕業無賴襍色人發家來時惟作入都資料今巳到京又勒往幽州去此二千餘里還又二千餘里方寒氷凍一無資粮國家更無優恤但切勅赴限比聞丁夫皆甚愁嘆又諸州行綱承前多僦勾至都糴納今倘有此類向滄瀛糴納則山東來米必二百以上百姓必騷動今國家不優恤又無識事明了人檢㸃勾當知租米現在虚實又未宣恩㫖慰勞兵夫惟切勒赴限倘在道逃亡此粮有萬一非意損失則東軍二十萬衆坐自取敗為賊所圖楊元感以此為亂實軍國大命山東百姓國家比以供軍矜不㸃募近聞東軍失利山東人驕慢乃謂國家怕其粗豪不敢徴發今街談巷議多有苟且之心伺國瑕隙頗摇風俗國家大政須人無二心若縱懷二姦亂必漸望降勅使臣與州縣採訪有粗豪㳺侠亡命姦盗失業漂食富族強宗者並稍優與賜物悉募從軍仍宣恩㫖慰勞以禮發遣若如此則山東浮人安于㤗山一者以慴姦豪異心二者得精兵討賊不煩寃怨稽胡等又身既在軍則父兄子弟自不敢為過昔漢祖征山東使蕭何鎮闗中漢軍數敗蕭何每發闗中子弟以助漢軍三秦無盗亂之患漢軍有強雄之勢盖以此道也夫亂羣敗衆者惟在姦雄姦雄既羈亂弊自息詩云無縱詭隨式遏㓂虐紫袍緋袍緑袍金帯牙笏告身金銀器物等即日軍衆已極入賊有期臣欲募死士三萬人長驅賊庭一戰掃定軍中未有髙爵重賞無以勵勇使貪望賜給袍帯告身器物二千事庶以勸勵士衆未敢虚用比來將軍不明賞罰所以兵不齊心今聚十五萬衆戈甲粮餉日費萬金不早剋定恐所費彌廣山東百姓貧疲不可再役特乞天恩允臣所請請遼東置畜牧司疏元陳思謙遼海延袤千里地髙氣寒水甘泉美無非牧養之地宜設置羣牧使司統領十監專治馬政並畜牛羊數年之後馬實蕃盛或給軍以壯兵威或給站以優民力牛羊之富又足以給國用非小補也諫巡幸疏元崔敬世祖以上都為清暑之地車駕行幸嵗以為常閣有大安殿有鴻禧睿思所以保養聖躬適起居之宜存敬畏之心也今錫喇鄂爾多斯乃先皇所以備宴㳺非常時臨御之所今陛下方以孝治天下屢降徳音袛行宗廟親祀之禮雖動植無知罔不歡悦而國家多故天道變更臣備員風紀以言為職願大駕還大内居深宫嚴宿衛與宰臣謀治道萬機之暇則命經筵進講究古今盛衰之由緝熈聖學乃宗社之福也錫喇䝉古語解見吉林山川巻鄂爾多斯今地名原作失剌斡耳朶思今譯改勘定三城疏明曾銑頃者廣寧遼陽二城軍士變亂其根因情狀前疏己言其略矣臣㕘議遼陽軍變事因有激心實無他又該兵部題覆地方事情止遣大臣查勘凡諸進言興兵征剿之策一切不用於人心惶懼之秋為平定安戢之道誠宜如此不然則沮脅從者自新之路矣况兵凶戰危未可輕試觀諸往者大同之禍起於制帥之喜事成於用兵之寡謀遂致智勇俱廢卒無成功得失昭然監戒不逺柰何逆軍無忌自棄生成一聞大臣將來互相鼓煽既約閉二鎮之城以要赦又欲援大同之例以需賞假洗城之説為聚衆之謀布妖言以惑人心攀重囚以為謀主是數逆軍者其始也因激以倡亂雖無素謀其既也負罪而逞兇漸成不軌臣竊思之一成而不可假者國之法也難制而易於縱者人之情也茍上有假借之法下多放縱之情往者陕西之軍變未㡬而復有大同之變説者曰大同之變所以䖏陕西之變者啓之也大同殺叅將殺巡撫未㡬而又有殺總兵之變説者曰李瑾之變所以䖏張文錦之變者啓之也盖惠竭矣而威或不伸威行矣而法或未盡蠢兹小醜習於耳目所以撫臣一旦乖方而軍士之騷動肆起凡以法不足以懾服而人情日流於驕悍故也今者仰賴䖏置得門開諭明切故首惡就擒邊境之危殆者已安人心之動摇者咸定此誠諸鎖觀望之候也臣愚以為祖宗立法所以讋服姦兇今諸鎮之軍不數年而亂者屢起此豈法之不善哉抑亦議法者之未盡爾夫明罰勅法者先王之道也小懲大誡者小人之福也伏望皇上燭後慮逺拔本塞源重春秋無將之義嚴臣子大亂之防乞將臣言議行惟據兇逆之原情以盡律例之常法至于應叅職官悉從重究則威行于恩外威震而恩益深仁盡于義中義明而仁益篤動切事機之㑹潛消姦宄之萌地方永保無虞矣發帑救荒疏明周斯盛臣照得遼東地方三面距邊一面瀕海商賈丹楫未通往嵗秋成粒米豐稔既無外省之移足充本鎮之用故地方號為富庶而人家不事儲蓄間有一二灾傷尚可自活自嘉靖三十六年大水以後一望成湖籽粒未獲逺近居民家家缺食鬻妻棄子流離載道入冬以來日甚一日斗米值銀五錢且數日市無販糴民愈窘廹始則掘食土麵繼則遂至相食壯者肆行刼掠無所顧忌法禁不能止積莩狼藉不忍見聞臣叨巡兹土寢食靡遑盡括公貯平糴榖粟煑粥施賑但邊方庫藏素無蓄積所濟不足以當百分之一今冬作之時阡陌蕭然既鮮牛力又乏籽種生全之望已屬無期况屯粮力役之征幇軍買馬之費追併嚴急竟使枵腹待斃情甚可憐本鎮兵馬素稱可用近因粮賞久欠調征頻煩已有積弱之漸加以嵗之饑饉供應不敷死亡逃竄無日無之計一營不及原額之半而馬更少沿邊戌守十存一二使之奔走服役役亦不能前而况資之以為戰守哉昨該臣等題請加添月粮折色荷䝉皇上俯賜允給全遼軍民不勝感戴但飢餒至極給發未多一軍所領不足以為旬日之資嗷嗷之衆日見倉皇號令為之不行夫軍所恃以為生者應得之粮賞户丁之供幇耳今上不能仰給於公下無以資助於户相繼逃亡勢所必至屯防耕種之期路有刼奪之梗緩急之際誰復為用况此地寒不生麥夏初始種秋半始穫若榖則更晩矣計其餬口之日尚逺若非破格拯救恐未能有濟也且天下之事圖之于未形則力易而費省救之于已著則費滋而力難以是孤絶無援之地設令不為之䖏使飢餒填乎溝壑逃亡盡乎什伍乃從而招募為費何如收之于既涣扶之于既頽為力何如矧外患熾于慿陵内禍起于急迫尤有不可言者則將何以䖏之臣極知帑蔵空虚委難䖏辦但前項重情勢在燃眉誠有不能己者伏望皇上軫念全遼為畿甸左翊闗係甚重邊方赤子困苦已極時日難待勅下該部從長計議速發帑銀五六萬兩星夜差官解運前來聴臣等酌量分發賑濟以救倒懸之急仍將軍士厯過糧賞查數給發庶㡬生全有望戰守可資人心恃以相安重鎮賴以永固矣䇿治道之要對遼蕭韓家努臣伏見比年以來髙麗未賓凖布猶強戰守之備誠不容己乃者選富民防邊自備粮糗道路修阻動淹嵗月比至屯所費已過半隻牛單轂鮮有還者其無丁之家倍直傭僦人惮其勞半途亡竄故戍卒之食多不能給求假于人則十倍其息至有鬻子割田不能償者或逋役不歸在軍物故則復補以少壯其鴨淥江之東戍役大率如是况渤海女直髙麗合從連横不時征討富者從軍貧者偵候加之水旱菽粟不登民以日困葢勢使之然也方今最重之役無過西戍如無西戍雖遇凶年困弊不至于此若能徙西戍稍近則往來不勞民無深患議者謂之徙非便一則損威名二則召侵侮三則棄耕牧之地臣謂不然凖布諸部自來有之曩時北至臚胊河南至邊境人多散亂無所統一惟往來抄掠至太祖西征至於流沙凖布望風悉降西域諸國皆願入貢因遷種落内置三部以益吾國不營城邑不置戌兵凖布累世不敢為㓂統和間皇太妃出師西域拓土既逺降附亦衆自後一部或叛鄰封討之使同力相制正得馭逺人之道及城哈屯開境數千里西北之民徭役日增生業日殫警急既不能救叛服亦復不恒空有廣地之名而無得地之實若貪土不已漸至虚耗其患有不勝言者况邊情不可深信亦不可頓絶得不為益捨不為損國家大敵惟在南方今雖連和難保他日若南方有變屯戌遼邈卒難赴援我進則敵退我還則敵來不可不慮也方今太平已久正可恩結諸部釋罪而歸内徙戍兵以增堡障外明約束以正疆界每部各置酋長嵗修職貢叛則討之服則撫之諸部既安必不生釁如是則臣雖不能保其久而無變知其必不深入侵掠也或云棄地則損威殊不知殫費竭財以貪無用之地使彼小部抗衡大國萬一有敗損威豈淺或又云沃壤不可遽棄臣以為土雖沃民不能久居一旦敵來則不免内徙豈可指為吾土而惜之夫帑廩雖隨部而有此特周急部民一偏之恵不能均濟天下如欲均濟天下則當知民困之由而窒其隙節盤㳺簡驛傳薄賦斂戒奢侈期以數年則困者可蘇貧者可富矣盖民者國之本兵者國之衛兵不調則曠軍役調之則損國本且諸部皆有補役之法昔補役始行居者役者類皆富實故累世從戍易為更代近嵗邊虞數起民匱乏既不任役事隨補隨缺茍無上户則中户當之曠日彌年其窮益甚所以取代為艱也非惟補役如此在邊戌兵亦然譬如一抔之土豈能填尋文之壑欲為長乆之便莫若使逺戍疲兵還于故鄉薄其徭役使人人給人給足以補役之道可以復故也臣又聞自昔有國家者不能無盗比年以來羣黎凋弊利於剽竊良民往往化為兇暴甚者殺人無忌至有亡命山澤基亂首禍所謂民以困窮皆為賊盗者誠如聖慮今欲芟夷本根願陛下輕徭省役使民務農衣食既足安習教化而重犯法則民趨禮義刑罰罕用矣臣聞唐太宗問羣臣治盗之方皆曰嚴刑峻法太宗笑曰㓂盗所以滋者由賦斂無度民不聊生今朕内省嗜欲外罷㳺幸使海内安静則盗㓂自止由此觀之㓂盗多寡由衣食豐儉徭役重輕耳今宜徙哈屯城於近地與西南副都部署烏爾古徳哷勒威烏爾古等部聲援相接罷黑嶺二軍并開保州皆𨽻東京益東北戌軍及南京縂管兵增修壁壘侯尉相望繕完樓櫓浚治城隍以為邊防此方今之急務也願陛下裁之凖布國語解見人物四原作阻卜哈屯䝉古語王妃之稱也原作可敦烏爾古䝉古語徳哷勒索倫語解俱見人物二威䝉古語樹林也原作烏古敵烈隗烏古今俱譯改欽定盛京通志巻一百十一
