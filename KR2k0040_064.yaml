body:
  text: 歷朝人物三金欽定四庫全書欽定盛京通志卷六十歷朝人物三金果布昭祖族人昭祖耀武於青嶺白山還至古哩甸昭祖得疾寢於村舍洞無門扉乃以車輪當門為蔽果布卧輪下為捍禦已而賊至刃交加於輪輻間果布洞腹見膏恐昭祖知之乃燃薪取膏以為炙昭祖既覺遂中夜啓行國語果布寬免也原作摑保古哩解見黑龍江山川卷原作姑里今俱譯改葉赫系出景祖居舍音水完顔部為其郡貝勒率所部來歸金之為國自此益大與罕都常在世祖左右居則與謀議出則蒞行陳明昌中贈特進諡忠濟與罕都配享世祖廟庭葉赫國語解見吉林山川卷原作冶訶舍音即珊延解見吉林山川卷原作神隱國語貝勒管理衆人之稱原作勃堇罕都稻也原作歡都今俱譯改阿里干景祖第八子健捷善戰太祖舉兵伐遼首贊大功在行間屢有戰績收國元年太祖即位阿里干以耕具九為獻曰願陛下無忘稼穡艱難上敬受之為人聰敏辨給凡一聞見終身不忘始未有文字祖宗族屬時事並能默記與色格同修本朝譜牒見素未相識人問其祖父名即能道其部族世次人或遺忘輒一一辨析言之上稱其强記人不可及天輔三年寢疾宗翰日往問之盡得祖宗舊俗法度太宗幸其家視疾詢以國事對曰馬者甲兵之用今天地未寧而國俗多以良馬殉葬請禁止從之奏訖卒上哭之慟曰臨終不亂念及國家事真賢臣也熙宗時追封隋國王大定間配享太祖廟庭諡剛憲阿里干原作阿離合悶國語色格貂鼠也原作斜葛今俱譯改希卜蘇昭祖之孫烏肯徹次子健捷能左右射太祖伐遼珠赫店之役惟希卜蘇之策與太祖合卒破十萬之師收國元年為愛滿貝勒太祖每伐遼輒命希卜蘇與太宗居守倚任與薩拉噶比大定三年封金源郡王配享太祖廟庭諡忠毅希卜蘇國語解見奉天山川卷原作習不失亦作辭不失蒙古烏肯徹柔弱也原作烏骨出珠赫解見選舉卷原作出河國語愛滿部落也貝勒解見前注原作阿買勃極烈蒙古語薩拉噶樹枝也原作撒改今俱譯改完顔杲一名舍音世祖第五子太祖母弟收國元年為溫貝勒天輔元年以兵一萬攻泰州下金山縣諸部人皆來降五年為烏赫哩貝勒都統內外諸軍取中京實北京也六年遼耶律聶哷自立於燕京移書請和杲復書責之遣使請太祖臨軍定燕京還次鴛鴦濼杲從還京師太宗即位杲為按班貝勒治國政天會三年伐宋杲領都元帥居京師卒封遼越國王配享太祖廟庭諡智烈舍音解見前注原作斜也亦作斜野溫貝勒國語溫化也貝勒解見前注原作吳勃極烈烏赫哩總也原作忽都聶哷單弱也原作揑里按班大也原作諳班今俱譯改棟摩世祖第十一子髙永昌據東京棟摩破之於首山太祖攻遼上京棟摩先登克其外城遂降之都統完顔杲兵至中京棟摩自城西沿土河以進遂克其城宗翰等攻西京為四輪革車髙出於堞棟摩與麾下乘車先登遂取西京又克南京殺僞都統張敦固伐宋為都統節制諸軍克汴京下河間屢有摧敗天會六年卒年四十熙宗時追封吳國王配享太祖廟庭諡莊襄棟摩語解見名宦傳原作閒黎今譯改薩拉噶景祖長孫世祖之姪敦厚多智長於用人家居純儉好穡稼穆宗初襲位命薩拉噶為國相太祖即位行國相如故自薩拉噶為相能馭服諸部訟獄皆得其情伐遼之計決於都古嚕訥贊成大業實自薩㕸噶始之天會十五年追封燕國王大定三年贈金源郡王配享太祖廟庭諡忠毅薩拉噶解見前注原作撇改䝉古語都古嚕訥盈滿也原作迪吉乃今俱譯改斡魯薩拉噶弟收國二年詔統諸軍伐髙永昌大破之永昌遁其下遂執以獻於是遼之南路係籍女直及東京州縣盡降遼主在陰山青冡之間斡魯為西南路都統往襲之奏捷曰賴陛下威靈屢敗敵兵遼主無歸勢必來降皇統五年追封鄭國王天德二年配享太祖廟庭普嘉努又名昱景祖孫鄭國公赫紳子太祖自草濼追遼帝普嘉努為前鋒晝夜兼行追及於實納圖遼帝遁去兵遂潰所殺甚衆烏庫部反討平之天會間為司空封豫國公天德初配享太祖廟庭普嘉努原作蒲家奴國語赫紳綱也原作劾孫實納圖䝉古語實納土也圖有也原作石輦鐸烏庫八旗姓原作烏虎今俱譯改宗雄康宗長子始生風骨非常世宗以國器目之九嵗能射逸免年十一射中奔鹿材武蹻捷挽强射逺可二百步既長孝敬謙謹人愛敬之嘗逐免達賚亦從後射之已發矢大呼曰矢及矣宗雄反顧手接其矢就射免中之從太祖伐遼遼帝以七十萬衆至宗雄獨言不畏率衆直前大敗之於呼岱巴岡既取泰州宗雄包其土來奏曰其土如此可種植也由是徙萬餘家屯田泰州從大軍克西京遇疾卒太祖慟曰此子謀略過人臨陳勇決少見其比賜賻葬甚厚大定二年追封楚王諡威敏配享太祖廟庭䝉古語達賚海也原作撻懶呼岱巴國語呼岱市也巴地方也原作護步答今俱譯改錫圖美扎蘭路完顔部人世為其部長系出於始祖弟後勇敢善戰質直孝友强記辨捷臨事果斷招諭諸部使附於世祖世祖嘉之後以太祖擊髙麗及伐遼功尤多正隆二年封金源郡王䝉占語錫圖美項戴也原作石圖們國語扎蘭世代也原作耶懶今俱譯改烏色世祖子年幼即能集事康宗二年威泰治蘇伯水部烏色斡魯佐之定諸部而還久之髙麗殺行人阿古雙寬而築九城於海蘭烏色將內外兵守之髙麗兵數萬來拒烏色分兵為十隊更出迭入遂大破之烏色母病召還以斡魯代之未幾烏色復至再破髙麗軍進圍其城髙麗請和歸前後亡命及所侵故地退九城之戍遂與之和皇統五年追封衛國王國語烏色子粒也原作幹賽䝉古語威泰冇記性之謂原作幹帶國語蘇伯筋也原作蘇濵阿占雙寬國語阿古兄長也雙寬海東青也原作阿䀨勝昆海蘭解見建置沿革卷原作曷懶今俱譯改完顔忠本名都古嚕訥錫圖美弟太祖器重之後將舉兵伐遼就謀之都古嚕訥曰以王公英武士衆樂為用遼帝荒於畋獵政令無常易取也後代其兄為扎蘭路逹貝勒熙宗即位纍加同中書門下平章事天德二年配享太祖廟庭大定二年追封金源郡王都古嚕訥解見前注原作迪古乃扎蘭路逹貝勒扎蘭見前逹國語為首之稱貝勒見前原作耶懶路都勃厪今俱譯改宗翰本名尼瑪哈薩拉噶長子年十七軍中服其勇及議伐遼與太祖意合太祖敗遼師于境上薩拉噶使宗翰來賀捷宗翰與阿里干等勸進太祖意乃決用其䇿取中京宗翰聞遼主在山西猶事畋獵即以精兵六千襲遼主遼主遁去撫定西路州縣部族遂從取燕京太祖以宗翰為都統太宗即位宋人來請割諸郡太宗欲許之宗翰持勿割請伐宋以宗翰為左副元帥降定諸縣克太原執宋經略使張孝純等自太原趨汴與宗望會兵克汴州以宋二主北還賜鐵劵定議立熙宗熙宗即位拜太保尚書令領三省事封晉國王大定間改贈秦王諡桓忠配享太祖廟庭尼瑪哈解見選舉卷原作粘沒喝今譯改宗幹本名斡布太祖庶長子太宗即位為固倫左貝勒輔政始議禮制度正官名定服色興庠序設選舉治厯明時皆宗幹啓之熙宗即位拜太傅進太師封梁宋國王賜䇿杖上殿入朝不拜監修國史又賜輦輿上殿制詔不名疾亟上及后同往視后親與饋食既薨輟朝七日大臣死輟朝自宗幹始世宗時追諡忠烈明昌四年配享太祖廟庭唐古特語幹布嵗也原作幹本固倫左貝勒國語固倫國也貝勒見前原作國倫左勃極烈今俱譯改宗望本名斡喇布太祖第二子太祖自將襲遼宗望為前鋒燕京平為副都統襲遼主俘其族屬遼主率兵決戰又擊敗之獲其子趙王及傳國璽討張覺覺遁平南京奏請伐宋自燕山路進破郭藥師兵於白河降之取燕山府州縣悉平天會四年八月取天威軍克真定遂趨汴分遣諸將破宋援兵克汴州宋少帝詣軍前降師還卒追封魏王天德二年加遼燕國王配享太宗廟庭大定三年改封宋王諡桓肅國詔幹喇布令其撈之也原作幹魯補亦作幹離不今譯改宗弼本名烏楚又名烏珠太祖第四子從宗望伐宋以三千騎薄汴州宋上皇出奔敗鄭宗孟兵數萬遂克青州取臨朐詔再伐宋攻破濮州大名河北平宋主自揚州奔江南宗弼進兵自和州渡江降江寧取廣德軍路追襲宋主于越州宋主入海遂克明州秀州平江鎮江自鎮江泝流西上宋韓世忠襲之將至黃天蕩宗弼因老鸛河故道開三十里通秦淮一日夜而成乃至江寧將渡江而北又與伊喇古戰世忠軍以火箭射之殲其舟軍北還定陜西為右副元帥封瀋陽入朝進拜都元帥誅逹賚再平河南克廬州渡淮與宋畫淮水為界皇統三年為太師大定中諡忠烈配享太宗廟庭世宗嘗曰宗翰之後惟宗弼一人而已烏楚原作斡啜烏珠原作兀术即幹啜之誤解見吉林山川卷伊喇古八旗姓原作移剌古今俱譯改薩里干亦名杲安帝六代孫雄偉有才略從平陜西所降城堡最多睿宗留兵屯衝要使薩里干總之請收劍外十三州連破吳玠軍盡下諸寨天會十四年為元帥右監軍宋兵九萬會于涇州薩里干以輕騎敗之取涇州尋為右副元帥皇統三年封應國公海陵時以久握兵權忌之以為行臺左丞相兼左副元帥陽尊以殊禮使托卜嘉圖之令史約索希㫖誣以謀反子宗安被掠不服而死殺薩里干于汴大定三年追封金源郡王諡莊襄配享太宗廟庭薩里干原作撒離喝托卜嘉解見人物卷二原作撻不野國語約索儀也原作遙設今俱譯改尼楚赫宗室子與錫固納使遼還具以遼政事人情告首贊太祖伐遼遼將耶律鄂爾多率兵二十萬戰於達嚕噶城尼楚赫與羅索率衆搗其中堅九陷陳大敗遼軍從都統杲克中京遼主西奔尼楚赫以兵絶其後遂見獲後又屢敗宋師克太原取汴城天㑹十年為燕京留守遷中書令封蜀王卒贈金源郡王配享太宗廟庭諡武襄國語尼楚赫珍珠也原作銀术可䝉古語錫固納審問也原作習古乃鄂爾多國語解見奉天府山川卷原作訛里朵逹嚕噶頭目也原作達魯古羅索解見選舉卷原作婁室今俱譯改璸都一名昂景祖弟伯赫之孫也年十七從太祖平燕有功天會二年南京叛軍帥棟摩遣璸都討平之天眷元年宋兵十萬攻東平璸都多張旗幟於林間自將精兵于陳前敵疑有伏不敢動相持數日而退璸都襲之至清口宋兵泛舟逆水而去時霖雨不止璸都附水屯營夜將半忽促衆北行下令曰鼓聲絶而敢後者斬遂拔營去二十里是夜宋人劫營無所得諸將問故璸都曰沿流下者走也泝流上者誘我必追也今大雨泥淖彼舟行安我陸行勞士卒飢乏弓矢敗弱又居下流襲我必矣衆皆稱善在東平七年遷東北路招討使改崇義軍節度使天德初授上京路世襲明安封瀋國公大定中進封漢國公卒年六十四上輟朝悼惜賜賻甚厚璸都在海陵時縱飲沉酣及世宗即位頗自愛性行敦睦尤善施豫貧困者必厚給之君子以為達䝉古語璸都圖也原作奔睹國語伯赫墨也原作孛黑今俱譯改阿里布葉赫子多智略勇於戰未冠從軍平河南功為最皇統時授歸德軍節度使纍遷儀同三司世襲明安歷官有惠愛得民心及卒人皆惜之國語阿里布呈遞也原作阿魯補今譯改宗賢本名阿嚕太祖伐遼從攻寧江州臨潢府有功太宗監國甚見親信遷歸德軍節度使政尚寬簡境內大治秩滿士民詣闕請留及改武定軍百姓扶老携幼泣送數十里改永定軍士民持盆水與鏡前拜言曰使君廉明清直類此天德初授世襲穆昆馳驛召之雄州父老相率張青繩懸明鏡于公署老幼闐門三日乃得去封定國公進廣平郡王改崇義軍節度使大定初宗賢率諸宗室見世宗於遼陽封景國公為博索路兵馬都總管致仕阿嚕解見山川卷原作阿魯穆昆解見名宦卷原作謀克博索解見名宦卷原作婆速今譯改托克速宗室子嘗領偏師破雲中諸山寇盜又討平應州賊撫安其民而還及隨宗翰伐宋戰于文水破宋兵三十萬貝勒烏爾古攻石州屢敗托克速謂烏爾古曰敵皆步兵吾不可以騎戰烏爾古曰聞賊挾妖術畫馬以繫其足疾甚奔馬步戰豈可及之托克速笑曰豈有是耶乃令諸軍去馬戰敵遂大敗天眷三年為元帥左監軍卒正隆二年贈應國公國語托克速鄉村也原作突合速貝勒見前烏爾古見人物二卷原作孛堇烏谷令俱譯改實實錫圖美子太祖攻寧江州實實摧鋒力戰從克中京敗夏將李良輔兵與羅索獲遼帝于伊都谷宗翰伐宋以懷孟控制險要使實實統十二明安軍鎮撫之殄平冦盜招集流亡四境以安卒贈特進諡威敏國語實實榛子也原作習失伊都都班次也原作余睹今俱譯改思敬實實弟純直有才幹從其兄攻太原復從完顔和尼下洛陽圍汴皆有功大定九年拜樞密使上疏論五事其一女直人可依漢人以文理選試其二契丹人可分𨽻女直明安其三鹽濼官可罷去其四與明安同勾當副千户官亦可罷其五親王府官屬以文資官擬注教以女直語言文字世宗納之時欲修熙宗實録上謂思敬曰卿嘗為侍從必能記其事蹟對曰熙宗時內外皆得人風雨時年榖豐盜賊息百姓安此其大概也何必餘事上大悅蓋世宗喜立事故其微諫如此卒時世宗親臨喪哭曰舊臣亡矣蒙古語和尼羊也原作活女今譯改宗尹阿里干子世襲穆昆性行醇厚大定中拜平章政事封代國公兼太子太傅時民間錢幣不通世宗以問宗尹對曰錢者有限之物積於上者滯於下所以不通昔海陵軍興為一切之賦有菜園房稅養馬等錢百姓苦之今天下無事府庫充積悉宜罷去世宗納之於是養馬等錢始罷北方雖飢軍食不足議者謂秋成近不必更勞挽輸宗尹曰國家平時積粟所以備凶嵗也必待秋成則憊者衆矣如防戍何世宗從之宗寧系出景祖性勤厚有志撡大定二年為會寧府路押軍萬户擢歸德軍節度使時方旱蝗宗寧督民捕治得死蝗一斗給粟如之數日蝗絶移鎮臨潢纍遷兵部尚書授隆州和屯明安徙鎮利涉軍入拜平章政事宗寧居家儉約如寒素臨事明敏其鎮臨潢鄰國有警宗寧聞知乏糧即出倉粟令以牛易之敵知得粟即遁去時邊人苦無牛宗寧復令民以粟易牛而倉粟倍于舊其經畫如此明昌二年卒國語和屯城也原作和團今譯改宗憲本名鄂拉薩拉噶子年十六選入學兼通契丹漢字未冠從兄宗翰伐宋汴京破人爭趨府庫取財物宗憲獨載圖書以歸時朝廷議制度禮樂往往因仍遼舊宗憲以為當逺引前古因時制宜成一代之法何乃近取遼人制度哉希尹由是器重之纍官尚書左丞攝門下侍郎皇統五年將肆赦議覃恩止及女直人宗憲奏曰莫非王臣慶幸可有間耶遂改其文使均被焉天德初為中京留守進封巨鹿郡王世宗即位召為太子太傅拜平章政事時有司言諸路明安穆昆怙其世襲多擾民請同流官以三十月為考憲乃上議曰昔太祖撫定天下誓封功臣襲明安穆昆今若改為遷調非太祖約臣謂但當明核善惡有不職者於弟姪中更擇賢者代之上從其議進拜右丞相大定六年卒上輟朝悼痛久之遣官祭奠賜賻甚厚鄂拉䝉古語解見黑龍江山川卷原作阿懶今譯改宗叙本名德夀棟摩子竒偉有志略好談兵纍官寧昌軍節度使世宗時伐遼伐宋歷有戰績嘗奏陳黃河利害及南邊事宜俱合上意大定二十一年奉詔巡邊半途病甚遺表朝政得失及邊防利害使其子上書卒年四十六上傷悼輟朝曰宗叙勤勞國家他人不能及也賜賻甚厚明昌五年配享世宗廟廷宗浩字師孟昭祖四世孫世宗朝初命充符寶祇候歷同知陜州防禦使事察亷能第一等纍拜參知政事章宗即位出為北京留守北方有警命宗浩佩金虎符駐泰州便宜從事北部多乞內屬拜樞密使封營國公略進左丞相會伐宋命兼都元帥往督進討宋遣張巖以書乞和宗浩以詞㫖未順却之巖復遣方信孺齎書至宗浩囚之以聞仍遣之使歸復書于巖宋竟改叔為伯增嵗幣備犒軍銀函韓托胄蘇師旦首以獻而乞盟焉宗浩遂卒于汴訃聞上震悼輟朝敕隨行官屬率軍士送至葬所仍持繪像至都親臨祭奠諡通敏完顔襄昭祖五世孫幼有志節善騎射多勇略大定初從討契丹七戰皆捷賊所駐地多草乘風縱火襄亦縱火立空地以俟卒大敗之事平論功第一及伐宋為先鋒間道克清流關師還率璸路節度使移海蘭路兵馬都總管襄智勇兼備有經世才屢在外任治有異效既進尚書左丞朝廷褒賞亷吏猶詔天下列其名以示奬勵世宗不豫以右丞相受顧命明昌中代瓜爾佳清臣禦北邊降其部長勒勳九峯石壁捷聞封常山郡王契丹德夀托色等據信州叛衆號數十萬逺近震駭廷臣議罷郊祀襄獨曰大禮不可輕廢臣乞於祀前滅賊既而賊破果如所料進封南陽郡王初討契丹自龍虎衛上將軍以下許承制授之襄以為賞罰之柄非人臣所宜與不敢奉詔北部再叛拜襄平章政事屯北京民方艱食乃減價出糶或以兵食方急為言襄曰烏有民足而兵不足者民大悅服及用兵𠞰撫並施北陲遂定拜左丞相襄在政府前後二十年明練故事簡重能斷待屬吏盡禮用人各得所長為當世名將相卒諡武昭大安間配享章宗廟庭托色解見人物卷二原作陀鎖今譯改完顔衷世祖曽孫大定中授代州宣鋭軍都指揮使嵗旱州委禱雨于五臺靈潭步至其地雨隨下人為刻石紀之衷孝弟貞謹深悉本朝婚禮皇族婚嫁每令衷相之治復有能稱其在寧海蠡州平賦役無擾民民為立石頌遺愛焉大安初追贈輔國上將軍完顔琮一名承慶顯宗子也儀觀豐偉機警清辨性寬厚好學世宗選進士之有名行者納塔謀嘉教之及長輕財好施無愠色善吟咏不喜聞人過騎射繪塑之藝皆造精妙章宗時封鄆王卒諡莊惠完顔瓌一名和勒端琮之弟性忠厚寡言內行修飭工詩精騎射書藝章宗即位稱其性忠孝嘗令在左右封瀛王卒諡文敬和勒端解見名宦卷原作桓篤今譯改完顔齊本名蘇赫穆宗曽孫大定中纍遷刑部員外郎世宗諭曰本朝未嘗有內族為六部郎官者以卿歷職亷能故授之出為磁州刺史治以寬簡未嘗留獄明昌三年始議置諸王傅頗難其選乃以齊傅兖王王府家奴無敢犯者六年移利涉軍節度使留守上京齊明法識治體所至有聲內族中與丞相承暉並稱云國語蘇赫斧也原作掃合今譯改宗道上京司屬司人系出景祖通周易孟子善騎射章宗時除西北路招討使故事諸部駕馬八百餘匹宗道辭不受諸部悅服邊鄙順治尋除陜西路統軍使以鎮靜得軍民心特遷三階兼知京兆府事時夏旱俾長安令取太白湫水步迎於逺郊及城而雨是嵗大稔人以為積誠所感承安中知河中府有惠政民立石像于層觀以時祀之泰和四年卒贈龍虎衛上將軍欽定盛京通志卷六十
