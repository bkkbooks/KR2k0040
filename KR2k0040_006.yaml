body:
  text: 欽定四庫全書欽定盛京通志卷二聖製太宗文皇帝聖訓欽定四庫全書欽定盛京通志卷二聖製二太宗文皇帝聖訓天聰元年丁卯五月癸未上命繫書於矢射入錦州城中諭曰爾城內一應官吏軍民等與其饑困而死不如縋而出降必縱爾歸令與父母妻子相見昨我軍到時臺堡降衆二千餘人悉令縱還想爾等亦聞之矣今我豈肯舍此垂陷之城而去俟我攻城軍士雲梯挨牌綿甲一到即行攻取玉石俱焚噬臍何及曷若於未攻城之先縋城出降我必使爾室家完聚有官職者自當優叙恩養天聰三年己巳八月乙亥上諭曰自古國家文武並用以武功勘禍亂以文教佐太平朕今欲振興文治於生員中考取其文藝明通者優奬之以昭作人之典諸貝勒府以下及滿漢䝉古家所有生員俱令考試各家主母得阻撓有考中者仍以别丁償之天聰五年辛未七月庚子上召集諸將諭曰瀋陽遼東之地原非我有乃天所賜也今不事征討坐視漢人開拓疆土修建城郭繕治甲兵使得完備我等豈能安處邪朕是以不惜財帛及與朝鮮通市所得貨物盡與䝉古易其馬匹興師致討此行儻荷天佑克奏厥功凡俘獲之人勿離散其父子夫婦勿掠取其衣服當加意拊循以副朕戡亂寧人之意爾諸臣於各軍士宜諄切曉諭若止於傳諭時唯唯聽命退而遂忘自不免生事橫行致干罪戾矣朕今不自暇逸躬率大軍前往或彼被困而來降或天垂佑而致勝則飲至休兵三軍解甲定有其時自征明國以來攻城野戰所向必克彼明國屢戰屢敗勢同枯朽而我常有懼心者以彼雖不長於騎射而於戰陳之時曉習文武法律故也昔金伐宋遇宋將宗澤金兵十三戰皆敗隨有宋一將率兵來援欲戰有城守將沮之曰當此六月酷暑揮扇納凉尚不能堪豈能擐甲而戰乎諸兵聞之皆無鬬志宋兵遂潰以一言之失而城竟為金所得如貝勒阿敏駐守永平時曽以我兵為弱曰如此安能克敵彼貝勒之言若此士卒孰肯用命又如額駙固三泰朕非以其臨陳怯懦不能稱職革都統任也當進攻昌黎時本旗一卒被傷至死以繩繫其足曵之而歸夫戰則用之而死不加恤誰復效死直前邪必也死則恤之傷則臨視調治之乃可為主帥爾都統等果能體恤士卒則人皆效死願授命於主將之前矣我軍總計雖衆若都統副都統恭領佐領各就所屬而戒諭之不難遍及要在申明法令愛惜士卒則人人競奮建立功名豈不美乎天聰六年壬申三月戊戍上諭巴克什達海曰國書十二頭字向無圈㸃上下字雷同無别幼學習之遇書中尋常語言視其文義易於通曉若至人名地名必致錯誤爾可酌加圈㸃以分析之則音義明曉於字學更有禆益矣天聰六年壬申八月癸酉六部衙門工竣上親往視還宫時召六部啓心郎諸臣諭之曰朕以爾等為啓心郎爾等當顧名思義克盡厥職如各部諸貝勒凡有過失爾等見之即明言以啓迪其心俾知改悔若一時面從及事已往而退有後言斯最下之人所為也汝等先自治其身身正而後可以言諫上如不治其身不勤部事則自反尚多抱愧何以取重於人雖懇切言之上必不聽人亦不信也天聰七年癸酉正月庚子上諭各佐領曰田疇廬舍民生攸賴勸農講武國之大經爾等宜各往該管屯地詳加體察不可以部務推諉若有二三佐領同居一堡者著於各田地附近之處大築牆垣散建房屋以居之遷移之時宜聽其便至於樹藝之法窪地當種梁稗髙田隨地所宜種之地瘠須加培壅耕牛須善飼養爾等俱一一嚴飭如貧民無牛者付有力之家代種一切徭役宜𣲖有力者勿得纍及貧民如此方稱佐領之職若以貧民為可虐濫行役使惟爾等子弟狥庇免其差徭則設爾佐領何益耶至所居有卑濕者宜令遷移若憚於遷移以致傷稼害畜俱爾等佐領是問方今疆土日闢凡田地有不堪種者儘可更换許訴部臣换給如給地之時爾佐領自占近便沃壤將逺瘠之地分給貧人許貧人陳訴再爾等於該管之地各宜督率所屬長幼於春夏秋三時勤于習射朕不時遣部臣往察如有不能射者必治佐領之罪此係我國制勝之技何可不努力學習耶天聰七年癸酉九月辛丑上御殿召征明山海關貝勒大臣等責之曰爾等此行用兵甚不合法既捷之後何不深入內地收取糧餉休息士馬乃遽速還耶貝勒雖欲還軍揚古利爾係舊臣何不諫止爾若能諫貝勒誰不聽從想爾為築室未成乘此未寒急圖竣工故遽來耳即來時爾諸貝勒若令率領精兵殿後截殺明之追兵必獲大勝何至相率俱來止留圖魯什勞薩等峭兵殿後彼時敵兵數千追至雖以寡敗衆實皆上天眷佑及我兵精鋭故也萬一有失不知爾貝勒等尚能來見朕否圖爾格納穆泰蘇納等係有罪之人雖經革職仍用為各部承政凡遇攻城不令爾等前往今乘此凱旋之際正宜率兵殿後戮力建功以圖自效乃亦隨衆前行倘他日大軍出征攻城野戰之時衆皆奮勇齊進誰肯居爾等後者爾等將何時自奮乎皇考太祖時敖堪特翁格伊喇喀努賽四臣皆能率先力戰並未嘗殁於臨陳夫人生能有百嵗乎天數既盡不免於亡巴克什武納格所在建功今又殿後首先殺敗敵兵人臣為國義當如此爾諸大臣不能啓迪貝勒之心竭力為國止圖安享冨貴逡巡畏縮不知爾等可能長保富貴耶天聰七年癸酉十月已巳上諭文館儒臣曰昔皇考太祖欲創造滿書巴克什額爾德尼辭以不能太祖曰汝何謂不能但以䝉古字合我國之語音聮綴成句何為不可吾意已定汝毋辭額爾德尼乃一代傑出之人今也則亡彼所造之書義或有在其後巴克什庫爾禪所增朕恐終有未合爾記載諸臣將所載之書宜詳加訂正若有舛訛之處即酌改之朕嗣大位凡皇考太祖行政用兵之道若不一一備載垂之史冊則後世子孫無由而知豈朕所以盡孝乎天聰八年甲戌四月辛酉上諭曰朕聞國家承天創業各有制度不相沿襲未有棄其國語反習他國之語者事不忘初是以能垂之久逺永世勿替也䝉古諸貝子自棄䝉古之語名號俱學喇嘛卒致國運衰微今我國官名俱因漢文從其舊號夫知其善而不知從與知其非而不能省俱未為得也朕纘承基業豈可改我國之制而聽從他國嗣後我國官名及城邑名俱當易以滿語毋得仍襲漢語舊名俱照我國新定者稱之若不遵新定之名仍稱漢字舊名者是不奉國法恣行悖亂者也察出决不輕恕天聰八年甲戍十二月壬辰上命管步軍副都統巴竒蘭參領薩穆什喀率領官兵往征黑龍江地方諭曰爾等此行道路遙逺務奮力直前慎毋憚勞而稍怠也俘獲之人須用善言撫慰飲食甘苦一體共之則人無疑畏歸附必衆且此地人民語音與我國同携之而來皆可以為我用攻略時宜語之曰爾之先世本皆我一國之人載籍甚明爾等向未之知是以甘于自外我皇上久欲遣人詳為開示特時有未暇爾今日之來蓋為爾等計也如此諭之彼有不翻然來歸者乎爾等其勉體朕意大丈夫凡受委任當圖報稱語云少壯不努力老大徒傷悲誠哉是言若此時不力圖建樹異日雖悔何益耶天聰九年乙亥二月午午上諭曰邇者察哈爾國新附各官頻加恩宴其燕京及大凌河歸順各官久未宴勞雖得新附之員其舊歸我國者詎可頓忘耶諭畢遂設宴召燕京及大凌河歸順各官自守備都司以上皆集內庭宴之時預宴各官有形容憔悴者上見之曰或者貝勒等不加恩養以致如此雖得新附之人何乃轉忘先歸之人我國家䝉天眷佑所得大小官員人等朕皆一體加恩未嘗分别新舊嗣後一體恩養不可使先歸者反致失所遂遣人遍諭諸貝勒天聰九年乙亥三月戊辰上集諸臣於朝諭之曰朕昨出見民間耕種愆期蓋因佐領有事城工欲先時告竣故額外派夫致誤耕作築城固為正務然田地荒蕪民食何賴嗣後有濫役民夫致妨農務者該管佐領等俱治罪天聰十年丙子三月庚申內院諸臣擬新築開原城門名曰揚威昭德永安興化定逺進呈御覽上曰此等矜誇侈大之字素與朕意不合興之揚之定之悉在於天非人力所能強得也凡事莫貴於務實今當以字義切當者書之遂更其名曰鞏固門靖逺門鎮西門崇德元年丙子四月乙酉上建國大清改元崇德諸貝勒大臣朝賀時朝鮮使臣羅德憲李廓不拜上曰朝鮮使臣羅德憲李廓無禮處難以枚舉是皆朝鮮國王有意搆怨欲朕先起釁端戮其使臣然後加朕以背棄盟誓之名故令其如此耳不知朕之素行從不逞一時之小忿如此瑣屑也即兩國已成讐敵兵刃相加爭戰之際以事遣人亦無即戮其來使之理况朝㑹乎其勿問崇德元年丙子四月丁亥上受尊號禮成諸貝勒大臣上表慶賀上諭曰朕以凉德祇承丕緒加受尊號懼無以慰衆望爾等勸進再三屢辭弗獲今敬告天地允受尊號爾諸貝勒大臣當同心輔政恪共厥職以匡朕之不逮正已率屬各殫忠誠立綱陳紀毋圖小利儻能建立功名朕當隆以爵賞尤須撫衆恤民君臣一德庶幾上合天心下遂民志如此則明良喜起政治咸熙萬民樂利天益佑助之矣崇德元年丙子九月辛未上遣都察院承政阿什達爾罕大學士范文程剛林等諭凱旋多羅武英郡王阿濟格等曰朕聞我軍後隊方至舊遼陽河渡口爾等已抵家二日矣爾等當速往迎之朕畀爾以心膂重任者為愛養此兵民耳朕一人之心思能遍及乎君享康寧臣居尊顯俱兵民是賴即爾等功名亦藉士卒之力乃不思效力死戰之士而先自還家漠不相顧於心奚忍耶忘死戰之士卒令長途勞苦此後士卒誰肯為用命邪衆大臣奏曰皇上明訓臣等願親自往迎上曰都統以上免其親往副都統以下可選能辦事者往迎之崇德元年丙子十月丁丑上召羣臣集篤恭殿傳諭曰國家崇尚節儉毋事華靡凡鞍轡等物不許以金為飾雖富家不少藏金止許造盤盂匕箸蓋此等之類或至匱乏尚可毁為他用若以之塗飾則零星耗折豈能復取而用之今後著永行禁止至於陳獲縀帛用之亦當節儉勿以獲取之易奢費無度而忘其紡績之勞也崇德元年丙子十一月癸丑上御翔鳯樓集諸親王郡王貝勒及內院大臣等讀金世宗本紀上諭諸臣曰爾等審聽之世宗者䝉古漢人諸國聲名顯著之賢君也故當時後世咸稱為小堯舜朕披覽此書悉其梗槩殊覺心往神馳耳目倍加明快不勝歎賞朕思金太祖太宗法度詳明可垂久逺至熙宗合喇及完顔亮之世盡廢之耽於酒色盤樂無度效漢人之陋習世宗即位奮圖法祖勤求治理惟恐子孫仍效漢俗預為禁約屢以無忘祖宗為訓衣服語言悉遵舊制時時練習騎射以備武功雖垂訓如此後世之君漸至懈廢忘其騎射至於哀宗社稷傾危國遂滅亡乃知凡為君者耽於酒色未有不亡者也先時儒臣巴克什達海庫爾禪屢勸朕改滿洲衣冠效漢人服飾節度朕不從輒以為朕不納諫朕試設為比喻如我等於此聚集寬衣大袖左佩矢右挾弓忽遇碩翁科羅巴圖魯勞薩挺身突入我等能禦之乎若廢騎射寬衣大袖待他人割肉而後食與尚左手之人何以異耶朕發此言實為子孫萬世之計也在朕身豈有變更之理恐日後子孫忘舊制廢騎射以效漢俗故常切此慮耳我國士卒初有幾何因嫻於騎射所以野戰則克攻城則取天下人稱我兵曰立則不動搖進則不回顧威名震懾莫與爭鋒爾等其謹識朕言崇德二年丁丑四月丁酉上御翔鳯樓諭諸王貝勒等曰昔金熙宗及金主亮廢其祖宗時衣冠儀度循漢人之俗遂服漢人衣冠盡忘本國言語逮至世宗始服舊制衣冠凡言語及騎射之事時諭子孫勤加學習如元王馬大郭遇漢人訟事則以漢語訊之有女直人訟事則以女直語訊之世宗聞之以其未忘女直之言甚為嘉許此本國衣冠言語不可輕變也我國家以騎射為業今若不時親弓矢惟耽晏樂則田獵行陳之時必致疏曠武備何由而得習乎蓋射獵者演武之法服制者立國之經朕欲爾等時時不忘騎射勤練士卒凡出師田獵許服便服其餘俱令遵照國初之制仍服朝衣且諄諄訓諭者非為目前起見也及朕之身豈有習於漢俗之理正欲爾等識之於心轉相告誡使後世子孫遵守無變棄祖宗之制耳崇德三年戊寅八月癸丑上命和碩睿親王多爾衮為奉命大將軍以多羅貝勒豪格多羅饒餘貝勒阿巴泰副之統左翼軍多羅貝勒嶽託為揚武大將軍以多羅安平貝勒杜度副之統右翼軍兩路征明召集出征諸王貝勒大臣宣示軍律諭曰征伐非朕所樂為也朕常欲和而明不從是以興師耳有不抗拒我兵者若擅行誅戮則殺人者與主兵者均難辭咎甚非朕撫安黎庶之意也又諭各官曰丙子嵗多羅武英郡王領兵征明克昌平州爾等以貪掠獲罪者甚多朕豈願爾等犯法樂于加罪懲前此妄行貪暴之人正欲警之於後使不為亂且朕見爾等有罪甚為惻然朕非誇詡以古人自擬嘗閲古史云夏禹道遇罪人而泣侍臣曰此犯法有罪之人王何為而泣禹曰堯舜時政教德澤宣布於民故人無犯法今我之泣非為囚也我之政教德澤不如堯舜致有罪人故泣耳朕見爾等有罪亦甚為惻然也爾等亦互相勉勵恪遵軍令以行毋或怠玩從事今䝉古漢人朝鮮諸國俱已歸附軍營壯盛爾等勿徒自恃強勇以威懾人各宜申明紀律無或厭倦蓋爾等乃衆所觀瞻也若乃自處以禮濟之以和則歸附各國必以為我國強而有德勇而有禮益加悅服矣凡為主帥之人於臨陳之際使徒計一已之功而不念兵之死傷軍之敗衄及國之聲名有損非主將也興師致討當思於國有益於巳無愆凡軍中議事遇有意見悖謬者即宜在彼勸諭毋得緘默不言而徒於還時托辭自解亦有在彼故出微辭而辨時則云我曽如是勸諭者皆不足據必在彼明言於衆不從始可於還時辨理也崇德三年戊寅九月癸亥上命奉命大將軍和碩睿親王多爾衮等率左翼軍征明敕曰古帝王興師克敵撫定疆宇必選擇於衆拔一良將特授兵權則軍有所統而大事始定今因明國不肯講和樂於干戈故命爾和碩睿親王多爾衮充奉命大將軍授以敕印率左軍西伐爾其同貝勒與滿洲䝉古及漢軍各都統僉慮協謀擇其善而從勿以受命重而邀功勿以將士勇而輕敵凡駐營壘嚴設偵探小心提防勿得少怠務須信賞必罰激勵將士破彼邊關直入其境多謀定䇿密察敵人之機聲東擊西默運乘便之智出其不意攻其無備至於待將士勿護所愛勿蔽所憎有衝鋒破敵奮勇先登者必破格優賞仍録其功以奏參遊以下有敗陳及違軍律者先斬後奏尚其欽哉勿違朕命崇德六年辛巳四月甲寅上召內院諸臣進清寧宫命讀元史至世祖遣丞相巴延率師征宋時值炎天恐行軍不利敕俟入秋再舉巴延奏云宋之據江海如窮獸之負嵎今已困彼旋復縱之則逸而逝矣遂南征滅宋統有天下上遣大學士范文程剛林等至篤恭殿傳諭有罪王貝勒貝子公大臣等曰元世祖恐炎熱敕巴延俟入秋伐宋巴延執論必舉遂興師滅之今汝等不圍逼錦州屯兵逺處任意畋獵急圖歸家視彼為何如也朕非窮究爾等但以巴延勤國之心令爾等知之耳巴延原作伯顔今譯改崇德七年壬午五月癸酉上御崇政殿命擒獲明總督洪承疇總兵祖大夀副將祖澤逺等朝見洪承疇叩首請罪上諭曰彼時與我軍交戰各為其主朕豈介意朕所以宥爾者以擊敗十三萬兵與得松錦諸城皆天也天道好生善養人者斯合天道朕欲推恩活爾爾但念朕撫育之恩盡心圖報從前情罪悉豫寬釋昔陳前所獲張春亦曽養之彼不能為明死節又不能效力事朕一無所成而死爾慎勿如彼之所為也祖大夀叩首請罪上諭曰爾之背我一則為爾主一則為爾妻子宗族耳然得汝而不加誅之意朕懷之久矣朕常語內院諸臣曰祖大夀必不能死後來被困仍當俯首來降朕則始終待以不死也往事已不可追此後當竭盡爾力以事朕則善矣祖澤逺叩首請罪上諭曰爾乃志量褊淺之人所以不復來歸者亦視主將祖大夀耳昔朕往視杏山爾不但不肯開門來降乃明知是朕而特發火炮豈非背恩之大者乎爾舉炮能傷幾人耶無論爾小城士卒無多即洪承疇以一十三萬兵屢舉火炮所傷亦復有幾朕因爾背恩太甚故言及此朕見人之過即明言曉諭斷不念其舊惡事後復加推求豈但待爾如此即尊於爾之祖大夀尚且留養况爾小人何足加誅爾年方少壯自後凡遇戰陳奮發效力可也崇德八年癸未六月己卯上諭諸王貝勒貝子公等曰前諭王貝勒貝子公等將各所屬新舊人等加意恩養乃聞王貝勒等於近侍官員頻頻賜之以食至旗下官員守門護軍及新附之人竟不得沾恩養如此甚為失宜試思獨養官而不養民養賢而不養不肖官雖賢亦豈能獨立乎以上下相維之理言之必為在下之人所托命而後可為在上之人如無在下之人則統轄者誰役使者誰也朕幸承天眷以我兵之半往征明國遂能破其關隘克其城池皆因撫綏各國俾傾心歸順勢大力強之所致若止恃舊日之兵豈能致此乎朕素於諸王貝勒貝子公等一切家事俱不預聞嗣後於新舊人等孰愛養有方孰漫不撫恤必加詳察爾諸王貝勒貝子公等共宜加意愛養其都統護軍統領及近侍護衛等各宜啓迪其主凡見新舊窮苦之民即告知夲主給之衣食俾皆得所如此方可謂賢不然止圖一已之豐厚不以衆人為念衆人豈復有繫戀爾等之心耶此後凡新舊人有因不沾恩養自行陳訴者所告果實該王貝勒皆坐罪若原告係騎兵將該管都統一例治罪若係護軍將統領一例治罪蓋善養人者國之要務不可忽也又有效力行間勤勞素著而不免窮困者亦有秉質椎魯拙於經營而甘處貧乏者此等之人該管佐領察報都統轉啓各王貝勒酌給僕役牛馬以贍養之如王貝勒貝子公等不能贍養即以不能贍養具疏奏聞俟朕贍飬之其有不思隨征不畜馬匹止圖自養身家藉口貧乏者不許濫及察報之時各佐領毋得徇庇親屬此番出征所獲牲畜財物必須撙節儉用豈可恃俘獲以為生計耶夫出師征伐以有土有人為立國之本非徒為財利也至于厚生之道全在勤治農桑耳崇德八年癸未九月乙酉上幸御馬厰見部臣役遣民夫修治道路不分髙下皆增土培髙諭諸臣曰國有差徭民力疲敝皆由工部所致如修治道途不過損髙就下取其平坦而已乃不論髙下概令培築重困民力甚為擾纍至於民房稠密之處不即量行拆毁布置均勻乃止揭取數椽而置之小民何以安居爾等其詳加查究欽定盛京通志卷二
