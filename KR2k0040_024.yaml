body:
  text: 欽定四庫全書欽定盛京通志卷二十宫殿大政殿規制大内宫闕規制恭藏聖訓實録聖容玉牒玉寶儀注東京宫殿紀畧欽定四庫全書欽定盛京通志卷二十宫殿臣等謹案國家作京考宅肇建皇居我太宗文皇帝法垂經始尚樸貴儉風示萬年我皇上敬承祖烈式廓舊宫廼復重設諫木尊藏彛訓恭貯玉牒寶璽繩武守成無疆垂慶臣等詳稽規制仰止天閶謹志宫殿第六欽定四庫全書欽定盛京通志巻二十宫殿大政殿崇徳二年建太宗文皇帝御以聼政之大殿也在城之中大内宫闕之東殿制八隅左右列署十為諸王大臣議政之所順治元年定都京師奉天府文武各官朝禮如制聖祖仁皇帝三涖盛京御殿三次殿宇上蓋琉璃黄瓦華檐八角前掛清漢字匾一額曰大政殿乾隆二十二年御書匾一恭懸殿中曰㤗交景運御書聫恭懸左右楹曰神聖相承恍覩開國宏猷一心一徳子孫是守長懐紹庭永祚卜世卜年四十三年皇上廵幸盛京寶座後兩楹間設屏風一座前懸甲戌年季秋月御製詩墨寶後懸戊戌年仲秋月御製詩墨寶謹案恭載御製詩天章門丹墀下左右音樂亭二殿後鑾駕鹵簿庫十三間乾隆十四年重修盛京内務府工部董理大内宫闕崇徳二年建在大政殿之西南北袤八十五丈三尺東西廣三十二丈二尺正門曰大清門初太祖髙皇帝時於門砌旁設諫木二以達民隱乾隆四十三年命重設東西掖門二左右石獅二奏樂亭二坊二左曰文徳右曰武功朝房東西各五楹後為直房十二楹正南照壁一座正殿曰崇政殿原名篤恭殿殿前左日晷右嘉量乾隆十三年設左右翊門二殿内正中恭懸御書正大光明匾額一左右恭懸御書聨念兹戎功用肇造我區夏慎乃儉徳式勿替有歴年殿前東為飛龍閣閣後直房七楹井亭一座西為翔鳯閣閣後直房七楹房南轉角樓九楹偏厦三楹崇政殿直北為鳯凰樓樓内上層恭懸御書紫氣東來匾額一樓北曰清寧宫為國初祀神之所宫内恭懸御書萬福之原匾額一東壁恭懸御書聫曰不盡崇懐期太古自然逈句㑹當前西壁恭懸御書聫曰理趣所欣元是善心期惟與靜為謀東煖閣東壁恭懸御書聫曰葱蘢佳氣鍾靈厚晻藹祥烟介祉繁西壁恭懸御書聫曰聖圖締構延疇福宸極貞符叶㤗交西軒内第二楹恭懸御書聫曰仙瀛升旭日帝里扇仁風乾隆八年十九年四十三年四十八年上詣盛京循例舉行祭典宫後東西配房各三楹宫之東曰衍慶宫闗雎宫西曰永福宫麟趾宫康熙十一年重修乾隆十年上駐蹕盛京躬親相度重葺崇政殿飛龍翔鳯二閣左墄右平新階巍煥又於鳯凰樓左右増建軒楹樓之前東為師善齋齋南為日華樓西為協中齋齋南為霞綺樓崇政殿東為頤和殿殿内西壁恭懸御書聨曰福凝東海増芝算祥擁西池長鶴齡殿南中門一楹東西直房各三楹前為正門三楹殿後為介祉宫宫東房第二楹東壁御書聫曰式訓徽音嗣頤神景福綏宫後有正門三楹門北為敬典閣崇政殿西為廸光殿殿中屏風一座中間恭懸御書繼序其皇匾額一左右楹恭懸御書聨曰雲縵日華詒謀承燕翼竹苞松茂肯構煥翬飛殿前東西配殿三楹南為中門一楹東西各門一門外東南直房各三楹前為正門一楹左右各門一殿後為保極宫宫内南窻左右楹恭懸御書聫曰保佑命申豐邑億年垂裕㑹歸建極箕疇五福用敷正中配柱上恭懸御書聫曰帝命式於九圍本支百世天心佑夫一徳承叙萬年東齋東壁恭懸御書聨曰皇極㑹歸敷錫騐太和保合惕乾承西軒西壁恭懸御書聫曰箕範溯初陳建極鎬詩式是詠那居西房次楹正北壁上恭懸御書聨曰紹聞衣徳千秋凛景福鴻禧百世凝宫之左右前後廻廊十六楹宫後偏西一廊接繼思齋齋中正北壁上恭懸御書聨曰每以念功崇繼序益惟圖易凛思艱中煖軒正南壁上恭懸御書聨曰謨烈逺垂欽善繼治安長守凛深思東房東壁恭懸御筆畫菊一幅有御書癸卯季秋重觀墨寶齋旁東西直房各三楹齋後為崇謨閣閣後南向房七楹殿閣内俱冇癸邜甲戌戊戌癸亥御書墨寶以上殿閣俱乾隆十一年三月啟建十三年三月告竣十七年重修盛京宫殿増設圍墻六十一丈五尺其餘朝房直房繳道周廬並凖程式隨宜修建於是陪都宫闕氣象聿新作極四方倍加赫奕矣清寧宫墻外東西直房各三楹皆南嚮北有耳房二十八楹在大清門東南為内務府治事之所康熙十一年奉㫖㑹同工部重修自後宫殿有應修之處内務府㑹同工部諏吉具奏修理又定議凡采畫油飾需用顔料桐油罘罳銅絲等於工部移取部委官監視宫殿各門額設甲丁六百七十八名輪班看守文溯閣閣在宫殿之西正宇六楹東西遊廊二十五楹明樓一座敞軒五楹南配房十七楹東面南北耳房六楹直房十四楹又東更道内南北耳房四楹直房四楹碑亭一座宫門三楹閣南簷前恭懸御書清漢字文溯閣匾額一閣内嚮南恭懸御書聖海沿洄匾額一御書聨曰古今並入含茹萬象滄溟探大本禮樂仰承基緒三江天漢𨗳洪瀾正北兩楹恭懸御書聨曰由監古以垂模敦化川流區脈絡本紹聞為典學心傳道法驗權輿碑亭内恭鐫御製文溯閣記御製宋孝宗論俱清漢文閣内牙籖錦麗揷架雲連内貯藏四庫全書經部二十架九百六十圅史部三十三架一千五百八十四圅子部二十二架一千五百八十四圅集部二十八架二千零十六圅統計經史子集共一百零八架六千一百四十四圅三萬六千冊經部總目五圅三十册考證三圅十八冊史部總目五圅三十冊考證三圅十八冊子部總目五圅三十冊考證三圅十八冊集部總目五圅三十冊考證三圅十八冊又恭藏聖祖御定古今圖書集成全部計十二架五百七十六圅仰熙齋七楹在文溯閣之後齋内正南恭懸御書仰熙齋匾額一東軒寶座後恭懸御書聨曰日麗風和春藹吉周書魯語義抽尋西軒東壁恭懸御書聨曰趣為永哉暢非俗樂惟仁者寄於山東次楹東壁上恭懸御書聨曰篆凝細縷蘭烟紫芳遞疎櫺菊蕊黄齋之後正宇九楹耳房二楹東西廡二楹宫之正中東壁恭懸御書聨曰知仁適㑹動還靜枕葄無非史與書西壁恭懸御書聨曰雲裏峰姿開錦繡風間松籟韻笙簧嘉䕃堂五楹在文溯閣之前左右耳房二楹轉角房二十六楹後直房二楹堂之中東壁恭懸御書聨曰妙理靜機都逺俗詩情畫趣總怡神西壁恭懸御書聨曰一室有餘含峭蒨八牕無盡啟吟披東次楹西壁恭懸御書聨曰何處不堪體物理於斯亦未忘民艱又東壁閣内東壁恭懸御書聨曰對時真惬農桑慶寧道非闗視聼娱謹案御製仰熙齋嘉䕃堂詩俱恭載天章門乾隆十一年奉㫖欽派大臣恭送五朝聖訓實録於盛京尊藏香楠為匣上蓋龍袱先期欽天監諏吉屆時校尉恭舁綵亭出城更換行駕一應儀衛禮制與送玉牒同原貯鳯凰樓四十三年六月命盛京將軍𢎞晌擇吉恭移崇謨閣尊藏閣中舊有金櫃二十二座又十五年敬貯王牒於敬典閣閣中亦舊有金櫃二十二座二十五年三十三年四十三年續貯三次凡恭遇玉牒告成預令欽天監諏吉宗人府奏派王公一人禮部工部各奏派堂官一員恭送領侍衛内大臣奏派侍衛十員前引玉牒館派提調官一員纂修官二員禮部工部各派司官一員後䕶欽天監派擇吉官一員恭同送往屆期校尉恭舁綵亭凡旗仗儀衛與恭送玉牒至皇史宬同出城更換行駕頓宿之所建蓋綵棚安奉兵弁巡邏經過地方文武官員俱朝服出郊跪迎送闗以内兵部派兵弁沿途䕶送闗以外盛京將軍派員率滿洲兵䕶送至盛京曰預行掃除警蹕將軍五部侍郎府尹等俱朝服出郊跪迎鼓樂恭導至崇政殿前陳設寶案行三跪九叩禮屆尊藏吉日盛京禮部堂官前引至敬典閣前送往之王公大臣官員及將軍以下等官各於綵亭前行一跪三叩禮提調纂修各員率同盛京五部司員恭捧至敬典閣上敬貯金櫃又乾隆十五年恭奉五朝聖容於鳯凰樓儀注與恭送聖訓尊藏同又十一年尊藏御寶十於鳯凰樓有御製寶譜序以記始末謹案恭載御製序天章門大清受命之寶碧玉方四寸八分厚一寸九分麒麟紐髙二寸四分皇帝之寶青玉方四寸八分厚一寸九分交龍紐髙二寸七分皇帝之寶碧玉方五寸厚一寸八分盤龍紐髙三寸皇帝之寶㫋擅香木方三寸八分厚六分素紐髙五分奉天之寶金方三寸七分厚九分交龍紐髙二寸天子之寶金方三寸七分厚九分交龍紐髙二寸奉天法祖親賢愛民碧王方四寸九分厚一寸五分交龍紐髙三寸丹符出騐四方青玉方四寸七分厚二寸交龍紐髙二寸二分勅命之寶青玉方三寸七分厚一寸八分交龍紐髙二寸五分廣運之寶金方二寸四分厚八寸交龍紐髙一寸五分又乾隆四十五年奉㫖恭送重繪太祖戰圖實録於盛京尊藏謹案有乾清宫舊恭貯太祖戰圖實録八冊凡圖八十有七奉㫖重繪三帙以一帙送盛京恭貯太御製敬題重繪恭載祖戰圖實録詩天章門又乾隆四十八年奉㫖派皇子等及怡親王永琅恭送冊寶至盛京尊藏禮部奏請照恭送玉牒之例禮部工部堂官及侍衛等隨同親王由京敬謹送往工部預設彩亭於太廟正殿外鑾儀衛備黄蓋旗仗於丹墀下祗候屆期親王朝服詣册寶案前行一跪三叩禮禮部堂官率同宗室官員太常寺官俱朝服恭捧安奉彩亭上行一跪三叩禮出朝陽門外更換行駕王公以下俱朝服跪送經過地方文武官員咸朝服出郭跪迎送安宿之處俱於彩棚安奉出闗後盛京將軍派員率領滿洲兵恭䕶至常家屯親王同皇子等恭送行駕至盛京大臣官員俱朝服出郭跪迎盛京工部預備彩亭更換行駕奉天府尹預備鼓樂導引至太廟前送往之大臣官員率同盛京居住宗室五部大臣官員恭捧入殿内敬謹尊藏皇子親王俱行一跪三叩禮八角殿天命七年建在東京城内基址尚存今管理驛站守䕶謹案僅東京宫殿有殿基餘俱莫考白虎殿建置年月莫考在遼陽州城南千山上今基宇尚存
